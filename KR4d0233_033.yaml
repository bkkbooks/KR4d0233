front:
  text: 止齋先生文集卷之三十三
  hash: sha256:0574f85632c1d757e98212439cd5ed00171433430d5995aafd770942acfba0fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_033-1a}
body:
  text: 啓賀周左相伏審對揚大號晉陟上公宗社寵嘉華夷震疊共惟某官才足以緝熙於天繹學足以潤色於皇猷自秉國鈞獨行儒術許身衮職則近古社稷之臣借譽布衣如久要平生之友至於一意孤立三辭彌髙於人情之已安以世道而自任遭時其盛親承二典之都俞臨事加詳人明九變之憂患以其難進之節定此非常之元是以簡在帝心託之聖子甘盤之為舊學未常入揔於百官鄼侯之為宗臣蓋亦借煩於四皓孰與早翊儲闈之善晚陪神器之傳於以嗣萬世無疆之休於以起先王未有之禮弼諧昌運度越前聞永惟載籍以來鮮出動勞之右如某者不足比數最蒙保持每綸告之四馳喜福等夷而百倍况每蒙慰藉有周南留之詞而迄值亨嘉在沔水朝宗之數輒因賀牘併敘感悰傾之私敷宣罔既賀留右相恭審渙楊大號晉陟中台以薄海之具瞻知本朝之永賴共惟某官蔚於雅望度越前修明允而寬慈精微而廣大德兼衆美在伊尹惠夷之間學貫群儒無程氏蘇臣之辨若論行藏之晚節則明義利於秋毫自其厭直於甘泉亦既見思於宣室而乃越在外服殊無裏言獨上簡於帝心迄共圖於邦采永惟論相粵若淳熙弄印十年曾缺員之弗輔致身二府必詳試而為真率以序遷誰其特起召從帥閫謂見大夫之無人擢二樞庭出諸君子之不意訏謨屬耳續用藹然遂繇同列以先登竟與舊勞而並命昔有因夢卜而見用世曰宜哉公不以日月而為勞事適類此矧屬夀皇之髙蹈欲傳神器於初濳斷自淵裏托之聖子可謂千載明良之會兩朝社稷之臣廊廟為之光輝華夷為之震疊某嘗瞻英衮及聽明綸纍洽重熙何幸值九官之盛至愚極陋庶將安一介之私賀王參政召從外閫入告嘉猷擢置上宗晉參大政共惟某官受天間氣為世宗工粵來修門以踐禁嚴率本直道而聞海內每陪國論持平於左右大夫之間及沃上聰致戒於君子小人之際仁必有勇知無不言是宜簡在於帝心相與儀圖於宰事蓋册書所紀亟稱節誼之間然世道相違鮮值明良之會永惟前代孰與熙朝嘗於疇昔以觀人不待急難而求士慶曆全盛則范韓四傑之為元祐清明亦劉吕諸公之故徒以行藏之節初無夢卜之符有如下風無愧先進矧屬夀皇之獨斷欲傳神器於初濳亦既多賢能堪大計先定朕志雖僉共於詢謀素髙此人乃卒煩於調護可謂非常之寄托又將之心泰道方亨宜上體朋亡之義故但申於賀幅不敢布於私衷賀葛同知大號之敷元樞攸寄宗社於焉增重華夷之所具瞻某官天下逹尊生民先覺才濟其美可謂故國之世臣行歸于周不忘平生之久要至於善藏諸用自牧以謙本其視韓魏欿然之資養其過孟賁逺矣之氣利惑而不動位尊而彌恭與人同功則急所當先之義下士折節有施於不報之仁蓋昔或以一長而過人而公乃兼衆善以名世足以任重穆乎師言是宜簡在於帝心相與儀圖於兵本况甘盤之為舊學初無説命之三篇鄼侯之為宗臣亦藉商山之四皓未有早翊儲闈之正晚陪神器之傳寵光獨隆載籍鮮儷必有非常之報稱又將不次以登庸某久辱下交最蒙異顧附青雲而後顯慚非士君子之倫藏尺牘以為榮徒有兒女曹之感與湖南監司賀冬觀臺以望日增一線之功衡嶽而南天與九州之幸皇華所庇福履攸同屬乘障之有拘欲稱觴而靡及某官當今先進薄海令名以宣慈惠和之資膺咨度詢謀之寄將明主德既孳育於羣萌對越天休斯朋來於丕社凡在具依之列咸輸善頌之誠寧復久居鴻鴈劬勞之野定應亟入騏驎供奉之班賀正六轡驅馳閔勞使指三朝圖籍趣會王正連十國以蒙休并一談而稱慶某官逹尊之德爾雅之文議論蓋本之歐蘇風流尚想於王謝道關交泰既上當君子之亨義取觀頥宜明享聖人之養聿新歲律茂介春祺某最𬒳深知尤虔善頌越在外服雖頌花客次之無繇幸為諸生將摯菜師門之有日除提舉謝宰執旌之邉瑣卑以使華已弗理於專城將何施於列郡雖極矜憐之感曷勝慚愧之私切以蕞爾桂楊介於湖嶺中興至此凡六十載之間善治為誰才一二人而巳率皆久次然後序遷末有輒為當路之聯越在它邦之上重念某踈愚如故衰惰有加徒緣知巳之多亦忝牧民之寄惟其迂濶𥘉無文具之可觀或有便宜正恐官謗之不免及此殊渥曽未前聞雖幸拙誠見録於清明之始但虞小量自顛於盈滿之餘以寵為驚未知所稱某官弼亮二聖整齊百工秉國之鈞目具瞻而下逮使人以器嘗易事而兼容故所甄收及於微陋某敢不更堅晚節上體深知平易近民以將明於隆指劬勞安宅庶輔報於秋毫與交代張提舉不能勝任愧見旁觀何至乏人濫為嗣掌矧嘗受察以公叔而同升竟復蒙成荷子文之必告積此私感難於具陳某官大雅典刑故家文物造微之學至於殊塗而同歸正始之音可以一唱而三嘆所宜路門委講詞掖敷言可使書生不立五經之異庶幾帝制尚追三代之風方當歸報而停驂姑自揔銓而寄政某最為晚出辱在後陳周雅肄三偶值勞還之日蕭規畫一遂為代匱之人敢論伯仲之間但有子孫之託謝沈安撫為十國之連治無善狀假一封之傳寵有誤恩雖庇賴之如初而僥逾之巳甚未知報所誰實使然某官多士宗工吾君舊學如周保傳如漢老更輟從清禁之班卑豫中權之寄自其分閫曾未淹時五嶺衡山藜藿不採三江彭蠡舳艫相銜凡昔謂之盜區乃今歸於德寓粵若藩宣之衆矣誰如威望之巋然雖二老盍歸而此豈久居之地然一夔巳足則他皆不置之官矧如某者竊為稻梁濫分符竹方恐嘖言之未免豈期最課之巳聞竟因借勢之私輒備聯事之數自知甚審公論謂何與文子以同升詎敢衡陳於先進喜樂正而不寐諒惟辱在於諸生聊布謝悰他圖幸會交割謝沈安撫除目何因必有蒙成之故司存匪逺可無告至之儀况嘗試之尤難實講明之是賴蓄疑欲問請間可期某官年髙德邵實大聲宏老成典刑非喬木之謂故國師表言行乃砥柱之在中流正虛當寧之懷聊借上遊之重昔者髙宗之思舊學光武之訪故人恨不同朝與之分國如公聞望視古等夷方兩地之闕員必九重之深意某從遊最久聯事奚堪以乘障之未能而察州之豈易亡專對四方之具自視歉然惟元戎十乘之依願安承教交割謝張運判除目何因必有蒙成之故司存匪逺可無告至之儀况嘗試之尤難實講明之是賴蓄疑欲問請間可期某官特逹之資後雕之操績用莫詳於已試風流蓋接於前聞老成典刑非喬木之謂故國師表言行如砥柱之在中流方虛當寧之懷暫借外臺之重自其弭節曾不厭時五嶺衡山野無曠土三江彭蠡步有新船以當路之誰如宜他官之不置如某者依仁則可聯事奚堪雖驂乘以甚榮而面墻之加懼不能專對况詢謀爰度五善之難何以克終惟直諒多聞三益之助答郴州丁守治狀不如寵况先𬒳雖同功一體且不可以偏施況從事獨賢抑奈何而倒植有來謙問徒厚慚顔某官一代之英萬夫之望蓋大雅典刑之攸屬將中興勳業以為期定交學省之初聲華甚早出守邊城之上羈阻略同屬兹兩郡之雕然重以比年之歉甚動有契濶相為隱憂滿𥿄細書凡欲言之必盡泛舟相繼靡為惠之不周粵從魯衛以至今曾謂湖湘之得此遂令不敏亦苟無虞每也伎窮念安得廣漢以兼治胡然課最顧乃令雍齒之先封相公論之云何懷自知而甚審謂我宣勞而弗遜因人成事而無言雖則善鄰可想見貢公之喜至如將母亦嘗聞子厚之風積愧之多臨書罔既答道州趙守治狀不如寵光先𬒳揆之愚分豈無愧於積薪意者德鄰嘗有心於推轂粵來謙問益感衰悰某官大雅不群成功可紀本其素履有嗟兮麟趾之風試以專城殆管爾牛刀之戲期年於此績用誰如以頌聲載路之傳宜召節自天而下如某者學非適用才不逮中曷堪一障之乘徒藉餘波之及遂令不敏亦幸苟安鄶以下而無譏自知甚審鄭有功而見後公論云何尚期未替於邦交庶幾可明於使指會言伊邇屬望惟深與湖南范提刑仲藝宰旅不居過家蜀道師言未穆弭節湖隂夫人以引去為髙吾黨以留行為幸矧如聯事昔在從遊某官經明而行修宇定而光彂以中庸大學之旨究觀九流以國風雅頌之文奄有衆作周行斯久譽處誰如遍抽石室之藏分治天官之目上方鄉用胡自喜於懷章公固倦遊然重違於追璽永惟先正名滿天下亦越太史動合古人時則有若熙寧元祐之間位皆不過學士諌官之選惜者舉世至於渡江巋然門户之存籍甚弟兄之望猶未大用顧且遐征四方典獄之官於今不乏故國世臣之謂舍此安歸某空踈如初衰惰巳甚自别修門之後浸亡當世之交曽謂盍簪於焉乘傳惟無輔一毫之故人其謂何乃有來三益之期天實為此止齋先生文集卷之三十三
