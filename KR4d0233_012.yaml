  text: 止齊先生文集卷之十二
  hash: sha256:b6c37d4a4da75d8e3ff6b5eef25a4774328e51a098ebd58a7471d82b79660ab6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_012-1a}
body:
  text: 外制正議大夫守給事中兼侍講尤袤除禮部尚書兼侍讀四年正月十一除禮書三月二十日兼待讀二詞併行敕方朕在東宫時嘉與僚友切磋經誼緝熙光明肆以菲躬託于兆人之上克奉詒謀庶幾寡過永懷三益冝如之何具官某慱極群書折衷六藝凡與我言者於今不忘也憫勞瑣闥位之春官進讀路門以竟餘論昔者甘盤輔髙宗於舊勞之時而無與於中興納誨之選至漢二疏同傳太子而亦不在𥘉元酬功之詔我有故人始終典學視昔蓋有光焉爾其輔飬精神陳古以誡今惟母以謝事之年而有遐心則朕以懌可朝散郎試中書舍人兼皇子嘉王府翊善黃裳除給事中兼侍講四年正月十一日除給事三月二十一日兼侍講二詞併行敕朕有元子出就外傳敷求其人蓋纍年於此矣晚得三益聰敬日聞間嘗侍燕從容䏻道二南之化朕嘉其勞圖以自近具官某習先聖之術而於當世之務凡與吾兒切磋言之者皆實學也是用擢之瑣闥勸講路門冀發其藴并以告朕昔四皓調護太子而不屈於髙帝李泌以布衣交肅宗而不䏻安其身於君側爾以西州之彥出入宫邸為父言慈為子言孝是不謂之遭時乎尚其殫竭以報簡知可降授朝散郎許及之前任淮東轉運判官不覺察私錢降一官滿一期復朝請郎敕某官日者淮錢多姦禁不以道有受其咎者矣爾其以同過之仁而不言上亦從鐫秩非所謂吏議乎閲日既久冝還其𥘉可忠翊郎前韶州兵馬監押周升在任不法降成忠郎敕具官某爾為兵官而州家以佚纍囚來諗雖㑹恩不汝貸也其鐫一階以警慢事可文林郎階州將利縣令藺森改𥘉驗因傷身死人杜十四作凍餓身死失出犯公罪笞該赦取旨特降一資敕具官某吏與吾民親莫如令爾尚不知其冤死也而以為道殣曽謂與吾民親乎其鐫一階毋以恩免可保義郎李珙家遺火燒民屋四百餘間有司自來以屋直計贓坐罪得㫖宣諭依條聽贖臣僚上言特降一官敕具官某傳春秋者有人火之說則無所㱕咎之辝也爾下戒于火而禍及於閭巷將安咎乎尚爾闊略其上一官可故通直郎趙公廣昨知饒州因旱歉民流臣寮奏追兩宫勒停男彥倓訴冤特追復承議郎敕具官某左右諸大夫之言朕知其不如國人也爾守畨中遭歲不淑能有惻隱之實而不為文具而逹于朝聽者皆反繆言者不置麗于佚罰而爾既賫恨於地下今觀闔郡連編纍牘哭汝甚哀蓋棺論定莫公於此朕為憫然盡還舊官不但慰汝亦以勸耒者之勤民也可江西運副鄭汝諧奏奉議郎知袁州黃劭丁母憂不肯離任倍支棺櫬喪服官錢等候服闋日降一官不得與親民差遣敕具官某爾嘗將母以就二千石之飬垂及滿歲竟以喪㱕漕臣見劾侵紊郡計姑鐫一秩俾務省循尚蓋前愆朕豈終棄可承節郎時眙軍指使潘撫權淮河監渡不識降一官放罷敕具官某邊禁之嚴而弛於汝免官鐫秩以警後來邦憲有常非我佚罰可淮東運使趙師睪奏修武郎張世榮管押歲弊㳂路恣橫生事降兩官送吏部與合入差遣敕具官某發弊于邊事關逺聽紛譁不靖使者有言闊略弗懲人將是效其貶兩秩且屬銓曺庶使邊臣繼今知懼可湖北提刑張垓奏承議郎常德府通判趙善彥在任貪婪不法降一官放罷敕具官某部使者所治且有良二千石焉爾丞郡顧不以治行聞而速宫謗非朕所以奬用屬籍之意矣其貶一秩免所居官繼今有耻亦免汝棄可知成都府丘崈奏奉議郎知成都府郫縣郭公謨病昏乖謬降一官放罷敕具官某夫不䏻勝其任矣而昏於酒黷於貨然而郡太守猶以為嘗有鄉曲之譽不置于理鎸秩免官吾亦從薄罰焉其對隆寬益思懲艾可睿思殿祗候寄資武功大夫入內內侍省東頭供奉官王師圭轉㱕吏部差在京宫觀免奉朝請敕具官某自以諸司使改今寄祿官而內侍與戎行雜矣然而名不在銓曺之籍則猶非秩官是則異焉耳轉而屬銓斯為寵渥閔勞朝謁祿以真阿爾其敬哉毋曰序進可武功大夫祁州團練使入內內侍省副都知李彥正武功大夫明州觀察使入內內侍省押班楊舜卿職事不謹各降一官敕具官某等朕惟周制內宰掌王內之政令㑹其屬之功事而賞罰之今內宰不設而爾等不䖍于事實干宫中之罰其上一官應古經誼繼今有悛亦豈終奪可李彥正楊舜卿復敕具官某宥過無大况其細者乎爾以服勞不䖍嘗麗于罰蓋八柄所以馭過者閲曰滋久俾還舊官則豫恩茂矣其益埥共以圖報稱可入內內侍省副都知李彥正除入內內侍省都知入內內侍省押班楊舜卿除入內內侍省副都知敕具官某昔在周制內宰以中大夫為之而隸天官說者以為禁省之祕不冝屬外廷而夲朝爰創北司之長就擇明習靖共可以率屬者以董正之官最貴近亦不可不重其選矣爾自輩中進在四人之數曽未踰口䏻贊內治進之長官楊舜卿六進亞長官委寄彌重其益䖍匪懈以報殊渥毋使外廷謂汝不稱可親衛大夫清逺軍承宣使提舉佑神觀林憶年除入內內侍省押班敕自宣徽院之藉廢而北司之長蓋難其人朕既差擇之矣則參伍其間以弼內治非識風指謹憲度者皆不在此選也具官某服勞禁近見謂老成兹用命汝秩在四人之數欲俾其屬於內肅給於外靖共則爾責重矣盍亦思報稱者哉可皇兄故吳王府奉利州觀察使多才上遺表妻令人髙氏特封碩人敕具位某氏朕所以賁爾夫于幽瓖有加禮矣何愛于疏封爾使居往皆寵光焉以塞其悲可多才上遺表親弟二人比換南班訓武郎多藝修武郎多見並特授太子右監門率府率敕具官某等朕以諸衛處宗室子俾曰奉朝請非苟示私也以爾多才身後之請及其仲季惻然重違之而並命爾其務靖兵以稱德意可皇叔祖右千牛衛將軍不儳磨勘轉右監門衛大將軍敕具官某等朕者周官凡衛王宫者皆同姓也國朝簡宗英置之寰列之尹蓋循周制屬意深矣惟爾叔祖簡在衛中歷年彌長勞績兼茂進長禁闥職守益嚴欽哉無違以稱明陟可皇叔祖太子右監門率府率不廷特授千牛衛將軍敕具官某以階官易環衛率視其秩日者有司故貶損爾今徹朕聞始仍舊貫雖曰緒正亦以示恩其尚恪恭稱此密察可武功大夫權主管侍衛馬軍司公事張師顔落權字敕具官某朕以金陵形勢襟帶江淮輟吾騎衛布之屯所且以壯留鑰焉則統馭之才厥選艱矣爾以名將往訓群騶方當無事士馬飽逸觀者咸謂可以即戎􅒺懷武備於風駟鐡於雅軍攻或庶幾焉翳爾之力肆用命爾自攝為真班秩益崇寄任罙重其尚加懋以究爾功俾周秦之詩得以專美則豫汝嘉可皇叔祖武德郎主管台州崇道觀不詉特換右監門衛大將軍敕具官某朕考周官凡衛王官者皆同姓也國朝亦簡宗英置之環列之尹蓋循周制屬意深矣惟爾叔祖行尊德修今在選中應于經誼宜率典常作宋恭先有馮有翼則繄汝賴可昭憲皇后親姪孫杜士寶特𥙷承信郎敕某朕惟藝祖之子孫自吾夀皇篤叙之恩備矣而於母黨顧無世祿豈昌陵之意乎取之白丁授以右職爾其永懷無沗所自可右丞相葛邲𥘉拜贈三代封妻四年三月拜曽祖朝奉郎致仕贈太師諡清孝追封魏國公書思封魯國公敕朕覽周誥至命君牙為大司徒實冡宰是謂股肱而推夲乃祖世篤忠正之美蓋有感焉維今大臣相我孝治經文緯武海內晏然則亦惟其先德之休足以燾後可無褒崇以應經誼具官某故曽祖具官某躬行對于古人鄊譽髙於月旦方其筮仕亦既有聞而以其親掛冠再調管庫以此終身僅通閨籍法不應諡朝廷異焉易名清孝足以發明其人矣燕及曽孫爰司宰事則所以推本其美朕敢忘周道乎進封大邦莫如曲阜尚食其報永綏爾神可曾祖母魏國夫人侍其氏贈冀國夫人敕周之盛至於既醉極矣其卒章曰君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子言周之群臣皆有士行之女以為之妃使生子孫足以傳世蓋天意也具官某故曽祖母具位某氏作配君子行修於家覃及曾孫乃生耆哲考其世次亦足以知吾祖宗盛時天意攸屬而豈一日之積一門之私哉假使當周之世必從夫爵侑食五廟然則胙以大國秩之小君雖古未有亦可以義起禮矣可祖宣奉大夫顯謨閣待制致仕丹陽郡開國公贈大師諡文康追封楚國公勝仲封齊國公敕朕既本之六藝大啓土宇以宏賁葛氏之祧則嗣有令聞逮事兩朝申錫名邦亦禮之稱具官某故祖具官某服某家聲踐修纍世濟以力學連由三科然而名滿天下而位不過從班文字行於方來而身不䆒逺業惟是一經之教𬒳于聞孫蔚為名臣間我兩社則劬躬之報可無異恩維此管丘太公舊宅是用即命以為新封對我寵靈以昌爾祚可祖母楚國夫人張氏贈夏國夫人敕朕方廣念祖烈匹休於周假以溢我而收得賢之福則所以尊大其家以答天貺豈顧有所愛哉具官某故祖母具位某氏夙以懿行來嬪名家儀于前人以詔婦子亦既再世燁然有聞而未艾之祥施于今相詩不云乎蓻之榛粟椅桐梓􅃮爰伐琴瑟種德彌逺歷年彌長豈必皆身親見之乎報本酬勞式至今日大邦美號以慰永懷非以為生蓋禮之稱可父朝議大夫致仕贈太師許國公立方封越國公敕王室百年之間公侯將相故家希不失者有以文墨論議綿及三葉是謂世臣固朕之所寵嘉矧豫宗工尊為禰廟者乎具官某故父具官某襟度粹然聲華藉甚父未脫藁往往誦之一時英遊莫敢輩行紹興之季歸為從臣蓋其行藏皆可蹤跡用而不盡士論惜焉冝集善聲發于賢嗣凡所著見孰非典刑爰侈舊封建邦於越以厚教忠之報以伸追逺之懷可母雍國夫人樊氏贈陳國夫人敕為吾股肱之臣則上自三世皆褒大之而况於其母乎御不及百兩養不及萬鍾也而無以慰滿其罔極之恩亦何以責移忠之報哉具官某故母具位某氏承休襲美發育自躬恩斯勤斯鞠我良弼雖及晏歲逮事舅姑旦莫敬共至忘櫛頮是足以成其子之令德矣改疏上國之封以世世配于祢廟而今而後庶幾吾大臣之不廢藜莪也可故妻蜀郡夫人沈氏贈成國夫人勑夫人起家以致爵位風人懼焉乃若克相夫子至於登庸嘗與之同隱憂矣而不同休顯此則又禮經之所悼嗟也具官某故妻具位某氏女德配於珩璜婦功著於蘋藻胡不偕老以須美成朕惟吾相祼於祔姑之室而副笄之服弗𬒳翟芾之車弗乘也非有追寵何以慰之乃闢新封以賁幽穸可妻魯郡夫人王氏封信國夫人勑永惟二南大夫勞於王事而勉之以正勸之以義者皆其家室也矧吾輔臣孤立一意佐佑乃辟是不曰警戒相成之助歟具官某妻具位某氏自繼元配德音不瑕既有芳殽進卑祖妣亦有雜佩施及朋似佐我名臣迄登三事闕譽日廣績用日崇則與夫汝水之墳南山之側遭世不淑動心忍性者可同年而語乎冠於命婦為君夫人我有茂恩宜不汝吝可知樞密院事胡晋臣初除贈三代封妻四年三月除曽祖贈太子太保修巳贈少保勑昔周宣中興將相皆天下之選矣爰命皇父以整六師而推本所以實南仲大祖之後爰作常武之詩朕甚慕焉維今本兵得我碩輔則其宗祧可無褒崇以應經誼具官某故曾祖具官某躬行對于古人德譽髙於輩行而懷道不試士論惜之夫屈於名者享其實不發乎其身者遺其後是宜燕及曽孫蔚為名臣久陪國論晋長樞庭則追録其積行之勤增華其種德之報朕敢忘常武之詩乎升班亜保以寧其神非以為生蓋禮之稱可曽祖母濟陽郡夫人黃氏贈崇國夫人東來郡夫人人張氏贈安南國夫人敕周之盛至於既醉極矣其卒章曰君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子言周之群臣皆有士行之女以為之妃使生子孫足以傳世蓋天意也具官某故曽祖母具位某氏作配君子行修于家覃及曽孫乃生耆哲考其世次亦足以知吾祖宗盛時天意攸屬而豈一日之積一門之私哉假使當周之世必從夫爵侑食五廟然則胙以大國秩之小君雖古未有可以義起禮矣可祖贈太子太傳燮贈少傳敕朕既本之六藝不愛髙爵以崇報胡氏之祧則嗣有令德休于後昆並命為孤亦禮之稱具官某故祖具官某當天下之清得幽人之履世無孝廉之科而不偕於計吏居無朝市之交而不聞於上國天命弗僣為之生孫蚤為聞人遂專樞管是不謂之劬躬燾後者乎申錫命書班于次傳豈唯發潜亦勸來者可祖母平原郡夫人王氏贈永國夫人敕朕方寅念祖烈匹休於周假以溢我而收得賢之福則所以尊大其家以答天貺豈顧有所愛哉具官某故祖母具位某氏夙以懿行來嬪名家儀于前人以詔婦子爰集慶善施于聞孫詩不云乎藝之榛栗椅桐梓漆爰伐琴瑟種德彌逺歷年彌長豈必皆身親見之乎報本酬勞式至今日大邦美號於禮為冝可父奉議郎致仕贈太子太師宗贈少師敕自蜀平至今二百餘年蓋西土無遺賢矣而尚有潜德三世不逢詩不云乎何其久也必有以也具官某故父具官某行著而晦於名才豐而嗇于位乾道之際有子燁然諸老先生見謂公輔吾夀皇駸駸嚮用矣而方考槃阿間永矢弗諼不以鼎來之養而易燕居之福匪棘其欲卒為帝師殆所謂有道者乎然而生則遂循墻之志沒則極告第之榮吾於大臣之親亦質之詩書無愧矣可母通義郡夫人鮮于氏贈信國夫人和政郡夫人蘇氏贈和國夫人文安郡夫人王氏贈惠國夫人敕為吾大臣則上自三世皆寵嘉之而况於其母乎御不及百兩養不及萬鍾也而無以慰滿其罔極之恩亦何以責移忠之報哉具官某故母具位某氏承休襲美發育自躬恩斯勤斯鞠我良弼蓋副笄之飾翟茀之華一朝酬之不以為泰朕惟樞輔怵然永懷是用疏以上國之封以世世配於禰廟而今而後庶幾吾大臣之不廢􅖋莪也可妻大寧郡夫人康氏封安定郡夫人敕永惟二南大夫勞於王事而勉之以正勸之以義者皆其室家也矧吾輔臣孤立一意佐佑乃辟是不曰警戒相成之助歟且官某妻具位某氏酒醪之所羞雜佩之所贈皆天下賢傑也爰相夫子至於登庸經文緯武績用甚茂則與夫汝木之墳南山之側遭世不淑動心忍性者可同年而語乎冠於命婦為君夫人我有異恩冝不汝吝可迪功郎祕書省正字蔡幼學該修進至尊夀皇聖帝㑹要轉一官敕具官某載筆東觀迄于成書序進一階可謂德賞益修鉛槧以昌爾文二典三謨亦其選也可忠訓郎武學博士李興時知融州七月十二日敕具官某簡在右學諸生咸曰賢哉吾博士也滿歲冝遷官而自詭治民將以其淑人者施之行事融在嶺表嘗建旄鉞而荆湖之與鄰視旁郡為善地爰以付汝是謂異數尚其懋哉以踐爾言可髙文虎除將作監丞敕具官某朕旁招俊彥布列周行德進言揚如恐不及矧子大史氏之舊引疾居家十有四年昔病今愈子環可後乎爾博學篤志承伯父之傳網羅舊聞述史遷之緒採之公論僉曰汝賢再轉為丞尚居繕監職務清簡可以卒汗青之業毋以匠為嫌也可武學諭范仲壬除武學博士修武郎黃褎然除武學諭並七月二十一日敕具官某等國家設武科以取士有周道焉所以貫革之射息說劒搢笏冕衣裳在西學則皆俊遊也矧若爾仲壬爾褎然人所亟稱者乎分以橫經之席從以滿戶之屨雖甚寵異豈曰不冝可止齊先生文集卷之十二
