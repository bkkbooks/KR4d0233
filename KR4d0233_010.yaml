front:
  text: 止齋先生文集卷之十
  hash: sha256:205a06238f2005ba5f557e14894353ed93c7ec8d1ad106e7a94cb755d989ba50
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_010-1a}
body:
  text: 內制慶元改元詔勑門下朕以眇身託于兆人之上惟曰兢兢懼無以紹列聖之休而對揚上皇之慈訓也永惟當今之務何者為急非欲百官修輔而民力𥙿歟夫親君子逺小人慶曆元祐之所以尊朝廷也省刑罰薄稅斂慶曆元祐之所以惠天下也是彛是訓歷年彌長肆于中興舉偏輔敝皆於此乎取法克至今日中外乂寧朕幸蒙遺業繩祖武而敢一日忘此乎掇取美號於紀元詩云不愆不忘率由舊章蓋庶幾周成焉其以明年為慶元元年故兹詔示想宜知悉哲文神武成孝皇帝梓宫啓攢塗奏告祝文伏以兩楹啓殯六引徂東欲仍几之神以即因山之吉敢先虔告用兾安行尚享啓攢畢梓宫還殿皇帝行祭奠禮祝文伏以厭世上賔終天永歎撤攢塗而即吉罄薄海以攀號酹奠雖虔曕言何及尚饗發引前一日𥘉更總護使行夜祭祀祝文伏以三年之制念在終喪七月有期忍當明發共修祭事曷究哀悰尚饗前引前期祭告錢塘錢清江龍神祝文伏以於昭烈祖將祔思陵方六紼之問津維大川之借助用伸忱請尚兾明聽尚饗發引遷奠祝文伏以仰止龍輴臨于丘隧方少須於筮日庶永妥於賔天昭告何云哀摧罔極尚嚮掩攢前一日奏告昭慈聖獻皇后徽宗皇帝顯恭皇后顯肅皇后顯仁皇后髙宗皇帝憲節皇后攢宫祝文伏以思皇烈祖往祔諸陵當復土之及期願在天之垂祐不震不竦以永萬世之藏耒燕來寧如同一堂之上尚饗掩攢祝文伏以遣車攸屇復土維新竟藏橋冢之衣冠莫覩堯天之雲日永懷弗及隕越何勝尚饗九虞祭祝文九一虞伏以稽山仰止想祖烈之攸宣清廟肅如悵神遊之未祔於兹易奠何以勝哀尚饗二虞伏以廞衣安在曷堪丹旐之思虞几是憑尚系羔墻之念道周之薦海內如摧尚饗三虞伏以亘古永違貽孫謀之如在自今始吉嗟孺慕之何窮三薦既陳長號罔措尚饗四虞伏以信信宿宿暫妥於神棲子子孫孫永懷于祖武方舟而濟有淚如傾尚饗五虞伏以維堯傳舜俄同閟於衣冠自越入吳乃獨還于翣衛望如弗及哀曷能勝尚饗六虞伏以念兹皇祖忍當昌歜之陳瞻彼昊天痛極胡髯之逝恭迎仗衛疑對音客尚饗七虞伏以濤江限斷嘗攝事于攸司郊次森嚴方飾躬于斯薦拔依永巳慟哭何云尚饗八虞伏以顧瞻橋家巳深萬古之藏想像袗衣尚御重華之舊反虞將畢追慕罙新尚饗九虞伏以百神受職來奉於主車三后在天行升于祖廟哀哉永訣忍此終虞尚饗掩攢畢謝土神祝文伏以於皇烈祖來祔思陵允惟百神襄此大事敢忘答貺更冀明聰呵護之虔永永無斁尚饗安南國王李龍翰加恩制敕門下朕宣室受釐言念梯航之逺揚廷孚號載疏綸綍之恩以昭烈祖之宏摹以篤價藩之丕祉推誠順化秉信守義奉國履常懷德謹度思忠功臣特進檢校太尉充靜海軍節度觀察處置等使兼御史大夫上柱國安南國王食邑一萬户食實封三千八百户李龍翰恪勤厥服紹美于前克提千里之封勿替纍朝之好霜露所墜固同洽於至仁滄海不波蓋良繇于多助維時嗣服有事合宮亦遐想於彌恭莫共陪於肇祀駿奔在廟雖阻修黼哻之儀旅實充庭嘗與備蕭茅之享肆昐新渥爰廣舊封裒載藉之名言侈元勳之顯號于戲閔豫訪落疇在公助祭之勞嘉乃象賢謹與國咸休之度於焉申錫其尚欽承可依前特進檢校太尉充靜海軍節度觀察處置等使兼御史大夫上柱國安南國王加食邑一千户食實封四百仍加濟美功臣散官勳如故主者施行賜徽猷閣學士太中大夫知襄陽府張抣辭免改差知建康府恩命乞在外宫觀不允詔敕具官某省所上表辭免恩命事具悉爾獨不聞故國世臣之説乎而來諗疾也夫保墳墓孰與成先正之美休祠館孰與圖纍朝之報智者當有所擇矣式遄其驅毋事多遜所辝冝不允賜文武百寮宰臣趙汝愚等上表請皇帝還內不允批答省表具之朕遭家多難凛乎懼不足以當大事賴天之靈宗廟之祐乃者壬寅獲與同軌祔烈祖於思陵而遣車徂東虞主未返仰止稽山明發不寐皇皇望望未知所為也公卿百辟其何以慰朕而欲徇故常之請還廣內乎方將稟命于上皇以供養仍九虞侍兩宫為事所請宜不允賜趙汝愚等再上表請皇帝還內冝允批答省表具之夫會朝之囂歡非所以示下宿衛之暴露非所以持久朕豈不熟慮此歟但以任姒之養未忍違離阜陵復土盍亦宿留是用却前請而勿聽也今承命三宫皆曰不可百辟卿士又懇懇以為言朕惟捨獨見以從衆允徇大權而勝私誼自古后王鮮不由此顧如沖人其敢咈親尊之意抑臣庶而弗省乎所請冝允止齋先生文集卷之十
