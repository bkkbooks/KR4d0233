  text: 止齋先生文集卷之十一
  hash: sha256:91a257451a296fed319dd1c13c1e67414f40e5b9bf4ae2bce76bd9a1773e7686
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_011-1a}
body:
  text: 外制自紹熈四年正月以後皇后歸謁家廟親姪忠訓郎閣門宣賛舎人幹辦軍頭司李孝純武經郎帶御噐械幹辦皇城司李孝友各特轉右武郎敕具官某等朕惟古后妃有求賢審官之志而不私謁而人主則特隆扵肺腑之親夫惟后妃彌遜人主彌恩斯可觀巳日者吾后省家廟爾某皆以猶子祗服厥事朕何愛一横行郎而不以寵汝惟無忝爾祖以長守冨貴則予汝嘉可皇后親姉故任武節郎閣門宣賛舎人致仕霍漢臣妻平凉郡夫人李氏封成國夫人故任武經郎致仕馬煥妻安化郡夫人李氏封信國夫人忠訓郎士廉妻彭原郡夫人李氏封崇國夫人敕朕惟古后妃有求賢審官之志而不私謁而人主特隆於肺腑之親夫唯后妃彌遜人主彌恩斯可觀巳具位某氏夙以㳤恵友于坤儀日者翟車還省家廟越来相事禮無違者其益湯沐視君夫人尚服寵榮以綏夀祉可皇后親姪孫承節郎李瑜李粲各轉兩官敕具官某等日者吾后還省家廟朕循故事推恩后族自尊及卑罔或遺者尔以幸㑹爰進二階豈不榮哉尚務靖共以綏爾祉可皇后親姪婦故忠訓郎贈文州刺史李斌妻安人潘氏右武郎帶御噐械幹辦皇城司李孝友妻安人趙氏親姪女通直郎充點檢贍軍激賞酒庫所幹辦公事韓松妻安人李氏並特封恭人親姪孫孫女右武郎帶御噐械幹辦皇城司李孝友女孺人李氏特封安人敕具位某氏朕惟古后妃有求賢審官之志而不私謁而人主則特隆於肺腑之親夫惟后妃彌遜人主彌恩斯可觀已日者吾后省家廟爾以猶子實来相禮朕嘉與之用益汝封尚服寵榮以無違我齊家之化可皇后親姪女夫通直郎充點檢贍軍激賞酒庫所幹辦公事韓松特轉一官敕具官某日者吾后還省家廟朕循故事且酌有司之議推恩后黨而爾来自勲閥雅有能稱眷在甥舘亦與幸㑹至於増秩豈不榮哉尚務靖共以綏爾禄皇后親姪女之子從事郎韓大用大任各循兩資敕具官某朕惟古后妃有求賢審官之志而不私謁而人主則特隆於肺腑之親夫惟后妃彌遜人主彌恩斯可觀巳日者吾后省家廟爾等迺以諸甥亦與幸㑹例進兩階豈不榮哉尚服寵章無忘忠報可皇后親屬進武校尉韓大有将轉承信郎敕具官某日者吾后還省家廟朕循故事且酌有司之議推恩后黨而爾以諸甥亦與幸㑹例進一階豈不榮哉尚服寵章無忘忠報可皇后閤提舉官武功大夫帶御噐械楊舜卿轉觀察使敕具官某等方用盛時后妃永懐賢士大夫僕馬俱病而不敢私謁於上徒欲為觴酒勞苦之而竟不可得慨嘆而巳尔服劳宫閫迺以吾后有事家廟之恩至将廉車豈不榮哉而槩之周人何其幸也尚服寵章無忘忠報可皇后幹辦宅從義郎張友直忠訓郎沈直各特轉一官敕具官某等朕酌有司之議推恩后族而及其私人爾等適與幸㑹各進一階其尚恪恭母替爾事可随龍脩武郎閤門祇候兼皇后閤主管進奉袁佐額内翰林醫官太醫局教授王良佐成安郎陳翊額内翰林醫官郭儀忠訓郎幹辦人船伊昱忠訓郎主𬋩文字傅昌時忠訓郎掌牋奏劉玘忠翊郎主管進奉周良臣成忠郎掌牋奏黄允文随龍成忠郎浙西安撫司准備将領主管進奉趙友信成忠郎私名掌牋奏吴衍保義郎王寜費師旦承信郎陳琪承信郎轉運司准備差使王演承信郎魏嘉言承節郎薛拱承節郎幹辦人船李祓進武校尉私名掌牋李大受該遇皇后歸謁家廟並特轉一官敕具官某等日者吾后還省家廟朕循故事且酌有司之議推恩后黨而及其私人爾等各以幸㑹至於增秩豈不榮哉尚務肅給毋怠其事可秉義郎韓侂胃特授閤門舎人敕具官某朕永惟舊相有勲勞於我家而其裔孫或䝉戚里之澤越在右階無以著見唯是試之後省以發其文官之上閤以華其選尚庶㡬焉爾其懋哉用俟眀陟可皇伯太師嗣秀王伯圭合得冠帔一十五道並特換封孺人賜親属内欲将一名與故妻秦國夫人妺宋氏封孺人敕某氏古者醻勲賢之劳則及其私人况所尊敬自吾夀皇以兄禮之者乎况其君夫人父之同産子乎以其貤恩爵為命婦雖過扵恵朕何愛焉可閤門宣賛舍人㳺恭特授武徳郎落閤職權發遣臨安府兵馬鈴轄敕具官某爾男爵也習於階兼之儀而不閑軍族之事非設官之意矣第其乆勞優以増秩試移賔政徃治戎韜其務赴功以湏噐使可起復武功大夫文州刺史興元府駐劄御前右軍統制兼知鳳州郭諝特轉復州團練使令再任敕具官某朕以禁旅扞邊而擇将以撫馭之閱歲云乆西顧晏然方眷其勞就進戎團之峻尚難其代故遲瓜戍之更爾其茂對新恩踐修舊績式嚴戎律兼緝郡條朕不汝忘将有明陟可皇兄沂州防禦使權王奉吴王祭祀多才磨勘轉明州觀察使敕朕崇長宗支以綿帝繫髙爵厚祿冝與共之而猶計歲課勞循次而進所以昭至公謹成憲也具官某信厚以爲質靖共以自将入不恃家人之恩而出無違於闕庭之禮况以尊屬于今㡬人則徑陟廉車誰曰不可而必中有司之度積十年然後進之豈朕有所愛哉然而身無吏事之責秩比法從之崇其視匪躬盡瘁沒齒下僚者又何其幸也冝對殊渥無忝所生可武功大夫和州防禦使權知閤門事兼客省四方舘事韓侂胄特與落階官臣寮繳奏特與轉行右武大夫敕嘉祐治平之間爾先正可謂社稷臣矣肆列聖寵嘉之施及子孫簡在戚里於焉尚主於焉納后凢可以熾韓氏之門者無愛也具官某蚤以才稱荐膺噐使庀職上閤宣勞累年唯彼横行賞典所吝獨以命汝庸示殊恩一以懽慈福之心一以大忠獻之後盡亦自勉庶穆羣言可武功大夫集慶軍承宣使入内内侍省副都知張安仁除入内内侍省都知武功大夫祁州團練使入内内侍省押班李彦正除入内内侍省副都知敕具官某朕甞稽之周制内宰隷於天官夫古道誠未易復也至於建隆舊章尚有宣徽院之籍今亦廢矣而別為北司則為之長者顧不當謹擇其人乎是用命爾以肅禁中盖親近之乆識察之詳矣其益靖共以身幸屬母使外廷謂汝不稱可武功大夫和州防禦使帶御噐械于惟脩武功大夫明州觀察使帶御噐械楊舜卿並除入内内侍省押班敕具官某自宣徽院之籍廢而北司之長盖難其人朕既差擇之矣則參伍其間以相内治茍不有以自異於輩行而識風指謹憲度者皆不在此選巳然則爾名在四人之數盍亦思報稱者哉可張祐正係随龍祗應勤勞特𥙷承信郎敕某日第攀附之勞而偶遺汝盖累年于此矣爰詔有司授之𥘉官以見朕懐不忘疇昔可武節郎御前祗應鄭孝友應奉有勞特轉一官敕具官某服勞左右雖無顯庸閱日進官亦國之舊可殿前指揮使左班年代上名劉成等十五人授脩武郎許元等三人授訓武郎御龍直上名方正等三人授忠訓郎殿前指揮使左右班守闕行門蔣榮十三人授從義郎東第一班上名婁勝等四人授承節郎散直上名孟端等七人授承信郎敕某等饗衞士而遣之古也而命以官則彌恩矣徃祗吏職毋替忠勞可皇弟右監門衞大将軍復州團練使多助皇弟右監門衛大将軍成州團練使多能實及一十年並該磨勘轉防禦使敕具官某等朕崇長宗支以綿帝繫而猶計歲課勞循次而進所以昭至公謹成憲也以爾靖共簡在近屬眷焉増秩誰曰不冝而須暇十年以中有司之度豈顧有所愛哉以此風厲則為士者勸矣可入内内侍省東頭供奉官䧏授寄資武功大夫遥郡刺史霍汝翼轉歸吏部除帶丨御噐械敕具官某自以諸司使改今寄祿官而内侍與戎行雜矣然而名不在銓曺之籍則猶非秩官是則異焉耳轉而属銓斯爲寵渥爾其敬哉母曰序進可招箭班殿侍訾彦澤在班及十五年𥙷承節郎仍舊存留在班祗應敕具官某方罷遣衛士而次第官使之爾以藝成令祗舊次冝益矜舊以湏後思可瀘州軍變守臣張孝芳𬒳害特贈三官與兩子恩澤敕具官朕觀春秋書盗殺某人夫謂之盗則非死者之罪矣蓋喟然歎曰士大夫或死於不幸而無所歸咎者焉則其所遭之變非必有以取之此仁君之所務白也國家閑暇士馬飽逸受命分閫尊重難危而爾曽無咎端獨罹不測之禍夷攷其治皆率故常則盗起帳下非春秋之所不罪者歟雖然世無叛兵乆矣庸人爲将髙枕有餘爾以名流頋至於此恤典之隆豈但汝哀亦以使繼今者之知懼焉可瀘州𬒳害官兵故節度推官杜羙贈兩資與一子下州文學故忠訓郎瀘州駐泊兵馬監押安彦斌贈三官與一子承信郎故下班祗應潼州府鈐轄司指使雷世忠贈承信郎敕具官某等苟䏻効死於其長上皆忠孝之徒也瀘盗之興爾等義不顧身各死於帥恤典之厚朕豈有所愛哉可儒林郎前瀘州安撫司幹官郭仲傅失覺察本􅈦虞候張信為亂首亂作復與賊宴飲相為賔主特䧏三資放罷敕具官某帥死于亂卒而爾為屬顧欲以卑讇自全可乎削之三階尚用中典繼今有耻亦豈汝棄可太史局測驗渾儀刻漏所學生周奕特𥙷挈壺正敕某今官類非古稱謂而挈壺氏見扵周官爾以諸生馴致於此亦冝知所職矣可脩武郎閤門㸔班祗候霍寛夫供職實及二年與落㸔班二字敕具官某課其年勞正其名稱非徒以叙遷也由是而釋煩辱之事則冝知自貴重矣可部侍郎傀思訪脩至尊夀皇聖帝聖政特轉一官敕昔者仲尼序書斷自二典以為堯舜揖遜之羙後世弗可及矣矧惟我家父作子述不待倦勤親相授受盖視帝者有光焉則聖政之作豈不足以匹休虞書哉具官某以折衷六藝之學發明心傳以同風三代之文揚厲治効作宋一藝垂之無竆及此奏篇朕為之序日上慈扆夀皇嘉焉藉使仲尼在冝如何表異之而有司以故事第賞爰進一官此朕之所甚不愛也可祕書省著作郎黄由沈有開著作佐郎李唐卿王容太常丞兼國史日暦所編類聖政檢討官章頴将作少監黄艾並該脩進至尊夀皇聖帝聖政内黄艾係經脩不經進各特轉一官敕具官某等昔者仲尼序書断自二典以為尭舜揖遜之羙後世弗可及矣矧惟我家父作子𫐠不待倦勤親相授受盖視帝者有光焉則聖政之作豈不足以匹休虞書哉爾等各以名儒載筆東觀作宋一藝垂之無竆及此奏篇朕為之序日上慈扆夀皇嘉焉藉使仲尼在冝如何表異之而有司以故事第賞爰進一官此朕之所甚不愛也可承信郎監潭州南嶽廟徐靖忠訓郎祕書省書庫官盛端友訓武郎監祕書省門梁周弼翊郎趙章該進至尊夀皇聖帝聖政各轉一官敕具官某皆賞典也而他以待煩辱之勞至以隷書局進官則稍寵矣爾尚勉思無忘忠報可武功大夫䧏授昌州刺史帶御噐械霍汝翼該進至尊夀皇聖帝聖政特轉成州團練使敕具官某鈆槧之勞繄學士大夫力也而無人乎其間則安䏻関乙夜之覧今也奏牘来上俞音不遲慈庭有懌册府改觀是誰之助歟則以爾靖恭實與執事通逹中外其勞實多夫以文字得官皆徳賞也進之遥刺孰曰不可其尚勉思以稱殊渥可宗正少卿鄭汝諧奉使囬侍轉一官敕具官某爾以老師宿儒衘命萬里脩隣好扵北庭縉紳徃徃憫勞汝矣朕觀春秋使騁之際楚人欲傲晋叔向以其所不知而不能晋人亦曰鄭子産愽物君子也而皆異其禮有以大國而㣲老師宿儒專對四方非所以令逺人見也迨兹歸報亶焉無闕而書勞進秩但循故事豈朕所以相勞苦之意哉爾其少休嗣有寵数可閤門舎人兼皇子嘉王府内知客譙令雍奉使囬特轉一官敕具官某擯上閤之儀聮朱邸之事皆華選也爾以趣操文藻至於共二可謂吾親臣矣是用命爾介于膚使衘命萬里脩歲聘於北庭迨兹歸報亶焉無闕則朕所以相勞苦之意何但循故事增秩哉有它掄用朕不汝忘可奉使親属一員淮東安撫司幹辦公事譙令憲准備差遣一員新監明州贍軍酒庫黄仁𥙿書状官一員新明州昌國縣主簿楊正臣指使将仕郎葉時中将仕郎鄭如等囬桯各轉一官敕具官某等凡出疆者有賞所以勞苦之也爾隷使事與於驅馳迨兹㱕報書勞進秩蓋國舊章朕豈汝吝可閤門宣賛舎人宋克俊夏允言閤門祗候蔡唐卿来䖏恭並該應舉人使十次賞各轉一官敕具官某等賛儀上閤䏻與聘客周旋十不失一亦旣勞矣課効增秩盖國舊章尚益靖共以湏噐使可浙江潮神順濟廟善利侯祈禱感應特加忠靖二字敕某神朕固不為祕祠專鄊其福也至四方長吏有為吾民請曰某山川之神能惠其境中則褒崇之典朕靡愛焉以庶㡬古蜡百神之義矧惟濤江近在寰内而有司以報禮未稱将侈大之用錫羙名以從民欲神尚終恵使世世享可袁州仰山神特加父母妃施子婦封號敕某神等朕固不為祕祠專郷其福也至四方長吏有為吾民請曰某山川之神能惠其境中則褒崇之典朕靡愛焉以庶㡬古蜡百神之義惟仰山之神禮以王祀而自江以西猶未慰滿是用推本父母施及子婦或隆品秩或衍稱號朕所以寵嘉神貺以從民欲者如何哉尚終恵之俾世世享可知平江府沈楑奏五龍靈濟廟乞加封第一位龍王封東靈侯第二位龍王封西侠第三位龍王封中侯第四位龍王封南平侯第五位龍王北寕侯敕某神等朕雖不令祠宫祝釐專鄊獨羙至四方長吏有為吾民請曰某山川之神能恵於其方則褒崇之典朕靡愛焉以庶㡬古蜡百神之義矧惟五龍以時節雨暘功著近甸雖良二千石雅不言機祥而具道所以然之故文詞爛焉爰錫命書秩以候爵則所以寵嘉神貺以從民欲者何如哉尚終恵之俾世世享可懐安軍金堂縣進士黎崇禮年一百三歲遇大禮恩特𥙷迪功郎致仕敕某昔在元祐合祭于圜丘之歲而汝以生於今五朝矣朕方奉觴兩宫為萬歲夀迺如髙年甚心羡之爰因郊賚登諸仕版以見吾貴老近親之意且以教天下之孝也可翰林醫愈充重華宫擺鋪軍兵醫治兼臨安府駐泊㸔醫邢守中到官及二年轉額外翰林醫痊敕具官某天官之属六十而醫命士二十有八人周家之重醫也如此再歲無失爰進一宮此又吾家法也徃服明恩毋怠爾事可止齋先生文集卷之十􅅀
