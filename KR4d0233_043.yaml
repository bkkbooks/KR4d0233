  text: 止齊先生文集卷之四十三
  hash: sha256:ce899d90fe09ae4b9002b76b0612212333777703714c1b42b5f62425fc949c24
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_043-1a}
body:
  text: 策問十四首問以文詞取士而病其不以實學應科難矣唐之科目繁密巳甚然兼采譽望不専决於一日之藝猶少近古國朝雖視唐制加詳而祖宗盛時蓋有自潘邸熟聞其人巳乃定為進士第一而大名舉子尚以德行自相推先國子監嘗遺進士有司尋復懷賦上殿詔特取試禮部蓋有唐之遺風焉賢公卿大夫率於是乎得之粵自一切任法而槩以繩尺之文雖有茂材異等語不中程輒弗第録繇是場屋始以綴緝揉熟淫靡之文相師而士氣日卑議者病之逮以時務發䇿以求實學要之不離於文詞胡能相逺周漢之制誠不可卒復伊欲尋祖宗之美稍寬學校貢舉之法以漸復唐舊冝不甚難施行而難者咸曰世益薄人益不足信將以私意撓公道不備法而後可夫自鄉貢不得以待闕官考試日者銓選又增委保之員而國之貴遊子弟將置別頭若是亦巳察矣於今士風何所損益諸君其各誦所聞焉問議臣以太學𥙷諸生羣試者動以萬計故改制以約之以天下間歲舉子之數百取三焉謂之待𥙷蓋其嚴如此而邇臣之請乃欲博訪勳賢之後淪於編户者皆得附試胄監如國子生夫均之為士也禁其為舉子者而開其為國子者何哉且禁其為舉子者固曰將以抑競進也以今閩浙諸郡誠不可不抑然往歲邉郡復言二廣之士率二十餘年赴春官者纍數千人而上第者不能以十數方欲尋漢故事以户口率别路以考之以示優異夫均之為舉子也既仰內郡復於外郡加優焉何哉開其為國子者固曰將以勸世族也欲其知學誠不可不勸然近制自在京釐務官不得以緦麻親附監試甚者雖公卿大臣去國逾月則子弟不得𥙷國子生夫均之為國子也在於昔寬之而今者顧吝嗇又何哉上方嘉與㝢內之士共成治功而有司選舉之說不勝異意且均一之政何所彼此苟無旌别必且猥并二者之論未知折衷諸君其切瑳䆒之庶有合焉問漢兵制皆秦制也自遷固諸史云爾夫漁陽之事秦效亦可覩矣而終漢無驕卒之患何歟將隄防之禁特密歟田家子至不識尺籍五符而發諸侯兵或有非虎符驗者其隄防果有以過乎秦否也或者繇戍之法簡以便歟以淮南地逺往來中都者甚苦西北邉郡五尺以上不得休息吾未見其蕳且便乃若是然也不然則餽餉足而賞賚之優歟塞卒之糧戰士無祿上功幕府輒見繩於文吏蓋當時巳病之矣又不然則士安於將素有以撫循之歟觀漢諸將大抵臨事輒置不聞其兵久隸焉者也抑有甚惑焉宰相之子不免戍邉而故二千石將軍都尉猶給軍賦亦甚士等矣而士大夫不以觖望又何也積是數者非制之得然則果秦制也而成敗異變豈獨幸然耶不惟士然凡漢置將奪之軍可也廢之可也纍功不封可也甚者誅放而卒莫敢握兵於境負固以要上何因而得此不惟邉將自京師南北軍詣城門兵屯一時典領位尊寵渥幾震主之威而亟拜亟罷無一人愠惠裴回而吝權者又何道以馭之歟蓋聞光武之興罷都隸升尉職削功臣之權而省材官騎士不置所以為兵慮詳矣東都顧竟以兵斃無乃闊略者善而二者拙耶方今養兵甚厚而屢驕將帥無顯功往往冨貴極矣而意不滿上恩視漢有加焉而無其報厥咎安在願與諸君啇漢氏之得失而悉數之以推見其明效據古馭今將於是乎取焉問漢理財稱蕭相國而史佚其事夫巴蜀之饒武帝用之西南夷矣悉租賦不足以更費至以都內錢續之均巴蜀也而相國以餉東郡數年無乏事關輔流民往往就食其中其計果安出歟然尚有可解者曰武帝逺輸耗耳諸葛武侯又用之關隴出師曽不過武功木牛流馬之智工矣而轉輸輒不繼夫以相國視武侯未能逺過而武侯乃若此其缺安在方漢𥘉定大啓九國居天下太半各擅其賦天子所自有僅十五郡列侯公主頗邑其中自山澤之租各自為私奉養外才十五䅋一耳而治宫室建城闕講朝儀調兵山東無虛歲迄無經費之慮武宣以來諸侯之地亡慮多削入漢一日省酎奪侯者百餘國大者至三四萬户賦入視曩時絶逺甚而用力益勞征算日益繁亦必有故矣元狩元封之間天下蓋多事矣始元以來號稱富實宣帝蓋英主也一時司農又善為計而西羌之役大司農錢輒不贍於用甚者請糴邉榖百萬斛不能具何直若是廪廪也方今版圖西奄岷冡巴蜀之饒自若也北界淮濵嶓漢之陽東薄于海南亘畨禺所謂九國之略又十有六七恭惟祖宗盛時關河三邉宿兵逮五六十萬大抵倚辦東南為多今戍邉之衆與河陜而東南所入視舊增羡計臣顧以日月為憂蓋嘗推漢之所以嬴縮而不得其故且於今重有惑焉願悉陳之如欲曰得蕭相國者而後可又似迂闊不切於事情者矣問風俗與世汙隆其所由來蓋非歲月之故矣周漢之季可謂俗弊漢興經營四方日不暇給其教化未甚明其學校未甚興其公卿大臣多出戎行而學士經生相與講明者尚缺如也秦氏餘習矌然丕變髙者光明碩大可以任重其次亦篤厚忠實蒸蒸不至於姦下逮氓庶莫不自愛重於犯法自唐衰今于五閏俗益大壞藝祖龍興曩時機變傾覆嗜利亡耻之風一旦銷磨無復存者文武遺烈可以燕及數世嗚呼盛矣以余論漢之澤至於隴西士大夫以李氏為愧而本朝之在人心者雖鎸工不肯附名黨錮之碑三代之盛庶幾焉夫以三代積纍漸磨之功深矣顧成效若彼未聞以大敝積壞之餘曾不必世百年而興起若是易者是則何道歟豈所謂今古之異事半而功倍者歟誠若是聖天子當寧慨嘆以善俗為問十餘年于兹矣而未覩其變則其咎又安在歟諸君試跡前事以稽當今之故本末源流必有可指陳者矣問以當世之治亂成敗考論古今之士略可覩矣春秋之季晏子在齊叔向在晋􅕋伯玉在衛季札在吳皆賢士大夫也然浮沉自愛無所䏻發明功名者申韓蘇張蓋戰國傾覆之徒耳而富國強兵所試輒效此其故何也漢自元成以來士習偷墮視東都節義有愧焉及觀亡新之敗寇鄧耿賈之倫拳拳於漢卒復舊物三國鼎分則散為曺吳之役者不可勝數其不忍捨漢者諸葛亮數人而巳是何節義成俗而識所嚮者滋寡也唐襲八代之衰歷房杜姚宋不䏻救也詩至李杜文至韓栁經術至啖趙庶幾乎古而唐衰矣內則朋黨外則藩鎮皆一時之俊何沒沒也將所謂文與政通者非此之謂歟宋興七十餘載百度修矣論卑氣弱儒士猶病之及乎慶曆始以通經學古為髙救時行道為賢犯顔納說為忠嗚呼盛矣然向者丁冦吕范之朋黨興而復熄慶曆以後則朋黨遂熾而不可救而世故亦非向者之覩矣豈論卑氣弱乃所以為盛時耶有司惑焉碩與諸君訂之問恭惟主上嘉與宇內之士共成茂功日者除吏不以年勞不以等級庶幾學士大夫灑心自奮行有歷年而齷齪守文之慮未易於是順考祖宗之憲流品不著左右所以并包兼容德意甚備士思所以報稱捨此時尚安須耶仰惟前朝訓迪在位雖無察察旌别殊異案其式程陟降抑揚厥有微旨願與諸君共紬繹焉以備採擇乃者改秩有雙轉有細轉均之入寺丞監丞耳或自大理或自衛尉均之入員郎耳或自屯田或自虞部於是有帶館職顧與試銜等者有以兩使職官顧與判司簿尉等者艱易不相絶也今將比而同之歟乃者循資或以四考或以五考或以七考蓋淹速有如此者今舉不以日月為功歟乃者任子有銓銓有限年今得例從調歟乃者特奏進士蓋或隔郊然後官之攝官然後考第之矣今與正奏槩無所齟齬歟乃者堂後官流外雖有髙爵位不過郡丞佐今皆可以踐清要歟乃者以贓免叙復若員郎則自水部以轉與它官特間然今清雜之庸若無罪然歟推本九重之意所以為是混一流品并包兼容蓋曰勸士焉耳有如一遵舊章清濁畢見無乃非所以為勸歟但曰勸士母以見清濁為也或者非順考祖宗之成憲歟然則如之何而可問古者詢民於射以進士由是而擇於澤試於官而得為大夫若卿諸侯故禮樂修明而無敵於天下日者聖天子深監文弊采擇議臣之奏爰䛇進士乙科以上兼試之射文武官自五品人錫藴射於禁囿稽之往古將宜於今四方之士亦既靡然向風矣蓋聞射禮自漢而下但曰朝儀具文云爾用之戰鬪往往屬諸羽林期門材官騎士之倫是故升降揖遜野人莫之識佽飛射聲之伎亦不於經生學士取也今也不閲於田不習於鄉校而徒試之廷得無若具文然者如必曰閲於田習於鄉校次第而後至則井牧鄉黨之廢久矣或曰雖難卒行盍少近古故事陜西有弓箭手河北有弓箭社得古寓兵遺意而取士無與焉宜舉行之頗依漢選六郡良家子為郎之制間歲大叱以秀異者上之於春官春官雜用今武舉法既射然後科第其文詞於是而試之庭髙者試𥙷吏下者報罷其舉送若考試官亦頗依漢選舉法有賞有罰若是則庶幾乎古或曰士文勝久矣必且失業又曰民未知禮而間於武事將有它患然則古終不可復歟諸君幸相與圖所以稱明詔之意問春秋以來楚之卿材晋不如也而越有君子六千人東南蓋多士矣說者顧曰漢以豐沛功臣定天下唐𥘉人物并汾居名熙朝慶曆元祐之盛大抵關洛諸公卓有聞焉而東南之士功業不槩見於世何歟吳中子弟荆楚劍客宣潤弩手班班見史籍皆天下徑兵處也薄置都尉九十而九江臨淮㑹稽丹陽䂊章財各一尉且它復缺略唐府兵六百三十餘所江淮兩道不過八九中朝義勇亦但取之關河三路夫苟欲強兵者必在西北豈其民亦不足用歟九州之險捨河渭則江漢淮海矣而山林沮澤之多至荆揚而窮用武之國莫加焉竊迹前事七國之秦楚三分之吳魏五閠之周唐成敗異效乃若彼夫形勢抑豈獨弱歟自昔轉輸之富曰江淮最而鹽也茗也香礬珠貝之屬也視田賦又數倍世所謂財貨之淵者方今擅有之矣比年大農之用厪厪無乏夫是數者之利自若也又何繇若是然歟儒者實知務才之不競兵之不鋭形勢之不及財用之不繼務孰急此者而但曰勿講舉而咎之東南之故則何貴於儒者孟子曰得百里之地而君之皆能以朝諸侯有天下况以四海之半又况古人有用之如前所陳者矣豈曰不可願諸君疏其方略以告問古者重戎事冝亡一闕而舟師不槩見於經句哉舫人習水著於明堂月令之書而世所行太公六韜蓋有水戰云然則古有之而失其傳耶案周制徒出於井馬出於丘車出於甸旗鼓甲兵率賦民為之假令有舟師豈徒無所取給歟而莫詳其制何也春狄之季東諸侯亟用之矣伐兵之役楚舟以無政無功然則舟師宜亦有政明年掩以并牧之法治楚兵賦車藉馬而舟楫不與夫舟楫不出於井牧之賦將安出歟吳疆之役沙汭之役繼此纍見豈其取辦於倉卒之間驅民而用之歟越之報吳也凡四萬五千人而習流二千耳越固澤國也而可以水戰厪乃及此若然吳越之民殆未必盡習歟夫舟無定賦士無素習安在其為東南之長而類以得志何哉漢於邉郡置車騎水處置樓船各有員數且算賦漢所以治庫兵車馬者也水處以樓船易車騎其亦以算錢充費歟否則未聞也案地理志廬江有樓船官今夫水處不但廬江郡而巳也它郡不置而廬江獨設官意者度縣官錢治船艦於此歟博考諸傳則尋陽有船會稽有船慱昌有船桂陽零陵豫章皆有船夫廬江獨設官而他郡類有之豈其非在官之船故無司存歟不出於官而調之民是亦所謂取辦倉卒間耳亦得有員數耶謂無員數也傳有之曰因南方樓船士二十餘萬人以擊南粵而淮南之書亦有所謂樓船卒水居者斯其為有員數昭昭矣士有員數其船筏不以倉卒辦也亦昭昭矣然則舟孰從而具士何如而役可得而考歟中興以來材官騎士既罷而三郡棹卒四部黃頭班班猶見豈尚㳂西京之舊歟江左六朝舟師甚設而制度缺略不著梁史有公私船之稱大抵或官或民𥘉無所定陳之末載防戎船艦悉還都下江中至無一隻以此推見誠無足云者至唐制府兵於樓船未有處也然而荆襄揔管兼統水陸鄂嶽出討大步艦亦必有法矣而兵志無傳焉抑又何哉方今江海要擊其備嚴矣聞者有卒然之警猶調民艦以佐王旅漁賈無擬發之常州縣有乏興之遽一時趣督往往條理未彰或𬒳其患伊欲以鄂渚之戍施之㳂江自荆逹楊許浦之戍推之㳂海自吳逹閩聯次比伍輯以軍政使之大小相維逺近相及而稽之周漢參之楚越按之梁唐之間靡有成憲且夫治船置卒多靡官錢胡䏻贍之一切科民則有不忍儻曰國家暇時姑置勿講卒有檄發閩浙騷然尚循舊貫財戍要津而氣勢不通無益攻守冝安設施幸諸君察察陳之母徒曰道德藩籬將安用此問昔者大禹排淮决漢導三江定震澤而荆揚之患去方今淮甸為國藩籬震澤近在股肱郡言水利冝無先焉蓋聞毗陵吳興之間淪為沮洳者皆故墟井聚落也桑田積多征賦積减說者頗咎漕堤曰禹迹三江僅松江存耳自堤作而江不足以㵼湖繇是歲患潦溢冝决之便是說則然矣顧今行都北門堤居孔道芻糧銜艫可以坐集他如啇旅之湊傳之速使聘之便捨此無由焉朝而亡堤數者夕告病矣如之何况㳂堤以東放于海斥往往桑麻沃懋利刺彌衆卒然墮壞怨讟交作如之何往者范文正公欲疏㶆浦以優松江之流蘇文忠公欲立千橋以通漕堤之壅儻可行乎雖然當范公時曽未有堤也殆不可與今同論若曰千橋橋成堤潰則患在數年之後與在旦暮何異未見其可也或曰六朝都建鄴運道不由京口蓋自破岡瀆入秦淮自淮入江而破岡之東下荆溪道今蘇湖二州間所謂下塘者可以徑度設若無堤漕將出此雖然曩時都建鄰唯便漕斯巳耳今都臨安匪直為漕慮也假令萬一有疆場之事長堤七八十里真所謂枕席上過師者廢陸而川是內自阻而他患且如故又如之何堧陂堰不可勝計卒難編復其不可不復毋過數處泗口可以趨廣陵渦口可以向六合肥口可以下合肥古人於是因田以設險因農以置屯大抵安豐以東則有芍陂鹽城以西則有射陂其間斷流為阻則廬江有舒水龍舒有皖水巢有巢湖滁有滁水六合有瓦梁淮隂有白水塘皆用兵所徑也欲阻北道要無易此頗聞今兹豪右之家名田一𤱔占地數頃厄塞類有主名矣胡從而得之强之而歸縣官耶必紛然其擾不忍强民則地勢不比民居不聯而可以屯田者未知有也或曰更以他地否則歸之直天冒地以要公上幸民之利也為國而利幸民奚以為政若但曰官治陂堰俾民自耕土曠人稀終為棄壤然則又如之何而可鄧艾之迹杜預廢以成功何敬洙復以貽患夫豈皆不足為耶事有召禍法有起姦自昔病之矣淮浙之間而水利不興焉何以為國徒利之興一切不顧必有𬒳其殃者願諸公切磋究之有司將擇其中焉至若江漢以南嶓冢以東凡見於馬遷之書班固之志桑欽之經何者所當修理科鎖條畫世所論著若白氏之記六井曾鞏之叙鏡湖單鍔之論西浙何者所當依用併幸毋略問仰惟本朝至仁宗盛大仁厚擬周成康而過漢文景也自德行言語政事文學極人物之成具在其時是何其盛哉蓋歷年過於文景之相繼而事業何止淳朴無他而已彼好治之心不宏如賈誼董仲舒為諸侯傳為博士無事功可述也仁宗朝士由一介恢振斯文卓然配古者四方相望而不世之賢能大用顯承與夫彚征于時衆矣慶曆間屢出手䛇開天章閣鋭然以天下事責成大臣然後諸公奉行佐助不為無大功者而韓公范公富公獨當建議又收用端增置諌臣中外議論相應如明按察抑僥幸去冗食謹入官選將帥之類韓公所疏非一至范富二公俱條當世急務如取士安邉之要减任子革磨勘謹赦今厚農桑擇守宰易監司數事而范富二公有所條相類而所條畫不同者又欲參其所長大體三公所陳汲汲於進才能退不肖而去宿弊也浸以施行矣而醜正者去之他日所以委寄二府賜給筆札體貌不殊倉猝固或未足數而不自同於諸生對䇿者其歸而條上亦有可言歟此其尤著者班班上下若近若踈所以為人才之盛皆可考也夫事有本未有名實有凡目而緩急細大係焉願以獨盛之日人物之盛所以有意太平或用或言者備陳之將以仰禆今日大有為之治毋易言也問治亂廢興之故數千載間其既有聖賢之效者所不論矣自餘豈無渺然長思放言而太息者要皆謂成康後無善治周孔逺無正學其志往往磅薄宇內而求一世之盡從吾說而不可得也然至今獨以孟氏為是其果然乎彼荀卿於制作之原富强之效視帝王六經所論無一不周楊雄雖不如荀之詳也如梡革斷鞠所以諄諄於唐虞成周云者意亦獨至自餘有師說家法者陳經制長策者俱非魏晋以下所可及王通謂可以再造彛倫而悲末世之苟道韓愈推孟氏之功不在禹下原道所言亦非他儒者䏻及之雖然愈則曰孟氏之死不得其傳焉自是舉世同聲和之顧豈無人哉抑孟氏之名巳尊而人不敢異議也果有所見哉此不可因人而言也本朝歐陽公之門學者方盛尤善論文學政事耻一事物不知泰山徂徠間則有行修經明學者所謂師表湖學胡公尤篤治道其學者多有才效號為學術尤備放南周氏二程先生關中張氏以道學倡天下論學在當時遺言至今日世亦户知之矣雖然成康周孔之後道術為天下裂治效泯然不知由起之故所謂渺然長思放言太息數世不過幾人而論議顧不復有如孔孟之一藉彼荒唐之鳴長短之說如昔日之甚不知學者何所取為不之證以敵異端歟今而曰伊雒云也自周孔以來寧獨賢歟其間作者多矣若貌敬口是因人之言則非學者矣彼其曰治國平天下物有先後也致知格物云也篤恭而天下平也無實可議無證可考夫作王制議大事儻幽冥而不知漢儒且深病之是其所論尚未周歟雖然彼其考古今精矣而顧多論大體何歟其有得於古今之精所以守經遭變者可得聞歟若是與孔孟之傳無一不相似也則委吾心布四體以求聖王之奧可也若不能自信終身悠悠於一二之見則如昔之作者皆罪之書不云乎九川滌原四海㑹同願歷考作者相與輸中心而講之毋徒遊言而巳問周官六典各有攸司而其間錯綜不齊若相輸而不相次何歟司馬兵官也宜凡夏官之屬皆介胄之士師田之役也今也司土掌群臣之版正朝儀之位而隸於司馬且夫掌群臣之版與介胄之士不可以同僚也正朝儀之位與師田之役不可以聮事也而周官顧合為一無乃非其倫乎豈以為折衝爼豆不過闕庭之上乎不然則必習於賔贊之儀而後可以治軍旅乎或者以為是秦火之後簡編雜揉然也儻以為簡編之雜揉而今制右選之士言事上閣殆有若周官之遺意則又未可以咎秦火矣其推原古今設官分職之本詳著于篇止齊先生文集卷之四十三
