  text: 止齊先生文集卷之四十七
  hash: sha256:66aa66550090b0688f7dd26198c70508c68275c65a8c29e4d48b076a469661e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_047-1a}
body:
  text: 志銘徐叔楙壙志叔楙年二十二取科第始娶剡之周氏婦黨愛叔楙留之彌年不使其女行叔楙客久念其親嘗欲得余書風刺之將持白其婦翁媪以乞歸余以叔楙意為書纍百言道其主母老矣父母日夜望叔楙以佐其歸决叔楙於是乎歸而巳病矣余與叔楙同乾道八年進士是歲繇鄉貢以第者唯叔楙一人里中慕恱之奉羊酒賀徐氏之門者日至他父兄皆各咎其子弟謂吾之不如徐君也今叔楙調長樂主簿弗及祿又去親側逾年以病歸歸之日父母為之愁苦無聊纍月而叔楙死嗚呼是不幸耶非耶叔楙名愧溫永嘉人一子才周歲以淳熙某年某月某日卒父擴帥其同年進士請墓于郡太守得某鄉慈雲院之後山以某年某月某日葬余悲叔楙之親之怨也故為叙其才與志尚不愧於親者如此因以為銘云林安之壙志安之姓林氏諱居實溫瑞安邑人父堯賔母王氏安之以淳熙二年十月丙申卒以其卒後之六十有二日丁酉葬于邑西偏三里之橫山余既為圖銘於東菜吕伯恭氏而壙不可無識也蓋安之從余遊最久余在城南時羣居纍數百及屏仙巖之陽至者蓋十一而安之實先越數年寓會稽之石氏藏書房至者蓋百一而安之又先明年繇太學還過越安之猶栖然凍餒逆旅以俟將行天台則安之束書僦僕矣余察安之勤甚矣而趣好雜因辭却不與偕比至天台安之巳蹙容俯立戶外以請由是不以涉事物毫抄分志而趨於學余師友雖在數百里外必往依事諸公見安之咸曰佳士佳士年止三十四其葬也同舍生為之槨悲夫趙夫人墓志銘余友孫叔特將葬其內趙氏為余言內所以克相之者而拜乞銘曰昔吾母早世諸弟有尚結髮者吾父春秋髙多恙趙氏年二十餘來歸事字尊稚時節其服食飲藥各以意禁嗜無墮缺不自事遊飾惟賔祭之饌腆潔必致訓齊兒女色莊如文人至令僮婢則以惠及雖婦氏其行應銘敢以請按夫人溫瑞安東郭人鄉貢進士耆孫之女生三男昭子明子宣子二女歸同郡士朱清何璠年五十二卒於乾道七年七月丙戌以淳熙三年十有一日壬寅朔葬于永嘉縣建牙鄉鵬飛里西華山之原余聞東郭與金奧趙皆清獻公之族熙寧中清獻公之子㞦來丞郡夫人曽大父岵從公問家法繇是趙氏子姓有檢守自辟雍正霄以文名天下登進士第者至今不乏夫人行應銘有自來矣余娶城南張氏實金奧出昭子而下又從余遊皆辭不可遂銘之曰維系之光維習之臧式謹婦常無年乎何傷胡少賔墓志銘少賔諱序姓胡氏胡氏繇婺徒溫至荆湖制置司幹辦公事君諱褒通判滁州君諱裒宗正少卿君諱襄兄弟始著纍贈其考諱觀國中散大夫妣趙氏恭人滁州君周氏安人無子以幹辦君之子為後是為少賔也少賔娶薛氏故起居舍人徽言之女世所稱薛士龍者其妻弟也年四十有九以淳熙五年後六月丁未卒于官所十有一月辛未歸葬于永嘉縣吹臺鄉梅嶼山先兆之側子男五人宗宇守寅定女四人曩余問學于薛士龍氏往往見少賔巳而與鄭純全真往還全真雅從隱君子遊間一至城邑必食寢於少賔之家余固心異少賔而未之知也前年官行在所少賔適赴調久館於余師友鄭景望氏則日得與少賔處語是時少賔之從弟千秋待湖州監酒闕年方少母老矣不樂其為是官使來換縣主簿若尉少賔念人人擇便利將誰聽吾弟昔授福州侯官尉推千秋嘗適市見宜春走卒問其族子教授時者忘恙乎曰既亡矣為之涕泣奔走以求歸宜春之喪與其父母妻孥者纍日余始知少卿之篤行全真之不苟合鄭薛二氏之常與居有以也其後益聞少賔生平少嗜酒倔疆年三十盡捨故交竊聚糧走千里見黟人所謂金先生者先生名梁之嘗為奉新尉一旦棄官變衣服垢面罵市難近即所可意復危坐講說若經生學士然者最善鄭全真也少賔介以見卒然相歡飲之於酒家竟醉少賔蓋留黟數月而後歸其所云云懷不以語人乃更自負恃愛惜非親黨慶唁未嘗出門巷獨旦暮與士龍孫處厚子詩相追逐上下議論士龍名在天下士爭趨和其言少賔亦自立我務不為同於子詩尤各出竒不相降下余頃聞滁州君初讀書天慶觀故相秦公在永嘉聞其名出不意杖䇿來覘之君方讀孟子書不為輟也秦因誦宋勾踐一章以感諷君君訖其去如初旦日且不還謁秦公再相有以君為薦者曰是固以三顧望人者耶滁州竟官不逹死幹辦君以布衣從大將嶽飛定群盜僅得官以死少卿稍貴亦坐言者謂尚胡寅趙鼎之學擯十餘年不用少賔志益壯連調官丁內外艱不赴晚監湖酒名字才出未幾死矣胡氏父子蓋如是宗來乞銘其可無辭叙哀之乎宗盡得外氏書率諸弟力學或者在兹耶銘曰璞也而或以為珉似也而或以為真徒以屈伸云誰不泯吁嗟乎少賔承務郎陳公墓志銘始余入太學故右文殿修撰芮公為祭酒以士之有文行者職掌凡學之事而永康陳君聖嘉為選首余繇是與聖嘉往還甚熟嘗語余吾父春秋髙而吾之室亡矣因不復娶以與吾父同卧起者若干年豈忍一日離也而吾猶未免於諸生余聞其言而感之後數歲之官道過永康則聖嘉取上第調處州州學教授遇太上皇慶夀恩授其親承務郎父子蓋甚樂也明年秋聖嘉忽訪余行都衰經面墨拊膺哭拜曰某不孝某不孝不能夀先君以及于祿尚不敢死而來乞銘于吾子以䆒大事惟吾子惠存之余既泣弔即辭辭未就會罷官東㱕又道其州邑往往所至以其族子承議郎監左藏南庫公亮之狀訪公之為人頗合且得其軼事蓋自熙寧變古役法不以主戶敏願之士上公給事而浮食與政者類皆惡少州縣不勝其敝里居者同患之然自好非詘與齒也公習見前事獨堅忍不屑去以隂平一縣之賦訟痛自潔謹雖有督察之長欲求其一二過差而不可得故䏻䆒其惠愛于乎使當秦漢察舉之法行其因是以著見必有足觀者而其志豈但若是哉以余知其子十年見其休戚之變又得公行事如是是冝銘公諱某字某其先自頴昌徙婺曾大父某大父某父某公善事親不以家事纍兄弟教子不問費雖事科舉業試不利不愠與人交非輩行不輒相字於童稚未嘗施爾汝家甚貧猶施及親故晚嘗杜門讀佛書間一日出比鄰歡迎之訖年八十齒髮不甚衰變娶鄭氏先卒男四人志同志莭志質志剛二女適邵去病倪資深男孫三人女四人以淳熙五年三月某日卒明年正月某日􅌾縣之長安鄊西山原公亮云而志同者聖嘉也銘曰謂為無位耶子姓以貴之謂為無傳耶鄊黨以譽之兹為其藏後之人易忘也而我銘著之叔祖母韓氏墓銘夫人姓韓氏鄊先生汝翼之兄女年二十八㱕我族叔祖父歸二十一年而叔祖父卒葬所居前山之陽後二十六年而夫人卒叔父某以淳熙七年十有一月吉奉其柩祔于山陽之兆蓋夫人㱕比葬歲復庚子矣叔父泣命某曰吾葬以故緩而今屬吾子銘之也以尚亡悔某不逮事叔祖父不嘗見夫人為冢婦時事而見為母久是時長叔姒亦惸寡家日落二小郎䁀盛門户冷熱異夫人中處與外絶獨教子讀書一女愛甚擇以妻國子進士韓公禀婦子或微過但色不怡婦子謝已則復常雖鄰未嘗聞語笑聲者而室廬園田無秋毫損於叔祖父之舊叔祖諱某字某銘曰余叔祖父以善士稱叔父繼以善士稱族之願其妻若母者必以夫人也如之何勿銘馮司理墓志銘君諱施叔字孟博以淳熙六年某月某日卒于家年六十以八年十月庚申葬于永嘉縣建牙鄉桐嶺之下娶魏氏再娶薛氏三男琳瑜璋五女適吳仲洽林謙餘未行往時吾鄉尚名德貴門地士大夫不苟為婚友永嘉如草堂先生張子充氏經行先生丁某父氏瑞安如唐奧先生林介夫氏皆名家也數家子弟賔客往往可稱數君考諱光庭娶介夫之孫女因林氏君得從草堂諸子學復因張氏得以其仲姊歸經行之孫君三歲喪母十五喪父家益落而迄以讀書屬文得官居有善譽出有廉績蓋其所漸習異也府君且卒召林張氏以其子為寄兩家合教十數年丈人課之婦女飲食衣𬒳之比君偕計書上名于禮部兩家奉酒相勞苦以為可見府君地下矣余每論婚友之不可苟於君故有感也余娶草堂仲子思豫之女則嘗教君者也既習聞其所繇成就如是而琳瑜又來問學亦雅馴不煩瑜也將葬因述君官政家政纍千餘言以乞余銘余嘆曰士䆠不逹志不究見何足用書有以孤兒受教于外氏致其身以無辱其父其可以無傳乎銘曰維古論人必某出君克其家誰從得亦惟厥考好逑匹我銘旌之後為則張忠甫墓志銘忠甫為人嚴重深博善忍事鎮物絶有材智抑不使出其氣貌沈沈偉然丈人也年方少連五試禮部不中授特奏官忠甫每自悼不第進士雖䆠逹將不得與文墨議論亡足以著儒效遂棄去以居養其母儀妻子是正朋友為事蓋晚而學詩書講誦數年既大通風人美刺與古喪祭上下之交立教微意以為天下國家可推此而理此孔門之所教而傳也益負其學自刻苦貴愛或言諸朝祿以監嶽忠甫謂徒費縣官亡誼歷三任不食其祿亦不書考執母夫人黃氏之喪自飯含至于既窆凡所以誠信其親者自括髮至于既祥凡所以哀恫其身者質諸士喪禮無不合也𥘉忠甫獨追古輩好繩俗以已學無以寓見則時時為文章銘人父祖有諷有勸皆不虛書於族姻之喪為之治衣衾棺竁絀巫佛強其為此禁其為彼人頗謂怪至交口哂罵之忠甫說甚長而未之服豫也及見其躬行極人之所難然後翕然加敬尊信其說有從之者雖不從者亦內愧莫之敢議也然而忠甫之言曰吾生不免為今人吾行豈敢為古人吾於閭里後進隨和唯諾一若庸庸然吾何賢哉嗚呼忠甫蓋己顧避黽勉如此猶久而後與鄉人合使盡巳有耶人必且大怪冝愈難合使得其位施行之則必怪之者愈衆亦愈流落不偶不得其志故忠甫一意忍窮以死而非其釋然不屑於世也忠甫與其友薛士龍鄭景望齊名於時而二人皆仕矣士龍一見人主語意合且大用而為政者不恱去之以卒景望三入朝二十餘年其卒也位不過九卿二人嘗勉忠甫仕忠甫不應久之而道不行功業不就也則未嘗不壯忠甫之决而推遜其髙嗚呼是可不謂之賢歟忠甫諱淳姓張氏世永嘉人曾祖某祖某父某娶潘氏休寧丞蔚之女年六十有一以歲之元日卒以其年十有一年乙酉祔葬于吹臺鄉桐嶼黃夫人之兆實淳熙八年也二子凡几三女適袁州州學教授潘宇進士劉嗣僖盧趨將葬潘氏曰吾夫子之友惟陳君在且余家壻銘夫子無以易君者然則某其可辭銘曰勇避而不趨人以為為異也愁苦以行之人以為為利也我師古人敦今不棄也猶有鬼神殁其寧于地也章端叟墓志銘淳熙八年九月日陳子端巳使來告章子之喪曰端叟不幸旦日卒凡兩邑之諸生走相弔其自今將誰紏合以卒業夫子宜聞而哀之余既泣受辭即往之其廬會哭哭皆盡哀越月端已復來告曰端叟不幸未及有子以仲兄之子士則後葬日得十有二月丙午而士則也幼不任事諸生分治其喪紀而端已實刻其墓敢請於夫子余復泣受之曰是宜銘端叟諱用中平陽萬全人考諱某妣周氏恣聽端叟學端叟從余游最久又因余之金華依吕公伯恭之霅川依薛公士龍而其名遂載於人口耳性溫良泛無不愛於久故能分酸苦于先生長者能受其煩辱之役于其徒相厲以學責難勸義定為期㑹程式稽考有誚惰遊有罰其人嚴憚之則所謂江南書社也嗚呼死生之際可以觀人矣端叟無毫髮氣力無父子兄弟可以納交又無壯子也而兩邑之士交吊聚哭為之執事焉圖銘焉惟恐其有憾且遂磨滅也是可以妄得之耶若是固不冝銘歟娶葉氏先卒有二女顧言以季歸諸鄭氏姊之甥長托之友友合謀以余之兄子師宇為之嫓蓋端叟之志也銘曰距江五里寺曰寶積循除而西數十步有壤隆然者吾端叟之宅也止過其下考視此石朱君佐壙識公姓朱氏諱興國字君佐溫永嘉人考永妣王氏享年五十以淳熙二年十有一月卒君佐娶陳氏生子輒天以汲為已後晚得光孫而君佐之喪未練又夭陳氏為君佐之愛光孫也以拱源為之後三女適丁子美項敏中陳宗淵子美宗淵皆嘗薦國子學亦輒不第死蓋君佐卒七年汲始克葬于所居里西山之麓且葬陳氏使為志焉陳氏余族姑而宗淵之姑也豫方哀宗淵􅈱􅈱二女莫適顧託於是感余姑之經紀朱氏置孫以綿其祀乞言以不隕其名也喜且泣下而刻藏諸竁庶幾其女不忍棄宗淵如其母然而亦以解君佐之悲也葬以淳熙九年十有二月庚申冝人林氏墓志銘建炎間天子柬拔民譽之士一日而除臺諌官四人趙䁀黎確沈與求而其一人監察御史諱惇禮者福州長溪楊君也御史生縝今以朝奉郎致仕朝奉生興宗嘗為尚書郎出知處州徙嚴州余所為銘林氏冝人之墓者朝奉之配嚴陵後母也蓋名家三世矣嚴州使人謂余曰始吾大父連以郎官御史召不起晚日益窶興宗生四歲矣而吾母死母賢可賴大父日夜念之不樂也而求繼於母家是為冝人冝人雖歸不及大父顧託然竟成其意有信士不能然者興宗不善為言猶能言一二以圖銘於子也冝人嫁橐費且盡而劉氏姑死吾父至無以買棺斂哀亂計不知所出冝人泣謂曰不有吾頭上一金叉乎鬻之而棺具興宗之為太學諸生也使遺之金若干兩曰吾所紡績得此以資汝興宗之得樹立其身以答元母者冝人之賜也吾父從事臨安以其暇問養生於恩州李處士得其方一切屏事務自夀冝人故清薄亦即將順毀飾飯菜為浮屠氏學以迄偕老嗚呼以大父之不樂念此也至此而皆如其託言無咎興宗悲不能銘若遂不銘豈唯宜人何以慰大父於土中且冝人余同郡平陽縣人通奉大夫林公祀之季女嚴州考試乾道八年進士而余又辱為門下士夫論述鄉黨之美與諸老先生家事以著之後世抑余志也冝人二十三歲嫁又四十五歲卒卒一歲若干日而葬實淳熙九年十有一月某日女壻陳萬章孫男女四人銘曰余嘗過括蒼見其人樂道太守之賢而逮事父母之榮龜井之原今為此銘孰無人心其永勿傾止齊先生文集卷之四十七
