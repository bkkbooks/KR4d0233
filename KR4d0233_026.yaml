  text: 止齋先生文集卷之二十六
  hash: sha256:7262583e9df29e507a82d9950194b583c20a8a68f47234d6fdf65471183b714d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_026-1a}
body:
  text: 奏狀劄子辭免再除起居郎狀温州遞鋪傳送到尚書省劄子一道七月八日三省同奉聖㫖陳傅良依舊除起居郎兼權中書舍人令疾速前来供職臣不勝螻蟻之誠仰干宸聴恭惟陛下因天人之心應帝王之運屬夀皇之䘮紀以聖父之倦勤禀命慈闈嗣服大寳雖舜察人倫武王逹孝孔子聖之時春秋變之正無以過此宗祀幸甚天下幸甚臣偶縁末學嘗備勸誦潜飛之際攀附何榮而首被明綸趣還舊著維新之命獨先衆人豈臣區區所敢當此况臣立朝屢年曾乏㳙埃之𥙷幸蒙上皇矜憐齒髪将近朝露放還田里俾全晚節而陛下顧以簮履之舊尚欲使令此臣所以踧踖不遑須至控免伏望陛下察臣平昔素非矯飾念臣衰遲已是頽惰特收誤恩以示初政臣不勝祈天望聖激切屏營之至辭免中書舍人狀准温州遞到尚書省劄子一道七月十三日三省同奉聖㫖陳傳良除中書舍人臣聞命震驚罔知所措臣竊惟古者設詞令之官𥘉意不過以人主勸懲罷行之政既與二三大臣共决之矣至其播告彂明冩之簡翰則苟能言者皆可使奏伎於其間不必人主一一親也久之而言益行官益重盖命令之有不當於人心者輙得封還始與聞政矣至扵本朝遂與諌官御史給事中三数人者最用事如是其人少不稱職徃徃能為天下患不但言語工不工也恭惟陛下龍飛急扵審官方将慱求天下俊良而如是官者尤所當謹擇也如臣學術荒落重以衰惰獨柰何先天下士玷此選也以為濳藩之舊則示不廣以為攝官久則嘗不善於其職矣是皆不可矧兹惟新之命夷夏屬心不宜除授令人竊議臣所以不殫煩瀆仰干天威伏惟思詞臣之重守家法之嚴而先衆俊謹新政特寢誤恩昭示中外不勝幸甚再辭免狀右臣昨具奏辭免新除中書舍人恩命事今月初九日准尚書省劄子七月二十八日三省同奉聖㫖不允者恩深感極豈敢固辭伏縁臣昨来所奏文字意指姑為陛下誦辭令之匪䡖明舉措之當謹而未嘗及臣進退之義是以天聴未囬俞音不下須至煩瀆再輸􅈤悃臣聞潜邸舊臣號為攀附其侍御使令之人耶則不過奉命承㫖故其人志在恩寵但以畏謹避權不預聞外事為義其切磋講習之人耶則嘗敷陳治道啓迪心術矣故其人志不在恩寵而以不徒空言欲見之行事為義二者甚不同也臣愚不肖不謂遭際備數勸誦凡向者反覆言之正有望於今日陛下誠尊所聞誠行所知以此荅天心以此𥙿民力則萬世之下臣與有榮耀焉即雖不在左右死且不朽况陛下以睿哲之資日進不已加以方今百官之富非特徃時二三僚佐之比如臣陳言不足施行陛下誠㫁自今搏求俊良與圖新政将所聞益髙明所知益光大矣即臣雖不在左右亦死且不朽苟惟不然皆恩寵爾况臣以休致之餘動關物議又與見在職者事情不類所以不敢冐昧於一来也所有省劄臣未敢祗受除已具申尚書省外謹錄奏聞伏候勑㫖辭免兼侍講狀臣昨准尚書省劄子備奉聖㫖除中書舍人方具奏辭免次又准省劄八月六日奉聖㫖兼侍講臣正聽候前件指撣故更不辭免兼職今臣巳迫威命前来供職所有兼侍講職事難以冐䖏湏至懇祈冀囬淵聴伏念臣向事朱邸備數勸誦方當陛下潜龍勿用之𥘉不過講明為人臣為人子之道此則臣素所肄習者也夫惟素所肄習尚堪勉強故閱嵗月幸無罪悔若夫路門經幄事軆絶異盖非政事之臣而欲致其主於唐虞三代盛帝顯王之業凡所敷陳必至徳要道急先之務一話一言稍有悟合則天下國家隂受其賜非徒指摘章句累次篇帙而巳也然則如臣豈足堪此且以孟子名世之才猶自謂未學諸侯之禮房杜亦王佐也而不能奉禮樂之對由此言之苟非所習雖聖賢不可以強如臣之愚實非通識重以衰晚無温故知新之益今謂臣嘗為儲君講矣當能為天子講臣誠不敢自信也臣不敢自信而過使令之陛下眷舊之恩則厚而臣不知懼是但貪寵也又况府僚限員固難博擇今陛下有百官之富賢俊林立欲求多聞豈無他士何乃眷簡獨私舊人所有上件兼職欲望聖慈特加謹重改授在庭鴻博之士庻有禆助伏候勑㫖十月五日奉聖㫖不允辭免兼直學士院狀准尚書省劄子奉聖㫖陳傳良兼直學士院臣聞命震驚莫知所措伏念臣以平生辛苦之志非不欲以文字得名以垂老攀附之榮非不欲以論思圖報既居西掖又直北扉豈非臣之所甚願哉重念臣少多憂患早以衰疾盖年未六十而齒牙脫落鬚髪皓然終日強餐不能杯飯未昏就寢畏見燈火以此聰明銷退徃徃善忘况自比年迭為二史脚力疲於乆立心事困於直前常恐一旦溘先朝露幸蒙上皇放還田里臣自謂得長徃之期更生之幸矣陛下龍飛首加收召一月之間除目三下臣伏自思念有君如此雖使髙人隠士影響昧昧之人猶當興起奉令承教况臣嘗備官僚久辱使令最蒙眷遇者乎黽勉此来實出感激然自再入脩門故疾輙作謁告彌旬職事俱廢又適當郊霈之後覃轉封贈數倍常時詞命填委㡬以百數日不暇給下筆甚慚故臣區區方欲稍遲數月以承天意别求一官以便巳私不謂陛下驟寵異之使兼内制臣恐自此顛隮無日矣何者精力不足則必有弛慢之患思慮不強則必有闕誤之患假使隆寛不以為罪而書問之不酬請謁之不報亦必有不理於口之患此臣之所甚懼於顛隮也苟至於此豈是陛下全度之意臣愚欲望聖慈察臣悃愊實非飾偽曲垂淵聴将上件兼職特行寢免伏候勑㫖閏十月五日三省同奉聖㫖不允中書舍人供職後初對劄子臣聞人主有大舉動必有以新天下之耳目而大慰民望恭惟陛下始自宅恤移御廣内此大舉動也正天下顒顒望治之時伏想聖心先定将有仁聲徳意之事感恱士夫兼被黎庶者矣臣不肖輒有管見一二仰禆聖明惟陛下財幸一乞三宫各置使領以盡孝養之道一乞降詔問民疾苦仍申儆見行賑濟州縣官吏諭以賞罰一乞自宰臣以至侍從管軍次第宣引從容賜坐訪以軍國機務以示責成之意一乞撫問㳂邉諸将并帥臣仍量加錫賚一乞増置諫官一乞收拾恬退滯淹之士一乞稍出内帑錢以助版曹經費少寛催理巳上特臣區區愚慮所及未足以廣宣主徳如蒙采納見之施行則嗣此有樂告陛下以治安之䇿者矣臣不勝拳拳取進止第二臣聞今之獻計者類曰陛下宜以孝宗為法太上皇為鑒臣切以為是說也唯孝養三宫當如此耳而非通論也何者孝宗盛徳大業不可勝紀固皆足法若夫上皇徒以積憂成疾浸不視事不可以為宗廟社稷主而非其治皆無足法者也陛下嗣守丕圖凡所施設誠參酌兩朝之盛典擇其為天下後世便者兼行之則可謂集大成矣臣淺陋不能盡識兩朝之意輙以管見條上一二恭惟孝宗銳意恢復耻於苟安雖以徳夀在宥不敢北伐而追懐陵廟閔念中原之志枕戈嘗膽日不遑暇訓練儲峙常若臨敵此一可法也早朝晏罷寒暑不渝引見臣工省閱章奏日了一日勿問休暇至於暮夜必宣召入直官賜坐從容議論時事此二可法也留意人才求之如弗及一語契合立致通顯所言不酬始督過之取舍以公明白洞逹而無猜慮關防之意此三可法也儉於用度一金不以濫予内帑之積累數鉅萬唯是振荒右武無所愛惜盖以天下之財為天下用而不用諸巳此四可法也監司帥守見辭之際各訪其䖏民間利病有以便民為請随即施行蠲除貸宥曾無留難未嘗輙怒官吏獨以貪虐獲罪於民者必罰無赦此五可法也臣以為孝宗之治可為法者非一而陛下宜法此五者帝王之盛羙也恭惟太上皇無事付之外庭采於公論左右便嬖絶不預政不唯不聴其言又禁切之而金繒酒食之賜則不吝嗇此一可法也八廂渥土之人置而不用未嘗以浮言危動群臣此二可法也行都守臣兩浙漕臣三總領所悉以士人為之不以交結不以誕謾此三可法也管軍臣僚及㳂邉帥守不以為御前差遣皆從三省降詔除授此四可法也給舍封駮䑓諌論事雖累上迫終不以言為罪此五可法也臣嘗謂太上皇之治可為法者非一而陛下宜法此五者亦帝王之盛羙也陛下誠上稽孝宗明斷緫攬之政兼軆上皇隆寛不自用之意則天下可得而理矣臣所謂集大成者以此盖奉偏而𥙷其弊則能全兩朝之羙矯枉而過其直則反有一偏之患臣恐議者不察妄分取捨以惑聖聦敢昧死一言唯赦其狂愚而采擇之則天下幸甚請對劄子一人主心術必有所尚何謂所尚先定其志而後力行之者是也臣不暇逺引前古且以髙宗徳業為陛下誦之方髙宗艱難百戰之初欲復大讎欲定中原欲還謁九廟則其志尚在恢復及大母巳歸徽廟之梓官巳還南北之勢巳成髙宗之責少塞而天下亦倦於用兵矣則其志尚在和好方志在恢復則用趙鼎用張浚自退朝之後延見臣下省閱章奏游戯翰墨至於燕私皆恢復之謀也及志在和好則用秦􅝸自退朝之後延見臣下省閱章奏游戯翰墨至於燕私皆和好之事也髙宗所以享國之久動無過舉者以有定尚不襍不怠而巳雖然此臣借以為喻之說而非勸陛下之說也今陛下春秋鼎盛銳意於學而又聖禀純素絶無嗜好臣切以為陛下之心方如止水方如明鑑以此為堯舜以此為三王無不可者臣獨未知陛下之心所尚者何事欲先定者何志耳不尚一事則将並進人之言而無適從不先定一志則将汎汎然日復一日而無用力之地且夫人主天下之利勢也富貴尊榮之所自出也倘陛下将聴並進之言而無適從汎汎然日復一日而無用力之地臣恐有乗間而入陛下之心者矣陛下此心方如止水方如明鑑可以為堯舜可以為三王或萬有一先入者得陛下之心而用之臣恐陛下聖明雖銳意於學無他嗜好而此心巳有所偏也此臣私憂過計欲勸陛下且以拯民窮為所尚此志先定則陛下始有用力之地自退朝之後以此意引見臣下以此意省閱章奏至於游戯翰墨至於燕私此憂此念造次不忘臣切以為是亦陛下養心之法不雜不怠充而大之堯舜三王之治可由是而致也何者以捄民窮為所尚即是仁心仁心即是堯舜三王之心孟子嘗言之臣嘗彂明之陛下嘗深信之矣第二臣切謂今天下亦多故矣臣未暇縷數獨念民力之困於此為極而莫與陛下救之者耳賢士大夫不為不多曽莫與陛下救斯民者何也勢不行也何謂勢不行欲救民窮必為帥為漕為緫領而後可而三數官者雖賢士大夫不樂為之故也既曰賢士大夫而不樂為帥漕緫領何也外權太䡖雖欲有所設施而不得騁故也是故不為法令之所束縛則為浮言之所動揺不為時政之所諱惡則為䆠游於其䖏而不得志者之所中傷有是四患雖賢者亦忍事苟歲月耳而况其餘人乎且夫人情誰不喜遷而惡滯誰不好伸而耻屈誰不趨利而避害今也立朝自郎察不一二年可至卿監又不一二年鮮不得為從官若夫帥漕則有奔走徧天下而無一日朝蹟者其間僥倖或得監職自直閣積而至修撰極矣而所謂修撰者又必嘗為卿監而後得之是終身無復從官之望臣所謂喜遷而悪滯人情之不樂一也今夫立朝苟有親故欲入舘閣則可以移書帥漕若緫領而坐取之無不如意者至為帥漕連衘剡牘奏辟一屬官若准備差遣之類輙不可得若平工也則不過送部勘當訖於陸沉若稍有過差之請徃徃該部詰難囬復甚者至𬒳論列臣所謂好伸而耻屈人情之不樂二也今夫立朝自釐務職事官皆得以親族子弟牒國子監𥙷解試及監司帥臣苟非在川廣二千里外即子弟無收試之所每遇大比無所附着稍知謹畏者大率無故而殿一舉不然則為謬巧遷就以避貢舉條制斯可矣臣所謂趍利而避害人情之不樂三也如前四患則是事權太輕雖賢者猶不樂為之如後三說則是㤙數太薄人人不樂也夫可與救斯民者必帥也漕也緫領也而人不樂為之至此柰何憚改乎臣竊以為今日之勢莫若稍稍重外重外之術必使帥漕緫領皆可馴致於從官可以馴致於從官而後可久任可久任而後可責事功如此則帥漕緫領始曉然知朝廷委寄不輕矣則夫前四患者次第自去而有為陛下出力救斯民者矣乞放身丁錢劄子真宗實錄大中祥符四年秋七月壬申朔詔曰朕臨御萬邦厲精庻政一夫不獲尚切扵憂勞九賦用均唯思於寛簡惜其物力以厚民生眷惟浙江之區介彼東南之域而自祖宗恢復聲教誕敷去率斂以居多俾樂康之斯洽洪惟利澤巳浹編甿然計口筭緡尚存於偽制治財吝納仍限於歲輸特俾蠲除式申曠蕩其兩浙福建荆湖南北路身丁錢並特除放如有元以錢折征物色亦與除放自如有以下十三字㩀福州法冊添入凡歲免緡錢四十五萬四百六貫身丁錢不知所始臣伏讀御札則知其為東南偽制也本朝六路次第歸化所以加惠之者甚厚徃者婦人有之至淳化三年免見十月四日瓊州勅寺院行者有之至咸平五年免見七月四日兩浙福建路勅攝官有之至至道二年免見正月十五日廣南勑鹽亭户有之至太平興國元年免見九月福州路勑賃舍寄住者有之至咸平六年免見四月二日廣州勑死丁自咸平二年始與除放八月二十日杭越明睦台温䖏衢婺秀蘓湖十二州勑逃丁自咸平四年始與檢閣見七月十一日荆湖南北路勑又僞命日如福州每丁三百二十五自太平興國五年定納錢一百七月髙象先奏請褔州長溪有温台等州投過一千七百餘戸二千餘丁每丁亦三百二十五自景徳二年定依温台州見納錢二百五十四月二十日劉炤奏請蘇州每丁納米自淳化五年定納錢二百見八月十七日蘇州勑睦州每丁六百九十五䖏州毎丁五百九十四自咸平三年許将縜折納五月二十三日兩浙路敕抑見偽制各出一時頗亦不等前後勑命大底多者使寡難者使易不宜有者使無而諸國苛歛漸趨於平至是廼一切蠲去與民更始天聖間侍御史章頻言先帝除放偽命身丁東南之區聖徳所被十六年矣放過錢七百餘萬貫而軍國之湏不聞申匱乏可謂至論然臣又按實錄明道元年三月兩浙轉運司言大中祥符五年已放諸路身丁錢而婺秀州尚輸如故廼蠲除之蔡襄亦嘗言僞命日諸州各有丁錢唯漳泉州興化作米七斗五升真宗皇帝哀矜困窮蠲放兩浙褔建身丁錢其時漳泉興化是亦丁錢折變作米無人論奏因依遂至先朝大恵不及三郡以此見祥符放丁溥及六路其間猶有至今輸納者皆府縣占吝奉行不䖍之故推而廣之宜在今日恭惟陛下仁聖在上軫憂民瘼欲省賦甚矣間者㫁自淵衷量减折帛之估有司以闕經費為言其議遂寢以臣愚見折帛固宜减不如身丁切於窮民且其為錢視祖宗折帛之估纔十之一而其為丁視納折帛之家殆累數萬緡陛下尋祥符之詔㫁而行之幸甚止齋先生文集卷之二十六
