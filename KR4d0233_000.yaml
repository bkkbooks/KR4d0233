陳子益母夫人墓銘林民逹墓詺何君墓志銘朱公向壙志胡彥功墓志銘承事郎徐公墓志銘新㱕墓表第四十九卷志銘敷文閣直學士薛公壙志陳季陽墓志銘修職事吕公墓志銘徐武叔墓志銘陳習之壙志承事郎潘公墓志銘林懿仲墓銘第五十卷志銘沈叔阜壙志族叔祖元繼壙志族叔祖元成墓志銘族兄際可壙志髙光中墓志銘陳百朋壙志王道甫壙志族叔國任墓志銘洪君墓志銘令人張氏壙志第五十一卷行狀右奉議郎新權發遣常州薛公行狀福建長樂縣主簿諸葛公行狀國子司業何公行狀第五十二卷附録宋寶謨閣待制贈通議大夫陳公神道碑樓鑰撰宋寶謨閣待制贈通議大夫陳公行狀蔡幼學撰宋故通議大夫寶謨閣待制陳公墓志銘葉適撰民論舟說責盜蘭說戒河豚賦守令䇿收民心䇿章子林子名說朱甥子藏名說止齊先生文集目録卷終止齊陳先生文集序儒者之所難曰德曰功曰言而已三者克具斯為儒者之盛逺而有以恢弘魯鄒所傳之緒近而有以昭䦨濂洛未啓之機尚論其世有足徵者此止齊陳文節公所以不可及也公少以斯文為已任強學篤志弗得弗舍其從鄭景望薛季宣也以克已兢業為要其友張欽夫吕伯恭也則交致夫持敬集義之功涵養于致知之際躬行于自得之餘剛毅樂易孝友恭肅融徹混成莫測涯涘是能立德者矣其教人也誘掖不倦四方景從士習丕變隨才有造其仕于外也事無細巨一裁以義勸善革奸縮用溥利卓越之績傳不絶書其在朝也正色讜論直前極陳扶翊大政匡持君德欲進忠賢則黃冕仲朱元晦之遷改不與書行欲摧權奸則率逢原張子仁陳源之除目繳駁論奏茍禆社稷奮不顧身是能立功者矣讀書有譜六經有論建隆有編毛詩有解詁春秋有後傳左氏有章指周禮有進說制誥有集皇宋有大事記進讀有藝祖實録周漢以來有兵制著書明道簡冊充棟是能立言者矣功在人德言在已三者相須以為用者也瓉幸生公之鄊屢嘗誦讀遺文而私淑之茫乎如隂陽之闔闢也浩乎如河海之㴸潏也燦乎如日星之炳耀也油乎如風雲之流行也雄偉而不放精深而不晦馳軼而不迫起伏斂縱愈出愈駛引古質今滌冗為新錯綜萬務體悉人情而歸宿于至理蓋不獨繩矩之具而精粗隱顯皆可以適天下之用自有文字以來學士大夫竦企傾動固其時乎非有本者其孰能之公淹貫六經包括百氏洞徹天人之奧而于歷代經制大法與夫當世制度沿革失得之故稽驗鈎索委曲該洽此豈泛然雕飾以騖于虛言者也公文散載于群書遐􅑍寡陋未見有統彚為全帙者瓉近于祕閣録出公集玉十二卷則向所嘗誦讀者百無一二存焉蓋曺公所編止自梅潭丁亥之歲而他作不入也弘治乙丑侍御史同年澤州張君伯純往巡浙中因論鄊哲而于公尤致嚮慕瓉遂出示公集伯純喜曰璡求公文久矣而莫獲見之是行未廣也請得梓之以傳且欲彚拾散逸以為外集伯純積學善文風裁峻整在公若有宿契焉者宜其樂公之制作行于時也瀕行屬瓉序于集後瓉何人乃敢序公文哉况樓蔡水心諸公紀述備矣聊托立德立功立言之實以寓泰山喬嶽企仰之意然公名髙招忌行方取詆君眷未幾而輒沮道術略伸而復斥不肯少貶以從流俗而所謂立功者未䏻充滿其志而國運䆮以衰下矣可勝歎哉天佑斯文而使公之制作復行于時固世教之所關也弘治十八年歲在乙丑夏四月既望賜進士及第翰林院編修文林郎經筵國史官鄊後學王瓉謹序
