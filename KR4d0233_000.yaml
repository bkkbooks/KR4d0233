front:
  text: 止齊先生文集序先生禀抱天頴研盡學力據六經奧會執九經百家之轡俾環嚮以趍于一披剔文義躪藉衆糾究明帝王經世宏模而放于秦漢以下治亂興衰之故獨揭源要不牽多𡵨由是彰往考來默察當世丕平之機深抱大業至于化裁推行不動聲色使人回心而嚮道者其綱領條目靡不該具蓋嘗忘寢廢食審玩孰復庶幾對越天地百世以俟後聖而不感也雖言論未孚幾進輒沮而志念回皇與物委蛇左推右挽旁接廣誘其任重道遠終老未當一日敢忘于斯焉嗚呼盛矣鄒魯之統緒河洛之承續千載以來不知其能幾見也執經户外方屨闐集片言落筆傳誦震響場屋相師而紹興之文丕變則肇于隆興之癸未屏居梅潭危坐覃思超詣絶軼學成道尊則邃於乾道之丁亥博交遍驗洞礙融窒對䇿初苐懇藎獨到則盛于乾道之壬辰官太學倅閩府詆劾却掃勤十寒暑紬繹文獻宏綱具舉則備于淳熙之丁未起守挂盟持節湖南疏滌拊摩民信有古百年之思鬱乎湘山則驗于紹興之庚戌召對光宗驟遇奬用侍立代言贊翊儲邸次苐藴畫庶將發揮則著于紹熙之癸丑宛轉極諌倣徨乞身龍飛急召十旬乃罷爰抒舊志著于訓傳疾疢漸臻梁木竟殞則終于嘉泰之癸亥叔逺夙蒙挈䇿俾窺津涯蒿幹鷃羽惕負大賜適當新義川漲群文蝟興疇昔訴析而致孤條之靡鬱砥途之失榛乎是用敬輯遺稿寄諸琬琰儻開後哲庶弗淪墜矧韋布眩墓影響編傳或混幼作或雜真贋詭題叢帙誕弥遐陬輪耀掩汚理合釐别故今裒次斷自梅潭丁亥之後凡為歌辭古律詩內外制奏狀劄子表啓書簡序記雜著祭文墓志行狀總五十一卷即先生燕坐之齊以為集名若成書則有讀書譜二卷春秋後傳十二卷左氏章指三十卷周禮進說三卷進讀藝祖皇帝實録一卷未脫稿則有詩訓義周漢以來兵制皇朝大事記皇朝百官公卿拜罷譜皇朝財賦兵防秩官志藁别自為編附識其目庸熄淆亂先生名傅良字君舉世系㦄官具見于神道碑墓志銘行狀云嘉定戊辰門人承直郎太學博士曹叔遠謹序止齊先生文集目録
