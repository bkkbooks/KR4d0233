body:
  text: 第一卷歌辭暮之春西廟招辭并序古詩落葉一首别諸友讀范文正公神道碑有感佚事送國子監丞顔幾聖提舉江東分韻得動字懷寧國守鄭少卿景望送國博參議江東分韻得夜字逰鼓山和縣偉卿雜言送林正仲丞玉山和林懿仲喜雪韻再和除夜用前韻和林宗簡除夜韻再用喜雪除夕二韻寄宗簡賦芙蕖送楊似之提舉湖南哭吕伯恭郎中舟行寄諸友張冠卿以詩十首見寄次韻奉酬黃巖張之望之立來訪與逰梅潭詩以送之和張孟阜尋梅韻送劉茂實宰奉新送趙叔靜教授閩中四首送白石巖和孟阜老梅韻再和第二卷古詩送同年林多益丞海寧送謝希孟陶看笋和潘飬大韻贈尹紹伊送郡守汪充之移逮嚴陵寄題陳同甫抱膝亭送葉正則赴浙西憲幕送葉陳益之架閣送翁誠之慰慈溪送包清卿教授莆中作南塘記郡守沈持要以詩來謝次韻奉酬送謝倅景英赴闕懷同舍石天民編修次韻蕃叟弟月下有感夢人誦詩覺省數句足成一首送曹器逺試臨安二首約同舍蜀人王德修三首次德修仙巖韻再用韻呈德修夷門歌送德修還闕借書一首别薛子長寄陳同甫生日述懷簡鄭景元簡王道父贈東陽吕望孫周登二武士書黃巖丁明仲墓志碑隂第三卷古詩赴桂陽道中喜晴書事簡友人二首和王教授謙叔述郡圃韻次臨桂尉楊渭夫韻送宋伯潜宰髙安送楊渭夫歸省南嶽聖葉寺禹相牡丹和潘養大韻次張漕過湘岸韵送王南强赴紹興簽幕四首題明皇醉歸圖送范憲東叔帥潼川四首行湘喜雨簡劉公度周明叔劉連州和韻因過湘中之樂以謝葉正則閲藏經次其送客韻問之和張倅唐英咏梅十四首招隱二首記夢第四卷古詩始生七章上皇子嘉王生辰送丘宗卿帥蜀短歌送吕子約丞郡天台送黃子文得縣瑞安送陳仲孚還里李夢符教授惠宣聖畫像用韻奉酬還徐叔子犀帶憶笻杖蘭花供夀國舉兄東陽郭希吕山園十咏送郭希吕水仙花止齊曲廊𥘉成次沈儉夫求花木韻春晚書懷二首奉簡陳益之題沈仲一所藏周氏群公書帖贈章虞卿并序題僧法傳為沈仲一畫聽松圖送畫僧法傳題瑞安宰朱元成乃祖雲壑莊圖咏梅分韻得蘂字送蕃叟弟赴江西帥幕分韻得獨字鼓琴行送許父同知赴闕并序送徐一之客贛上兼簡薛象先弟五卷律詩新昌詠歸贈石時亨并序題觀潮閣上閩帥梁丞相生日二十二韻送鄭少卿知建寧五首庚子除夜有懷送沈元誠赴臨漳主簿送德逺弟赴省和張孟阜歲旦韻寄沈元誠晚春二首送縣謇卿赴壽昌主簿哭吕大著至明招寺簡潘叔度招徐居厚天台王子木解官長樂見訪月夜書懷二首送周魯山辰州法曺遊丁次翁篔簹園期次翁永至送朱同之福州户椽覔樹栽題仙巖梅雨潭次陳益之韻戲呈汪守充之汪守三以詩來次韻奉酬酬謝倅景英用前韻見寄用幽宇韻戲簡謝倅用前韻呈汪守謝倅用前韻答賈端老月仙巖還舍留别諸友送任虞卿教授江隂和謝倅見贈生日二首再和謝倅生日景元益之考試旁郡夢與步月聮詩得銀字韻追成一絶謝倅監試未畢事而出以詩三章來用韻奉酬沈仲一三益堂逰金奧趙園海棠絶句湖樓送客即事一首奉懷益之兼簡同餞諸友春晚一首約同志泛舟用前韻招蕃叟弟仍和蕃叟癸卯二絶送翁誠之尉慈溪和陳仲石韻送陳仲石韻送謝懷英道士歸廬山二首送陳持中赴四明節推二首寄彭子復徐子宜次韻酬丁少詹瑞安宰劉伯協載酒逰園小雨喜霽和丁少詹韵病餘遷仙巖書院于屋西有懷同志酬陳頥剛見和寄謝景英參議寄題翁誠之慈溪縣尉􅈦無我亭和沈守持要賞柑三首和沈守觀潮閣留題奉陪王德修登觀潮閣兼呈劉宰落成王朝奉廟以簿恙不預謝劉宰并諸鄉丈五首和沈守題謝公樓額沈守生辰觀南塘四首呈沈守第六卷律詩桂陽勸農九日奉呈同僚四絶句郴守丁端叔以九日詩至次韻奉酬再用前韻簡丁端叔和丁端叔聽梅二詩韻丁端叔送牡丹以詩來用韻酬之和丁端叔歲晚書懷丁端叔送海錯以詩來用韻酬之酬王判官和九日韻四絶戊申臘桂陽喜雪再用喜雪韻一以書懷一以喜客題范秀才萬卷堂和段仲衡同令嗣天晴少出之作陳頥剛注孫子許拾遺贈詩用韻酬之和段仲衡譙樓新軍額二首和蕭俊仲司法咏譙樓新軍額韵送洪子端還鄊送吳德夫楊伯子以尊人誠齊南海集為贈以詩奉酬潭帥潘德酈生辰和衡守劉子澄韵遊南嶽登祝融峰喜霽和沈帥特要張漕季長韻二首送沈帥携客過王提舉園訪梅用劉連州韻再用韻簡劉連州夀張漕謝司馬倅惠東坡竹石和趙帥夀張漕韻二首題來陽黃宰詩卷送黃元吉懷歸丐祠送范東叔㱕帥潼川送丁懷忠教授象州長沙臘月雷後雨雪帥趙俊臣以詩相賀用韻奉酬再和趙帥復賦詩來用韻酬之用韵咏雪簡湘中諸友贈張孟阜絶句用趙帥韻為孟阜解嘲登祝融峰觀日出舟中奉呈趙帥一首除浙西憲舟過釣臺有感第七卷律詩上皇子嘉王生辰詩三章袁起巖㑹飲湖上一絶再和寄陳同甫送辛卿幼安帥閩送盧郎中國華赴閩憲送范大著文叔知彭州和劉進之韻兼簡吳阜之𥘉夏有感因用前韻送潘德久之官建康同逰張園次韵奉酬方輝先送倪正甫侍郎賀正喜雨送曽繼先赴山隂路鈐送何起巖之江東上元日同京仲逺諸公訪郭殿帥遊鳯凰山次韵癸丑冬車駕過宫留相還朝和樓大防尚書送行韻折子明提刑自湘中以詩問訊用韻酬之泊釣臺灘下登明逺樓後春六日奉和陳德承韵兼簡黃竒卿張伯廣二賢為别贈杜伯髙除夜宿處州天寧寺寄僧嗣清蔣處州仲可惠酒再用前韵丙辰夀國舉兄送長溪髙國楹從學朱元晦以兩鶴夀薛象先重陽日寄瑞安留宰和林宗易菊花韵和沈仲一北湖十咏周宣義三子登第用前韵奉寄再次簡新第諸人送瑞安尉林叔全導人還鄉送林叔全秩滿㱕四明送雪菴瑾禪師還山周和叔通判雪寒索酒戲用來韻以將朋尊奉和周蕃伯用王道夫韻二章見寄夀叔祖母東陽杜季髙遠訪詩以送之春日和林宗易韵移花送花送花還宗易逰鳴山寺即席和徐一之兄弟韵和徐叔子用林宗易韵見示和徐叔子勸農韵呈留宰逰金奧趙園賦海棠梨花呈留宰赴留宰寶壇之集因和蕃叟弟趙園韵示留宰或以詩送來禽次韵奉酬逰雲頂院和徐叔子韵夀薛象先酬蕃叟弟韵夀潘省之丁巳壽國舉兄第八卷律詩村居二首和宗易作屋之什送縉雲葉正𥘉兼簡杜伯髙和宗易賦素馨末刋白蓮韻沈仲一送菊得詩為報為賦二絶仲一以詩來用韻奉答寄題薛象先新樓立春除夜用前韵送子壻林申甫還侍逰趙園赴林宗大招賞牡丹之集寄謝懷英髙士和張端士𥘉夏兼簡潘飬大送周介之同年赴德化宰謝林默之居士惠酒戊午夀國舉兄止齊即事二首戲題止齊叢石重陽和朱直方韵用徐叔子韵送其過毗陵送四明汪文子寄九江宋居士酬劉進之巳未上巳清明莘叟兄蕃弟偕潘飬大過訪和林宗易上巳韻和林宗易雨後韵兼簡沈仲一張端士以詩送蘭蕙因和其韵兼簡潘大以速肯來寶壇和林宗易韵答朱翔逺見别之作嘗語客蓴鱸橙蟹的對因成二十八字因客說秋秫水傷復用前韻巳未生朝謝莘叟兄送梅二首覔花和徐魏叔見寄三絶和朱宰遊丁園韻庚申上巳清明後一日宴客明日宗易送牡丹有詩次韵和汪仲嘉樓大防二尚書賀鄭貴和華文休致韻寒食早起戲和林宗易韻二首次莘叟兄韻送四明方伯起送楊渭夫入淮從族叔覔老桂蓮花寄林宗大和莘叟兄咏張子房韻朱及之以所種荔枝結實招飲不及赴以詩謝之從徐一之覔菊次韻奉酬徐一之送菊廷植姪得男朱文昭寄詩即席韵送鄭主簿太興解官㱕四明送孟延昌㱕蘭溪劉進之飲蕃叟弟筠亭賦詩因次其韻林宗易劉進之見訪有詩再用前韵題錢宰吸光亭圖第九卷挽詩擬進御製孝宗皇帝挽詞五首孝宗皇帝挽詞五首挽吳明可給事挽木奉議悼蔣升仲承事挽族叔父題丁少詹姑墓志後挽樓朝奉挽包顒叟挽張子由母挽潘才叔母挽周宣義挽婺女周茂宏挽薛季益尚書挽彭通直挽沈次卿學正挽林承信悼林仲逸縣尉挽張材卿知郡挽新昌吕修職挽尤延之尚書挽沈虞卿侍郎挽東陽郭德誼悼楊休甫挽宋巖老參議悼劉謙之知録挽王興之提刑悼濟陽夫人挽張春卿尚書悼翁仲立逹州挽劉端木司户挽林致賢禔舉挽劉茂實和州鄭自眀哀詞并序第十卷內制慶元改元詔哲文神武成孝皇帝梓宫啓攢塗前奏告祝文啓攢畢梓宫還殿皇帝祭奠祝文發引前一日𥘉更總護使行夜祭禮祝文發引前期祭告錢塘錢清江龍神祝文發引遷奠祝文掩攢前一日奏告帝后攢宫祝文掩攢祝文九虞祭祝文九首掩攢畢謝土神祝文安南國王季龍翰加恩制賜知襄陽府張枃辭免假差知建康府恩命不允詔賜宰臣趙汝愚等上表請皇帝還內不久批答賜趙汝愚等再上表請皇帝還內冝允批答第十一卷外制皇后歸謁家廟親姪李孝純孝友各特轉右武郎皇后親姊李氏等封國夫人皇后親姪孫李瑜李璨各轉兩官皇后親姪婦潘氏趙氏親姪女李氏並特封恭人親姪孫女李氏特封安人皇后親姪女夫韓松特轉一官皇后親姪女之子韓大用大任各循兩資皇后親屬韓大有轉承信郎皇后閣提舉官楊舜卿轉觀察使皇后幹辦宅張友直沈植各轉一官皇后閣主管進奉袁佐等該遇皇后歸謁家廟並轉一官秉義郎韓仰胄授閣門舍人皇伯嗣秀王伯圭合得冠帔並換封孺人賜親屬內將一名與妻妹宋氏封孺人閣門宣贊舍人遊恭落閣職權發遣臨安兵馬鈴轄起復文州刺史知鳳州郭諝轉復州團練使再任皇兄多才磨勘轉明州觀察使武功大夫利州防禦使權知閣門事韓托胄落偕宦臣僚􅌳奏特與轉行右武大夫入內內侍省副都知張安仁除都知入內內侍省押班李彥正除副都知帶御器械于惟修修楊舜卿並除入內內侍省押班張祐正𥙷承信郎鄭孝友應奉有勞轉一官殿前指揮使左班年代上名劉成等授官皇弟多助多䏻並該磨勘轉防禦使入內內侍省東頭供奉官霍汝翼轉歸吏部除帶御器械招箭班殿侍訾彥澤𥙷承信郎仍舊在班祗應瀘州軍變守臣張孝芳𬒳害贈三官與二子恩澤瀘州𬒳害官兵贈官及與子恩澤廬州撫幹郭仲溥失覺察虞候張信為亂首特降三資放罷太史局學生周奕𥙷挈壼正閣門看班祗候霍寬夫供職實及二年落看班一字倪思該修壽皇聖政轉一官著作郎黃由等該修進夀皇聖政各轉一官徐靖等該進壽皇聖政各轉一官降授昌州刺史帶御器械霍汝翼該進壽皇聖政轉成州團練使宗正少卿鄭汝諧奉使回轉一官閣門舍人譙令雍奉使回轉一官轉奉使屬官譙令憲等回各轉一官閣門宣讃舍人宋堯使等該應奉人使十次賞各轉一官浙江潮神善利侯祈禱感應加忠靖二字袁州仰山神加父母死及子婦封號平江府五龍靈濟廟加封進士黎崇禮年百三歲選遇大禮恩𥙷迪功郎翰林醫愈邢守忠轉外翰林醫痊第十二卷外制給事中兼侍講尤袤除禮部尚書兼侍讀中書舍人黃裳除給事中兼侍講降授朝散郎許及之復朝請郎忠翊郎前韶州兵馬監押周升降成忠郎文林郎階州將利縣令藺森失出犯公罪笞特降資保義郎李珙家遺火燒民屋特降一官故通直郎趙公廣追復承議郎奉議郎知袁州黃劭降一官承節郎旴𣅿軍指使潘撫權淮河監渡不職降一官放罷修武郎張世榮管押歲憋恣橫生事降兩官承議郎常德府通判趙善彥在任不法降一官放罷奉議郎知成都府郫縣郭公謨昏謬降一官放罷入內內侍省東頭供奉官王師圭轉歸吏部差在京宫觀