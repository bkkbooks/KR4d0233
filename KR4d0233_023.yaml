  text: 止齊先生文集卷之二十三
  hash: sha256:e608e5c81cd294a428d29c516fdbc8a08d04bc50614de14debb6b4ef9716c7cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_023-1a}
body:
  text: 奏狀劄子􅌳奏張子仁除節度使狀臣恭覩數日以來一二明詔講慶夀之禮足以歡兩宫之心除鬻田之令足以快四海之望中外小大之臣莫不手額欣抃延頸以企曰近者二三大臣進退哀榮之典久未豫决意者自今聖心豁然如天開霽必次第處分矣忽奉宸㫖張子仁除節度使果有以見九重燕間未嘗不軫懷勳舊而及其後人誠舉斯心而加諸大臣則一指揮之頃耳然而人之關繫有重輕則事之施行有先後今二三大臣進退哀榮之典宰執臺諌屢嘗奏請方留未下而遽加恩於勳臣之子則是䡖重不倫先後失序臣竊未曉不敢不為陛下條陳之且夫留正輔相𥘉政于今四年言聽志行曽未有君臣之間而倉卒不審便出修門揆之經義未為中節然而待放郊外屏居山樊省咎陳情亦既纍月陛下誠怒之歟則䇿免舊章皆可覆視誠不欲其亟去歟則或以少保歸班伹解機政或以內祠領使間奉朝謁則為正者進退唯命夫復何辭若猶鞅鞅􅔵望禀命不䖍則持憲臣寮豈容但巳然則今置正弗問而遽加恩於子仁獨何歟恩足以及勳臣之後而念不至上相此臣之所未曉者一也非特此也趙雄以抱痾不痊均佚鄉郡陛下强起之以帥江西雄之遜牘亦一再上而重違天威當暑出峽竟以舊恙卒于官下萬里旅襯道路惻然雖雄勳業不敢望過厚之禮而有司常度安用損益何為恤典遲遲至今至如尤袤三朝老儒而陛下之潜邸僚友也最蒙睿簡行且大用而其致仕遺表之章亦數月未報然則今置雄等弗問而遽加恩於子仁又何歟恩足以及勳臣之後而念不至故老此臣之所未曉者二也非特此也關陜對壘今六十年國家以十萬貔貅付之吳氏父子三世全蜀晏然不煩西顧者吳挺之力也陛下方將召見闕庭行采微枤杜之禮曽未及講挺復致仕故尤以為傳聞失實屏申奏而不信豈非託重于挺愛之欲其生乎陛下之意則厚矣而非其事情也以挺之威望敵國之所窺覦則擇代不可以不謹以挺之恩信士卒之所懷感則恤終不可以不至以挺之事權海內偏重則一旦而收之又不可以不深加思慮也方今急務未有過此然則今置挺弗問而遽加恩於子仁抑又何歟恩足以及勳臣之後而念不至大將此臣之所未曉者三也雖然臣所云云特謂輕重不倫先後失序物論沸騰因事而進言耳若夫張子仁者介在間散人不稱數雖少長將家而無橫草之勞雖久綴班行而無㳙埃之𥙷不知何故得此殊渥且夫開府建旄非叙遷之官也告廷孚號非私昵之賞也無故而取之則交結之謗在子仁適足以禍巳無故而豫之則非泛之患在聖朝不足以勸人况張子仁嘗使令姚德打死命官歐陽安中又有外宅婢阿關用炮烙刀刃之刑虐害阿鄭等蓋嘗經法寺定斷臺官覺察矣又皆以議功僅從追奪即其怙勢奸法見于奴婢罪狀明白不當除授大略如此其他妨礙臣未暇數以煩天聽臣不勝拳拳欲望聖慈下采公論將張子仁無故恩數速賜罷寢于以光華主德尊重名器而亟因羣情舉行體貌大臣之禮則社稷之福也搢紳之願也所有録黃臣未敢書行謹録奏聞伏候敕㫖八月十一日奏入第二狀今月十二日恭奉御筆付下臣昨奏􅌳張子仁除節度使事奉御筆為係勳臣之子特除節度使可與書行須至再有奏聞右臣昨不揆愚賤嘗􅌳奏張子仁除節度使事退惟螻蟻輒抗雷霆言雖當理死有餘罪今者恭奉御筆令臣書行仰惟聖度如天曲賜容忍而又親灑宸翰明示風旨顧臣何人尚敢違忤雖然臣聞修當行之政者足以慰傒望之情施無故之恩者足以來謗讟之口臣前所奏固知子仁之為勳臣子也但方群情嗷嗷延頸纍月皆以留正待放而罷命未聞趙雄告終而恤典不及凛然西陲擁兵十萬吳挺物故闕無主者當此時也而授鉞於間散庸繆之臣冝先者反後冝緩者加急則是捨當行之政而推無故之恩臣恐傒望者惶惑而謗讟至矣此所以深為聖明惜此事體且夫報答舊勞孰與輔𥘉政者之為親矜憐後裔孰與專帥閫者之為重此事理曉然豈唯群臣雖子仁固知之也使子仁稍有念慮則亦於此恩數局蹐不安矣臣是以不敢隱默須至再三庶幾熙朝不以無故之恩而先當行之政恭惟陛下聰明仁厚逺繼三五儻䝉少霽威嚴下采狂瞽而今而後天意豁然萬幾之間群疑氷釋事關廊廟則立見施行憂在疆埸則便須處置上以承兩宫之志下以盡百辟之情人無後言事無後患如是則國家尊榮朝野欣豫雖勳舊子孫憑藉寵靈窮極冨貴亦物議之所不及矣至如張子仁有罪無功自是不當有此除授則臣不暇論所有元御封付下臣奏狀一件連粘在前謹録奏聞伏侯敕旨八月十三日奏入留中上嘉王劄子某輒有愚悃仰禆王聰竊惟去年之秋聖駕久不過宮中外憂懼計無所出嘗賴得大王密啓中宮從容調護巳而六飛順動萬衆歡呼莫不以為皇后作配之德叶於關雎大王奉親之孝逺過曽閔也今者太母生辰近在數日而又來年慶夀適降指揮既行討論亦合奏禀朝野顒顒欣逢盛事儻若清蹕之詔或不如期則是奉觴之禮又成虗廢必興謗議徒玷聖明區區以為在今日之謀莫若申去年之請如蒙大王加聽肯為逹群下之情共想中宫樂聞必䏻贊九重之决如是則慈福為之滿意重華為之歡顔主上之孝德無虧中宫之婦道益著而大王令聞布於天下一舉而數美具不可不勉也又况㑹慶重明兩節相繼其為事體允涉觀瞻外而使客陪在廷之儀內而禁衛希從駕之澤動靜之際關繫非輕稍有參差更足憂慮則是自今以往全賴大王母子俱賢彌縫此事今夫臣庶之家骨肉相保父祖尊長豈無失誤之時妻孥宗從必致扶持之力正以一門利害各切其身不同他人可以坐視天下雖大義同一家而巳某忝在府僚不敢隱默干犯威尊皇恐死罪至如留正吳挺魏王夫人等事並未處分此固非大王所敢與聞亦乞逹之中宮庶知外間仰望之切某申禀是日蒙王喚某到講堂云劄子極好但要􅌳進中宫可改一本不須作文字便封來又劄子某等輒有僣越之請仰干王聽重明聖節中外皆望車駕過宫群臣已是說不行了别無靠處只靠得大王入裏頭宛轉調護兼是車駕過宫事亦不當外廷理㑹才到得外廷理會須至張皇却不便穩且告大王因宣押次奏知中宫多方勸贊期於必出若更因循日久歲深兩宫忽有些少不足利害非細某等忝為府僚竊以為大王子職莫急于此故私布之恭惟留意幸甚又劄子某僣越再有申禀魏惠憲王夫人之喪巳降指揮許國公解官持服在大王是為伯母有合行禮數只緣上意遲疑未敢陳請然外間議論却謂大王有此缺闕頗損聲譽不審因宣押次可以奏知中宫亦略提起只得降一指揮許到魏王府燒香奠慰便是了事區區併乞留意􅌳奏傳昌朝轉官狀准中書門下省送到録黃奉聖旨皇后親屬訓武郎閣門看班祗候幹辦御前忠佐軍頭引見司傳昌朝巳該㱕謁得轉一官特與轉行令臣書行臣取到吏部案見得傳昌朝昨來將皇后㱕謁家廟恩例轉行一官吏部告示本人勘㑹從淳熙六年九月十一日指揮其在內有應奉不係理年出職一時推恩𥙷授名目之人依條作非况𥙷授欲將自降前項乾道八年七月八日指揮後來似此𥙷授之人亦合一體止令轉至訓武郎止今來本人已轉至訓武郎所乞轉官有礙前項指揮去訖臣今若與書行即合行下吏部遷轉其吏部係是守法去處准前告示不敢放行則是徒奉成命於本人實無所濟臣愚欲望聖慈收回上件指揮庶免煩黷所有録黃臣未敢書行謹録奏聞伏候敕旨九月二十九日奏入直前劄子臣聞天不可俄度也而示人易地不可俄測也而示人簡是故天地之神而萬物有所恃者以其易簡也帝王之德配於天地亦若是而巳共惟陛下臨御于今五年省刑薄斂天下皆知其為仁兼聽廣納天下皆知其為恕而近日以來匆事獨斷尋常指揮動出意表天聽甚髙人言難入群臣惶懼莫知所為以臣愚昧熟慮而䆒觀之則陛下本心端不如此何者臺諌對班多是隔下間有論奏亦無施行人以為陛下怒臺諌矣然經筵侍講妙選法從而黃艾首預識擢陛下何嘗怒臺諌乎給舍封駁旋𬒳改除雖蒙留中不即處分人以為陛下怒給舍矣然王府翊善付以元子而黃裳終見信用陛下何嘗怒給舍乎留正無故乞解機政出郊數月猶未豫决人以為陛下怒大臣矣然隨班上夀之請朝奏而夕報可至欲使以左相為上公陛下何嘗怒大臣乎甚者或以致仕而恤典不下則紛然竊議曰陛下惡人言死彼李端友備數館客卒於邸中賻贈隨至然則陛下豈惡人言死耶或以乞去而亟請不獲則又紛然竊議曰陛下惡人言去彼辛棄疾召為大卿即去為帥至欲以次對寵其行然則陛下豈惡人言去耶臣故曰熟慮而䆒觀之則陛下本心端不如此終㱕於仁恕而已臣聞天度有常而或寒暑乖錯晦明反繆者必有干隂陽之和者矣而天度固自若也聖德罔愆而或喜怒失節舉措過差者必有誤聰明之治者矣而聖德亦自若也以是言之則不怒臺諌不怒給舍不怒大臣皆陛下本心也而况於惡人言死惡人言去豈陛下之心哉而又况自夏徂冬稍闕過宫之禮遂謂陛下以疑阻虧孝飬又豈陛下之心哉夫不察聖心而見其形似苦諌而力爭之是冝天聽甚髙人言難入也雖然群臣孰不希寵何苦自絶雨露之恩孰不畏罪何苦自干雷霆之譴而孜孜半年爭此數事陛下亦盍反求而徐察之乎若陛下於此數事反求而徐察之曰吾心寬大本無所怒今若有所怒然何歟毋乃以某人嘗言之之故歟吾心和平本無所惡今若有所惡然何歟毋乃以某人嘗言之之故歟吾心孝敬本無所疑今若有所疑然何歟毋乃以某人嘗言之之故歟茍有其人茍言其事則是誤陛下者也所以誤陛下者將以孤陛下也至此口奏甚悉夫不察陛下之心而以形迹諌爭者群臣之罪也陛下本心端不如此而不察人之誤巳以致於此或者亦聖人之過乎陛下誠以本心之所存而徐察之則知人之誤巳者矣知所以誤已則外廷之黨論可破外廷之黨論可破則兩宫之情意可通外廷之黨論破兩宫之情意通天下尚何事耶以此圖大功可也不睱逺圖以此為小康垂拱而責成可也垂拱而責成則鐘鼓絲竹樂與今同尊爼袵席樂與今同臺池鳥獸樂與今同無不可也然則陛下何直為此鬱鬱使天下徒日夜洶􅍅也臣最微賤最荷恩寵不勝忠愛之心為陛下白發其端而不敢盡言惟至明至聖為社稷大計為富貴崇髙逺慮而加省焉則天下幸甚取進止是日因奏慈福宫加上尊號已有指揮未審重華宫何故未講此禮以臣考古來聖人多以彌文縟禮交歡上下今陛下方自疑阻稍闕問安之節若因此盛典併行於兩宫臣意夀皇須更開喜遂歷舉漢唐以來故事及德夀宫禮數上大喜曰此是好說卿可到都堂宣諭宰執明日奏事啇量偶記得孟饗前齊宿不是奏事日分遂奏云明日宰臣以下齊宿無奏事上曰如此只就景靈宫齊殿奏事因奏臣小臣輒發此議巳是僣越豈敢承聖㫖宣諭大臣以臣愚見只合待大臣奏事陛下自以聖意指揮即尤見陛下孝敬之德臣不敢領聖㫖上再諭朕遣卿有何不可遂到都堂具道上意是日趙知院在假葛丞相折簡相約請對比入文字御批十六日就景靈宫齊殿奏事與前言合諸公皆喜已而從駕孟饗遂奏事上意已變但云且許他乞𥙷外狀臣昨不度踈賤妄有建白今月十六日伏准尚書省聚􅈦宣諭令臣不得說出伏念臣只是建議若行不行自在陛下則臣决自不敢傳布但緣當來曽蒙聖訓令臣傳旨與宰執大臣則知者已非一人若萬一有人說出忽逹天聽即臣當坐漏泄之罪臣於此時無以自明臣不勝惶懼投誠君父欲乞聖慈與臣在外差遣或祠祿一次稍俟日久孤蹤明白别賜收用實臣至願除巳具劄子經朝廷陳乞外謹録奏聞伏候敕旨貼黃所是臣經朝廷陳乞劄子只如尋𥙷外體式更不說及此意伏乞睿照乞祠祿㱕展墓焚黃狀臣輒有迫切之懇仰干天聽伏念臣九歲而貧賤養生喪死皆有永恨前此幸值郊霈始得贈父而久官湖湘逺離墳墓今七八年不獲展省以行焚每一念下為之心折萬一溘先朝露即兩親竟不霑澤臣亦無以見於地下矣况自立朝委是尸素區區欲望聖慈矜憐衰謝來日不多特與祠祿差遣一次使得展墓焚黃少慰存沒臣不勝祈天望聖激切屏營之至繳奏南班多慶轉官准中書門下省送到録黃一道節文三省同奉聖旨多慶特與轉行一官令臣書行右臣照得在法南班磨勘實及十年方許轉行一官其多慶所乞係多方淳熙七年體例止及八年欲轉行一官撿照得紹熙二年正月二十一日指揮臣僚奏陳其有法者止當從法不得更引非法之例令御史臺覺察必罰無赦自後有司常切遵守今來多慶轉官正礙前項指揮自降前項指揮以後即無援例陳乞放行事例假如放行即御史臺必須覺察聞奏適為多慶之纍臣欲望聖慈將上件已降指揮特賜收寢所有録黃臣未敢書行謹録奏聞伏候敕旨十月二十一日奏辭免起居郎申省狀准尚書省劄子備奉聖旨陳傳良除起居郎日下供職不勝慚懼須至煩瀆伏念某哀朽罷駑誤玷班列久無𥙷報實不遑安昨嘗纍具奏申乞從罷免或與在外及祠祿差遣俟命纍月未准指揮今乃求去得遷若更冒然就職則是前請皆非真情欲望朝廷特賜敷奏追寢新恩以安愚分十二月三日三省同奉聖旨不允兼職並依舊繳奏安定郡王子濤賜宅狀准中書門下省送到録黃一道節文為利州觀察使安定郡王子濤奏今踏逐到宅子一所乞照令德等例撥賜居止以便祭享十二月三日三省同奉聖旨依令臣書行右臣竊以為安定郡王見無住宅以便祭享殊失嚴奉之意合從朝廷撥賜宅子一所永充見任安定郡王居住以存事體今來所有子濤奏請臨安府府衙後宅子未審堪與不堪永充嚴奉香火欲乞更降指揮下臨安府契勘聞奏取旨撥賜仍不許其他官員指占亦不許將後子孫認為已業如此則前後承襲庶免疊有煩瀆所有録黃臣未敢書行謹録奏聞伏侯敕旨十二月𥘉六日奏􅌳奏刑部大理寺易大明阿王斷案狀准中書門下省送到録黃一道節文為刑部大理寺狀舒州申勘到百姓易大明并汪清妻阿王斷案事令臣書行右臣竊謂人之親莫切於夫妻妻而與人謀其夫則生人無措身之所矣照得阿王嫁汪清生一女三子自紹熙元年與易大明通姦以來凡其夫汪清所與疑慮易大明者皆密以告凡易大明所與謀害汪清者未嘗一以告也據案阿王嘗受易大明之謀醉其夫以酒又從之學作麻索套子將以勒死汪清不果如是者又一年而後卒殺汪清當殺汪清也易大明雖以鐡尺打傷仆地未曽氣絶令阿王快取索來阿王紀恨汪清節次打罵亦有心要勒死汪清手解布機上麻繩付易大明勒死之是不謂之同殺其夫乎在律謀殺條姦人殺其夫所姦妻妾雖不知情與同罪昔人之意所為斯人慮者甚嚴密也况同殺之乎春秋之義魯夫人與弒公絶不為親禮也聖人豈忍絶人母哉與殺其夫雖子猶不得以為母以是為王法所當誅耳而貸不殺是無三綱而十惡之條廢矣臣自攝乏書姦人殺其夫之案或貸死者有之而未有如阿王之幸免者臣愚欲望聖慈參酌經律令有司别行議斷所有録黃臣未敢書行謹録奏聞伏候敕旨十二月十六日奏入􅌳奏傳昌朝轉官狀准中書門下省送到録黃一道樞密院關十二月八日奉聖旨訓武郎傅昌朝特與轉行一官令臣書行右臣九月二十九日曽具奏傳昌朝巳礙止法兼違戾乾道八年七月八日聖旨指揮當蒙聖慈將傳昌朝轉官指揮留中不行去訖今來又准送到上件録黃臣實不敢奉詔且傳昌朝蠢爾小臣乃敢宛轉附麗煩瀆朝廷變亂法度以臣愚見不惟不當轉行一官更出合自宸斷别作行遣以杜絶來者所有録黃臣未敢書行謹録奏聞伏候敕旨十二月二十日奏入􅌳奏藍嗣祖轉官狀准中書門下省送到録黃奉聖旨進義副尉藍嗣祖昨在潜邸服勤有勞可特與轉承信郎令臣書行右臣據都官供到狀稱昨紹熙元年六月內給帖𥙷該遇潜藩應奉推恩人共四名藍嗣祖章顯祖顔守忠王演各係白身並𥙷進義副尉數內王演係收使昨該皇太子官祗應陸宣公奏議終篇賞轉進武副尉又收使皇后受冊推恩賞轉承信郎顔守忠係收使皇太子宫祗應陸宣公奏議終篇賞轉進武副尉又收使髙宗梓宫發引賞轉承信郎見得二人各係收使兩宫賞方轉承信郎今來藍嗣祖與二人𥙷授年月事體一同即無上件合該收使賞典徑與特轉顯是不均恐非公朝待人無私之意所有録黃臣未敢書行謹録奏聞伏候敕旨十一月二十三日奏入止齊先生文集卷二十三
