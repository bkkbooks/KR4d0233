front:
  text: 止齋先生文集卷之四
  hash: sha256:ca31b77323b0fa2e6aa94255104c53567487fc595f209e74f16cda73cc088143
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_004-1a}
body:
  text: 古詩始生七章章八句上皇子嘉王生辰生為帝子貴本自歴數歸歴數萬億年帝子夀無其今夕果何夕欲頌皆贅辭但願王此心無忘始生時王看松柏萌未具葉與枝冲然一點春其大可十圍云胡間不茂為失雨露滋乃知生意同其異各所罹人均此生爾王生樂無涯如将與人同請自今夕推奉觴一何多于以介夀祺王其敬舉觴一念周八維百鼎羅珍羞世豈無調飢錦綺爛盈門藍縷還誰衣龍樓近日月茅舍或不支三宫子孫孫亦有孤與婺矛牙吾方貴吾生相彼多阽危豈伊天地公而獨及我私扵焉識仁端一物豈忍遺當思宇宙間夀域咸熈熈獵人愛麛漁人愛鯤鮞萬物欣自遂况也民秉彛家有舉按婦人有譍門兒王心至於此夀不數耆頥詩人誦稷功造周本𡵨嶷首言民初生次及稷誕彌民命繫扵稷此語非夸毗末僚甚拳拳所愧無周詩送丘宗卿帥蜀戸部侍郎丘公被命以煥章閣直學士出帥全蜀其反生永嘉陳某作詩三章送之一章以重别也二章頌也三章以遄其歸也嘗陪諸老後亦與晚進㳺有能一夕話可洗萬古愁昔君尚青衫今我巳白頭闕下何匆匆蜀江正悠悠一請工治庖再請拙操舟好靜從古始尚恩極今時寜使舉國貧勿與一士遺熈寜固前轍元祐誠良醫我亦欲宴興人方乏朝炊持之訊人傑人傑良自疑前瞻及河隴内頋連江沱邊籌尚弹壓民瘴湏挼挱方當上懐逺况復歲薦瘥宜公去㠶輕歲月亦易多西人豈不好柰此東人何短歌送吕子約丞郡天台露荷不肯附綠漲石榴自欲當朱明我無一物與君别持此薦以雙玉瓶榴花結子荷成的定亦扁舟去為客良集偏扵吾軰慳新功或向他山得我歌雖短聲苦長君不䏻飲湏滿觴申公何在麗澤死又送冥鴻謀稻梁送黄子聞得縣瑞安西都循吏無墨綬宻令忽用為三公仁人遭時乃自見不係官爵汙與隆黄君﨑嶇髪半白得縣吾州滄海東平生經術乆未試今幸小試難為功休聲出自士論衆遺愛見於民力窮如君作吏豈擇便第勿謂難斯令終嗟余欲歸歸未得觀政不在漁樵中逢人每似卓傳傳此道萬古君王同送陳仲孚還里意勝不受暑交深欲忘言子車今日脂我經何時箋卜稼豈無疇頌橘亦有園掛冠特易耳柰何子盛年教授李夢符恵宣聖畫像用韻奉酬一藝心有師尚論襄與䕫一國必有師尚論𬋩與伊信知師道尊分與君父夷吁嗟文王沒斯文屬之誰微言二十篇論次自學而傳之者顔曾其後則子思方當周之衰諸子出恠竒王公各師承一語可觧頥見之擁篲迎不見嚬其眉孟子獨推尊是惟聖之時苟不夲孔氏皆放其淫詞扵是尊孔孟誕作百世師自非戎翟秦孰背此道馳本朝郡為學簿海尸祝之徃徃屈萬乗降升廟庭垂我作暮春堂魯論以自隨扁題落天上鬼遁蛟龍移江山䕶昭囬誰敢或訕嗤中有夫子像来從魯家兒廣文以遺我温厲尚可追吾今得吾師下視衆說卑世世萬子孫永此巢一枝還徐叔子犀帶徐子贈我舊寳犀宣和國工所事治玄玉十截黄四垂厚且半寸徑尺圍方㢘整不刻毫釐金飾諸末柔丹韋寘之止齋光祿離天吴海若不敢窺柰何骨相堪蓑衣自得此帶逢百罹我服黒角二紀餘歲月㡬半蒙蛛絲識與不識皆歔欷恨不披拂来隆墀湖湘老把乗邊麾次第三節登王畿脩門再入留郎闈上皇一見玉色怡闊歩蓬山上拗螭向者所恨今交譏惧瀝肝膽得請歸自意永與漁樵嬉急詔適際濳龍飛誤恩狎至湛露斯古来逾分天不宜百炊未滿萬事非還觀櫝中一解頥吾腰安用爾帶為徐子盛年脩幹支才華不數紛紛兒請以帶去藏待時拖金縣玉未可知招招車騎来何遲苦勿留此令我悲君不見在昔十圍終失之終朝三搋事尤危况我昏睡誰䕶持亦恐夜半神運蛟龍移憶笻杖岷峨山下笻竹杖危者使安衰可壮秦皇漢武窮兵不可得我獨得之今丞相前年有㫖還故園其冬急召朝日邊半歲驅馳數千里頼有此杖常扶顛蒼黄又别脩門去私室無人謹呵䕶夜半雷霆下取将兒呌妻啼留不住我聞丞相下峡時一物無有杖自隨属當晏朝立仗乆憐我弱脛疲拗螭如今歩屧隨衰草十歩趑趄九歩倒假如杖在欲用之山精海怪震怒亦不保君不見杜陵桃竹歌常恐失之君山湖上之風波梓潼使君之贈尚爾耳况自丞相還如何蘭花供夀國舉兄山丹吹出青藜火金蝶窺叢何妸娜朱槿更作猩𫀆紅夸道風人嘗印可詩顔如舜華注舜木槿也沒利從旁粲然笑奄有諸香誰似我素馨蕭然山澤臞至香不數脂粉膄衆芳固自有醖藉要是傍人之庭除何如琉璃千頃水涵碧淤泥不解汙芙蕖幽蘭獨自倚脩竹生来未始受諸觸深知抱此竟安用用多亦豈芙蕖福若以滋味属厭人虀粉此身人不足今夕何夕新風露入秋一雨天西顧止齋有兄永難老止齋之弟愛莫助但以清白傳之萬子孫歲供蘭花羙無度東陽郭希呂山園十詠幽人有遐心蔀屋涵澄空况復得此山心事與境同右清曠亭一壑亦易得安得桂林林道人偶見之不是歲月深右桂壑兩崖束青天中有月皎皎乍可謂月低不可謂天小右月峽促膝有仙凡爛柯無小大誰知桃源人不在秦晋外右小爛柯嘗聞鳳棲梧梧老鳳未棲令我日佇立不知月東西右傾月雲以無心出雲歸亦何心樵牧窺其藏妄意此阻深右閟雲關清曉閱草木各具天一水安用學飡玉将以蘄不死右玉泉㳙㳙自空来霏霏復不見安得自尤物使我耳目亂右飛雪凭欄時獨立萬象皆見前若非着眼髙亦是天一偏右壼天閣􅑄釡吾巳溉吾纓亦無塵窪石以潴之恐有抱甕人右石井送郭希吕我門閉重重我徑阻且深梅花獨相依聊以慰我心羙人從何来﨑嶇自幽㝷亦於琢氷中而和南風琴莱甲尚可羮新蒭足同斟不知歲巳華歸興生霜砧欲别復少住棲烏歸月林客去鳥翾飛落花滿墻隂水仙花江梅丈人行歲寒固天姿蠟梅微着色標致亦背時胡然此柔嘉支本僅自持廼以平地尺氣與松篁夷粹然金玉相承以翠羽儀獨立萬槁中氷膠雪垂垂水仙誰強名相宜未相知刻畫近脂粉而况山谷詩吾聞抱太和未易形似窺當其自英華造物且霽威平生恨剛𥚹未老齒髪衰掇花寘膽瓶吾今得吾師止齋曲廊𥘉成但酒勝如水但花勝如草小廊曲通幽竹椽亦良好止齋十數間足以便衰老簷低逺風露地窄易汛掃淺溪浮薄觴短屏糊舊藁著書僅玄易過客多韋縞於中榜退思誰其諒深抱吾思亦已晚吾退盍更早懐㢤彭澤令仰止啇山皓維淵有潜龍維岳有藏寳煌煌暮春堂三字落穹昊昭囬際南極鎮撫及東島胡然迺在斯夙夜惧不保鬼神無世情呵護必有道次沈儉夫求花木韻我意何不樂我顔復何㥏止齋有新畬耕犢甫已繭止齋有溪水釣席隨所展兩山夾精舎佳䖏迫廬峴朋来盡名流燕坐皆勝踐頺然止齋翁心故不可轉厭書或窺園乗興時陟巘日月之蔽虧木隂自幽顯雨露之宻踈草色自深淺翁乎一觴詠𥘉不着姝孌易老探醇駁風騷較寛𥚹眠食雖甚佳病患盍加勉謗篋况所招訟缿那䏻辨扵焉更悟入豈但苟排遣寄言子沈子所欲果何件葭豕来春田冥鴻脫秋獮谷蘭猶見紉月桂不可搴慕逺失之近求多得常鮮請以壮縣才從兹益懐卷深居勿近市隘巷莫容輦有花門擁篲無花地生蘚嘗試玩喧寂何者是眞舛舊學枉初心新㓛費重研何如過止齋我亦精文選春晚書懐二首奉簡陳益之百舌喜太甚杜䳌恨何深睍睆斯黄鸝律中宫之音物情自不齊天運𥘉無心道人獨領㑹杖藜立芳隂百卉得雨露華滋巧相娱但知說姚魏河洛竟何如我方悟吾生箋經未成書安得小學師從之注虫魚題沈仲一所藏周氏羣公書帖紛紛世上如落花東風即入西鄰家要亦餘事吾何嗟斯人故國之喬本枝葉胡然亦流落吾生巳晚講聞熟見欲堕淚那忍讀古来道徳功名上傳世不曾縁物重君不見人間秦漢鼎彛銘與頌子子孫孫永寶用贈章虞卿并序虞卿相別久意其困塲屋舍而它之也忽以書說来余喜甚留數日晤語不但說書諸學無不渉也又愛之甚欲作一詩亟稱之輙不就虞卿促歸姑贈數語章子一别二十年此来衘䄂書一編自出巳意說百篇至說五誥尤愕然我今萬事付幽屏是書揷架漫不省子之書意吾巳領且探梅花試湯餅題僧法傳為沈仲一畫聴松圖古松不知㡬千年直幹欲上干青天樛枝下與人世接冷風過之萬壑喧猿驚鶴恠樵牧遁百鬼愁絶誰傍邊紛紛海内絲竹耳何䖏縹緲来臞仙整襟拱聴移永日置琴弗頋僮欹眠松風有際意無盡荘騷不數惟易玄嗟乎深山大澤松不乏斯人徃徃千載之陳編筆端若有夜半力一日忽在軒楹前止齋虚靜對立久晴昊亦為生蒼烟畢宏韋偃骨已朽畫工一世脂粉便北湖居士安得此奄有二子雲山傳北湖居士雲山傳吾詩孰與杜老起九原送畫僧法傳雪菴禅師從瑾之弟子問訊雪庵今何如子来搔首更踟蹰時扵戯墨窺禪恱尚想家傳及緒餘曾點尔各言尔志陶濳吾亦愛吾廬誰人解冩二歸意欲放風㠶還撡祛題瑞安宰朱元成乃祖雲壑莊圗功成不受冨貴汙䡖舟扁然下五湖至今風流在姑蘇我復見此雲壑圗兩坡喬木樛相扶殘山剰水千里餘天際未知何有無一葦横絶雙風蒲楊花春岸秋蓴鱸在在着此儒仙臞世無宗師貌不如誰其嗣之吾大夫詠梅分韻得蘂字惜樹湏惜枝看花湏看蘂枯瘦彂纎穠况此具衆羙千林堕黄埃數點昭青泚誰知霜雪深天意欲玉女送蕃叟弟赴江西帥幕分韻得獨字生平未省友松竹愛言從䆠輸幽獨子也諸矦老賔客襆𬒳僅縁升斗禄為問江神何世情霽月光風送㠶幅天意元来向事功謹母遐心自金玉皷琴行送許深父同知𬒳詔赴闕并序廼季秋朔旦上御祥琴公亦始免䘮盖五日而趣召至揆路虚左以待公者三年矣盛事盛事𥘉某識髙宗所賞之琴僧扵西湖晚入太學髙宗晏居殊宮而曾亦希得進見數與之逰歸琴一張寳之有年今覩盛事而不敢愛持以贈別故作是詩以道其所從来因禱以爲辭焉伯牙非不善鼔琴指下能冩山髙而水深亦有師曠號精絶蜚雪白晝爲重隂吾琴不以與二子二子不過衰季愁嘆而悲吟后䕫安在九嶷逺南風不競鳳鳥瘖恭惟髙宗復古殿得此凈洗禁昧朱離任一鼔朝綱日井井再鼔邊拆秋沉沉桑麻萬里皆桉堵笙歌三紀無沾襟橋山遺此歲月侵何時雅頌得所籥不僭寳藏豈愛五重玉市價敢論雙南金公歸舊隠三霜砧天子恭黙思啇霖君臣祥琴適相際使者十軰来駸駸白麻巳草弄印久端揆虚左誰當今我抱此琴病山林不如送公西歸調釡􅑄但願為作南風音上以對揚髙宗中興之大業下以追還虞舜萬國之歡心送徐一之客贛上兼簡贛守薛象先清冰一叚出萬壑越玉五重陳兩廂羙人去作諸侯客㡬年薖澗籌行蔵一之自號所居曰薖潤繫舟夷猶暮春堂細雨冥冥烟樹蒼竹萌梅實盡此觴别恨豈但山川長章貢分流合江水西風為我送雙鯉休言相憶強加餐報道吴㠶何日起止齋先生文集卷之四
