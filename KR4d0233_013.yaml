front:
  text: 止齋先生文集卷之十三
  hash: sha256:88a39ee96e9ddbb85f5eed78374534742f65e74ef65e170a84316aaca8af5d5a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_013-1a}
body:
  text: 外制和州防禦使殿前副指揮使郭杲除耳州觀察使敕古者六軍皆以卿将元戎十乗有瑲䓤珩二雅誦之庸示光寵矧我中權可無異數具官某鷹揚之勇輻湊之謀山西将家今纔一二醻劳屯所晉長周廬訓我群騶壮我中壘累歲於此士聴無譁日者貝胄三十来閱庭内舍矢如破可以即戎朕圖爾功冝及懋賞枚数男爵峻極廉車禮均從班視古卿士是用命汝盖周舊章光對明恩益思忠報無使行狩專羙車攻無使止居遺恨祈父則予以懌僉曰汝諧可武略大夫侍衞歩軍都虞候兼權侍衞馬軍司職事閻仲特轉右武大夫忠州刺史勅日者朕重冬狩之役又不欲乏武事也而為簡之師試諸廷内於環列得師焉於歩旅又得帥焉皆可以即戎朕甚嘉之具官某久於行陣積有戦多枚數壮士莫與儔伍觧朐山之圍殿符離之返至今言之令人矜奮頃自遴選涖我師徒百夫千夫各習其教徃徃營壘廬次之間無囂塵也扵是閱也介胄堅好旌麾光明坐作進退動中尺度朕惟勇爵以横行為右階之最以刺郡為遥領之始悉不汝吝用賞懋㓛其對隆恩益殫忠力可閤門㸔班趙弼奏祖故寕逺軍節度使侍衞馬軍都指揮使贈大尉趙樽累遇郊祀登極未曽陳乞加贈特贈開府儀司三司敕朕永懐将閱克勤王家宣勞實多贈典有闕具官某忠於許國勇不顧身能以衞社稷之心効於死封疆之力戰自束髪觀者汗顔日者欲澄冗員甞第元從閱實数千人之衆定為十三䖏之功爾獨最聞朕尤嘉奨然論報自昔雖峻極於武階而訟言有孫尚少虧扵褒律是用申命幽壤視儀上台以昭我不吝賞之功以成爾無遺恨之羙抑使介士奮於戎行可朝散大夫權刑部尚書京鏜兼侍講四年八月二十三日勑朕與賢士大夫切磋經誼之日久矣而今加意於春秋春秋固為夷夏作也盖聞在漢或申復讎之義或庶㡬止戈之武而皆有大功號稱七制㫁之經意孰得孰失朕将安所取此而誰與茂明之也具官某簡在法從蔚為名臣修聘北庭非禮勿聴徃釐西事無言不酬斯可謂据古而通今者矣進之路朝重席以待其為朕深探遺經之指與漢二君行事以佐取舎爾信不為章句學者而朕頋不能尊所聞歟徃其懋㢤以副延竚可亦使人人暁然知朕嘉與之意則繼此盡言不諱矣尚殫厥心以副延竚可湖南提刑孫逢吉奏邵州獄囚死者二十餘人守臣湖澄持展二年磨勘敕昔在三朝毎歲盛夏以一札賜郡長吏為奸獄丁寜也自長吏不奉此詔而吾民痩死者滋衆爾某守邵亦以獄囚多死見察於部使者毋乃非朕寄元元之意乎貶損年劳以示薄罰繼此領州無怠臬事可文林郎邵州錄事參軍柴璿脩職郎邵州司理參軍李邠獄囚多死各特䧏一資敕具官某爾為獄官而不省囚疾苦至多瘦死非所謂士師不䏻治士者歟其鐫一階以警怠事可大尉定江軍蓈度使興州駐劄御前諸軍都統制兼知興州吴挺守本官致仕敕圖任世臣盡護蜀将貔貅十萬不從中覆盖五六十年於此矣此意安在㢤而欲致其事耶具官某性有忠勇之資學有韜鈴之素寛我西顧賢於長城假以數年庶底丕績而一旦以疾来諗碩上夫将軍印綬此朕所以屏奏不省也雖然誦詩至於勤㱕勞還詠歎辛苦則古者遣将數日即休未有以獨賢久勞若爾然者朕豈得不動扵心乎姑徇忱辭使自休養若属有疆埸之事强爲朕起何以報我爾其勿忘可故太尉定江軍節度使興州駐劄御前諸軍都統制兼知興州致仕吴挺特贈少保敕朕誕膺聖緒渇想賢劳方分託重之權尚阻勞還之禮眷惟三世毎興西㱕溉釡之懐胡不百年遽有東首拖紳之恨可爲震悼何以追荣具官某爲今价藩視古名将夲之以鷹揚之勇濟之以輻輳之才越在江源而不忘宗海之心既安蜀道而常為得隴之計是用倚以大事付之全師永惟王室之中興皆有世臣而後濟維周復古則召公是佀之功維漢御天則耿氏獨隆之力期爾晏歲對于昔人曽諗疾之亡何而吿哀之已至朕方深念莫起於九原國有常儀率加之二等肆頒渙渥以慰沉冥晉陪亞保之班配食先王之廟噫有以勇爵至於聯左棘之華雖云愍章足以示前茅之勸可持服前武功大夫祁州團練使吴曦特授濠州團練使起復敕具官某有金革之事測年之䘮無辟自伯禽以来未之有改而况爾䂀世為将乎移孝為忠朕所以强起汝也又况蜀師十萬聴命爾家西陲晏然于今五紀方圖前烈冝及後人則脫爾於寄祿之階授爾以戎練之任豈以為利其毋固辭可提舉江州太平興國宫郭棣授利州觀察使致仕敕憫勞将帥卑以真祠尚復抗章勇於忘祿重違雅志俾遂㱕休爰進崇階以勸廉退具官某奮自将種卓有俊聲荐更轅門晉尹環列累歲於此六軍不譁方篤邦交久無疆事鬪士雖倍戰功不多然中權屹然大敵知懼繄卿之力簡在朕心所兾壮猷不忘王室胡為觧組遽此垂車豈非以行百里者末路之難而三世功名道家所忌乎勉從忱請良咈眷懐尚服寵荣益綏夀祉可故利州觀察使致仕郭棣特贈寕逺軍承宣使敕聴垂車之請亦旣永嘆聞易簀之言可勝遐想冝舉恤典以醻舊勞具官某自束髪之𥘉有褁尸之志方其賈勇於宣威沙漠之間竟爾收聲當偃伯靈臺之後然而我有萬乗如周畿兵我有千廬如漢中壘舉以副托究其設施歴年彌長課効為最徃者以厭直之請踐更于邊雖分州符亦以寄重反即祠館從其憚煩曽鳴劔之未酬何挂冠之巳决朕方有感徳非忘杖杜之詩今頋不然乃是迫桑榆之景覧此遺奏為之䀌傷爰錫使名視唐留務以華身後盖國舊章其尚欽承用自寛慰可耶律适哩致仕敕有能厭氊毳之習蹈不測来㱕我可謂壮士矣胡為諗疾欲自便乎具官某耻事朔庭義不攜漢觀光中國誓将㓕胡盖丨夀皇之所寵嘉而朕待之勿替者也夫鳴劒之志未酬而桂冠之請巳决豈其以兩國方歡賈男不售将退䖏以自娱睱乎抑膂力既愆自視非昔人而不復感槩然也不然果疾病耶重違忱請聴致爾事若以疾辭則豈庸釋可耶律适哩贈官勅桂冠有請良惻余衷華壙有恩盖綏爾後具官某以幽燕任俠之氣懐江漢朝宗之心萬里来㱕甚欲宣威於沙漠而兩君為好適當偃伯於靈䑓竟爾收聲至於賫恨盖聞華夷之分春秋所嚴有能擇衣冠於介鱗之間而頋執干戈於社稷之役眷此壮志令人永懐爰䟽錫命之封庸示飾終之典尚歆殊渥以妥英䰟可正議大夫充顯謨閣待制提舉江州太平興國宫陳峴磨勘轉正奉大夫敕夫循次非所以待劳能也計年非所以䖏法從也而有司以告重違舊章冝有命書且見明陟具官某以名臣之子自託於儒主以夕郎之官踐更於州組奉祠累歲益見靖共序進一官曽非特典朕不敢廢姑慰永懐可合州赤山縣多山至道觀冲妙真入祈禱感應加封冲妙靈應真人敕具某神朕雖不合祠官祝釐專郷獨羙至四方長吏有為吾民請曰某山川之神䏻恵其一方則褒崇之典朕靡愛焉以庶㡬古蜡亘神之義今蜀部使者来言爾神恵及闔境求之掌故則建炎之所表章也爰錫命書申衍稱號所以寵嘉神貺以從民欲者何如㦲尚終恵之俾世世享可潼川府中江縣靈威廟善利侯祈禱感應加封善利敷濟侯敕具某神朕雖不令祠官祝釐􅌹郷獨羙至四方長吏有為吾民請曰某山川之神䏻恵其一方則褒崇之典朕靡愛焉以庶㡬古蜡百神之義今蜀部使者来言爾神恵及闔境肅然古祠前脩所敬吾民其嘉頼不忘也爰錫命書申衍稱號所以寵嘉神貺以從民欲者何如㦲尚終恵之俾世世享可盱眙軍通判䧏一官敕具官某爾為通守適掌北門之管姦民犯禁而莫之禦頋欲㱕罪於徼吏可乎其鐫一秩以為不事事之戒可武節大夫權發遣郢州任世安特轉一官再任敕具官某徃時三邊吏不數易滿歲無虞則増秩以寵之盖自建隆以来未有改也今爾乗障日有能聲爰進新階仍紓舊組爾其益固吾圉以訖外庸杖杜勤㱕之詩朕豈忘之乎可從義郎權知思州田祖嚴持轉一官敕具官某昔爾以㱕地進秩而有司繆誤仍年勞之舊貫於焉正名以示懋賞其服今命益見寵綏可履正大夫奉國軍承宣使提舉佑神觀鄧從訓主管國信所任滿無違闕特授宣政大夫敕交鄰之禮於今為重自束帶與賔客言至於凢執事皆所以覧示逺人以中國之有體也具官某昨長内庭甞發贄幣竟以明習曾無忒違隣好不渝亦繄爾力醻劳滿歲懋賞崇階蓋國舊章朕豈汝吝可朝散郎守司農少卿詹體仁除太常少卿十月三日敕具官某奉常惟禮樂是司而去古浸逺放逸尚多非得愽物洽聞學有根㩀者未易輕卑也爾少明經術務為有用探賾索隱耻一物之不知總餉之久盖已由郎省而貳大農矣召對雍容効忠無隱其為朕典禮樂之事鍾皷玉帛抑末也尚求其本而釐正之可朝散大夫尚書户部員外郎趙謐除軍噐監兼權郎中十一月十八日敕具官某戎監之設本以嚴飾武備而休兵歲久繕脩之職各有司存長貳亦惟揔其凢而巳以爾舊弼之孫克自抑畏久在郎省能寡悔尤序進為長仍攝民曺徃其祗欽無替于舊可朝請大夫起居郎兼玉牒所檢討官兼權中書舎人樓鑰除中書舎人十二月二日敕夀皇𥘉䇿在廷之士盖極一時之選矣朕閱名籍得為相臣者二人焉樞臣者一人焉從臣而下以聲績著見者迨不可枚数也具官某於是時甞褎然為舉首而偶不中有司之度然至今海内士所樂道議論文章風流藴籍則未甞不在稱首也間者旁招時望寘之本朝爾以攝官属筆能道朕徳意與其人才羙之所冝文字之上下簡書之長短皆足用勸而僉言不同徃徃不奉吾詔仁者之勇見於封章肆用命爾爲真詞掖除書之出國人皆曰賢詩不云乎假以溢我我其收之朕於是蒙夀皇得人之福矣昔者鄭爲辞命終属國僑唐掌帝制實先韓愈爾其懋哉稱此優異可額内翰林醫痊李九齡轉翰林醫効敕具官某天官之属六十而醫命士二十有八人周家之重醫也如此矧爾服勞有以自見進之二秩視周命士徃服明恩毋怠爾事可判太史局吴澤荆大聲劉孝榮周端友職事不謹各䧏一官敕具官某等東方未明之作挈壺氏所以刺朝廷也朕夙興待旦而五夜之漏聲不肅是誰之咎歟各鐫一官敬共朝夕母以爲星官暦翁而弗汝察也可秀州海塩縣陳山龍王顯濟廟神母慶善夫人加薦福二字敕某神母朕既從二千石之言宏賁二子之祠維爾䏻與而子共福吾民郡人推本所自而廟食之可無寵嘉申衍稱號以大慰民欲乎可賜進士出身宣教郎趙善防係濮安懿王近属更轉一官敕具官某䇿士于庭而吾属籍有以文克列于丙科朕既異焉而問諸宗人則於濮園為近抑可嘉巳申命一官以勸胄子爾其懋哉務自著見可宗子顯夫量試不中年四十以上特𥙷承信郎敕某國家所以待属籍至矣不得雋於進士則有量試不得雋於量試則有免試皆欲使之齒仕版習吏事也爾其勉哉以稱朕意可量試中宗子汝弼等八十一人𥙷官敕某等凡有司考校之科甚嚴宻也而獨寛於量試宗子盖欲使之齒仕版習吏事稍渉於文墨而不求其備爾等盍對明恩思所以自勉哉可合格取應宗子時信等四十二人授官第一名𥙷承節郎餘𥙷承信郎敕某等有司考試之法至嚴宻也而獨優於宗室子夫既闊畧以取之而授官與寒畯等則非所以示公姑属右銓以湏噐使可四川宗子師說等十人趂赴殿試不及並特𥙷承信郎敕某等爾以宗黨越在西州甞得雋於有司而道阻且長弗獲與親䇿之選置而弗録朕心惻焉亦授以官庸示篤叙爾其懋㢤可宗子師鈜量試不中依近降指揮年四十以上特𥙷承信郎展三年出官敕某有司考試之法至嚴宻也而獨優於宗室子夫既優矣而猶不應令徒以强仕予之𥘉官然必使為三年之淹而後筮仕用示篤叙不為苟私可宗子汝璺對䇿中間全冩御題首尾各用一段湊成特䧏一官推恩𥙷承信郎敕具官某䇿士於庭而無以對冝不在第中以爾属籍子而不求其備始命以官亦可謂茂恩矣可廣東提刑李信甫奉朝奏大夫通判徳慶府權英州張公蓋失䧟官錢科擾民户特䧏一官放罷永不得與親民差遣敕具官某嶺表以去廷逺而吏不自愛徃徃淪胥而為欺削爾一秩且不得與扵民社之寄苟自愛者継此尚少懲乎可忠訓郎趙湧在任不職南劔守臣楊祐按罷輒敢伏闕妄論守臣特䧏一官仍押送寄居泉州拘管敕具官某爾以属籍試吏不自貴愛而見劾於州家亦既虧吾教矣詣闕自䟽復繆失實鐫一官俾爾省循可四川制置丘崈奏承直郎知叙州慶符縣魏良心侵刻夷人又䡖入夷囤致殺死廵檢程仲乾降一官放罷敕具官某夷人畏廉而服威重爾為邊縣不足於斯二者而致吾疆吏於死地免官鐫秩是不謂之寛典乎可知成都府丘崈奏從政郎錄事參軍史定之不親蒞獄致囚自刎死降一官放罷敕具官某夫為獄掾而弗躬弗親幽枉多矣囚致於自盡特其甚較著彰彰者也免官鐫秩是不謂之寛典乎可文林郎㜈州浦江縣丞趙大亨不遵依提刑司差委推勘公事輒申任滿離任降一官敕具官某士而不事事是欲素餐也爾方丞縣而再却憲臣之檄以自擇便豈非不事事歟按章来上姑鐫一秩繼今知懼斯可從政可知萬州季圭奏脩職郎萬州司理參軍向紹祖獄囚繫死降一資放罷敕具官某爾為獄官而不省囚疾苦至於堕指至於死而不以告豈非所謂士師不能治士者歟其鐫一階以警怠事可止齋先生文集卷之十三
