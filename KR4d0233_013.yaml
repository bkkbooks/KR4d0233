front:
  text: 止齊先生文集卷之十三
  hash: sha256:d28455ba277cfcf5f5cf28238bbae3a1b3af51cb8cae912399fb9aad7b8565bd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_013-1a}
body:
  text: 外制和州防禦使殿前副指揮使郭杲除耳州觀察使敕古者六軍皆以卿將元戎十乘有瑲䓤珩二雅誦之庸示光寵矧我中權可無異數具官某鷹揚之勇輻湊之謀山西將家今才一二酬勞屯所晉長周廬訓我群騶壯我中壘纍歲於此士聽無譁日者貝胄三十來閲庭內舍矢如破可以即戎朕圖爾功冝及懋賞枚數男爵峻極廉車禮均從班視古卿士是用命汝蓋周舊章光對明恩益思忠報無使行狩專美車攻無使止居遺恨祈父則豫以懌僉曰汝諧可武略大夫侍衛步軍都虞候兼權侍衛馬軍司職事閻仲特轉右武大夫忠州刺史敕日者朕重冬狩之役又不欲乏武事也而為簡之師試諸廷內於環列得師焉於步旅又得帥焉皆可以即戎朕甚嘉之具官某久於行陳積有戰多枚數壯士莫與儔伍解朐山之圍殿符離之返至今言之令人矜奮頃自遴選涖我師徒百夫千夫各習其教往往營壘廬次之間無囂塵也于是閲也介胄堅好旌麾光明坐作進退動中尺度朕惟勇爵以橫行為右階之最以刺郡為遙領之始悉不汝吝用賞懋㓛其對隆恩益殫忠力可閣門看班趙弼奏祖故寧逺軍節度使侍衛馬軍都指揮使贈大尉趙樽纍遇郊祀登極未曽陳乞加贈特贈開府儀司三司敕朕永懷將閲克勤王家宣勞實多贈典有闕具官某忠於許國勇不顧身能以衛社稷之心效於死封疆之力戰自束髮觀者汗顔日者欲澄冗員嘗第元從閲實數千人之衆定為十三處之功爾獨最聞朕尤嘉奬然論報自昔雖峻極於武階而訟言有孫尚少虧于褒律是用申命幽壤視儀上台以昭我不吝賞之功以成爾無遺恨之美抑使介士奮於戎行可朝散大夫權刑部尚書京鏜兼侍講四年八月二十三日勑朕與賢士大夫切磋經誼之日久矣而今加意於春秋春秋固為夷夏作也蓋聞在漢或申復讎之義或庶幾止戈之武而皆有大功號稱七制斷之經意孰得孰失朕將安所取此而誰與茂明之也具官某簡在法從蔚為名臣修聘北庭非禮勿聽往釐西事無言不酬斯可謂据古而通今者矣進之路朝重席以待其為朕深探遺經之指與漢二君行事以佐取舍爾信不為章句學者而朕顧不能尊所聞歟往其懋哉以副延竚可亦使人人曉然知朕嘉與之意則繼此盡言不諱矣尚殫厥心以副延竚可湖南提刑孫逢吉奏邵州獄囚死者二十餘人守臣湖澄持展二年磨勘敕昔在三朝每歲盛夏以一札賜郡長吏為奸獄丁寧也自長吏不奉此詔而吾民瘦死者滋衆爾某守邵亦以獄囚多死見察於部使者毋乃非朕寄元元之意乎貶損年勞以示薄罰繼此領州無怠臬事可文林郎邵州録事參軍柴璿修職郎邵州司理參軍李邠獄囚多死各特降一資敕具官某爾為獄官而不省囚疾苦至多瘦死非所謂士師不䏻治士者歟其鐫一階以警怠事可大尉定江軍蓈度使興州駐劄御前諸軍都統制兼知興州吳挺守本官致仕敕圖任世臣盡護蜀將貔貅十萬不從中覆蓋五六十年於此矣此意安在哉而欲致其事耶具官某性有忠勇之資學有韜鈴之素寬我西顧賢於長城假以數年庶底丕績而一旦以疾來諗碩上夫將軍印綬此朕所以屏奏不省也雖然誦詩至於勤㱕勞還詠歎辛苦則古者遣將數日即休未有以獨賢久勞若爾然者朕豈得不動于心乎姑徇忱辭使自休養若屬有疆埸之事强為朕起何以報我爾其勿忘可故太尉定江軍節度使興州駐劄御前諸軍都統制兼知興州致仕吳挺特贈少保敕朕誕膺聖緒渴想賢勞方分託重之權尚阻勞還之禮眷惟三世每興西㱕溉釡之懷胡不百年遽有東首拖紳之恨可為震悼何以追榮具官某為今價藩視古名將夲之以鷹揚之勇濟之以輻輳之才越在江源而不忘宗海之心既安蜀道而常為得隴之計是用倚以大事付之全師永惟王室之中興皆有世臣而後濟維周復古則召公是似之功維漢御天則耿氏獨隆之力期爾晏歲對于昔人曽諗疾之亡何而告哀之已至朕方深念莫起於九原國有常儀率加之二等肆頒渙渥以慰沉冥晉陪亞保之班配食先王之廟噫有以勇爵至於聯左棘之華雖云愍章足以示前茅之勸可持服前武功大夫祁州團練使吳曦特授濠州團練使起復敕具官某有金革之事測年之喪無辟自伯禽以來未之有改而况爾䂀世為將乎移孝為忠朕所以强起汝也又况蜀師十萬聽命爾家西陲晏然于今五紀方圖前烈冝及後人則脫爾於寄祿之階授爾以戎練之任豈以為利其毋固辭可提舉江州太平興國宫郭棣授利州觀察使致仕敕憫勞將帥卑以真祠尚復抗章勇於忘祿重違雅志俾遂㱕休爰進崇階以勸廉退具官某奮自將種卓有俊聲荐更轅門晉尹環列纍歲於此六軍不譁方篤邦交久無疆事鬪士雖倍戰功不多然中權屹然大敵知懼繄卿之力簡在朕心所兾壯猷不忘王室胡為解組遽此垂車豈非以行百里者末路之難而三世功名道家所忌乎勉從忱請良咈眷懷尚服寵榮益綏夀祉可故利州觀察使致仕郭棣特贈寧逺軍承宣使敕聽垂車之請亦既永嘆聞易簀之言可勝遐想冝舉恤典以酬舊勞具官某自束髮之𥘉有褁尸之志方其賈勇於宣威沙漠之間竟爾收聲當偃伯靈臺之後然而我有萬乘如周畿兵我有千廬如漢中壘舉以副托究其設施歷年彌長課效為最往者以厭直之請踐更于邊雖分州符亦以寄重反即祠館從其憚煩曽鳴劔之未酬何挂冠之巳决朕方有感德非忘杖杜之詩今顧不然乃是迫桑榆之景覽此遺奏為之䀌傷爰錫使名視唐留務以華身後蓋國舊章其尚欽承用自寬慰可耶律適哩致仕敕有能厭氊毳之習蹈不測來㱕我可謂壯士矣胡為諗疾欲自便乎具官某耻事朔庭義不攜漢觀光中國誓將滅胡蓋丨夀皇之所寵嘉而朕待之勿替者也夫鳴劒之志未酬而桂冠之請巳决豈其以兩國方歡賈男不售將退處以自娛睱乎抑膂力既愆自視非昔人而不復感槩然也不然果疾病耶重違忱請聽致爾事若以疾辭則豈庸釋可耶律適哩贈官敕桂冠有請良惻余衷華壙有恩蓋綏爾後具官某以幽燕任俠之氣懷江漢朝宗之心萬里來㱕甚欲宣威於沙漠而兩君為好適當偃伯於靈臺竟爾收聲至於賫恨蓋聞華夷之分春秋所嚴有能擇衣冠於介鱗之間而顧執干戈於社稷之役眷此壯志令人永懷爰疏錫命之封庸示飾終之典尚歆殊渥以妥英魂可正議大夫充顯謨閣待制提舉江州太平興國宫陳峴磨勘轉正奉大夫敕夫循次非所以待勞能也計年非所以處法從也而有司以告重違舊章冝有命書且見明陟具官某以名臣之子自託於儒主以夕郎之官踐更於州組奉祠纍歲益見靖共序進一官曽非特典朕不敢廢姑慰永懷可合州赤山縣多山至道觀冲妙真入祈禱感應加封冲妙靈應真人敕具某神朕雖不合祠官祝釐專鄉獨美至四方長吏有為吾民請曰某山川之神䏻惠其一方則褒崇之典朕靡愛焉以庶幾古蠟亘神之義今蜀部使者來言爾神惠及闔境求之掌故則建炎之所表章也爰錫命書申衍稱號所以寵嘉神貺以從民欲者何如㦲尚終惠之俾世世享可潼川府中江縣靈威廟善利侯祈禱感應加封善利敷濟侯敕具某神朕雖不令祠官祝釐􅌹鄉獨美至四方長吏有為吾民請曰某山川之神䏻惠其一方則褒崇之典朕靡愛焉以庶幾古蠟百神之義今蜀部使者來言爾神惠及闔境肅然古祠前修所敬吾民其嘉賴不忘也爰錫命書申衍稱號所以寵嘉神貺以從民欲者何如㦲尚終惠之俾世世享可盱眙軍通判降一官敕具官某爾為通守適掌北門之管姦民犯禁而莫之禦顧欲㱕罪於徼吏可乎其鐫一秩以為不事事之戒可武節大夫權發遣郢州任世安特轉一官再任敕具官某往時三邊吏不數易滿歲無虞則增秩以寵之蓋自建隆以來未有改也今爾乘障日有能聲爰進新階仍紓舊組爾其益固吾圉以訖外庸杖杜勤㱕之詩朕豈忘之乎可從義郎權知思州田祖嚴持轉一官敕具官某昔爾以㱕地進秩而有司繆誤仍年勞之舊貫於焉正名以示懋賞其服今命益見寵綏可履正大夫奉國軍承宣使提舉佑神觀鄧從訓主管國信所任滿無違闕特授宣政大夫敕交鄰之禮於今為重自束帶與賔客言至於凡執事皆所以覽示逺人以中國之有體也具官某昨長內庭嘗發贄幣竟以明習曾無忒違鄰好不渝亦繄爾力酬勞滿歲懋賞崇階蓋國舊章朕豈汝吝可朝散郎守司農少卿詹體仁除太常少卿十月三日敕具官某奉常惟禮樂是司而去古浸逺放逸尚多非得博物洽聞學有根據者未易輕卑也爾少明經術務為有用探賾索隱耻一物之不知總餉之久蓋已由郎省而二大農矣召對雍容效忠無隱其為朕典禮樂之事鍾鼓玉帛抑末也尚求其本而釐正之可朝散大夫尚書户部員外郎趙謐除軍器監兼權郎中十一月十八日敕具官某戎監之設本以嚴飾武備而休兵歲久繕修之職各有司存長二亦惟揔其凡而巳以爾舊弼之孫克自抑畏久在郎省能寡悔尤序進為長仍攝民曺往其祗欽無替于舊可朝請大夫起居郎兼玉牒所檢討官兼權中書舍人樓鑰除中書舍人十二月二日敕夀皇𥘉䇿在廷之士蓋極一時之選矣朕閲名籍得為相臣者二人焉樞臣者一人焉從臣而下以聲績著見者逮不可枚數也具官某於是時嘗褎然為舉首而偶不中有司之度然至今海內士所樂道議論文章風流藴籍則未嘗不在稱首也間者旁招時望置之本朝爾以攝官屬筆能道朕德意與其人才美之所冝文字之上下簡書之長短皆足用勸而僉言不同往往不奉吾詔仁者之勇見於封章肆用命爾為真詞掖除書之出國人皆曰賢詩不云乎假以溢我我其收之朕於是蒙夀皇得人之福矣昔者鄭為辭命終屬國僑唐掌帝制實先韓愈爾其懋哉稱此優異可額內翰林醫痊李九齡轉翰林醫效敕具官某天官之屬六十而醫命士二十有八人周家之重醫也如此矧爾服勞有以自見進之二秩視周命士往服明恩毋怠爾事可判太史局吳澤荆大聲劉孝榮周端友職事不謹各降一官敕具官某等東方未明之作挈壺氏所以刺朝廷也朕夙興待旦而五夜之漏聲不肅是誰之咎歟各鐫一官敬共朝夕母以為星官曆翁而弗汝察也可秀州海鹽縣陳山龍王顯濟廟神母慶善夫人加薦福二字敕某神母朕既從二千石之言宏賁二子之祠維爾䏻與而子共福吾民郡人推本所自而廟食之可無寵嘉申衍稱號以大慰民欲乎可賜進士出身宣教郎趙善防係濮安懿王近屬更轉一官敕具官某䇿士于庭而吾屬籍有以文克列于丙科朕既異焉而問諸宗人則於濮園為近抑可嘉巳申命一官以勸胄子爾其懋哉務自著見可宗子顯夫量試不中年四十以上特𥙷承信郎敕某國家所以待屬籍至矣不得雋於進士則有量試不得雋於量試則有免試皆欲使之齒仕版習吏事也爾其勉哉以稱朕意可量試中宗子汝弼等八十一人𥙷官敕某等凡有司考校之科甚嚴密也而獨寬於量試宗子蓋欲使之齒仕版習吏事稍涉於文墨而不求其備爾等盍對明恩思所以自勉哉可合格取應宗子時信等四十二人授官第一名𥙷承節郎餘𥙷承信郎敕某等有司考試之法至嚴密也而獨優於宗室子夫既闊略以取之而授官與寒畯等則非所以示公姑屬右銓以須器使可四川宗子師說等十人趂赴殿試不及並特𥙷承信郎敕某等爾以宗黨越在西州嘗得雋於有司而道阻且長弗獲與親䇿之選置而弗録朕心惻焉亦授以官庸示篤叙爾其懋哉可宗子師鈜量試不中依近降指揮年四十以上特𥙷承信郎展三年出官敕某有司考試之法至嚴密也而獨優於宗室子夫既優矣而猶不應令徒以强仕豫之𥘉官然必使為三年之淹而後筮仕用示篤叙不為苟私可宗子汝璺對䇿中間全寫御題首尾各用一段湊成特降一官推恩𥙷承信郎敕具官某䇿士於庭而無以對冝不在第中以爾屬籍子而不求其備始命以官亦可謂茂恩矣可廣東提刑李信甫奉朝奏大夫通判德慶府權英州張公蓋失陷官錢科擾民户特降一官放罷永不得與親民差遣敕具官某嶺表以去廷逺而吏不自愛往往淪胥而為欺削爾一秩且不得與于民社之寄苟自愛者繼此尚少懲乎可忠訓郎趙湧在任不職南劔守臣楊祐按罷輒敢伏闕妄論守臣特降一官仍押送寄居泉州拘管敕具官某爾以屬籍試吏不自貴愛而見劾於州家亦既虧吾教矣詣闕自疏復繆失實鐫一官俾爾省循可四川制置丘崈奏承直郎知叙州慶符縣魏良心侵刻夷人又䡖入夷囤致殺死巡檢程仲乾降一官放罷敕具官某夷人畏廉而服威重爾為邊縣不足於斯二者而致吾疆吏於死地免官鐫秩是不謂之寬典乎可知成都府丘崈奏從政郎録事參軍史定之不親蒞獄致囚自刎死降一官放罷敕具官某夫為獄掾而弗躬弗親幽枉多矣囚致於自盡特其甚較著彰彰者也免官鐫秩是不謂之寬典乎可文林郎㜈州浦江縣丞趙大亨不遵依提刑司差委推勘公事輒申任滿離任降一官敕具官某士而不事事是欲素餐也爾方丞縣而再却憲臣之檄以自擇便豈非不事事歟按章來上姑鐫一秩繼今知懼斯可從政可知萬州季圭奏修職郎萬州司理參軍向紹祖獄囚繫死降一資放罷敕具官某爾為獄官而不省囚疾苦至於墮指至於死而不以告豈非所謂士師不能治士者歟其鐫一階以警怠事可止齊先生文集卷之十三
