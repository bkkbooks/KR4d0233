body:
  text: 止齋先生文集卷之二十一奏狀劄子轉對論役法劄子臣不肖頃以備員郎官蒙恩賜對嘗奏三劄専論民力之困然熙寧以來生財之害粗及梗槩未敢悉數而玉音嘉奬至于再三退切感激遭際如此繼今可以畢其説矣今者適充轉對之員敢以奏劄數內免役一項先為陛下誦之而因究役法之弊庶幾采擇以救斯民於不勝其病之後所謂免役錢者本以恤民使出錢雇役而逸其力也自罷募戶長而取其錢今隸總制熙寧五年罷十年以其雇錢别樁管紹聖三年再雇建中靖國元年再樁管紹興元年起發九年罷十年月拘收入總制窠名罷募壯丁而取其錢今隸總制熙寧七年罷十年以其雇錢别樁管紹興十二年十月抅牧入總制窠名罷募耆長而取其錢今隸總制熙寧八年罷十年以其雇錢别椿管紹興五年起發九年罷十年九月拘收入總制窠名而又以三分弓手雇錢建炎元年增置弓手二年民戶役錢更增敷三分以贍三年罷紹興五年三月拘收入總制窠名一分寬剩錢二年封椿四年罷政和三年再封樁昭興五年起發九年罷十年六月拘收入總制窠名盡隸總制而又以罷虞候重祿錢宣和三年陳亨伯奏罷五年拘收克糴本乾道四年拘收入總制窠名起發罷諸州曺官當直散從官雇錢宣和五年拘收克糴本罷學事司人重雇錢宣和五年拘收充糴本宣和糴本之類盡隸總制至於官戶不減半役錢建炎二年起催紹興五年起發乾道二年六月拘收依經總制赴南庫在京吏祿在京官員雇人錢在京吏祿每歲下淮南兩州十二路起一萬四千五百貫政和元年每路量添五百貫在京官員雇人錢紹聖元年立一萬貫為額于十四路起發政和四年每路量添三百貫之類又令項起發則免役錢之在州縣者日益少而役人無祿者衆矣夫使民出錢募役而逸其力未為非良法也而反取其錢以贍他用既取其錢以贍他用則必且白著而役法不得不壞何謂役法壞今天下州縣之胥皆浮浪之人而鄉村催科專責之保正長是也以州縣浮浪之人行遣公事蠧民誠甚然未易改也臣不暇論若夫鄊村保正長任催科之責破家蕩産者往往而是獨奈何弗救乎且夫保正長催科非役法也以保甲法亂役法而行之也臣請言役法與保甲法之異臣謹按熙寧四年八月十一日行免役以鄉村第一等人戶分為甲乙丙丁戊五等第二第三等人户分為上中下三等第四第五等人户分為上下二等耆長於第一第二等户輪充一年一替與免户下本年役錢一十五貫文如本村上等人户數少即更於第三等內從上輪充壯丁於第四第五等二丁以上輪充半年一替並不出納役錢戶長於第四等召募有人丁物力者充一稅一替逐料夫盤纒錢五貫文此役法也臣又按熙寧三年三月九日行保甲凡十家為一保選主户有心力者一人為保長五十家為一大保選主戶最有心力及物力最髙者一人為大保長十大保為一都選主户最有行止心力材勇為衆所服及物力最髙者二人為保副保正凡選一家兩丁以上通主客為之謂之保丁此保甲法也役法者五等簿長也保甲法者魚鱗簿是也五等簿者以通縣計之自第一至以其户強弱各自為簿魚鱗簿者以比屋計之自第一都至第幾都不以其户強弱併為一簿各自為簿即第一等之中雖有強弱要不失於上戶第二等之中雖有強弱要不失於中户以其力略相等故其役均併為一簿即或一都之中適多強户則歇役之日長或一都之中適多弱戶則歇役之日短或一都之中適皆弱戶則于其中不得不推排一二以為強户則無復歇役之日以其力相殊絶故其役不均此甚較然矣方行保甲但以機察盜賊而已與免役𥘉不相關熙寧七年始以保丁充甲頭催稅而耆戶長壯丁之屬以次罷募利其雇錢而封樁之法起矣元豐遂著為令以甲頭同大保長催科元豐賦役令諸鄉村主戶每十戶至三十戶輪保丁一人充甲頭並須同大一保催租稅常平等錢嘉祐以前未有此令元祐匆匆復舊隨即紛更紹聖二年二月詳定所言鄉村每一都保保正副外大保長八人其保丁輪充甲頭皆最下戶人既不服事率難集按大保長各二年替冝以都保租稅輸二人分一梲一替而罷甲頭於是催科悉用大保長矣由此言之大保長催科尚非王安石之舊特章厚為之也今士大夫固耻言安石之為人乃若章厚則指為罪魁皆知其殘忍不恤敢於斫喪祖宗深仁厚澤之意而獨世守其刻薄之遺術以為成憲臣實未喻萬古役法一王安石能改之章厚能力行之方今仁聖在上宰輔極天下之選而賢俊滿朝矣謂為無人能斟酌損益以通其變臣亦未喻且今之困民力誠非一事而役害最大中人之家破蕩相繼有以仁聖在上宰輔極天下之選而賢俊滿朝如此乃坐視斯民最大之害持章厚所為者若出於三代之舊而不敢議有輒議者不過付之有司檢坐見條申嚴行下以塞人言臣尤未喻也陛下加憫元元甚於赤子誠不以臣不肖妄論成憲下臣此章令侍從臺諌而下推究其所自來而雜議之要不以保甲法亂役法雖未足以盡寬民力實大惠矣臣不勝拳拳封事紹熙三年十一月臣一介踈逺才不逾衆人而多病早衰齒髮頺變久無榮進清顯之望間者將指湖湘罷弗勝任嘗上奉祠之請乞便醫藥不謂陛下過聽不以臣為不肖歸以畿節留之郎舍賜對便殿𥘉無建明而天顔開懌玉音溫厚曾不數日擢二册府又未幾用以為皇子嘉王府贊讀官極一時儒者之遇臣誠不自意陛下待之甚寵也不勝大懼無以塞遭值之責日夜思念獨有與二三僚友共秉一意為大王道古今父子君臣之際人之大倫天地之正義以成孝敬長恩愛無負任使之意死且不朽蓋嘗讀書至文王世子之記曰文王朝於王季者日三雞𥘉鳴衣服至於寢門外問內侍之御者今日安否何如內侍曰安文王乃喜其有不安則文王色憂行不能正履則必反覆為王誦之曰是可以為法事親若文王則受命作周本支百世功德見於雅頌願王慕之倣之勿以為不可及也至漢戾太子之傳曰親戚之路隔塞而不通太子進不得見上退則困於亂臣獨冤結而亡告則亦必反覆為王誦之曰是可以為戒事親如漢太子則交兵闕下父子不相保而望思歸來之臺天下悲之願王警之懼之勿使萬一有此也賴天之靈社稷宗廟之福而太王姿稟純明嗜好鮮少不自貴倨喜親書生每得僚佐危言極論則深信而不諱忌至若周之所以得則斂袵加敬漢之所以失則嚬蹙不忍聞也邇者主譽日彰人心日附臣與二三人者竊相欣賀以為陛下有子國家無疆之休也今竊有惑焉會慶誕節陛下闕上觴之禮而弗講長至大會陛下復闕稱賀之禮而弗講群臣迫怵妄窺聖意臣固知陛下自違豫以來雖及康復尚弗便於乘輿而怯風霜雖然非所以為訓也何者區區陳説無過口耳之感必不能勝躬行之化泛觀往古無過𥿄上之習必不能如家傳之法今陛下上虧三宮之􅌚而下責小臣陳誼於冡嗣以庶幾寡過則雖怉血誠之忠未見其輔將以逃斧鉞之誅而已楚王有言人之愛其子者亦如余乎陛下以國家無疆之休託在一子冝如何愛之而偶不察夫所以儀刑之道如此顧使講讀皆為空言名曰輔導安用臣等此所以痛惜此舉動非所以為訓也臣以多病早衰齒髮頺變久無榮進清顯之望方申祠請以便醫藥不忍默默昧死為陛下一言以冀省悟伏𥿄流涕不知所云是時夀皇聖政書成巳降指揮十一月十四日進呈忽長至日駕不出宰執以下不勝憂懼是日却付出聖政序內翰李巘獻之所撰也翊日丞相進呈上云可别令人撰入既進入宸翰遂出於是過宫辭免起居舍人申省狀準尚書省劄子備奉聖旨陳傅良除起居舍人某忽拜除命懼不遑居伏念某踈庸之資淺陋之學重以病餘齒髮衰變介在衆俊是為陳人而自再入修門疊冒殊渥甫綴郎曹遂領册府才及半載復有今除且夫侍立記言舉世之所考信直前論事在廷之所觀瞻冒而居之實逾涯分而亦非所以安數竒之迹全靖共之操伏望朝廷特賜敷奏亟寢誤恩以輯公論十二月二十四二省同奉聖旨不允辭免兼權中書舍人申省狀準尚書省劄子三省同奉聖旨陳傅良兼權中書舍人竊以攝官承乏暫時使令力所克堪不當辭避惟是掖垣之職關係非輕蓋辝令不工則不足以發明主德封還不競則不足以慰滿公論苟非其人難以一朝居也伏念某才藻衰落無華國之文志氣銷墮無回天之力若使嘗試為之必見闕誤此所以聞命震懼須至控免而况環觀在廷英俊林立或兼數器才效一官則寢此誤恩改恩改卑他士不惟寬小巳共二之憂亦足成公朝選衆之美伏望朝廷特賜敷奏曲從所乞四年正月十九三省同奉聖旨不允􅌳奏劉煒與監司差遣狀準尚書省劄子節文三省同奉聖旨劉煒首議禁戢私錢今已見效依舊與監司差遣臣寮上言乞賜寢罷二月六日三省同奉聖旨令以次官書行劄付臣須至奏聞者臣竊以劉煒嘗為監司以言罷去今既旬歲循省云久陛下念之再與元來一等差遣此乃朝廷起廢之常典人主棄瑕之美意求之故事前後施行似此非一蓋亦無可爭執者矣獨緣特降批旨稍關事體即與尋常行遣不同此後省所以不無疑惑須至論奏臣愚欲望聖慈特垂天聽收回批旨將劉煒只依常行起廢事例候有闕次隨冝差使如此則雖臣書行而當官之人可以自安不至再有煩瀆且亦以免劉煒煩言滋至之纍謹録奏聞伏候敕旨二月𥘉九日奏入留中􅌳奏刑部大理寺鄢大為斷案狀準中書門下省送到録黃一道節文為刑部大理寺狀吉州奏勘到百姓鄢大為説合已斷人李一討合遊六等各持杖行劫朱三家榖物贓滿按法寺稱其鄢大為準條為絞刑上定斷合決重杖處死二月十四三省同奉聖旨鄢大為依斷令臣書行緣事干人命須至奏聞者臣竊詳上件斷案止以鄢大為所帶劫榖木簷堪以害人定為持仗強盜贓滿五貫合決重杖處死設若不以木簷為杖即計贓須滿十貫方得死罪死生之分在于木簷稱仗不稱仗毫釐之間此不可不謹也臣嘗習此矣在律仗謂兵器杵捧之屬餘條稱仗準此恭惟本朝列聖繼作刑日益輕以為杵棒立文該載未明則犯法者易陷刑者衆於是重立兩條案嘉祐編敕賊盜門其一云應持竹鎗竹杖磚石之類為盜堪以害人者並同持仗之法此謂苟持竹鎗竹杖磚石堪以害人之物而為盜者即為持仗以明但持所須之物為盜不得稱仗矣其一云將鎌簷刀斧之屬於人園林陂野內偷割禾穀𬞞果盜斫柴薪之類元非積聚者并將篙楫盜取空船或持鞭杖偷趂孳畜雖變主知覺但不曽施威力抵拒者依不持仗竊盜法此謂苟持鎌簷刀斧所須之物而為盜即不為持仗以明必是特持堪以害人之物為盜始得稱仗矣上件兩條合為一編載在敕文則有司承用可以參照不至抵牾至於元豐刪修舊敕一時不深求嘉祐以前立法美意輒將上件兩條離為兩門其一條在名例門云諸稱仗者持竹木磚石之類堪以害人者同其一條在賊盜門云諸於城外竊盜無人防守特持所須之具者並為不持仗注云謂採斫須金刃船筏須篙楫負須簷畜須鞭之類蓋自將兩條離為二處即凡用特仗之法只據名例門立文凡用不持仗之法只據賊盜門立文而兩文始不相參照無所斟酌矣兼詳元豐刪定嘉祐敕顛倒本文已失𥘉意謂並同持仗之法改作諸仗者節略數字便成深文謂刪去鎗杖但稱竹木自元豐迄今有司遵用蓋不知重報者幾千人矣今來鄢大為之獄只是布袋并簷即不曽施威力若用嘉祐舊敕即非持堪以害人之物為盜明矣且夫前朝立法夲持所須之物為盜其意非是欲以害人雖斧刃不謂為仗本持堪害人之物為盜其意是欲以害人雖磚石得謂為仗但論其盜有無欲害人之心不計所持是不是堪害人之物原情定罪此春秋之義也又云持仗在外空手入屋罪至死者各減一等即雖持仗若其時不以入室可以減等又云變主知覺但不曽施威力抵拒者並同不持仗即雖持所須之物若其時施威力抵拒可以加等可謂深切著明矣而元豐改作離析敕文今來有司尚循謬誤臣愚欲望睿慈特將鄢大為之罪從未滿十貫條特貸命斷遣仍乞以刑部大理寺擬斷官吏並且免坐失入之罪仍乞將見行條法送刪定所據嘉祐舊敕將兩條刪潤併入賊盜一門以憑遵守臣聞中興之𥘉重修紹興敕令已有指揮用嘉祐舊法故元豐敕多在釐改之科數內持仗一條當時有司偶失參考尚未追正今來若行刪潤𥘉非創新衝改而聖主好生之德公朝從恕之風自今以始益深益厚愚民無知雖似幸免而天聽甚卑冝享其報此臣所以拳拳也所以録黃臣未敢書行謹録奏聞伏候敕旨貼黃或難臣曰嘉祐敕稱以鎌簷刀斧之屬必繼之以園林陂野即若持此物入有人居止之室便得稱仗臣竊謂不然園林陂野固是與有人居止之室相對立文竊詳元敕有持仗入有人居止之室竊盜者依不持仗強盜條定斷之文却無持所須之物入有人居止之室強盜者依持仗強盜條定斷之文以此推見只是辨盜者所持本意安在茍是持堪以害人之物入屋為盜雖竊盜可以加等依強盜條故為之立文苟是持所須之物入屋為盜即雖強盜不可以加等依持仗強盜條故不為之立文以其文之有無曉然明甚伏乞睿照二月十六奏入得旨改斷上嘉王劄子某等皇恐僣越有迫切之懇仰干王聽近者主上車駕再不過官宰執侍從相與論諌至於一再而上意猶豫未決中外惶惑計無所出獨以為能贊乘輿之決為主上言此者莫如中宮能通宮禁之情為中宫言此者莫如大王又以某等忝為潦佐辱知最深亦冝為大王言此以成父子之盛德迫於公論不容隱默某等竊謂父子之愛根於天性假如主上稍惑愆於朝謁恭想重華未必便有間言只緣乘輿已駕衛從羅列百官下司夾道起居六軍萬姓望塵踴躍伺候移日俄復中輟以此極駭觀聽反招謗讟又既飢弗得食勞弗能息長嗟浩嘆往往盈路都人寒心恐有不測此皆大王之所親見中宮之所與聞也今不為計後悔何及某等欲望大王力請于中宫以調娛主上為巳任備極左右之飬順適起居之節上意有所不樂則為之彌縫下情有所難通則為之啓導至過宫日分期於必信號令已出風兩不渝如此則北內􅌚愈外廷恱服中宫母儀之美配於古人大王子職之譽顯於天下蒼生賴之社稷賴之豈惟女史之光儲君之福哉直前劄子臣待罪右史日侍清老恭覩陛下大昕視朝天顔肅穆垂衣拱手尊嚴若神凡所施行悉中機會凡所延見曲盡謙勤未嘗有一話一言匆猝過差一趨一步俄頃失錯可謂動容周旋中禮盛德之至者矣近者車駕過宫日分與引班直換授之時百官有司伺候移日竟成中輟各自引退臣切惑焉何者平居暇時曽無過舉何獨至於六飛戒嚴百辟就列却乃深處九重都不省記近在旬月頓違常度者哉而軍民籍籍妄生謗議轉相倡和無所不有臣雖至愚固知陛下之不如所云也反覆思惟乃得其故蓋自往歲之冬聖意嘗有不能釋然者矣為之震怒至於愆和嘗發威斷痛有行遣由此宫掖之內人人自危宦官嬪御皆有歸過君父之心往往故作緣由欲開間隙每至期會上曉沖襟所以或於臨軒而爽興居之節或於命駕而虧號令之信陛下天資仁厚不察其為誤已臣所以深惜陛下無故而得怠荒之謗也臣聞人主之心當與天同今夫太虗清明天之體也將以潤物則為雨露將以動物則為風雷將以成物則為霜雪俄而開霽天體湛然纎翳不留三光如故若夫人主喜則為賞怒則為刑刑賞既行更何疑滯心宇泰定即天德也豈容鬱鬱有所不快自古帝王蓋有處世故之難遭人倫之變者矣要以宗廟社稷付託為至隆天下蒼生關繫為至重莫不先定其心期於克濟是故父母未順舜有南風之歌兄弟不咸周有棠棣之燕是皆轉禍為福身致泰和不聞以此自纍方寸今陛下上有重慶之親以慈儉聞四海下有盛年之子以孝敬聞兩宫三朝纍世曠古所無歷觀載籍之傳最得聖人之幸而又邊鄙不聳年榖屢豐一時賢才略在朝列只守成業已謂小康苦懷逺圖可以大治而又以九州之冨無供飬有闕之虞以萬乘之尊無使令不足之恨志所欲為胡鄉不可則陛下果何所不快於心歟况夫怨不在明患生所忽方其因循但曰細故寖以悠久遂成後憂則尤不可不慮何者一國之勢譬如一身血氣標本貴在貫通少有壅底便生疾恙若乃咫尺君門杳如萬里今日遷延某事明日阻節某人日復一日莫以為怪人心益訖主勢益輕脫有姦檢時為利則中外之情不接威福之柄可移雖是擅傳指揮將亦無從覺察或放散儀衛或革退臣僚或鬪諜宫闈或激怒軍旅萬一有此臣恐陛下孤立而外廷無以效區區矣然則陛下何不務自節宣以飬氣體務自寬大以怡精神出則從順動之冝居則享燕間之福而直為此悒怏徒速無故之謗且貽萬一之憂哉臣嘗謂愛君之至莫如詩人見於南雅樂只君子之辭不一而足至於不能自樂則風之山有樞雅之魚藻皆以為刺作詩之旨豈是容恱誠以一人有慶兆民賴之非其已之私也臣不勝拳拳碩附於詩人之義惟陛下留神幸甚止齋先生文集卷之二十一
