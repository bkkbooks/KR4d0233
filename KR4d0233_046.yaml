front:
  text: 止齊先生文集卷之四十六
  hash: sha256:1d56172a407958661f882c701ec049a8a47ed60372f1a162ebbf627a9287f94f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_046-1a}
body:
  text: 祭文祭沈叔阜嗚呼以先大夫之於子屬望也以夀母之恃子以亡恙也以伯仲與子相和唱也以朋友交遊謂子足嘉尚也然不待中年而夭矣豈惟家人蓋鄉黨鄰里同心悲愴也嗚呼萬事如意豈必永年有一弗爾禍不待旋來者可追往者巳然我不能規文以自鐫族祭八一叔惟靈厚重之德溫恭之度語無厲聲動無疾步蓋嘗深居燕坐玩意緗素娛翰墨以永日時杖藜而觀圃雖比鄰聚訟轍跡旁午而淡然不顧至於里有恙苦族有喪故曽不渝於風雨必躬問而身助若乃內將順於慈母外服勞於諸父弥歷年如一日及二毛而猶慕眷旁洽於弟姪一色笑而匪怒然其胸中昭然自有繩尺臧否不言莫可欺以智數者矣嗚呼文足以决科而老於布衣實足以長世而不昌於㣧祚以歲寒之喬木亦半夜而晞露䆒人事其何闕莾蒼蒼之難訴觀其前十日而戒客却私昵以密布􅒺兒曺之奚擇曰阿牙其可付余聞繼宗之子經禮攸著豈聖賢謂之弗祥徒世俗以為諱苟牙也足以汛掃門户典護墳墓渺一芥其何嗇將九原焉如赴偉顧言之勇甚又古人無以逺過者也惟是枝葉凋零歲月遲暮乏一老之導前嗟衆稚之失措此某等所以羅柩下而長慟想儀刑以摧仆祭張國紀嗟呼國紀吾欲誦子之美兮纍百紙而莫殫吾欲哀爾夭兮淚懸河而何乾招子之魂兮冥冥其安逝托子之孥兮交貧而力不逮蓋自故老之傳書籍具在疾驅者途短軸不折者厚載髙明兮鬼瞰其屋愁苦兮弗菑與害曼膚兮鼎食鋭頭兒兮無蓋仁三族兮報之豐自營焉不延厥世以余講聞兮籍甚於目睹兮每背至國紀而一不酬兮余誰問兮茫昧豈天若不謀或邂逅兮聖賢以為定計匹夫兮細故將善十勇兮九悔徒長言兮何尤聊一觴兮以酹代兄祭林承事維公劬躬植門自約而嬴爰始為儒𬒳之家聲閨閫無慚鄉閭有稱昔者婦黨缺無似承克立之後祀事有慿昔者族黨伯季凋零輯其孤婺以迄厥成夫人於此苟或一䏻則為善士况是合并奈何無年雖天冥冥嗚呼方女既笄實繁問名公為相攸莫如書生我時鰥居少公數齡乃以我歸嘉我弟兄待不以壻而如輩朋自其室事來咨來評有不釋然輒以我平頃我屬疾中寒善驚公亟問拊弥時不寧及公舁醫省之郡城謝言再三勿揚夜舲誰無舅甥所感此情雅有室廬可以止興新有子婦可以使令奈何無年胡不涕零矧辱深厚此酒忍傾祭鄭龍圖母夫人觀嶽者於麓觀河者於涘猗歟夫人克生二子夫以龍圖經明行修名重天下南渡以來張吕之比而景元潔廉忠信邁往而絶出又為當世雋傑之士譬之天球琬琰和弓垂矢粲然房中重英襲美幾所謂維其有之是以似之者矣至於龍圖稍稍䆠逹位逮九卿夫人固為之歡而亦不以景元之負志流落不逢為耻龍圖怡聲下氣坐不垂堂夫人取焉而亦不謂景元單車暮夜赴人之急難為非是則其髙懷逺度兼識二子之才往往揔攬人物者或有恨於此也嗚呼夫人之衰自喪伯氏仲懼弗任誓不以仕藥物之良飲膳之㫖儻可一笑不逺千里今也夀終孫曾百指棺槨衣衾聞者興起永惟人生及此有幾然景元猶哀恫憤恚自謂遺憾蓋不但以遲莫困窮力有所止也某等蚤遊門墻欽誦儀軌以受祉之既多而哭少於餘齒且歲籥之四周凡奠斚之三跪冝盛德者不然將永傷其曷巳况有感於百懷曽莫殫於一𥿄祭梁丞相麟鳯不摯帝王瑞之木德為春萬物善時維皇龍潜公為舉首天授之相有司之手維皇至聖維天之仁維相休休嘉靖此民澤農欲晴山農欲雨公在相位髙粳下黍彼有言戰此有言守公在相位兵不挂口人亦有言誰怨誰德公曰賞刑具在三尺人亦有言匪同斯異公何適莫靡立一意乾道經略淳熙無為從容其間不競不隨上之咎言下之觖望弗及其身人自得喪公疾未劇公歸巳决帝曰如何咨爾同列至于領祠至于賜第宿留經帷愈好勿替我觀自昔蕭曺周召經史云云如公特少方舜命禹冝師冝保薄海有恨公不夀考公不壽考薄海恨之矧如傅良辱愛辱知屬官窮楚遭歲之繆爰及祥琴文始克就太常有詠太史有傳乃如斯文聊以哭奠祭劉子澄惟靈學不事於章句仕從容於祿爵積之身以力久試在邦其太略我特立而衆同曰好名而奚怍若夫􅒺企慕於前修圖報稱於隱約豈與世以多違懷良朋而獨樂孰遺貌以觀心悵此風之不作以余交之最晚知君意之匪薄方前猛之切磋收後尤於戲謔何手墨之未乾而遽遺於今昨儻絮酒之可漬將陳根而亦哭祭蘇訓直元祐故家封殖百年百年舊聞嘗失其傳疑將孰問孰備次詮如公幾人庶幾像賢然而位不過外郎而僅止中夀是不謂之天耶纍舉不第屈于賞延﨑嶇州縣曽諱自言晚以民庸著之淮堧積有令聞爰始綜銓向使第公之文少而騰騫則于史觀則于詞垣何處非宜而躓莫前則天之嗇公非適今日然也嗟乎魏公之功鼎彛所鐫比及三世中更百遭繼先大夫義不附權天下冤之臨汀之遷公論既開忽詣九原凡是天理莾不可言某幸兹為寮情相後先即之謙謙聽之便便一日不見而我棄捐寓哀斯文三致意焉而哀不勝有淚如泉祭張孟阜我識諸張餘三十年仰止端明恨不執鞭架閣勇為而挺出忠甫肥遁而孤騫雅矢寬夫接于英躔亦有姻婭聲華滿前我來雙清詩書之淵孟阜妙齡玉潔蘭姢前規後模足不及㕓既而諸老淪亡松凋蔓延於赫家聲䆮以弗綿孟阜永嘆逝將誰愆吾學未就于何食眠習為文詞短章巨篇駿不可羈闊略注箋及試埸屋句磨字研務入繩尺以取衆憐屢賈弗就愈强益堅妻帝兒號語方諱錢必以青衫侍親九泉晚喜世科至於澘然而其料事察於著龜憂時過於貂蟬每一發憤于酒是便竟成沉疴殆若自捐嗚呼孟阜工於成家而拙於謀身有恨於貽後而無忝於奉先求之昔人亦足謂賢我妻厥姊見推師傳忠何疵之弗告愛何善之弗宣病革之書筆墨倒顛屬子以壻抑何惓惓㑹余東歸哭此殯筵莫塞爾悲為之矢言謂余不信有如大川祭令人張氏嗟余與子於窮相遭以子潔清濟余之豪何以觴客取之衾𫀆殆將兼旬蓬首不膏矧余力學往往獨旦每興視夜青燈在案於焉勞苦於焉咨嘆苟余飢渴則自涖㸑凡我族居以私為公凡我嗣息以異為同亦既聲名胡謗是叢亦既膴仕奚歸匆匆雖則信已豈余所獨亦豈無人共此心曲知余孰深愛敬之篤子嘗有言舍我無復嗚呼子病之久余靡所愛顧笑謂余日月有待疇昔之夢雲鸞下逮夫豈凡骨而及斯賚余亦宵夢殊庭祕嚴有二黃冠縞衣襜襜求子食器與子鏡奩而遂棄余曽日不淹嗚呼以子生平死且有守奈何衰惰失此益友強欲述子悲掣之肘尚圖能言託子不朽祭林懿仲我老哭子云胡不哀豈以斯今微子之才有才如子學以自培少却置之辟雍蓬萊而年不逮公論之開是懸於天我哀何哉我懷古人風凋誼零匪無群居謂為友朋亦既樂推俄而譏評亦既洽比俄而背憎誰其草年篤師一經凡曰同門視猶弟兄毀譽合離弗移弗傾譬彼松柏可以永齡則知我哀豈徒私情嗚呼喪歸自淮潸焉曷勝屬我悼內拊棺未曽今辭酹之尚其歆聽有盡之觴無窮之名祭瑞安宰留公弼吾邑之難聞于浙閩有𪠘一區洞無門垠籍入誰家何所就詢邦賦有常夫豈不仁令日𫾣朴吏加斧斤役無完家帑無見緍纍歲于兹交相為貧間有惠令不怒以嚬譬彼沸鼎而忍益薪匪憂則慚以及其身自我公弼飾壞為新一術不施笑言津津役戶晏開吏袍前陳州家曰能使家曰動且以其暇豆觴佐賔縣門之樓圯為荆榛忽焉山立曽目不㫬以此長材與意之真豈徒百里可以長民輯睦怨慝整齊紛繽置君其間亦志可伸遽止斯耶天何昊旻自君屬疾愁聚為群識者于醫昧者于神冀其夀祺以勸後人聞之不起萬里霑巾我忝同登晚交益親况此酹别不知所云峴山之石巋然嶙峋尚刻遺愛庶幾不泯祭潘省之嗟乎惟靈以家學之未顯掇巍科以娛親以里仁之未博求三益以淑身惠分人而清約嚴律巳而殷勤若夫歸愛女於心許擇冡婦於素貧資壯士以趨急遜旁枝而圖新皆在昔之所難得一節而過人乃具美而弗矝爰好修而益振自發軔於州佐亦彯纓於京塵有衆允之噓拂無一疵之緇磷雖混迹於莞庫遂揚名於縉紳及兩鬢之已華領壯縣而獨欣棄訟銗而弗設惟經師之是遵參纍政之短長從百里之笑嚬酌民言而徑行或黃堂之未聞有負租而弗問奚加賦之敢云積棠隂之劬勞忘梱內之缺伸俄遺恨於偕老遽傷和而損神嗟乎志如公之濶逺行如公之真淳儻少假之歲年將䇿足於要津蓋庶幾於有德輯群駁以為純忽兩櫬之旅歸徒夾道而酸辛某嘗同升於仕版又洽比於昏鄰方欽遲於晚休尚幸陪於後塵隔古今於一觴故不知涕泗之沾吾巾也祭蕃叟弟母夫人嗚呼悲夫季路之母及於負米而不得與其子共祿於三釡孟子之母及於衣衾棺槨之美而不得與其夫偕老於五鼎自古賢者固多遺恨吾於吾嬸尚何言哉尚何言哉一觴之奠永隔千古嗚呼悲夫祭沈次卿吾每過吾邑必欵二沈之門以資舊聞訪遺跡也元誠云亡官無諏咨之助士無切磋之益幸公無恙尚有典則言可記注行可蹤跡而止中夀誰不沾臆嗚呼十八丈之賢蓋庶幾徐孺子元魯山焉而世無孝廉之科竟淪謝于幽仄相彼後進車馬赫奕韋布三葉令人太息始余過邑多見往昔遊有觀潮玩有古柏追隨諸公好我顔色自公獨存我亦皓白恨不鄰巷相與朝夕日治草具屈為上客我懷則多豈以飲食曽謂背面存亡之隔文以哭之未叙潜德匪無強宗為刻拳石祭豐山陳國器嗚呼自昔格言誰敢種德之久仁及閭巷悼內屬耳而遽至此何歟余觀氣貌甚偉言動有常下逮僮奚不見呵詰是豈不足以夀歟食飢衣寒勿問踈戚東塘之成通國利之是奈何不享其報歟冝夀不夀冝享不享神理茫昧世亦多有若夫奕世慈孝滿門問學盎然春和無以致異而賀觴未舉衰絰相尋行道嗟涕殆未之睹則又何至於此極歟豈禍福無端而自昔格言姑以為訓歟胡能籲天寓此哀奠祭朱文昭母夫人吾友滿天下今四五十年升沈通塞之變多矣蓋僅有存者率一歲或再三歲惠然造吾門者必皆蒼然華顛者也否則其子若孫以其父祖藉口為謁以請見而非其人矣况於其親則又凋落至闔郡或數百里間有人焉以余之少孤不及奉其親苟間見之則未嘗不為之起敬且自愧恨其不若也嗚呼今夫人氏吾友文昭之母則一人之數也文昭自為諸生知名一世屢舉不第而業益修謝客深居而士益附無分寸之柄而吊亡悼屈恤孤而惠羈旅而家不困皆夫人之教也嗚呼何其整也余自罷掖垣謫籍弥久夫人以其女孫歸為吾伯氏婦傾囷以飾其行輟田以佐其養人所諱交無難辭焉嗚呼又何壯也以余少孤不及養其親於闔郡或數百里間見吾友之親則為之起敬自愧恨其不若則於夫人宜如何也春有饋絲秋有饋鮮果蓏之實凡美必饋問其將命往往出夫人之手夫人之夀八十有六屬余抱痾撫棺無及寫德布私非文安寄力憊言略尚昭鍳之止齊先生文集卷之四十六
