front:
  text: 止齋先生文集卷之五
  hash: sha256:7727ab5455511c4c49bb5a1bb5db51f712fb25b6191a7b80c221f2cb90c2a8f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_005-1a}
body:
  text: 律詩新昌詠歸回頭三十二年非木落霜空水見涯萬事自憐多譽早半生猶幸一官遲好將翰墨付儕輩去與漁樵相爾誰還有故人招隱否寄聲橘柚欲黃時贈石時亨并序釋氏敵生死老氏無怛化而吾儒則曰夭夀不二修身以俟之所以立命夫垂涎麴車染指羊鼎豈曰不知味要不若飢食渴飲之為至也吾友石時亨喜二氏書晚與余遊讀易論語于其行作詩贈之要是同根本應須識等差六經無剩語百氏自名家日落山含斗潮回浦見沙了知來往意萬古一生涯題觀潮閣俯拾滄溟大衡陳蒼去聲莽多閩山飛鳥沒吳會一帆過消長看沙尾行藏問釣蓑登臨有如此人物付誰何上閩帥梁丞相生日二十二韻炎正維中葉皇圗再造年天潢流少海星緯粲台躔臣主嘗難並乾坤豈偶然千齡開歷數一氣付陶甄黃屋傳神器彤庭領衆仙風雲從此會日月更誰先昔者求侵地何人賦甫田吳兒咸抵掌噲等欲差肩廟論惟多士戎功不在邊一麾分赤社萬事屬青編吾道誠難用諸儒亦自偏才名多漢落經行失拘攣洛蜀何嗟及熙豐竟禍延旁羅兼鴈木平步忽貂蟬甚矣知當寧凄其望濟川年來羣老行公在萬民懸定作鹽梅夢行歌枤杜還滄溟宗衆濫衡嶽倚蒼玄要使垂身後無為慰眼前管絃無算爵桃李未央天魯燕雖堪頌閩山不足鐫中原康濟事彛鼎願聯翩送鄭少卿景望知建寧過家鄉里敬將母士夫榮得失從人論行藏獨目明百年中古少一笑萬金輕廉讓吾何敢新茶可擷英有志須身健關心在歲寒一時諸老盡多見大名難湖海方連旱甌閩適少寬為州人不乏千萬強加餐清廟圖書寶熙朝雅頌音頻繁三節召荏苒二毛侵衣飯家才足丘園意亦深卧聽床下士時作武侯吟海內言華蕚誰名動搢紳豈無當世志能忍十年貧酒興新來減交情老更親公餘如促膝剩把古書陳兼送景元屏廢誠愚分牢愁更索居若􅑮知巳問猶解課兒書地僻門長閉年飢菜自鉏相望無一字不是故情踈庚子除夜有懷老盆自酌共誰歌嘆息其如此夜何已覺二毛嗔婦問可堪一飰患兒多關河滿眼風塵在天地藏身歲月過事業文章吾所畏東陽人亦卧巖阿送沈元誠赴臨漳主簿誰咒鄉先進能無沈隱侯青衫今適越白髮竟依劉時里人劉義夫守臨漳道固為名纍人當與命謀三台行漸近且勿問歸舟終藏懷未巳欲去事多違士友方推轂鄉鄰但挽衣冥鴻寒汲汲霜菊晚暉暉何限春蜚動君看果是非送德逺弟赴省科名雖細事文字要新功方拙存家學豐膄與衆同江湖多我友臺省半諸公為道貧非病連簷有芥菘和張孟阜歲旦韻白髮朝看鏡青燈夜數更文章輸善宦名字誤浮生廢學兒鼾睡安貧婦饁耕從今定逢吉吾已卜先庚聞沈元誠歸自臨漳喜而奉寄荔圃班班熟蠔房箇箇肥我雖緣此誤公亦為何歸吏事生衣垢家山減帶圍不無華衮字卿月更光輝晚春二首萬枝寂寞待春風風雨過多春巳空未曉啼鶯相喚語海棠飛盡一庭紅莫道春歸事已非水邊天際緑成圍隔籬聽得農家語雨過田田麥含肥送孫謇卿赴夀昌主簿烏鵲填門雪滿除倩誰騎馬謝雙魚苦吟孫楚三年别飢卧袁安一病餘仕宦吾人聊復爾夢魂今夜定何如釣臺多是西征客莫道渠能賦子虛哭吕大著至明招寺簡潘叔度小雨崇朝過深秋薄海清故人期不至喬木眼偏明欲往還何日堪論久此情侯芭幸無恙應就太玄名招徐居厚老來却憶少相過别自何年白髮多山葉抱蟬蟲吊夜去看滄海壯秋波天台王子木解官長樂見訪夜深擘荔真愁絶春淺傳柑更惘然世事愛來欺兩鬢人生堪得别多年琢冰積雪江湖阻樹羽崇牙日月懸此理蒼茫君勿問明朝且莫刺歸船月夜書懷二首送客門𥘉掩收書室更虛新篁髙過瓦涼月下臨除婦病才扶杖兒饞或饋魚今朝吾巳過莫問夜何如道德吾何敢功名代有人蒼黃恆畏咎班白㧾憂貧細字書全廢深杯酒勿親靜言空自愛萬古亦泯泯送周魯山辰州法曺團樂妻子是誰家獨𬒳飢驅天一涯逺地豈無人晤語長才能免世驚嗟好于書作千年計勿為官驅兩鬢華為問湖南似湖北逾年吾亦訪丹砂遊丁次翁篔簹園期次翁不至徑蹊曲折屋參差半是天成半自治修竹萬竿人獨立我來搔首菊花期送朱同之福州戶掾我自三山失馬餘君方千里問津初衣冠萬室催科易禮樂元戎節目踈謹勿向人徴外事只須著意訪竒書一年正好榕隂密丹荔黃蕉奉版輿覔樹栽覔得循除數畝園衰遲無力正乾坤學為老圃徒幽意冨比封君亦浪言計日若將栽樹木成隂當待長兒孫出門悵望春連塢為向雲屯斸一根題仙巖梅雨潭衮衮羣山俱入海堂堂背水若重闉怒號懸瀑從天下傑立蒼崖夾道陳晉宋至今堪屈指東南如此豈無人結廬作對吾何敢聊向樵漁寄此身次陳益之韻戲呈汪守充之雨過山新沐風平水漫流移尊來選勝立馬步通幽春在桑麻塢香團橘柚州從君詩有律還我酒無籌汪守坐上苦吟而忘飲客酒因戲及之汪守三以詩來次韻酬之一年春事墮槐宫却愛清和與政通乳燕黃鸝相倡和落花修竹亂青紅羡君有賦非占服使君以四月一日為題愧我無才可送窮細與論文一樽酒它時還憶暮江東江城如在水晶宮百粵三吳一葦通桑女不論裘粹白橘奴堪當粟陳紅絃歌滿市衣冠盛缿訟無人刀筆窮多荷弱翁今少霽更能携客謝巖東音合桑林律中宫試聽布鼓亦三通相從璧水浮蔥白見酒正注一别閩山擘荔紅把釣扁舟將老去欵門多竹未全窮若為皂蓋能忘我立盡斜陽車不東汪守屢期見訪不至酬謝倅景英用前韻見寄窮巷蕭然一畝官勞勞漫刺倩誰通空翻故紙頭垂白晚對清標面彂紅諸老飄零亡幾在謝乃參政任伯之姪百年放佚不勝窮擬將舊學相從問何獨詩壇欲讓東用幽字韻戲簡謝倅當戶排危翠循除漾淺流此生從稼圃誰與伴深幽韓子癡憑按龎公倦入州青芻與白飯却待為君籌用幽字韻呈汪守謝倅旌騎牧人迹簪紳雜道流引杯忘日永得句與山幽行在今當路中興此望州為將登覽目著處訪邊籌用幽字韻答賈端老人皆忘姓字誰獨訪源流病驥宜懷櫪遷鶯故入幽十年慚主簿萬户薄荆州此事吾何敢相將負一籌自仙巖還舍留别諸友瀑布衡從雲一塢浮圖明滅木千章在山終愛離山去遮莫黃塵涴我裳送任虞卿教授江隂學省穿楊末江城振羽端聲名人不忌仕宦意常寬缺月天將曙孤村歲巳寒小舟來話别此道少人敦和謝倅見贈生日二首朝天冠佩幾千貟熟數東州未乏賢若論中原舊文物蒲輪應合聘高年獨醒長愛衆歡酣酸苦隨人却嗜甘好客不知彈劒鋏聞公風味可無慚謝倅絶不飲而善勸客酒惟客所好獨嗜甘物再和休將柄鑿問方貟且引壺觴對聖賢鴻鴈不賔滄海凍梅花相伴笑年年淺杯莫到十分酣但愛齁齁夜夢甘萬里桑麻風雨好一夫尸祿我何慚謝倅生日此夕其如好客何秋風嫋嫋水微波渡江公子今無恙上蔡家聲世不多未放清朝空老去欲談前事竟誰過阻陪觴豆倣徨久坐想風流為一歌景元益之諸友考試旁郡余夢與步月聯詩得水花初淨月如銀之句追成一絶連年波浪與埃塵誰可論心五六人昨夜夢同天地濶水花初淨月如銀謝倅監試未畢事而出以詩三章來用韻奉酬殷勤送客蹇誰留久待江城未解舟我醉欲眠君且去不妨懶瓉繼前猷歸舟莫訝太匆忙會面何曾纍十觴孰與持螯霜月下拍浮酒浪舊陂塘公不能飲極欲從君十日歡倦飛終羡鳥知還棘圍觀戰緣何事亦縱驊騮自出關沈仲一三益堂有此名三益之人可晤言遊藏無俗物典則似諸昆剩著書充棟仍添竹過垣翻愁長者轍稀得到柴門逰金嶴趙園脈脈循簷水林林夾岸山令兒從竹下領客入雲間稠木容人過懸崖著手攀從今名字出不到徑苔班海棠絶句淡月看花似霧中遽呼燈燭倚花叢夜來月色明如晝却向庭蕪數落紅湖樓送客即事一首奉懷益之兼簡同餞諸友誰家喧馬盍朋簪屋壓城頭水照簷橘柚兩山香盡在蒲荷十里淨相兼愁將久雨春無賴别在明朝酒未厭甚欲去同三四友鱸風更捲一江簾時益之尚館鮑氏鱸風亭春晚一首約同志泛舟匆匆春事竟如何問訊庭前手種花又送行人又風雨半為芳草半泥沙橘香通國今無恙梅實于人晚更佳莫放此春齊去盡夜深愁聽一池蛙用前韻招蕃叟弟仍和蕃叟癸卯二絶細看物理愁如海遙想朋從眼欲花逆水魚兒衝斷岸貪泥燕子墮危沙百年喬木參天上一昔平蕪著處佳行樂不妨隨邂逅我無官守似蚳蛙蛙通作蛙落花風雨奈愁何愁亦不應緣落花尚可流觴追曲水底須占鵩似長沙孟夏事無人晤語鳥烏落為我食貧樓筍佳休説關河無限恨腹非空怒道旁蛙大饗須三飵中黃起四維欲追千古意眼底合深思功名還壯士道術付諸儒但欲謀田扁舟下五湖送翁誠之尉慈溪徐劉文采後鄒魯典刑間為母求三釡令人見一班時平無事立地僻得官間好索梅花笑題詩海上山詩律吾將問心期孰與親明朝當異縣永夜更懷人尚友逢三益明農識大臣可無相問訊勿道鬢毛新和陳仲石韻久矣懷相與翩然喜見臨清風生案短日過墻隂王事何時暇神州半陸況諸公宣力去伴我水雲深送謝懷英道士歸廬山懷英棄儒服從皇甫道人遊晚入東宫賜號觀復大師場屋收餘䇿匡廬寄一瓢欵門如有欲委幣輒難招菜甲留終夕蒲團共小橋崆洞他日問應記説神霄懷英自言林靈素遭遇誤國事甚悉一别忘年月重來失故初美髯今幾尺銜袖竟何書謝嘗持所著老子實録并皇甫記求題跋余未睱及也勛業諸公在衰遲半世餘許身無輔報吾亦欲樵漁送陳持中赴四明節推二首更無人未識東州晚得吾宗第一流編磬在縣金奏合清冰出壑玉壺秋喜才一見還分𬒮懷欲多言但倚樓亦有鄮山三四友可令觀政話然不前修恨不為同姓更有跫然喜似人歲晏得君顔面好天涯從此尺書頻政須有力同扶世業巳將名自絆身它日雲臺勛績上南陽應記舊比鄰乙巳歲首寄彭子復徐子直又過一年空草草尋思萬事太勞勞歲煩士友愁薪米日見兒童嘆鬢毛亂卉各隨分寸長新禽巳變兩三號及時君亦圖良集莫待春深水一篙次韻奉酬丁少詹見過同逰仙巖遇雨而别佳人何似似江梅邂逅梅隂共舉杯欲與溪山成勝話却因風雨得空回新詩報我春乘興小徑從今日掃埃自是衰遲愁獨立敢論名字望朋來瑞安宰劉伯協載酒逰趙園叔靜道甫子宜行之同集小雨喜霽上巳所餘春有幾不堪風雨付春愁君能載酒知誰似我欲看花不自由倚岸小舟謀未定隔林斜日故相投莓苔踏遍篝燈去收拾殘紅插滿頭和丁少詹韻盡日支頥聽雨聲間中惟得自知明朋來何敢煩公等老去方慚負此名待欲短檠看少作敢將尺牘論交情區區却望從容意要莫令人一座傾明月隋珠忽墮前坐令衰颯意飄然無端太史頭搶地安得揚雄賦上天前輩門墻餘幾在他時竹帛竟誰傳落花流水君愁不南渡于今六十年病餘久不趨郡且遷仙巖書院於屋西有懷同志欲往如天際相期忽歲華山空明獨樹江晚暗連葭作屋皆三益藏書可萬家豈無人裹飰躬自灌園芽酬陳頥剛見和前韻離合皆天意盈虛幾月華家才辦藜莧吾亦逐蘆葭憂世還當路論兵有故家深深看踵息隂火養黃芽寄謝景英參議夢作寄詩覺來追記兩句魂夢半年皆草草鬢毛一别益蒼蒼足成之故人不見吾何適欲見其人巳異鄉魂夢半年皆草草鬢毛一别益蒼蒼籌邊淮海何遲暮乘障湖湘亦阻長及此居間宜問訊題書須待滿林霜寄題翁誠之慈溪縣尉􅈦無我亭星月明當户烏鳶下傍人小亭長獨立通國自相親置尉緣求盜居官巳喪真須知三尺外𫾣榜亦深仁和郡守沈持要賞柑之什三首滄海無波日萬膄山農囷廪自相豪爭看紫槖行阡陌可對黃甘負酒醪曲水一觴隨意集成都千騎最頭遨風流儒雅誰公似增得東嘉地望髙東都門外問征膄去國身輕亦太豪誰可對床聽夜雨自于同社燕春醪不知溫詔從天下又罷幽尋與世遨從此宜休堂下夢顧瞻松柏為誰髙仰止苕溪近一膄幾年猶未識人豪黃堂為客知何夕白髮從公飲此醪四海衣冠多後進兩朝几杖舊同遨令人仰視冥冥翮不道微風燕雀髙和沈守持要觀潮閣留題平生欲賦觀潮閣立盡斜陽倦復還一日江山蒙筆力百年名字滿人寰郡從晉宋風流後詩到蘇黃伯仲間向去摩挲看石刻誰知功在十年間公間居十年奉陪王德修登觀海閣兼呈邑宰劉伯協觀潮閣在東溟上有客來登自華陽不道雪山通老柏却看朝日上扶桑勝遊氣合南三郡刑揚益也劉江西人妙畫家傳晉二王後會不知誰與繼爾江吾海水相望落成王朝奉廟以薄恙不獲預謝劉宰并諸鄉丈五首盜起清溪兩浙空童王親自帥元戎誰知小邑無亭障但握空弮有隱功橫塘一字比南金滿紙書勞屬意深太史不知收拾未邦人父老淚漸襟許忠簡公嘗手疏王公濟守禦事欲列諸朝操一豚蹄亦可憐欲將廟食自旌賢壞墻頽壁神臺笠不見干戈六十年却向平時念後艱攘題百尺忽如山誰將西上逢人問令尹何如此一班抱病荒村望欲迷駿奔無數獨雞棲瞻言鼕鼓何時歇好聽農郊雨一犂和沈守持要題謝公樓額危樓何在水雲中穿市牙旗退自公間作此來橫笛夜愛看人醉落帆風歡呼夾道江聲合硬語蟠空客技窮姓字從今聨沈謝不知千古更誰同沈守生日燕寢凝香不記春宜休堂下柏輪囷三吳南渡今多士四皓東宫此一人雅不欲書名上上謾令在處歲陳陳玉巵宴罷思黃髮應合從頭第從臣觀南塘四首呈沈守曾不容舠咫尺間誰知救溺合纓冠今從枕席人行過用趙充國語最好翻盆雨後看夾道歡呼百里間不論扶杖與勝冠公年幾許顔何似遲放牙檣待我看樂在宜休水竹間十年黃帕褁朝冠却乘五箇花文馬來與江村婦子看别乘潘郎伯仲間朅來公適去彈冠更將未盡公碑意收入新詩為並看止齋先生文集卷之五
