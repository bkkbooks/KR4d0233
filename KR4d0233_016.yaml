front:
  text: 止齊先生文集卷之十六
  hash: sha256:d04b243aea77a2b2ccb13bba7a6438a2d3dfcb6c03f69bae4b9f2225b9f5674e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_016-1a}
body:
  text: 外制特進觀文殿大學士提舉臨安府洞霄宫廣陵郡開國公食邑五千三百户食實封一千五百户葛邲明堂加恩加食邑五百户食實封三百户敕朕新嗣服日有事于合宫兢兢焉懼無以接三才之奧也駿奔在廟豈無辟公金玉爾音尚想故老具官某歷事兩朝蔚為元輔蓋嘗溫恭朝夕執事有恪侍我烈祖爰暨上皇執圭幣見上帝者屢矣肆子肇禋均佚就國相維穆穆于以永懷方周盛時微子以二王之後聿來助祭有客頌之孝武始建漢家之封有臣如太史談而以留滯周南不與從事為恨朕雖不䏻比德于周邦視漢有光焉其因舊章增大食采非苟為恩蓋示不遺之意可在外宰執明堂加恩敕朕新嗣服日有事于合宫兢兢焉懼無以接三才之奧也駿奔在廟豈無辟公金玉爾音尚想耆俊具官某歷事烈祖蔚為宗工蓋嘗齊明盛服習于侍祠之禮矣肆豫肇禋均佚分閫相維穆穆於以永懷方周盛時有客助祭詩人頌之孝武始建漢家之封而太史談留滯周南以為恨朕雖不能比德于周抑視漢有光焉其因舊章增太食采非苟為惠蓋示不遺可在外侍從明堂敕朕新嗣服日有事于合宫兢兢焉懼無以接三才之奧也駿奔在廟豈無辟公金玉爾音尚想故老具官某簡在烈祖蔚為名臣蓋嘗齊明盛服于侍祠之禮矣肆豫肇禋均佚殊館或云越在輔郡或云越在外服或云亦既謝事相維穆穆于以永懷夫留太史于周南自昔浩嘆對賈生于宣室至今美談朕覽漢事豈能恝然于卿等乎爰因舊章增大食采非苟為惠蓋示不遺可張淑妃明堂恩贈三代曽祖敕朕有事于合宫既蒙嘉貺均休于戚里益廣茂恩眷言妃德之賢夙備皇宫之列爰稽邦興追賁曽門具位某氏故曽祖某謙和本於性資醇厚推于鄊黨善修于身而不享其報慶流于後而端有其原逮其三世之孫遂應四星之象兹朌祭澤爰陟師垣精爽如存寵光是服可曽祖母敕備慈庭之妃掖象應四星敷祭澤于私門寵及二世具位某氏故曽祖母某氏柔嘉協則淑謹流徽好善稱姻族之間種德及子孫之逺是生賢女選皇宫慶霈漏泉恤章告第懿魂未泯新渥其承可祖敕朕肇盛禮於明堂敷大賚于天下惟慈宫之妃列夙膺皇眷之隆加異典于私庭實率邦彛之舊具位某氏故祖某官某善積于巳行信于人報不在于一時慶乃流於再世澤𬒳女孫之淑象應四星之恩寵齊三事兹開大國載錫愍書泉隧有光靈魂式慰可祖母敕熙事備成湛恩汪􅐮乃眷四妃之貴列于皇宫爰加再世之封賁其祖配具位某氏故祖母某氏相夫以勤儉為本夀後多福慶之儲孫枝生賢門楣遂大朝敷祭澤邦有舊章爰改胙于營丘尚歆承于褒命可父敕方𬒳神釐慶成三歲永言妃德象應四星爰加愍章用慰禰廟具位某氏故父具官某劬躬有慶操行靡它豹略之才髙於輩行雞鳴之配出于閨門兹誕布于湛恩冝追朌于恤典爰因舊爵改卑新封精爽如存寵光是服可母敕朕方謹親祠恩如湛露亦懷妃掖念在蓼莪爰按邦彛載朌贈典具位某氏故毋某氏蔚有婦德克相夫家凡此嬪則之賢莫匪毋儀之訓生蒙象服既極寵光沒啓茅封又多福履兹敷惠澤更建名邦尚克歆承以慰冥漠可右丞相趙汝愚明堂恩贈三代曽祖贈太師敕朕觀成王踐祚肇稱盛禮而㱕美辟公相維穆穆文武宣哲燕及皇天朕甚慕焉屬兹受釐無德不報蓋周道也具官某曽祖具官某積有善祥覃及來裔是生耆哲為吾相臣維周公孤並建五廟賜鬯㱕胙洊有寵嘉資爾曽孫共輯熙事而周制亡失何以崇報爰頒異數晉陟師垣庶幾酬勞無愧在昔可曽祖母氏贈陳國夫人敕周之祭澤至于既醉盛矣其詩曰孝子不匱永錫爾類其類維何室家之壺則施及臣子不但其身而亦𬒳于室家具官某曾祖母具位某氏克相夫子行修閨門聿生曽孫間我兩社朕惟周人推廣孝思慰滿祖內于兹𥘉禋佐佑乃辟實維爾孫則綏以寵光胙以大姬之國朕敢忘周道乎可祖贈申國公敕朕閲宗人之譜蓋因侍祠追錫其祖父尊寵多矣未有子孫致位三事而後及此者具官某祖具官某雖在天族猶寒畯也克世其家濟以清約是生良弼簡在兩朝如周諸姬如唐諸李于是度越凡例及于茂恩矧惟肇禋澤及四海爰錫公爵作都于申其視宗牒不有光歟可祖母朝氏贈吳國夫人敕維昔宗婦不少概見而衛有碩人魯有令母于周諸姬獨著名於六藝豈不盛哉具官某祖母具位某氏以濟陽之朝來奉漢祀乃生孝子名在薦紳乃生聞孫功在清廟肆肦祭澤洽比幽明申命于吳增大爾邑蓋與衛姜魯母相望千載亦足為宗婦之勸矣可父贈國公敕朕讀史至漢興以來宗室子弟無得公卿位者而坐酎金奪國動以百𢾗未嘗不慨嘆也于是既祠純用周政䇿宗輔告其文人申錫名邦宏賁禰廟具官某父具官某以同姓而行誼篤于韋布以右選而聲聞賢于儒林即所躬行施及其子遂魁多士遂冠從班擢自樞管徑司宰事疇昔之夕相豫合宫三靈具依百福來下洪惟我家生此賢哲本支百世與周匹休下視漢事則九原可以自慰矣可毋李氏贈兾國夫人敕朕既舍爵書勞為公卿大夫崇報禰廟則毋氏與享可無褒典使之匹休具官某母具位某氏嘗相其夫以孝聞于四海嘗教其子以賢著于三朝日者爾豫相豫世室克輯盛儀而可忘所自乎因其舊號錫以新封我圖兾方用以命汝其世世享以綏後人可妻氏贈益國夫人敕魯人之頌僖公至于閟宮享祀不忒及其令妻以是為內助之賢也具官某妻具位某氏嘗與吾相臣共隱約躬定省想夫蘋藻之共爼豆之飾以薦時事無或不䖍也日者合宫而爾夫有駿奔之恭無跛倚之色推本內助賢于魯人我錫贊書晉封于益奚斯作頌侯邦之私孰如爾名藏在王府可知樞密院事兼參知政事陳騤明堂恩贈三代曽祖贈少保斆贈太保敕朕觀成王踐阼肇稱盛禮而㱕美辟公相維穆穆文武宣哲以克燕安甚心慕之屬兹受釐無德不報蓋周道也具官某曽祖具官某躬行對于古人泛愛聞于鄊譽而懷道不試士論惜之集為善祥覃及來裔是生耆哲為吾樞臣維周三孤並建五廟賜鬯㱕胙洊有寵嘉資爾曽孫共輯熙事而周制亡矣何以崇報申錫命書晉升帝保以義起禮亦庶幾焉可曽祖母滕國夫人成氏贈福國夫人敕周之祭澤至于既醉盛矣其詩曰孝子不匱永錫爾類其類維何室家之壷則周家忠厚施及臣子不但其身而亦𬒳于室家具官某曽祖母具位某氏克相夫子行修閨門是生曽孫功在宗社且夫既醉非旅酬之事歟推廣孝思慰滿梱內况朕𥘉禋懼闕于禮佐佑乃辟實維爾孫則綏以寵光為之報本侈其舊封胙以上國朕何愧于周乎可祖贈少傳䇿贈太傅敕朕既本之六藝不愛髙爵以宏賁陳氏之祧則嗣有令德休于後昆可無褒典以應經誼具官某祖具官某當天下之清得幽人之履太史之觀風不講而文采無以自見孝廉之科廢而實行不上于計書也天命弗僣為之生孫既長樞庭又陪國論推夲所自當及茂恩肆豫𥘉禋酬勞相祀冝及爾考並為三公荷天之休其世世享可祖母崇國夫人朱氏贈福國夫人敕既醉之卒章曰釐爾女士從以孫子言周之群臣皆有士行之女以為之妃使生賢智子孫足以傳世具官某祖母具位某氏夙以懿行嬪于名門儀于前人以詔婦子載篤厥慶萃於聞孫夷考其行不足以當既醉之卒章乎有崇故封未足言稱大邦美號聿從其姑質之二雅誰曰不可可父贈少師讜贈太師敕自亞保以來及是三葉蓋王室百年之間而劬躬燾後如一日也于吾宗工尊為禰廟朕豈敢嗇于禮乎具官父具官某義方之教不以籝金隂德之傳不以駟馬成我碩輔蔚為宗工緯武經文何鄊不可是不謂之賢考歟日者合宫有嚴美報生民尊祖視古不慙而大臣之禰位不稱德以卑臨尊殆非周道申錫贊書冠班九棘非以為生蓋禮之稱可母𣏌國夫人成氏贈福國夫人信國夫人王氏贈福國夫人敕為吾股肱之臣上自三世皆褒大之而况于其母乎御不及百兩飬不及萬鍾也而無以慰之豫心惻焉具官某母具位某氏承休襲美發育自躬恩斯勤斯鞠我良弼采蘋所共雜佩所贈恭儉精白無非教也揆諸周制則𬒳以象服乘之魚軒為君夫人孰爾冝者亦視王母並建大邦雖曰均釐誠有以致此矣可妻氏封敕朕誦二南之詩流荇采繁相與共祭自天子逹皆內助也仲尼序詩定為篇首寓意深矣具官某妻具位某氏來自名門克相夫子㑹期有雞鳴相警戒之道而退食有鵲巢致節儉之德日者合宮而騤也相豫肆祀吉蠲齊明逮及竣事禮無違者則豈唯關雎之助哉而爾亦與有勞矣錫之美號爰示寵光雖曰舊章實應經誼可給事中兼直學士院樓鑰明堂恩父贈通奉大夫璩加贈正議大夫敕朕既舍爵書勞自卿大夫以次第賞矣則推其世家為之報本雖禮未有獨不可以義起乎具官某故父具官某生為才大夫而用不盡殁為賢考而何其流之長也屬豫𥘉禋百執事在廟爾鑰不但駿奔匪懈而發揮潤色凡祀之大號皆稱朕意非爾素教而克然歟追錫有彛爰進厥秩非以為生亦德之稱可權吏部侍郎孫逢吉等明堂恩贈父敕朕既舍爵書勞自卿大夫以次第賞矣則推其世家為之報本雖禮未有獨不可以義起乎具官某故父具官某生有種德之美而位不稱殁享義方之報袁說友章頴父云生為才大夫而用不盡殁為賢考而何其流之長也屬豫𥘉禋百執事在廟爾某不但駿奔匪懈而敬之顯思之戒日徹于聽聞也劬躬燾後非爾素教之所自來歟追錫有彛爰進厥秩非以為生亦德之稱可煥章閣待制侍講朱熹明堂恩贈父敕朕方舍爵書勞自吾從臣以次第報則推本世繫及其禰廟皆寵綏之亦祭澤也具官某故父具官某少而英發晚益深造渡江諸老多其師友嘗歷郎闈秉史筆力詆和議緒正謗史蓋官雖薄而志在于天下後世也位不稱德識者恨之屬豫肇禋有嚴美報則爾有賢子勸講路門可無褒典以慰罔極之懷乎追錫崇階用賁泉壤非以為生亦德之稱可母敕朕既為卿大夫宏賁禰廟以侈教忠之報則母氏與享可無申錫使之匹休具官某母具位某氏來自名家克相夫子本之純厚申以敬恭其仰而事姑備極順適俯視媵御又何其不察察也是冝篤慶聿生賢子蔚為儒宗名滿天下則加以美號用慰孝思我有茂恩冝不汝吝可右諌議大夫張叔椿明堂恩贈毋敕朕方舍爵書勞自卿大夫以次第賞則為之報本及于母氏使匹沐于禰廟不亦可乎具官某故母具位某氐克相大雅如啇甘盤復生賢嗣如唐陽子然而生不得與于從爵之榮晚不得享大五鼎之飬儻無愍章以賁幽壤何以慰爾之廢蓼莪也因其舊號益以新封雖曰邦彛亦足用勸可妻敕朕誦二南之詩勸以義勉以正皆室家也我有從班豈無內助具官某故妻具位某氏儀于前人克濟其美遂相夫子為吾諍臣夫與之處約于雞鳴櫛盥之𥘉而不與之處樂于象服委蛇之後儻無追錫得無若汝水之墳南山之側遭世不淑詠歌辛苦者乎爰錫贊書以賁幽宅可孫逢吉明堂恩妻恭人李氏封令人敕朕誦二南之詩至於流荇采蘩相與共祭自天子逹皆內助也故詩人誦之仲尼定為篇首其意深矣具官某具位某氏以爾夫子為吾從臣肆豫𥘉禋執事有恪以朕之獲助于長秋則爾亦可以職之賞矣晋封美號庸示寵光雖曰舊章實應經誼可在外侍從明堂恩贈父敕朕既舍爵書勞自卿大夫以次第賞矣則推其世家為之報本詩不云乎孝子不匱永錫爾類蓋周道也具官某故父具官某生有種德之勤而位不稱沒饗義方之報而何其流之長也屬豫𥘉禋有嚴美報生民尊祖視古不慚而可以忘爾某之禰廟乎本之經誼追錫崇階非以為生亦禮之稱可在外侍從明堂恩封妻敕朕誦二南之詩至於流荇采蘩相與共祭自天子逹皆內助也故詩人誦之仲尼定為篇首其意深矣具官某妻具位某氏以爾夫子為吾從臣肆豫𥘉禋克輯盛典則豈惟長秋之故亦爾臣工嬪婦其流及上則不失職之賞庸可後乎晋封美號爰示寵光雖曰舊章實應經誼可汪大定知力江郡敕具官某嘗為嶺南郡卓然以廉惠聞而無以旌異之何以勸逺吏乎九江名邦牧以選授是用命汝式賞賢勞益圖民庸以俟迪簡可倉部員外郎汪梓升郎中八月十四日除敕以日月為功固非所以待賢能也而功令亦不可廢况晋陟為郎與員外置者絶有間抑芝以昭宿業勸寡過庸可廢乎可朝散郎江西提舉汪逵除員外郎敕具官某難進易退賢士之操也爾某議禮容臺浸有休問汲汲焉以外服為請雖留行不顧也將指奏公亟頒召節則舒遲纍月翔集可觀是不謂之士操歟郎闈之選南宫最清往其欽承踐修家學可中奉大夫提舉冲佑觀豐誼除吏部郎官奉議郎王聞詩除考功郎官並九月八日敕具官某等仕至于刺史二千石亦通顯矣而浩然有㱕志是不謂廉退之操歟爾誼持節湖湘吏畏其敏而固稱老爾聞詩秉麾淮甸民安其寬而固諗疾朕以是嘉之俾還郎省分治銓事往祇成命母有遐心可止齊先生文集卷之十六
