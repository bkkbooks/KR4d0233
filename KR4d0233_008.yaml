front:
  text: 止齋先生文集卷之八
  hash: sha256:7735b14356c91d9fe5da82e67f9c9dafdddb9bc427b78d255149f6251edf876f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_008-1a}
body:
  text: 律詩村居二首業己將身落耦耕時于觀物悟浮生擇栖未定鳥離立避礙已通魚並行野老窺窠占太歲牧兒敲角報殘更絶勝倚市看郵置客至還無菜甲羹野衣農圃雜華髮弟兄同佚老便居僻貪間喜命窮習成杯酌少脫落語言工危坐看流景新萌又落紅和宗易作屋之什欲因舊築倍勞形昔在先生配二程梅樹護持供北顧萱堂潤色作東榮但堪樽爼來三益何必籓墻屏五兵若徙荼䕷分乞我亦令兒輩記家聲送縉雲葉正𥘉兼簡杜伯髙我固閲人非草草君于前輩亦拳拳經師未數郯夫子筆力方窺李謫仙所恨尚於收第晚將詩空與背時傳頻年不信燈花報報得人來亦可憐和宗易賦素馨茉莉白蓮韻軒窗一日粲三英盡室無塵眼倍明閩粵固嘗矜絶美風騷猶未及知名羞將姿媚隨花譜愛伴孤髙上月評獨恨遇寒成弱植色香殊不讓梅兄沈仲一送菊自言封殖之勞欲得詩為報為賦三絶東籬何在菊年年菊視陶詩竟孰賢未必緣詩花更好花將詩與萬人傳霜螯風味小槽春新樣宮衣試麯塵見周禮麯衣注一段秋光誰領此芙蓉凡子桂陳人愁乾手自搭連筒苦雨丁丁杙小蓬乞得花開急催客明朝恐已著霜紅仲一以詩采用韻奉答陪侍經幃涉歲年亦嘗尚論鞠衣賢如今三嗅馨香泣惟恐將詩去浪傳嗚咽苔移玉座春昔年曾扈屬車塵重陽不見黃封酒只見餐英獨醒人剩有新詩入遞筒豈無能畫作掀篷金錢翠蓋相輝映著我皤然酒借紅寄題薛象先新樓矮簷風雨送蝸牛有客來誇百尺樓闔郡臺池皆下瞰背城湖海亦全收清時未放徒髙臥半世何為故倦遊解盡橐金君計決月眀長笛起漁舟立春千官勒馬謝幡勝萬國鞭牛占雨晴誰據稿梧相近午頰車徐轉鼻無聲除夜用前韻春來十日垂垂雨歲盡今朝亦未晴衰老見年殊不覺臥聽穿葉打窗聲送子壻林申甫還侍鏘鏘笙磬阼階東穆穆黃流玉瓉中近在門闌無此稱老來襟抱更誰同幽燕遺恨須收苐孔孟微言要忍窮精舍一區泉石好何時相就看冥鴻逰趙園主人避客竟何之雨過停橈落日遲賴有畦丁曽識客來禽花送兩三枝赴林宗大招賞牡丹之集剝啄要春酌團欒得晚晴千花名品下一葦病身輕文會非投轄清歡勝絶纓倦逰吾獨愧歸趂兩山眀寄謝懷英髙士聞君已得歸山請顧我方當絶迹時欲葺止齋猶未就篋中應有草堂資和張端士𥘉夏緑隂四合水迷津春去雖愁却可人無數飛螢窺案帙有時乳燕落梁塵滿塘荷蔭將還舊試火包香又斬新短夜得眠常不足僧鍾遮莫報昏晨屈原賈誼陶淵眀文辭皆喜道孟夏而悲樂不同雖所遭之時異要亦懷抱使然爾端士寄夏日一首若無聊然因和其韻頌初夏之美以解之送周介之同年赴德化宰民社須吾黨江湖足此情不堪秋暑近欲趂莫潮平拙宦成華髮憂時自短檠君看廬阜石千載尚垂名謝林默之居士惠酒居士山居方與世絶尚欲友此廢人耶小詩舉發一笑不將鵝鴨惱比鄰林下蕭然老幅巾乞與青州十從事添成眀月兩間人戈午夀國舉兄一毋分身四白頭從今家事付兒流只須老草供觴味乍可婆娑伴釣逰勞世萬人輸暇日好天一雨薦新秋平章何物冝為夀三十餘年晏子裘止齋即事二首性已耐岑寂老應忘隱憂齊年雙白髮盡日一蒼頭竹閉緘門鑰蒲團數漏籌未知庭廡下還有雀羅不教子時開卷逢人強整襟再貧看晚節多病得𥘉心地僻茭蓮好山低竹樹深寄聲同燕社眀月又秋砧戲題止齋叢石雖無壁立翠琅玕聊當庭前犢鼻裩我亦開之方伎者衆山皆大小為尊重陽和朱直方韻衰老登臨得並家絶勝十載向天涯直須與世為陶令謹勿令人識孟嘉藍水悲吟空雅健牛山醉墨謾欹斜誰知竹葉雖無分一笑何妨菊自花用徐叔子韻送其過毗陵家食年年未解忙浮況閭里但壺觴偶緣他故趨吳會可使吾徒憶魯狂曲水風流王逸少鑑湖窮約賀知章請於百尺樓頭上下視人間有肺腸送四眀汪文子文盛經生少官輕舉子繁誰能堪逺役相與及微言淺凍留春雨新愁起夜樽斯文吾不敢短句送歸轅寄九江宋居士篋中每閲所藏書長憶瀟湘九宛餘一别十年身尚健恨無飛羽過匡廬酬劉進之氷柱劉乂句綈𫀆范叔寒所親多物望相識半人寰今老猶徒步吾窮亦厚顔幽懷真易足萬卷屋三間己未上已清明霖霪故作落花天佳節重重倍悵然雖有庭除臨曲水更無尊爼試新煙酴醿雅欲延春賞杜宇還能破晝眠賴得二昆同一客蕨芽蒲笋短檠邊和林宗易上巳韻􅕣􅕣曙鼓五更初枚數何門可曵𥚑孰與課兒翻故紙幾曽緣客掃精廬常飢未免時中酒多病安能強著書自笑無才供視草徒勞身後問相如和林宗易雨後韻兼簡沈仲一溪山秋色日侵尋一水循除萬木隂幸有新炊送農扈可無勝踐盍朋簮蒲荷綿亘衡從畝鷗鷺追隨下上音寄語北湖休獨自摩挲周鼎與啇􅑄張端士以詩送蘭蕙因和其韻暮春堂上抱天和時啓柴扉與客過客有可人須語似新篁來看玉森羅寶壇寺林宗易韻夢回齒頰自天香何必招魂怨渡湘少待精廬天向曉有來嘉客歲為常雲山鎮壓魚蝦市煙雨莊嚴橘柚鄉最好題名雙石闕可題周曆萬年長答朱翔逺見别之作總角相看五十年行藏殊轍各皤然豈無子美書成束欲送相如賦上天俗眼不寬多小謹交情何限復長篇乘壺偶自兵厨至聊助征帆一醉眠嘗語客蓴鱸橙蟹的對或言今年斗門堅寒故蟹不上又今秋風急鱸魚亦鮮余發一笑因成二十八字專鱸有玉西風急橙蟹無金東海深祗為酒醒愁夜永二蟲得失我何心因客説秋秫水傷復用前韻風鱠不須鹽豉好霜螯須著酒船深無由種秫求旁舍旁合秋螟已蠧心已未生朝謝莘叟兄送梅無歲探梅不恨遲緝齋今送兩三枝也知造物多生意亦為畸人解笑頥壬子恰同身墮地庚申還值國開基數家誇道明年好好在長貧誦繫辭又莫笑栽培日月遲待看老幹及孫枝天將臘去春回首人與花同雪滿頥萬里隴頭空故迹孤山籬落但餘基至今佳句無人繼誰與招魂著楚辭覔花背山靣水竹周遭雖乏樓臺氣已豪更得好花千百本中間容我誦莊騷和徐魏叔見寄三絶蒲團坐閲歲如梭不管門前雀可羅投贈紵衣才薄物道人微笑已嫌多紈袴何嘗不誤身梁園金谷草長春送將重錦齊三十笑殺生芻一束人獨向心源識背趍豈於身外較精粗凄其下視人間世朝市區區地一夫和朱宰逰丁園韻榆火逢佳節棠隂接勝逰移樽欣及暇乘屐共尋幽日靜竹光合風喧花氣浮主情殊未倦衰暮為遲留庚申上巳何事天低雨露慳一遺晚百感又春關墨客山隂竹騷人洧外蘭誰知千古意不在遊間清眀後一日宴客明日宗易送牡丹有詩次韻客去朝酲惡詩來晚思和名花如洛上佳句近隂何雨故妨新火春應墮夢柯莫將行樂地蝸角動干戈和汪仲嘉樓大防二尚書賀鄭貴和華文休致韻貴和四眀人從其子泰興為瑞安主簿簮笏相摩入殿廬人皆自笑此區區豈無隻字踰華衮未必千鍾勝飰𬞞吾見北山多後倦誰如東里竟先驅追隨曵履枌榆社猶及香山退傳無巋然名節萬人尊詩落文昌帝九閽耄及衛公還失䇿早如踈傅亦傷恩華文延閣如今少神武修門自古存我與東樓最欣慕掖垣燈火幾同論寒食早起圍爐中戲和林宗易韻二首疊帳重裘更怯風絶憐寒食到匆匆一春不見花開落但讒栽花費幾工春工偏以速為神誰管沉痾未覺春禁得春寒長恣賞甘心輸與少年人晚移舟塘次值風而回莘叟兄有詩次韻經春屏迹與誰同苦雨衣篝亦自烘方此欲為官况事依然不值世情風蒙茸水國蒲荷蕩馥郁田家橘柚叢最是一年行樂處翻成咄咄坐書空送四眀方伯起世事關分合人情看短長君應愁冨貴人巳畏文章佇立親雙鬢追隨客纍觴未知歸定否吾亦愛吾鄉送楊渭夫入淮老去關心最語離不堪離久會還希君方慷慨思矜振我已婆娑喜惰歸萬事莫如身自愛十詩亦與世多違倘將書寄雨來鴈且問瓊花果是非從族叔覔老桂他山有桂老鬅鬆好植梅旁伴稿容著我對吟前赤壁乞君分與左青龍踰墻之樹冝無取國風將仲子兮無踰我墻無折我樹桑益屋于東本不凶家語有人問東益屋不祥孔子闢之恭想短章蒙一笑便呼鉏钁破苔封蓮花伯仲之間竹與梅魏姚聲價浪崔嵬雖然亦混魚蝦處風度自從丘壑來寄林宗大春巳無情雨妬花病還妬客到花家今當未雨才身健杖䇿來看半吐葩和莘叟兄詠張子房韻不緣多病遽懷安閲盡人間萬事難謾以笑談分楚漢竟將功業付蕭韓朱及之以所種荔枝結實招飲不及赴以詩謝之閩譜余嘗第狀元年來雖見僅名存貢存天寶猶徒擾賦似相如亦妄論每羡朝陽私沃壤正愁秋雨妬芳樽綘衣玉質今何夕照我西歸十二軒及之云以風雨僅存十二顆從徐一之覔菊我欲作亭題獨立苦無翠蓋著金錢園林百輩皆名勝為趂西風乞冗員土盆瓦斛空中久羞見重陽插滿頭寄向柁樓煩送似筆鱸韲蟹待新篘次韻奉酬徐一之送菊桂叢蘭畹悄無譁但有哀鴻天一涯節物更誰知白髮交情於此見黃花聲名獨立空秋際香色平鋪與露華南雅未收騷致意騷人應欲輔詩葩廷植姪得男朱文昭寄詩於湯餅集即席和韻喜説徐卿得二雛吾家波及亦君餘青衫手板冝從此斷簡家藏莫付渠但欲健如黃犢走不妨錯寫㺯麞書更看湯餅頻頻供笑索梅花到歲除送鄭主簿泰興解官歸四眀師友於今説鄭鄉親庭分付舊行藏但知職分冝棲棘盡把聲名屬憩棠一字未曽緣薦墨扁舟才可著詩囊問津漁浦多西笑獨為菜衣味更長泰興以乃尊華文老不能車迂道處婺自錢清漁浦歸四明送孟延昌歸蘭溪典同周命士律協漢諸郎師友今千載妻孥各一方髮從何處白菊有去年黃惜别無多語關雎三斷章劉進之飲蕃叟弟筠亭且賦詩余與蕃叟族居蓋屏迹不出各數年於是有感次其韻判與漁樵日往還鶴亡蜂遁徑苔斑何人不棄尋常事有弟相忘咫尺間寬綱及余端已老祥琴相爾未應間但將丘壑全分付可待移文始厚顔林宗易劉進之見訪有詩再用前韻牛羊日夕鳥知還休説年時玉笋班四皓亦嘗空老去二疏不在共功間修書尚覺歸期晚隱几兼忘永日間况有宸章長對越昭回雲漢不違顔題錢宰吸光亭圖棲身雲夢八九上用意風雩五六間惟有澄波兼皓月尚憐波月蔽虧山止齋先生文集卷之八
