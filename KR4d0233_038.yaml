body:
  text: 止齊先生文集卷之三十八手書答劉公度二某乘障無狀誼當自弛不謂誤恩就移廪人每惟衰懶日與不勝巳者處當此委寄何以寡過及讀來教又惘然自失也經生徇偏何者為全文士逐末其本安在拘攣並緣必有受病之處充塞中節豈無進德之序所以見告尚愧不敏况言證不及藥未覺為益須嗣音切完之倘有鄙見亦當反覆某老矣何以慰四方士友之望然年來篤信六藝之學兢業為本彼此紛紛自為黨與若人之巳甚亦恐吾人躬未自厚而責人不薄有以致此以來事者君子遺恨如左右應洞然察之耳某汨汨無新功有愧益前見在諸病以不得藥為請今方可無以復來辱凡書云云載在方冊不可勝用也足下亦博識而詳考之矣願以為問或者筮仕履之而後難歟夫履之之難則自信之難也士誠自信以為與古人無間古人䏻是吾亦宜能是古人能是吾獨不能是者非其質然也私欲害之俗學汨之也欲免於俗學惟去私欲者䏻之私欲去則見巳見已則自信苟自信矣凡書云云載在方冊者不可勝用矣足下更反求之未田合并臨紙惘惘答道州康判官辱惠書及於屬吏弟員之說足下誠有見於此幸甚來書以為本職無門有司不以為過然後望以磨礲成就之益豈惟吏道然耶學者固同然也今之望於人者異此矣吾無闕與否不暇計人以為有過與否不暇計獨胡不磨礲成就我耶但曰胡不磨礲成就我道以義言也或者相望於利相望於利必人人而恱之然後無咎安得如足下之語告之也未由合并臨𥿄惘惘答趙南某衰惰久無強附士友之意晚得名勝喜後自失晦菴門人真有學者而不相亮者云特未并合耳雖然吾黨亦有患自相推尊患太過與人無交際患不及二者皆孔門所戒也頃因欵洽嘗及一二來逺有同風三代之語得無猶未聽察乎詩篇儘佳更加停勿以言盡意為三百篇往往為訓故家解駁類淺迫人意有逺矣謝逍遙嘗說三百篇非易其心而後語者不能此義足可三復公餘但於南雅索之聖賢貴寡怨詩至於可以怨必有道也來教所謂攻之愈力愈不見效豈謙辝耶克巳非攻之之謂在易休復以下仁也人患不肯下耳譬之鍾聲擾擾者無聞初非有物間之者擾定則聞之矣答漳川守范東叔拜違以還辱貺教不一而奉狀亦無便豈但以獲詳行李為慰要是别恨牢不可釋家人婦子尚不能團頭况於交遊又况士宦此理洞然而亦未易以理遣也領開府後書就詳動止感愜幸甚然事力如許雖有慈惠之長而不得騁令人寒心隨機方便量力濡沫正賴儒術耳某嘗侍坐語及四總領恐是今要告去處住時北伐諸將各擁兵總領不顧驅催漕計自以諸軍隸御前始以版曹即領總餉而别置所版曹長官莫得要領是漕司本行文書則天下財賦盡在四領所若非稍稍從此整頓民窮無救䇿意矣嗣勛足得啇確或者其時乎張子儀元等所减次第虛額然亦盛意謾録二公奏牘因或送嗣勛如何來及之喋喋悚息正是自破戒堪發一笑與朱元晦某逐祿南來本為溫飽不謂善歲晚遷官至於將漕然但循故事無所建明終當他去而亦未得其說何以教之此專人所為道也非豈所以事君而公論開塞日異而月不同敢乞安時處與如戰兢自發眉夀用答海內欽遲之意某衰惰之跡幾自絶門廣而長者尚教之便中再拜真翰之貺感激不可言此先施豈附報官事優擾及今始遣辱幸察之非敢望也來徴詩說甚荷包所見何藁豈嚮時聚徒所為講義之類則削藁久矣年來時時諷誦偶有興彂或與士友言之未嘗落筆誠有之當於長者有隱耶區區愚見但以雅頌之音勺群慝訓故意句付之諸生尊意以為如何每懷企慕三十年間不在人後㑹并差池未有瞻侍之幸聞見異同無從正間欲以書扣之念長者前有長樂之爭後有臨川之辨如承康往還動數千言更相切磋未見其益學者轉務夸毗浸失本指蓋刻畫大精頗傷易簡矜持巳甚反涉吝驕以此益覺書不能宣要須請見究此衷曲耳不數月還浙可啚即償此願尺楮匆匆但有悁結與王弱翁某衰惰冝休歲輒遷官雖荷借譽之力然有見短之懼亦未知免所也廬陵政績在左餐右粥之民而不在逺客與強宗大族得失當有能辨之者暫屈何病區區更兾寬以居之勿以絲髮見於詞色戲綵娛親之暇杖屨從容與鄉後進尊酒論文為樂仍一切不及時事以間執讒慝之口未省尊意以為然否有如尊意不合幸切磋䆒之也仲權正字貧甚子靜淳父皆需逺次奈何陳正巳亦寓里中復教官非所以處之也何時晤對伏紙與立宗某衰暮之跡向綴班行伏蒙眷遇特厚言念疇昔何可弭忘某官才猷器業蔚然為當代第一方𬒳選入蜀無幾微不自得意旌麾下壓境三陲然世將之後人將謂何重以疑阻半年無師蓋朝野凛凛然而迄無西顧之憂非公門有重臣其克底此乎須因內引嘗遵勳業泰安喜見天顔且曰當用漢賜金故事旦勞還房雖事不果亦足見九重倚賴也甚盛甚盛三事遞遷還歸𥙷庭之闕而識者無先於門下非但交遊之私言聖明後視聽一新伏惟歡慶與國舉兄家書書黃事前日不及細淮上有劉煒運判者以禁私鑄太急幾生事遭論罷久之私鑄戢留丞相追功遂畫㫖再與監司樓大方駁還者㫖令以次官書行即是傅良遂竟書過蓋以為劉煒不是人贓吏罷去年歲再與差遣此何不可而紛紛云耳後生小子妄相䚹毀不足聽也不足聽也近復有御筆陳源除押班內侍官比外執政人張子仁除節度使此事所繫甚重謝給事已放過押班事傳良獨繳之朝論甚以為危乃蒙聖恩容納至今不出至除節鉞合先送給事却直付舍人或說謝給事有人主振故令劣弟當此重難亦獨繳上次日御筆封付陳傳良可與書行再繳上亦蒙聖恩寢之不出此兩事繫朝廷非尋常事之比至此公論方信劣弟不論其細而論其大捨易而犯難矣恐家兄不知端的見謂苟且有玷家傳特此詳報却勿令一人見慮有人讒謗以為好名漏泄上旨也至祝至祝與徐韞之涉夏一病幾殆以丹附扶衰稍善餘無足煩軫記者昆仲時時過訪備詳譽處然年來喜於相安左右意象挺特且習聞前輩師友風㫖更宜誘掖工大而損挹裁抑乃時善教之道至和若夫嶽麓餘芳令人起橫經於此自有足樂不可不自慰也憲家子弟亦往還否何時每一見輒談中興問趙張秦為長跡灑灑忘倦晚入修門數詣東西面言其人不可終廢後相不領略鄱陽相頗有意未及拈書亦各東西矣至今忿之旦恨不得秦師垣相業一書付史館助南董之筆某老矣此勿念左右年方強儻能從吳察院交諸折窺見所藏不長沙此行耳外此只改秩一事須索結知帥閫回同年進士莆中來軌及識面尋亦行藏異塗頓成踈闊假如不踈巳難破彂言之戒無足為左右先容者徒切愧衷如之湘中教官惟㑹府多名士其舉削或溢格故事如此想不至左右有遺賢之嘆盍少須之也因會丈煩致疸暑不及拜狀皇恐之意諸相識不外此懇答張端士五下問漢髙封國是𥘉來急於撫定得不然班孟堅諸侯王表說得錯至今因仍未明使髙帝以延年歲必别有區處如本朝藝祖開基事多未䆒英雄如二君豈容䡖議自古功業多遺恨惟周公無虧缺孔孟監二代兼三王之論王通說經制大備皆見得徹載師閭師縣師三官皆征賦稅載師乃征公卿大夫王子弟諸食采若其食者三之一之類其征之民則什一而自以租歸公上則有差等輕或二十而一重或二十而五若其它受田之民什一之稅鄉則征於閭師遂則征於縣師顯然三局自昔諸儒見不破可勝嘆也某病軀日衰弱漸漸了得春秋一書及未啓手足之前更加刪潤則自有春秋來未有此書可藉手見古人無怍更侵砌結褁詩傳看了在何時它工夫截斷惟日課易未敢輒下筆深見乾震之爻辝皆危而乾言吉只緣純陽聖人垂訓意深矣許由君務先之徒治舊學如後來甘盤自古此一輩人竟晦藏念此妄想盡詩固佳更宜練功某病後且搓排過日非能如所亦愛之者過辝也毛氏詩傳淟汨有年久欲為彂明之因附已見其下且以𥙷吕熟之缺自今夏落筆近緣過客廢矣未期其成就也有暇見過略觀綱目為佳某近復苦泄瀉今幸稍愈以年例論之如此浸久是結褁之證也萬事巳置勿論惟春秋後傳垂成尚缺删潤不免就病中勉强詩說盡豳風雅頌亦未落筆此書又看天命如何耳每見云云某以為不作悵然人生與草木俱腐者何限不恨固非恨亦非也倘可自見勇為之為善也某初有脾寒前日復作雖不過一日所損不少也愛念甚荷端士力如虎亦復畏厄歲何耶新詞相好要是未圓熟耳著書最關心病懷益覺要緊所恨無朋友共成之奈何奈何舒宰政事止如此聞之殊為嘆息代胡少欽監酒上婺守韓無咎書管庫之士自古卑之矣而今為甚古者財散於民縣官但衣食租稅而所謂鹺茗醯酒凡民用之百須公上不牟利焉則管庫云者止於籍出入校餘缺以告於在位為每歲制國用之節而物之不登經費之不支在位者實憂之有司不與聞焉勾稽之不察扄鐍之不時度藏之不免於燥濕腐敗舍是有司不任其罰是故其職甚簡其責甚薄也士君子之不遇於世者可以祿食於其間而無悔咎夫子嘗為委吏矣㑹稽當而已為是故也今也不然由漢而下公上所以榷民者講求悉矣而􅚖茗醯酒凡民用之百須皆有征而甚詳於今自建隆聖人專務寬厚不忍以加賦厲農而祿士餉軍隄防大河固圉三邉與夫賔賜祭饗凡邦之大用不可已者往往十有六七仰給於征榷之吏蓋今之田賦視古有損而征榷之入纍數十百倍於古則管庫云者不但籍出入校餘缺而巳其督辦也有課其輸送也有程督辦之弗集輸送之弗繼在位顧缺然無以為計故凡物之不登經費之不支轉而為有司之責而勾稽扃鐍度藏之細不與焉勞亦纍十百倍於古矣仕乎此者雖欲徒祿食而無悔咎如古者不可復得國家知其然也待之亦加異矣自州縣監當官皆有賞恪而可以察學於其長與他官曹無異在京釐務凡有錢榖之藏者賞之特厚而為上選用亦與他官曹無異若是而曰卑甚於今何也其居使之然也今夫皆州縣官也皆得以察舉於其長而繇幕職教授若曹宫令佐得之則人以為宜繇倉庫務官則人以為怪皆在京官也皆得以選用於其上而由檢鼓諸院得之則人以為宜繇審計榷貨之官則人以為怪等而上之繇卿監為侍從則以太常祕書國子為宜而以太府司農為怪由侍從則以學士給舍諸曹尚書為宜而以户部為怪名實未有分也而取舍若是豈一日積哉夫以征榷之入歲纍十百倍於古而其官司之勞亦纍十百倍於古國家方加利焉而卒卑於士議如此則自愛者宜知所擇矣某也不才由太學諸生以塵末第窮太甚逐食太急以措身於甕盎㪺杓之間蓋日夜念此自憐矣凡三易守未嘗敢自言也今者執事來守是邦某伏自計今之諸老先生尊經而下百氏可望以古道者莫如執事國朝以來世為卿輔䆒觀本末源流之際而通於今之務者莫如執事若夫議論持平用意均一即之溫然有并包兼容之度而其中如鈞石之有銖兩不為世俗取捨以亂名實者又莫如執事於是輒不自揆道古今之異陳國家之大意與小巳之不善擇而告執事庶幾采察焉若執事猶曰是管庫之士而胡敢僣易若此則某繼今不敢復有言矣止齊先生文集卷之三十八
