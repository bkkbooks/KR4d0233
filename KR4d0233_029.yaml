  text: 止齋先生文集卷之二十九
  hash: sha256:663fc9cdb7e0e46ee6b088ddff6f6849e87dcbbb42f43473ea59d88c1f43895d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_029-1a}
body:
  text: 壬辰廷對臣恭惟陛下彂徳音下明詔博考漢唐巳然之効下問承學之臣慊然有師古不自用之心頋臣淺陋何以稱塞抑臣聞自古建議之臣赴功之臣翊扶治道之臣類竊嘆曰不遇聖主如遇聖主當不自用則言無難行事業無難就者臣亦稽之漢唐興王雖六七作考論君徳鮮能全羙是以規模𥚹迫而治効凡近陛下寛仁神武對于二五之隆粤自紹堯所以剪除文具脫畧邉幅嘉與群臣洗凡而破陋以躋至治以迓宏休甚盛甚羙臣愚妄自量度陛下之聖誠具二羙何謂二羙臣觀比年有大更張有大施設造命之初慮不可奪一旦事狀陳露陛下頓悟立改曾無留難天下咸曰陛下之無我自昔所進今不知其為何以其間盖有違詔令負任使者陛下察見情偽一予一奪動中公議天下咸曰陛下之知人夫以無我之量知人之明於漢唐可俯視焉而臣伏讀聖䇿曰朕丕承大統司牧兆人寅畏嚴恭懼徳弗類是以順考帝王之憲鋪尋載籍之陳求其可師以濟于治盖方慊然師古而不自用如此則臣所謂言無難行事業無難就者捨此時尚安湏耶然而十有一年于兹而治績未進于古下情猶欝公論猶沮士大夫猶有懐不敢盡獨何歟或者陛下之所以聖亦所以累盛徳歟不自用之心雖能形之於言未能克之於事歟臣竊迹前事曩者創復彂運經營移屯當時廷臣亦有䟽其非是者而陛下姑惟試之終於無狀今謀者有譴矣将命者有譴矣豈惟朝野誦九重之不吝而服其英㫁哉雖陛下将自喜矣苟惟自喜是以為累夫有去故之喜則有圖新之謀抑臣未知来者之獻計果有以異乎此否也以臣叅之輿言揆之事情其誕謾苟且舉是類耳陛下捨彼取此而不察其適相類臣恐後之悔今亦猶今之悔昔無乃以大有為之時徒費而為改過之日月乎夫以天子聖明春秋鼎盛何向不立今且二紀歴日彌長歲復一歲改過不給可不為惜乎漢元帝唐徳宗寵任群佞不移如山遇主如此政復何恨柰何以虚心大度過不憚改而僅足以度越庸主而竟無所施也聴言之道亦於誤者察之耳假如曩者以好邊功誤繼今言邉功者無遽聴可也反而求之愛根本可也曩者以徼近利誤継今言近利者無遽聴可也反而求之識大軆可也且陛下何不一思曩者誰為主張是乎時不再来事且積廢毎試不効曾未决捨巳乃數悔而頻改之豈所以圖全耶臣是以妄議陛下雖有無我之量而累於自喜也且陛下之所尊信所寵任其果以為皆忠實而無欺乎深謀逺慮而無敗事乎若果待之如此臣知陛下必巳舉國以授之矣今乃不然雖巳尊信巳寵任盖至於論人論亊之際陛下類有執而不從從而不盡者然則尚疑之歟夫尚疑其人則必既其情而待遇如故委寄如故何耶豈非聖明之意自謂吾能知之吾能駕馭之彼雖欲為欺不可雖欲害吾治不可姑亦縱捨而弗問乎以此自恃所患滋大何者聦明所加豈無限極萬機之務烏能徧知陛下之所執十不一二而轉移侵竊於冥冥之中殆不可勝數矣夫未知猶可耳既已知之彼且求固凡所以自歸於君上者惟有恭順耳惟有伺候趨和耳惟有養交借譽以蓋前愆耳陛下見其如此因置弗慮豈知面從者皆所以為背違之地乎苟無誠慤豈足慿藉今予之亊權假之歲月足以遂其私矣徒曰駕馭隂受其害此臣所大惑也大抵使貪使詐惟瓜牙之賤役可也股肱心膂要湏忠良用人之道百王一法不宜以洞見是非易此弗守臣是以妄議陛下雖有知人之明而累於自恃也夫陛下之師古豈不曰吾将不自用也然而陛下以無我之量而累於自喜以知人之明而累於自恃始臣管窺陛下之所以師古是誠不自用耶抑名曰師古而實自用也臣伏讀聖䇿曰惟七制之明后若三宗之顯王固本培基則有務徳之君振旅治兵則有雄才之主習聞其號未睹厥成咸有所偏未臻于極夫樂其號而考其成患其偏而要其極誠如所言信陛下有師古之實矣抑臣有疑焉何也臣伏讀聖䇿曰若孝文之徳則罪不孥官不女惜露䑓之費除租稅之征可謂仁矣然而恬芒刃之施釋斧斤之用惟尚寛厚其威不伸朕以孝文之文也而能厲之以武不亦善乎臣固知陛下慕文帝之寛仁足以冨民而所闕者武功也且陛下自度所以富民者何如文帝耶臣觀文帝以錢榖問丞相而陳平不對謂是有司事耳非所以煩廟堂由是漢之計臣得以自盡倉廪之吏至以氏其子孫臣不識今之所謂家宰制國用於左藏之外別為南庫者何也且其辭曰經費一領於大農而増羡幣餘之入南庫受之其名頋不甚羙乎然而操制國之權與司農孰為輕重增羡者遄有遷擢經賦辦否則莫能黜陟也厥今漕臣守臣類多自營觀此二途意将安向是以比歲經賦日耗而南庫之積日滋大農告匱時捐數有萬緡以相𥙷足比及奏聞屢有徳色且均之為國用耳虚彼盈此竟何謂耶夫兵廪如昨吏禄如昨凡歲百湏如昨而大農甚匱将安取此陛下信以為版曹諸臣自賣以取辦乎抑甘受闕額擁虚数坐俟乏絶𬒳誅譴乎不能為此必且他為謬巧以苟逭嵗月之責是以上不加賦而民生嗷嗷夫暴征横歛出於朝廷則羣臣得以論列細民得以赴愬今也州縣之賦一按故籍無秋毫加益焉而有司巧為斡旋暗相資奉旁縁科色誅求錙銖羣臣欲論列之耶細民欲赴愬之耶而獨無彰彰之名可以指摘所以至仁在上惻隠至矣而澤不下流是可不為寒心夫文帝以司農理財至於寡取陛下以宰相理財至於多取臣故曰陛下慕文帝之富民而不由其道所以評文帝者誠善矣而無益於治也臣伏讀聖䇿曰若孝武之功則選明将討不服匈奴逺遁百蠻向風可謂盛矣然而積屍暴骨快心胡越財賄耗而不贍干戈因以日滋朕以孝武之武也而能本之以仁不亦善乎臣固知陛下慕孝武之雄才足以強兵而所不取者薄於仁也且陛下選将厲兵亦嘗用武帝故事乎臣觀武帝操縱将帥最有䋲尺旦乃以愛故欲将貳師夫以帝之威靈寵一偏将其誰敢議而帝也必枚卜諸将貳師最吉然後行之誠不欲以女子之故弛廢家法抑絶廷議也今天下之兵不属之三衙與邉帥乎或云近者禁扈之際專閫之寄徃徃由徑抑臣䟽逺未知信否間亦得之防夫走卒街談巷議以為諸将平時所以侵尅廪錢隠占伍籍貿易稱貸以謀聚財大抵将以結交媒進身耳臣竊憤之夫以陛下䔍意戎事妙選授鉞雖大臣且不預議尚安有此日夜思念莫執其咎或者左右朝夕積譽之漸逰談之久亦足以宿留宸聦而宻囬天聴耶患生所忽殆不易知陛下習聞姓名忽不以次用之當是時豈敢有誦言論薦者乎蓋其於簡記之先借助多矣夫㫁自宸衷㤙顧歸下賂入私室怨在公家凢有愛君之心誰忍聞此况又将帥素輕士不素附而欲望其立功靖邉不亦難乎且武帝以私選将猶不廢公陛下以公用人柰何不稽于衆顧得以容私耶臣故曰陛下慕孝武之強兵誠得其所長而擇将之理未盡臣未見其能強兵也臣伏讀聖䇿曰文者帝王之利器武者文徳之輔助也文之所加者深則武之所及者大唐之太宗實惟兼之觀其内平禍亂外除夷狄安靖黎元各有生業史氏所以稱其功徳兼隆由漢以来未之有也臣又以知陛下小漢家之偏尚而想正觀之獨隆陛下之志豈不大而學豈不博哉然臣㩀漢鑒今未能無惑而折衷諸唐殆有四未諭焉夫陛下以古問臣臣不敢徒以古對如陛下誠有慕於唐歟臣請言今之所以異於唐者碩陛下審擇而更張焉則豈惟如唐将有隆於唐者惟陛下所欲耳太宗諌官入閤之制非以求諌耶而陛下不樂忤意之臣此臣之所未諭者一也太宗幕府學士之選非以崇儒耶而陛下有䡖視儒生之名此臣之所未諭者二也太宗感魏證之言使群臣不存形迹陛下乃以近名責臣下此臣之所未諭者三也太宗屈意讎臣而不以秦府自衛陛下乃以合黨疑外庭此臣之所未諭者四也臣非但以太宗望陛下者安敢懐所未諭而不試陳于前曩者議除發運議遣泛使論思臣一語不合徃徃罷斥甚或流竄事亦少異矣雖然是尚有可諉者曰是非官守言責也日近除授而䑓諌有所彈奏舍人不書黄學士不草詔是不曰官守言責乎蓋軄分常事耳而夜半一紙忽從中出或廢或逐曾不淹辰而吏卒譏訶不容置輦轂下夫震霆不及掩耳古所以待桀猾也此皆陛下忠愛臣子進退惟命安用若此忽忽惶惑民聴哉夫陛下有混一夷夏之志而不能容一二齟齬之臣将以垂宗社無窮之休而不䏻少屈湏臾之聴省闥䑓掖虚位㡬月臣竊恠此何景而見於不諱之時也太宗獨不怒諌臣乎宮中無髪之語尚能忍之深知言路閉塞乃人主切身利害彼紛紛以口舌爭者果誰為也臣以為陛下誠慕大宗當自求諌始腐儒空談祗亂人聴豈惟人主厭此雖稍知務書生固自厭此陛下不與共事其誰念之哉然而腐儒端不可用而不可有輕視儒生之名何也非所以招徠其類也非所以令衆庻見也脫有真儒亦其儔輩或以取輕為媿而一動歸去来之心陛下安能有之夫燕昭之禮郭隗其虚聲猶足以致士焉有聖人撫御天涵地育而一旦有弃士之名哉且以陛下臨御以来凢所謂陋儒其被戮辱蒙頓挫者誰乎蓋未之見而逺方之士風傳料想徃徃過當或曰經筵特虚器耳科詔特故事耳賜出身特未混流品耳無乃闕盛羙矣乎十八學士豈盡全才間亦無過區區章句文墨淺事而太宗兼取並蓄厥意不獨為縁飾也臣以為陛下誠慕太宗當自崇儒始夫好名之士貌異而心不同如其浮躁剛愎掠羙于已而歸過于君誠不足頋惜也以臣泛觀人才無慮數等蓋亦有介直而不隠踈易而寡慮其温言似掠羙其憤悱似歸過者要其存心至拳拳也至不自為計也若以好名槩視無乃非所以全愛之乎且陛下亦知其所以失者乎其器度不宏其所養未厚焉耳夫惟容小所以見大納汚所以成深人主固當有逺過天下之量也儻亦以不推遜為諱不彌縫為嫌不㡬於示天下狹耶正使不然而以聖徳洪深責備臣子稍稍矜露亦恐凢百在位俱不足以望清光佐下風矣陛下将誰與共理乎臣故以為陛下誠慕太宗惟無以近名責臣下可也獨不觀魏證請以諌藳付史官乎脫欲爭名将以焚草為賢矣仆碑之䜛乃晚節一恨又何足法臣竊考自昔黨議多興於下何者此人臣相傾之私而非君上之願也蓋黨成則大官重權利歸于巳誅戮斬殺怨在一人而禍歸社稷若其不成又将沉浮苟免耳由此觀之黨議成否一無便於上者此太宗所以中持衡焉無所偏倚以銷伏其爭而和平其心臣愚不識近日戒令何為而合黨之言累累發也以臣觀今群臣大抵外同内異惟身是計何暇相黨假如議一大政䟽一大臣甲纔譴訶乙且退縮其餘立而觀之耳甚者反是而迎合耳陛下何不審觀比年亦有議一事而連章不置如曩時濮議新法事乎亦有用一人更數年不奉詔如曩時李定入䑓宋敏求李大臨蘇頌之徒乎亦有逐一人而同列乞與俱坐如曩時范仲淹尹洙余靖之徒乎正患人臣不同心耳而陛下方以為黨此人臣私議於國何利而可倡於君上哉臣故以為陛下誠慕太宗惟無以合黨疑外廷可也牛李之禍唐之所以亡也豈太宗家法乎臣伏讀聖䇿曰瞻言清風竊所嚮慕伊欲規其能事跂其成績何修何飾而外户不閉行旅不齎何取何營而斷獄㡬刑措米斗直三錢歟家給人足厥道何由仁義功利四者之宜當安所施臣以爲太宗能事成績不越數端陛下所爲修飾莫若去其不如太宗而就其如太宗者捨是将有所營取焉非臣之所敢知也且陛下試思臣之所未諭者其與太宗異果何由歟豈非恃天資之髙明謂天下可獨運而專齗歟昔正觀之初蓋有以獨運之說惑太宗者矣而太宗卒莫之聴是以後功利先仁義而收家給人足之効陛下欲比迹焉而操其所不用之術臣竊爲陛下惜之方今下情猶欎公論猶沮士大夫猶有懐不敢吐而陛下方且顧盻周行類不適用慨嘆當世殆無其人非以忤㫖而去則曰是腐儒耳則曰是好名耳則曰是黨耳然則陛下臨事腹心将安寄乎於是乎雖有弃文尚武親内踈外之心臣豈不知陛下固非好違經常然改圗而徒蒙不韙之議哉誠以一時聞望之士歴試而甚亡具十年以来凢許國者皆不踐言也大功未立萬緒缺然展轉周囬莫能與濟是獨非人臣負陛下至此哉雖然意有所偏則事有其禍詩不云乎無田甫田惟莠驕驕無思逺人勞心忉忉臣竊憂陛下之他有所求将以獨運専㫁而去道愈逺徒以勞心也且陛下之所以右武臣未知何如也竊聆近制削下拜之禮升雜壓之序夫操馭英雄亦顧聖略何如耳安用此瑣瑣為耶是固其細者也彼閨閤賔賛之臣肺腑之戚强名曰武特服餙類焉耳爵號類焉耳欲實安能而陛下優㳺容與累年之乆而再卑之樞筦之地豈惟縉紳煩言韋布䘮氣下至於老兵悍卒亦籍籍後議有侮視不平之心方當大有為之時而但曰不必右武誠迂濶矣若陛下但以名取苟服餙爵號僅與文士異輙取而寵之百僚之上罷亦不失麾鉞居不足與謀也出不足與戰也無乃似武而卒非乎夫以似是而非之人躐䖏民上而曰以作士氣以起戎功臣恐其去腐儒無㡬也陛下何不因群心之所共違而察一意之所獨嚮乎且陛下清心寡欲不翫細娱彼侍御僕從之臣凡所以承間而取憐者一無惑焉則陛下豈偏厚内廷者㢤或者徒以好事逺畧好察臣下興利除害之心動乎其中而或為容恱者所中耶何者欲撃射之便則不可與外廷共習欲探伺之宻則不可與外廷共議欲用甞試之說則不可與外庭共施行勢非此曺安用乎夫陛下用之纔不過此耳而影響氣艶足以傾人不惟容姦殆且生患比年群臣或以言斥或以事斥者相繼也獨侍御僕從未有聞焉豈在位皆浮偽而彼獨無所蔽欺耶其地宻邇其彌縫之計精也陛下手撓指頋彼因而趨之矣陛下聲嗟氣嘆彼従而和之矣若是而不䏻幸免将誰幸免耶外議因是謂果親之也患且必至陛下何不因群心之所共違而察一意之所獨嚮乎陛下聖䇿之末丁寜於臣曰子大夫習先聖之術明當世之務合志變義其知之矣具明以啓告朕悉意正論無枉執事朕将親覽焉臣誠淺陋無所稱塞區區之愚獨以為陛下有師古不自用之心而頋恃於獨運專㫁任一意之所獨向而忽群臣之所共違是以下情猶欎公論猶沮而士大夫猶有懐不敢盡故於卒篇乎獻焉而不復它云詩云心乎愛矣遐不謂矣臣不勝拳拳止齋先生文集卷之二十九
