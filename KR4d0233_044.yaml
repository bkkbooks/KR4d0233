front:
  text: 止齋先生文集卷之四十四
  hash: sha256:6ae00cfe1a89fd3e7df1075d8d10d742e5a116ca05907ff5d651bcc531a90c87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_044-1a}
body:
  text: 雜著瑞安縣學上梁文吾邑有學繇慶曆而來諸生置員於崇寧為盛久矣趍廢誰其嗣興弛百役以獨先彌三時而具舉有嚴函丈可以橫經於粲周廬可以肄業共惟聖考侈廟貌之前觀顯允賢侯輯儒先之善算事關風俗歡動州閭斯抗修梁爰申善頌東吳會修門一葦通璧海源源流道德也應泮水日朝宗西峴首蔥蔥雨露低更上觀潮試回首朝陽合有鳯凰棲南一曲清江與地參驚世文章曽不露橫塘居士府潭潭北閩粵群山來不極三峯之下可無人能以功名留翰墨上閶闔方今開蕩蕩少微正照斗牛墟此有隱淪誰與訪下七八十翁多在者自言生不識干戈長得兒孫皆爾雅伏願上梁之後群書充㨂多士填門相維鬼神無風雨漂搖之患燕及㣧祚皆山河魁磊之英到桂陽謁宣聖文共惟夫子之言曰有一言而可以終身行之者其恕矣乎某質簿氣粗誤有民社願事斯語以免於戾敢告桂陽上元設醮青詞乃者庶證非常連隂不解爰方假守何以召和會王曆之𥘉頒雖修故事面天威之甚邇實貢忱辝恭願哀矜一方嘉惠百榖事關民命寧使臣霑僥幸之恩咎在臣躬毋令民𬒳阽危之患桂陽中秋設醮青詞疾痛呼天輒自忘其僣越髙明覆物終不忍於顚隮永惟返風滅火之祥何啻虛谷應聲之速敢慿羽侶式謝鴻私恭願不異塵凡有來肸蠁憐臣斗筲之器雖負民社而不勝念臣葵藿之誠蓋填溝壑而未巳遂無它咎以迄終更桂陽軍修城隍祝文有屹崇墉爾神主之彼圯而闕冝崇輔之築之闐闐尚呵護之允也有成維皇其嘉與之桂陽軍禱雨文某假守於此大懼涼薄不足以用昭事明神以祈歲事乃者烈風荐作嘉澤弗周粟禾且憔悴夫為吏之日短神與民相依之日長奈何以吏之不德而為斯民病也敬申前請敢告終惠謝龍山渡侯明應文維侯所宅桂陽之望風雨不時於是焉禱其諸古之所謂境內名山川歟茲者嘉澤弗周烈風荐作菽粟幾空禾且就稿固宰物者所以謫吏而侯亦豈遂忘此土也遣官乞靈齋宿以俟侯不督過而辱霈施之某雖無以愈人猶足以伐石撰詞昭示後來永永無怠周子名説周子請名余命之曰仍之蓋取古仍孫之義周氏之門父子孫凡三世傳曰野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣夫欲為士大夫者必世其家者也三姓之舊於今為庶畢萬匹夫也而大有後於晉國是在懋不懋而巳故字之懋長朱子名説吾友朱同之之子名植字直卿名字所從來曰祖父所命也欲易其字為直方而植因書以遺之使持白祖父視如何也謝居士贊貧而好施隱而好客終身鰥居而義不廢嗣息豈其所謂非儒非墨而自適其適者耶自贊以學多病以貧數窮佚我歲晏亦二者之功歸寥寥太空儻不離人即為良農桂陽軍告諭百姓榜文照會當聀到任欲得民間通曉法意檢坐到見行條法如后父子律子孫違犯教令及供飬有闕者徒二年勑子孫違犯教令及供飬有闕情重者鄰州凶惡者千里並編管敕諸生子孫而棄之者徒二年殺者徒三年收生人共犯雖為從殺者與同罪棄者徒二年半並許人告若地分及鄰保知而不告殺者徒一年棄者減一等夫婦律諸妻無七出及義絶之狀而出之者徒一年半雖犯七出有三不云而去之者杖一百追還若犯惡疾及姦者不用此律房族律諸同居若大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻有罪相為隱部曲奴婢為主隱皆勿論即漏露其事及擲語消息亦不坐其小功以下相隱減凡人三等若犯謀叛以上者不用此律律諸告周親尊長外祖父母夫之祖父母雖得實徒其告重者減所告罪一等即誣告重者加所誣罪三等告大功尊長各減一等小功緦麻減二等誣告重者各加所誣罪一等即非相容隱𬒳告者論如律其相侵犯自理訴者聽鄰里敕諸訐告之罪若於法不應告之人雖係廂耆鄰保亦不得告敕諸事不干巳輒告論者杖一百其所告之事各不得受理律諸鄰里𬒳強盜及殺人告而不救助者杖一百聞而不救助者減一等力勢不能赴救者速告附近官司若不告者亦以不救助論其官司不即救助者徒一年竊盜者各減二等窩藏匱頭誘略敕知人犯罪而藏匿過致資給令得隱避者不須事發𬒳追藏依匿罪人法其知情停止人犯徒以上罪者準此律知情藏匿罪人若過致資給令得隱避者各減罪人罪一等律諸博戲賭財物者各杖一百舉博為例餘戲皆是贓重者各依巳分準盜論輸者亦依已分為從坐其停止主人及力若和合者各如之敕諸開匱坊停止賭博財物者鄰州編管於出軍營內停止者配本城並許人告廂耆巡察看營宿提舉人失覺察者杖八十律諸略人略賣人不和為略十歲以下雖和亦同略法為奴婢者絞為部曲者流三千里為妻妾子孫者徒三年因而殺傷人者強盜法和誘者各減一等敕諸略若和誘人因而取財及雇賣或得財者計入巳之贓在一名處頻犯人不倍略人者以不持仗強盜論一貫皆配千里婦人五百里編管因而姦者依強姦法和誘者以不持仗竊盜論五貫配五百里婦人鄰州編管其知情引頜牙保若藏匿𬒳略誘者各依藏匿犯人法右仰汝等百姓各詳立法之意欲汝慈孝父子有恩故有供飬有缺及違法教令及不舉子之法欲汝安錯夫婦相保故有七出三不去之法欲汝和協宗族如一故有相容隱不相告之法欲汝交通鄰里無爭故有不得告訐及相救助之法欲汝守已不務貪婪但利其家却為衆害故有停藏開匱誘略之法乃至鬪毆姦盜每事有條意在禁汝為非勸汝為善當聀今莭取數項係父子夫婦房族鄰里要切事理明以教諭汝等皆有良心其俗質朴比之諸處公事最稀若更遵從不致違戾雖有官府刑何所施更兾得力之家津遣子弟從師就學興起門戶其餘勤謹農桑愛惜錢榖祭享翁祖看守墳墓如此則骨肉相勸里巷無怨和氣所積天道不差風雨必調五穀必熟可使此邦永為樂土至如徭人實同省地久來往還何分彼此設若軍縣催科或公人下鄉恐嚇保社復相追擾或覽寄等家兜收過多或代納上戶利息太重之類九有枉塞並仰披陳當於當聀自有過差諸縣不能體恤儻以看望未欲興詞但希書簡相投或因寄居學聀過􅈦見諭庶幾通知從汝之便桂陽軍告諭納稅榜文照對軍縣每年起發省部總領諸司錢糧并支給官兵錢糧貫萬浩瀚别無課入全藉稅戶夏秋銀錢分擘應副當聀到任據平陽縣丞狀申驅磨見得自淳熙十一年秋至十四年夏六料銀錢欠數不少除十一年巳準赦文自第五等巳下除放外餘四等以上并十一年夏至十四年夏三料理合拘催切慮稅戶不易難以一併了納當聀今同衆官計度將十一年四等以上戶共欠一千二百八兩有零并十二年夏十二年秋共欠一千五百七十四兩有零共欠三料未納之數時暫住催自十三年夏料為始催理又慮稅戶日前巳將錢米交托與攬子店户等人却𬒳兜收入巳致作名下挂欠已行下知丞分鄊具出長名帖子付逐都保正戶長仰各巡問甲甲內人戶如委曽交納託與人見有干照即仰保正類聚姓名保明申縣切待於交攬人名下追理自餘委係本戶即仰趂時赴軍輸納今立寬限十三年夏秋二料限二月終十四年夏料限三月終更不準前遣官差人下鄉搔擾乃巳約束受納等處每銀一兩減五文足搯子錢減三文足役錢一百文足收會錢八十三文足每一貫減五文足槄子錢減三文足苗米官田聀田米每石減十二文足每石倉用米減十五升攬子米減五升和糶米每石減七文足每石倉用米減十三升攬子米減五升省義倉米每鈔減五文足每石倉用錢減十三文足倉用米減二十二升省攬子減五升省銀自一錢以上米自一斗以上準此曉示去訖候至限滿見得錢物次第若是正稅自足丁辦一年支遣當議再將本縣久例無名科斂並行蠲減以便人户若致限滿拖延不肯了納仰本縣將欠數多人申軍點追別有行遣桂陽軍勸農文照對守令勸農國有常典循習之久但為空文當聀以里巷通曉之言勸諭汝等開具下項一閩浙之土最是瘠薄必有鋤耙數畨加以糞溉方為良田此聞不待施糞鋤耙亦希所種禾麥自然秀茂則知其土膏腴勝如閩浙然閩浙上田收米三石次等二石此間所收却無此數當是人力不到子課遂減奉勸自今更加勤勉勿為惰農坐視豐歉一門房鄰里切須和睦莫與爭訟界至田塍各據永業火下牛畜迭相借助少有言氣且務休和才到訟庭便妨日子况復般褁倍有勞費假如有田十𤱔歲收不過十石供輸之外贍飬良難豈冝因訟耗財自取狼狽一了納租稅務在及時今來受納倉場並是當日給鈔銷簿如有農家或將銀米慿托攬子鋪户等人須是便取去赤鈔為慿不可信受手會白關之類所慮攬鋪兜牧過巳致作挂欠正當農務忽𬒳追呼一陂塘水利冝從古來上流下接公共分使若甲家占吝害及乙丙群聚爭奪甚者到官期集鄰保追逮證佐動經旬月方得事明本欲獨得便宜却𬒳兩相妨廢一生借種糧貧者不免先須量力莫據眼前借貸太多債還不易及至空窮却謀昏賴所是冨家亦合量本收息除豁積欠難以遞年登帶恣為貪婪若貧者昏賴不還冨者貪婪巳甚日致興訟罪有所歸即非主客相資鄰里相保之道一此間典買産業或瞞昧卑幼或不儘問親鄰或因抱種交業不時或因白與投印違限之類緣此無賴等輩執占爭論先自蒔種徑行收採比至到官惟憑契約往往得産之家雖用見錢反以違法失理遭罪請自今遇有交易子細審度凡涉前項數端之類幸勿向前以貽後患一此間多有無藉之人告人絶産及至到官或有恩養子孫承代或有吐退近親遺囑其𥘉官司未知來由須至行遣甚者抄估比至給還動經年歲以此失業深屬可憐除巳行下諸縣自今如有的是絶户即仰都保連名結罪保明具申方與受理自餘勿干涉人妄有告訴重行科斷一諸縣夫遞除是般輦綱運錢米雖當忙月亦或不免其餘雜役冝且暫停如官司差使重疊或無輪次苦樂不均及承行等人取乞搔擾乃至應干賦役有妨農蠶使汝失所並仰陳訴右仰汝等遞相勸諭務在遵從庶克有年毋令後悔止齋先生文集卷之四十四
