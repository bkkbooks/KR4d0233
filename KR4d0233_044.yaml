front:
  text: 止齋先生文集卷之四十四
  hash: sha256:6ae00cfe1a89fd3e7df1075d8d10d742e5a116ca05907ff5d651bcc531a90c87
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_044-1a}
body:
  text: 雜著瑞安縣學上梁文吾邑有學繇慶暦而来諸生置員於崇寕為盛乆矣趍廢誰其嗣興弛百役以獨先彌三時而具舉有嚴凾丈可以横經於粲周廬可以肄業共惟聖考侈廟貌之前觀顯允賢侯輯儒先之善筭事関風俗歡動州閭斯抗脩梁爰申善頌東吴會修門一葦通璧海源源流道徳也應泮水日朝宗西峴首葱葱雨露低更上觀潮試囬首朝陽合有鳯凰棲南一曲清江與地叅驚世文章曽不露横塘居士府潭潭北閩粤群山来不極三峯之下可無人能以功名留翰墨上閶闔方今開蕩蕩少㣲正照斗牛墟此有隠淪誰與訪下七八十翁多在者自言生不識干戈長得児孫皆爾雅伏願上梁之後群書充㨂多士填門相維鬼神無風雨漂揺之患燕及㣧祚皆山河魁磊之英到桂陽謁宣聖文共惟夫子之言曰有一言而可以終身行之者其恕矣乎某質簿氣觕誤有民社願事斯語以免於戾敢告桂陽上元設醮青詞廼者庻證非常連隂不觧爰方假守何以召和㑹王暦之𥘉頒雖修故事面天威之甚邇實貢忱辝恭願哀矜一方嘉恵百榖事関民命寕使臣霑僥倖之恩咎在臣躬毋令民𬒳阽危之患桂陽中秋設醮青詞疾痛呼天輒自忘其僣越髙明覆物終不忍於顚隮永惟返風㓕火之祥何啻虚谷應聲之速敢慿羽侶式謝鴻私恭願不異塵凢有来肸蠁怜臣斗筲之噐雖負民社而不勝念臣葵藿之誠盖填溝壑而未巳遂無它咎以迄終更桂陽軍修城隍祝文有屹崇墉爾神主之彼圯而闕冝崇𥙷之築之闐闐尚呵護之允也有成維皇其嘉與之桂陽軍禱雨文某假守於此大懼凉薄不足以用昭事明神以祈歲事廼者烈風荐作嘉澤弗周粟禾且憔悴夫爲吏之日短神與民相依之日長奈何以吏之不徳而爲斯民病也敬申前請敢告終惠謝龍山渡侯明應文維侯所宅桂陽之望風雨不時於是焉禱其諸古之所謂境内名山川歟茲者嘉澤弗周烈風荐作菽粟㡬空禾且就槁固宰物者所以謫吏而侯亦豈遂忘此土也遣官乞靈齋宿以竢侯不督過而辱霈施之某雖無以愈人猶足以伐石譔詞昭示後来永永無怠周子名說周子請名余命之曰仍之盖取古仍孫之義周氏之門父子孫凢三世傳曰野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣夫欲為士大夫者必世其家者也三姓之舊於今為庻畢萬匹夫也而大有後於晋囯是在懋不懋而巳故字之懋長朱子名說吾友朱同之之子名植字直卿名字所從来曰祖父所命也欲易其字為直方而植因書以遺之使持白祖父視如何也謝居士賛貧而好施隠而好客終身鰥居而義不廢嗣息豈其所謂非儒非墨而自適其適者耶自賛以學多病以貧數窮佚我歲晏亦二者之功歸寥寥太空儻不離人即為良農桂陽軍告諭百姓榜文照㑹當聀到任欲得民間通暁法意檢坐到見行條法如后父子律子孫違犯教令及供飬有闕者徒二年勑子孫違犯教令及供飬有闕情重者隣州兇悪者千里並編管敕諸生子孫而棄之者徒二年殺者徒三年收生人共犯雖為從殺者與同罪棄者徒二年半並許人告若地分及隣保知而不告殺者徒一年棄者减一等夫婦律諸妻無七出及義絶之狀而出之者徒一年半雖犯七出有三不云而去之者杖一百追還若犯悪疾及姦者不用此律房族律諸同居若大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻有罪相為隠部曲奴婢為主隠皆勿論即漏露其事及擿語消息亦不坐其小功以下相隠减凢人三等若犯謀叛以上者不用此律律諸告周親尊長外祖父母夫之祖父母雖得實徒其告重者减所告罪一等即誣告重者加所誣罪三等告大功尊長各减一等小功緦麻减二等誣告重者各加所誣罪一等即非相容隠𬒳告者論如律其相侵犯自理訴者聴隣里敕諸訐告之罪若於法不應告之人雖係廂耆隣保亦不得告敕諸事不干巳輒告論者杖一百其所告之事各不得受理律諸隣里𬒳強盗及殺人告而不救助者杖一百聞而不救助者减一等力勢不能赴救者速告附近官司若不告者亦以不救助論其官司不即救助者徒一年竊盗者各减二等窩藏櫃頭誘略敕知人犯罪而藏匿過致資給令得隠避者不湏事發𬒳追藏依匿罪人法其知情停止人犯徒以上罪者准此律知情藏匿罪人若過致資給令得隠避者各减罪人罪一等律諸愽戯賭財物者各杖一百舉博為例餘戯皆是贜重者各依巳分准盗論輸者亦依已分為從坐其停止主人及力若和合者各如之敕諸開櫃坊停止賭博財物者隣州編管於出軍营内停止者配本城並許人告廂耆廵察㸔营宿提舉人失覺察者杖八十律諸畧人略賣人不和為略十歲以下雖和亦同畧法為奴婢者絞為部曲者流三千里為妻妾子孫者徒三年因而殺傷人者強盗法和誘者各减一等敕諸畧若和誘人因而取財及雇賣或得財者計入巳之贜在一名處頻犯人不倍畧人者以不持仗強盗論一貫皆配千里婦人五百里編管因而姦者依強姦法和誘者以不持仗竊盗論五貫配五百里婦人隣州編管其知情引頜牙保若藏匿𬒳畧誘者各依藏匿犯人法右仰汝等百姓各詳立法之意欲汝慈孝父子有恩故有供飬有缺及違法教令及不舉子之法欲汝安錯夫婦相保故有七出三不去之法欲汝和恊宗族如一故有相容隠不相告之法欲汝交通隣里無争故有不得告訐及相救助之法欲汝守已不務貪婪但利其家却為衆害故有停藏開櫃誘畧之法迺至闘毆姦盗每事有條意在禁汝為非勸汝為善當聀今莭取數項係父子夫婦房族隣里要切事理明以教諭汝等皆有良心其俗質朴比之諸處公事最稀若更遵從不致違戾雖有官府刑何所施更兾得力之家津遣子弟從師就學興起門戸其餘勤謹農桑愛惜錢榖祭享翁祖看守墳墓如此則骨肉相勸里巷無怨和氣所積天道不差風雨必調五糓必熟可使此邦永為樂土至如徭人實同省地乆来徃還何分彼此設若軍縣催科或公人下鄉恐嚇保社復相追擾或覧寄等家兠收過多或代納上戸利息太重之類九有枉塞並仰披陳當於當聀自有過差諸縣不䏻体恤儻以㸔望未欲興詞但希書簡相投或因寄居學聀過􅈦見諭庻㡬通知從汝之便桂陽軍告諭納税榜文照對軍縣每年起發省部總領諸司錢糧并支給官兵錢糧貫萬浩瀚别無課入全藉税戸夏秋銀錢分擘應副當聀到任據平陽縣丞状申驅磨見得自淳熈十一年秋至十四年夏六料銀錢欠数不少除十一年巳准赦文自第五等巳下除放外餘四等以上并十一年夏至十四年夏三料理合拘催切慮税戸不易難以一併了納當聀今同衆官計度将十一年四等以上戸共欠一千二百八兩有零并十二年夏十二年秋共欠一千五百七十四兩有零共欠三料未納之數時暫住催自十三年夏料為始催理又慮税戸日前巳将錢米交托與攬子店户等人却𬒳兠收入巳致作名下掛欠已行下知丞分鄊具出長名帖子付逐都保正戸長仰各廵問甲甲内人戸如委曽交納託與人見有干照即仰保正類聚姓名保明申縣切待於交攬人名下追理自餘委係本戸即仰趂時赴軍輸納今立寛限十三年夏秋二料限二月終十四年夏料限三月終更不准前遣官差人下鄉搔擾乃巳約束受納等䖏每銀一兩减五文足搯子錢减三文足役錢一百文足收㑹錢八十三文足每一貫减五文足槄子錢减三文足苗米官田聀田米每石减十二文足每石倉用米减十五升攬子米减五升和粜米每石减七文足每石倉用米减十三升攬子米减五升省義倉米每鈔减五文足每石倉用錢减十三文足倉用米减二十二升省攬子减五升省銀自一錢以上米自一㪷以上准此曉示去訖候至限滿見得錢物次第若是正稅自足丁辦一年支遣當議再将本縣乆例無名科歛並行蠲减以便人户若致限滿拖延不肯了納仰本縣将欠数多人申軍點追別有行遣桂陽軍勸農文照對守令勸農國有常典循習之乆但爲空文當聀以里巷通曉之言勸諭汝等開具下項一閩浙之土最是瘠薄必有鋤耙數畨加以糞溉方爲良田此聞不待施糞鋤耙亦希所種禾麥自然秀茂則知其土膏腴勝如閩浙然閩浙上田收米三石次等二石此間所收却無此数當是人力不到子課遂减奉勸自今更加勤勉勿爲惰農坐視豐歉一門房隣里切湏和睦莫與争訟界至田塍各據永業火下牛畜迭相借助少有言氣且務休和才到訟庭便妨日子况復般褁倍有勞費假如有田十𤱔歲收不過十石供輸之外贍飬良難豈冝因訟耗財自取狼狽一了納租稅務在及時今来受納倉場並是當日給鈔銷簿如有農家或将銀米慿托攬子鋪户等人湏是便取去赤鈔爲慿不可信受手㑹白關之類所慮攬鋪兠牧過巳致作掛欠正當農務忽𬒳追呼一陂塘水利冝從古来上流下接公共分使若甲家占吝害及乙丙群聚争奪甚者到官期集隣保追逮證佐動經旬月方得事明本欲獨得便宜却𬒳兩相妨廢一生借種粮貧者不免先湏量力莫㩀眼前借貸太多債還不易及至空窮却謀昏頼所是冨家亦合量本收息除豁積欠難以逓年登帯恣為貪婪若貧者昏頼不還冨者貪婪巳甚日致興訟罪有所歸即非主客相資隣里相保之道一此間典買産業或瞞昧卑㓜或不儘問親隣或因抱種交業不時或因白與投印違限之類縁此無頼等軰執占争論先自蒔種徑行收採比至到官惟憑契約徃徃得産之家雖用見錢反以違法失理遭罪請自今遇有交易子細審度凡渉前項數端之類幸勿向前以貽後患一此間多有無藉之人告人絶産及至到官或有恩養子孫承代或有吐退近親遺嘱其𥘉官司未知来由湏至行遣甚者抄估比至給還動經年歲以此失業深属可怜除巳行下諸縣自今如有的是絶户即仰都保連名結罪保明具申方與受理自餘勿干渉人妄有告訴重行科断一諸縣夫逓除是般輦綱運錢米雖當忙月亦或不免其餘雜役冝且暫停如官司差使重疊或無輪次苦樂不均及承行等人取乞搔擾廼至應干賦役有妨農蚕使汝失所並仰陳訴右仰汝等逓相勸諭務在遵從庻克有年毋令後悔止齋先生文集卷之四十四
