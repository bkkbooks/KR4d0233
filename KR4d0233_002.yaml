front:
  text: 止齋先生文集卷之二
  hash: sha256:428158377250beb3475c742f64aca92f68fb29a6a8376aaccee5facbee62a528
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_002-1a}
body:
  text: 古詩送同年林多益丞寜海同里衣冠近闊踈同年齒髪多衰變羙人宜在玉筍班隱吏亦隨花雨縣有杭一葦逢迎可每食雙魚甘㫖便顧瞻周道竟何如善為身謀吾豈願清廟笙鏞濟濟陳碧梧鸞鵠深深見由来盛事歲月晚誰到脩途肝膽徤楊花吹水酒揺波一請加餐再無倦送謝希孟歸黄巖四首紛紛竹帛傳浩浩金石刻淪亡已無限存亦誰愛惜如何伏義氏文字二三畫姬孔豈不聖用以演周易法令如牛毛斯鞅信手成簿書積丘山趙張眼愈明萬人立下風國勢尊且榮未省三代前誰獨有此名圭璧襲繅藉山龍餙衣裳不聞燧古𥘉而興自虞唐毀車崇騎射隷作篆籕藏至今人便之秦亦忽以亡累觴以爲歡班荆以爲儀交際貴如此勿使至意虧頗常恠小雅鹿鳴至魚麗賔主禮百拜六經似支離看筍和潘養大韻兒童纔丱角兵衛忽森㦸十日不汝見㝷丈出咫尺隠几觀物化軒奮恣所極褰裳欲從之世事有䋲墨贈尹紹伊吾友尹紹伊十年抱心疾休然萬事廢豆子黒如􅃮從之問舊學歴歴不遺一佳篇間哇鄭法語雜方術豈其遇人耶託此訪遺逸張皇鬼物恠漏泄宫禁宻君看服烏喙孰與近參术送郡守汪充之移治嚴陵方郡小旱汪禱雨甚急禱三日而雨至郡人大喜是日有改刺之命挂梁龍骨經時蟄井井黄雲秋已及十日不雨民未急使君日膳長𬞞湆澄空䬃䬃雲霧入饁婦休眠兒覔笠村舂化出雲子粒市上明朝升二十農家語圃商語賈恒願使君無疾苦自今一飰吾腹果徤看将母從簫鼓馮翊扶風天尺五見說嚴陵在何所詔書奪去萬舌吐九重欲扣君門阻棲鳥護巢駒戀皂東人自視西人好那知湛露漙秋草春意平鋪無剰少有客解事飜然笑元祐治平諸故老身要人扶功未了誰知青絲絡馬横門道應笑江湖華髪早寄題陳同甫抱膝亭稻梁不難謀軒冕亦易得胡為抱膝翁惻惻復惻惻秋風墮碧梧鳳鳥去無迹愁吟草際蛩兒女淚盈臆忽然一長嘯孤響起空寂令人識雅頌一唱三嘆息室廬在路傍耕鑿在民籍行人聴笑語稚子共眠食讀書果何罪鬚髪又半白此意太勞勞此身長抑抑抱膝且不可出門更何適但勿問門外蓬蒿若干尺送葉正則赴浙西憲幕頻年送行客酒罄詩不工最晚與君别柰此百感叢𡵨山有鳴鳳雅頌移豳風于時二老生出䖏海上同曺劉對匕箸失色一語中明朝蜀江水不與灞滻通人心起毫末世故關鴻蒙乃知貧賤交不下王覇㓛霜根宿病驥雲㠶背蜚鴻秋水䏻隔人白蘋况連空相從自束髪各去隨轉蓬今懐欣有合後㑹苦未重鱸魚直萬錢羊酪醅一鐘願君養盛年我友半巳翁送陳益之架閣論事不欲如戎兵欲如衣冠佩玉嚴重而寛平作文不欲如組繡欲如踈林茂麓窈窕而敷榮楨榦盍亦煩䋲墨滋味何如餘典則吾宗受才萬人敵排空所向無遺力親䘮三年面漆黒交情一語千金璧明朝不㸑鼾撼壁裘馬借人無徳色作掾閩山可蹤跡擬将秉秆空螟􅬑相君有令民未得勿問堂髙若干尺春江㳽渺風張席欲言冮水何終極貧賤相依鬢毛白吾可雷同名送客浩歌未放情彌激君看風雅詩三百亦有𥘉章三嘆息翁誠之慰慈溪再擬祖送不及昨来久佇驪駒集今来悵望檣烏急中年送客亦多違先事徒勞後無及江頭祖帳㡬百人落𥿄珠璣詩什什自哦短韻意甚得亟欲陳之復羞澁君方筮仕從兹始驊騮開路日千里若逢人話子陳子侏儒一節今如此送鮑清卿教授莆中閩中豈不好莆中况多儒其山有丹荔其水有子魚艾軒諸老生典則故所餘堂堂退傅門海内欲曵𥚑䆠逰得此樂餞者酒滿車我亦勸君酒我意獨未舒嘗聞入林獵不可背水漁背水漁尚可背時更﨑嶇方今朝廷尊紳笏日走趍官多豈勝記勢逺復易踈媒身衆所同藉口誰不如柰何但温飽去向天一隅平生拙自謀蓬巷歲月除更事亦既熟畫此未必愚豈有服茞蘭佩之以瓊琚令人愛不見搔首空踟蹰作南塘記郡守沈持要以詩来謝次韻奉酬周公作雅頌退然在豳風功成貴無迹名大謗亦叢彼人自標置刻畫豈不工君看榛莾間斷碑卧頽墉想當在世時拳拳効深衷胡然今弗省身後議論公逹人悟物情玄覽昭有融區區強名我咨爾来何從沈公天下士於今萬夫雄邦人見未嘗譽之口不容請将氏南樓語盡意未窮公詩陳誼髙耻與好事同年登百廢興解后吾何功勇去學休影倦㳺謝遺蹤吾方笑征南雙雙勒堅玒一以棲山顛一以沒水中送謝倅景英赴闕言詩必南雅自鄶吾無譏嗟余生已晚觀人以觀詩人情日變化徃事十九非相從飾邉幅欲語懐衘覊久不見官寺下與家人夷渡江六十年得此心目疑早從諸公㳺晚佐一郡治居嘗陳誼髙動與作吏違大白浮朋簪單車欵民扉多文雖素履用拙真良規二年意綢繆一别事渺瀰有酒公不飲贈言我何禆穆穆清朝班僉曰尚徳宜何妨着此翁衣冠皓鬚眉懐同舍石天民編脩山隂不得見見期在東陽東陽忽歲華欲徃又阻長貽書輒無報有便復寄将以君懶扵書我豈望得當永懐十年别動止曽莫詳君貌今何如孰與我老蒼就使白髪同脚力誰弱強日飰米多少飲酒可㡬觴尚能甘寝耶比之昔對床嫂氏亦晚景吾婦伯姉行為君過客頻膏沐當不常有兒若干人巳未勝冠裳但要能譍門勿問鄙與臧一𥿄細說似慰此遥相望末乃及田舍何有還何亡丞郡禄已厚豈不可小康憶昔夜夢君託交少年場竦身而掀髯眸子烱烱光依然論時事悲壮淚以滂我方閉門嬉謁至即暫忙婆娑松竹下細數秋葉黄舊志益凋落羣書半遺忘請君勿他及却使我意傷次韻蕃叟弟月下有感平原接翠微脩竹圍緑淨乃扵此中間更以皓月映佳人笑隱几萬物獨我正幸㢤吾有母侍飲得缾罄夢人誦詩覺省數句足成一首三人共一𬒳寒夜爭抽牽一人耻不讓起坐遟朝暄明朝復雨雪忍豈無春妍四時各天運二人正鼾眠送曹器逺試臨安二首青衫豈必貴未得不可巳皇皇海内人趨走共一軌生前極浮榮沒後抱深耻他山有隠淪一笑粲冰齒豈知天地間樹立在人紀大有扛鼎力小有挈瓶智誰當頓八紘舉以掩衆器煌煌一百年此道最宏𬒳雖躋三事尊亦起一藝試或云科目弊此語復有味約同舍蜀人王徳脩三首逺莫逺關塞鴻鴈来年年我嘗按輿圖嶓漢在眼前胡為與君別壮齒今華顛下峽君有期會吴我何縁令人媿不如鴻鴈得自便疇昔夢遡江巴陵至瞿唐兩崖束秋旻中有一帶蒼安流進分寸怒去千丈強求君竟不得望之涕淋浪徃日事已然来日理未詳橙橘方粲粲魚蝦亦多多能舂半年粮豈惜一見過良夜月如霜聴我苦别歌翳翳葭蘆郷風定水自波或者阻君舟柰此佇立何次徳脩仙巖韻我家仙巖人跡稀客從何来此何時岷山之陽適海嶠萬里欲冩心精㣲瀑泉自雨一丘壑有龍蟄不隨羣飛病樵弛檐渇猿喜雖未作霖良已竒吾聞岷山天與齊仰止不見如調飢君登絶頂小天下此縦有山安足嬉翩然肯過非所期此道遼闊車誰脂願言稅駕母遄歸爲我更賦崧髙詩再用韻呈徳脩一日一見猶為稀如何十年見無期昔方壮歲意輕别一笑聴君歌式徵江流永矣劎閣阻恨不羽翰能奮飛不圖今日巳華髪話此恠恠還竒竒桑麻不競蒿壓屋厚禄書斷兒恒飢誰當附熱斵氷雪歲晏獨可相從嬉功名冨貴各有時人亦空自為韋脂與君持此将安歸滄海雪山無盡詩夷門歌送脩徳還闕萬古江入海吴蜀有不通不通誰使然人自為異同昔在李孟錢士各懐土封靜言彼何尤亦各徇所忠恭惟宋受命三姓皆朝宗斯文已百年名世纔數公眉山與金陵柰何不相容大雅如闗洛亦復互詆攻朋分文字間禍起師友中四郊忽戎馬塵滿夷門宫徃事巳覆轍後事如飄蓬一飰忘苦飢一褐忘苦冬身謀每不長王事靡有終有客獨惻惻萬里興深衷相過話離合歴歴繇熈豐我乆世慮薄念之涕無從貧賤将安歸功名在其逢有䏻用斯人可使百阻空西人不為西東人不爲東借書一首别薛子長山阿着柴扉陋甚誰盤桓羙人此何求鉅竹數十竿日閱書百篇尚覺日力寛欲從我借書我書何足觀辛勤抱遺經及此鬢髪班一語未領㑹累日不自安雖更聖人手亦恐衆說漫况復秦漢下曾莫脩與刪致之獲麟前存者今若干我無以裁之望洋乆空嘆羡君方盛年恣意渉浩漫又聞書少多不繫學缺完讀書固匪易用書良獨難昨来荷堤上嘗試及孟韓此話如㳙埃此道如丘山寄陳同甫生日南國雨𥘉潤西風水㣲波持酒欲勸君柰此道阻何天地自乆長日月良䁟跎志士惜少年用意矢靡他豈無文字功百代名不磨胡然朝攬鏡夜起瞻星河思婦視貞操驕人視勞歌曾㣲強飯書覆出為詆訶永懐姑射神尸居養天和下視塵㝠冥鴻鵠謝網羅身将世誰親得孰與䘮多請君以尊生我亦以養痾述懐有客盈門飯不足有書千卷兒懶讀王公勞問煬爭竈樵牧相忘盗騎屋古来堪笑如我少生無一事䏻恰好獨有居閑可引年我又不然華髪蚤簡鄭景元西風肅萬物扵卦曷為兊說言就凋蟄之死矢靡悔方當春和時動植出草昧喧號聒穹蒼怒長彌大塊紛紛誰則敢所恃蓋有在簡王道父瞻彼萬仞巖亭亭上烟霞其下寒淵水清不容魚蝦閔予生好修而居東海涯顧見泥中蔵日食百萬家浮名太累人未語衆已譁為海不為淵何道以自瑕贈東陽吕望孫周登二武士鴻門無人易水寒安得壮士乆所患求之市隱戎行間紛不當意鬢已班逆胡未討憂萬端此得兩君聊自寛有石堂坳立礸百夫睨之欲舉難兩君挾起如弄九舞空一葉風團團吕君忽作胡衣冠瀝酒扵地盟血殷長劒乆倚燕然山義欲為漢誅樓蘭九重深窈虎守關竟以劒器愽一飧語未良已聲珊珊兩蛟出沒萬馬攅夜闌月暗天汗漫滿堂悲憤淚欲澘嗟爾兩君誠義肝我方乗障荆之蠻五營諸将皆豢安􅦅肉乆不堪征鞍誰能喚與百辟看但得汝等一解吾君顔書生老死不足歏書黄巖丁明仲墓誌碑隂葉君隻字雙南金予子拳石藏幽深百名以上辭不淫我豈識于猶漸襟黄山之阿墓林林斷碑日爍秋雨霖彼豈孫子力不任人莫過問嘷孤禽子以窮餓死苦吟束棺逆旅無衣衾末乃得此世所欽子視昔者孰與今區間壽短升與沉長留天地誰無心扵中詩人最嶇嶔竟亦朽腐如書蟫何獨遺子天球琳上與郊島名相尋雖無薦藉鬼巳歆况立之後主釡􅑄期㠯數歲頭勝簮有田可稼桑可紝收拾舊藁編朱鋟未必千載無知音請我書此碑之隂大亮一語不肯侵嗚呼讀者悲不禁牛羊勿踐木森森止齋先生文集卷之二
