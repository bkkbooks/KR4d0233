front:
  text: 止齊先生文集卷之二
  hash: sha256:0c846c76db2b27b39d70af628d7913f66b42bde79fe4fa342cba8f279fb7379b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_002-1a}
body:
  text: 古詩送同年林多益丞寧海同里衣冠近闊踈同年齒髮多衰變美人宜在玉筍班隱吏亦隨花雨縣有杭一葦逢迎可每食雙魚甘㫖便顧瞻周道竟何如善為身謀吾豈願清廟笙鏞濟濟陳碧梧鸞鵠深深見由來盛事歲月晚誰到修途肝膽健楊花吹水酒搖波一請加餐再無倦送謝希孟歸黃巖四首紛紛竹帛傳浩浩金石刻淪亡已無限存亦誰愛惜如何伏義氏文字二三畫姬孔豈不聖用以演周易法令如牛毛斯鞅信手成簿書積丘山趙張眼愈明萬人立下風國勢尊且榮未省三代前誰獨有此名圭璧襲繅藉山龍飾衣裳不聞燧古𥘉而興自虞唐毀車崇騎射隸作篆籕藏至今人便之秦亦忽以亡纍觴以為歡班荆以為儀交際貴如此勿使至意虧頗常怪小雅鹿鳴至魚麗賔主禮百拜六經似支離看筍和潘養大韻兒童才丱角兵衛忽森㦸十日不汝見尋丈出咫尺隱几觀物化軒奮恣所極褰裳欲從之世事有繩墨贈尹紹伊吾友尹紹伊十年抱心疾休然萬事廢豆子黑如􅃮從之問舊學歷歷不遺一佳篇間哇鄭法語雜方術豈其遇人耶託此訪遺逸張皇鬼物怪漏泄宫禁密君看服烏喙孰與近參术送郡守汪充之移治嚴陵方郡小旱汪禱雨甚急禱三日而雨至郡人大喜是日有改刺之命挂梁龍骨經時蟄井井黃雲秋已及十日不雨民未急使君日膳長𬞞湆澄空颯颯雲霧入饁婦休眠兒覔笠村舂化出雲子粒市上明朝升二十農家語圃商語賈恆願使君無疾苦自今一飰吾腹果健看將母從簫鼓馮翊扶風天尺五見說嚴陵在何所詔書奪去萬舌吐九重欲扣君門阻棲鳥護巢駒戀皂東人自視西人好那知湛露漙秋草春意平鋪無剩少有客解事翻然笑元祐治平諸故老身要人扶功未了誰知青絲絡馬橫門道應笑江湖華髮早寄題陳同甫抱膝亭稻梁不難謀軒冕亦易得胡為抱膝翁惻惻復惻惻秋風墮碧梧鳳鳥去無迹愁吟草際蛩兒女淚盈臆忽然一長嘯孤響起空寂令人識雅頌一唱三嘆息室廬在路傍耕鑿在民籍行人聽笑語稚子共眠食讀書果何罪鬚髮又半白此意太勞勞此身長抑抑抱膝且不可出門更何適但勿問門外蓬蒿若干尺送葉正則赴浙西憲幕頻年送行客酒罄詩不工最晚與君别奈此百感叢𡵨山有鳴鳳雅頌移豳風于時二老生出處海上同曺劉對匕箸失色一語中明朝蜀江水不與灞滻通人心起毫末世故關鴻蒙乃知貧賤交不下王霸㓛霜根宿病驥雲帆背蜚鴻秋水䏻隔人白蘋况連空相從自束髮各去隨轉蓬今懷欣有合後㑹苦未重鱸魚直萬錢羊酪醅一鐘願君養盛年我友半巳翁送陳益之架閣論事不欲如戎兵欲如衣冠佩玉嚴重而寬平作文不欲如組繡欲如踈林茂麓窈窕而敷榮楨幹盍亦煩繩墨滋味何如餘典則吾宗受才萬人敵排空所向無遺力親喪三年面漆黑交情一語千金璧明朝不㸑鼾撼壁裘馬借人無德色作掾閩山可蹤跡擬將秉秆空螟􅬑相君有令民未得勿問堂髙若干尺春江㳽渺風張席欲言冮水何終極貧賤相依鬢毛白吾可雷同名送客浩歌未放情彌激君看風雅詩三百亦有𥘉章三嘆息翁誠之慰慈溪再擬祖送不及昨來久佇驪駒集今來悵望檣烏急中年送客亦多違先事徒勞後無及江頭祖帳幾百人落𥿄珠璣詩什什自哦短韻意甚得亟欲陳之復羞澀君方筮仕從兹始驊騮開路日千里若逢人話子陳子侏儒一節今如此送鮑清卿教授莆中閩中豈不好莆中况多儒其山有丹荔其水有子魚艾軒諸老生典則故所餘堂堂退傅門海內欲曵𥚑䆠逰得此樂餞者酒滿車我亦勸君酒我意獨未舒嘗聞入林獵不可背水漁背水漁尚可背時更﨑嶇方今朝廷尊紳笏日走趍官多豈勝記勢逺復易踈媒身衆所同藉口誰不如奈何但溫飽去向天一隅平生拙自謀蓬巷歲月除更事亦既熟畫此未必愚豈有服茞蘭佩之以瓊琚令人愛不見搔首空踟蹰作南塘記郡守沈持要以詩來謝次韻奉酬周公作雅頌退然在豳風功成貴無迹名大謗亦叢彼人自標置刻畫豈不工君看榛莾間斷碑卧頽墉想當在世時拳拳效深衷胡然今弗省身後議論公逹人悟物情玄覽昭有融區區強名我咨爾來何從沈公天下士於今萬夫雄邦人見未嘗譽之口不容請將氏南樓語盡意未窮公詩陳誼髙耻與好事同年登百廢興解后吾何功勇去學休影倦遊謝遺蹤吾方笑征南雙雙勒堅玒一以棲山顛一以沒水中送謝倅景英赴闕言詩必南雅自鄶吾無譏嗟余生已晚觀人以觀詩人情日變化往事十九非相從飾邉幅欲語懷銜羈久不見官寺下與家人夷渡江六十年得此心目疑早從諸公遊晚佐一郡治居嘗陳誼髙動與作吏違大白浮朋簪單車欵民扉多文雖素履用拙真良規二年意綢繆一别事渺瀰有酒公不飲贈言我何禆穆穆清朝班僉曰尚德宜何妨著此翁衣冠皓鬚眉懷同舍石天民編修山隂不得見見期在東陽東陽忽歲華欲往又阻長貽書輒無報有便復寄將以君懶于書我豈望得當永懷十年别動止曽莫詳君貌今何如孰與我老蒼就使白髮同腳力誰弱強日飰米多少飲酒可幾觴尚能甘寢耶比之昔對床嫂氏亦晚景吾婦伯姊行為君過客頻膏沐當不常有兒若干人巳未勝冠裳但要能譍門勿問鄙與臧一𥿄細說似慰此遙相望末乃及田舍何有還何亡丞郡祿已厚豈不可小康憶昔夜夢君託交少年場竦身而掀髯眸子炯炯光依然論時事悲壯淚以滂我方閉門嬉謁至即暫忙婆娑松竹下細數秋葉黃舊志益凋落羣書半遺忘請君勿他及却使我意傷次韻蕃叟弟月下有感平原接翠微修竹圍緑淨乃于此中間更以皓月映佳人笑隱几萬物獨我正幸哉吾有母侍飲得瓶罄夢人誦詩覺省數句足成一首三人共一𬒳寒夜爭抽牽一人耻不讓起坐遲朝暄明朝復雨雪忍豈無春妍四時各天運二人正鼾眠送曹器逺試臨安二首青衫豈必貴未得不可巳皇皇海內人趨走共一軌生前極浮榮沒後抱深耻他山有隱淪一笑粲冰齒豈知天地間樹立在人紀大有扛鼎力小有挈瓶智誰當頓八紘舉以掩衆器煌煌一百年此道最宏𬒳雖躋三事尊亦起一藝試或云科目弊此語復有味約同舍蜀人王德修三首逺莫逺關塞鴻鴈來年年我嘗按輿圖嶓漢在眼前胡為與君別壯齒今華顛下峽君有期會吳我何緣令人愧不如鴻鴈得自便疇昔夢遡江巴陵至瞿唐兩崖束秋旻中有一帶蒼安流進分寸怒去千丈強求君竟不得望之涕淋浪往日事已然來日理未詳橙橘方粲粲魚蝦亦多多能舂半年糧豈惜一見過良夜月如霜聽我苦别歌翳翳葭蘆鄉風定水自波或者阻君舟奈此佇立何次德修仙巖韻我家仙巖人跡稀客從何來此何時岷山之陽適海嶠萬里欲寫心精微瀑泉自雨一丘壑有龍蟄不隨羣飛病樵弛檐渴猿喜雖未作霖良已竒吾聞岷山天與齊仰止不見如調飢君登絶頂小天下此縱有山安足嬉翩然肯過非所期此道遼闊車誰脂願言稅駕母遄歸為我更賦嵩髙詩再用韻呈德修一日一見猶為稀如何十年見無期昔方壯歲意輕别一笑聽君歌式徵江流永矣劎閣阻恨不羽翰能奮飛不圖今日巳華髮話此怪怪還竒竒桑麻不競蒿壓屋厚祿書斷兒恆飢誰當附熱斫氷雪歲晏獨可相從嬉功名冨貴各有時人亦空自為韋脂與君持此將安歸滄海雪山無盡詩夷門歌送修德還闕萬古江入海吳蜀有不通不通誰使然人自為異同昔在李孟錢士各懷土封靜言彼何尤亦各徇所忠恭惟宋受命三姓皆朝宗斯文已百年名世才數公眉山與金陵奈何不相容大雅如關洛亦復互詆攻朋分文字間禍起師友中四郊忽戎馬塵滿夷門宫往事巳覆轍後事如飄蓬一飰忘苦飢一褐忘苦冬身謀每不長王事靡有終有客獨惻惻萬里興深衷相過話離合歷歷繇熙豐我久世慮薄念之涕無從貧賤將安歸功名在其逢有䏻用斯人可使百阻空西人不為西東人不為東借書一首别薛子長山阿著柴扉陋甚誰盤桓美人此何求巨竹數十竿日閲書百篇尚覺日力寬欲從我借書我書何足觀辛勤抱遺經及此鬢髮班一語未領㑹纍日不自安雖更聖人手亦恐衆說漫况復秦漢下曾莫修與刪致之獲麟前存者今若干我無以裁之望洋久空嘆羡君方盛年恣意涉浩漫又聞書少多不繫學缺完讀書固匪易用書良獨難昨來荷堤上嘗試及孟韓此話如㳙埃此道如丘山寄陳同甫生日南國雨𥘉潤西風水微波持酒欲勸君奈此道阻何天地自久長日月良䁟跎志士惜少年用意矢靡他豈無文字功百代名不磨胡然朝攬鏡夜起瞻星河思婦視貞操驕人視勞歌曾微強飯書覆出為詆訶永懷姑射神尸居養天和下視塵冥冥鴻鵠謝網羅身將世誰親得孰與喪多請君以尊生我亦以養痾述懷有客盈門飯不足有書千卷兒懶讀王公勞問煬爭竈樵牧相忘盜騎屋古來堪笑如我少生無一事䏻恰好獨有居間可引年我又不然華髮蚤簡鄭景元西風肅萬物于卦曷為兊說言就凋蟄之死矢靡悔方當春和時動植出草昧喧號聒穹蒼怒長彌大塊紛紛誰則敢所恃蓋有在簡王道父瞻彼萬仞巖亭亭上烟霞其下寒淵水清不容魚蝦閔豫生好修而居東海涯顧見泥中藏日食百萬家浮名太纍人未語衆已譁為海不為淵何道以自瑕贈東陽吕望孫周登二武士鴻門無人易水寒安得壯士久所患求之市隱戎行間紛不當意鬢已班逆胡未討憂萬端此得兩君聊自寬有石堂坳立礸百夫睨之欲舉難兩君挾起如弄九舞空一葉風團團吕君忽作胡衣冠瀝酒于地盟血殷長劒久倚燕然山義欲為漢誅樓蘭九重深窈虎守關竟以劒器博一飧語未良已聲珊珊兩蛟出沒萬馬攢夜闌月暗天汗漫滿堂悲憤淚欲澘嗟爾兩君誠義肝我方乘障荆之蠻五營諸將皆豢安􅦅肉久不堪征鞍誰能喚與百辟看但得汝等一解吾君顔書生老死不足歏書黃巖丁明仲墓志碑隂葉君隻字雙南金豫子拳石藏幽深百名以上辭不淫我豈識于猶漸襟黃山之阿墓林林斷碑日爍秋雨霖彼豈孫子力不任人莫過問嘷孤禽子以窮餓死苦吟束棺逆旅無衣衾末乃得此世所欽子視昔者孰與今區間壽短升與沉長留天地誰無心于中詩人最嶇嶔竟亦朽腐如書蟫何獨遺子天球琳上與郊島名相尋雖無薦藉鬼巳歆况立之後主釡􅑄期以數歲頭勝簮有田可稼桑可紝收拾舊藁編朱鋟未必千載無知音請我書此碑之隂大亮一語不肯侵嗚呼讀者悲不禁牛羊勿踐木森森止齊先生文集卷之二
