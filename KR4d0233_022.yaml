  text: 止齋先生文集卷之二十二
  hash: sha256:892813debf086dc80e009283d84a1a262c620bd97a37d26fea970edd28003614
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_022-1a}
body:
  text: 奏狀劄子繳奏內侍張安仁轉官狀準中書門下省送到録黃一道樞密院關二月三十日奉聖旨已降指揮張安仁該進呈安奉至尊夀皇聖帝聖政會委了畢兩局推恩得轉一官并昨該解帶合轉一官未曽收使今來為係入內內侍省付都知可將上件兩官特與依黃邁昨任省官日例于階官上轉行一官令臣書行須至奏聞者右臣竊詳祖宗以來文武官磨勘立為止法二百餘年守之舊矣至武功大夫不可轉橫行則尤為嚴密前後臣僚論奏非一臣不復悉數今來張安仁指揮用安奉夀皇聖政會要推恩得轉一官并昨該解帶合轉一官將上件兩官與階官上轉行一官若遂轉行即徑入橫行蓋其陳乞之詞以為兩官轉一官不為踰越而陛下俯從其請亦以為兩官而轉一官不為僥幸云爾檢準隆興元年四月二十四日敕諸軍立功將士轉官礙止法人緣經戰陳與雜功輕重不同若令二例回授無以激勸于是始立武功大夫三官轉行橫行一官之法恭惟夀皇愛惜名器獨不吝于戰功豈不欲徑許轉行橫行以厲鬪士而詔書諄諄持示優異必纍三官方轉一官何也誠以二百餘年遵守止法而一旦創為異恩不但回授亦必以戰功三官方得轉行則上不廢祖宗之制而下可以勸將士之心也今也安仁乃欲以進書解帶兩官比之戰功又少一官而轉橫行豈不破纍朝之成憲紊隆興之新法啓庸人之覬心沮壯士之鬪志乎且今來指揮引用紹熙元年七月十八日黃邁事例臣竊謂黃邁事例巳是失錯自合改正若巳曽經施行便為永制則臣所未之聞也竊見紹熙元年張國珍以武功大夫任統制官及十年有旨許用趙圭例轉遙郡臣寮論之竟寢前命即不以趙圭為例放過此不以例廢法陛下之所已行也又鄭大亨以武功大夫幹辦御藥院職事修舉有旨許用王公昌例轉遙郡臣寮論之亦寢前命即不以王公昌為例放過此不以例廢法又陛下之所已行也仰見聖心本無適莫何獨此等却但因循此臣所以敢為陛下言之臣愚欲望睿慈將上件指揮特賜寢罷所有録黃臣未敢書行謹録奏聞伏候敕旨三月十三日奏第二狀臣昨論奏內侍張安仁橫行不當自惟踈逺小臣驟蒙任使而輒違忤天威死有餘罪恭奉御筆依自來體例施行仰見聖心優容詞旨溫厚如此益自感激不容但已蓋臣已取索到吏部尚右名籍并已行遣過千照逐一稽考自陛下臨御以來即無似此體式緣有淳熙十六年三月二十九日敕節文吏部奏檢照紹興三十二年十月十七日敕武功大夫實歷七年用七舉主並轉橫行三省同奉聖旨遵依紹興三十二年十月十七日已降聖旨指揮施行此陛下𥘉政所以示信於天下而臣之所當守者也歲嘗降特旨郭果等八人總戎閫外宣力為多並特轉一官吏部申數內郭果郭杲由世卿李思孝各係武功大夫並合轉右武大夫緣有上件聖旨指揮遵依紹興三十二年十月十七日巳降指揮未敢便行擬轉續奉聖旨竟令回授且夫帥閫之臣比之省職難易勞逸大假不同兼之是陛下始𥘉特恩而猶以有司申審竟令回授今來若以張安仁放過臣恐諸將解體矣此臣之所不敢已也若以為見任省官便可轉行則又不然祖宗舊制入內內侍省使臣寄資至內殿承制即更不得磨勘轉至副使宣和以來方許係寄資內殿崇班以上磨勘依吏部法轉至諸司副使靖康元年五月十四日三省樞密院同奉聖旨兩省官稱職任恩數請給並遵祖宗舊制上件存留照用指揮係是見行即無衝改以此可見省職即無指定都知押班許轉橫行之法况自淳熙十六年以後內侍官轉行橫行不過二人黃邁新知省事用該遇登極及製造皇后禕衣了畢梁彬以從夀皇駕過重華宫此乃舜禹授受之際千載一遇豈得與恩同年而語哉由此言之藉使廢法從例則亦無例可攀臣不免上違隆旨再三論奏區區欲望聖慈特賜寢罷前命止今回授所有録黃臣未敢書行謹録奏聞伏候敕旨乞輔外某一介踈逺素無榮望不謂疊冒恩渥備員右史兼職西掖書生所碩不過及此極欲勉強庸駑少效尺寸伏念某將指湖湘嘗得心脾之疾痛不可忍至於失汗大肉消陷幾死者再矣每念此疾唯不復作作且即死忽自今春日痛一日心甚懼之服食俱廢不惟職司弛慢難安亦恐朝謁僵仆非便欲望朝廷特為敷奏與在外待闕合入差遣一次或撿會前請與之祠祿以便醫理倘未朝露當有歸班圖報之日內引劄子臣頃因奏事妄意窺測以陛下之心務在無為而厭多事雖蒙襟納不謂違忤然言之未悉不足感動今請申明之臣聞人主之德當與天同今夫生成萬物皆六子之職也而天不與其勞此之謂無為若夫一晝夜之運周天三百六十五度四分度之一者則必天德也假如天德不健而一晝夜三百六十五度之間或差頃刻則其始也以早為晏其積也以春為秋由是而六子之功廢六子之功廢則萬物不遂矣平治天下皆群臣之職也而君不與其勞此之謂無為若夫兢兢業業一日二日應萬幾之煩者則必君德也假如君德不強而一日二日萬幾之際或廢一二則其始也冝速者遲其積也冝行者罷由是而群臣之官曠群臣之官曠則天下不理矣天德不健而六子之功廢則萬物不遂君德不強而群臣之官曠則天下不理謂之無為無乃反多事乎夫將以無為反以多事其故何也人主不自強而讒間迎合之計中也是故因其厭省覽也則有以好名之説中傷忠讜因其憚改作也則有以生事之説沮壞勞績允若此皆讒間也因其近聲色也則有以勿問外人之説固結官禁因其樂厭飲也則有以勿親小事之説竊弄威福允若此皆迎合也甚者諱惡災異雖水旱螟蝗之變而不以告禁止張皇雖盜賊夷狄之警而不以聞且夫讒間之計中則君子日踈迎合之計中則小人日親而其極至于天變不告邊警不聞如是而天下不多事者未之有也由是言之不察于實而眩於無為之名特姦臣持祿保妻子者之利非有國家者之福也然則人主果何便于此而墮姦臣之計乎恭惟陛下天資英明學力剛健遇事輒斷罔或留難有言必中靡容熒惑君德如此足以上當髙宗宏濟艱難之志光紹夀皇揔攬乾綱之業矣踐祚以來其見於明效大驗如不信近習而請託苞苴之弊息不采遊言而察探羅織之獄衰不尚獨斷而宰相執政之啓擬行事不繁文而百官有司之職宏定則又漢唐以來君德所不及也臣猶慮聖心務在無為而進自強之論誠恐陛下克此德濟此治效以其所巳行逹之于其所不行者而巳恭以陛下天資英明學力剛健誠以其所巳行達之于其所不行特反掌之易耳臣竊見聞者擢用同姓為大臣有以故事爭之者陛下勿疑也雖大臣自以紹興聖訓逡巡不敢就職而詔旨丁寧不可回奪二三大璫解罷省事俄以片𥿄出禁中雖左右朝夕之人欲籲哀乞憐而不可得此則陛下之所巳行者也至于蠢爾小臣白身輔受𬒳封駿者再矣而陛下久不忍決監司郡守差除不當臺臣論列至於數四蓋逾月而後付出此則陛下之所不行者也然則陛下非不能行直偶不行耳臣故曰誠以其所巳行逹之于其所不行牧反掌之易此臣所以拳拳也􅌳奏給事中黃裳改除兵部侍郎狀臣以樓鑰差充御試官時暫兼攝吏左房書黃事近者新除鄭汝諧權吏部侍郎録黃一道臣巳書行去訖給事中黃裳不肯書讀輒有論奏臣於鄭汝諧有鄊曲之好于黃裳有僚友之情與此二人𥘉無厚薄鄭汝諧之除授堪與不堪黃裳之封駁當與不當臣不復論忽奉聖旨改黃裳兵部侍郎此臣之所不敢默默也何者給舍封􅌳是謂官守其言行則謂之振職其言不行則謂之失職振職謂之功失職謂之罪此百王以來與國家列聖之所務暴白也今者黃裳之言臣不識陛下以為是歟抑以為非歟若以為是則當聽從若以為非則當罷黜今也隂廢其言而陽遷其官是非不明賞罰倒置臣竊以為當今之時不冝有此何者隂廢其言而陽遷其官古來傳記嘗有此事若非猜阻之君喜權任數以此為蓋㭑之術則是姦回之臣嫉賢醜正以此為中傷之計今陛下寬容樂易非狙阻之君二三大臣靖共正直非姦回之佐不謂清朝有此過舉臣頃嘗奏事屢言君德當與天同每蒙淵聽曲加奬納今夫天發生則為雨露肅殺則為霜雪未有明示雨露之恩而密加雪霜之慘者也由此觀之若裳所言悖理傷道熒惑聰明懷姦挾私變亂事實則陛下冝出其章播之公衆明怒而明黜之如此施行豈不正大若裳所言止於為國過慮無悖理傷道之失或是求人太備無懷姦挾私之邪則以陛下明恕何所不容豈應違忤遽有遷改今乃名為進官而實奪其當言之職外示優假而中不無怒絶之意遂使凡有官守人人自疑黃裳雖去何以繼之強顔緘默誰無愧耻隨事正救未知所終則此除之後將見給舍竟為虗設雖有忠賢無以自明此臣之所甚憂而不敢默默也欲望睿慈少霽天威收回成命令黃裳依舊供職以釋在廷之疑以為來者之勸第二狀臣昨具奏給事中黃裳緣封駁不行改除兵部侍郎乞收成命且令黃裳依舊供職所有録黃一道當日􅌳還中書門下省去後更不付出仰見聖心本無適莫不唯闊略黃裳違忤亦復不以僣越罪臣感激隆寬何以論報然黃裳尚未𬒳受供職指揮瑣闥闕官今已數日臣愚窺度或者陛下以為無此故事尚遲之耳臣考之史傳人臣暫失人主之意將及去官俄而再留者不可勝數今特舉給事中二事為陛下誦之唐吕元膺自給事中除同州刺史及入謝奏對激切憲宗嘉之翊日語宰相曰元膺讜言直氣朕欲留在左右使言得失李藩裴垍進賀曰陛下納諌冠於前王臣等既不能廣求直士又不能數進直言合當負罪今請以元膺復為給事中上恱而從之且夫元膺解職刺州已有成命而憲宗終惜其去李藩裴垍復贊其留遂令元膺再還舊官故憲宗號為英主裴李亦稱名相雖然此猶是唐朝故事非夲朝家法也紹興二年以兵部尚書權邦彥為簽書樞密院事給事中程瑀三疏駁之尋令官書書讀瑀乞罷遂遷兵部侍郎瑀不拜除龍圖閣待制知信州臺諌官江躋方孟卿皆言黃門職典出納顧不留瑀自助竊為朝廷惜之上批復除瑀給事中及入謝上曰給事之設正要駁異豈在雷同朕以卿再三求去勉從所請然深不欲卿去故再有此除瑀出特賜象笏是則陛下家法也仰惟髙宗中興之𥘉君臣相與不事形迹故程瑀志在報國不以嬰鱗為懼而敢於駁邦彥江躋方孟卿志在惜賢不以朋比為嫌而敢於留瑀而髙宗天錫勇智從善如流故亦不以反汗為吝而深信躋等之説用瑀如故傳之史籍千載美談臣所以不敢信宿進此二事以贊聖斷之決伏望宸衷體髙廟無我之心二三大臣效李藩裴垍獻替之力特收成命速降黃裳依舊供職指揮以增聖治之光華以勸臣工之興起而微臣不肖亦得與江躋方孟卿同托不朽曷勝榮幸取進止五月𥘉四日奏入留中論史官劄子臣嘗具奏竊見唐大順二年二月敕吏部侍郎栁玭等修宣宗懿宗僖宗實録始丞相監修國史杜遜能以三朝實録未修乃奏吏部侍郎栁玭右輔闕裴廷𥙿左拾遺孫泰駕部員外郎李徹太常博士鄭光庭等十五人修之踰年竟不能編一字臣以此知史事至重不冝以他官兼領今史院檢討皆是兼局更出迭入有同傳舍至修撰亦以從臣兼之往往多近上眷渥之人率不淹久去掌機政大槩一年之間方議立條例均分卷帙而出院多矣則一朝巨典無由就緒事大體重豈容空過歲月提領大臣須至取旨立限奏篇臣恐未免逐急牽課取具臨時草草逃責而無以發明盛德大業傳信萬世要亦非秉筆者稽故之罪而其勢必至此者無專官故也近年李燾洪邁以待制相繼修史不領他事而後四朝國史方及成書以臣愚見兩制臣僚位望巳貴若委以史事見謂冷局不過一二年間朝廷須更遷除雖曰專官未必久任今職名中有祕閣修撰右文殿修撰并舊有史館校勘等正是三館修書官名目自郎察卿監輔外之人皆得除授若將此二三職名置為史官以二年為任自史館校勘之類供職稍遷祕閣修撰又稍遷右文殿修撰在院少亦巳五七年俟有勞迹雖就遷次對如李燾洪邁兼領可也則是史官與郎察卿監可以馴至從班事體略同有􅌹官之效無冷局之嫌庶幾大典責成有人况在祖宗朝雖諌議大夫以上皆帶出為寄祿官而以供職諌院者為諌官則今以修撰為貼職而以供職史院者為史官蓋舊章也有何不可臣愚不自度妄論史事唯陛下裁幸􅌳奏陳源除入內內侍押班狀臣去國日久𥘉不詳陳源得罪之由及者之有司見得嘗投置逺外沒入家産一時同惡相濟之人如徐彥逹李庚輩亦各編管估籍及許逐便以來間有命則給舍臣寮節次論奏然後知陳源得罪于髙宗蓋服用或擬於乘輿聲色不下於宫禁禁路鈴正使實供厮役所謂小人之無君上者也故自夀皇及陛下𥘉政至于今日凡群臣有言悉蒙開納前後施行巳降指揮有司所共遵守也今者押班之除後省封還追于天威黽勉書讀而臣適暫攝西掖若亦書行便當命詞臣不知若陳源者將何以為之詞也若采群臣前日之言因為之詞則是暴其罪狀于天下適以彰聖明擢用之失若但揣陛下今日之意别為之詞是以夀皇及𥘉政以來施行群臣之言所降指揮駁而不用即為此詞將進退或戾於君父矣臣必不敢奉詔臣愚欲望聖慈少霽威嚴追寢除目勿以螻蟻之微敢遏風雷之命而加之罪則臣之幸也聖時之盛事也臣不勝拳拳所有録黃臣未敢書行謹録奏聞伏候敕旨七月二十五日謝深甫為給事中已書樞密院劄子去訖奏入不報􅌳奏白身彭燾輔官狀準中書門下送到録黃奉聖旨御前書寫文字白身彭燾上等實及一十年依已降指揮與輔承信郎令臣書行右臣伏覩今年五月四日樞密院劄付臣寮上言樞密院送到録黃一道為御前書寫文字薛淙輔官臣茫然不知所從欲乞行下薛淙所屬官司取見入役年月據實保明委及十年方與取旨輔官則臣有憑據乃敢書行伏候敕旨睿思殿庫供到本庫契勘薛淙於淳熙十年正月十一日差克御前上等書寫文字睿思殿庫掌管官物祗應至今實及十年已上即無在假不在司月日保明是實申聞事五月四日奉聖旨依巳降指揮與書行其薛淙已書行輔授去訖今來彭燾即未見得本人應得上項指揮臣愚欲乞檢照五月四日聖旨指揮行下所屬保明施行所有録黃臣未敢書行謹録奏聞伏候敕旨八月𥘉八奏奉􅌳奏閣門承受趙銓乞將轉官回授封贈狀準中書門下省送到詞黃一道為成忠郎閣門承受趙銓用因該人使到闕應奉及一十畨得轉一官公據乞將回授封贈父母令臣撰詞給告須至奏聞者右臣據吏部供到狀契勘趙銓見係閣門承受所授成忠郎係該遇皇帝登寶位引用紹興三十二年指揮預行輔授成忠郎其餘應于合得轉官恩例酬資即無許收使條法指揮又據司封供到狀檢準淳熙六年九月十一日臣寮上言三省同奉聖旨今後封贈並依司封見行條法施行本部除有曲全禮鍾闡己放行回授封贈父母體例外自淳熙六年巳降指揮之後别無命官帶吏職放行封贈體例臣愚欲望睿慈將趙銓所乞回授封贈指揮特賜追寢所有告詞臣未敢撰行謹録奏聞伏候敕旨止齋先生文集卷之二十二
