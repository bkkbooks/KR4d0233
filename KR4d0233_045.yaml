front:
  text: 止齊先生文集卷之四十五
  hash: sha256:8201117b50b52f1b53813db050196e364da45c78d570678f0a5f200d08675e9e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_045-1a}
body:
  text: 祭文祭兊光居士林喬年齊魯兩生視漢功臣為貴列國之千乘不如洙泗之一言世固有公論也公名不至仕版而凛凛鄉評不在諸賢大夫下夫豈求之嗚呼士之聞見公者亦可以興矣功名一時典刑千古形器雖亡道德如故我等親舊今來哭公三年之喪於此觀禮自今余鄉起孝起敬其誰作之眷言耆老澘然淚零何啻此夕祭王詹事吾鄉自昔諸儒有作剛毅敦龎是以為俗中更權臣擯排其尤喬木云凋何草不秋誰其似之惟公嗣興矻立堂堂萬夫典刑梅溪之原簫臺之下公車不駕市無翔價簫臺之下梅溪之原公休干廬巷無違言公行未久公歸白首邦人父老欲執之手天子起之愛莫止之羽翼四海匪我敢私忽焉此觴涕泗如水百爾有恨不如我同里祭芮祭酒嗚呼欲從先生遊十年于茲蓋亦數相遭卒幸相親也而受教不少延何哉天耶人耶前年寓㑹稽㑹先生為部使者有來言先生將就顧汝某愧焉尋如毗陵弗敢見明年東還先生適長太學是秋將考試增置生員又以嫌弗敢見既幸備數諸生先生孳孳焉望某來也比至相待如賔交甚者從二子辱臨拜又命史持立無答拜為是懼也又逾月弗敢告而去嗚呼誰謂先生歟而遽止此也夫苟謂遽止此也其寓㑹稽必無以愧自違也其還毗陵必無以嫌自拘也况為諸生冝旦夕左右侍而又何忍以過相待一頃舍去夫以位望之殊也法守之察也世俗之莫巳諒也顧小而失大其亦謂之人耶雖然自知求師友所得於天下才數人耳去年哭劉莆田今年哭祭酒彼夀考者何限胡為於我師友頻歲而忽焉亡耶且賢者縱不得大用獨不可晋限遺吾黨耶且某也固無多求於世無乃亦不獲成就其私志考德而問業耶今夫泛相與類有幸不至缺絶也是謂天耶非耶嗚呼一忤權臣白首瘴鄉公論既開時謂冝何位不過卿死無歸居豈惟門人有淚如雨祭張南軒吁嗟先生惟以正終如何嘆嗟四海所同欲知先生當觀之公軍旅有言魏公之子惠我律我魏公是似如其即戎誓與偕死學士有言瞻彼洛師昔在文獻往往闕遺曰惟南軒尚其嗣之朝廷有言豈無他人吏道趍變經生泥陳必若欽夫可以致君去欲其歸病欲其愈及此蓋棺萬事永已亦有咎怨莫或瑕毀嗚呼先生位曽不隆曽不卑卑與人為通抑不立異收聲于躬維學髙明維行粹夷維其待物一不以疑匪即求之人實秉彛君子在世勿問勿處譬彼川嶽無興雲雨三農賴之以藝稷黍矧惟世臣喬木勿伐矧惟儒術不墜一髮生能幾何而堪契闊往歲玉山前年秣陵二公云亡今我涕零又哭先生我懷實并念昔從逰為日則淺辱誨辱愛辱待甚逺自我不見常懼有􅌤有來湖嶺必惠問我對之翰墨如在右左䝉是曷稱罔敢違墮家有藏書國有太史雖微功業先生不死我心哀傷蓋不以此祭薛常州先生我昔自喜壁立倚天見兄栂潭忽若墜淵栂潭謂何其要日損自昜魯論餘勿挂眼明年㑹稽我圖西征匪適㑹稽從兄毗陵毗陵何有聚書千卷曰此百氏各有攸見維古相授待豪傑然我辱過施如何克傳約我博我有源有涉譬彼草木自根徂葉匪我無師亦既多友繄兄不逄歲月空久我無所願沒生為役于兄居遊無以南北滆湖之上其樂未央為兄食貧去之他鄉兄使淮堧我客都邑繫名春官驅馳靡及霅川之招豈不欲往有婦方娠瑣瑣羈鞅會兄來歸我棲旁舍當暑之袢相期秋夜我嗟我命為此契闊矧今為虐復我中奪魚亦有依鳥亦有群我實何罪恃無其人顧瞻四方羣公日徂劉不在閩芮不在吳我居數人乃眷相顧幸踰其分罪此之故凡今海內知兄如林我雖庸陋特知之深我觀六藝師自為的書不見詩春秋無易我觀諸子其說並駕佛老見竒申韓每下我亦觀人鮮不異止此有遺事彼有喪巳自兄作興廓之大同以斷群疑匠師涖工人之見之于何不一可以右左衡從伸屈我窺度之惟心之平豈惟不虧抑靡所增天不生賢生輒不試歎無全材雖全曷謂彼尺寸材功在夏屋而棄不顧徒為喬木凡今之人為此隕涕我獨私憂皇恤當世世艱道逺而使我獨有書未完有徒未淑誄之以詩哀哉巳而莫知我悲謂我胡為祭林安之余遊觀天下博交當世之士以自治蓋各有長矣矝畏潔修者或亡涉事之具疏通雋逹者則放乎繩墨之外而不可羈刳心而趨約者幾矣又自六經百氏闊略而廢遺嗚呼安之余遍閲而僅有焉引而置之諸老先生之門亦不數數焉見之忽今亡矣余將奚望而誰期余遊具區還會稽棲遲台鴈諸山之間人迹幾絶安之往往先至而後歸金華之行積雪埋嶺安之之疾侵矣而猶不我遺夫十年﨑嶇不便于家不利于有司不皇寧于其躬而無怠無悔是果何求者歟此意寂寥非篤學深思者未易與知也今年未四十多病而早衰自哭薛常州而百念弛矣獨將求古人之書日與吾徒講玩以卒歲而安之且死則吾志焉往而可為世有公論於安之自不泯沒而非哭之慟則不足以塞豫悲也祭諸葛夢叟嗚呼夢叟死生安計昔歲薛殂今兹君逝朋友相期扶持絶學慨此存者晨星夏籜君之學問不為徑庭曰意苟誠萬物受命固嘗講論兹道閎大尺矩寸繩其施或隘君曰余聞力行以充力之所至日月未窮閉戶十年讀易求志朋友謂君不仕無義授官長樂勉君載塗曾未及朞上下交孚少出所藏巳有端緒遂昌熾之豈不大肆衆目棼絲萬命流膏天意何如遽奪人豪維昔子厚託韓以死君殁見貽琅琅及此微君之屬於義猶然我力可及敢不後先酒體在壷脯醢列几酌古陳奠永承君意學官同祭王司業公於載籍博覽強識上自班左旁洽百氏然不為空言而巳試之一二其於詞藻清潤豐媚而亦無斷章半簡刻畫名家之意至於心度純明發為樂易望之簡如即不忍去情親語狎間以諧戲俄而肅斂訖事以治蓋庶幾德人之容非尚同者之能暨若夫流離虜圍其年方稚南望君親生以為愧間關萬里卒伸大誼是又壯夫節士堅忍僅克而得之天與匪䛇匪諭嗚呼諫垣數月攄藴則未十年外服帝獨簡記晚歸周行善人有比兩學是師用有次苐士論方屬乃銜不施某等於官為僚有嚴位置公忘等衰家人儕類絶去繩軌惠風和氣胡然山立而忽淵墜靡人不懷我獨切至寓哀斯文百𥿄莫既祭張簡之余讀架閣公犬人之誄蓋聞兄之能服勞處約有孝敬之遺風矣晚見其行事自叔父一研一席蠧書敗簡汛掃䖍藏旦旦不懈施及米鹽講若疇昔余既謂是誄也信而於是重有感也蓋余為壻恨不及架閣公無恙然猶及兄拊諸弟奉仲母以團居也俯仰之間事變不齊西東其廬几筵相望弟衰子經室自為孤嗚呼此余所以重有感也余辱歸妹最知最厚於兄卒葬屬在疾苦斂不慿棺窆不拊穴所以𫐠其平生而銘諸幽者亦不得掛名焉乃今彌年克具觴豆叙德寫哀因以自鐫魂猶可招其在斯文祭鄭自明嗚呼哀哉自明余與君遊久知君之重其死也自為諸生固曰士以一死何鄉不可及其居朝抗直自喜每一進見以所聞於賔客厮役某小人某小人之說察察為上言之無諱人數以為甚危而君益奮然雖萬死無恨然而閲其私蓋衛生甚謹也嘗訪君愛亭之上當暑命酒余食瓜果而君禁之勿多食他日過余羹􅌲以饋君曰疇昔聞有以茹此死者至今不近也啜茗飲水靡不博問恐以疾傷其母嗚呼君誠重其死而將有以處此矣乃今死竒禍何哉余既甚悲而莫推其故且懼知君之不詳者亦為惑也天嗇其年人害其名嗚呼哀哉自明余故為斯文以哭君也祭劉端木嗚呼端木而止於此歟謂其容貌不澤齒髮衰變而無夀徴歟謂其疾聲遽色太喜怒以干和歟抑謂其強心於事而敝敝其生歟而端木咸無焉然而止此將安咎也嗚呼端木其心將以仁其三族其學將以著見當世而庶幾於右人其儀抑抑其言恂恂至於居為畏友出為拂士而取豫之際能不以不義加乎其身於今之世吾見亦寡矣豈古所謂直諒之益木訥而近於仁者耶晚得一官無損於貧母老子稚旁無強親蓋擇地而蹈報效如此此某等所以哀籲之天莫知所云也祭鄭龍圖嗚呼道之不明亦既千載宋興用儒涵育數世故經術盛於伊洛而王化行乎元祐之際秦漢而下庶幾三代于何文獻奄忽淪替中興厈扶欲起復蹶晚生小子散無紀繫惟公及從渡江諸老尚有典刑之學不墮紹興季年靡然流俗之弊本之躬行加之講肄充養和平議論方大析義利於秋毫兼博約而獨詣蓋伊洛源流與元祐之視摹於是乎在苦節至於長貧靜退見於𥘉筮揚名二紀之久致位九卿之二既物論之惟允殆天意之將契我觀人物可為流涕瞻前靡及顧後孰繼公於此時譬之東方未白明星晣晣續飄零之餘緒道倐歘之亨㑹方有識之自寬俄覆出於意外嗚呼哀哉痛在吾黨事關海內矧余從遊辱誘以誨舍曰諸生視之流輩至於非望之期不言之愛儻手援其有益雖身危而不悔嗟今巳矣逝將安賴祭具殽而輒止文把筆而屢廢以遲遲之不忍尚發明而有待竟余懷之弗究聊一哀於此酹祭吕大著嗚呼理固難言事堪永嘆尚斯文其未熄儻千載而一旦自夫孔門之徒盡經術闕馬遷而下史法亂微言卒墮於佛老多識不離乎箋傳惟公紹絶學之遺統緬潜心於一貫立六藝之要津涉九流而弗畔既超乘於先得亦加鞭於後倦可謂明古人之大體而能通當世之變泛觀人物粵自秦漢勳臣檀其器略儒雅隆於詞翰通人焉草草法士焉斷斷以余觀公與夫專善偏長之士豈可同日而論哉若乃推本皇家講明文獻以為藝祖造邦上規周室而仁皇繼體之際庶幾於羞道管晏痛小雅之未復先群疑而獨辨推公之志歐富韓范緝熙寧之墜緒振元祐之餘算又將㑹同錯綜招携集散回萬牛於絶靷手六轡以徐按合當代之玉石出中原於塗炭蓋自渡江諸老皆有遺恨者也嗚呼憶學者之𥘉識怪伏熖之方煽及修門之晚別幸後會之猶健相此意之攸屬若一體而中判年偶同而智遲名近似而實逺溘騏驥之先徂望孤征於欵假參移兮斗沒長夜兮漫漫耿余懷其何極訴之人而有恨望新阡而長號兾精爽之一盻祭朱處士嗟乎學問散於殊塗而尚德之風鮮選舉出於一科而遺賢之恨多幸清議之在下而吉人猶有自修於其家維公行誼可以堪宗姻之蹤跡襟度可以受師友之切磋位卑而樂施豫齒老而工編摩自三尺之童待之若輩行而於一鄉之衆未嘗有所誰何以余百念之俱冷而聞公之訃至於屢嘆而長嗟文以悼之我辭不訛非士無誄刻之山阿祭章端叟吁嗟端叟今孰不如問其位年弗逮彼愚吁嗟端叟相爾志慕蓋逹將與當代諸賢在文墨議論之選而窮亦庶幾可祭於社識曰君子之墓中閫無相寄孥于旁盜騎屋山田園半荒士而至此可以悔矣而猶朋師不以四方誰為夏屋䏻置松柏于何雪霜不待盈尺安陽之南豈無士友胡獨端叟哭者十九或斂之床或沐之柩百爾無恨何必爾後余二十年交滿天下自春徂秋三泣大雅涕曾未收復奠斯斚侑可無文其尚忍寫祭張忠甫夫人鄭子將官由拳維夫人之子贈言卒篇曰豫家耄弗暇顧官我感夫人為之涕漣少學旁舍動經歲年今我求母而為隴阡若彼有母亦惟故牽東西居遊各天一邊借云懷依無能粥饘亦有將母朝芳夕鮮老與稚等于家之便百爾好羞不如式還曾是無憾惟夫人也全固也有子而誰俾然相他人無類以利言微祿微爵至莫子憐矧夫人子豈時舍旃再縻之祠蓋云惓惓有如夫人願其翥軒豈敢自必乃林乃園凡此克孝厥安以專匪子之為美夫人之賢惟賢實希近在乎姻聮嗚呼云亡見不自先祭孫忱卿嗚呼忱卿而死於逆旅歟謂其藉祿以為養歟則田園室廬於吾鄉可以甲乙數也為好馳聘倦遊而至是歟則疇昔端居簡出雖鄰不覩也抑為以資以世以場屋得官而勢使然歟則舉不出此也夫士散而之四方略不過是數者而上焉者則名在當世欲退藏而無繇也忱卿可以免此而卒以逆旅斂嗚呼是不謂之命耶雖然有鄉黨為之辦護有婦族為之受吊者先事之三日壯子適至而帥相聞之歸其鎮之逋俸為錢三十萬而凡事無缺以忱卿之得此又可以見天之報善人矣薄奠告哀文以慰之祭妻母趙夫人有言城南張氏稱首架閣之配草堂之婦曰惟夫人相其孝友有言安固賢惟趙氏辟雍之孫郡丞之子曰惟夫人是習是似傅良鄙人辱交忠甫是於架閣則其叔父爰及婚姻夫人季女我觀季女以我貧困旦旦謀食歸田是遜匪教之素誰與無悶相彼從夫及閫外之議相彼愛子惟區區是遺靖惟夫人厥婦之懿自我來壻不見前作夫人猶存可以觀略今其亡矣將安儀度我是以哭之斯文而誦夫人之賢尚來者之知昨祭孫諌卿吁嗟諌卿無年謂何彼日戕生白髮醉歌亦有苦心利析秋毫孰如簡靜曾靡殫勞亦有﨑嶇暴衣露冠胡然深居而祗自殘剃草彌原櫝玉易毀謂天昭昭莾不可理我生空匱多朋為冨比年不圖交吊繼訃匪我私哀善類之憂忌豫是懲好豫是尤吁嗟諌卿稚婦弱子殁與兄訣一語一止豈無胡耇終也暝惑世有權衡誰為喪得吁嗟諫卿蓋事蓋棺誰俾吾黨聲為爾吞祭張忠甫吁嗟忠父誰無死生短長幾何胡足重䡖崇牙大纛百年之榮孰與身後誦其字名君行之修君學既成方其獨行群聽以驚有譁笑譏不悔不傾卒砥于信家人父兄既信而從邦人友朋有官問政有故問銘緩急之請是非之評隱然衡門重於公卿自昔蓋棺萬事愈明無祿何哀不朽有慿我愧則多事違其情君臨人喪治其衾衣或設之祭稽經考儀割絶肺肝放像爼彛其為銘文刻切怪竒葬視其穿風雨必時今我喪君哭不及尸曾莫得詳何以斂之祭以今羞雞酒瘠漓銘又弗䏻撰德慰悲葬也屬疾護棺以兒遭時之偷交道日衰我不能惇又以自規唯是子凡昔在寢闈受君託言永矢弗隳吁嗟忠父其尚肯來止齊文集卷之四十五
