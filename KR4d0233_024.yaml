body:
  text: 奏狀劄子繳奏率逢原除都統制狀準中書門下省送到録黃一道樞密院關池州駐劄御前諸軍副都統制率逢原奉聖旨除都統制令臣書行右臣將措湖湘巳聞率逢原之為人且見其行事矣其在江陵其在襄陽與今在池陽監司帥守皆患苦之屢有文字上煩朝廷雖然猶有可解者監司帥守與軍中事不相關未必非好堊之偏也近者淮西總領鄭湜親見其馭下無恩將士多怨徒以為管軍之人頗繫觀聽不欲斥言逢原之罪而按其中軍統制崔公亮以警動之逢原果不自安且無以掩諱其失至於自劾陛下曲加覆護與降放罪指揮是豈以為無罪乎而遽進為都統制臣不知其説也臣聞中興之𥘉分置屯所江淮之間付之諸將懼其專恣難制也而别置總領給餉其軍特以王人為之用示威重淳熙三年六月七日特降聖旨指揮令専一覺察諸軍掊克之事聖謨逺矣今率逢原為帥無狀密院鐫戒尚不知故至為總司所發上章待罪始稍有嚴憚王人之意若陛下朝以為罪而暮遷擢之則是教之不悛也以副統制升都統制未為超越但適當宥過之時未見改過之實遽此除授則有功者何以待之臣恐將帥解體且傷總領之威重也欲望聖慈將率逢原新命特賜追寢使之深自循省士無愁歎然後進遷庶允物議所有録黃臣未敢書行謹録奏聞伏候勑旨十二月二十四日奏入第二狀準中書門下省送到臣所繳率逢原除都統制奏狀奉御批依已降指揮右臣昨具論奏率逢原方以自劾放罪不當遽遷都帥臣之愚見以為朝廷勸懲宜有次第不應功罪混為一區今率逢原以總領鄭湜按其偏將掊克士伍墮廢軍政於是稍知嚴憚務自刻責而陛下為之覆護特從宥免此陛下善將將之道而率逢原感激思奮以功輔過之時也若乃信宿之間遽有遷擢臣恐逢原粗人昧于理義妄窺朝廷意出姑息却復專橫愈無悛心故敢瀆犯天威乞寢新命不惟為陛下惜此舉措亦所以全逢原也至于逢原為帥無狀事迹非一前後臣寮屢有文字臣不欲因此悉數暴逢原之惡正以事關軍衆慮傷事體區區欲望聖慈特從所乞必須知改然後除授所有録黃臣未敢書行謹再録奏聞伏候勑旨十二月二十六日內引劄子四年正月人主無職事以愛惜人才為職事夫愛惜人才徒貴之以爵位不若養其聲望之為美徒榮之以恩寵不若全其操履之為大凡立乎人之本朝爵位隆而聲望汚恩寵盛而操履闕此公論所甚不與也公論不與將為庸人則是貴之者適所以賤之榮之者適所以辱之也恭惟祖宗承五代之後士風極衰而一旦作興之至過漢唐而無愧三代無他道也養其聲望全其操履而已在仁宗時范仲淹歐陽修余靖尹洙之徒嘗以論大臣除授不當去國矣已而仲淹修等之賢果信于天下為時名臣向使當時不明諸臣去就之誼而苛留兩存之則雖仲淹修不能暴白于世而况不如仲淹修者乎在神宗時司馬光吕公著蘇軾轍之徒亦嘗以爭新法去國矣巳而光公著等之賢果信於天下為時名臣向使當時不明諸臣去就之誼而苛留兩存之則雖光公著等不能暴白于世而况不如光公著者乎由是觀之愛惜人才必如是而後可不然將淪胥而為庸人夫庸人者一世所棄何鄉而立有臣如此國家何賴焉則亦非上之人之利也以臣所見近代人主覆護臣子容忍不棄未有如陛下者然以為愛惜人才則未也既曰覆護之而不謂之愛惜之者何也眷之於爵位恩寵之間而不務明其去就之誼故也比者有以臺官察朝士者矣陛下皆出之出之誠是也俄而並召兼用為卿將孰是孰非耶有以後省官駁從班者矣而陛下為罷給事中罷之可也已而並除職名一去為郡一降為王府官然則是均有罪耳有以諫官疏大臣者矣而陛下欲並用之大臣乞去不得請諌官乞去又不得請然則是俱賢耳雖然賢否混殽何以為國猶可解者則皆士大夫也至如臣衰懦攝官詞掖嘗不度踈賤論奏內侍不當為知省官雖蒙陛下納臣之章不行詞不賦祿而其人至今出入禁闥與見任無異近復有旨令兼他官中書後省與黃門相持而不決號令自今可廢此尤不可者臣故曰陛下可謂覆護群臣者矣而非愛惜人才之謂也臣不勝拳拳欲望陛下務明人臣去就之誼誠以愛惜人才為職而明其去就之誼請自不其以臣之可備使令則當去內侍以臣為不足僃使令則當去臣臣之誼明則群臣亦各務明誼群臣各務明誼而後聲望不汚操履無闕群臣之聲望不汚操履無闕是不為寧然後陛下可以委任而責成則非臣之私便也再內引劄子人莫難於養其心而人主之養其心為尤難共惟本朝列聖養心之道備矣臣不敢逺引亦不敢稽深言之姑誦臣少壯時身所見聞髙宗夀皇兩朝時事每自退朝于起居食息之暇無非以禮樂刑政之具務自檢束一日之內每事有常以何時刻延見儒臣以何時刻省閲章奏以何時刻親方册或遊戲翰墨也然後以其餘景燕衎尊爼娛嬉苑囿至於暮夜又必宣召宿直官從容晤語間以觴詠如是者皆三二十年寒暑不渝忽一日不如是即內侍以近醫藥為請而中外惶惑矣夫以堯父舜子稽古學道度越漢唐之君而克勤小物課為日程拘拘不廢何也意者雖聖人不可以不持養之故也臣幸遭逢備員近侍每見陛下臨朝之際莊敬肅穆儼然若神雖執禮名家無以竊議于以仰窺聖心持養必有道矣而比來傳聞往往以為玉音所發或異尋常機務之間稍失次第廷臣震灼莫曉其故妄意窺度其説多端以臣愚見或者陛下言動偶有此差誤耳恭惟至聖至明動循法則而又春秋鼎盛剛健日新何繇言動有此差誤無乃起居食息之暇所以自持養者愆其常度而延見儒臣之時少歟省閲章奏不屑加意歟或親方册遊戲翰墨等事暫置弗講歟不然則燕衎尊爼娛嬉苑囿之樂惟意所適而無節歟又不然則是燥濕隂陽之冦或傷其和而忽忽不樂以得此也陛下幸因臣言試自省察萬一有此不可不反求之也孔子以終日無所用心為難而孟子論心亦曰出入無時莫知其鄉操存而舍亡則心之不可以無所繫也如此伏願陛下法髙宗夀皇之所行存孔孟之所戒以其日力定為常度非徒以親政涖民亦所以尊生介夀惟赦其狂僣留神財察社稷幸甚臣不勝忠愛之情奏乞褒録傳察宗澤婁寅亮子孫劄子竊覩近者贈嶽霖煥章閣待制與張某一子官仰見公朝旌念舊臣苟有勞烈即録其子孫承襲重爵以此勸士天下知尊君親上之報不薄而徇國者衆矣幸甚臣嘗論本朝聖聖相承每遇大事則有先見特立之臣奮不顧身為國建事臣不暇逺論姑述宣和以來三朝所覩在徽宗時則有傳察以死事為節義之功之首髙宗中興時則有宗澤以留行為翊載之功之首夀皇入繼大統時則有婁寅亮以建儲為定䇿之功之首然而傳察贈典雖甚優渥宗澤致仕亦頗通貴而兩家子孫未蒙旌異棄善録瑕令人於邑至於寅亮初以上虞縣丞敢建大議髙宗嘉納擢為御史其後時議不同竟死小官澤不及後遂以乏祀若以至和嘉祐故事言之宜在褒崇之典一切勿問臣恐傷忠厚之風塞敢言之路上無以發明髙宗至公之心下無以對􅏡夀皇善繼之美欲望聖慈以所以褒賞嶽飛子孫之意推及三家以廣恩惠以勸忠力繳奏册寶官吏推恩狀準中書門下省送到録黃一道節文為册寶都大主管所申奉上尊號册寶了畢被差一行官吏推恩事二月六日三省同進呈奉聖旨除巳推賞人外餘並特與三分減一推賞內第一等轉一官減二年磨勘第二等轉一官第三等減三年磨勘其軍兵願換犒賞者聽令臣書行須至奏聞者右臣恭覩上件聖旨指揮係是依紹熙元年體例三分減一推賞施行臣檢照紹熙元年正月一日修製奉上夀聖皇太后尊號至尊夀皇聖帝夀成皇后尊號册寶行禮了畢并正月十九日修製中宫册寶行禮了畢推恩等第人數第一等五人轉兩官第二等十二人轉一官減二年磨勘第三等四十三人轉一官資今來所降上件推恩指揮內人數比紹熙元年第一等承受官多一員第二等除貼去外照管事務官尚多一員行遣書寫奏報文字官多一員第三等承受并諸司行遣人多一員巳上共多四員臣竊詳紹熙元年推恩之人係是修製奉上三官四册四寶事務繁重職掌稠疊計日甚久為勞亦多所以當來恩數特異常典今來修製奉上慈福宫尊號册寶雖曰千載一時非常之慶然而幹當臣寮偶𬒳驅使只合課計心力以為酬奬所是一宫一册一寶既與三宫四册四寶體例逈然不同伏緣近日都大主管官不候一等具申尚書省取旨推恩先次獲降聖旨指揮轉行兩宫一時後省皆失契勘只作特旨放行以致逐人妄援前例保明陳乞今來雖經朝廷裁酌將都大主管官止轉一官餘人三分減一推賞比之元年委是太濫以此始知都大主管所申首為身謀上欺聖聽因芘儕輩大啔幸門而又增添員數至五六人恭惟國家對天下之休慶事未已竊恐濫恩寢廣官爵益輕臣愚欲望聖慈軫矜民力吝惜名器將上件指揮除軍兵聽換犒設一項外其餘更加裁損務令允當仍將所增添人只依舊數不許增多庶幾日後無疆之慶僥幸衰少所有録黃臣未敢書行謹録奏聞伏候勑旨貼黃檢準紹熙三年十二月二十二日聖旨指揮玉牒所進夀皇聖帝玉牒會要所進夀皇聖帝會要了畢與減半推恩緣上項進書篇帙少似巳前特行減半推賞與今來事體一同伏乞睿照五年二月十一日奏入繳奏孫拱之轉官狀準中書門下省送到録黃一道樞密院關奉聖旨忠訓郎御前祗應孫拱之為有勞可特與轉行一官令臣書行右臣取到吏部狀見得孫拱之自授承信郎以後十年之間巳轉五官數內淳熙十六年轉了三官又自紹熙二年九月磨勘轉忠訓郎至今年十二月才及兩年有餘更轉一官臣不知其有何功勞被此恩數歲月未久僥幸太多壞武臣年勞之法長褻近私謁之風臣不得不為陛下惜也所有録黃臣未敢書行謹録奏聞伏候勑旨二月二十日奏入繳奏册寶承受官免減一員狀準中書門下省送到録黃樞密院關二月十四日奉聖旨巳降指揮夀聖隆慈備福皇太后尊號册寶承受官依淳熙十二年紹熙元年體例差置緣各巳經大典職事與其他不同特與兑減一員餘依巳得指揮施行令臣書行須至奏聞者右臣照得紹熙元年修製奉上四册四寶差人管幹不得不多今來修製奉上一册一寶若初間從公差置便合取旨省員却乃比如舊數增多六人其為欺罔不待力辨徒緣業已施行重于痛有鐫減此臣所以從寬論奏乞只依元年員額巳荷宸聰悉垂采聽不審何故復有上件指揮以臣窺度必非聖意自欲反汗以長幸臣只是此曹耻於退聽求勝公論且夫行法自貴近始今承受官係是第一等推恩人若許存留即其餘小官豈無辭説則是身為貴近者亂法度也恐非古人患不均之誼臣欲望聖慈將上件指揮特賜收寢令照應巳降指揮施行所有録黃臣未敢書行謹録奏聞伏候勑旨二月二十日奏入再繳奏孫拱之轉官及册寶承受官免減一員狀準中書門下省送到臣所繳孫拱之轉官奏狀并録黃一道恭奉御批為係實該五年年勞賞可特與書行續準尚書省劄子并送到録黃為臣所繳册寶所承受官特與免減一員二月二十三日三省同奉聖旨依巳降指揮書行臣須至再具奏聞者右臣語對三省將上臣所論奏册寶官減員事得旨依奏者今月十三日指揮也承受官免減一員十四日續降聖旨指揮也又三省將上臣所論奏孫拱之不當轉官事得旨依奏者今月二十三日早指揮也可特與書行當日審奏續降御筆指揮也以此見得得事可其奏者陛下之初心朝廷之公論也續準內降者陛下之不得巳左右之乞憐也臣誠不肖攝承詞掖儻不能體陛下之初心而曲從其不得巳之意則非所以發明聖德不能伸朝廷之公論而下比於乞憐之人則非所以禆贊邦政豈不為廢司存忘法守乎則臣不敢奉詔必矣臣愚欲望聖慈將十四日續降承受官免減一員聖旨指揮并二十三日續降書行孫拱之御筆指揮並賜追寢只從元來三省將上巳得依奏聖旨指揮施行不勝幸甚所有元付到御批粘連在前所有録黃臣未敢書行謹録奏聞伏候敕旨五年二月二十四日奏入貼黃恭準御批孫拱之為係實該五年年勞賞可特與書行令取到吏部狀御前祗應本部即無立定年勞推賞條格指揮顯是難以施行伏乞睿照繳奏饒州奏勘程廷倚斷案狀準中書門下省送到録黃節文為饒州奏勘到程廷倚斷案令臣書行右臣照元案見得程廷倚髙祖程節曾祖程鄰皆官至寶文閣待制內髙祖正議大夫祖父皆命官今廷倚以僧惠深受其賃錢誣以占屋而訟之縣又辱罵其骨肉迫逐起遣不勝忿耻倩人打僧其下手人王念四本州已從徒三年髠髮居役定斷即廷倚元謀減一等徒二年半贖銅五十斤罪止于此矣本州復引勑有蔭人犯徒流罪情不可贖者奏裁臣不識廷倚所犯何以謂情不可贖乎徇一僧之欲而辱兩制之故家者是州司不平也從一州之請而廢千載之蔭法者是刑部不審也且夫情重奏裁必有大不得巳者近年守臣倚法作威往往多是以此籍口捃托細故汙衊衣冠今若復因饒州所奏有此行遣臣恐郡守之專恣者援此為例操切士大夫之族矣臣愚欲望聖慈將上件指揮特從末減所有録黃臣未敢書行謹録奏聞伏候勑旨三月二十九日奏入入奏劄子四月臣不勝螻蟻之忠輒有愚言仰干天聽如蒙省覽即臣雖就誅戮不悔臣聞父子天性也孝慈之道不待教而能者也自士庶人皆然而况於人主乎然考之載籍則有尊為人主而隙開于父子之間至于禍敗反不若士庶人之家者何也賤者群居其勢易親貴者異宫其勢易踈故也夫惟其勢易踈則離間之言易入離間一入則父之情不欲自疏于其子子之情不欲自明于其父由是愈難於言而父子之隙開矣父子之隙開而禍敗至唐之西內則李輔國之徒前日之龍德宫則梁師成之徒是也論至于此可為寒心恭惟陛下父子之間一同舜禹而比年以來稍虧定省之節臣誠卑賤不能知宫禁間事若以前鑒觀之或者亦當有離間兩宫者乎陛下孝謹本自無他偶以纎介動成疑阻夀皇恐傷陛下之意不欲自察察言之陛下恐傷夀皇之意又不敢自察察言之而左右之臣各憚天威又亦以傳言為諱由是禮文寖踈情好日隔積成因循實駭聞聽此臣所以不避萬死而輒言之也言之也者將以通之也有如天意信謂如此即下臣此章明詔大臣使兩宫左右曉然知此務通二聖之情則舜禹之德千載同符矣臣無任拳拳激切祈􅈤之至乞祠申省狀四月六日伏念某一介踈庸重以衰病誤𬒳使令身兼數職皆是文字之官關繫事體而心力不逮􅘃曠實多稍涉歲時曾亡報效嘗聞諸夫子曰血氣既衰戒之在得又曰陳力就列不能者止若某者所謂乏陳力之勞違戒得之訓者矣內負初心外慚公議夙夜念此誠不自安區區欲望朝廷檢會前後陳乞在外或祠祿差遣狀劄特賜敷奏早從所乞以安愚分以全晚節伏候指揮四月七日三省同奉聖旨不允乞對狀四月十四日臣近者不識忌諱幸蒙賜對輒論及兩宫事仰荷聖慈濶略愚直曲垂清問備盡􅈤悃仍令臣入文字指罪離間之人將有施行以釋疑阻即古所謂狂夫之言聖人擇焉殆不過此臣雖糜捐不足以報然比至奏入却留不下十二日又幸同班奏事復蒙聖慈諭臣以向來文字説得未詳臣切自咎責不足以仰承明詔以致尚稽順動枉招謗讟臣若不務自殫竭以輔聰明則非陛下之不聽用臣而臣實負陛下也欲望更賜以燕間之頃令臣縷縷言之苟以螻蟻之微感動天聽於是二聖重歡四方相賀則臣之志願畢矣除巳詣閣門進榜子乞奏事外謹録奏聞伏候勑旨止齋先生文集卷之二十四
