front:
  text: 止齊先生文集卷之四十一
  hash: sha256:36046fa17efa3d7dd0cd38703b4a094acace73fc12ab986872ca8502b4a9d15a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_041-1a}
body:
  text: 宰臣以下跋御制至尊夀皇聖帝聖政序記臣上言臣聞前聖之德業莫盛于堯舜後聖之述作莫盛於孔子然二者相須而不能以同時恭惟至尊夀皇聖帝道本於稽古功成於協帝臨御二十有八年仁恩塞穹壤威聞憺蠻貊潤色中興之烈而增光揖遜之美薄海內外萬口同辭以為自舜以來一人而巳陛下奉若慈訓克昌丕緒見之行事緝熙光明而且欲以欽承允蹈之餘布在方冊昭示無極爰命史臣裒輯聖政鋪張表出作宋一經於是書成來上親灑宸翰攄發睿藻冠之篇端日星有爛著於天文而太極之妙自然陳露縉紳鉛槧之流又以為是孔氏之作也臣竊惟有虞之書𥘉與五典並行而無辨更千五百年而得孔氏斷為書首序之百篇之上然後暴白於万世由此觀之虞舜雖極治嘗久晦而後彰孔子能祖述矣蓋追誦而不相及未有父子兩朝聖以繼聖立德立言自相發揮皇乎懿哉如今日之盛者也抑臣次舜之事以底豫於孝遭人倫之變也以豫賢於公因天命之改也惟我夀皇之事髙廟備極五福彌歷三紀雍雍穆穆吻無間言曾未倦勤脫屣萬乘授之主鬯神人燕寧纍聖一家世世同德父子之間視舜有光焉則陛下之序此書尤足以垂百王之範𥙷六藝之缺矣臣以非材待罪宰事適董攸司與托不杇而藏之禁嚴未寫琬琰無以對揚宏休臣實甚懼用是百拜稽首昧死請以賜本大書深刻以幸來世而又百拜稽首髣佛大㫖敬書於序之下方太常丞兼國史日曆所編類聖政檢討官臣章頴著作佐郎臣王容臣李唐卿著作郎臣沈有開臣黃由祕書少監臣陳傳良左丞相兼提舉監修國史日曆提舉編類聖政跋皇子嘉王賜贐金劄子竊審抗章得請暫爾間佚啓行有期輒以白金百星聊充贐儀輕凂為愧指留幸甚乍逺倍加保愛至祝右紹熙甲寅五月四日潜邸所賜也臣是歲嘗數對上皇論事不合乞休致再不允於是又請對庶幾感窹是日午鼓趨待漏院會從官趙彥逾以下亦同班奏事閣門來約臣令隨衆班俄有㫖獨令臣上殿下敷奏反復久天意弗順遂再乞休致忽發玉音甚好甚好留下文字臣就榻前謝且辭下殿再拜退出國門具以聖語申尚書省諫院御史臺及奏知潜邱且請不獲禀逹之罪上賜贐金恩出意外臣以不才𬒳遇最寵奎畫之號視翊善黃裳有加是冬急召入講上數從容語臣所藏朕字畫盍進來用寶如生辰詩何故久不見跋語臣每逡巡不敢當尋復趣取跋稿僅成而臣罷去樓鑰髙文虎就觀臣家稿留案間家人倉皇不及收自入謫籍日夜危懼但謹櫝藏不敢夸示一昭回之光以震耀天下臣罪萬死言之感涕跋御書所進嘉邸生辰詩右傅良所上皇子大王生日詩王意嘉賞手書一本以贈或者難曰此頌體耳而及於阽危飢寒之辭何也曰是獨不見太史遷論頌乎太史遷曰余每讀虞書至於君臣相敕惟幾是安而股肱不良萬事墮墮成王作頌推巳懲艾悲彼家難可不謂戰戰恐懼善始善終者哉由此觀之虞周詩頌非耶知虞周之頌然後可與言詩矣因著其語又見大王有取於詩在此而不在彼也且以著見王録小善嘉規益之意傳良不勝感懼無以得此因刻之石以侈大貺右此序跋真蹟久尋不獲故前跋賜金劄子深致歎惜之意而參政樓公復追記所見以紀之先生子師轍歲辛未二月始於故書中得之今附此臣仰惟皇帝陛下龍潜嘉邱育德進學一時官寮皆出遴選嘗逢誕節咸獻詩頌既而置酒髙宴𥘉酌黃裳次酌陳傅良各出文書一通致謝再三及視之其一曰上呈翊善其一曰上呈贊讀御名謹封因敬請所以謙賜之由上曰二公之詩雖因為夀而作皆寓警誨之意輒依所惠親書一本復以為贈以示不忘裳與傳良跽謝而退龍飛之𥘉擢裳禮部尚書傅良中書舍人未幾裳以疾沒傳良奏請以御書刋之堅珉玉音賜許是時臣鑰待罪瑣闥與傅良同直北門嘗過其家傅良以跋語示臣大略白季札觀樂歌頌而曰哀而不愁太史公讀虞書至於君臣相敕惟是幾安未嘗不流涕也成王作頌推巳懲艾可不謂戰戰恐懼善始善終者哉蓋頌不專於美盛德之形容皆有敕戒之義秦斯以來此義殆絶臣為之聳然作而曰偉哉論也自詩大序言以成功告於神明無有以頌為警戒者舜臯賡歌世但以為盛事非司馬遷不足以發聖賢相敕之㫖自李斯頌秦專務溢美人亦不以為過韓愈有曰不以頌而以規也而傅良䏻發之臣於傅良平日所畏至是益以歎服促使刻之傅良曰今既刋宸翰於上方不敢使人代書適有目眚當俟少愈曾未信宿而巳報罷未幾臣亦去國相忘於江湖者十餘年傅良下世訪遺稿於其家則不知所在矣二子師轍師朴求跋其下將碑之以傳逺臣既傷傅良不及見更化之日敢直書始末上以彰陛下好賢樂善之素下以侈傅良等際遇之寵抑使後學知古人頌詩賡歌本非專於形容稱美而諷諫之切未嘗不寓於斯云嘉定三年歲在庚午秋八月丙辰朔正兼太子賔客奉化郡開國公食邑三千六百户臣樓鑰跋歐王帖後魯直帖往往有之如歐王二公帖蓋不多見靖康之變士大夫故家文物淪喪可勝道哉間見一二令人隕涕歐公以嘉祐四年罷府事明年書成是歲王仲儀以侍讀學士出知益州逢原遺腹女是生吳說傳朋傳朋嘗通判永興以其母念逢原之墓乞改襄陽於是作養志堂焉余悲逢原無後併著于此跋徐薦伯詩集世多謂書生不知兵謂書生不知兵猶言孫武不善屬文耳今觀武書十三篇蓋與考工記榖梁子相上下吾友徐薦伯登武舉第一日示余橫槊醉稿余讀巳喜薦伯慷慨有烈丈夫氣其詩詞視唐諸子矻矻弄篇章者多哉當今諸公如見薦伯詩亦可解文武二途之惑題杜大春畫梅偶與文叔時亨論十五國風次第取季札舊序參孔氏序特退秦於魏唐之後繫豳於末略經改定而意以獨至晚於燈下觀蜀客卿作梅筆墨無幾如在籬落因悟萬事無支離法題石時亨所藏吕真人畫像他畫欲作塵外想類多輕楊今觀太清樓本儼若孔老豫微笑曰得之矣真人固應如此彼不知其人而求其夀與他畫師何異題張之望文卷後劉知幾史通上下數千載間掊擊略盡蓋剨然似庖丁解牛手觸足履動中節㑹矣至不見全牛一節未識知幾尚費若干年耶此事殆非強博䏻到賈生太息一書首論諸侯王強大事可謂知務當是時文帝方從代來齊樊諸王皆有相疑之勢未虛侯功最隆及賞最晚帝意亦略可見議者因謂賈生首編蓋干時云嗟夫生豈干時者耶要知論事誠有次第一舛其序必有不相察者孔子作春秋一字無間然者非獨用功深也易其心而後語權衡自平耳後之秉筆者宜書輒不書不宜書輒書是其咎安在如班孟堅史視司馬子長加精察而竟不䏻過往往有愧色亦豈力不足歟溫公嘗言洛中士大夫淵藪談空說性多矣惟史事無所啓口蓋有譏云耳然公言性獨與楊子雲合自今觀楊孰與孟子子雲博極群書顧不見巳何哉程先生易傳未出門人亟以請先生曰吾獨不望進乎蓋晚始授人其間有一字數改定者前哲重著書如此顔子不二過論殆是慚筆今讀韓子書者於斯文特熟甚科舉之纍自韓子不免冝夫人盡然於此可以興古道不行之嘆黃巖張君之望持所為書二編越江山來問當然與否僕固辭張君固請㒒末學耳豈足斷此書厚意不可虛辱輒題數語附名篇末非敢云何姑以見惓惓意耳跋趙主簿所藏詩後丞相清源梁公治閩之數月徙福清主簿趙君餘慶丞長溪主簿固辭丞相固遣之未幾福清宰李君宗思來請主簿長溪宰李君遂夫又來請留主簿丞相益賢君也速致郡中屬掌秋賦之入而趙君􅈤訴某老矣又位卑下不宜度越他士參郡政其為辭殊苦確不樂丞相不䏻奪也明年君秩滿將罷去忽過余出其先君子所嘗得於諸公詩跋見示亟讀之乃知趙君蓋家學如此其仕進無先人之心有繇來矣跋東坡所記程公逸事學者多不道鬼神如蘆蔔之冤豈不異哉自唐末諸藩以鎮將求盜武夫往往略平民充數幾及賞格藝祖定天下哀矝無辜縣復置尉始以儒生為之而鎮將廢賞格如故民鮮死焉二百年於此矣邇者有司以薦舉吏多奸少不應功令輒見格惟尉以捕盜改秩善傳會其事得不用薦或者因是頗襲鎮將之舊上方閔焉議改制以防之此建安陳侯焞所為刻是石也跋孫氏志述方國家肇造之𥘉將相大臣多西北舊族而東南未有聞者既而天下平七八十載之間而范公起吳杜公起越歐陽公起廬陵孫公起富春蓋漢一大郡之地而二三公者皆極一時之望於是東南人物遂擅天下嗚呼當錢李二氏之時諸公皆安在耶余覽杜公所言孫卿墓志并歐范之述為之太息感今而懷古東南之士奈何妄自菲薄跋爾雅疏古者重小學爾雅所為作也漢興除秦之禁嘗置博士列於學官至今漢儒書行於世如毛氏詩訓許氏說文楊氏方言之類蓋皆有所本云隋唐以來以科目取士此書不課於舉子由是浸廢韓退之以古文名世尚以注蟲魚為不切則知誦習者寡矣國𥘉諸儒獨追古依郭氏注為之疏爾雅稍稍出比于熙豐三經行學者非宇說不學自先儒注疏皆罷絀而爾雅益廢余憶為兒時入鄉校有以爾雅問題者余用䏻辨鼠豹不識蟛蜞為對其事至淺諸老先生往往驚嘆以為博也郡有刋疏并音釋若干卷以久不就字畫多殘闕金華趙君子良來為推官繕𥙷之始頗可讀趙徴余言因叙此書之所以廢且見子良之志子良學於東菜吕伯恭氏於余為同年進士名善珍跋史丞相祭諸葛夢叟文夢叟言貌退然不目表出聲蹟不著丞相乃獨得之何哉丞相門生故吏滿天下不聞有得此於丞相者夢叟顧一見得之又何哉丞相之取人也異於今夢叟之取於人也尢異於今矣不竟其逢令人隕涕書種德堂因記陳仲孚問詩語近讀古樂府始知後作者皆有所本至李謫仙絶出衆作真詩豪也然古詞務協律而尤未工仲孚嘗問詩工所從始余謂謝元暉杜子美云謝眺每篇堪諷詠蓋嘗得法於此耳解道澄江靜如練令人却憶謝元暉與子美同意因書種德堂遂記此語跋靈潤廟賜敕額桂陽之民雖貧而有常産父子孫兄弟多挨居或至百口重喪祭有喪哭泣過時必葬埋未有火化者逾久展奉猶哭泣如新喪祭事謹潔至不敢糞瓜菜尤恥為人隸飢年不得巳鬻子舍曰奴婢而以養子為約蓋其俗朴近古然也然拙而惰農耕器絶苦窳犂創入土才三四寸終歲置田勿問及春耨去陳草曾不待破塊輒下種水在田上節級溉注之是為良田水在田下雖咫尺不䏻轆轤使之逆上往往夾江之田與並山同為瘠薄易苦旱率十年八九耕不獲每旱即立視苗槁而乞哀於神無問在不在祀典日擊羊豕聚群巫鼓舞象龍或燃指以膏火薄肉供佛類不效則禱于龍渡山之神山在縣境內最著名其神邦人尊事之非巳甚不敢輒禱無不應今夏旱凡民之祠事且遍不雨於是屬軍教授縣令謁祠下以靈潤源之水歸又兼旬不雨某遂宿戒親謁祠下三鼓方作星河彌天行數里漸摵摵有聲雞𥘉鳴至青蓮寺為位望拜遲明登山俄時雨大至逹城下巳乃三日雨歲及下熟吏與民德侯之賜推本所始得紹興十四年賜廟額敕黃一道於掌故仰惟國家為民秩祀篤於報功冝詔萬世敬摹之石某為長吏不䏻履阡陌為方略教民治田而徒干神之澤又以窮自歸於當道連帥部使者咸以錢粟來周急可以免歲月矣要不可久方將趣丞史以龍骨車若桔槔法下之鄉聚使民稍自力不但以瀆神益永尊事無怠故因對神之休與國家所以褒大之者并道其土俗善否為勸勵著之下方跋宋景文公帖景文公以皇祐四年二月自亳徙成德明年正月徙定武實代魏公所謂丐任河朔一年有餘蓋是歲也元憲公亦以是歲八月自河南徙許而晏公來河南公有九月朔日請入覲書欲㑹元憲于河陽草五日書所謂相國也至和元年劉冲之相劉自參預即領唐書故催書於公嘉祐改元仁宗不豫其曰河朔大臣則韓公在相臺爾八月徙益州是時龎莊敏自永興改河東其年五月元憲歸綴中書門下班公有此月二十三日書云云則猶在定武也三年王侍讀來成都於是還闕公言莊敏引歸不决元憲乃圖任之漸明年莊敏以築堡事寵節鉞元憲復管樞務真見事之談云跋宋元憲公表槀景祐二年定新樂是時同在詞掖如胥公偃丁公度張李朝石皆前進元憲公以元年四月掌制乃獨屬筆豈非其文檀一時諸公所推遜歟欽誦遺稿令人起敬跋趙延康公責僞楚書余嘗手抄建炎四年八月二日刑部狀㑹恩牽復士大夫名數延康公在焉一時狀中如胡公寅劉公珏皆復用劉至位執政而延康竟謫死余聞京城之禍子昉以募義兵見囚范瓊世多言靖康無伏節之士有以宗室所暴白如此豈無人哉而皆誣陷於群小嗚呼悲夫跋趙延康詩余既於責僞楚書後著公行藏復見所為詩嗟乎劉歆李白之文盛矣其節操何如詩不足為公道也跋溫公與邢和叔帖熙寧間溫公居洛公從崇德縣再入崇文元豐四年兼史事以所藏溫公帖知是時相與甚厚也後一百十有二年某得見之於其曾孫遵仲修跋張無盡與邢和叔帖紹聖四年公為吏部侍郎十月自權尚書遷御史中丞無盡此帖皆是歲無盡罷左司郎官去至是適兩年餘矣跋邢惇夫詩及諸公題以諸公之愛惇夫與惇夫之得此於諸公追想在昔令人起敬跋邢氏慶國夫人手書余與天台謝傑景英為忘年交謝趙出也為余言外氏丞相家法甚悉今見邢氏趙夫人手書戒婦子一𥿄往往與景英語合邢尚書趙丞相事具國史至其故家典刑要自令人起敬跋劉元城帖余讀元城諫疏遍刺元祐大臣而獨不及司馬文正公遍刺元祐大臣而不以為訕獨不及司馬文正公而不以為黨豈惟諫議之賢哉亦足以想見元祐以前深厚之俗矣余懷此久因與子厚得公遺墨遂書其後跋胡文定公帖浙間人家家有春秋傳而罕見公字畫余記為兒時從鄉先生學同學數十兒兒各授程易胡春秋范唐鑑一本是時三書所在未侵板往往多手抄誦也晚官湖湘間每過士大夫家輒見公遺帖皆甚貴惜然為春秋學者顧少如浙間何哉因見向氏所藏帖書以勉之止齊先生文集卷之四十一
