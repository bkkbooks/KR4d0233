front:
  text: 止齋先生文集卷之四十一
  hash: sha256:d99d3660714620b428ad4fc4defc0ba9f565c7c4087dddb3580888e33daa2dd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_041-1a}
body:
  text: 宰臣以下䟦御制至尊夀皇聖帝聖政序記臣上言臣聞前聖之徳業莫盛扵堯舜後聖之述作莫盛於孔子然二者相湏而不能以同時恭惟至尊夀皇聖帝道本於稽古功成於恊帝臨御二十有八年仁恩塞穹壌威聞憺蠻貊潤色中興之烈而増光揖遜之美薄海内外萬口同辭以為自舜以来一人而巳陛下奉若慈訓克昌丕緒見之行事緝熈光明而且欲以欽承允蹈之餘布在方冊昭示無極爰命史臣裒輯聖政鋪張表出作宋一經於是書成来上親灑宸翰攄發睿藻冠之篇端日星有爛著於天文而太極之妙自然陳露縉紳鈆槧之流又以為是孔氏之作也臣竊惟有虞之書𥘉與五典並行而無辨更千五百年而得孔氏㫁爲書首序之百篇之上然後暴白於万世由此觀之虞舜雖極治嘗乆晦而後彰孔子能祖述矣蓋追誦而不相及未有父子兩朝聖以繼聖立徳立言自相發揮皇乎懿哉如今日之盛者也抑臣次舜之亊以底豫於孝遭人倫之變也以予賢於公因天命之改也惟我夀皇之事髙廟俻極五福彌歴三紀雍雍穆穆脗無間言曾未倦勤脫屣萬乗授之主鬯神人燕寕累聖一家世世同徳父子之間視舜有光焉則陛下之序此書尤足以垂百王之範𥙷六藝之缺矣臣以非材待罪宰事適董攸司與托不杇而蔵之禁嚴未寫琬琰無以對揚宏休臣實甚懼用是百拜稽首昧死請以賜本大書深刻以幸来世而又百拜稽首髣髴大㫖敬書於序之下方太常丞兼國史日暦所編類聖政檢討官臣章頴著作佐郎臣王容臣李唐卿著作郎臣沈有開臣黄由秘書少監臣陳傳良左丞相兼提舉監修國史日暦提舉編類聖政䟦皇子嘉王賜贐金劄子竊審抗章得請暫爾間佚啓行有期輙以白金百星聊充贐儀輕凂為愧指留幸甚乍逺倍加保愛至祝右紹熈甲寅五月四日潜邸所賜也臣是歲嘗數對上皇論事不合乞休致再不允於是又請對庻㡬感窹是日午皷趨待漏院會従官趙彦逾以下亦同班奏事閤門来約臣令随衆班俄有㫖獨令臣上殿下敷奏反復乆天意弗順遂再乞休致忽發玉音甚好甚好留下文字臣就榻前謝且辭下殿再拜退出國門具以聖語申尚書省諫院御史䑓及奏知潜邱且請不獲禀逹之罪上賜贐金㤙出意外臣以不才𬒳遇最寵奎畫之號視翊善黄裳有加是冬急召入講上數從容語臣所蔵朕字畫盍進来用寳如生辰詩何故乆不見䟦語臣每逡廵不敢當尋復趣取䟦稿僅成而臣罷去樓鑰髙文虎就觀臣家稿留案間家人倉皇不及收自入謫籍日夜危懼但謹櫝蔵不敢夸示一昭囬之光以震耀天下臣罪萬死言之感涕䟦御書所進嘉邸生辰詩右傅良所上皇子大王生日詩王意嘉賞手書一本以贈或者難曰此頌體耳而及於阽危飢寒之辭何也曰是獨不見太史遷論頌乎太史遷曰余每讀虞書至於君臣相敕惟㡬是安而股肱不良萬事墮堕成王作頌推巳懲艾悲彼家難可不謂戦戦恐懼善始善終者哉由此觀之虞周詩頌非耶知虞周之頌然後可與言詩矣因著其語又見大王有取於詩在此而不在彼也且以著見王録小善嘉規益之意傳良不勝感懼無以得此因刻之石以侈大貺右此序䟦真蹟乆尋不獲故前䟦賜金劄子深致歎惜之意而參政樓公復追記所見以紀之先生子師轍歲辛未二月始於故書中得之今附此臣仰惟皇帝陛下龍潜嘉邱毓徳進學一時官寮皆出遴選嘗逢誕節咸獻詩頌旣而置酒髙宴𥘉酌黄裳次酌陳傅良各出文書一通致謝再三及視之其一曰上呈翊善其一曰上呈賛讀御名謹封因敬請所以謙賜之由上曰二公之詩雖因為夀而作皆寓警誨之意輒依所恵親書一本復以為贈以示不忘裳與傳良跽謝而退龍飛之𥘉擢裳禮部尚書傅良中書舎人未㡬裳以疾沒傳良奏請以御書刋之堅珉玉音賜許是時臣鑰待罪瑣闥與傅良同直北門嘗過其家傅良以䟦語示臣大畧白季札觀樂歌頌而曰哀而不愁太史公讀虞書至於君臣相敕惟是㡬安未嘗不流涕也成王作頌推巳懲艾可不謂戦戰恐懼善始善終者哉蓋頌不專於羙盛徳之形容皆有敕戒之義秦斯以来此義殆絶臣為之聳然作而曰偉哉論也自詩大序言以成功告於神明無有以頌為警戒者舜臯賡歌世但以為盛事非司馬遷不足以發聖賢相敕之㫖自李斯頌秦專務溢羙人亦不以為過韓愈有曰不以頌而以䂓也而傅良䏻發之臣於傅良平日所畏至是益以歎服促使刻之傅良曰今旣刋宸翰於上方不敢使人代書適有目眚當竢少愈曾未信宿而巳報罷未㡬臣亦去國相忘於江湖者十餘年傅良下世訪遺稿於其家則不知所在矣二子師轍師朴求䟦其下将碑之以傳逺臣旣傷傅良不及見更化之日敢直書始末上以彰陛下好賢樂善之素下以侈傅良等際遇之寵抑使後學知古人頌詩賡歌本非專於形容稱羙而諷諫之切未嘗不寓於斯云嘉定三年歲在庚午秋八月丙辰朔正兼太子賔客奉化郡開國公食邑三千六百户臣樓鑰䟦歐王帖後魯直帖徃徃有之如歐王二公帖盖不多見靖康之變士大夫故家文物淪喪可勝道哉間見一二令人隕涕歐公以嘉祐四年罷府事明年書成是歲王仲儀以侍讀學士出知益州逢原遺腹女是生呉說傳朋傳朋嘗通判永興以其母念逢原之墓乞改襄陽於是作養志堂焉余悲逢原無後併著于此䟦徐薦伯詩集世多謂書生不知兵謂書生不知兵猶言孫武不善屬文耳今觀武書十三篇盖與考工記榖梁子相上下吾友徐薦伯登武舉第一日示余横槊醉稿余讀巳喜薦伯慷慨有烈丈夫氣其詩詞視唐諸子矻矻弄篇章者多哉當今諸公如見薦伯詩亦可解文武二途之惑題杜大春畫梅偶與文叔時亨論十五國風次第取季札舊序參孔氏序特退秦於魏唐之後繋豳於末略經改定而意以獨至晚於燈下觀蜀客卿作梅筆墨無幾如在籬落因悟萬事無支離法題石時亨所蔵吕真人畫像他畫欲作塵外想類多輕楊今觀太清樓本儼若孔老予微笑曰得之矣真人固應如此彼不知其人而求其夀與他畫師何異題張之望文卷後劉知㡬史通上下數千載間掊撃略盡盖剨然似庖丁解牛手觸足履動中節㑹矣至不見全牛一節未識知㡬尚費若干年耶此事殆非強博䏻到賈生太息一書首論諸侯王強大事可謂知務當是時文帝方從代来齊樊諸王皆有相疑之勢未虚侯功最隆及賞最晚帝意亦略可見議者因謂賈生首編蓋干時云嗟夫生豈干時者耶要知論事誠有次第一舛其序必有不相察者孔子作春秋一字無間然者非獨用功深也易其心而後語權衡自平耳後之秉筆者宜書輒不書不宜書輒書是其咎安在如班孟堅史視司馬子長加精察而竟不䏻過徃徃有愧色亦豈力不足歟温公嘗言洛中士大夫淵藪談空說性多矣惟史事無所啓口蓋有譏云耳然公言性獨與楊子雲合自今觀楊孰與孟子子雲博極群書顧不見巳何哉程先生易傳未出門人亟以請先生曰吾獨不望進乎盖晚始授人其間有一字數改定者前哲重著書如此顔子不貳過論殆是慚筆今讀韓子書者於斯文特熟甚科舉之累自韓子不免冝夫人盡然於此可以興古道不行之嘆黄巖張君之望持所爲書二編越江山来問當然與否僕固辭張君固請㒒末學耳豈足断此書厚意不可虚辱輒題數語附名篇末非敢云何姑以見惓惓意耳䟦趙主簿所蔵詩後丞相清源梁公治閩之數月徙福清主簿趙君餘慶丞長溪主簿固辭丞相固遣之未㡬福清宰李君宗思来請主簿長溪宰李君遂夫又来請留主簿丞相益賢君也速致郡中属掌秋賦之入而趙君􅈤訴某老矣又位卑下不宜度越他士叅郡政其為辭殊苦確不樂丞相不䏻奪也明年君秩滿将罷去忽過余出其先君子所嘗得於諸公詩䟦見示亟讀之乃知趙君蓋家學如此其仕進無先人之心有繇来矣䟦東坡所記程公逸事學者多不道鬼神如蘆菔之冤豈不異哉自唐末諸藩以鎮将求盗武夫徃徃略平民充數㡬及賞格藝祖定天下哀矝無辜縣復置尉始以儒生為之而鎮将廢賞格如故民鮮死焉二百年於此矣迩者有司以薦舉吏多奸少不應功令輙見格惟尉以捕盗改秩善傳會其事得不用薦或者因是頗襲鎮将之舊上方閔焉議改制以防之此建安陳侯焞所為刻是石也䟦孫氏誌述方國家肇造之𥘉将相大臣多西北舊族而東南未有聞者既而天下平七八十載之間而范公起呉杜公起越歐陽公起廬陵孫公起富春盖漢一大郡之地而二三公者皆極一時之望於是東南人物遂擅天下嗚呼當錢李二氏之時諸公皆安在耶余覧杜公所言孫卿墓誌并歐范之述為之太息感今而懐古東南之士柰何妄自菲薄䟦爾雅䟽古者重小學爾雅所為作也漢興除秦之禁嘗置博士列於學官至今漢儒書行於世如毛氏詩訓許氏說文楊氏方言之類盖皆有所本云隋唐以来以科目取士此書不課於舉子由是浸廢韓退之以古文名世尚以注蟲魚為不切則知誦習者寡矣國𥘉諸儒獨追古依郭氏注為之䟽爾雅稍稍出比于熈豊三經行學者非宇說不學自先儒注䟽皆罷絀而爾雅益廢余憶為児時入鄉校有以爾雅問題者余用䏻辨䑕豹不識蟛蜞為對其事至淺諸老先生徃徃驚嘆以為愽也郡有刋䟽并音釋若干卷以乆不就字畫多殘闕金華趙君子良来為推官繕𥙷之始頗可讀趙徴余言囙叙此書之所以廢且見子良之志子良學於東菜吕伯恭氏於余為同年進士名善珎䟦史丞相祭諸葛夢叟文夢叟言貌退然不目表出聲蹟不著丞相乃獨得之何哉丞相門生故吏滿天下不聞有得此於丞相者夢叟顧一見得之又何哉丞相之取人也異於今夢叟之取於人也尢異於今矣不竟其逢令人隕涕書種徳堂因記陳仲孚問詩語近讀古樂府始知後作者皆有所本至李謫仙絶出衆作真詩豪也然古詞務恊律而尤未工仲孚嘗問詩工所從始余謂謝元暉杜子美云謝眺每篇堪諷詠盖嘗得法於此耳觧道澄江静如練令人却憶謝元暉與子羙同意因書種徳堂遂記此語䟦靈潤廟賜敕額桂陽之民雖貧而有常産父子孫兄弟多挨居或至百口重䘮祭有䘮哭泣過時必葬埋未有火化者逾乆展奉猶哭泣如新䘮祭事謹潔至不敢糞瓜菜尤恥為人隷飢年不得巳鬻子舍曰奴婢而以養子為約盖其俗朴近古然也然拙而惰農耕噐絶苦窳犂刅入土纔三四寸終歲置田勿問及春耨去陳草曾不待破塊輒下種水在田上節級溉注之是爲良田水在田下雖咫尺不䏻轆轤使之逆上徃徃夾江之田與並山同爲瘠薄易苦旱率十年八九耕不獲毎旱即立視苗槁而乞哀於神無問在不在祀典日撃羊豕聚群巫皷舞象龍或燃指以膏火薄肉供佛類不効則禱于龍渡山之神山在縣境内最著名其神邦人尊事之非巳甚不敢輒禱無不應今夏旱凢民之祠事且遍不雨於是属軍教授縣令謁祠下以靈潤源之水歸又兼旬不雨某遂宿戒親謁祠下三皷方作星河彌天行數里漸摵摵有聲鷄𥘉鳴至青蓮寺爲位望拜遲明登山俄時雨大至逹城下巳乃三日雨歲及下熟吏與民徳侯之賜推本所始得紹興十四年賜廟額敕黄一道於掌故仰惟國家爲民秩祀篤於報功冝詔萬世敬摹之石某為長吏不䏻履阡陌為方略教民治田而徒干神之澤又以窮自歸於當道連帥部使者咸以錢粟来周急可以免歲月矣要不可乆方将趣丞史以龍骨車若桔槔法下之鄉聚使民稍自力不但以瀆神益永尊事無怠故因對神之休與國家所以褒大之者并道其土俗善否為勸勵著之下方䟦宋景文公帖景文公以皇祐四年二月自亳徙成徳明年正月徙定武實代魏公所謂丐任河朔一年有餘盖是歲也元憲公亦以是歲八月自河南徙許而晏公来河南公有九月朔日請入覲書欲㑹元憲于河陽卄五日書所謂相國也至和元年劉冲之相劉自叅預即領唐書故催書於公嘉祐改元仁宗不豫其曰河朔大臣則韓公在相䑓爾八月徙益州是時龎荘敏自永興改河東其年五月元憲歸綴中書門下班公有此月二十三日書云云則猶在定武也三年王侍讀来成都於是還闕公言荘敏引歸不决元憲乃圖任之漸明年荘敏以築堡事寵節鉞元憲復筦樞務真見事之談云䟦宋元憲公表槀景祐二年定新樂是時同在詞掖如胥公偃丁公度張李晁石皆前進元憲公以元年四月掌制乃獨属筆豈非其文檀一時諸公所推遜歟欽誦遺稿令人起敬䟦趙延康公責偽楚書余嘗手抄建炎四年八月二日刑部状㑹㤙牽復士大夫名數延康公在焉一時状中如胡公寅劉公珏皆復用劉至位執政而延康竟謫死余聞京城之禍子昉以募義兵見囚范瓊世多言靖康無伏節之士有以宗室所暴白如此豈無人哉而皆誣䧟於群小嗚呼悲夫䟦趙延康詩余既於責偽楚書後著公行蔵復見所為詩嗟乎劉歆李白之文盛矣其節操何如詩不足為公道也䟦温公與邢和叔帖熈寧間温公居洛公從崇徳縣再入崇文元豊四年兼史事以所蔵温公帖知是時相與甚厚也後一百十有二年某得見之於其曾孫遵仲修䟦張無盡與邢和叔帖紹聖四年公為吏部侍郎十月自權尚書遷御史中丞無盡此帖皆是歲無盡罷左司郎官去至是適兩年餘矣䟦邢惇夫詩及諸公題以諸公之愛惇夫與惇夫之得此於諸公追想在昔令人起敬䟦邢氏慶國夫人手書余與天台謝傑景英為忘年交謝趙出也為余言外氏丞相家法甚悉今見邢氏趙夫人手書戒婦子一𥿄徃徃與景英語合邢尚書趙丞相事具國史至其故家典刑要自令人起敬䟦劉元城帖余讀元城諫䟽徧刺元祐大臣而獨不及司馬文正公徧刺元祐大臣而不以為訕獨不及司馬文正公而不以為黨豈惟諫議之賢哉亦足以想見元祐以前深厚之俗矣余懐此乆因與子厚得公遺墨遂書其後䟦胡文定公帖浙間人家家有春秋傳而罕見公字畫余記為児時従鄉先生學同學數十児児各授程易胡春秋范唐鑑一本是時三書所在未侵板徃徃多手抄誦也晚官湖湘間每過士大夫家輒見公遺帖皆甚貴惜然為春秋學者顧少如浙間何哉因見向氏所蔵帖書以勉之止齋先生文集卷之四十一
