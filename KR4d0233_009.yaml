front:
  text: 止齋先生文集卷之九
  hash: sha256:968cf9bce24ed9e24f5028302346f3a37e320e50d75bf3e52a2865204c4fbcfc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_009-1a}
body:
  text: 挽詩擬進御製孝宗皇帝挽詞五首九廟威靈逺逺一作重三宗徳業尊謳歌思藝祖暦數在神孫欲返皇圖正先推帝繫恩諸儒議東嚮此意定初元謂以隆興紀元但謹雞鳴問何知鶴髮侵石經方與學盟載更關心四海堯䘮畢三年舜慕深匆匆付神器長樂尚沾襟神機規禹迹鬼膽破胡児大號初㱕我成功少待時鞬櫜懐不滿簟食問何遲河洛空遺恨年年上玉巵好學元無斁忘疲晩有加眀謨宗六藝妙用合三家照映天經緯流傳士齒牙奎文尊閣䖏更合榜重華群才何輻輳聖度似天寛清蹕留儒舘黄金散将壇風雲一語合日月萬人㸔攀附今無路哀摧壮士肝孝宗皇帝挽詞五首藝祖開皇極何心卑後昆天将翊堯運世復見湯孫武接規模在仁追典則存煌煌宋宗社永永配乾坤深衷何自見寛詔不勝書當宁延方岳􅑮人問里閭歲爲周委積家𬒳漢蠲除巷哭彌天逺長江淚不如豈以崇髙極䏻忘凛凛憂衣更三澣舊費爲十金休熊舘無秋獵期門絶夜逰恭惟懐顯徳真可締孫謀正觀真英主三王合庶㡬此時生後聖端欲踵前徽濟世功何異除兇志偶違辛勤三十載十漸更無譏不作脩齡夢天乎詎可諶白雲新厭世黄屋舊非心徳業成千古閭閻寝八音烏號在何許霜重越山岑挽吴明可給事諸老俱淪落流風日轉移獨懐憂國意長説渡江時姓字誰如此功名早不疑却收湖海氣燕坐雪垂頥憶上諸生謁公方薄恙侵欣然蒙絮㡌恨不醉花隂自說㸔人熟相期晚歲深半天蒼嶺雪囬首為沾襟謁公之夕宿蒼嶺下天大雪明日嶺上深數尺挽木奉議藴之詹事尊人寵數頻年及俞音萬口傳豐碑来少海大軸落台躔教子冝如此聞風亦凛然送車今塞道拱木㸔參天東官為寫榮慶二字史丞相以詩賀之盛事無虗得玄襟可自知徧觀同軰行誰似暮年時衮冕趍椒殿簫韶送玉巵又冝天一笑獨此有遺悲悼蔣昇仲承事扁舟来徃適吾真却笑旁觀道隱淪三釡豈無児可就百年要與酒相親賸㘽梅竹皆縁客晚得冠裳不語人試向南塘問漁牧定於此老亦沾巾挽族叔父松竹深圍屋蓮賸種魚所愁賔客少不問稲梁餘盡日相語盈門手自書吾兒有名字萬事聴何如我懐終古恨不及奉觴時滿眼㸔諸弟何心賦此詩牛羊来蟄蟄丘墓去纍纍亦有千鍾飬曽無一字碑蕃叟自為尊人埋銘題丁少詹姑墓誌後白髪從夫志青芻為客謀送車今㡬兩樂土有斯丘㱕葬于父儻猶子聲名甚他時雨露秋摩挲㸔石刻嗟惜到松楸挽樓朝奉裘馬朋簮盛緋魚筦庫卑行蔵公論在然否寸心知歲晏曽三接民功僅一麾空餘華衮字有恨盖棺時史少傅銘其墓九寺方連茹專城又夾河晚㸔諸子好孰與一門多薄海皆驚嘆亨衢忽薦瘥大連同厚夜其柰少連何挽包顒叟樵牧常爭席篇觴早䇿功有懐随事見不耻與人同我故竒諸子年来識此翁待㸔稽古力喬木已悲風翁子㸔時軰平生不妄賢獨於公有誄惟恐世無傳他日須深刻吾詩可附聯草黄松栢秃名與石巋然翁誠之作行状挽張子由毋又是君王上玉巵未央雨露湛垂垂版輿此去還無恙芝檢重来更不疑四世團欒䏻有㡬百年澌盡亦堪悲里中諸毋今誰在聴説承平祐聖時挽潘才叔母剥啄唯深夜門前杙小船有児能自致此毋已堪傳竹院前聞熟桓楹大字懸病懐嗟不及徤筆附諸賢才叔所居有竹院挽周宣義魯山司法尊人無酒澆陳草将詩刻隧碑遺名從此在真意竟誰知教子還餘事周人亦有時憶甞從夜話欲去更遲遲挽婺女何茂宏勸駕甞連蕚應門忽二毛竟於時不偶吾更晚相遭宿草堪揮淚豐碑忍泚毫送車今㡬兩誰最戀綈𫀆挽薛季益尚書徧試江淮聲籍籍乆勞荆蜀鬢蒼蒼同時半已登槐棘卒歲纔䏻足稻梁遺藁不爲他日計佳城尚及此丘蔵豈無後作多文勝令我懐人淚欲滂州里誰如此逹尊戸庭深靜最情敦不将尺牘通當路却枉扁舟訪杜門毎見色温如有属欲書心愧不能言從今若祭枌榆社好配横塘兩獻樽公與許忠簡公居同鄉挽彭通直子復監丞尊人前軰如同郡流風僅㡬人不令児巧䆠所尚世清貧及老猶書卷通班但幅巾吾銘雖未就鄉譽勝堅珉挽沈次卿學正洛學傳當代家聲屬此翁一生無世味萬事與人同恨不師前鄭欣甞客阿戎冝銘千古意豈在語言工挽林承信道夫教授尊人重交寜問田安在急義固扵官不知膴仕幸多花蕚好幽棲冝與竹林期床頭周易吾将老案上楞嚴晚得師此意自應天予後嶧陽未琢長孫枝悼林仲逸縣尉家故書千卷生纔試一斑賞音殊不少筮仕獨何艱松菊将身隱蘋蘩忽涕澘幸哉賢玉潤有誄不容刪挽張材卿知郡大猷端明之子春卿尚書之弟貂蟬不逮老端眀世濟誰如好弟兄能着青衫偕計吏却将白髪去邊城夜魂俄斷凝香寝秋淚仍兼曵履聲萬石君家同一傳嗣書應更有公卿挽新昌吕脩職頃作庵廬客㸔公手種蒔溪毛無亂理宰木有連枝久欲鑱他石今還賦此詩黯然懐宿昔絮酒定何時不道千山阻将遺百世名有児䏻自致此老巳堪銘祿豈無三釡賢誰似一經吾詞雖未就應有護幽扄挽尤延之尚書自為師説竟誰宗毎事持平屬此翁有志政須名節是斯文非獨語言工要令舉世人材出合在前朝行軰中安得長年留把柁後来各與一㠶風宿留江湖長子孫行蔵節節耐人㸔及為侍從身垂老欲試平生事轉難書就僅題前太史功成方記舊甘盤令人長恨經綸意歴事三朝見一斑向来諸老獨巋然羸不勝衣萬事便燈下細書批勑字雪邊先着趂朝鞭豈應無故令身健却止功名與世傳遺奏定留封禪藁憑誰吹送九重天壮嵗從㳺兩鬢霜重来凾丈各堪傷那知卒業今無及極悔論心昨未甞相約㱕期湏次第獨存病骨更凄凉他年頼有門生記託在碑隂永不忘挽沈虞卿侍郎官重元非好思閒樂有餘生児早傳業課女夜抄書時事方關念㱕懐不遂𥘉經綸縁未了天意盍留渠嗜古真成癖摩挲笑眼開㫁編遺汲冡名篆出秦臺緣應盡雲山喚不囬凄凉子雲宅問字有誰来挽東陽郭徳誼簮紱何能貴聲名幸自脩凡今為我友㡬半與君遊翰墨千年托松梧一夜秋令人懐昔日烱烱夢丹丘悼楊休甫䄂手旁觀一世餘元非親物亦非踈酒邊毎事如人意燈下通宵讀我書學到荘騷纔止此生􅑮周漢定何如西州相識無遺恨獨恨無從摻子祛挽宋巖老叅議居然是是亦非非錯䖏稠中定不疑萬事過人旁袖手一生從衆自觀頥肯為壮縣雖甞試略見周行巳逆知盡日杜門佳客至小槽親校酒醇漓少小修蔵近市朝亦非着意混漁樵不為禦㓂猶爭席好說淵明更折腰一飯重違凢子約千金終却故人招送車㡬兩交相唁我獨難忘最乆要悼劉謙之知錄海内多吾友飄零今㡬人相忘尤墮淚欲誄輙傷神余欲作景元同父祭文皆不勝悲輙止謙之亦然才力矜餘地心期耻後塵溘然無一語愁殺白頭親挽王興之提刑四海王詹事傳家有象賢宦情塵滓外風誼典刑邊遺愛依前鄭羣居得少連生平纔樂此一夣涕澘然悼濟陽夫人久接江山境曽論子姓文於焉觀内則可以繼前聞榛栗嚴賓豆蘋蘩㓗祀芬有人言不朽片石合磨雲挽張春卿尚書懐抱今遺直身名古象賢路車陳左塾笙磬在東懸再世星辰上三年雨露邊﨑嶇空老去有識共澘然論建回天力生平與衆同居常焚諌草人自避乗􅍡朝譽多張仲家聲近魯公挽辭吾不愧收入汗青中悼翁仲立逹州憶昔㸔封事令人激懦衷邊籌皆破的硬語更盤空晚亦通家好居然與衆同行蔵甞論定誰假一㠶風淮幙何多譽巴城僅一麾最書膚使上好語近臣知篳路江山一作烟雲久維舟日月遲空懐歸報牘不逮勞還時挽劉端木司户十年共語昨来非長憶𥘉年握手時身世自憐心烱烱功名猶恐論卑卑民彛亘古非蕪沒學者如公好器資緩轡徐行􅑮九軌可堪倐忽九原悲挽林致賢提舉一經韋氏學五桂竇儀家毎耻郷評過深懲履道華人方貴全壁事已墮空花褒衮来黄閣千年置齒牙挽劉茂實和州欲課民庸元道州欲評人品馬少㳺居無一事可切齒薦有三公方掉頭送公歴陽令我愁目㫁賓鴈書沈浮識與不識涕淚流人世安用湏封侯郷士大夫書説自眀果然嗚呼悲夫自明為太學諸生數與余㳺乾道壬辰同試進士自明不第於是始别别三四年間自明以釋褐仕于朝而余之再至在所也則自明寖貴絶出其輩行間相過語至其歡狎悲壮與在學校時無異也余丞郡長樂㑹自明家居待台州闕更數徃来甞造其所舎僧寺室中蕭然箯輿一乗老床凳數隻凡若干口日須婦翁米以為食而自明意象與在舘閣時亦無異余毎語人自明来日甚長也而今死矣自明言行焯焯在人耳目不但余能言之也余獨悲自明以喜事嫉邪取名於世而死最不幸好議論者曰是冝不良死也余觀自明立朝於進對苟得之閭里厮役當諱而不以言上者具以情奏滿朝為危而自明雖即死不悔真若不愛其死者然其事毋孝左右不敢違晚得師友務為靖恭閒雅不苟坐立雖一飲茹亦必揣度無害乃下口余甞羔菌以進自明驚謂曰是可食耶徃聞有食此死者至今不近也自明可謂重其死矣士患無志有志矣患不見知於上知而少不合輙不持重以究其用亦士之罪也方自明以母老請外去非上意天下皆以旦夕且復用自明又甚自愛而及於此何哉是不謂之天耶故余爲斯文也他不暇論扵其死亟致意焉以見余悲且以觧議者之惑亦自明之志歟自明長樂人姓鄭氏名鑑詞曰母曰余児兮吾莫知其何尤婦曰良人兮吾曷爲罹此憂兄弟不以是咎兮朋友稱其好脩恭不得其故兮庸强名之曰命相彼下堂而貽戚兮或結纓以順聴萬不同咸自取兮曽二者孰失其正聲鬼神之所仇兮人直躳焉是病胥屬鏤忽墮其前兮屈魚腹以爲穽竒禍作於牗下弓顧奚悲而冝慶嗟子何傷兮獨余懐不䏻以自勝尚或相爾藐孤兮天終焉其有定止齋先生文集卷之九
