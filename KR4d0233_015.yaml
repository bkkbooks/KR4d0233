body:
  text: 外制自紹熙五年八月以後皇后𥘉册封贈三代曽祖資政殿學士贈少師韓小胄贈太師敕慶曆嘉祐之盛萬世帝王基業也而弼亮之功惟爾先正燕及奕葉嗣有象賢冝爾子孫與國無極具官某踐修厥猷益有令聞夷險一節見於艱難髙宗圖舊晉諸樞管而再入穹廬將命不辱奠安宗社天下賴之然位不稱德有識同嘆爰有曽孫來儷宸極朕嘗以國史次韓之事諗諸中宫以似以續爰因追錫晉陟師垣非以為生蓋禮之稱可曽祖母秦國夫人王氏贈魯國夫人魯國夫人文氏贈國夫人敕維昔忠獻身修家齊𬒳于後昆將相三葉克對前人皆有內助具位某氏夙以淑德嬪于相門輔佐君子繼世承弼永惟鵲巢國君積行纍功夫人起家與享休顯而召南推夲以為德足以配非偶然也是冝儲休載生賢后以綿國祚以大家聲𬒳封于秦亦既從爵申錫于魯蓋取諸頌使與僖公令母千載相望豈不榮哉可祖承議郎贈中奉大夫韓荔贈太傳敕朕聞燕齊之祀與周並傳漢之封君爰及苗裔矧惟韓氏之勳度越自昔於是僅三世耳而胡浸微天命弗僣其殆再昌乎具官某於魏國為裔孫于少師子也學足以克家而宦不逹才足以用世而懷不得試即其靖退足見所存集善為祥積於閨閫載篤其慶后所自生夫屈於名者享其實不獲乎其身者遺其後晉班公傳誰曰不冝雖曰緣恩亦足用勸可祖母令人馮氏贈國夫人敕周人之頌任姒曰是有摯仲氏也是有莘長女也蓋本其所自出必名邦大族而豈無故之福母儀天下乎具位某氏身為少師婦以奉魏祀於是浸微而不病其夫子之不遇敬共朝夕世守弗違餘慶流光萃于今后詩不云乎君子萬年景命有僕其僕維何釐爾女士言周之盛天命附著使生淑媛以為之妃則我式克至于今休蓋祖烈也亦天意也新封美號為之報本豈惟忠獻將吾祖宗實寵嘉之可父朝奉大夫提舉佑神觀韓同卿授楊州觀察使敕詩人之誦賢后必曰是有摯仲氏也是有莘長子也蓋本所自來必君侯世家儲休積慶而豈一日之積哉具官某魏忠獻公之裔孫也踐修厥猷益自謹飾嘗試以事茂於材猷是生淑媛來配潛邸肆朕嗣服正名長秋在詩之既醉曰君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子言有士行之女以為之配皆天意也維爾先正功在社稷德在蒼生以克及此豈非天乎戚里故事必在右選爰解郡紱改卑廉車冝益靖共以綏寵祿可母氏贈國夫人敕朕誦周南至於葛覃后妃躬儉節用服浣濯之衣皆其母家實為之未嘗不欣慕也具位某氏吾后母也以吾后作配朱邸共蘋蘩之𦵔正位中宫獻穜稑之種親事煩辱曽無吝驕則其素教豈一日之積哉夫區區侯邦而渭陽之思閟宫之頌必及其母况以后德流化天下則推尊母氏可無茂恩且與之共隱約于雞鳴櫛盥之時而不與之共休顯於象服委蛇之際揆之經誼夲之人情皆非稱也胙以上國為君夫人非徒示私亦足用勸可少保觀文殿大學士充醴泉觀使益國公周必大登極恩贈三代曽祖故朝奉郎贈太師潭國公衍加封秦國公敕朕嗣守丕圖永懷元老而訪落不與於廟謀也嘗告在廷晉爵亞傳則所以推夲世系以宏賁其先正之祧庸可後乎具官某曽祖某躬行對于古人宦學聞於當世位不稱德士論惜之夫屈於名者享其實不獲其身者遺其後是冝燕及曽孫蔚為名臣遍儀三事光輔兩朝也則追録其積行之勤增華其種德之報大啓土宇晉封三秦非以為生蓋禮之稱可曽祖母潭國夫人郭氏贈秦國夫人敕周之公孤並祀五廟以君夫人祔焉而世世享具官某曽祖母某氏來自名門作配君子躬備勤勞以詔婦子而生無從爵之榮殁不得與共牢之報天命弗僣是生曽孫為吾輔臣弼亮奕世朕循周制寵綏爾夫誰其助之劬躬壽後爰因舊號俾即新封用賁幽宅尚克永世可祖故朝散大夫贈太師潭國公詵封秦國公敕成王之雅曰周王夀考遐不作人蓋歸美文王得人所由來之逺也具官某故祖具官某世濟其美蔚為名臣然而德業藏於身聲聞流於時官不過五品而位止郎舍也唯是一經之教施于曽孫我髙宗取之夀皇用之天下乂安於是三紀肆朕嗣服獲蒙餘休非所由來者逺歟酬勞報本兹惟其時襲封于秦實應經誼可祖母敕朕純用周政廣恩錫類以褒大吾輔臣之世則燕及閨門可無追命具官某故祖母某氏儀于前人益謹內則載篤其慶萃于聞孫方周盛時公侯皆君子也而風人本之袵席以是為德在鵲巢功在采繁也我儀爾祖克大其後用見家政庶幾召南從爵大邦以勸命婦可父敕周公拜前魯公拜後父子休顯著於春秋胡我元臣遺恨禰廟此憫章之所由起歟具官某故父某襲美于家學振聲于世科而雅不善宦老于博士功業不見於世而文辭但以詔後人也然而過庭之訓插架之書淵渟駿發見於賢子經文緯武天下賴之詩不云乎維其有之是以似之儻微申錫非所以為義方勸也爰考古誼襲爵為公庶幾周魯衮舄相望不亦榮乎可毋敕朕既本之經誼為公卿崇報禰廟以侈移忠之報則母氏與享使之匹休亦古道也具官某故母具位某氏恩斯勤斯鞠我良弼譽在薦紳功在清廟夫嘗同其夫處約於燈火之𥘉而不及同其子處樂於簮𥚑之後此吾大臣為之輔南陔廢蓼莪也象眠之弗𬒳魚軒之弗乘有此寵綏足慰居往配食二姑以奉祀其明享哉因其舊號益以新封雖曰邦彛亦足用勸可觀文殿學士宣奉大夫致仕李彥頴登極恩轉光祿大夫敕朕以眇躬嗣膺丕緒闕焉懼無以紹列聖之休訪落求助庶幾周成公卿大夫其將何以佐朕也具官某歷事三朝蔚為元老夫致位丞弼方倚為相而不為苟同竟於謝事昔蕭望之意輕丞相而位不過御史大夫以為身計則不工以為道誼計多見其可尚也肆豫紹服久矣里居以卿忠諒則敬之之頌七月公劉之風雅能忘於心乎爰因舊章序進厥秩亦示永懷以兾樂告可資政殿大學士通奉大夫知潭州王藺登極恩轉正議大夫敕朕以眇躬嗣膺丕緒闕焉懼無以紹列聖之休訪落求助庶幾周成公卿大夫其將何以佐朕也具官某歷事兩朝孤立一意方其受重華之託而光輔上皇始𥘉之政忠言讜論不自同於衆人蓋天下嘆其難長慮郤顧不苟安於一時又天下服其逺也肆於紹休適分帥閫以卿忠諒則敬之之頌七月公劉之風雅能忘於心乎爰因舊章序進厥秩式昭永懷亦兾樂告可資政殿大學士通議大夫提舉臨安府洞霄宫黃洽登極恩轉通奉大夫敕朕以眇躬嗣􅈾丕緒闕焉懼無以紹列聖之休訪落求助庶幾周成公卿大夫其將何以佐朕也具官某歷事兩朝蔚為故老方淳熙之季年天下晏然櫜弓槖矢簡在宥府不動聲氣而強本折衝之功自不可掩至於行藏庶幾前朝孫文懿張退傳之倫矣肆豫紹服佚外祠以卿忠諒則敬之之頌七月公劉之風雅能忘於心乎爰因舊章序進厥秩亦示永懷以兾樂告可朝散郎煥章閣待制兼侍講朱熹登極恩轉朝請郎敕朕以眇躬嗣膺丕緒闕焉懼無以紹列聖之休訪落求助庶幾周成子大夫其將何以佐朕也具官某學先聖之道而明於當世之務三仕三已義不苟合天下髙之蓋纍朝之所嘉嘆而不忘也長沙謀帥強為時起肆豫𥘉政式遄其歸處之次對於以勸講朕將虗己聽焉爰因大賚敘進厥秩雖曰舊章亦朕美意可權户部侍郎梁登極恩轉官敕朕以眇躬嗣膺丕緒闕焉懼無以紹列聖之休訪落求助庶幾周成卿大夫其將何以佐朕也具官某方以民譽簡在從班肆豫𥘉政日月獻納而不記成王踐祚七月在風公劉在雅敬之在頌皆一時耆俊為之乎自今以始朕日望之爰因大賚序進厥秩雖曰舊章亦兾樂告可在外侍從登極恩贈父敕朕方訪落求助自公卿大夫各加地進律矣則推本其世而褒大其家雖禮未有可不以義起乎具官某故父具官某主有種德之勞而位不稱殁享義方之報而何其流之長也以爾某論思獻納著節兩朝肆豫嗣服心在王室非忠孝之傳有自來歟增賁禰廟追錫崇階雖曰舊章亦以示勸可在外侍從登極恩贈母敕朕既本之經誼為卿大夫崇建禰廟以侈移忠之報則母氏與享以次申錫使之匹休亦古道也具官某母某氏來自名門作配君子是生賢嗣蔚為從臣夫雞鳴警戒之道不篤則過庭之訓不嚴蘋藻不共則甘旨不謹爾某何以能移孝為忠也因其舊號易以新封雖曰邦彛亦足用勸可在外宰執登極恩贈妻敕昔成王踐祚世修忠厚其詩曰孝子不匱永錫爾類其類維何室家之壺蓋施及臣子不但其身而亦𬒳于室家具官某妻某氏克相夫子蔚為宗工積行纍勞致位孤棘惟周人克廣孝思慰滿梱內肆豫嗣服繄爾臣鄰多助之至則為之推恩燕及閨門雖祔于姑亦胙大國非苟為私蓋周道也可在外侍從登極恩封妻敕朕觀二南之詩關雎為皇后鵲巢采蘋為君大夫妻作也則正家之化君臣一體然則力定長秋之位而可無以為爾內勸乎具官某妻某氏以爾夫子嘗為從臣獻納論思夙夜匪懈則入朝有雞鳴之戒退食有羔羊之德非爾之助申錫命書晉之美號則在𥘉政豈曰不宜可煥章閣學士宣奉大夫提舉隆興府玉隆萬夀宫洪邁弟朝散大夫新知陜州邃登極恩毋楚國夫人沈氏加贈魏國夫人敕朕訪落求助自卿大夫皆加地進律矣士有能尊禰廟至官一品斯足以報本矣而毋氏與享為君夫人猶視列國冝益褒崇使之匹美具官某毋具位某氏聿自名門作配君子遭時不淑萬里違離而勉正勸義庶幾風人所誦汝水之墳南山之側也天命弗僣冝享後福肆豫踐祚益大爾封晉之魏邦庸示光寵庶克用勸豈徒舊章可右丞相趙汝愚𥘉拜贈三代并妻七月丙子拜曽祖贈太傅敕昔周公位冢宰成王為之作魯廟宣王中興則命召虎亦有秬鬯圭瓉以告文人我相同姓蓋周道也推本其先以致美報可無褒典以應經誼具官某曽祖具官某躬行對于古人譽處聞於公族然夷考其世於漢恭憲王為裔孫於建國公為嗣子蓋屬未疏也而僅綴逍遙之班以其靖退足見所存夫屈於名者申于實不獲乎其身者遺其後是主曽孫迄為上相則追録其積行之勤增華其種德之報朕敢忘周道乎晉升帝傳於禮固冝可曽祖母氏贈申國夫人敕昔周盛時公侯皆君子也而周召二南本之袵席以是為內助之賢德在鵲巢功在采繁也具官某曽祖母具位某氏出於名門作配公姓身為建國婦以奉漢祀於是浸微而不病其夫子之不遇世無風人無所著見爰及曽孫篤生賢哲然則取漢上之詩以名其國為人俾世世享亦二南之意歟可祖贈太傳敕朕既質之六藝酬勞報本以褒吾相臣之祧則嗣有令德燕于後昆申命匹休庶幾周召並建五廟不亦冝乎具官某祖具官某以王公之胄而有學士大夫之習非無冨貴之階而宦不逹也集善為祥聿生孝子載篤其慶發於聞孫詩不云乎蓻之榛栗椅桐梓􅃮爰伐琴瑟忠孝之門豈一日之積哉我儀圖之冝爵公傅爰錫命書以賁幽壤可祖母朝氏贈國夫人敕詩人之頌婦德必本其家世曰是齊侯之子東宫之妹也是汾王之甥蹶父之子也具官某祖母具位朝氏蓋濟陽之朝也濟北諸朝族望甚偉以其父兄子弟風流儒雅名滿天下則爾以閨門之秀來嬪吉人克教其子得名篤行至於奕葉遂間兩社揆之風雅無愧在昔大邦美號饗此後福非以為生蓋德之稱可父贈溫國公敕朕聞之周以魯孝公訓國而漢亦謂劉德謹重使為太常以率宗室赫然著于史傳豈非以帝繫之餘世祿之及而篤行者難其人乎具官某父具官某踐修厥猷益自力學𬒳服造次必於仁義而事親之孝庶幾曽閔縉紳先生為之起敬卒於小官法不應諡而相與志其墓曰宋篤行君子也尚論周漢豈非其倫肆其嗣子致位三事朕於是稽經據古尊為禰廟作邑於溫以寵嘉之積善之報足以不朽可母李氏贈夫人敕以髙帝子孫而再世婚姻不於勳侯貴戚而於書生是冝有子蔚為名儒度越故事以宗人相具官某母具位李氏又故丞相文正公七世孫也代有家法及爾不違克相其夫力行孝友聚族百口曽無間言躬自勞苦以成永圖一簮一珥先人後已是冝發祥萃于吾相夫能使其夫稱於沒世而御不及百兩能使其子冠于多士而養不及萬鍾追錫愍章晉封大國我有異𢾗非爾曷堪可妻氏贈衛國夫人敕朕誦二南之詩勸以義示以正皆室家也我有近臣致位丞弼顧其內助晚不同休可無愍章以賁泉壤具官某妻具位某氏雖嬪王族實寒畯也朝李二姑簮琚之望奕世載德誰其嗣之而爾承休襲美無愧在昔克相夫子遂為名臣夫與之處約於雞鳴櫛盥之𥘉而不處樂于象服委蛇之後儻微追錫得無若汝水之墳南山之側遭世不淑詠歌者乎鄱陽小邦未足言稱晉封于衛庶幾碩人以配二姑永永廟食可翰林學士承旨李巘除寶文閣學士知婺州改知太平州八月三日除承旨即丐外敕夫厭直玉堂之廬而紆郡紱士之操也閔勞豹尾之班而便私計上之恩也具位某早以英華簡在烈祖晚益藴藉眷于上皇遭逢兩朝自守一節蓋髙文大册天下傳誦而微辭幾諫世莫得聞也肆朕纂緒入惟求舊胡然勇退曵鈴其空朕亦惟自古詞臣一視中外子羽修令兼為行人相如視草嘗使于蜀朕獨可以弄翰墨苛留久處卿乎峻延閣之班均便藩之佚不以寶婺而以當塗去繁就簡兾爾整暇夫下無懷寵之心而上有從欲之意君臣俱美不其韙歟可正奉大夫吏部尚書兼侍讀莆田縣開國男食邑二百户鄭僑明堂加恩進封開國子加食邑二百户敕朕新嗣服將有事於合宫也逺惟孝武始建漢家之封而太史談留滯周南不與從事議者惜之朕敢忘儒先乎具官某經明行修士所髙仰不但擢科為天下第一也越從留鑰晉長天官上皇意也至朕而決逮及盛典式遄其歸蓋視漢有光焉增衍封畬第循故事方資告猷嗣有顯擢可朝請郎試禮部尚書兼侍讀黃裳封普成縣開國男食邑三百户敕朕新嗣服日有事于合宫兢兢焉懼不間於禮而無以接三才之奧也明乎郊禘之義治國其如示諸掌乎顧朕曽何以得之具官某吾舊學也切磋經誼及于春秋郊禘之際嚴矣有一不敬至於四卜至于改牲仲尼正色書之以詔萬世朕所深致戒焉肆豫𥘉禋克輯盛典本所自來簡在三益徹之上田第循故事可與治國非卿誰哉可中奉大夫試工部尚書趙彥逾封祥符縣開國男食邑三百户敕朕新嗣服日有事于合宫兢兢焉懼不間于禮而無以接三才之奧也詩不云乎相維辟公天子穆穆朕嘉賴焉具官某吾宗英也使于四方拔葵之操雖天下能誦之比冠從班賢勞忠瘁太節不奪則世未之聞也肆相豫祀克有上儀徹之士田第循故事方圖爾功永稱殊渥可中奉大夫權刑部尚書兼侍講南昌縣開國子食邑五百户京鏜封開國伯加食邑二百户敕朕新嗣服日有事於合宮兢兢焉懼不間于禮而無以接三才之奧也詩不云乎相維辟公天子穆穆朕嘉賴焉具官某以海內之英有言有績而執禮行于蠻貊遺愛𬒳于江漢往往薦紳能言之曵履從班義形于色賢勞忠瘁世莫得聞也肆相子祀克輯上儀增衍封膄第循故事方圖爾功嗣有顯擢可朝議大夫試御史中丞謝深甫封臨海縣開國男食邑三百户敕朕新嗣服日有事于合宫兢兢焉懼不間于禮而無以接三才之奧也詩不云乎相維辟公天子穆穆朕嘉賴焉具官某以海內之英有言有績輦下彈壓不怒而威而回天之力見于瑣闥乃若論思義形于色賢勞忠瘁世莫得聞也肆相豫祀克輯上儀徹之土田第循故事方圖爾功嗣有顯擢可朝散郎試尚書吏部侍郎兼侍講彭龜年封清江縣開國男食邑三百户敕朕新嗣服日有事于合宫兢兢焉懼不間于禮而無以接三才之奧也傳不云乎誦詩三百不足以一獻非深知其義者將誰與講明之具官某吾舊學也切磋經誼及詩一編蓋自二南至我將之頌凡交神明之道反覆言之肆豫𥘉禋克輯盛典非有感于此歟胙之食采雖循舊章無言不酬于是焉在可中順大夫守給事中兼直學士院兼實録院同修撰樓鑰封奉化縣開國男食邑三百户敕朕新嗣服日有事于合宫兢兢焉懼不間于禮而無以接三才之奧也詩不云乎相維辟公天子穆穆朕嘉賴焉具官某以海內之英綽有譽處蓋嘗久勞螭蚴矣遂陟掖垣遂躋瑣闥不愠不喜天下誦之若夫囊封牘奏備極剴切于爾取具世莫得聞也肆相豫祀克輯上儀徹之土田第循故事方圖爾功嗣有殊渥可朝奉大夫試中書舍人林大中封永康縣開國男食邑三百户敕朕新嗣服將有事于合宫也逺惟孝武始建漢家之封而大史談留滯周南不與從事議者惜之朕敢忘前御史乎具官某以海內之英譽處甚美嘗盡忠瘁侃然一臺之上矣越自外服晉陟詞垣式遄其歸遂相豫祀蓋視漢有光焉胙之食采第循舊章其益論思以稱簡擢可朝議大夫試右諫議大夫張叔椿封永嘉縣開國男食邑三百户敕朕新嗣服日有事于合宮兢兢焉懼不間于禮而無以接三才之奧也詩不云乎相維辟公天子穆穆朕嘉賴焉具官某以海內之英綽有譽處方平居時恂恂唯謹而侃然正色一臺之上言人所難肆豫𥘉政爰二冢宰爰長諌垣僉曰汝諧也實相豫祀克輯上儀徹之土田第循故事方圖爾功嗣有寵𢾗可朝奉大夫權尚書吏部侍郎孫􅑮吉封廬陵縣開國男食邑三百户朝奉大夫權尚書工部侍郎兼侍講黃艾封莆田縣開國男食邑三百户敕朕新嗣服日有事于合官兢兢焉懼不間于禮而無以接三才之奧也明乎郊禘之義治國其如示諸掌乎顧朕曽何以得之具官某吾舊學也蓋嘗與習禮矣每至于掃地而祭至敬無文凡盡內心之道反履言之肆豫𥘉禋克輯盛典非有感于此歟胙之食采雖循故彛無言不酬于是焉􅏅可太中大夫權尚書户部侍郎兼修玉牒官建安縣開國男食邑三百户袁説友進封開國子加食邑二百戶敕朕新嗣服日有事于合宫兢兢焉懼不間于禮而無以接三才之奧也詩不云乎相維辟公天子穆穆朕嘉賴焉具官某以軼群之才有言有績輦下彈壓外户不閉民曺之令郡國晏然乃若論思義形于色賢勞忠瘁世莫得聞也肆相豫祀克輯上義增衍封腴第循故事方圖爾功嗣有顯擢可中大夫權尚書户部侍郎西安縣開國男食邑三百戶梁進封開國子加食邑二百户敕朕新嗣服日有事于合宫逺惟孝武始建漢家之封而太史談以留滯周南不得從行為恨朕敢忘從臣乎具官某積有民譽晉二地官蓋方盡瘁于朝矣䘖命比庭越在萬里之外肆豫肇禋獨不侍祠朕是以于漢事有感也增大食采庸示永懷曷月遄歸將有申錫可朝請大夫權尚書禮部侍郎許及之封永嘉縣開國男食邑三百户敕朕新嗣服日有事于合宫兢兢焉懼不間於禮而無以接三才之奧宗伯掌禮朕之所嘉賴也具官某以海內之英綽有譽處方二春官以禮紹豫自省牲視滌凡玉幣爵之事至於告時至于告備治及竣事禮無違者胙之食采蓋循舊章方酬爾勞嗣有寵數可朝散郎煥章閣待制侍講朱熹封婺源縣開國男食邑三百户敕朕新嗣服將有事于合宫兢兢焉懼無以接三才之奧也爰求儒先來相豫祀具官某經明行修士所髙仰而越在藩服朕敢忘之乎昔者孝文受釐宣室召見賈誼而武帝建封顧使太史談晉滯周南不與從事二帝優劣于是乎見此朕所以式遄爾歸也徹之土田雖循故事籲俊尊帝蓋庶幾焉可止齋先生文集卷之十五
