front:
  text: 止齋先生文集卷之八
  hash: sha256:7735b14356c91d9fe5da82e67f9c9dafdddb9bc427b78d255149f6251edf876f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_008-1a}
body:
  text: 律詩村居二首業己􅀅身落耦耕時扵觀物悟浮生擇栖未定鳥離立避礙已通魚並行野老窺窠占太􅀊牧児敲角報殘更絶勝􅀝市㸔郵置客至還無菜甲􅃵野衣農圃雜華髪弟兄同佚老便居僻貪閑喜命窮習成杯酌少脫落語言工危坐㸔流景新萌又落紅和宗易作屋之什欲因舊築倍勞形昔在先生配二程梅樹護持供北顧萱堂潤色作東榮但堪樽爼来三益何必籓墻屏五兵若徙荼䕷分乞我亦令児軰記家聲送縉雲葉正􅀄兼簡杜伯髙我固閱人非草草君扵前軰亦拳拳􅀴師未數郯夫子筆力方窺李謫仙􅀁恨尚於􅀵第晚􅀅詩空與背時傳頻年不信燈花報報得人来亦可憐和宗易賦素馨茉莉白蓮韻軒牕一日粲三英盡室無塵眼倍明閩粤固甞矜絶美風騷猶未及知名羞􅀅姿媚随花譜愛伴􅀌髙上月評獨恨遇寒成弱植色香殊不讓梅兄沈仲一送菊自言封殖之勞欲得詩為報為賦三絶東籬何在菊年年菊視陶詩竟孰賢未必緣詩花更好花􅀅詩與萬人傳霜螯風味小槽春新様宮衣試麯塵見周禮麯衣注一段秋光誰領此芙蓉凡子桂陳人愁乾手自搭連筒苦雨丁丁杙小蓬乞得花開急催客明朝恐已着霜紅仲一以詩采用韻奉荅陪侍􅀴幃渉􅀊年亦甞尚論鞠衣賢如今三嗅馨香泣惟恐􅀅詩去浪傳嗚咽苔移玉座春昔年曾扈屬車塵重陽不見黄封酒只見餐英獨醒人剰有新詩入逓筒豈無䏻畫作掀篷金錢翠盖相輝映着我皤然酒借紅􅀉題薛象先新樓矮簷風雨送蝸牛有客来誇百尺樓闔郡臺池皆下瞰背城湖海亦全􅀵清時未放徒髙臥半世何為故倦遊觧盡橐金君計决月眀長笛起漁舟立春千官勒馬謝幡勝萬􅀦鞭牛占雨晴誰㨿槁梧相近午頰車徐轉鼻無聲除夜用前韻春来十日垂垂雨􅀊盡今朝亦未晴衰老見年殊不覺臥聴穿葉打窻聲送子婿林申甫還侍鏘鏘笙磬阼階東穆穆黄流玉瓉中近在門䦨無此稱老来􅁭抱更誰同幽燕遺恨須􅀵苐孔孟微言要忍窮精舎一區泉石好何時相就㸔􅄀鴻逰趙園主人避客竟何之雨過停橈落日遲頼有畦丁曽識客来禽花送兩三枝赴林宗大招賞牡丹之集剝啄要春酌團欒得晚晴千花名品下一葦病身􅁿文㑹非投轄清歡勝絶纓倦逰吾獨愧歸趂兩山眀􅀉謝懐英髙士聞君已得㱕山請顧我方當絶跡時欲葺止齋猶未就篋中應有草堂資和張端士􅀄夏綠隂四合水迷津春去雖愁􅁍可人無數飛螢窺案帙有時乳燕落梁塵滿塘荷䕃􅀅還舊試火包香又斬新短夜得眠常不􅁕僧鍾遮莫報昏晨屈原賈􅁩陶淵眀文辭皆喜道孟夏而悲樂不同雖􅀁遭之時異要亦懐抱使然爾端士􅀉夏日一首若無􅂓然因和其韻頌初夏之羙以觧之送周介之同年赴徳化宰民社湏吾黨江湖足此情不堪秋暑近欲趂莫潮平拙宦成華髮憂時自短檠君㸔廬阜石千載尚垂名謝林黙之居士恵酒居士山居方與世絶尚欲友此廢人耶小詩舉發一􅀏不􅀅鵞鴨惱比隣林下蕭然老幅巾乞與青州十從事添成眀月兩間人戈午夀􅀦舉兄一毋分身四白頭從今家事付児流只須老草供觴味乍可婆娑伴釣逰勞世萬人輸暇日好天一雨薦新秋平章何物冝為夀三十餘年晏子裘止齋即事二首性已耐岑寂老應忘􅀮憂齊年䨇白髪盡日一蒼頭竹閉緘門鑰蒲團數漏籌未知庭廡下還有雀羅不教子時開卷逢人强整􅁭再貧㸔晚節多病得􅀄心地僻茭蓮好山仾竹􅀣深􅀉聲同燕社眀月又秋砧戲題止齋叢石雖無壁立翠琅玕聊當庭前犢鼻裩我亦開之方􅇊者衆山皆大小為尊重陽和朱直方韻衰老登臨得並家絶勝十載向天涯直須與世為陶令謹勿令人識孟嘉藍水悲吟空雅徤牛山醉墨謾欹斜誰知竹葉雖無分一􅀏何妨菊自花用徐叔子韻送其過毗陵家食年年未觧忙浮況閭里但壺觴偶緣他故趨吴㑹可使吾徒憶魯狂曲水風流王􅇣少鑑湖窮約賀知章請於百尺樓頭上下視人間有肺腸送四眀汪文子文盛􅀴生少官􅁿舉子繁誰䏻堪逺役相與及微言淺凍留春雨新愁起夜樽斯文吾不敢短句送㱕轅􅀉九江宋居士篋中毎閱􅀁蔵書長憶瀟湘九宛餘一别十年身尚徤恨無飛羽過匡廬酬劉進之氷柱劉乂句綈􅂁范叔寒􅀁親多物望相識半人寰今老猶徒歩吾竆亦厚顔幽懐真易足萬卷屋三間己未上已清明霖􅍂故作落花天佳節重重倍悵然雖有庭除臨曲水更無尊爼試新烟酴醿雅欲延春賞杜宇還䏻破晝眠頼得二昆同一客蕨芽蒲笋短檠􅁁和林宗易上巳韻􅕣􅕣曙皷五更初枚數何門可曵􅅂孰與課児翻故紙㡬曽縁客掃精廬常饑未免時中酒多病安􅀎强著書自􅀏無才供視草徒勞身後問相如和林宗易雨後韻兼簡沈仲一溪山秋色日侵㝷一水循除萬木隂幸有新炊送農扈可無勝踐盍朋簮蒲荷綿亘衡從畝鷗鷺追隨下上音􅀉語北湖休獨自摩挲周􅂦與啇􅑄張端士以詩送蘭􅈍因和其韻暮春堂上抱天和時啓柴扉與客過客有可人須語似新篁来㸔玉森羅寳壇寺林宗易韻夢囬齒頰自天香何必招魂怨渡湘少待精廬天向暁有来嘉客􅀊為常雲山鎮壓魚蝦市煙雨荘嚴橘柚鄉最好題名􅀟石闕可題周暦萬年長荅朱翔逺見别之作總角相㸔五十年行藏殊轍各皤然豈無子羙書成束欲送相如賦上天俗眼不寛多小謹交情何限復長篇乗壺偶自兵厨至聊助征㠶一醉眠甞語客蓴鱸橙􅈉的對或言今年斗門堅寒故􅈉不上又今秋風急鱸魚亦鮮余發一􅀏因成二十八字專鱸有玉西風急橙􅈉無金東海深祗為酒醒愁夜永二蟲得失我何心因客􅀃秋秫水傷復用前韻風鱠不湏鹽豉好霜螯湏着酒舩深無由種秫求旁舎旁合秋螟已蠧心已未生朝謝莘叟兄送梅無􅀊探梅不恨遲緝齋今送兩三枝也知造物多生意亦為畸人觧􅀏頥壬子恰同身墮地庚申還值􅀦開基數家誇道明年好好在長貧誦繫辭又莫􅀏㘽培日月遲待㸔老榦及孫枝天􅀅臈去春囬首人與花同雪滿頥萬里隴頭空故蹟􅀌山籬落但餘基至今佳句無人􅁇誰與招魂着楚辭覔花背山靣水竹週遭雖乏樓臺氣已豪更得好花千百本中間容我誦荘騷和徐魏叔見􅀉三絶蒲團坐閱􅀊如梭不管門前雀可羅投贈紵衣􅅻薄物道人微􅀏已嫌多紈袴何甞不誤身梁園金谷草長春送􅀅重錦齊三十咲殺生芻一束人獨向心源識背趍豈於身外較精粗凄其下視人間世朝市區區地一夫和朱宰逰丁園韻榆火逢佳節棠隂接勝逰移樽忻及暇乗􅄚共㝷幽日靜竹光合風喧花氣浮主情殊未倦衰暮為遲留庚申上巳何事天低雨露慳一遺晚百感又春􅀜墨客山隂竹騷人洧外蘭誰知千古意不在㳺間清眀後一日宴客明日宗易送牡丹有詩次韻客去朝酲􅁖詩来晚思和名花如洛上佳句近隂何雨故妨新火春應墮夢柯莫􅀅行樂地蝸角動干戈和汪仲嘉樓大防二尚書賀鄭貴和華文休致韻貴和四眀人􅀙其子㤗興為瑞安主簿簮笏相摩入殿廬人皆自􅀏此區區豈無隻字踰華衮未必千鍾勝飰􅂼吾見北山多後倦誰如東里竟先驅追随曵履枌榆社猶及香山退􅀓無巋然名節萬人尊詩落文昌帝九閽耄及衛公還失䇿早如踈傅亦傷恩華文延閣如今少神武􅁱門自古存我與東樓最欣慕掖垣燈火㡬同論寒食早起圍爐中戲和林宗易韻二首疊帳重裘更怯風絶憐寒食到匆匆一春不見花開落但䜛㘽花費㡬工春工偏以速為神誰管沉痾未覺春禁得春寒長恣賞甘心輸與少年人晚移舟塘次值風而囬莘叟兄有詩次韻􅀴春屏跡與誰同苦雨衣篝亦自烘方此欲為官况事依然不值世情風蒙茸水􅀦蒲荷蕩馥郁田家橘柚叢最是一年行樂䖏翻成咄咄坐書空送四眀方伯起世事􅀜分合人情㸔短長君應愁冨貴人巳畏文章竚立親雙􅁂追随客累觴未知歸定否吾亦愛吾鄉送楊渭夫入淮老去􅀜心㝡語離不堪離久㑹還希君方慷慨思矜振我已婆娑喜惰歸萬事莫如身自愛十詩亦與世多違倘􅀅書寄􅀨来鴈且問瓊花果是非􅀙族叔覔老桂他山有桂老鬅鬆好植梅旁伴槁容着我對吟前赤壁乞君分與左青龍踰墻之樹冝無取國風將仲子􅀆無踰我墻無折我樹桑益屋扵東本不㐫家語有人問東益屋不祥孔子闢之恭想短章蒙一􅀏便呼鉏钁破苔封蓮花伯仲之間竹與梅魏姚聲價浪崔嵬雖然亦混魚蝦䖏風度自􅀙丘壑来􅀉林宗大春巳無情雨妬花病還妬客到花家今當未雨􅅻身健杖䇿来㸔半􅄍葩和莘叟兄詠張子房韻不縁多病􅃍懐安閱盡人間萬事難謾以􅀏談分楚漢竟􅀅功業付蕭韓朱及之以􅀁種荔枝結實招飲不及赴以詩謝之閩譜余甞第状元年来雖見僅名存貢存天寶猶徒擾賦似相如亦妄論毎羡朝陽􅀻沃壤正愁秋雨妬芳樽綘衣玉質今何夕照我西歸十二軒及之云以風􅀨僅存十二顆􅀙徐一之覔菊我欲作亭題獨立苦無翠盖著金錢園林百軰皆名勝為趂西風乞冗員土盆瓦斛空中久羞見重陽揷滿頭􅀉向柁樓煩送似笔鱸韲􅈉待新篘次韻奉酬徐一之送菊桂叢蘭畹悄無譁但有哀鴻天一涯節物更誰知白髮交情於此見黄花聲名獨立空秋際香色平鋪與露華南雅未􅀵騷致意騷人應欲􅀘詩葩廷植姪得男朱文昭􅀉詩於湯餅集即席和韻喜􅀃徐卿得二雛吾家波及亦君餘青衫手板冝􅀙此斷簡家蔵莫付渠但欲健如黄犢走不妨錯冩㺯麞書更㸔湯餅頻頻供􅀏索梅花到􅀊除送鄭主簿㤗興觧官歸四眀師友於今説鄭鄉親庭分付舊行蔵但知職分冝棲􅁄盡把聲名屬憇棠一字未曽緣薦墨扁舟􅅻可着詩囊問津漁浦多西􅀏獨為菜衣味更長㤗興以乃尊華文老不能車迂道䖏婺自錢清漁浦㱕四明送孟延昌㱕蘭溪典同周命士律恊漢諸郎師友今千載妻孥各一方髪從何䖏白菊有去年黄惜别無多語􅀜雎三㫁章劉進之飲蕃叟弟筠亭且賦詩余與蕃叟族居盖屏迹不出各數年於是有感次其韵判與漁樵日徃還鶴亡蜂遁􅈳苔斑何人不棄㝷常事有弟相忘咫尺間寛綱及余端已老祥琴相爾未應閒但􅀅丘壑全分付可待移文始厚顔林宗易劉進之見訪有詩再用前韻牛羊日夕鳥知還休􅀃年時玉笋班四皓亦甞空老去二䟽不在共功間􅁱書尚覺㱕期晚􅀮几兼忘永日閒况有宸章長對越昭囬雲漢不違顔題錢宰吸光亭圖棲身雲夢八九上用意風雩五六間惟有澄波兼皓月尚憐波月蔽􅉻山止齋先生文集卷之八
