front:
  text: 止齋先生文集卷之二十五
  hash: sha256:8753b8fa1d00c1c7a85044eade6bb6c390c0ef31001dd495f29adc551fec5f32
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_025-1a}
body:
  text: 奏狀劄子直前劄子四月十八日臣近者不識忌諱幸因賜對輙論及兩宫情意未通事仰荷聖慈濶畧愚直曲垂清問備盡􅈤悃仍令臣入文字指罪離間之人􅀅有施行以釋疑阻則古􅀁謂狂夫之言聖人擇焉何以過此臣雖糜捐無以報稱比至奏入竟留不下臣切自咎責非陛下之不聴臣言實臣􅀒陛下耳以此不避煩瀆再有奏陳臣聞天倫骨肉自然恩愛偶有嫌􅂩至相猜疑考之載籍間或如此然而秉􅃔之性不可解剥同氣相求終易感動是以方其懐疑若􅀅終身而不合及至感悟則又俄頃而如􅀄徃徃喜極至扵流涕豈同他人各有異志雖以盟誓相要竟亦關防不巳者乎又况陛下父子聖明同徳舜禹􅆘至今日尤非本心苟反求於一念之初則何待扵多言之切且陛下獨不記夀皇之踈魏邸乎自古􅆸立出於愛憎夀皇此時果何心耶而陛下忍忘之也若曰離間之人則亦冝有縁故䆒觀前代多是姦臣因懐反側之心遂行闘喋之計為此向背皆以自危今之羣臣豈有是事盖未嘗得罪扵陛下則心不赴愬於夀皇人情曉然可以洞察假使近習妄自分朋間或有少可語言亦不過時暫欺蔽􅀄非要害可造事端雖是合正典刑何足尚煩聖慮此臣􅀁以日夜痛心以為陛下誤有􅀁疑而積憂成疾至此也抑臣不識聖意今􅀅聴二三大臣與百執事之言而為父子如初歟􅀅一切勿聴使父子終不得相見歟昔者虞舜欲見其父於生前日號泣于旻天訖於克諧萬世誦聖漢武欲見其子扵死後作歸来望思之䑓天下聞而悲之而事巳無及徒成永恨二君之心大抵畧同遲速之間得失相反臣恐陛下今日之不為虞舜而他日之􅀅為漢武也臣言及此亦既泣下今請以此月扈從車駕過官為期若猶未也則臣實􅀒陛下􅀅退而就誅戮矣臣不勝迫切之情取進止乞致仕狀四月二十三日右臣伏以車駕久不過重華宫起居實皆羣臣之罪而罪莫甚於臣身為近侍而䧟君父於失徳有臣如此􅀅安用之今欲守本官致仕伏望聖慈特降指揮施行謹錄奏聞伏候勑㫖再乞對劄子臣十八日進對劄子乞以此月扈從車駕過重華宫起居為期若猶未也則臣實􅀒陛下􅀅退就誅戮矣二十二日遂具奏乞守本官致仕二十五日准尚書省劄子三省同奉聖㫖不􅁢臣迫於威命當日乞直前奏事更竭狂愚以畢區區之義而後去欲望聖慈赦其萬死速賜指揮臣不勝祈天俟命之至直前劄子四月二十六日臣􅀼覩兩年以来以不過官諌者衆矣誦􅀃義理條陳利害非不詳盡非不激切而陛下曾不加聴間或聴之亦不過勉強一出近者且以面從為聴嘻笑不加恠矣獨臣私念以為陛下誤有􅀁疑積憂成疾以至於此故自去冬凡四請對毎於陛下心事之間反覆開明至於深入切中徃徃陛下為臣傾倒一無􅀮情臣亦益得肆其狂愚無􅀁諱避枚解而件析之誠冀聖懐曠然大悟起居飲食務自安和號令言語務自平􅁢其在外朝不必事事過為留難其在内廷不必人人過為猜慮如此則淵􅂨寜謐天性自見何待臣下固要力請乎而陛下以臣言之故釋然無他凡三感悟於此矣去冬令臣宣諭兩府翊日取㫖前月令臣更入文字付外施行最後十八日復諭臣以早来曾許丞相以十九日命駕退朝之後便降指揮臣數四懇奏而玉音亦數四響荅此陛下三感悟之㡬也然今日確許明日中變不唯中變而又號召大衆赫然示天下以不肯出假如陛下有一人可信有一䇿可取有一日清明在躬豈至此乎臣􅀁以皇恐踧踖前此對後輙乞􅀘外於今極矣冝即誅戮納禄謝事猶是自營而非臣之敢要君也天度寛容降㫖不􅁢臣敢不更自殫竭以畢區區之義臣聞抱虚恐者蹈實禍懐妄憂者得真疾何也此心最靈功侔造化一有􅀁蔽皆成定力自非聖賢未易開悟甚者無故及於亂亡昔漢武帝征和間居建章宫見一男子􅀵之弗獲而巫蠱始起又常晝􅆍夢木人數千持杖欲撃帝帝驚寤因是軆不平忽忽善忘疑左右皆為蠱祝詛莫敢訟其􅁈者巳而有戾園之禍隋煬帝大業初内殿火帝以為盗起驚走入西􅁐匿草間火定乃還自後毎夜眠中常驚悸云有賊至以甖貯毒藥謂􅀁幸􅁎曰賊至當飲之巳而有江都之禍由今觀之征和巫蠱本無是事只縁武帝疑心不解姦臣寅縁卒禍其子大業盗賊亦無是事只縁煬帝疑心不解左右壅蔽卒禍其身臣故曰此心之蔽甚者無故及於亂亡二君是也陛下不過宫豈非誤有􅀁疑乎臣不識陛下何􅀁疑重華耶道路之言不以為責善則以為猶吝權以臣計之二者皆誤也且夀皇責善為天下計為社稷宗廟計耳假使陛下政事􅁱明人心愛戴則夀皇之願得矣尚復何辭陛下不是之察豈非誤乎若曰吝權則進退百官必與聞其人罷行庻政必與聞其事而五六年来天下不見其有此也但見陛下懐不自安動輙阻惑以其人為欺雖大臣死亡而不信以其事為怪雖細民疚災而不恤又豈非誤乎夫以誤為實而開無端之釁以疑為信而成不療之疾臣切以為夀皇不􅀎禍陛下是陛下自貽禍也臣言不􅁕聴分當永棄念此違離不冝自他復為陛下􅈤惻言之伏惟鑒隋漢之􅀁巳徃而捄其􅀅来國家之褔也兩宫之􅀁期待也非獨臣之願也臨􅁓涕泣庻㡬萬一取進止奏事後申三省樞宻院劄子某輙有管見僣越申禀二十六日直前奏事嘗乞差近上臣寮調護兩宫上云此却是好啇量朕裏面人不中使不㑹􅀃話不䏻委曲道朕意思待差文臣恐他軰不肯檐荷如此等事如何則好某奏陛下髙爵重禄養許多士大夫雖使犯難赴死亦當向前况是詣重華宫傳㫖聖意有何不測不肯檐􅀒但乞宣諭大臣如此䖏置上極以爲然且云待諭與宰執某因檢照得中興㑹要在孝宗時以叅知政事錢端禮充徳夀官使一時應合奏禀事件多藉端禮之力有此故事可以舉行今来若於親王執政宗室戚里中差近上臣寮一人充重華宫使自後應合奏禀事件令得徃来傳㫖庻㡬不至阻隔某以管見如此􅆘以上逹天聴欲乞朝廷特賜敷奏施行小帖子靖康初顯謨閣待制譚世勣李熈靖主管龍徳宫資政殿太學士王易簡提舉龍徳宫併乞鈞照再乞致仕申省狀照對某昨具奏申乞守本官致仕今月二十三日准尚書省劄子三省同奉聖㫖不􅁢又於二十六日直前奏事面納劄子以申請欲望朝廷特賜敷奏連降指揮再乞致仕状右某再具奏申乞守本官致仕今月二十七日再准省劄備奉聖㫖依巳降指揮不􅁢某非不知􅂭天厚地之恩何敢更有煩瀆伏念某自今春四次請對頗竭愚忠誠冀幸上意開悟父子如􅀄而天聴甚卑反覆諮度盖已確許矣而竟中輙某是以痛自咎責上􅀌任使而有此請不謂聖度寛容再降不􅁢指揮感極涕零未知􅀁報重念某危􅈤若此儻若誠意學術尚有毫髪可以自効豈忍納禄謝事求便其身區區迫切姑附不􅀎者止之義欲望朝廷再賜敷奏早降指揮施行謹具申三省樞宻院伏候指揮奏事劄子五月四日臣聞人主之􅀁以得天下者以得人心也􅀁以失天下者以失人心也非獨以父子之私也苟得人心雖其父不得以天下私諸人苟失人心雖其父不䏻以天下私其子昔者禹薦益於天􅀅以天下遜也而謳􅁔朝覲獄訟者皆不之益而之啓故禹卒不與賢而與子故曰苟得人心雖其父不􅀎以天下私諸人啓是也秦人自以為萬世有天下死而號曰始皇帝其次曰二世欲以一至萬也然身死􅂊數月耳天下四面而攻之宗廟滅絶矣故曰苟失人心雖其父不􅀎以天下私其子胡亥是也恭惟陛下今􅀁憂疑豈非以不得愛於夀皇乎夫惟以不得愛扵夀皇而鬰鬰終日以失天下為懼於是舉朝諌之而不聴舉國非之而不恤舉世為之惶惑而不加怪臣恐陛下之憂不在聖父而在人心也何者假如萬一夀皇誠責善誠猶吝權而天下歸心則陛下固有辭於夀皇矣夀皇雖不責善雖不吝權而天下離心則雖夀皇亦無以為陛下計者是故疑夀皇者虚憂也失人心者實禍也此理曉然不待智者而諭今也舉朝諫之而不聴百官解軆矣四參常朝宰執而下無一人立班者是失舉朝之心也舉國非之而不恤軍民皆怨讟矣或詐為詔書敢於指斥是失舉國之心也且舉朝諌之而不聴舉國非之而不恤猶曰為憂疑夀皇故也若乃吴挺之死半年而不置􅀅張孝芳之見殺累月而不討賊他如班直待試於殿庭侍從待命於郊外徃徃邈然都不省記是於夀皇何預焉而陛下獨固守力行之又􅀁謂舉世為之皇惑而不加怪者是豈不􅁕以失舉世之心乎不但此也人情好逸而惡勞今仗下之士皆苦晏朝巳報班矣有唾不顧者臣未知禁衛之心果如何人情利親而患踈今自閤長御藥卒不得一至左右間嘗一日逐數十人臣未知近習之心果如何甚者嘉邸有子而不奏告掖庭有䘮而不起彂臣又末知宫閫后妃之心果如何陛下試一念此不謂之孤立歟不謂之人人自危歟陛下博覽載籍閱義理熟矣亦嘗見自古人主孤立如此人人自危如此而可晏然無事乎今天下本無事而陛下以憂疑失人心至此方且曰吾計當如此吾不可放下矣而專欲盛怒益不容解則古􅀁謂肘腋之變蕭墻之禍殆不可謂今直無也豈不甚可畏㢤雖然破疑為笑在蹙頞之頃則轉禍為福亦在反掌之間何者今日之事非若敵􅀦對壘難平也非若強臣䟦扈難制也又非若四分五裂難收拾也徒以聖意憂疑夀皇過當而人心不服耳聖意釋然則人心帖然矣故今日過宫則人心以今日解明日過宫則人心以明日解然則陛下何苦執滯而為此岌岌也在易暌之上九曰暌􅀌見豕􅀒塗載鬼一車前張之弧後脫之弧匪冦婚姤徃遇雨則吉􅀃者曰暌􅀌之極見豕􅀒塗甚可􅁾也載􅀑盈車吁可恠也方張弧以攻矣而其極必變變必通俄而脫弧則無為冦之患有遇雨之吉者隂陽和也孔子之象曰遇雨之吉羣疑亡也人有此事則易有此􅁚陛下今日非偶然也極則變變則通此其時矣獨柰何弗悟乎臣前後論奏以干冕流大抵務為開釋冀自感悟而不忍以危言傷聖懐念當謝事納禄永辭闕庭是以復誦人心可畏之􅀃以望裁擇惟陛下速圖之幸甚幸甚奏事乞休致劄子臣輙有迫切之􅈤仰干天聴臣凡再乞休致再准省劄奉聖㫖不􅁢伏念臣心力衰憊難以復備使令欲望聖慈速賜䖏分取進止五月四日讀前奏事劄子畢即面納休致劄子得㫖云甚好甚好當日解官繳納告劄五件申尚書省樞宻院辭免秘閣修撰嘉王府賛讀申省狀准温州進奏官遞到省劄一道五月二十八日三省同奉聖㫖陳􅀓良除秘閣修撰嘉王府賛讀㐲念某立朝無􅀘分當斥誅聖恩寛大許還田里退惟僥倖感極涕零不謂納禄未乆成命巳下寵以秘府論撰之名專以親王勸誦之職自昔寛朝無此恩意人非土木豈不知􅁬重念某學術衰落不堪復備使令加以匆匆去國􅆘當夏潦暑濕相摶遂成脾泄之疾雖欲勉強支持不前􅀁有上件恩除無縁可以祗受除已􅀅省劄送温州乞備􅀁申繳納外欲望朝廷特依􅀁乞令守本官致仕追􅆍上件繳奏施行辭免祕閣修撰賛讀與廟堂劄子某輙有迫切之􅈤仰千鈞聴伏念某一介踈庸及此衰晚誤玷朝列迄無􅀘報内􅀒初心外慚公議惟有去官庻安愚分况自陳乞休致以来疊奉􅂭㫖未遂其私及再請直前奏事庻盡拳拳之義必以學術空踈天聴髙邈幸蒙從欲分當永棄今者休致未乆除書已下寵以論譔之章專以勸誦之選在君父可謂􅂭天厚地之恩在臣子益有深淵薄冰之懼􅄋誠蘄免􅀁以九頓首於洪造也恭惟少保大丞相先生諒人心之不同期時事之攸濟夫人心不同則匹夫之操不可奪時事難濟則書生之才不􅁕用有如某冝置閑散又况玉音在耳不敢誣也干冐鈞嚴無任皇懼隕越之至止齋先生文集卷之二十五
