front:
  text: 止齋先生文集卷之三十一
  hash: sha256:0f66e456cd4f19f6064e145cdbe86f4ec3942d3b96f7082b870e809d77c0585c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_031-1a}
body:
  text: 表夀成皇后冊寳賀皇帝長樂問安重闈燕喜太常議禮大冊崇成鋪陳典章炳燿古昔中賀恭惟皇帝陛下盡倫之至為治之原重以離明方􅁇大人之照受兹晋福聿申王母之休掲盛典於熈朝燦縟儀於顯冊三宫衍慶千載同時臣阻詣漢庭尚于周隰麟趾騶虞之化幸際風移鷄鳴鶴駕之朝莫陪旅進賀夀皇聖帝五日一朝俱享玉巵之奉六宫九御載􅀭寳冊之文􅀖國有光臣民胥慶中賀恭惟至尊夀皇聖帝陛下重華稽古正始齊家事親以萬國之歡虞嬪是相夢帝有九齡之予文母攸同方㳺神於穆清之宫而垂世皆希濶之典臣繆叨乗傳􅆘阻稱觴雖莫陪鶴駕之朝觀光禁籞尚􅀎述麟趾之化流詠河洲賀夀聖皇太后鶴駕問安夙備西廂之敬螭章成禮􅀹嚴北面之朝盛事罕聞鴻休疊出中賀恭惟夀聖皇太后殿下助成隂教賛佑皇圖式符坤徳之元尊為聖母爰作離明之兩親授神孫􅆘昭掲於徽稱宜恪恭於婦職臣繆􅀅使指逺去朝行雖莫趨長樂之班但遥賦關雎之詠賀夀成皇后三夀作朋備極慈闈之養重明麗正前陳寳冊之文振古􅀁無大􅀖之慶中賀恭惟夀成皇后殿下虞嬪匹羙文母齊芳袗衣鼓琴克相重華之化􅃦門侍膳聿成正始之風惟二十七載之明昌宜億萬斯年之稱頌臣逖聞盛舉欣遇明時鷄鳴鶴駕之朝雖莫陪於盛事麟趾騶虞之化尚䏻播於聲詩賀皇后徽冊有光尊歸北闕尚宫前導制舉西廂彌文煥然内則嚴甚中賀恭惟皇后殿下賛禆孝治修㓗母儀䄖翟禕衣寅奉執笄之禮根車羽盖載嚴問􅃦之朝式當寳冊之成恭想玉巵之奉臣冐持漢莭阻簉周行逖聞縟典之肇修自慶愚生之幸㑹皇后冊寳賀皇帝書周正月粤若始年建漢長秋兹惟内治三宫燕喜四海瞻依中賀恭惟皇帝陛下離明而巽齊乾健而坤順共爲子職必有告榛栗之慶彼以功必有獻穜穋之種眷言中饋聿自初潜式陳王冊之文用正椒房之號於以端本豈徒示㤙臣乗傳於兹趨庭罔及關雎正始當明承教化之由卷耳審官敢在知勤勞之數賀夀聖皇太后慈闈問安夙謹東朝之事正宫備冊載修北面之儀鋪揚典章慰懌中外中賀恭惟夀聖太皇太后殿下徳尊聖母謀􅂌神孫謂九重端冕之儀早垂内則而再拜執笄之禮首建中闈既陳衣庸備玉牃臣逖聞縟典阻造外庭望紫闕以傾馳與蒼生而瞻頌賀夀皇聖帝迪從子保喜承長樂之顔先欲家齊親􅂌􅂗山之助再掦顯冊盡岀宏規彌文畢張率土稱慶中賀恭惟至尊夀皇聖帝陛下以身為度於禮不愆凢后妃嬪御之常悉循古制而父子夫婦之王曲盡人倫兾其嗣太姒之音足以正二南之始式陳玉檢用建椒闈臣逺去朝行謬􅀅使指雖欲殫於頌述曽莫究於形容賀夀成皇后坤象承天甫就㫖甘之奉家人正位仍嚴笄緫之朝宏休載揚盛事創見中賀恭惟夀成皇后殿下化由治内道本家齊謂嗣聖御圗􅆘萬乗龍飛之旦而尚宮奉冊修九重燕􅆍之儀式昭六服之常庸備三宫之養臣驅馳周隰瞻望堯階聆寳瑑之鋪張與編氓而抃蹈賀皇后貢金九牧夏統惟新正位六宮周儀攸重於穆椒房之號有光彤管之書中賀恭惟皇后殿下作配乾濳同功坤載舜鼓琴􅀍袗克傳嬀汭之規禹菲食卑宮實變􅂗山之羙長秋初建諸夏宗依而父父之尊榮􅀅以垂孫孫之矩範臣瞻言京室頌詠河洲獻穜稑於王遥想躬行之事采藻蘋於澗益觀丕變之風湖南提舉謝到任重明麗正方此第功五在邉然冐寵業未免宜黜得遷之儀臣不勝以榮為懼之情中謝竊以蕞爾桂陽鄰於嶺表自升軍額􅀅五十載之間可紀守臣􅂊一二人而巳然必宣勞而滿􅀊廼􅀎循次以為州未有即賜除書遂􅀅使指輙衡陳於當路皆度於它􅀖周㑹王人㣲亦序諸侯之上漢置刺史始皆属丞相之官豈容如臣亦預兹選重念臣腐儒無用假守罔功勤不足以盖荒政之愆㢘不足以塞曠官之責頋專城而不理况闔部以安施雖幸遭時以政拙心勞而見録未知善後􅀅力小任重之為憂兹盖伏遇皇帝陛下自天出寜如日委照敬識百辟之舉無有幽深􅁢􅁵庻績之熈不遺微細遂令庸冗輙沐㤙榮臣敢不懋明詔條采聴謡俗平頒興積庻􅀅自古以有年懋遷化居不失與民而共利提舉司謝賜暦日夏時三之日振古如兹周暦萬斯年自今以始凢蒙敬授悉頼裁成中謝恭惟皇帝陛下得聖之傳為天􅀁命受三朝之圖籍罔不朝宗在七政之璣衡皆如􅁤度廼頒初政爰布新書臣濫職􅀅明當思考恊不違咫尺既同拜賜之榮敢離湏􅁷而怠觀風之事湖南轉運判官謝到任乗傳彌年缺然􅀘報􅀅輸􅀁部滋甚光華中謝惟本朝行仁政之原自諸道置計司而始孰為之􅀃浸失其傳不知國家之意本以勝􅁀殘但曰藩鎮之財聚而歸公上由是多故至于中興雖懐惻怛之心莫奉丁寜之詔惟聖有作視民如傷疇咨廷紳申固􅀖本方當講求民瘼之際冝得布宣主徳之才深明盈虚稍務損益頋以兹事付之臣愚伏念臣學不過於虚談仕未離乎嘗試􅂚期衰暮偶際休明且治郡徒勞􅀄無毫髪之効况察州不敏近在目睫之間以自知之甚明􅀅大幸之難再云胡􅂭委得以次遷恭惟皇帝陛下豈弟作人髙明覆物謂曠日持久或有盡知情偽之長謂便道之官庻無數易􅀅迎之患遂令庸冗有此僥踰臣敢不對越龍光勉旃駑力苟不至乏絶以貽屯􅀁之憂則有條便宜當漸為来者之計湖南提舉賀慶節太極之生兩儀尊無與並嵩髙之呼萬􅀊喜不自勝中賀恭惟至尊夀皇聖帝陛下徳配百王心㳺太古行尭之道莫測於聖神薦禹於天復於順受􅆘紀誕彌之旦永膺滋至之休臣􅀅指荆湖馳心魏闕為夀雖莫綴於清班石崖可䥴豈敢忘於善頌湖南運判賀重明節地闢天開聖作明述於赫重離之運有来載震之祥中賀伏臣禹相舜歴年之多武繼文受命之固昔嘗聞於六藝今親見於一時恭惟皇帝陛下􅁢執其中聿修厥徳歛時五福豈惟叙有夏之疇與我九齡抑又過成周之歴臣濫􅀅使指嘗簡睿知若帝之􅀄雖阻闕庭之觀禮如山之夀但瞻衡嶽以爲詩重明節進奉銀後天祝筭既同嵩嶽之呼任土貢珍爰致荆州之品前件銀氣鍾清淑産􅁼朱提侑萬年之觴深慚微幣得諸山之甕願賦休祥丙辰賀瑞慶節長彂其祥自一陽之生子誕彌厥月當六位之成乾宗社寵嘉華夷欣頌中賀恭惟皇帝陛下聦明時乂剛徤日新省事清心獨冠百王之上深仁厚澤丕承列聖之傳於萬斯年自今以始臣頃叨虞侍最荷簡知属當去極之遥阻在奉觴之後昭囬下燭常對越於奎文舞蹈永歌但熈然於堯壤丁巳賀瑞慶節地闢天開爰紀大来之慶川增山夀咸輸美報之誠中賀恭惟皇帝陛下典學光明性原溥愽澹然無欲裒六藝以自怡聖矣不居守舊章而唯謹是宜誕爲民極永荷天休臣介在遐陬阻陪盛事每慚􅂭眷曾無圯上之一編􅀼幸餘生猶有華封之三祝戊午賀瑞慶節聦明作后聿開出震之祥歴數在躬有永後天之筭中賀恭惟皇帝陛下宅心慈儉玩意穆清承列聖之儲休輯兩宫之燕祉誕為民極長握乾符臣夙荷簡知久違抃蹈嵩呼萬􅀊欣盛事之難逢天保六章愧􅂭㤙之未報己未賀瑞慶節萬年景福誕膺天授之休四海歡心姑盡臣恭之義中賀恭惟皇帝陛下道無偏陂學有緝熈燕及兩宫増聖圖之廣大陶成多士粲王度之清夷肇開震夙之期永享熾昌之夀臣蒙㤙至厚抱釁罙深積五稔之凌兢無一毫之覬幸衣冠甚偉雖阻預於􅂄英􅅵畝不忘但欣逢於華旦謝中書舍人代言之任與政相通顧惟何人亦在此選中謝臣聞惟虞夏商周之世有謨訓誥命之書至於兩都亦稱七制要是人主猷為之盛見於儒臣文字之工惟其相遭是以不朽然則鄒枚而下詞藻豈謂之乏人魏晋以来號令不聞於傳世雖僅存於職掌曾何􅀘於治功洪惟本朝追並􅂭古慶暦元祐之際豈非千載之一時歐陽蘇軾之徒故有六經之遺意式至今日作興斯文由此觀之則臣幸甚兹盖伏遇皇帝陛下虚心無我立政惟人方旦視民而如傷未嘗以位而為樂凢􅀁􅣤告無非休明臣敢不益勵初心以期後効必也緝熈光明之學至於令終庻乎草創􅃳色之文可以行逺止齋先生文集卷之三十一
