  text: 止齋先生文集卷之四十七
  hash: sha256:5158e32a7d779089bf28e64bd77df466e48f0d8a5a2b26ed41c9e19f4b423e74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_047-1a}
body:
  text: 誌銘徐叔楙壙誌叔楙年二十二取科第始娶剡之周氏婦黨愛叔楙留之彌年不使其女行叔楙客乆念其親嘗欲得余書風刺之􅀅持白其婦翁媪以乞歸余以叔楙意為書累百言道其主母老矣父母日夜望叔楙以佐其歸决叔楙於是乎歸而巳病矣余與叔楙同乾道八年進士是􅀊繇鄉貢以第者唯叔楙一人里中慕恱之奉羊酒賀徐氏之門者日至他父兄皆各咎其子弟謂吾之不如徐君也今叔楙調長樂主簿弗及禄又去親側逾年以病歸歸之日父母為之愁苦無聊累月而叔楙死嗚呼是不幸耶非耶叔楙名愧温永嘉人一子才周􅀊以淳熈某年某月某日卒父擴帥其同年進士請墓于郡太守得某鄉慈雲院之後山以某年某月某日􅁙余悲叔楙之親之怨也故爲叙其才與志尚不愧於親者如此因以爲銘云林安之壙誌安之姓林氏諱居實温瑞安邑人父堯賔母王氏安之以淳熈二年十月丙申卒以其卒後之六十有二日丁酉􅁙于邑西偏三里之横山余既爲圖銘於東菜吕伯恭氏而壙不可無識也盖安之從余㳺最乆余在城南時羣居累數百及屏仙巖之陽至者盖十一而安之實先越數年寓會稽之石氏藏書房至者盖百一而安之又先明年繇太學還過越安之猶栖然凍餒逆旅以竢􅀅行天台則安之束書僦僕矣余察安之勤甚矣而趣好雜因辭却不與偕比至天台安之巳蹙容俛立戸外以請由是不以渉事物毫抄分志而趨於學余師友雖在數百里外必徃依事諸公見安之咸曰佳士佳士年止三十四其􅁙也同舍生為之槨悲夫趙夫人墓誌銘余友孫叔特􅀅􅁙其内趙氏為余言内􅀁以克相之者而拜乞銘曰昔吾母早世諸弟有尚結髮者吾父春秋髙多恙趙氏年二十餘来歸事字尊穉時節其服食飲藥各以意禁􅄝無堕缺不自事㳺飾惟賔􅀕之饌腆㓗必致訓齊兒女色荘如文人至令僮婢則以恵及雖婦氏其行應銘敢以請按夫人温瑞安東郭人鄉貢進士􅂄孫之女生三男昭子明子宣子二女歸同郡士朱清何璠年五十二卒於乾道七年七月丙戌以淳熈三年十有一日壬寅朔􅁙于永嘉縣建牙鄉鵬飛里西華山之原余聞東郭與金奥趙皆清獻公之族熈寜中清獻公之子㞦来丞郡夫人曽大父岵􅀙公問家法繇是趙氏子姓有檢守自辟雍正霄以文名天下登進士第者至今不乏夫人行應銘有自来矣余娶城南張氏實金奥出昭子而下又從余㳺皆辭不可遂銘之曰維系之光維習之臧式謹婦常無年乎何傷胡少賔墓誌銘少賔諱序姓胡氏胡氏繇婺徒温至荆湖制置司幹辦公事君諱褒通判滁州君諱裒宗正少卿君諱襄兄弟始著累贈其考諱觀國中散大夫妣趙氏恭人滁州君周氏安人無子以幹辦君之子為後是為少賔也少賔娶薛氏故起居舍人徽言之女世􅀁稱薛士龍者其妻弟也年四十有九以淳熈五年後六月丁未卒于官􅀁十有一月辛未歸􅁙于永嘉縣吹䑓鄉梅嶼山先兆之側子男五人宗宇守寅定女四人􅇮余問學于薛士龍氏徃徃見少賔巳而與鄭純全真徃還全真雅從隠君子㳺間一至城邑必食􅃦於少賔之家余固心異少賔而未之知也前年官行在􅀁少賔􅆘赴調乆館於余師友鄭景望氏則日得與少賔䖏語是時少賔之從弟千秋待湖州􅁥酒闕年方少母老矣不樂其爲是官使来換縣主簿若尉少賔念人人擇便利􅀅誰聴吾弟昔授福州侯官尉推千秋嘗􅆘市見宜春走卒問其族子教授時者忘恙乎曰既亡矣爲之涕泣奔走以求歸宜春之䘮與其父母妻孥者累日余始知少卿之篤行全真之不苟合鄭薛二氏之常與居有以也其後益聞少賔生平少􅄝酒倔疆年三十盡捨故交竊聚糧走千里見黟人􅀁謂金先生者先生名梁之嘗爲奉新尉一旦棄官變衣服垢面罵市難近即􅀁可意復危坐講􅀃若經生學士然者最善鄭全真也少賔介以見卒然相懽飲之於酒家竟醉少賔盖留黟數月而後歸其􅀁云云懐不以語人廼更自􅀒恃愛惜非親黨慶唁未嘗出門巷獨旦暮與士龍孫䖏厚子詩相追逐上下議論士龍名在天下士爭趨和其言少賔亦自立我務不為同於子詩􅀹各出竒不相降下余頃聞滁州君初讀書天慶觀故相秦公在永嘉聞其名出不意杖䇿来覘之君方讀孟子書不為輟也秦因誦宋勾踐一章以感諷君君訖其去如初旦日且不還謁秦公再相有以君為薦者曰是固以三顧望人者耶滁州竟官不逹死幹辦君以布衣從大􅀅岳飛定群盗僅得官以死少卿稍貴亦坐言者謂尚胡寅趙鼎之學擯十餘年不用少賔志益壮連調官丁内外艱不赴晚􅁥湖酒名字􅂊出未㡬死矣胡氏父子盖如是宗来乞銘其可無辭叙哀之乎宗盡得外氏書率諸弟力學或者在兹耶銘曰璞也而或以為珉佀也而或以為真徒以屈伸云誰不泯吁嗟乎少賔承務郎陳公墓誌銘始余入太學故右文殿􅁱撰芮公為􅀕酒以士之有文行者職掌凢學之事而永康陳君聖嘉為選首余繇是與聖嘉往還甚熟嘗語余吾父春秋髙而吾之室亡矣因不復娶以與吾父同卧起者若干年豈忍一日離也而吾猶未免於諸生余聞其言而感之後數􅀊之官道過永康則聖嘉􅂑上第調䖏州州學教授遇太上皇慶夀恩授其親承務郎父子盖甚樂也明年秋聖嘉忽訪余行都衰經面墨拊膺􅂘拜曰某不孝某不孝不􅀎夀先君以及扵禄尚不敢死而来乞銘扵吾子以䆒大事惟吾子恵存之余既泣弔即辭辤未就會罷官東㱕又道其州邑往往􅀁至以其族子承議郎􅁥左蔵南庫公亮之狀訪公之為人頗合且得其軼事盖自熈寕變古役法不以主戸敏愿之士上公給事而浮食與政者􅁼皆􅁖少州縣不勝其敝里居者同患之然自好非詘與齒也公習見前事獨堅忍不屑去以隂平一縣之賦訟痛自㓗謹雖有督察之長欲求其一二過差而不可得故䏻䆒其恵愛扵乎使當秦漢察舉之法行其因是以著見必有足􅀚者而其志豈但若是哉以余知其子十年見其休戚之變又得公行事如是是冝銘公諱某字某其先自頴昌徙婺曾大父某大父某父某公善事親不以家事累兄弟教子不問費雖事科舉業試不利不愠與人交非軰行不􅂺相字於童穉未嘗施爾汝家甚貧猶施及親故晚嘗杜門讀佛書間一日出比鄰􅂬迎之訖年八十齒髮不甚衰變娶鄭氏先卒男四人志同志莭志質志剛二女􅆘邵去病倪資深男孫三人女四人以淳熈五年三月某日卒明年正月某日􅌾縣之長安鄊西山原公亮云而志同者聖嘉也銘曰謂為無位耶子姓以貴之謂為無傳耶鄊黨以譽之兹為其蔵後之人易忘也而我銘著之叔祖母韓氏墓銘夫人姓韓氏鄊先生汝翼之兄女年二十八㱕我族叔祖父歸二十一年而叔祖父卒塟􅀁居前山之陽後二十六年而夫人卒叔父某以淳熈七年十有一月􅁻奉其柩祔于山陽之兆盖夫人㱕比葬􅀊復庚子矣叔父泣命某曰吾塟以故緩而今屬吾子銘之也以尚亡悔某不逮事叔祖父不嘗見夫人為冢婦時事而見為母乆是時長叔姒亦惸寡家日落二小郎䁀盛門户冷􅀬異夫人中䖏與外絶獨教子讀書一女愛甚擇以妻國子進士韓公禀婦子或㣲過但色不怡婦子謝已則復常雖隣未嘗聞語􅀏聲者而室廬園田無秋毫損於叔祖父之舊叔祖諱某字某銘曰余叔祖父以善士稱叔父􅁇以善士稱族之願其妻若母者必以夫人也如之何勿銘馮司理墓誌銘君諱施叔字孟博以淳熈六年某月某日卒于家年六十以八年十月庚申􅁙于永嘉縣建牙鄉桐嶺之下娶魏氏再娶薛氏三男琳瑜璋五女􅆘吴仲洽林謙餘未行徃時吾郷尚名徳貴門地士大夫不苟為婚友永嘉如草堂先生張子􅂶氏經行先生丁某父氏瑞安如唐奥先生林介夫氏皆名家也數家子弟賔客徃徃可􅁛數君考諱光庭娶介夫之孫女因林氏君得從草堂諸子學復因張氏得以其仲姊歸經行之孫君三􅀊䘮母十五䘮父家益落而迄以讀書屬文得官居有善譽出有㢘績盖其􅀁漸習異也府君且卒召林張氏以其子為􅀉兩家合教十數年丈人課之婦女飲食衣􅀍之比君偕計書上名于禮部兩家奉酒相勞苦以為可見府君地下矣余毎論婚友之不可苟於君故有感也余娶草堂仲子思豫之女則嘗教君者也既習聞其􅀁繇成就如是而琳瑜又来問學亦雅馴不煩瑜也􅀅􅁙因述君官政家政累千餘言以乞余銘余嘆曰士䆠不逹志不究見何足用書有以孤兒受教于外氏致其身以無辱其父其可以無傳乎銘曰維古論人必某出君克其家誰從得亦惟厥考好逑匹我銘旌之後為則張忠甫墓誌銘忠甫為人嚴重深博善忍事鎮物絶有材智抑不使出其氣貌沈沈偉然丈人也年方少連五試禮部不中授特奏官忠甫每自悼不第進士雖䆠逹􅀅不得與文墨議論亡足以著儒效遂棄去以居養其母儀妻子是正朋友爲事盖晚而學詩書講誦數年既大通風人羙刺與古䘮􅀕上下之交立教微意以爲天下國家可推此而理此孔門之􅀁教而傳也益􅀒其學自刻苦貴愛或言諸朝禄以􅁥嶽忠甫謂徒費縣官亡誼歴三任不食其禄亦不書考執母夫人黄氏之䘮自飯含至于既窆凢􅀁以誠信其親者自括髮至于既祥凢􅀁以哀恫其身者質諸士䘮禮無不合也􅀄忠甫獨追古軰好䋲俗以已學無以寓見則時時爲文章銘人父祖有諷有勸皆不虚書於族姻之䘮爲之治衣衾棺竁絀巫佛強其爲此禁其爲彼人頗謂恠至交口哂罵之忠甫􅀃甚長而未之服予也及見其躬行極人之􅀁難然後翕然加敬尊信其􅀃有從之者雖不從者亦内愧莫之敢議也然而忠甫之言曰吾生不免爲今人吾行豈敢爲古人吾於閭里後進随和唯諾一若庸庸然吾何賢哉嗚呼忠甫盖己顧避黽勉如此猶乆而後與鄉人合使盡巳有耶人必且大恠冝愈難合使得其位施行之則必恠之者愈衆亦愈流落不偶不得其志故忠甫一意􅃘窮以死而非其釋然不屑於世也忠甫與其友薛士龍鄭景望齊名於時而二人皆仕矣士龍一見人主語意合且大用而為政者不恱去之以卒景望三入朝二十餘年其卒也位不過九卿二人嘗勉忠甫仕忠甫不應久之而道不行功業不就也則未嘗不壯忠甫之决而推遜其髙嗚呼是可不謂之賢歟忠甫諱淳姓張氏世永嘉人曾祖某祖某父某娶潘氏休寜丞蔚之女年六十有一以􅀊之元日卒以其年十有一年乙酉祔􅁙于吹䑓鄉桐嶼黄夫人之兆實淳熈八年也二子凢几三女􅆘􅀽州州學教授潘宇進士劉嗣僖盧趋􅀅􅁙潘氏曰吾夫子之友惟陳君在且余家壻銘夫子無以易君者然則某其可辭銘曰勇避而不趨人以為為異也愁苦以行之人以為為利也我師古人敦今不棄也猶有􅀑神殁其寜于地也章端􅅱墓誌銘淳熈八年九月日陳子端巳使来告章子之䘮曰端叟不幸旦日卒凢兩邑之諸生走相弔其自今􅀅誰紏合以卒業夫子宜聞而哀之余既泣受辭即徃之其廬會􅂘􅂘皆盡哀越月端已復来告曰端􅅱不幸未及有子以仲兄之子士則後􅁙日得十有二月丙午而士則也㓜不任事諸生分治其䘮紀而端已實刻其墓敢請於夫子余復泣受之曰是宜銘端􅅱諱用中平陽萬全人考諱某妣周氏恣聴端叟學端叟從余游最乆又因余之金華依吕公伯㳟之霅川依薛公士龍而其名遂載於人口耳性温良汎無不愛於乆故􅀎分酸苦扵先生長者能受其煩辱之役扵其徒相厲以學責難勸義定爲期㑹程式稽攷有誚惰㳺有罰其人嚴惮之則所謂江南書社也嗚呼死生之際可以觀人矣端叟無毫髪氣力無父子兄弟可以納交又無壯子也而两邑之士交吊聚􅂘爲之執事焉圖銘焉惟恐其有憾且遂磨㓕也是可以妄得之耶􅀂是固不冝銘歟娶葉氏先卒有二女顧言以季歸諸鄭氏姉之甥長托之友友合謀以余之兄子師宇爲之嫓盖端叟之志也銘曰距江五里寺曰寳積循除而西數十歩有壌􅂭然者吾端叟之宅也止過其下考視此石朱君佐壙識公姓朱氏諱興國字君佐温永嘉人考永妣王氏享年五十以淳熈二年十有一月卒君佐娶陳氏生子輙天以汲爲已後晚得光孫而君佐之䘮未練又夭陳氏為君佐之愛光孫也以拱源為之後三女適丁子羙項敏中陳宗渊子羙宗渊皆嘗薦國子學亦輙不第死盖君佐卒七年汲始克葬于所居里西山之麓且葬陳氏使為志焉陳氏余族姑而宗渊之姑也予方哀宗淵􅈱􅈱二女莫適顧託於是感余姑之經紀朱氏置孫以綿其祀乞言以不隕其名也喜且泣下而刻藏諸竁庻㡬其女不忍棄宗淵如其母然而亦以觧君佐之悲也葬以淳熈九年十有二月庚申冝人林氏墓誌銘建炎間天子柬㧞民譽之士一日而除䑓諌官四人趙䁀黎􅃀沈與求而其一人􅁥察御史諱惇禮者福州長溪楊君也御史生縝今以朝奉郎致仕朝奉生興宗嘗為尚書郎出知處州徙嚴州余所為銘林氏冝人之墓者朝奉之配嚴陵後母也盖名家三世矣嚴州使人謂余曰始吾大父連以郎官御史召不起晚日益窶興宗生四􅀊矣而吾母死母賢可頼大父日夜念之不樂也而求継於母家是爲冝人冝人雖歸不及大父顧託然竟成其意有信士不能然者興宗不善爲言猶能言一二以圖銘於子也冝人嫁橐費且盡而劉氏姑死吾父至無以買棺歛哀亂計不知所出冝人泣謂曰不有吾頭上一金􅁫乎鬻之而棺具興宗之爲太學諸生也使遺之金若干两曰吾所紡績得此以資汝興宗之得樹立其身以荅元母者冝人之賜也吾父從事臨安以其暇問養生於恩州李處士得其方一切屏事務自夀冝人故清薄亦即􅀅順毀飾飯菜爲浮屠氏學以迄偕老嗚呼以大父之不樂念此也至此而皆如其託言無咎興宗悲不能銘􅀂遂不銘豈唯宜人何以慰大父於􅁟中且冝人余同郡平陽縣人通奉大夫林公祀之季女嚴州考試乾道八年進士而余又辱為門下士夫論述鄉黨之羙與諸老先生家事以著之後世抑余志也冝人二十三􅀊嫁又四十五􅀊卒卒一􅀊若干日而􅁙實淳熈九年十有一月某日女婿陳萬章孫男女四人銘曰余嘗過括蒼見其人樂道太守之賢而逮事父母之榮􅀛井之原今為此銘孰無人心其永勿傾止齋先生文集卷之四十七
