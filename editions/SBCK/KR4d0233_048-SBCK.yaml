  text: 止齋先生文集卷之四十八
  hash: sha256:3e1eddbb4440f78bdfa3e97da37bf4074d9d15909e0dac6ce312a784c3540b49
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_048-1a}
body:
  text: 誌銘劉端木墓誌銘端木温永嘉人姓劉氏諱春以待台州教授闕卒于家大父機父立巳戴氏出也端木性冲約事後母孝與兄弟無違於朋友親故用其情然所藴􅈽貴不為人知貌言恂恂若庸人然見之者以為亡異也其試禮部余嘗問所為文何如但謝不􅀎巳而擢進士丙科復謝是適然耳他日過括蒼端木為其州户椽問政何如亦謝如初比謁其守與郡之善士亟稱端木綜理之才􅀁關白感風凢在官無及之者余與端木同入太學同為乾道八年進士議論徃復最宻至相好也自其文辭政事不欲使余知之况他人乎顧端木亡矣意􅀁欲施爲雖余未得盡知之也世多言古今人不同以余􅀚端木與書傳間所載深厚有徳之士異耶同耶端木爲吏三年守蒙其力然往往欲挑動之使自有言然後薦舉之近制選人滿􅀊無舉主且再試端木即怡然􅀅詣吏部而竟不言比其視古人特未知孰難也斯人也而在髙位則士或知耻矣少得疾良巳比罷司戸時疾復作明年淳熈七年閏三月某日卒年四十五又明年六月某日後母吴氏夫人卒􅀄娶朱氏某州司理叅軍某之女逾年卒再娶宋氏故御史䑓主簿敦書之女生一子小趙抱而飬之於其父黨今㡬􅀊十年閠十有一月某日宋與其伯氏奉呉夫人與端木之柩􅀅祔于屋前山之祖壠卜人曰未吉遂殯焉宋氏之弟昌囯主簿某􅀎左右其女兄於是殯又􅀎前事請余而爲之銘銘曰有相其􅀌系豈不昌有刻其墓名豈不長位若年耶誰尸此者天耶陳子益母夫人墓銘陳子端已自平陽􅀅父天錫之命来再拜乞銘其母林氏余方銘亡友劉端木未暇也迺即舘中越五六日請不已頃嘗過陳子之家見其父子兄弟少長坐立進退秩秩然無疾呼􅁀語無弗友之色於是端巳請辭曰母氏歸為冡婦逮事曽祖姑奉諸祖母以同居祖行無在者又奉吾父與世父母同居凢五十年矣一佀先生鄉所見然敢以是為銘首余曰吾得銘而母也婦徳莫如睦睦莫如􅀎長乆而母䖏三世之族且六十有四年而家人無改於其舊合二難矣徳如是人謂之何銘如是人謂之何陳子再拜謝幸甚其􅁙日淳熈十年閏月某日其地􅀁居萬全鄉管奥之葉原其壻朱次宣子明畏端巳彪也端已􅀙余學彪為比丘林民逹墓銘民逹諱恱姓林氏温瑞安㠶逰人祖考諱伯英考諱植妣孫氏娶程氏享年七十卒於淳熈十年六月癸夘男三人開聞誾女適章紱孫男女八人聞早卒程氏亦先十有四年卒初民逹􅁙程氏于􅀁居里之椒原已而遷茶原遷􅁙之十有九日而民逹卒開以其年十有一月丁酉合竁于茶原而来乞銘銘曰民逹善治生嘗為余言少遭父喪一日傭者數十軰立門請􅀁使乆不􅀎遣吾内慚於是夜為條䖏而旦授之日力半而功倍以故益矝􅁬志亦浸長盖民逹治生以恵為取以華為儉以善忍為断童僕鷄犬飬之各得其欲􅀣木􅂼蓏藝之各遂其冝亭榭門巷藩溷井堰治之皆中䋲墨也予鄉之言生理者歸焉嗚呼士習為浮辭以干有司之試苟中其度即得為官人予之州縣􅂺不理吏卒搶攘莫􅀎整齊向使不限科目以􅀎見推擇如民逹者陳力於世􅂚可少㢤民逹余里中人也計天下之大不但如民逹者何限然而世常有乏使之患余􅀁以惑也州城之南距瑞安為路七十里土石墊䧟行者病溺更太守數人欲繕宅之重其役不敢起民逹􅁣然夷十里􅀁以為式庶㡬當官者見知有氣力者相随和以自托不朽而亦弗就余讀太史公書至閭里布衣之士有節可以見世而不遇者皆録勿遺故余之銘民逹者如是云何君墓鋕銘􅀄東莱呂伯恭以經學教授天下之士靡然從之而其􅀁居鄉諸生􅀎自表見者為多吾宗同甫又嗣興之繇是東陽學者視它郡盛矣有何生造者與其族師􅀃一日以謁至余望見生容止恂恂其東陽學者耶與之語出同甫􅀁遺書果道生之父善教子逮學於伯恭甚乆造適遇述則皆從邵康佀之學佀之之學盖亦本吕氏書又言逮至今􅀎卒乃父教事諸咸受其兄教令為學不􅈈如父在時古者重師友不以其􅀜繫風俗如此哉生以􅀅祔其母杜氏夫人於父之墓既得銘於同甫而以追銘其父来請余余雅不善為銘且杜氏之銘併著夫君行􅁩甚羙雖欲銘之必亡以出同甫之意外然既喜得生又聞知其鄉學􅀁從来於吾心有感也而次之君諱松字堅才曽大父滂大父粹中父汝􅀎何氏来徙婺之金華盖不知若干世而家東陽者於君四世矣以善輯柔其鄉大姓積貲至鉅萬享年四十八於淳熈辛丑八月壬申卒越二年得癸卯十月巳未􅁙於縣松山鄉寳山原五子女四人壻郭江鞏嶸餘未行孫三人娶杜氏後君六年卒於是祔以君才力曽不得嘗試於世其平生不可得詳也余聞志莫難行於家名莫難著扵鄉如君之内事治與學士大夫無異不但整齊之詩書之習藹然其方興也斯不謂行於家乎入其國欲知其人顧衆􅀁尊信者與否何如爾同甫數数為余言冝銘斯不謂著於鄉乎以此可以觀考其餘矣銘曰相爾同穴有羙不亡以余銘君豈亦可長朱公向壙誌􅀄平陽之俗以速􅁙為不壞而其流入於隂陽家之􅀃與治賔客之事俗成則聞見熟聞見熟則異焉者乃反以為恠故雖知名之士不􅀎免也隂陽之􅀃余不知起何時而知其不出於三代也王季之􅁙也水齧其墓見前朝而後改􅁙重動危其親也如此由今隂陽家言之不祥莫大焉而王季子孫皆聖人也子孫聖與愚隂陽家固不論然造周数百年其不得為不祥也甚著若必曰改􅁙而後有此則文武之生乆矣其造周不待改􅁙也又甚著且三聖人者不知水齧墓之為不祥而不速改是不智也知其為不祥必見前朝而後改是不仁也聖人慮不及此焉而今日者曰吾慮過聖人是果足信歟然而舉世惑之何也彼委巷之民怵於其言者妄以其親徼利然也學士大夫豈忍以其親為利而惑焉者又何也吾友朱黼使来告􅁙曰某先君子以􅂭興元年某月日卒祖妣以乾道二年某月日卒而二伯母伯兄若弟卒亦若干年矣今為淳熈十有一年某始克以十有二月庚申􅁙祖妣于邑施巖之西原以先君子祔去墓百歩得中嶼又以􅁙諸母兄弟九四柩黼也大懼不克如礼經惟先生寵識銘之以免於罪又曰先考病且革有以上世墓不利請遷者先君泣禁之曰􅁀吾親之骨於地上而苟得活吾弗如死也又曰王母之治命曰而父生􅀎飬死不可去吾側他日􅁙我必以而父祔黼之言云爾誠如黼言其王母以祔􅁙為是苟祔􅁙雖死樂也其父以遷􅁙為非是茍遷􅁙雖生不楽則朱氏盖聞禮者也不惑於隂陽之􅀃者也黼誦斯言也以爲稱首乞銘若是而猶緩􅁙余故曰俗成則知名之士不􅀎免也余爲斯文既以慰觧黼之悲因以􅂆人子也朱氏世家平陽杉橋里黼祖母姓章氏享年七十八太學生陞之女父諱某字公向享年四十四娶楊氏子男二人黻早卒四柩之􅀁謂弟也女四人適某人某人一爲浮屠公向􅀎教黼章氏􅀎成公向志楊氏又世守之黼故得爲知名士云胡彦功墓誌銘余讀陳亮同父􅀁銘胡公濟之墓􅁣嘆天下之才有不能以文自進而老於閭里盖終篇三致意焉今見属汪萬頃爲其子彦功行状又亟稱其爲人同父閱士多顧少許可者而萬頃雅號長者不侵爲語言二君於胡氏父子如此有以也夫胡氏之世昌也胡氏家貲鉅萬中間少寛弛米塩靡宻愆其故常家事㡬􅆸而公濟且老矣彦功􅁬曰不可以當吾世害其家以戚吾親也迺一切屏故好背華歸朴向之園池亭榭變而爲枽稼之區向之賔客姻舊謝去而身與􅀠農同淡苦也如是数􅀊其冨如􅀄而彦功亦年巳五十於是更治亭園延致賔舊以奉其親觴豆爲樂復如􅀄於公濟之卒又求同父之文刻之墓上歸善於其父人常言􅆸興有命自一飯不可以智得少有變衰之漸則偷怠不復自強以至於亡亦異於胡氏父子矣彦功諱某起居造次如學者且死爲遺戒事事詳整欲以七日􅁙飯僧若道士必以鄉父老與僮僕之曽服勤者相半盖不惑於日者釋老家之􅀃得年六十四娶黄氏章氏皆早卒子男四人廷芳廷廷廷芳女適新岳州録事叅軍梁竦前監筠州酒陳兖􅀅仕􅀰曺致中黄公黼孫男女二十有四人曽孫三人萬頃之状云爾其世敘鄉里具同父之識廷芳以状識来乞銘余喜次二文之後為之書曰余聞東陽劇難治而巨室為甚頃過其縣􅀁次􅃕見其人徃徃敦朴敬客而崇師友今得胡氏事嗣興其家一以農圃為本自世􅀁謂兼并機變之巧者秋毫不肯也則其風􅁟固厚與􅀁聞反謬而為吏者􅁼以擊強為􅀎孰與訪求如胡氏者旌異之使他族知􅂆乎余為斯文以告来者因以為銘云承事郎徐公墓誌銘公諱迪哲字某姓徐氏世温之平陽人子􅁩吾友也乾道八年吾友之同第進士者獨余不幸蚤􅀌不逮事父母而諸君之親尚多無恙里中人往往以為賀未㡬連哭吊三四人至是又哭公焉方􅀄第時三四人者或在甲科或為禮部第一人里中之致賀者謂君旦夕䆠逹其及親冝如何而其親亦自喜幸甚今十三年矣皆為吏州縣􅁼不滿􅀊以憂去􅁩立朝稍乆以太常丞遇大饗明堂天子加恩群臣授公京官而亦命下之逾月以卒嗟乎士䆠逹不逹何足道哉而患故交徧至此余故於銘公悲以感也公慈恵篤厚不縁餙辭終其身於人怡怡其子弟厮􅃥無不意滿而􅁩復以經明行修善與人交聞於當世盖州閭長老嘗識公者見􅁩即喜以為佀公天下之士識􅁩者或見公又喜佀􅁩也􅁩年且四十未有子公念不釋已而婦娠又念萬一幸得孫而客都下保飬乳母未必善視児也即挈其婦還鄉得孫而公病矣􅁩倉皇告歸後盖棺之日始至公曰苟􅁩有子雖不在吾左右甚樂􅁩曰苟知公不死於其手雖卿相不願也大父某父某娶某氏年若干卒於淳熈十年某月以明年二月某日􅁙瑞安来暮郷明教院之後山長子之仁蚤卒於是祔銘曰夫完而固深坎而厚封樹者是誰之墓歟其子徐子之父歟惟其孝慈足以有此萬有千載誰非人子新歸墓表新歸墓表者為林氏作也􅀄唐奥先生林介夫􅁙其考妣於新歸唐嶼而廬於旁唐奥在瑞安縣治之北二十里新歸在唐奥西三里繇先生而下再世􅁙梓奥其孫諱松孫始祔唐奥之墓東百歩曽孫諱仲損又祔墓西一里􅀁凢􅀙先生考妣􅁙新歸者三世於是玄孫幬載將奉其母柩合焉余乃為之表吾鄉去京師逺自爲呉越而士未有聞者熈寜元豐之間宋興且百年介夫以明經篤行著稱當世以趙清獻公與其子㞦景仁􅀁遺詩次其􅀊月則先生名動京師矣自部使者郡守丞徃徃造其廬問起居况何如肯仕否耶先生方婆娑泉石之間作萱堂以飬母未暇出也客至厈床瓦豆具酒蔌以延之請與出逰則佳山水無不至者而特罕趨郡是時三經新義行天下學者非王氏不道春秋且􅆸弗講先生少從管師常學師常與孫覺莘老爲經杜者也先生故不為新學以其􅀃􅀼教授郷諸生龔原深之嘗以易學行世比見先生乃矍然顧恨識春秋之晚也於是永嘉之學不專趋王氏其後春秋既為世禁先生竟不復仕而周公恭叔劉公元承元禮兄弟許公少伊相􅁇起益務古學名聲益盛而先生居然為丈人行恭􅅩之銘沈子正也曰河南程正叔關中吕與􅅩與介夫同爲世宗師少伊亦云爾且曰非詩書勿談非孔孟勿為者以二公􅀁同尊誦如此然而海内之士知有程吕而先生獨教行於其鄉人以其􅀁居里稱之不敢以姓字他無􅀁㮣見焉豈非其居􅀔使然歟要之永嘉之師友淵源不曰先生之力哉先生諱石卒於建中靖囯元年考諱定妣戴氏三子諱晞顔字㡬老晞孟字醇老晞韓蚤卒㡬老醇老皆㳺京師從龔氏學亦不得夀家無壮子弟失其行事醇老一子曰松孫字喬年者最知名喬年少􅀌母曺氏改適城南張公子充嘗舉八行爲國子學録􅀁謂草堂先生也生張孝愷字思豫二子長甚相懽其尚氣節􅁭度易直與人傾盡儀容修整又甚相佀然皆事母孝喬年曰吾母也吾弟盍從以如我思豫曰吾母也吾兄盍從以歸我率不十日半月必相往還盖二人者在母旁傴僂怡怡唯謹退而論經史或世務即不相􅂑下語聲驚四鄰喬年有詩易學晚而好尚書其爲文雅潔而善道實事最厚陳公少南子􅀙之㳺女以嫁其友張仲謹喬年雅不樂舉進士少南先逹復以說春秋觸忌諱流落嶺表以死喬年遂與沈東羙謝叔望諸君修先生故事保丘墓善風俗自號兊光居士然至感㥽爲詩每一篇必曰憂邉云云紹興之季後進多䆠逹及言髙尚有舊􅀮典刑但曰喬年其􅀁藴抱人未必盡知之也娶葉氏謝氏皆逮事曺夫人喬年以乾道四年十有一月戊辰卒享年七十四葉氏先四十三年而卒謝氏後十五年而卒各一子其一人葉氏出者是爲仲損字炳之余及識其人恂恂而有守􅀎世其家者也娶東羙之子夫婦自以家法相賔友人之見炳之者則曰是佀喬年見沈夫人者則曰是佀東羙也其親戚相馴染率恩勤佀兩家吾里中人時節相問饋不絶有吊慶事父兄子弟皆至忻戚盡其情者必两家也喬年以事出母空窮不恤炳之與婦沈服勤米塩以盡歳晚之􅌚􅀄萱堂成士大夫多樂道之者至炳之祖子孫事其親如一人謂之萱堂林家云炳之以乾道七年三月癸夘卒年四十有九沈氏以淳熈十二年十有一月戊寅卒年六十有四三子幬載􅂦􅂦早卒一女適新福州古田縣主薄徐宏其一人謝氏出今仲愚也二子昕充盖新歸墓先生之卜塟其父也以嘉祐母以元符相距四十年後七十有一年為乾道四年十有一月甲申而喬年祔又五年為乾道八年十有二月丁酉而炳之祔又十有二年為淳熈十年十有一月乙酉而謝氏合于喬年之穴又四年為淳熈十有三年四月癸酉而沈氏合于炳之之穴凢一百二十有九年之間三兆六柩而㡬老之子諱夀孫字推仁孫興祖字慶之醇老少子諱時可字叔遇孫諱誠之皆以序從塟墓下而不得其行事故不著餘則祔梓奥陳某曰元符至今百年間天下亦多故矣自公侯將五世希不失者有以布衣而燕及其後載也從余學又以文行見推扵其友人以為林氏必大也嗚呼以􅀔利者如彼以德者如此哉止齋先生文集卷之四十八
