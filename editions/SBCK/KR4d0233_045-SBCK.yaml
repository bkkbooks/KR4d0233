  text: 止齋先生文集卷之四十五
  hash: sha256:ced08f17aab178a17e3741d3b6daff12842cdb51848ec2a89acaa947adce12a5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_045-1a}
body:
  text: 􅀕文􅀕兊光居士林喬年齊魯兩生視漢功臣為貴列國之千乘不如洙泗之一言世固有公論也公名不至仕版而凛凛鄉評不在諸賢大夫下夫豈求之嗚呼士之聞見公者亦可以興矣功名一時典刑千古形噐雖亡道徳如故我等親舊今来􅂘公三年之䘮於此􅀚禮自今余郷起孝起敬其誰作之睠言􅂄老澘然涙零何啻此夕􅀕王詹事吾鄉自昔諸儒有作剛毅敦龎是以為俗中更􅁠臣擯排其􅀹喬木云凋何草不秋誰其佀之惟公嗣興矻立堂堂萬夫典刑梅溪之原簫䑓之下公車不駕市無翔價簫䑓之下梅溪之原公休干廬巷無違言公行未乆公歸白首􅀖人父老欲執之手天子起之愛莫止之羽翼四海匪我敢􅀻忽焉此觴涕泗如水百爾有恨不如我同里􅀕芮􅀕酒嗚呼欲從先生㳺十年于茲盖亦數相遭卒幸相親也而受教不少延何哉天耶人耶前年寓㑹稽㑹先生為部使者有来言先生􅀅就顧汝某愧焉尋如毗陵弗敢見明年東還先生適長太學是秋􅀅攷試増置生員又以嫌弗敢見既幸備數諸生先生孳孳焉望某来也比至相待如賔交甚者從二子辱臨拜又命史持立無荅拜為是懼也又逾月弗敢告而去嗚呼誰謂先生歟而􅃍止此也夫苟謂􅃍止此也其寓㑹稽必無以愧自違也其還毗陵必無以嫌自拘也况為諸生冝旦夕左右侍而又何忍以過相待一頃舎去夫以位望之殊也法守之察也世俗之莫巳諒也顧小而失大其亦謂之人耶雖然自知求師友所得於天下􅂊數人耳去年􅂘劉莆田今年哭祭酒彼夀考者何限胡為於我師友頻􅀊而忽焉亡耶且賢者縱不得大用獨不可􅇔限遺吾黨耶且某也固無多求於世無乃亦不􅀗成就其􅀻志考徳而問業耶今夫汎相與􅁼有幸不至缺絶也是謂天耶非耶嗚呼一忤􅁠臣白首瘴郷公論既開時謂冝何位不過卿死無歸居豈惟門人有淚如雨祭張南軒吁嗟先生惟以正終如何嘆嗟四海所同欲知先生當􅀚之公軍旅有言魏公之子恵我律我魏公是佀如其即戎誓與偕死學士有言瞻彼洛師昔在文獻徃徃闕遺曰惟南軒尚其嗣之朝廷有言豈無他人吏道趍變經生泥陳必􅀂欽夫可以致君去欲其歸病欲其愈及此盖棺萬事永已亦有咎怨莫或瑕毀嗚呼先生位曽不􅂭曽不卑卑與人為通抑不立異􅀵聲于躬維學髙明維行粹夷維其待物一不以疑匪即求之人實秉彛君子在世勿問勿處譬彼川嶽無興雲雨三農頼之以藝稷􅁰矧惟世臣喬木勿伐矧惟儒術不墜一髮生􅀎㡬何而堪契闊徃􅀊玉山前年秣陵二公云亡今我涕零又􅂘先生我懐實并念昔從逰為日則淺辱誨辱愛辱待甚逺自我不見常懼有􅌤有来湖嶺必恵問我對之翰墨如在右左䝉是􅂚稱罔敢違墮家有藏書囯有太史雖㣲功業先生不死我心哀傷盖不以此􅀕薛常州先生我昔自喜壁立􅀝天見兄栂潭忽􅀂墜淵栂潭謂何其要日損自昜魯論餘勿挂眼明年㑹稽我圖西征匪適㑹稽從兄毗陵毗陵何有聚書千卷曰此百氏各有攸見維古相授待豪傑然我辱過施如何克傳約我􅀶我有源有涉譬彼草木自根徂葉匪我無師亦既多友繄兄不逄􅀊月空乆我無所願􅃿生為役于兄居㳺無以南北滆湖之上其樂未央為兄食貧去之他鄉兄使淮堧我客都邑繋名春官驅馳靡及霅川之招豈不欲往有婦方娠􅃈􅃈覊鞅會兄来歸我棲旁舎當暑之袢相期秋夜我嗟我命為此契闊矧今為虐復我中奪魚亦有依鳥亦有群我實何罪恃無其人顧瞻四方羣公日徂劉不在閩芮不在呉我居数人廼眷相顧幸踰其分罪此之故凡今海内知兄如林我雖庸陋特知之深我􅀚六藝師自為的書不見詩春秋無易我􅀚諸子其􅀃並駕佛老見竒申韓每下我亦􅀚人鮮不異止此有遺事彼有䘮巳自兄作興廓之大同以断群疑匠師涖工人之見之于何不一可以右左衡從伸屈我窺度之惟心之平豈惟不􅃜抑靡所増天不生賢生􅂺不試歎無全材雖全􅂚謂彼尺寸材功在夏屋而棄不顧徒為喬木凡今之人為此隕涕我獨􅀻憂皇恤當世世艱道逺而使我獨有書未完有徒未淑誄之以詩哀哉巳而莫知我悲謂我胡為􅀕林安之余㳺􅀚天下愽交當世之士以自治盖各有長矣矝畏潔修者或亡渉事之具䟽通雋逹者則放乎䋲墨之外而不可覊刳心而趨約者㡬矣又自六經百氏闊略而􅆸遺嗚呼安之余徧閱而僅有焉引而寘之諸老先生之門亦不數數焉見之忽今亡矣余将奚望而誰期余㳺具區還會稽棲遲台鴈諸山之間人迹㡬絶安之徃徃先至而後歸金華之行積雪埋嶺安之之疾侵矣而猶不我遺夫十年﨑嶇不便于家不利于有司不皇寜于其躬而無怠無悔是果何求者歟此意􅄫寥非篤學深思者未易與知也今年未四十多病而早衰自􅂘薛常州而百念弛矣獨􅀅求古人之書日與吾徒講玩以卒􅀊而安之且死則吾志焉徃而可為世有公論於安之自不泯􅃿而非􅂘之慟則不足以塞予悲也􅀕諸􅁑夢叟嗚呼夢叟死生安計昔􅀊薛殂今兹君逝朋友相期扶持絶學慨此存者晨星夏籜君之學問不為逕庭曰意苟誠萬物受命固嘗講論兹道閎大尺矩寸䋲其施或隘君曰余聞力行以􅂶力之所至日月未窮閉戸十年讀易求志朋友謂君不仕無義授官長樂勉君載􅂗曾未及朞上下交孚少出所蔵巳有端緒遂昌熾之豈不大肆衆目棼􅁝萬命流膏天意何如遽奪人豪維昔子厚託韓以死君殁見貽琅琅及此㣲君之屬於義猶然我力可及敢不後先酒體在壷脯醢列几酌古陳奠永承君意學官同􅀕王司業公於載籍􅀶覧強識上自班左旁洽百氏然不為空言而巳試之一二其於詞藻清潤豊媚而亦無断章半簡刻畫名家之意至於心度純明發為樂易望之簡如即不忍去情親語狎間以諧戯俄而肅歛訖事以治盖庶㡬徳人之容非尚同者之􅀎暨􅀂夫流離虜圍其年方穉南望君親生以為媿間關萬里卒伸大􅁩是又壮夫節士堅忍僅克而得之天與匪􅇉匪諭嗚呼諫垣數月攄藴則未十年外服帝獨簡記晚歸周行善人有比兩學是師用有次苐士論方屬乃衘不施某等於官為僚有嚴位置公忘䓁衰家人儕􅀋絶去繩􅁤恵風和氣胡然山立而忽淵墜靡人不懐我獨切至寓哀斯文百􅁓莫旣􅀕張簡之余讀架閣公犬人之誄盖聞兄之􅀎服勞處約有孝敬之遺風矣晚見其行事自叔父一研一席蠧書敗簡汛掃䖍蔵旦旦不􅈈施及米塩講若疇昔余既謂是誄也信而於是重有感也盖余為壻恨不及架閣公無恙然猶及兄拊諸弟奉仲母以􅇛居也俛仰之間事變不齊西東其廬几筵相望弟衰子經室自為􅀌嗚呼此余所以重有感也余辱歸妹最知最厚於兄卒葬屬在疾苦歛不慿棺􅉎不拊穴所以􅄒其平生而銘諸幽者亦不得掛名焉廼今彌年克具觴豆叙徳寫哀因以自鐫魂猶可招其在斯文􅀕鄭自明嗚呼哀哉自明余與君㳺乆知君之重其死也自為諸生固曰士以一死何郷不可及其居朝抗直自喜毎一進見以所聞於賔客厮􅃥某小人某小人之􅀃察察爲上言之無諱人數以爲甚危而君益􅁬然雖萬死無恨然而閱其􅀻盖衞生甚謹也嘗訪君愛亭之上當暑命酒余食􅀲果而君禁之勿多食他日過余􅃵􅌲以饋君曰疇昔聞有以茹此死者至今不近也啜茗飲水靡不􅀶問恐以疾傷其母嗚呼君誠重其死而􅀅有以處此矣廼今死竒禍何哉余既甚悲而莫推其故且懼知君之不詳者亦爲惑也天嗇其年人害其名嗚呼哀哉自明余故爲斯文以􅂘君也􅀕劉端木嗚呼端木而止於此歟謂其容貌不澤齒髮衰變而無夀徴歟謂其疾聲遽色太喜怒以干和歟抑謂其強心於事而敝敝其生歟而端木咸無焉然而止此将安咎也嗚呼端木其心􅀅以仁其三族其學􅀅以著見當世而庻㡬於右人其儀抑抑其言恂恂至於居為畏友出為拂士而取予之際􅀎不以不義加乎其身於今之世吾見亦寡矣豈古所謂直諒之益木訥而近於仁者耶晚得一官無損於貧母老子穉旁無強親盖擇地而蹈報効如此此某等所以哀􅈼之天莫知所云也祭鄭龍圖嗚呼道之不明亦既千載宋興用儒􅇽育數世故經術盛於伊洛而王化行乎元祐之際秦漢而下庻㡬三代于何文獻奄忽淪替中興厈扶欲起復蹶晚生小子散無紀繋惟公及從渡江諸老尚有典刑之學不墮紹興季年靡然流俗之弊本之躬行加之講肄􅂶養和平議論方大析義利於秋毫兼愽約而獨詣盖伊洛源流與元祐之視摹於是乎在苦節至於長貧靜退見於􅀄筮揚名二紀之乆致位九卿之二既物論之惟􅁢殆天意之􅀅契我􅀚人物可為流涕瞻前靡及顧後孰継公於此時譬之東方未白明星晣晣續飄零之餘緒道倐歘之亨㑹方有識之自寛俄覆出於意外嗚呼哀哉痛在吾黨事關海内矧余從㳺辱誘以誨􅃕曰諸生視之流軰至於非望之期不言之愛儻手援其有益雖身危而不悔嗟今巳矣逝􅀅安頼祭具殽而輙止文把筆而屢􅆸以遲遲之不忍尚發明而有待竟余懐之弗究􅂓一哀於此酹􅀕吕大著嗚呼理固難言事堪永嘆尚斯文其未熄儻千載而一旦自夫孔門之徒盡經術闕馬遷而下史法亂㣲言卒堕於佛老多識不離乎箋傳惟公紹絶學之遺綂緬潜心於一貫立六藝之要津渉九流而弗畔既超乗於先得亦加鞭於後倦可謂明古人之大軆而􅀎通當世之変汎􅀚人物粤自秦漢勲臣檀其噐略儒雅􅂭於詞翰通人焉草草法士焉断断以余觀公與夫專善偏長之士豈可同日而論哉􅀂乃推本皇家講明文獻以為藝祖造􅀖上規周室而仁皇継軆之際庻㡬於羞道管晏痛小雅之未復先群疑而獨辨推公之志歐富韓范緝熈寧之墜緒振元祐之餘筭又􅀅㑹同錯綜招携集散囬萬牛於絶靷手六轡以徐按合當代之玉石出中原於􅂗炭盖自渡江諸老皆有遺恨者也嗚呼憶學者之􅀄識恠伏熖之方煽及脩門之晚別幸後會之猶徤相此意之攸屬􅀂一軆而中判年偶同而智遲名近佀而實逺溘騏􅂹之先徂望􅀌征於欵叚參移􅀆斗􅃿長夜􅀆漫漫耿余懐其何極訴之人而有恨望新阡而長號兾精爽之一盻􅀕朱處士嗟乎學問散於殊􅂗而尚徳之風鮮選舉出於一科而遺賢之恨多幸清議之在下而􅁻人猶有自修於其家維公行􅁩可以堪宗婣之蹤跡􅁭度可以受師友之切磋位卑而樂施予齒老而工編摩自三尺之童待之􅀂軰行而於一郷之衆未嘗有所誰何以余百念之俱冷而聞公之訃至於屢嘆而長嗟文以悼之我辭不訛非士無誄刻之山阿􅀕章端叟吁嗟端􅅱今孰不如問其位年弗逮彼愚吁嗟端􅅱相爾志慕盖逹􅀅與當代諸賢在文墨議論之選而窮亦庻㡬可􅀕於社識曰君子之墓中閫無相􅀉孥于旁盗􅀐屋山田園半荒士而至此可以悔矣而猶朋師不以四方誰為夏屋䏻置松柏于何雪霜不待盈尺安陽之南豈無士友胡獨端􅅱􅂘者十九或歛之床或沐之柩百爾無恨何必爾後余二十年交滿天下自春徂秋三泣大雅涕曾未􅀵復奠斯斚侑可無文其尚忍寫􅀕張忠甫夫人鄭子􅀅官由拳維夫人之子贈言卒篇曰予家耄弗暇顧官我感夫人為之涕漣少學旁舍動經􅀊年今我求母而為隴阡􅀂彼有母亦惟故牽東西居㳺各天一􅁁借云懐依無􅀎粥饘亦有􅀅母朝芳夕鮮老與穉等于家之便百爾好羞不如式還曾是無憾惟夫人也全固也有子而誰俾然相他人無􅀋以利言㣲禄㣲爵至莫子憐矧夫人子豈時舎旃再縻之祠盖云惓惓有如夫人願其翥軒豈敢自必乃林乃園凢此克孝厥安以專匪子之為羙夫人之賢惟賢實希近在乎婣聮嗚呼云亡見不自先􅀕孫忱卿嗚呼忱卿而死於逆旅歟謂其藉禄以為養歟則田園室廬於吾鄉可以甲乙數也為好馳聘倦㳺而至是歟則疇昔端居簡出雖隣不覩也抑為以資以世以塲屋得官而􅀔使然歟則舉不出此也夫士散而之四方略不過是數者而上焉者則名在當世欲退蔵而無繇也忱卿可以免此而卒以逆旅歛嗚呼是不謂之命耶雖然有鄉黨為之辦護有婦族為之受吊者先事之三日壮子適至而帥相聞之歸其鎮之逋俸為錢三十萬而凢事無缺以忱卿之得此又可以見天之報善人矣薄奠告哀文以慰之􅀕妻母趙夫人有言城南張氏稱首架閣之配草堂之婦曰惟夫人相其孝友有言安固賢惟趙氏辟雍之孫郡丞之子曰惟夫人是習是佀傅良鄙人辱交忠甫是於架閣則其叔父爰及婚婣夫人季女我􅀚季女以我貧困旦旦謀食歸田是遜匪教之素誰與無悶相彼從夫及閫外之議相彼愛子惟區區是遺靖惟夫人厥婦之懿自我来壻不見前作夫人猶存可以􅀚略今其亡矣􅀅安儀度我是以􅂘之斯文而誦夫人之賢尚来者之知昨􅀕孫諌卿吁嗟諌卿無年謂何彼日􅆷生白髮醉歌亦有苦心利析秋毫孰如簡靜曾靡殫勞亦有﨑嶇􅁀衣露冠胡然深居而祗自殘薙草彌原匵玉易毀謂天昭昭莾不可理我生空匱多朋為冨比年不圖交吊継訃匪我􅀻哀善􅀋之憂忌予是懲好予是􅀹吁嗟諌卿稚婦弱子殁與兄訣一語一止豈無胡耇終也􅊕惑世有􅁠衡誰為喪得吁嗟諫卿盖事盖棺誰俾吾黨聲為爾吞􅀕張忠甫吁嗟忠父誰無死生短長㡬何胡足重䡖崇牙大纛百年之榮孰與身後誦其字名君行之脩君學既成方其獨行群聴以驚有譁咲譏不悔不傾卒厎于信家人父兄既信而從􅀖人友朋有官問政有故問銘緩急之請是非之評隠然衡門重於公卿自昔盖棺萬事愈明無禄何哀不朽有慿我媿則多事違其情君臨人䘮治其衾衣或設之􅀕稽經考儀割絶肺肝放像爼彛其為銘文刻切恠竒葬視其穿風雨必時今我喪君􅂘不及尸曾莫得詳何以歛之􅀕以今羞雞酒瘠漓銘又弗䏻撰徳慰悲葬也屬疾護棺以児遭時之偷交道日衰我不􅀎惇又以自規唯是子凡昔在􅆍闈受君託言永矢弗隳吁嗟忠父其尚肯来止齋文集卷之四十五
