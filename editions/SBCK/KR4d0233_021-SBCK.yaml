body:
  text: 止齋先生文集卷之二十一奏状劄子轉對論役法劄子臣不肖頃以備員郎官􅂪恩賜對甞奏三劄専論民力之困然熈寜以来生財之害粗及梗槩未敢悉數而玉音嘉奬至于再三退切感激遭際如此􅁇今可以畢其􅀃矣今者適充轉對之員敢以奏劄數内免役一項先爲陛下誦之而因究役法之􅁦庶㡬采擇以救斯民於不勝其病之後􅀁謂免役錢者本以恤民使出錢雇役而逸其力也自罷募戸長而取其錢今􅀠緫制熈寕五年罷十年以其雇錢别樁管紹聖三年再雇建中靖國元年再樁管紹興元年起發九年罷十年月拘收入緫制窠名罷募壮丁而取其錢今􅀠緫制熈寕七年罷十年以其雇錢别樁管紹興十二年十月抅牧入総制窠名罷募􅂄長而取其錢今􅀠緫制熈寕八年罷十年以其雇錢别椿管紹興五年起發九年罷十年九月拘􅀵入総制窠名而又以三分􅃓手雇錢建炎元年増置弓手二年民戸役錢更増敷三分以贍三年罷紹興五年三月拘􅀵入総制窠名一分寛剰錢二年封椿四年罷政和三年再封樁昭興五年起發九年罷十年六月拘􅀵入総制窠名盡􅀠緫制而又以罷虞候重祿錢宣和三年陳亨伯奏罷五年拘收克糴本乾道四年拘􅀵入緫制窠名起發罷諸州曺官當直散􅀙官雇錢宣和五年拘􅀵克糴本罷學事司人重雇錢宣和五年拘􅀵充糴本宣和糴本之􅀋盡􅀠緫制至於官戸不减半役錢建炎二年起催紹興五年起發乾道二年六月拘􅀵依經緫制赴南庫在京吏祿在京官員雇人錢在京吏禄毎􅀊下淮南兩州十二路起一萬四千五百貫政和元年毎路量添五百貫在京官員雇人錢紹聖元年立一萬貫為額扵十四路起發政和四年毎路量添三百貫之􅀋又令項起發則免役錢之在州縣者日益少而役人無祿者衆矣夫使民出錢募役而逸其力未為非良法也而反􅂑其錢以贍他用既􅂑其錢以贍他用則必且白著而役法不得不壊何謂役法壊今天下州縣之胥皆浮浪之人而郷村催科專責之保正長是也以州縣浮浪之人行遣公事蠧民誠甚然未易改也臣不暇論若夫鄊村保正長任催科之責破家蕩産者徃徃而是獨柰何弗救乎且夫保正長催科非役法也以保甲法亂役法而行之也臣請言役法與保甲法之異臣謹按熈寕四年八月十一日行免役以鄉村第一等人戸分為甲乙丙丁戊五等第二第三等人户分為上中下三等第四第五等人户分為上下二等􅂄長於第一第二等户輪􅂶一年一替與免户下本年役錢一十五貫文如本村上等人户數少即更於第三等内􅀙上輪􅂶壮丁於第四第五等二丁以上輪􅂶半年一替並不岀納役錢戸長於第四等召募有人丁物力者􅂶一稅一替逐料夫盤纒錢五貫文此役法也臣又按熈寕三年三月九日行保甲凡十家為一保選主户有心力者一人為保長五十家為一大保選主戸最有心力及物力最髙者一人為大保長十大保為一都選主户最有行止心力材勇為衆􅀁服及物力最髙者二人為保副保正凡選一家兩丁以上通主客為之謂之保丁此保甲法也役法者五等簿長也保甲法者魚鱗簿是也五等簿者以通縣計之自第一至以其户强弱各自為簿魚鱗簿者以比屋計之自第一都至第㡬都不以其户強弱併為一簿各自為簿即第一等之中雖有强弱要不失於上戸第二等之中雖有强弱要不失於中户以其力略相等故其役均併為一簿即或一都之中適多强户則歇役之日長或一都之中適多弱戸則歇役之日短或一都之中􅃴皆弱戸則扵其中不得不推排一二以為强户則無復歇役之日以其力相殊􅅸故其役不均此甚較然矣方行保甲但以機察盗賊而已與免役􅀄不相関熈寕七年始以保丁􅂶甲頭催税而􅂄戸長壮丁之屬以次罷募利其雇錢而封樁之法起矣元豐遂著為令以甲頭同大保長催科元豐賦役令諸郷村主戸毎十戸至三十戸輪保丁一人􅂶甲頭並須同大一保催租稅常平等錢嘉祐以前未有此令元祐匆匆復舊随即紛更紹聖二年二月詳定􅀁言郷村毎一都保保正副外大保長八人其保丁輪􅂶甲頭皆最下戸人既不服事率難集按大保長各二年替冝以都保租稅輸二人分一梲一替而罷甲頭於是催科悉用大保長矣由此言之大保長催科尚非王安石之舊特章厚為之也今士大夫固耻言安石之為人乃若章厚則指為罪魁皆知其殘忍不恤敢於斵䘮祖宗深仁厚澤之意而獨世守其刻薄之遺術以爲成憲臣實未喻萬古􅃥法一王安石􅀎改之章厚􅀎力行之方今仁聖在上宰輔極天下之選而賢俊滿朝矣謂爲無人䏻斟酌損益以通其變臣亦未喻且今之困民力誠非一事而􅃥害最大中人之家破蕩相􅁇有以仁聖在上宰輔極天下之選而賢俊滿朝如此乃坐視斯民最大之害持章厚􅀁爲者若出於三代之舊而不敢議有輙議者不過付之有司檢坐見條申嚴行下以塞人言臣􅀹未喻也陛下加憫元元甚於赤子誠不以臣不肖妄論成憲下臣此章令侍􅀙䑓諌而下推究其􅀁自来而雜議之要不以保甲法亂役法雖未足以盡寛民力實大恵矣臣不勝拳拳封事紹熈三年十一月臣一介踈逺才不逾衆人而多病早衰齒髪頺變久無榮進清顯之望間者􅀅指湖湘罷弗勝任甞上奉祠之請乞便醫藥不謂陛下過聴不以臣爲不肖㱕以畿節留之郎舎賜對便殿􅀄無建明而天顔開懌玉音溫厚曾不數日擢貳冊府又未㡬用以爲皇子嘉王府賛讀官極一時儒者之遇臣誠不自意陛下待之甚寵也不勝大懼無以塞遭值之責日夜思念獨有與二三僚友共秉一意爲大王道古今父子君臣之際人之大倫天地之正義以成孝敬長恩愛無􅀒任使之意死且不朽盖甞讀書至文王世子之記曰文王朝於王季者日三鷄􅀄鳴衣服至於寝門外問内侍之御者今日安否何如内侍曰安文王乃喜其有不安則文王色憂行不䏻正履則必反覆爲王誦之曰是可以爲法事親若文王則受命作周本支百世功徳見於雅頌願王慕之倣之勿以爲不可及也至漢戾太子之傳曰親戚之路隔塞而不通太子進不得見上退則困於亂臣獨􅁈結而亡告則亦必反覆為王誦之曰是可以為戒事親如漢太子則交兵闕下父子不相保而望思㱕来之䑓天下悲之願王警之懼之勿使萬一有此也頼天之靈社稷宗廟之福而太王姿禀純明嗜好鮮少不自貴倨喜親書生每得僚佐危言極論則深信而不諱忌至若周之􅀁以得則歛袵加敬漢之􅀁以失則嚬蹙不忍聞也邇者主譽日彰人心日附臣與二三人者􅀼相欣賀以為陛下有子􅀦家無疆之休也今􅀼有惑焉㑹慶誕節陛下闕上觴之禮而弗講長至大㑹陛下復闕稱賀之禮而弗講群臣迫􅇶妄窺聖意臣固知陛下自違豫以来雖及康復尚弗便於乗輿而怯風霜雖然非􅀁以為訓也何者區區陳􅀃無過口耳之感必不䏻勝躬行之化汎􅀚徃古無過􅁓上之習必不䏻如家傳之法今陛下上􅃜三宮之􅌚而下責小臣陳􅁩於冡嗣以庶㡬寡過則雖怉血誠之忠未見其􅀘􅀅以逃斧􅃏之誅而已楚王有言人之愛其子者亦如余乎陛下以􅀦家無􅆠之休託在一子冝如何愛之而偶不察夫􅀁以儀刑之道如此顧使講讀皆爲空言名曰輔導安用臣等此􅀁以痛惜此舉動非􅀁以爲訓也臣以多病早衰齒髪頺變久無榮進清顯之望方申祠請以便醫藥不忍黙黙昧死爲陛下一言以冀省悟伏􅁓流涕不知􅀁云是時夀皇聖政書成巳䧏指揮十一月十四日進呈忽長至日駕不出宰執以下不勝憂惧是日􅁍付出聖政序内翰李巘獻之􅀁撰也翊日丞相進呈上云可别令人撰入既進入宸翰遂出於是過宫辭免起居舎人申省状准尚書省劄子備奉聖旨陳傅良除起居舎人某忽拜除命懼不遑居伏念某踈庸之資淺陋之學重以病餘齒髪衰變介在衆俊是爲陳人而自再入􅁱門疊冐殊渥甫綴郎曹遂領冊府􅅻及半載復有今除且夫侍立記言舉世之􅀁攷信直前論事在廷之􅀁􅀚瞻冐而居之實逾涯分而亦非􅀁以安數竒之迹全靖共之操伏望朝廷特賜敷奏亟寝誤恩以輯公論十二月二十四二省同奉聖㫖不允辭免兼􅁠中書舎人申省状准尚書省劄子三省同奉聖旨陳傅良兼􅁠中書舎人􅀼以攝官承乏暫時使令力􅀁克堪不當辞避惟是掖垣之職関係非輕盖辝令不工則不足以發明主徳封還不競則不足以慰滿公論苟非其人難以一朝居也伏念某才藻衰落無華􅀦之文志氣銷堕無囬天之力若使甞試爲之必見􅇅誤此􅀁以聞命震惧湏至控免而况環觀在􅋝英俊林立或兼數噐􅅻効一官則寝此誤恩改恩改􅂌他士不惟寛小巳共二之憂亦足成公朝選衆之羙伏望朝廷特賜敷奏曲􅀙􅀁乞四年正月十九三省同奉聖旨不􅁢􅌳奏劉煒與監司差遣状准尚書省劄子節文三省同奉聖旨劉煒首議禁戢􅀻錢今已見效依舊與監司差遣臣寮上言乞賜寝罷二月六日三省同奉聖旨令以次官書行劄付臣湏至奏聞者臣􅀼以劉煒甞為監司以言罷去今既旬􅀊循省云乆陛下念之再與元来一等差遣此乃朝廷起廢之常典人主棄瑕之羙意求之故事前後施行似此非一盖亦無可争執者矣獨縁特䧏批旨稍関事体即與㝷常行遣不同此後省􅀁以不無疑惑湏至論奏臣愚欲望聖慈特垂天聴􅀵囬批旨􅀅劉煒只依常行起廢事例候有􅇅次随冝差使如此則雖臣書行而當官之人可以自安不至再有煩瀆且亦以免劉煒煩言滋至之累謹錄奏聞伏候敕旨二月􅀄九日奏入留中􅌳奏刑部大理寺鄢大為㫁案状准中書門下省送到録黄一道節文為刑部大理寺状吉州奏勘到百姓鄢大為􅀃合已㫁人李一討合㳺六等各持杖行刼朱三家榖物􅂍滿按法寺􅁛其鄢大為准條為絞刑上定㫁合决重杖䖏死二月十四三省同奉聖旨鄢大為依㫁令臣書行縁事干人命湏至奏聞者臣􅀼詳上件㫁案止以鄢大為􅀁􅅁刼榖木檐堪以害人定為持仗强盗賍滿五貫合决重杖䖏死設若不以木檐為杖即計賍湏滿十貫方得死罪死生之分在扵木檐􅁛仗不􅁛仗毫厘之間此不可不謹也臣甞習此矣在律仗謂兵噐杵捧之属餘條􅁛仗准此恭惟本朝列聖繼作刑日益􅁿以為杵棒立文該載未明則犯法者易䧟刑者衆於是重立兩條案嘉祐編敕賊盗門其一云應持竹鎗竹杖磚石之􅁼為盗堪以害人者並同持仗之法此謂苟持竹鎗竹杖磚石堪以害人之物而為盗者即為持仗以明但持􅀁湏之物為盗不得稱仗矣其一云􅀅鎌檐刀斧之属於人園林陂野内偷割禾􅂖􅂼果盗斫柴薪之􅁼元非積聚者并􅀅篙楫盗取空船或持鞭杖偷趂孳畜雖變主知覺但不曽施威力抵拒者依不持仗􅀼盗法此謂苟持鎌檐刀斧􅀁湏之物而為盗即不為持仗以明必是特持堪以害人之物為盗始得􅁛仗矣上件两條合為一編載在敕文則有司承用可以參照不至牴牾至於元豐刪修舊敕一時不深求嘉祐以前立法羙意輙􅀅上件两條離為兩門其一條在名例門云諸稱仗者持竹木磚石之􅁼堪以害人者同其一條在賊盗門云諸於城外􅀼盗無人防守特持􅀁湏之具者並為不持仗注云謂採斫湏金刃船栰湏篙楫􅀒須檐畜湏鞭之􅁼盖自􅀅兩條離為二䖏即凡用特仗之法只㩀名例門立文凡用不持仗之法只㩀賊盗門立文而兩文始不相參照無􅀁斟酌矣兼詳元豐刪定嘉祐敕顛倒本文已失􅀄意謂並同持仗之法改作諸仗者節略數字便成深文謂删去鎗杖但称竹木自元豐迄今有司遵用盖不知重報者㡬千人矣今来鄢大為之獄只是布袋并檐即不曽施威力若用嘉祐舊敕即非持堪以害人之物為盗明矣且夫前朝立法夲持􅀁湏之物為盗其意非是欲以害人雖斧刃不謂為仗本持堪害人之物為盗其意是欲以害人雖磚石得謂為仗但論其盗有無欲害人之心不計􅀁持是不是堪害人之物原情定罪此春秋之義也又云持仗在外空手入屋罪至死者各减一等即雖持仗若其時不以入室可以减等又云變主知覺但不曽施威力抵拒者並同不持仗即雖持􅀁湏之物若其時施威力抵拒可以加等可謂深切著明矣而元豐改作離析敕文今来有司尚循謬誤臣愚欲望睿慈特􅀅鄢大為之罪􅀙未滿十貫條特貸命㫁遣仍乞以刑部大理寺擬㫁官吏並且免坐失入之罪仍乞􅀅見行條法送刪定􅀁㩀嘉祐舊敕􅀅兩條刪潤併入賊盗一門以憑遵守臣聞中興之􅀄重修紹興敕令已有指揮用嘉祐舊法故元豐敕多在􅁵改之科數内持仗一條當時有司偶失叅攷尚未追正今来若行刪潤􅀄非剏新衝改而聖主好生之徳公朝􅀙恕之風自今以始益深益厚愚民無知雖似幸免而天聴甚卑冝享其報此臣􅀁以拳拳也􅀁以録黄臣未敢書行謹録奏聞伏候敕旨貼黄或難臣曰嘉祐勅稱以鎌檐刀斧之屬必􅁇之以園林陂野即􅀂持此物入有人居止之室便得稱仗臣􅀼謂不然園林陂野固是與有人居止之室相對立文􅀼詳元敕有持仗入有人居止之室􅀼盗者依不持仗強盗條定㫁之文􅁍無持􅀁須之物入有人居止之室强盗者依持仗強盗條定㫁之文以此推見只是辨盗者􅀁持本意安在茍是持堪以害人之物入屋為盗雖􅀼盗可以加等依强盗條故為之立文苟是持􅀁湏之物入屋為盗即雖强盗不可以加等依持仗强盗條故不為之立文以其文之有無曉然明甚伏乞睿照二月十六奏入得旨改斷上嘉王劄子某等皇恐僣越有迫切之懇仰干王聴近者主上車駕再不過官宰執侍􅀙相與論諌至於一再而上意猶豫未决中外惶惑計無􅀁出獨以為䏻賛乗輿之决為主上言此者莫如中宮䏻通宮禁之情為中宫言此者莫如大王又以某等忝為潦佐辱知最深亦冝為大王言此以成父子之盛徳迫於公論不容􅀮嘿某等􅀼謂父子之愛根於天性假如主上稍惑愆於朝謁恭想重華未必便有間言只縁乗輿已駕衛􅀙羅列百官下司夾道起居六軍萬姓望塵踴躍伺候移日俄復中輟以此極駭觀聴反招謗讟又既饑弗得食勞弗䏻息長嗟浩嘆徃徃􅄹路都人寒心恐有不測此皆大王之􅀁親見中宮之􅀁與聞也今不為計後悔何及某等欲望大王力請扵中宫以調娱主上為巳任備極左右之飬順適起居之節上意有􅀁不樂則為之彌縫下情有􅀁難通則為之啓導至過宫日分期於必信號令已出風兩不渝如此則北内􅌚愉外廷恱服中宫母儀之羙配於古人大王子職之譽顯於天下蒼生頼之社稷頼之豈惟女史之光儲君之福哉直前劄子臣待罪右史日侍清老恭覩陛下大昕視朝天顔肅穆垂衣拱手尊嚴􅀂神凡􅀁施行悉中機㑹凡􅀁延見曲盡謙勤未甞有一話一言匆猝過差一趨一歩俄頃失錯可謂動容周旋中禮盛徳之至者矣近者車駕過宫日分與引班直換授之時百官有司伺候移日竟成中輟各自引退臣切惑焉何者平居暇時曽無過舉何獨至於六飛戒嚴百辟就列却乃深䖏九重都不省記近在旬月頓違常度者哉而軍民籍籍妄生謗議轉相倡和無􅀁不有臣雖至愚固知陛下之不如􅀁云也反覆思惟乃得其故盖自徃􅀊之冬聖意甞有不能釋然者矣為之震怒至於愆和甞􅀤威㫁痛有行遣由此宫掖之内人人自危宦官嬪御皆有㱕過君父之心徃徃故作縁由欲開間隙毎至期㑹上曉冲􅁭所以或於臨軒而爽興居之節或於命駕而􅉻號令之信陛下天資仁厚不察其為誤已臣所以深惜陛下無故而得怠荒之謗也臣聞人主之心當與天同今夫太虗清明天之體也􅀅以潤物則為雨露􅀅以動物則為風雷􅀅以成物則為霜雪俄而開霽天體湛然纎翳不留三光如故若夫人主喜則為賞怒則為刑刑賞既行更何疑滯心宇㤗定即天徳也豈容欝欝有所不快自古帝王盖有䖏世故之難遭人倫之變者矣要以宗廟社稷付託為至􅂭天下蒼生関繫為至重莫不先定其心期於克濟是故父母未順舜有南風之歌兄弟不咸周有棠棣之燕是皆轉禍為福身致㤗和不聞以此自累方寸今陛下上有重􅂟之親以慈儉聞四海下有盛年之子以孝敬聞兩宫三朝累世曠古􅀁無歴􅀚載籍之傳最得聖人之幸而又􅁁鄙不聳年榖屢豊一時賢才略在朝列只守成業已謂小康苦懐逺圖可以大治而又以九州之冨無供飬有闕之虞以萬乗之尊無使令不足之恨志所欲爲胡郷不可則陛下果何所不快於心歟况夫怨不在明患生所忽方其因循但曰細故寖以悠乆遂成後􅁨則尤不可不慮何者一國之􅀔譬如一身血氣標本貴在貫通少有壅底便生疾恙若乃咫尺君門杳如萬里今日迁延某事明日阻節某人日復一日莫以爲恠人心益訖主􅀔益􅁿脫有奸檢時爲利則中外之情不接威福之柄可移雖是擅傳指揮􅀅亦無從覺察或放散儀衞或革退臣僚或闘諜宫闈或激怒軍旅萬一有此臣恐陛下􅀌立而外􅋝無以效區區矣然則陛下何不務自節宣以飬氣軆務自寛大以怡精神出則從順動之冝居則享燕閑之福而直為此悒怏徒速無故之謗且貽萬一之憂哉臣甞謂愛君之至莫如詩人見於南雅樂只君子之辞不一而足至於不能自樂則風之山有樞雅之魚藻皆以為刺作詩之旨豈是容恱誠以一人有􅂟兆民頼之非其已之私也臣不勝拳拳􅂅附於詩人之義惟陛下留神幸甚止齋先生文集卷之二十一
