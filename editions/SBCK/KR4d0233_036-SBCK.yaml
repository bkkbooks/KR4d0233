front:
  text: 止齋先生文集卷之三十六
  hash: sha256:b9f4f9e82efe9a8823847d15a777f1bdba1d1420e0e927e633b7d7f84e37aa3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_036-1a}
body:
  text: 手書荅黄文叔三􅁥班固􅀃非是啇都六七遷皆夾河是後東徙朝歌周自岐雍興初務撫定凢東諸侯嘗為商畿甸近服者皆命之三母弟自荆以南蔡叔􅁥之􅃹叔河南霍叔河北蔡故蔡國管則管城霍􅀁謂霍太山也其緜地廣不得為邶􅅠衛明甚三􅁥誅􅆸晋衛始皆為諸侯盖有管霍之地而蔡嘗空置矣後以命其子仲其他則齊魯燕二三大國州牧之境揔之周南召南也當文武成康之盛天下有二南國風而巳江沱漢汝諸詩不言其封君甘棠雖羙召伯而不繋之召是時安得􅀁謂十三國風者哉國風作而二南之正變矣邶􅅠曹鄶特微國也而國風以之終始焉盖邶􅅠自别於衛而諸侯如無統紀及其厭亂思治追懐先王先公之世匪風下泉有若曹鄶然君子以為是二南之可復世無周公誰能正之是故以豳終風以邶􅅠嘗統治於衛既得之矣以其封㓕不見於傳疑為虚置之國且諸侯封㓕不見於經傳何獨邶􅅠春秋亦無􅅠是不足惑也雖然以為周公封建之􅀃則又不敢不告且周官封建自鄭氏汨亂之而其書迄不見信於世古者建國率小大相維其邉國皆大國也故寰内則以家邑小都大都為中外之差寰外則以諸男諸子諸伯諸侯諸公為中外之差禹貢亦云五百里侯服百里采二百里男􅀖三百里諸侯以一服為率正此􅀃也鄭氏攷之不詳輙以大司徒測地制域以建􅀖國諸公之地封疆方五百里是為分地推之他書不􅀎合則有夏商三等周更置五等之􅀃則有周公斥大九州之􅀃則有其十皆附庸之􅀃則又有爵尊而國小爵卑而國大之􅀃至於改定經文以七伯爲十一伯之􅁼臆决彌甚數􅀃不暇盡論凢試以典命司服大行人司儀諸文攷之則封國三等至周公不變其小異者公一位諸侯伯一位子男同一位耳盖周未有爵爲公者必若宋􅂎而後爲公周虞皆爲天子三公而􅁛公非有其國而子男獨多職方氏云凢􅀖國千里千里云者以每服相距言之以其方五百里封公則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男且周未有封公者則通一服之地小大國之多寡以是凖凢爲侯伯母過十二三子倍之男又累倍之其在經傳晋爲甸侯曹爲甸伯班班可考他如顓􅁷在􅀖域鄫無賦於司馬者何可勝數而附庸不與先儒以八州爲千八百餘國固繆以春秋僅有一百六十餘國亦繆僕固曰惟賈生最得其意自司馬遷以下徃徃爲經生􅀁亂不敢不告也至如乗車之限禄食之等無足深言者且書不􅀎悉計髙明必有以推見之區區􅀁陳勿為他人道幸甚荅陳同父三某尋常人耳蒙老兄拈掇最早而晚又為正則推作前輩行此二三年間雖不鄉進而交㳺殊未散落皆二兄之賜獨恨未及與晦菴㳺講求餘論如人一身血氣偏枯以是脉絡未相貫穿而愚見復謂千書不如一見終當相就不欲以􅁓筆呶呶其間以辭害意失之逺矣老兄懸度而欲附之下風此意厚甚而不敢當也徃還諸書熟復數過不知㡬年間更有一畨如此議論甚盛甚盛然朱丈占得地叚平正有以逸待勞之氣老兄跳踉號呼擁戈直上而無修辭之功較是輸他一着也以不肖者妄論功到成䖏便是有徳事到濟䖏便是有理此老兄之􅀃也如此則三代聖賢枉作工夫功有􅆘成何必有徳事有偶濟何必有理此朱丈之􅀃也如此則漢祖唐宗賢於盗賊不逺以三代聖賢枉作工夫則是人力可以獨運以漢祖唐宗賢於盗賊不逺則是天命可以苟得謂人力可以獨運其弊上無兢畏之君謂天命可以苟得其弊下有覬覦之臣二君子立論不免於為驕君亂臣之地竊􅀁未安也以兄之竒偉􅆘不如樂毅論之迂濶朱丈之正大􅆘不如王命論之淺近是尚為有益於訓乎且朱丈便謂兄貶抑三代而兄以朱丈使五百年間成大空闊至於其間頗近忿爭養心之平何必及此不得不盡情以告然勿為晦菴言之徒若犯分也自七月間病暑㡬殆凢事盡􅆸蔡直之到闕欲附數字猶未􅀎自強也瞻仰嘆故何可勝道專人恵書就審訊後尊􅀱萬福􅇺懌之至各年半百餘􅀊不過一再相問勞無由聚頭又堪懊意也某昔者何􅀁有今者何􅀁進自是老兄諸人過相拈掇每自謂人品極是尋常而亦礙人眼孔端是友朋捧擁之過近来衰惰益見天道尚思而好安無復更有他念来書方以為課進豈以為尚妄意當世乎然老兄之論要是攧撲不破若得人之伏不免背去求一喜之遇隨手敗闕只是侵砌闘合工夫􅀎有多少光景徃時曾與東萊語及非来復安得浸長老子極以為然􅀁不識亦與求意略同否然悲劣弟􅀁當言請置是事元晦徃復諸書何嘗敢道老兄􅀧當得錯只是書中詞氣全似衲子面捧之語不應冩在􅁓上一便傳十百便傳千豈可不忍耐特擇言語却乃信手添起後生胡亂模畫而元晦亦趕趂出了無限不恰好話故亦為修辭之難而輙進區區之見老兄既嘆作附􅀔令人不敢再三且漢唐事業若􅀃並無分毫扶助正道教誰肯伏孔孟勞忉與管仲百里奚分䟽亦太淺矣暗合兩字如何㫁人識得三兩分便有三兩分功用識得六七兮便有六七分功用却有全然識了為作不行放低一着之理决無全然不識横作竪作偶然撞着之理此亦分曉不湏多論但老兄任直不􅀎㢘纎自占便宜其間時有漏氣言語元晦執以見攻盖是忠愛然亦縁要攻老兄漏氣去䖏遂把話頭脫軆蹉過此劣弟愚陋之見若兩家元不是如此則是智不足以知兩家耳􅀄非有䡖重抑揚之論也自兩壻入舘􅁇以遷徒少定欲遣人間應之報有意外之撓方謝絶人事無從問訊且道逺不詳本末無着力䖏但與老妻日夜懸念長吁􅀼嘆而巳子約来言事已明白不堕小人穽中盡室驚喜嗟乎恠哉老兄直至此也天之生才不遇則亦巳矣閭巷蟣蝨之徒時欲置之罪罟若非朝家以不殺士爲國是法令明具有司放手生事耶兄當未易免禍吾軰平時每欲望人度外寛繩􅇘以便功名之士由今觀之士以此免不知㡬人則議論誠難事耳又况朋友滿世一旦有緩急束手無䇿若衰杇􅀹荷親愛亦不過呌􅁈呌苦與坐視者無異即知老兄􅀒謗􅀒累奔走鄉曲之急直是枉却舉此兩端方服前軰遵守三尺不敢放閒一線穏便話頭又㞐鄉如䖏女雖親戚在縲紲之中或不營救廼是知時識􅀔非苟然也老兄數年以来再脫於禍目今亦只得還他本朝學者轍様􅀅秦漢間士大夫公案一切封起未當其位屈着頭合着眼杜門燕坐以養和平之福而已淅西別業稍有倫序漸爲擇鄉之計􅀹􅀁願望某腐生之􅀃雖可厭薄然不到老兄之前他誰敢言者急時坐視慢時以空言相切某則自知罪矣幸察至望與王亞夫運使某􅀼惟宋興之􅀄藩鎮專命擁財以自封靡爰建􅀅輸之節以阜通天下之有無雖自錢以上名白係省而州郡之闕一仰於部使者四方之計至於三司或累十年不省而蔵富於外䑓不可勝計中更變亂於是盡歸公上而漕失其職徃徃僅同催綱督租祖宗􅀁以懋迁南北均調内外之道缺矣台座以􅂄明之望簡自聖裁􅂌以緫輸之􅀉豈與循次而進不得巳而授者同日語哉講䆒顛末還之國􅀄不勝士友之望前書􅀁布自倉司發之尚爲渉越今台座事也留意幸甚辱在愛子不當因賀但奉腐熟之談輙申前禀伏􅁓僣越是懼荅丁子齊三示及新篇意趣閑淡然詩律更當進歩子齊徳性器度絶過倫軰而區區猶有増益未􅀎之望則磨礲乎事業􅁬發乎文章也古之大人未有不兼通此而後可以應天下之故者以曾子守約之學而曾子問一篇自禮之窮世故之變悉講而後已以此可以推測孔門之傳也過節儻􅀎恵然一来各進􅀁見幸甚舊學典刑日就寥落非壁立自信安得脫世間波蕩某老矣􅀁覬朋友共發明之無任引領下問讀書譜近方脫藁自畫易至􅀗麟聖賢調度盡在此卷若從頭啇㩁得到分數則異時出䖏定不草草以此益要團欒如来諭也書譜又辱為之叙文意俱盛前彂藝祖以来諸賢又及邵氏經世書前軰未曽提掇中間一二䖏未穏更刪定方可㳺誠之恨未一見向薛常州毎毎􅁛其為英才緩􅇥可􅀝伏聞與張欽夫相聚甚久欽夫幕中得其􅂇為多鄭四三丈為福建倉失此良友深以為歉子齊既與之䖏若下人不真不得其精要當切思到底日月不可悠悠聞子約見子靜陸丈不受其砭又是意氣未除子約之凝滯非陸丈不􅀎剖㫁得下其他空踈之人又不可入其陶冶楊敬仲尊禮子静如洙泗此必有以得其心者曾徃扣其本末否某甚恨不得與諸公相講切追憶伯恭景望二賢於丁酉聚首之時不􅁴悽然除夜有懐一章豈􅀎無意詩三百篇大抵喜怒􅀁作要不失其正讀楚詞漢賦建安五言吾軰可謂首䑕畏禍夫畏禍豈􅀁以待寛時耶近日士友相厲多􅀃無圭角此是大患知者一向沉黙不知者固有􅀁激昻以要君爲利爲利者􅀒國沉黙者謂之何哉六朝人物區區中原之念見之寑食今日舉子握筆作塲屋文字者未嘗肯道其名字獨不謂不􅀎撥亂反正其人固不足道耶吾軰爲漢民􅀅十餘世而使吾君忍耻事讐垂六十年而學校鄉黨晏然無進志其大者則率其徒爲清談次摘章句小則學爲詩文自娱當此時吾黨與士友不變其􅀃謂之波蕩此某􅀁爲懼子齊勿以爲踈也幽人貞吉勿事奔競之謂若曰時事不得講人才不得評則非古人之意平生讀書亦以爲理義如此足矣杜門以来大􅁴不然子齊試以堯典至平王文侯之命商略古人􅀁以䖏興亡盛衰之變有人則濟無人則否此事占田地闊不應碌碌休也相愛之切忉怛彌甚惟吾子齊志在本朝故盡布之不必於不相知者道也文季口手自足受用未必聴朋友之砭器逺於足下信厚異時出䖏共相規約若子齊話頭止如向来􅀁云非􅀁望也蘇黄門晚節甚慚於東坡以温公待小申公如許至變法時毎苦晦叔太懦力量真難事耳與林懿仲二某凢八十餘日始逹官下一冬雨雪難阻萬狀囬想閑居士友團頭之樂不可得巳桂陽本一縣置吏養兵與賦輸視他大郡民力重困至於甚不􅀎平則或騷動非其俗喜亂也至此逾月犴無見囚而訟牘但田土典賣不明等事盖朴魯耳唯是帑蔵盡虚蕩無綱目而漕檄如織官兵持逋劵責償者累月正使􅀵拾得到亦無以供之是則可憂也湖南諸郡劉子澄最善政竟不􅀎免蔡直之邵陽次之亦有不樂者今春臧狀未必調一言勞者何以勸乎勿為他人道幸幸淮甸不知此去當如何錢幣一事想巳動揺了人情朝家方捄過不暇應置此未經念要是便錢務最佳俟稍定試拈出此活頭也某荷上眷不薄然竭盡區區無毫髪之􅀘至乞休致其情可想朋友宦㳺四方雖時時上心亦未有餘力相照燭非忘之也荅薛子長三日欲報􅀁况教以乏便未果方此歉怍承命重為不敏某衰惰何足與語今古而左右獨見推遜以􅀁著南北之際義例為恵且下問其然否老矣交㳺彫落願方得三益豈非天閔其窮以此厚幸之耶感激過望􅀁論晋非南遷元魏無凌逼中原之􅁀而其亡以六鎮齊梁陳之􅁀興北齊之後斃向者亦嘗見此意徃徃不􅀎發今得筆力先明之胸中了然甚盛甚盛至於君臣譜系􅀹足考其細故不謂晚年見此竒特宜前軰􅀁嘆也方令兒軰傳冩一本旦夕即納上左右議論誠淵源於正則要其􅀁到又有過人者近宗簡逓示吴門書藁讀之益爽然自失徐復自念鄉間學問􅀅趍於弊非時流之過必得温厚爾雅之言以殿其末則吾軰皆頼以免足下其人也願言勉之扶此墜緒數日流連酒盞間欲課詩奉送竟不就晨興抽毫而来使巳及門矣謾塞盛意為借書一章以徃􅀁謂雷門鼔也一􅀏一􅀏兩學官書附煩送似昨報潘叔昌簡云平居尚友有相先之羙臨事立我為自全之計此自昔儒者通患而國朝風流持論嚴正消息盈虚􅀹不屑意老兄以為然否衰惰無復貪書之念昨偶􅀅熈豐後来長編過眼數卷便昏澁異常毎對挿架慨嘆而巳此事當盡付左右諸人来諭方閱南北史二史儘佳然一代㳂革附見表志者徃徃不􅀵未免遺恨則諸史要不可􅆸自荀􅀽二紀以来下逮司馬通鑑大率欲祖左氏盖左氏本依經為傳縱横上下旁行溢出無非解剥經􅁩而非自為書今乃合太史公紀世書傳繋之編年則其間事辝轇轕􅀔必至得此遺彼由此觀之􅁼不如正史之悉也然區區􅀁兾深探書外之意来書􅀁謂實事本末徃徃在此且如西都之末士大夫知有􅀁擇遂成東都之業及其季年雖豪傑之士散為呉魏之役拳拳於漢獨南陽數人當時必有實以致之而豈可以書盡哉何當并合共講一二新詩見􅀉疾讀降嘆建安以来廼今見此作也止齋先生文集卷之三十六
