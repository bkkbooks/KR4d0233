front:
  text: 止齋先生文集卷之四十六
  hash: sha256:9f5dc6e32feeeb51682f6852c3bf6f58f507e4d4e67d3c80d3173c8cac3849cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_046-1a}
body:
  text: 􅀕文􅀕沈叔阜嗚呼以先大夫之於子屬望也以夀母之恃子以亡恙也以伯仲與子相和唱也以朋友交㳺謂子足嘉尚也然不待中年而夭矣豈惟家人盖鄉黨隣里同心悲愴也嗚呼萬事如意豈必永年有一弗爾禍不待旋来者可追徃者巳然我不􅀎規文以自鐫族􅀕八一叔惟靈厚重之徳温恭之度語無厲聲動無疾歩盖嘗深居燕坐玩意緗素娯翰墨以永日時杖藜而􅀚圃雖比鄰聚訟轍跡旁午而澹然不顧至於里有恙苦族有䘮故曽不渝於風雨必躬問而身􅂇若廼内􅀅順於慈母外服勞於諸父弥歴年如一日及二毛而猶慕眷旁洽於弟姪一色􅀏而匪怒然其胸中昭然自有䋲尺臧否不言莫可欺以智數者矣嗚呼文足以决科而老於布衣實足以長世而不昌於㣧祚以􅀊寒之喬木亦半夜而晞露䆒人事其何闕莾蒼蒼之難訴觀其前十日而戒客却􅀻昵以宻布􅒺児曺之奚擇曰阿牙其可付余聞継宗之子經禮攸著豈聖賢謂之弗祥徒世俗以為諱苟牙也足以汛掃門户典護墳墓􅄅一芥其何嗇􅀅九原焉如赴偉顧言之勇甚又古人無以逺過者也惟是枝葉凋零􅀊月遲暮乏一老之導前嗟衆穉之失措此某等所以羅柩下而長慟想儀刑以摧仆􅀕張囯紀嗟呼囯紀吾欲誦子之羙􅀆累百紙而莫殫吾欲哀爾夭􅀆涙懸河而何乾招子之䰟􅀆􅁳􅁳其安逝托子之孥􅀆交貧而力不逮盖自故老之傳書籍具在疾驅者途短軸不折者厚載髙明􅀆􅀑瞰其屋愁苦􅀆弗菑與害曼膚􅀆􅂦食銳頭児􅀆無盖仁三族􅀆報之豊自營焉不延厥世以余講聞􅀆籍甚於目睹􅀆毎背至國紀而一不酬􅀆余誰問􅀆茫昧豈天若不謀或邂逅􅀆聖賢以為定計匹夫􅀆細故􅀅善十勇􅀆九悔徒長言􅀆何􅀹􅂓一觴􅀆以酹代兄􅀕林承事維公劬躬植門自約而嬴爰始為儒􅀍之家聲閨閫無慚鄉閭有称昔者婦黨缺無佀承克立之後祀事有慿昔者族黨伯季凋零輯其􅀌􅄔以迄厥成夫人於此苟或一䏻則為善士况是合并柰何無年雖天㝠㝠嗚呼方女既笄實繁問名公為相攸莫如書生我時鰥居少公數齡廼以我歸嘉我弟兄待不以婿而如軰朋自其室事来諮来評有不釋然輙以我平頃我屬疾中寒善驚公亟問拊弥時不寕及公舁毉省之郡城謝言再三勿揚夜舲誰無舅甥所感此情雅有室廬可以止興新有子婦可以使令柰何無年胡不涕零矧辱深厚此酒忍傾􅀕鄭龍圖母夫人􅀚嶽者於麓􅀚河者於涘猗歟夫人克生二子夫以龍圖經明行脩名重天下南渡以来張吕之比而景元㓗㢘忠信邁徃而絶出又為當世雋傑之士譬之天球琬琰和弓垂矢粲然房中重英襲美㡬所謂維其有之是以佀之者矣至於龍圖稍稍䆠逹位逮九卿夫人固為之􅂬而亦不以景元之􅀒志流落不逢為耻龍圖怡聲下氣坐不垂堂夫人取焉而亦不謂景元單車暮夜赴人之急難為非是則其髙懐逺度兼識二子之才往往揔􅄃人物者或有恨於此也嗚呼夫人之衰自喪伯氏仲懼弗任誓不以仕藥物之良飲膳之㫖儻可一􅀏不逺千里今也夀終孫曾百指棺槨衣衾聞者興起永惟人生及此有㡬然景元猶哀恫憤恚自謂遺憾盖不但以遲莫困窮力有所止也某等蚤㳺門墻欽誦儀􅁤以受祉之既多而􅂘少於餘齒且􅀊籥之四周凢奠斚之三跪冝盛徳者不然􅀅永傷其􅂚巳况有感於百懐曽莫殫於一􅁓􅀕梁丞相麟鳯不摯帝王瑞之木徳為春萬物善時維皇龍潜公為舉首天授之相有司之手維皇至聖維天之仁維相休休嘉靖此民澤農欲晴山農欲雨公在相位髙秔下􅁰彼有言戰此有言守公在相位兵不挂口人亦有言誰怨誰徳公曰賞刑具在三尺人亦有言匪同斯異公何適莫靡立一意乾道經略淳熈無為從容其間不競不随上之咎言下之觖望弗及其身人自得喪公疾未劇公歸巳决帝曰如何咨爾同列至于領祠至于賜第􅀫留經帷愈好勿替我􅀚自昔蕭曺周召經史云云如公特少方舜命禹冝師冝保薄海有恨公不夀考公不壽考薄海恨之矧如傅良辱愛辱知属官窮楚遭􅀊之繆爰及祥琴文始克就太常有詠太史有傳廼如斯文􅂓以哭奠􅀕劉子澄惟靈學不事於章句仕從容於禄爵積之身以力乆試在􅀖其太略我特立而衆同曰好名而奚怍􅀂夫􅒺企慕於前修圖報稱於隠約豈與世以多違懐良朋而獨樂孰遺貌以􅀚心悵此風之不作以余交之最晚知君意之匪薄方前猛之切磋收後􅀹於戯謔何手墨之未乾而遽遺於今昨儻絮酒之可漬􅀅陳根而亦􅂘􅀕蘓訓直元祐故家封殖百年百年舊聞嘗失其傳疑􅀅孰問孰備次詮如公㡬人庶㡬像賢然而位不過外郎而僅止中夀是不謂之天耶累舉不第屈于賞延﨑嶇州縣曽諱自言晚以民庸著之淮堧積有令聞爰始綜銓向使第公之文少而騰騫則于史􅀚則于詞垣何處非宜而躓莫前則天之嗇公非適今日然也嗟乎魏公之功􅂦彛所鐫比及三世中更百遭継先大夫義不附權天下􅁈之臨汀之遷公論既開忽詣九原凢是天理莾不可言某幸兹為寮情相後先即之謙謙聴之便便一日不見而我棄􅂢寓哀斯文三致意焉而哀不勝有淚如泉􅀕張孟阜我識諸張餘三十年仰止端明恨不執鞭架閣勇為而挺出忠甫肥遯而孤騫雅矢寛夫接于英􅄤亦有婣婭聲華滿前我来雙清詩書之淵孟阜妙齡玉潔蘭姢前規後模足不及㕓既而諸老淪亡松凋蔓延於赫家聲䆮以弗綿孟阜永嘆逝􅀅誰愆吾學未就于何食眠習爲文詞短章鉅篇駿不可覊闊略注箋及試􅂣屋句磨字研務入䋲尺以􅂑衆憐屢賈弗就愈强益堅妻帝児號語方諱錢必以青衫侍親九泉晚喜世科至於澘然而其料事察於著􅀛憂時過於貂蟬每一發憤于酒是便竟成沉疴殆若自􅂢嗚呼孟阜工於成家而拙於謀身有恨於貽後而無忝於奉先求之昔人亦足謂賢我妻厥姉見推師傳忠何疵之弗告愛何善之弗宣病革之書筆墨倒顛属子以婿抑何惓惓㑹余東歸哭此殯筵莫塞爾悲爲之矢言謂余不信有如大川􅀕令人張氏嗟余與子於窮相遭以子潔清濟余之豪何以觴客􅂑之衾􅂁殆􅀅兼旬蓬首不膏矧余力學往往獨旦每興視夜青燈在案於焉勞苦於焉咨嘆苟余飢渇則自涖㸑凢我族居以􅀻為公凢我嗣息以異為同亦既聲名胡謗是叢亦既膴仕奚歸匆匆雖則信已豈余所獨亦豈無人共此心曲知余孰􅀷愛敬之篤子嘗有言舎我無復嗚呼子病之乆余靡􅀁愛顧笑謂余日月有待疇昔之夢雲鸞下逮夫豈凢骨而及斯賚余亦宵夣殊庭祕􅃊有二黄冠縞衣襜襜求子食器與子鏡奩而遂棄余曽日不淹嗚呼以子生平死且有守奈何衰惰失此益友強欲述子悲掣之肘尚圖􅀎言託子不朽􅀕林懿仲我老􅂘子云胡不哀豈以斯今㣲子之才有才如子學以自培少却寘之辟雍蓬莱而年不逮公論之開是懸於天我哀何哉我懐古人風凋􅁩零匪無群居謂為友朋亦既樂推俄而譏評亦既洽比俄而背憎誰其卄年篤師一經凢曰同門視猶弟兄毀譽合離弗移弗傾譬彼松柏可以永齡則知我哀豈徒􅀻情嗚呼喪歸自淮潸焉􅂚勝屬我悼内拊棺未曽今辭酹之尚其歆聽有盡之觴無窮之名􅀕瑞安宰留公弼吾邑之難聞于浙閩有􅇬一區洞無門垠籍入誰家何􅀁就詢􅀖賦有常夫豈不仁令日􅃻朴吏加斧斤􅃥無完家帑無見緍累􅀊于兹交相為貧間有恵令不怒以嚬譬彼沸􅂦而忍益薪匪憂則慚以及其身自我公弼􅅚壊為新一術不施􅀏言津津􅃥戸晏開吏袍前陳州家曰􅀎使家曰動且以其暇豆觴佐賔縣門之樓圯為荆榛忽焉山立曽目不㫬以此長材與意之真豈徒百里可以長民輯睦怨慝整齊紛繽寘君其間亦志可伸遽止斯耶天何昊旻自君屬疾愁聚為群識者于毉昧者于神冀其夀祺以􅂆後人聞之不起萬里霑巾我忝同登晚交益親况此酹别不知所云峴山之石巋然嶙峋尚刻遺愛庻㡬不冺􅀕潘省之嗟乎惟靈以家學之未􅂋掇巍科以娯親以里仁之未􅀶求三益以淑身惠分人而清約嚴律巳而殷勤􅀂夫歸愛女於心許擇􅃁婦於素貧資壮士以趨急遜旁枝而圖新皆在昔之所難得一節而過人廼具羙而弗矝爰好修而益振自發軔於州佐亦彯纓於京塵有衆􅁢之嘘拂無一疵之緇磷雖混迹於莞庫遂􅀭名於縉紳及兩鬂之已華領壮縣而獨欣棄訟銗而弗設惟經師之是遵叅累政之短長從百里之􅀏嚬酌民言而徑行或黄堂之未聞有􅀒租而弗問奚加賦之敢云積棠隂之劬勞忘梱内之欠伸俄遺恨於偕老遽傷和而損神嗟乎志如公之濶逺行如公之真淳儻少假之􅀊年􅀅䇿足於要津盖庻㡬於有徳輯群駁以爲純忽兩櫬之旅歸徒夾道而酸辛某嘗同升於仕版又洽比於昏鄰方欽遲於晚休尚幸陪於後塵隔古今於一觴故不知涕泗之沾吾巾也祭蕃叟弟母夫人嗚呼悲夫季路之母及於􅀒米而不得與其子共禄於三釡孟子之母及於衣衾棺槨之羙而不得與其夫偕老於五􅂦自古賢者固多遺恨吾於吾嬸尚何言哉尚何言哉一觴之奠永隔千古嗚呼悲夫祭沈次卿吾毎過吾邑必欵二沈之門以資舊聞訪遺跡也元誠云亡官無諏咨之􅂇士無切磋之益幸公無恙尚有典則言可記注行可蹤跡而止中夀誰不沾臆嗚呼十八丈之賢盖庻㡬徐孺子元魯山焉而世無孝㢘之科竟淪謝于幽仄相彼後進車馬赫奕􅅊布三葉令人太息始余過邑多見徃昔㳺有􅀚潮翫有古栢追随諸公好我顔色自公獨存我亦皓白恨不鄰巷相與朝夕日治草具屈為上客我懐則多豈以飲食曽謂背面存亡之隔文以􅂘之未叙潜徳匪無強宗為刻拳石􅀕豊山陳國噐嗚呼自昔格言誰敢種徳之乆仁及閭巷悼内屬耳而遽至此何歟余􅀚氣貌甚偉言動有常下逮僮奚不見呵詰是豈不足以夀歟食飢衣寒勿問踈戚東塘之成通國利之是柰何不享其報歟冝夀不夀冝享不享神理茫昧世亦多有􅀂夫奕世慈孝滿門問學盎然春和無以􅃱異而賀觴未舉衰絰相尋行道嗟涕殆未之睹則又何至於此極歟豈禍福無端而自昔格言姑以為訓歟胡􅀎􅈼天寓此哀奠􅀕朱文昭母夫人吾友滿天下今四五十年升沈通塞之變多矣盖僅有存者率一􅀊或再三􅀊惠然造吾門者必皆蒼然華顛者也否則其子􅀂孫以其父祖藉口為謁以請見而非其人矣况於其親則又凋落至闔郡或數百里間有人焉以余之少孤不及奉其親苟間見之則未嘗不為之起敬且自愧恨其不􅀂也嗚呼今夫人氏吾友文昭之母則一人之數也文昭自為諸生知名一世屢舉不第而業益修謝客深居而士益附無分寸之柄而吊亡悼屈恤􅀌而惠覊旅而家不困皆夫人之教也嗚呼何其整也余自罷掖垣謫籍弥乆夫人以其女孫歸為吾伯氏婦傾囷以餙其行輟田以佐其養人所諱交無難辭焉嗚呼又何壮也以余少􅀌不及養其親於闔郡或數百里間見吾友之親則為之起敬自愧恨其不􅀂則於夫人宜如何也春有饋􅁝秋有饋鮮果蓏之實凢羙必饋問其􅀅命徃徃出夫人之手夫人之夀八十有六属余抱痾撫棺無及寫徳布􅀻非文安􅀉力憊言略尚昭鍳之止齋先生文集卷之四十六
