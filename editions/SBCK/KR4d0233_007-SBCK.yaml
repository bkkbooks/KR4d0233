front:
  text: 止齋先生文集卷之七
  hash: sha256:ee65bbd0f694cddfa3a75b7c70d909baba0eb9ad62dcba16df2d873b0f92e7cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_007-1a}
body:
  text: 律詩上皇子嘉王生辰詩三章兩宫頻燕喜交舉萬年觴㑹慶川方至重眀日未央聖賢何繼世孫子更宜王聞􅀃斯干夢祥占近一陽造次依儒術朝逥只一􅀴更無他􅄝好端是衆儀刑符應當良月聲華自妙齡帝垣從此日光熖粲前星要識皇圖永當觀藝祖􅀄維持今盡是囬復更何如庸陋誰推轂衰遲此曵􅅂慙無為夀具獨䄂一編書方講藝祖實錄故及之􅀽起巖㑹飲湖上出示古刻酒罷各携桂花以㱕因成一絶湖光不動見魚蝦敗􅁓殘編數十家巖桂叢中三四客醉㱕人得一瓶花又和湖上簾須半捲蝦調冰雪藕各名家有人不觧長安飲話極茶鐺吸井花􅀉陳同甫古来材大難爲用納納乾坤着㡬人但把雞豚燕同社莫􅀅鵞鴨惱比隣世非文字􅀅安托身與兒孫竟孰親一語觧紛吾豈敢祗應行道亦酸辛送辛卿㓜安帥閩長才自昔恨平時三入􅁱門兩鬢絲瓮下可䏻長夜飲花間􅁍學晚唐詞澘然北顧􅀜河水簡在西清日月遲乗鴈雙鳬滄海上與君從此恐差池送盧郎中􅀦華赴閩憲相望千里馬牛風聯事湖湘各巳翁造次便呼児女見綢繆略與弟兄同百年又是梅花發萬事何如荔子紅欲附使軺嗟不及􅁍憐身在俊􅄤中送范大著文叔知彭州中書世禄今無㡬唐鑑家聲世不多安得有人賢􅀂此忽聞去􅀦意如何同朝最是頭先白知已還愁語太苛盡欲讀書三萬卷蓬莱未必似岷峨和劉進之韻兼簡吴阜之憧憧滿眼事何稠落落論心思獨幽去􅀦未䏻身一葉懐人但覺日三秋池塘春草方同梦江漢㱕舟更别愁安得簫韶儀兩鳳不妨燕雀自嘲啁􅀄夏有感因用前韵久旱適得雨欣然卒章湖山嫵媚緑隂稠誰向芸芸得趣幽半破榴花方恨晚新来燕子未知秋去爲吏􅀮雖吾􅂅㱕得家山政自愁頼有雨聲寛百感忽如􅀌鳳見羣啁送潘徳久之官建康平生不觧通毛刺萬事無䏻改􅁂華豈是􅁭懐堪逆旅直須詩句可名家老為賔客􅀙戎幙强使妻孥理㡌紗不有􅀅軍寛禮數新愁􅁍恐墮江花同㳺張園酒中各嘆明年未知誰與此㑹余最哀病冝去因作詩識之春過新烟䏻有㡬愁生飛絮轉難禁可憐衰白隨年少愛看殘紅到夜深一輩衣冠方事事故園松竹已隂隂明年此㑹知誰共鴈蕩山前􅀉好音次韻奉酬方輝先也知朝士愧山林猿鶴相懐怨亦深屈指落花年荏苒㫁魂凋􅁂日侵㝷向来相與期何事老去誰􅀎㑹此心多謝故人重話舊獨憐志古定遺今送倪正甫侍郎賀正雪枿氷芽又復春中原覩屬車塵懽呼漢節􅀙天下愕立胡兒夾道陳老去獨慚􅅯蹇君行决意問􅀴綸顧瞻河洛關心䖏􅀿記幽燕用事人喜雨天顧於人略有情片時􅀵盡越山青老農望外扶犂立倦客愁􅁁擁被聴塵翳欲清閶闔道井花巳上轆轤亭􅁳􅁳直待黄梅熟未要風池㸔約萍送曽繼先赴山隂路鈐鬍髯白盡猶強飰髀肉添多未跨鞍不向胡沙親矢石􅁍来橋塚護衣冠歸舟自此長相背薦墨于今尚未乾只恐燕然他日事獨無名字可同刋送何起巖之江東苦吟海内知音少獨徃江東問政頻我亦他山於此别世無吾黨更誰親六朝故實皆新句一代風流尚㡬人話次儻懐無恙否為􅀅衰惰再三陳上元日同京仲逺趙徳老羅春伯謝子肅訪郭殿帥㳺鳳凰山次韻層雲飛鳥共危欄江漢朝宗萬折盤王氣信知千古盛聖圖兀自九朝寛公餘曵􅂂探殊勝酒罷磨崖記衆懽衰惰不知􅀎徤否相􅀙河岱㺯柔翰癸丑冬車駕過宮留相還朝一聲警蹕接天齊馳道無塵馬不嘶月御順行隨日轂乾端和氣匝坤倪三槐相繼㱕公衮細栁還須聴􅀅􅤯老矣尚䏻歌二聖不􅀿專羙在浯溪和樓大防尚書送行韻齊年兄弟又齊名啇略行蔵共此生自昔􅀙君曕馬首如今輸我與鷗盟讀書松竹交千載曵􅂂星辰聽五更借問塞翁誰得失請無一語到留行折子明提刑自湘中以詩問訊用韻酬之久立天涯詠式微胡然華髪尚望㱕簮履便冀君恩到盖惟當世豈無君子論人詩湘中一似桐鄊好安得扁舟着釣絲泊釣臺灘下今􅀊僅餘今夜月此舟三泊此江沂遭逢明主還遺恨慚愧先生獨見㡬泗水列侯多不免湘山四皓竟安㱕漢家故舊嘗枚數孰與東南一釣磯臘月望泊舟釣臺灘下賦詩旣而登婺女明逺樓誦之鄊丈陳徳承同集黄竒卿張伯廣因書以遺徳承之子性甫直甫後春六日奉和徳承韻兼簡竒卿伯廣為别行蔵獨􅀝少陵樓怨鶴愁猿孰與儔嘗與萬人爭魏闕何如一􅊤老莬裘追随士友􅀙吾好領略江山自此逰急趂梅花理歸棹􅀟溪為我亦西流贈杜伯髙臘後玄􅄀意氣驕餘寒造物亦亡聊風收夜雨春何淺雲障朝暾雪不消真悟此生􅂊半􅀊恣聽何䖏是三朝粲然一􅀏􅀅迎我頼有江梅慰寂寥除夜􅀫䖏州天寜寺人言老去不如􅀄我愛􅀄心老轉無􅂴向門前題欎壘喜􅀙人後飲屠蘇杯盤甚簡眠須早禮數多寛拜要扶况復􅋜齁僧紙帳雞人不聴禁庭呼􅀉僧嗣清衡陽傑閣宵人記淮右豐碑刺史書永已橋山蔵劒佩空餘雲漢照林廬河圖萬古陳東序汗簡諸儒校石渠誰道幽深竆衲子乞錢買石更﨑嶇余與嗣清作雲章閣記欲刻之衡山不果今清来致舒州吴使君􅀁書閣記石刻一本盖投子山碑也於是夀皇晏駕一年矣讀之涕泗交下頃為學官逮事夀皇滿􅀊當罷去而對班尚在數月之後遂乞􅀘外晚為祕書少監㑹聖政書成􅀍㫖詣重華殿進讀首篇夀皇色甚康顧視良乆益恨平生之不遭也因作詩詒清以附碑隂􅃽䖏州仲可恵酒括州太守亭侯及與前時一輩㳺剰欲池塘㸔芳草謾随烟雨上危樓無錢可觧催科拙有酒􅀎寛放逐愁可􅀏杜陵嚴武客時時傍舎過墻頭再􅀉用前韻幸無骨相可封矦㱕理先人舊釣㳺山下剰栽諸本竹水􅁁湏着數間樓羣書可讀自随喜一客不来誰與愁時把釣􅁝銷永日魚兒亦得兩三頭丙辰􅀉國舉兄是間南極老人星喬木􅁱篁亦有情直向朱明為後殿不随黄落入秋聲兒孫衮衮看新出兄弟團團得晚成􅀏閱世人心事短却從黄老問長生送長溪髙國楹從學朱元晦洛學今無恙東南屬此翁􅀙㳺雖已晚趣向竟誰同一第􅀵良易遺􅀴語未終㱕期定何日我欲叩新功以兩鶴夀薛象先日與山農共一㕓不應家有四乗軒殷勤分送平齋下為㸔蟠桃熟㡬年重陽日􅀉瑞安劉宰留宰以是日宴新第人併見招不及赴落㡌沾衣緫失真追随茰菊亦勞神酒無肴核依然好家有溪山豈是貧沆瀣􅀙空来夜氣青􅄀随䖏際秋旻不知此是登髙否為問慈恩塔上人和林宗易菊花韻一􅀊􅀁餘秋有㡬重陽偏與老相催毎憐白髪䏻長徤雖愛黄花亦􅂴㘽好景㳺􅀙須好友新詩風味似新醅人生適意無過此恣聴東籬早晏開和沈仲一北湖十詠北湖只隔嶺頭雲誰在湖􅁁問訊人若得小舟通我過雨晴湏破半時辰右北湖人去岷峨水自流豫章三字竟沈浮懐人好上層樓㸔木落山寒不肯秋右豫章閣可愛南山與北山北山上有斗芒寒碧雲㱕盡人何在更捲朱簾到夜䦨右仰止亭平平下語及雲管學到詩人豈不難莫似人大芳潔湘波千古訴椒蘭右葯房一年曽得㡬畨圓恨不驂鸞上廣寒占得波光須細翫恰聞滄海巳狂瀾右穆波亭欲来花底竟差池我有佳名誰與㱕翌日㸔花天一色狐裘猶自織寒機右粹白堂借無舟楫亦褰裳目斷蒹葭水一方今夜不来同剪韭隔山明日事茫茫右遲客䑓萱草湏鋤莫放深竹須剪伐待成林一花一葉皆相附要使児孫識此心右萱竹堂紛紛萬木盡西風獨立霜林我御冬澤畔無人誰着語止齋但護紫泥封右楚頌亭余雅愛頌橘之語仲一欲以名其亭一日出􅀁蔵潜邸頌橘二字遂改今名㸔花只為雨愁人一片􅂊飛减􅁍春獨此得春無盡蔵毎於愁外見精神右冝雨亭周宣義三子仲敏明㓜謹同年登第因以前韻奉􅀉營營浮俗贗還真孰與傳􅀴妙入神一榜及㸔三子貴數椽􅀎忍十年貧自􅀅弧矢書閭史便使氷淵誦小旻家學如君今有㡬殷勤羅拜我何人再次韻簡新第諸人行酒何如温太真風流元不鄙錢神扁舟容我㱕米老一子令人買得貧雖有羣仙来月窟􅁒扶衰力上霜旻吾今巳定漁樵約勛業煩公一輩人送瑞安尉林叔全尊人還鄊論交海内略飄零最晚相㸔􅁍有情不以一􅀴誇魯諺自於二子識徐􅀸橘香賸與蜂衙晚麥信急傕鳩喚晴天氣正佳歸恰好莫􅀅愁思爲空名送林叔全秩滿㱕四明三年絶境興誰同雞呌桒巔犬巷中但欲户庭多暇日不􅀅鞭朴奏膚公相期霄漢􅅮風翮毎見燈花綴玉蟲此去逢人臺閣上丁寕莫道止齋翁送雪庵瑾禆師還山五馬逄迎甚闊踈滿朝問訊近何如諸公極有遲留意一日連􅀵竟别書佛法盛衰千刼後人生老壮百年餘向来㳺舊今亡恙願得斯人尚起予周和叔通判雪寒索酒􅃧用来䪨以􅀅朋尊持盃雖念故人寒欲予還不似印刓此債豈􅀿行䖏有麯春何日􅀉雲安和叔入蜀故云奉和周蕃伯用王道夫䪨二章見􅀉森森萬木一精廬黄卷青燈自卷舒􅁍肯追随三舎逺不論聞問十年踈遺賢公已長懐玉老圃吾方欲荷鋤安得謝巖題壁䖏一尊相伴㸔芙蕖論定千年後心寛萬事平吾方慚䑕伎安敢道鴻􅁳門户雖人滰溪山亦世情半天喬木立盡日好禽鳴夀叔祖母與先人同生三陽昨夜轉洪鈞鳳暦今年又紀寅再拜與君觴夀母更生猶我面先人児孫夾侍渾忘數梅栁前陳不記春􅀙此常爲湯餅主賸㸔諸婦抱麒麟東陽杜季髙逺訪詩以送之當世關衰壮斯文看合離強餐吾豈敢後㑹子何期村落秋彌好溪山晚最宜逢人相問訊􅀁欠更䏻詩春日和林宗易韻白與紅兼盡落梅小園獨歩日千廻浮空曉色臨無際排闥春光撥不開學語新禽更後囀鋪茸細草雨􅁁来却憐追逐今無力放下簾鈎就麝煤移花櫻柳初無素與蠻可􅀅何物伴身閒欲栽花木千餘本但候春風還未還送花還宗易酷愛看花􅂴種花知心惟有故人家花開分送花殘取娱老抶衰度􅀊華逰鳴山寺徐一之兄弟載酒即席和其韻惰歸春力不勝驅風雨尚愁人撡􅅂掠盡殘紅前日􅀣催還新緑去年畬相􅀅興盡隨花􅓏賴有朋来載酒車但得從今身尚徤吾鄉風物勝匡廬和徐叔子用林宗易韻見示相過風雨獨何歟校酒論文已不如方信深交相戀嫪却因衰退更躊躇吟生池草書成束飲落簷花醉墮車明日待隨公等去我頭應始自今梳和徐叔子勸農韻呈留宰親從蓑笠問飢寒赴愬人人得犯顔更向棠隂聊憇茇要令粒食共鮮艱身歸雨露司存後詩在山川刻畫間飽飰之餘􅀎細和止齋應有㡬年閑逰金奥趙園賦海棠棃花呈留宰海棠故作十分紅梨更超然與雪同文物英華周盛事風流玄逺晉餘風赴留宰寳壇之集因和蕃叟弟趙園韻一枝􅂊放前村雪一線初開愛日天潘縣風流凡五客趙園名字亦千年可無䏻賦如難弟恨不曾来有尉仙待得中興用循吏更於此地設離筵示留宰縣樓即日氣横空施及觀潮亦奏功曾上石崗看蟻穴當圗一飽到三農或以詩送来禽次韻奉酬連年㘽􅀣未成隂赬實堆盤慰我心手把新詩堪永日休誇法帖送来禽隔水佳人久不逢祗應我懶或君慵感時相饋情何厚却􅀃雲泥笑殺儂遊雲頂院和徐叔子韻老大生憎兒女態更無春怨與秋悲略􅀅盃酌隨宜具剰有溪山取次嬉愛客不妨兼汎汎論文何苦太竒竒况曽窺得尊生術通昔蒲團日一炊夀薛象先蕭然山澤一臞仙故􅀍聲名絆俊􅄤祗為春秋同社燕遂歸風雨對林眠中年曽未鬚眉白盡日全無車馬喧我有夀觴誰與共㑹昌湖上釣魚船酬蕃􅅱弟韻朋㳺同一軰伯季自相師薄䆠俄衰暮清懽僅暇時我懐青􅃁曲子念紫荆詩但得無憂患幽棲豈不宜夀潘省之泛水淺紅荷十里蔽雲濃緑木千章旁無俗子同居巷中有臞仙一瓣香今夕還知是何夕吾鄉終勝似他鄉􅀟鳬便合青㝠上笑看兒孫樂未央丁巳夀國舉兄􅀊自為詩􅀊自􅆳愁無新思思還生更從今閠書􅀄伏待看何年值後庚漢網䟽如天地濶奎文下與水雲平弟兄長徤貧何病判解金􅀛當一酲止齋先生文集卷之七
