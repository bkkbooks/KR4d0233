  text: 止齋先生文集卷之二十四
  hash: sha256:856b0fb9926bd5ee96a7a606ce2b36ab5e90defe2aa9db1775c0a7922d81738e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_024-1a}
body:
  text: 奏状劄子繳奏率逢原除都統制状准中書門下省送到録黄一道樞宻院關池州駐劄御前諸軍副都統制率逢原奉聖㫖除都統制令臣書行右臣􅀅措湖湘巳聞率逢原之為人且見其行事矣其在江陵其在㐮陽與今在池陽監司帥守皆患苦之屡有文字上煩朝廷雖然猶有可解者監司帥守與軍中事不相關未必非好堊之偏也近者淮西總領鄭湜親見其馭下無恩􅀅士多怨徒以為管軍之人頗繋􅀚聴不欲斥言逢原之罪而按其中軍統制崔公亮以警動之逢原果不自安且無以掩諱其失至於自劾陛下曲加覆護與降放罪指揮是豈以為無罪乎而遽進為都統制臣不知其􅀃也臣聞中興之􅀄分置屯所江淮之間付之諸􅀅懼其專恣難制也而别置總領給餉其軍特以王人爲之用示威重淳熈三年六月七日特降聖㫖指揮令専一􅁴察諸軍掊克之事聖謨逺矣今率逢原爲帥無状宻院鐫戒尚不知故至爲總司所發上章待罪始稍有嚴惮王人之意􅀂陛下朝以爲罪而暮遷擢之則是教之不悛也以副統制陞都統制未爲超越但適當宥過之時未見改過之實遽此除授則有功者何以待之臣􅂲􅀅帥觧體且傷總領之威重也欲望聖慈􅀅率逢原新命特賜追寢使之深自循省士無愁歎然後進遷庻􅁢物議所有録黄臣未敢書行謹錄奏聞伏候勑㫖十二月二十四日奏入第二狀准中書門下省送到臣所繳率逢原除都統制奏狀奉御批依已降指揮右臣昨具論奏率逢原方以自劾放罪不當􅃍遷都帥臣之愚見以為朝廷勸懲宜有次第不應功罪混為一區今率逢原以總領鄭湜按其偏􅀅掊克士伍􅈥􅆸軍政於是稍知嚴憚務自刻責而陛下為之覆護特從宥免此陛下善􅀅􅀅之道而率逢原感􅈭思􅁬以功􅀘過之時也若乃信􅀫之間􅃍有遷擢臣恐逢原麄人昧扵理義妄窺朝廷意出姑息却復專横愈無悛心故敢瀆犯天威乞􅃦新命不惟為陛下惜此舉措亦􅀁以全逢原也至扵逢原為帥無狀事迹非一前後臣寮屢有文字臣不欲因此悉數􅁀逢原之惡正以事關軍衆慮傷事軆區區欲望聖慈特從􅀁乞必須知改然後除授􅀁有録黄臣未敢書行謹再録奏聞伏候勑㫖十二月二十六日内引劄子四年正月人主無職事以愛惜人才為職事夫愛惜人才徒貴之以爵位不若養其聲望之為羙徒榮之以恩寵不若全其操􅂂之為大凡立乎人之本朝爵位􅂭而聲望汚恩寵盛而操􅂂闕此公論􅀁甚不與也公論不與􅀅為庸人則是貴之者􅆘􅀁以賤之榮之者適􅀁以辱之也恭惟祖宗承五代之後士風極衰而一旦作興之至過漢唐而無愧三代無他道也養其聲望全其操􅂂而已在仁宗時范仲淹歐陽􅁱余靖尹洙之徒嘗以論大臣除授不當去􅀦矣已而仲淹􅁱等之賢果信扵天下為時名臣向使當時不明諸臣去就之􅁩而苛留兩存之則雖仲淹􅁱不􅀎􅁀白扵世而况不如仲淹􅁱者乎在神宗時司馬光吕公著蘇軾轍之徒亦嘗以爭新法去國矣巳而光公著等之賢果信於天下為時名臣向使當時不明諸臣去就之􅁩而苛留兩存之則雖光公著等不􅀎􅁀白扵世而况不如光公著者乎由是觀之愛惜人才必如是而後可不然􅀅淪胥而為庸人夫庸人者一世􅀁棄何鄉而立有臣如此國家何頼焉則亦非上之人之利也以臣􅀁見近代人主覆護臣子容忍不棄未有如陛下者然以為愛惜人才則未也既曰覆護之而不謂之愛惜之者何也眷之於爵位恩寵之間而不務明其去就之􅁩故也比者有以䑓官察朝士者矣陛下皆出之出之誠是也俄而並召兼用為卿將孰是孰非耶有以後省官駁從班者矣而陛下為罷給事中罷之可也已而並除職名一去為郡一降為王府官然則是均有罪耳有以諫官䟽大臣者矣而陛下欲並用之大臣乞去不得請諌官乞去又不得請然則是俱賢耳雖然賢否混殽何以為國猶可解者則皆士大夫也至如臣衰懦攝官詞掖嘗不度踈賤論奏内侍不當為知省官雖蒙陛下納臣之章不行詞不賦禄而其人至今出入禁闥與見任無異近復有㫖令兼他官中書後省與黄門相持而不决號令自今可􅆸此􅀹不可者臣故曰陛下可謂覆護群臣者矣而非愛惜人才之謂也臣不勝拳拳欲望陛下務明人臣去就之􅁩誠以愛惜人才為職而明其去就之􅁩請自不其以臣之可備使令則當去内侍以臣為不足僃使令則當去臣臣之􅁩明則群臣亦各務明誼群臣各務明誼而後聲望不汚操􅂂無闕群臣之聲望不汚操􅂂無闕是不為寜然後陛下可以委任而責成則非臣之私便也再内引劄子人莫難於養其心而人主之養其心為􅀹難共惟本朝列聖養心之道備矣臣不敢逺引亦不敢稽深言之姑誦臣少壮時身􅀁見聞髙宗夀皇兩朝時亊每自退朝扵起居食息之暇無非以禮樂刑政之具務自檢束一日之内每亊有常以何時刻延見儒臣以何時刻省閱章奏以何時刻親方冊或㳺戯翰􅇘也然後以其餘景燕衎尊爼娱嬉􅁐囿至於暮夜又必宣召􅀫直官從容晤語間以觴詠如是者皆三二十年寒暑不渝忽一日不如是即内侍以近醫藥為請而中外惶惑矣夫以堯父舜子稽古學道度越漢唐之君而克勤小物課為日程拘拘不􅆸何也意者雖聖人不可以不持養之故也臣幸遭逢備員近侍每見陛下臨朝之際莊敬肅穆儼然若神雖執禮名家無以􅀼議于以仰窺聖心持養必有道矣而比来傳聞徃徃以為玉音􅀁􅀤或異尋常機務之間稍失次第廷臣震灼莫曉其故妄意窺度其􅀃多端以臣愚見或者陛下言動偶有此差誤耳恭惟至聖至明動循法則而又春秋鼎盛剛徤日新何繇言動有此差誤無乃起居食息之暇􅀁以自持養者愆其常度而延見儒臣之時少歟省閱章奏不屑加意歟或親方冊㳺戯翰􅇘等事暫置弗講歟不然則燕衎尊爼娱嬉􅁐囿之樂惟意􅀁適而無節歟又不然則是燥濕隂陽之冦或傷其和而忽忽不樂以得此也陛下幸因臣言試自省察萬一有此不可不反求之也孔子以終日無􅀁用心為難而孟子論心亦曰出入無時莫知其鄉操存而舍亡則心之不可以無􅀁繋也如此伏願陛下法髙宗夀皇之􅀁行存孔孟之􅀁戒以其日力定為常度非徒以親政涖民亦􅀁以尊生介夀惟赦其狂僣留神財察社稷幸甚臣不勝忠愛之情奏乞褒録􅀓察宗澤婁寅亮子孫劄子竊覩近者贈岳霖煥章閣待制與張某一子官仰見公朝旌念舊臣苟有勞烈即録其子孫承襲重爵以此勸士天下知尊君親上之報不薄而徇國者衆矣幸甚臣嘗論本朝聖聖相承毎遇大事則有先見特立之臣􅁬不顧身爲國建事臣不暇逺論姑述宣和以来三朝􅀁覩在徽宗時則有􅀓察以死事爲節義之功之首髙宗中興時則有宗澤以留行爲翊載之功之首夀皇入繼大統時則有婁寅亮以建儲爲定䇿之功之首然而􅀓察贈典雖甚優渥宗澤致仕亦頗通貴而兩家子孫未蒙旌異棄善錄瑕令人於邑至於寅亮初以上虞縣丞敢建大議髙宗嘉納擢爲御史其後時議不同竟死小官澤不及後遂以乏祀若以至和嘉祐故事言之宜在褒崇之典一切勿問臣恐傷忠厚之風塞敢言之路上無以發明髙宗至公之心下無以對􅏡夀皇善繼之羙欲望聖慈以􅀁以褒賞岳飛子孫之意推及三家以廣恩恵以勸忠力繳奏冊寳官吏推恩狀准中書門下省送到録黄一道節文爲冊寳都大主管􅀁申奉上尊號冊寳了畢被差一行官吏推恩事二月六日三省同進呈奉聖㫖除巳推賞人外餘並特與三分减一推賞内第一等轉一官减二年磨勘第二等轉一官第三等减三年磨勘其軍兵願換犒賞者聴令臣書行須至奏聞者右臣恭覩上件聖㫖指揮係是依紹熈元年軆例三分减一推賞施行臣檢照紹熈元年正月一日修製奉上夀聖皇太后尊號至尊夀皇聖帝夀成皇后尊號冊寳行禮了畢并正月十九日修製中宫冊寳行禮了畢推恩等第人數第一等五人轉兩官第二等十二人轉一官减二年磨勘第三等四十三人轉一官資今来􅀁降上件推恩指揮内人數比紹熈元年第一等承受官多一員第二等除貼去外照管事務官尚多一員行遣書冩奏報文字官多一員第三等承受并諸司行遣人多一員巳上共多四員臣􅀼詳紹熈元年推恩之人係是修製奉上三官四冊四寳事務繁重職掌稠疊計日甚乆為勞亦多􅀁以當来恩數特異常典今来修製奉上慈福宫尊號冊寳雖曰千載一時非常之慶然而幹當臣寮偶􅀍驅使只合課計心力以為酬奨􅀁是一宫一冊一寳既與三宫四冊四寳軆例逈然不同伏縁近日都大主管官不候一等具申尚書省取㫖推恩先次􅀗降聖㫖指揮轉行兩宫一時後省皆失契勘只作特㫖放行以致逐人妄援前例保明陳乞今来雖經朝廷裁酌􅀅都大主管官止轉一官餘人三分减一推賞比之元年委是太濫以此始知都大主管􅀁申首為身謀上欺聖聴因芘儕軰大啔倖門而又増添員數至五六人恭惟國家對天下之休慶事未已􅀼恐濫恩􅃦廣官爵益輕臣愚欲望聖慈軫矜民力吝惜名器􅀅上件指揮除軍兵聴換犒設一項外其餘更加裁損務令􅁢當仍􅀅􅀁増添人只依舊數不許増多庻㡬日後無疆之慶僥倖衰少􅀁有錄黄臣未敢書行謹錄奏聞伏候勑㫖貼黄檢准紹熈三年十二月二十二日聖㫖指揮玉牒􅀁進夀皇聖帝玉牒會要􅀁進夀皇聖帝會要了畢與减半推恩縁上項進書篇帙少似巳前特行减半推賞與今来事軆一同伏乞睿照五年二月十一日奏入繳奏孫拱之轉官狀准中書門下省送到録黄一道樞宻院關奉聖㫖忠訓郎御前祗應孫拱之為有勞可特與轉行一官令臣書行右臣取到吏部狀見得孫拱之自授承信郎以後十年之間巳轉五官數内淳熈十六年轉了三官又自紹熈二年九月磨勘轉忠訓郎至今年十二月􅂊及兩年有餘更轉一官臣不知其有何功勞被此恩數􅀊月未久僥倖太多壊武臣年勞之法長䙝近私謁之風臣不得不為陛下惜也􅀁有録黄臣未敢書行謹錄奏聞伏候勑㫖二月二十日奏入繳奏冊寳承受官免减一員狀准中書門下省送到錄黄樞宻院關二月十四日奉聖㫖巳降指揮夀聖􅂭慈備福皇太后尊號冊寳承受官依淳熈十二年紹熈元年軆例差置縁各巳經大典職事與其他不同特與兑减一員餘依巳得指揮施行令臣書行須至奏聞者右臣照得紹熈元年修製奉上四冊四寳差人管幹不得不多今来修製奉上一冊一寳若初間從公差置便合取㫖省員却乃比如舊數増多六人其為欺罔不待力辨徒縁業已施行重扵痛有鐫减此臣􅀁以從寛論奏乞只依元年員額巳荷宸聰悉垂采聴不審何故復有上件指揮以臣窺度必非聖意自欲反汗以長倖臣只是此曹耻於退聴求勝公論且夫行法自貴近始今承受官係是第一等推恩人若許存留即其餘小官豈無辭􅀃則是身為貴近者亂法度也恐非古人患不均之􅁩臣欲望聖慈將上件指揮特賜􅀵􅃦令照應巳降指揮施行􅀁有錄黄臣未敢書行謹録奏聞伏候勑㫖二月二十日奏入再繳奏孫拱之轉官及􅉺寳承受官免减一員狀准中書門下省送到臣􅀁繳孫拱之轉官奏狀并錄黄一道㳟奉御批為係實該五年年勞賞可特與書行續准尚書省劄子并送到録黄為臣􅀁繳􅉺寳􅀁承受官特與免减一員二月二十三日三省同奉聖㫖依巳降指揮書行臣須至再具奏聞者右臣語對三省􅀅上臣􅀁論奏􅉺寳官减員事得㫖依奏者今月十三日指揮也承受官免减一員十四日續降聖㫖指揮也又三省􅀅上臣􅀁論奏孫拱之不當轉官事得㫖依奏者今月二十三日早指揮也可特與書行當日審奏續降御筆指揮也以此見得得事可其奏者陛下之初心朝廷之公論也續准内降者陛下之不得巳左右之乞憐也臣誠不肖攝承詞掖儻不􅀎軆陛下之初心而曲從其不得巳之意則非􅀁以發明聖徳不􅀎伸朝廷之公論而下比於乞憐之人則非􅀁以禆賛􅀖政豈不爲􅆸司存忘法守乎則臣不敢奉詔必矣臣愚欲望聖慈􅀅十四日續降承受官免减一員聖㫖指揮并二十三日續降書行孫拱之御筆指揮並賜追􅃦只從元来三省􅀅上巳得依奏聖㫖指揮施行不勝幸甚􅀁有元付到御批粘連在前􅀁有錄黄臣未敢書行謹錄奏聞伏候勅㫖五年二月二十四日奏入貼黄恭准御批孫拱之為係實該五年年勞賞可特與書行令取到吏部狀御前祗應本部即無立定年勞推賞條格指揮顯是難以施行伏乞睿照繳奏饒州奏勘程廷􅀝斷案狀准中書門下省送到錄黄節文為饒州奏勘到程廷􅀝㫁案令臣書行右臣照元案見得程廷􅀝髙祖程節曾祖程鄰皆官至寳文閣待制内髙祖正議大夫祖父皆命官今廷􅀝以僧惠深受其賃錢誣以占屋而訟之縣又辱罵其骨肉迫逐起遣不勝忿耻倩人打僧其下手人王念四本州已從徒三年髠髮居役定㫁即廷􅀝元謀减一等徒二年半贖銅五十斤罪止扵此矣本州復引勑有䕃人犯徒流罪情不可贖者奏裁臣不識廷􅀝􅀁犯何以謂情不可贖乎徇一僧之欲而辱兩制之故家者是州司不平也從一州之請而􅆸千載之䕃法者是刑部不審也且夫情重奏裁必有大不得巳者近年守臣􅀝法作威徃徃多是以此籍口捃摭細故汙衊衣冠今若復因饒州􅀁奏有此行遣臣恐郡守之專恣者援此為例操切士大夫之族矣臣愚欲望聖慈􅀅上件指揮特從末减􅀁有錄黄臣未敢書行謹錄奏聞伏候勑㫖三月二十九日奏入入奏劄子四月臣不勝螻蟻之忠􅂺有愚言仰干天聴如蒙省覽即臣雖就誅戮不悔臣聞父子天性也孝慈之道不待教而􅀎者也自士庻人皆然而况於人主乎然考之載籍則有尊為人主而􅂩開扵父子之間至扵禍敗反不若士庻人之家者何也賤者群居其􅀔易親貴者異宫其勢易踈故也夫惟其勢易踈則離間之言易入離間一入則父之情不欲自䟽扵其子子之情不欲自明扵其父由是愈難於言而父子之􅂩開矣父子之􅂩開而禍敗至唐之西内則李輔國之徒前日之龍徳宫則梁師成之徒是也論至扵此可為寒心恭惟陛下父子之間一同舜禹而比年以来稍虧定省之節臣誠卑賤不􅀎知宫禁間事若以前鑒觀之或者亦當有離間兩宫者乎陛下孝謹本自無他偶以纎介動成疑阻夀皇恐傷陛下之意不欲自察察言之陛下恐傷夀皇之意又不敢自察察言之而左右之臣各憚天威又亦以傳言為諱由是禮文寖踈情好日隔積成因循實駭聞聴此臣􅀁以不避萬死而􅂺言之也言之也者􅀅以通之也有如天意信謂如此即下臣此章明詔大臣使兩宫左右曉然知此務通二聖之情則舜禹之徳千載同符矣臣無任拳拳激切祈􅈤之至乞祠申省狀四月六日伏念某一介踈庸重以衰病誤􅀍使令身兼數職皆是文字之官關繋事軆而心力不逮􅘃曠實多稍渉􅀊時曾亡報效嘗聞諸夫子曰血氣既衰戒之在得又曰陳力就列不􅀎者止若某者􅀁謂乏陳力之勞違戒得之訓者矣内􅀒初心外慚公議夙夜念此誠不自安區區欲望朝廷檢㑹前後陳乞在外或祠禄差遣狀劄特賜敷奏早從􅀁乞以安愚分以全晩節伏候􅃌揮四月七日三省同奉聖㫖不􅁢乞對狀四月十四日臣近者不識忌諱幸蒙賜對輙論及兩宫事仰荷聖慈濶畧愚直曲垂清問備盡􅈤悃仍令臣入文字指罪離間之人􅀅有施行以釋疑阻即古􅀁謂狂夫之言聖人擇焉殆不過此臣雖糜捐不足以報然比至奏入􅁍留不下十二日又幸同班奏事復蒙聖慈諭臣以向来文字􅀃得未詳臣切自咎責不足以仰承明詔以致尚稽順動枉招謗讟臣若不務自殫竭以􅀘聰明則非陛下之不聴用臣而臣實􅀒陛下也欲望更賜以燕間之頃令臣縷縷言之苟以螻蟻之微感動天聴於是二聖重懽四方相賀則臣之志願畢矣除巳􅍗閤門進榜子乞奏事外謹錄奏聞伏候勑㫖止齋先生文集卷之二十四
