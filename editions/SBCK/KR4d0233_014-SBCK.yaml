front:
  text: 止齋先生文集卷之十四
  hash: sha256:c5838dd68e30740b2065f138c0ad5e71ca3becedd32a1e3760d65aa8a81b80de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_014-1a}
body:
  text: 外制慈福太皇太后册寳書冊文官中大夫知樞宻院事趙汝愚轉大中大夫敕迺十有一月癸未日南至朕帥中宫􅀙以婦子朝于重華􅀗陪親尊上顯號於王母永惟一朝四世非常之休則亦二三股肱克相孝治以輯威儀可無茂恩昭示褒律具官某任重而道逺􅀴明而行􅁱累朝篤叙同姓然自熈寕以進士對䇿而卿始以讜議􅃣群英自治平以儒臣本兵而卿始以雅望位三事卓爾大雅百年而復見之朕甚嘉焉属兹成禮盍圖爾功維昔太任儀刑姜姒功在十􅅍徳在二南於是周公推本聖子作思齊之詩以歌之而仲尼定為六藝傳信萬世朕今建事過扵成王翳曽不在周公之下醻勞進秩實應􅀴􅁩噫􅁇自今為陪朕􅀊上萬年之觴頋不偉歟可􅂐寳文官通議大夫叅知政事陳騤轉通奉大夫敕迺者具法駕以日南至朝慈福宫夀皇拜乎前夀母拜乎後朕帥中宫􅀙以婦子搢圭稽首奉上寳章亦惟輔臣克相鉅典可無褒律以示同休具官某直内而方外愽文而約禮及見故老在紹興文獻之間蔚為儒宗極重華侍􅀙之選眷言舊學簡在􅀄潜􅀁謂獨抱遺􅀴䏻㫁大事者矣􅀳預機政益行􅀁知俾予孝治度越千古盖周頌大任而不及子孫逮事之榮漢尊長樂而不備父母俱存之福洪惟我家一朝四世自有載籍未之前聞翳卿特書盡善具羙噫朕式克至于今日休豈惟兩宮􅀅髙廟亦寵嘉之序進一官匪以為報可前導禮義使并奏禮畢通議大夫同知樞宻院事余端禮轉通奉大夫敕日奉寳􅁽上之慈福也乗輿􅀁過觀者萬人夾道率皆㱕羙於朕躬朕豈敢􅌹也則亦有宅心知訓之臣克輯盛事可無褒寵用以示勸具官某直諒而多聞明􅈒而匪􅈈盖退然如不勝衣而道任天下之重謙謙鞠躬而勇過孟賁矣􅀙㳺潜邸陳􅁩最髙􅀳翊鴻樞臨機必㫁朕嘉頼焉廼者導予有儀可象肆于竣事盍啚爾功朕誦思齊之詩推尊文王本之太任於是盖四世矣而周公始作大雅考引功徳以昭前人未必逮事王母親周旋揖遜乎其間也以今况古孰與朕休如卿遭時亦曰鮮儷􅁇自今卿其以予萬億年對天之休􅀅書勞進秩不一而足焉尚其懋哉可兵部尚書羅􅀧母太淑人繆氏遇慶典恩特封齊安郡大夫人敕朕觀魯詩頌僖公之有道及其夀母於以知吾卿大夫之賢其毋氏不可以無報禮也具官某母具位繆氏克相君子種徳云邁是生賢嗣為􅀖司直以􅀧之議論風操過魯侯逺甚則爾母視魯夫人賢何如也義不貳其夫而善祥集於晚年教行於子而淑譽聞扵斯世肆朕嘉與㳺􅃬賛書秩以小君䟽封名郡抑與魯人請命于周而後作頌者異矣尚服寵光以綏夀祉可中書舎人楼鑰毋太碩人汪氏遇慶典恩特封太淑人敕朕觀魯詩頌僖公之有道及其夀毋於以知吾卿大夫之賢其母氏不可以無報禮也具官某母具位汪氏克相君子為名大夫是生賢嗣世濟其羙以鑰之議論風操過魯侯逺甚則爾毋視魯夫人賢何如也爵雖􅀙其夫而善祥集於晚年教行於子而令譽聞於斯世逮兹􅀖慶㳺錫賛書抑與曽人請命于周而後作頌者異矣尚服寵光以綏夀祉可叅知政事陳騤子臧孫遇慶典恩乞進封其毋敕日奉萬年之觴于朕王母嘉頼爾父爰進褒律而爾又以􅃬􅁼之恩崇大其母膏沐之邑豈不榮哉具官某母具位某氏吾大臣内助也而及偕老方爾父夙夜匪􅈈熈我庶績亦惟爾母整齊家事而後得以并意一卿不懐其􅀻則􅀙夫之爵雖不以癸未詔書􅀙事􅀳封名􅀖朕何愛焉而况乎夫人獨得之也若夫可以乆䖏約於燈火之􅀄可以長䖏樂於簮􅅂之後凢百命婦於焉取式則此異恩又足用勸可安定郡王子濤遇慶典恩轉官敕維建􅂭磐石之宗澤流後裔維慈福奉觴之慶燕及髙年兼二者以有言進一官而何吝具官某為今屬籍視古典刑以孝恭友兄弟如周君陳以謹重率宗室如漢劉徳至於試吏允也過人信抱􅀒之不群况行藏之無愧比觀掌故誰其逮事於四朝强起襲封兹謂愸遺之一老可以華國豈惟奉祠方欽想於逹尊冝亟蒙於殊渥假如老老亡元日之詔書祗以親親亦盛時之恩意明􅀭進律􅀳陟承流其茂對於寵光用永綏於眉夀可慈福太皇太后姪淮東緫領吴珽特轉一官敕具官某朕甞􅀙上皇後恭上慈福之􅉺親聆慈訓勉之以學至今心不敢忘也而施恩外家乆不予决甚失朕意爰趣有司上之而爾某方饟淮師序進一秩以太后訓朕之意則爾亦冝自好修以成思齊太任之羙矣可吴璹方令奉常序進吴瑊方分郡符序進一秩吴璿吴琯吴錡寓直延閣序進一扶吴鈞吴鏜吴鑄方為屬外臺序進一秩吴銓等一十二人序進一官浸即膴仕燕棨等九人各以姻聮進官一秩迪功郎前金州司户青陽炳文年九十一遇慶典㤙特封承務郎敕具官某在易之晋受茲介福于其王母而朕身親見之豈不盛哉餘慶溥􅀅燕及人老俾爾晏􅀊齒于􅀄官尚服寵榮益綏夀嘏可儒林郎御史䑓副引賛官賈忱應奉上尊號􅉺寳了畢轉承直郎敕具官某典禮行扵上而澤下逮盖廣愛之道也爾適幸㑹亦與進秩尚務肅給母愆于儀可朝散大夫軍噐少􅁥兼實録院檢討官兼權考功郎官黄由除􅀅作監兼嘉王府直講十二月二十日敕具官某朕有元子愛之固􅀷而教之惟恐不至一時賔僚儒學之選爾以魁倫之彦乆儀群玉之府侃侃正色抗論不囬自少匠而為長蓋亦寵矣技巧精䏻非􅀁以望汝也横􅀴朱邸使吾児有直諒多聞之益是惟休哉可武徳大夫帯御噐械幹辦皇城司陳守忠係重華宫淑妃陳氏親父乆在殿陛特與帯行遥郡刺史敕具官某扵重華為掖庭之親扵廣内為屬鞬之列矧惟肅給濟以靖共出入两宫而無違周旋四姓而不競爰醻勞扵􅀊籥俾借重扵州麾以􅂬庭幃以壮軒陛可奉議郎太府寺丞曽三聘除秘書郎十二月二十三日敕道山蓬莱圖籍鉅萬士夫仰望真有飈車羽輪之隔㳺其中者皆天下選也以爾力學自􅁬持論不阿憂􅀦之心如飢如渇擢自外府徑登清貫益讀未見書以昌逺業且使四部秩然有序是為􅁛職哉可大理寺主簿王寕新知信陽軍劉崇之並除太府寺丞十二月二十三日敕寺監皆有丞而外府設官特詳焉盖欲上禆版曺之調度下托有司之出納不可以非其人也以爾寕文辝蔚然明習吏道勾稽􅁄寺平反為多爰俾序迁以酬勞勩爾崇之聲稱籍甚蚤登著庭出守􅁁方召對􅀹敏使還朝蹟以慰公言􅀁貴於儒者謂其䏻通世務以其􅀁學見之事功勉哉可朝散大夫王進之知徳慶府敕具官某爾頃以天府貳車徃守武陵突不得黔已復報罷朕心憫焉􅀳康雖逺實髙皇興王之地舉以授汝以觀汝􅀎尚其懋哉母替朕命可張某知冝州敕具官某自桂林以南之州宜為大其與蠻人隣也冝為邇置侯固圍重於他􅀖舉以付爾不謂之選擇而使子歟尚對明恩無乏􅁁事可朝散郎充顯謨閣待制兼皇子嘉王府翊善黄裳兼侍講五年正月二十敕朕毎􅀊仲春詔諸儒講路門􅀅􅁱故事有日矣比覧名籍為之矍然昔者􅀁進今安在耶而不為予講也具官某以六學之醇長於􅂆誦甞發明春秋之旨纚纚可聴也何恙不已而憫勞以大夫之事但與吾児㳺乎夫文帝䏻前席賈生於久不見之餘而武帝不􅀎留汲黯扵出入禁闥之日兩君治効較然可覩爾不當起為予講耶詩不云乎素絲祝之良馬六之彼妹者子何以告之此朕􅀁以責望汝也可􅀙政郎建康府江寕縣尉趙汝章􅀵使射賞轉文林郎敕具官某澤宮不建士無射御之習夀皇以為此非􅀁以合文武也既䇿之廷中復取之囿於此皆得雋焉士亦艱矣俾進一階用為如吾詔者之勸可䧏授朝奉郎權通判建康府徐嶤任􅀦子愽士日奏對失儀䧏官特復朝散郎致仕敕具官某闕庭之禮陵三軍者懼焉以其嚴也爾為􅀶士長而進對失容至於䥴秩朕豈深咎爾􅁘丞郡亡何聿来致事母乃謹畏過自刻責乎俾還舊官示棄前咎則朕之遇士大夫明恕兼矣可福建提刑盧彦徳奏泉州同安縣尉鍾安老増强盗希賞夲州録事叅軍􅀙政郎鄭􅁇功符同結録更不駁正􅁇功特䧏两資放罷敕具官某捕盗之賞建􅂭舊章也比􅀊吏縁為欺徃徃傳㑹得官縉紳數以為言而重改作􅀅以待實􅀎焉爾汝治其獄迺不審察竟以􅀓㑹之辭上之州家士師不䏻治士非是之謂歟其削兩秩仍免居官尚務省循以蓋前咎可前提舉廣南市舶江文叔容縦押綱官移易香綱錢物特降一官敕具官某建􅂭舶司盖長吏兼之㝷以為有遺利也而􅌹置使亦稍宻矣爾領其事迺以貢輸属汙吏然則何頼焉削之一官以為不謹􅀁使者之戒可知建康府余端禮奏武􅀴郎李存道和糴淮西総領􅀁米般量少欠䧏一官敕具官某峙粮以省􅈇此大事也而爾不䆒心至見劾於帥閫爰奪一階以警怠事尚其省循兾不終棄可入内内侍省東頭供奉官毛居實轉㱕吏部授􅀙義郎敕具官某爾自謫籍得㱕銓曺命之秩官徃護陵􅆍其對恩渥母忘懼思苟無後愆亦豈遐棄可新知錢塘縣趙盛婺州通判吴璹並除職事官三月二十一日敕具官某等維昔忠獻光輔髙宗以建我家維今太皇實佐求賢而無􅀻謁天下誦之則以爾盛忠獻之後璹太皇家人也靖共在位克世其美而寘諸周行以勸勲戚不亦冝乎可大理少卿許及之奉使囬特轉一官敕具官某昔臯陶明刑䏻弭猾夏之患爾吾諌臣也而為大理稽􅀴傳古人自不􅁈非􅀁謂淑問如皐陶者耶衘命北庭且以覘􅀦朕􅀁為用汝也肆于㱕報亹然獻忠盖歴道其􅀁更見至扵禾􅁰而未嘗一語及傑馬之病朕聞之有感焉書勞増秩是特舊章􅀂属有鄰􅀦之大事爾其選哉可閤門舎人􅃽介奉使囬特一官敕具官某使扵四方孔門以為難是可以觀士矣爾以西州之彦庀職上閤意􅁚容止亶如儒素盖其􅀁趣尚然也属􅁱隣聘以爾輔行肆于㱕報禮無違者書勞増秩盖循舊章􅁒究爾䏻嗣有晋寵可帯御噐械蔡必勝除知閤門事敕具官某昔者仲尼設科可使束帯與賔客言者皆髙弟也矧吾上閤四方扵此乎觀禮而可不用士乎爾以諸生習孫吴對䇿為天下第一操履趍尚學士大夫也夀皇嘉之駸駸膴仕朕方在潜邸毎視朝􅂺属意汝以為可在左右肆我嗣服首加趣召俄而䘖恤迺今来㱕是用命汝典我閤事夫不以寒素䖏􅀻人不以學問望右列其来尚矣自我作古追復仲尼之遺意爾其懋哉以圖忠報可朝奉大夫試尚書禮部侍郎􅌼思薦舉不當䧏一官滿一期叙復朝散大夫敕朕惟聴言信行雖髙第不保其終身􅀚過知仁則寛朝冝諒其本意爰棄前咎俾復故官具官某蔚為􅀦華簡在法􅀙久居䑓閣盖習扵推轂之風樂道縉紳亦恐有積薪之恨云胡吏議及此上聞迺不知猾吏之為而徒録名臣之後或者愛􅀶至於言􅀻雖薄示懲章豈􅃍忘於善􅁼思皇多士朕􅀁以舎舊而圖新求備一人爾母為矯枉而過直可䧏授通議大夫顯謨閣待制提舉江州太平興􅀦宮陳峴薦舉不當䧏一官滿一期叙復通奉大夫敕朕惟聴言信行雖髙第不保其終身􅀚過知仁則寛朝冝諒其本意爰及改􅀊俾還故官具官某屡典名藩久持􅀙槖以公卿大夫之後雅有扳援則門生故吏之多豈皆决擇况重以名家之好則忘其􅂍状之非及此上聞掛於吏議既徃不咎朕􅀁以舎舊而圖新永矢弗諼爾無為矯枉而過直可顯謨閣學士䧏授通奉大夫知建康府鄭僑舉淳安令舒光改官不當䧏官滿一期叙復正議大夫敕具官某淳安令之獄至今人疑之朕徐考其􅀁為主則皆吾賢卿大夫也吾賢卿大夫也而坐以繆舉之罰毋乃已重乎以爾􅀴明行􅁱為海内􅀁稱数而閱天下之士多矣門生故吏必善推擇而不茍取迺者􅀁舉令其具如刑書邪則與其進不保其徃孔子有是言矣不如刑書則是即墨大夫也豈以㣲文而廢善􅁼爰棄前咎俾還故官其􅁇自今毋以精失士之意益舉􅀁知是謂忠報可朝請大夫中書舎人樓鑰磨勘轉朝議大夫敕計曰非􅀁以䖏賢才也書勞非􅀁以待法􅀙也而有司以功令来上曰某人當進其官則朕亦重改焉耳具官某以文墨議論方代予言自吾與丞相執政進退群臣當不當功罪爾皆得以可否是正于其間分職授任亦異於百辟矣績用益彰聲望益茂則等而上之不過三数官皆􅀅以待汝何屑屑以課日月増秩為事尚服訓辭以須明陟可曽知嚴州敕具官某贛川之曽人物相望仕至二千石者前後以十數厥聲茂焉爾習于家傳有志於古試以郡􅀉有志於民還奏便朝嘉其詳練惟嚴陵之輔郡實髙廟之潜藩分以左符用撫吾民由小州得大州益勉厥職以大爾家可林大中磨勘轉官敕計日非􅀁以待賢􅀎也循次非􅀁以優法􅀙也而有司以功令告足爲舊章庸可廢乎具官某以直道正䑓綱至于累􅀊以勇退紆州組殆􅀅終更槩之懋官一階不足酬也况夫訓詞深厚駮議剴切朕甚嘉之乎而有司㑹課姑惟增秩其尚欽承以須殊奨可奉􅀦軍節度使開府儀同三司充萬夀觀使夏執中􅀁生母郡夫人沈氏贈崇􅀦夫人敕詩人誦后夫人之賢必以爲某人之子之孫之甥之妹盖推本其􅀁􅀙来不一而􅁕也具官某􅀁生母具位沈氏作配名門雅有淑徳是生賢嗣爲􅀦元舅日者朕縁申伯之􅁩加錫命数視儀􅂦司夫寵其身而不及其毋豈􅀁以宏賁外氏之祧乎是生不霑膏沐之賜而死無以慰蓼莪之思也爰自郡封陞華上􅀦尚歆明恩永緩爾後可故妻郡夫人諶氏贈寜􅀦夫人敕公卿􅀅相䖏貴倨之􅀔而不驕非獨其身賢也警戒相成厥有内助具官某故妻具位諶氏甞爲吾舅氏之配與之共􅀮約矣今以吾舅申􅃬命數視儀􅂦司敬共不違退􅀂􅀄筮推本􅀁自非有如齊風雞鳴之配然耶夫生有中饋之勞而不及􅀙夫之爵死祔於姑之室猶未離於郡小君也則吾外氏之祧尚有遺恨􅀳陟上􅀦庸慰幽􅄀尚歆明恩益相夫子可止齋先生文集卷之十四
