front:
  text: 止齋先生文集卷之三十五
  hash: sha256:8e6916c113e7aaab31dee1aa8cda618014310f5457169e3772120e6635dcbf75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_035-1a}
body:
  text: 手書與王徳􅁱伏承歸舟解䌫不勝瞻依之至人生不足把翫一别輙數年􅀎復㡬别令人愴懐惟學問同源在彼猶在此也前軰􅀁謂野色更無山㫁隔天光直與水相通足以自􅇺釋耳某還家才此數月觀書雖不得如台山靜僻然亦有緒左氏課日趣就候書成萬里相􅀉兄亦當終我易傳也大抵周禮古文尚書三代之法存焉讀者未易造次且如禹貢州末繋河先儒固曰運逆三於青州逹濟楊州逹泗荆止於南河雍止於西河則以為受上之爾不知此正裴耀卿節級轉輸之法不以江人入河不以河人入洛洛人入渭賈誼云漢都長安而以淮南為奉致輸非是豪傑之見略與古凖牧誓千夫長百夫長之下言庸蜀羗髳微盧彭濮諸國何也左氏謂蠻軍不陳盖無預於三軍之以待令者也杜氏於春秋晋人姜戎一義亦得此意今多言常平出漢耿中丞顔祕書且以為權道不知常平乃法周官司稼􅀁謂以年之上下出歛法出則减價粜歛則增價籴也是非常平乎自鄭氏以出其歛法為觧後人遂以周禮耳孟子亦曰狗􅇾食人食而不知檢野有餓莩而不知彂今又作益食貨志作歛是也載師􅀁征稅或二十而一或十而五自漢来諸儒因此疑周不純用徹法亦輕重非二等是又失之不考凢征於載師皆非謂在野受田之民率士官賢牧􅀁食公卿大夫王子弟采地耳凢此其􅀵之民則什一也而自以其租歸公上則别以厚薄勞佚為差輕或二十而一重或二十而五此􅃁宰􅀁謂􅀖中四郊稍甸都鄙之稅與萬民九職諸侯九貢各調度耳漢律諸侯王自有少錢亦其租之􅀁在也荅潘叔昌周禮妄意熟讀豈敢言它委訪綱領闕然自失徃年薛常州先生問天官一編參之漢氏自宮衛分領光禄衛尉府蔵分􅀠司農少府一官分為數卿天子之奉又皆為私錢之属王后世子各養於􅄀宫謁者奄官亦散它局此紐一解未易操制隋唐之際殿中􅁥内之吏作矣古人制度豈容輕改􅀼意天官而下徃徃盡然左右抄拾漢晋以来下及五閏官制幸以薛常州之意一一尋繹得其離合切告條示亦欲共講之爾與呉父直某賤不肖其􅀁與游皆田野布衣儔􅁼之士未嘗從王公大人之後盖謂之貢倨不可就見况敢望其即我哉来京都足下獨造窮巷夜門而賜見焉其行不以車馬其謁不以爵叙其簡牘不以記几􅀁以加乎賤不肖者願王公大人不􅀎得之於其門弟子乃今愧昔甚矣小人之懐厚誣當世君子也盖聞之化於貴公子見之外戚立傳自秦漢始王道之行壹之為此也􅀅有繇然者矣君與相􅇥士於其公貴家盖為於其私而一介之士無遺焉則國欲無治不可得也矣一而関風俗係治道則豈僕私幸亦豈足下之私為徳不肖誠謂非僕私幸且非足下之私為恵也寵光之未戒今之不趍宜弗之罪是以敢遲遲而徃也雖然施有􅀁不報扣有􅀁不荅􅀅以成其人之賢多而隂觀其嚮背戰國諸子為之孔門無是也僕雖不肖敢不謹於禮其􅀅擇日戒拜賜於下風與林安之中間作懿仲書極欲如吾安之二三臭味脫去鄉􅀖来客山國庻得淡中之􅃾尋承巳過巖下良用缺然安之飯之粗足亦屑就何耶僕乆厭此如沐􅃮解去無由爾比来新昌亦欲漸與人踈稍囬鞭䇿自警督視家居良為未便然毎念吕后劉歆軰視張子房楊子雲真自苦者要之兩翁意未易與兒女道故雖未便樂也安之手子眞知味者南坡茹莱動踰月無憐色與友生語率不十四五相唯諾惟吾安之有聞如響天姿如許加之小自警督當入張楊㑹中謹勿為劉吕軰以兒女語相甘誘落身杯酌間某無過人但知非輙深悔恨亦漸去舊習矧如安之相愛之篤不知其言之苦亮之否與鄭景望少卿二拜違誨席六七載百無一進獨幸於毗陵從百九兄㳺半年平生氣息為之遲緩推挽之賜何敢􅆸忘中間託子之命仰見盛徳簡在宸􅂨可為天下賀簿書之勞非􅀁以溷儒者比来轂下傳聞傳謾詳宻不見端私用慰釋雖然百九元書盖期望不但此愚見偶合故未敢深喜也百九兄屡不應書自敵已猶倦况違尊者乎又從縣請祠為禮率直如聞朝論頗不相然䑓符徑至殆非􅀄心而得書願欲一来捨昨就今或者胥失近知扁舟赴約計已全併得此消息馳報千萬詳審勿使易来難去甚善甚望芮􅀕酒僅及家易簀劉大著王詹事皆竟不療海内賢者相􅁇彫䘮令人䘮氣張侍講方結主知忽刺逺郡吕博士亦悼亡暫告未果復入年来􅀁得師友亦次第渙散如此􅇵用無憀識罷還家了親事益逺得御儻憐其不自棄而終教之時賜尺􅁓略去少褒之辭直下砭針則千里猶􅂰下也拜違誨色忽復旬􅀊中間兩辱墜教一一具報後許簿報書亦嘗略布淺漏以求是正領令嗣書缺然不至左右為之歉然建寜附問又嘗以大賢推轂不苟之意為請殆言輕無效許簿亦不欲復以上聞焉爾垂諭得䘮順正自是天資頑頓不甚領㑹世間羞辱一事非敢以為學力也見性之誨敢不從事盖讀孟子得百里之地而君之皆􅀎以朝諸侯有天下行一不義殺一不􅇳而得天下不為則學力亦至矣猶以為與孔子異然則士之任可謂甚重得其一二以為盡在是端不敢也或蒙索見前二書他有以警䇿母惜頻示何時扣繋臨􅁓惘惘荅天台張之望始僕讀足下􅀁著書心許之亦心疑之繋辭篇末輙略去世俗相賛􅁛語託古致規以觀候足下之志嚮深淺堅脆其虚受我耶逝􅀅與君咨其􅀁巳至者而講求其􅀁未至者其不恱辝我耶余豈舍之望者離未必合合未必相志越期年足下果復携書已来且以先君子故弟之竒之遺藁與其季氏􅀁為文十餘篇以相寵僕不自知釋然以喜非特喜足下亦喜吾交道之不阿素心之幸見察也且足下之書其於歴代傳統正偏南北宜宗宜絶自漢晋以来諸儒去取異同是否可以立㫁其於春秋三􅀓諸家章句孰得聖人意孰不得聖人意參互徃復辨論務明白乃已要其歸大抵貴平而惡鑿不以私意􅀓公道若足下之學可謂博且篤矣入􅆘於用矣僕雖愚頗好古道及其文辝凢今以是􅁛者未有聞而不慕慕而不求交者也况得如足下恵然肯顧先施而過賜之者乎宜一見顔色趍向巳决然猶因請而後明逾年而始信甚矣吾未知足下之􅀁歸也况足下容貌不􅀎逾中人言語呐呐無以自表見卒然遇之庸常稠衆中猶若人也先儒之論正統者歐蘇張陳數公皆巳名世春秋之學至程氏胡氏義精矣今人固習聞其人而好尚其書然猶曰吾方有舉子事未暇盡讀其視足下書何如嗜古者不必利於今足下其知之歟以僕觀先君子書䆒其淵源盖以樂貧賤尚志節為家世然則足下宜知之矣誠知之吾兾足下之無悔也無悔於今必有傳於後吾􅀁望於足下也雖然僕􅀁望於足下者又進乎此矣足下偏親在堂急朝夕之養卒卒引去有懐填然曽未䆒竟相期秋風不逺千里僕􅀁謂咨其􅀁已至而講求其􅀁未至者有日矣僕雖愚敢不修􅅚以竢與鄉守曽仲躬瑞安脚剰錢知蒙台慈除免甚厚又分給有次第仰見明逺千里無盖傳聞尚悉輸徃年夏秋租􅀅繇省符抑漕檄也如漕檄度惟深仁必有以巳之果由上来􅀅何以示恵盖積留而頓取之則昔日之奉今日之困曽不如勿􅀝閤也明道先生嘗於新法中曲折便民盖大君子不願法如何於其中為致意則雖微恵猶無虐是道也非吏部􅀅安望歟受知之深敢爾喋喋不以為僣易􅀅博訪􅀁以為便者嗣告與閩帥梁丞相論􅂄長壮丁事切見熈寜保甲法行始以保正副大小保長代􅂄户長壮丁承引催科之役至元祐間復差􅂄戸長壮丁法其舊以保正長代者並罷紹聖復雇役法再以保正長催科其保正長不願就顧者依舊召募􅂄戸長壮丁以此福建路􅂄户長壮丁徃徃與保正長並行不􅆸然其􅀁以不為民病者以其猶有顧錢也自紹興十年以􅂄户長顧錢撥入經緫制司窠名十二年又併壮丁顧錢撥入緫制窠名由是江浙諸州􅂄户長壮丁並􅆸惟福建諸州至今有之某照得福州官司檢驗緝捉催率勘㑹煩重之事必責之保正副大小保長而􅂄壮時時以縣司帖引追係搔擾夫役不給禄誠未易論然州縣曹吏日在官府猶可以繩檢譴訶之又不比􅂄壮散居鄉村為􅀉編戸莫知禁止也以某短見宜如江浙間事例一切􅆸罷毋重為民害亦仁政實恵之一端矣荅長溪王佐之某無以愈人獨博交當代賢俊之心出於天然雖以之得謗訕或相背棄不悔以此凢先生長者徃徃見察幸肯與之㳺而士之好學者亦或過聴以為可師友也而欲與之㳺向者䑓評云云誠非過當然初不知其中實無􅀁有偶然得此而遂疑其挾此以傲物也訟咎以来不敢復從群衆妄出巳見論事是非與人短長但杜門讀書不則熟睡足下廼欲舍几筵之奉從我于寂寞豈非益其疾乎息隂休影已出下䇿足下願秉燭而照之此某􅀁以辝不敢也因事懲艾當蒙亮悉然厚意不可虚辱􅁇此恵音不以淺漏􅀅必有以奉報荅林宗簡下問甚善古人之不可見􅀁以壊人心者非一端也受田百畝皆足以自給嫁女無過純帛五兩無圭田則不敢􅀕薦魚菽而巳舉一隅則他費称是而自䘮􅀕射鄉噐服巳上率數百家合力為之每與一事閭里共其勞以此皆農夫也而其秀民得從亊於學盖二千五百家而後有序三年而興之是謂草澤之士於公無廪於朝市無制其升於國則異是其從公卿大夫之子匹學校者固有廪矣其市朝固有制矣士之子􅁪為士不敢捨而之他也漢承絶學之後猶謹鄉教授之法而取士以户口率不敢開游士之禁唐之四門學􅀁謂俊士者則四方之􅀁升進餘皆品子自國􅀄以行舉誘致偏方之士而聚之中都向之為閩蜀唐漢偽官者徃徃慕化從順願仕於本朝由是家不尚譜牒身不重鄉貫以此得人而其流弊則在今日又自熈豐變役法而郷邑之豪無以自見鬻度牒而隠逸之路塞罷學䆒而椎魯之徒無􅀁入若此􅁼不可徧舉於是舉世悉由於進士合四瀆之流為一川而歸之海其不放而􅀍原野乎今其􅀔極矣度其變不逺上之抑揚闔闢恐非人事也荅朱文昭書問濶踈未有似此别者然得之徃来人知讀書著文不休亦足􅇺釋彼􅀁貺字帖具審􅀁論譔不少其意若欲續史家之緒又極忻怏未得即觀遥想増氣耳某窮日益甚意思却不銷沮年来反覆古者與論當世之務頗􅁴嚮者鹵莽思得故人共論此徃徃隔阻每一上心於邑移日近到東陽哭吕著作墓又迫蕃叟弟􅌾先叔匆匆遄歸疲頓不少且復休養㡬時或􅀎乗此暇日訪我仙巖之下何啻百􅁓相煖耶西漢士大夫深厚其季姦臣擅國群盗􅀼號而名卿大夫擇君而事之於是中興光武規摹窄狹而士氣薄矣晚来名節之盛要是衰俗一舉不勝散為吴魏之􅃥率多喜功自見其不肯叛去者南陽一輩耳徃時嘗􅀃西漢無節義東漢有節義殆未深考孝章一變明光之政漢祚遂微孝章誠可恨其不可􅁉後傳逺者大抵明光之為也攝古䘮禮也蘇氏引之未當若周公誕保七年豈是事例魯􅀮當國攝云者傳從其初言之也荅􅃍舜丞下諭律學極見詳博􅀁欲著書無惜蚤下筆因以見􅀉前書云云正以方今功業當付儒者自建􅂭創業嘉祐守文熈寜變法宣政召禍其間盛衰何可勝道建炎諸賢竪立亡㡬紹興季年粉飾上巳過獨慨然右克廣文聲之意而書生承紹􅁼皆齪齪以至今日吾黨宜䆒觀大方深求則講求􅆸墜以興文物如来示亦􅀅次第舉之耳不以為不足學也荅賈端老五去載蒙肯来相與於寂寞之濵荷意不淺淺髪齒衰改無復它覬儻假之年獲與士友共圖不腐於經術之餘志願足巳閒居湏課一書要當自古文書始踰年便可到春秋之末而及通鑑可也益􅉯未知㑹期願言加愛别去殊恨匆匆以循陔之念不欲奉留然終不滿也左傳且熟讀見得隠􅁊以前僖文之際哀定終篇無慮三變綱目則成書舉矣其它依經為傳文無虚彂優㳺不迫而意巳獨至盖非二家􅀁􅀎及非一二面剖難以筆舌盡也懿仲諸友巳决謀遷書院於先人壠下以爲来􅀊過從之地入春便下手春暮當奉約矣蒙㤙守壘交㳺借譽之力多矣幸甚以感讀左氏書頗有條貫䟽示於􅀁當報已一一据見釋其左方有一二條似不足疑也若今年了此書開􅀊便可從太史公史記下手陳了翁云譬如緝麻忙復暫舍暇而續之自成長條不忘室銘􅂊就即附上應不但巳也近稍爲眼昏花不􅀎苦讀書每客去則玩想向来􅀁誦習自娯不足爲念也示諭看過左氏傳甚善䟽問數條只是小小事目未是穿貫五覇之變五覇功罪未分則東遷之不競與歴年多䖏未見着落春秋同是聖人經世之用要其託史見義以五覇爲㩀案而左氏合諸國之史發明經􅀁不書以表見其􅀁書因五覇之興衰䆒觀王道之缺則戰國之事起周亡而秦漢出矣此其大略若夫精詳非面莫䆒太史公書又以接尚書春秋之統緒而下逮秦漢其用功略與左氏同而不敢比假春秋是以變爲紀傳世家書表耳何當合併共講其指讀史記甚善然有猥駮竒恠之疑何也􅀗麟以後孟荀推尊孔氏明禮義之統紀二子死百氏益亂真老儒如浮丘伯伏生之徒區區於秦楚之際抱經自而其力不足以彂揮前緒至漢六七十年間董大夫始䆒大業田何孔安國戴聖戴徳毛莫並出各有􅀁著而又未􅀎合群書爲一削其不合以存其合者太史談有意矣然六家之論猶崇老抑儒遷卒家學乃盡百家之精而㫁以六藝易本田何春秋本董仲舒書本孔安國禮本河間獨恨不見毛氏詩耳盖其融液九流萃爲一篇罷黜雜論自五帝紀以下盛有依㩀荀卿之後僅見此書尔其論五帝云再蒙言黄帝其文不雅馴搢紳先生難言之書缺有間其軼廼時時見於他􅀃非好學深思心知其意固難為淺見寡聞者道則􅀁得多而自􅀒亦不薄矣惜自班固看渠不過妄有瑕摘後生㳂習遂成牢談千五百年之間此書湮晦正頼吾黨自開隻眼不惑於紛紛之論謹勿容易便生疑薄也老矣不􅀎自白於後世常欲落筆少彂􅀁自識破者為前哲出氣因循未果近諸友為遷仙巖書塾於屋西偏今未就工後月足以奉合簮之歡得三兩人相􅂇檢討便可了此一項冬間肯来同社幸甚止齋先生文集卷之三十五
