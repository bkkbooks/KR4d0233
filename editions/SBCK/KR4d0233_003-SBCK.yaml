front:
  text: 止齋先生文集卷之三
  hash: sha256:612aac5a8f5d07960692fe3c352f67db06dd8ec9bece62d9f82ff54bce2dd1fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_003-1a}
body:
  text: 古詩赴桂陽道中喜晴書事十日九雨垂垂雪馬僵僕病泥乗橇披衣闖户得星月喜有耻向妻兒說耳根久與朝鷄别熟睡八年謀未拙乞米作糜蒙􅀍啜客来午漏家僮出如今兒噭妻愁絶我縱喜晴心已折可以藝麻多筍蕨苟有一丘吾計决柰何諸公厮役皆豪傑尚愛舂陵老元結簡友人二首南去有五嶺北来有重湖水清石益竒徃徃中州無在昔䆠㳺者越若韓張徒胡然自衡陽隻鴈亦不徂安眠夜至卯休吏日加申廪稍亦巳厚養痾非隠淪恨無封君法老矣藏其身遄歸豈不欲更有宜歸人和王教授謙叔述郡圃韻守邉豈無事治圃亦有說朝看士飲羽暮與客投轄且以示多暇且以勞同列我生腸九囬世故肱三折環堵僅尋丈短亭聊􅀊月忽蒙當宁記濫􅀘專城缺區區自米塩在在欲黼黻矧惟有兹山未省從何月張羅上空庭㝷斧及勁節舊觀誰緝熈新思蓋綿蕝幸方一小治謂拂雲尚可六太息謂芳州漱玉風月釣磯錦湖撫松胡然召南人而驟歌􅀁苃臨桂尉楊渭夫以詩来因次其韻兼簡同僚萬物各羙惡一室有面背去来故無􅁪欣厭惟􅀁會有􅀎悟兹理何必著幽䆳後圃並山麓􅁱竹積空翠斧尋自何年樊飬特過計陳根獨遭時沃壤亦借􅀔居然成獨清可以掩衆媚亭院起中否湖潦粲前際於時吾豈敢謂此天作對新詩忽盛談俗狀良内媿子方及歸期客復攪離思謂謙叔教授尚當封殖之去日如始至送宋伯濳宰髙安秋風日来諗役車何時休有鳴丘中琴玉瓉懐黄流此腰不可折此笏未忍抽亦入鴈鷺行而為稻粱謀四海楊誠齋吾道得自由悠哉思萬端哿矣試一籌風詩訖於􅃎易象重以周偶語詩易因詩及之當知横空翮不若逆水舟送楊渭夫歸省應侯氣蓋百粤小朱侯􅁩與灕江長兩侯愛士早成癖恠甚渭夫懐故鄉士窮萬事一不就就得一事窮何傷渭夫壮者忍窮久老􅂹欲秣胡沙霜吾家何在雲橫嶺趙媪不􅁈劉兒瞑孰與親旁煑湯餅渭夫􅀄至臨桂劉氏兒􅀍殺賊不獲不數日渭夫竟得之既而􅁠義寕令復有殺趙氏嫗者或執平人􅀅䖏死人以為非渭夫莫能辨府召渭夫與議旬日又得之南嶽聖業寺禹栢久與林􅐿居􅀁見皆衆稺豈無夀千年未有此栢異壮而嘗參天晚乃但仆地定非風雨摧殆是斤斧棄其本則離披其末則倒植其枯如殘枿而蔚有新意其靡如弱植而凛有髙致􅀅前復却行宜右忽左次驤龍或俯頋遁虎或囬眙隕石或猛起飛翬或顛墜山立或磬折尸􅃦或拳跽㫁支或強附橫陳或巽避綢繆情不狎頺墮力未瘁朴畧自光恠挺持匪標置終焉人偽盡獨以天巧遂吾聞古有道純朴去故智與世每如此全身亦㡬是疑􅀅問􅀊月缺弗見載記誰言導江時手植特嬉戯世人那得識㑹有神禹至牡丹和潘飬大韻看花喜極飜愁人京洛久矣為胡塵還知姚魏軰何在但有歐蔡名不泯夕陽為我作􅀄霽佳節過此無多春更燒銀燭飲花下五陵佳氣今方新張漕行部過湘岸有作因次其韻春晚得新霽草木日夜緑陽光􅀄蔽虧野􅊕或單復羙人浮湘波領此入蓬屋故放歸㠶遲更呼漁火續窮探物精華盡付詩凡目憶昨欣晤對令我忘休沐劇談酒行希危坐兵衛肅相思正􅀝樓􅀁􅀉忽累幅瑰辭堪買貧軼韻和難属自從楚騷興悲些逮差玉後来數唐人欵乃巖隈􅀫世無梁昭明斯文又誰録送王南強赴紹興簽幕四首詞章行天下嘉頼二百年甲科至公卿誰敢謂不然有人妄媒孽一世所弃􅂢我亦欲護短諱不言幽燕汗簡在吾後覆車在吾前人人尊孔孟家家誦詩書未省有宇宙孰與今多儒儒者道如砥豈其自﨑嶇申以黃老􅆸賈以絳灌踈漢家嘗紛紛政爾門户殊歴官如歴階越等多􅀁傷柰何􅉾堂水持綆萬丈長誰無斯世方乃此袖手旁永夜淚不禁仲尼故皇皇又聞雖小魯乗田問牛羊聞之浙河東見之湘水南未歸却相送既喜復不堪行矣乞自便帥幕或可參君方乗日長勉爲停朝􅆖我池有螃蠏我園有黃柑題明皇醉歸圖􅀐者兩人扶不正夾道誰知爲萬乗一人前馳一頋後懐欲並驅無號令狩人亦忘記鷹犬仰視只愁天欲暝有司刺􅀱上起居杳莫得詳宮鑰靜鳴呼開元自英主前鑒竟遺盈幅􅁓君不見漢宮圗妲己未必當年甚如是送范憲東叔帥潼川四首離逾十年合合復十月離徃日苦無及来日忽未知江源與海通呉㑹與蜀違通固天道常違亦物理宜勿作兒女感是中有精㣲相從意氣豪相知􅁂毛斑細說竟昨非淺斟始今歡每懐吾黨多未捄此世難一則􅅣冰雪再則紉芝蘭騷人絶芳㓗孰與風人寛有書但􅃒眼有位亦養痾養痾猶近名􅃒眼巳患多聊復􅀊晏爾柰此人逺何聲光正橫空議論如懸河宜君見别輕欵曲理則那逢人九頓首遇事三折肱雖知少為狂正復老可憎吾今有儲粟吾昔有短檠魯論訓何如周易讀未曽言歸又言歸兒女喚不譍行湘喜雨簡劉公度周明叔􅀅行客有戒正􅀬人不禁出門一昔雨解䌫十日隂湘山益以碧湘水益以深天光接雲夢野􅊕蒙衡郴蝇無盤中蹟蟬有木末音頋乃􅆸枕簟爰方索衣衾我起問夾岸徃􅀊孰輿今衡茅或數間叢竹皆十尋蒲蓮間華實鷗鷺時浮沉老稺各有得漁樵不相侵早揷禾欲孕新炊粟如金為之失倦㳺扵以成􅀌斟永懐泛湘人屈賈多愁吟徃者亦此境今者亦此心空名但千載佳思誰一􅁭時哉不可失浯溪更駸駸劉連州和前韻因道湘中之樂以謝湘中足可樂誰苦愁不禁孌彼蘭􅈍姿固怯霰雪隂賈子天下士子何念慮深貞元兩御史南還㑹於郴亦復相唱酬間有亡國音愚溪更憔悴中夜起擁衾而得欵乃句膾炙循至今我後五百年公来􅆘相尋田疇􅀊膴膴獄市春沉沉寬書日夕下民蠹祛牟侵况也省賦甚小郡至萬金交歡有陸賈私恨無羊斟我飽竟甘􅆍公暇多長吟廼知湘中樂􅀜時匪􅀜心湘民忘勞力樂極翻沾􅁭却愁吾二人四牡歌駸駸聞葉正則閱蔵經次其送客韻以問之順水去呉㑹逆水来䕫門萬古逆順舟以斗占旦昏曩余好百家信不及魯論􅀄亦半喜愕久之乍亡存白髪一無成頗識委與源風停波自平却視消長痕六經夫如何夫子手􅀁翻恒言但桑稼恠志無鵬鵾規圎而矩方徃徃萬巧攅諸儒各有得長短賢若干玉帛相㑹盟兵車相并吞一語苟暗合羣生皆晏温經成今㡬年嘗試以是􅀚此道未軻死此書未秦燔猶之斗經天於以生盖渾西方亦人豪國自為乾坤書来入中州坐使學者奔君豈捨從之或但遊其藩吾聞欲乗槎鑿空訪河根孰與瞻斗車把柁行江湍和張倅唐英詠梅十四首種梅欲百畝誰老意未渝有山在堂背有溪在庭除我危坐中央花以寘坐隅人固不可親花亦不可踈花芳以飬性花隂以休影更欲從旁謀種秫可半頃衝寒時一觴我醉花獨醒醉醒兩相忘久矣繋歸艇因山爲髙下因水爲縱橫恣花欲何之勿撓􅀁性清却愁雪太深瞻言不勝情有時亦肎来當我户牗明我豈愛花者而獨愛此花愛之匪無人詩且數百家前有水邉橫後有竹外斜但作如是􅀚桃李亦可誇人言物不齊相較三十里以梅等羣芳何啻隔弱水杜陵狀百物無語可著此廵簷索之笑但不禁冷蘃駸駸入衰暮故作不潔清羙人羙無度可使一國傾胡然立林林夾此東西榮對之意自消令我欲近名以之爲雪耶雪或墮汙淺以之爲玉耶玉或附旒冕春前每嘗試􅀊晏不退轉悠哉似有道可與共舒卷政應違衆好可忍􅀒幽探以兹落南雅蜂蝶獨遺憾豈無好顔色一雨竟陳暗誰知歳寒姿可久非可暫若以色見我色衰令人忘香為衆妙宗妙亦不在香鄉来芸芸者自意傲雪霜當斯玉立時曽莫一在旁遲遲可殿後寂寂可鎮浮風人第一章􅆼窕河之洲穆如三代英惟此宜與儔不然則臞仙玉簫下秦樓紛華有心說艶羙得目送越在篁葦間頋使詩興動詩人􅀍花惱盡日手自弄愁吟日不足又作栩栩夢亭亭湘岸竹炯炯湘波月其中雪垂垂一􅀣為誰設不應皂盖人扵此䏻忘折折之􅀉相思可以慰分裂商山皓􅂡眉久不見綺黄邂逅一笑粲可與斯人當如何為林逋托根向錢塘居遺蘭與芷牢愁楚沅湘先人手􅀁種家在何䖏村自别此堂堂不知㡬寒温盍歸封植之􅀊􅀊為此言老如霧中看正恐目力昏招隠二首􅀅子無登山山上岡復岡朝為朱陽煒暮作隂飈涼磴滑幽鳥啼林深山􅀑翔子􅀆何􅀁求樂此螭魅鄉國人佇齊軾吾黨多魯狂望子子不来翠䄂天風揚緇塵擺落盡幽願次第償焦鵬入冥雲蟣虱寛貝陽子􅀆竟誰􅀙獨樂無巳康豈其羊之飢而可穀與􅆇􅀅子無渉水水深下無極鯈魚舞浮陽螭首闖隂碧弱去一羽沉惡来萬波激子􅀆何􅀁求快此蛟涎滴議諌起陽城拾遺招李渤望子子不来羊裘號逋客踞坐山石麤晞髪朔風疾亂流兩白足何日踔踈逸扶踈清逸倉司二亭子􅀆寜不悲飢氓俟唐稷豈其洛之涯而可温與石記夢窪然石壁罅㳙㳙如絲䋲其人指此泉下去為滄溟旁有玉蟾蜍空中底方平視之鼻通尻徹竅刻畫精泉從鼻聦入可止不可盈欲問巳無人我亦悟我生惜㢤􅃄火食滓我朝清明止齋先生文集卷之三
