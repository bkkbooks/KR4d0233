front:
  text: 止齋先生文集序先生禀􅈽天頴研盡學力據六經奥會執九經百家之轡俾環嚮以趍于一披剔文義躪藉衆糾究明帝王經世宏模而放于秦漢以下治􅅍興衰之故獨掲源要不牽多􅄮由是彰往考来默察當世丕平之機深抱大業至扵化裁推行不動聲色使人囬心而嚮道者其綱領條目靡不該具盖嘗忘寝廢食審玩孰復庶幾對越天地百世以俟後聖而不感也雖言論未孚㡬進輙沮而志念囬皇與物委蛇左推右挽旁接廣诱其任重道遠终老未當一日敢忘扵斯焉嗚呼盛矣鄒魯之統緒河洛之承續千載以来不知其能㡬見也執經户外方屨闐集片言落筆傳誦震響塲屋相師而紹興之文丕變則肇扵􅂭興之癸未屏居梅潭危坐覃思超詣绝軼學成道尊則􅃉於乾道之丁亥博交遍騐洞礙融窒對䇿初苐懇藎獨到則盛扵乾道之壬辰官太學倅閩府詆劾却掃勤十寒暑紬繹文獻宏綱具舉則備扵淳熈之丁未起守挂盟持節湖南䟽滌拊摩民信有古百年之思欝乎湘山則騐扵紹興之庚戌召對光宗驟遇奨用侍立代言賛翊儲邸次苐藴畫庶􅀅發揮則著扵紹熈之癸丑宛轉極諌徬徨乞身龍飛急召十旬乃罷爰抒舊志著于训傳疾疢漸臻梁木竟殞則終扵嘉泰之癸亥叔逺夙蒙挈䇿俾窺津涯蒿幹鷃羽惕􅀒大賜適當新義川漲群文蝟興疇昔愬析而致􅀌條之靡欝砥途之失榛乎是用敬輯遺稿寄諸琬琰儻開後􅈒庶弗淪墜矧韋布眩墓影響編傳􅂉混㓜作或雜真贗詭題叢帙誕弥遐陬輪耀掩汚理合􅁵别故今裒次㫁自梅潭丁亥之後凡為歌辭古律詩内外制奏狀劄子表啓書簡序記雜著􅀕文墓志行状總五十一􅃃即先生燕坐之齋以爲集名若成書則有讀書譜二卷春秋後傳十二􅃃左氏章指三十􅃃周禮進說三卷進讀藝祖皇帝實錄一卷未脫稿則有詩训義周漢以来兵制皇朝大事記皇朝百官公卿拜罷譜皇朝財賦兵防秩官志藁别自為編附識其目庸熄淆亂先生名傅良字君舉世系㦄官具見于神道碑墓志銘行状云嘉定戊辰門人承􅀡郎太學博士曹叔遠謹序止齋先生文集目録
