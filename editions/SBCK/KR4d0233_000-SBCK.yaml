陳子益母夫人墓銘林民逹墓詺何君墓誌銘朱公向壙誌胡彦功墓誌銘承事郎徐公墓誌銘新㱕墓表第四十九卷誌銘敷文閣直學士薛公壙誌陳季陽墓誌銘脩職事吕公墓誌銘徐武叔墓誌銘陳習之壙誌承事郎潘公墓誌銘林懿仲墓銘第五十卷誌銘沈叔阜壙誌族叔祖元􅁇壙誌族叔祖元成墓誌銘族兄際可壙誌髙光中墓誌銘陳百朋壙誌王道甫壙誌族叔􅀦任墓誌銘洪君墓誌銘令人張氏壙誌第五十一卷行状右奉議郎新權發遣常州薛公行状福建長樂縣主簿諸􅁑公行状􅀦子司業何公行状第五十二卷附録宋寳謨閣待制贈通議大夫陳公神道碑樓鑰撰宋寳謨閣待制贈通議大夫陳公行状蔡㓜學撰宋故通議大夫寳謨閣待制陳公墓誌銘葉適撰民論舟􅀃責盗蘭􅀃戒河豚賦守令䇿􅀵民心䇿章子林子名􅀃朱甥子藏名說止齋先生文集目録卷終止齋陳先生文集序儒者之所難曰徳曰功曰言而已三者克具斯為儒者之盛逺而有以恢弘魯鄒所傳之緒近而有以昭䦨濂洛未啓之機尚論其世有足徵者此止齋陳文節公所以不可及也公少以斯文為已任強學篤志弗得弗舎其從鄭景望薛季宣也以克已兢業為要其友張欽夫吕伯恭也則交致夫持敬集義之功􅆂養扵致知之際躬行扵自得之餘剛毅樂易孝友㳟肅融澈混成莫測涯涘是􅀎立徳者矣其教人也誘掖不倦四方景從士習丕變随才有造其仕扵外也事無細鉅一裁以義勸善革奸縮用溥利卓越之績傳不絶書其在朝也正色讜論直前極陳扶翊大政匡持君徳欲進忠賢則黄冕仲朱元晦之遷改不與書行欲摧權奸則率逢原張子仁陳源之除目繳駁論奏茍禆社稷奮不顧身是􅀎立功者矣讀書有譜六􅀴有論建隆有編毛詩有解詁春秋有後傳左氏有章指周禮有進説制誥有集皇宋有大事記進讀有藝祖實録周漢以来有兵制著書明道簡冊充棟是􅀎立言者矣功在人徳言在已三者相湏以為用者也瓉幸生公之鄊屡甞誦讀遺文而􅀻淑之茫乎如隂陽之闔闢也浩乎如河海之㴸潏也燦乎如日星之炳耀也油乎如風雲之流行也雄偉而不放精深而不晦馳軼而不迫起伏歛縱愈出愈駛引古質今滌冗為新錯綜萬務體悉人情而歸宿于至理盖不獨繩矩之具而精粗􅀮顯皆可以適天下之用自有文字以来學士大夫竦企傾動固其時乎非有本者其孰􅀎之公淹貫六􅀴包括百氏洞徹天人之奥而扵歴代􅀴制大法與夫當世制度沿革失得之故稽驗鈎索委曲該洽此豈汎然雕􅅚以騖扵虚言者也公文散載于群書遐􅑍寡陋未見有統彚爲全帙者瓉近扵秘閣録出公集玉十二卷則向所甞誦讀者百無一二存焉盖曺公所編止自梅潭丁亥之􅀊而他作不入也弘治乙丑侍御史同年澤州張君伯純徃巡浙中因論鄊哲而扵公􅀹致嚮慕瓉遂出示公集伯純喜曰璡求公文乆矣而莫􅀗見之是行未廣也請得梓之以傳且欲彚拾散逸以為外集伯純積學善文風裁峻整在公若有􅀫契焉者宜其樂公之制作行扵時也瀕行属瓉序于集後瓉何人乃敢序公文哉况樓蔡水心諸公紀述備矣􅂓摭立徳立功立言之實以寓㤗山喬嶽企仰之意然公名髙招忌行方取詆君眷未㡬而輙沮道術畧伸而復斥不肯少貶以從流俗而所謂立功者未䏻充滿其志而國運䆮以衰下矣可勝歎哉天佑斯文而使公之制作復行扵時固世教之􅀁􅀜也弘治十八年􅀊在乙丑夏四月既望賜進士及第翰林院編􅁱文林郎經筵國史官鄊後學王瓉謹序
