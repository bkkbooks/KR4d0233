body:
  text: 第一卷歌辭暮之春西廟招辭并序古詩落葉一首别諸友讀范文正公神道碑有感佚事送􅀦子􅁥丞顔㡬聖提舉江東分韻得動字懐寧􅀦守鄭少卿景望送􅀦愽叅議江東分韻得夜字逰皷山和縣偉卿雜言送林正仲丞玉山和林懿仲喜雪韻再和除夜用前韻和林宗簡除夜韻再用喜雪除夕二韻􅀉宗簡賦芙蕖送楊似之提舉湖南哭吕伯恭郎中舟行􅀉諸友張冠卿以詩十首見􅀉次韻奉酬黄巖張之望之立来訪與逰梅潭詩以送之和張孟阜㝷梅韻送劉茂實宰奉新送趙叔靜教授閩中四首送白石巖和孟阜老梅韻再和第二卷古詩送同年林多益丞海寜送謝希孟陶㸔笋和潘飬大韻贈尹紹伊送郡守汪充之移迨嚴􅁜􅀉題陳同甫抱􅂰亭送葉正則赴浙西憲幕送葉陳益之架閣送翁誠之慰慈溪送包清卿教授莆中作南塘記郡守沈持要以詩来謝次韻奉酬送謝倅景英赴􅊴懐同舎石天民編􅁱次韻蕃叟弟月下有感夢人誦詩􅁴省數句足成一首送曹噐逺試臨安二首約同舎蜀人王徳􅁱三首次徳脩僊巖韻再用韻呈徳􅁱夷門􅁔送徳􅁱還􅆣借書一首别薛子長􅀉陳同甫生日述懐簡鄭景元簡王道父贈東陽吕望孫周登二武士書黄巖丁明仲墓誌碑隂第三卷古詩赴桂陽道中喜晴書事簡友人二首和王教授謙叔述郡圃韻次臨桂尉楊渭夫韻送宋伯潜宰髙安送楊渭夫歸省南嶽聖葉寺禹相牡丹和潘養大韻次張漕過湘㟁韵送王南强赴紹興簽幕四首題明皇醉歸圖送范憲東叔帥潼川四首行湘喜雨簡劉公度周明叔劉連州和韻因過湘中之樂以謝葉正則閱蔵􅀴次其送客韻問之和張倅唐英咏梅十四首招􅀮二首記夢第四卷古詩始生七章上皇子嘉王生辰送丘宗卿帥蜀短􅁔送吕子約丞郡天台送黄子文得縣瑞安送陳仲孚還里李夢符教授恵宣聖畫像用韻奉酬還徐叔子犀帶憶笻杖蘭花供夀􅀦舉兄東陽郭希吕山園十咏送郭希吕水仙花止齋曲廊􅀄成次沈儉夫求花木韻春晚書懐二首奉簡陳益之題沈仲一􅀁蔵周氏群公書帖贈章虞卿并序題僧法傳為沈仲一􅀞聴松圖送􅀞僧法傳題瑞安宰朱元成乃祖雲壑莊圖咏梅分韻得蘂字送蕃叟弟赴江西帥幕分韻得獨字皷琴行送許父同知赴􅆣并序送徐一之客贛上兼簡薛象先弟五卷律詩新昌詠歸贈石時亨并序題觀潮閣上閩帥梁丞相生日二十二韻送鄭少卿知建寧五首庚子除夜有懐送沈元誠赴臨漳主簿送徳逺弟赴省和張孟阜􅀊旦韻􅀉沈元誠晚春二首送縣謇卿赴壽昌主簿哭吕大著至明招寺簡潘叔度招徐居厚天台王子木觧官長樂見訪月夜書懐二首送周魯山辰州法曺㳺丁次翁篔簹園期次翁永至送朱同之福州户椽覔􅀣栽題仙巖梅雨潭次陳益之韻􅃧呈汪守充之汪守三以詩来次韻奉酬酬謝倅景英用前韻見􅀉用幽宇韻􅃧簡謝倅用前韻呈汪守謝倅用前韻荅賈端老月仙巖還舎留别諸友送任虞卿教授江隂和謝倅見贈生日二首再和謝倅生日景元益之考試旁郡夢與歩月聮詩得銀字韻追成一絶謝倅監試未畢事而出以詩三章来用韻奉酬沈仲一三益堂逰金奥趙園海棠絶句湖樓送客即事一首奉懷益之兼簡同餞諸友春晚一首約同志汎舟用前韻招蕃叟弟仍和蕃叟癸卯二絶送翁誠之尉慈溪和陳仲石韻送陳仲石韻送謝懐英道士歸廬山二首送陳持中赴四明節推二首􅀉彭子復徐子宜次韻酬丁少詹瑞安宰劉伯恊載酒逰園小雨喜霽和丁少詹韵病餘遷仙巖書院扵屋西有懐同志酬陳頥剛見和􅀉謝景英參議􅀉題翁誠之慈溪縣尉􅈦無我亭和沈守持要賞柑三首和沈守觀潮閣留題奉陪王徳修登觀潮閣兼呈劉宰落成王朝奉廟以簿恙不預謝劉宰并諸郷丈五首和沈守題謝公樓額沈守生辰觀南塘四首呈沈守第六卷律詩桂陽勸農九日奉呈同僚四絶句郴守丁端叔以九日詩至次韻奉酬再用前韻簡丁端叔和丁端叔聴梅二詩韻丁端叔送牡丹以詩来用韻酬之和丁端叔􅀊晚書懐丁端叔送海錯以詩来用韻酬之酬王判官和九日韻四絶戊申臈桂陽喜雪再用喜雪韻一以書懐一以喜客題范秀才萬卷堂和段仲衡同令嗣天晴少出之作陳頥剛注孫子許拾遺贈詩用韻酬之和段仲衡譙樓新軍額二首和蕭俊仲司法咏譙樓新軍額韵送洪子端還鄊送吳徳夫楊伯子以尊人誠齋南海集為贈以詩奉酬潭帥潘徳酈生辰和衡守劉子澄韵㳺南嶽登祝融峰喜霽和沈帥特要張漕季長韻二首送沈帥携客過王提舉園訪梅用劉連州韻再用韻簡劉連州夀張漕謝司馬倅惠東坡竹石和趙帥夀張漕韻二首題来陽黄宰詩卷送黄元吉懐歸丐祠送范東叔㱕帥潼川送丁懐忠教授象州長沙臈月雷後雨雪帥趙俊臣以詩相賀用韻奉酬再和趙帥復賦詩来用韻酬之用韵咏雪簡湘中諸友贈張孟阜絶句用趙帥韻為孟阜觧嘲登祝融峰觀日出舟中奉呈趙帥一首除浙西憲舟過釣臺有感第七卷律詩上皇子嘉王生辰詩三章􅀽起巖㑹飲湖上一絶再和􅀉陳同甫送辛卿㓜安帥閩送盧郎中􅀦華赴閩憲送范大著文叔知彭州和劉進之韻兼簡吳阜之􅀄夏有感因用前韻送潘徳久之官建康同逰張園次韵奉酬方輝先送􅌼正甫侍郎賀正喜雨送曽􅁇先赴山隂路鈐送何起巖之江東上元日同京仲逺諸公訪郭殿帥㳺鳯凰山次韵癸丑冬車駕過宫留相還朝和樓大防尚書送行韻折子明提刑自湘中以詩問訊用韻酬之泊釣臺灘下登明逺樓後春六日奉和陳徳承韵兼簡黄竒卿張伯廣二賢為别贈杜伯髙除夜宿䖏州天寧寺􅀉僧嗣清􅃽䖏州仲可恵酒再用前韵丙辰夀􅀦舉兄送長溪髙􅀦楹􅀙學朱元晦以兩鶴夀薛象先重陽日􅀉瑞安留宰和林宗易菊花韵和沈仲一北湖十咏周宣義三子登第用前韵奉􅀉再次簡新第諸人送瑞安尉林叔全導人還鄉送林叔全秩滿㱕四明送雪菴瑾禪師還山周和叔通判雪寒索酒􅃧用来韻以􅀅朋尊奉和周蕃伯用王道夫韻二章見􅀉夀叔祖母東陽杜季髙遠訪詩以送之春日和林宗易韵移花送花送花還宗易逰鳴山寺即席和徐一之兄弟韵和徐叔子用林宗易韵見示和徐叔子勸農韵呈留宰逰金奥趙園賦海棠梨花呈留宰赴留宰寳壇之集因和蕃叟弟趙園韵示留宰或以詩送来禽次韵奉酬逰雲頂院和徐叔子韵夀薛象先酬蕃叟弟韵夀潘省之丁巳壽􅀦舉兄第八卷律詩村居二首和宗易作屋之什送縉雲葉正􅀄兼簡杜伯髙和宗易賦素馨末刋白蓮韻沈仲一送菊得詩為報為賦二絶仲一以詩来用韻奉荅􅀉題薛象先新樓立春除夜用前韵送子壻林申甫還侍逰趙園赴林宗大招賞牡丹之集􅀉謝懐英髙士和張端士􅀄夏兼簡潘飬大送周介之同年赴徳化宰謝林黙之居士恵酒戊午夀􅀦舉兄止齋即事二首􅃧題止齋叢石重陽和朱直方韵用徐叔子韵送其過毘􅁜送四明汪文子􅀉九江宋居士酬劉進之巳未上巳清明莘叟兄蕃弟偕潘飬大過訪和林宗易上巳韻和林宗易雨後韵兼簡沈仲一張端士以詩送蘭蕙因和其韵兼簡潘大以速肯来寶壇和林宗易韵荅朱翔逺見别之作甞語客蓴鱸橙􅈉的對因成二十八字因客􅀃秋秫水傷復用前韻巳未生朝謝莘叟兄送梅二首覔花和徐魏叔見􅀉三絶和朱宰㳺丁園韻庚申上巳清明後一日宴客明日宗易送牡丹有詩次韵和汪仲嘉樓大防二尚書賀鄭貴和華文休致韻寒食早起􅃧和林宗易韻二首次莘叟兄韻送四明方伯起送楊渭夫入淮􅀙族叔覔老桂蓮花􅀉林宗大和莘叟兄咏張子房韻朱及之以􅀁種荔枝結實招飲不及赴以詩謝之􅀙徐一之覔菊次韻奉酬徐一之送菊􅋝植姪得男朱文昭􅀉詩即席韵送鄭主簿太興觧官㱕四明送孟延昌㱕蘭溪劉進之飲蕃叟弟筠亭賦詩因次其韻林宗易劉進之見訪有詩再用前韵題錢宰吸光亭圖第九卷挽詩擬進御製孝宗皇帝挽詞五首孝宗皇帝挽詞五首挽吴明可給事挽木奉議悼􅃽昇仲承事挽族叔父題丁少詹姑墓誌後挽樓朝奉挽包顒叟挽張子由母挽潘才叔母挽周宣義挽婺女周茂宏挽薛季益尚書挽彭通直挽沈次􅀸學正挽林承信悼林仲逸縣尉挽張材卿知郡挽新昌吕脩職挽􅀹延之尚書挽沈虞卿侍郎挽東陽郭徳􅁩悼楊休甫挽宋巖老叅議悼劉謙之知録挽王興之提刑悼濟陽夫人挽張春􅀸尚書悼翁仲立逹州挽劉端木司户挽林致賢禔舉挽劉茂實和州鄭自眀哀詞并序第十卷内制慶元改元詔哲文神武成孝皇帝梓宫啓攅塗前奏告祝文啓攅畢梓宫還殿皇帝􅀕奠祝文發引前一日􅀄更總護使行夜􅀕禮祝文發引前期􅀕告錢塘錢清江龍神祝文發引遷奠祝文掩攅前一日奏告帝后攅宫祝文掩攅祝文九虞􅀕祝文九首掩攅畢謝土神祝文安南􅀦王季龍翰加恩制賜知襄陽府張枃辭免叚差知建康府恩命不􅁢詔賜宰臣趙汝愚等上表請皇帝還内不乆批荅賜趙汝愚等再上表請皇帝還内冝􅁢批荅第十一卷外制皇后歸謁家廟親姪李孝純孝友各特轉右武郎皇后親姉李氏等封􅀦夫人皇后親姪孫李瑜李璨各轉兩官皇后親姪婦潘氏趙氏親姪女李氏並特封恭人親姪孫女李氏特封安人皇后親姪女夫韓松特轉一官皇后親姪女之子韓大用大任各循兩資皇后親属韓大有轉承信郎皇后閤提舉官楊舜􅀸轉觀察使皇后幹辦宅張友直沈植各轉一官皇后閤主管進奉􅀽佐等該遇皇后歸謁家廟並轉一官秉義郎韓仰胄授閤門舎人皇伯嗣秀王伯圭合得冠帔並換封孺人賜親屬内􅀅一名與妻妹宋氏封孺人閤門宣賛舎人㳺恭落閤職􅁠發遣臨安兵馬鈴轄起復文州刺史知鳳州郭諝轉復州團練使􅂯任皇兄多才磨勘轉明州觀察使武功大夫利州防禦使權知閤門事韓侂胄落偕宦臣僚􅌳奏特與轉行右武大夫入内内侍省副都知張安仁除都知入内内侍省押班李彦正除副都知帶御噐械于惟􅁱􅁱楊舜卿並除入内内侍省押班張祐正􅀘承信郎鄭孝友應奉有勞轉一官殿前指揮使左班年代上名劉成等授官皇弟多助多䏻並該磨勘轉防禦使入内内侍省東頭供奉官霍汝翼轉歸吏部除帶御噐械招箭班殿侍訾彦澤􅀘承信郎仍舊在班祗應瀘州軍變守臣張孝芳􅀍害贈三官與二子恩澤瀘州􅀍害官兵贈官及與子恩澤廬州撫幹郭仲溥失􅁴察虞候張信為􅅍首特䧏三資放罷太史局學生周奕􅀘挈壼正閤門㸔班祗候霍寛夫供職實及二年落㸔班一字􅌼思該􅁱壽皇聖政轉一官著作郎黄由等該􅁱進夀皇聖政各轉一官徐靖等該進壽皇聖政各轉一官降授昌州刺史帶御噐械霍汝翼該進壽皇聖政轉成州團練使宗正少卿鄭汝諧奉使囬轉一官閤門舎人譙令雍奉使囬轉一官轉奉使屬官譙令憲等囬各轉一官閤門宣讃舎人宋尭使等該應奉人使十次賞各轉一官浙江潮神善利侯祈禱感應加忠靖二字􅀽州仰山神加父母死及子婦封號平江府五龍靈濟廟加封進士􅀺崇禮年百三􅀊選遇大禮恩􅀘迪功郎翰林醫愈邢守忠轉外翰林醫痊第十二卷外制給事中兼侍講􅀹袤除禮部尚書兼侍讀中書舎人黄裳除給事中兼侍講䧏授朝散郎許及之復朝請郎忠翊郎前韶州兵馬監押周昇䧏成忠郎文林郎階州􅀅利縣令藺森失出犯公罪笞特䧏資保義郎李珙家遺火燒民屋特降一官故通直郎趙公廣追復承議郎奉議郎知􅀽州黄劭䧏一官承節郎旴􅇇軍指使潘撫權淮河􅁥渡不職䧏一官放罷􅁱武郎張世榮管押􅀊憋恣横生事䧏兩官承議郎常徳府通判趙善彦在任不法䧏一官放罷奉議郎知成都府郫縣郭公謩昬謬䧏一官放罷入内内侍省東頭供奉官王師珪轉歸吏部差在京宫觀