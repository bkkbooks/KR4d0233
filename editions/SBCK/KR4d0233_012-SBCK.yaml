  text: 止齋先生文集卷之十二
  hash: sha256:10a1eb20459ccd494df0291ac97bdf90da79b13e99b830d7c7eb7daf60de8236
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_012-1a}
body:
  text: 外制正議大夫守給事中兼侍講􅀹袤除禮部尚書兼侍讀四年正月十一除禮書三月二十日兼待讀二詞併行敕方朕在東宫時嘉與僚友切磋􅀴􅁩緝熈光明肆以菲躬託于兆人之上克奉詒謀庶㡬寡過永懐三益冝如之何具官某慱極群書折􅂨六藝凢與我言者於今不忘也憫勞􅃈闥位之春官進讀路門以竟餘論昔者甘盤輔髙宗於舊勞之時而無與於中興納誨之選至漢二䟽同􅀓太子而亦不在􅀄元醻功之詔我有故人始終典學視昔盖有光焉爾其輔飬精神陳古以誡今惟母以謝事之年而有遐心則朕以懌可朝散郎試中書舎人兼皇子嘉王府翊善黄裳除給事中兼侍講四年正月十一日除給事三月二十一日兼侍講二詞併行敕朕有元子出就外傳敷求其人盖累年於此矣晚得三益聰敬日聞間甞侍燕􅀙容䏻道二南之化朕嘉其勞圖以自近具官某習先聖之術而於當世之務凢與吾児切磋言之者皆實學也是用擢之􅃈闥勸講路門冀發其藴并以告朕昔四皓調護太子而不屈於髙帝李泌以布衣交肅宗而不䏻安其身於君側爾以西州之彦出入宫邸爲父言慈爲子言孝是不謂之遭時乎尚其殫竭以報簡知可䧏授朝散郎許及之前任淮東轉運判官不覺察私錢䧏一官滿一期復朝請郎勅某官日者淮錢多姦禁不以道有受其咎者矣爾其以同過之仁而不言上亦􅀙鐫秩非􅀁謂吏議乎閱日既久冝還其􅀄可忠翊郎前韶州兵馬􅁥押周昇在任不法降成忠郎敕具官某爾為兵官而州家以佚纍囚来諗雖㑹恩不汝貸也其鐫一階以警慢事可文林郎階州􅀅利縣令藺森改􅀄驗因傷身死人杜十四作凍餓身死失出犯公罪笞該赦取旨特降一資敕具官某吏與吾民親莫如令爾尚不知其􅁈死也而以為道殣曽謂與吾民親乎其鐫一階毋以恩免可保義郎李珙家遺火燒民屋四百餘間有司自来以屋直計􅂍坐罪得㫖宣諭依條聴贖臣僚上言特䧏一官敕具官某􅀓春秋者有人火之􅀃則無􅀁㱕咎之辝也爾下戒于火而禍及於閭巷􅀅安咎乎尚爾闊略其上一官可故通直郎趙公廣昨知饒州因旱歉民流臣寮奏追兩宫勒停男彦倓訴􅁈特追復承議郎敕具官某左右諸大夫之言朕知其不如􅀦人也爾守畨中遭􅀊不淑􅀎有惻􅀮之實而不為文具而逹于朝聴者皆反繆言者不置麗于佚罰而爾既賫恨於地下今觀闔郡連編累牘哭汝甚哀盖棺論定莫公於此朕為憫然盡還舊官不但慰汝亦以勸耒者之勤民也可江西運副鄭汝諧奏奉議郎知􅀽州黄劭丁母憂不肯離任倍支棺櫬䘮服官錢等候服闋日䧏一官不得與親民差遣敕具官某爾甞􅀅母以就二千石之飬垂及滿􅀊竟以䘮㱕漕臣見劾侵紊郡計姑鐫一秩俾務省循尚盖前愆朕豈終棄可承節郎時眙軍指使潘撫權淮河監渡不識降一官放罷敕具官某􅁁禁之嚴而弛於汝免官鐫秩以警後来􅀖憲有常非我佚罰可淮東運使趙師睪奏脩武郎張世榮管押􅀊􅁦㳂路恣横生事䧏兩官送吏部與合入差遣敕具官某發􅁦扵􅁁事􅀜逺聴紛譁不靖使者有言闊略弗懲人􅀅是傚其貶兩秩且屬銓曺庶使􅁁臣繼今知懼可湖北提刑張垓奏承議郎常徳府通判趙善彦在任貪婪不法降一官放罷敕具官某部使者􅀁治且有良二千石焉爾丞郡顧不以治行聞而速宫謗非朕􅀁以奨用屬籍之意矣其貶一秩免􅀁居官􅁇今有耻亦免汝棄可知成都府丘崈奏奉議郎知成都府郫縣郭公謩病昏乖謬䧏一官放罷敕具官某夫不䏻勝其任矣而昏於酒黷於貨然而郡太守猶以為甞有郷曲之譽不寘于理鎸秩免官吾亦從薄罰焉其對􅂭寛益思懲艾可睿思殿祗候􅀉資武功大夫入内内侍省東頭供奉官王師珪轉㱕吏部差在京宫􅀚免奉朝請敕具官某自以諸司使改今􅀉祿官而内侍與戎行雜矣然而名不在銓曺之籍則猶非秩官是則異焉耳轉而屬銓斯為寵渥閔勞朝謁祿以真阿爾其敬哉毋曰序進可武功大夫祁州團練使入内内侍省副都知李彦正武功大夫明州觀察使入内内侍省押班楊舜卿職事不謹各䧏一官敕具官某等朕惟周制内宰掌王内之政令㑹其屬之功事而賞罰之今内宰不設而爾等不䖍于事實干宫中之罰其上一官應古經􅁩繼今有悛亦豈終奪可李彦正楊舜卿復敕具官某宥過無大况其細者乎爾以服勞不䖍甞麗于罰盖八柄􅀁以馭過者閱曰滋久俾還舊官則予恩茂矣其益埥共以圖報稱可入内内侍省副都知李彦正除入内内侍省都知入内内侍省押班楊舜卿除入内内侍省副都知敕具官某昔在周制内宰以中大夫為之而􅀠天官􅀃者以為禁省之祕不冝属外廷而夲朝爰剏北司之長就擇明習靖共可以率属者以董正之官最貴近亦不可不重其選矣爾自軰中進在四人之数曽未踰口䏻賛内治進之長官楊舜卿六進亞長官委􅀉彌重其益䖍匪􅈈以報殊渥毋使外􅋝謂汝不稱可親衞大夫清逺軍承宣使提舉佑神􅀚林憶年除入内内侍省押班敕自宣徽院之藉廢而北司之長盖難其人朕既差擇之矣則參伍其間以弼内治非識風指謹憲度者皆不在此選也具官某服勞禁近見謂老成兹用命汝秩在四人之數欲俾其屬於内肅給於外靖共則爾責重矣盍亦思報稱者哉可皇兄故吴王府奉利州􅀚察使多才上遺表妻令人髙氏特封碩人敕具位某氏朕􅀁以賁爾夫扵幽瓖有加禮矣何愛扵䟽封爾使居徃皆寵光焉以塞其悲可多才上遺表親弟二人比換南班訓武郎多藝修武郎多見並特授太子右監門率府率敕具官某等朕以諸衞䖏宗室子俾曰奉朝請非苟示􅀻也以爾多才身後之請及其仲季惻然重違之而並命爾其務靖兵以稱徳意可皇叔祖右千牛衞􅀅軍不儳磨勘轉右􅁥門衞大􅀅軍敕具官某等朕者周官凡衞王宫者皆同姓也􅀦朝簡宗英寘之寰列之尹盖循周制屬意深矣惟爾叔祖簡在衞中歷年彌長勞績兼茂進長禁闥職守益嚴欽哉無違以稱明陟可皇叔祖太子右監門率府率不廷特授千牛衞􅀅軍敕具官某以階官易環衞率視其秩日者有司故貶損爾今徹朕聞始仍舊貫雖曰緒正亦以示恩其尚恪恭稱此宻察可武功大夫􅁠主管侍衞馬軍司公事張師顔落權字敕具官某朕以金陵形勢襟帯江淮輟吾􅀐衞布之屯􅀁且以壮留鑰焉則統馭之才厥選艱矣爾以名􅀅徃訓群騶方當無事士馬飽逸􅀚者咸謂可以即戎􅒺懐武備於風駟鐡於雅軍攻或庶㡬焉翳爾之力肆用命爾自攝爲真班秩益崇􅀉任罙重其尚加懋以究爾功俾周秦之詩得以專羙則予汝嘉可皇叔祖武徳郎主管台州崇道􅀚不詉特換右􅁥門衞大􅀅軍勅具官某朕攷周官凡衞王官者皆同姓也􅀦朝亦簡宗英寘之環列之尹盖循周制屬意深矣惟爾叔祖行尊徳􅁱今在選中應于􅀴誼宜率典常作宋恭先有馮有翼則繄汝頼可昭憲皇后親姪孫杜士寳特􅀘承信郎敕某朕惟藝祖之子孫自吾夀皇篤叙之恩備矣而於母黨顧無世祿豈昌􅁜之意乎取之白丁授以右職爾其永懐無沗􅀁自可右丞相􅁑邲􅀄拜贈三代封妻四年三月拜曽祖朝奉郎致仕贈太師謚清孝追封魏􅀦公書思封魯國公敕朕覧周誥至命君牙為大司徒實􅃁宰是謂股肱而推夲乃祖世篤忠正之羙蓋有感焉維今大臣相我孝治􅀴文緯武海内晏然則亦惟其先徳之休足以燾後可無褒崇以應􅀴􅁩具官某故曽祖具官某躬行對于古人鄊譽髙於月旦方其筮仕亦旣有聞而以其親掛冠再調筦庫以此終身僅通閨籍法不應謚朝􅋝異焉易名清孝足以發明其人矣燕及曽孫爰司宰事則􅀁以推本其羙朕敢忘周道乎進封大􅀖莫如曲阜尚食其報永綏爾神可曾祖母魏國夫人侍其氏贈冀􅀦夫人敕周之盛至於既醉極矣其卒章曰君子萬年景命有僕其僕維何􅁵爾女士􅁵爾女士從以孫子言周之群臣皆有士行之女以為之妃使生子孫足以傳世蓋天意也具官某故曽祖母具位某氏作配君子行修於家覃及曾孫迺生耆􅈒考其世次亦足以知吾祖宗盛時天意攸属而豈一日之積一門之􅀻哉假使當周之世必從夫爵侑食五廟然則胙以大􅀦秩之小君雖古未有亦可以義起禮矣可祖宣奉大夫顯謨閣待制致仕丹陽郡開􅀦公贈大師謚文康追封楚􅀦公勝仲封齊􅀦公敕朕既本之六藝大啓土宇以宏賁􅁑氏之祧則嗣有令聞逮事兩朝申錫名􅀖亦禮之稱具官某故祖具官某服某家聲踐􅁱累世濟以力學連由三科然而名滿天下而位不過􅀙班文字行於方来而身不䆒逺業惟是一經之教􅀍于聞孫蔚為名臣間我兩社則劬躬之報可無異㤙維此管丘太公舊宅是用即命以為新封對我寵靈以昌爾祚可祖母楚國夫人張氏贈夏國夫人敕朕方廣念祖烈匹休於周假以溢我而􅀵得賢之福則􅀁以尊大其家以荅天貺豈顧有􅀁愛哉具官某故祖母具位某氏夙以懿行来嬪名家儀于前人以詔婦子亦既再世燁然有聞而未艾之祥施于今相詩不云乎蓻之榛粟椅桐梓􅃮爰伐琴瑟種徳彌逺歴年彌長豈必皆身親見之乎報本醻勞式至今日大􅀖羙號以慰永懐非以為生盖禮之稱可父朝議大夫致仕贈太師許國公立方封越國公敕王室百年之間公侯􅀅相故家希不失者有以文􅇘論議綿及三葉是謂世臣固朕之􅀁寵嘉矧予宗工尊為禰廟者乎具官某故父具官某􅁭度粹然聲華藉甚父未脫藁徃徃誦之一時英㳺莫敢輩行紹興之季歸為從臣盖其行藏皆可蹤跡用而不盡士論惜焉冝集善聲發扵賢嗣凢􅀁著見孰非典刑爰侈舊封建􅀖於越以厚教忠之報以伸追逺之懐可母雍國夫人樊氏贈陳國夫人敕為吾股肱之臣則上自三世皆褒大之而况於其母乎御不及百兩養不及萬鍾也而無以慰滿其罔極之㤙亦何以責移忠之報哉具官某故母具位某氏承休襲羙發育自躳恩斯勤斯鞠我良弼雖及晏􅀊逮事舅姑旦莫敬共至忘櫛頮是足以成其子之令徳矣改䟽上國之封以世世配于祢廟而今而後庻㡬吾大臣之不􅆸藜莪也可故妻蜀郡夫人沈氏贈成國夫人勑夫人起家以致爵位風人懼焉廼若克相夫子至於登庸嘗與之同􅀮憂矣而不同休顯此則又禮經之􅀁悼嗟也具官某故妻具位某氏女徳配於珩璜婦功著於蘋藻胡不偕老以湏羙成朕惟吾相祼於祔姑之室而副笄之服弗􅀍翟芾之車弗乗也非有追寵何以慰之乃闢新封以賁幽穸可妻魯郡夫人王氏封信國夫人勑永惟二南大夫勞於王事而勉之以正勸之以義者皆其家室也矧吾輔臣􅀌立一意佐佑乃辟是不曰警戒相成之􅂇歟具官某妻具位某氏自継元配徳音不瑕既有芳殽進􅂌祖妣亦有雜佩施及朋似佐我名臣迄登三事􅏱譽日廣績用日崇則與夫汝水之墳南山之側遭世不淑動心忍性者可同年而語乎冠於命婦為君夫人我有茂恩宜不汝吝可知樞宻院事胡晋臣初除贈三代封妻四年三月除曽祖贈太子太保修巳贈少保勑昔周宣中興􅀅相皆天下之選矣爰命皇父以整六師而推本􅀁以實南仲大祖之後爰作常武之詩朕甚慕焉維今本兵得我碩輔則其宗祧可無褒崇以應經􅁩具官某故曾祖具官某躬行對于古人徳譽髙於軰行而懐道不試士論惜之夫屈於名者享其實不發乎其身者遺其後是宜燕及曽孫蔚為名臣乆陪國論晋長樞庭則追録其積行之勤増華其種徳之報朕敢忘常武之詩乎陞班亜保以寜其神非以為生盖禮之稱可曽祖母濟陽郡夫人黄氏贈崇國夫人東来郡夫人人張氏贈安南􅀦夫人敕周之盛至於既醉極矣其卒章曰君子萬年景命有僕其僕維何􅁵爾女士􅁵爾女士􅀙以孫子言周之群臣皆有士行之女以為之妃使生子孫足以􅀓世盖天意也具官某故曽祖母具位某氏作配君子行􅁱扵家覃及曽孫迺生􅂄􅈒考其世次亦足以知吾祖宗盛時天意攸属而豈一日之積一門之􅀻㢤假使當周之世必􅀙夫爵侑食五廟然則胙以大􅀦秩之小君雖古未有可以義起禮矣可祖贈太子太􅀓爕贈少􅀓敕朕既本之六藝不愛髙爵以崇報胡氏之祧則嗣有令徳休于後昆並命為􅀌亦禮之稱具官某故祖具官某當天下之清得幽人之􅂂世無孝㢘之科而不偕於計吏居無朝市之交而不聞於上􅀦天命弗僣為之生孫蚤為聞人遂專樞筦是不謂之劬躬燾後者乎申􅃬命書班扵次傳豈唯發潜亦􅂆来者可祖母平原郡夫人王氏贈永􅀦夫人敕朕方寅念祖烈匹休於周假以溢我而􅀵得賢之福則􅀁以尊大其家以荅天貺豈顧有􅀁愛哉具官某故祖母具位某氏夙以懿行来嬪名家儀于前人以詔婦子爰集慶善施于聞孫詩不云乎藝之榛栗椅桐梓漆爰伐琴瑟種徳彌逺歴年彌長豈必皆身親見之乎報本醻劳式至今日大􅀖羙號於禮為冝可父奉議郎致仕贈太子太師宗贈少師勅自蜀平至今二百餘年盖西土無遺賢矣而尚有潜徳三世不逢詩不云乎何其久也必有以也具官某故父具官某行著而晦於名才豐而嗇于位乾道之際有子燁然諸老先生見謂公輔吾夀皇駸駸嚮用矣而方考槃阿間永矢弗諼不以􅂦来之養而易燕居之福匪􅁄其欲卒為帝師殆􅀁謂有道者乎然而生則遂循墻之志􅃿則極告第之榮吾於大臣之親亦質之詩書無愧矣可母通義郡夫人鮮于氏贈信􅀦夫人和政郡夫人蘇氏贈和􅀦夫人文安郡夫人王氏贈恵􅀦夫人敕為吾大臣則上自三世皆寵嘉之而况於其母乎御不及百兩養不及萬鍾也而無以慰滿其罔極之恩亦何以責移忠之報哉具官某故母具位某氏承休襲羙發育自躬恩斯勤斯鞠我良弼盖副笄之飾翟茀之華一朝醻之不以為㤗朕惟樞輔􅇶然永懐是用䟽以上􅀦之封以世世配於禰廟而今而後庶㡬吾大臣之不廢􅖋莪也可妻大寧郡夫人康氏封安定郡夫人敕永惟二南大夫勞於王事而勉之以正􅂆之以義者皆其室家也矧吾輔臣􅀌立一意佐佑乃辟是不曰警戒相成之助歟且官某妻具位某氏酒醪之􅀁羞雜佩之􅀁贈皆天下賢傑也爰相夫子至於登庸􅀴文緯武績用甚茂則與夫汝木之墳南山之側遭世不淑動心忍性者可同年而語乎冠於命婦為君夫人我有異恩冝不汝吝可迪功郎祕書省正字蔡㓜學該􅁱進至尊夀皇聖帝㑹要轉一官敕具官某載筆東􅀚迄扵成書序進一階可謂徳賞益修鈆槧以昌爾文二典三謨亦其選也可忠訓郎武學􅀶士李興時知融州七月十二日敕具官某簡在右學諸生咸曰賢哉吾􅀶士也滿􅀊冝遷官而自詭治民􅀅以其淑人者施之行事融在嶺表甞建旄􅃏而荆湖之與鄰視旁郡為善地爰以付汝是謂異數尚其懋哉以踐爾言可髙文虎除􅀅作監丞敕具官某朕旁招俊彦布列周行徳進言􅀭如恐不及矧子大史氏之舊引疾居家十有四年昔病今愈子環可後乎爾博學篤志承伯父之傳網羅舊聞述史迁之緒採之公論僉曰汝賢再轉為丞尚居繕監職務清簡可以卒汗青之業毋以匠為嫌也可武學諭范仲壬除武學博士􅁱武郎黄褎然除武學諭並七月二十一日敕具官某等國家設武科以取士有周道焉􅀁以貫革之射息􅀃劒搢笏冕衣裳在西學則皆俊㳺也矧若爾仲壬爾褎然人􅀁亟􅁛者乎分以横經之席􅀙以滿戸之屨雖甚寵異豈曰不冝可止齋先生文集卷之十二
