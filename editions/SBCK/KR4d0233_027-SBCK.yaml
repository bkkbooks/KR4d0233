front:
  text: 止齋先生文集卷之二十七
  hash: sha256:f8d021e2542c7d9e807322a8d436252479dc79ab54d5aeefbe98bfe5923d639e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_027-1a}
body:
  text: 奏狀劄子繳奏羅良臣供給免折酒狀准中書門下省送到錄黄臨安府狀今月二十八日承修内司提轄劉信之白劄子得㫖宣諭安撫令臨安府宣借廂軍一十五人付浙西緫管羅良臣使喚􅀁有羅良臣每月供給免折酒與依韓侂胄例支破仍具知委聞奏本府除巳恭禀聖㫖􅃌揮施行從條合行奏審伏候指揮閏十月一日奉聖㫖依巳得㫖揮令臣書行右臣不知羅良臣為何人但為陛下愛惜此聖㫖指揮不敢不具奏耳何者差兵士十五人與之使喚此至猥􅃈也請受不折酒此至微末也今也遣中使傳􅂭㫖下諭天府之尹而及此至猥􅃈至微未之事豈不􅃜損國軆玩瀆主威乎臣忝為詞掖論駁此等小事固有慚色區區願望陛下以此􅀋推之特垂省察􅁇今或有無厭之軰敢復以此干冐天聴並勿施行如至再三即湏行遣使天下曉然知陛下一號一令皆有關繋不出於私謁皆􅁕聳動不至於徒行幸甚幸甚臣愚欲望睿慈􅀅上件指揮特賜追􅃦􅀁有錄黄臣未敢書行謹録奏聞伏候勑㫖五年閏十月􅀄三日奏繳奏謝淵請給合支本色狀准中書門下省送到錄黄一道中奉大夫守給事中兼直學士院兼實錄院同修撰臣樓鑰奏准中書門下省送到錄黄為知閤門事謝淵為係皇太后親弟其請給等可依韓侂胄例特與依禄格全支本色日後遷轉准此事令臣書讀臣仰惟陛下奉承三宫惟恐不􅀎順􅆘聖意然法制之設􅀁以公天下而共守之有不可踰者知閤謝淵為皇太后親弟請給等依韓侂胄例特與依禄格全支本色有以見陛下奉祖后之意然真俸之支則有不可吴􅅛吴琚同為太皇太后之親姪同為檢校少保節度使可謂事軆至切矣然吴􅅛之請真俸巳久無有議者而呉琚之請太上皇為之降㫖則黄裳以給事中力陳者三四陛下為之降㫖則黄由以攝給事中又至於再三論奏而後止疑若有甚異者無他􅅛在紹熈元年十月指揮之前而琚在指揮之後也指揮既定之後若又開此門則戚里扳援何時而巳兩朝聖明終􅁢其奏韓侂胄之真俸以淳熈十五年十一月降㫖正與呉􅅛事軆一同謝淵之請切似呉琚臣是以不容不論欲望聖慈􅀵􅃦前項内批指揮自後若不係南班隨龍統兵戰守之人以真俸為請者一切以定制之既以杜僥倖之門於節用之政不為小􅀘􅀁有錄黄臣未敢書讀謹隨狀繳奏以聞伏候勑㫖閏十月十一日三省同奉聖㫖謝淵為係皇太后親弟可特與書者餘人不得援例令臣書行湏至奏聞者右臣昨来巳嘗書行謝淵錄黄去訖今􅀼見給事中樓鑰繳駁文字委是􅁢當始知臣當来鹵莽失於檢照不及論奏今臣若但奉御筆􅃌揮准前書行即臣實有三罪一則迎合聖意不敢執爭二則衝改紹熈元年十月指揮使自今有司無􅀁慿守三則耻過遂非無見善則遷之義此臣􅀁以湏至煩瀆也欲望聖慈特賜追􅃦上件御筆指揮仍􅀅臣當来鹵莽之罪併行譴責抑臣區區更有愚見㳟惟陛下臨御未久每事只宜遵守法度􅀼見近来多因臣下妄有陳乞直降内批或與差遣或添請給人從今来御筆又有餘人不得援例之文臣􅀼以為此等􅃌揮皆是人主在位日久快意尚㤙浸開倖門自亂成憲豈容􅀄政有此不肅更乞陛下念付托之重正當加兢懼之時思調護之難未暇及閑慢之事除却朝廷公衆啓擬即與施行應干宫禁小可請求㫁勿垂聴􅀁貴凡事務令整齊母使外人輙有指議則宗社幸甚天下幸甚􅀁有錄黄臣未敢書行謹錄奏聞伏候勑㫖閏十月十四日奏入繳奏朱熹宫觀狀准中書門下省送到錄黄一道三省同奉聖㫖朱熹依舊煥章閣待制提舉􅂭興府玉􅂭萬夀宫任便㞐住又准送到并免朱熹謝辭錄黄一道令臣書行右臣竊以為朱熹者三朝故老難進易退二十餘年多任祠禄今也欣慕聖明幡然一出天下相賀以為得人則進退之間豈宜容易未審何故遂聴退閑除目之頒滿朝失色一則歸咎宰執不􅀎囬宻㫖於未出之初一則交譏給舍不􅀎還成命於已行之後紛紛之言其来未巳臣􅀁以􅂊有􅀁聞一一具奏未蒙報可方切惶惑今此錄黄當臣書行臣若嚴憚天威俯首惟命則是上累主徳下喧士論皆臣之故臣必不敢區區欲望聖慈追􅃦上件􅃌揮􅀁有錄黄臣未敢書行謹録奏聞伏候勑㫖閏十月二十四日奏入貼黄臣伏思念若但寵其行未􅁕以彰陛下不吝之徳莫若留之方慰人望伏乞睿照繳奏紫霄宫免科敷等事狀准中書門下省錄黄一道奉聖㫖􅂵霄宫五嶽殿係專一崇奉太上皇帝及御前本命香火去訖除依條送納二稅外特與蠲免諸般科敷措借指占安泊等事令臣書行右臣嘗論奏􅀄政不宜以小可陳乞直降内㫖巳蒙開納今􅂵霄宫復有御筆􅃌揮特與蠲免科敷措借等事可謂煩瀆天聴玩狎主威矣况今貧民困於科折若更令㳺手坐食之徒反得幸免即本宮逓年合輸財賦官司難與除豁湏至均敷在人戸名下是㤙􅁕以及游手而不至於百姓􅀹臣􅀁深惜也臣愚欲望聖慈更不施行上件􅃌揮仍自今後似此陳乞一切㫁絶天下幸甚􅀁有錄黄臣未敢書行謹錄奏聞伏候勑㫖閏十月二十九日奏入繳奏陳峴知贛州狀准中書門下省送到錄黄節文三省同奉聖㫖陳峴差知贛州填見闕不候受告疾速之任候任滿前来奏事令臣書行右臣竊以爲陳峴早爲從官素號鄙俗多歴方牧􅑪聞㢘稱前後臣寮屢有論奏而峴貪不知止謀欲復用睥睨累􅀊經營萬端今若果如􅀁欲則是朝廷真無公論士大夫真不必事㢘耻而巧官者皆有僥倖之圗益無靖共之操矣然則臣豈與峴爭區區一郡哉况峴自駮罷帥廣西之命不聞務自洗濯省愆遷善但聞其身為次對謟事太守以為諸兒求權局而巳共惟始初之政方尚旌別似此不知厭􅁕之人豈宜奨用臣愚欲望聖慈􅀅陳峴知贛州􅃌揮時賜􅃦罷􅀁有錄黄臣未敢書行謹錄奏聞伏候勑㫖十一月􅀄十日奏入辭免實錄院同修撰第一狀准尚書省劄子三省同奉聖㫖差臣兼實錄院同修撰臣聞命震驚罔知􅀁措伏縁尚有管見不敢輙冐受上件兼職湏至煩瀆乞賜􅃦免盖臣自為郎官即兼檢討㡬渉三年未嘗得効鈆槧之勞以臣平生辛苦頗好編述比入史院無以自効何也史院無專官故也三年之間修撰同修撰官繇今丞相趙汝愚以来􅁇以􅀹袤倪思李巘沈揆及近来朱熹無慮數人檢討官亦自章頴黄艾沈有䦕黄由薛叔似及葉􅆘無慮數人皆不甚久别有遷除􅀁謂實錄缺然如故與臣未入院以前無􅀁増益以此灼見若無專官則一朝大典卒無就篇之日臣嘗論奏雖蒙上皇嘉納未見施行今臣謹繳進向来劄子欲望聖慈特垂省覽令提領大臣勿拘近例别置專職一二人使其他兼官以時入局同共啇量分擘修纂庻㡬年􅀊稍見次第若不課其効但添兼職是㤙寵之而非事實也臣不敢奉明詔􅀁有上件劄子未敢祇受伏候勑㫖十一月二十七日三省同奉聖㫖不􅁢第二狀臣昨具状奏乞􅃦罷兼實録院同修撰指揮准尚書省劄子今月二十七日三省同奉聖㫖不􅁢伏縁臣當来辭免文字且申前請乞置專官不宜但添兼職以為㤙寵而未嘗及臣不堪使令之故致蒙天意未􅃍從欲則臣豈敢冐昧不盡其情盖見今史官皆極天下之選徒以各有攸司各率其職志慮􅀁分精力不逮是以具員雖衆成書尚難如臣於今朝行最為衰退舊學昏忘前聞遺失巳試罔功方切自訟豈可復玷此選乎以臣􅀁見當今良史之才莫如朱熹葉􅆘其餘如吴入傑王明清之徒皆有志於此者也朱熹葉􅆘近嘗入院未㡬而熹帥江陵􅆘緫淮餉秉筆之士相顧嗟惜陛下誠聴臣言以一朝大典之重不吝改作復用此二人者使之專領􅀅天下皆以為得人豈非聖朝之羙事明主之盛舉㢤但熹既去國假如強起猶在數月之後而􅆘尚未朝辭􅁕可下留行之命臣愚欲望聖明發於英㫁以􅀁除臣同修撰一官改作右文殿修撰或祕閣名目以留葉􅆘則不過年􅀊可兾奏篇恭惟髙宗中興盛徳大業可傳萬世陛下何愛此一官不以擇才臣備員法從而隠黙不言亦有蔽賢之罪兼臣縁多病正欲少湏别求一在外差遣以便休養􅀁有上件兼職指揮臣不敢祗受伏候勑㫖貼黄稱照對葉􅆘與臣有鄉曲朋友之好臣以公論不敢避嫌如蒙采聴之後有以爲其人不堪此選即臣當伏罔上之罪伏乞睿照十二月二日三省同奉聖㫖依巳降指揮不􅁢應詔薦宗室趙師虙趙師淵狀准紹熈五年閏十月二十一日三省同奉聖㫖比来宗室在朝者少可令兩省䑓諌侍從各舉有文學器識者二人以備選擢右臣仰惟明詔深切事情伏縁近来不以宗室與庻姓同進是致在朝稀少上關宸慮但以臣􅀁識仍加訪問欲如詔􅃌求備頗難其人伏見其中尚沉下僚最有士譽如宣教郎新知􅀽州宜春縣事趙師虙文林郎前寜海軍節度推官趙師淵行誼修飾趣操亷靜可以仰備選擢敢以上聞謹録奏聞㐲􅀱勑㫖五年十二月􅀄三日奏入潜邸講堂轉官辭免申省狀准都進奏院逓到朝散大夫告一道為係潜邸講堂官轉一官者伏念某一介踈庸本無學術偶遭休明備數勸誦累年於此蒙眷甚􅂭曾乏㳙塵仰禆海嶽反以尸素上累知人之明又况自致煩言尚叨祠禄􅀼伏思念罪重責輕䘖荷㤙私不知􅀁報豈當復與儲僚群賢同在論功行賞之數􅀁有上件㤙命不敢祗受除巳􅀉納温州軍資庫外伏候􅃌揮慶元元年七月七日三省同奉聖㫖不􅁢辭免與郡申省狀准尚書省劄子閏十二月五日奉聖㫖陳􅀓良沈有開並與郡拜㤙殊特揣分驚皇伏念某罪戾之餘惟知循省驟蒙聖慈還官賦禄闔門千指叨􅀼温飽衘戴􅂭天厚地之施莫知稱塞曾未改􅀊再蒙􅋞拭俾司民社仰惟聖上矜憐簮􅂂之舊致兹誤寵感銘次骨誓竭縻殞伏念某衰病日侵鞭䇿不前矧巳試罔功愆􅀹素積不於此時力祈􅃦免異日成命遂下冐昧祗受必致顛隮重煩造化欲望特賜敷奏許某終滿祠禄庶㡬少安愚分嘉奉二年閏十二月二十七日三省同奉聖㫖不􅁢辭免知泉州申省狀准尚書省劄子備奉聖㫖差知泉州替葉􅆘闕有合奏陳湏至煩瀆者怜貧恤老君相之㤙量力効官人臣之誼伏念某生平辛苦積成痼疾自嵗庚申至今未已浮腫如水顫掉如風神明支榦日就昏塞不省人事者屢矣此豈可尚堪驅使􅀅以􅀉千里之命乎况温陵大􅀖甲於閩部蕃漢雜居獄市難擾而使衰瘁當之必見闕誤課以禆報徒遭罪責載念臣自叨誤㤙􅂌以祠禄月有􅀁入足了醫療若及滿􅀊庶保殘齡貪戀公朝豈􅀁覬望失此私便忽然永巳却抱無窮之恨又况此􅀖比年選牧多䖏法從某徃者疵釁之深患在髙位雖循省不為不久􅋞拭不為不至若一日起􅆸復此逾越公論不置且見顛隮又非􅀁以保全之也欲望朝廷特賜敷奏􅀵囬成命仍舊奉祠嘉㤗三年三月十三日同奉聖旨不允止齋先生文集卷之二十七
