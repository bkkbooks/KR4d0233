front:
  text: 止齋先生文集卷之六
  hash: sha256:89f8a3383de971cf33dabc3be27b64ecb6cd8b03c67fab0001d865722c9fc91d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_006-1a}
body:
  text: 律詩桂陽勸農雨耨風耕病汝多誰􅀅一一手摩挲幸因奉令来循壟恨不分勞去荷蓑凉徳未知年熟不微官其柰月樁何殷勤父老曽無􅀘待放腰鎌與醉􅁔九日奉呈同僚四絶句澤國重陽花較遲得花雖愁余家家人醉鷄豚社獨對西風憶鱠魚小雨㢘纎僅滑泥強隨年少更攀躋欲慿最上浮圖望晚稻如今齊未齊臨風遮莫晚山佳自古功名㸔􅁂華幸自不知余種種可教容易落烏紗領客山危亦既懽故人徃徃去歸班明年此㑹知誰肯為上吴山望楚山教授将赴闕簽旬亦旦夕觧官郴守丁端叔以九日詩至次韻奉酬十年不見㝷常事九日相違咫尺間橙􅈉渠􅀎追勝賞藙牲孰與奉慈顔逝􅀅酒坫更酬酢乍可詩筒略徃還新􅀅適聞臨遣罷鹿頭吾待望吴山丁端叔和九日詩至用韻奉謝恤鄰之義且申前請壮不如人老更遲可憐赤宗余鄉㣲膚使賢方伯誰激西江活鮒魚生怕遄歸趂紫泥縁危方藉得同躋交鄰􅁩與春秋並應許臧孫數告齊夏畦不病晚穜佳哿矣􅀅詩􅀘􅁰華散百為千吾冩似深山窮谷徧籠紗不因與國近交歡氷齒相從髮已班多見長才無肎綮豈辭一簣竟為山再用前韻簡丁端叔乞鄰亟只報何遲愁絶飢甿一勝余上有加飡下相憶莫同汎汎􅀉雙魚閉闗饒着一丸泥我亦前扳更後躋四海弟兄君㸔取苛風不㫁鴈行齊事到難時意轉佳聲名早巳動皇華撥煩自古書生短只合横經住絳紗繇吴入楚共悲歡懐欲班荆竟未班直待還艫願䘖尾洞庭彭蠡浪如山和丁端叔竹梅二詩韻端叔於庭前對梅栢竹八竿空堦琤若下琅玕全楚何人巧耐寒誰伴八龍長傲雪蕭然一榻卧􅀽安管領春風别有天不論水際與山巔祝融玉立湖湘凍獨付寒梢􅀏粲然丁端叔送牡丹以詩来用韻酬之覺省他年見一班老從湖毎㸔春頒瞻言百里㡬相及仰止髙山竟莫攀毎事乞公留上䇿不才容我著中間一時公論方當路愁為絲麻棄蒯菅客来談政巳班班况復書縢一再頒亦欲頡頏相上下不容分寸得躋攀花猶河洛承平詩在黄陳軰行間簿領役人塵擈面沃如雲霧下茅菅和丁端叔􅀊晚書懐韻来涂藍縷雪埋人三百於今又六旬奏課定應書下下班春聊復喜津津餘􅂼􅀍壤農亡恙茂草連扉盗自新曳杖鹿頭時極目炊烟齊起兩州民丁端叔送海錯以詩来用韻酬之澤魚山豕各忘年味可勝竆總􅀁便堪􅀏荆吴相爼豆遂令蠻觸自矛鋋食無誤􅈉車同􅁤貢不徴蚶澤漏泉我在竆山人迹罕亦蒙惟錯饋甘鮮酬王判官和九日韻一以㱕徳於部使者二􅀉郴州使君三以為謝四奉留也皇華六轡按倭遲愽採參差到接余詩注荇菜接余也我獨内慚無具甚萬家亦免釡生魚想懸郴桂一雲泥夫子聲名正日躋乞與早移河内粟牙牌㱕聴報班齊翩翩公子一何佳䘖命竆山薄􅀊華獨自把􅀅詩過日不知梅影下總紗懐自何年晚見懽匆匆惜已聲班青芻白飰吾何有風月猶堪倒玉山戊申臈桂陽喜雪月不􅀎明雨􅁍稀山容野色夜輝輝清霄下際􅀟瓊闕仙仗前驅萬玉妃亘古嶺旁冬不到從今湖外􅀊無饑来年此日吾何適蓑笠寒江一釣磯再用喜雪韻一以書懐一以喜客南人見雪古来稀見只愁吟草木輝留囓氈毛竆漢使􅀃開園角老胡妃我甞豪徤􅀎無􅄄今已衰遲要不饑北望鴈門膓欲㫁春蒲空老舊漁磯瘴雨蠻烟此後稀山童亦與借餘輝爭㸔狂穉相呼喚下啄饑烏自匹妃苦乏貂裘堪夜永喜無蝝子着冬飢興来那况山隂客為我扁舟􅀝石磯題范秀才萬卷堂雅尚時相背幽棲我數過兒應㸔客慣田孰與書多自析唐郴縣誰聯漢甲科儒門今有此天意定如何和叚君仲衡同令嗣天晴少出之作文字時髙下功名􅀔去來誰人堪語此吾道竟懐哉􅂝㓜安容􅂰廵簷笑索梅巷門通後圃今數為君開陳頥剛注孫子許拾遺贈詩用韻􅀉之千㠶過盡獨舟沈玩世􅋜􅋜踵息深何自著書今白髪不禁戀闕此丹心詩來滄海珠盈把人在掖垣梧十㝷應為一編三致意細論小雅到交侵和叚仲衡譙樓新軍額二首潘帥徳鄜為書軍額以立春日掲之筆落元戎重詩成坐客新譙門􅀟壮􅀚􅁁􅀅一團春夢破盤行玉名存甕得銀桂陽因銀置􅁥今無復有衰遲亡􅀘報着意與民親寒消晴後雪光轉凍前風􅀊巳宜麻麥人猶厭芥菘樓頭千里望筆勢萬夫雄及此吾何力天低露草豐和蕭俊仲司法詠譙樓新軍額韻海濵驅馬過湘濵喜及今春憶舊春公燕有時令市酤村舂不􅁇待炊新嚴城皷角留三字當代衣冠第一人看取吾民繇此去萬家雞犬永無塵送洪子端還郷子端丞相之孫􅀅相三陳後文章兩漢餘英標還有此天意定何如海内相離合年来半毀譽未知貪尚友孰與鄴矦書送吴徳夫嶽麓樓頭卧湖湘眼底空聲名無䖏着容止與人同白髪何多日輕㠶不待風􅁱門春漏淺封事倩誰通楊伯子以其尊人誠齋南海集為贈以詩奉酬辱與門墻最不遲白頭方誦嶺南詩文從嘉祐今三變人在廬陵此一時細數儒先䏻㡬見獨憐􅀊晚欲何之瀟湘直下長江去得望蓬萊却更疑潭帥潘徳鄜生辰落南添得黒髭歸歸與相忘草木知嶽麓沈沈秋柝靜湘波穆穆夜帆遲人間公論今何在柱下家聲此不疑徳鄜乃子賤舍人之姪但欲公年如衛武為留淇澳變風詩衡守劉子澄以詩来和韻奉酬曵裾朝路不同時謀食衡湘亦把麾一見相忘光可鑑十年何在惄如飢力堪扶世􅀅誰可語不驚人或自危夜雪埋山江欲凍依然春信在南枝遊南嶽天作之山􅂚為哉遥知閶闔正南開兩川文武長江下百粤車書五嶺来柴望久為周墜典牢愁多見楚遺才不知崧岱還何似我欲􅀅書􅀉鴈囬登祝融峯喜霽仰止扶藜􅁂髪蒼恰當風雨暗三湘為誰一闢天無際及我重来日未央江過數州多曲折山縁長畝半青黄老僧耐得從頭問問到吴門竟渺茫和沈帥持要張漕季長韻二首欲杭一葦近聲光恨不先期燕子凉舊學甘盤聊此日倦游司馬尚他郷别從滄海山横斗謂别沈於永嘉華盖山下來自岷峨水濫觴不謂偶成三楚客得為蘭杜附諸香麾節元戎祖席光晚風吹雨借初凉師傳問訊誰書院石刻摩挲是道鄉聞有先聲来召馹想無後㑹到流觴路朝正設横經席冊府重紬辟蠧香送沈帥甘盤夢不入髙宗四皓莫知其􅀁終􅀓野有人􅀎論學漢庭無事可言功行蔵於此嘗成趣談笑從今得退公分付諸兒理民社宜休堂上聴松風携客過王提舉園訪梅劉連州以詩来因用其韻屋後雲梢萬箇長屋前風蔓一川芳有梅自索廵簷􅀏無酒還酤􅂿雪香偶與三劉同下榻却懐二宋對持觴是日同集劉連州景晋父子及宋伯華也坐客皆懐伯潜故云伯華伯潜宋景文公後寫􅀅詩句吾何敢欵乃聴人汲曉湘再用前韻簡劉連州吴楚相望道阻長我来邂逅挹羣芳人如盤谷元非隠詩到孤山不道香每與盍簮移永日更須篝火及餘觴何湏誇去東州􅀃不學藍關獨吊湘小詩為張漕夀一春苦雨張漕行部謁嶽祠而霽是日登祝融皇華散作九州春老稺夾道陳韓子莫愁今夕雨甫侯元是此山神我雖載酒筭孰與􅀅詩附不泯他日中興編小雅􅀂論孝友更誰人謝司馬倅恵東坡竹石岀自坡翁餘百年傳之温國子孫孫兩家文物来歸我便盍投簮去杜門和趙帥俊臣夀張漕韻二首但得桑麻徧楚間此心不在大夫環落花流水深春好畫㦸清香永日間英蕩偶来成勝賞萱庭孰與奉慈顔正應得句􅀹竒傑可􅁇淮南大小山使者耕時出省春聯翩珠玉又前陳先聲􅀁暨揺山嶽落筆相豪泣􅀑神嘉與九城俱晏粲訖無一事尚棼泯獨慚衰惰歸何晚亦著中間作廪人題耒陽黄宰詩卷詩卷来何䖏棠隂日夕佳令人添白髪及此有黄花事業誰千載文章各一家何時定還闕解柂向長沙送黄元吉陸子静門人荷君来意固非䡖曾未深交意便傾語到七篇無欠少學從三畫已分明每懐前此傷標置頗欲從今近老成為謝荆門三益友何時尊酒話生平懐歸丐祠久矣懐歸􅂚月哉冠纓吾欲濯吾埃天寒病馬尚逺放日夕罷牛宜下来名家翰􅇘書還蠹盖世功名骨巳苔孰與東籬訪黄菊柴門終不為人開送范東叔歸帥潼川楚山黄落洞庭波背却鷄人問釣蓑歸思甚於三峽壮才名空自十年多􅇮㳺記得青燈在後㑹愁如白髪何我更有懐言不盡故􅀅短韻代長􅁔送丁懐忠教授象州二毛覊旅久一飰瘴郷􅁿把酒時相属令人意自平校官無簿領帥閫甚聲名應仲實帥廣西􅀁恨􅁳􅁳雨梅天不肎明長沙臈月雷是日約宴趙帥俊臣聞雷乃罷越三日雨雪帥喜以詩相賀用韻酬之民欲􅃒留上欲来時長沙民數數􅄬状乞留趙帥而廟議欲召還政聲無間到輿䑓道迎和氣􅀵蠻瘴彈壓餘隂蟄楚雷巳是因風成柳絮㑹須逐馬見銀盃一觴好上公堂夀不為梅花昨夜開又和沴氣反平声為咊氣来長沙千里一瑶䑓新炊頓頓匙抄玉熟睡家家壁撼雷天直於人如合劵公應憐我欲停盃向来韓子誇精禱雲合衡山特易開趙帥復賦詩來用韻酬之大水交光地欲無中間老子獨軒渠一蓑漁隠真堪畫萬玉龍驤不可屠己􅁲菑畬何幸甚却憐藍縷更愁如莫􅀅此恵長私楚好上甘泉扈属車用韻詠雪簡湘中諸友夾湘而住一塵無不在瑶池在石渠氣盖松篁誰與競令行螟蟘自相屠山光際水天無間夜色通朝月不如中有一翁鬚皓白蕭然野鶴亦乗車贈張孟阜絶句燕坐何曾論古今束書髙閣反求心若􅀎領㑹無多子絶勝相從􅀊月深用趙帥韻為孟阜解嘲恨無毫髪老波瀾世有曹劉亦後班堪笑燕人夸璞腊欲隨圭璧上三壇登祝融峯觀日出星月凋零萬象昏誰䏻先我見朝暾東南已得乾坤正蠻貊方知夜旦分但覺滄溟浮佛屋却忘衡嶽近天閽迢迢下憇山腰寺人世烟雲尚吐吞舟中奉呈趙帥一首且速迎侍相與滿􅀊􅂚不放言追鵩賦豈無幽思續離騷去年比屋餘三釡周礼用鬴字昨夜沿江長一篙白髪豈曽縁吏役青衫那更有兒曹魚軒肯為公来否相約春光訪蟹螯除浙西憲舟過鈞䑓有感一再登臨萬事非褁頭還巳雪垂垂敢論筆力今無恨欲附碑隂始不疑䑓閣有人堪共政江山如此且隨冝論功漢鼎吾何有自是風流百代師止齋先生文集卷之六
