  text: 止齋先生文集卷第十八
  hash: sha256:ef01ce33ba2106efdf3403d97f6ea77944fd488e2891f36c30bbadc54487367b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_018-1a}
body:
  text: 外集知襄陽府張枃知建康府勑維周公太公功在盟府而伯禽見扵費誓吕伋見扵康王之初克世其羙垂名六藝顯􅁢魏公弼亮二祖咨爾後人冝自著見具官某踐修厥猷謀畧輻輳牧民馭士何郷不可内史擿彂文昌論思績用甚茂称者不容口也備􅁁襄州隠若敵國太上疇勞􅁒徙秣陵而未果肆朕嗣服爰咨分閫托重􅅏鑰莫如爾冝且夫金陵魏公之所經畧也元勲大節賫志未就歴年扵此胡􅀎嗣之文事武備兼修者何術内寜外憂長慮者何事其究爾心以圖忠報豈惟先正将二祖亦寵嘉之可朝散大夫知南外宗正事趙不遡換右􅁥門衞大将軍濠州團練使擢知太宗正事勑具官某自藝祖置大宗正以睦親族盖歴年扵此夲支蟬聮世次櫛比而無忒違職此之由可不謹擇之乎爾属尊而身修宦逹而志無競爰自左選改􅂌􅀯班秋以門衞之崇加以戎團之峻甚尊寵矣益輯宗盟以綿帝系徃其勉㦲可直秘閣劉頴除直顯謨閣江東轉運判官勑具官某課賢勞耶則誰如汝多采民譽耶則誰如汝著况乆淹恤朕豈忘汝也江表将􅈇司存與􅅏都相時盖視畿甸等耳煩爾調度以寛州縣之急歸報有期勿替前績可浙西提刑黄遹知贛州勑具官某粤從臺􅁺遂畀畿節不可謂不遭時矣章貢名􅀖選牧爲重而其民亦號難理夫地重則湏宿望事難則藉容徳疇咨爾冝就􅂌州組益究民庸母曰逺外可太學上舎生李斗􅀯葉元英賜釋􅄄出身敕某等科目之制至嚴宻也而繇學枚進者則課其功緒蓋有不待試扵春官而䇿之􅋝者焉亦旣得雋矣肆予嗣服又拔其􅀹􅀂爾某某者而即官之則所以加恵諸生豈不盛㦲可侍衞歩軍司後軍統領戚拱宿衛部轄官兵特轉一官邵建孫光祖鮑信陳孝慶孫􅂋忠夏震並同敕具官某環列之尹著扵春秋書勞進秩則有常典爾其母憚煩使式克欽承則予汝賞不一而足可湖􅀯提刑趙不逿除江西提刑寺丞趙除江西提舉敕具官某等自江以西綿地数千里其吏善讀律其啇善趨鹺茗之利而其田疇多旱潦部使者得其人則刑罸中而訟缿之俗易禁弛散歛行而民不失業以是不逿詳刑湖湘不偏聴扵單辭爾率軄省寺謹厚而無失其以不逿序遷臬司為􅁃氏皆王人也觀省風謡布宣徳意可不勉乎可張縯除直秘閣官􅀚敕具官某以熈寕論事之臣之後其文足以自見其學足以自􅅚此吾烈祖所以寘諸冊府上皇以爲郎􅀂卿也晚分郡符數上奏計雖不見察扵部使者而見直扵言路而秉心無競固請觧組成爾素履歸休外祠還爾舊著寓直延閣尚對新渥以為後圖母􅀂考槃永矢弗告可江東轉運判官劉頴知平江府敕具官某􅀅輸江東方􅃬賛書擇牧呉門又分符竹爾亦喻朕指乎以爾才足以撥煩且宜引以自近也夫足以撥煩則彌節而為􅇵郡􅀁以彂㳺刄之有餘引以自近則置諸扶風馮翊之間蓋鴻漸之序也深喻此指無非簡記盍疾其驅以對新渥可李嘉謀知襄陽府敕具官某維烈祖旁求西州之士㡬無遺材用以爲公卿大夫多矣而一時同進宿􅅏州縣位卑官薄聲聞藹然者猶一二數朕所以式遄其歸也㑹乏襄陽之帥僉謀惟乆而又中道輟汝以寛顧􅁨是豈朕初意乎夫旅進周行毎恨非功名之㑹久勞外服又懐無拾􅀘之益有􅀎扵此何郷不可則通儒也爾其欽承以圖忠報可新除福建提刑盧彦徳改江東提刑敕具官某觀蜀道之歌湘繫之賦則知士大夫不樂乆宦於此也爾某﨑嶇荆益至於累年晚歸􅀰闈意不自得􅈤章亟上持節七閩夫安扵平進而樂逺外曾無纎芥見於詞色是不謂之吉士歟以嫌自引易地江左姑徇爾懐嗣有它寵可􅁠戸部侍􅀰梁揔除刑部侍郎敕朕誦周書至立政用人之戒詳矣而三致意於庻獄至於卒章獨告司寇蘇公夫皆凖人也他無所槪見而司㓂獨明言其人何歟盖謹而書之也具官某以寛厚長者名當世而以法士名其家夫法士則深扵文而長者則傷扵恵二者皆偏才也而卿獨兼二羙焉頃為理官空圄案月及掌􅀖計郡國晏然衘命来歸備見忠瘁晋貳秋官此蘇公之職也式敬爾獄以長我王國爾尚無愧於周書㦲可司農寺主簿張孝伯除國子監十月十一日敕具官某朕方加恵諸生凢聮事扵成均者皆遴選也胄監有丞與聞學政以爾孝伯雅致不渝肆用命爾其益好修以湏明陟可諸王宫大小學教授姚愈除司農寺丞國子􅁥主簿羅克開除軍噐􅁥丞十月十一日敕具官爾愈爾克開皆以文雅嘗與聞學政矣而以愈丞農扈克開丞戎􅁥蓋試煩事益究爾䏻左右具冝則有明陟可直秘閣兩浙轉運判官黄黼除直龍啚閣陞副使再辭龍啚改除直顯謨閣十月十一日敕具官某以元祐名宦之後而其學足以自立才足以自見也􅀅漕郊畿燕及三輔朕圖爾功正名使華晋職犧閣是豈謂之過歟而何遜章来上至于再三也益嘉廉操少􅁍文謨雖不償勞亦足厲世可倉部郎中汪梓以趙汝愚親嫌除淮東提舉十月十四日敕具官某朕不以防禁遇臣下而或自言嫌則亦從􅁒以便其􅀻爾大臣之子克世其家比解州紱遄歸郎舎嘗試未乆譽䖏有聞顧以當路之嫌􅂅就外服政􅂌淮節以華其行雖徇爾懐亦足風厲可大理正閭丘泳除利州路提刑十月十七日敕具官某夫持節行郡國是為周王人漢部刺史也然周以下士漢􅅻秩六百石何歟深知此意冝何以圖報乎爾為理官亦旣累􅀊􅀶文敏事佀不􅀎言㑹擇蜀使咸曰汝可􅀂爾者足以循周漢之制越次而持節矣詳刑扵蜀庸究爾􅀎徃其欽承以湏明陟可秘書監兼實錄院檢討官薛叔似除􅁠户部侍郎十月二十八日敕朕􅁒省賦甚而用不足盖嘗歎息安得執古以御今之士與之共圖􅀖計乎而澤下究也具官某習扵六經之道而明當世之務自薦紳先生下逮新進􅁛爾不容口也属茲衘命萬里来歸革帯􅂼食行乎蠻貊朕甚嘉之曽未復命擢貳民曹夫􅀙班豈􅀁以償勞乎可使治賦孔門之學何以利國孟子不對扵斯二者並行不悖此朕之所圖扵汝也尚其懋㦲以永士譽可起居􅃕人兼侍講劉光祖除起居郎司農少卿鄧馹除起居舎人十月二十八日敕具官某左右史朕所嘉頼以謹言動爰自嗣服儀圖其人皆舊學也爾光祖馹頃在儲寮蔚爲國士而光祖繇霜䑓馹繇􅀐省各以論事不避權近俄而去國朕甚懐之蓋嘗嘆息安得三益以自近也今兹歸止實慰我心其以光祖序進左􅉾馹擢居右陛豈徒以是爲􅀻乎其繼自今直筆在前則出入不欽號令不􅆇􅀅懼思焉爾其懋㦲勿替初意可􅀦子􅀕酒彭椿年除直龍啚閣江東路轉運副使閏十月二日敕具官某昔荀卿嘗爲􅀕酒矣而卒老蘭陵後世恨之爾某扵今百辟㝡先進也方在諸生及見故老比爲愽士獨抱遺􅀴而自詭治民遅遅翔集蓋累年扵此矣晚長成均雅不自喜亟上懇牘􅁒便其􅀻将輸江瑌陞華犠閣雖寵爾行而朕尚兾爾無遐心也以觧荀卿之恨亦有意乎可大理寺丞林思齋除大理正閠十一月二日敕具官某本朝重科目而有以奕世父子一門伯仲赫然聮翩擅聲名於塲屋􅀂爾某者豈不足貴乎而何州縣淹恤亟􅁛賢勞岳牧論薦始有朝蹟也淑問獻囚士論惟允俾爲理官自丞而正鴻漸之序嗣有懋官可户部郎中正溉除直秘閣知平江府閏十月三日敕具官某治辦之吏患在鍥薄豈弟之長􅂉不事事此二千石所以難具人也爾自分郡􅀉比遣使華長扵心計徃徃􅀁在足用而長財也而􅂢以予民動累鉅萬蜀道之人至今懐恵􅀂爾者可以托千里之􅀦矣呉門擇牧蓋久而後得之輟于望郎華以寓直爾其懋㦲勿替民譽可太府寺簿范蓀除太理寺丞閏十月三日敕具官某奕世載徳孰如范氏爾克踐修益自問學色辭粹温君于人也俾丞􅁄寺未究爾䏻謹視刑書嗣有寵數可朝請􅀰權􅀤遣滁州石宗昭除度支郎官新改除浙西提舉呉鎰除司封郎官九月八日鎰閏十月十四日敕具官某等以吾冊府校讐之臣而越在外服不知其反期何時非所以為􅀴生學士勸也爾宗昭鎰嘗同日給筆札試于玉堂之廬觀如堵墻其羙無度而何宗昭在淮鎰在湘之久也夫合江之水環滁之山􅀅指承流爾固樂此公論不置盍歸郎闈其亟來朝以對新渥可軍噐少􅁥兼權司封官李大性除浙東提舉知常州黄灝除浙西提舉大性十月三日灝閏十月四日敕具官某今二浙猶三輔也比􅀊不登仍以旱潦荒政十二其誰與朕推行之乎爰諏其人得扵周行則汝大性得扵列郡則汝灝也東西二節扵以分􅂌平興頒積悉咨聴之呉越之間民無菜色我有褒璽必不爾後可太學愽士陳峴武學􅀅上陳邕並除祕書省正字閏十月十四日敕具官某等朕命以雲漢側身之􅁩䇿爾扵玉堂之廬爾峴不徒具文而有惻隠之實爾邕科别其條而昌言之不枉扵執事文詞拳拳皆可觀也冊府儲才得爾惟允勉司校讎益務􅉼育以就逺志以副殊休可􅁥登聞檢院楊太全除宗正寺主簿主管官告院􅀓伯成除司農寺主簿十月十四日􅁥都進奏院孟浩除􅀦子􅁥主簿浩閏十月十四日敕具官某等夫以百畝之宰三年之淹僉言賢勞始有朝蹟而後階升簿正列寺士􅁒以才自著也斯已艱矣矧爾大全西州之彦而伯成浩又􅀯􅀦之良乎姑懋厥官以湏褒進可大學正孫元卿除武學愽士閏十月二十五日敕具官某古者干籥皆學扵東序而貍首騶虞又皆樂師所以教􅀦子也爾以文行簡在東膠譽䖏盛矣推􅀁講明施及右學􅀅見諸生不但習孫呉而巳則朕之􅀁以用汝也可李知已陳景俊並除大理寺丞十月八日敕具官某等魯人以淑問獻囚而漢以文無害為獄椽皆􅀁以重士官也爾知已扵今多士為前進而有㢘退之稱不㡬扵魯詩所謂淑問者乎爾景俊扵今法家為通才而無少恩之蔽不㡬扵漢制􅀁謂文無害者乎俾丞􅁄寺同審刑書庻㡬吾民幽枉必逹可􅀦子司業適除太府卿淮東總領十一月十二日敕具官某昔者仲尼攷定六藝至大學之卒章歸於義利易道深矣亦曰天地大徳次及扵理財也今宿師數十萬以天下之財贍之不領扵大農之􅀴費而居此官者不知此誼是不重為吾民病乎冝􅋝臣論建者􅁒得賢士大夫使之乆任以加恵吾元元也朕覧奏矍然改圖其人而大臣首以爾適應選擇輟從司成晉長外府以儒術總戎餉昉扵此矣行爾所學奚必多訓可楊源轉一官敕具官某爾請昏于戚里將以圖膴仕也方優愍章及其黨族冝進一官以廣恩意可楊緯引嫌改知閬州敕具官某朕不以防禁遇臣下而􅂉自言嫌則亦從􅁒以便其􅀻爾紆州組浸有民譽顧以伯氏庀司㩁牧抗章引􅁍易地閬中雖徇爾懐亦足風厲可主管冲佑觀黄度知婺州敕具官某言者不狂擇者不明此漢文帝之詔也深厚寛愽庻㡬六藝朕甚慕焉日以練官􅀘郡守而爾度方抗䟽論事無􅀁撓且竟舎州組便親飬退省爾􅀻豈有爲爲之乎􅀂但從􅁒不強起汝亦異於漢文矣婺越境錯可以􅀅父便道之官是用􅒛汝其徃拊吾民益以民事之暇強學待問朕豈汝忘哉可髙宗周押馬賞轉官􅃙具官某詩不云乎秉心塞淵騋牝三千馬之増减於此􅀚人心焉此吾所以設賞典也其進爾秩􅂆後來可武節郎提轄製造御前軍器􅀁曺組職事修舉轉一官勑具官某以除戎器課勞而増秩非苟以為㤙也天下無事武備易弛有精其䏻不可不􅂆可沈槐胡仲衡吕友直並除大理評事勑具官某等日者屡肆大眚囹圄空虚理官具貟而已然而擇人以詳刑則不可不謹若爾某者皆由此選也冝及閒暇益務明習以称朕哀矜庻獄之意可前知撫州趙彦䋲知贛州勑具官某江右民牧章貢為重爾彦繩以属籍之秀􅁬於儒科而臨川治行奏計為㝡解組来朝􅆘㑹闕守􅂌爾符竹咸曰是宜徃其䆒心以永終譽可宗正少卿李祥除國子􅀕酒十一月二十一日勑具官某士行莫髙於知止廟謨莫急於留賢一舉而二羙附此朕􅀁以用爾祥也以爾議論接於前聞行蔵俻於素履見推文行多士攸同粤從樞属擢貳胄監而秉心無競陳􅁩甚髙蓋旬􅀊之間亡慮數請以年為解懐不自安也朕為此風不作深用嘉尚爰醻巳試晋長司成本之諸生以重兩學夫人臣守􅁩人主尚徳是足以明教化矣可虞儔知湖州勑具官某以爾嘗入霜䑓持玉節風績甚茂淹恤云乆尚徒勞州組乎夫仁不異逺義不辭難廼苕霅之間自昔樂土維年不逢民有菜色荒政十二朕靡􅀁愛苟非其人是􅀅焉􅀉此朕􅀁以用汝也寓直延閣姑寵尔行亟圖民庸以計来上可張宗况張宗愈轉一官與幹官差遣勑具官某等􅂆分之令下未有帥先為吾元元輸粟於縣官者而爾以勲閥丗臣䏻奉明詔朕甚嘉之爰進厥秩俾属外䑓非苟為㤙􅀅以風厲可倪思知泉州勑具官某朕􅀚周詩至於廷臣徂齊入謝為之作誦勤勤勞苦然後知官人之道焉爾蚤以英聲頴脫時輩浸即膴仕蔚為國華日者方憇征􅆖俄而去國顧乃願休祠舘不就郡章以若􅀁為豈必待仕而後慊於心歟而朕自不䏻忘也維閩山樂土温陵佳郡成爾素履姑惟遲次事簡賦寛可踐􅀁學徃其欽承益自明試可鄉貢進士方􅁠輸米􅀘廸功郎勑某􅂆分之令下未有帥先為吾元元輸粟於縣官者而爾嘗預計偕䏻奉明詔授之􅀄官以厲来者不亦可乎可程需輸米特􅀘承信郎勑某􅂆分之令下未有帥先為吾元元輸粟於縣官者而爾䏻奉明詔是足嘉與官以右選以􅂆後來可馬大同特復元官致仕勑霜䑓有請固不可屈於㤙泉壌可懐亦不容􅆸以法爰棄前咎遂還故官以昭念舊之仁以示􅂆􅀎之典具官某信已之學兼人之才粤自少年意巳䡖於先逹浸更膴仕耻徒事於清談蓋時出其抱􅀒之長而概見於設施之際修明臬事有發伏擿姦之功論建版曺皆足用長財之畫肆予􅀄政洊有煩言属爾沉痾姑從薄責諒兼忘於寵辱何􅃍隔於幽明東首拖紳􅂚慰九原之恨西清持槖尚歆再命之榮可著作佐郎王奭除著作郎十二月二十三日勑具官某雍也仁而不佞仲尼􅀁以第徳行之科也爾羣居則寡言旅進則却立不㡬乎􅀁謂仁而不佞者歟乆㳺冊府殊無兢心比上著庭見謂直筆於焉序遷未足以䆒爾􅀎也朕方識之行有簡擢可秘書丞陳棅除著作佐郎十一月二十二日勑具官某載筆東􅀚極天下之選矣官資崇卑􅀊月乆近不足論也爾嘗奉大對亞乎襃然之選才長文冨不自衒鬻從其􅀁好翶翔著庭以昌令名以就逺器詩不云乎潜雖伏矣亦孔之炤爾亦喻此指乎可太常􅀶士邵康除秘書丞十一月二十三日勑具官某筮仕學省遂入容䑓遂上􅁽府士而䏻致身如此蓋亡㡬人也以爾奏名南宫嘗為天下第一種學績文益務持養次第及此朝無異言徃其懋哉以就逺器可太常寺主簿劉誠之除太常愽士劉孟容除秘書省正事十一月二十三日孟容二十七日勑具官某朕毎講至於春秋一書則聞劉氏之􅀃本朝經學未䏻或之先也訪求其家則爾誠之孟容皆世科第誠之方簿正曲䑓雅有譽䖏而孟容淹恤在外􅁛者􅀹不容口也其以誠之為禮􅀶士而特招孟容寘諸􅁽府詩不云子凢周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國朕蓋庻㡬於此焉可中書門下省檢正諸房公事兼􅁠刑部侍郎徐􅁩除權工部侍郎兼知臨安府十二月三日勑啇邑翼翼四方之極夫為内史而無尊重難危之勢非􅀁以覧示海内壮京室也具官某外寛而中剛末詳而本約䏻通當今之務而不失古意䏻得君子之心而不忿疾于頑也比嘗試對賦奏闓切朕識之乆㑹謀畿帥而簡之庻僚貳于起部蓋聞兾裏言之􅂇者開群枉之門懐危得之情者持自營之計内史不競職此之由儀圖其人無以易汝是用蔽自朕志度越故常以論思之班行彈壓之事徃其􅅷哉以振首善可􅀽爕除大學正十二月勑具官某今周行之士可以為人師者不乏而朕取諸逺至于一再爾爕亦喻此指乎夫行修于家而未施用於世名聞於州里而未有著於朝列此人主之􅀁務白也宜益􅅷官以副朕不遐遺之意可添差台州通判吕祖儉除太府寺丞浙東常平司幹官孟猷除藉田令猷閏十月三日祖儉于二月勑用人之弊其惟泄邇而忘逺乎肆朕嗣服覧示無外間有遺材取之下國爾祖儉爾猷皆以故家子孫雅有譽䖏孝友行於窮約而趣尚不專於科第也徒勞州縣未䆒尔􅀎以尔祖儉丞外府猷令籍田其益好修以称朕意可止齋先生文集卷之十八
