  text: 止齋先生文集卷之二十三
  hash: sha256:dd05a91aeaea99bdd9fe70d0dd2a212eb9cd1b9fa82b1d00f627fafc5c7e4230
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_023-1a}
body:
  text: 奏状劄子􅌳奏張子仁除節度使状臣恭覩數日以来一二明詔講慶夀之禮足以歡兩宫之心除鬻田之令足以快四海之望中外小大之臣莫不手額欣抃延頸以企曰近者二三大臣進退哀榮之典乆未予决意者自今聖心豁然如天開霽必次第䖏分矣忽奉宸㫖張子仁除節度使果有以見九重燕間未嘗不軫懐勲舊而及其後人誠舉斯心而加諸大臣則一指揮之頃耳然而人之關繫有重輕則事之施行有先後今二三大臣進退哀榮之典宰執䑓諌屡嘗奏請方留未下而遽加恩於勲臣之子則是䡖重不倫先後失序臣􅀼未曉不敢不為陛下條陳之且夫留正輔相􅀄政于今四年言聴志行曽未有君臣之間而倉卒不審便出脩門揆之經義未為中節然而待放郊外屏居山樊省咎陳情亦既累月陛下誠怒之歟則䇿免舊章皆可覆視誠不欲其亟去歟則或以少保歸班伹解機政或以内祠領使間奉朝謁則為正者進退唯命夫復何辭􅀂猶鞅鞅􅔵望禀命不䖍則持憲臣寮豈容但巳然則今置正弗問而􅃍加恩於子仁獨何歟恩足以及勲臣之後而念不至上相此臣之􅀁未暁者一也非特此也趙雄以抱痾不痊均佚郷郡陛下强起之以帥江西雄之遜牘亦一再上而重違天威當暑出峽竟以舊恙卒于官下萬里旅襯道路惻然雖雄勲業不敢望過厚之禮而有司常度安用損益何爲恤典遅遅至今至如尤袤三朝老儒而陛下之潜邸僚友也最􅂪睿簡行且大用而其致仕遺表之章亦數月未報然則今置雄等弗問而􅃍加恩於子仁又何歟恩足以及勲臣之後而念不至故老此臣之􅀁未暁者二也非特此也關陜對壘今六十年國家以十萬􅆛貅付之吴氏父子三世全蜀晏然不煩西顧者吴挺之力也陛下方􅀅召見闕庭行采㣲枤杜之禮曽未及講挺復致仕故尤以為傳聞失實屏申奏而不信豈非託重扵挺愛之欲其生乎陛下之意則厚矣而非其事情也以挺之威望敵􅀦之􅀁窺覦則擇代不可以不謹以挺之恩信士卒之􅀁懐感則恤終不可以不至以挺之事權海内偏重則一旦而􅀵之又不可以不深加思慮也方今急務未有過此然則今置挺弗問而􅃍加恩於子仁抑又何歟恩足以及勲臣之後而念不至大􅀅此臣之􅀁未曉者三也雖然臣􅀁云云特謂輕重不倫先後失序物論沸騰因事而進言耳􅀂夫張子仁者介在閑散人不稱數雖少長􅀅家而無横草之勞雖乆綴班行而無㳙埃之􅀘不知何故得此殊渥且夫開府建旄非叙遷之官也告廷孚號非􅀻昵之賞也無故而􅂑之則交結之謗在子仁適足以禍巳無故而予之則非汎之患在聖朝不足以勸人况張子仁嘗使令姚徳打死命官歐陽安中又有外宅婢阿􅀜用炮烙刀刃之刑虐害阿鄭等盖嘗經法寺定㫁䑓官􅁴察矣又皆以議功僅從追奪即其怙勢奸法見扵奴婢罪状明白不當除授大畧如此其他妨碍臣未暇數以煩天聴臣不勝拳拳欲望聖慈下采公論􅀅張子仁無故恩數速賜罷􅃦于以光華主徳尊重名噐而亟因羣情舉行體貌大臣之禮則社稷之福也搢紳之願也􅀁有録黄臣未敢書行謹録奏聞伏候􅃙㫖八月十一日奏入第二状今月十二日恭奉御筆付下臣昨奏􅌳張子仁除節度使事奉御筆為係勲臣之子特除節度使可與書行湏至再有奏聞右臣昨不揆愚賤甞􅌳奏張子仁除節度使事退惟螻蟻輙抗雷霆言雖當理死有餘罪今者恭奉御筆令臣書行仰惟聖度如天曲賜容忍而又親灑宸翰明示風旨顧臣何人尚敢違忤雖然臣聞脩當行之政者足以慰傒望之情施無故之恩者足以来謗讟之口臣前􅀁奏固知子仁之為勲臣子也但方群情嗷嗷延頸累月皆以留正待放而罷命未聞趙雄告終而恤典不及凛然西陲擁兵十萬吴挺物故闕無主者當此時也而授鉞於閑散庸繆之臣冝先者反後冝緩者加急則是捨當行之政而推無故之恩臣恐傒望者惶惑而謗讟至矣此􅀁以深為聖明惜此事體且夫報荅舊勞孰與輔􅀄政者之為親矜憐後裔孰與專帥閫者之為重此事理暁然豈唯群臣雖子仁固知之也使子仁稍有念慮則亦於此恩數跼蹐不安矣臣是以不敢􅀮嘿湏至再三庶㡬熈朝不以無故之恩而先當行之政恭惟陛下聰明仁厚逺􅁇三五儻䝉少霽威嚴下采狂􅎩而今而後天意豁然萬㡬之間群疑氷釋事􅀜廊廟則立見施行憂在疆􅂣則便湏䖏置上以承兩宫之志下以盡百辟之情人無後言事無後患如是則􅀦家尊榮朝野忻豫雖勲舊子孫憑藉寵靈窮極冨貴亦物議之􅀁不及矣至如張子仁有罪無功自是不當有此除授則臣不暇論􅀁有元御封付下臣奏状一件連粘在前謹録奏聞伏侯勅旨八月十三日奏入留中上嘉王劄子某輙有愚悃仰禆王聡􅀼惟去年之秋聖駕久不過宮中外憂懼計無􅀁出嘗頼得大王宻啓中宮􅀙容調護巳而六飛順動萬衆懽呼莫不以爲皇后作配之徳叶於􅀜雎大王奉親之孝逺過曽閔也今者太母生辰近在数日而又来年慶夀適䧏指揮既行討論亦合奏禀朝野顒顒欣逢盛事儻若清蹕之詔或不如期則是奉觴之禮又成虗廢必興謗議徒玷聖明區區以爲在今日之謀莫􅀂申去年之請如􅂪大王加聴肯爲逹群下之情共想中宫樂聞必䏻賛九重之决如是則慈福爲之滿意重華爲之􅂬顔主上之孝徳無􅉛中宫之婦道益著而大王令聞布於天下一舉而數羙具不可不勉也又况㑹慶重明兩節相􅁇其爲事軆􅁢渉􅀚瞻外而使客陪在􅋝之儀内而禁衞希􅀙駕之澤動静之際關繫非􅁿稍有參差更足憂慮則是自今以徃全頼大王母子俱賢彌縫此事今夫臣庶之家骨肉相保父祖尊長豈無失誤之時妻孥宗􅀙必致扶持之力正以一門利害各切其身不同他人可以坐視天下雖大義同一家而巳某忝在府僚不敢隠嘿干犯威尊皇恐死罪至如留正吴挺魏王夫人等事並未䖏分此固非大王􅀁敢與聞亦乞逹之中宮庶知外間仰望之切某申禀是日蒙王喚某到講堂云劄子極好但要􅌳進中宫可改一本不湏作文字便封来又劄子某等輙有僣越之請仰干王聴重明聖節中外皆望車駕過宫群臣已是􅀃不行了别無靠䖏只靠得大王入裏頭宛轉調護兼是車駕過宫事亦不當外􅋝理㑹才到得外􅋝理會湏至張皇􅁍不便穩且吿大王因宣押次奏知中宫多方勸賛期於必出若更因循日乆􅀊深兩宫忽有些少不足利害非細某等忝為府僚􅀼以為大王子職莫急扵此故􅀻布之恭惟留意幸甚又劄子某僣越再有申禀魏恵憲王夫人之䘮巳䧏指揮許􅀦公觧官持服在大王是為伯母有合行禮數只縁上意遅疑未敢陳請然外間議論􅁍謂大王有此欠闕頗損聲譽不審因宣押次可以奏知中宫亦略提起只得䧏一指揮許到魏王府焼香奠慰便是了事區區併乞留意􅌳奏􅀓昌朝轉官状准中書門下省送到録黄奉聖旨皇后親屬訓武郎閤門㸔班祗候幹辦御前忠佐軍頭引見司􅀓昌朝巳該㱕謁得轉一官特與轉行令臣書行臣取到吏部案見得􅀓昌朝昨来􅀅皇后㱕謁家廟恩例轉行一官吏部告示本人勘㑹􅀙淳熈六年九月十一日指揮其在内有應奉不係理年出職一時推恩􅀘授名目之人依條作非况􅀘授欲􅀅自䧏前項乾道八年七月八日指揮後来似此􅀘授之人亦合一體止令轉至訓武郎止今来本人已轉至訓武郎􅀁乞轉官有礙前項指揮去訖臣今􅀂與書行即合行下吏部迁轉其吏部係是守法去䖏准前告示不敢放行則是徒奉成命於本人實無􅀁濟臣愚欲望聖慈􅀵囬上件指揮庶免煩黷􅀁有録黄臣未敢書行謹録奏聞伏候敕旨九月二十九日奏入直前劄子臣聞天不可俄度也而示人易地不可俄測也而示人簡是故天地之神而萬物有􅀁恃者以其易簡也帝王之徳配於天地亦􅀂是而巳共惟陛下臨御于今五年省刑薄歛天下皆知其為仁兼聴廣納天下皆知其為恕而近日以来怱事獨㫁㝷常指揮動出意表天聴甚髙人言難入群臣惶懼莫知􅀁為以臣愚昧熟慮而䆒觀之則陛下本心端不如此何者臺諌對班多是隔下間有論奏亦無施行人以為陛下怒臺諌矣然􅀴筵侍講妙選法􅀙而黄艾首預識擢陛下何甞怒臺諌乎給舎封駁旋􅀍改除雖􅂪留中不即䖏分人以為陛下怒給舎矣然王府翊善付以元子而黄裳終見信用陛下何甞怒給舎乎留正無故乞觧機政出郊數月猶未予决人以為陛下怒大臣矣然随班上夀之請朝奏而夕報可至欲使以左相為上公陛下何甞怒大臣乎甚者或以致仕而恤典不下則紛然􅀼議曰陛下惡人言死彼李端友備數舘客卒於邸中賻贈随至然則陛下豈惡人言死耶或以乞去而亟請不􅀗則又紛然􅀼議曰陛下惡人言去彼辛棄疾召為大卿即去為帥至欲以次對寵其行然則陛下豈惡人言去耶臣故曰熟慮而䆒觀之則陛下本心端不如此終㱕於仁恕而已臣聞天度有常而或寒暑乖錯晦明反繆者必有干隂陽之和者矣而天度固自若也聖徳罔愆而或喜怒失節舉措過差者必有誤聡明之治者矣而聖徳亦自若也以是言之則不怒臺諌不怒給舎不怒大臣皆陛下本心也而况於惡人言死􅁖人言去豈陛下之心㢤而又况自夏徂冬稍闕過宫之禮遂謂陛下以疑阻虧孝飬又豈陛下之心哉夫不察聖心而見其形似苦諌而力爭之是冝天聴甚髙人言難入也雖然群臣孰不希寵何苦自絶雨露之恩孰不畏罪何苦自干雷霆之譴而孜孜半年爭此數事陛下亦盍反求而徐察之乎若陛下於此數事反求而徐察之曰吾心寛大本無􅀁怒今􅀂有􅀁怒然何歟毋乃以某人嘗言之之故歟吾心和平本無􅀁惡今􅀂有􅀁惡然何歟毋乃以某人甞言之之故歟吾心孝敬本無􅀁疑今􅀂有􅀁疑然何歟毋乃以某人甞言之之故歟茍有其人茍言其事則是誤陛下者也􅀁以誤陛下者􅀅以孤陛下也至此口奏甚悉夫不察陛下之心而以形迹諌爭者群臣之罪也陛下本心端不如此而不察人之誤巳以致於此或者亦聖人之過乎陛下誠以本心之􅀁存而徐察之則知人之誤巳者矣知􅀁以誤已則外􅋝之黨論可破外􅋝之黨論可破則兩宫之情意可通外廷之黨論破兩宫之情意通天下尚何事耶以此圖大功可也不睱逺圖以此為小康垂拱而責成可也垂拱而責成則鐘皷絲竹樂與今同尊爼袵席樂與今同臺池鳥獸樂與今同無不可也然則陛下何直爲此鬰鬰使天下徒日夜洶􅍅也臣最㣲賤最荷恩寵不勝忠愛之心爲陛下白發其端而不敢盡言惟至明至聖爲社稷大計爲富貴崇髙逺慮而加省焉則天下幸甚取進止是日因奏慈福宫加上尊號已有指揮未審重華宫何故未講此禮以臣攷古来聖人多以彌文縟禮交懽上下今陛下方自疑阻稍闕問安之節若因此盛典併行於兩宫臣意夀皇湏更開喜遂歴舉漢唐以来故事及徳夀宫禮数上大喜曰此是好說卿可到都堂宣諭宰執明日奏事啇量偶記得孟饗前齋􅀫不是奏事日分遂奏云明日宰臣以下齋􅀫無奏事上曰如此只就景靈宫齋殿奏事因奏臣小臣輙發此議巳是僣越豈敢承聖㫖宣諭大臣以臣愚見只合待大臣奏事陛下自以聖意指揮即􅀹見陛下孝敬之徳臣不敢領聖㫖上再諭朕遣卿有何不可遂到都堂具道上意是日趙知院在假􅁑丞相折簡相約請對比入文字御批十六日就景靈宫齋殿奏事與前言合諸公皆喜已而􅀙駕孟饗遂奏事上意已變但云且許他乞􅀘外状臣昨不度踈賤妄有建白今月十六日伏准尚書省聚􅈦宣諭令臣不得􅀃出伏念臣只是建議􅀂行不行自在陛下則臣决自不敢傳布但縁當来曽􅂪聖訓令臣傳旨與宰執大臣則知者已非一人􅀂萬一有人􅀃出忽逹天聴即臣當坐漏􅂥之罪臣於此時無以自明臣不勝惶懼􅄬誠君父欲乞聖慈與臣在外差遣或祠禄一次稍俟日乆􅀌蹤明白别賜􅀵用實臣至願除巳具劄子􅀴朝廷陳乞外謹録奏聞伏候敕旨貼黄􅀁是臣􅀴朝廷陳乞劄子只如㝷􅀘外體式更不􅀃及此意伏乞睿照乞祠禄㱕展墓焚黄状臣輙有迫切之懇仰干天聴伏念臣九􅀊而貧賤養生䘮死皆有永恨前此幸值郊霈始得贈父而乆官湖湘逺離墳墓今七八年不􅀗展省以行焚每一念下為之心折萬一溘先朝露即兩親竟不霑澤臣亦無以見於地下矣况自立朝委是尸素區區欲望聖慈矜憐衰謝来日不多特與祠禄差遣一次使得展墓焚黄少慰存􅃿臣不勝祈天望聖激切屏營之至繳奏南班多慶轉官准中書門下省送到録黄一道節文三省同奉聖旨多慶特與轉行一官令臣書行右臣照得在法南班磨勘實及十年方許轉行一官其多慶􅀁乞係多方淳熈七年體例止及八年欲轉行一官撿照得紹熈二年正月二十一日指揮臣僚奏陳其有法者止當􅀙法不得更引非法之例令御史臺􅁴察必罰無赦自後有司常切遵守今来多慶轉官正礙前項指揮自降前項指揮以後即無援例陳乞放行事例假如放行即御史臺必湏覺察聞奏適爲多慶之累臣欲望聖慈􅀅上件已䧏指揮特賜􅀵寢􅀁有録黄臣未敢書行謹録奏聞伏候敕旨十月二十一日奏辭免起居郎申省状准尚書省劄子備奉聖旨陳􅀓良除起居郎日下供職不勝慚懼湏至煩瀆伏念某哀朽罷駑誤玷班列久無􅀘報實不遑安昨嘗累具奏申乞􅀙罷免或與在外及祠禄差遣俟命累月未准指揮今乃求去得遷若更冐然就職則是前請皆非真情欲望朝􅋝特賜敷奏追寢新恩以安愚分十二月三日三省同奉聖旨不􅁢兼職並依舊繳奏安定郡王子濤賜宅状准中書門下省送到録黄一道節文為利州觀察使安定郡王子濤奏今踏逐到宅子一􅀁乞照令徳等例撥賜居止以便􅀕享十二月三日三省同奉聖旨依令臣書行右臣􅀼以為安定郡王見無住宅以便􅀕享殊失嚴奉之意合􅀙朝廷撥賜宅子一􅀁永充見任安定郡王居住以存事軆今来􅀁有子濤奏請臨安府府衙後宅子未審堪與不堪永充嚴奉香火欲乞更䧏指揮下臨安府契勘聞奏取旨撥賜仍不許其他官員指占亦不許􅀅後子孫認為已業如此則前後承襲庻免疊有煩瀆􅀁有録黄臣未敢書行謹録奏聞伏侯敕旨十二月􅀄六日奏􅌳奏刑部大理寺易大明阿王㫁案状准中書門下省送到録黄一道節文爲刑部大理寺状舒州申勘到百姓易大明并汪清妻阿王㫁案事令臣書行右臣􅀼謂人之親莫切於夫妻妻而與人謀其夫則生人無措身之􅀁矣照得阿王嫁汪清生一女三子自紹熈元年與易大明通姦以来凡其夫汪清􅀁與疑慮易大明者皆宻以告凡易大明􅀁與謀害汪清者未甞一以告也㩀案阿王甞受易大明之謀醉其夫以酒又􅀙之學作麻索套子􅀅以勒死汪清不果如是者又一年而後卒殺汪清當殺汪清也易大明雖以鐡尺打傷仆地未曽氣絶令阿王快取索来阿王紀恨汪清節次打罵亦有心要勒死汪清手觧布機上麻䋲付易大明勒死之是不謂之同殺其夫乎在律謀殺條姦人殺其夫􅀁姦妻妾雖不知情與同罪昔人之意􅀁為斯人慮者甚嚴宻也况同殺之乎春秋之義魯夫人與弑公絶不為親禮也聖人豈忍絶人母哉與殺其夫雖子猶不得以為母以是為王法􅀁當誅耳而貸不殺是無三綱而十惡之條癈矣臣自攝乏書姦人殺其夫之案或貸死者有之而未有如阿王之幸免者臣愚欲望聖慈參酌􅀴律令有司别行議㫁􅀁有録黄臣未敢書行謹録奏聞伏候敕旨十二月十六日奏入􅌳奏􅀓昌朝轉官状准中書門下省送到録黄一道樞宻院􅀜十二月八日奉聖旨訓武郎傅昌朝特與轉行一官令臣書行右臣九月二十九日曽具奏􅀓昌朝巳礙止法兼違戾乾道八年七月八日聖旨指揮當􅂪聖慈􅀅􅀓昌朝轉官指揮留中不行去訖今来又准送到上件録黄臣實不敢奉詔且傳昌朝蠢爾小臣乃敢宛轉附麗煩瀆朝廷變􅅍法度以臣愚見不惟不當轉行一官更出合自宸㫁别作行遣以杜絶来者􅀁有録黄臣未敢書行謹録奏聞伏候敕旨十二月二十日奏入􅌳奏藍嗣祖轉官状准中書門下省送到録黄奉聖旨進義副尉藍嗣祖昨在潜邸服勤有勞可特與轉承信郎令臣書行右臣㩀都官供到状􅁛昨紹熈元年六月内給帖􅀘該遇潜藩應奉推恩人共四名藍嗣祖章顯祖顔守忠王演各係白身並􅀘進義副尉数内王演係􅀵使昨該皇太子官祗應陸宣公奏議終篇賞轉進武副尉又􅀵使皇后受冊推恩賞轉承信郎顔守忠係􅀵使皇太子宫祗應陸宣公奏議終篇賞轉進武副尉又􅀵使髙宗梓宫發引賞轉承信郎見得二人各係􅀵使兩宫賞方轉承信郎今来藍嗣祖與二人􅀘授年月事體一同即無上件合該􅀵使賞典􅈳與特轉顯是不均恐非公朝待人無􅀻之意􅀁有録黄臣未敢書行謹録奏聞伏候敕旨十一月二十三日奏入止齋先生文集卷二十三
