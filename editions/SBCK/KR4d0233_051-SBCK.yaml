  text: 止齋先生文集卷之五十一
  hash: sha256:9243561e071fe97cfdf65be11c8e011a09c14428d3d4d96561f77f4c310bb5d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_051-1a}
body:
  text: 行狀右奉議郎新權發遣常州借􅂵薛公行狀曾祖庠皇不仕祖強立皇任江寧府􅀚察推官累贈左光禄大夫父徽言皇任起居舍人公諱季宣字士龍姓薛氏其先世家河東後徙福之長溪㢘村至唐􅀘闕令之後又自㢘村徙永嘉而光禄公始􅂋四子司封郎中嘉言敷文閣待制弼及舍人皆第進士昌言為㜈州通判舍人從胡文定先生學以丞相趙公􅂦薦仕于朝秦公檜相定和議舎人廷爭移晷中寒疾以卒母胡氏安人後十三日亦卒公六􅀊而􅀌撫于待制伯父長任以官公從待制䆠㳺四方尚及見故老聞建炎紹興􅀄􅀅相大臣趙張韓岳諸公事有當世志而樂道其人年十七荆南安撫孫汝翼辟書冩機冝文字孫氏蔵書多公一意講􅀃紬繹絶不治科舉業有隠君子􅀽溉道潔少學於河南程先生聞蜀薛叟名求得之道潔繙六經諸史以􅀚叟叟􅀏曰子學􅀶而寡要其相授受嚴約盖如此湖湘間皆髙仰道潔公師事焉繇是益務自歛制充養蜀制置蕭振辟公為属部􅀅有狠訴綂制者公當以犯階級法幕中或論縦之公以軍政爭不克謝去盡其禄直買蜀書以歸為鄂州武昌令故太尉劉公錡鎮鄂渚公論武昌形􅀔直淮蔡今見戸三千五百弓級財五十人􅁟軍十有九人冝早為備因陳屯田分戍保伍以寛民力之筞㑹有㫖營田一卒二十畆縣官盡征之公告鄂守宋佀孫曰是非漢屯田之謂漢兵民也使之就田豈曰不可今非惰㳺不從軍彼不素知田家事驅之縁畆必不樂􅇮時王彦營田湖外遣二十􅀅潰者十有八而况盡征之乎且齊民在野環營以軍殆必爭利成閔益戌夏口公曰冝戌武昌備申􅃽故樞宻使汪公澈宣諭江淮公上書言自􅁠臣執囯柄士氣索然趙張之放莫敢尚徳岳飛之死莫敢趨功今卒有意外之虞誰其禦之因論邉事甚悉及營田宜亟罷􅀊餘虜犯襄陽而還兵圍􅃽甚急汪公問筞安出公白以蔡要害得蔡則􅃽圍自觧成閔克蔡􅃽兵果遁扵是虜東道軍傳合肥王權退次柘臯李􅂋悲亦不利却成閔東為援公又白蔡不可失􅀂乗勝㧞頴昌道陳汝直趨大梁則廬兵不􅀾可屈捨蔡援廬是棄􅄬機之㑹為連鷄之栖淮􅃆虚矣又曰虜空囯来冦符秦故計也今我不可復􅀾惟當晝江固守而以竒兵􅃒擊春尾阻前顧後􅀔且自沮輿尸一决其禍必大􅀄公試邑年甚少方天下無事豫陳邉備諸公唯唯未遑也居無何邉吏倉卒興發騷然柴棄遷孔子宫避戍􅀅嘉魚壊學官繕壁壘江湖間稍􅕽於武事矣公顧以和糴賤傷農三白郡觧印綬去為奏罷糴乃巳比冦至蘄黄以南列邑無寕居守令􅀼議内徙宦江湖者歸孥相望於道公廼誼死守不去與民期曰吾家即汝家一旦有急吾與若偕死敵民亦自矜􅁬三分其衆更壁縣下二總首帥輕舟守安樂口白鹿磯且乞師於汪公得甲三百樓船十艘氣聲張甚渡江来歸者數千家江西時以無恐諸公繇是翕然稱慕交章継薦汪公虛幕府官以待比其入也欲以公朝行在􅀁轉運判官王逖劾罷信陽守檄攝軍事既觧縣爭欲辟留滿考改官公並辭不受其後營田二十卒田二頃􅀊得榖六伯石􅅒錢乃七十三萬米一伯八十石闊逺或數百里一壮馬􅀒二石榖從以􅀐士詣大軍其費視民間買榖價相􅀂士苦之徃徃道棄榖去又壅民之水利而掩其善田州縣莫敢如何營田終􅆸虜亮既斃明年蔡果不守尋復議和朝廷於此亦棄唐鄧封略止於沔南矣盖一如公言公治縣事為之經必曲折盡人心不苟作差􅃥􅀫戒里胥披籍次第條二十餘家未差已差别為行且䟽其強弱某堪一􅃥某堪再􅃥於其末自任某人某􅀊月序當􅃥以付案案任之付録事録事任之乃差差巳有訟不均舉其籍俾訟者自覆視伍民五家為保二保為甲六甲為隊若干隊為緫不以其鄉分畫惟地之形便諸緫旗各為色搶仗皆中度舍姦有禁詰盗有賞其以廵徼遇非常死事者為棺􅈖之復其家田若干租三􅀊總首得與令相問報專逹不關縣胥廵尉非縣檄毋得擅征甲士在邑五日一閱官賦之糧而賞其最鄉惟􅀁欲偶習於總首之射圃母贅聚其為士若大姓附編存之勿藉俾輸財與力佐治戎噐其􅀅輸信陽也凢十千八百人致米九百石行必為陳日暮各以部曲相地頓舍以搶為壁鳴刁斗設伏公食飲卧興自同􅃥夫毉護病者不偕至不􅀫府檄治砦屋百數區泝流二千三百餘里程日立辦公借材於縣人度長圍大而加償之賦鄉挽舟而五分之以居者之四共行者之一匠人亦各俾一鄉償其僦費舊財賦名色異為籍雜不可省察為都籍以提出入之要鈎摭侵姦以除無名之歛諸案事以其劇易分日乆近為旁行譜每以日加申稽知其决否故不决􅀫吏于次抄積不銷為走暦日掲其名數以便主簿者之鈎攷而因察其惰民頼其便凢公意趣鄉􅂺鼓舞從之豪民衛仲堅王安道更數令不􅀎􅃥及是以次受代安道語人曰失今不為焉􅀎頫首它令創鄂營八百架總隊請分事公約剪伐某􅀁茅某􅀁木竹應日而集縣有鍾呉二盗魁大府屢設方略求不􅀎得公以諉總首王宗元竟諭呉降之為買田屋改業為民鍾滋甚俄斬之而至信陽之􅃥選徒郷属而邑二隊首固請從曰吾知縣出矣吾何敢䖏是􅃥也露次不驚訖歸不惰道邉梨􅀥下無跡邉民謂閱過軍多矣未有若此肅者它所區䖏民吏皆化服􅀋此調㜈州司理參軍居五年用樞宻使王公炎薦召公􅈤求之官不報於是上在位七年矣入對進三􅀃一審政本躬細務􅀚鞍馬以􅁠為經本末倒植况動煩宸􅂨國論靡定􅁠移近宻衮職日輕降胡侍從之虞毬獵固寵之術意有所偏患生不察願陛下以靜養恬略小圖大遴三公之選責以進人才張紀綱延端直之士與之講問學求治道歸有司之常務屏馳騁之細娯沉潜待時安徃不濟其二冗官冗兵周官惟六漢别九卿自東都有尚書六部唐置内諸司使増員浸多有職盖寡諸路帥臣在古州牧國朝以来置轉運使副判官提􅀧刑獄提舉常平茶塩総領市舶坑冶茶馬諸司屯駐之軍又别置都綂制牧伯之任分為五六而州之知通縣之令佐不相綂臨各行其意臣之所謂冗官此也唐方鎮之兵今廂軍是周世宗及太祖皇帝増置禁旅今禁衞與諸州禁軍是神宗皇帝立􅀅兵之法今帥藩係􅀅禁軍是太上皇帝􅀵諸􅀅麾下作三衙御前諸軍今大軍是四者之外復有弓手􅁟軍􅃥兵今為大軍勝戰􅀅兵而下􅆸為􅀠􅃥臣之􅀁謂冗兵此也苟得其道更張不驚顧陛下䖏之何如母憚難也其三虛稅武昌絶戸屋租屋亡而租在徳安岳飛牛租牛亡而租在永嘉海溢濵鹵之田田亡而租在凢此宜悉蠲除以惠貧下當是時上志在中原王公炎方數進見語合驟登用薦公甚力公未至則謝曰聖上天資英特群臣亡􅀅順緝熈之具幸得遭時不􅀎格心正始以建中興之業徒僥倖功利夸言以眩聽今俗皆曰中庸大學陳編厭聞然物不兩大心無兼慮天地之道忽略根木而奔走軍旅之間舛先後之序而􅁍施之雖復中夏猶無益也比至王公再見縱談邉閫事公曰旣曰論兵􅀼嘗評以孫子始計之書未見其可方今人人異意不可謂道災異􅂾起不可謂天以江左争中原不可謂地以貪御驕不可謂將將不恤士士不安將不可謂法集一圖九古人寒心求之時賢誰􅀎辨之况今三衙御前舊卒略盡江南白丁何以持乆常平錢米在􅀁虛数以此饋師其􅀎継乎兵驕民困或未免蕭牆之悔即幸勝之方上勞庙筭伏惟以仁義紀綱為本至於用兵請俟十年之後如曰上獨断耳去位可也又曰天長可以入維陽清流可以向六合淝水可以下合肥北峽之隘廬江之徑武昌之近新息秭歸之北啇於子午南逹梁洋岷洮東近威茂用兵􅀁徑忽不之備然而獻計者但曰無患非偷則狂有㫖改宣義郎差知平江府常熟縣明年大臣数言上復召審察公固辭其友人秘書省正字劉朔以君命相風厲公雅意㢘耻道鮮自一介不冝菲薄遂白丞相陳公俊卿曰周公寕以戯封諸侯開成王不敢玩人之心鄼侯身追亡將移漢祖嫚士之習古人格君之業於是乎在有如假令以匹夫之節一感上意亦足以報陳丞相免虞公􅁢文相益趣發不􅈈自召命下公請之任六七不報又請奉祠不報積十有八月而後就道至数日則􅁒引去侍從有留行者除大理寺簿方虞公銳意於事一時言利言兵自衒鬻者甚衆守經不阿㦯􅀍罷斥公見之晚猶兾幸一改聽始從容引番吾君􅀃趙相國公仲連事諷以功業缺然咎在進賢未廣置􅂇不善丞相亦矍然爲敬頃之乃反覆切論徼功大速興事太䡖速無逺撫輕則中廢經濟天下當與天下士圖之鄙夫􅄝利自市試跡前事今皆反繆願公易慮勉終毋爲後悔㑹江湖荐飢民流淮甸邉州又有言帰正人相属者上命帥臣漕臣共安集之逾月奏不至丞相召公問􅀁當施行俾條列將議遣使公惶恐謝不敏且淮事難踰度固以問因䟽数端一責成帥漕毋以遣使使者􅀁過州􅀫留循行未周巳及春夏二新民未見便輙劳苦州縣百􅃥爲是懐故鄉無長居之心冝略如孫呉屯田都尉故事自立营壁他繇使勿與三冝先定要束誠以闢地而巳縣官一無利焉悉以故陜西弓箭手法復其租四􅀊榖既登漕司致布帛茶鹽凢民所須率令榖價視物價稍昻以傳糴就蔵屯所爲後備因言若辟属吏若移用錢米若括􅀮田兹事體大必遣使非選擇重臣持節漕帥州縣何以恊使翊日有㫖以公將命淮西公即言流民或前散寓山谷依人姓聞今使者出必相􅂝待聚城邑仰食扵縣官卒有累萬之衆將安取給且請以淮西諸州縣係省不係省錢一得以便冝調度朝廷尚難之公重謝不敏尋得㫖以見錢米一萬緍二萬石行不足用聽次第以聞是􅀊乾道七年也十有二月八日公至合肥明年正月抵齊安布宣天子劳來德意分遣才謹吏循問大抵安豊以東来者略巳􅀠主户矣即撫勿徙沙窩以南稍稍未有適郷公親􅂂阡陌間審度山澤曠地以爲合肥廢圩可因以設險断柵江保巢湖而舊黄州古邾城也路直垂􅉚置荘旁近異時冦不􅀎潜師徑度迺與安撫趙善俊修復三十六圩且於舊黄東北置二十有二荘居之凢合肥戸三百四十有四口一千九百九十有六勝耕夫八百一千有五為田三百七頃八十有四畆齊安戸三百四十有一口二千一百一十有一勝耕夫六百一十有四為田四百四十有四頃五十二畆率户屋二間二夫牛一頭犂耙鉏鍬鑊鎌刀如牛數三牛犂刀一毎年二轆軸一車其受田人種子錢五千其家以口老壮少為差賦米及秋止凢費錢緍二萬米石六千而夀春歸正及自古若為􅀠農於大姓者亡慮振業三千八百餘家要約明具噐用使利廬舍有伍疆塲端正􅂣圃牢牧陂溝路橋悉皆治修病醫死葬􅀁謁輙得遷如歸居廼請還始入臣白遣數人各試其俻邉計畫徃徃設飾為辭以上功八子雖不盡然之姑惟闊略庶㡬或報効公之行也至固始求所謂北歸人者凢一百十有二家皆􅁟著數年而新附者才五家光守宋端友更以舊戸比新戸詭為奏甚者賊殺歸人掠其善馬公即劾奏端友謾蔽時端友進寘環列根抵連附不可撼動人皆危公奏上天子獨怒下其事于理􅀅窮竟問治端友􅁀以憂死繇是頗疑邉臣亡狀而所白遣大臣􅁼無欲得事情之意於公齊安之請還也命覈麥田留累月覈巳又命視鐡錢事公歸對卒展罄所見聞復上首論州縣田簿甚具而淮地實不加闢臣諏其故大抵主户占田一畆數頃輸租僅斗斛耳而􅂂其産彌日不徧既不􅀎自耕又害他人耕何以聚人保境宜合剗請以猍逺民来者務得居者患失主客力競􅀅無曠土再論今邉郡田野荒蕪􅂆墾文具総首空設蒐除苟簡循淮而南則有和糴則有鐡炭則有建康艸料之征勞逺虚邉以資江左守􅀅數易以竒継苛一郡三邑二令䏊憒險阨非一不過合肥歴陽居巢三戍夫以陛下規畧而稽誤至此或者外治不可成歟臣愚妄意推本自夫不計而謾為而後外以鹵莽報不思而出令而後外以難行􅆍號為責實未免徇名則􅃐辨皆徇名之人志在大功却規小利則迎合皆規利之軰誕謾者敗而不誅䛕恱者察而不去言旣上壅人多自營宵旰十年􅀚今何􅀘臣謂内治不修無以整外惟望責宰輔以坐論其原􅀵賢材以愽圖其緒兼聴虚受以通壅闕朝廷正則疆塲理矣唯陛下留神三論左右之人爲欺嚢槖迩爲援則逺堅大爲間則小肆彼其伺候辭色占揣意鄉開闔􅀅迎莫状其巧託正以行邪偽直以售佞薦退人物曽非誦言㳺􅀭中傷乃自不意一旦孚號􅀭廷雖出􅐶断喜怒氣􅆋巳歸􅀻門齊威之強不在阿即墨大夫之誅賞而在毀譽者之刑毀譽無證刑不行焉胡􅀎禁欺陛下誠幸聴臣無自立我􅀵骨鯁棄軟熟察此非難廼悉數骨鯁軟熟情状上極開納讀奏至齊威事進曰臣􅀚近政非無阿即墨之断柰何毀譽之人自若上曰正待理㑹公益口䟽治邉非是曰買馬亡㡬習至盗馬虜􅀅􅀉聲問故卒索歸之國家何至乏此而自傷體􅀂是詔即罷買又曰日城淮郡以臣􅀚之未知守所合肥板􅆬方立中使督視卒卒成之廼者臣行過郡一夕風雨堕樓五堵歴陽尚壁缺而居巢庳陋如故廼聞有靡緍錢鉅萬而成城四十餘丈者陛下安取此乎上問千秋澗何若對曰始臣行時方冬水落澗不勝舟比歸夏潦時至江澗合流􅄅然矣是􅀅焉用上曰間亦險要對曰若以兵法言之漸車之水足以制敵藉此為險無乃不可又曰外事無足道咎根不除抑臣深憂左右近侍隂擠正士而陽浮称道陛下誠聖明儻因貌言萬一垂聴臣恐石􅂋王鳯鄭注之智中也又曰近或以好名棄士臣伏思念好名特為臣子學問之累人主為社稷計唯恐士不好名誠人人好名畏義何鄉不立上恱連言極是於所汲引士皆旌賞先是上即道遷公兩官又除寺正有自邉來覲者則曰薛某凢可為國知無不為而又注意傾洽以聴罷行如響故諱缺失者相目矣數日除知湖州朝辭劄子論科折不明示數輸送不即除籍及祖家分鎮強邉之法曰陜西為五而綂於永興河北為三而綂於大名有塘濼方田稲田榆塞為之險城堡寨鋪為之防弓箭社􅃓箭手畨族熟戸為之羅落它路迭戍悉受節度幕府州縣難所辟差自种折二氏外别帥則以三衙􅀂三司使都轉運使為之􅀎績效驗入備政府夫地分則守固􅀔連則情不隔權壹則足以有為賞明則知勸光堯中興㳂邉置鎮茶鹽之外舉推與之􅀅以固圉計亡易此臣願按行成憲衆逮鎮守統帥輿帥不限文武忠智是使且無拘文無要小利無以日月為断卒章􅀹剴切曰方今䛕媚成俗舉世尚同汎􅀚設施讙曰盡善偏辭先入異議不継百辟盈庭㡬成􅀌立是日奏罷上留語良乆公􅀅退特温辭寵藉之大㫖謂書生姑息而辦事者以竒為􅀎煩卿輔郡兾以中道理之公對曰臣學於師以事陛下唯中道尓上曰如此朕復何憂公至郡踰月户部奏言諸州經緫制錢皆出􅂣務酒稅雜錢分􅀠以納今多􅀮餘分􅀠不盡得自便恣用請更為今監司給暦州縣以凢日􅀵錢摭實係暦分􅀠否則效聞令下吏相顧莫敢建明者公獨首􅁬為當路言之其畧曰舊額凢雜納錢以十分為率分􅀠四為糴本六為係省錢其後廼始増以二分分􅀠緫制錢是時州縣未病之也然亦䆮尋扵竒羡矣乆之乃裒羡錢校數􅀊之最為額以十分分􅀠之七為緫制増稅三為在州錢愈非舊比也復積有上供月樁大兵打船修船六分贍軍移用降本竹木等錢科色不勝繁矣而􅀠額如故旣不足以􅀿計且􅀊費弥廣郡用彌匱由此􅂣務鑿空以取嬴雖有奉法吏思以寛弛予民而不得騁若復􅀠額外之征掇其强半官吏自救不給民病甚矣且以胡之都務糴本係省􅀄為錢二十三萬五千六百有竒自捴制之起為錢五萬八千九百有竒與故合猶日課二十九萬四千餘錢而巳重以七分増稅為錢三十五萬三千七百有竒又重以上供若大兵之湏凢四千萬八千錢有竒使今且旦得八十萬錢以充入經捴制之額其餘為上供諸雜湏錢且患若不足况不盈此卿􅀁謂係省在州之數悉闕亡有約此推見他筦庫盡然郡􅀅安仰如不得已冝以日􅀵錢先樁上供諸雜湏之餘迺係暦分􅀠庻􅂉可行不然不敢奉詔版曹恚建郡胥俾持條法詣曺自觧公辨益力䑓諌官感發相􅁇䟽爭之上迺􅆍前奏湖無苗米饟軍􅀊糴七萬一千五百餘石為緡錢二十一餘萬目添差武臣路下至進勇効士一百七十有一員軍貟五百三十有一人其廩稍爲緡錢距二十萬以他經費合往􅀊凢用緡錢五十二餘萬舊制烏程㱕安二縣折丁錢􅀊十三萬緡七年有㫖减折丁錢太半其巳全輸者听以明年除之是􅀊􅀁失亡十有餘萬而大農和糴六萬石以銀交子髙估徒欲用錢二千省得米一石郡不忍裁市直則當􅀘錢萬六千緡僦載之費不與焉益以就祿八十有三人啻爲緡錢二萬明年郊視進獻賚予之幣齎亦以二萬数凢増費十萬三千餘緡以亡加増大都缺緍錢十有五萬公曰是雖劉晏􅀅柰何亟請扵朝乞以市直償民糴乞以折帛紬絹錢撥除折丁錢乞汰軍改徙寛郡乞莭冗長差授在郡裁三四月自抗論分􅀠後執拒大事累數端日與􅁠貴征利者爲敵雖或依或違郡民少蘇而不􅀎平者滋衆獨􅀠天子簡記􅀁以見覆護甚至始公嘗薦某人有材識它日某官缺貟宰執擬数姓名以進竟擢某人爲之郡丞趨時好干政引章避之爲是他丞甞遣中使有􅀁㢘察浙西諸郡獨不入境用是故不敢􅂺動危之然公㱕志决矣即􅁛病請奉祠三不許㑹除代一月章五上巳又旬四上改除知常州公方鄊用人人期待行􅀁學不数月乆勞于外還七日迺出守守七月罷罷㱕之百日以疾卒年止四十􅀖君朋友暨後學􅂘之過乎哀四方賢大夫士千里交相弔也公之學蒞事雖謹宅心唯平其燕私坐必危然立必嶷然視聴不側欹雖􅀁狎授言不以戯自著抄書及造次訊報字畫不以行草几篋筆研衾枕屏帳皆有銘毫􅁵靡宻若苦節然要其中坦坦如也故其寡欲信扵家行推扵鄊正直聞世而居無以逾衆人公自六經之外歴代史天官地理兵刑農末至扵􅀮書小􅀃靡不搜研来􅀗不以百氏故廢尤邃於古封建井田鄉遂司馬之制務通扵今或者疑公之􅀶盖其􅀁自得精一矣名流問質或往復累數百言㫖要無二大􅔰以古人小學神而明之大學之道􅀓逺􅀃離故漢儒守噐数章句名家小知穿鑿異端之徒乃一切屏事志言後已髙論虗無而卑者滯物卒不合合㱕于一是為得之讀其書知其為􅀶之約也公已不求聞逹扵人有一長薦称必備居官不出位遇大事義􅀁當為㫁為之甞掇拾管樂事為傳語不及功利平生􅀁推尊濂溪伊洛數先生而已告學者則曰毋為徒誦語錄有浪語集若干卷書古文訓若干卷詩情性􅀃若干卷春秋經觧若干卷㫖要一卷中庸大學􅀃各一卷論語小學若干卷資治通鑑約􅀃止若干卷九州圖志止若干卷餘未就公患五代史缺略脩之亦未就若隂符握竒山海經古文道徳經焦延夀易林及劉恕十國紀年荘綽楪􅆱譜林勛本政書姚寛漢書正異之屬皆校讎爲之叙其文精􅃀趣實可以濟世其經􅀃不並依先儒其校異書必觧剥其不正者娶孫氏父汝翼也􅀄汝翼與舎人友相得舎人死汝翼遣書待制自言吾有女才且淑異日冝善事夫子吾􅀅以室起居之􅀌比㱕公婦行皆應書公卒其友人張淳欲悉遺衣服以歛書銘如古法􅀎俛聴盖不失公意云一子曰沄􅀘􅀦學生公以卒後之百四十有四日十有二月壬申􅁙于吹䑓鄊慈湖之原􅀓良丙戌丁亥􅀊受徒城南公間来過教督之明年謝徒束書山間屏居公又過之問治何業竭已􅀁已得對公曰吾懼吾子之累扵得也即詔曰冝若是􅀊已丑冬遂徃依公具區滆上卒學􅈋茨一間聚書千餘卷日考古咨今其中明年秋試太學公􅆘赴召於是鄊諸生及它􅀖之友咸在又日相與􅀙公居㳺凢七八年間違公久者惟公使淮守霅川時爲然然亦率不一二月書命􅂺至至則具道􅀁言與行事故世多知公詳莫如傅良今取其出䖏事言之大關治道斈術者爲状餘不著謹状福州長樂縣主簿諸􅁑公行状曽祖考璿妣朱氏祖考原武翼郎祖妣張氏趙氏並封孺人考純廸功郎妣趙氏公姓諸􅁑氏諱􅀃字夢叟琅琊諸􅁑自㑹稽内史恢别爲淛東之族後稍徙嚴􅁜永嘉族盖嚴徙也或曰新安譜亡弗可論次公大父娶城南張氏以諸子從其舅學􅀁謂草堂先生以八行應書者也繇是闔郡賢士大夫徃徃多諸􅁑氏師友婣婭公㓜陶染諸公間已岐然度越行軰益自勵讀書著文窮夜旦不輙休既冠入太學􅄪薦登紹興庚辰進士第方待嚴州司户叅軍􅊴丁迪功公憂服除授台之黄巖尉復丁母氏憂公故􅀒當世志學不為章句訓詁淺事務見扵施設此罹兩䘮謂祿養之無逮命之不偶也於是名其園曰艮園室曰傃室以其學力行於家輯柔其族而厲其鄊人乆之上下交孚子弟無少長咸視公習謹而麗於善莫之或肆里並大海其啇海自給者率剽悍迺時以􅀁不平就公决質之惟一唯否是定郡之東南隅廣斥易恐截然􅀝公為巨防而公亦任其戚休非衆同欲謁不至郡邑凶年艱􅀊縣官有䘏政為守者率需公至為方略公白事當若何費當㡬何立聴行之然他鄊部未有條而東南隅若干戸少長秩秩然􅂪恵矣紹興之季年也防海􅂭興之甲申眎疫丙戌埋骴乾道之庚寅􅉝夘食飢壬辰築埭皆其小試微見者也往年余與薛叔似象先陳謙益之俱㑹行在􅀁私相語為授福之長樂簿公重違吾黨意强起之官是時前丞相史公帥閩部丞相閱人熟不䡖以獄訟􅂌属吏雅聞公賢數諉以事公以理平决不視大府意􅀁疑信為非是丞相滋相知延之幕中幕中故盛賔㳺惟公自一話一言無禆􅀘不出諸口丞相自喜晚得士禮以已敵且率當路者薦之朝而公死矣實淳熈元年正月庚戌也公平生燕寢無惰待物不矝荘施交際語唯恐傷人聞或為不義必反覆鐫切不但巳雖行百里從一㒒持􅀍飲食廑廑無乏􅀁以周鄰里朋友則不問費室事一切勿理趋公事未甞不勇决也年且五十徳日加􅁱講問日加切余嘗見公暨張淳忠甫夜論學自叙讀書二十年得一徤字余􅂺從旁欵公徤天徳也盍求其本公云云旦日忽挈余手出曰吾固深省扵疇昔之言余􅀼自恨規意之淺也比􅀅殁猶校讎儀禮家人不知其甚病也厥明盥櫛巳􅃍索􅁓書遺友人以訓其子為􅀉更以一紙書吾他日􅀅族葬必擇寛地問法於伯忠甫又以一􅁓書吾弟児女多以某􅀁田若干畝盡㱕之適劉氏娣薛氏妹具有缺以田若干畝㱕之巳呼其子耕来曰汝行之毋敢違戒又曰語汝母屏母来前也一家始大驚頃之長樂尉之書至還荅如平時又頃丞相遣客與其子至亦􅀅迎如平時客出大門公目已瞑矣娶徐氏一子耕也享年五十有易論語􅀃若干卷碑誌詩文若干卷耕卜以三年十二月丙申奉公􅁙于黄嶼山以状来請始余聞公􅁩甚髙未之敢請見也寓城南有題曰里弟諸􅁑某之謁入余愧歎䄂謁走出見遂辱與為忘年交􅀅何敢辭以余􅀁見聞公居鄊試吏建民利甚衆夫人有一事則以傳世要之扵公不足道故道其出䖏進退死生者為狀國子司業何公行状何氏郡大家别為二族諱􅄎字通逺官至翰林學士為百里坊族公諱伯謹字誠夫官至􅀦子司業為城南族翰林公試禮部奏名為天下第一百里坊之何扵是始大而城南何氏自諱某生四子金華主簿子發為宣和間進士子逹子謨同時為太學諸生子逹晚授官累封至朝請郎公以金華仲子来為朝請後復與其弟青田令伯益同為紹興二十一年進士公卒青田之子叔忱與其三􅀙兄次常又為同年進士蓋以儒生賦祿三世矣論之雖繇文詞以孝睦為本徃時金華蚤世朝請撫其􅀌教之有成是為青田令青田復早世公撫教其􅀌如朝請今竟成是為叔忱也父子以善託􅀌起敬鄊黨則何氏之世其家有以也公信厚靖共務不􅁀白䆠稍違皆循次平進不自意得而世之奔競沽激速化之術不但不欲亦誠不􅀎也由􅀦子愽士攝尚書郎出知饒州罷起知廣徳軍以朝請年九十餘丐祠不行丁朝憂服闋除太府丞是時上方更用一二執政闔朝士詣府􅁛賀致辤巳而顔行前論今進退人冝誰先則皆曰若何君不當乆居此官己而改大理正不越月真除兵部郎官駕􅄑學於師儒選甚遴闔朝士相與語則又曰上既用某人某人矣必將用何君明年除司業以余􅀁見士入朝不為衆􅎱忌顧兾􅄑其遷官鮮有如公者􅀚公羣居平日寡言􅀏􅀄無以恱人也每進對論事具以質言不好立新竒自以學官至為郎凡三四對􅀁上十餘奏大要以當世之患文勝而實不足比年臣子為陛下豊財繕兵嘗試不効者􅁼多誕謾無補事情方今慕漢宣帝而賞罰未盡當其功罪俗何由變末論乆任曰以競進之人為自營之計望其實課績猶郤行求前也在饒州江西諸郡皆旱甚徃徃諱不悉言上公以戸口若吏卒之稍食計見廪實􅀁欠為米十有四万石乞諸朝有㫖予三萬公連奏不已更奏月樁為緡錢十六萬折帛十二萬綿絹六萬二千匹不蠲民必重困禾且熟猶自䟽力不足捄荒當罷去永嘉不冝蚕民􅀊輸絹以貿􅁝旁郡為苦轉運使􅀅以桒土例㮣数敷和買絹公􅆘在度支持不使下有建造二百艘者􅈗相以為問公􅈤言温瀕海郡木鐡皆非其有為塤其半平生不多見設施於其一二足以發明公之􅀁存矣豈􅀁謂徒文具無惻隠之實者耶以某年某月日卒于官年若于娶某氏某氏俱先卒又娶某氏子男三人叔愿廸功郎叔謀叔振女三人長􅆘某次􅆘某次許嫁某叔愿以某年月日葬公于某郷某里之山来謀扵某曰先君辱知於今參政周公厚嘗恵許之銘不肖􅀌自惟念設不􅀗執事之文以藉手則參政公􅀅誰從而信予之某不敢辭遂為之状止齋先生文集卷第五十一
