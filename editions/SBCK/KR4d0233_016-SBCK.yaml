front:
  text: 止齋先生文集卷之十六
  hash: sha256:f1b41789c99d72b2d2ede8a03d550c37ad0c62e7c5d9a9f0c1c4057f393fe954
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_016-1a}
body:
  text: 外制特進觀文殿大學士提舉臨安府洞霄宫廣陵郡開􅀦公食邑五千三百户食實封一千五百户􅁑邲明堂加恩加食邑五百户食實封三百户敕朕新嗣服日有事扵合宫兢兢焉懼無以接三才之奥也駿奔在廟豈無辟公金玉爾音尚想故老具官某歴事兩朝蔚為元輔蓋甞温恭朝夕執事有恪侍我烈祖爰暨上皇執珪幣見上帝者屡矣肆子肇禋均佚就􅀦相維穆穆扵以永懐方周盛時㣲子以二王之後聿来助􅀕有客頌之孝武始建漢家之封有臣如太史談而以留滯周南不與􅀙事為恨朕雖不䏻比徳扵周􅀖視漢有光焉其因舊章増大食采非苟為恩盖示不遺之意可在外宰執明堂加恩敕朕新嗣服日有事扵合宫兢兢焉懼無以接三才之奥也駿奔在廟豈無辟公金玉爾音尚想􅂄俊具官某歴事烈祖蔚為宗工蓋甞齊明盛服習扵侍祠之禮矣肆予肇禋均佚分閫相維穆穆於以永懐方周盛時有客助􅀕詩人頌之孝武始建漢家之封而太史談留滯周南以為恨朕雖不􅀎比徳扵周抑視漢有光焉其因舊章増太食采非苟為恵蓋示不遺可在外侍􅀙明堂敕朕新嗣服日有事扵合宫兢兢焉懼無以接三才之奥也駿奔在廟豈無辟公金玉爾音尚想故老具官某簡在烈祖蔚為名臣盖甞齊明盛服扵侍祠之禮矣肆予肇禋均佚殊舘或云越在輔郡或云越在外服或云亦旣謝事相維穆穆扵以永懐夫留太史扵周南自昔浩嘆對賈生扵宣室至今羙談朕覧漢事豈􅀎恝然扵卿等乎爰因舊章増大食采非苟為恵蓋示不遺可張淑妃明堂恩贈三代曽祖敕朕有事扵合宫既蒙嘉貺均休扵戚里益廣茂恩眷言妃徳之賢夙備皇宫之列爰稽􅀖興追賁曽門具位某氏故曽祖某謙和本於性資醇厚推扵鄊黨善修扵身而不享其報慶流扵後而端有其原迨其三世之孫遂應四星之象兹朌􅀕澤爰陟師垣精爽如存寵光是服可曽祖母敕備慈庭之妃掖象應四星敷􅀕澤扵􅀻門寵及二世具位某氏故曽祖母某氏柔嘉恊則淑謹流徽好善􅁛婣族之間種徳及子孫之逺是生賢女選皇宫慶霈漏泉䘏章告第懿魂未泯新渥其承可祖敕朕肇盛禮於明堂敷大賚于天下惟慈宫之妃列夙膺皇眷之􅂭加異典扵􅀻庭實率􅀖􅃔之舊具位某氏故祖某官某善積扵巳行信扵人報不在扵一時慶乃流於再世澤􅀍女孫之淑象應四星之恩寵齊三事兹開大􅀦載􅃬愍書泉隧有光靈魂式慰可祖母敕熈事備成湛恩汪􅐮乃眷四妃之貴列于皇宫爰加再世之封賁其祖配具位某氏故祖母某氏相夫以勤儉為本夀後多福慶之儲孫枝生賢門楣遂大朝敷祭澤􅀖有舊章爰改胙扵營丘尚歆承扵褒命可父敕方􅀍神􅁵慶成三􅀊永言妃徳象應四星爰加愍章用慰禰廟具位某氏故父具官某劬躬有慶操行靡它豹畧之才髙於軰行鷄鳴之配出扵閨門兹誕布扵湛恩冝追朌扵䘏典爰因舊爵改􅂌新封精爽如存寵光是服可母敕朕方謹親祠恩如湛露亦懐妃掖念在蓼莪爰按􅀖彛載朌贈典具位某氏故毋某氏蔚有婦徳克相夫家凢此嬪則之賢莫匪毋儀之訓生􅂪象服既極寵光沒啓茅封又多福履兹敷恵澤更建名􅀖尚克歆承以慰􅁳漠可右丞相趙汝愚明堂恩贈三代曽祖贈太師敕朕􅀚成王踐祚肇稱盛禮而㱕羙辟公相維穆穆文武宣哲燕及皇天朕甚慕焉属兹受􅁵無徳不報盖周道也具官某曽祖具官某積有善祥覃及来裔是生􅂄哲為吾相臣維周公􅀌並建五廟賜鬯㱕胙洊有寵嘉資爾曽孫共輯熈事而周制亡失何以崇報爰頒異数􅀳陟師垣庶㡬醻勞無愧在昔可曽祖母氏贈陳􅀦夫人敕周之祭澤至扵既醉盛矣其詩曰孝子不匱永􅃬爾􅁼其􅁼維何室家之壺則施及臣子不但其身而亦􅀍于室家具官某曾祖母具位某氏克相夫子行修閨門聿生曽孫間我兩社朕惟周人推廣孝思慰滿祖内扵兹􅀄禋佐佑乃辟實維爾孫則綏以寵光胙以大􅁎之􅀦朕敢忘周道乎可祖贈申􅀦公敕朕閱宗人之譜盖因侍祠追錫其祖父尊寵多矣未有子孫致位三事而後及此者具官某祖具官某雖在天族猶寒畯也克世其家濟以清約是生良弼簡在兩朝如周諸􅁎如唐諸李扵是度越凡例及扵茂恩矧惟肇禋澤及四海爰􅃬公爵作都于申其視宗牒不有光歟可祖母晁氏贈吴􅀦夫人敕維昔宗婦不少概見而衛有碩人魯有令母扵周諸􅁎獨著名於六藝豈不盛㢤具官某祖母具位某氏以濟陽之晁来奉漢祀廼生孝子名在薦紳迺生聞孫功在清廟肆肦祭澤洽比幽明申命于吴增大爾邑盖與衞姜魯母相望千載亦足為宗婦之勸矣可父贈􅀦公敕朕讀史至漢興以来宗室子弟無得公卿位者而坐酎金奪􅀦動以百􅂾未甞不慨嘆也扵是既祠純用周政䇿宗輔告其文人申􅃬名􅀖宏賁禰廟具官某父具官某以同姓而行􅁩篤扵韋布以右選而聲聞賢扵儒林即􅀁躬行施及其子遂魁多士遂冠􅀙班擢自樞筦􅈳司宰事疇昔之夕相予合宫三靈具依百福来下洪惟我家生此賢􅈒本支百世與周匹休下視漢事則九原可以自慰矣可毋李氏贈兾􅀦夫人敕朕既舎爵書勞為公卿大夫崇報禰廟則毋氏與享可無褒典使之匹休具官某母具位某氏甞相其夫以孝聞扵四海甞教其子以賢著扵三朝日者爾予相予世室克輯盛儀而可忘􅀁自乎因其舊號􅃬以新封我圖兾方用以命汝其世世享以綏後人可妻氏贈益􅀦夫人敕魯人之頌僖公至扵閟宮享祀不忒及其令妻以是為内助之賢也具官某妻具位某氏嘗與吾相臣共􅀮約躬定省想夫蘋藻之共爼豆之飾以薦時事無或不䖍也日者合宫而爾夫有駿奔之恭無跛􅀝之色推本内助賢扵魯人我􅃬賛書􅀳封扵益奚斯作頌侯􅀖之􅀻孰如爾名藏在王府可知樞宻院事兼叅知政事陳騤明堂恩贈三代曽祖贈少保斆贈太保敕朕觀成王踐阼肇稱盛禮而㱕羙辟公相維穆穆文武宣哲以克燕安甚心慕之属兹受􅁵無徳不報盖周道也具官某曽祖具官某躬行對于古人汎愛聞扵鄊譽而懐道不試士論惜之集為善祥覃及来裔是生􅂄哲為吾樞臣維周三􅀌並建五廟賜鬯㱕胙洊有寵嘉資爾曽孫共輯熈事而周制亡矣何以崇報申錫命書􅀳陞帝保以義起禮亦庻㡬焉可曽祖母􅅬􅀦夫人成氏贈福􅀦夫人敕周之􅀕澤至扵既醉盛矣其詩曰孝子不匱永錫爾􅀋其􅀋維何室家之壷則周家忠厚施及臣子不但其身而亦􅀍于室家具官某曽祖母具位某氏克相夫子行修閨門是生曽孫功在宗社且夫既􅋨非旅酬之事歟推廣孝思慰滿梱内况朕􅀄禋懼闕扵禮佐佑乃辟實維爾孫則綏以寵光爲之報本侈其舊封胙以上􅀦朕何愧扵周乎可祖贈少􅀓䇿贈太傅敕朕既本之六藝不愛髙爵以宏賁陳氏之祧則嗣有令徳休于後昆可無褒典以應􅀴誼具官某祖具官某當天下之清得幽人之履太史之觀風不講而文采無以自見孝㢘之科廢而實行不上扵計書也天命弗僣爲之生孫既長樞庭又陪􅀦論推夲􅀁自當及茂恩肆予􅀄禋醻勞相祀冝及爾考並為三公荷天之休其世世享可祖母崇􅀦夫人朱氏贈福􅀦夫人敕旣􅋨之卒章曰􅁵爾女士從以孫子言周之群臣皆有士行之女以為之妃使生賢智子孫􅁕以傳世具官某祖母具位某氏夙以懿行嬪于名門儀于前人以詔婦子載篤厥慶萃於聞孫夷攷其行不􅁕以當既醉之卒章乎有崇故封未􅁕言稱大􅀖羙號聿􅀙其姑質之二雅誰曰不可可父贈少師讜贈太師敕自亞保以来及是三葉盖王室百年之間而劬躬燾後如一日也扵吾宗工尊為禰廟朕豈敢嗇扵禮乎具官父具官某義方之教不以籝金隂徳之傳不以駟馬成我碩輔蔚為宗工緯武􅀴文何鄊不可是不謂之賢考歟日者合宫有嚴羙報生民尊祖視古不慙而大臣之禰位不稱徳以卑臨尊殆非周道申􅃬賛書冠班九􅁄非以為生盖禮之􅁛可母􅂎􅀦夫人成氏贈福􅀦夫人信􅀦夫人王氏贈福􅀦夫人敕為吾股肱之臣上自三世皆褒大之而况扵其母乎御不及百兩飬不及萬鍾也而無以慰之予心惻焉具官某母具位某氏承休襲羙發育自躬恩斯勤斯鞠我良弼采蘋􅀁共雜佩􅀁贈恭儉精白無非教也揆諸周制則􅀍以象服乗之魚軒為君夫人孰爾冝者亦視王母並建大􅀖雖曰均􅁵誠有以致此矣可妻氏封敕朕誦二南之詩流荇采繁相與共􅀕自天子逹皆内助也仲尼序詩定為篇首寓意深矣具官某妻具位某氏来自名門克相夫子㑹期有鷄鳴相警戒之道而退食有鵲巢致節儉之徳日者合宮而騤也相予肆祀􅁻蠲齋明迨及竣事禮無違者則豈唯􅀜雎之助㢤而爾亦與有勞矣􅃬之羙號爰示寵光雖曰舊章實應􅀴􅁩可給事中兼直學士院楼鑰明堂恩父贈通奉大夫璩加贈正議大夫敕朕既舎爵書勞自卿大夫以次第賞矣則推其世家為之報本雖禮未有獨不可以義起乎具官某故父具官某生為才大夫而用不盡殁為賢考而何其流之長也属予􅀄禋百執事在廟爾鑰不但駿奔匪􅈈而發揮潤色凡祀之大號皆稱朕意非爾素教而克然歟追􅃬有彛爰進厥秩非以為生亦徳之称可權吏部侍郎孫逢吉等明堂恩贈父敕朕既舎爵書勞自卿大夫以次第賞矣則推其世家為之報本雖禮未有獨不可以義起乎具官某故父具官某生有種徳之羙而位不稱殁享義方之報􅀽說友章頴父云生爲才大夫而用不盡殁爲賢考而何其流之長也属予􅀄禋百執事在廟爾某不但駿奔匪􅈈而敬之顯思之戒日徹扵聴聞也劬躬燾後非爾素教之􅀁自来歟追􅃬有􅃔爰進厥秩非以爲生亦徳之􅁛可煥章閣待制侍講朱熹明堂恩贈父敕朕方舎爵書勞自吾􅀙臣以次第報則推本世繫及其禰廟皆寵綏之亦祭澤也具官某故父具官某少而英發晚益深造渡江諸老多其師友甞歴郎闈秉史筆力詆和議緒正謗史盖官雖薄而志在扵天下後世也位不稱徳識者恨之属予肇禋有嚴羙報則爾有賢子勸講路門可無褒典以慰罔極之懐乎追􅃬崇階用賁泉壌非以爲生亦徳之稱可母敕朕既為卿大夫宏賁禰廟以侈教忠之報則母氏與享可無申􅃬使之匹休具官某母具位某氏来自名家克相夫子本之純厚申以敬恭其仰而事姑備極順適俯視媵御又何其不察察也是冝篤慶聿生賢子蔚為儒宗名滿天下則加以羙號用慰孝思我有茂恩冝不汝吝可右諌議大夫張叔椿明堂恩贈毋敕朕方舎爵書勞自卿大夫以次第賞則為之報本及扵母氏使匹沐扵禰廟不亦可乎具官某故母具位某氐克相大雅如啇甘盤復生賢嗣如唐陽子然而生不得與扵􅀙爵之榮晚不得享大五􅂦之飬儻無愍章以賁幽壌何以慰爾之廢蓼莪也因其舊號益以新封雖曰􅀖彛亦􅁕用勸可妻敕朕誦二南之詩􅂆以義勉以正皆室家也我有􅀙班豈無内助具官某故妻具位某氏儀于前人克濟其羙遂相夫子為吾諍臣夫與之䖏約扵雞鳴櫛盥之􅀄而不與之䖏樂扵象服委蛇之後儻無追􅃬得無􅀂汝水之墳南山之側遭世不淑詠歌辛苦者乎爰􅃬賛書以賁幽宅可孫逢吉明堂恩妻恭人李氏封令人敕朕誦二南之詩至於流荇采蘩相與共祭自天子逹皆内助也故詩人誦之仲尼定為篇首其意深矣具官某具位某氏以爾夫子為吾􅀙臣肆予􅀄禋執事有恪以朕之􅀗助扵長秋則爾亦可以職之賞矣晋封羙號庸示寵光雖曰舊章實應􅀴􅁩可在外侍􅀙明堂恩贈父敕朕既舎爵書勞自卿大夫以次第賞矣則推其世家為之報本詩不云乎孝子不匱永􅃬爾􅁼盖周道也具官某故父具官某生有種徳之勤而位不稱沒饗義方之報而何其流之長也属予􅀄禋有嚴羙報生民尊祖視古不慚而可以忘爾某之禰廟乎本之􅀴誼追􅃬崇階非以為生亦禮之稱可在外侍􅀙明堂恩封妻敕朕誦二南之詩至於流荇采蘩相與共􅀕自天子逹皆内助也故詩人誦之仲尼定為篇首其意深矣具官某妻具位某氏以爾夫子為吾􅀙臣肆予􅀄禋克輯盛典則豈惟長秋之故亦爾臣工嬪婦其流及上則不失職之賞庸可後乎晋封羙號爰示寵光雖曰舊章實應􅀴􅁩可汪大定知力江郡敕具官某甞為嶺南郡卓然以廉恵聞而無以旌異之何以􅂆逺吏乎九江名􅀖牧以選授是用命汝式賞賢勞益圖民庸以俟迪簡可倉部員外郎汪梓陞郎中八月十四日除敕以日月為功固非􅀁以待賢􅀎也而功令亦不可廢况晋陟為郎與員外置者絶有間抑芝以昭􅀫業勸寡過庸可廢乎可朝散郎江西提舉汪逵除員外郎敕具官某難進易退賢士之操也爾某議禮容臺浸有休問汲汲焉以外服為請雖留行不顧也􅀅指奏公亟頒召節則舒遲累月翔集可觀是不謂之士操歟郎闈之選南宫最清徃其欽承踐修家學可中奉大夫提舉冲佑觀豊􅁩除吏部郎官奉議郎王聞詩除考功郎官並九月八日敕具官某等仕至扵刺史二千石亦通顯矣而浩然有㱕志是不謂廉退之操歟爾􅁩持節湖湘吏畏其敏而固稱老爾聞詩秉麾淮甸民安其寛而固諗疾朕以是嘉之俾還郎省分治銓事徃祇成命母有遐心可止齋先生文集卷之十六
