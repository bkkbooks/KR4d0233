  text: 止齋先生文集卷之三十二
  hash: sha256:97a3d2387f2a6d8b7d8f50b57178ddd3a98b63a491a2b8b78ca4e32d4862bd66
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_032-1a}
body:
  text: 啔除太學録謝宰執拜命衡門備官璧水書生已重公論謂何矧如庸虚有此踰越竊以祖宗家傳之法學校風化之原於其訓迪之臣工可以考論其世故儻具員而亡擇欲首善以何繇永惟韓范歐富諸公當國之間則有孫胡石李一時作人之盛如某者學不足以􅆘用才不足以及人固知迂濶於事情豈敢覬覦於䆠逹營求末第政未免於為貧徃教遐􅀖祗自虞於見短徒便於此遑知有他引而置之薦紳先生之林從而付之規矩學者之事還觀􅀁缺豈惟獨慙推本自来或者上累但揆之進退小巳以無稱報為憂然較之重輕公朝有􅀵踈賤之羙徒抱私誼重逞逺模某官直道事君清議在上察見頽俗杜絶倖門每於斯道􅄫寥希濶之中欝有前輩扶持興起之念與其妙選以得孰若兼􅀵而示公意有􅀁存人不暇計爰俾凢質亦叨誤㤙敢不軆悉深知循其素履門墻愛博願悉畧其奔走伺候之文農馬庻少盡於洒掃應對之際答釋􅄄黄上舍伏審課最于學爵命自天推髙旁觀嗟異旦取士必多其節日而後進而授官亦􅀊月以爲勞雖裒然舉首之艱猶越在外服之久未有從於覆禮又爲之特加即賜恩綸􅃍分師席某官以之彦􅀵中雋之㓛因難見竒凢舍矢以如破制勝有道金而不昏某䆒觀當今科第隄防之詳寵光度越之盛尚勉終於逺業用増重於諸生上福建安撫梁丞相道徳文章以此名世公侯􅀅相於今㡬人偃四海之經綸需一方之膏澤善􅁼太息下僚敢私某官剛大而沉潜髙明而慈恵貴極三台之上猶如書生謙無一日之長􅀮若敵國事有􅀜於消長身不顧於是非猝遇人情之未嘗徐圖天意之自定勲業藏於不覩議論付之􅀅来昔王文正之終相天禧爰弭冦丁之爭韓忠獻之獨留康定式遄范富之歸盖甞夷考舊聞仰止先哲悵此意之莫嗣微我公而安歸是宜再調化元一定國是肅羣之雨風朝宗百川作中流之砥柱某適與走趨之在之詳與其從元戎十乗之㳺輝光自近孰令在之數穹壌攸同暄冷未齊霖潦􅀅作伏乞俯從民太和與福建柴運副風憲一䑓歸于正豈復與驅馳載惟幸㑹之深莫喻忻愉之至委官刑於太老成莫刑挺松栢而後凋抱圭璋而不􅅣承宣淮右之言入覬明嘗建乆長之䇿􅀁以不推愛爰命嘗中於機㑹薄物細故不登於簡書眷言其之可莫若國家之重然居紏繆䋲愆之任則無服䜛蒐悪之諷方平之遣發大臣景仁深陳其非是邢惡之追窮徃事尤論其不公於大雅之寂寥俾善􅁼之安輯意巳俗難異言某既疇昔之依仁矧􅁇今而受令􅂅言終教吾之全歸與福建陸提舉功名富貴不知㡬人儒雅風流自有定論當致後生之敬豈云属吏之儀某官志古而通今方中而圓外詞章近於大雅議論接乎前聞及從南渡之老成不數東州之軰行餘輝映物有晋七賢之遺風數語名家非唐諸子之末􅇊是宜次元鳥生民之作薦圜丘清廟之休而乃袖手旁觀用心更苦退老鑑湖之曲與世相忘行歌蜀道之難令人太息萬里来歸之晚羣公迎勞之勤胡然湖山忽已􅀊月雖􅀁臨之幸甚􅀅有識之云何某志在從逰乃今受察十年始見嘗有感於斯文一􅁓自通輙遂忘於不肖與福建錢運判為貧擇禄幸察於寛朝同正置員獲依於徳㝢忘其恐懼繼以歡愉某官老成典刑儒術􅃳色自昔連蕚世有令名於今薦紳孰為先進荐揚華貫甫直禁林方濶歩寵光之時乃逺懐流俗之外自􅄃湖湘之轡復還閩越之轅清風彌髙善􅁼大息然而弭伏澆訛之習布宣寛大之條若有隠憂不事表襮雖周王人特序諸侯之上居之甚謙有漢刺史不察黄綬之風欺者豈忍眷此意之常在當古人之與求某昔嘗侍瞻今在按撫􅂅言終恵式俾依歸與西外知宗誦玉牒之名講聞甚久間會幸之欽慕惟深晚得􅀁圖逝捋既見某言出於帝系及見老成人物典刑可想承平之舊才猷藴籍固宜䆠逹之難嘗得之士友之間而與聞於議論之末薄物細故皆有定數日閒居他無惰色宜為宗盟之率以顯􅀖家之光永惟維城之􅀁以強周下逮磐石之􅀁以安漢上實念此今以屬公某知書意粗好問學每於前軰􅂅在下風矧惟謀食之家眷依仁之便以累年瞻望之弗及受教可期平日見聞之未嘗悉心以聴合桂楊趙守交贄閩山幸徹名之惟舊問津湘水􅀅觀政之有期辱牋翰之先施􅒺風猷而増感某官宗盟領䄂朝路羽儀典刑盖得之前聞事業未量其逺到温恭爾雅在二南公子之間樂易宜民眞兩漢循吏之選永惟昭代克壮維城大連十州小乗一障以固磐石之􅀔以綿􅀲􅚩之祥眷言賢勞越在邉􅃈有書生而繼此􅀅輿論之謂何如某者筮仕匪多才賦甚拙徒以諸公久憐其家食遂令一介嘗試於􅀖條欲其蒙成可不終恵方剖竹合符之始罙切凌兢惟甘棠􅀁茇之餘尚堪慿藉與湖南潘安撫畤燕及庻􅀖實恃元侯之重瞻言當代誰如舊徳之尊廼以諸生来為属邑心獨自喜口不􅀎宣某官以大雅之英得中庸之學跂彼羣老凄其百年自昔聲名非故國喬木之謂於今軰行在中流砥柱之間永惟衡嶽以南荆州之鎮荒地弗治欲稍如閩浙之區足兵何先正􅇥此湖廣之賦孰為二者之善計以副九重之至仁於以煩公盖􅀅託國有如樸􅈪亦預驅馳上之不􅀎宣中和樂易之風下之不􅀎及期㑹簿書之事爰從􅀄良有後憂未知安仰縁幸㑹忽過􅀁圖逝􅀅聴罄欬以自寛抑分守而不敢憐拙學乏由求從政之長庻俾愚蹤譏之致荅楊知錄地方千里豈無問政之人天各一涯未有納交之日􅃍蒙朋翰良慰面墻某官以湖海之豪擅之譽繇淵源之實學出文字之緒餘閱過千㠶不作積薪之嘆功􅀵百戰益知㳺刃之才盖有志於淑人亦何心於試吏水惟舊郡粤自熈朝與計偕者間􅀊有之􅀎䆠逹者於今罕甚文物不競國風􅀁關不資先進之賢􅂚振清流之望其弗友迪以多聞固假守之􅇥先亦居之嘉賔可式庻㡬多千木之風獄市􅀁容奚上問至公之道荅鄭教授不圖行李􅃍辱華牋以髙誼之相先知衰悰之不敏喜於既見誠無異於菁莪之詩愧在後来恐未免有積薪之嘆某官汲古之學濟時之才藹然桑梓之評籍甚縉紳之譽循次而進宜在衮衮䑓省之間有懐不伸尚爲青青衿佩之伍雖名教之可樂而師言之不然顧此面墻􅂚堪乗障聞風而恱廼於此以定交寡過未􅀎宜如何而加教徒藻飾之巳過曽切磋之不聞儻未􅘃官尚可及横􅀴之日庻其問政幸母如傾蓋之􅀄荅桂楊王教授益祥内交邇止􅂚勝借助之􅀻辱贈勤斯廼見相先之誼未知􅀁報已足自寛某官學造淵源文有根柢以其邁徃不群之氣見扵嘗試巳効之間露學校之一班􅂺先課最對闕庭者千數獨以昌言即􅀄筮之已然何究觀之不可顧如假守扵此依賢乗障實難面墻是懼事多隃度孰如既見之詳學亦空談未必可行之實政須衆智以迪㣲明載窺正始之音殊識起予之意不有師儒之託良繋民心尚資􅀴術之餘以飾吏事荅桂陽吴贍軍畿思先生而不見雅有典刑以平昔之􅀁聞今爲僚友方􅀅分半席之共事貽朋緘之過嫌雖以自寛未知􅀁報某官汲古之業濟世之才淵源􅀁漸接嶽麓再傳之緒指顧而定成桂林三捷之功雖文章不露而世巳驚然禮義無愆而人何恤徒以同門之故肯爲筦庫之官悵此風之缺然得吾黨而幸甚矧惟乗障憂在面墻撥煩攸難寡過則未事皆隃度孰如既見之詳理亦空談未必可行之實政惟求􅂇奚止納交以先辱之勤斯知遄㱕之邇止可與共學儻惟嘗事洙泗之間不卑小官則豈但為趙魏之老行以為請言不􅀎宣桂陽謝執起家為守曽何勞􅀎便道之官徒以貧病雖君恩之丕冐皆廟議之獨憐􅀼以自昔大臣加惠多士凡待以晚成之噐則飬於煩使之時功如曺叅才若賈􅁩開清净之道必去齊而後􅀎陳治安之書非渡湘則弗克矧惟此意施及中人自匪偷安寕不感慨某官以毋我之學成代天之功一紀于兹曽莫窺其愠喜百工􅀁職􅀄不失於重􅁿乃如踈愚尤􅀁幸蓄雖嘗試之不効而作成之有加某敢不佩服深仁圖惟薄効儻報三年之政遂及終更苟有一日之長敢忘大造與湖南張運判縯三舘題名誰非後進六條問事日有先聲凢同衡嶽之盟悉仰皇華之疪廼如獨喜則倍群瞻某官當代典刑本朝􅀴行卓爾逹尊之徳藹然爾雅之文方獨歩於英􅄤已遍儀於清貫富貴利逹不知兩蜀之㡬何議論風流當自三蘇而至此是宜次元鳥生民之頌薦圜丘清廟之休胡然江湖乆矣􅀊月還駈九折流俗以衣錦而為榮閱過千㠶善􅁼於積薪而加嘆萬里来㱕之近諸公迎勞之勤豈外計之無人况裏言之有味推之在昔多􅀵􅀊晏之功意者由今竟為海内之福某以空踈之學當凋敝之餘每事面墻􅀁憂末路孰謂夤縁之幸迄應慕用之􅀻自其􅀄筮以微名亦既終更之知免然而願言受業曽未及門與學省之青衿摩挲石刻及天涯之白髪奔走學永惟修敬之併誦属心之乆儻辱以書生之故不宜若責其則有餘罪與衡州劉守進謁賔墀圖納交而弗果分符郡􅀉欣問政之有隣爰修使聘之儀以篤􅀖聯之敬某官絶人徳業康世才猷有聞無聲擅圭璋顒卭之望何鄉不可見淵泉溥愽之功謂宜上廟朝論思獻納之班何獨宣湖海豈弟和平之化方當綜核􅀹重外庸盖􅀦家􅀁以進賢而皇上於焉注意况江亭遺詠􅀖君寔王佐之才且郴岸瞻言刺史有巖廊之具永惟自昔是用煩公􅀅朞年報政之時奉尺一賜環之詔若某者空踈末學齷齪散材乗障何堪面墻是懼譬諸弱植固欣依松栢之髙正使澡身猶慙厠珠玉之側佇誨言之惟服儻官謗之可逃同寅恊恭匪一人之私義比小事大尚徃昔之通規與郴州丁守逢一星于兹乆不造下風之請百里而近今廼同與國之盟即其講徳之詳重以納交之早心獨自喜書不􅀎宣某官學本六經才兼數器每懐徃事欲􅀵南渡之功名若論後来不數東州之軰行越在外服竟無裏言宣勞盖自於青衫養望殆㡬於白髪陞華延閣盍歸西省之班服羙長淮廼掌北門之管胡然自詭復此遐征避名湖嶺之間用意市朝之外令人髙仰舉世誰如若某者疪吝之餘空踈如故冐来乗障憂在面墻不圖雅故之交而托撫封之近屈公於此􅀅物論之云何知我者誰亦已分之幸甚何繇􅂩地之遇薄叙小􅀖之懐􅅬間於齊楚之間盛衰則異江别為滄浪之水源委攸同撤名之初歸徳彌切謝潘安撫列薦舉最有三罔功第一雖未嘗於推擇終自切於依歸伏以蕞爾桂陽巳非古郡析郴置縣與廣為鄰周職方之􅀁未聞漢刺史之􅀁不察盖厥壤䖏諸華之裔而其君視大國之孤嘗因壁記以泛觀自升軍額而救數中興至此凢六十載之間善狀爲誰􅂊一二人而巳間或􅀵効於毫髪􅂚嘗掛名於齒牙未有當路爲之同辭剡章至於専逹越在它􅀖之上突如今日之榮豈無賢勞堪此寵異昔方岳攷績於僉言以見公春秋予人至特書以爲貴儻凢流而與此􅀅公論之云何如某者才不逮中學非􅆘用早嘗困於鈆槧晚但謀於稻梁豈謂誤恩􅃍叨假意􅀁勇敢動違小吏之規理當便宜輙束拘儒之見徒勤無􅀘􅀅罪是求矧惟郡計之空重以􅀊功之薄欲罔民而何敢懐言上以無繇惟有再三以乞憐庻㡬萬一於免戾居常自謂殆非巧宦之宜爲已乃不然竟以拙誠而見録某官當今先進薄海逹尊覆護諸生不遺餘力扶持斯道如有隠憂每於衆好惡之言獨有公是非之意始以致曲􅀅如萬折之必東迨其既孚則併一談而弗破遂令庸陋亦􅀍甄明某敢不更軆深知益堅晚操䖏非其㩀幸而轉敗以為功歸㓗其身當務以退而為進與湖南沈安撫樞大􅀖維屏眷言衡嶽之雄元老壮猶簡在甘泉之舊先聲􅀁暨群聴已孚連十國以相歡獨二天而􅀹幸某官居今大雅當代逹尊風流盖接於前聞績用莫詳於已試世方􅀝重儼然綺里之衣冠人忽為危閱盡翟公之賔客雖三已而何愠無一辭以自明上獨知心晚􅀅共事况民庸之愈偉曽物望之誰如嘯咏東嘉粲􅌀閭而可數指麾鄂渚寂井竈以無譁爰進陟於西清尚来宣於南服求之輿誦謂歸衮之奚遲撥以比年宜召還之相􅁇盖有定論豈曰遐征某甚矣面墻於焉乗障意􅀁勇敢動違小吏之規理當便宜或束拘儒之見徒勤無􅀘􅀅敗是求豈期末路之難廼有萬間之庇顧惟列
