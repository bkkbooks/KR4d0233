body:
  text: 律詩上皇子嘉王生辰詩三章兩宫頻燕喜交舉萬年觴㑹慶川方至重明日未央聖賢何繼世孫子更宜王聞説斯干夢祥占近一陽造次依儒術朝迴只一經更無他嗜好端是衆儀刑符應當良月聲華自妙齡帝垣從此日光熖粲前星要識皇圖永當觀藝祖初維持今盡是囘復更何如庸陋誰推轂衰遲此曳裾慙無為壽具獨袖一編書方講藝祖實錄故及之袁起巖㑹飲湖上出示古刻酒罷各攜桂花以歸因成一絶湖光不動見魚蝦敗紙殘編數十家巖桂叢中三四客醉歸人得一瓶花又和湖上簾須半捲蝦調氷雪藕各名家有人不解長安飲話極茶鐺吸井花寄陳同甫古來材大難為用納納乾坤著幾人但把雞豚燕同社莫將鵞鴨惱比鄰世非文字將安托身與兒孫竟孰親一語解紛吾豈敢祗應行道亦酸辛送辛卿幼安帥閩長才自昔恨平時三入脩門兩鬢絲瓮下可能長夜飲花間却學晚唐詞潸然北顧關河永簡在西清日月遲雙鴈乗鳬滄海上與君從此恐差池送盧郎中國華赴閩憲相望千里馬牛風聨事湖湘各已翁造次便呼兒女見綢繆略與弟兄同百年又是梅花發萬事何如荔子紅欲附使軺嗟不及却憐身在俊躔中送范大著文叔知彭州中書世祿今無幾唐鑑家聲世不多安得有人賢若此忽聞去國意如何同朝最是頭先白知己還愁語太苛盡欲讀書三萬卷蓬萊未必似岷峨和劉進之韻兼簡吳阜之憧憧滿眼事何稠落落論心思獨幽去國未能身一葉懐人但覺日三秋池塘春草方同夢江漢歸舟更别愁安得簫韶儀兩鳳不妨燕雀自嘲啁初夏有感因用前韻久旱適得雨欣然卒章湖山嫵媚綠隂稠誰向芸芸得趣幽半破榴花方恨晚新來燕子未知秋去為吏隠雖吾願歸得家山正自愁賴有雨聲寛百感忽如孤鳳見羣啁送潘徳久之官建康平生不解通毛刺萬事無能改鬢華豈是襟懐堪逆旅直湏詩句可名家老為賔客從戎幙强使妻孥理帽紗不有將軍寛禮數新愁却恐墮江花同游張園酒中各嘆明年未知誰與此㑹余最衰病宜去因作詩識之春過新煙能有幾愁生飛絮轉難禁可憐衰白隨年少愛看殘紅到夜深一輩衣冠方事事故園松竹已隂隂明年此㑹知誰共鴈蕩山前寄好音次韻奉酬方輝先也知朝士愧山林猿鶴相懐怨亦深屈指落花年荏苒斷魂凋鬢日侵尋向來相與期何事老去誰能㑹此心多謝故人重話舊獨憐志古定遺今送倪正甫侍郎賀正雪枿氷芽又復春中原闕覩屬車塵懽呼漢節從天下愕立邊兒夾道陳老去獨慚闕偃蹇君行决意問經綸顧瞻河洛關心處應記幽燕用事人喜雨天顧於人略有情片時收盡越山青老農望外扶犁立倦客愁邊擁被聽塵翳欲清閶闔道井花已上轆轤亭冥冥直待黄梅熟未要風池看約萍送曾繼先赴山隂路鈐鬍髯白盡猶强飰髀肉添多未跨鞍不向燕山親矢石却來橋塚䕶衣冠歸舟自此長相背薦墨于今尚未乾只恐燕然他日事獨無名字可同刋送何起巖之江東苦吟海内知音少獨往江東問政頻我亦他山於此别世無吾黨更誰親六朝故實皆新句一代風流尚幾人話次儻懐無恙否為將衰惰再三陳上元日同京仲逺趙德老羅春伯謝子肅訪郭殿帥游鳯凰山次韻層雲飛鳥共危欄江漢朝宗萬折盤王氣信知千古盛聖圖元自九朝寛公餘曳履探殊勝酒罷磨崖記衆懽衰惰不知能健否相從河岱弄柔翰癸丑冬車駕過宫留相還朝一聲警蹕接天齊馳道無塵馬不嘶月御順行隨日轂乾端和氣匝坤倪三槐相繼歸公衮細栁還須聽將􅎏老矣尚能歌二聖不應專美在浯溪和樓大防尚書送行韻齊年兄弟又齊名商略行蔵共此生自昔從君瞻馬首如今輸我與鷗盟讀書松竹交千載曳履星辰聽五更借問塞翁誰得失請無一語到留行折子明提刑自湘中以詩問訊用韻酬之久立天涯詠式微胡然華髪尚闕五字望歸簮履便冀君恩到蓋惟當世豈無君子論闕五字人詩湘中一似桐鄉好安得扁舟着釣絲泊釣臺灘下今嵗僅餘今夜月此舟三泊此江圻遭逢明主還遺恨慚愧先生獨見幾泗水列侯多不免湘山四皓竟安歸漢家故舊嘗枚數孰與東南一釣磯臈月望泊舟釣臺灘下賦詩既而登婺女明逺樓誦之鄉丈陳德承同集黄竒卿張伯廣因書以遺德承之子性甫直甫後春六日奉和德承韻兼簡竒卿伯廣為别行蔵獨倚少陵樓怨鶴愁猿孰與儔嘗與萬人爭魏闕何如一壑老菟裘追隨士友從吾好領略江山自此遊急趂梅花理歸棹雙溪為我亦西流贈杜伯高臘後𤣥𡨕意氣驕餘寒造物亦亡聊風收夜雨春何淺雲障朝暾雪不消真悟此生纔半歲恣聽何處是三朝粲然一笑將迎我賴有江梅慰寂寥除夜宿處州天寜寺人言老去不如初我愛初心老轉無懶向門前題鬱壘喜從人後飲屠蘇杯盤甚簡眠須早禮數多寛拜要扶况復􅋜􅋜僧紙帳雞人不聽禁庭呼寄僧嗣清衡陽傑閣宵人記淮右豐碑刺史書永已橋山藏劒佩空餘雲漢照林廬河圖萬古陳東序汗簡諸儒校石渠誰道幽深窮衲子乞錢買石更崎嶇余與嗣清作雲章閣記欲刻之衡山不果今清來致舒州吳使君所書閣記石刻一本蓋投子山碑也於是壽皇晏駕一年矣讀之涕泗交下頃為學官逮事壽皇滿歲當罷去而對班尚在數月之後遂乞補外晚為祕書少監㑹聖政書成被㫖詣重華殿進讀首篇壽皇色甚康顧視良久益恨平生之不遭也因作詩詒清以附碑隂蔣處州仲可惠酒括州太守闕亭侯及與前時一輩逰剰欲池塘看芳草謾隨煙雨上危樓無錢可解催科拙有酒能寛放逐愁可笑杜陵嚴武客時時傍舍過牆頭再寄用前韻幸無骨相可封侯歸理先人舊釣游山下剰栽諸本竹水邊須著數問樓羣書可讀自隨喜一客不來誰與愁時把釣絲銷永日魚兒亦得兩三頭丙辰夀國舉兄是間南極老人星喬木脩篁亦有情直向朱明為後殿不隨黃落入秋聲兒孫衮衮看新出兄弟團團得晚成笑閲世人心事短却從黄老問長生送長溪髙國楹從學朱元晦洛學今無恙東南屬此翁從游雖已晚趣向竟誰同一第收良易遺經語未終歸期定何日我欲叩新功以兩鶴壽薛象先日與山農共一㕓不應家有四乗軒殷勤分送平齋下為看蟠桃熟幾年重陽日寄瑞安留宰留宰以是日宴新第人併見招不及赴落帽沾衣總失真追隨茰菊亦勞神酒無肴核依然好家有溪山豈是貧沆瀣從空來夜氣青𡨕隨處際秋旻不知此是登髙否為問慈恩塔上人和林宗易菊花韻一歲所餘秋有幾重陽偏與老相催每憐白髪能長健雖愛黄花亦懶栽好景游從須好友新詩風味似新醅人生適意無過此恣聽東籬早晏開和沈仲一北湖十詠北湖只隔嶺頭雲誰在湖邊問訊人若得小舟通我過雨晴須破半時辰右北湖人去岷峨水自流豫章三字竟沈浮懐人好上層樓看木落山寒不肯秋右豫章閣可愛南山與北山北山上有斗芒寒碧雲歸盡人何在更捲珠簾到夜闌右仰止亭平平下語及雲管學到詩人豈不難莫似闕人大芳㓗湘波千古訴椒蘭右葯房一年曾得幾畨圎恨不驂鸞上廣寒占得波光須細翫恰聞滄海已狂瀾右穆波亭欲來花底竟差池我有佳名誰與歸翼日看花天一色狐裘猶自織寒機右粹白堂借無舟楫亦褰裳目斷蒹葭水一方今夜不來同剪韭隔山明日事茫茫右遲客臺萱草須鋤莫放深竹須剪伐待成林一花一葉皆相附要使兒孫識此心右萱竹堂紛紛萬木盡西風獨立霜林我御冬澤畔無人誰著語止齋但䕶紫泥封右楚頌亭余雅愛頌橘之語仲一欲以名其亭一日出所蔵潜邸頌橘二字遂改今名看花只為雨愁人一片纔飛减却春獨此得春無盡蔵毎於愁外見精神右宜雨亭周宣義三子仲敏明闕幼謹同年登第因以前韻奉寄營營浮俗贗還真孰與傳經妙入神一榜及看三子貴數椽能忍十年貧自將弧矢書閭史便使氷淵誦小旻家學如君今有幾殷勤羅拜我何人再次韻簡新第諸人行酒何如温太真風流元不鄙錢神扁舟容我歸來老一子令人買得貧雖有羣仙來月窟欲扶衰力上霜旻吾今已定漁樵約勛業煩公一輩人送瑞安尉林叔全尊人還鄉論交海内略飄零最晚相看却有情不以一經誇魯諺自於二子識徐卿橘香賸與蜂衙晚麥信急催鳩喚晴天氣正佳歸恰好莫將愁思為空名送林叔全秩滿歸四明三年絶境興誰同雞呌桑巔犬巷中但欲户庭多暇日不將鞭扑奏膚公相期霄漢摶風翮每見燈花綴玉蟲此去逢人臺閣上丁寜莫道止齋翁送雪庵瑾禪師還山五馬逢迎甚濶踈滿朝問訊近何如諸公極有遲留意一日連收竟别書佛法盛衰千刼後人生老壯百年餘向來游舊今亡恙願得斯人尚起予周和叔通判雪寒索酒戯用來韻以將朋尊持盃雖念故人寒欲予還不似印刓此債豈應行處有麯春何日寄雲安和叔入蜀故云奉和周蕃伯用王道夫韻二章見寄森森萬木一精廬黄巻青燈自巻舒却肯追隨三舎逺不論聞問十年踈遺賢公已長懐玉老圃吾方欲荷鋤安得謝巖題壁處一尊相伴看芙蕖論定千年後心寛萬事平吾方慚䑕伎安敢道鴻冥門户雖人境溪山亦世情半天喬木立盡日好禽鳴壽叔祖母與先人同生三陽昨夜轉洪鈞鳳歴今年又紀寅再拜與君觴壽母更生猶我面先人兒孫夾侍渾忘數梅栁前陳不記春從此常為湯餅主賸看諸婦抱麒麟東陽杜季髙逺訪詩以送之當世關衰壯斯文看合離强餐吾豈敢後㑹子何期村落秋彌好溪山晚最宜逢人相問訊所欠更能詩春日和林宗易韻白與紅兼盡落梅小園獨步日千迴浮空曉色臨無際排闥春光撥不開學語新禽更後囀鋪茸細草雨邊來却憐追逐今無力放下簾鉤就麝煤移花櫻栁初無素與蠻可將何物伴身閒欲栽花木千餘本但候春風還未還送花還宗易酷愛看花懶種花知心惟有故人家花開分送花殘取娛老扶衰度歲華遊鳴山寺徐一之兄弟載酒即席和其韻惰歸春力不勝驅風雨尚愁人摻裾掠盡殘紅前日樹催還新綠去年畬相將興盡隨花屧賴有朋來載酒車但得從今身尚健吾鄉風物勝匡廬和徐叔子用林宗易韻見示相過風雨獨何歟校酒論文已不如方信深交相戀嫪却因衰退更躊躇吟生池草書成束飲落簷花醉墮車明日待隨公等去我頭應始自今梳和徐叔子勸農韻呈留宰親從蓑笠問飢寒赴愬人人得犯顔更向棠隂聊憩茇要令粒食共鮮艱身歸雨露司存後詩在山川刻畫間飽飰之餘能細和止齋應有幾年閑遊金嶴趙園賦海棠梨花呈留宰海棠故作十分紅梨更超然與雪同文物英華周盛事風流𤣥逺晉餘風赴留宰寳壇之集因和蕃叟弟趙園韻一枝纔放前村雪一線初開愛日天潘縣風流凡五客趙園名字亦千年可無能賦如難弟恨不曾來有尉仙待得中興用循吏更於此地設離筵示留宰縣樓即日氣横空施及觀潮亦奏功曾上石崗看蟻穴當圖一飽到山農或以詩送來禽次韻奉酬連年栽樹未成隂赬實堆盤慰我心手把新詩堪永日休誇法帖送來禽隔水佳人久不逢祗應我懶或君慵感時相饋情何厚却說雲泥笑殺儂遊雲頂院和徐叔子韻老大生憎兒女態更無春怨與秋悲略將盃酌隨宜具剰有溪山取次嬉愛客不妨兼汎汎論文何苦太竒竒况曾窺得尊生術通昔蒲團日一炊壽薛象先蕭然山澤一臞仙故被聲名絆俊躔祗為春秋同社燕遂歸風雨對牀眠中年曾未鬚眉白盡日全無車馬喧我有壽觴誰與共㑹昌湖上釣魚船酬蕃叟弟韻朋游同一輩伯季自相師薄宦俄衰暮清懽僅暇時我懐青冢曲子念紫荆詩但得無憂患幽棲豈不宜壽潘省之泛水淺紅荷十里蔽雲濃綠木千章旁無俗子同居巷中有臞仙一瓣香今夕還知是何夕吾鄉終勝似他鄉雙鳬便合青㝠上笑看兒孫樂未央丁巳壽國舉兄歲自為詩嵗自賡愁無新思思還生便從今閏書初伏待看何年值後庚漢網疎如天地濶奎文下與水雲平弟兄長健貧何病判解金龜當一酲止齋集卷七欽定四庫全書卷止齋集卷八宋陳傅良撰
