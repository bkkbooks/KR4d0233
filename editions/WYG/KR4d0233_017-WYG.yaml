  text: 十七
  hash: sha256:9e27d43472e7138f608c54020a2bb392b10cb3e8651c0bb68eb8c5b0649dfc72
body:
  text: 宋陳傅良撰外制同知樞宻院事京鏜初除贈三代曽祖闕贈太子太保勑昔宣王中興登用將相必推其世系本之始祖自南仲召虎韓侯之雅皆為此言謂是文武成康之世積累致然而非一日之故也具官某故曽祖某躬行對于古人鄉譽髙於月旦而懐道不試有識惜之爰及曽孫遂生賢佐夷考其世則朕之得人所自来逺原始根本可獨愧於周乎追錫宫保視儀孤卿雖曰舊章實應經誼可曽祖母闕氏贈郡夫人勑周之公孤並建五廟以君夫人祔焉而世世享亦惟羣臣能有功於國者必有助於其家者也具官某故曽祖母某氏来自名門作配君子躬備勤勞以詔婦子而生無從爵之榮殁不得與於共牢之享天命弗僣是生曽孫為吾輔臣以翊樞筦朕循周制寵綏爾夫申錫郡封視古命婦用賁幽宅亦足以報可祖贈太子少傅敕成王之雅曰凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國盖言周之得人由文王以來世家之所由生也具官某故祖某克承其緒以紹前聞因之以共儉加之以惠和至於生孫偉然人望佐我宥府海内晏然揆諸周人寅念祖烈及其世家則爾劬躬燾後可無褒典以慰居往命之儲傳於禮固宜可祖母敕朕既純用周政廣恩錫類以褒大吾輔臣之世則燕及閨門宜有追命使之匹休具官某故祖母某氏儀於前人益謹内則載篤其慶萃於聞孫方周盛時公侯皆君子也而風人本之袵席以為徳在鵲巢功在采蘩也我儀爾祖克大其後用見家政庻幾召南為君夫人斯禮之稱可父敕為吾股肱之臣褒及三世而况禰廟乎周公拜前魯公拜後亦周道也顧今九原已不可作此憫章之所由起歟具官某故父某具官某徳積於身而位不過八品行修於家而功業不見於世過庭之訓施於嗣人而資父之忠簡在烈祖肆朕纘緒擢為樞臣天下頼之繄爾之訓詩不云乎維其有之是以似之不有申錫非所以為積行種徳者勸也爰考古誼爵為公師其始自今不一而足可母敕朕既本之經誼為卿大夫崇報禰廟以侈教忠之報則母氏與享以次寵綏使之匹休亦古道也具官某故母具位某氏来自名門作配君子是生賢嗣蔚為樞臣譽在薦紳功在清廟夫雞鳴警戒之道不篤則一經之教不嚴蘋藻不共則甘㫖不謹爾鏜何以能移孝為忠也因其舊號益以新封雖曰彛章亦足用勸可工部尚書趙彦逾除端明殿學士知建康府依執政恩數敕維我烈祖作新同姓使與天下寒士共趨功名之㑹盖一時興起藹然多名卿大夫矣朕方相其魁傑而次第用之以昭我烈祖作人之盛具官某奮自儒科積有民譽盖㧞膏梁之習而獨清修苦節甚於布衣豈惟不以髙帝子孫自居而謙謙唯謹不敢遺於僮僕也肆朕嗣服而忠勞見於大節之際夷考周漢同姓有㡬則朕將何以對揚烈祖之意昔周人叙康王之事而孜孜於仲山南宫毛漢錄代來之功而額獨後朱虚之賞二代治効醇疵與其俗薄厚於是乎見是用極之以祕殿之隆名申之以丞轄之異數分釐留都増大食采凡所以尊寵卿至矣尚其懋哉毋忘忠報可右正言黄度乞祠禄差主管冲佑觀敕具官某昔者汲黯薄淮陽而願備左右拾遺補過盖天下不以黯為懐寵而咎漢武之不容直士也姑蘇近輔朕重其牧以爾度懐材厲操濟以恵和是用輟從諫省以重北門而不屑就若爾度有汲直之風矣無乃使朕似漢武乎從欲奉祠固非朕意毋為考槃永矢弗告則予汝懐可考功郎官王聞詩覃恩轉官敕具官某朕方罷祠而爾遄歸留之郎闈以濟世美縁恩進秩又率舊章視漢賈生召對宣室而不見用爾不謂之遭時乎可知寜國府木待問除煥章閣待制敕朕方隆孝治瞻言慈扆昔者所進今誰在乎將第其功而何舊學越在外服也具官某蚤以摛筆簡在烈祖晚而勸講眷於上皇胡然江湖荏苒嵗月一時輩行迭為三事而猶紆宣城之組乎自魁多士及班從官於今守宣事乆論定而又遭世不淑克䆒爾心活瘠起痿闔郡見徳朕覽奏計益嘉賢勞次對西清我有異數一朝酬之誰曰不可可尚書吏部貟外郎李季友除右司員外郎敕具官某詩不云乎彼都人士狐裘黄黄其容不改出言有章爾某似之輟從郎闈来掾宰事盖將試可以䆒爾能尚其懋哉毋曰序進可韓彦直致仕敕三朝法從方欽企於告猷奕世賢勞何遽聞於謝事姑惟從欲盍亦疏恩具官某顯允材猷懋昭聲聞以雲臺功臣之後奮自儒科以璧水寒畯之交明於世務踐更中外嘗試險夷投之於撥煩而咸宜強之以易武而不愠至於歸休殊館殆遺簮紱之榮論次本朝雅有簡編之樂肆予初政懐此舊人屬抱沉痾竟安居里亟頒新渥猶阻侍朝覧奏牘之所陳想拖紳之何及晚節末路固莫奪於忱辭故國世臣尚益綏於夀嘏於焉増秩抑又念功可四川制置使奏辟知叙州慶符縣謝辛討捕叛夷有勞身死特贈敕某官以攝官而冒萬死以保縣而奏膚功有臣如此而無位無年可為嘆惜也追錫一秩寄於異恩以慰沉𡨕且勸来者可煥章閣待制知鄂州王信知池州敕故事以待制而上官典於大州大抵以望郡多宿兵耳朕方以此意擇牧敢輕授乎具官某奮於書生而為才大夫肆我烈祖簡在法從代言掖垣闕敕𤨏闥議論風指聳聞一時盖薦紳翕然以為落筆妙天下也晚領名藩屢聞最課夫鄂渚池陽今江湖重兵處也萬竈與民居相錯而介士往往不樂於文吏朕即已試自鄂徙池爾其深知托重之意而不厭薄以是為煩調䕶也而非苟易置則予汝嘉可端明殿學士趙彦逾改除四川安撫制置使兼知成都敕分閫於外蜀為專宿師於邉蜀為重欲省賦以裕民又蜀為急而比年謀帥多輟從臣朕擇其人班在丞轄尤所以加恵蜀也具官某亷足以律百吏之貪静足以應多故之變簡在兩朝績用甚茂至於試之撥煩而無難辭居之絶逺而無愠色又何其過人也羽儀禁涂物望愈偉肆朕嗣服益見忠操引以自近宜在本朝朕亦惟自昔功業之臣一視中外鄭武相周義和就國鄼侯當軸平陽徂齊以卿一意首公無有遐邇其為朕﨑嶇萬里以寛西顧豈顧介然於懐歟昔在神考亦强趙抃而今朕所以煩卿又自有意噫周以宗强苟不居中必為二伯此王道也非朕所以煩卿之意乎式遄其歸日月可冀可新除江東提刑陳公亮除福建轉運副使敕具官某凡持寰内之節往往雅意本朝也爾詳刑於郊風績甚茂簡在慈扆行且遄歸而秉心無競固自引郤將輸江表亦非其好我圗爾居莫如閩部㑹使者易地爰改畀爾其為朕通八郡之鹽䇲以紓吾民則朕以懌可趙渙補官敕具官某歴學不精占天者病之爾以家傳盖䆒其術自吾賢士大夫亟稱焉取諸右階使為保章氏其與疇人訂正疏畧以成吾敬授人時之志可潛邸有勞轉官敕具官某朕第酬潜邸之勞雖小臣不忍遺而亦不敢私也以爾歴年彌乆庸進二階其尚靖共母曰倖得可薛登降兩官敕具官某古之人重請而况違三尺以請乎違三尺以請且不可又以不得志焉而咎所從請之人宜鐫兩階以警貪冒可骨舜輔隨金國賀正使充引接儀範回程循修職郎敕具官某凡出疆者有賞所以勞苦之也爾嘗𨽻使事與於驅馳爰進一階且書於籍為賞亦不薄矣可趙公介知舒州敕具官某龍舒於淮為名郡擇守往往皆名流也爾所試吏雅有治稱盖薦紳翕然以為通才爰付此土以䆒爾能尚其懋哉以圗報効可趙謩知嘉定府敕具官某爾以蜀之人望之予而典州有治行是用明陟畀爾潜藩矧嘗為别駕民譽藹然於焉分符可謂衆允詩不云乎維其有之是以似之益茂乃績無忝所生可淮西提舉張同之磨勘合轉一官乞回授封母敕具官某以年勞増秩其在功令㑹計至纎悉也而爾同之固請貤恩於母是足以發明人子之心矣詩不云乎是用作歌將母来諗此周所以勞使臣也爾方馳驅淮甸勞来安集吾民則朕豈有愛於此哉可朝奉大夫江東提舉陳士楚除吏部郎官九月二十一日敕具官某爾以舊學之臣持節行郡且滿嵗矣趣歸郎省以慰永懐經説一編尤在藏史朕方資之潤色初政無言不酬將有殊渥可朝奉郎湖北提刑陳謙收捕徭冦有勞特除直煥章閣敕具官某有以書生而可以即戎是不謂之長才歟爾某嘗有位於朝矣介在下僚無以著見試之劇郡談笑而理越持湖節遂克徭冦誠得如數十輩萬物吐氣非爾之謂乎寓直延閣姑以勸功寘諸周行誰曰不可可汪楚材王圭收捕徭冦特轉三官敕具官某徭人犯邉爾以户掾攝機幕王圭云爾以疆吏能帥其旅不日克之有司差其獲級宜進三階悉以畀汝以勸果毅可知宜州沙世堅收捕徭冦有勞特轉團練使敕具官某爾威名著於嶺南薦紳能言之比擢自逺服改畀郡符而桂林之奏牘始至日者討平徭人爾功居多朕益壮之粤自刺州寵以戎圑之峻賞不踰時吾豈愛此義不辭難汝將安報乎可知饒州樂平縣楊簡除國子博士九月二十七日敕朕方崇長學校所以加惠諸生甚渥也則聨教事於其間宜得名士爾簡蚤有賢譽不求聞達徒勞縣章益務持養是以不俟滿嵗俾長胄子豈惟諸生又以為善類勸也可廣西提刑胡長卿除廣西路轉運判官主管冲佑觀張玠除廣西提刑敕具官某嶺南去朝廷逺而民困於鹽筴之數易枉於訟缿之偏聴朕惻然念之為擇膚使以爾長卿嘗司臬事晉之輸漕以爾玠嘗持湖節俾之詳刑其各為朕布宣徳意以恵逺氓則朕以懌可國子正陳希㸃太學録湯璹並除太學博士九月二十七日敕具官某朕新嗣服崇長學校所以加恵諸生甚渥也則聨教事於其間亦盍序進矣爾希㸃爾璹俱以名勝来掌學士之版譽處藹然也晉之講席發明經意僉曰汝宜則朕以懌可祕書省正字李璧除校書郎九月二十九日敕具官某詩不云乎君子有之維其有之是以佀之以爾先人文墨議論之選而垂名千載但見於史筆宜爾之能嗣其業也校讐冊府益博爾文鴻漸之序於是焉始可主管架閣文字陳􅐥除國子正戴溪除太學録並十月一日敕具官某朕方崇長學校所以加惠諸生甚渥也則聨教事於其間宜得名士爾溪爾􅐥皆以經行教授于鄉從游之屨滿户外也凡學之胄子與國俊造爾其為我紏治校數之益自著見以湏明陟可端明殿學士四川安撫制置使趙彦逾贈三代曽祖少師崇國公諡清簡加贈太傅敕朕閲宗人之牒盖追錫其祖父尊寵多矣未有子孫以功名著見致位丞轄而後及此者具官某故曽祖具官某雖在天族猶寒畯也克世其家濟以清約易名之諡同姓盖鮮是豈苟得之哉廼生曽孫簡在法從肆朕嗣服厥功甚茂於是度越凡例及於異恩而爾亦自三孤晉陞帝傅其視宗牒不有光乎可曽祖母崇國夫人闕氏加贈闕國夫人敕婦徳為難而宗婦尤難其人也朕觀詩人之誦賢婦於諸姬獨稱魯衛豈不謂之難歟具官某曽祖母具位某氏出於名門作配崇國㓗純自持動有軌度假使生周之時則衛姜魯母之倫矣侑食于崇於禮為稱晉封大國又以聞孫凡爾宗婦視此用勸可祖闕二字加贈太子太傅敕朕觀漢宗室以恩澤侯且王者何限曽不長乆往往國除世禄之家鮮克由禮古人所以歎息也具官某故祖具官某以崇國之子益自好修克勤克順以詔厥後至于孫子遂為榦臣而朕亦追録其種徳之功為之美報粤自右階亟躋宫傳其視漢王侯自著浸㣲何相絶也尚克有知足以自慰可祖母淑人闕氏贈闕二字郡夫人敕詩不云乎蓺之榛栗椅桐梓漆爰伐琴瑟况得才而用之而不録其所自生非詩教也具官某故祖母具位某氏作配君子行修於家覃及其孫廼生才美周人作頌祖妣攸同盖未有不獲助於其内而收効於其後者粤自命婦䟽以郡封為君夫人實應經誼可父闕二字加贈太子少師敕自帝傅以来於是三葉而義方之教何其獨隆也具官某故父具官某以王公之胄而有士大夫之習非無富貴之階而宦不達也集善為祥聿生賢子清名特操庻幾儀休其視漢儒不以籝金而以一經不以駟馬而以隂徳殆無愧焉寵之宫師雖曰褒典非以為生盖徳之稱可妻淑人闕氏贈闕郡夫人敕朕誦二南之詩勸以義勉以正皆室家也我有近臣致位丞弼顧其内助晚不同休可無愍章以賁泉壤具官某故妻具位某氏儀于前人克濟其美遂相夫子曵履從班夫與之處約於鷄鳴盥櫛之初而不與之處樂於象服委蛇之後儻㣲追錫得無若汝水之墳南山之側遭世不淑詠歌辛苦者乎粤自命婦䟽以郡封爾其享哉永祔姑室可龍圗閣待制知潼川府閻蒼舒除煥章閣直學士提舉江州太平興國宫敕朕新嗣服有懐耆俊庶幾聞而作興曰盍歸乎来而何遽以賢勞欲觧州組不顧乎具官某材猷出於輩學議論近於前聞蚤陪禁路邁往不羣而晚為岳牧又何其豈弟也竟上懇章將就居里六閣通班莫髙於學士殊庭均逸莫便於外祠申錫命書勉從所欲母為考槃永矢弗告此朕之所以圗於卿也可知成州宇文子震知潼川府敕具官某以吾臺閣之臣而淹恤之乆僅起為州又絶逺外此士論所甚鬰鬰也潼於所部為東西蜀地望甚重畀爾州組庶究爾能益輯外庸嗣有褒異可新知真州權安節除利州路轉運判官朝奉大夫徐柟除廣東路轉運判官敕具官某等夫持節行郡國是為周王人漢部刺史也然周以下士漢纔秩六百石何歟深知此意宜何以圗報乎爾安節尚懐郡章爾柟甞有朝蹟㑹擇逺使僉曰汝堪此周漢意也安節誠以其惠清江之民者將漕於蜀部柟誠以其恵零陵之民者將漕於嶺表調度不煩抑揚無阿是足以歸報矣可司農寺丞李大異除夔州路轉運判官十月二十日敕具官某夫持節行郡國是為周王人漢部刺史也然周以下士漢纔秩六百石何歟豈非擇英俊之在下僚者試可之乎爾大異嘗以文藝得雋春官盖輩學往往膴仕而方抱槧修書徒勞州縣之間也晚綴班行又㝡平進若爾者是足以循周漢之制越次而出節矣將漕夔門布宣徳意自今以始庸究爾能可籍田令費士寅除太學博士十月闕日敕具官某以西州之彦嘗先闔郡䇿名春官日来造朝風度醖藉東州士樂與羣居也猶為藉人未足著見分以横經之席往哉汝諧可武學諭黄褒然除武學博士主管架閣文字蔣来叟除武學諭並十月二日敕具官某等右學猶左學也朕既妙選凡掌東學之士則右學可以次舉矣以爾褒然晉都講席爾来叟聨教事於其間經武緯文於穆士論不亦可乎可知信州石畫問除司封郎官淮西提舉張同之轉一官再任敕具官某等荒政十二著於周官苟非其人是徒法也爾畫問以郡太守同之以州刺史當嵗不淑克究爾心使境内無菜色計書来上朕甚嘉之誠得監牧如二人者布之海内吾民其蘇矣乎書勞進秩宜見褒異至如畫問訖事遄歸郎省同之善後因任使華朕意攸屬無有内外可軍器監主簿王恬除司農寺丞將作監主簿劉三傑除太府寺丞並十月三日敕具官某等列寺丞非所以見才也以今仕版徒勞州縣盖未嘗有一日朝蹟者而校數之則是亦足以致身矣爾恬爾三傑非嘗淹恤於州縣者歟頃因闕揚簿正二監今以恬丞大農三傑丞外府豈足見汝才哉尚務靖共以須器使可主管官告院李孟傳除將作監主簿幹辦諸司糧料院張震除軍器監主簿並十月四日敕具官某等二監於百官事為簡簿正之職於監事益簡有以好修不務競趨者居之斯不謂稱乎爾孟傳震無以為序進而不加勉也可浙西提舉鄭公顯改除湖南提舉敕具官某漢三互之禁吾本朝莫之行也至士大夫以嫌自言則亦從欲以便其私爾公顯持寰内之節風指凛然而以司憲姻黨雅不欲聨事也懇章来上易汝湖湘姑徇爾懐母曰胥逺可止齋集巻十七欽定四庫全書止齋集巻十八宋陳傅良撰外制知襄陽府張杓知建康府勅
