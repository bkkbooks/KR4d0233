body:
  text: 答陳同父三某尋常人耳䝉老兄拈掇冣早而晚又為正則推作前輩行此二三年間雖不鄉進而交㳺殊未散落皆二兄之賜獨恨未及與晦菴㳺講求餘論如人一身血氣偏枯以是脉絡未相貫穿而愚見復謂千書不如一見終當相就不欲以紙筆呶呶其間以辭害意失之逺矣老兄懸度而欲附之下風此意厚甚而不敢當也往還諸書熟復數過不知幾年間更有一畨如此議論甚盛甚盛然朱丈占得地段平正有以逸待勞之氣老兄跳踉號呼擁戈直上而無修辭之功較是輸他一著也以不肖者妄論功到成處便是有徳事到濟處便是有理此老兄之説也如此則三代聖賢枉作功夫功有適成何必有徳事有偶濟何必有理此朱丈之説也如此則漢祖唐宗賢於盜賊不逺以三代聖賢枉作工夫則是人力可以獨運以漢祖唐宗賢於盜賊不逺則是天命可以茍得謂人力可以獨運其弊上無兢畏之君謂天命可以茍得其弊下有覬覦之臣二君子立論不免於為驕君亂臣之地竊所未安也以兄之竒偉適不如樂毅論之迂濶朱丈之正大適不如王命論之淺近是尚為有益於訓乎且朱丈便謂兄貶抑三代而兄以朱丈使五百年間成大空濶至於其間頗近忿争養心之平何必及此不得不盡情以告然勿為晦菴言之徒若犯分也自七月間病暑幾殆凡事盡廢蔡直之到闕欲附數字猶未能自强也瞻仰歎故何可勝道專人恵書就審訊後尊候萬福􅇺懌之至各年半百餘嵗不過一再相問勞無由聚頭又堪懊意也某昔者何所有今者何所進自是老兄諸人過相拈掇每自謂人品極是尋常而亦礙人眼孔端是友朋捧擁之過近來衰惰益見天道尚思而好安無復更有他念來書方以為課進豈以為尚忘意當世乎然老兄之論要是攧撲不破若得人之伏不免背去求一喜之遇隨手敗闕只是侵砌闘合工夫能有多少光景往時曽與東莱語及非来復安得浸長老子極以為然所不識亦與求意畧同否然悲劣弟所當言請置是事元晦往復諸書何嘗敢道老兄㸃當得錯只是書中詞氣全似衲子闕面捧闕之語不應冩在紙上一便傳十百便傳千豈可不忍耐特擇言語却乃信手添起後生胡亂模畫而元晦亦闕趕趂出了無限不恰好話故亦為修辭之難而輙進區區之見老兄既嘆作附勢令人不敢再三且漢唐事業若說並無分毫扶助正道教誰肻伏孔孟勞忉與管仲百里奚分䟽亦太淺矣暗合兩字如何斷人識得三兩分便有三兩分功用識得六七分便有六七分功用却有全然識了為作不行放低一着之理决無全然不識横作竪作偶然撞着之理此亦分曉不湏多論但老兄任直不能亷纎自占便宜其間時有漏氣言語元晦執以見攻盖是忠愛然亦縁要攻老兄漏氣去處遂把話頭脱體蹉過此劣弟愚陋之見若兩家原不是如此則是智不足以知兩家耳初非有輕重抑揚之論也自兩壻入館繼以遷徙少定欲遣人間應之報有意外之橈方謝絶人事無從問訊且道逺不詳本末無着力處但與老妻日夜懸念長吁竊歎而已子約来言事已眀白不墮小人穽中盡室驚喜嗟乎恠哉老兄直至此也天之生才不遇則亦已矣閭巷蟣蝨之徒時欲置之罪罟若非朝家以不殺士為國是法令眀具有司闕三字放手生事耶兄當未易免禍吾平時毎欲望人度外闕寛䋲墨以便功名之士由今觀之士以此免不知幾人則議論誠難事耳又况朋友滿世一旦有緩急束手無策若衰朽猶荷親愛亦不過呌寃呌苦與坐視者無異即知老兄負謗負累奔走鄉曲之急直是枉却舉此兩端方服前輩遵守三尺不敢放開一線穏便話頭又㞐鄉如處女雖親戚在縲紲之中或不營救迺是知時識勢非茍然也老兄數年以来再脫於禍目今亦只得還他本朝學者轍様将秦漢間士大夫公案一切封起末當其位屈着頭合着眼杜門燕坐以養和平之福而已浙西别業稍有倫序漸為擇鄉之計尤所願望某腐生之說雖可厭薄然不到老兄之前他誰敢言者急時坐視慢時以空言相切某則自知罪矣幸察至望與王亞夫運使某竊惟宋興之初藩鎮専命擁財以自封靡爰建将輸之節以阜通天下之有無雖自闕錢以上名曰係省而州郡之闕一仰扵部使者四方之計至於三司或累十年不省而蔵富於外臺不可勝計中更變亂於是盡歸公上而漕失其職往往僅同催綱督租祖宗所以懋遷南北均調内外之道缺矣台座以耆眀之望簡自聖裁畀以總輸之寄豈與循次而進不得已而授者同日語哉講究顛末還之國初不勝士友之望前書所布自倉司發之尚為涉越今台座事也留意幸甚辱在愛予不當因賀但奉腐熟之談輒申前禀伏紙僣越是懼答丁子齊三示及新篇意趣閑淡然詩律更當進步子齊徳性器度絶過倫軰而區區猶有増益未能之望則磨礲乎事業奮發乎文章也古之大人未有不兼通此而後可以應天下之故者以曽子守約之學而曽子問一篇自禮之窮世故之變悉講而後已以此可以推測孔門之傳也過節儻能恵然一来各進所見幸甚舊學典刑日就寥落非壁立自信安得脫世間波蕩某老矣所覬朋友共發眀之無任引領下問讀書譜近方脫藁自畫易至獲麟聖賢調度盡在此巻若從頭商㩁得到分數則異時出處定不草草以此益要團欒如来諭也書譜又辱為之叙文意俱盛前發藝祖以来諸賢又及邵氏經世書前輩未曽提掇中間一二處未穏更删定方可㳺誠之恨未一見向薛常州毎毎稱其為英才緩急可倚伏聞與張欽夫相聚甚久欽夫幕中得其助為多鄭四三丈為福建倉失此良友深以為歉子齊既與之處若下人不真不得其精要當切思到底日月不可悠悠聞子約見子静陸丈不受其砭又是意氣未除子約之凝滯非陸丈不能剖斷得下其他空踈之人又不可入其陶冶楊敬仲尊禮子静如洙泗此必有以得其心者曾往扣其本末否某甚恨不得與諸公相講切追憶伯恭景望二賢於丁酉聚首之時不覺悽然除夜有懐一章豈能無意詩三百篇大抵喜怒所作要不失其正讀楚詞漢賦建安五言吾輩可謂首鼠畏禍夫畏禍豈所以待寛時耶近日士友相厲多說無圭角此是大患知者一向沈黙不知者固有所激昻以要君為利為利者負國沈黙者謂之何哉六朝人物區區中原之念見之寢食今日舉子握筆作塲屋文字者未嘗肻道其名字獨不謂不能撥亂反正其人固不足道耶吾輩為漢民将十餘世而使吾君忍耻事讐垂六十年而學校鄉黨晏然無進志其大者則率其徒為清談次摘章句小則學為詩文自娯當此時吾黨與士友不變其説謂之波蕩此某所為懼子齊勿以為踈也幽人貞吉勿事奔競之謂若曰時事不得講人才不得評則非古人之意平生讀書亦以為理義如此足矣杜門以来大覺不然子齊試以堯典至平王文侯之命商略古人所以處興亡盛衰之變有人則濟無人則否此事占田地濶不應碌碌休也相愛之切忉怛彌甚惟吾子齊志在本朝故盡布之不必於不相知者道也文季口手自足受用未必聽朋友之砭器逺於足下信厚異時出處共相規約若子齊話頭止如向来所云非所望也蘇黄門晚節甚慚於東坡以温公待小申公如許至變法時每苦晦叔太懦力量真難事耳與林懿仲二某凡八十餘日始達官下一冬雨雪難阻萬状回想閑居士友團頭之樂不可得已桂陽本一縣置吏養兵與賦輸視他大郡民力重困至於甚不能平則或騷動非其俗喜亂也至此逾月犴無見囚而訟牘但田土典賣不明等事盖樸魯耳惟是帑藏盡虚蕩無綱目而漕檄如織官兵持逋劵責償者累月正使收拾得到亦無以供之是則可憂也湖南諸郡劉子澄冣善政竟不能免蔡直之邵陽次之亦有不樂者今春臧状未必調一言勞者何以勸乎勿為他人道幸幸淮甸不知此去當如何錢幣一事想已動揺了人情朝家方捄過不暇應置此未經念要是便錢務冣佳俟稍定試拈出此活頭也某荷上眷不薄然竭盡區區無毫髪之補至乞休致其情可想朋友宦㳺四方雖時時上心亦未有餘力相照燭非忘之也答薛子長三日欲報所况教以乏便未果方此歉怍承命重為不敏某衰惰何足與語今古而左右獨見推遜以所著南北之際義例為恵且下問其然否老矣交㳺彫落願方得三益豈非天憫其窮以此厚幸之耶感激過望所論晉非南遷元魏無凌逼中原之暴而其亡以六鎮齊梁陳之暴興北齊之後斃向者亦嘗見此意往往不能發今得筆力先眀之胸中了然甚盛甚盛至於君臣譜系尤足考其細故不謂晚年見此竒特宜前輩所嘆也方令兒輩傳冩一本旦夕即納上左右議論誠淵源於正則要其所到又有過人者近宗簡逓示呉門書藁讀之益爽然自失徐復自念鄉間學問将趍於弊非時流之過必得温厚爾雅之言以殿其末則吾輩皆賴以免足下其人也願言勉之扶此墜緒數日流連酒盞間欲課詩奉送竟不就晨興抽毫而来使已及門矣謾塞盛意為借書一章以往所謂雷門鼓也一笑一笑兩學官書附煩送似昨報潘叔昌簡云平居尚友有相先之美臨事立我為自全之計此自昔儒者通患而國朝風流持論嚴正消息盈虚尤不屑意老兄以為然否衰惰無復貪書之念昨偶将熈豐後来長編過眼數巻便昏澁異常毎對挿架慨歎而已此事當盡付左右諸人来諭方閲南北史二史儘佳然一代沿革附見表志者往往不收未免遺恨則諸史要不可廢自荀袁二紀以来下逮司馬通鑑大率欲祖左氏盖左氏本依經為傳縱横上下旁行溢出無非解剥經誼而非自為書今乃合太史公紀世書傳繋之編年則其間事辭轇轕勢必至得此遺彼由此觀之類不如正史之悉也然區區所冀深探書外之意求書所謂實事本末往往在此且如西都之末士大夫知有所擇遂成東都之業及其季年雖豪傑之士散為呉魏之後拳拳於漢獨南陽數人當時必有實以致之而豈可以書盡哉何當并合共講一二新詩寄見疾讀降嘆建安以来乃今見此作也止齋集巻三十六欽定四庫全書止齋集巻三十七宋陳傅良撰
