front:
  text: 黄文叔三監班固說非是商都六七遷皆夾河是後東徙朝歌周自岐雍興初務撫定凡東諸侯嘗為商畿甸近服者皆命之三母弟自荆以南蔡叔監之管叔河南霍叔河北蔡故蔡國管則管城霍所謂霍太山也其綿地廣不得為邶􅅠衛眀甚三監誅廢晉衛始皆為諸侯盖有管霍之地而蔡嘗空置矣後以命其子仲其他則齊魯燕二三大國州牧之境揔之周南召南也當文武成康之盛天下有二南國風而已江沱漢汝諸詩不言其封君甘棠雖美召伯而不繫之召是時安得所謂十三國風者哉國風作而二南之正變矣邶􅅠曹鄶特微國也而國風以之終始焉盖邶􅅠自别扵衛而諸侯如無統紀及其厭亂思治追懐先王先公之世匪風下泉有若曹鄶然君子以為是二南之可復世無周公誰能正之是故以豳終風以邶􅅠嘗統治於衛既得之矣以其封滅不見於傳疑為虚置之國且諸侯封滅不見於經傳何獨邶􅅠春秋亦無􅅠是不足惑也雖然以為周公封建之說則又不敢不告且周官封建自鄭氏汨亂之而其書迄不見信於世古者建國率小大相維其邊國皆大國也故寰内則以家邑小都大都為中外之差寰外則以諸男諸子諸伯諸侯諸公為中外之差禹貢亦云五百里侯服百里采二百里男邦三百里諸侯以一服為率正此説也鄭氏考之不詳輙以大司徒測地制域以建邦國諸公之地封疆方五百里是為分地推之他書不能合則有夏商三等周更置五等之説則有周公斥大九州之説則有其半皆附庸之説又有爵尊而國小爵卑而國大之説至於改定經文以七伯為十一伯之類臆決彌甚數説不暇盡論凡試以典命司服大行人司儀諸文攷之則封國三等至周公不變其小異者公一位諸侯伯一位子男同一位耳盖周未有爵為公者必若宋杞而後為公周虞皆為天子三公而稱公非有其國而子男獨多職方氏云凡邦國千里千里云者以毎服相距言之以其方五百里封公則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男且周未有封公者則通一服之地小大國之多寡以是凖凡為侯伯母過十二三子倍之男又累倍之其在經傳晉為甸侯曹為甸伯班班可考他如顓臾在邦域鄫無賦於司馬者何可勝數而附庸不與先儒以八州為千八百餘國固繆以春秋僅有一百六十餘國亦繆僕固曰惟賈生冣得其意自司馬遷以下往往為經生所亂不敢不告也至如乗車之限禄食之等無足深言者且書不能悉計髙眀必有以推見之區區所陳勿為他人道幸甚
