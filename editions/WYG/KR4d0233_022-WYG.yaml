  text: 劄子
  hash: sha256:dca49ed2090617a78f110e217987f42bb5983f9c92cffda90308f8a842baa0e1
body:
  text: 繳奏内侍張安仁轉官狀准中書門下省送到録黄一道樞宻院闗二月三十日奉聖㫖已降指揮張安仁該進呈安奉至尊夀皇聖帝聖政㑹要了畢兩局推恩得轉一官并昨該解帶合轉一官未曽收使今來為係入内内侍省付都知可将上件兩官特與依黄邁昨任省官日例於階官上轉行一官令臣書行須至奏聞者右臣竊詳祖宗以來文武官磨勘立為止法二百餘年守之舊矣至武功大夫不可轉横行則尤為嚴宻前後臣僚論奏非一臣不復悉數今來張安仁指揮用安奉夀皇聖政㑹要推恩得轉一官并昨該解帶合轉一官将上件兩官與階官上轉行一官若遂轉行即徑入横行盖其陳乞之詞以為兩官轉一官不為踰越而陛下俯從其請亦以為兩官而轉一官不為僥倖云爾檢准隆興元年四月二十四日敕諸軍立功将士轉官礙止法人縁經戰陣與雜功輕重不同若令二例回授無以激勸於是始立武功大夫三官轉行横行一官之法恭惟夀皇愛惜名器獨不吝於戰功豈不欲徑許轉行横行以厲鬭士而詔書諄諄特示優異必累三官方轉一官何也誠以二百餘年遵守止法而一旦創為異恩不但回授亦必以戰功三官方得轉行則上不廢祖宗之制而下可以勸将士之心也今也安仁廼欲以進書解帶兩官比之戰功又少一官而轉横行豈不破累朝之成憲紊隆興之新法啟庸人之覬心沮壮士之鬬志乎且今來指揮引用紹熈元年七月十八日黄邁事例臣竊謂黄邁事例已是失錯自合改正若已曽經施行便為永制則臣所未之聞也竊見紹熈元年張國珍以武功大夫任統制官及十年有㫖許用趙圭例轉遥郡臣寮論之竟寢前命即不以趙圭為例放過此不以例廢法陛下之所已行也又鄭大亨以武功大夫幹辦御藥院職事修舉有㫖許用王公昌例轉遥郡臣寮論之亦寢前命即不以王公昌為例放過此不以例廢法又陛下之所已行也仰見聖心本無適莫何獨此等却但因循此臣所以敢為陛下言之臣愚欲望睿慈将上件指揮特賜寢罷所有録黄臣未敢書行謹録奏聞伏候敕㫖三月十三日奏第二狀臣昨論奏内侍張安仁横行不當自惟疎逺小臣驟蒙任使而輙違忤天威死有餘罪恭奉御筆依自來體例施行仰見聖心優容詞㫖温厚如此益自感激不容但已盖臣已取索到吏部尚右名籍并已行遣過千照逐一稽攷自陛下臨御以來即無似此體式縁有淳熈十六年三月二十九日敕節文吏部奏檢照紹興三十二年十月十七日敕武功大夫實厯七年用七舉主並轉横行三省同奉聖㫖遵依紹興三十二年十月十七日已降聖㫖指揮施行此陛下初政所以示信於天下而臣之所當守者也嵗嘗降特㫖郭果等八人總戎閫外宣力為多並特轉一官吏部申數内郭果郭杲由世卿李思孝各係武功大夫並合轉右武大夫縁有上件聖㫖指揮遵依紹興三十二年十月十七日已降指揮未敢便行擬轉續奉聖㫖竟令回授且夫帥閫之臣比之省職難易勞逸大段不同兼之是陛下始初特恩而猶以有司申審竟令回授今來若以張安仁放過臣恐諸将解體矣此臣之所不敢已也若以為見任省官便可轉行則又不然祖宗舊制入内内侍省使臣寄資至内殿承制即更不得磨勘轉至副使宣和以來方許係寄資内殿崇班以上磨勘依吏部法轉至諸司副使靖康元年五月十四日三省樞宻院同奉聖㫖兩省官稱職任恩數請給並遵祖宗舊制上件存留照用指揮係是見行即無衝改以此可見省職即無指定都知押班許轉横行之法况自淳熈十六年以後内侍官轉行横行不過二人黄邁新知省事用該遇登極及製造皇后禕衣了畢梁彬以從夀皇駕過重華宫此乃舜禹授受之際千載一遇豈得與闕恩同年而語哉由此言之藉使廢法從例則亦無例可攀臣不免上違隆㫖再三論奏區區欲望聖慈特賜寢罷前命止令回授所有録黄臣未敢書行謹録奏聞伏候敕㫖乞補外某一介疎逺素無榮望不謂疊冒恩渥備員右史兼職西掖書生所願不過及此極欲勉强庸駑少效尺寸伏念某将指湖湘嘗得心脾之疾痛不可忍至於失汗大肉消陷幾死者再矣毎念此疾唯不復作作且即死忽自今春日痛一日心甚懼之服食俱廢不惟職司弛慢難安亦恐朝謁僵仆非便欲望朝廷特為敷奏與在外待闕合入差遣一次或檢㑹前請與之祠禄以便醫理倘未朝露當有歸班圖報之日内引劄子臣頃因奏事妄意窺測以陛下之心務在無為而厭多事雖蒙矜納不謂違忤然言之未悉不足感動今請申明之臣聞人主之徳當與天同今夫生成萬物皆六子之職也而天不與其勞此之謂無為若夫一晝夜之運周天三百六十五度四分度之一者則必天徳也假如天徳不健而一晝夜三百六十五度之間或差頃刻則其始也以早為晏其積也以春為秋由是而六子之功廢六子之功廢則萬物不遂矣平治天下皆羣臣之職也而君不與其勞此之謂無為若夫兢兢業業一日二日應萬幾之煩者則必君徳也假如君徳不强而一日二日萬幾之際或廢一二則其始也宜速者遲其積也宜行者罷由是而羣臣之官曠羣臣之官曠則天下不理矣天徳不健而六子之功廢則萬物不遂君徳不强而羣臣之官曠則天下不理謂之無為無廼反多事乎夫将以無為反以多事其故何也人主不自强而讒間迎合之計中也是故因其厭省覽也則有以好名之説中傷忠讜因其憚改作也則有以生事之說沮壊勞績允若此皆讒間也因其近聲色也則有以勿問外人之說固結宫禁因其樂厭飲也則有以勿親小事之説竊弄威福允若此皆迎合也甚者諱惡灾異雖水旱螟蝗之變而不以告禁止張皇雖盗賊兵戈之警而不以聞且夫讒間之計中則君子日疎迎合之計中則小人日親而其極至於天變不告邉警不聞如是而天下不多事者未之有也由是言之不察於實而昡於無為之名特姦臣持禄保妻子者之利非有國家者之福也然則人主果何便於此而墮姦臣之計乎恭惟陛下天資英明學力剛健遇事輙斷罔或留難有言必中靡容熒惑君徳如此足以上當髙宗宏濟艱難之志光紹夀皇揔攬乾剛之業矣踐阼以来其見於明效大驗如不信近習而請託苞苴之弊息不采游言而察探羅織之獄衰不尚獨斷而宰相執政之啟擬行事不繁文而百官有司之職宏定則又漢唐以来君徳所不及也臣猶慮聖心務在無為而進自强之論誠望陛下充此徳濟此治効以其所已行達之於其所不行者而已恭以陛下天資英明學力剛健誠以其所已行達之於其所不行特反掌之易耳臣竊見間者擢用同姓為大臣有以故事争之者陛下勿疑也雖大臣自以紹興聖訓逡廵不敢就職而詔㫖丁寧不可回奪二三大璫解罷省事俄以片紙出禁中雖左右朝夕之人欲籲哀乞憐而不可得此則陛下之所已行者也至於蠢爾小臣白身補授被封駁者再矣而陛下久不忍决監司郡守差除不當臺臣論列至於數四盖逾月而後付出此則陛下之所不行者也然則陛下非不能行直偶不行耳臣故曰誠以其所已行達之於其所不行特反掌之易此臣所以拳拳也繳奏給事中黄裳改除兵部侍郎状臣以樓鑰差充御試官時暫兼攝吏左房書黄事近者新除鄭汝諧權吏部侍郎録黄一道臣已書行去訖給事中黄裳不肯書讀輙有論奏臣於鄭汝諧有鄉曲之好於黄裳有僚友之情與此二人初無厚薄鄭汝諧之除授堪與不堪黄裳之封駁當與不當臣不復論忽奉聖㫖改黄裳兵部侍郎此臣之所不敢黙黙也何者給舍封繳是謂官守其言行則謂之振職其言不行則謂之失職振職謂之功失職謂之罪此百王以来與國家列聖之所務暴白也今者黄裳之言臣不識陛下以為是歟抑以為非歟若以為是則當聴從若以為非則當罷黜今也隂廢其言而陽遷其官是非不明賞罰倒置臣竊以為當今之時不宜有此何者隂廢其言而陽遷其官古来傳記嘗有此事若非猜阻之君喜權任數以此為盖抹之術則是姦回之臣嫉賢醜正以此為中傷之計今陛下寛容樂易非猜阻之君二三大臣靖共正直非姦囘之佐不謂清朝有此過舉臣頃嘗奏事屢言君徳當與天同毎蒙淵聴曲加奨納今夫天發生則為雨露肅殺則為霜雪未有明示雨露之恩而宻加霜雪之慘者也由此觀之若裳所言悖理傷道熒惑聰明懐姦挾私變亂事實則陛下宜出其章播之公衆明怒而明黜之如此施行豈不正大若裳所言止於為國過慮無悖理傷道之失或是求人太備無懐姦挾私之邪則以陛下明恕何所不容豈應違忤遽有遷改今乃名為進官而實奪其當言之職外示優假而中不無怒絶之意遂使凡有官守人人自疑黄裳雖去何以繼之强顔緘黙誰無愧恥隨事正捄未知所終則此除之後将見給舍竟為虚設雖有忠賢無以自明此臣之所甚憂而不敢黙黙也欲望睿慈少霽天威收回成命令黄裳依舊供職以釋在廷之疑以為来者之勸第二状臣昨具奏給事中黄裳縁封駁不行改除兵部侍郎乞收成命且令黄裳依舊供職所有録黄一道當日繳還中書門下省去後更不付出仰見聖心本無適莫不唯濶略黄裳違忤亦復不以僭越罪臣感激隆寛何以論報然黄裳尚未被受供職指揮瑣闥闕官今已數日臣愚窺度或者陛下以為無此故事尚遲之耳臣攷之史傳人臣暫失人主之意将及去官俄而再留者不可勝數今特舉給事中二事為陛下誦之唐吕元膺自給事中除同州刺史及入謝奏對激切憲宗嘉之翊日語宰相曰元膺讜言直氣朕欲留在左右使言得失李藩裴垍進賀曰陛下納諫冠於前王臣等既不能廣求直士又不能數進直言合當負罪今請以元膺復為給事中上恱而從之且夫元膺解職刺州已有成命而憲宗終惜其去李藩裴垍復賛其留遂令元膺再還舊官故憲宗號為英主裴李亦稱名相雖然此猶是唐朝故事非本朝家法也紹興二年以兵部尚書權邦彦為簽書樞宻院事給事中程瑀三疏駁之尋令官書書讀瑀乞罷遂遷兵部侍郎瑀不拜除龍圖閣待制知信州臺諫官江躋方孟卿皆言黄門職典出納顧不留瑀自助竊為朝廷惜之上批復除瑀給事中及入謝上曰給事之設正要駁異豈在雷同朕以卿再三求去勉從所請然深不欲卿去故再有此除瑀出特賜象笏是則陛下家法也仰惟髙宗中興之初君臣相與不事形迹故程瑀志在報國不以嬰鱗為懼而敢於駁邦彦江躋方孟卿志在惜賢不以朋比為嫌而敢於留瑀而髙宗天錫勇智從善如流故亦不以反汗為吝而深信躋等之説用瑀如故傳之史籍千載美談臣所以不敢信宿進此二事以替聖斷之决伏望宸𠂻體髙廟無我之心二三大臣効李藩裴垍獻替之力特收成命速降黄裳依舊供職指揮以増聖治之光華以勸臣工之興起而微臣不肖亦得與江躋方孟卿同托不朽曷勝榮幸取進止五月初四日奏入留中論史官劄子臣嘗具奏竊見唐大順一年二月敕吏部侍郎栁玭等修宣宗懿宗僖宗實録始丞相監修國史杜讓能以三朝實録未修乃奏吏部侍郎栁玭右補闕裴廷裕左拾遺孫泰駕部員外郎李徹太常博士鄭光庭等十五人修之踰年竟不能編一字臣以此知史事至重不宜以他官兼領今史院檢討皆是兼局更出迭入有同傳舍至修撰亦以從臣兼之往往多近上眷渥之人率不淹久去掌機政大槩一年之間方議立條例均分巻帙而出院多矣則一朝鉅典無由就緒事大體重豈容空過嵗月提領大臣須至取㫖立限奏篇臣恐未免逐急率課取具臨時草草逃責而無以發明盛徳大業傳信萬世要亦非秉筆者稽遲之罪而其勢必至此者無專官故也近年李燾洪邁以待制相繼修史不領他事而後四朝國史方及成書以臣愚見兩制臣僚位望已貴若委以史事見謂冷局不過一二年間朝廷須更遷除雖曰專官未必久任今職名中有秘閣修撰右文殿修撰并舊有史館校勘等正是三館修書官名目自郎察卿監補外之人皆得除授若将此二三職名置為史官以二年為任自史館校勘之類供職稍遷秘閣修撰又稍遷右文殿修撰在院少亦已五七年俟有勞蹟雖就遷次對如李燾洪邁兼領可也則是史官與郎察卿監可以馴至從班事體略同有專官之効無冷局之嫌庶幾大典責成有人况在祖宗朝雖諫議大夫以上皆帶出為寄禄官而以供職諫院者為諫官則今以修撰為貼職而以供職史院者為史官盖舊章也有何不可臣愚不自度妄論史事唯陛下裁幸繳奏陳源除入内内侍押班状臣去國日久初不詳陳源得罪之由及考之有司見得嘗投寘逺外没入家産一時同惡相濟之人如徐彦達李庚輩亦各編管估籍及許逐便以来間有命則給舍臣僚節次論奏然後知陳源得罪於髙宗盖服用或擬於乗輿聲色不下於宫禁禁路鈴正使實供厮役所謂小人之無君上者也故自夀皇及陛下初政至於今日凡羣臣有言悉蒙開納前後施行已降指揮有司所共遵守也今者押班之除後省封還廹於天威黽勉書讀而臣適暫攝西掖若亦書行便當命詞臣不知若陳源者将何以為之詞也若采羣臣前日之言因為之詞則是暴其罪状於天下適以彰聖明擢用之失若但揣陛下今日之意别為之詞是以夀皇及初政以来施行羣臣之言所降指揮駁而不用即為此詞将進退或戾於君父矣臣必不敢奉詔臣愚欲望聖慈少霽威嚴追寢除目勿以螻蟻之微敢遏風雷之命而加之罪則臣之幸也聖時之盛事也臣不勝拳拳所有録黄臣未敢書行謹録奏聞伏候敕㫖七月二十五日謝深甫為給事中已書樞宻院劄子去訖奏入不報繳奏白身彭燾補官状准中書門下送到録黄奉聖㫖御前書寫文字白身彭燾上等實及一十年依已降指揮與補承信郎令臣書行右臣伏覩今年五月四日樞宻院劄付臣寮上言樞宻院送到録黄一道為御前書寫文字薛淙補官臣茫然不知所從欲乞行下薛淙所屬官司取見入役年月據實保明委及十年方與取㫖補官則臣有憑據乃敢書行伏候敕㫖睿思殿庫供到本庫契勘薛淙於淳熈十年正月十一日差充御前上等書寫文字睿思殿庫掌管官物祗應至今實及十年已上即無在假不在司月日保明是實申聞事五月四日奉聖㫖依已降指揮與書行其薛淙已書行補授去訖今来彭燾即未見得本人應得上項指揮臣愚欲乞檢照五月四日聖㫖指揮行下所屬保明施行所有録黄臣未敢書行謹録奏聞伏候敕㫖八月初八奏繳奏閤門承受趙銓乞将轉官回授封贈状准中書門下省送到録黄一道為成忠郎閤門承受趙銓用因該人使到闕應奉及一十畨得轉一官公據乞将回授封贈父母令臣撰詞給告須至奏聞者右臣據吏部供到状契勘趙銓見係閤門承受所授成忠郎係該遇皇帝登寶位引用紹興三十二年指揮預行補授成忠郎其餘應于合得轉官恩例酬資即無許收使條法指揮又據司封供到状檢准淳熈六年九月十一日臣寮上言三省同奉聖㫖今後封贈並依司封見行條法施行本部除有曲全禮鍾闡已放行回授封贈父母體例外自淳熈六年已降指揮之後别無命官帶吏職放行封贈體例臣愚欲望睿慈将趙銓所乞回授封贈指揮特賜追寢所有告詞臣未敢撰行謹録奏聞伏候敕㫖止齋集巻二十二欽定四庫全書止齋集巻二十三宋陳傅良撰奏狀劄子繳
