body:
  text: 雜著瑞安縣學上梁文吾邑有學繇慶歴而來諸生置員於崇寧為盛久矣趍廢誰其嗣興弛百役以獨先彌三時而具舉有嚴函丈可以横經於粲周廬可以肄業共惟聖考侈廟貎之前觀顯允賢侯輯儒先之善筭事闗風俗歡動州閭斯抗脩梁爰申善頌東吳㑹修門一葦通璧海源源流道德也應泮水日朝宗西峴首葱葱雨露低更上觀潮試囬首朝陽合有鳳凰棲南一曲清江與地叅驚世文章曽不露横塘居士府潭潭北閩粤群山來不極三峯之下可無人能以功名留翰墨上閶闔方今開蕩蕩少微正照斗牛墟此有隱淪誰與訪下七八十翁多在者自言生不識干戈長得兒孫皆爾雅伏願上梁之後群書充棟多士填門相維鬼神無風雨漂摇之患燕及𦙍祚皆山河魁磊之英到桂陽謁宣聖文共惟夫子之言曰有一言而可以終身行之者其恕矣乎某質薄氣觕誤有民社願事斯語以免於戾敢告桂陽上元設醮青詞廼者庶徴非常連隂不解爰方假守何以召和㑹王厯之初頒雖修故事面天威之甚邇實貢忱辭恭願哀矜一方嘉惠百穀事闗民命寧使臣霑僥倖之恩咎在臣躬毋令民被阽危之患桂陽中秋設醮青詞疾痛呼天輙自忘其僣越髙明覆物終不忍於顛隮永惟返風滅火之祥何啻虛谷應聲之速敢憑羽侣式謝鴻私恭願不異塵凡有來􅆄蠁憐臣斗筲之器雖負民社而不勝念臣葵藿之誠盖填溝壑而未巳遂無它咎以迄終更桂陽軍修城隍祝文有屹崇墉爾神主之彼圮而闕宜崇補之築之闐闐尚呵護之允也有成維皇其嘉與之桂陽軍禱雨文某假守於此大懼凉薄不足以闕三字用昭事明神以祈嵗事廼者烈風荐作嘉澤弗周粟闕三字禾且憔悴夫為吏之日短神與民相依之日長奈何以吏之不德而為斯民病也敬申前請敢告終惠謝龍山渡明應侯文維侯所宅桂陽之望風雨不時於是焉禱其諸古之所謂境内名山川歟兹者嘉澤弗周烈風荐作菽粟幾空禾且就槁固宰物者所以謫吏而侯亦豈遂忘此土也遣官乞靈齋宿以竢侯不督過而辱霈施之某雖無以愈人猶足以伐石譔詞昭示後來永永無怠周子名說周子請名余命之曰仍之盖取古仍孫之義周氏之門父子孫凡三世傳曰野人曰父母何算焉都邑之士則知尊禰矣大夫及學士則知尊祖矣夫欲為士大夫者必世其家者也三姓之舊於今為庶畢萬匹夫也而大有後於晉國是在懋不懋而已故字之懋長朱子名說吾友朱同之之子名植字直卿闕三字名字所從來曰祖父所命也欲易其字為直方而植闕三字因書以遺之使持白祖父視如何也謝居士賛貧而好施隱而好客終身鰥居而義不廢嗣息豈其所謂非儒非墨而自適其適者耶自賛以學多病以貧數窮佚我嵗晏亦二者之功闕三字歸寥寥太空儻不離人即為良農桂陽軍告諭百姓榜文照㑹當職到任欲得民間通曉法意檢坐到見行條法如右父子律子孫違犯教令及供養有闕者徒二年勅凡子孫違犯教令及供養有闕情重者隣州兇惡者千里並編管勅凡諸生子孫而棄之者徒二年殺者徒三年收生人共犯雖為從殺者與同罪棄者徒二年半並許人告若地分及隣保知而不告殺者徒一年棄者减一等夫婦律諸妻無七出及義絶之狀而出之者徒一年半雖犯七出有三不去而去之者杖一百追還若犯惡疾及姦者不用此律房族律諸同居若大功以上親及外祖父母外孫若孫之婦夫之兄弟及兄弟妻有罪相為隠部曲奴婢為主隠皆勿論即漏露其事及擿語消息亦不坐其小功以下相隠减凡人三等若犯謀叛以上者不用此律律諸告周親尊長外祖父母夫之祖父母雖得實徒其告重者减所告罪一等即誣告重者加所誣罪三等告大功尊長各减一等小功緦麻减二等誣告重者各加所誣罪一等即非相容隠被告者論如律其相侵犯自理訴者聽隣里勅凡諸訐告之罪若於法不應告之人雖係廂耆隣保亦不得告勅凡諸事不干已輙告論者杖一百其所告之事各不得受理律諸隣里被强盗及殺人告而不救助者杖一百聞而不救助者减一等力勢不能赴救者速告附近官司若不告者亦以不救助論其官司不即救助者徒一年竊盗者各减二等窩藏櫃頭誘略勅凡知人犯罪而藏匿過致資給令得隠避者不須事發被追藏依匿罪人法其知情停止人犯徒以上罪者准此律知情藏匿罪人若過致資給令得隠避者各减罪人罪一等律諸博戯賭財物者各杖一百舉博為例餘戯皆是贜重者各依已分准盗論輸者亦依已分為從坐其停止主人及闕力若和合者各如之勅諸開櫃坊停止賭博財物者隣州編管於出軍營内停止者配本城並許人告廂耆廵察㸔營闕宿提舉人失覺察者杖八十律諸略人略賣人不和為略十嵗以下雖和亦同略法為奴婢者絞為部曲者流三千里為妻妾子孫者徒三年因而殺傷人者同强盗法和誘者各减一等勅諸略若和誘人因而取財及雇賣或得財者計入已之贜在一名處頻犯人不倍畧人者以不持仗强盗論一貫皆配千里婦人五百里編管因而姦者依强姦法和誘者以不持仗竊盗論五貫配五百里婦人隣州編管其知情引領牙保若藏匿被畧誘者各依藏匿犯人法右仰汝等百姓各詳立法之意欲汝慈孝父子有恩故有供養有缺及違法教令及不舉子之法欲汝安錯夫婦相保故有七出三不去之法欲汝和協宗族如一故有相容隠不相告之法欲汝交通隣里無爭故有不得告訐及相救助之法欲汝守已不務貪婪但利其家却為衆害故有停藏開櫃誘畧之法廼至鬭毆姦盗毎事有條意在禁汝為非勸汝為善當職今節取數項係父子夫婦房族隣里要切事理明以教諭汝等皆有良心其俗質朴比之諸處公事最稀若更遵從不致違戾雖有官府刑何所施更冀得力之家津遣子弟從師就學興起門戸其餘勤謹農桑愛惜錢穀祭享翁祖看守墳墓如此則骨肉相勸里巷無怨和氣所積天道不差風雨必調五穀必熟可使此邦永為樂土至如徭人實同省地久來往還何分彼此設若軍縣催科或公人下鄉恐嚇保社復相追擾或攬寄等家兠收過多或代納上戸利息太重之類凡有枉塞並仰披陳當於當職自有過差諸縣不能體恤儻以㸔望未欲興詞但希書簡相投或因寄居學職過㕔見諭庻幾通知從汝之便桂陽軍告諭納税榜文照對軍縣毎年起發省部總領諸司錢糧并支給官兵錢糧貫萬浩瀚别無課入全藉税戸夏秋銀錢分擘應副當職到任據平陽縣丞狀申驅磨見得自淳煕十一年秋至十四年夏六料銀錢欠數不少除十一年已准赦文自第五等已下除放外餘四等以上并十一年夏至十四年夏三料理合拘催切慮税戸不易難以一併了納當職今同衆官計度將十一年四等以上戸共欠一千二百八兩有零并十二年夏十二年秋共欠一千五百七十四兩有零共欠三料未納之數時暫住催自十三年夏料為始催理又慮税戸日前已將錢米交托與攬子店戸等人却被兠收入已致作名下掛欠已行下知丞分鄉具出長名帖子付逐都保正戸長仰各廵問甲甲内人戸如委曽交納託與人見有干照即仰保正類聚姓名保明申縣切待於交攬人名下追理自餘委係本戸即仰趂時赴軍輸納今立寛限十三年夏秋二料限二月終十四年夏料限三月終更不准前遣官差人下鄉掻擾乃已約束受納等處毎銀一兩减五文足搯子錢减三文足役錢一百文足收㑹錢八十三文足毎一貫减五文足搯子錢减三文足苗米官田職田米每石减十二文足每石倉用米减十五升攬子米减五升和糶米每石减七文足每石倉用米减十三升攬子米减五升省義倉米每鈔减五文足每石倉用錢减十三文足倉用米减二十二升省攬子减五升省銀自一錢以上米自一㪷以上准此曉示去訖候至限滿見得錢物次第若是正稅自足了辦一年支遣當議再將本縣久例無名科斂並行蠲减以便人戸若致限滿拖延不肯了納仰本縣將欠數多人申軍㸃追别有行遣桂陽軍勸農文照對守令勸農國有常典循習之久但為空文當職以里巷通曉之言勸諭汝等開具下項一閩浙之土最是瘠薄必有鋤耙數畨加以糞溉方為良田此間不待施糞鋤耙亦希所種禾麥自然秀茂則知其土膏腴勝如閩浙然閩浙上田收米三石次等二石此間所收却無此數當是人力不到子課遂减奉勸自今更加勤勉勿為惰農坐視豐歉一門房隣里切須和睦莫與爭訟界至田塍各據永業火下牛畜迭相借助少有言氣且務休和才到訟庭便妨日子况復般褁倍有勞費假如有田十畝嵗收不過十石供輸之外贍養良難豈宜因訟耗財自取狼狽一了納租稅務在及時今來受納倉場並是當日給鈔銷簿如有農家或將銀米憑托攬子鋪戸等人須是便取去赤鈔為憑不可信受手㑹白闗之類所慮攬鋪兠收過已致作掛欠正當農務忽被追呼一陂塘水利宜從古來上流下接公共分使若甲家占吝害及乙丙群聚爭奪甚者到官期集隣保追逮證佐動經旬月方得事明本欲獨得便宜却被兩相妨廢一生借種粮貧者不免先須量力莫據眼前借貸太多債還不易及至空窮却謀昏頼所是富家亦合量本收息除豁積欠難以逓年登帶恣為貪婪若貧者昏頼不還富者貪婪已甚日致興訟罪有所歸即非主客相資隣里相保之道一此間典買産業或瞞昧卑幼或不儘問親隣或因抱種交業不時或因白與投印違限之類縁此無頼等軰執占爭論先自蒔種徑行收採比至到官惟憑契約往往得産之家雖用見錢反以違法失理遭罪請自今遇有交易子細審度凡渉前項數端之類幸勿向前以貽後患一此間多有無藉之人告人絶産及至到官或有恩養子孫承代或有吐退近親遺囑其初官司未知來由須至行遣甚者抄估比至給還動經年嵗以此失業深屬可憐除已行下諸縣自今如有的是絶戸即仰都保連名結罪保明具申方與受理自餘勿干渉人妄有告訴重行科斷一諸縣夫逓除是般輦綱運錢米雖當忙月亦或不免其餘雜役宜且暫停如官司差使重疊或無輪次苦樂不均及承行等人取乞掻擾廼至應干賦役有妨農蠶使汝失所並仰陳訴右仰汝等逓相勸諭務在遵從庶克有年毋令後悔止齋集卷四十四欽定四庫全書止齋集卷四十五宋陳傅良撰祭文祭
