body:
  text: 律詩桂陽勸農雨耨風耕病汝多誰將一一手摩娑幸因奉令來循壟恨不分勞去荷蓑凉徳未知年熟不微官其奈月樁何殷勤父老曾無補待放腰鎌與醉歌九日奉呈同僚四絶句澤國重陽花較遲得花雖闕二字愁余家家人醉鷄豚社獨對西風憶鱠魚小雨廉纎僅滑泥强隨年少更攀躋欲慿最上浮圖望晚稻如今齊未齊臨風遮莫晚山佳自古功名看鬢華幸自不知余種種可教容易落烏紗領客山危亦既懽故人往往去歸班明年此會知誰肯為上吳山望楚山教授將赴闕簽旬亦旦夕解官郴守丁端叔以九日詩至次韻奉酬十年不見尋常事九日相違咫尺間橙蟹渠能追勝賞藙牲孰與奉慈顏逝將酒坫更酬酢乍可詩筒略往還新將適聞臨遣罷鹿頭吾待望吳山丁端叔和九日詩至用韻奉謝恤鄰之義且申前請壯不如人老更遲可憐赤闕二字宗余鄉微膚使賢方伯誰激西江活鮒魚生怕遄歸趂紫泥緣危方藉得同躋交鄰誼與春秋並應許臧孫數告齊夏畦不病晚穜佳哿矣將詩補黍華散百為千吾冩似深山窮谷徧籠紗不因與國近交歡氷齒相從髮已班多見長才無肯綮豈辭一簣竟為山再用前韻簡丁端叔乞鄰亟只報何遲愁絶飢甿一勝余上有加飡下相憶莫同汎汎寄雙魚閉關饒看一丸泥我亦前扳更後躋四海弟兄君看取苛風不斷鴈行齊事到難時意轉佳聲名早已動皇華撥煩自古書生短只合横經住絳紗繇吳入楚共悲歡懐欲班荆竟未班直待還艫願銜尾洞庭彭蠡浪如山和丁端叔竹梅二詩韻端叔於庭前對梅柏竹八竿空堦琤若下琅玕全楚何人巧耐寒誰伴八龍長傲雪蕭然一榻卧袁安管領春風别有天不論水際與山巔祝融玉立湖湘凍獨付寒梢笑粲然丁端叔送牡丹以詩來用韻酬之覺省他年見一班老從湖海看春頒瞻言百里幾相及仰止髙山竟莫攀每事乞公留上策不才容我著中間一時公論方當路愁為絲麻棄蒯菅客來談政已班班况復書縢一再頒亦欲頡頏相上下不容分寸得躋攀花猶河洛承平闕詩在黄陳輩行間簿領役人塵撲面沃如雲霧下茅菅和丁端叔歲晚書懐韻來涂藍縷雪埋人三百於今又六旬奏課定應書下下班春聊復喜津津餘蔬被壤農無恙茂草連扉盜自新曵杖鹿頭時極目炊煙齊起兩州民丁端叔送海錯以詩來用韻酬之澤魚山豕各忘年味可勝窮總所便堪笑荆吳相俎豆遂令蠻觸自矛鋋食無誤蟹車同軌貢不徴蚶澤漏泉我在窮山人迹罕亦蒙惟錯饋甘鮮酬王判官和九日韻一以歸徳於部使者二寄郴州使君三以為謝四奉畱也皇華六轡按倭遲博採參差到接余詩注荇菜接余也我獨内慚無具甚萬家亦免釡生魚想懸郴桂一雲泥夫子聲名正日躋乞與蚤移河内粟牙牌歸德報班齊翩翩公子一何佳銜命窮山薄歲華獨自把將詩過日不知梅影下牕紗懐自何年晚見懽匆匆惜已闕聲班青芻白飰吾何有風月猶堪倒玉山戊申臈桂陽喜雪月不能明雨却稀山容野色夜輝輝清霄下際雙瓊闕仙仗前驅萬玉妃亘古嶺旁冬不到從今湖外嵗無饑來年此日吾何適蓑笠寒江一釣磯再用喜雪韻一以書懐一以喜客南人見雪古來稀見只愁吟草木輝留囓氈毛窮漢使説開圍角老胡妃我嘗豪健能無褐今已衰遲要不饑北望鴈門腸欲斷春蒲空老舊漁磯瘴雨蠻煙此後稀山童亦與借餘輝爭看狂穉相呼喚下啄饑烏自匹妃苦乏貂裘堪夜永喜無蝝子着冬饑興來那况山隂客為我扁舟倚石磯題范秀才萬卷堂雅尚時相背幽棲我數過兒應看客慣田孰與書多自析唐郴縣誰聨漢甲科儒門今有此天意定如何和段君仲衡同令嗣天晴少出之作文字時高下功名勢去來誰人堪語此吾道竟懐哉攜幼安容膝廵簷笑索梅巷門通後圃今數為君開陳頤剛注孫子許拾遺贈詩用韻寄之千帆過盡獨舟沈玩世齁齁踵息深何自著書今白髮不禁戀闕此丹心詩來滄海珠盈把人在掖垣梧十尋應為一編三致意細論小雅到交侵和段仲衡譙樓新軍額二首潘帥德鄜為書軍額以立春日揭之筆落元戎重詩成坐客新譙門雙壯觀邊將一團春夢破盤行玉名存甕得銀桂陽因銀置監今無復有衰遲亡補報著意與民親寒消晴後雪光轉凍前風嵗已宜麻麥人猶厭芥菘樓頭千里望筆勢萬夫雄及此吾何力天低露草豐和蕭俊仲司法詠譙樓新軍額韻海濵驅馬過湘濵喜及今春憶舊春公燕有時令市酤村舂不繼待炊新嚴城鼔角留三字當代衣冠第一人看取吾民繇此去萬家雞犬永無塵送洪子端還鄉子端丞相之孫將相三陳後文章兩漢餘英標還有此天意定何如海内相離合年來半毁譽未知貪尚友孰與鄴侯書送吳徳夫嶽麓樓頭卧湖湘眼底空聲名無處著容止與人同白髪何多日輕帆不待風脩門春漏淺封事倩誰通楊伯子以其尊人誠齋南海集為贈以詩奉酬辱與門牆最不遲白頭方誦嶺南詩文從嘉祐今三變人在廬陵此一時細數儒先能幾見獨憐嵗晚欲何之瀟湘直下長江去得望蓬萊却更疑潭帥潘德鄜生辰落南添得黑髭歸歸與相忘草木知嶽麓沈沈秋柝靜湘波穆穆夜帆遲人間公論今何在柱下家聲此不疑徳鄜乃子賤舍人之姪但欲公年如衛武為留淇澳變風詩衡守劉子澄以詩來和韻奉酬曵裾朝路不同時謀食衡湘亦把麾一見相忘光可鑑十年何在惄如飢力堪扶世將誰可語不驚人或自危夜雪埋山江欲凍依然春信在南枝遊南嶽天作之山曷為哉遥知閶闔正南開兩川文武長江下百粤車書五嶺來柴望乆為周墜典牢愁多見楚遺才不知崧岱還何似我欲將書寄鴈囘登祝融峯喜霽仰止扶藜鬢髪蒼恰當風雨暗三湘為誰一闢天無際及我重來日未央江過數州多曲折山緣長畝半青黄老僧耐得從頭問問到吳門竟渺茫和沈帥持要張漕季長韻二首欲杭一葦近聲光恨不先期燕子凉舊學甘盤聊此日倦游司馬尚他鄉别從滄海山横斗謂别沈扵永嘉華葢山下來自岷峨水濫觴不謂偶成三楚客得為蘭杜附諸香麾節元戎祖席光晚風吹雨借初凉師傳問訊誰書院石刻摩挲是道鄉聞有先聲來召馹想無後㑹到流觴路朝正設横經席冊府重紬辟蠧香送沈帥甘盤夢不入高宗四皓莫知其所終傅野有人能論學漢庭無事可言功行蔵於此嘗成趣談笑從今得退公分付諸兒理民社宜休堂上聽休風攜客過王提舉園訪梅劉連州以詩來因用其韻屋後雲梢萬箇長屋前風蔓一川芳有梅自索廵簷笑無酒還酤踏雪香偶與三劉同下榻却懐二宋對持觴是日同集劉連州景晉父子及宋伯華也坐客皆懐伯潜故云伯華伯潜宋景文公後冩將詩句吾何敢欸乃聽人汲曉湘再用前韻簡劉連州吳楚相望路阻長我來邂逅挹羣芳人如盤谷元非隠詩到孤山不道香每與盍簮移永日更須篝火及餘觴何湏誇去東州説不學藍關獨弔湘小詩為張漕壽一春苦雨張漕行部謁嶽祠而霽是日登祝融皇華散作九州春老穉闕二字夾道陳韓子莫愁今夕雨甫侯元是此山神我雖載酒闕二字筭孰與將詩附不泯他日中興編小雅若論孝友更誰人謝司馬倅惠東坡竹石出自坡翁餘百年傳之温國子孫孫兩家文物來歸我便盍投簮去杜門和趙帥俊臣壽張漕韻二首但得桑麻徧楚間此心不在大夫環落花流水深春好畫㦸清香永日閒英蕩偶來成勝賞萱庭孰與奉慈顔正應得句尤奇傑可繼淮南大小山使者耕時出省春聨翩珠玉又前陳先聲所暨摇山嶽落筆相豪泣鬼神嘉與九城俱晏粲訖無一事尚棼泯獨慚衰惰歸何晚亦著中間作廩人題耒陽黄宰詩卷詩卷來何處棠隂日夕佳令人添白髪及此有黄花事業誰千載文章各一家何時定還闕解柂向長沙送黄元吉陸子静門人荷君來意固非輕曾未深交意便傾語到七篇無欠少學從三畫已分明每懐前此傷標置頗欲從今近老成為謝荆門三益友何時尊酒話生平懐歸丐祠久矣懐歸曷月哉冠纓吾欲濯吾埃天寒病馬尚逺放日夕罷牛宜下來名家翰墨書還蠧蓋世功名骨已苔孰與東籬訪黄菊柴門終不為人開送范東叔歸帥潼川楚山黄落洞庭波背却鷄人問釣蓑歸思甚于三峽壯才名空自十年多曩游記得青燈在後㑹愁如白髪何我更有懐言不盡故將短韻代長歌送丁懐忠教授象州二毛羈旅久一飰瘴鄉輕把酒時相屬令人意自平校官無簿領帥閫甚聲名應仲實帥廣西所恨冥冥雨梅天不肯明長沙臈月雷是日約宴趙帥俊臣聞雷乃罷越三日雨雪帥喜以詩相賀用韻酬之民欲遮留上欲來時長沙民數數投狀乞留趙帥而廟議欲召還政聲無間到輿臺道迎和氣收蠻瘴彈壓餘隂蟄楚雷已是因風成柳絮㑹湏逐馬見銀盃一觴好上公堂壽不為梅花昨夜開又和沴氣反平聲為和氣來長沙千里一瑶臺新炊頓頓匙抄玉熟睡家家壁撼雷天直於人如合券公應憐我欲停盃向來韓子誇精禱雲合衡山特易開趙帥復賦詩來用韻酬之天水交光地欲無中問老子獨軒渠一蓑漁隠真堪畫萬玉龍驤不可屠已卜菑畬何幸甚却憐藍縷更愁如莫將此惠長私楚好上甘泉扈屬車用韻詠雪簡湘中諸友夾湘而住一塵無不在瑶池在石渠氣盖松篁誰與競令行螟自相屠山光際水天無間夜色通朝月不如中有一翁鬚皓白蕭然野鶴亦乗車贈張孟阜絶句燕坐何曾論古今束書髙閣反求心若能領會無多子絶勝相從嵗月深用趙帥韻為孟阜解嘲恨無毫髪老波瀾世有曹劉亦後班堪笑燕人夸璞腊欲隨圭璧上三壇登祝融峯觀日出星月凋零萬象昏誰能先我見朝暾東南已得乾坤正蠻貊方知夜旦分但覺滄溟浮佛屋却忘衡嶽近天閽迢迢下憩山腰寺人世煙雲尚吐吞舟中奉呈趙帥一首且速迎侍相與滿嵗曷不放言追鵬賦豈無幽思續離騷去年比屋餘三釜周禮用鬴字昨夜沿江長一篙白髪豈曾緣吏役青衫那更有兒曹魚軒肯為公來否相約春光訪蟹螯除浙西憲舟過釣臺有感一再登臨萬事非裹頭還已雪垂垂敢論筆力今無恨欲附碑隂始不疑臺閣有人堪共政江山如此且随宜論功漢鼎吾何有自是風流百代師止齋集卷六欽定四庫全書卷止齋集卷七宋陳傅良撰
