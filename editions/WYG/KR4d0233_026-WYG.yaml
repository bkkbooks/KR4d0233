body:
  text: 奏狀劄子辭免再除起居郎狀温州遞舖傳送到尚書省劄子一道七月八日三省同奉聖㫖陳傅良依舊除起居郎兼權中書舎人令疾速前來供職臣不勝螻蟻之誠仰干宸聽恭惟陛下因天人之心應帝王之運屬壽皇之喪紀以聖父之倦勤禀命慈闈嗣服大寶雖舜察人倫武王逹孝孔子聖之時春秋變之正無以過此宗祀幸甚天下幸甚臣偶縁末學嘗備勸誦潛飛之際攀附何榮而首被明綸趣還舊著維新之命獨先衆人豈臣區區所敢當此況臣立朝屢年曽乏涓埃之補幸䝉上皇矜憐齒髪將近朝露放還田里俾全晚節而陛下顧以簪履之舊尚欲使令此臣所以踧踖不遑須至控免伏望陛下察臣平昔素非矯飾念臣衰遲已是頺惰特收誤恩以示初政臣不勝祈天望聖激切屏營之至辭免中書舎人狀准温州逓到尚書省劄子一道七月十三日三省同奉聖㫖陳傅良除中書舎人臣聞命震驚罔知所措臣竊惟古者設詞令之官初意不過以人主勸懲罷行之政既與二三大臣共决之矣至其播告發明寫之簡翰則茍能言者皆可使奏伎於其間不必人主一一親也久之而言益行官益重蓋命令之有不當於人心者輙得封還始與聞政矣至於本朝遂與諫官御史給事中三數人者最用事如是其人少不稱職徃徃能為天下患不但言語工不工也恭惟陛下龍飛急於審官方將博求天下俊良而如是官者尤所當謹擇也如臣學術荒落重以衰惰獨柰何先天下士玷此選也以為潛藩之舊則示不廣以為攝官久則嘗不善於其職矣是皆不可矧兹維新之命夷夏屬心不宜除授令人竊議臣所以不憚煩瀆仰干天威伏惟思詞臣之重守家法之嚴而先衆俊謹新政特寝誤恩昭示中外不勝幸甚再辭免狀右臣昨具奏辭免新除中書舎人恩命事今月初九日准尚書省劄子七月二十八日三省同奉聖㫖不允者恩深感極豈敢固辭伏縁臣昨來所奏文字意指姑為陛下誦辭令之匪輕明舉措之當謹而未嘗及臣進退之義是以天聴未回俞音不下須至煩瀆再輸懇悃臣聞潛邸舊臣號為攀附其侍御使令之人耶則不過奉命承㫖故其人志在恩寵但以畏謹避權不預聞外事為義其切磋講習之人耶則嘗敷陳治道啓廸心術矣故其人志不在恩寵而以不徒空言欲見之行事為義二者甚不同也臣愚不肖不謂遭際備數勸誦凡向者反覆言之正有望於今日陛下誠尊所聞誠行所知以此答天心以此裕民力則萬世之下臣與有榮耀焉即雖不在左右死且不朽況陛下以睿哲之資日進不已加以方今百官之富非特徃時二三僚佐之比如臣陳言不足施行陛下誠斷自今博求俊良與圗新政将所聞益髙明所知益光大矣即臣雖不在左右亦死且不朽茍惟不然皆恩寵爾况臣以休致之餘動關物議又與見在職者事情不類所以不敢冒昧於一來也所有省劄臣未敢祇受除已具申尚書省外謹録奏聞伏候勅㫖辭免兼侍講狀臣昨准尚書省劄子備奉聖㫖除中書舎人方具奏辭免次又准省劄八月六日奉聖㫖兼侍講臣正聽候前件指揮故更不辭免兼職今臣已廹威命前來供職所有兼侍講職事難以冒處須至懇祈冀回淵聽伏念臣向事朱邸備數勸誦方當陛下潛龍勿用之初不過講明為人臣為人子之道此則臣素所肄習者也夫惟素所肄習尚堪勉强故閲嵗月幸無罪悔若夫路門經幄事體絶異蓋非政事之臣而欲致其主於唐虞三代盛帝顯王之業凡所敷陳必至徳要道急先之務一話一言稍有悟合則天下國家隂受其賜非徒指摘章句累次篇帙而已也然則如臣豈足堪此且以孟子名世之才猶自謂未學諸侯之禮房杜亦王佐也而不能奉禮樂之對由此言之茍非所習雖聖賢不可以强如臣之愚實非通識重以衰晚無温故知新之益今謂臣嘗為儲君講矣當能為天子講臣誠不敢自信也臣不敢自信而過使令之陛下眷舊之恩則厚而臣不知懼是但貪寵也又况府僚限員固難博擇今陛下有百官之富賢俊林立欲求多聞豈無他士何乃眷簡獨私舊人所有上件兼職欲望聖慈特加謹重改授在廷鴻博之士庶有裨助伏候勅㫖十月五日奉聖㫖不允辭免兼直學士院狀准尚書省劄子奉聖㫖陳傅良兼直學士院臣聞命震驚莫知所措伏念臣以平生辛苦之志非不欲以文字得名以垂老攀附之榮非不欲以論思圗報既居西掖又直北扉豈非臣之所甚願哉重念臣少多憂患早以衰疾蓋年未六十而齒牙脱落鬚髪皓然終日强餐不能杯飯未昏就寝畏見燈火以此聰明銷退徃徃善忘况自比年迭為二史脚力疲於久立心事困於直前常恐一旦溘先朝露幸䝉上皇放還田里臣自謂得長徃之期更生之幸矣陛下龍飛首加收召一月之間除目三下臣伏自思念有君如此雖使髙人隠士影響昧昧之人猶當興起奉令承教况臣嘗備官僚久辱使令最䝉眷遇者乎黽勉此來實出感激然自再入修門故疾輙作謁告彌旬職事俱廢又適當郊霈之後覃轉封贈數倍常時詞命填委㡬以百數日不暇給下筆甚慚故臣區區方欲稍遲數月以承天意别求一官以便己私不謂陛下驟寵異之使兼内制臣恐自此顛隮無日矣何者精力不足則必有弛慢之患思慮不强則必有闕誤之患假使隆寛不以為罪而書問之不酬請謁之不報亦必有不理於口之患此臣之所甚懼於顛隮也茍至於此豈是陛下全度之意臣愚欲望聖慈察臣悃愊實非飾偽曲垂淵聴將上件兼職特行寝免伏候勅㫖閏十月五日三省同奉聖㫖不允中書舎人供職後初對劄子臣聞人主有大舉動必有以新天下之耳目而大慰民望恭惟陛下始自宅恤移御廣内此大舉動也正天下顒顒望治之時伏想聖心先定将有仁聲徳意之事感悦士夫兼被黎庶者矣臣不肖輙有管見一二仰裨聖明惟陛下裁幸一乞三宫各置使領以盡孝養之道一乞降詔問民疾苦仍申儆見行賑濟州縣官吏諭以賞罰一乞自宰臣以至侍従管軍次第宣引従容賜坐訪以軍國機務以示責成之意一乞撫問㳂邉諸将并帥臣仍量加賜賚一乞増置諫官一乞收拾恬退滯淹之士一乞稍出内帑錢以助版曹經費少寛催理已上特臣區區愚慮所及未足以廣宣主徳如䝉采納見之施行則嗣此有樂告陛下以治安之䇿者矣臣不勝拳拳取進止第二臣聞今之獻計者類曰陛下宜以孝宗為法太上皇為鑒臣竊以為是説也惟孝養三宫當如此耳而非通論也何者孝宗盛徳大業不可勝紀固皆足法若夫上皇徒以積憂成疾浸不視事不可以為宗廟社稷主而非其治皆無足法者也陛下嗣守丕圗凡所施設誠参酌兩朝之盛典擇其為天下後世便者兼行之則可謂集大成矣臣淺陋不能盡識兩朝之意輙以管見條上一二恭惟孝宗鋭意恢復耻於茍安雖以徳壽在宥不敢北伐而追懐陵廟閔念中原之志枕戈嘗膽日不遑暇訓練儲峙常若臨敵此一可法也早朝晏罷寒暑不渝引見臣工省閲章奏日了一日勿問休暇至於暮夜必宣召入直官賜坐従容議論時事此二可法也留意人才求之如弗及一語契合立致通顯所言不酬始督過之取舎以公明白洞逹而無猜慮關防之意此三可法也儉於用度一金不以濫予内帑之積累數鉅萬惟是賑荒右武無所愛惜蓋以天下之財為天下用而不用諸已此四可法也監司帥守見辭之際各訪其處民間利病有以便民為請隨即施行蠲除貸宥曽無留難未嘗輙怒官吏獨以貪虐獲罪於民者必罰無赦此五可法也臣以為孝宗之治可為法者非一而陛下宜法此五者帝王之盛美也恭惟太上皇無事付之外庭采於公論左右便嬖絶不預政不惟不聴其言又禁切之而金繒酒食之賜則不吝嗇此一可法也八廂渥土之人置而不用未嘗以浮言危動羣臣此二可法也行都守臣兩浙漕臣三總領所悉以士人為之不以交結不以誕謾此三可法也管軍臣僚及沿邉帥守不以為御前差遣皆従三省降詔除授此四可法也給舎封駁臺諫論事雖累上迫終不以言為罪此五可法也臣嘗謂太上皇之治可為法者非一而陛下宜法此五者亦帝王之盛美也陛下誠上稽孝宗明斷總攬之政兼體上皇隆寛不自用之意則天下可得而理矣臣所謂集大成者以此蓋奉偏而補其弊則能全兩朝之美矯枉而過其直則反有一偏之患臣恐議者不察妄分取捨以惑聖聰敢昧死一言唯赦其狂愚而采擇之則天下幸甚請對劄子人主心術必有所尚何謂所尚先定其志而後力行之者是也臣不暇逺引前古且以髙宗徳業為陛下誦之方髙宗艱難百戰之初欲復大讎欲定中原欲還謁九廟則其志尚在恢復及大母已歸徽廟之梓宫已還南北之勢已成髙宗之責少塞而天下亦倦於用兵矣則其志尚在和好方志在恢復則用趙鼎用張浚自退朝之後延見臣下省閲章奏㳺戲翰墨至於燕私皆恢復之謀也及志在和好則用秦檜自退朝之後延見臣下省閲章奏㳺戲翰墨至於燕私皆和好之事也髙宗所以享國之久動無過舉者以有定尚不雜不怠而已雖然此臣借以為喻之説而非勸陛下之説也今陛下春秋鼎盛鋭意於學而又聖禀純素絶無嗜好臣竊以為陛下之心方如止水方如明鑑以此為堯舜以此為三王無不可者臣獨未知陛下之心所尚者何事欲先定者何志耳不尚一事則将並進人之言而無適從不先定一志則将汎汎然日復一日而無用力之地且夫人主天下之利勢也富貴尊榮之所自出也倘陛下将聴並進之言而無適從汎汎然日復一日而無用力之地臣恐有乘間而入陛下之心者矣陛下此心方如止水方如明鑑可以為堯舜可以為三王或萬有一先入者得陛下之心而用之臣恐陛下聖明雖鋭意於學無他嗜好而此心已有所偏尚也此臣私憂過計欲勸陛下且以拯民窮為所尚此志先定則陛下始有用力之地自退朝之後以此意引見臣下以此意省閲章奏至於游戲翰墨至於燕私此憂此念造次不忘臣竊以為是亦陛下養心之法不雜不怠充而大之堯舜三王之治可由是而致也何者以拯民窮為所尚即是仁心仁心即是堯舜三王之心孟子嘗言之臣嘗發明之陛下嘗深信之矣第二臣竊謂今天下亦多故矣臣未暇縷數獨念民力之困於此為極而莫與陛下救之者耳賢士大夫不為不多曽莫與陛下救斯民者何也勢不行也何謂勢不行欲救民窮必為帥為漕為總領而後可而三數官者雖賢士大夫不樂為之故也既曰賢士大夫而不樂為帥漕總領何也外權太輕雖欲有所設施而不得騁故也是故不為法令之所束縳則為浮言之所動揺不為時政之所諱惡則為宦㳺於其處而不得志者之所中傷有是四患雖賢者亦忍事茍嵗月耳而况其餘人乎且夫人情誰不喜遷而惡滯誰不好伸而耻屈誰不趨利而避害今也立朝自郎察不一二年可至卿監闕九字又不一二年鮮不得為從官若夫帥漕則有奔走徧天下而無一日朝蹟者其間僥倖或得監職自直閣積而至修撰極矣而所謂修撰者又必嘗為卿監而後得之是終身無復従官之望臣所謂喜遷而惡滯人情之不樂一也今夫立朝茍有親故欲入館閣則可以移書帥漕若總領而坐取之無不如意者至為帥漕連銜剡牘奏辟一屬官若准備差遣之類輙不可得若平工也則不過送部勘當訖於陸沉若稍有過差之請徃徃該部詰難回復甚者至被論列臣所謂好伸而耻屈人情之不樂二也今夫立朝自釐務職事官皆得以親族子弟牒國子監補觧試及監司帥臣茍非在川廣二千里外即子弟無收試之所毎遇大比無所附着稍知謹畏者大率無故而殿一舉不然則為謬巧遷就以避貢舉條制斯可矣臣所謂趨利而避害人情之不樂三也如前四患則是事權太輕雖賢者猶不樂為之如後三説則是恩數太薄人人不樂也夫可與救斯民者必帥也漕也總領也而人不樂為之至此奈何憚改乎臣竊以為今日之勢莫若稍稍重外重外之術必使帥漕總領皆可馴致於從官可以馴致於従官而後可久任可久任而後可責事功如此則帥漕總領始曉然知朝廷委寄不輕矣則夫前四患者次第自去而有為陛下出力救斯民者矣乞放身丁錢劄子真宗實録大中祥符四年秋七月壬申朔詔曰朕臨御萬邦勵精庶政一夫不獲尚切於憂勞九賦用均唯思於寛簡惜其物力以厚民生眷惟浙江之區介彼東南之域而自祖宗恢復聲教誕敷去率斂以居多俾樂康之斯洽洪惟利澤已浹編甿然計口算緡尚存於偽制治財吝納仍限於嵗輸特俾蠲除式申曠蕩其兩浙福建荆湖南北路身丁錢並特除放如有元以錢折征物色亦與除放自如有以下十三字據福州法冊添入凡嵗免緡錢四十五萬四百六貫身丁錢不知所始臣伏讀御札則知其為東南偽制也本朝六路次第歸化所以加惠之者甚厚徃者婦人有之至淳化三年免見十月四日瓊州勅寺院行者有之至咸平五年免見七月四日兩浙福建路勅攝官有之至至道二年免見正月十五日廣南勅鹽亭户有之至太平興國元年免見九月福州路勅賃舎寄住者有之至咸平六年免見四月二日廣州勅死丁自咸平二年始與除放八月二十日杭越明睦台温處衢婺秀蘇湖十二州勅逃丁自咸平四年始與檢閣見七月十一日荆湖南北路勅又偽命日如福州毎丁三百二十五自太平興國五年定納錢一百七月髙象先奏請福州長溪有温台等州投過一千七百餘户二千餘丁每丁亦三百二十五自景徳二年定依温台州見納錢二百五十四月二十日劉炤奏請蘇州每丁納米自淳化五年定納錢二百見八月十七日蘇州勅睦州毎丁六百九十五處州毎丁五百九十四自咸平三年許将絹折納五月二十三日兩浙路勅抑見偽制各出一時頗亦不等前後勅命大抵多者使寡難者使易不宜有者使無而諸國苛斂漸趨於平至是廼一切蠲去與民更始天聖間侍御史章頻言先帝除放偽命身丁東南之區聖徳所被十六年矣放過錢七百餘萬貫而軍國之須不聞申匱乏可謂至論然臣又按實録明道元年三月兩浙轉運司言大中祥符五年已放諸路身丁錢而婺秀州尚輸如故廼蠲除之蔡襄亦嘗言偽命日諸州各有丁錢唯漳泉州興化三郡折作米七斗五升真宗皇帝哀矜困窮蠲放兩浙福建身丁錢其時漳泉興化是亦丁錢折變作米無人論奏因依遂至先朝大惠不及三郡以此見祥符放丁溥及六路其間猶有至今輸納者皆府縣占吝奉行不䖍之故推而廣之宜在今日恭惟陛下仁聖在上軫憂民瘼欲省賦甚矣間者斷自淵衷量减折帛之估有司以闕經費為言其議遂寝以臣愚見折帛固宜减不如身丁切於窮民且其為錢視祖宗折帛之估纔十之一而其為丁視納折帛之家殆累數萬緡陛下尋祥符之詔斷而行之幸甚止齋集巻二十六欽定四庫全書止齋集巻二十七宋陳傅良撰
