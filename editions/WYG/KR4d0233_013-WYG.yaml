seq: 13
front:
  text: 亦使人人曉然知朕嘉與之意則繼此盡言不諱矣尚殫厥心以副延竚可
  hash: sha256:87d8dab6e65337f8de2bba7c080124b49cac1a53124262dbc893700f4974cfc7
body:
  text: 湖南提刑孫逢吉奏邵州獄囚死者二十餘人守臣胡澄特展二年磨勘敇昔在三朝每嵗盛夏以一札賜郡長吏為奸獄丁寧也自長吏不奉此詔而吾民瘐死者滋衆爾某守邵亦以獄囚多死見察於部使者毋乃非朕寄元元之意乎貶損年勞以示薄罰繼此領州無怠臬事可文林郎邵州録事參軍柴璿修職郎邵州司理參軍李邠獄囚多死各特降一資敇具官某爾為獄官而不省囚疾苦至多瘐死非所謂士師不能治士者歟其鐫一階以警怠事可太尉定江軍節度使興州駐劄御前諸軍都統制兼知興州吳挺守本官致仕敇圖任世臣盡護蜀將貔貅十萬不從中覆盖五六十年於此矣此意安在哉而欲致其事耶具官某性有忠勇之資學有韜鈐之素寛我西顧賢於長城假以數年庶底丕績而一旦以疾来諗願上大將軍印綬此朕所以屏奏不省也雖然誦詩至於勤歸勞還詠歎辛苦則古者遣將數日即休未有以獨賢久勞若爾然者朕豈得不動於心乎姑徇忱辭使自休養若屬有疆埸之事强為朕起何以報我爾其勿忘可故太尉定江軍節度使興州駐劄御前諸軍都統制兼知興州致仕吳挺特贈少保敇朕誕膺聖緒渇想賢勞方分託重之權尚阻勞還之禮眷惟三世每興西歸溉釜之懐胡不百年遽有東首拖紳之恨可為震悼何以追榮具官某為今价藩視古名將本之以鷹揚之勇濟之以輻輳之才越在江源而不忘宗海之心既安蜀道而常為得隴之計是用倚以大事付之全師永惟王室之中興皆有世臣而後濟維周復古則召公是似之功維漢御天則耿氏獨隆之力期爾晏嵗對于昔人曽諗疾之亡何而告哀之已至朕方深念莫起於九原國有常儀率加之二等肆頒渙渥以慰沉冥晉陪亞保之班配食先王之廟噫有以勇爵至於聫左棘之華雖云愍章足以示前茅之勸可持服前武功大夫祁州團練使吳曦持授濠州團練使起復敇具官某有金革之事則三年之喪無辟自伯禽以来未之有改而況爾曦世為將乎移孝為忠朕所以强起汝也又況蜀師十萬聽命爾家西陲晏然于今五紀方圖前烈宜及後人則脫爾於寄禄之階授爾以戎練之任豈以為利其毋固辭可提舉江州太平興國宮郭棣授利州觀察使致仕敇憫勞將帥畀以真祠尚復抗章勇於忘禄重違雅志俾遂歸休爰進崇階以勸亷退具官某奮自將種卓有俊聲薦更轅門晉尹環列累嵗於此六軍不譁方篤邦交久無疆事鬭士雖倍戰功不多然中權屹然大敵知懼繄卿之力簡在朕心所冀壯猷不忘王室胡為解組遽此垂車豈非以行百里者末路之難而三世功名道家所忌乎勉從忱請良咈眷懐尚服寵榮益綏夀祉可故利州觀察使致仕郭棣特贈寧逺軍承宣使敇聽垂車之請亦既永嘆聞易簀之言可勝遐想宜舉恤典以醻舊勞具官某自束髪之初有褁尸之志方其賈勇於宣威沙漠之間竟爾收聲當偃伯靈臺之後然而我有萬乗如周畿兵我有千廬如漢中壘舉以副托究其設施歴年彌長課効為最往者以厭直之請踐更干邊雖分州符亦以寄重反即祠館從其憚煩曽鳴劔之未酬何挂冠之已決朕方有感徳非忘杕杜之詩今顧不然乃是迫桑榆之景覽此遺奏為之䀌傷爰錫使名視唐留務以華身後盖國舊章其尚欽承用自寛慰可耶律古哩致仕敇有能厭氊毳之習蹈不測来歸我可謂壯士矣胡為諗疾欲自便乎具官某恥事朔庭義不攜漢觀光中國誓將滅燕盖夀皇之所寵嘉而朕待之勿替者也夫鳴劒之志未酬而挂冠之請已決豈以其兩國方歡賈勇不售將退處以自娛暇乎抑膂力既愆自視非昔人而不復感槩然也不然果疾病耶重違忱請聽致爾事若以疾辭則豈庸釋可耶律古哩贈官敇挂冠有請良惻余衷華壙有恩盖綏爾後具官某以幽燕任俠之氣懐江漢朝宗之心萬里来歸甚欲宣威於沙漠而兩君為好適當偃伯於靈臺竟爾收聲至於賫恨盖聞中外之分春秋所嚴有能擇衣冠於流蔡之間而顧執干戈於社稷之役眷此壯志令人永懐爰䟽錫命之封庸示飾終之典尚歆殊渥以妥英魂可正議大夫充顯謨閣待制提舉江州太平興國宮陳峴磨勘轉正奉大夫敇夫循次非所以待勞能也計年非所以處法從也而有司以告重違舊章宜有命書且見明陟具官某以名臣之子自託於儒生以夕郎之官踐更於州組奉祠累嵗益見靖共序進一官曽非特典朕不敢廢姑慰永懐可合州赤山縣多山至道觀沖妙真人祈禱感應加封沖妙靈應真人敇具某神朕雖不令祠官祝釐専鄉獨美至四方長吏有為吾民請曰某山川之神能惠其一方則褒崇之典朕靡愛焉以庶㡬古蜡百神之義今蜀部使者来言爾神惠及闔境求之掌故則建炎之所表章也爰錫命書申衍稱號所以寵嘉神貺以從民欲者何如哉尚終惠之俾世世享可潼川府中江縣靈威廟善利侯祈禱感應加封善利敷濟侯敇具某神朕雖不令祠官祝釐専鄉獨美至四方長吏有為吾民請曰某山川之神能惠其一方則褒崇之典朕靡愛焉以庶㡬古蜡百神之義今蜀郡使者来言爾神惠及闔境肅然古祠前修所敬吾民其嘉賴不忘也爰錫命書申衍稱號所以寵嘉神貺以從民欲者何如哉尚終惠之俾世世享可盱眙軍通判闕四字降一官敇具官某爾為通守適掌北門之管姦民犯禁而莫之禦顧欲歸罪於徼吏可乎其鐫一秩以為不事事之戒可武節大夫權發遣郢州任世安特轉一官再任敇具官某往時三邊吏不數易滿嵗無虞則增秩以寵之盖自建隆以来未有改也今爾乗障日有能聲爰進新階仍紓舊組爾其益固吾圉以訖外庸杕杜勤歸之詩朕豈忘之乎可從義郎權知思州田祖嚴特轉一官敇具官某昔爾以歸地進秩而有司繆誤仍年勞之舊貫於焉正名以示懋賞其服今命益見寵綏可履正大夫奉國軍承宣使提舉佑神觀鄧從訓主管國信所任滿無違闕特授宣政大夫敇交鄰之禮於今為重自束帶與賔客言至於凡執事皆所以覽示逺人以中國之有體也具官某昨長内庭甞發贄幣竟以明習曾無忒違隣好不渝亦繄爾力醻勞滿嵗懋賞崇階盖國舊章朕豈汝吝可朝散郎守司農少卿詹體仁除太常少卿十月三日敇具官某奉常惟禮樂是司而去古浸逺放逸尚多非得博物洽聞學有根據者未易輕畀也爾少明經術務為有用探賾索隠恥一物之不知總餉之久盖已由郎省而貳大農矣召對雍容効忠無隠其為朕典禮樂之事鐘鼓玉帛抑末也尚求其本而釐正之可朝散大夫尚書戸部貟外郎趙謐除軍器監兼權郎中十一月十八日敇具官某戎監之設本以嚴飭武備而休兵嵗久繕修之職各有司存長貳亦惟摠其凡而已以爾舊弼之孫克自抑畏久在郎省能寡悔尤序進為長仍攝民曹往其祗欽無替爾舊可朝請大夫起居郎兼玉牒所檢討官兼權中書舍人樓鑰除中書舍人十二月二日敇夀皇初策在廷之士盖極一時之選矣朕閱名籍得為相臣者二人焉樞臣者一人焉從臣而下以聲績著見者迨不可枚數也具官某於是時甞褎然為舉首而偶不中有司之度然至今海内士所樂道議論文章風流藴藉則未甞不在稱首也間者旁招時望寘之本朝爾以攝官屬筆能道朕徳意與其人才美之所宜文字之上下簡書之長短皆足用勸而僉言不同往往不奉吾詔仁者之勇見於封章肆用命爾為真詞掖除書之出國人皆曰賢詩不云乎假以溢我我其收之朕於是蒙夀皇得人之福矣昔者鄭為辭命終屬國僑唐掌帝制實先韓愈爾其懋哉稱此優異可額内翰林醫痊李九齡轉翰林醫効敇具官某天官之屬六十而醫命士二十有八人周家之重醫也如此矧爾服勞有以自見進之二秩視周命士往服明恩毋怠爾事可判太史局吳澤荆大聲劉孝榮周端友職事不謹各降一官敇具官某等東方未明之作挈壺氏所以刺朝廷也朕夙興待旦而五夜之漏聲不肅是誰之咎歟各鐫一官敬共朝夕毋以為星官歴翁而弗汝察也可秀州海鹽縣陳山龍王顯濟廟神母慶善夫人加薦福二字敇某神母朕既從二千石之言宏賁二子之祠維爾能與而子共福吾民郡人推本所自而廟食之可無寵嘉申衍稱號以大慰民欲乎可賜進士出身宣教郎趙善防係濮安懿王近屬更轉一官敇具官某策士于庭而吾屬籍有以文克列于丙科朕既異焉而問諸宗人則於濮園為近抑可嘉己申命一官以勸胄子爾其懋哉務自著見可宗子顯夫量試不中年四十以上特補承信郎敇某國家所以待屬籍至矣不得雋於進士則有量試不得雋於量試則有免試皆欲使之齒仕版習吏事也爾其勉哉以稱朕意可量試中宗子汝弼等八十一人補官敇某等凡有司考校之科甚嚴宻也而獨寛於量試宗子盖欲使之齒仕版習吏事稍涉於文墨而不求其備爾等盍對明恩思所以自勉哉可合格取應宗子時信等四十二人授官第一名補承節郎餘補承信郎敇某等有司考試之法至嚴宻也而獨優於宗室子夫既闊畧以取之而授官與寒畯等則非所以示公姑屬右銓以須器使可四川宗子師說等十人趂赴殿試不及並特補承信郎敇某等爾以宗黨越在西州甞得雋於有司而道阻且長弗獲與親策之選置而弗録朕心惻焉亦授以官庸示篤叙爾其懋哉可宗子師鈜量試不中依近降指揮年四十以上特補承信郎展三年出官敇某有司考試之法至嚴宻也而獨優於宗室子夫既優矣而猶不應令徙以强仕予之初官然必使為三年之淹而後筮仕用示篤叙不為苟私可宗子汝璺對策中間全冩御題首尾各用一段湊成特降一官推恩補承信郎敇具官某策士於庭而無以對宜不在第中以爾屬籍子而不求其備始命以官亦可謂茂恩矣可廣東提刑李信甫奏朝奉大夫通判徳慶府權英州張公盖失陷官錢科擾民戸特降一官放罷永不得與親民差遣敇具官某嶺表以去廷逺而吏不自愛往往淪胥而為欺削爾一秩且不得與於民社之寄苟自愛者繼此尚少懲乎可忠訓郎趙師湧在任不職南劒守臣楊祐按罷輒敢伏闕妄論守臣特降一官仍押送寄居泉州拘管敇具官某爾以屬籍試吏不自貴愛而見劾於州家亦既虧吾教矣詣闕自䟽復繆失實鐫一官俾爾省循可四川制置邱崈奏承直郎知叙州慶符縣魏良忠侵刻夷人又輕入夷囤致殺死廵檢程仲乾降一官放罷敇具官某夷人畏亷而服威重爾為邊縣不足於斯二者而致吾疆吏於死地免官鐫秩是不謂之寛典乎可知成都府邱崈奏從政郎録事參軍史定之不親蒞獄致囚自刎死降一官放罷敇具官某夫為獄掾而弗躬弗親幽枉多矣囚致於自盡特其甚較著彰彰者也免官鐫秩是不謂之寛典乎可文林郎婺州浦江縣丞趙大亨不遵依提刑司差委推勘公事輒申任滿離任降一官敇具官某士而不事事是欲素餐也爾方丞縣而再却憲臣之檄以自擇便豈非不事事歟按章来上姑鐫一秩繼今知懼斯可從政可知萬州季圭奏脩職郎萬州司理參軍向紹祖獄囚繫死降一資放罷敇具官某爾為獄官而不省囚疾苦至於墮指至於死而不以告豈非所謂士師不能治士者歟其鐫一階以警怠事可止齋集卷十三欽定四庫全書止齋集卷十四宋陳傅良撰
