body:
  text: 誌銘劉端木墓誌銘端木温永嘉人姓劉氏諱春以待台州教授闕卒於家大父機父立已戴氏出也端木性冲約事後母孝與兄弟無違於朋友親故用其情然所藴抱貴不為人知貌言恂恂若庸人然見之者以為亡異也其試禮部余嘗問所為文何如但謝不能已而擢進士丙科復謝是適然耳他日過括蒼端木為其州户掾問政何如亦謝如初比謁其守與郡之善士亟稱端木綜理之才所關白感風凡在官無及之者余與端木同入太學同為乾道八年進士議論往復最宻至相好也自其文辭政事不欲使余知之况他人乎顧端木亡矣意所欲施為雖余未得盡知之也世多言古今人不同以余觀端木與書傳間所載深厚有徳之士異耶同耶端木為吏三年守䝉其力然往往欲挑動之使自有言然後薦舉之近制選人滿嵗無舉主且再試端木即怡然將詣吏部而竟不言比其視古人特未知孰難也斯人也而在髙位則士或知耻矣少得疾良已比罷司戸時疾復作明年淳熙七年閏三月某日卒年四十五又明年六月某日後母吳氏夫人卒初娶朱氏某州司理叅軍某之女逾年卒再娶宋氏故御史臺主簿敦書之女生一子小趙抱而養之於其父黨今幾嵗十年閏十有一月某日宋與其伯氏奉吴夫人與端木之柩將祔於屋前山之祖壠卜人曰未吉遂殯焉宋氏之弟昌國主簿某能左右其女兄於是殯又能前事請余而為之銘銘曰有相其孤系豈不昌有刻其墓名豈不長位若年耶誰尸此者天耶陳子益母夫人墓銘陳子端已自平陽將父天錫之命來再拜乞銘其母林氏余方銘亡友劉端木未暇也廼即館中越五六日請不已頃嘗過陳子之家見其父子兄弟少長坐立進退秩秩然無疾呼暴語無弗友之色於是端已請辭曰母氏歸為冢婦逮事曽祖姑奉諸祖母以同居祖行無在者又奉吾父與世父母同居凡五十年矣一佀先生鄉所見然敢以是為銘首余曰吾得銘而母也婦徳莫如睦睦莫如能長久而母處三世之族且六十有四年而家人無改於其舊合二難矣德如是人謂之何銘如是人謂之何陳子再拜謝幸甚其𦵏日淳熙十年閏月某日其地所居萬全鄉管奥之葉原其壻朱次宣子明畏端已彪也端已從余學彪為比邱林民達墓銘民達諱悦姓林氏温瑞安帆遊人祖考諱伯英考諱植妣孫氏娶程氏享年七十卒於淳熙十年六月癸卯男三人開聞誾女適章紱孫男女八人聞早卒程氏亦先十有四年卒初民達𦵏程氏於所居里之椒原已而遷茶原遷𦵏之十有九日而民達卒開以其年十有一月丁酉合竁於茶原而來乞銘銘曰民達善治生嘗為余言少遭父喪一日傭者數十軰立門請所使久不能遣吾内慚於是夜為條處而旦授之日力半而功倍以故益矜奮志亦浸長盖民達治生以惠為取以華為儉以善忍為斷童僕鷄犬養之各得其欲樹木蔬蓏藝之各遂其宜亭榭門巷藩溷井堰治之皆中繩墨也予鄉之言生理者歸焉嗚呼士習為浮辭以干有司之試茍中其度即得為官人予之州縣輒不理吏卒搶攘莫能整齊向使不限科目以能見推擇如民達者陳力於世曷可少哉民達余里中人也計天下之大不但如民達者何限然而世常有乏使之患余所以惑也州城之南距瑞安為路七十里土石墊陷行者病溺更太守數人欲繕宅之重其役不敢起民達慨然夷十里所以為式庶幾當官者見知有氣力者相随和以自托不朽而亦弗就余讀太史公書至閭里布衣之士有節可以見世而不遇者皆録勿遺故余之銘民達者如是云何君墓誌銘初東萊吕伯恭以經學教授天下之士靡然從之而其所居鄉諸生能自表見者為多吾宗同甫又嗣興之繇是東陽學者視他郡盛矣有何生造者與其族師說一日以謁至余望見生容止恂恂其東陽學者耶與之語出同甫所遺書果道生之父善教子逮事於伯恭甚久造適遇述則皆從邵康佀之學佀之之學盖亦本吕氏書又言逮至今能卒乃父教事諸咸受其兄教令為學不懈如父在時古者重師友不以其關繫風俗如此哉生以將祔其母杜氏夫人於父之墓既得銘於同甫而以追銘其父來請余余雅不善為銘且杜氏之銘併著夫君行誼甚美雖欲銘之必亡以出同甫之意外然既喜得生又聞知其鄉學所從來於吾心有感也而次之君諱松字堅才曽大父滂大父粹中父汝能何氏來徙婺之金華盖不知若干世而家東陽者於君四世矣以善輯柔其鄉大姓積貲至鉅萬享年四十八於淳熙辛丑八月壬申卒越二年得癸卯十月己未𦵏於縣松山鄉寳山原五子女四人壻郭江鞏嶸餘未行孫三人娶杜氏後君六年卒於是祔以君才力曽不得嘗試於世其平生不可得詳也余聞志莫難行於家名莫難著於鄉如君之内事治與學士大夫無異不但整齊之詩書之習藹然其方興也斯不謂行於家乎入其國欲知其人顧衆所尊信者與否何如爾同甫數數為余言宜銘斯不謂著於鄉乎以此可以觀考其餘矣銘曰相爾同穴有美不亡以余銘君豈亦可長朱公向壙誌初平陽之俗以速𦵏為不壊而其流入於隂陽家之說與治賔客之事俗成則聞見熟聞見熟則異焉者乃反以為怪故雖知名之士不能免也隂陽之說余不知起何時而知其不出於三代也王季之𦵏也水齧其墓見前和而後改𦵏重動危其親也如此由今隂陽家言之不祥莫大焉而王季子孫皆聖人也子孫聖與愚隂陽家固不論然造周數百年其不得為不祥也甚著若必曰改𦵏而後有此則文武之生久矣其造周不待改𦵏也又甚著且三聖人者不知水齧墓之為不祥而不速改是不智也知其為不祥必見前和而後改是不仁也聖人慮不及此焉而今日者曰吾慮過聖人是果足信歟然而舉世惑之何也彼委巷之民怵於其言者妄以其親徼利然也學士大夫豈忍以其親為利而惑焉者又何也吾友朱黼使來告𦵏曰某先君子以隆興元年某月日卒祖妣以乾道二年某月日卒而二伯母伯兄若弟卒亦若干年矣今為淳熙十有一年某始克以十有二月庚申𦵏祖妣於邑施巖之西原以先君子祔去墓百歩得中嶼又以𦵏諸母兄弟凡四柩黼也大懼不克如禮經惟先生寵識銘之以免於罪又曰先考病且革有以上世墓不利請遷者先君泣禁之曰暴吾親之骨於地上而茍得活吾弗如死也又曰王母之治命曰而父生能養死不可去吾側他日𦵏我必以而父祔黼之言云爾誠如黼言其王母以祔𦵏為是茍祔𦵏雖死樂也其父以遷𦵏為非是茍遷𦵏雖生不樂則朱氏盖聞禮者也不惑於隂陽之說者也黼誦斯言也以為稱首乞銘若是而猶緩𦵏余故曰俗成則知名之士不能免也余為斯文既以慰解黼之悲因以勸人子也朱氏世家平陽杉橋里黼祖母姓章氏享年七十八太學生陞之女父諱某字公向享年四十四娶楊氏子男二人黻早卒四柩之所謂弟也女四人適某人某人一為浮屠公向能教黼章氏能成公向志楊氏又世守之黼故得為知名士云胡彦功墓誌銘余讀陳亮同父所銘胡公濟之墓慨歎天下之才有不能以文自進而老於閭里盖終篇三致意焉今見屬汪萬頃為其子彦功行狀又亟稱其為人同父閱士多顧少許可者而萬頃雅號長者不侵為語言二君於胡氏父子如此有以也夫胡氏之世昌也胡氏家貲鉅萬中間少寛弛米塩靡宻愆其故常家事幾廢而公濟且老矣彦功奮曰不可以當吾世害其家以戚吾親也廼一切屏故好背華歸朴向之園池亭榭變而為桑稼之區向之賔客姻舊謝去而身與𨽻農同淡苦也如是數嵗其富如初而彦功亦年巳五十於是更治亭園延致賔舊以奉其親觴豆為樂復如初於公濟之卒又求同父之文刻之墓上歸善於其父人常言廢興有命自一飯不可以智得少有變衰之漸則偷怠不復自强以至於亡亦異於胡氏父子矣彦功諱某起居造次如學者且死為遺戒事事詳整欲以七日𦵏飯僧若道士必以鄉父老與童僕之曽服勤者相半盖不惑於日者釋老家之說得年六十四娶黄氏章氏皆早卒子男四人廷芳廷闕廷闕廷芳女適新岳州錄事㕘軍梁竦前監筠州酒陳兖將仕郎曹致中黄公黼孫男女二十有四人曽孫三人萬頃之狀云爾其世叙鄉里具同父之識廷芳以狀識來乞銘余喜次二文之後為之書曰余聞東陽劇難治而巨室為甚頃過其縣所次舎見其人往往敦朴敬客而崇師友今得胡氏事嗣興其家一以農圃為本自世所謂兼并機變之巧者秋毫不肯也則其風土固厚與所聞反謬而為吏者類以擊强為能孰與訪求如胡氏者旌異之使他族知勸乎余為斯文以告來者因以為銘云承事郎徐公墓誌銘公諱廸哲字某姓徐氏世温之平陽人子誼吾友也乾道八年吾友之同第進士者獨余不幸蚤孤不逮事父母而諸君之親尚多無恙里中人往往以為賀未幾連哭弔三四人至是又哭公焉方初第時三四人者或在甲科或為禮部第一人里中之致賀者謂君旦夕宦達其及親宜如何而其親亦自喜幸甚今十三年矣皆為吏州縣類不滿嵗以憂去誼立朝稍久以太常丞遇大饗明堂天子加恩群臣授公京官而亦命下之逾月以卒嗟乎士宦達不達何足道哉而患故交徧至此余故於銘公悲以感也公慈惠篤厚不縁飾辭終其身於人怡怡其子弟厮役無不意滿而誼復以經明行修善與人交聞於當世盖州閭長老嘗識公者見誼即喜以為佀公天下之士識誼者或見公又喜佀誼也誼年且四十未有子公念不釋已而婦娠又念萬一幸得孫而客都下保養乳母未必善視兒也即挈其婦還鄉得孫而公病矣誼倉皇告歸後盖棺之日始至公曰茍誼有子雖不在吾左右甚樂誼曰茍知公不死於其手雖卿相不願也大父某父某娶某氏年若干卒於淳熙十年某月以明年二月某日𦵏瑞安來暮鄉明教院之後山長子之仁蚤卒於是祔銘曰夫完而固深坎而厚封樹者是誰之墓歟其子徐子之父歟惟其孝慈足以有此萬有千載誰非人子新歸墓表新歸墓表者為林氏作也初唐奥先生林介夫𦵏其考妣於新歸唐嶼而廬於旁唐奥在瑞安縣治之北二十里新歸在唐奥西三里繇先生而下再世𦵏梓奥其孫諱松孫始祔唐奥之墓東百歩曽孫諱仲損又祔墓西一里所凡從先生考妣𦵏新歸者三世於是元孫幬載將奉其母柩合焉余乃為之表吾鄉去京師逺自為吳越而士未有聞者熙寧元豐之間宋興且百年介夫以明經篤行著稱當世以趙清獻公與其子㞦景仁所遺詩次其嵗月則先生名動京師矣自部使者郡守丞往徃造其廬問起居况何如肯仕否耶先生方婆娑泉石之間作萱堂以養母未暇出也客至厈床瓦豆具酒䔩以延之請與出遊則佳山水無不至者而特罕趨郡是時三經新義行天下學者非王氏不道春秋且廢弗講先生少從管師常學師常與孫覺莘老為經社者也先生故不為新學以其說竊教授鄉諸生龔原深之嘗以易學行世比見先生乃矍然顧恨識春秋之晚也於是永嘉之學不專趨王氏其後春秋既為世禁先生竟不復仕而周公恭叔劉公元承元禮兄弟許公少伊相繼起益務古學名聲益盛而先生居然為丈人行恭叔之銘沈子正也曰河南程正叔關中吕與叔與介夫同為世宗師少伊亦云爾且曰非詩書勿談非孔孟勿為者以二公所同尊誦如此然而海内之士知有程吕而先生獨教行於其鄉人以其所居里稱之不敢以姓字他無所槩見焉豈非其居勢使然歟要之永嘉之師友淵源不曰先生之力哉先生諱石卒於建中靖國元年考諱定妣戴氏三子諱晞顔字幾老晞孟字醇老晞韓蚤卒幾老醇老皆游京師從龔氏學亦不得夀家無壯子弟失其行事醇老一子曰松孫字喬年者最知名喬年少孤母曹氏改適城南張公子充嘗舉八行為國子學録所謂草堂先生也生張孝愷字思豫二子長甚相懽其尚氣節襟度易直與人傾盡儀容修整又甚相佀然皆事母孝喬年曰吾母也吾弟盍從以如我思豫曰吾母也吾兄盍從以歸我率不十日半月必相往還盖二人者在母旁傴僂怡怡唯謹退而論經史或世務即不相取下語聲驚四鄰喬年有詩易學晚而好尚書其為文雅潔而善道實事最厚陳公少南子從之游女以嫁其友張仲謹喬年雅不樂舉進士少南先達復以說春秋觸忌諱流落嶺表以死喬年遂與沈東美謝叔望諸君修先生故事保邱墓善風俗自號兊光居士然至感憤為詩每一篇必曰憂邊云云紹興之季後進多宦達及言髙尚有舊隠典刑但曰喬年其所藴抱人未必盡知之也娶葉氏謝氏皆逮事曹夫人喬年以乾道四年十有一月戊辰卒享年七十四葉氏先四十三年而卒謝氏後十五年而卒各一子其一人葉氏出者是為仲損字炳之余及識其人恂恂而有守能世其家者也娶東美之子夫婦自以家法相賔友人之見炳之者則曰是佀喬年見沈夫人者則曰是佀東美也其親戚相馴染率恩勤佀兩家吾里中人時節相問饋不絶有弔慶事父兄子弟皆至忻戚盡其情者必兩家也喬年以事出母空窮不恤炳之與婦沈服勤米塩以盡嵗晚之懽初萱堂成士大夫多樂道之者至炳之祖子孫事其親如一人謂之萱堂林家云炳之以乾道七年三月癸卯卒年四十有九沈氏以淳熙十二年十有一月戊寅卒年六十有四三子幬載鼎鼎早卒一女適新福州古田縣主簿徐宏其一人謝氏出今仲愚也二子昕充盖新歸墓先生之卜𦵏其父也以嘉祐母以元符相距四十年後七十有一年為乾道四年十有一月甲申而喬年祔又五年為乾道八年十有二月丁酉而炳之祔又十有二年為淳熙十年十有一月乙酉而謝氏合於喬年之穴又四年為淳熙十有三年四月癸酉而沈氏合於炳之之穴凡一百二十有九年之間三兆六柩而幾老之子諱夀孫字稚仁孫興祖字慶之醇老少子諱時可字叔遇孫諱誠之皆以序從𦵏墓下而不得其行事故不著餘則祔梓奥陳某曰元符至今百年間天下亦多故矣自公侯將五世希不失者有以布衣而燕及其後載也從余學又以文行見推於其友人以為林氏必大也嗚呼以勢利者如彼以徳者如此哉止齋集卷四十八欽定四庫全書止齋集卷四十九宋陳傅良撰
