front:
  text: 兊光居士林喬年齊魯兩生視漢功臣為貴列國之千乘不如洙泗之一言世固有公論也公名不至仕版而凛凛鄉評不在諸賢大夫下夫豈求之嗚呼士之聞見公者亦可以興矣功名一時典刑千古形器雖亡道德如故我等親舊今來哭公三年之䘮於此觀禮自今余鄉起孝起敬其誰作之􅔔言耆老澘然淚零何啻此夕
  hash: sha256:f34e7dc7d53a44d719dcf583e635051cb099927dcb793ae70211ee5add19dc58
