body:
  text: 外制正議大夫守給事中兼侍講尤袤除禮部尚書兼侍讀四年正月十一除禮書三月二十日兼侍讀二詞併行敕方朕在東宫時嘉與僚友切磋經義緝熈光明肆以菲躬託于兆人之上克奉詒謀庶幾寡過永懐三益宜如之何具官某博極羣書折衷六藝凡與我言者于今不忘也憫勞瑣闥位之春官進讀路門以竟餘論昔者甘盤輔髙宗于舊勞之時而無與于中興納誨之選至漢二疏同傅太子而亦不在初元醻功之詔我有故人始終典學視昔葢有光焉爾其輔養精神陳古以誡今惟毋以謝事之年而有遐心則朕以懌可朝散郎試中書舍人兼皇子嘉王府翊善黄裳除給事中兼侍講四年正月十一日除給事三月二十一日兼侍講二詞併行敕朕有元子出就外傅敷求其人葢累年于此矣晚得三益聰敬日聞間嘗侍燕從容能道二南之化朕嘉其勞圖以自近具官某習先聖之術而闕于當世之務凡與吾兒切磋言之者皆實學也是用擢之瑣闥勸講路門冀發其藴并以告朕昔四皓調䕶太子而不屈于髙帝李泌以布衣交肅宗而不能安其身于君側爾以西州之彥出入宫邸為父言慈為子言孝是不謂之遭時乎尚其殫竭以報簡知可降授朝散郎許及之前任淮東轉運判官不覺察闕錢降一官滿一期復朝請郎敕某官日者淮錢多姦禁不以道有受其咎者矣爾其以同過之仁而不言上亦從鐫級非所謂吏議乎閲日既久宜還其初可忠翊郎前韶州兵馬監押周昇在任不法降成忠郎敕具官某爾為兵官而州家以佚纍囚來諗雖會恩不汝貸也其鐫一階以警慢事可文林郎階州將利縣令藺森改初驗因傷身死人杜十四作凍餓身死失出犯公罪笞該赦取旨特降一資敇具官某吏與吾民親莫如令爾尚不知其寃死也而以為道殣曾謂與吾民親乎其鐫一階毋以恩免可保義郎李珙家遺火燒民屋四百餘間有司自來以屋直計贓坐罪得㫖宣諭依條聽贖臣僚上言特降一官敕具官某傳春秋者有人火之説則無所歸咎之辭也爾不戒于火而禍及於閭巷将安咎乎尚爾闊略其上一官可故通直郎趙公廣昨知饒州因旱歉民流臣寮奏追兩官勒停男彦倓訴寃特追復承議郎敕具官某左右諸大夫之言朕知其不如國人也爾守畨中遭歲不淑能有惻隠之實而不為文具而達于朝聽者皆反繆言者不置麗于佚罰而爾既賫恨于地下今觀闔郡連編累牘哭汝甚哀葢棺論定莫公于此朕為憫然盡還舊官不但慰汝亦以勸來者之勤民也可江西運副鄭汝諧奏奉議郎知袁州黄劭丁母憂不肯離任倍支棺櫬䘮服官錢等候服闋日降一官不得與親民差遣敕具官某爾嘗将毋以就二干石之養垂及滿歳竟以䘮歸漕臣見劾侵紊郡計姑鐫一秩俾務省循尚葢前愆朕豈終棄可承節郎盱眙軍指使潘撫權淮河監渡不職降一官放罷敕具官某邊禁之嚴而弛于汝免官鐫秩以警後來邦憲有常非我佚罰可淮東運使趙師睪奏修武郎張世榮管押歳幣㳂路恣横生事降兩官送吏部與合闕入差遣敕具官某發幣於邊事關逺聴紛譁不靖使者有言闊略弗懲人將是傚其貶兩秩且屬銓曹庶使邊臣繼今知懼可湖北提刑張垓奏承議郎常徳府通判趙善彦在任貪婪不法降一官放罷敕具官某部使者所治且有良二千石焉爾丞郡顧不以治行聞而速官謗非朕所以奨用屬籍之意矣其貶一秩免所居官繼今有耻亦免汝棄可知成都府邱崈奏奉議郎知成都府郫縣郭公謩病昏乖謬降一官放罷敕具官某夫不能勝其任矣而昏於酒黷於貨然而郡太守猶以為嘗有鄉曲之譽不寘于理鐫秩免官吾亦從薄罰焉其對隆寛益思懲艾可睿思殿祗候寄資武功大夫入内内侍省東頭供奉官王師珪轉歸吏部差在京宫觀免奉朝請敕具官某自以諸司使改今寄祿官而内侍與戎行雜矣然而名不在銓曹之籍則猶非秩官是則異焉耳轉而屬銓斯為寵渥閔勞朝謁祿以真祠爾其敬哉毋曰序進可武功大夫祁州團練使入内内侍省副都知李彦正武功大夫明州觀察使入内内侍省押班楊舜卿職事不謹各降一官敕具官某等朕惟周制内宰掌王内之政令會其屬之功事而賞罰之今内宰不設而爾等不䖍于事實干宫中之罰其上一官應古經誼繼今有悛亦豈終奪可李彦正楊舜卿復官敕具官某宥過無大况其細者乎爾以服勞不䖍嘗麗于罰葢八柄所以馭過者閲日滋久俾還舊官則予恩茂矣其益靖共以圖報稱可入内内侍省副都知李彦正除入内内侍省都知入内内侍省押班楊舜卿除入内内侍省副都知敕具官某昔在周制内宰以中大夫為之而𨽻天官説者以為禁省之祕不宜屬外廷而本朝爰剏北司之長就擇明習靖共可以率屬者以董正之官最貴近亦不可不重其選矣爾自輩中進在四人之數曾未踰日能賛内治進之長官楊舜卿六進亞長官委寄彌重其益䖍匪懈以報殊渥毋使外廷謂汝不稱可親衛大夫清逺軍承宣使提舉佑神觀林憶年除入内内侍省押班敕自宣徽院之籍廢而北司之長葢難其人朕既差擇之矣則參伍其間以弼内治非識風指謹憲度者皆不在此選也具官某服勞禁近見謂老成兹用命汝秩在四人之數欲俾其屬于内肅給于外靖共則爾責重矣盍亦思報稱者哉可皇兄故吳王府闕奉利州觀察使多才上遺表妻令人髙氏特封碩人敕具位某氏朕所以賁爾夫于幽壤有加禮矣闕何愛於疏封爾使居往皆寵光焉以塞其悲可多才上遺表親弟二人乞比換南班訓武郎多藝脩武郎多見並特授太子右監門率府率敕具官某等朕以諸衛處宗室子俾日奉朝請非苟示私也以爾多才身後之請及其仲季惻然重違之而並命爾其務靖共以稱徳意可皇叔祖右千牛衛将軍不儳磨勘轉右監門衛大將軍敕具官某等朕考周官凡衛王宫者皆同姓也國朝簡宗英寘之環列之尹葢循周制屬意深矣惟爾叔祖簡在衛中歴年彌長勞績兼茂進長禁闥職守益嚴欽哉無違以稱明陟可皇叔祖太子右監門率府率不延特授千牛衛将軍敕具官某以階官易環衛率視其秩日者有司故貶損爾今徹朕聞始仍舊貫雖曰緒正亦以示恩其尚恪恭稱此宻察可武功大夫權主管侍衛馬軍司公事張師顔落權字敕具官某朕以金陵形勢襟帶江淮輟吾騎衞布之屯所且以壯留鑰焉則統馭之才厥選艱矣爾以名将往訓群騶方當無事士馬飽逸觀者咸謂可以即戎緬懐武備於風駟鐡于雅車攻或庶幾焉繄爾之力肆用命爾自攝為真班秩益崇寄任罙重其尚加懋以究爾功俾周秦之詩得以專美則予汝嘉可皇叔祖武徳郎主管台州崇道觀不詉特換右監門衛大將軍敕具官某朕考周官凡衛王宫者皆同姓也國朝亦簡宗英寘之環列之尹葢循周制屬意深矣惟爾叔祖行尊徳修今在選中應于經誼宜率典常作宋恭先有馮有翼則繄汝賴可昭憲皇后親姪孫杜士寶特補承信郎敕某朕惟藝祖之子孫自吾壽皇篤敘之恩備矣而于母黨顧無世祿豈昌陵之意乎取之白丁授以右職爾其永懐無沗所自可右丞相葛邲初拜贈三代封妻四年三月拜曾祖朝奉郎致仕贈太師諡清孝追封魏國公書思封魯國公敕朕覽周誥至命君牙為大司徒實闕冢宰是謂股肱而追本乃祖世篤忠貞之美葢有感焉維今大臣相我孝治經文緯武海内晏然則亦惟其先徳之休足以燾後可無襃崇以應經誼具官某故曾祖具官某躬行對于古人鄉譽髙于月旦方其筮仕亦既有聞而以其親掛冠再調筦庫以此終身僅通閨籍法不應諡朝廷異焉易名清孝足以發明其人矣燕及曾孫爰司宰事則所以推本其美朕敢忘周道乎進封大邦莫如曲阜尚食其報永綏爾神可曾祖母魏國夫人侍其氏贈冀國夫人敕周之盛至于既醉極矣其卒章曰君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子言周之羣臣皆有士行之女以為之妃使生子孫足以傳世葢天意也具官某故曾祖母具位某氏作配君子行修于家覃及曾孫迺生耆哲考其世次亦足以知吾祖宗盛時天意攸屬而豈一日之積一門之私哉假使當周之世必從夫爵侑食五廟然則胙以大國秩之小君雖古未有亦可以義起禮矣可祖宣奉大夫顯謨閣待制致仕丹陽郡開國公贈太師諡文康追封楚國公勝仲封齊國公敕朕既本之六藝大啓爾宇以宏賁葛氏之祧則嗣有令聞逮事兩朝申錫名邦亦禮之稱具官某故祖具官某服某家聲踐脩累世濟以力學連由三科然而名滿天下而位不過從班文字行于方來而身不究逺業惟是一經之教被于聞孫蔚為名臣間我兩社則劬躬之報可無異恩維此營邱太公舊宅是用即命以為新封對我寵靈以昌爾祚可祖母楚國夫人張氏贈夏國夫人敕朕方廣念祖烈匹休于周假以溢我而收得賢之福則所以尊大其家以答天貺豈顧有所愛哉具官某故祖母具位某氏夙以懿行來嬪名家儀于前人以詔婦子亦既再世􅂱然有聞而未艾之祥施于今相詩不云乎樹之榛栗椅桐梓漆爰伐琴瑟種徳彌逺歴年彌長豈必皆身親見之乎報本醻勞式至今日大邦美號以慰永懐非以為生葢禮之稱可父朝議大夫致仕贈太師許國公立方封越國公敕王室百年之間公侯将相故家希不失者有以文墨論議綿及三葉是謂世臣固朕之所寵嘉矧予宗工尊為禰廟者乎具官某故父具官某襟度粹然聲華籍甚文未脱藁往往誦之一時英㳺莫敢輩行紹興之季歸為從臣葢其行蔵皆可蹤跡用而不盡士論惜焉宜集善聲發于賢嗣凡所著見孰非典刑爰侈舊封建邦於越以厚教忠之報以伸追逺之懐可母雍國夫人樊氏贈陳國夫人敕為吾股肱之臣則上自三世皆襃大之而况于其母乎御不及百兩養不及萬鍾也而無以慰滿其㒺極之恩亦何以責移忠之報哉具官某故母具位某氏承休襲美發育自躬恩斯勤斯鞠我良弼雖及晏歳逮事舅姑旦莫敬共至忘櫛頮是足以成其子之令徳矣改疏上國之封以世世配于禰廟而今而後庶幾吾大臣之不廢蓼莪也可故妻蜀郡夫人沈氏贈成國夫人勑夫人起家以致爵位風人懼焉迺若克相夫子至于登庸嘗與之同隠憂矣而不同休顯此則又禮經之所悼嗟也具官某故妻具位某氏女徳配於珩璜婦功著于蘋藻胡不偕老以須美成朕惟吾相祼于祔姑之室而副笄之服弗被翟茀之車弗乘也非有追寵何以慰之乃闢新封以賁幽穸可妻魯郡夫人王氏封信國夫人勑永惟二南大夫勞于王事而勉之以正勸之以義者皆其家室也矧吾輔臣孤立一意佐佑乃辟是不曰警戒相成之助歟具官某妻具位某氏自繼元配徳音不瑕既有芳殽進畀祖妣亦有雜佩施及朋侣佐我名臣迄登三事聞譽日廣績用日崇則與夫汝水之墳南山之側遭世不淑動心忍性者可同年而語乎冠于命婦為君夫人我有茂恩宜不汝吝可知樞宻院事胡晉臣初除贈三代封妻四年三月除曾祖贈太子太保修已贈少保勅昔周宣中興将相皆天下之選矣爰命皇父以整六師而推本所以實南仲太祖之後爰作常武之詩朕甚慕焉維今本兵得我碩輔則其宗祧可無襃崇以應經誼具官某故曾祖具官某躬行對于古人徳行髙于輩行而懐道不試士論惜之夫屈于名者享其實不發乎其身者遺其後是宜燕及曾孫蔚為名臣久陪國論晉長樞庭則追錄其積行之勤增華其種徳之報朕敢忘常武之詩乎陞班亞保以寜其神非以為生葢禮之稱可曾祖母濟陽郡夫人黄氏贈崇國夫人東來郡夫人張氏贈安南國夫人敕周之盛至于既醉極矣其卒章曰君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子言周之羣臣皆有士行之女以為之妃使生子孫足以傳世葢天意也具官某故曾祖母具位某氏作配君子行修于家覃及曾孫迺生耆哲考其世次亦足以知吾祖宗盛時天意攸屬而豈一日之積一門之私哉假使當周之世必從夫爵侑食五廟然則胙以大國秩之小君雖古未有可以義起禮矣可祖贈太子太傅夑贈少傅敇朕既本之六藝不愛髙爵以崇報胡氏之祧則嗣有令徳休于後昆並命為孤亦禮之稱具官某故祖具官某當天下之清得幽人之履世無孝廉之科而不偕于計吏居無朝市之交而不聞于上國天命弗僣為之生孫蚤為聞人遂專樞筦是不謂之劬躬燾後者乎申錫命書班于次傅豈惟發潜亦勸來者可祖母平原郡夫人王氏贈永國夫人敕朕方寅念祖烈匹休于周假以溢我而收得賢之福則所以尊大其家以答天貺豈顧有所愛哉具官某故祖母具位某氏夙以懿行來嬪名家儀于前人以詔婦子爰集慶善施于聞孫詩不云乎樹之榛栗椅桐梓漆爰伐琴瑟種徳彌逺歴年彌長豈必皆身親見之乎報本醻勞式至今日大邦美號于禮為宜可父奉議郎致仕贈太子太師宗贈少師敕自蜀平至今二百餘年葢西土無遺賢矣而尚有潜德三世不逢詩不云乎何其久也必有以也具官某故父具官某行著而晦於名才豐而嗇于位乾道之際有子􅂱然諸老先生見謂公輔吾壽皇駸駸嚮用矣而方考槃阿澗永矢弗諼不以鼎來之養而易燕居之福匪棘其欲卒為帝師殆所謂有道者乎然而生則遂循牆之志沒則極告第之榮吾于大臣之親亦質之詩書無愧矣可母通義郡夫人鮮于氏贈信國夫人和政郡夫人蘇氏贈和國夫人文安郡夫人王氏贈惠國夫人敕為吾大臣則上自三世皆寵嘉之而况于其母乎御不及百兩養不及萬鍾也而無以慰滿其罔極之恩亦何以責移忠之報哉具官某故母具位某氏承休襲美發育自躬恩斯勤斯鞠我良弼葢副笄之飾翟茀之華一朝醻之不以為泰朕惟樞輔怵然永懐是用疏以上國之封以世世配于禰廟而今而後庶幾吾大臣之不廢蓼莪也可妻大寜郡夫人康氏封安定郡夫人敕永惟二南大夫勞于王事而勉之以正勸之以義者皆其室家也矧吾輔臣孤立一意佐佑乃辟是不曰警戒相成之助歟具官某妻具位某氏酒醪之所羞雜佩之所贈皆天下賢傑也爰相夫子至于登庸經文緯武績用甚茂則與夫汝水之墳南山之側遭世不淑動心忍性者可同年而語乎冠于命婦為君夫人我有異恩宜不汝吝可廸功郎祕書省正字蔡幼學該修進至尊夀皇聖帝會要轉一官敕具官某載筆東觀迄于成書序進一階可謂德賞益修鉛槧以昌爾文二典三謨亦其選也可忠訓郎武學博士李興時知融州七月十三日敕具官某簡在右學諸生咸曰賢哉吾博士也滿歲宜遷官而自詭治民将以其淑人者施之行事融在嶺表嘗建旄鉞而荆湖之與鄰視旁郡為善地爰以付汝是謂異數尚其懋哉以踐爾言可髙文虎除将作監丞敕具官某朕旁招俊彦布列周行徳進言揚如恐不及矧子太史氏之舊引疾居家十有四年昔病今愈予環可後乎爾博學篤志承伯父之傳網羅舊聞述史遷之緒採之公論僉曰汝賢再轉為丞尚居繕監職務清簡可以卒汗青之業毋以匠為嫌也可武學諭范仲壬除武學博士脩武郎黄襃然除武學諭並七月二十一日敕具官某等國家設武科以取士有周道焉所以貫革之射息説劔搢笏冕衣裳在西學則皆俊㳺也矧若爾仲壬爾襃然人所亟稱者乎分以横經之席從以滿户之屨雖甚寵異豈曰不宜可止齋集卷十二欽定四庫全書止齋集卷十三宋陳傅良撰外制和州防禦使殿前副指揮使郭杲除宜州觀察使敇古者六軍皆以卿將元戎十乗有瑲葱珩二雅誦之庸示光寵矧我中權可無異數具官某鷹揚之勇輻湊之謀山西將家今纔一二醻勞屯所晉長周廬訓我羣騶壯我中壘累嵗於此士聽無譁日者貝胄三十来閱庭内舍矢如破可以即戎朕圖爾功宜及懋賞枚數勇爵峻極亷車禮均從班視古卿士是用命汝盖周舊章光對明恩益思忠報無使行狩専美車攻無使止居遺恨祈父則予以懌僉曰汝諧可武畧大夫侍衛歩軍都虞候兼權侍衛馬軍司職事閻仲持轉右武大夫忠州刺史敇日者朕重冬狩之役又不欲乏武事也而為簡之師試諸廷内於環列得師焉於歩旅又得師焉皆可以即戎朕甚嘉之具官某久於行陣積有戰多枚數壯士莫與儔伍觧朐山之圍殿符離之返至今言之令人矜奮頃自遴選涖我師徒百夫千夫各習其教往往營壘廬次之間無囂塵也於是閱也介胄堅好旌麾光明坐作進退動中尺度朕惟勇爵以横行為右階之最以刺郡為遥領之始悉不汝吝用賞懋功其對隆恩益殫忠力可閤門看班趙弼奏祖故寧逺軍節度使侍衛馬軍都指揮使贈太尉趙樽累遇郊祀登極未曾陳乞加贈特贈開府儀同三司敇朕永懐將閱克勤王家宣勞實多贈典有闕具官某忠於許國勇不顧身能以衛社稷之心効於死封疆之力戰自束髪觀者汗顔日者欲澄冗員甞第元從閱實數千人之衆定為十三處之功爾獨最聞朕尤嘉奬然論報自昔雖峻極於武階而訟言有孫尚少虧於褒律是用申命幽壤視儀上台以昭我不吝賞之功以成爾無遺恨之美抑使介士奮於戎行可朝散大夫權刑部尚書京鏜兼侍講四年八月二十三日敇朕與賢士大夫切磋經誼之日久矣而今加意於春秋春秋固為夷夏作也盖聞在漢或申復讎之義或庶㡬止戈之武而皆有大功號稱七制斷之經意孰得孰失朕將安所取此而誰與茂明之也具官某簡在法從蔚為名臣修聘北庭非禮勿聽往釐西事無言不酬斯可謂据古而通今者矣進之路朝重席以待其為朕深探遺經之指與漢二君行事以佐取舍爾信不為章句學者而朕顧不能尊所聞歟往其懋哉以副延竚可太中大夫權尚書吏部侍郎沈揆兼侍講八月二十三日敇朕與賢士大夫切磋經誼之日久矣而今加意於春秋春秋固為夷夏作也盖聞在漢或申復讎之義或庶㡬止戈之武而皆有大功號稱七制斷之經意孰得孰失朕將安所取此而誰與茂明之也具官某紹興諸生逮事髙廟乾道博士見知慈庭於今士林鮮矣輩行而況甞與朕游舊乎進之路朝重席以待其為朕深探遺經之指與漢二君行事以佐取舍爾信不為章句學者而朕顧不能尊所聞歟往其懋哉以副延竚可朝請郎右正言黄艾兼侍講八月二十三日敇具官某諫臣朕所甚嘉與也廼者封囊朝奏而夕不下則言者輒不自得豈朕意哉勸講闕貟有司来諗庸命汝艾切磋經術晉陪從班無所降殺豈惟以爾聞見博洽宜在選中
