seq: 34
front:
  text: 王簽判貴名方起誰不納交暮景已侵胡然辱贈豈左右之過聽以徃來之游談否則好謹将以成大顧此道之不作當古人而與求某官學足以逢原言足以行逺博極百家之說斷以中庸奄觀三變之文歸於爾雅如迫逐功名之㑹則從容議論之流嘗試緒餘蔚為舉首况廼占五緯盖荆州分野之祥而其應三魁皆嶽麓同門之舊天無虛象事未前聞永惟興宋以及今僅見聚奎而有此信如公等端為時生曽謂陳人可堪華問某方恨盍簪之無所不圖乗傳之有期先之報章行矣拜况湏乃留更僕盡聞他日之行藏恐不俟駕車已繫吾人之消長
  hash: sha256:e146551a9f4a6d45db0e672dccb70af4175a67495aa2bd53d4e30244099d621d
  markers:
  - {type: page-break, offset: 86, content: '', id: KR4d0233_WYG_034-1b, image: WYG1150/WYG1150-0766b.png}
body:
  text: 答長沙宋知縣謝解譽處甚休計偕何晚聞之有識僉曰攸宜共惟國家之多賢本於科目之取士盖以逺大之業在於章程之不違招徠之公甚於聲譽之兼採所思亦多新進少年斐然之作不必能得故家舊族試可之才誰為羽儀増重場屋某官中庸之學爾雅之文奕世源流一家機杼士無知己固宜連枉於有司人亦勝天豈能厚誣扵君子矧如門戸屬此弟兄盖嘗聞乾道千佛之經尚未繼天闕三人之選惜者有日意其在兹某偶因乗傳之来遂託闕二字之舊喜於善類上賢能再拜之書憂在瘝官無直諒多聞之友賀范提刑摻别呉門未知後㑹来宣楚甸乃與旁觀爰方拂篆之初罙甚盍簪之喜某官清朝聞望昭代典刑冨貴功名雖今多士風流藴藉如君㡬人蚤結聖眀之知浸躋華要之路過家上冢陳義固髙攬轡登車須賢為急言念江湖之阻嘗煩廊廟之憂兹惟祥刑可以弭盜茍吾使無訟用能鞠草於圜扉則人自不寃安得弄兵之赤子少屈以此遄歸有期某嘗託下風又聫小事平生久要誠知不遐棄之心世事多違恐有母疾驅之詔答諸郡賀冬十國為連仁聲相逮七日来復福履攸同乃如䝉成敢不胥慶某官以縉紳先生之望為五等公侯之尊政與時新既於昭於永譽天惟民視宜茂介於鴻休過觀上考之聞即對遄歸之寵某相依幸甚善頌云何敢以景於南至去極漸近之占以為剛自外来為主於内之應與趙安撫賀正元年正月肇開與物之春同姓一家均被自天之禄廼如胥慶矧在焉依某官以當代之英作大宗之翰如晉二文而受彤弓之賜如武五宗而分赤社之封方茂對於寵光用亶乗於穀旦某幸聫小事竊借餘光喧馬盍簪遥想朋来之頌燕毛序齒宜遄天揖之班與張運判賀正元年春正月式㑹乾初名卿材大夫宜居泰内廼如胥慶矧在同寅某官累朝故家多士先進以道山蓬莱之舊出董計書以國風雅頌之流下行吏事方亶乗於榖旦将茂對於龍光某偶托下風毎資餘潤豈徒使騁致憶别之雙魚所冀工歌聴勞還之四牡答郴州丁守見靣未見心昔尚牽扵毁譽同功而同過今廼得於戚休永惟世道之相違大抵交情之不篤茍如失意即杯酒以相讐借曰古人曽綈袍之足戀孰有惟鄰之厚見於方事之殷况復䝉成遽先濫賞公固察此有分財自予不以我為貪之風人將謂何盖受爵不讓至於己斯亡之類幸而論定竟以功遷是時九五知人之眀與夫二三執政之力曹邱未見人皆多季布之賢狗監不言上必重相如之賦何卑謙之已過謂竊誦之云勞無故得之不勝懼甚恨其人来謝初非求安世之名好以事為功正恐獲髙止之罪願言深戒庶以相安賀劉殿院光祖光奉恩綸進司風憲上念深矣師言穆然某官髙眀有融中立不倚學得其要宜在四科之間論歸於平不致九流之辨而又養以静重發於謙和自肅朝端益隆物望往者一臺之長取諸三院之聨盖啟沃帝聦必獻納司存之久而維持國是宜名實上下之孚豈曰序遷政惟衆允矧屬清眀之始方須是正之賢疇咨百工誰克堪弄印之選孤立一意公素有埋輪之名爰舉宏綱以聳羣聽行述百年之憲遂躋三事之班某辱在下風頗䝉異顧雖上體朋亡之義不欲自言至荐叨器使之恩敢忘歸德賀林察院湜光奉恩綸進司風憲方棘闈之試士豈無周行以烏府之須賢曽不竣事上念深矣師言穆然某官薄海令名當今大雅以運量不窮之才而養以静重以正直無偏之操而發扵謙和雖未結扵主知固已孚扵物望永惟國勢莫重䑓綱何近事之不然而缺員之弗補孤立一意公素有埋輪之風疇咨百工誰克堪弄印之選除書所播羣聼無譁某早辱下交􅇰䝉異顧平生自附固深知久要之心泰道方亨宜上體朋亡之義除運判與交代𫝊提舉伯夀簉蹟周行辱為後進觀風漢部愧在前陳雖忻道舊之有期亦懼告新之無狀静言久要欽遲肯来某官學優古人文妙天下以大學中庸之旨究觀九流以國風雅頌之音奄有衆作科名甚偉譽處誰如徧紬石室之蔵分治天官之目爰方鄉用胡乃倦㳺永惟先正徇國之風不數宣和在庭之士忠孝奕世莫盛於一門出入三朝未離於五品士方太息公已遄歸某瘝曠之餘覆䕶何幸况尚聨於小事而近託於下風然陽子之去舂陵遂著壊麻之節而賈生之對宣室訖䝉前席之知恐公此行孤我所望謝宰執擢居刺舉方忝攸司就畀闕三字安所部固己見大造保全之意或者資晚學嘗試之能伏念某語道茫然渉世踈甚意惟竊禄以為暮年饘粥之謀勢可投閑庶遂平生筆硯之樂豈期遲晚乃際休明起十年家食之人拜三命踵来之寵分符共理信撫字之徒勞乗傳察州於建明而何有矧今漕事絶重他司督九郡之民庸餉三流之禁旅承平既久不出數端所當取之名中興以来未免一切不得已之政况地控湖嶺俗雜民猺正湏通變之才以權損益之術有如無似深恐不勝某官盛德愈恭虚心並受以其便扵遷徙庶免新故迎送之勞以其習扵見聞或得利害廢興之實遂令庸散倍費生成敢不博詢所長仰副兹選邊鄙不聳雖無軍旅乏興之憂銜轡甚寛庶免煩難見短之責謝侍從備數監臨缺然補報陞華餽運益不自安靖惟厚幸之由端有裏言之助伏念某庸踈已甚迂濶奚堪少所為燈火之謀大不過稻粱之利偶縁塲屋之困嘗録於宗工遂免州縣之勞浸陞於膴仕今已過望他無覬心凢其竊禄以妨賢特以便私而畢志不圖殘枿晚多雨露之恩所恨罷駑終乏風沙之力矧此湖湘之寄久為江漢之闕宜得通才以膺隆委職在辨䕶則有遲鈍不及事之憂諠當激揚則有姑息以愛人之患持是書生之短責其吏事之能處非其宜懐以為懼某官言為國是志與人同苟聞有時輩之名則取作朝家之用乃如愛蓄尤切吹嘘某敢不知所感興勉其偷惰雖無補秋毫之具安能及人然未先朝露之年敢累知己賀丁郴州除湖北提刑筮言榖旦涖止崇䑓便道之官不待上漢庭之計入境問俗已来宣周隰之勞先聲所孚羣聴咸若某官器愈大而能受才無施而不宜欲請長纓宜雲霄之可上尚分半竹胡州縣之徒勞盖闕三字其老成而上益詳於試可果煩以四方之典獄俾洽乎累政之深仁問平反幾何人豈特庭闈之喜得參錯十數輩當知江漢之寧某阻自闕車欲馳聘介以浙東西之雅故晚更知心於湖南北之司存今當取法賀留左相孚號昕朝正名台極兩宫嘉與四海榮懐恭惟某官盛徳而禮恭功大而心小誠身有道非聲音笑貎之間事君以忠在期㑹簿書之外自持國柄益叶師言至於散植壊羣而無智名哀窮悼屈而無徳色燕及幽隠薰為豐穰于以成正始之風于以答重華之意爰被殊常之眷竟膺虚左之求夷考前朝盖有不備官而專美廼如近制率嘗與次輔以同升舉世翕然惟公宜此某辱知最厚頌美尤勤况未免於驅馳尚有煩於顧恤雖多病早衰之故欲陳力以無堪然大書深刻之傳或托名於不朽賀王樞使疇庸左轄正位中權渙號之孚羣聽惟允某官直方以大中正而通徳雖盛而愈恭義可為而必勇功名自許無愧社稷之臣富貴不渝尚餘湖海之氣自參大政益展壮猷茍利公家寧顧便文之計務先天下不知折節之難于以成正始之風于以答重華之意爰被便蕃之寵進專宥宻之司聞之師言久矣上意盖小宰若今中丞未曰柄臣而太尉為右丞相厥有故事將以託國豈惟本兵佇聽文徳之麻以祚中興之運某辱知冣厚頌美尤勤况未免於驅馳尚有煩於顧恤雖多病早衰之故欲陳力以無堪然大書深刻之傳或託名於不朽賀胡參政擢陪大政就翌洪樞二柄同歸四方歸重某官才全而徳懋實大而聲宏尚友其人皆前修之輩行事君以道必平昔之規模永惟絶俗之資亶有格天之業宜簡知於睿主遂夾輔於昌期而况瞻言坤維代有人傑范蘇二氏緝熈元祐之休雍衛兩公弼亮重華之盛以是邦之問學知今日之訏謨若乃大眀生於東伏羣陰於將旦九河注之海屹砥柱扵中流則在公身尤闗世道某側聞渙號倍激懦衷雖深知久要之心而敢犯朋亡之之義愛之莫助有懐未免於感興老矣無能所恨不堪於驅使賀邱侍郎顯承天寵晉貳地官渙汗之揚師言惟允某官清朝偉望昭代英才風人二雅之文皆有典則方伯三監之効盖出緒餘頃從畿甸之聫来定曲臺之禮凡所建白色動冕旒立皆施行功在宗廟矧是逺交之好誰如専達之才豈煩使之徒云将寵光之狎至求諸掌故在此勞還屬省禁之缺員宜周行之循次上方弄印謂見大夫之無人公未入疆出諸君子之不意徑從絶域遂扈甘泉以睿簡之彌勤非民曹之可久某受知冣厚賛喜實多公論不誣猶曰用賢之晚交情所屬政惟行道之難上嘉王賀冬鳴鑾順動舜禹交懽鏤玉崇成姜任胥慶亶惟元子對越昌期宜膺萬福之同允屬一陽之始恭惟皇太子大王仁由天授學本聖傳語及三宫亟見津津之色講聞六藝曲垂亹亹之聰惟育徳以彌新將以剛而俱長裒時丕趾為國元良某辱在隆知可無善頌今夕何夕當觀乾健之濳藏雖休勿休更玩震亨之修省止齋集巻三十四欽定四庫全書止齋集巻三十五宋陳傅良撰
