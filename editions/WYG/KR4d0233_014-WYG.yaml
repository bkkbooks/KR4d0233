body:
  text: 外制慈福太皇太后冊寳書冊文官中大夫知樞宻院事趙汝愚轉太中大夫敇廼十有一月癸未日南至朕帥中宮從以婦子朝于重華獲陪親尊上顯號於王母永惟一朝四世非常之休則亦二三股肱克相孝治以輯威儀可無茂恩昭示褒律具官某任重而道逺經明而行修累朝篤叙同姓然自熙寧以進士對策而卿始以讜議冠羣英自治平以儒臣本兵而卿始以雅望位三事卓爾大雅百年而復見之朕甚嘉焉屬兹成禮盍圖爾功維昔太任儀刑姜姒功在十亂徳在二南於是周公推本聖子作思齊之詩以歌之而仲尼定為六藝傳信萬世朕今逮事過於成王翳闕二字曽不在周公之下醻勞進秩實應經誼噫繼自今為闕四字陪朕嵗上萬年之觴顧不偉歟可篆寳文官通議大夫參知政事陳騤轉通奉大夫敇廼者具法駕以日南至朝慈福宮夀皇拜乎前夀母拜乎後朕帥中宮從以婦子搢圭稽首奉上寳章亦惟輔臣克相鉅典可無褒律以示同休具官某直内而方外博文而約禮及見故老在紹興文獻之間蔚為儒宗極重華侍從之選眷言舊學簡在初濳所謂獨抱遺經能斷大事者矣晉預機政益行所知俾予孝治度越千古盖周頌大任而不及子孫逮事之榮漢尊長樂而不備父母俱存之福洪惟我家一朝四世自有載籍未之前聞翳卿特書盡善具美噫朕式克至于今日休豈惟兩宮將髙廟亦􅃂嘉之序進一官匪以為報可前導禮儀使并奏禮畢通議大夫同知樞宻院事余端禮轉通奉大夫敇日奉寳冊上之慈福也乗輿所過觀者萬人夾道率皆歸美於朕躬朕豈敢専也則亦有宅心知訓之臣克輯盛事可無褒寵用以示勸具官某直諒而多聞明哲而匪懈盖退然如不勝衣而道任天下之重謙謙鞠躬而勇過孟賁矣從游潛邸陳誼最髙晉翊鴻樞臨機必斷朕嘉賴焉廼者導予有儀可象肆于竣事盍圖爾功朕誦思齊之詩推尊文王本之太任於是盖四世矣而周公始作大雅考引功徳以昭前人未必逮事王母親周旋揖遜乎其間也以今况古孰與朕休如卿遭時亦曰鮮儷繼自今卿其以予萬億年對天之休將書勞進秩不一而足焉尚其懋哉可兵部尚書羅㸃母太淑人繆氏遇慶典恩特封齊安郡太夫人敇朕觀魯詩頌僖公之有道及其夀母於以知吾卿大夫之賢其母氏不可以無報禮也具官某母具位繆氏克相君子種徳云邁是生賢嗣為邦司直以㸃之議論風操過魯侯逺甚則爾母視魯夫人賢何如也義不貳其夫而善祥集於晚年教行於子而淑譽聞於斯世肆朕嘉與㳺錫賛書秩以小君疏封名郡抑與魯人請命于周而後作頌者異矣尚服寵光以綏夀祉可中書舍人樓鑰母太碩人汪氏遇慶典恩特封太淑人敇朕觀魯詩頌僖公之有道及其夀母於以知吾卿大夫之賢其母氏不可以無報禮也具官某母具位汪氏克相君子為名大夫是生賢嗣世濟其美以鑰之議論風操過魯侯逺甚則爾母視魯夫人賢何如也爵雖從其夫而善祥集於晚年教行於子而令譽聞於斯世逮兹邦慶洊錫賛書抑與魯人請命于周而後作頌者異矣尚服寵光以綏夀祉可參知政事陳騤子臧孫遇慶典恩乞進封其母敕日奉萬年之觴于朕王母嘉賴爾父爰進褒律而爾又以錫類之恩崇大其母膏沐之邑豈不榮哉具官某母具位某氏吾大臣内助也而及偕老方爾父夙夜匪懈熙我庶績亦惟爾母整齊家事而後得以并意一卿不懐其私則從夫之爵雖不以癸未詔書從事晉封名邦朕何愛焉而況乎夫人獨得之也若夫可以久處約於燈火之初可以長處樂於簪裾之後凡百命婦於焉取式則此異恩又足用勸可安定郡王子濤遇慶典恩轉官敇維建隆磐石之宗澤流後裔維慈福奉觴之慶燕及髙年兼二者以有言進一官而何吝具官某為今屬籍視古典刑以孝恭友兄弟如周君陳以謹重率宗室如漢劉徳至於試吏允也過人信抱負之不羣況行藏之無愧比觀掌故誰其逮事於四朝强起襲封兹謂憖遺之一老可以華國豈惟奉祠方欽想於達尊宜亟蒙於殊渥假如老老亡元日之詔書祇以親親亦盛時之恩意明揚進律晉陟承流其茂對於寵光用永綏於眉夀可慈福太皇太后姪淮東總領吳珽特轉一官敇具官某朕甞從上皇後恭上慈福之冊親聆慈訓勉之以學至今心不敢忘也而施恩外家久不予決甚失朕意爰趣有司上之而爾某方饟淮師序進一秩以太后訓朕之意則爾亦宜自好修以成思齊太任之美矣可吳璹方令奉常序進吳瑊方分郡符序進一秩吳璿吳琯吳錡寓直延閣序進一秩吴鈞吳鏜吳鑄方為屬外臺序進一秩吳銓等一十二人序進一官浸即膴仕燕棨等九人各以姻聮進官一秩廸功郎前金州司戸青陽炳文年九十一遇慶典恩特封承務郎敇具官某在易之晉受兹介福于其王母而朕身親見之豈不盛哉餘慶溥將燕及人老俾爾晏嵗齒于初官尚服寵榮益綏夀嘏可儒林郎御史臺副引賛官賈忱應奉上尊號冊寳了畢轉承直郎敇具官某典禮行於上而澤下逮盖廣愛之道也爾適幸㑹亦與進秩尚務肅給毋愆于儀可朝散大夫軍器少監兼實録院檢討官兼權考功郎官黄由除將作監兼嘉王府直講十二月二十日敇具官某朕有元子愛之固深而教之惟恐不至一時賔僚儒學之選爾以魁倫之彦久儀羣玉之府侃侃正色抗論不回自少匠而為長盖亦寵矣技巧精能非所以望汝也横經朱邸使吾兒有直諒多聞之益是惟休哉可武徳大夫帶御器械幹辦皇城司陳守忠係重華宮淑妃陳氏親父久在殿陛特與帶行遙郡刺史敇具官某於重華為掖庭之親於廣内為屬鞬之列矧惟肅給濟以靖共出入兩宮而無違周旋四姓而不競爰醻勞於嵗籥俾借重於州麾以歡庭幃以壯軒陛可奉議郎太府寺丞曽三聘除秘書郎十二月二十三日敇道山蓬莱圖籍鉅萬士夫仰望真有飇車羽輪之隔游其中者皆天下選也以爾力學自奮持論不阿憂國之心如飢如渴擢自外府徑登清貫益讀未見書以昌逺業且使四部秩然有序是為稱職哉可大理寺主簿王寧新知信陽軍劉崇之並除太府寺丞十二月二十三日敇寺監皆有丞而外府設官特詳焉盖欲上裨版曹之調度下托有司之出納不可以非其人也以爾寧文辭蔚然明習吏道勾稽棘寺平反為多爰俾序遷以醻勞勩爾崇之聲稱籍甚蚤登著庭出守邊方召對尤敏使還朝蹟以慰公言所貴於儒者謂其能通世務以其所學見之事功勉哉可朝散大夫王進之知徳慶府敇具官某爾頃以天府貳車往守武陵突不得黔已復報罷朕心憫焉晉康雖逺實髙皇興王之地舉以授汝以觀汝能尚其懋哉毋替朕命可張某知宜州敇具官某自桂林以南之州宜為大其與蠻人隣也宜為邇置候固圉重於他邦舉以付爾不謂之選擇而使子歟尚對明恩無乏邊事可朝散郎充顯謨閣待制兼皇子嘉王府翊善黄裳兼侍講五年正月二十日敇朕每嵗仲春詔諸儒講路門將修故事有日矣比覽名籍為之矍然昔者所進今安在耶而不為予講也具官某以六學之醇長於勸誦甞發明春秋之㫖纚纚可聽也何恙不已而憫勞以大夫之事但與吾兒游乎夫文帝能前席賈生於久不見之餘而武帝不能留汲黯於出入禁闥之日兩君治効較然可覩爾不當起為予講耶詩不云乎素絲祝之良馬六之彼姝者子何以告之此朕所以責望汝也可從政郎建康府江寧縣尉趙汝章收使射賞轉文林郎敕具官某澤宮不建士無射御之習夀皇以為此非所以合文武也既策之廷中復取之囿闕於此皆得雋焉士亦艱矣俾進一階用為如吾詔者之勸可降授朝奉郎權通判建康府徐嶤任國子博士日奏對失儀降官特復朝散郎致仕敕具官某闕庭之禮陵三軍者懼焉以其嚴也爾為博士長而進對失容至於鐫秩朕豈深咎爾耶丞郡亡何聿来致事毋乃謹畏過自刻責乎俾還舊官示棄前咎則朕之遇士大夫明恕兼矣可福建提刑盧彦徳奏泉州同安縣尉鍾安老增强盜希賞本州録事叅軍從政郎鄭繼功符同結録更不駁正繼功特降兩資放罷敕具官某捕盜之賞建隆舊章也比嵗吏縁為欺往往傅㑹得官縉紳數以為言而重改作將以待實能焉爾汝治其獄迺不審察竟以傅㑹之辭上之州家士師不能治士非是之謂歟其削兩秩仍免居官尚務省循以盖前咎可前提舉廣南市舶江文叔容縱押綱官移易香綱錢物特降一官敕具官某建隆舶司盖長吏兼之尋以為有遺利也而専置使亦稍宻矣爾領其事迺以貢輸屬汙吏然則何賴焉削之一官以為不謹所使者之戒可知建康府余端禮奏武經郎李存道和糴淮西總領所米般量少欠降一官敇具官某峙粮以省漕此大事也而爾不究心至見劾於帥閫爰奪一階以警怠事尚其省循冀不終棄可入内内侍省東頭供奉官毛居實轉歸吏部授從義郎敕具官某爾自謫籍得歸銓曹命之秩官往護陵寢其對恩渥毋忘懼思苟無後愆亦豈遐棄可新知錢塘縣趙盛婺州通判吳璹並除職事官三月二十一日敕具官某等維昔忠獻光輔髙宗以建我家維今太皇實佐求賢而無私謁天下誦之則以爾盛忠獻之後璹太皇家人也靖共在位克世其美而寘諸周行以勸勲戚不亦宜乎可大理少卿許及之奉使回特轉一官敕具官某昔臯陶明刑能弭猾夏之患爾吾諫臣也而為大理稽經傳古人自不寃非所謂淑問如臯陶者耶銜命北庭且以覘國朕所為用汝也肆于歸報亹然獻忠盖歴道其所更見至於禾黍而未甞一語及僕馬之病朕聞之有感焉書勞増秩是特舊章若屬有鄰國之大事爾其選哉可閤門舍人蔣介奉使回特轉一官敕具官某使於四方孔門以為難是可以觀士矣爾以西州之彦庀職上閤意象容止亶如儒素盖其所趣尚然也屬修隣聘以爾輔行肆于歸報禮無違者書勞増秩盖循舊章欲究爾能嗣有晉寵可帶御器械蔡必勝除知閤門事敕具官某昔者仲尼設科可使束帶與賔客言者皆髙弟也矧吾上閤四方於此乎觀禮而可不用士乎爾以諸生習孫吳對策為天下第一操履趨尚學士大夫也夀皇嘉之駸駸膴仕朕方在潛邸每視朝輒屬意汝以為可在左右肆我嗣服首加趣召俄而銜恤迺今来歸是用命汝典我閤事夫不以寒素處私人不以學問望右列其来尚矣自我作古追復仲尼之遺意爾其懋哉以圖忠報可朝奉大夫試尚書禮部侍郎倪思復薦舉不當降一官滿一期叙復朝散大夫敕朕維聽言信行雖髙第不保其終身觀過知仁則寛朝宜諒其本意爰棄前咎俾復故官具官某蔚為國華簡在法從久居臺閣盖習於推轂之風樂道縉紳亦恐有積薪之恨云胡吏議及此上聞迺不知猾吏之為而徒録名臣之後或者愛博至於言私雖薄示懲章豈遽忘於善類思皇多士朕所以舍舊而圖新求備一人爾毋為矯枉而過直可降授通議大夫顯謨閣待制提舉江州太平興國宮陳峴薦舉不當降一官滿一期叙復通奉大夫敕朕維聽言信行雖髙第不保其終身觀過知仁則寛朝宜諒其本意爰及改嵗俾還故官具官某屢典名藩久持從槖以公卿大夫之後雅有扳援則門生故吏之多豈皆決擇況重以名家之好則忘其贓狀之非及此上聞掛於吏議既往不咎朕所以舍舊而圖新永矢弗諼爾母為矯枉而過直可顯謨閣學士降授通奉大夫知建康府鄭僑舉淳安令舒光改官不當降一官滿一期叙復正議大夫敕具官某淳安令之獄至今人疑之朕徐考其所為主則皆吾賢卿大夫也吾賢卿大夫也而坐以繆舉之罰毋乃已重乎以爾經明行修為海内所稱數而閱天下之士多矣門生故吏必善推擇而不苟取迺者所舉令其具如刑書邪則與其進不保其往孔子有是言矣不如刑書則是即墨大夫也豈以微文而廢善類爰棄前咎俾還故官其繼自今毋以精失士之意益舉所知是謂忠報可朝請大夫中書舍人樓鑰磨勘轉朝議大夫敕計日非所以處賢才也書勞非所以待法從也而有司以功令来上曰某人當進其官則朕亦重改焉耳具官某以文墨議論方代予言自吾與丞相執政進退羣臣當不當功罪爾皆得以可否是正于其間分職授任亦異於百辟矣績用益彰聲望益茂則等而上之不過三數官皆將以待汝何屑屑以課日月増秩為事尚服訓辭以須明陟可曽某知嚴州敕具官某贛川之曾人物相望仕至二千石者前後以十數厥聲茂焉爾習于家傳有志於古試以郡寄有志於民還奏便朝嘉其詳練惟嚴陵之輔郡實髙廟之濳藩分以左符用撫吾民由小州得大州益勉厥職以大爾家可林大中磨勘轉官敕計日非所以待賢能也循次非所以優法從也而有司以功令告是為舊章庸可廢乎具官某以直道正臺綱至于累朝以勇退紆州組殆將終更槩之懋官一階不足酬也況夫訓詞深厚駮議剴切朕甚嘉之乎而有司㑹課姑惟増秩其尚欽承以須殊奬可奉國軍節度使開府儀同三司充萬夀觀使夏執中所生母郡夫人沈氏贈崇國夫人敕詩人誦后夫人之賢必以為某人之子之孫之甥之妹盖推本其所從来不一而足也具官某所生母具位沈氏作配名門雅有淑徳是生賢嗣為國元舅日者朕縁申伯之誼加錫命數視儀鼎司夫寵其身而不及其母豈所以宏賁外氏之祧乎是生不霑膏沐之賜而死無以慰蓼莪之思也爰自郡封陞華上國尚歆明恩永綏爾後可故妻郡夫人諶氏贈寧國夫人敕公卿將相處貴倨之勢而不驕非獨其身賢也警戒相成厥有内助具官某故妻具位諶氏甞為吾舅氏之配與之共隠約矣今以吾舅申錫命數視儀鼎司敬共不違退若初筮推本所自非有如齊風雞鳴之配然耶夫生有中饋之勞而不及從夫之爵死祔於姑之室猶未離於郡小君也則吾外氏之祧尚有遺恨晉陟上國庸慰幽冥尚歆明恩益相夫子可止齋集巻十四欽定四庫全書止齋集卷十五宋陳傅良撰
