seq: 38
front:
  text: 可無以復来辱凡書云云載在方策不可勝用也足下亦博識而詳考之矣願以為問或者筮仕履之而後難歟夫履之之難則自信之難也士誠自信以為與古人無間古人能是吾亦宜能是古人能是吾獨不能是者非其質然也私欲害之俗學汨之也欲免於俗學惟去私欲者能之私欲去則見已見已則自信茍自信矣凡書云云載在方策者不可勝用矣足下更反求之末由合并臨紙惘惘
  hash: sha256:49282f6a99de9e72acaddb4c3e791b16db8ca3829bd10b93275605c7312772ee
  markers:
  - {type: page-break, offset: 59, content: '', id: KR4d0233_WYG_038-3a, image: WYG1150/WYG1150-0795c.png}
body:
  text: 答道州康判官辱惠書及於屬吏弟闕員之説足下誠有見於此幸甚來書以為本職無闕有司不以為過然後望以磨礲成就之益豈惟吏道然耶學者固同然也今之望於人者異此矣吾無闕與否不暇計人以為有過與否不暇計獨闕胡不磨礲成就我耶但曰胡不磨礲成就我道以義言也或者相望於利相望於利必人人而悦之然後無咎安得如足下之語告之也末由合并臨紙惘惘答趙南某衰惰乆無强附士友之意晚得名勝喜後自失晦菴門人真有學者而不相亮者闕云特未并合耳雖然吾黨亦有患自相推尊患太過與人無交際患不及二者皆孔門所戒也頃因欵洽嘗及一二來闕逺有同風三代之語得無猶未聽察乎詩篇儘佳更加停闕勿以言盡意為闕三百篇往往為訓詁家解駁類闕淺迫闕人意有逺矣謝逍遥嘗説三百篇非易其心而後語者不能此義足可三復公餘但於南雅索之聖賢貴寡怨詩至於可以怨必有道也来教所謂攻之愈力愈不見效豈謙辭耶克己非攻之之謂在易休復以下仁也人患不肯下耳譬之鐘聲擾擾者無聞初非有物問之者擾定則聞之矣答漳川守范東叔拜違以還辱貺教不一而奉狀亦無便豈但以獲詳行李為慰要是别恨牢不可釋家人婦子尚不能團頭况於交游又况士宦此理洞然而亦未易以理遣也領開府後書就詳動止感惬幸甚然事力如許雖有慈惠之長而不得騁令人寒心隨機方便量力濡沫正賴儒術耳某嘗侍坐語及四總領恐是今要告去䖏往時北伐諸將各擁兵總領不顧驅催漕計自以諸軍𨽻御前始以版曹即領總餉而别置所版曹長官莫得要領是漕司本行文書則天下財賦盡在四領所若非稍稍從此整頓民窮無救策意矣嗣勛足得商確或者其時乎張子儀闕元等所减次第虛額然亦盛意謾録二公奏牘因或送嗣勛如何来闕及之喋喋悚息正是自破戒堪發一笑與朱元晦某逐禄南来本為温飽不謂闕善嵗晚遷官至於將漕然但循故事無所建明闕三字終當他去而亦未得其説何以教之此專人所為道也闕非豈所以事君闕而公論開塞日異而月不同敢乞安時䖏與如戰兢自發眉夀用答海内欽遲之意某衰惰之跡幾自絶闕門廣而長者闕尚教之便中再拜真翰之貺感激不可言闕此先施豈闕附報官事擾擾及今始遣辱幸察之非敢望也来徴詩説甚荷闕包所見何藁豈嚮時聚徒所為講義之類則削藁乆矣年來時時諷誦偶有興發或與士友言之未嘗落筆誠有之當於長者有隱耶區區愚見但以雅頌之音闕勺羣慝訓故章句付之諸生尊意以為如何每懐企慕三十年間不在人後㑹并差池未有瞻侍之幸聞見異同無從闕正間欲以書扣之念長者前有長樂之争後有臨川之辨闕如承康往還動數千言更相切磋未見其益學者轉務夸毗浸失本指蓋刻畫太精頗傷易簡矜持已甚反涉吝驕以此益覺書不能宣要須請見究此衷曲耳不數月還浙可圖即償此願尺楮匆匆但有悁結與王弱翁某衰惰宜休歲輙遷官雖荷借譽之力然有見短之懼亦未知免所也廬陵政績在左餐右粥之民而不在逺客與强宗大族得失當有能辨之者暫屈何病區區更冀寛以居之勿以絲髪見於詞色戲綵娛親之暇杖屨從容與鄉後進尊酒論文為樂仍一切不及時事以間執讒慝之口未省尊意以闕二字為然否有如尊意不合幸切磋究之也仲權正字貧甚子靜淳父皆需逺次奈何陳正已亦寓里中復教官非所以䖏之也何時晤對伏紙顒企與立宗某衰暮之跡向綴班行伏䝉眷遇特厚言念疇昔何可弭忘某官才猷器業蔚然為當代第一方被選入蜀無幾微不自得意旌麾下壓境三陲然世將之後人將謂何重以疑阻半年無師盖朝野凜凜然而迄無西顧之憂非公門有重臣其克底此乎頃因内引甞遵勲業泰安喜見天顔且曰當用漢賜金故事旦勞還房雖事不果亦足見九重倚賴也甚盛甚盛三事逓遷還歸補闕庭之闕而識者闕無先於門下非但交㳺之私言聖明後闕視聽一新伏惟歡慶與國舉兄家書書黄事前日不及細闕淮上有劉煒運判者以禁私鑄太急幾生事遭論罷乆之私鑄戢留丞相追闕二字功遂畫㫖再與監司樓大防駁還闕者㫖令以次官書行即是傅良遂竟書過盖以為劉煒不是闕人贓吏罷去年嵗再與差遣此何不可而紛紛云耳後生小子妄相訿毁不足聽也不足聽也近復有御筆陳源除押班内侍官比外執政人張子仁除節度使此事所繫甚重謝給事已放過押班事傅良獨繳之朝論甚以為危乃䝉聖㤙容納至今不出至除節鉞合先送給事却直付舎人或説謝給事有人主張故令劣弟當此重難亦獨繳上次日御筆封付陳傅良可與書行再繳上亦䝉聖㤙寢之不出此兩事繫朝廷非尋常事之比至此公論方信劣弟不論其細而論其大捨易而犯難矣恐家兄不知端的見謂茍且有玷家傳特此詳報却勿令一人見慮有人讒謗以闕為好名漏洩上㫖也至祝至祝與徐韞之渉夏一病幾殆以丹附扶衰稍善闕二字餘無足煩軫記者昆仲時時過訪偹詳譽䖏然年来闕三字喜於相安左右意象挺特且習聞前輩師友風㫖更宜闕二字誘掖工大而損挹裁抑廼時善教之道至和若夫嶽麓餘芳令人起闕横經於此自有足樂不可不自慰也闕憲家子弟亦徃還否何時每一見輙談中興問趙張秦闕為闕長闕跡灑灑忘倦晚入脩門數詣東西靣言其人不可終廢闕後相不領略鄱陽相頗有意未及拈書亦各東西矣至今忿之且恨不得秦師垣相業一書付史館助南董之筆某老矣闕此勿念左右年方强儻能從吳察院交諸闕窺見所藏闕不闕長沙此行耳外此只改秩一事須索結知帥閫囘同年進士莆中来軌闕及識靣尋亦行藏異塗頓成踈濶假如不踈已難破發言之戒無足為左右先容者徒切愧衷如之闕湘中教官惟㑹府多名士其舉削或溢格故事如此想不闕至左右有遺賢之歎盍少須之也因㑹闕丈煩致癉暑不及拜狀皇恐之意諸相識不外此懇答張端士五下問漢髙封國是初来急於撫定闕得不然班孟堅諸侯王表説得錯至今因仍未明使髙帝以延年嵗必别有區䖏如本朝藝祖開基事多未究英雄如二君豈容輕議自古功業多遺恨惟周公無虧欠孔孟監二代兼三王之論王通説經制大偹皆見得徹載師閭師縣師三官皆征賦稅載師乃征公卿大夫王子弟諸食采若其食者三之一之類其征之民則什一而自以租歸公上則有差等輕或二十而一重或二十而五若其他受田之民什一之稅鄉則征於閭師遂則征於縣師顯然三局自昔諸儒見不破可勝歎也某病軀日衰弱漸漸了得春秋一書及未啟手足之前更加删潤則自有春秋来未有此書可藉手見古人無怍更侵砌結褁詩傳看了在何時他工夫闕截㫁惟日課易未敢輙下筆深見乾震之爻辭皆危而乾闕言吉只緣純陽聖人垂訓意深矣許由君闕務光之徒治闕舊學如後来甘盤自古此一輩人竟晦藏念此妄想盡闕二字詩固佳更宜練功某病後且搓排過日非能如所闕亦愛之者過辭也毛氏詩傳淟汨有年乆欲為發明之因附己見其下且以補呂塾之缺自今夏落筆近緣過客廢矣未期其成就也有暇見過略觀綱目為佳某近復苦泄㵼今幸稍愈以年例論之如此浸久是結褁之證也萬事已置勿論惟春秋後傳垂成尚欠删潤不免就病中勉强詩説盡豳風雅頌亦未落筆此書又看天命如何耳每見云云闕某以為不作悵然人生與草木俱腐者何限不恨固非恨亦非也倘可自見勇為之為善也某初有脾寒前日復作雖不過一日所損不少也愛念甚荷端士力如虎亦復畏厄嵗何耶新詞相好要是未圓熟耳著書㝡關心病懐益覺要緊所恨無朋友共成之奈何奈何舒宰政事止如此聞之殊為歎息代胡少欽監酒上婺守韓無咎書筦庫之士自古卑之矣而今為甚古者財散於民縣官但衣食租稅而所謂鹺茗醯酒凡民用之百須公上不牟利焉則筦庫云者止於籍出入校餘欠以告於在位為每嵗制國用之節而物之不登經費之不支在位者實憂之有司不與聞焉勾稽之不察扄鐍之不時度蔵之不免於燥濕腐敗舍是有司不任其罰是故其職甚簡其責甚薄也士君子之不遇於世者可以禄食於其間而無悔咎夫子甞為委吏矣㑹計當而已為是故也今也不然由漢而下公上所以𣙜民者講求悉矣而鹺茗醯酒凡民用之百須皆有征而甚詳於今自建隆聖人專務寛厚不忍以加賦厲農而禄士饟軍隄防大河固圉三邊與夫賔賜祭饗凡邦之大用不可已者徃徃十有六七仰給於征𣙜之吏盖今之田賦視古有損而征𣙜之入累數十百倍於古則筦庫云者不但籍出入校餘欠而已其督辦也有課其輸送也有程督辦之弗集輸送之弗繼在位顧缺然無以為計故凡物之不登經費之不支轉而為有司之責而勾稽扄鐍庋藏之細不與焉勞亦累十百倍於古矣仕乎此者雖欲徒禄食而無悔咎如古者不可復得國家知其然也待之亦加異矣自州縣監當官皆有賞格而可以察舉於其長與他官曹無異在京釐務凡有錢糓之蔵者賞之特厚而為上選用亦與他官曹無異若是而曰卑甚於今何也其居使之然也今夫皆州縣官也皆得以察舉於其長而繇幕職教授若曹官令佐得之則人以為宜繇倉庫務官則人以為恠皆在京官也皆得以選用於其上而由檢鼓諸院得之則人以為宜繇審計𣙜貨之官則人以為恠等而上之繇卿監為侍從則以太常祕書國子為宜而以太府司農為恠由侍從闕二字則以學士給舍諸曹尚書為宜而以戸部為怪名實未有分也而取舍若是豈一日積哉夫以征𣙜之入嵗累十百倍於古而其官司之勞亦累十百倍於古國家方加利焉而卒卑於士議如此則自愛者宜知所擇矣某也不才由太學諸生以塵末第窮太甚逐食太急以措身於甕盎㪺杓之間盖日夜念此自憐矣凡三易守未嘗敢自言也今者執事来守是邦某伏自計今之諸老先生尊經而下百氏可望以古道者莫如執事國朝以来世為卿輔究觀本末源流之際而通於今之務者莫如執事若夫議論持平用意均一即之温然有并包兼容之度而其中如鈞石之有銖兩不為世俗取捨以亂名實者又莫如執事於是輙不自揆道古今之異陳國家之大意與小已之不善擇而告執事庶幾采察焉若執事猶曰是筦庫之士而胡敢僣易若此則某繼今不敢復有言矣止齋集卷三十八欽定四庫全書止齋集卷三十九宋陳傅良撰記
