body:
  text: 行狀右奉議郎新權發遣常州借紫薛公行狀曽祖庠皇不仕祖强立皇任江寧府觀察推官累贈左光禄大夫父徽言皇任起居舍人公諱季宣字士龍姓薛氏其先世家河東後徙福之長溪㢘村至唐補闕令之後又自㢘村徙永嘉而光禄公始顯四子司封郎中嘉言敷文閣待制弼及舎人皆第進士昌言為婺州通判舎人從胡文定先生學以丞相趙公鼎薦仕於朝秦公檜相定和議舎人廷爭移晷中寒疾以卒母胡氏安人後十三日亦卒公六嵗而孤撫於待制伯父長任以官公從待制宦游四方尚及見故老聞建炎紹興初將相大臣趙張韓岳諸公事有當世志而樂道其人年十七荆南安撫孫汝翼辟書寫機宜文字孫氏藏書多公一意講說紬繹絶不治科舉業有隠君子袁溉道潔少學於河南程先生聞蜀薛叟名求得之道潔繙六經諸史以觀叟叟笑曰子學博而寡要其相授受嚴約盖如此湖湘間皆髙仰道潔公師事焉繇是益務自斂制充養蜀制置蕭振辟公為屬部將有狠訴統制者公當以犯階級法幕中或論縱之公以軍政爭不克謝去盡其禄直買蜀書以歸為鄂州武昌令故太尉劉公錡鎮鄂渚公論武昌形勢直淮蔡今見戸三千五百弓級財五十人土軍十有九人宜早為備因陳屯田分戍保伍以寛民力之策㑹有㫖營田一卒二十畆縣官盡征之公告鄂守宋佀孫曰是非漢屯田之謂漢兵民也使之就田豈曰不可今非惰游不從軍彼不素知田家事驅之縁畆必不樂曩時王彦營田湖外遣二十將潰者十有八而况盡征之乎且齊民在野環營以軍殆必爭利成閔益戍夏口公曰宜戍武昌備申蔣故樞宻使汪公澈宣諭江淮公上書言自權臣執國柄士氣索然趙張之放莫敢尚徳岳飛之死莫敢趨功今卒有意外之虞誰其禦之因論邊事甚悉及營田宜亟罷嵗餘敵犯襄陽而還兵圍蔣甚急汪公問策安出公白以蔡要害得蔡則蔣圍自解成閔克蔡蔣兵果遁於是敵東道軍傅合肥王權退次柘臯李顯忠亦不利却成閔東為援公又白蔡不可失若乘勝拔潁昌道陳汝直趨大梁則廬兵不戰可屈捨蔡援廬是棄投機之㑹為連雞之栖淮沔虚矣又曰敵空國來㓂苻秦故計也今我不可復戰惟當畫江固守而以竒兵遮擊脊尾阻前顧後勢且自沮輿尸一决其禍必大初公試邑年甚少方天下無事豫陳邊備諸公唯唯未遑也居無何邊吏倉卒興發騷然柴桑遷孔子宫避戍將嘉魚壊學宫繕壁壘江湖間稍騖於武事矣公顧以和糴賤傷農三白郡解印綬去為奏罷糴乃已比㓂至蘄黄以南列邑無寧居守令竊議内徙宦江湖者歸孥相望於道公廼誼死守不去與民期曰吾家即汝家一旦有急吾與若偕死敵民亦自矜奮三分其衆更壁縣下二總首帥輕舟守安樂口白鹿磯且乞師於汪公得甲三百樓船十艘氣聲張甚渡江來歸者數千家江西恃以無恐諸公繇是翕然稱慕交章繼薦汪公虚幕府官以待比其入也欲以公朝行在所轉運判官王逖劾罷信陽守檄攝軍事既解縣爭欲辟留滿考改官公並辭不受其後營田二十卒田二頃嵗得穀六百石廪錢乃七十三萬米一百八十石闊逺或數百里一壯馬負二石穀從以騎士詣大軍其費視民間買穀價相若士苦之往往道棄穀去又壅民之水利而掩其善田州縣莫敢如何營田終廢金亮既斃明年蔡果不守尋復議和朝廷於此亦棄唐鄧封略止於沔南矣蓋一如公言公治縣事為之經必曲折盡人心不茍作差役宿戒里胥披籍次第條二十餘家未差已差别為行且疏其强弱某堪一役某堪再役於其末自任某人某嵗月序當役以付案案任之付録事録事任之乃差差已有訟不均舉其籍俾訟者自覆視伍民五家為保二保為甲六甲為隊若干隊為總不以其鄉分畫惟地之形便諸總旗各為色槍仗皆中度舎姦有禁詰盗有賞其以廵徼遇非常死事者為棺賵之復其家田若干租三嵗總首得與令相問報專達不闗縣胥廵尉非縣檄毋得擅征甲士在邑五日一閱官賦之糧而賞其最鄉惟所欲偶習於總首之射圃毋贅聚其為士若大姓附編存之勿藉俾輸財與力佐治戎器其將輸信陽也凡一千八百人致米九百石行必為陳日暮各以部曲相地頓舎以槍為壁鳴刁斗設伏公食飲卧興自同役夫醫護病者不偕至不宿府檄治砦屋百數區泝流二千三百餘里程日立辦公借材於縣人度長圍大而加償之賦鄉挽舟而五分之以居者之四共行者之一匠人亦各俾一鄉償其僦費舊財賦名色異為籍雜不可省察為都籍以提出入之要鈎摭侵姦以除無名之斂諸案事以其劇易分日久近為旁行譜每以日加申稽知其决否故不决宿吏於次抄積不銷為走厯日掲其名數以便主簿者之鈎攷而因察其惰民頼其便凡公意趣鄉輒鼔舞從之豪民衛仲堅王安道更數令不能役及是以次受代安道語人曰失今不為焉能頫首他令創鄂營八百架總隊請分事公約剪伐某所茅某所木竹應日而集縣有鍾吳二盗魁大府屢設方略永不能得公以諉總首王宗元竟諭吳降之為買田屋改業為民鍾滋甚俄斬之而至信陽之役選徒鄉屬而邑二隊首固請從曰吾知縣出矣吾何敢處是役也露次不驚訖歸不惰道邊梨棗下無跡邊民謂閱過軍多矣未有若此肅者他所區處民吏皆化服類此調婺州司理參軍居五年用樞宻使王公炎薦召公懇求之官不報於是上在位七年矣入對進三說一審政本躬細務觀鞍馬以權為經本末倒植况動煩宸衷國論靡定權移近宻衮職日輕降人侍從之虞毬獵固寵之術意有所偏患生不察願陛下以静養恬略小圖大遴三公之選責以進人才張紀綱延端直之士與之講問學求治道歸有司之常務屏馳騁之細娛沉潜待時安往不濟其二冗官冗兵周官惟六漢别九卿自東都有尚書六部唐置内諸司使増員浸多有職盖寡諸路帥臣在古州牧國朝以來置轉運使副判官提㸃刑獄提舉常平茶鹽總領市舶坑冶茶馬諸司屯駐之軍又别置都統制牧伯之任分為五六而州之知通縣之令佐不相統臨各行其意臣之所謂冗官此也唐方鎮之兵今廂軍是周世宗及太祖皇帝増置禁旅今禁衛與諸州禁軍是神宗皇帝立將兵之法今帥藩係將禁軍是太上皇帝收諸將麾下作三衙御前諸軍今大軍是四者之外復有弓手土軍役兵今為大軍勝戰將兵而下廢為𨽻役臣之所謂冗兵此也茍得其道更張不驚顧陛下處之何如毋憚難也其三虚稅武昌絶戸屋租屋亡而租在徳安岳飛牛租牛亡而租在永嘉海溢濵鹵之田田亡而租在凡此宜悉蠲除以惠貧下當是時上志在中原王公炎方數進見語合驟登用薦公甚力公未至則謝曰聖上天資英特群臣亡將順緝熙之具幸得遭時不能格心正始以建中興之業徒僥倖功利夸言以眩聽今俗皆曰中庸大學陳編厭聞然物不兩大心無兼慮天地之道忽略根本而奔走軍旅之間舛先後之序而却施之雖復中夏猶無益也比至王公再見縱談邊閫事公曰既曰論兵竊嘗評以孫子始計之書未見其可方今人人異意不可謂道災異數起不可謂天以江左爭中原不可謂地以貪御驕不可謂將將不恤士士不安將不可謂法集一圖九古人寒心求之時賢誰能辨之况今三衙御前舊卒略盡江南白丁何以持久常米錢米在所虚數以此饋師其能繼乎兵驕民困或未免蕭墻之悔即幸勝之方上勞廟筭伏惟以仁義紀綱為本至於用兵請俟十年之後如曰上獨斷耳去位可也又曰天長可以入維揚清流可以向六合淝水可以下合肥北峽之隘廬江之徑武昌之近新息秭歸之北商於子午南達梁洋岷洮東近威茂用兵所徑忽不之備然而獻計者但曰無患非偷則狂有㫖改宣義郎差知平江府常熟縣明年大臣數言上復召審察公固辭其友人秘書省正字劉朔以君命相風厲公雅意㢘恥道鮮自一介不宜菲薄遂白丞相陳公俊卿曰周公寧以戱封諸侯開成王不敢玩人之心鄼侯身追亡將移漢祖嫚士之習古人格君之業於是乎在有如假令以匹夫之節一感上意亦足以報陳丞相免虞公允文相益趣發不懈自召命下公請之任六七不報又請奉祠不報積十有八月而後就道至數日則欲引去侍從有留行者除大理寺簿方虞公銳意於事一時言利言兵自衒鬻者甚衆守經不阿或被罷斥公見之晚猶冀幸一改聽始從容引番吾君說趙相國公仲連事諷以功業缺然咎在進賢未廣置助不善丞相亦矍然為敬頃之乃反覆切論徼功太速興事太輕速無逺橅輕則中廢經濟天下當與天下士圖之鄙夫嗜利自市試跡前事今皆反繆願公易慮勉終毋為後悔㑹江湖荐饑民流淮甸邊州又有言歸正人相屬者上命帥臣漕臣共安集之逾月奏不至丞相召公問所當施行俾條列將議遣使公惶恐謝不敏且淮事難踰度固以問因疏數端一責成帥漕毋以遣使使者所過州宿留循行未周已及春夏二新民未見便輒勞苦州縣百役為是懐故鄉無長居之心似宜略如孫吳屯田都尉故事自立營壁他繇使勿與三宜先定要束誠以闢地而已縣官一無利焉悉以故陜西弓箭手法復其租四嵗穀既登漕司致布帛茶鹽凡民所須率令穀價視物價稍昂以傳糴就藏屯所為後備因言若辟屬吏若移用錢米若括隠田兹事體大必遣使非選擇重臣持節漕帥州縣何以協使翊日有㫖以公將命淮西公即言流民或前散寓山谷依人姓聞今使者出必相擕待聚城邑仰食於縣官卒有累萬之衆將安取給且請以淮西諸州縣係省不係省錢一得以便宜調度朝廷尚難之公重謝不敏尋得㫖以見錢米一萬緡二萬石行不足用聽次第以聞是嵗乾道七年也十有二月八日公至合肥明年正月抵齊安布宣天子勞來徳意分遣才謹吏循問大抵安豐以東來者略已𨽻主戸矣即撫勿徙沙窩以南稍稍未有適鄉公親履阡陌間審度山澤曠地以為合肥廢圩可因以設險斷柵江保巢湖而舊黄州古邾城也路直垂瓠置莊旁近異時冦不能潜師徑度廼與安撫趙善俊修復三十六圩且於舊黄東北置二十有二莊居之凡合肥戸三百四十有四口一千九百九十有六勝耕夫八百一十有五為田三百七頃八十有四畆齊安戸三百四十有一口二千一百一十有一勝耕夫六百一十有四為田四百四十有四頃五十二畆率戸屋二間二夫牛一頭犂耙鉏鍬鑊鎌刀如牛數三牛犂刀一每年二轆軸一車其受田人種子錢五千其家以口老壯少為差賦米及秋止凡費錢緡二萬米石六千而夀春歸正及自古若為𨽻農於大姓者亡慮振業三千八百餘家要約明具器用便利廬舎有伍疆埸端正場圃牢牧陂溝路橋悉皆治修病醫死𦵏所謁輒得遷如歸居廼請還始入臣白遣數人各試其備邊計畫往往設飾為辭以上功八子雖不盡然之姑惟闊略庶幾或報効公之行也至固始求所謂北歸人者凡一百十有二家皆土著數年而新附者才五家光守宋端友更以舊戸比新戸詭為奏甚者賊殺歸人掠其善馬公即劾奏端友謾蔽時端友進寘環列根柢連附不可撼動人皆危公奏上天子獨怒下其事於理將窮竟問治端友暴以憂死繇是頗疑邊臣亡狀而所白遣大臣類無欲得事情之意於公齊安之請還也命覈麥田留累月覈已又命視鐡錢事公歸對卒展罄所見聞復上首論州縣田簿甚具而淮地實不加闢臣諏其故大抵主戸占田一畆數頃輸租僅斗斛耳而履其産彌日不徧既不能自耕又害他人耕何以聚人保境宜合剗請以徠逺民來者務得居者患失主客力競將無曠土再論今邊郡田野荒蕪勸墾文具總首空設蒐除茍簡循淮而南則有和糴則有鐡炭則有建康草料之征勞逺虚邊以資江左守將數易以苛繼苛一郡三邑二令䏊憒險阨非一不過合肥歴陽居巢三戍夫以陛下規畧而稽誤至此或者外治不可成歟臣愚妄意推本自夫不計而謾為而後外以鹵莽報不思而出令而後外以難行寢號為責實未免徇名則趣辨皆徇名之人志在大功却規小利則迎合皆規利之軰誕謾者敗而不誅諛悅者察而不去言既上壅人多自營宵旰十年觀今何補臣謂内治不修無以整外惟望責宰輔以坐論其原收賢材以博圖其緒兼聽虚受以通壅閼朝廷正則疆埸理矣唯陛下留神三論左右之人為欺囊槖邇為援則逺堅大為間則小肆彼其伺候辭色占揣意鄉開闔將迎莫狀其巧託正以行邪偽直以售佞薦退人物曽非誦言游揚中傷乃自不意一旦孚號揚廷雖出睿斷喜怒氣燄已歸私門齊威之强不在阿即墨大夫之誅賞而在毁譽者之刑毁譽無證刑不行焉胡能禁欺陛下誠幸聽臣無自立我收骨鯁棄軟熟察此非難廼悉數骨鯁軟熟情狀上極開納讀奏至齊威事進曰臣觀近政非無阿即墨之斷奈何毁譽之人自若上曰正待理㑹公益口疏治邊非是曰買馬亡幾習至盗馬敵將寄聲問故卒索歸之國家何至乏此而自傷體若是詔即罷買又曰日城淮郡以臣觀之未知守所合肥板榦方立中使督視卒卒成之廼者臣行過郡一夕風雨墮樓五堵歴陽尚壁缺而居巢庳陋如故廼聞有靡緡錢鉅萬而成城四十餘丈者陛下安取此乎上問千秋澗何若對曰始臣行時方冬水落澗不勝舟比歸夏潦時至江澗合流渺然矣是將焉用上曰澗亦險要對曰若以兵法言之漸車之水足以制敵藉此為險無乃不可又曰外事無足道咎根不除抑臣深憂左右近侍隂擠正士而陽浮稱道陛下誠聖明儻因貌言萬一垂聽臣恐石顯王鳳鄭注之智中也又曰近或以好名棄士臣伏思念好名特為臣子學問之累人主為社稷計唯恐士不好名誠人人好名畏義何鄉不立上悅連言極是於所汲引士皆旌賞先是上即道遷公兩官又除寺正有自邊來覲者則曰薛某凡可為國知無不為而又注意傾洽以聽罷行如響故諱缺失者相目矣數日除知湖州朝辭劄子論科折不明示數輸送不即除籍及祖家分鎮强邊之法曰陜西為五而統於永興河北為三而統於大名有塘濼方田稻田榆塞為之險城堡寨鋪為之防弓箭社弓箭手畨族熟戸為之羅落他路迭戍悉受節度幕府州縣難所辟差自种折二氏外别帥則以三衙若三司使都轉運使為之能績效驗入備政府夫地分則守固勢連則情不隔權壹則足以有為賞明則知勸光堯中興沿邊置鎮茶鹽之外舉推與之將以固圉計亡易此臣願按行成憲衆逮鎮守統帥輿帥不限文武忠智是使且無拘闕文無要小利無以日月為斷卒章尤剴切曰方今諛媚成俗舉世尚同汎觀設施讙曰盡善偏辭先入異議不繼百辟盈庭幾成孤立是日奏罷上留語良久公將退特温辭寵藉之大㫖謂書生姑息而辦事者以苛為能煩卿輔郡冀以中道理之公對曰臣學於師以事陛下唯中道爾上曰如此朕復何憂公至郡踰月戸部奏言諸州經總制錢皆出場務酒稅雜錢分𨽻以納今多隠餘分𨽻不盡得自便恣用請更為今監司給厯州縣以凡日收錢摭實係厯分𨽻否則劾聞令下吏相顧莫敢建明者公獨首奮為當路言之其畧曰舊額凡雜納錢以十分為率分𨽻四為糴本六為係省錢其後廼始増以二分分𨽻總制錢是時州縣未病之也然亦寖尋於奇羨矣久之乃裒羨錢校數嵗之最為額以十分分𨽻之七為總制増稅三為在州錢愈非舊比也復積有上供月樁大兵打船修船六分贍軍移用降本竹木等錢科色不勝繁矣而𨽻額如故既不足以應計且嵗費彌廣郡用彌匱由此場務鑿空以取贏雖有奉法吏思以寛弛予民而不得騁若復𨽻額外之征掇其强半官吏自救不給民病甚矣且以湖之都務糴本係省初為錢二十三萬五千六百有竒自總制之起為錢五萬八千九百有竒與故合猶日課二十九萬四千餘錢而已重以七分増稅為錢三十五萬三千七百有竒又重以上供若大兵之須凡四十萬八千錢有竒使今且共得八十萬錢以充入經總制之額其餘為上供諸雜須錢且患若不足况不盈此鄉所謂係省在州之數悉闕亡有約此推見他筦庫盡然郡將安仰如不得已宜以日收錢先樁上供諸雜須之餘廼係厯分𨽻庶或可行不然不敢奉詔版曹恚建郡胥俾持條法詣曹自觧公辨益力臺諫官感發相繼疏爭之上廼寢前奏湖無苗米饟軍嵗糴七萬一千五百餘石為緡錢二十一餘萬自添差武臣路闕下至進勇効士一百七十有一員軍員五百三十有一人其廪稍為緡錢距二十萬以他經費合往嵗凡用緡錢五十二餘萬舊制烏程歸安二縣折丁錢嵗十三萬緡七年有㫖减折丁錢大半其已全輸者聽以明年除之是嵗所失亡十有餘萬而大農和糴六萬石以銀交子髙估徒欲用錢二千省得米一石郡不忍裁市直則當補錢萬六千緡僦載之費不與焉益以就禄八十有三人闕啻為緡錢二萬明年郊視進獻賚予之幣齎亦以二萬數凡増費十萬三千餘緡以亡加増大都缺緡錢十有五萬公曰是雖劉晏將奈何亟請於朝乞以市直償民糴乞以折帛紬絹錢撥除折丁錢乞汰軍改徙寛郡乞節冗長差授在郡裁三四月自抗論分𨽻後執拒大事累數端日與權貴征利者為敵雖或依或違郡民少蘇而不能平者滋衆獨𨽻天子簡記所以見覆護甚至始公嘗薦某人有材識他日某官缺員宰執擬數姓名以進竟擢某人為之郡丞趨時好干政引章避之為是他丞嘗遣中使有所㢘察浙西諸郡獨不入境用是故不敢輒動危之然公歸志决矣即稱病請奉祠三不許㑹除代一月章五上已又旬四上改除知常州公方鄉用人人期待行所學不數月久勞於外還七日廼出守守七月罷罷歸之百日以疾卒年止四十邦君朋友暨後學哭之過乎哀四方賢大夫士千里交相弔也公之學蒞事雖謹宅心唯平其燕私坐必危然立必嶷然視聽不側欹雖所狎授言不以戱自著抄書及造次訊報字畫不以行草几篋筆研衾枕屏帳皆有銘毫釐靡宻若苦節然要其中坦坦如也故其寡欲信於家行推於鄉正直聞世而居無以逾衆人公自六經之外歴代史天官地理兵刑農末至於隠書小說靡不搜研采獲不以百氏故廢尤邃於古封建井田鄉遂司馬之制務通於今或者疑公之博蓋有所自得精一矣名流問質或往復累數百言㫖要無二大抵以古人小學神而明之大學之道傳逺說離故漢儒守器數章句名家小知穿鑿異端之徒乃一切屏事忘言後已髙論虛無而卑者滯物卒不合合歸于一是為得之讀其書知其為博之約也公已不求聞達於人有一長薦稱必備居官不出位遇大事義所當為斷為之嘗掇拾管樂事為傳語不及功利平生所推尊濂溪伊洛數先生而已告學者則曰毋為徒誦語録有浪語集若干卷書古文訓若干卷詩情性說若干卷春秋經解若干卷㫖要一卷中庸大學說各一卷論語小學若干卷資治通鑑約說止若干卷九州圖志止若干卷餘未就公患五代史缺略修之亦未就若隂符握竒山海經古文道徳經焦延夀易林及劉恕十國紀年莊綽揲蓍譜林勛本政書姚寛漢書正異之屬皆校讎為之叙其文精確趣實可以濟世其經說不並依先儒其校異書必解剥其不正者娶孫氏父汝翼也初汝翼與舎人友相得舎人死汝翼遺書待制自言吾有女才且淑異日宜善事夫子吾將以室起居之孤比歸公婦行皆應書公卒其友人張淳欲悉遺衣服以斂書銘如古法能俛聽蓋不失公意云一子曰沄補國學生公以卒後之百四十有四日十有二月壬申𦵏於吹臺鄉慈湖之原傅良丙戌丁亥嵗受徒城南公間來過教督之明年謝徒束書山間屏居公又過之問治何業竭已所已得對公曰吾懼吾子之累於得也即詔曰宜若是嵗己丑冬遂往依公具區滆上卒學茆茨一間聚書千餘卷日考古咨今其中明年秋試太學公適赴召於是鄉諸生及他邦之友咸在又日相與從公居游凡七八年間違公久者惟公使淮守霅川時為然然亦率不一二月書命輒至至則具道所言與行事故世多知公詳莫如傅良今取其出處事言之大闗治道學術者為狀餘不著謹狀福州長樂縣主簿諸葛公行狀曽祖考璿妣朱氏祖考原武翼郎祖妣張氏趙氏並封孺人考純廸功郎妣趙氏公姓諸葛氏諱說字夢叟琅琊諸葛自㑹稽内史恢别為淛東之族後稍徙嚴陵永嘉族蓋嚴徙也或曰新安譜亡弗可論次公大父娶城南張氏以諸子從其舅學所謂草堂先生以八行應書者也繇是闔郡賢士大夫往往多諸葛氏師友婣婭公幼陶染諸公間已岐然度越行軰益自勵讀書著文窮夜旦不輒休既冠入太學再薦登紹興庚辰進士第方待嚴州司戸㕘軍闕丁廸功公憂服除授台之黄巖尉復丁母氏憂公故負當世志學不為章句訓詁淺事務見於施設比罹兩䘮謂禄養之無逮命之不偶也於是名其園曰艮園室曰傃室以其學力行於家輯柔其族而厲其鄉人久之上下交孚子弟無少長咸視公習謹而麗於善莫之或肆里並大海其商海自給者率剽悍廼時以所不平就公决質之惟一唯否是定郡之東南隅廣斥易恐截然倚公為巨防而公亦任其戚休非衆同欲謁不至郡邑凶年艱嵗縣官有卹政為守者率需公至為方畧公白事當若何費當幾何立聽行之然他鄉部未有條而東南隅若干戸少長秩秩然䝉惠矣紹興之季年也防海隆興之甲申眎疫丙戌埋骴乾道之庚寅辛卯食飢壬辰築埭皆其小試微見者也往年余與薛叔似象先陳謙益之俱㑹行在所私相語為授福之長樂簿公重違吾黨意强起之官是時前丞相史公帥閩部丞相閱人熟不輕以獄訟畀屬吏雅聞公賢數諉以事公以理平决不視大府意所疑信為非是丞相滋相知延之幕中幕中故盛賔游惟公自一話一言無禆補不出諸口丞相自喜晚得士禮以已敵且率當路者薦之朝而公死矣實淳熙元年正月庚戌也公平生燕寢無惰待物不矜莊施交際語唯恐傷人聞或為不義必反覆鐫切不但已雖行百里從一僕持被飲食厪厪無乏所以周鄰里朋友則不問費室事一切勿理趨公事未嘗不勇决也年且五十徳日加修講問日加切余嘗見公暨張淳忠甫夜論學自叙讀書二十年得一健字余輒從旁歎公健天徳也盍求其本公云云旦日忽挈余手出曰吾固深省於疇昔之言余竊自恨規意之淺也比將殁猶校讎儀禮家人不知其甚病也厥明盥櫛已遽索紙書遺友人以訓其子為寄更以一紙書吾他日將族𦵏必擇寛地問法於伯忠甫又以一紙書吾弟兒女多以某所田若干畝盡歸之適劉氏姊薛氏妹具有缺以田若干畝歸之已呼其子耕來曰汝行之毋敢違戒又曰語汝母屏毋來前也一家始大驚頃之長樂尉之書至還答如平時又頃丞相遣客與其子至亦將迎如平時客出大門公目已瞑矣娶徐氏一子耕也享年五十有易論語說若干卷碑誌詩文若干卷耕卜以三年十二月丙申奉公𦵏於黄嶼山以狀來請始余聞公誼甚髙未之敢請見也寓城南有題曰里弟諸葛某之謁入余愧歎袖謁走出見遂辱與為忘年交將何敢辭以余所見聞公居鄉試吏建民利甚衆夫人有一事則以傳世要之於公不足道故道其出處進退死生者為狀國子司業何公行狀何氏郡大家别為二族諱溥字通逺官至翰林學士為百里坊族公諱伯謹字誠夫官至國子司業為城南族翰林公試禮部奏名為天下第一百里坊之何於是始大而城南何氏自諱某生四子金華主簿子發為宣和間進士子達子謨同時為太學諸生子達晚授官累封至朝請郎公以金華仲子來為朝請後復與其弟青田令伯益同為紹興二十一年進士公卒青田之子叔忱與其三從兄次常又為同年進士蓋以儒生賦禄三世矣論之雖繇文詞以孝睦為本往時金華蚤世朝請撫其孤教之有成是為青田令青田復早世公撫教其孤如朝請今竟成是為叔忱也父子以善託孤起敬鄉黨則何氏之世其家有以也公信厚靖共務不暴白宦稍達皆循次平進不自意得而世之奔競沽激速化之術不但不欲亦誠不能也由國子博士攝尚書郎出知饒州罷起知廣徳軍以朝請年九十餘丐祠不行丁朝請憂服闋除太府丞是時上方更用一二執政闔朝士詣府稱賀致辭已而顔行前論今進退人宜誰先則皆曰若何君不當久居此官已而改大理正不越月真除兵部郎官駕幸學於師儒選甚遴闔朝士相與語則又曰上既用某人某人矣必將用何君明年除司業以余所見士入朝不為衆媢忌顧冀幸其遷官鮮有如公者觀公羣居平日寡言笑初無以恱人也每進對論事具以質言不好立新竒自以學官至為郎凡三四對所上十餘奏大要以當世之患文勝而實不足比年臣子為陛下豐財繕兵嘗試不効者類多誕謾無補事情方今慕漢宣帝而賞罰未盡當其功罪俗何由變末論久任曰以競進之人為自營之計望其實課績猶卻行求前也在饒州江西諸郡皆旱甚往往諱不悉言上公以戸口若吏卒之稍食計見廪實所欠為米十有四萬石乞諸朝有㫖予三萬公連奏不已更奏月樁為緡錢十六萬折帛十二萬綿絹六萬二千匹不蠲民必重困禾且熟猶自疏力不足救荒當罷去永嘉不宜蠶民嵗輸絹以貿絲旁郡為苦轉運使將以桑土例槩數敷和買絹公適在度支持不使下有建造二百艘者宰相以為問公懇言温瀕海郡木鐡皆非其有為損其半平生不多見設施於其一二足以發明公之所存矣豈所謂徒文具無惻隠之實者耶以某年某月日卒於官年若干娶某氏某氏俱先卒又娶某氏子男三人叔愿廸功郎叔謀叔振女三人長適某次適某次許嫁某叔愿以某年月日𦵏公於某鄉某里之山來謀於某曰先君辱知於今參政周公厚嘗惠許之銘不肖孤自惟念設不獲執事之文以藉手則參政公將誰從而信予之某不敢辭遂為之狀止齋集卷五十一欽定四庫全書止齋集卷五十二宋陳傅良撰雜文民論天下之事有可畏之勢者易圖而無可畏之形者難見也易圖者亦易應難見者必難支故明智之君不畏夫方張之敵國而深畏夫未見其隙之民心盖民心之摇慘於敵國之變其變之遲者其禍大而患在於内者必不可以復為也古者有畏民之君是以無可畏之民後之人君狃於民之不足畏而民之大可畏者始見於天下嗟夫民而至於見其可畏其亦無及也夫秦之先盖七國也自孝公至於莊襄亟耕力戰薦食諸侯之境厯七世而并於始皇之手吁亦艱矣始皇惟知天下之難合而其患在六國也故危其社稷裂其土地而守置之以絶内爭之釁中國不足慮而所以為吾憂者猶有四夷也於是郡桂林城磧石頸繫百粤而卻匈奴於千里之外始皇之心自以天下舉無可虞足以安意肆志拱視於崤函之上而海内晏然者萬葉矣而不知夫天下之大可畏者伏於大澤之卒隱於鉅鹿之盜而其睥睨覘覷者已滿於山之西江之東也一呼而起氓𨽻雲合雖邯鄲百萬之師建瓴而下而全關之地已税駕於灞上之劉季矣嗚呼秦以七世而亡六國而六國之民以幾月而亡秦以秦之强不能當民之弱天下真可畏者果安在乎人君不得已而用其民以從事於敵國可不懼哉舟説吾子知舟之所以致逺乎凡治大舟其檣以負䑺欲其屹乎其不撓也其䑺以彍風欲其騖乎而不靡也其柁以轄乎軸欲其壯以殿奔也其磴以柅乎艫欲其堅以鎮浮也其維以縻欲其固而莫之脱也其櫂若篙以櫂欲其勁而莫之折也其篷以却雨欲其績宻而厚也其䒁以捍濤欲其端方以宰也而又樓焉以逹逺戈焉以禦害則以航於川以實萬斛肆千里行遭匯洑枟亂石晝晦㝠大颺掀而無虞不然而斬杙以檣之裂席以䑺之續綆以維之折竹以篙之編蒲以篷之冒而航焉以幸一濟之不覆則溺嗚呼君子者濟乎世之舟也而溺乎其器以空中之質冒焉而求速能不覆且溺邪今吾子之舟其才良而文其器厚而深吾所望乎致逺者也雖然其所待者闕如也吾子而能豐其所中而不倚為檣大其所受可則舒否則翕也為䑺截乎其所守徑乎其所趨為柁正於動引而不發為磴某人宜師某人宜友擇而附麗焉為維勇而不懈乎進為櫂若篙謹重以屏其患焉為篷峻整以逺其侮焉為䒁則吾始無虞於子不然其以致逺也殆也哉吾聞子試於學驟先諸先登吾固憂其挾少年之弱器以其空中而幸然於一濟冒焉而遂求速也詩不云乎譬彼舟流不知所屇心之憂矣不遑假寐以吾子學夫詩也於是乎贈舟説責盜蘭説予寓梓溪一夕友人以園隅蘭芳告予徃視之愛其美而憫其不知於人也遂出置於庭數日香無聞欲去而猶遲之既卒以不香遂目之曰盜蘭而語之曰吾聞鼠有似豹大小異形吾得以辨其為鼠鳥有似鳯赤紫相間吾得以辨其為鶩石雖似玉疵而不醇吾固知其為瑉草雖似苗秀而不實吾固知其為莠彼固有近似吾惑之今汝蘭其形蘭其色花簮焉而癯葉修焉而特吾乃薙茹藘剪荆棘出汝於散地置汝於坐側汝乃假蘭之名乏蘭之徳蕕如其臭苕如其賊吾方汝竊其近似以自欺深其偽而難測者也向使漢宫舍汝何以對乃辟楚人舍汝何以祛乃祥鄭君失汝何取乎七穆之瑞屈原去汝何誇乎九畹之芳然則汝之盜蘭而不香亦何異人之盜儒而實亡吾試言汝以證夫人陽短石顯盜吾公也隂附王鳯盜吾直也釣名布被盜吾儉也伏死諫墀盜吾忠也託經以媚婦盜吾學也口聖賢而行市人盜吾誠也是皆君子近之而不知讒人主俯之而不覺其姦此社稷所以危覆忠良所以凋殘吾今可置汝於中庭是君可置斯人於百官也吾故效魯司寇誅少正卯之義戒鄭寤生去叔段之難亟命除汝汝其何安蘭曰伏辜願屏園樊戒河豚賦余叔氏食河豚以死余甚悲其能殺人吾邦人嗜之尤切他魚余嘗怪問焉曰以其柔滑且甘也嗚呼天下之以柔且甘殺人者不有大於河豚者哉遂賦之物固有害人兮人之勝者智也牛能觸吾為之絡馬能蹄吾為之銜且轡也烏喙之毒用之藥以治也虎豹搏且噬也機與穽足以備也蛟蜄可驅兮蛇虺蚖蜥可避也雖其質禍賊兮名彰莫余偽也是故防之疑兮待之懼也吁河豚柔滑其肌兮㫖厥味也孰魚匪羞兮而柔以甘人同嗜也曽謂其斃人亟兮孽肝膽慘腸胃也人雖疑致死兮饋者弗忌也吁嗟乎物之害人兮不在乎真可畏也凡蓄美以誘人兮盖中人之所利也余誠悦而啗兮彼則隂以其恚也減殘忍以為仁兮文嫵媚忌也甘我以言兮鼠伺而狐覰也笑怡怡吾蠆兮弱婉婉滅人之氣也富貴懐安吾鴆兮幣帛饔牢吾餌也吁嗟乎愛者禍府兮所玩以易也兵莫慘於貪兮干戈伏於不意也晉滅虞以璧馬兮商君以好囚魏也莽詐忠以盜漢兮武賊養以媚也眇河豚其弗戒兮欺天下者曰得志也吁嗟乎若子豢安兮擲天下於一試也文章䇿三代無文人六經無文法非無文人也不以文論人也非無文法也不以文為法也是故文非古人所急也古者道徳同而風俗一天下未嘗惟文之尚也學校進士無文教也鄉黨選士無文科也朝廷爵士無文品也士之有文皆涵養之素而談笑之發蹈履之熟而議論之及非有意也是故雖其所出而非其所為雖其所有而非其所知文之在天下郁郁矣昔者嘗疑夫子於詩之三百篇斷之一辭則曰思無邪夫易也書也春秋禮樂也皆其無邪思也而聖人獨及夫詩盖思而得之聖人謂是以為天下之文也出於數人之手非一人也出於數十國之風非一國也出於數百載之間非一世也或出小夫賤𨽻非止於學士大夫也或出於暴政虐世非止於寛時暇日也而其辭其義粹焉一軌上之化深下之化厚固如是也嗚呼道盛則文俱盛文盛則道始衰矣射䇿之晁錯不如木强之申屠談經之公孫不如戅愚之汲黯自漢以来甚矣文之日勝而士之俗日漓人才之日之而國家之日不理也華藻之厚而忠信之薄也詞辯之工而事業之陋也學問之該而器識之淺也吾不意夫文之為天下患如此也漢之文揚雄其尤美新之作庸人恥之唐之文韓愈其尤諛墓之誚在當時固不免嗚呼他何望哉愚方惟是自獻而先生辱問焉故愚不敢道其末而願聞其本惟先生賜之守令䇿古之天下無宂官亦無窮人無倖法亦無怨吏夫官不濫則人無滯歎法不屈則吏無滿心勢亦然也而官若是其甚簡也敷奏賔興又若彼其衆也法若是其嚴也黜陟用廢又若彼其果也以甚簡之官待人才之衆以甚嚴之法行賞罰之果而人無滯歎吏無不滿之心何也上之人無愧則下之人無憾也用者必公則未獲者不敢議也顯者必賢則繼者不敢覬也内之者非所昵則所外者不敢浮也逺之者非所怨則所邇者不敢偷也是舉天下之官皆可以用人抱關擊柝府史胥吏士不恥為也嘗觀周公立政之書論文武得人之盛而至於夷微盧之烝三亳阪之尹皆有常之士而其選無異於三宅彼皆逺方也皆卑職也逺方非要地卑職非膴仕而天下之美材居之宜亦有所不安焉而莫之問者何也有君如文武非棄才之主有臣如周公非蔽賢之相則逺之非疏之卑之非薄之也且夫周公大聖也天下所共知也而諸侯無伯則出為東伯六卿無宰俯為冢宰畢公大賢也亦天下所共知也而周公不没則未得以為伯則未得以為監商聖如周公而下闕人也則降而為之不以為辱賢如畢公而上有人焉則淹而留之不以為恨天下之不聖於周公不賢於畢公者又何擇也愚故謂今日難於乆任非誠難於乆任也難於外任非誠難於外任也以古之官視今之官則今宂也以古之法視今之法則今倖也以其甚宂猶苦其不足以其甚倖猶苦其不平無他下有所要者上有所畏也用者未必公人固不恬於退也顯者未必賢人固不屑於小也内之者或所昵人斯競於求也逺之者或所怨人斯難於去也夫如是則盡今之官應今之人廢今之法娯今之吏天下日愈嗷嗷矣嗚呼天下非怨吏之可畏也今日遷某守明日易某令其擾則妨民其費則傷民其無意於留而茍簡於治則弊民其自以為亟遷而求足其欲則又困民故夫吏之便民之病也有便民之法而又有不便吏之憂愚所不敢知也故凡執事之三䇿愚不暇憂而所深憂者上有所畏則下有所要也收民心䇿漢文之仁不在復租而見於復租周官之仁不在荒政而見於荒政武王之仁不在散財發粟而見於散財發粟聖人之仁其積之有源其發之有機其所以厚天下無窮而見於卹天下者特其有限者也天下之人不以其有限之施而致不足之望而常以是信其無所不愛之心而懐不盡之感者盖於其所發占所積聖人之心始形見乎此夫媒人而盛譽之人不以為喜役人而强飯之人不以為徳何也媒之而譽之吾固有所私也役之而飯之吾固有所利也故夫一譽之及必謝者必其無所私之之初一飯之施必謝者必其無所利之之素聖人之仁形見之日而天下吾戴者非其形見之日也其心無所事於形見之末而所召之速則形見其機也昔嘗怪宣王咎已之急辭罪嵗之觖望夫咎已之急辭生於自治之不足罪嵗之觖望則又窮焉而尤天也而中興之雅實先是詩序詩者顧以為中興之根本何也彼其心未有係天下之心也宣王之機所藏者甚微而澤之及人者尚自淺也藏乎中者甚微非力乆則未易以著而澤之所及猶淺則亦難乎遽孚雲漢之旱宣王之惻怛忠愛一旦而大彰彰焉天下以是為文武成康之心也車攻未作復古之業就矣不然遇災而懼漢唐人主如此者總總也彼其令下而民玩而此則速中興之功未可以言語及也人皆曰雲漢之旱中興之福也無雲漢宣王之仁不加損有雲漢宣王之仁亦不加益而中興之機也是詩也故嘗為之説曰商非興於解網而實興於解網周非興於扇暍而實興於扇暍宣王非興於遇災而實興於遇災聖人之仁不外假以収天下而天下之歸心則嘗有俟也天地之徳非止於雨露而物則徳天地之雨露父母之恩非止於乳哺而子則恩父母之乳哺也愚固為今日賀而為吾君勉也方今版圖未盡復也主上踐阼以来江浙之間飢饉荐臻水旱相仍固斯民病也而聖心惻然勤卹民隠下減租之詔遣賑飢之使却免錢之請又斯民幸也愚則以為是宣王中興之機也嘗讀孟子至於鄒魯之閧有司死焉而莫之救孟子以為是凶年不發之報而不可以尤民至梁恵王移粟于民勤矣而孟氏又以為非先王之政夫飢而勿恤穆公固有愧也飢而恵之恵王稱無政何也天下之事安於莫之為者非也迫而為之而不反其本者亦非也是故以梁之政視鄒之政梁若可喜以鄒之治責梁之治梁之及民末矣愚故因鄒之失賀今日之所以得以梁之所未至勉吾君大之章子林子名説古人之名惟所遇焉斯取之矣非擇也商而上迭以甲乙命盖雜紊而無章至於周諱行而名始尊然曰顛曰夭非美辭也而取之以名春秋之世猶不厚乎名衛有石惡宋有伊戾齊有陳逆楚有屈蕩周有史佚夫數辭者皆人之愧焉而至不美者也而取之以名展禽解狐若是者則有取乎物之賤者以自名下漢晉士方以名相髙唐以来士無陋名名美而人才日卑嗟夫專於其内而不張於其外急乎其外而不勵乎其内古今人之異也宜哉吾友章子林子皆恥夫擇名之不詳而請更於予予何吝於名哉而二子之請甚矣其非古人之意也名不若人汲汲乎求治之心不若人姑徐徐而已耳盍亦反其本乎雖然二子以自治之請予又何可辭之於是名章子曰用中林子曰毅章子愿而固林子弱而浮以其名之得微中乎心夫二子而由是焉反之斯名也其猶二子之益友乎里名勝母曽參不入彼里名豈足以凂吾孝哉而君子亟去焉亦合内外之道也然則二子之請於予予不吝於二子雖非古人之意是亦古人之意而已矣朱甥子臧名説吾兄有朱甥者每遇予持尺紙拱而問名焉予曰爾何若名之問也人能美名名不能以美人淑爾身雖陋爾名人不汝議也爾身之不淑假而以丘軻自號焉天下莫之予矣是故古之為名姑用是焉别稱道而已矣賢否不問也爾何名之問也雖然童子而知問名可嘉也凡人之善自一念而為也故患莫大於無識學莫强於自興爾知重而名則必知重而身矣噫是念足以為善矣吾故名汝曰子臧而猶未汝字越十年吾将汝考焉而不負吾名字汝未晚也止齋集卷五十二欽定四庫全書止齋集附録
