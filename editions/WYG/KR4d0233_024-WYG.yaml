body:
  text: 奏状劄子繳奏率逢原除都統制状准中書門下省送到録黄一道樞宻院闗池州駐劄御前諸軍副都統制率逢原奉聖㫖除都統制令臣書行右臣将指湖湘已聞率逢原之為人且見其行事矣其在江陵其在襄陽與今在池陽監司帥守皆患苦之屢有文字上煩朝廷雖然猶有可觧者監司帥守與軍中事不相闗未必非好惡之偏也近者淮西總領鄭湜親見其馭下無恩将士多怨徒以為管軍之人頗繫觀聽不欲斥言逢原之罪而按其中軍統制崔公亮以警動之逢原果不自安且無以掩諱其失至於自劾陛下曲加覆䕶與降放罪指揮是豈以為無罪乎而遽進為都統制臣不知其説也臣聞中興之初分置屯所江淮之間付之諸将懼其専恣難制也而别置總領給餉其軍特以王人為之用示威重淳熙三年六月七日特降聖㫖指揮令専一覺察諸軍掊克之事聖謨逺矣今率逢原為帥無状宻院鐫戒尚不知改至為總司所發上章待罪始稍有嚴憚王人之意若陛下朝以為罪而暮遷擢之則是教之不悛也以副統制陞都統制未為超越但適當宥過之時未見改過之實遽此除授則有功者何以待之臣恐将帥觧體且傷總領之威重也欲望聖慈将率逢原新命特賜追寝使之深自循省士無愁歎然後進遷庶允物議所有録黄臣未敢書行謹録奏聞伏候勅㫖十二月二十四日奏入第二状准中書門下省送到臣所繳率逢原除都統制奏状奉御批依已降指揮右臣昨具論奏率逢原方以自劾放罪不當遽遷都帥臣之愚見以為朝廷勸懲宜有次第不應功罪混為一區今率逢原以總領鄭湜按其偏将掊克士伍隳廢軍政於是稍知嚴憚務自刻責而陛下為之覆䕶特從宥免此陛下善将将之道而率逢原感激思奮以功補過之時也若乃信宿之間遽有遷擢臣恐逢原麄人昧於理義妄窺朝廷意出姑息却復専横愈無悛心故敢瀆犯天威乞寝新命不惟為陛下惜此舉措亦所以全逢原也至於逢原為帥無状事迹非一前後臣寮屢有文字臣不欲因此悉數暴逢原之惡正以事闗軍衆慮傷事體區區欲望聖慈特從所乞必湏知改然後除授所有録黄臣未敢書行謹再録奏聞伏候勅㫖十二月二十六日内引劄子四年正月人主無職事以愛惜人才為職事夫愛惜人才徒貴之以爵位不若養其聲望之為美徒榮之以恩寵不若全其操履之為大凡立乎人之本朝爵位隆而聲望汚恩寵盛而操履闕此公論所甚不與也公論不與将為庸人則是貴之者適所以賤之榮之者適所以辱之也恭惟祖宗承五代之後士風極衰而一旦作興之至過漢唐而無愧三代無他道也養其聲望全其操履而已在仁宗時范仲淹歐陽脩余靖尹洙之徒嘗以論大臣除授不當去國矣已而仲淹脩等之賢果信於天下為時名臣向使當時不明諸臣去就之誼而苛留兩存之則雖仲淹脩不能暴白於世而况不如仲淹脩者乎在神宗時司馬光吕公著蘓軾轍之徒亦嘗以爭新法去國矣已而光公著等之賢果信於天下為時名臣向使當時不明諸臣去就之誼而苛留兩存之則雖光公著等不能暴白於世而况不如光公著者乎由是觀之愛惜人才必如是而後可不然将淪胥而為庸人夫庸人者一世所棄何鄉而立有臣如此國家何賴焉則亦非上之人之利也以臣所見近代人主覆䕶臣子容忍不棄未有如陛下者然以為愛惜人才則未也既曰覆䕶之而不謂之愛惜之者何也眷之於爵禄恩寵之間而不務明其去就之誼故也比者有以臺官察朝士者矣陛下皆出之出之誠是也俄而並召兼用為卿将孰是孰非耶有以後省官駁從班者矣而陛下為罷給事中罷之可也已而並除職名一去為郡一降為王府官然則是均有罪耳有以諫官疏大臣者矣而陛下欲並用之大臣乞去不得請諫官乞去又不得請然則是俱賢耳雖然賢否混殽何以為國猶可觧者則皆士大夫也至如臣衰懦攝官詞掖嘗不度踈賤論奏内侍不當為知省官雖䝉陛下納臣之章不行詞不賦祿而其人至今出入禁闥與見任無異近復有㫖令兼他官中書後省與黄門相持而不决號令自今可廢此尤不可者臣故曰陛下可謂覆䕶群臣者矣而非愛惜人才之謂也臣不勝拳拳欲望陛下務明人臣去就之誼者此也誠以愛惜人才為職而明其去就之誼請自不闕其闕二字以臣之可備使令則當去内侍以臣為不足備使令則當去臣臣之誼明則群臣亦各務明誼群臣各務明誼而後聲望不汚操履無闕群臣之聲望不汚操履無闕是不為闕三字寧然後陛下可以委任而責成則非臣之私便也再内引劄子人莫難於養其心而人主之養其心為尤難恭惟本朝列聖養心之道備矣臣不敢逺引亦不敢稽深言之姑誦臣少壮時身所見聞髙宗壽皇兩朝時事每自退朝於起居食息之暇無非以禮樂刑政之具務自檢束一日之内每事有常以何時刻延見儒臣以何時刻省閱奏章以何時刻親方冊或游戱翰墨也然後以其餘景燕衎尊爼娱嬉苑囿至於暮夜又必宣召宿直官從容晤語間以觴詠如是者皆三二十年寒暑不渝忽一日不如是即内侍以近醫藥為請而中外惶惑矣夫以堯父舜子稽古學道度越漢唐之君而克勤小物課為日程拘拘不廢何也意者雖聖人不可以不持養之故也臣幸遭逢備員近侍每見陛下臨朝之際荘敬肅穆儼然若神雖執禮名家無以竊議于以仰窺聖心持養必有道矣而比來傳聞徃徃以為玉音所發或異尋常機務之間稍失次第廷臣震灼莫曉其故妄意窺度其説多端以臣愚見或者陛下言動偶有此差誤耳恭惟至聖至明動循法則而又春秋鼎盛剛健日新何繇言動有此差誤無乃起居食息之暇所以自持養者愆其常度而延見儒臣之時少歟省閱章奏不屑加意歟或親方冊游戱翰墨等事暫置弗講歟不然則燕衎尊爼娱嬉苑囿之樂惟意所適而無莭歟又不然則是燥濕隂陽之冦或傷其和而忽忽不樂以得此也陛下幸因臣言試自省察萬一有此不可不反求之也孔子以終日無所用心為難而孟子論心亦曰出入無時莫知其鄉操存而舍亡則心之不可以無所繫也如此伏願陛下法髙宗壽皇之所行存孔孟之所戒以其日力定為常度非徒以親政蒞民亦所以尊生介壽惟赦其狂僭留神裁察社稷幸甚臣不勝忠愛之情奏乞褒録傳察宗澤婁寅亮子孫劄子竊覩近者贈岳霖煥章閣待制與張某一子官仰見公朝旌念舊臣苟有勞烈即録其子孫承襲重爵以此勸士天下知尊君親上之報不薄而狥國者衆矣幸甚臣嘗論本朝聖聖相承每遇大事則有先見特立之臣奮不顧身為國建事臣不暇逺論姑述宣和以來三朝所覩在徽宗時則有傅察以死事為莭義之功之首髙宗中興時則有宗澤以留行為翊戴之功之首壽皇入繼大統時則有婁寅亮以建儲為定策之功之首然而傅察贈典雖甚優渥宗澤致仕亦頗通貴而兩家子孫未蒙旌異棄善録瑕令人於邑至於寅亮初以上虞縣丞敢建大議髙宗嘉納擢為御史其後時議不同竟死小官澤不及後遂以乏祀若以至和嘉祐故事言之宜在褒崇之典一切勿問臣恐傷忠厚之風塞敢言之路上無以發明髙宗至公之心下無以對敭壽皇善繼之美欲望聖慈以所以褒賞岳飛子孫之意推及三家以廣恩惠以勸忠力繳奏冊寳官吏推恩状准中書門下省送到録黄一道莭文為冊寳都大主管所申奉上尊號冊寳了畢被差一行官吏推恩事二月六日三省同進呈奉聖㫖除已推賞人外餘並特與三分减一推賞内第一等轉一官减二年磨勘第二等轉一官第三等减三年磨勘其軍兵願換犒賞者聽令臣書行須至奏聞者右臣恭覩上件聖㫖指揮係是依紹熙元年體例三分减一推賞施行臣檢照紹熈元年正月一日修製奉上壽聖皇太后尊號至尊壽皇聖帝壽成皇后尊號冊寳行禮了畢并正月十九日修製中宫冊寳行禮了畢推恩等第人數第一等五人轉兩官第二等十二人轉一官减二年磨勘第三等四十三人轉一官資今來所降上件推恩指揮内人數比紹熈元年第一等承受官多一員第二等除貼去外照管事務官尚多一員行遣書寫奏報文字官多一員第三等承受并諸司行遣人多一員已上共多四員臣竊詳紹熈元年推恩之人係是修製奉上三宫四冊四寳事務繁重職掌稠疊計日甚乆為勞亦多所以當來恩數特異常典今來修製奉上慈福宫尊號冊寳雖曰千載一時非常之慶然而幹當臣寮偶被驅使只合課計心力以為酬奨况是一宫一冊一寳既與三宫四冊四寳體例逈然不同伏縁近日都大主管官不候一等具申尚書省取㫖推恩先次獲降聖㫖指揮轉行兩宫一時後省皆失契勘只作特㫖放行以致逐人妄援前例保明陳乞今來雖經朝廷裁酌将都大主管官止轉一官餘人三分减一推賞比之元年委是太濫以此始知都大主管所申首為身謀上欺聖聽因芘儕軰大啓倖門而又增添員數至五六人恭惟國家對天下之休慶事未巳竊恐濫恩寝廣官爵益輕臣愚欲望聖慈軫矜民力吝惜名器将上件指揮除軍兵聽換犒設一項外其餘更加裁損務令允當仍将所増添人只依舊數不許增多庶幾日後無疆之慶僥倖衰少所有録黄臣未敢書行謹録奏聞伏候勅㫖貼黄檢准紹熙三年十二月二十二日聖㫖指揮玉牒所進壽皇聖帝玉牒㑹要所進壽皇聖帝㑹要了畢與减半推恩縁上項進書篇帙少似已前特行减半推賞與今來事體一同伏乞睿照五年二月十一日奏入繳奏孫拱之轉官状准中書門下省送到録黄一道樞宻院闗奉聖㫖忠訓郎御前祗應孫拱之為闕有勞可特與轉行一官令臣書行右臣取到吏部状見得孫拱之自授承信郎以後十年之間已轉五官數内淳熈十六年轉了三官又自紹熈二年九月磨勘轉忠訓郎至今年十二月纔及兩年有餘更轉一官臣不知其有何功勞被此恩數嵗月未乆僥倖太多壊武臣年勞之法長䙝近私謁之風臣不得不為陛下惜也所有録黄臣未敢書行謹録奏聞伏候勅㫖二月二十日奏入繳奏冊寳承受官免减一員状准中書門下省送到録黄樞宻院闗二月十四日奉聖㫖已降指揮壽聖隆慈備福皇太后尊號冊寳承受官依淳熙十二年紹熙元年體例差置縁各已經大典職事與其他不同特與免减一員餘依已得指揮施行令臣書行須至奏聞者右臣照得紹熙元年修製奉上四冊四寳差人管幹不得不多今來修製奉上一冊一寳若初間從公差置便合取㫖省員却乃比如舊數增多六人其為欺罔不待力辨徒縁業已施行重於痛有鐫减此臣所以從寬論奏乞只依元年員額已荷宸聰悉垂采聽不審何故復有上件指揮以臣窺度必非聖意自欲反汗以長倖臣只是此曹恥於退聽求勝公論且夫行法自貴近始今承受官係是第一等推恩人若許存留即其餘小官豈無辭説則是身為貴近者亂法度也恐非古人患不均之誼臣欲望聖慈将上件指揮特賜収寝令照應已降指揮施行所有録黄臣未敢書行謹録奏聞伏候勅㫖二月二十日奏入再繳奏孫拱之轉官及冊寳承受官免减一員狀准中書門下省送到臣所繳孫拱之轉官奏狀并録黄一道恭奉御批為係實該五年年勞賞可特與書行續准尚書省劄子并送到録黄為臣所繳冊寶所承受官特與免减一員二月二十三日三省同奉聖㫖依已降指揮書行臣須至再具奏聞者右臣語對三省将上臣所論奏冊寳官减員事得㫖依奏者今月十三日指揮也承受官免减一員十四日續降聖㫖指揮也又三省将上臣所論奏孫拱之不當轉官事得㫖依奏者今月二十三日早指揮也可特與書行當日審奏續降御筆指揮也以此見得二事可其奏者陛下之初心朝廷之公論也續准内降者陛下之不得已左右之乞憐也臣誠不肖攝承詞掖儻不能體陛下之初心而曲從其不得已之意則非所以發明聖徳不能伸朝廷之公論而下比於乞憐之人則非所以禆賛邦政豈不為廢司存忘法守乎則臣不敢奉詔必矣臣愚欲望聖慈將十四日續降承受官免减一員聖㫖指揮并二十三日續降書行孫拱之御筆指揮並賜追寝只從元年三省將上已得依奏聖㫖指揮施行不勝幸甚所有元付到御批粘連在前所有録黄臣未敢書行謹録奏聞伏候勅㫖二月二十四日奏入貼黄恭准御批孫拱之為係實該五年年勞賞可特與書行令取到吏部状御前祗應本部即無立定年勞推賞條格指揮顯是難以施行伏乞睿照繳奏饒州奏勘程廷髙斷案状准中書門下省送到録黄節文為饒州奏勘到程廷髙斷案令臣書行右臣照元案見得程廷髙髙祖程節曾祖程鄰皆官至寳文閣待制内髙祖正議大夫祖父皆命官今廷髙以僧惠深受其賃錢誣以占屋而訟之縣又辱罵其骨肉廹逐起遣不勝忿恥倩人打僧其下手人王念四本州已從徒三年髠髪居役定斷即廷髙元謀减一等徒二年半贖銅五十斤罪止於此矣本州復引勅有䕃人犯徒流罪情不可贖者奏裁臣不識廷髙所犯何以謂情不可贖乎狥一僧之欲而辱兩制之故家者是州司不平也從一州之請而廢千載之䕃法者是刑部不審也且夫情重奏裁必有大不得已者近年守臣倚法作威徃徃多是以此藉口捃摭細故汙衊衣冠今若復因饒州所奏有此行遣臣恐郡守之専恣者援此為例操切士大夫之族矣臣愚欲望聖慈將上件指揮特從末减所有録黄臣未敢書行謹録奏聞伏候勅㫖三月二十九日奏入入奏劄子四月臣不勝螻蟻之忠輙有愚言仰干天聽如蒙省覽即臣雖就誅戮不悔臣聞父子天性也孝慈之道不待教而能者也自士庶人皆然而况於人主乎然考之載籍則有尊為人主而隙開於父子之間至於禍敗反不若士庶人之家者何也賤者群居其勢易親貴者異宫其勢易踈故也夫惟其勢易踈則離間之言易入離間一入則父之情不欲自䟽於其子子之情不欲自明於其父由是愈難於言而父子之隙開矣父子之隙開而禍敗至唐之西内則李輔國之徒前日之龍徳宫則梁師成之徒是也論至於此可為寒心恭惟陛下父子之間一同舜禹而比年以來稍虧定省之莭臣誠卑賤不能知宫禁間事若以前鑒觀之或者亦當有離間兩宫者乎陛下孝謹本自無他偶以纎介動成疑阻壽皇恐傷陛下之意不欲自察察言之陛下恐傷壽皇之意又不敢自察察言之而左右之臣各憚天威又亦以傳言為諱由是禮文寝踈情好日隔積成因循實駭聞聽此臣所以不避萬死而輙言之也言之也者將以通之也有如天意信謂如此即下臣此章明詔大臣使兩宫左右曉然知此務通二聖之情則舜禹之徳千載同符矣臣無任拳拳激切祈懇之至乞祠申省状四月六日伏念某一介踈庸重以衰病誤被使令身兼數職皆是文字之官闗繫事體而心力不逮瘝曠實多稍渉嵗時曾亡報效甞聞諸夫子曰血氣既衰戒之在得又曰陳力就列不能者止若某者所謂乏陳力之勞違戒得之訓者矣内負初心外慚公議夙夜念此誠不自安區區欲望朝廷檢會前後陳乞在外或祠禄差遣状劄特賜敷奏早從所乞以安愚分以全晚莭伏候指揮四月七日三省同奉聖㫖不允乞對状四月十四日臣近者不識忌諱幸䝉賜對輙論及兩宫事仰荷聖慈濶畧愚直曲垂清問備盡􅈤悃仍令臣入文字指罪離間之人將有施行以釋疑阻即古所謂狂夫之言聖人擇焉殆不過此臣雖糜捐不足以報然比至奏入却留不下十二日又幸同班奏事復䝉聖慈諭臣以向來文字説得未詳臣切自咎責不足以仰承明詔以致尚稽順動枉招謗讟臣若不務自殫竭以補聰明則非陛下之不聽用臣而臣實負陛下也欲望更賜以燕間之頃令臣縷縷言之茍以螻蟻之微感動天聽於是二聖重懽四方相賀則臣之志願畢矣除已詣閤門進榜子乞奏事外謹録奏聞伏候勅㫖止齋集巻二十四欽定四庫全書止齋集巻二十五宋陳傅良撰
