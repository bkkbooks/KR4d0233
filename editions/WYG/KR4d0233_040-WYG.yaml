front:
  text: 詔擬進御製至尊壽皇聖帝聖政序臣聞乾坤之文不著無以見太極而太極非有待於文也虞夏之書不作無以見堯舜而堯舜非有蘄於書也恭惟至尊壽皇聖帝以妙道治身參之三才而無間以篤行事親質之六藝而無缺以深仁厚澤幸斯世極之根荄鱗羽而無不被宜配雅頌宜襲春秋而臨御二十八年之間凡施凡設歸美髙廟金石之刻無傳名山大川之藏未睹也夙以神器授于㣲身盡遺有迹之累而退托無名之境方將淵乎其藏用冲乎其忘言尚友太極法堯而蹈舜矣則聖政之書何容心哉然而寳章玉册希濶之典儲於三宫廟謨宸斷温厚之辭施於百辟而詠歌休盛摹冩功徳之人又徧天下至於中原之故老蠻貊之君長懐好音歸大號者家有其説國有盟載也豈惟史臣將夫人能記之豈惟今日將後世亦能記之則鋪陳彚次以作一經盖有孺子弗能抑聖父弗得辭者焉矧惟菲薄膺受重寄蚤夜震懼何以嗣服對天之休亦越成書是訓是式率舊因餘庶幾底又是用申命大臣總領衆作起初濳至於内禪掇其最凡得六百四十一條為五十卷一言一動皆足以經天緯地垂裕無極猗歟盛哉昔者文王演易周公繫辭父作子述臣竊慕焉於是親序此書之意以附篇首上之慈庭副在禁中紹熈三年十二月二日嗣皇帝臣謹序
