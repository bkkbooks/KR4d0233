body:
  text: 進周禮説序王道至於周備矣周之作誥曰上下勤恤惟曰我受天命丕若有夏歴年式勿替有商歴年處心積慮盖庶㡬兼夏商之祚訖於㬥秦略如其言是道也惟孔孟知之孔子曰周監於二代郁郁乎文哉吾從周孟子亦曰周公思兼三王以施四事是故合族以五世自夏商用之至周則繫之以姓而弗别雖百世而婚姻勿通諸侯以五服自夏商用之至周九州之外猶以為夷服鎮服蕃服世一見嗚呼偹矣後之傷今思古之士徃徃謂周文弊學者尚論三代要當折衷扵孔孟且夫天命之難諶非兢畏不能有也人心之同然非惻怛不能懐也文武成康積行累功之勤誠有見扵此者讀書至刑人殺人劓刖人君臣相勅甚敬甚懼服念誥教至扵旬時至扵再三讀詩南雅羣臣嘉賔兄弟朋友故舊戍役之際徒一觴豆皆深致其好備禮盛樂以后妃之尊猶知以酒醴勞慰行役僕馬辛苦夫茍燕樂之即詠歌嗟歎之不足夫茍刑戮之即戰戰焉有憂色此非有利為之也畏天命焉耳即人心焉耳甞緣詩書之義以求文武周公成康之心考其行事尚多見扵周禮一書而傳者失之見謂非古彼二鄭諸儒﨑嶇章句窺測皆薄物細故而建官分職關扵盛衰二三大指悉晦弗著後學承誤轉失其真漢魏而下號為興王頗采周禮亦無過輿服官名緣飾淺事而王道缺焉盡廢恭惟本朝純用周政千載一時爰自藝祖不忍役一夫之力而養禁旅不欲使天下一吏得以專政而罷方鎮制度文為雖非周舊而深仁厚澤意已獨至肆我列聖浸以寛大任子及扵異姓取士及扵特奏養兵及扵剩員甚者汙吏有叙復重辟有奏裁論議之臣每不快此而國家世守重扵更定盖周衰且千載而詩書之意扵是焉在豈不盛哉熈寕用事之臣經術舛駁顧以周禮一書理財居半之説售富强之術凡開基立國之道斵喪殆盡而天下日益多故迄扵靖康社稷邱墟生民塗炭老生宿儒發憤推咎以是為用周禮之禍抵排不遺力幸以進士舉猶列扵學宫至論王道不行古不可復輙以熈寕甞試之效藉口則論著誠不得已也故有格君心正朝綱均國勢説各四篇而為之序如此嘉邸進讀藝祖通鑑節略序本朝國書有日厯有實録有正史有㑹要有勅令有御集又有百司專行指揮典故之類三朝以上又有寳訓而百家小説私史與士大夫行狀誌銘之類不可勝紀自李燾作續通鑑起建隆元年盡靖康元年而一代之書萃見扵此可謂備矣然篇帙浩繁文字重併未為成書難以觀覧今略依漢司馬遷年表大事記温公司馬光稽古録與燾舉要撮取其要繋以年月其上譜將相大臣除罷而記其政事因革扵下方夫學之為王者事非若書生務多而求博雖章句言語皆不忍捨也誠能考大臣之除罷而識君子小人進退消長之際考政事之因革而識取士養民治軍理財之方其後治亂成敗效出扵此斯足以成孝敬廣聰眀矣故今所節略通鑑如羣臣奏疏與其他言行與一時誥令出扵代言之臣茍非關扵當年治道之大端即不抄録或見扵他書實係治體不可不聞而通鑑偶遺即據某書添入至扵通鑑登載萬一有小小違誤亦略附著其説扵下若夫列聖深仁厚澤垂裕後人傳之萬世尤當循守者必為之論但存本指不加文采深有兾扵省察也分韻送王徳修詩序右松風軒分韻送行詩十有四家趙容字叔靜翁珽字䖏度魏謙光字益之王自中字道父徐誼字子宜項允中字子謙陳直中字頥剛潘雷焕字省之徐宏字藴之蔡幼學字行之潘霆字材叔潘倩字尚之張東野字孟阜鄭志仁字能之子宜省之行之皆與徳脩為同年進士諸人或與乆故或相識或不相識也能之與叔父伯英字去華則以故龍圖先生嘗客徳脩扵宣城去華方衰麻故不與分韻事林淵叔懿仲沈季豐儉夫後至别自為詩予出韻亦不在分中吾郷風俗敬客而敦師友每一重客至某人主之鄰里鄉黨知客者必至不知客知某人者亦至徃徃具觴豆登覧山水為樂間相和倡為詩致殷勤或切磋言之扵其别又以詩各道所由離合懽惻之意兾無相忘盖其俗然乆矣而未有盛扵此㑹者豈不以其人哉嗟夫吾見為此詩者多矣去十數年復閱而問故焉則名字淟沒有不知今安在者幸不淟沒則流落困窮希得復合不淟沒不窮困時得復合而以勢利變故交不終者有之幸皆不至此然而道不行功業不著家人婦子抱其遺牘私相以為好而天下無考焉是皆可嘆也已余既賦詩又序諸君詩茍吾徳修與凡在此者深知其可歎如此則余尚可因以不朽云夏休井田譜序謂周禮為非聖人之書者則以説之者之過甞試之者不得其傳也周禮説甚衆獨鄭氏學至今行扵世鄭經生志以為之傳焉耳扵其説不合即出已見附㑹穿鑿其舉而措之斯世可不可復古鄭慮不及此也故曰説之者過自劉歆以其術售之新室民不聊生東都之輿服西魏之官制亦頗采周禮然徃徃抵捂至本朝熈寕間荆公王安石又本之為青苖助役保甲之法士大夫爭以為言安石謂俗儒不知古誼竟下其法爭不勝自是百年天下始多故矣故曰甞試之者不得其傳也以是二者至非周禮此與因噎廢食者何異讀夏君休所著井田譜亦有志矣鄭氏井邑若畫碁然蓋祖王制王制晚雜出漢文帝時以海内盡為九州州必方千里千里必為國二百一十其後班固食貨志亦謂井方一里八家各私田百畝公田十畝是為八百八十畝為廬舎蓋人二畝半云凡若此夏君皆不取漢以来諸儒鮮或知之者其説畿内廣成萬步謂之都不能成都謂之鄙雖不能鄙即成縣者與之為縣成甸者與之為甸至一邱一邑盡然以其不能成都成鄙故謂之閒田以其不可為軍為師而無所專係故謂之閒民鄉遂市官皆小者兼大者他亦上下相攝備其數不必具其員歲登下民數於策損益之是謂相除之法皆通論也餘至纎至悉雖泥於數度未必皆叶然其意要與時務合不為空言去聖人逺周禮一經尚多三代經理遺迹世無覃思之學顧以説者謬嘗試者復大謬乃欲一切駁盡為慊茍得如井田譜與近時所傳林勛本政書者數十家各致其説取其通如此者去其泥不通如彼者則周制可得而考矣周制可得而考則天下亦幾於理矣夏氏書成紹興間嘗上之朝已而流落乆不顯吾友樓大防訪求得之於治永嘉之明年刋之郡齋大防博雅好古而知今吾所謂取其通者去其泥不通者蓋其人與則不但此一書而已也丁端叔南征集序端叔為中都官余以太學諸生識之别二十年余承乏桂陽而端叔適守郴端叔誠少余三四歳然其宦達乆矣之官適同時由浙東西入湖嶺各行數千里至之日皆以歳除是歳苦寒多雨雪每所次舎顧見妻子懍慄無人色輙為之嚬蹙無聊而端叔又將母起居飲食一不得如在浙中時及讀南征集余浩然歎曰異哉端叔之過人也先是治安豐以最聞直祕閣尋徙知盱眙盱眙今要地非有氣力者不能得端叔闕以選得之何其盛哉而竟徙郴亦左次矣余蓋晚得官自丞三山起家為桂陽視同年進士最幸先達以余幸甚而之官時㑹天苦寒常戚然於妻子意所不釋往往欲為詩輙語不佳止而端叔官達早左次如此且將母適數千里外乃所過山川仙隱之居皆為賦詩和平無咎言讀其詩知其奉母夫人甚樂也至於忠憤悲壯亦皆有為而不自其已出余不能知端叔藴抱與當世公卿大人短長髙下如何以其逺過余以是為過人也端叔豈但是過余哉桂陽蓋郴一舊縣每事稽郴而後行大抵郴令達四境余方治文書模擬其後而又終不自滿余數數為賓客僚友言端叔才可任大官世未有知之者余知之顧言語不能動人雖然著之篇端以私相為好是則不得辭也徐得之左氏國紀序自荀悦袁宏以兩漢事編年為書謂之左氏體蓋不知左氏於是始矣昔夫子作春秋博極天下之史矣諸不在撥亂世反之正之科則不錄也左氏獨有見於經故采史記次第之某國事若干某事書某事不書以發明聖人筆削之㫖云爾非直編年為一書也古者事言各有史凡朝廷號令與其君臣相告語為一書今書是已被之弦歌謂之樂章為一書今詩是已有可藏焉而官府都鄙邦國習行之為一書今儀禮若周官之六典是已自天子至大夫氏族傳序為一書若所謂帝繫書是已而他星卜醫祝皆各為書至編年則必序事如春秋三代而上僅可見者周譜他往往見野史竹書穆天子傳之歟自夫子始以編年作經其筆削嚴矣左氏亦始合事言闕二字與諸書之體依經以作傳附著年月下茍不可以發明筆削之指則亦不錄也蓋其辭足以傳逺而無與於經誼則别為國語至夫子所見書左氏有不盡見又闕不敢為傳唯謹如此後作者顧以為一家史體而讀左氏者浸失其意見謂不釋經是書之存亡幾無損益於春秋故曰袁荀二子為之也由是言之徐子所為左氏國紀曷可少哉余讀國紀周平桓之際嘗有事於四方其大若置曲沃伯為侯詩人美焉而經不著師行非一役亦與王風刺詩合而特書伐鄭一事王子頽之禍視帶為甚襄書而惠不書也學者誠得國紀伏而讀之因其類居而稽之經某國事若干某事書某事不書較然明矣於是致疑疑而思思則有得矣徐子殆有功於左氏者也余苦不多見書然嘗見唐閲左氏史與國紀畧同而無所論斷今國紀有所論斷矣余故不復贊而道其有功於左氏者為之序張園送客分韻詩序右張園送客分韻詩為常信二史君作也士立朝則相推先去國即相懐不忍别此豈直私為好哉而關於當世之故矣蓋聞吉甫有大功於南征其來歸飲御之詩自謂及此者張仲孝友在焉爾逮其季至采蕭葛一日去君側凛然有三歳之懼周之盛衰余以是觀之石侯叔訪黄侯商伯同時丞太府皆以欲便私請於朝二三大臣輙留其章不上繇侍從下暨館學之士茍見諸公亦輙止之曰奈何使兩賢去也而侯請益力蓋乆之諸公信以為靡他於是始言上上重其去為擇輔郡纔需旬歳之次而叔訪得信州商伯得常州然合朝方憮然不滿飲餞彌日相與咨嗟歎息也最後同院若同僚若同年家又十人餞之張園兩侯之賢天下識之今其去徒以欲便私無毫髪意不自得且旬歲間為善輔郡行矣還闕可朝發夕至也視前時去者甚寵而同朝猶不忍别如此嗟乎立今之朝不謂之遭時耶十人者㑹稽黄文叔清江彭子夀章茂獻永嘉薛象先蔡行之蜀范文叔臨川曾無逸章貢李和卿東莱呂子約與余也㑹張功父致地主之意亦分一韻余不獲在分中故為之序義役規約序古者鄉田同井出入相友守望相助非其俗然也周官之法四閭為族八閭為聫以役國事盖自五家為比家一人至百人為率是四閭也其必以八閭為聨者役者半休者半也役者給公事休者相與治其家事而又有羨卒有閒民以借助焉故其民相親睦而不病扵役今天下上無横斂下無繁征而民極困扵保正長則以保甲催科之故也民不能堪雖叔伯兄弟相訟以避役乆矣叔伯兄弟相訟以避役非其願相讎也勢使然也雖勢使然而非其願相讎之心不泯扵是義役興焉義役非古也而有古人之意何也古者官以義帥民使之相親睦今也民以義奉官而私相親睦其政則殊其俗不可謂不美也假如自一縣一州轉而推行之至扵天下盡然則其俗益美假如上之人有變通養兵之道而僱役錢可還以予民則其政尤美故夫義役者未必非復古之漸也凡古之美事其初類自人心起耳吾都不過四五望族凡慶弔問報之事大抵相好而又家務為學人務省事其俗甚厚獨時以役訟失懽一旦㑹集割租以行仁義各以力厚薄無勉強不得已之色余故序其規式備道其善以勸其有終焉謝季澤正事韻類序始余見季澤於外舅張氏與諸丈人行論事不下氣於州縣吏長短時事當否輙誦言之無歉則謂季澤但悻直耳乆之見其姻族急難不得季澤議不决議决矣而用不足則或取具於季澤又乆之州閭至委巷每事不可無季澤藉其力者為多也季澤雖不愛其力至意小不合即以語侵人或强隨和人意亦戲笑皆含譏誚初不以吾有力自喜見毫髪徳色而人亦諒其靡他不以為怨余然後益知季澤孔子恥巧言令色足恭思魯狂士而惡鄉原葢自周季士大夫貎勝而質衰氣卑而辨盛孔子亦既有感於此矣居今之世得見如斯人者吾固有取也嗚呼今亡矣此書季澤所著其家學長於詩禮頗欲有所論次未就僅及就此篇其於字學偏旁訓故學者易入焉季澤游學校登進士第調台州司户髙郵軍教授以勞績薦改秩知福州寜徳縣未滿歳卒官不足行其志位不稱其才也韓昌黎嘗言註爾雅蟲魚非磊落人歐陽公序韻總亦曰儒者莫暇精之其有精者往往不能乎其他余方悲季澤官不足行其志位不稱其才且懼後之人見此書如二公云云也於是道其平昔大槩序之篇端焉謝懐英老子實録序懐英嘗為舉子知推尊孔氏矣已而脱儒冠去為道士以其推尊孔氏者尊老子於是為書若干卷自開闢以来凡老子名迹變化及其遺事言散見於百家摭拾詮次無遺謂之實錄嗚呼何其專且博也則誠有功於道家者儒者筮仕即不得專志於書雖專志於書往往不暇﨑嶇及世次年月也或有暇及此又不敢不務差擇則拘於六經而不得騁故吾夫子之道與天地相為無窮夫人推尊之願未有如懐英此書者向使懐英幸卒舊業不去為道士則此書將為孔氏作其有功何如哉雖然昔太史公嘗作孔子世家蓋有志於此矣説者反曰夫子之道與天地相為無窮且必與戰國若漢封君較乆長者則世家似不宜作孔氏之子孫輯所逮聞作家語孔叢子二三書儒者亦弗甚稱道至羵羊楛矢稍欲以夸大聖人又或以語神怪不取也然則使懐英幸卒舊學不去為道士將為書尊孔氏則庶以六經斷百氏必不得騁其博如此余是以歎息於懐英其不幸而不得自託於孔子也夫其亦幸而得自託於老子也夫故因以為序云懐英姓謝氏名守灝永嘉人余同舍生也送蕃叟弟趍江西撫幹分韻詩引蕃叟入江西幕同餞者十人林宗易自牧沈仲一徐一之朱穀叔及之黄敬之余兄莘叟分韻賦詩某亦在分中又為之引宗湛弟侍國風十五篇為别作者居大半道其所歴山川辛苦之狀僕馬之病而止於禮義古删詩取焉騷人多怨誹自騷以降無譏焉爾若夫大雅之贈别則異於是吉甫作頌穆如清風仲山甫永懐以慰其心此所謂治世之音也十人者之詩雖工拙不必論要皆歸於和平而無恨余是以占吾弟之將有所遭而并樂吾黨之能易其心而後語也是為序孫子發微序代陳頥剛作自六經之道散而諸子作蓋各有所長而知兵未有過孫子者春秋之季天下將趨於戰國矣故武之書多權謀儒者輙擯弗道間有好其書者又徃徃為之章句訓解夫兵事尚變而欲以訓詁求之不亦陋乎余自乾道乙酉不干有司之試端居深念今復嵗矣蓋所觀六經孔孟二氏之遺書由漢以來諸儒發眀之者略備余未能有所增益間讀十三篇尚多餘意因以所聞於先君子與渡江諸將議論兵間事與已見推武之説附次其下嗟乎方天子眀聖養晦於外而拱手讓中原者五六十載矣士大夫懐安顧恥言兵然則余是書亦有為為之也止齋集卷四十欽定四庫全書止齋集卷四十一宋陳傅良撰題跋宰臣以下跋御製
