body:
  text: 選徳殿記代周子充内翰撰進皇帝踐阼以來宫室苑囿一無所增修獨闢便殿於禁垣之東名之曰選徳規模樸壯為陛一級中設漆屏書郡國守相名氏其上羣臣有圖方畧来上可采者輙棲之壁以備觀覧數延見文武講論治道訪求民隱至於四方奏報參軍國之機務皆於此省决暇則紬繹經傳或親御弧矢雖大寒暑不廢臣某俟罪禁林間嘗奉詔獲至焉一日命臣汝為之記臣愚學不足以推廣聖意詞不足以鋪陳盛美謹但采禮詩古文以射觀徳事及歴代治亂興衰大端次第其説禮君世子生三日射人以弧矢六射天地四方其早計若此至於擇士以祭必於射也進退天下之才與祭者繇是得為諸侯卿大夫若屬有賓客之事燕勞之寵莫不用射詩人又於其獻酬歌咢之餘中度不中度罰爵與否有所戚休刺美以為是王公大人風化黎庻者之本也由此觀之古者君臣周旋禮樂以服習勤苦可不謂先事知懼安而能危者哉是故三代而上士大夫皆可獨將而兵民為一戎不生心世用底定比其季也徒以為威儀觀美而實不稱馳騁弋獵而政不舉則國人為之隠憂而變風作其後王道浸缺而文武兵農遂分而不可合一夫荷戈海内騷動社稷之主以兵廢興盖自秦漢下迄五季數千百載間大抵亡具而漢之車騎材官唐之府衛一二近古則享國最乆其效可覩矣以臣所按三代舊聞放乎漢唐文武離合之際要之國家閒暇以戒懼為本天錫陛下厲精百王之後追蹤太古之上迺為是殿以訪羣策以裁萬務以閱圖史殿不主乎射也而託名焉射不專於覿武也而尚徳焉聖謨明逺於以覧示中外感諷臣子敵國外患之慮甚深甚至昔宣王中興其詩曰射夫既同助我舉柴序之者曰是小雅盡廢而復古之詩也治有先後功在不舍沉潛剛克時乃天道陛下堯舜揖遜而實可以為湯武臣實以是闕重修石崗斗門記元豐四年宋興百有餘載矣郡丞趙㞦景仁行縣與令朱素履常隠士林石介夫賦詩記事則有觀石崗斗門之作是時國家方修農田水利之政通守與其屬邑若布衣廵行阡陌詠歌民事而郡守李公鈞報之以詩亦相勞苦徃還如交逰豈不盛哉而事何患不集者然詩不著其所始則有門舊矣不知其起何時也紹興之季年屋閘俱壊獨兩股㟁與溝底以巨木為之長或三文而厚徑尺有屹然存者徃徃朱令之遺跡也余為兒時逮見父老多喜道斗門事盖門始附穗豐山之南址以距海逺㵼水不効而議遷置三鄉之人聚訟不决也湏時潦至廼為木鵝數十即並山諸水所發源縱之而觀其所㑹則旦日㑹於石崗又患其平壤不能音耐嵗月涸而審之皆磽埆沙磧與地名不謬宂以鉏鍤率人日得土盈斗於是定遷則其謀始甚長雖更元豐之盛人精其能慮不可易浦堙而門廢民乆病而官不省乾道間莆田劉朔為司户喜事及物隠士之孫以告劉輙率余夜詣門所遲明天大寒垂垂欲雪招漁舟泥行數十里役夫皆凍慄幸且已而劉不已竟遵海堧引絙以度其浦脩廣之數而歸白郡郡不果聽又三年故國子司業王公速為守甞用錢五十萬民夫二萬四千通其故浦然是役也浚浦之功居多而以餘力及門惟支傾填漏茍完而已盖以俟後之人而復不省浸趍於廢知州事李公棫與通判謝公傑慨然念之謂主簿石宜翁能以錢七十萬俾治其役發視遺址則股岸之木蛆食之過半闕底板亦浸滛潄嚙穿蠧百孔矣知縣事劉龜從又勸得民錢六十萬而縣自助致五萬宜翁因擇其鄉之秀黄廷瑞者三人以蒞匠以石代木撤舊而新之為㟁若干丈為底若干丈為閘之裏蔽若干丈益其柱若干為若干上為覆屋旁為輔梁凡百可乆無不臻極不惟還吾民之利如初而又過望訖事公以劉石之請屬某為之記嗟夫自元豐至於今又百有餘載矣人多言時不同吏道相䋲切益薄顧事無可為者惟公惇大樂易不以獨見之明治郡謝公以風流文雅時出而緣飾之上下相安闔境自以無事因以整暇之際出帑錢四百萬治三邑之道阻而且為此門既付之人則一聽其自為淹速良楛未甞過問饋勞時至無以簡書故其人不以見察為憂而以欺為恥務趨其難用情於文具之外以求追元豐之蹟尚可以想見承平盛時為長吏者之意向使紹興之末官與民同患如此則必不壊使劉司户之説行雖壊亦必不極近十五六年間有補門事之缺猶不至如今日大費甚勞而難復然以積壊之極費大而勞甚視元豐特為難而卒復之事之廢興要亦顧其人如何爾闕但曰時不同事無可為者吾不信也淳熈十二年三月温州重修南塘記自中興永嘉為次輔郡其選守盖多名卿大夫矣然境内有宜治者三間歳貢士羣試且萬人於浮屠宫中草舍託䖏一宜治兵與民雜居頡頏市人間要束不行而鬪訟多二宜治州城外南達瑞安有石塘百里所不知起何時而歳積壊傾者為嵌陷者為匯遇時潦咫尺不得進徃徃溺死自閩山至於吳㑹去来者病之三宜治而歴年乆更太守幾人皆畏其役不敢議議輙弗就雖僅就亦茍簡復廢者何哉吳興沈公治郡之明年謂賔佐曰上方朝徳夀宫為夀加惠㝢内詔減筭錢之半吾屬備數奉詔何以仰稱而適無一事可以宣勞効能廣上意者惟是郡之百廢終將累民吾幸逄年帑有幣餘而嗇其蔵失今弗圖以煩後来將安取此也於是作貢院於是作五營盖晚而有以塘事告者公與通判率兩邑大夫即里居謀曰役復有大於此者乎奈何使吾民錙聚銖斂竊自支補甲前而乙郤也茍無愆時工勿問庸幾何茍無乏事石勿問價幾何輿匠肯来市無强賈自冬十月至今三月而塘成凡是役邦人亟請於州於部使者前太守李公以錢三百萬提舉勾公岳公繼以米四百斛倡民興之民亦輸錢案至四百三十二萬起淳熈十有一年而事丕集今糜錢一千一百萬而弛民錢六百五十餘萬不取邦人以是役為宜書而屬予焉以予所聞於公者如此况州縣官數易事彌廢熈寕考課又削橋道弗擬世相蒙習以偷為得間有興作則議者顧曰是希進務以出名迹則又曰是一切厲民為美觀爾則又曰彼將以為利長吏雖欲自信而不得騁公以法從舊人起家為郡且復用矣向使過計收聲養尊安用事事而獨意鄉不撓愈勇以今較昔難易淹速是皆宜書然公他所為便民者雖多而其大者在石塘水行御艫陸行躡踵更相和歌不爭以賀夾河老翁有年七八十者擕持小兒嬉戯於其上不謂繼今民免於死或為詩謡或香火以祝公且乞田二頃嗣歳積之盖欲公徳與是塘為無窮云公名樞字持要前為太子詹事兼吏部侍郎淳熈十四年三月記重修瑞安縣學記縣學故有記政和間右丞許公景衡記蔡侯景初徙置學事闕袁州分宜縣浮橋記分宜浮橋為舟十有六袤四百尺廣十袤之一前轉運判官劉公經始副使直龍圖閣趙公成之凡捐錢不啻一百萬佐州縣之費仍率三歳以五千錢當河渡之人入而幹辦公事楊君潜能賛二公意主簿劉君孟容眡其役訖以不擾最後知州事黄君劭知縣事鄧君友龍至恨不在役中州率嵗儲錢二十萬以待修繕縣伐石記之相與圖是橋勿壊乃已橋於邑便甚橋北地勢下為治所南髙為上供倉邑東西兩山善束水每時雨大至水輙冒邑北民騎屋危望㟁南爽塏咫尺不得徃避南民欲朝夕販於市者亦不得徃就也倉與縣離立輸租者常病爭舟父老計之熟數以為請於是始集世多言儒生論治但曰得人得人此何等軟熟語毋亂吾聽由今觀之分宜於江西邑為小浮橋於分宜事益為小大吏必得如數君子者小吏必得如數君子者扵是始集向使二部使者相先後不同出一意必且中輟幸不中輟而幕中贊不力邑中治其役無具即必不速就雖速就後之人惡莫已出壊弗壊聽自如何則亦難乆余不足以知天下事甞言以其小且易者度其大且難者當世君子誠同出一意如此贊其畫者昭其事者如此後之人以勿壊為已責又如此徃徃天下或可為矣余樂是橋之成且以劉鄧之請為記因著儒生之言固有不可廢者劉公名穎趙公名善俊潭州重修嶽麓書院記自唐季至扵五代用兵而教事闕聖人作四方次第平以爼豆勝干戈而天下靡然日趨扵文盖宋受命四年遂平荆湖又十有一年尚書朱洞来守長沙作書院嶽麓山下朱在國史其行事不甚較著足以考見上意所嚮為吏者皆承休徳知所先後如此豈不盛哉而其風動抑何速也五六十載之間教化大洽學者皆振振雅馴行藝修好庶㡬扵古當是時州縣猶未盡立學所謂十九教授未有顯者而四書院之名獨聞天下上方崇長褒異之者甚至則其成就之效博矣熈寕初行三舎之法頗欲進士盡由學校而鄉舉益重教官之選舉子家狀必自言甞受業某州教授使不得人自為説崇寕以後舎法加宻雖里閭句讀童子之師不關白州學者皆有禁詔令誠甚美然由是文具勝而利禄之意多老師宿儒盡向之書院不知起何時以余所聞漢初郡國徃徃有夫子廟而無教官且不置博士弟子員其學士甞課試供養與否闕不見傳記然諸儒以眀經教扵其鄉率從之者數千百人輙以名其家齊魯燕趙之間詩書禮易春秋論論家各甚盛則今書院近之矣縣官時時遣守相勞問致饋為禮其門生皆世守師説更相傳受不易業盖至孝武帝時郡國始稍稍有學校官由今觀漢晚出視其初儒者術業工楛優劣可知也已方大中祥符間天子使使召見山長周氏式拜國子主簿詔留講諸王宫式固謝不應詔卒還山肄習如初至賜對衣鞍馬内府書而宋有戚氏吳有胡氏魯有孫石二氏各以道徳為人師不茍合扵世著名余以是益歎國初士風之厚本之師道尊而書院為不可廢乾道元年故師樞宻劉公珙克復門寳之舊已浸費治今直徽猷閣潘公畤亟踐修之某得官桂陽扵長沙為屬邑始詣大府請事時公至鎮適數月矣與九郡守要束咸以寛簡闔部晏然民吏意得曾無凢目可以再三扵有司者因得陪别駕後至書院謁諸先生祠下㑹修事且輯諸生穆然而志專徘徊樂之不忍去也既去州教授兼山長顧杞堂長吳獵以訖役屬為之記某嘗獲誦侍講張先生所為記及扵治心修身之要湖湘之俊亦既知所指歸近嵗以其論述由大學禮部奏名及對大廷連為天下第一他未試可畧覩矣雖欲有言無以出講聞之外者而公扵今卿大夫為先進年益髙聞望益尊重人人能道之又何待余言者故但次書院所從廢興之故繫以嵗月而强附名焉是嵗淳熈十有五年雲章閣記臣恭惟夀皇聖帝在御二十八年㝢内之士可謂遭時矣臣為布衣識僧嗣清扵行在所之西湖浄慈寺清尚年少土形木質窮晝夜或累日不飯蔬飲水一破衲凡數十寒暑其徒類訕笑之士大夫猶未甚有識者然時時聞被㫖入禁中莫知上訪何事清所對者何語臣每惑焉隆興乾道之間方講修内外之政惟日不足有以作士氣寛民力足兵長財之説進則朝上而夕召見或不淹時至達官貴人而空談不適用但習紙上語云云者徃徃不錄盖舉選人必考課勞績果如何進士必習弓矢扵殿庭試中與否而群臣方病不知當世之務趨扵實學扵是時上安取扵嗣清而嘉與之如此後二十年為紹熈之元夀皇禪大寳今上適再嵗燕居殊宫澹然遺事物之累恭儉滋甚玉食日不費萬錢而嗣清則亦去江浙南㳺湖湘之間矣臣乃釋然窺見聖意鄉者凡以博求㝢内之士隂訪幽隠庶㡬有豪傑者不但為佛法也雖然佛法幾墜清扵是時能以苦學動萬乘世傾向之豈不盛哉其南来也無一物自隨當暑行數千里未甞宿人家獨所受上賜四句贊詩衘袖不懈始至寄藏臣所為之震疉已而師臣趙善俊請住南嶽之福巖寺明年臣行郡過山間既拜稽首瞻想宸翰且歎曰雲漢之章足以鎮兹山矣顧未有尊閣之所其徒遂相與作雲章閣藏焉而求記扵臣維嶽之尊維宸翰之光相與為無極也抑臣何幸附名碑隂死且不朽謹拜稽首書之温州淹補學田記郡校官有賜田自慶歴四年始於是宋興且百年上所以加恵學校之道備矣崇寜學制行郡各置博士弟子員費廣不繼用事者文飾過當至苛斂以贍之中間多故輙一切弛去徃徃所在凡校官之入不足以待學士之版直煥章閣司諫謝侯来守永嘉下車纔數月修墜緒平滯訟人用乂和乃以其暇訪求里中士賔致之學又得公田民私以為利而不應令者歸扵學有司闔郡驚歎方為吏者急他務不暇有學政侯顧獨加之意耶相與請扵博士李君求余文記之余固樂道乎此者也盖宋興士大夫之學亡慮三變起建隆至天聖眀道間一洗五季之陋知鄉方矣而守故蹈常之習未化范子始與其徒抗之以名莭天下靡然從之人人耻無以自見也歐陽子出而議論文章粹然爾雅軼乎魏晉之上乆而周子出又落其華一本扵六藝學者經術遂庶幾扵三代何其盛哉則本朝人物之所由衆多也余甞求其故三君子者皆萃扵東南若相次第然殆有天意而浸灌培埴斯已勤矣雖後生晚進失其師傳自為異同不務相扶持然要其消長皆關扵興衰之數非細故也而議者但患官冗而舉子多厭薄而銷沮之之説滋甚吾州闕生長旁郡最有聞則亦毎在數中侯於今加意焉政何足以言之是尤余所樂道者也而况李君之請乎侯名某邵武人李君某廬陵人田若干畝著之碑隂止齋集卷三十九欽定四庫全書止齋集卷四十宋陳傅良撰序奉
