body:
  text: 奏状劄子轉對論役法劄子臣不肖頃以備員郎官蒙恩賜對嘗奏三劄專論民力之困然熈寧以來生財之害粗及梗槩未敢悉數而玉音嘉奨至于再三退切感激遭際如此繼今可以畢其說矣今者適充轉對之員敢以奏劄數内免役一項先為陛下誦之而因究役法之弊庶幾采擇以救斯民於不勝其病之後所謂免役錢者本以恤民使出錢雇役而逸其力也自罷募户長而取其錢今𨽻總制熈寧五年罷十年以其雇錢别樁管紹聖三年再雇建中靖國元年再名樁管紹興元年起發九年罷十年六月拘收入總制窠罷募壮丁而取其錢今𨽻總制熈寧七年罷十年以其雇錢别樁管紹興十二年十月拘收入總制窠名罷募耆長而取其錢今𨽻總制熈寧八年罷十年以其雇錢别樁管紹興五年起發九年罷十年九月拘收入總制窠名而又以三分弓手雇錢建炎元年增置弓手二年民户役錢更增敷三年以闕三年罷紹興五年三月拘收入總制窠名一分寛剰錢崇寜二年封樁四年罷政和三年再封樁紹興五年起發九年罷十年六月拘收入總制窠名盡𨽻總制而又以罷虞候重禄錢宣和三年陳亨伯奏罷五年拘收充糴本乾道四年拘收入總制窠名起發罷諸州曹官當直散從官雇錢宣和五年拘收充糴本罷學事司人重雇錢宣和五年拘收充糴本宣和糴本之類盡𨽻總制至於官户不減半役錢建炎二年起催紹興五年起發乾道二年六月拘收依經總制赴南庫在京吏禄在京官員雇人錢在京吏禄毎嵗下淮南兩州十二路起一萬四千五百貫政和元年毎路量添五百貫在京官員雇人錢紹聖元年立一萬貫為額於十四路起發政和四年毎路量添三百貫之類又令項起發則免役錢之在州縣者日益少而役人無禄者衆矣夫使民出錢募役而逸其力未為非良法也而反取其錢以贍他用既取其錢以贍他用則必且白著而役法不得不壊何謂役法壊今天下州縣之胥皆浮浪之人而鄉村催科專責之保正長是也以州縣浮浪之人行遣公事蠧民誠甚然未易改也臣不暇論若夫鄉村保正長任催科之責破家蕩産者往往而是獨奈何弗救乎且夫保正長催科非役法也以保甲法亂役法而行之也臣請言役法與保甲法之異臣謹按熈寜四年八月十一日行免役以鄉村第一等人户分為甲乙丙丁戊五等第二第三等人户分為上中下三等第四第五等人户分為上下二等耆長於第一第二等户輪充一年一替如本村上等人户數少即更於第三等内從上輪充壮丁於第四第五等二丁以上輪充半年一替户長於第四等召募有人丁物力者充一稅一替此役法也臣又按熈寜三年三月九日行保甲凡十家為一保選主户有心力者一人為保長五十家為一大保選主户最有心力及物力高者一人為大保長十大保為一都選主户最有行止心力材勇為衆所服及物力最高者一人為保副保正此保甲法也役法者五等簿是也保甲法者魚鱗簿是也五等簿者以通縣計之自第一至第幾以其户强弱各自為簿魚鱗簿者以比屋計之自第一都至第幾都不以其户强弱併為一簿各自為簿即第一等之中雖有强弱要不失於上户第二等之中雖有强弱要不失於中户以其力略相等故其役均併為一簿即或一都之中適多强户則歇役之日長或一都之中適多弱户則歇役之日短或一都之中適皆弱户則於其中不得不推排一二以為强户則無復歇役之日以其力相殊絶故其役不均此甚較然矣方行保甲但以譏察盜賊而已與免役初不相闗熈寧七年始以保丁充甲頭催稅而耆户長壮丁之屬以次罷募利其雇錢而封樁之法起矣元豐遂著為令以甲頭同大保長催科元豐賦役令諸鄉村主户毎十户至三十户輪保丁一人充甲頭並須同大一保催租稅常平等錢嘉祐以前未有此令元祐匆匆復舊隨即紛更紹聖二年二月詳定所言鄉村毎一都保保正副外大保長八人其保丁輪充甲頭皆最下户人既不服事率難集按大保長各二年替宜以都保租稅輸二人分一稅一替而罷甲頭於是催科悉用大保長矣由此言之大保長催科尚非王安石之舊特章厚為之也今士大夫固恥言安石之為人乃若章厚則指為罪魁皆知其殘忍不恤敢於斵喪祖宗深仁厚澤之意而獨世守其刻薄之遺術以為成憲臣實未喻萬古役法一王安石能改之章厚能力行之方今仁聖在上宰輔極天下之選而賢俊滿朝矣謂為無人能斟酌損益以通其變臣亦未喻且今之困民力誠非一事而役害最大中人之家破蕩相繼有以仁聖在上宰輔極天下之選而賢俊滿朝如此乃坐視斯民最大之害持章厚所為者若出於三代之舊而不敢議有輙議者不過付之有司檢坐見條申嚴行下以塞人言臣尤未喻也陛下加憫元元甚于赤子誠不以臣不肖妄論成憲下臣此章令侍從臺諫而下推究其所自來而雜議之要不以保甲法亂役法雖未足以盡寛民力實大恵矣臣不勝拳拳封事紹熈三年十一月臣一介疎逺才不逾衆人而多病早衰齒髪頽變久無榮進清顯之望間者将指湖湘罷弗勝任嘗上奉祠之請乞便醫藥不謂陛下過聴不以臣為不肖歸以畿節留之郎舍賜對便殿初無建明而天顔開懌玉音温厚曽不數日擢貳冊府又未幾用以為皇子嘉王府贊讀官極一時儒者之遇臣誠不自意陛下待之甚寵也不勝大懼無以塞遭值之責日夜思念獨有與二三僚友共秉一意為大王道古今父子君臣之際人之大倫天地之正義以成孝敬長恩愛無負任使之意死且不朽盖嘗讀書至文王世子之記曰文王朝於王季者日三鷄初鳴衣服至於寢門外問内侍之御者今日安否何如内侍曰安文王乃喜其有不安則文王色憂行不能正履則必反覆為王誦之曰是可以為法事親若文王則受命作周本文百世功徳見於雅頌願王慕之傚之勿以為不可及也至漢戾太子之傳曰親戚之路隔塞而不通太子進不得見上退則困於亂臣獨寃結而亡告則亦必反覆為王誦之曰是可以為戒事親如漢太子則交兵闕下父子不相保而望思歸來之臺天下悲之願王警之懼之勿使萬一有此也賴天之靈社稷宗廟之福而大王姿稟純明嗜好鮮少不自貴倨喜親書生毎得僚佐危言極論則深信而不諱忌至若周之所以得則斂袵加敬漢之所以失則嚬蹙不忍聞也邇者王譽日彰人心日附臣與二三人者竊相欣賀以為陛下有子國家無疆之休也今竊有惑焉㑹慶誕節陛下闕上觴之禮而弗講長至大㑹陛下復闕稱賀之禮而弗講羣臣廹怵妄窺聖意臣固知陛下自違豫以來雖及康復尚弗便於乘輿而怯風霜雖然非所以為訓也何者區區陳説無過口耳之感必不能勝躬行之化泛觀往古無過紙上之習必不能如家傳之法今陛下上虧三宫之懽而下責小臣陳誼於冡嗣以庶幾寡過則雖抱血誠之忠未見其補将以逃斧鉞之誅而已楚王有言人之愛其子者亦如余乎陛下以國家無疆之休託在一子宜如何愛之而偶不察夫所以儀刑之道如此顧使講讀皆為空言名曰輔導安用臣等此所以痛惜此舉動非所以為訓也臣以多病早衰齒髪頽變久無榮進清顯之望方申祠請以便醫藥不忍黙黙昧死為陛下一言以冀省悟伏紙流涕不知所云是時夀皇聖政書成已降指揮十一月十四日進呈忽長至日駕不出宰執以下不勝憂懼是日却付出聖政序内翰李巘獻之所撰也翊日丞相進呈上云可别令人撰入既進入宸翰遂出於是過宫辭免起居舍人申省狀准尚書省劄子備奉聖㫖陳傅良除起居舍人某忽拜除命懼不遑居伏念某疎庸之資淺陋之學重以病餘齒髪衰變介在衆俊是為陳人而自再入修門疊冒殊渥甫綴郎曹遂領冊府纔及半載復有今除且夫侍立記言舉世之所攷信直前論事在廷之所觀瞻冒而居之實逾涯分而亦非所以安數竒之迹全靖共之操伏望朝廷特賜敷奏亟寢誤恩以輯公論十二月二十四三省同奉聖㫖不允辭免兼權中書舍人申省状准尚書省劄子三省同奉聖㫖陳傅良兼權中書舍人竊以攝官承乏暫時使令力所克堪不當辭避惟是掖垣之職闗係非輕盖辭令不工則不足以發明主徳封還不競則不足以慰滿公論苟非其人難以一朝居也伏念某才藻衰落無華國之文志氣銷墮無回天之力若使嘗試為之必見闕誤此所以聞命震懼須至控免而况環觀在廷英俊林立或兼數器纔効一官則寢此誤恩改畀他士不惟寛小已共二之憂亦足成公朝選衆之美伏望朝廷特賜敷奏曲從所乞四年正月十九三省同奉聖㫖不允繳奏劉煒與監司差遣状准尚書省劄子節文三省同奉聖㫖劉煒首議禁戢私錢今已見效依舊與監司差遣臣寮上言乞賜寢罷二月六日三省同奉聖㫖令以次官書行劄付臣須至奏聞者臣竊以劉煒嘗為監司以言罷去今既旬嵗循省云久陛下念之再與元來一等差遣此乃朝廷起廢之常典人主棄瑕之美意求之故事前後施行似此非一盖亦無可争執者矣獨縁特降批㫖稍闗事體即與尋常行遣不同此後省所以不無疑惑須至論奏臣愚欲望聖慈特垂天聴收回批㫖将劉煒只依常行起廢事例候有闕次隨宜差使如此則雖臣書行而當官之人可以自安不至再有煩瀆且亦以免劉煒煩言滋至之累謹録奏聞伏候敕㫖二月初九日奏入留中繳奏刑部大理寺鄢大為斷案状准中書門下省送到録黄一道節文為刑部大理寺状吉州奏勘到百姓鄢大為說合已斷人李一討合游六等各持杖行刼朱三家穀物贓滿按法寺稱其鄢大為准條為絞刑上定斷合决重杖處死二月十四三省同奉聖㫖鄢大為依斷令臣書行縁事干人命須至奏聞者臣竊詳上件斷案止以鄢大為所帶刼穀木檐堪以害人定為持仗强盗贓滿五貫合决重杖處死設若不以木檐為杖即計贓須滿十貫方得死罪死生之分在於木檐稱杖不稱杖毫厘之間此不可不謹也臣嘗習此矣在律仗謂兵器杵棒之屬餘條稱仗准此恭惟本朝列聖繼作刑日益輕以為杵棒立文該載未明則犯法者易陷刑者衆於是重立兩條案嘉祐編敕賊盗門其一云應持竹鎗竹杖磚石之類為盗堪以害人者並同持仗之法此謂苟持竹鎗竹杖磚石堪以害人之物而為盗者即為持仗以明但持所須之物為盗不得稱仗矣其一云将鎌檐刀斧之屬於人園林陂野内偷割禾穀蔬果盗斫柴薪之類元非積聚者并将篙楫盗取空船或持鞭杖偷趂孳畜雖變主知覺但不曽施威力抵拒者依不持仗竊盗法此謂苟持鎌檐刀斧所須之物而為盗即不為持仗以明必是特持堪以害人之物為盗始得稱仗矣上件兩條合為一編載在敕文則有司承用可以參照不至牴牾至於元豐刪修舊敇一時不深求嘉祐以前立法美意輙将上件兩條離為兩門其一條在名例門云諸稱仗者持竹木磚石之類堪以害人者同其一條在賊盗門云諸於城外竊盗無人防守特持所須之具者並為不持仗注云謂採斫須金刃船栰須篙楫負須檐畜須鞭之類盖自将兩條離為二處即凡用持仗之法只據名例門立文凡用不持仗之法只據賊盗門立文而兩文始不相參照無所斟酌矣兼詳元豐刪定嘉祐敕顛倒本文已失初意謂並同持仗之法改作諸稱仗者節略數字便成深文謂刪去鎗杖但稱竹木自元豐迄今有司遵用盖不知重報者幾千人矣今來鄢大為之獄只是布袋并檐即不曽施威力若用嘉祐舊敕即非持堪以害人之物為盗明矣且夫前朝立法本持所須之物為盗其意非是欲以害人雖斧刃不謂為仗本持堪害人之物為盗其意是欲以害人雖磚石得謂為仗但論其盗有無欲害人之心不計所持是不是堪害人之物原情定罪此春秋之義也又云持仗在外空手入屋罪至死者各減一等即雖持仗若其時不以入室可以減等又云變主知覺但不曽施威力抵拒者並同不持仗即雖持所須之物若其時施威力抵拒可以加等可謂深切著明矣而元豐改作離析敕文今來有司尚循謬誤臣愚欲望睿慈特将鄢大為之罪從未滿十貫條特貸命斷遣仍乞以刑部大理寺擬斷官吏並且免坐失入之罪仍乞将見行條法送刪定所據嘉祐舊敕将兩條刪潤併入賊盗一門以慿遵守臣聞中興之初重修紹興敕令已有指揮用嘉祐舊法故元豐敕多在釐改之科數内持仗一條當時有司偶失参攷尚未追正今來若行刪潤初非剏新衡改而聖主好生之徳公朝從恕之風自今以始益深益厚愚民無知雖似幸免而天聽甚卑宜享其報此臣所以拳拳也所以録黄臣未敢書行謹録奏聞伏候敕㫖貼黄或難臣曰嘉祐勅稱以鎌檐刀斧之屬必繼之以園林陂野即若持此物入有人居止之室便得稱仗臣竊謂不然園林陂野固是與有人居止之室相對立文竊詳元敕有持仗入有人居止之室竊盜者依不持仗强盜條定斷之文却無持所須之物入有人居止之室强盜者依持仗强盜條定斷之文以此推見只是辨盜者所持本意安在苟是持堪以害人之物入屋為盜雖竊盜可以加等依强盜條故為之立文苟是持所須之物入屋為盜即雖强盜不可以加等依持仗强盜條故不為之立文以其文之有無曉然明甚伏乞睿照二月十六奏入得㫖改㫁上嘉王劄子某等皇恐僣越有廹切之懇仰干王聴近者主上車駕再不過宫宰執侍從相與論諌至於一再而上意猶豫未决中外惶惑計無所出獨以為能賛乘輿之决為主上言此者莫如中宫能通宫禁之情為中宫言此者莫如大王又以某等忝為僚佐辱知最深亦宜為大王言此以成父子之盛徳廹於公論不容隠嘿某等竊謂父子之愛根於天性假如主上稍惑愆於朝謁恭想重華未必便有間言只縁乘輿已駕衛從羅列百官下司夾道起居六軍萬姓望塵踴躍伺候移日俄復中輟以此極駭觀聴反招謗讟又既饑弗得食勞弗能息長嗟浩嘆往往盈路都人寒心恐有不測此皆大王之所親見中宫之所與聞也今不為計後悔何及某等欲望大王力請於中宫以調娱主上為己任備極左右之養順適起居之節上意有所不樂則為之彌縫下情有所難通則為之啟導至過宫日分期於必信號令已出風雨不渝如此則北内懽愉外廷恱服中宫母儀之美配於古人大王子職之譽顯於天下蒼生賴之社稷賴之豈惟女史之光儲君之福哉直前劄子臣待罪右史日侍清光恭覩陛下大昕視朝天顔肅穆垂衣拱手尊嚴若神凡所施行悉中機㑹凡所延見曲盡謙勤未嘗有一話一言匆猝過差一趨一歩俄頃失錯可謂動容周旋中禮盛徳之至者矣近者車駕過宫日分與引班直換授之時百官有司伺候移日竟成中輟各自引退臣切惑焉何者平居暇時曽無過舉何獨至於六飛戒嚴百辟就列却乃深處九重都不省記近在旬月頓違常度者哉而軍民籍籍妄生謗議轉相倡和無所不有臣雖至愚固知陛下之不如所云也反覆思惟乃得其故盖自往嵗之冬聖意嘗闕止齋集巻二十一欽定四庫全書止齋集巻二十二宋陳傅良撰奏狀
