body:
  text: 民論天下之事有可畏之勢者易圖而無可畏之形者難見也易圖者亦易應難見者必難支故明智之君不畏夫方張之敵國而深畏夫未見其隙之民心盖民心之摇慘於敵國之變其變之遲者其禍大而患在於内者必不可以復為也古者有畏民之君是以無可畏之民後之人君狃於民之不足畏而民之大可畏者始見於天下嗟夫民而至於見其可畏其亦無及也夫秦之先盖七國也自孝公至於莊襄亟耕力戰薦食諸侯之境厯七世而并於始皇之手吁亦艱矣始皇惟知天下之難合而其患在六國也故危其社稷裂其土地而守置之以絶内爭之釁中國不足慮而所以為吾憂者猶有四夷也於是郡桂林城磧石頸繫百粤而卻匈奴於千里之外始皇之心自以天下舉無可虞足以安意肆志拱視於崤函之上而海内晏然者萬葉矣而不知夫天下之大可畏者伏於大澤之卒隱於鉅鹿之盜而其睥睨覘覷者已滿於山之西江之東也一呼而起氓𨽻雲合雖邯鄲百萬之師建瓴而下而全關之地已税駕於灞上之劉季矣嗚呼秦以七世而亡六國而六國之民以幾月而亡秦以秦之强不能當民之弱天下真可畏者果安在乎人君不得已而用其民以從事於敵國可不懼哉舟説吾子知舟之所以致逺乎凡治大舟其檣以負䑺欲其屹乎其不撓也其䑺以彍風欲其騖乎而不靡也其柁以轄乎軸欲其壯以殿奔也其磴以柅乎艫欲其堅以鎮浮也其維以縻欲其固而莫之脱也其櫂若篙以櫂欲其勁而莫之折也其篷以却雨欲其績宻而厚也其䒁以捍濤欲其端方以宰也而又樓焉以逹逺戈焉以禦害則以航於川以實萬斛肆千里行遭匯洑枟亂石晝晦㝠大颺掀而無虞不然而斬杙以檣之裂席以䑺之續綆以維之折竹以篙之編蒲以篷之冒而航焉以幸一濟之不覆則溺嗚呼君子者濟乎世之舟也而溺乎其器以空中之質冒焉而求速能不覆且溺邪今吾子之舟其才良而文其器厚而深吾所望乎致逺者也雖然其所待者闕如也吾子而能豐其所中而不倚為檣大其所受可則舒否則翕也為䑺截乎其所守徑乎其所趨為柁正於動引而不發為磴某人宜師某人宜友擇而附麗焉為維勇而不懈乎進為櫂若篙謹重以屏其患焉為篷峻整以逺其侮焉為䒁則吾始無虞於子不然其以致逺也殆也哉吾聞子試於學驟先諸先登吾固憂其挾少年之弱器以其空中而幸然於一濟冒焉而遂求速也詩不云乎譬彼舟流不知所屇心之憂矣不遑假寐以吾子學夫詩也於是乎贈舟説責盜蘭説予寓梓溪一夕友人以園隅蘭芳告予徃視之愛其美而憫其不知於人也遂出置於庭數日香無聞欲去而猶遲之既卒以不香遂目之曰盜蘭而語之曰吾聞鼠有似豹大小異形吾得以辨其為鼠鳥有似鳯赤紫相間吾得以辨其為鶩石雖似玉疵而不醇吾固知其為瑉草雖似苗秀而不實吾固知其為莠彼固有近似吾惑之今汝蘭其形蘭其色花簮焉而癯葉修焉而特吾乃薙茹藘剪荆棘出汝於散地置汝於坐側汝乃假蘭之名乏蘭之徳蕕如其臭苕如其賊吾方汝竊其近似以自欺深其偽而難測者也向使漢宫舍汝何以對乃辟楚人舍汝何以祛乃祥鄭君失汝何取乎七穆之瑞屈原去汝何誇乎九畹之芳然則汝之盜蘭而不香亦何異人之盜儒而實亡吾試言汝以證夫人陽短石顯盜吾公也隂附王鳯盜吾直也釣名布被盜吾儉也伏死諫墀盜吾忠也託經以媚婦盜吾學也口聖賢而行市人盜吾誠也是皆君子近之而不知讒人主俯之而不覺其姦此社稷所以危覆忠良所以凋殘吾今可置汝於中庭是君可置斯人於百官也吾故效魯司寇誅少正卯之義戒鄭寤生去叔段之難亟命除汝汝其何安蘭曰伏辜願屏園樊戒河豚賦余叔氏食河豚以死余甚悲其能殺人吾邦人嗜之尤切他魚余嘗怪問焉曰以其柔滑且甘也嗚呼天下之以柔且甘殺人者不有大於河豚者哉遂賦之物固有害人兮人之勝者智也牛能觸吾為之絡馬能蹄吾為之銜且轡也烏喙之毒用之藥以治也虎豹搏且噬也機與穽足以備也蛟蜄可驅兮蛇虺蚖蜥可避也雖其質禍賊兮名彰莫余偽也是故防之疑兮待之懼也吁河豚柔滑其肌兮㫖厥味也孰魚匪羞兮而柔以甘人同嗜也曽謂其斃人亟兮孽肝膽慘腸胃也人雖疑致死兮饋者弗忌也吁嗟乎物之害人兮不在乎真可畏也凡蓄美以誘人兮盖中人之所利也余誠悦而啗兮彼則隂以其恚也減殘忍以為仁兮文嫵媚忌也甘我以言兮鼠伺而狐覰也笑怡怡吾蠆兮弱婉婉滅人之氣也富貴懐安吾鴆兮幣帛饔牢吾餌也吁嗟乎愛者禍府兮所玩以易也兵莫慘於貪兮干戈伏於不意也晉滅虞以璧馬兮商君以好囚魏也莽詐忠以盜漢兮武賊養以媚也眇河豚其弗戒兮欺天下者曰得志也吁嗟乎若子豢安兮擲天下於一試也文章䇿三代無文人六經無文法非無文人也不以文論人也非無文法也不以文為法也是故文非古人所急也古者道徳同而風俗一天下未嘗惟文之尚也學校進士無文教也鄉黨選士無文科也朝廷爵士無文品也士之有文皆涵養之素而談笑之發蹈履之熟而議論之及非有意也是故雖其所出而非其所為雖其所有而非其所知文之在天下郁郁矣昔者嘗疑夫子於詩之三百篇斷之一辭則曰思無邪夫易也書也春秋禮樂也皆其無邪思也而聖人獨及夫詩盖思而得之聖人謂是以為天下之文也出於數人之手非一人也出於數十國之風非一國也出於數百載之間非一世也或出小夫賤𨽻非止於學士大夫也或出於暴政虐世非止於寛時暇日也而其辭其義粹焉一軌上之化深下之化厚固如是也嗚呼道盛則文俱盛文盛則道始衰矣射䇿之晁錯不如木强之申屠談經之公孫不如戅愚之汲黯自漢以来甚矣文之日勝而士之俗日漓人才之日之而國家之日不理也華藻之厚而忠信之薄也詞辯之工而事業之陋也學問之該而器識之淺也吾不意夫文之為天下患如此也漢之文揚雄其尤美新之作庸人恥之唐之文韓愈其尤諛墓之誚在當時固不免嗚呼他何望哉愚方惟是自獻而先生辱問焉故愚不敢道其末而願聞其本惟先生賜之守令䇿古之天下無宂官亦無窮人無倖法亦無怨吏夫官不濫則人無滯歎法不屈則吏無滿心勢亦然也而官若是其甚簡也敷奏賔興又若彼其衆也法若是其嚴也黜陟用廢又若彼其果也以甚簡之官待人才之衆以甚嚴之法行賞罰之果而人無滯歎吏無不滿之心何也上之人無愧則下之人無憾也用者必公則未獲者不敢議也顯者必賢則繼者不敢覬也内之者非所昵則所外者不敢浮也逺之者非所怨則所邇者不敢偷也是舉天下之官皆可以用人抱關擊柝府史胥吏士不恥為也嘗觀周公立政之書論文武得人之盛而至於夷微盧之烝三亳阪之尹皆有常之士而其選無異於三宅彼皆逺方也皆卑職也逺方非要地卑職非膴仕而天下之美材居之宜亦有所不安焉而莫之問者何也有君如文武非棄才之主有臣如周公非蔽賢之相則逺之非疏之卑之非薄之也且夫周公大聖也天下所共知也而諸侯無伯則出為東伯六卿無宰俯為冢宰畢公大賢也亦天下所共知也而周公不没則未得以為伯則未得以為監商聖如周公而下闕人也則降而為之不以為辱賢如畢公而上有人焉則淹而留之不以為恨天下之不聖於周公不賢於畢公者又何擇也愚故謂今日難於乆任非誠難於乆任也難於外任非誠難於外任也以古之官視今之官則今宂也以古之法視今之法則今倖也以其甚宂猶苦其不足以其甚倖猶苦其不平無他下有所要者上有所畏也用者未必公人固不恬於退也顯者未必賢人固不屑於小也内之者或所昵人斯競於求也逺之者或所怨人斯難於去也夫如是則盡今之官應今之人廢今之法娯今之吏天下日愈嗷嗷矣嗚呼天下非怨吏之可畏也今日遷某守明日易某令其擾則妨民其費則傷民其無意於留而茍簡於治則弊民其自以為亟遷而求足其欲則又困民故夫吏之便民之病也有便民之法而又有不便吏之憂愚所不敢知也故凡執事之三䇿愚不暇憂而所深憂者上有所畏則下有所要也收民心䇿漢文之仁不在復租而見於復租周官之仁不在荒政而見於荒政武王之仁不在散財發粟而見於散財發粟聖人之仁其積之有源其發之有機其所以厚天下無窮而見於卹天下者特其有限者也天下之人不以其有限之施而致不足之望而常以是信其無所不愛之心而懐不盡之感者盖於其所發占所積聖人之心始形見乎此夫媒人而盛譽之人不以為喜役人而强飯之人不以為徳何也媒之而譽之吾固有所私也役之而飯之吾固有所利也故夫一譽之及必謝者必其無所私之之初一飯之施必謝者必其無所利之之素聖人之仁形見之日而天下吾戴者非其形見之日也其心無所事於形見之末而所召之速則形見其機也昔嘗怪宣王咎已之急辭罪嵗之觖望夫咎已之急辭生於自治之不足罪嵗之觖望則又窮焉而尤天也而中興之雅實先是詩序詩者顧以為中興之根本何也彼其心未有係天下之心也宣王之機所藏者甚微而澤之及人者尚自淺也藏乎中者甚微非力乆則未易以著而澤之所及猶淺則亦難乎遽孚雲漢之旱宣王之惻怛忠愛一旦而大彰彰焉天下以是為文武成康之心也車攻未作復古之業就矣不然遇災而懼漢唐人主如此者總總也彼其令下而民玩而此則速中興之功未可以言語及也人皆曰雲漢之旱中興之福也無雲漢宣王之仁不加損有雲漢宣王之仁亦不加益而中興之機也是詩也故嘗為之説曰商非興於解網而實興於解網周非興於扇暍而實興於扇暍宣王非興於遇災而實興於遇災聖人之仁不外假以収天下而天下之歸心則嘗有俟也天地之徳非止於雨露而物則徳天地之雨露父母之恩非止於乳哺而子則恩父母之乳哺也愚固為今日賀而為吾君勉也方今版圖未盡復也主上踐阼以来江浙之間飢饉荐臻水旱相仍固斯民病也而聖心惻然勤卹民隠下減租之詔遣賑飢之使却免錢之請又斯民幸也愚則以為是宣王中興之機也嘗讀孟子至於鄒魯之閧有司死焉而莫之救孟子以為是凶年不發之報而不可以尤民至梁恵王移粟于民勤矣而孟氏又以為非先王之政夫飢而勿恤穆公固有愧也飢而恵之恵王稱無政何也天下之事安於莫之為者非也迫而為之而不反其本者亦非也是故以梁之政視鄒之政梁若可喜以鄒之治責梁之治梁之及民末矣愚故因鄒之失賀今日之所以得以梁之所未至勉吾君大之章子林子名説古人之名惟所遇焉斯取之矣非擇也商而上迭以甲乙命盖雜紊而無章至於周諱行而名始尊然曰顛曰夭非美辭也而取之以名春秋之世猶不厚乎名衛有石惡宋有伊戾齊有陳逆楚有屈蕩周有史佚夫數辭者皆人之愧焉而至不美者也而取之以名展禽解狐若是者則有取乎物之賤者以自名下漢晉士方以名相髙唐以来士無陋名名美而人才日卑嗟夫專於其内而不張於其外急乎其外而不勵乎其内古今人之異也宜哉吾友章子林子皆恥夫擇名之不詳而請更於予予何吝於名哉而二子之請甚矣其非古人之意也名不若人汲汲乎求治之心不若人姑徐徐而已耳盍亦反其本乎雖然二子以自治之請予又何可辭之於是名章子曰用中林子曰毅章子愿而固林子弱而浮以其名之得微中乎心夫二子而由是焉反之斯名也其猶二子之益友乎里名勝母曽參不入彼里名豈足以凂吾孝哉而君子亟去焉亦合内外之道也然則二子之請於予予不吝於二子雖非古人之意是亦古人之意而已矣朱甥子臧名説吾兄有朱甥者每遇予持尺紙拱而問名焉予曰爾何若名之問也人能美名名不能以美人淑爾身雖陋爾名人不汝議也爾身之不淑假而以丘軻自號焉天下莫之予矣是故古之為名姑用是焉别稱道而已矣賢否不問也爾何名之問也雖然童子而知問名可嘉也凡人之善自一念而為也故患莫大於無識學莫强於自興爾知重而名則必知重而身矣噫是念足以為善矣吾故名汝曰子臧而猶未汝字越十年吾将汝考焉而不負吾名字汝未晚也止齋集卷五十二欽定四庫全書止齋集附録樓鑰神道碑嘉定三年集英殿修撰陳公告老於朝天子歎曰此吾舊學且書命之臣也除寳謨閣待制遺奏聞贈四官録其後所以飾其終者如故典門弟子哭之失聲里人聚而相弔四方士夫聞之無不䀌傷者盖非他人云亡之比也公諱傅良字君舉其先自閩徙温州瑞安縣帆遊鄉湗村里至公八世矣曽祖靖祖邦父彬皆不仕父以公貴累贈朝請大夫妣徐氏贈令人朝請邃於易教授鄉里以篤行稱公天分髙勝其於學問心悟神解而苦志自勉精力亦絶人隆師親友有不可解於心者興化劉復之朔以南省第一人来為司户參軍攝教官得公程文以為絶出公之年甚少也而名巳髙開門授徒於仙巖僧舍士子莫不歸敬薛寺正士龍季宣見公問所安公曰毋不敬士龍曰比參倚如何公釋然増進歸心薛氏後又相從於滆上讀書一日千里其為薛氏祭文云我昔自喜壁立倚天見兄梅潭忽若隊淵梅潭即仙巖也伊洛之學東南之士自龜山楊公時建安游公酢之外惟永嘉許公景衡周公行已數公親見伊川先生得其傳以歸中興以来言理性之學者宗永嘉惟薛氏後出加以考訂千載自井田王制司馬法八陣圖之屬該通委曲真可施之實用凡今名士得其説者小之則擅塲屋之名大可以臨民治軍之際惟公游從最乆造詣最深以之研精經史貫穿百氏以斯文為己任綜理當世之務攷覈舊聞於治道可以興滯補敝復古至道條畫本末粲如也本朝名公鉅卿不可縷數然自韋布而名動宇内者不過數人公自為舉子業其所論著如六經論等文所在流播㡬於家有其書蜀中文學最盛讀之者無不動色文體為公一變至傳入外國視前賢為尤盛乾道六年始入太學士無賢不肖斂衽下風八年公之髙弟蔡公幼學為省元公次之徐公誼又次之薛公叔似鮑君繡劉君春胡君時等皆鄉郡人非公之友則其徒也尤為一時盛事既登甲科朝野想望風采授泰州教授以歸參政龔公茂良帥江西以書幣招之願與定交公曰此古人羔鴈之禮不行於世有年矣善辭之未赴㑹太學録闕求之者衆龔公實行宰相事奏孝宗曰待次不改闕初官不堂除陛下良法也太學録一闕而睥睨者衆臣欲擇取名儒為士林所推者越拘攣而用之則人自服矣上問為誰以公對上曰是朕所素知者除命一下果無異辭就職㡬月車駕幸學改承奉郎龔公既罷政亦浸有相嫉者添差通判福州帥相梁公克家得公喜甚以政委之公亦悉心禆賛不事形迹卒以專擅論罷時淳熙七年也尋主管台州崇道觀起知桂陽軍閒居八年始赴郡提舉荆湖南路常平茶鹽事就遷轉運判官改兩浙西路提㸃刑獄公在桂陽蠲除宿負罷弛斜科倉司則補糴諸郡米至十萬斛漕司亦蠲錢數萬緡力講荒政所及者廣進登極銀三千兩屬力救荒力不能辦申請減額損三之二實恵遂及一方以服勤使事嘗感寒疾至是以奏事再入脩門鬚鬢如雪丞相留公正一見歎曰㡬年陳君舉尚可使外補耶奏留為吏部員外郎初對上曰卿去國㡬何朕時欲見卿乆矣知卿學問深醇有所著書進来時上臨朝淵黙罕有聖語公敬謝而退以周禮説進擢祕書少監訓詞曰朕日御便朝延見郎吏有郎白首色夷而氣温儐者賛其名則汝傅良也朝列傳誦實黄公裳之詞也兼實録院檢討官皇子嘉王府妙選官寮以公兼賛讀未㡬除起居舍人兼權中書舍人期年始遷起居郎紹熈末年龍樓問寢不以時自大臣而下更進讜言從班多連名騰奏或同班叩請公自以受不世之遇必欲身任其責請對直前㡬無虚月剴切痛憤指陳利害無所不用其至盖嘗賛嘉邸為中宫言之又嘗奏疏謂臣等在王邸於古今父子君臣之際人之大倫天地之正義以開導賢王而㑹慶闕上觴之禮長至虧稱賀之儀區區口耳之感必不能勝躬行之化紙上之習必不如家傳之法今既上失三宫之歡則臣等講讀皆為空言矣其餘骨鯁之言有敵已以下所不能堪者上終不加譴而言亦不用一日奏云陛下屢許臣以出又令傳㫖於廟堂而復不然臣貪戀厚恩未忍決去容臣退思補過更圖入奏若不垂聽則有致為臣而去耳又從而草奏曲盡事節犯顔極論度上意不回遂上掛冠之奏上雖不受玉音賜可公即申省乞致仕宰輔留之不可既行授祕閣修撰嘉王府賛讀皇上御極以中書舍人召還兼侍講兼直學士院同國史院修撰謂可以行素藴矣而言者指其學術不正罷為提舉江州太平興國宫慶元二年復劾其在太上朝奏對狂率降三官罷祠嘉泰二年叙復元官再畀祠禄遂除泉州以病力辭至再除集英殿修撰病革謝事遂有次對之命十一月十有二日終於里第享年六十有七積官至朝議大夫爵永嘉縣開國男食邑三百户娶張氏名幼昭字景恵主管禮兵部架閣文字孝愷之女以婦徳著聞先公九年卒子男二人師轍迪功郎安豐軍夀春縣主簿師朴承務郎女七人長適迪功郎監鎮江府淩口茶庫潘子順次適從政郎新福州連江縣丞薛師雍次適迪功郎處州州學教授林子熈次適迪功郎新福州連江縣尉徐沖次適進士張紹次適進士張疇一尚幼令人𦵏於前山開禧元年三月庚申二月奉公之喪合焉嗚呼以公之抱負偉傑學博而精觀書别有髙識作文自出機杼類非今人所可企及求之古人亦未易多得也受知三朝掌内外制經帷史館不為不遇而名髙多忌卒不得究其經世之學為可痛也公行誼著於鄉曲述作擅於當世不待屢書敢摭其論奏之大者列之然後知其非諛墓之詞也公之赴郡免奏事而去歸覲光宗以舊欲奏之孝宗者陳之盖公憂國之心澤民之具其説不易謂藝祖創業垂統無非可傳之法而深仁厚澤裕我後人則專以愛惜民力為本攷之故牘自建隆至景徳四十五年間南征北伐未嘗無事而金銀錢帛糧草雜物七千一百四十八萬計在州縣不㑹古所謂富藏天下者也諸道上供隨所輸送初無定額留州錢物雖盡曰係省而不盡取大中祥符元年三司始奏立上供税額熈寜用事者始取藝祖之約束一切紛更之新法既行増上供之額一倍至崇寜遂増數倍此特上供耳其他雜徭熈寜則有令項封樁元豐則有無額上供宣和之經制紹興之總制月樁皆至今為額而折帛和買之類不與焉茶引盡歸都茶塲鹽鈔盡歸𣙜貨務秋苗以十之八九為綱運是皆不在州縣於是取之斛面取之折變取之科敷抑配贓罪而民之困極矣方今之患何但敵人盖天命永不永在民力之寛不寛豈不甚可畏哉上曰莫急於此但以處置為難公奏第三劄子乃是處置之説既奏褒美再三其大略曰嗣位之初詔為寛民置局講究而民窮如故盖以裁抑細微或蠲空張之數未有以稱明詔慰民望也國家財力竭於養兵又莫甚於江上之軍故每欲省賦朝廷以為可則版曺不可版曺可則總領不可總領可則都統司不可以謂之御前軍馬雖朝廷不得知謂之大軍錢糧雖版曺不得預中外勢分職掌不同事權不一施行不專雖欲寛民得乎都統司之兵與向者在制置司時無異總領所之財與向者在轉運司時無異事出一體而後可議寛民力矣轉對又論藝祖治大而不治細以上書人文字令知制誥看詳升降以次對章奏下尚書省參詳人主所自擇不過臺省長官豈不甚易行哉又嘗論役法謂免役錢者本以恤民使出錢雇役而逸其力也自罷募户長壯丁而取其錢今𨽻總制之類於是役者白著而法不得不壊保正長催科是以保甲法亂役法而行之也熈寜自有役法五等簿是也自有保甲法魚鱗簿是也五等則通縣計之魚鱗以比屋計之保甲但以稽察盜賊與免役初不相闗熈寜七年始以保丁充甲頭催税而耆户長壯丁之屬以次罷募利其雇錢而封樁之法起矣元豐遂著為令以甲頭同大保長催科元祐匆匆復舊隨即紛更至紹聖二年催科悉用大保長役法轉而為保甲嘉祐以前固無此法至此又非王安石之舊特章厚為之今士大夫恥言安石之為人指章厚為罪魁而方世守其變亂之餘以為成憲萬古設法一安石能改之章厚能力行之此斯民最大之害乃若出於三代之舊而莫敢議有議之者則付之有司不過檢坐見行條法申嚴行下此臣尤所未喻也誠能不以保甲法亂役法雖未足以盡寛民力亦可謂至恩矣進故事以真宗詔兩浙福建荆湖身丁錢並特除放其論尤詳以為減折帛不如身丁切於窮民此皆公平時考古驗今可舉而行非若泛然美觀之言卒不得見於用若其封還詞頭遇事輒發未易悉數如請還黄裳給事中則引唐吕元膺紹興程瑀以為比論張子仁之建節則請先處分留正之去留呉挺之除代而其甚難者莫如陳源與率逢原二者源之貫盈幸不及誅忽除内侍省押班瑣闥攝事者繳章五上人皆傳誦大臣力請觸雷霆之怒㡬不自全一為書行公議沸騰黨與凶焰不可嚮邇而公獨當之逢原麄暴恃有奥援所至兇横其在池陽㡬至軍變為總領鄭湜所發按其偏禆上命樞臣鐫戒方待罪間自副統制升都統公又論之源供職自如而詞命不行終不得俸逢原先被宣劄已自書銜而公於二者執奏再三終不奉詔以至乞身而去公去未㡬而内禪子仁訖不得節鉞源亦罷去逢原以病廢惟此三事無敢嬰其鋒者公神色不動来則繳奏旁觀者為之寒心而外間罕知之者鑰與公同生於丁巳少我九日自分教東嘉為布衣交義兼師友後雖一同朝蹟而情義日篤一旦同在西掖同攝北門相與如弟昆然至於同寅協恭尤非他人之比藝祖東嚮宗廟大典集議至再始正百年之禮而臺諫有異論鑰極論之丞相趙公宣㫖鑰又執不可公從旁力賛其決而事遂定謝知閤淵以太母之弟有㫖請給等依禄格全支公已書行而鑰駁之再命特與書行公上奏先具鑰之駮章且曰樓鑰駮章委是允當始知臣失於㸃檢不及論奏若更書行臣有三罪一則迎合聖意不敢執奏二則衝改揮使有司無所憑守三則恥過遂非無見善則遷之義欲望追寢御筆仍正臣鹵莽之罪其事遂已嗚呼孰有負重名於時致身至此而服義引慝同濟公議如公者乎汲引人才如恐不及在湖南應詔薦宋文仲呉獵蔣礪楊炤在朝則薦朱熹葉適呉仁傑王明清修史茍知其賢不復以私嫌為忌其他成就延譽使就聲名者不知其㡬也博極群書而於春秋左氏尤究極聖人制作之本意左氏翼經之深㫖著春秋後傳左氏章指二書盖經止獲麟孔子卒傳止韓魏反而喪之之後殆未有此書也願見不可得則曰此吾身後之書近既得之誦讀不已不揣而為之序其門人遂以銘為請鑰欲述公行事或恐有觸忌之嫌自以投閒十有三年已挂衣冠視䕃㡬何知公為最詳若畏避而没其實豈不負吾亡友㑹稿未集而病深恐溘先朝露不究此志小愈遂扶憊而畢之公風度髙逺動輙過人詩律之精深字畫之遒媚登覽髙致吟諷低昂親之則使人意消王謝韻度尚可想也方主上在宫邸時寮寀以詩為夀惟翊善黄公與公之詩皆有諷諫上為置酒各親書所上詩謝之公後嘗奏知以御札登諸石而跋其下以其稿示鑰未及刻而公歸訪求此稿不可復得猶記其略云季札觀樂歌頌而曰哀而不愁太史公讀虞書至於君臣相敕維是㡬安未嘗不流涕也成王作頌推已懲艾可不謂戰戰恐懼善守善終哉盖頌者不專於美盛徳之形容皆敕戒之義秦斯以来此義殆絶鑰讀之為之感咽嗚呼此又先儒之所未發也銘曰温居瀛壖儒學之淵間氣所鍾挺生斯賢向舒金玉游夏淵源群書博極本末貫穿退然布衣名震八埏晚登周行帝席為前典刑具存訓詞是專王邸螭陛史館經筵獨當雷霆力欲回天經世澤民齎志終焉天之生才夫豈偶然儲神毓秀其必有年宦匪不達受才則全道之不行賴有遺編後有百載復見儒先哀哉止齋見此銘鐫蔡幼學行狀公諱傅良字君舉姓陳氏其先自閩徙温州瑞安縣之帆遊鄉至公八世矣曽祖靖祖邦皆有隠徳考彬深於易學潔行自晦鄉里稱為長者以公貴累贈朝請大夫妣徐氏贈令人公英邁不群彊學篤志其為文出人意表自成一家人相與傳誦嵗従游者常數百人宗正少卿鄭公伯熊大理正薛公季宣皆以經學行義聞於天下公每見二公必孜孜求益修弟子之禮一日與薛公語恍然若有所失乃獨潜心易論語二書求古聖賢所以窮理盡性之要近思深探弗造其極致弗措也既而薛公客晉陵公往従之薛公與公語合喜甚益相與考論三代秦漢以還興亡否泰之故與禮樂刑政損益同異之際盖於書無所不觀亦無所不講經年而後别去還過都城始識侍講張公栻著作郎吕公祖謙數請間扣以為學大指互相發明二公亦喜得友恨見公之晚是嵗乾道六年也其秋入太學國子祭酒芮公曄雅聞公名親訪公於所𨽻齋見其二子且即以公為學諭俾為諸生講説經義公以非故事因辭芮公不可公遂謁告去従容天台鴈蕩間益究其學越二年禮部以名聞孝宗方鋭志治功慨然慕唐太宗之為人於是臨軒以太宗事䇿新進士公對言陛下有無我之量而累於自喜有知人之明而累於自恃是以十有一年於兹而治績未進於古下情猶鬱公論猶沮士大夫猶有懐不敢盡且以太宗求諫崇儒等事反復規諷其言深婉切至有司竒之将請寘第一或議不合猶在甲科當是時公名震天下其文流入外國授迪功郎泰州州學教授未赴參知政事龔公茂良為孝宗稱公之材特除太學録車駕幸學改承奉郎居嵗餘力求外補吕公方在三館謂公曰盍少留公曰出處之義不敢不謹其始也添差通判福建丞相梁公克家領帥事委成於公公為之畫凡一路若郡所當興廢及訟獄之曲直一裁以義無所回屈彊禦者不得售其私始忌且怨州人有方在諫省者論公罷之居二年主管台州崇道觀又二年差知桂陽軍又三年乃之官居閒既乆日覃思於六經将有所述以開後學一室蕭然與士友終日澹如也治桂陽首為教條戒其吏以徙善逺罪諭其民以孝弟婣睦人感公徳意不嚴而化蠲民宿負及縣月輸之未入者凡廪藏受輸以例取贏者悉裁之明條目簡文移縣得達情於郡而吏無所容奸郡計自裕嵗小旱預出錢糴於旁郡置數塲以糶糶已復糴循環不之又聽民以薪易官粟或就役於官食其力民無飢者連帥潘公畤以緡錢五千助糴公益以郡錢立式貸之約嵗登償及期不復索光宗受禪除提舉湖南常平茶鹽去郡老稚遮送不絶明年就除轉運判官湖湘民無子孫者率以異姓為後吏利其貲輙没入之公曰使人絶祀非政也況養遺棄固有法存其後者㡬二千家潭州常平粟且四十萬而全永道等州數絶少無以備歉嵗公曰移多益寡使者職也既掌漕猶攝庾事乃令諸州各留嵗運粟以益常平以潭之常平代其輸郡告乏者減其送漕司之錢民輸折苗錢重為損其直潭州儲州市酒課嵗嘗至緡錢二十萬遂以配於民為額公攝州事按舊籍頓減之民得少紓改提㸃浙西刑獄過闕留為吏部員外郎論對奏言藝祖皇帝垂裕後人專以愛惜民力為本熈寜以来用事者始取藝祖約束一切紛更之諸路上供嵗額増於祥符一倍崇寜重修上供格頒之天下率増至十數倍其他雜斂則熈寜以常平寛剰禁軍闕額之類今項封樁而無額上供起於元豐經制起於宣和總制月樁起於紹興皆迄今為額折帛和買之類又不與焉茶引盡歸於都茶塲鹽鈔盡歸於𣙜貨務秋苗斛斗十八九歸於綱運州縣無以供則豪奪於民民困極矣方今之患何但敵人盖天命之永不永在民力之寛不寛耳豈不甚可畏哉陛下宜以救民窮為己任推行藝祖未泯之澤以為萬世無疆之休且言今天下之力竭於養兵而莫甚於江上之軍都統司謂之御前軍馬雖朝廷不得知總領所謂之大軍錢糧雖版曺不得與於是中外之勢分而事權不一施行不專雖欲寛民其道無繇誠使都統司之兵與向者在制置司無異總領所之財與向者在轉運司無異則中外為一體中外一體則寛民力可得而議矣上従容嘉納謂公曰朕思見卿乆矣卿學問深醇著書必多可悉以進也遂遷祕書少監公進周禮説以格君心正朝綱均國勢為目目各四篇兼實録院檢討官選兼皇子嘉王府賛讀公以為王者之學經世為重祖宗成憲尤當先知乃纂次建隆以来行事之要為王講誦大㫖每至立國規模必厯叙累朝因革利害附見其下本末粲然如示諸掌紹熈三年十二月擢起居舍人四年正月兼權中書舍人先是上少不豫群臣奏請或弗時決公言一國之勢譬如一身少有壅底便生疾恙若今日遷延某事明日阻節某人人心益玩主勢益輕設有姦憸乗時為利則中外之情不接威福之柄可移雖是擅傳㫖揮将亦無従覺察陛下何不務自寛大以怡精神出則従順動之宜居則享燕閒之福而乃徒速無故之謗且貽萬一之憂哉又言人主不自彊則讒間迎合之計得以乗之因其厭省覽也則有以好名之説中傷忠讜因其憚改作也則有以生事之説沮壊事功凡若此皆讒間也因其近聲色也則有以勿問外人之説固結宫禁因其樂燕飲也則有以勿親小事之説竊弄威福凡若此皆迎合也讒間之計中則君子日疏迎合之計中則小人日親而其極至於天變不告邊警不聞如是而天下不多事者未之有也給事中兼嘉王府翊善黄公裳以封還除目改兵部侍郎公言給舍封駮是謂官守若以為是則當聽従若以為非則當罷黜今隂廢其言而陽遷其官是非不明賞罰倒置不謂清時有此過舉乞令裳依舊供職以釋在廷之疑池州副都統制率逢原就除都統制公言逢原專横掊尅士伍咸怨淮西總領鄭湜姑按其偏将以警之逢原懼而自劾方詔放罪不應信宿之間遽有遷擢詔依已降指揮公復繳論之陳源除入内内侍省押班給事中駮之不可以書讀矣公言源僣侈專横得罪髙宗投竄逺方籍入家産及許逐便以来間有恩命則臣僚相繼論奏悉䝉開納今鎖闥迫於天威黽俛書讀臣必不敢奉詔草詞内批張子仁除節度使公言留正輔相初政於今五年待罪郊外而去留未決趙雄以前宰相起帥江西抱病告終而恤典不及西陲擁兵十萬呉珽物故擇代不可不謹恤終不可不至而屏去申奏以為失實當此時也乃遽獨加㤙於勲舊之家輕重不倫先後失序臣深為聖明惜之詔子仁係勲臣子可與書行公又言報答舊勞孰與輔初政者之為親矜憐後裔孰與專帥閫者之為重陛下儻下察末議少霽威嚴天意豁然群疑氷釋事闗廊廟則立賜施行憂在疆埸則亟須處置庶㡬國家尊榮朝野欣豫奏雖不報然陳源竟不命詞張子仁亦不果授鉞是嵗十二月遷起居郎公言陛下覆䕶臣子容忍不棄而不務明其去就之誼比有以臺官察宰屬者矣陛下皆出之俄而並召並用為卿将孰是孰非耶有以後省駮従班者矣陛下為罷給事中已而並除職名一去為郡一為王府官然則是俱有罪耳有以諫官疏大臣者矣陛下欲並用之大臣乞去不得請諫官乞去又不得請然則是俱賢耳至如臣不度疏賤論奏内侍不當為知省官陛下雖納臣之章不行詞不賦禄而其人至今出入禁闥與見任無異則是中書後省與黄門相持不決尤所未喻願陛下明人臣去就之誼自不肖臣始時上疾猶未平重華之朝稍闕大臣而下交進更諫公自以受知最深每入對必以父子天性及古今禍福安危之際委曲開陳期以感悟上心上亦為之動及孝宗有疾公踰旬三請對以為兩年以来以不過宫諫者多矣陛下間或聽之亦無過勉彊一出臣獨私念陛下特誤有所疑積憂成疾以至於此每於陛下心事之間反覆開明至於深入切中陛下為臣傾倒一無隠情然而今日確許明日中變以誤為實而開無端之釁以疑為信而成不療之疾是陛下自貽禍也公敷奏剴切上未能聽因面乞納禄不許最後復言今天下本無事而陛下以憂疑失人心若聖意釋然則群情自解轉禍為福不過反掌之間臣言不足聽當永辭闕庭是以復論人心可畏之説願陛下亟圖之是日公論諫益切度上意弗回乃上致仕之奏上曰甚好甚好公退則申尚書省自免而歸改祕閣修撰復兼嘉王府賛讀公辭不拜今上受内禪三日詔公歸班又四日除中書舍人公三辭而後受未至命兼侍講時方博延名徳之士進諸朝廷知潭州朱公熹召為煥章閣待制侍經筵與公同日造朝班行相慶公入見首言陛下嗣守丕圖宜上稽孝宗明斷總攬之政兼體上皇隆寛不自用之美參酌兩朝治體擇其為天下後世便者兼行之詔知閤門事謝淵係皇太后親弟特給全俸今同知樞密院事樓公鑰時為給事中封還録黄公言樓鑰所駮允當望追寢前命臣失於論奏乞正鹵莽之罪因言陛下臨御未乆每事當遵守法度近因臣下妄有陳乞往往直降内批或與差遣或添請給人従深恐自此浸開倖門願陛下念付託之重加兢懼之誠凡宫禁請求斷勿垂聽兼直學士院㑹有詔朱熹與在外宫觀公請對将陳其不可詔俟别日宣引公連疏言朱熹三朝故老難進易退欣慕聖明幡然一出天下相賀以為得人則進退之間豈宜容易内批之下舉朝失色臣不敢書行後四日詔朱熹進寳文閣待制與郡未㡬以公兼實録院同修撰公以史事宜有專官再辭不許阜陵復土上始自重華宫入居大内公首請増置諫員收用恬退之士詔問民間疾苦上雅敬公每對必虚已以聽始上在潜邸寮寀因誕日以詩為壽公與翊善黄公詩皆以開導徳性冀有所規益上感二公意各親書其詩謝之於是上屢趣公為跋語刋石同進者以上眷公厚始多忌之知閣門事韓伌胄浸竊威福倚言路以排斥忠正有上章詆公者詔提舉江州太平興國宫慶元二年夏言者復交章詆公詔降三官罷宫觀公屏居杜門一意韜晦榜所居室曰止齋日徜徉其間賔至則相與講論經史亹亹不厭故舊之在朝者或因人問公起居公皇恐遜謝而已嘉泰二年正月詔復元官提舉江州太平興國宫三年起知泉州公以疾力辭許之授集英殿修撰疾益侵請謝事授寳謨閣待制以其年十有一月丙子卒於家屬纊酌酒與兄訣凝然而逝年止六十有七積階至朝議大夫爵永嘉縣男訃聞贈通議大夫娶張氏主管禮兵部架閣文字孝愷之女封令人以婦徳稱先公八年卒子男二人師轍承務郎新監臨安府鹽官縣買納鹽塲師朴承務郎女七人長適迪功郎新光化軍司理參軍潘子順先卒次適従政郎福州連江縣丞薛師雍次適迪功郎新處州儒學教授林子熈次適迪功郎新福州連江縣尉徐沖次適進士張紹次適進士張疇次未行孫女一人開禧元年三月庚寅師轍等奉公之喪合𦵏於所居前山令人之兆公剛毅洞達寛博樂易其為學先於致知充以涵養黙識自得不可企及而篤於躬行周於人情事物兼博約貫精粗不倚於一偏與同志論學必以兢業為先盖其所自用功處也事兄恭謹終老不懈自奉清約閨門肅然其接人委曲周盡人人得其歡心汲引後進如恐不及小善曲藝奬予無倦士多不逺數千里樂従公逰公隨其所長誘掖磨琢以成其材在湘中奉詔薦湖廣之士以今四川安撫制置使呉公獵為稱首其他如宋文仲楊炤蔣礪皆一時之選及在後省丞相留公正知樞密院事胡公晉臣數訪人物公為言某人有徳某人有材宜兼収而器使之毋有所偏廢二公以公言多所引用公未嘗以語人也公早有重名媢疾者衆往往為謗語以中傷公故當孝宗有為之時主上願治之始而不得少安於朝退而家食者前後且二十年比上念公起鎮名藩天下期以復用而公已病篤矣卒之日室無餘貲田不過二頃其𦵏也資友朋之賻以集事然後讒沮公者始皆愧服公在三山閲故府所藏累朝詔條凡財賦源流國史所不盡載者考之悉得其要領常以為祖宗徳澤深厚而後来有司乗時易令取民之數乃過於前代宜有以變而通之故一見光宗首陳其要及轉對則乞議免役錢進故事則乞除身丁錢至上初親政則又乞出内帑助版曺經費少寛催理以紓民力然皆言之而未及用天下不少被其澤也公既没之四年上誅韓伌胄盡黜其黨一時故老為侂胄所排斥者收用略盡使公尚在得復見上以素所考論次第條奏見於施行其所補豈有淺淺哉公有毛氏詩解詁二十卷周禮説三卷春秋後傳十五卷左氏章指三十卷讀書譜一卷建隆編一卷制誥集五卷文集三十卷公深於春秋其於王霸尊卑盛衰消長之際及亂臣賊子之所由来發明獨至又以為左氏最有功於經能存其所不書以實其所書故作章指以明筆削之義樓鑰為之序曰自有春秋以来盖未有此書也平生篤於學易嘗為之説而未及就幼學未冠従公遊朝夕侍側者且十年公愛而教之勉以前輩學業幼學雖不敏然佩公之訓不敢自棄每視公以為出處知公獨詳敢狀其言行之大略以上於太史氏謹狀嘉定元年十一月日學生朝議大夫試尚書吏部侍郎兼侍講兼直學士院蔡幼學狀葉適墓誌銘公姓陳氏諱傅良字君舉温州瑞安人初講城南茶院時諸老先生傳科舉舊學摩蕩鼓舞受教者無異辭公未三十心思挺出陳編宿説披剥潰敗竒意芽甲新語懋長士蘇醒起立駭未曽有皆相號召雷動従之雖縻他師亦藉名陳氏由是其文擅於當世公不自喜悉謝去獨崇敬鄭景望薛士龍師友事之入太學則張欽夫吕伯恭相視遇兄弟也四方受業愈衆乾道八年䇿進士殿臚定公對第一奏入不果用教授泰州朝廷難以銓法持之遂除太學録将召試館職復不果使告公将以為編修官公辭焉通判福州右正言黄洽引王安石事劾公罷主管崇道觀知桂陽軍或言知名士廢不用凡三十三人公為其首執政病之稍遷提舉湖南常平茶鹽轉運判官浙西提刑吏部員外郎去朝十四年至是而歸鬚髪無黑者都人聚觀嗟歎號老陳郎中光宗逆勞曰卿昔安在朕思見乆矣其以所著書示朕遷祕書少監兼實録院編修官皇子賛讀厯起居郎舍人兼中書舍人㑹上疾不能覲重華公隂諷顯諫危論婉説因乞致仕出殿不返舍改祕閣修撰復兼賛讀不至今上即位除中書舍人侍講同實録院修撰直學士院御史中丞謝深甫論公言不顧行提舉興國宫居二年察官交疏削秩罷時慶元二年也嘉泰三年始復官再為興國宫知泉州辭授集英殿修撰待制寳謨閣三年十一月丙子卒開禧元年三月庚寅𦵏於帆逰鄉湗村前山距家巷語可達也夫人張氏封令人子師轍師朴師朴承務郎師轍新監鹽官買納場潘子順薛師雍林子熈徐沖皆婿也既仕未仕者張紹張疇未嫁者一女孫女二人公之従鄭薛也以克已兢畏為主敬徳集義於張公盡心焉至古人經制三代治法又與薛公反復論之而吕公為言本朝文獻相承所以垂世立國者然後學之本末内外備矣公猶不已年經月緯晝驗夜索詢世舊繙吏牘蒐斷簡采異聞一事一物必稽於極而後止千載之上珠貫而絲組之若目見而身折旋其間吕公以為其長不獨在文字也公既實究治體故常本原祖宗徳意欲減重征捐末利還之於民省兵薄刑期於富厚而稍修取士法養其義理㢘恥為人才地以待上用其於君徳内治則欲内朝外廷為人主一體群臣庶民並詢迭諫而無壅塞不通之情凡成周之所以為盛皆可以行於今世視昔人之致其君非止以氣力負荷之華藻潤色之而已也嗚呼其操術精而致用逺彌綸之義𢎞矣盖魯有臧文仲鄭有子産齊有晏嬰晉有叔向四人者當周之末造能新美舊學而和齊用之尊奉前聞而斟酌行之不嗇於古不狃於今是能輔當時而傳後世此春秋名世之士孔子之所賢者也今公亦考元祐慶厯上極建隆以達於紹興之後将櫛理弦續起廢疾解倒懸而燠休之使公而得盡其用則未知於四人者孰先後也始公以盛名天下歸重意其将有為矣其録太學也議科舉敝法頗櫽括之而已然而拘於常而習於故者以為異矣其倅福州也平一府曲直使不得隠而已然而畏其明而苦其決者以為專矣流言轉易應和喧然而公之道不得行矣孝宗嘗於禁中従容讀公所論著光宗嘗因直前獨對許公且大用及今上御極有講堂之舊招来初載有咨謀之美然而讒之慘者奪其眷忌之巧者蔽其知而公之身竟以斥矣如彼四人者使其君臣之際上下之交不遂靡然為時所向而謗譽雜於朝市疑信異其始終則夫功烈之成就曾不能萬一而況其有大於四人者乎此余所以歎其開物之易而周身之難成名之厚而收功之薄也悲夫公葬四年吏部侍郎蔡行之始状其行於太史行之從公蚤載之詳余亦陪公遊四十年教余勤矣故掲其平生大指刻於墓上以記余之哀思而行之已載者不復述也銘曰嗚呼陳公未壯而興群士驚奔来師来承三代統紀漢唐制度百世雖逺一二以數事研於終徳復於初發為辭華乃學之餘内聖外王本末鴻纎春秋四人孔子所嚴建隆之元實為下武斟酌損益可繼堯禹天欲平治必待其才生之甚難莫我肯培名胡忌髙實奚惡富裂棄文錦縫彼敗素寄印如纍其讒云云擁書如林其樂欣欣有橘之菔有菡之芬有挐其舟音逺不聞我瞻湗村泚矣南塘二物則存公乎在亡止齋集附録
