body:
  text: 族祭八一叔惟靈厚重之徳温恭之度語無厲聲動無疾歩盖嘗深居燕坐玩意緗素娛翰墨以永日時杖藜而觀圃雖比鄰聚訟轍跡旁午而澹然不顧至於里有恙苦族有喪故曽不渝於風雨必躬問而身助若廼内將順於慈母外服勞於諸父彌歴年如一日及二毛而猶慕眷旁洽於弟姪一色笑而匪怒然其胸中昭然自有繩尺臧否不言莫可欺以智數者矣嗚呼文足以决科而老於布衣實足以長世而不昌於𦙍祚以嵗寒之喬木亦半夜而晞露究人事其何闕莽蒼蒼之難訴觀其前十日而戒客却私昵以宻布􅛻兒曹之奚擇曰阿牙其可付余聞繼宗之子經禮攸著豈聖賢謂之弗祥徒世俗以為諱茍牙也足以汛掃門戸典護墳墓渺一芥其何嗇將九原焉如赴偉顧言之勇甚又古人無以逺過者也惟是枝葉凋零嵗月遲暮乏一老之導前嗟衆穉之失措此某等所以羅柩下而長慟想儀刑以摧仆祭張國紀嗟呼國紀吾欲誦子之美兮累百紙而莫殫吾欲哀爾夭兮涙懸河而何乾招子之魂兮𡨕𡨕其安逝托予之孥兮交貧而力不逮盖自故老之傳書籍具在疾驅者途短軸不折者厚載髙明兮鬼瞰其屋愁苦兮弗菑與害曼膚兮鼎食銳頭兒兮無盖仁三族兮報之豐自營焉不延厥世以余講聞兮籍甚於目睹兮每背至國紀而一不酬兮余誰問兮茫昧豈天若不謀或邂逅兮聖賢以為定計匹夫兮細故將善十勇兮九悔徒長言兮何尤聊一觴兮以酹代兄祭林承事維公劬躬植門自約而贏爰始為儒被之家聲閨閫無慚鄉閭有稱昔者婦黨缺無佀承克立之後祀事有憑昔者族黨伯季凋零輯其孤嫠以迄厥成夫人於此茍或一能則為善士况是合并奈何無年雖天㝠㝠嗚呼方女既笄實繁問名公為相攸莫如書生我時鰥居少公數齡廼以我歸嘉我弟兄待不以婿而如軰朋自其室事來諮來評有不釋然輙以我平頃我屬疾中寒善驚公亟問拊彌時不寧及公舁毉省之郡城謝言再三勿揚夜舲誰無舅甥所感此情雅有室廬可以止興新有子婦可以使令奈何無年胡不涕零矧辱深厚此酒忍傾祭鄭龍圖母夫人觀嶽者於麓觀河者於涘猗歟夫人克生二子夫以龍圖經明行修名重天下南渡以來張吕之比而景元潔㢘忠信邁往而絶出又為當世雋傑之士譬之天球琬琰和弓垂矢粲然房中重英襲美幾所謂維其有之是以佀之者矣至於龍圖稍稍宦達位逮九卿夫人固為之歡而亦不以景元之負志流落不逢為耻龍圖怡聲下氣坐不垂堂夫人取焉而亦不謂景元單車暮夜赴人之急難為非是則其髙懐逺度兼識二子之才徃徃總攬人物者或有恨於此也嗚呼夫人之衰自喪伯氏仲懼弗任誓不以仕藥物之良飲膳之㫖儻可一笑不逺千里今也夀終孫曾百指棺槨衣衾聞者興起永惟人生及此有幾然景元猶哀恫憤恚自謂遺憾盖不但以遲莫困窮力有所止也某等蚤游門墻欽誦儀軌以受祉之既多而哭少於餘齒且嵗籥之四周凡奠斚之三跪宜盛徳者不然將永傷其曷已况有感於百懐曽莫殫於一紙祭梁丞相麟鳳不摯帝王瑞之木徳為春萬物善時維皇龍潜公為舉首天授之相有司之手維皇至聖維天之仁維相休休嘉靖此民澤農欲晴山農欲雨公在相位髙秔下黍彼有言戰此言有守公在相位兵不挂口人亦有言誰怨誰徳公曰賞刑具在三尺人亦有言匪同斯異公何適莫靡立一意乾道經略淳熙無為從容其間不競不隨上之咎言下之觖望弗及其身人自得喪公疾未劇公歸已决帝曰如何咨爾同列至於領祠至於賜第宿留經帷愈好勿替我觀自昔蕭曹周召經史云云如公特少方舜命禹宜師宜保薄海有恨公不夀考公不夀考薄海恨之矧如傅良辱愛辱知屬官窮楚遭嵗之繆爰及祥琴文始克就太常有誄太史有傳廼如斯文聊以哭奠祭劉子澄惟靈學不事於章句仕從容於禄爵積之身以力久試在邦其大略我特立而衆同曰好名而奚怍若夫緬企慕於前修圖報稱於隠約豈與世以多違懐良朋而獨樂孰遺貌以觀心悵此風之不作以余交之最晚知君意之匪薄方前猛之切磋收後尤於戱謔何手墨之未乾而遽遺於今昨儻絮酒之可漬將陳根而亦哭祭蘓訓直元祐故家封殖百年百年舊聞嘗失其傳疑將孰問孰備次詮如公幾人庶幾象賢然而位不過外郎而僅止中夀是不謂之天耶累舉不第屈於賞延﨑嶇州縣曽諱自言晚以民庸著之淮堧積有令聞爰始綜銓向使第公之文少而騰鶱則於史觀則於詞垣何處非宜而躓莫前則天之嗇公非適今日然也嗟乎魏公之功鼎彛所鐫比及三世中更百邅維先大夫義不附權天下寃之臨汀之遷公論既開忽詣九原凡是天理莽不可言某幸兹為寮情相後先即之謙謙聽之便便一日不見而我棄捐寓哀斯文三致意焉而哀不勝有淚如泉祭張孟阜我識諸張餘三十年仰止端明恨不執鞭架閣勇為而挺出忠甫肥遯而孤鶱雅矢寛夫接於英躔亦有婣婭聲華滿前我來雙清詩書之淵孟阜妙齡玉潔蘭娟前規後模足不及㕓既而諸老淪亡松凋蔓延於赫家聲寖以弗綿孟阜永歎逝將誰愆吾學未就於何食眠習為文詞短章鉅篇駿不可羈闊略注箋及試場屋句磨字研務入繩尺以取衆憐屢賈弗就愈强益堅妻啼兒號語方諱錢必以青衫侍親九泉晚喜世科至於澘然而其料事察於蓍龜憂時過於貂蟬毎一發憤於酒是便竟成沉疴殆若自捐嗚呼孟阜工於成家而拙於謀身有恨於貽後而無忝於奉先求之昔人亦足謂賢我妻厥姊見推師傳忠何疵之弗告愛何善之弗宣病革之書筆墨倒顛屬子以婿抑何惓惓㑹余東歸哭此殯筵其塞爾悲為之矢言謂余不信有如大川祭令人張氏嗟余與子於窮相遭以子潔清濟余之豪何以觴客取之衾袍殆將兼旬蓬首不膏矧余力學往往獨旦每興視夜青燈在案於焉勞苦於焉咨歎茍余饑渇則自涖爨凡我族居以私為公凡我嗣息以異為同亦既聲名胡謗是叢亦既膴仕奚歸匆匆雖則信已豈余所獨亦豈無人共此心曲知余孰深愛敬之篤子嘗有言舎我無復嗚呼子病之久余靡所愛顧笑謂余日月有待疇昔之夢雲鸞下逮夫豈凡骨而及斯賚余亦宵夢殊庭祕嚴有二黄冠縞衣襜襜求子食器與子鏡奩而遂棄余曽日不淹嗚呼以子生平死且有守奈何衰惰失此益友强欲述子悲掣之肘尚圖能言託子不朽祭林懿仲我老哭子云胡不哀豈以斯今微子之才有才如子學以自培少却寘之辟雍蓬萊而年不逮公論之開是懸於天我哀何哉我懐古人風凋誼零匪無群居謂為友朋亦既樂推俄而譏評亦既洽比俄而背憎誰其卄年篤師一經凡曰同門視猶弟兄毁譽合離弗移弗傾譬彼松柏可以永齡則知我哀豈徒私情嗚呼喪歸自淮澘焉曷勝屬我悼内拊棺未曾今辭酹之尚其歆聽有盡之觴無窮之名祭瑞安宰留公弼吾邑之難聞於浙閩有廨一區洞無門垠籍入誰家何所就詢邦賦有常夫豈不仁令日敲朴吏加斧斤役無完家帑無見緡累嵗於兹交相為貧間有惠令不怒以嚬譬彼沸鼎而忍益薪匪憂則慚以及其身自我公弼飭壊為新一術不施笑言津津役戸晏開吏袍前陳州家曰能使家曰勤且以其暇豆觴佐賔縣門之樓圮為荆榛忽焉山立曽目不眴以此長材與意之真豈徒百里可以長民輯睦怨慝整齊紛繽寘君其間亦志可伸遽止斯耶天何昊旻自君屬疾愁聚為群識者于毉昧者於神冀其夀祺以勸後人聞之不起萬里霑巾我忝同登晚交益親况此酹别不知所云峴山之石巋然嶙峋尚刻遺愛庶幾不冺祭潘省之嗟乎惟靈以家學之未顯掇巍科以娛親以里仁之未博求三益以淑身惠分人而清約嚴律已而殷勤若夫歸愛女於心許擇冢婦於素貧資壯士以趨急遜旁枝而圖新皆在昔之所難得一節而過人廼具美而弗矜爰好修而益振自發軔於州佐亦彯纓於京塵有衆允之嘘拂無一疵之緇磷雖混迹於筦庫遂揚名於縉紳及兩鬂之已華領壯縣而獨欣棄訟銗而弗設維經師之是遵叅累政之短長從百里之笑嚬酌民言而徑行或黄堂之未聞有負租而弗問奚加賦之敢云積棠隂之劬勞忘梱内之欠伸俄遺恨於偕老遽傷和而損神嗟乎志如公之濶逺行如公之真淳儻少假之嵗年將䇿足於要津盖庶幾於有徳輯群駁以為純忽兩櫬之旅歸徒夾道而酸辛某嘗同升於仕版又洽比於昏鄰方欽遲於晚休尚幸陪於後塵隔古今於一觴故不知涕泗之沾吾巾也祭蕃叟弟母夫人嗚呼悲夫季路之母及於負米而不得與其子共禄於三釡孟子之母及於衣衾棺槨之美而不得與其夫偕老於五鼎自古賢者固多遺恨吾於吾嬸尚何言哉尚何言哉一觴之奠永隔千古嗚呼悲夫祭沈次卿吾每過吾邑必欵二沈之門以資舊聞訪遺跡也元誠云亡官無諏咨之助士無切磋之益幸公無恙尚有典則言可記注行可蹤跡而止中夀誰不沾臆嗚呼十八丈之賢盖庶幾徐孺子元魯山焉而世無孝㢘之科竟淪謝於幽仄相彼後進車馬赫奕韋布三葉令人太息始余過邑多見往昔游有觀潮翫有古栢追隨諸公好我顔色自公獨存我亦皓白恨不鄰巷相與朝夕日治草具屈為上客我懐則多豈以飲食曽謂背面存亡之隔文以哭之未叙潜徳匪無强宗為刻拳石祭豐山陳國器嗚呼自昔格言誰敢闕二字種徳之久仁及閭巷悼内屬耳而遽至此何歟余觀氣貌甚偉言動有常下逮僮奚不見呵詰是豈不足以夀歟食饑衣寒勿問疏戚東塘之成通國利之是奈何不享其報歟宜夀不夀宜享不享神理茫昧世亦多有若夫奕世慈孝滿門問學盎然春和無以致異而賀觴未舉衰絰相尋行道嗟涕殆未之睹則又何至於此極歟豈禍福無端而自昔格言姑以為訓歟胡能籲天寓此哀奠祭朱文昭母夫人吾友滿天下今四五十年升沈通塞之變多矣盖僅有存者率一嵗或再三嵗惠然造吾門者必皆蒼然華顛者也否則其子若孫以其父祖藉口為謁以請見而非其人矣况於其親則又凋落至闔郡或數百里間有人焉以余之少孤不及奉其親茍間見之則未嘗不為之起敬且自愧恨其不若也嗚呼今夫人氏吾友文昭之母則一人之數也文昭自為諸生知名一世屢舉不第而業益修謝客深居而士益附無分寸之柄而弔亡悼屈恤孤而惠羈旅而家不困皆夫人之教也嗚呼何其整也余自罷掖垣謫籍彌久夫人以其女孫歸為吾伯氏婦傾囷以飾其行輟田以佐其養人所諱交無難辭焉嗚呼又何壯也以余少孤不及養其親於闔郡或數百里間見吾友之親則為之起敬自愧恨其不若則於夫人宜如何也春有饋絲秋有饋鮮果蓏之實凡美必饋問其將命往往出夫人之手夫人之夀八十有六屬余抱疴撫棺無及寫徳布私非文安寄力憊言略尚昭鑒之止齋集卷四十六欽定四庫全書止齋集卷四十七宋陳傅良撰
