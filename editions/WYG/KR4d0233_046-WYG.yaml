seq: 46
front:
  text: 沈叔阜嗚呼以先大夫之於子屬望也以夀母之恃子以亡恙也以伯仲與子相和唱也以朋友交㳺謂子足嘉尚也然不待中年而夭矣豈惟家人盖鄉黨隣里同心悲愴也嗚呼萬事如意豈必永年有一弗爾禍不待旋來者可追往者已然我不能規文以自鐫
  hash: sha256:8081cd0f141865f978899a470aaf8abe61c8642c88e1b286292da6be94ee6f48
