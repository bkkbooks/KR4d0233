body:
  text: 誌銘敷文閣直學士薛公壙誌公姓薛氏諱良朋字季益唐補闕令之後繇閩徙温其在永嘉則諱弼官至敷文閣待制在瑞安則公官至敷文閣直學士盖中興相望為名臣公治麗水有聲薦入胄監檢法御史臺丞奉常為尚書郎選知徽州將漕江東二浙守臨安府擢工部侍郎遷吏部以學士出守福泉荆南成都制置四川食祠禄於家十年以淳熙乙巳八月卒年七十階通奉大夫封永嘉郡公贈光禄大夫卒之明年十月孤某即所居里之子奥原公所自為墳𦵏焉前事二孤與壻校録公言行一編屬某為狀某雖生後然與公同鄉晚數得及門受教又雅從子姓游以所講聞視今録尚多闕惟狀當上太史氏謝不敢草孤泣訴𦵏日淺采獲故未具今大事不可乏請書其槩納之幽而狀竢他日於是識曰紹興之季年朝廷更用二三大臣所汲引皆當世之選而公由叅知政事辛公以進及今上時陳福公相遂班從臣觀人莫若觀所與公所與何如哉方扈蹕金陵佐戎淮甸天子召見無虚嵗人人謂才欲有所撥煩必曰薛良朋也治且安久先進多凋落而公亦老矣歸故廬深與人絶短衣幅巾往還樵牧間公固自忘其為才而上時時記不忘也至其以荒政修進直龍圖閣三抗章竟不拜官同産子二人而不以及孫則又過人矣曽大父某大父某承奉郎父某累贈正議大夫母許氏故右丞忠簡公之姪女贈太碩人娶章氏封碩人子男二人璆宣教郎前知饒州餘干縣琳宣義郎新知福州連江縣三女適林轟從政郎新監左藏封樁庫門章伯奮廸功郎前臨安府富陽縣主簿戴闓之宣教郎新知紹興府上虞縣闓之淳熙二年進士孫五人及官者二人陳季陽墓誌銘公姓陳氏諱義民字季陽温瑞安人於故吏部侍郎公䕫字蕃仲為母弟吾州陳氏族最大而譜殘闕間相與門系皆曰閩徙也或曰本開封余兒時諸父嘗言故禮部侍郎桶自平陽使來合譜以兩家所自出縣鄉里皆合諸父不能祔也自今國子録謙故尚書郎鵬飛之子六齡奉國軍節度推官棅始於余聚少長以齒如家人族稍稍合棅季陽子也季陽與蕃仲少小同受學皆不類凡兒一為大官一以布衣老鄉評雖稱好兄弟不以是為次第然尚多言有幸不幸者余聞蕃仲立朝時父大夫公春秋髙雅不便異縣獨季陽日侍膝下左右逢順無違事大夫雖不見蕃仲在側未嘗不樂其卒也㑹蕃仲萬里使敵中季陽治衣衾棺槨華好而哀稱之蕃仲雖不得在其親側亦勿有悔也善教子使從名士游棅舉進士第二人是嵗特有㫖髙第不待次得幕府官遂食其禄遇太上皇后慶夀恩亦新得初品官季陽始念不在官與禄晚顧奄有之死之日四方士友咸來弔蕃仲亦一幼子登科然不及見由此言之季陽為幸耶不幸耶人何必皆欲仕仕不必能行其志不仕豈必不如志也蕃仲一失時宰意竟﨑嶇銜不得施用以殁季陽居鄉棄負振乏唯所欲鄉人有善不善且勸且諷往往莫之違年七十無終日意不自得者向使亦仕特未知如何爾曾祖智祖稱父祥承事郎贈朝散大夫母鄭氏贈宜人娶周氏三子栻松棅二女長適項賚幼未行孫男女六人以淳熙十二年十二月癸酉卒奉國官舎先十五年周氏𦵏所居帳西鄉洋坑之金山於是合實卒之明年十有一月己酉季陽尚多可稱事余但道其為人父子者如此以觧言者之蔽塞棅等之悲也而復以是銘之曰養其父之日長養於其子之日短匪報之鮮也斯流之衍也修職郎吕公墓誌銘越新昌之姓石吕黃為大余嘗館黄度文叔家得與石吕二氏游其子弟多從予學間至郭外所謂報慈菴者則公父子所嘗廬墓處也杉松夾徑鉅竹千百竿如拭有泉琮然出兩山谷間菴在泉上前有大石立平地可以相隠避為娛嬉石旁置亭曲欄髙下縁以花卉公以諸兒領客危坐誦佛書過午始出戸余往來新昌三年見之如一日盖公之皇考君諱䝉嘗𦵏其親於社潭之原去家三十里苃舍墓下久之不返公憂懼即所𦵏皇考妣龍巖之麓為是菴以悅安之皇考君終焉凡蔬食四十年也皇考君卒公以其喪合𦵏於是而悲慕如其考僧有年七八十嵗飯此菴相顧感歎盖晚而後入郭内居公父子以孝慕稱閭里皇考君坐逝公享年七十四亦寢疾五日盥潄櫛縰乃逝淳熙乙巳二月十日也孤元之將以丙午十有二月某日𦵏公於郎柯之陳巖其弟聲之來乞銘銘未就聲之不勝悲余與武弟同郡徐鉞王自中彭仲剛徐誼蔡幼學皆以詩悼公是嵗天大寒雨雪甚聲之扶服幾千里空返既𦵏益請不已事死如吕氏父子孫三世亦罕矣宜為銘公諱琰字徳文以子遇太上皇帝慶夀恩復遇夀聖太上皇后慶夀恩封修職郎五子長元之連三舉鄉貢進士奏官其第三聲之也亦兩舉國子進士某某某咸克家二壻吳敦智王師望孫男女十四人公娶王氏封孺人賜冠帔公喜教子孺人能成就公志故諸子各有立孺人先公生一嵗後卒一嵗今同穴銘曰瞻彼廬矣龍巖之原公昔在矣誰無子孫瞻彼墓矣陳巖之下公今亡矣誰無父母徐武叔墓誌銘余嘗惑於太史公以魯仲連鄒陽并為一傳其世相去逺事甚不類言語文章亦不相佀也至讀所謂多其在布衣之位談說於當世盖釋然有感於二子而歎良史之筆取舎固殊焉夫秦漢之際士之遭時致身者不知其幾人往往無聞以太史公所身親見開封侯桃侯而下卿相數十軰皆略附名申屠嘉後吝不立傳二子特布衣爾他無所槩見徒以書一編關於當世之務相先後百有餘年行事言語不同而牽連書之則古人之不朽誠有不在彼者余以是銘武叔乾道之庚寅辛卯州大饑米直五六百錢守丞諱言上且諱人言遇道殣即陽不省衆無與畫此者武叔以書抵行在所之舊言之哀痛也張公欽夫為右司郎得其書持白丞相虞公并父也詰朝奏事虞公出武叔書袖中為孝宗誦之孝宗矍然變玉色曰永嘉故樂土柰何使至於此守丞為誰乎朝罷趣上其名銜即日罷去更用賢守出浙河東郡常平米以贍吾州州人獲免於死亡當時識者頗樂道其事有以都司肯齎人書詣政事堂白之丞相丞相肯袖懐書至榻前奏上上勿問所繇來從之不移日可不謂盛時乎而余竊又有感也虞并父相欽夫為宰士微武叔殆不得事情於千里之外彼守丞何足道所部官豈無其人皆務自愛惜重於請事武叔書生也枉於塲屋志不但已竟以一介之微而動千乘之聽亡尺寸之柄而全闔郡之民嗚呼豈非賢哉武叔死其孤冠來乙銘余故不辭而久不果恐佚其事使武叔之可以不朽者闕焉則愧於子長之誼於是次而銘之武叔諱鉞姓徐氏其先入閩家福之長溪赤㟁由赤㟁徙温平陽至髙祖始為萬全鄉尚賢里之族祖諱隆父諱几自謂休休翁與里人作義學延知名士教子弟比武叔家益大交游益好娶嘉慶先生沈東美之女有淑行能治賔客六子冠宏􅳃容寓定冠進徳夀宫賦得試禮部宏中淳熙八年進士科今為潭州州學教授六女適劉嗣尹太學生吳璞劉儀陳昂鄉貢士沈伯煥一尚幼初沈夫人卒𦵏於瑞安常寧寺之後山武叔年六十有三卒於淳熙十有四年七月十有八日以明年二月二十九日合於夫人之兆武叔少頴脫儔伍博讀而豪於文長而慷慨好論時事若州里利病趨義之急然公於臧否至衆辱人人慕悅之而亦畏其聞已之過至於羣居賦詩飲酒無少長疏戚輒與傾盖襟度豁然無纎芥疵吝然後知其切磋之意非欲多上人也余習聞之於鄭公景望兄弟間一日有邂逅蕭寺者容貌魁梧偉丈人也意其為武叔俄而長揖余曰子陳子歟於是定交以武叔人品晚以慶夀恩授承務郎再授承奉郎吾黨甚惜之銘曰行修而命違志大而力微有子岐岐天意其在斯瞻彼宰木亦既可圍褒大之遲我獨不敢疑陳習之壙誌吾友陳謙益之之從弟諱說字習之娶敷文閣直學士薛公良朋之姪孫女知蕪湖縣珪之女生子男五人䝉晋師賁其第三子渙為益之後年三十益之以文字知名當世所交多聞人習之雅好修嘗從其兄問師友講求古今益之絶愛惜欲引而置之諸公之間也而習之病矣淳熙十有二年正月丙午卒其卒十有二月二十有二日薛氏奉其柩𦵏於所居里潘塔山之麓其僚友林載來請余識焉習之故學於余且益之官中都余宜以其姓名附於後陳氏世家永嘉縣某鄉里曽祖某祖某父某承事郎潘公墓誌銘公諱朝卿字春卿姓潘氏某先君子與故侍講陳公鵬飛少南為軰行以諸叔父從之學少南之門授經數百人叔父亟稱同舎生則曰永嘉二潘公此兒時所常常熟聞也少南每過先君子則館於叔父之心逺堂嘗賦詩焉諸父下世而詩不存某盖晚而後識公因道兒時所聞語恨不能記所謂心逺堂詩者公欣然為誦之且及少年時羣居事廼知諸父之言信前軰尊守其師說不墜忘如此而甚敬公公學不但為舉子業㑹撮古今為書號經史事統然試有司輒不利秦太師之專也私塲屋有與其子少保雅故能不以糊名即上第少保者亦在永嘉時同舎生也嘗從容諷公附已公謝不就已而少南以忤秦意逐炎荒公遂一語不復及塲屋矣以其學力行於家及其族至於昏友鄉黨他人徳色公獨易易益好讀易一旦課一卦室以䝉名齋以復名堂以視履名園以觀頤名某既甚敬公又與其子雷煥同為乾道壬辰進士雷煥掾宣城丁母何氏夫人憂某適罷丞三山時時相往還間從公蕭寺中扣所詣處令人深省嘗與士友十數人造其門午夜坐客醉淋漓公年已七十餘獨儼然無倦意五鼔作雷煥即所館治藥作粥糜客問夜者公起居狀如何得無勞乎則應曰大人趣使來焚香課書良久矣由是益敬公父子始約以兒女為兄弟紹熙之元某官衡陽遣其孫子順來成禮是年十一月甲寅公卒享年七十八以子遇慶典累封承事郎致仕賜緋魚袋子一人待衢州常山縣闕一女為尼孫三人長法剛早卒次子順也次蘄老二女孫長適直龍圖閣故宗正少卿鄭伯熊景望第四子處仁一未行雷煥以三年十二月丙午奉其柩合於所居鄉横塘何夫人之墓來乞銘某早衰苦於文士大夫求銘其父祖者率不克即如所欲於公為諸父之執為同年家丈人又為息女之尊舅卒不得臨𦵏不得遣且吾女不得一日奉盥匜也而悲以慙遂强次之大父彦先墓誌在忠簡許公景衡少伊集中父安中墓誌在少南集中二文行世故不序其一潘兄傑也銘曰維祖維父銘在百世我銘如何尚亦勿敗林懿仲墓誌銘昔者吾黨欲相與言於郡則之鄭景元氏於邑則之林懿仲氏今亡矣余故哭景元不勝哀銘懿仲亦不知哀涕之出也懿仲諱淵叔承事郎文質之子起家致貲累鉅萬而急教子長頤叔字正仲登乾道二年進士第懿仲登淳熙十一年進士第而林氏遂為儒門懿仲自城南書社從余學或之他則亦僦旁舎不去後二十餘年非余宦游不可相就必其有故不能相就也間嘗虚所居室東偏江月樓之下集其疇人以待余卒業吾州俗尊重師友前一軰盡學緒幾墜比懿仲二三子修故事後一軰趨和之而復知有師待星子主簿闕即不專習舉子一經日自為程以若干晷課某經又若干晷課某史而後誦楚詞晋宋間人詩於詩禮周官家掇取其說間出已意往往與經意合盖晚而後詩寖工懿仲才辨治能處事但以其才自見宜宦逹有聲譽况務學善不矜衒善褒諱人短長與之者衆宜益顯况其學未止乎而以慶元元年九月壬辰卒於揚州司戸年五十有二嗟乎於是銘余不特為邑人惜也娶陳氏子四人子習子著子潜子簡一女適陳益崇孫男一人子習以二年十月癸丑𦵏於林岱山來乞銘余嘗為其母夫人朱氏得銘於今煥章閣待制廬陵楊公萬里叙其世已詳銘曰合也者離也成也者虧也必嘗以為慊則必嘗以為悲也孰全以歸藴而弗施也於吾子何嗟嗟哉時也止齋集卷四十九欽定四庫全書止齋集卷五十宋陳傅良撰
