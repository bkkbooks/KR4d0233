body:
  text: 古詩送同年林多益丞寜海同里衣冠近闊踈同年齒髪多衰變美人宜在玉筍班隠吏亦随花雨縣有杭一葦逢迎可每食雙魚甘㫖便顧瞻周道竟何如善為身謀吾豈願清廟笙鏞濟濟陳碧梧鸞鵠深深見由来盛事嵗月晚誰到脩途肝膽健楊花吹水酒摇波一請加餐再無倦送謝希孟歸黄巖四首紛紛竹帛傳浩浩金石刻淪亡已無限存亦誰愛惜如何伏羲氏文字二三畫姬孔豈不聖用以演周易法令如牛毛斯鞅信手成簿書積丘山趙張眼愈明萬人立下風國勢尊且榮未省三代前誰獨有此名圭璧襲繅藉山龍餙衣裳不聞燧古初而興自虞唐毁車崇騎射𨽻作篆籀藏至今人便之秦亦忽以亡累觴以為歡班荆以為儀交際貴如此勿使至意虧頗常恠小雅鹿鳴至魚麗賔主禮百拜六經似支離看筍和潘養大韻兒童纔丱角兵衛忽森㦸十日不汝見尋丈出咫尺隠几觀物化軒奮恣所極褰裳欲從之世事有繩墨贈尹紹伊吾友尹紹伊十年抱心疾休然萬事廢豆子黒如漆從之問舊學歴歴不遺一佳篇間哇鄭法語雜方術豈其遇人耶託此訪遺逸張皇鬼物恠漏泄宫禁宻君看服烏喙孰與近參术送郡守汪充之移治嚴陵方郡小旱汪禱雨甚急禱三日而雨至郡人大喜是日有改刺之命挂梁龍骨經時蟄井井黄雲秋已及十日不雨民未急使君日膳長蔬湆澄空䬃䬃雲霧入饁婦休眠兒覔笠村舂化出雲子粒市上明朝升二十農家語圃商語賈恒願使君無疾苦自今一飰吾腹果健看將母從簫鼓馮翊扶風天尺五見說嚴陵在何所詔書奪去萬舌􅄍九重欲扣君門阻棲鳥䕶巢駒戀皁東人自視西人好那知湛露漙秋草春意平鋪無剰少有客解事飜然笑元祐治平諸故老身要人扶功未了誰知青絲絡馬横門道應笑江湖華髪早寄題陳同甫抱膝亭稻梁不難謀軒冕亦易得胡為抱膝翁惻惻復惻惻秋風墮碧梧鳯鳥去無迹愁吟草際蛩兒女淚盈臆忽然一長嘯孤響起空寂令人識雅頌一唱三歎息室廬在路傍耕鑿在民籍行人聴笑語稚子共眠食讀書果何罪鬚髪又半白此意太勞勞此身長抑抑抱膝且不可出門更何適但勿問門外蓬蒿若干尺送葉正則赴浙西憲幕頻年送行客酒罄詩不工最晚與君别柰此百感叢岐山有鳴鳯雅頌移豳風于時二老生出處海上同曹劉對匕箸失色一語中明朝蜀江水不與灞滻通人心起毫末世故闗鴻䝉乃知貧賤交不下王覇功霜根宿病驥雲㠶背蜚鴻秋水能隔人白蘋况連空相從自束髪各去随轉蓬今懐欣有合後㑹苦未重鱸魚直萬錢羊酪醅一鐘願君養盛年我友半已翁送陳益之架閣論事不欲如戎兵欲如衣冠佩玉嚴重而寛平作文不欲如組繡欲如踈林茂麓窈窕而敷榮楨榦盍亦煩繩墨滋味何如餘典則吾宗受才萬人敵排空所向無遺力親䘮三年面漆黒交情一語千金璧明朝不爨鼾撼壁裘馬借人無徳色作掾閩山可蹤跡擬將秉秆空螟相君有令民未得勿問堂髙若干尺春江瀰𣺌風張席欲言江水何終極貧賤相依鬢毛白吾可雷同名送客浩歌未放情彌激君看風雅詩三百亦有初章三嘆息翁誠之尉慈溪再擬祖送不及昨来乆佇驪駒集今来悵望檣烏急中年送客亦多違先事徒勞後無及江頭祖帳幾百人落紙珠璣詩什什自哦短韻意甚得亟欲陳之復羞澁君方筮仕從兹始驊騮開路日千里若逢人話子陳子侏儒一節今如此送鮑清卿教授莆中閩中豈不好莆中况多儒其山有丹荔其水有子魚艾軒諸老生典則故所餘堂堂退傳門海内欲曵裾宦逰得此樂餞者酒滿車我亦勸君酒我意獨未舒嘗聞入林獵不可背水漁背水漁尚可背時更﨑嶇方今朝廷尊紳笏日走趍官多豈勝記勢逺復易踈媒身衆所同藉口誰不如柰何但温飽去向天一隔平生拙自謀蓬巷嵗月除更事亦既熟畫此未必愚豈有服􅊉蘭佩之以瓊琚令人愛不見搔首空踟蹰作南塘記郡守沈持要以詩来謝次韻奉酬周公作雅頌退然在豳風功成貴無迹名大謗亦叢彼人自標置刻畫豈不工君看榛莽間斷碑卧頽墉想當在世時拳拳効深𠂻胡然今弗省身後議論公達人悟物情𤣥覽昭有融區區强名我咨爾来何從沈公天下士於今萬夫雄邦人見未嘗譽之口不容請將氏南樓語盡意未窮公詩陳誼髙耻與好事同年登百廢興解后吾何功勇去學休影倦㳺謝遺蹤吾方笑征南雙雙勒堅玒一以棲山顛一以没水中送謝倅景英赴闕言詩必南雅自鄶吾無譏嗟余生已晚觀人以觀詩人情日變化往事十九非相從餙邉幅欲語懐衘羈乆不見官寺下與家人夷渡江六十年得此心目疑早從諸公㳺晚佐一郡治居嘗陳誼髙動與作吏違大白浮朋簪單車欵民扉多文雖素履用拙真良規二年意綢繆一别事𣺌瀰有酒公不飲贈言我何禆穆穆清朝班僉曰尚徳宜何妨著此翁衣冠皓鬚眉懐同舍石天民編修山隂不得見見期在東陽東陽忽嵗華欲往又阻長貽書輙無報有便復寄將以君懶於書我豈望得當永懐十年别動止曽莫詳君貌今何如孰與我老蒼就使白髪同脚力誰弱强日飰米多少飲酒可幾觴尚能甘寢耶比之昔對床嫂氏亦晚景吾婦伯姉行為君過客頻膏沐當不常有兒若干人己未勝冠裳但要能譍門勿問鄙與臧一紙細説似慰此遥相望末乃及田舍何有還何亡丞郡禄已厚豈不可小康憶昔夜夢君託交少年場竦身而掀髯眸子烱烱光依然論時事悲壯淚以滂我方閉門嬉謁至即暫忙婆娑松竹下細數秋葉黄舊志益凋落羣書半遺忘請君勿他及却使我意傷次韻蕃叟弟月下有感平原接翠㣲修竹圍綠浄乃於此中間更以皓月映佳人笑隠几萬物獨我正幸哉吾有母侍飲得缾罄夢人誦詩覺省數句足成一首三人共一被寒夜争抽牽一人耻不讓起坐遟朝暄明朝復雨雪忍豈無春妍四時各天運二人正鼾眠送曹器逺試臨安二首青衫豈必貴未得不可已皇皇海内人趨走共一軌生前極浮榮没後抱深耻他山有隠淪一笑粲冰齒豈知天地間樹立在人紀大有扛鼎力小有挈瓶智誰當頓八紘舉以掩衆器煌煌一百年此道最宏被雖躋三事尊亦起一藝試或云科目弊此語復有味約同舍蜀人王徳修三首逺莫逺闗塞鴻鴈来年年我嘗按輿圖嶓漢在眼前胡為與君别壯齒今華顛下峽君有期㑹吴我何縁令人媿不如鴻鴈得自便疇昔夢遡江巴陵至瞿唐兩崖束秋旻中有一帯蒼安流進分寸怒去千丈強求君竟不得望之涕淋浪往日事已然来日理未詳橙橘方粲粲魚蝦亦多多能舂半年糧豈惜一見過良夜月如霜聴我苦别歌翳翳葭蘆鄉風定水自波或者阻君舟柰此佇立何次徳修仙巖韻我家仙巖人跡稀客從何来此何時岷山之陽適海嶠萬里欲寫心精㣲瀑泉自雨一丘壑有龍蟄不随羣飛病樵弛檐渇猿喜雖未作霖良已竒吾聞岷山天與齊仰止不見如調饑君登絶頂小天下此縱有山安足嬉翩然肯過非所期此道遼闊車誰脂願言税駕母遄歸為我更賦崧髙詩再用韻呈徳修一日一見猶為稀如何十年見無期昔方壯嵗意輕别一笑聼君歌式㣲江流永矣劒閣阻恨不羽翰能奮飛不圖今日已華髪話此恠恠還竒竒桑麻不競蒿壓屋厚禄書斷兒恒饑誰當附􅉯斵冰雪嵗晏獨可相從嬉功名富貴各有時人亦空自為韋脂與君持此將安歸滄海雪山無盡詩夷門歌送修徳還闕萬古江入海吴蜀有不通不通誰使然人自為異同昔在李孟錢士各懐土封静言彼何尤亦各徇所忠恭惟宋受命三姓皆朝宗斯文已百年名世纔數公眉山與金陵柰何不相容大雅如闗洛亦復互詆攻朋分文字間禍起師友中四郊忽戎馬塵滿夷門宫往事已覆轍後事如飄蓬一飰忘苦饑一褐忘苦冬身謀毎不長王事靡有終有客獨惻惻萬里興深𠂻相過話離合歴歴繇熈豐我乆世慮薄念之涕無從貧賤將安歸功名在其逢有能用斯人可使百阻空西人不為西東人不為東借書一首别薛子長山阿著柴扉陋甚誰盤桓美人此何求鉅竹數十竿日閲書百篇尚覺日力寛欲從我借書我書何足觀辛勤抱遺經及此鬢髪斑一語未領㑹累日不自安雖更聖人手亦恐衆説謾况復秦漢下曽莫修與刪致之獲麟前存者今若干我無以裁之望洋乆空嘆羨君方盛年恣意渉浩漫又聞書少多不繫學缺完讀書固匪易用書良獨難昨来荷堤上嘗試及孟韓此話如涓埃此道如丘山寄陳同甫生日南國雨初潤西風水㣲波持酒欲勸君柰此道阻何天地自乆長日月良蹉跎志士惜少年用意矢靡他豈無文字功百代名不磨胡然朝攬鏡夜起瞻星河思婦視貞操驕人視勞歌曽㣲强飯書覆出為詆訶永懐姑射神尸居養天和下視塵㝠㝠鴻鵠謝網羅身將世誰親得孰與䘮多請君以尊生我亦以養痾述懐有客盈門飯不足有書千卷兒懶讀王公勞問煬争竈樵牧相忘盗騎屋古来堪笑如我少生無一事能恰好獨有居閑可引年我又不然華髪蚤簡鄭景元西風肅萬物於卦曷為兑説言就凋蟄之死矢靡悔方當春和時動植出草昧喧號聒穹蒼怒長彌大塊紛紛誰則敢所恃盖有在簡王道父瞻彼萬仞巖亭亭上烟霞其下寒淵水清不容魚蝦閔子生好修而居東海涯顧見泥中蔵日食百萬家浮名太累人未語衆已譁為海不為淵何道以自瑕贈東陽吕望孫周登二武士鴻門無人易水寒安得壯士乆所患求之市隠戎行間紛不當意鬢已班匈奴未討憂萬端此得兩君聊自寛有石堂坳立䃡百夫睨之欲舉難兩君挾起如弄丸舞空一葉風圑圑吕君忽作戎衣冠瀝酒於地盟血殷長劒乆倚燕然山義欲為漢誅樓蘭九重深􅆼虎守闗竟以劍器愽一飱語未良已聲珊珊兩蛟出没萬馬攅夜䦨月暗天汗漫滿堂悲憤淚欲澘嗟爾兩君誠義肝我方乗障荆之蠻五營諸將皆豢安髀肉乆不堪征鞍誰能喚與百辟看但得汝等一解吾君顔書生老死不足歎書黄巖丁明仲墓誌碑隂葉君隻字雙南金予子拳石藏幽深百名以上辭不滛我豈識子酒漸襟黄山之阿墓林林斷碑日爍秋雨霖彼豈孫子力不任人莫過問嘷孤禽子以窮餓死苦吟束棺逆旅無衣衾末乃得此世所欽子視昔者孰與今區間夀短升與沉長留天地誰無心於中詩人最嶇嶔竟亦朽腐如書蟫何獨遺子天球琳上與郊島名相尋雖無薦藉鬼已歆况立之後主釡􅑄期㠯數嵗頭勝簮有田可稼桑可紝收拾舊藁編朱綅未必千載無知音請我書此碑之隂大亮一語不肯侵嗚呼讀者悲不禁牛羊勿踐木森森止齋集卷二欽定四庫全書止齋集巻三宋陳傅良撰
