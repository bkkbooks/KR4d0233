front:
  text: 仁皇所賜魏家刑政二字後臣嘗幸備員中祕恭睹仁皇奎畫凡五十有五軸亦既盛矣以今見魏家刑政二字又以嘆散落人間夷夏山川之藏不知其幾也恭惟景祐以來上意日趨於寛任子至於及員郎治獄至於貸贓吏理財至於弛茶禁蓋後來新法之士謂之失刑政者以今所見帝雖燕閒與疎遠小臣亦未嘗不講此二事然後知帝所謂刑政在是不在彼也嗚呼仁哉
  hash: sha256:287409f6c5b3b0a97bbccae48ce3b910c8a0442b8df5a4e1e183adbb46869b22
  markers:
  - {type: page-break, offset: 95, content: '', id: KR4d0233_WYG_042-1b, image: WYG1150/WYG1150-0828b.png}
body:
  text: 䟦蘇黄門論章子厚疏余每讀章氏論役法劄子言温公有愛君愛國之心而不知變通之術嘗嘆息於此使元祐君子不以人廢言特未知後事如何耳至讀黄門諫疏又未嘗不壯其决也䟦東坡與章子厚書予來湘中見故家遺帖為多而有二異此書與趙潭州所藏黄門論章子厚罷樞宻疏也諫疏在省中不知何年流落人間固可異此書傷觸大臣宜不為藏而亦存於今則尤異耳書作於元豐元年於是西方用兵後四十七年王蔡為燕山之役京師遂及於禍不仁而可與言則何亡國敗家之有信哉信哉又後六十七年永嘉陳傅良書䟦東坡桂酒頌公之文宜作宋一經以傳無窮藏之名山副在京師顧乃書桂酒法刻寘羅浮鐡橋下以俟後之居夷者後公百年徐思叔以所藏酒頌示余相對嘆息余性不善書故不復贊䟦辛簡穆公書簡穆公行藏見國史且天下能道之余不復道曩余守桂陽歳旱流言往往以郴桂間民略死徙矣祐之時在長沙幕府具以所聞言之故帥直徽猷閣潘公徳鄜潘公下其説兩郡蓋甚侵余與丁端叔也余二公頗恨然忌幕府不敢白已而識祐之廼佳士耳余既相得㑹它郡巡檢下軍人廩不繼屬祐之即其廬勞苦之天大寒彌兩月雨雪没馬股祐之﨑嶇行盡闔郡得軍中人之心以歸余方恨賢勞而祐之欣欣無一咎言以是益知其人茍便於民雖極言不以為口過茍不便於身雖忘言可也簡穆公為有後矣䟦江道士玉臺菴額後道人為余言此山在閩昭武最深僻人不蹟處吾求晦翁之字請書於後將刻之石兩翁未必以功業著見於世或千載之下有得殘刻於荒榛亂石之間庶兩翁不冺耳余笑而書之䟦周伯夀畫猫余家有數猫終日飽食相跳躑為戲而不捕鼠余恠而問人人曰猫之善捕鼠者日常睡因見伯夀所藏畫遂書此語䟦徐夫人手冩佛經余苦不學書自兒時及今所課書未嘗手抄一卷往時從常州先生薛士龍學每見抄書動十百卷竟帙無一字行草心嘆服之以為視司馬文正何如耳他人無及也今見蔡同年之母徐夫人手冩佛經九十五卷往往得唐人筆法則又愧焉字畫亦細以余之不能手抄一卷書至愧於徐夫人而或者輙意輕天下士余不敢也䟦司馬温公遺玉壘聘君詩熈寧元豐之間天下學士大夫稱温公必曰老先生今見公所遺玉壘聘君詩方以是稱之則聘君之為人可知已嘉州君與李公擇同入館去之日熈寧六年三月父子行藏如此余頃見世所行官制舊典有三晉張縯一編慕用之廼今得聯事湘中聞其世又竦然起敬也䟦宋信翁産經宋永夀信翁隱士也有過客為余道其人物色得之蕭寺中而信翁亦肯來過余宋伯華伯潛兄弟衡陽賢者也一日見信翁於余座上驚嘆至未幾何從致此人耶已而與信翁意思洽雖有它客亦强之與坐兒輩或解衣信翁初不苦辭明日訪之則隨舟下長沙矣余臨長沙年一見過余不敢留也它日行郡得疾倉黄還廨伯華以告則信翁亟來日視醫藥及稍愈廼去以是益敬信翁蓋有道者信翁能説易論語及内經諸書其得處要約有詩篇余嘗欲作宋居士傳未果㑹刋所輯産論遂書其後以其與余交者如此則其人可知矣䟦王恭簡諫草余以公言次元祐紹聖之事蓋古所謂蓍蔡之見者耶嘗袖此藁謁范東叔東叔因出其所藏公奏議若干卷大抵類此䟦曽文清詩詞後余不及見文清公然獲從六卿原伯侍郎仲躬游甚久憶在都下時文清夫人尚亡恙生日當為夀余與髙炳如博士請原伯修拜母之敬見諸婦各年六七十盛服夾侍夫人出對客已而原伯帥婦及諸孫羅拜奉觴且遍飲客乃罷故家孝敬之風可觀也今見文清往還兄弟間詩詞又為之嘆䟦蔡京貶竄元符末上書人詔草及考定邪正等季路為余言此藁得之京没入官故紙篋中嗟乎方京矯誣君父以欺天下兇熖塞穹壤矣豈知遺藁在官所斥賣之録哉然自蔽罪攸貫而京佚罰竟死牖下春秋誅首惡若攸貫尚足誅乎䟦蘓魏公百詠詩稿後余嘗慕魏公之為人今見晚所自叙百咏遺稿非獨其人品殊絶蓋其及見故老與師友淵源所漸盛矣余於是知慶歴嘉祐之際人物之偉嗚呼城門之軌豈兩馬之力哉自三經之學行士以師心自賢不能降以相從而風俗日壊其流弊何可勝道追想前輩髙山仰止龍圖陳公諱從易曽胡田楊四公者諱公亮宿况偉也楊以慶歴八年曽田以皇祐三年胡以五年相繼為學士云䟦陳求仁所藏張無垢帖世未有言無垢先生善作字者而筆勢如此令人起敬嗚呼豈但字畫哉余嘗聞吕伯恭父云某從無垢學最久見知愛最深至今亡矣念無以報獨時時戒學者無徒誦世所行論語解以為無垢之學盡在是也始余與伯恭父有為言之也今見求仁先大夫與往還書說論語事甚悉蓋雍也以前無垢已恨早出餘所著未嘗示人無垢無多著書而論語解要非成書學者但尊信之以此窺見無垢宜伯恭云爾也則世之知無垢者何如哉余少時方省事無垢來為郡守聞見鄉人父老數百人以滛雨害稼訴郡無垢若不省然俄而駛足來索狀而數百人者皆以不滿解去狀亦不知安在矣旦日還鄉下自城以南達瑞安凡閘者堰者皆已决捕魚蠏箄笱凡可以梗水者亦已徹去不數日水落是歳大熟無垢永嘉之政初非赫然有聲也而敏事若此則世之不知無垢者不但其問學也無垢擯斥流落道不為世用以死其不為人知者何可勝道余因求仁先大夫說論語事且有助於永嘉之政故併著之䟦葉正則所為陳仲石墓誌某不善書强書此以慰吾仲石欲作數語附碑隂又無以出銘意之外者嗟乎仲石斯銘亦足以不朽矣銘作於淳熈而書於紹熈之癸丑故正則用前衘云䟦林宗大家藏湯氏畫梅湯梅近稍不貴重於世余慮宗大藏之之悔也故為之書䟦雲山夀昌院右帖公據後圖經云中和二年置與院牒合但不詳杜名字唐史元年十月賊朱褒陷温州今牒稱樂境當在賊平之後然以寧海軍使繫衘攷之地志是時未有寧海軍也豈平賊時嘗暫置軍故略不書乎乾元元年始建靜海軍令軍使錢者元瓘也蓋是歳從元瓘之請陞節度使耳雪菴於今為前輩行余壯時從薛常州士龍學士龍數為余言道雪菴為人由是定交直龍圖閣鄭景望將造朝與余遊鴈山㑹天大雪行十數里訪師於深林叢莽中三人相對清話從者無人色今老矣不欲領叢林以書來别余且示院所藏故牘將待盡於此院余方屏居山樊與士友絶不知與師後㑹復何時然各行其志㑹不㑹何足道因書卷末以當别語䟦張魏公南軒四益箴乾道之辛夘余送南軒先生於呉興之碧瀾堂雅聞定叟尚書名而未之識也其後尚書公所至治行為天下第一益相嚮往余守桂陽是歳孝宗内禪故事桂陽守臣貢白金三十兩吏率取諸民以應令余懼非聖朝所以惠遠民之意具以質言上擅减三分之二且不推賞是時周益公當國疑不能决但批狀送版曹㑹定叟為尚書奏桂陽壤地褊小守臣陳某請不妄得㫖可其奏而賞典視它郡余以是知魏公與南軒先生之教定叟尚書能守其家法如此吾友沈仲一令余書四益碑後遂著其事且以發明上恩云䟦朱宰元成所藏宋宣献公王荆公帖宣獻明道二年帖先是王文正公出守兖宣獻相繼請上親政亦出守亳意此帖為文正發也荆公熈寧五年帖運判中允者楊蟠公濟也公濟以是年十一月自光祿丞改太子中允權發遣永興等路轉運判官明年司農言近詔天下出錢免役而永興秦鳯比它路民貧役重於是始立二分寛饒之法以此帖考之當是荆公嘗有悔意故農寺敢白上耳餘詩帖不能詳其歳月良愧該洽䟦朱宰所藏竹石余苦不識畫獨嘗得東坡先生竹石於司馬文正諸孫把玩久之略窺其意今見此圖筆勢殊逼坡仙愛賞不已於卷末得蔡子俊薛道祖二䟦皆藏畫名家余幸偶合爾䟦朱宰所藏孫介畫孫介不見朱氏畫史孫廣明中避地入蜀長於天王鬼神筆力狂怪不以傅彩為工此畫亦然介豈其家學耶䟦林伯順七世祖畫像陳子曰自元豐季年至今故家舊物希不失矣而吾友林大備所藏七世祖像見之面如生真家寶也公諱頌字雅文薛寺丞先生銘大備父嘗識之序引中公起家累數鉅萬而不及仕今衣冠蓋貌工尊大之云䟦謝大成所藏曹公顯墨跡髙宗中興一時元從皆將相也公顯獨善避權勢以眉夀終今觀所遺謝大成雜語一紙豈偶然哉豈偶然哉大成與余同年生而强健過余薄物細故身親不倦亦必有得於此矣䟦姚次韓所藏其祖闢修禮書堂帖後余嘗論前朝應制書若竇儀蘓曉同定刑統而世但稱可象司馬光趙彦若同上百官公卿表而世但稱君實蘓洵姚闢同修太常因革禮而世但稱明允之類歳月浸久將失其傳令人太息今三館書目言百官表為温公撰是已鉛槧尚多湮晦况於事業尤可嘆息如研論事物顧據於口耳之傳其然豈其然乎因姚公孫次韓出示堂帖遂書其後䟦黄元章所藏山谷墨蹟後以余所見士大夫家山谷墨蹟皆可寶獨衡州守鄭如崈醴陵丞李九齡與今元章所藏迺其家世舊物然後知得之它人與魯納郜鼎何異自百餘年間故家三世希不失者而元章凜凜有論新法意象又不但家藏如此䟦呉興陳籛芝草圖頃桂陽廨中柱去礎三四尺所出芝一本婦子不以為祥掇視余蓋恍然嘆芝不遭也明日故枿復吐三葉紫質黄緣飾見之竒甚余雖異之但令婦子輩謹視母掇取逾時色爛然不敗今覩陳君繪芝為卷自内相李公宗伯倪公序且頌其所自來不虛得又追嘆曩所産芝非特婦子不好事雖余亦不好事也世固有尤物要其名字出不出顧所遭何如人耳芝嘗遭嘆武宣者如余安足道哉因題陳君卷後以自訟云䟦樓大防重屏圖右重屏圖其一圖薾然衰疾人也識者以詩知其為自傳無疑其一圖衣冠容貌皆甚偉必王公大人而莫知之者王君明清濁以所嘗見廬山祠堂其夜並圖書像謂其二人為李中主韓熈載更二人亦不知為誰也嗟乎名字之著不著如此哉孔子所論伯夷叔齊齊景公萬世不可易矣䟦孟蜀王書後余讀漢文賜南粤王趙佗書知西都之所以興也周世宗一世英主而昶以偏方通上國方哆然自大其語多諷刺不遜其能免乎後而蜀亡諸君子顧以文詞取之何哉止齋集卷四十二欽定四庫全書止齋集卷四十三宋陳傅良撰䇿
