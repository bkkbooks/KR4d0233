front:
  text: 奏張子仁除節度使狀臣恭覩數日以來一二明詔講慶壽之禮足以歡兩宫之心除鬻田之令足以快四海之望中外小大之臣莫不手額欣抃延頸以企曰近者二三大臣進退哀榮之典乆未予决意者自今聖心豁然如天開霽必次第處分矣忽奉宸㫖張子仁除節度使果有以見九重燕間未嘗不軫懐勲舊而及其後人誠舉斯心而加諸大臣則一指揮之頃耳然而人之闗繫有重輕則事之施行有先後今二三大臣進退哀榮之典宰執臺諫屢嘗奏請方留未下而遽加恩於勲臣之子則是輕重不倫先後失序臣竊未曉不敢不為陛下條陳之且夫留正輔相初政于今四年言聽志行曾未有君臣之間而倉卒不審便出脩門揆之經義未為中節然而待放郊外屏居山樊省咎陳情亦既累月陛下誠怒之歟則策免舊章皆可覆視誠不欲其亟去歟則或以少保歸班但觧機政或以内祠領使間奉朝謁則為正者進退唯命夫復何辭若猶鞅鞅觖望禀命不虔則持憲臣寮豈容但已然則今置正弗問而遽加恩於子仁獨何歟恩足以及勲臣之後而念不至上相此臣之所未曉者一也非特此也趙雄以抱疴不痊均供鄉郡陛下强起之以帥江西雄之遜牘亦一再上而重違天威當暑出峽竟以舊恙卒于官下萬里旅櫬道路惻然雖雄勲業不敢望過厚之禮而有司常度安用損益何為恤典遲遲至今至如尤袤三朝老儒而陛下之潛邸僚友也最蒙睿簡行且大用而其致仕遺表之章亦數月未報然則今置雄等弗問而遽加恩於子仁又何歟恩足以及勲臣之後而念不至故老此臣之所未曉者二也非特此也闗陜對壘今六十年國家以十萬貔貅付之吳氏父子三世全蜀晏然不煩西顧者吳挺之力也陛下方将召見闕庭行采薇枤杜之禮曾未及講挺復致仕故尤以為傳聞失實屏申奏而不信豈非託重於挺愛之欲其生乎陛下之意則厚矣而非其事情也以挺之威望敵國之所窺覦則擇代不可以不謹以挺之恩信士卒之所懐感則恤終不可以不至以挺之事權海内偏重則一旦而収之又不可以不深加思慮也方今急務未有過此然則今置挺弗問而遽加恩於子仁抑又何歟恩足以及勲臣之後而念不至大将此臣之所未曉者三也雖然臣所云云特謂輕重不倫先後失序物論沸騰因事而進言耳若夫張子仁者介在閑散人不稱數雖少長将家而無横草之勞雖乆綴班行而無涓埃之補不知何故得此殊渥且夫開府建旄非叙遷之官也告廷孚號非私昵之賞也無故而取之則交結之謗在子仁適足以禍已無故而予之則非汎之患在聖朝不足以勸人况張子仁嘗使令姚徳打死命官歐陽安中又有外宅婢阿闗用炮烙刀刄之刑虐害阿鄭等蓋嘗經法寺定斷臺官覺察矣又皆以議功僅從追奪即其怙勢奸法見於奴婢罪状明白不當除授大畧如此其他妨碍臣未暇數以煩天聼臣不勝拳拳欲望聖慈下采公論将張子仁無故恩數速賜罷寝于以光華主徳尊重名器而亟因羣情舉行體貎大臣之禮則社稷之福也縉紳之願也所有録黄臣未敢書行謹録奏聞伏候勅㫖八月十一日奏入
