body:
  text: 第二状今月十二日恭奉御筆付下臣昨奏繳張子仁除節度使事奉御筆為係勲臣之子特除節度使可與書行須至再有奏聞右臣昨不揆愚賤嘗繳奏張子仁除節度使事退惟螻蟻輙抗雷霆言雖當理死有餘罪今者恭奉御筆令臣書行仰惟聖度如天曲賜容忍而又親灑宸翰明示風㫖顧臣何人尚敢違忤雖然臣聞脩當行之政者足以慰傒望之情施無故之恩者足以來謗讟之口臣前所奏固知子仁之為勲臣子也但方羣情嗷嗷延頸累月皆以留正待放而罷命未聞趙雄告終而恤典不及凛然西陲擁兵十萬吴挺物故闕無主者當此時也而授鉞於閑散庸繆之臣冝先者反後冝緩者加急則是捨當行之政而推無故之恩臣恐傒望者惶惑而謗讟至矣此所以深為聖明惜此事體且夫報荅舊勞孰與輔初政者之為親矜憐後裔孰與専帥閫者之為重此事理曉然豈唯羣臣雖子仁固知之也使子仁稍有念慮則亦於此恩數跼蹐不安矣臣是以不敢隱嘿須至再三庶幾熈朝不以無故之恩而先當行之政恭惟陛下聰明仁厚逺繼三五儻蒙少霽威嚴下采狂􅎩而今而後天意豁然萬㡬之間羣疑氷釋事闗廊廟則立見施行憂在疆場則便湏䖏置上以承兩宫之志下以盡百辟之情人無後言事無後患如是則國家尊榮朝野忻豫雖勲舊子孫憑藉寵靈窮極富貴亦物議之所不及矣至如張子仁有罪無功自是不當有此除授則臣不暇論所有元御封付下臣奏状一件連粘在前謹録奏聞伏候勅㫖八月十三日奏入留中上嘉王劄子某輙有愚悃仰禆王聰竊惟去年之秋聖駕乆不過宫中外憂懼計無所出嘗賴得大王宻啟中宫從容調䕶已而六飛順動萬衆懽呼莫不以為皇后作配之徳叶於闗雎大王奉親之孝逺過曾閔也今者太母生辰近在數日而又來年慶壽適降指揮既行討論亦合奏禀朝野顒顒欣逢盛事儻若清蹕之詔或不如期則是奉觴之禮又成虚廢必興謗議徒玷聖明區區以為在今日之謀莫若申去年之請如蒙大王加聽肯為逹羣下之情共想中宫樂聞必能賛九重之决如是則慈福為之滿意重華為之歡顔主上之孝徳無虧中宫之婦道益著而大王令聞布於天下一舉而數美具不可不勉也又况㑹慶重明兩節相繼其為事體允渉觀瞻外而使客陪在廷之儀内而禁衛希從駕之澤動静之際闗繫非輕稍有參差更足憂慮則是自今以徃全賴大王母子俱賢彌縫此事今夫臣庶之家骨肉相保父祖尊長豈無失誤之時妻孥宗從必致扶持之力正以一門利害各切其身不同他人可以坐視天下雖大義同一家而已某忝在府僚不敢隐嘿干犯威尊惶恐死罪至如留正吴挺魏王夫人等事並未䖏分此固非大王所敢與聞亦乞逹之中宫庶知外間仰望之切某申禀是日䝉王喚某到講堂云劄子極好但要繳進中宫可改一本不湏作文字便封來又劄子某等輙有僭越之請仰干王聽重明聖節中外皆望車駕過宫羣臣已是說不行了别無靠䖏只靠得大王入裏頭宛轉調䕶兼是車駕過宫事亦不當外廷理㑹才到得外廷理㑹湏至張皇却不便穩且告大王因宣押次奏知中宫多方勸賛期於必出若更因循日乆嵗深兩宫忽有些少不足利害非細某等忝為府僚竊以為大王子職莫急於此故私布之恭惟留意幸甚又劄子某僭越再有申禀魏惠憲王夫人之䘮已降指揮許國公觧官持服在大王是為伯母有合行禮數只縁上意遲疑未敢陳請然外間議論却謂大王有此欠闕頗損聲譽不審因宣押次可以奏知中宫亦略提起只得降一指揮許到魏王府燒香奠慰便是了事區區併乞留意繳奏傅昌朝轉官状准中書門下省送到録黄奉聖㫖皇后親屬訓武郎閤門㸔班祗候幹辦御前忠佐軍頭引見司傅昌朝已該歸謁得轉一官特與轉行令臣書行臣取到吏部案見得傅昌朝昨來将皇后歸謁家廟恩例轉行一官吏部告示本人勘㑹從淳熈六年九月十一日指揮其在内有應奉不係理年出職一時推恩補授名目之人依條作非况補授欲将自降前項乾道八年七月八日指揮後來似此補授之人亦合一體止令轉至訓武郎止今來本人已轉至訓武郎所乞轉官有礙前項指揮去訖臣今若與書行即合行下吏部遷轉其吏部係是守法去䖏准前告示不敢放行則是徒奉成命於本人實無所濟臣愚欲望聖慈收囬上件指揮庶免煩黷所有録黄臣未敢書行謹録奏聞伏候敕㫖九月二十九日奏入直前劄子臣聞天不可俄度也而示人易地不可俄測也而示人簡是故天地之神化而萬物有所恃者以其易簡也帝王之徳配於天地亦若是而已恭惟陛下臨御于今五年省刑薄斂天下皆知其為仁兼聽廣納天下皆知其為恕而近日以來忽事獨斷尋常指揮動出意表天聽甚髙人言難入羣臣惶懼莫知所為以臣愚昩熟慮而究觀之則陛下本心端不如此何者臺諫對班多是隔下間有論奏亦無施行人以為陛下怒臺諫矣然經筵侍講妙選法從而黄艾首預識擢陛下何嘗怒臺諫乎給舍封駁旋被改除雖䝉留中不即䖏分人以為陛下怒給舍矣然王府翊善付以元子而黄裳終見信用陛下何嘗怒給舍乎留正無故乞觧機政出郊數月猶未予决人以為陛下怒大臣矣然隨班上壽之請朝奏而夕報可至欲使以左相為上公陛下何嘗怒大臣乎甚者或以致仕而恤典不下則紛然竊議曰陛下惡人言死彼李端友備數館客卒於邸中賻贈隨至然則陛下豈惡人言死耶或以乞去而亟請不獲則又紛然竊議曰陛下惡人言去彼辛棄疾召為大卿即去為帥至欲以次對寵其行然則陛下豈惡人言去耶臣故曰熟慮而究觀之則陛下本心端不如此終歸於仁恕而已臣聞天度有常而或寒暑乖錯晦明反繆者必有干隂陽之和者矣而天度固自若也聖徳㒺愆而或喜怒失節舉措過差者必有誤聰明之治者矣而聖徳亦自若也以是言之則不怒臺諫不怒給舍不怒大臣皆陛下本心也而况於惡人言死惡人言去豈陛下之心哉而又况自夏徂冬稍闕過宫之禮遂謂陛下以疑阻虧孝養又豈陛下之心哉夫不察聖心而見其形似苦諫而力争之是宜天聽甚髙人言難入也雖然羣臣孰不希寵何苦自絶雨露之恩孰不畏罪何苦自干雷霆之譴而孜孜半年爭此數事陛下亦盍反求而徐察之乎若陛下於此數事反求而徐察之曰吾心寛大本無所怒今若有所怒然何歟毋乃以某人嘗言之之故歟吾心和平本無所惡今若有所惡然何歟毋乃以某人嘗言之之故歟吾心孝敬本無所疑今若有所疑然何歟毋乃以某人嘗言之之故歟苟有其人苟言其事則是誤陛下者也所以誤陛下者将以孤陛下也至此口奏甚悉夫不察陛下之心而以形迹諫爭者羣臣之罪也陛下本心端不如此而不察人之誤已以致於此或者亦聖人之過乎陛下誠以本心之所存而徐察之則知人之誤已者矣知所以誤已則外廷之黨論可破外廷之黨論可破則兩宫之情意可通外廷之黨論破兩宫之情意通天下尚何事耶以此圖大功可也不暇逺圖以此為小康垂拱而責成可也垂拱而責成則鐘皷絲竹樂與今同尊爼袵席樂與今同臺池鳥獸樂與今同無不可也然則陛下何直為此欎欎使天下徒日夜洶洶也臣最微賤最荷恩寵不勝忠愛之心為陛下白發其端而不敢盡言惟至明至聖為社稷大計為富貴崇髙逺慮而加省焉則天下幸甚取進止是日因奏慈福宫加上尊號已有指揮未審重華宫何故未講此禮以臣攷古來聖人多以彌文縟禮交懽上下今陛下方自疑阻稍闕問安之節若因此盛典併行於兩宫臣意壽皇須更開喜遂歴舉漢唐以來故事及徳壽宫禮數上大喜曰此是好說卿可到都堂宣諭宰執明日奏事商量偶記得孟饗前齋宿不是奏事日分遂奏云明日宰臣以下齋宿無奏事上曰如此只就景靈宫齋殿奏事因奏臣小臣輙發此議已是僭越豈敢承聖㫖宣諭大臣以臣愚見只合待大臣奏事陛下自以聖意指揮即尤見陛下孝敬之徳臣不敢領聖㫖上再諭朕遣卿有何不可遂到都堂具道上意是日趙知院在假葛丞相折簡相約請對比入文字御批十六日就景靈宫齋殿奏事與前言合諸公皆喜已而從駕孟饗遂奏事上意已變但云且許他乞補外状臣昨不度踈賤妄有建白今月十六日伏准尚書省聚㕔宣諭令臣不得說出伏念臣只是建議若行不行自在陛下則臣决自不敢傳布但縁當來曾蒙聖訓令臣傳㫖與宰執大臣則知者已非一人若萬一有人說出忽逹天聽即臣當坐漏洩之罪臣於此時無以自明臣不勝惶懼投誠君父欲乞聖慈與臣在外差遣或祠禄一次稍俟日乆孤蹤明白别賜收用實臣至願除已具劄子經朝廷陳乞外謹録奏聞伏候勅㫖貼黄所是臣經朝廷陳乞劄子只如尋闕三字補外體式更不說及此意伏乞睿照乞祠禄歸展墓焚黄状臣輙有廹切之懇仰干天聽伏念臣九嵗而闕三字貧賤養生䘮死皆有永恨前此幸值郊霈始得贈父闕三字而乆官湖湘逺離墳墓今七八年不獲展省以行焚闕三字每一念下為之心折萬一溘先朝露即兩親竟不霑闕三字澤臣亦無以見於地下矣况自立朝委是尸素區區欲望聖慈矜憐衰謝來日不多特與祠禄差遣一次使得展墓焚黄少慰存沒臣不勝祈天望聖激切屏營之至繳奏南班多慶轉官准中書門下省送到録黄一道節文三省同奉聖㫖多慶特與轉行一官令臣書行右臣照得在法南班磨勘實及十年方許轉行一官其多慶所乞係闕多方淳熙七年體例止及八年欲轉行一官撿照得紹熙二年正月二十一日指揮臣僚奏陳其有法者止當從法不得更引非法之例令御史臺覺察必罰無赦自後有司常切遵守今來多慶轉官正礙前項指揮自降前項指揮以後即無援例陳乞放行事例假如放行即御史臺必湏覺察聞奏適為多慶之累臣欲望聖慈将上件已降指揮特賜收寝所有録黄臣未敢書行謹録奏聞伏候勅㫖十月二十一日奏辭免起居郎申省状准尚書省劄子備奉聖㫖陳傅良除起居郎日下供職不勝慚懼湏至煩凟伏念某衰朽罷駑誤玷班列久無補報實不遑安昨嘗累具奏申乞從罷免或與在外及祠禄差遣俟命累月未准指揮今乃求去得遷若更冒然就職則是前請皆非真情欲望朝廷特賜敷奏追寝新恩以安愚分十二月三日三省同奉聖㫖不允兼職並依舊繳奏安定郡王子濤賜宅状准中書門下省送到録黄一道節文為利州觀察使安定郡王子濤奏今踏逐到宅子一所乞照令徳等例撥賜居止以便祭享十二月三日三省同奉聖㫖依令臣書行右臣竊以為安定郡王見無住宅以便祭享殊失嚴奉之意合從朝廷撥賜宅子一所永充見任安定郡王居住以存事體今來所有子濤奏請臨安府府衙後宅子未審堪與不堪永充嚴奉香火欲乞更降指揮下臨安府契勘聞奏取㫖撥賜仍不許其他官員指占亦不許将後子孫認為已業如此則前後承襲庶免疊有煩凟所有録黄臣未敢書行謹録奏聞伏候勅㫖十二月初六日奏繳奏刑部大理寺易大明阿王斷案状准中書門下省送到録黄一道節文為刑部大理寺状舒州申勘到百姓易大明并汪清妻阿王斷案事令臣書行右臣竊謂人之親莫切於夫妻妻而與人謀其夫則生人無措身之所矣照得阿王嫁汪清生一女三子自紹熙元年與易大明通姦以來凡其夫汪清所與疑慮易大明者皆宻以告凡易大明所與謀害汪清者未嘗一以告也據案阿王嘗受易大明之謀醉其夫以酒又從之學作麻索套子将以勒死汪清不果如是者又一年而後卒殺汪清當殺汪清也易大明雖以鐡尺打傷仆地未曾氣絶令阿王快取索來阿王記恨汪清節次打罵亦有心要勒死汪清手觧布機上麻䋲付易大明勒死之是不謂之同殺其夫乎在律謀殺條姦人殺其夫所姦妻妾雖不知情與同罪昔人之意所為斯人慮者甚嚴宻也况同殺之乎春秋之義魯夫人與弑公絶不為親禮也聖人豈忍絶人母哉與殺其夫雖子猶不得以為母以是為王法所當誅耳而貸不殺是無三綱而十惡之條廢矣臣自攝乏書姦人殺其夫之案或貸死者有之而未有如阿王之幸免者臣愚欲望聖慈參酌經律令有司别行議斷所有録黄臣未敢書行謹録奏聞伏候勅㫖十二月十六日奏入繳奏傅昌朝轉官状准中書門下省送到録黄一道樞宻院闗十二月八日奉聖㫖訓武郎傅昌朝特與轉行一官令臣書行右臣九月二十九日曾具奏傅昌朝已礙正法兼違戾乾道八年七月八日聖㫖指揮當蒙聖慈将傅昌朝轉官指揮留中不行去訖今來又准送到上件録黄臣實不敢奉詔且傅昌朝蠢爾小臣乃敢宛轉附麗煩瀆朝廷變亂法度以臣愚見不惟不當轉行一官更合出自宸斷别作行遣以杜絶來者所有録黄臣未敢書行謹録奏聞伏候勅㫖十二月二十日奏入繳奏藍嗣祖轉官状准中書門下省送到録黄奉聖㫖進義副尉藍嗣祖昨在濳邸服勤有勞可特與轉承信郎令臣書行右臣據都官供到状稱昨紹熙元年六月内給帖補該遇潛藩應奉推恩人共四名藍嗣祖章顯祖顔守忠王演各係白身並補進義副尉數内王演係収使昨該皇太子宫祗應陸宣公奏議終篇賞轉進武副尉又收使皇后受冊推恩賞轉承信郎顔守忠係收使皇太子宫祗應陸宣公奏議終篇賞轉進武副尉又収使髙宗梓宫發引賞轉承信郎見得二人各係收使兩宫賞方轉承信郎今來藍嗣祖與二人補授年月事體一同即無上件合該收使賞典徑與特轉顯是不均恐非公朝待人無私之意所有録黄臣未敢書行謹録奏聞伏候勅㫖十一月二十三日奏入止齋集卷二十三欽定四庫全書止齋集巻二十四宋陳傅良撰
