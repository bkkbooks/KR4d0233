body:
  text: 律詩新昌詠歸囬頭三十二年非木落霜空水見涯萬事自憐多譽早半生猶幸一官遲好將翰墨付儕輩去與漁樵相爾誰還有故人招隐否寄聲橘柚欲黄時贈石時亨并序釋氏敵生死老氏無怛化而吾儒則曰殀夀不貳修身以俟之所以立命夫垂涎麴車染指羊鼎豈曰不知味要不若饑食渇飲之為至也吾友石時亨喜二氏書晚與余游讀易論語於其行作詩贈之要是同根本應湏識等差六經無剰語百氏自名家日落山含斗潮回浦見沙了知来往意萬古一生涯題觀潮閣俯拾滄溟大衡陳蒼去聲莽多閩山飛鳥沒吴㑹一㠶過消長看沙尾行蔵問釣蓑登臨有如此人物付誰何上閩帥梁丞相生日二十二韻炎正維中葉皇圗再造年天潢流少海星緯粲台躔臣主嘗難並乾坤豈偶然千齡開歴數一氣付陶甄黄屋傳神器彤庭領衆仙風雲從此㑹日月更誰先昔者求侵地何人賦甫田呉兒咸抵掌噲等欲差肩廟論惟多士戎功不在邉一麾分赤社萬事屬青編吾道誠難用諸儒亦自偏才名多濩落經行失拘攣洛蜀何嗟及熈豐竟禍延旁羅兼鴈木平歩忽貂蟬甚矣知當宁凄其望濟川年来羣老行公在萬民懸定作鹽梅夢行歌杕杜還滄溟宗衆濫衡嶽倚蒼𤣥要使垂身後無為慰眼前管絃無筭爵桃李未央天魯燕雖堪頌閩山不足鐫中原康濟事彛鼎願聨翩送鄭少卿景望知建寜過家鄉里敬將母士夫榮得失從人論行蔵獨自明百年中古少一笑萬金輕㢘讓吾何敢新茶可擷英有志湏身健闗心在嵗寒一時諸老盡多見大名難湖海方連旱甌閩適少寛為州人不乏千萬強加餐清廟圗書寳熈朝雅頌音頻繁三節召荏苒二毛侵衣飯家纔足丘園意亦深卧聼床下士時作武侯吟海内言華蕚誰名動搢紳豈無當世志能忍十年貧酒興新来减交情老更親公餘如促膝剰把古書陳兼送景元屏廢誠愚分牢愁更索居若逢知己問猶解課兒書地僻門長閉年饑莱自鉏相望無一字不是故情踈庚子除夜有懐老盆自酌共誰歌嘆息其如此夜何已覺二毛嗔婦問可堪一飰患兒多闗河滿眼風塵在天地蔵身嵗月過事業文章吾所畏東陽人亦卧巖阿送沈元誠赴臨漳主簿誰説鄉先進能無沈隐侯青衫今適越白髪竟依劉時里人劉義夫守臨漳道固為名累人當與命謀三台行漸近且勿問歸舟終蔵懐未己欲去事多違士友方推轂鄉鄰但挽衣㝠鴻寒汲汲霜菊晚暉暉何限春蜚動君看果是非送徳逺弟赴省科名雖細事文字要新功方拙存家學豐膄與衆同江湖多我友臺省半諸公為道貧非病連簷有芥菘和張孟阜嵗旦韻白髪朝看鏡青燈夜數更文章輸善宦名字誤浮生廢學兒鼾睡安貧婦饁耕從今定逢吉吾已卜先庚聞沈元誠歸自臨漳喜而奉寄荔圃斑斑熟蠔房箇箇肥我雖縁此誤公亦為何歸吏事生衣垢家山减帶圍不無華衮字卿月更光輝晚春二首萬枝寂寞待春風風雨過多春已空未曉啼鶯相喚語海棠飛盡一庭紅莫道春歸事已非水邉天際緑成圍隔籬聽得農家語雨過田田麥含肥送孫謇卿赴夀昌主簿烏鵲填門雪滿除倩誰騎馬謝雙魚苦吟孫楚三年别饑卧袁安一病餘仕宦吾人聊復爾夢魂今夜定何如釣䑓多是西征客莫道渠能賦子虚哭吕大著至明招寺簡潘叔度小雨崇朝過深秋薄海清故人期不至喬木眼偏明欲往還何日堪論乆此情侯芭幸無恙應就太𤣥名招徐居厚老来却憶少相過别自何年白髪多山葉抱蟬蟲吊夜去看滄海壮秋波天台王子木解官長樂見訪夜深擘荔真愁絶春淺傳柑更惘然世事愛来欺兩鬢人生堪得别多年琢冰積雪江湖阻樹羽崇牙日月懸此理倉茫君勿問明朝且莫刺歸船月夜書懐二首送客門初掩收書室更虚新篁髙過瓦凉月下臨除婦病纔扶杖兒饞或饋魚今朝吾已過莫問夜何如道徳吾何敢功名代有人倉黄恒畏咎斑白㧾憂貧細字書全廢深杯酒勿親静言空自愛萬古亦泯泯送周魯山辰州法曹團欒妻子是誰家獨被饑驅天一涯逺地豈無人晤語長才能免世驚嗟好於書作千年計勿為官驅兩鬢華為問湖南似湖北逾年吾亦訪丹砂㳺丁次翁篔簹園期次翁不至徑蹊曲折屋參差半是天成半自治修竹萬竿人獨立我来掻首菊花期送朱同之福州户掾我自三山失馬餘君方千里問津初衣冠萬室催科易禮樂元戎節目踈謹勿向人徵外事只湏著意訪竒書一年正好榕隂密丹荔黄蕉奉版輿覔樹栽覔得循除數畆園衰遲無力正乾坤學為老圃徒幽意富比封君亦浪言計日若將栽樹木成隂當待長兒孫出門悵望春連塢為向雲屯斸一根題仙巖梅雨潭衮衮羣山俱入海堂堂背水若重闉怒號懸瀑從天下傑立蒼崖夾道陳晉宋至今堪屈指東南如此豈無人結廬作對吾何敢聊向樵漁寄此身次陳益之韻戯呈汪守充之雨過山新沐風平水漫流移尊来選勝立馬歩通幽春在桑麻塢香圑橘柚州從君詩有律還我酒無籌汪守坐上苦吟而忘飲客酒因戯及之汪守三以詩来次韻酬之一年春事墮槐宫却愛清和與政通乳燕黄鸝相倡和落花脩竹亂青紅羨君有賦非占服使君以四月一日為題愧我無才可送窮細與論文一樽酒它時還憶暮江東江城如在水晶宫百粤三呉一葦通桑女不論裘粹白橘奴堪當粟陳紅絃歌滿市衣冠盛缿訟無人刀筆窮多荷弱翁今少霽更能携客謝巖東音合桑林律中宫試聽布皷亦三通相從璧水浮葱白見酒正注一别閩山擘荔紅把釣扁舟將老去欵門多竹未全窮若為皂盖能忘我立盡斜陽車不東汪守屢期見訪不至酬謝倅景英用前韻見寄窮巷蕭然一畆宫勞勞漫刺倩誰通空飜故紙頭垂白晚對清標靣發紅諸老飄零亡幾在謝乃參政任伯之姪百年放佚不勝窮擬將舊學相從問何獨詩壇欲讓東用幽字韻戯簡謝倅當户排危翠循除漾淺流此生從稼圃誰與伴深幽韓子癡凭桉龎公倦入州青蒭與白飯却待為君籌用幽字韻呈汪守謝倅旌騎收人迹簪紳雜道流引盃忘日永得句與山幽行在今當路中興此望州為將登覽目著處訪邉籌用幽字韻荅賈端老人皆忘姓字誰獨訪源流病驥宜懐櫪遷鶯故入幽十年慚主簿萬户薄荆州此事吾何敢相將負一籌自仙巖還舍留别諸友瀑布衡從雲一塢浮圗明㓕木千章在山終愛離山去遮莫黄塵涴我裳送任虞卿教授江隂學省穿楊末江城振羽端聲名人不忌仕宦意常寛缺月天将曙孤村嵗已寒小舟来話别此道少人敦和謝倅見贈生日二首朝天冠佩幾千貟熟數東州未乏賢若論中原舊文物蒲輪應合聘髙年獨醒長愛衆歡酣酸苦随人却嗜甘好客不知彈劍鋏聞公風味可無慚謝倅絶不飲而善勸客酒惟客所好獨嗜甘物再和休將枘鑿問方貟且引壺觴對聖賢鴻鴈不賔滄海凍梅花相伴笑年年淺杯莫到十分酣但愛􅋜􅋜夜夢甘萬里桑麻風雨好一夫尸禄我何慚謝倅生日此夕其如好客何秋風嫋嫋水㣲波渡江公子今無恙上蔡家聲世不多未放清朝空老去欲談前事竟誰過阻陪觴豆彷徨乆坐想風流為一歌景元益之諸友考試旁郡余夢與歩月聨詩得水花初浄月如銀之句追成一絶連年波浪與埃塵誰可論心五六人昨夜夢同天地濶水花初浄月如銀謝倅監試未畢事而出以詩三章来用韻奉酬殷勤送客蹇誰留乆待江城未解舟我醉欲眠君且去不妨懶瓉繼前猷歸舟莫訝太匆忙㑹面何曽累十觴孰與持螯霜月下拍浮酒浪舊陂塘公不能飲極欲從君十日歡倦飛終羨鳥知還棘圍觀戰縁何事亦縱驊騮自出闗沈仲一三益堂有此名三益之人可晤言㳺藏無俗物典則似諸昆剰著書充棟仍添竹過垣翻愁長者轍稀得到柴門逰金嶴趙園脉脉循簷水林林夾岸山令兒從竹下領客入雲間稠木容人過懸崖著手攀從今名字出不到徑苔斑海棠絶句淡月看花似霧中遽呼燈燭倚花叢夜来月色明如晝却向庭蕪數落紅湖樓送客即事一首奉懐益之兼簡同餞諸友誰家喧馬盍朋簪屋壓城頭水照簷橘柚兩山香盡在蒲荷十里浄相兼愁將乆雨春無頼别在明朝酒未厭甚欲去同三四友鱸風更捲一江簾時益之尚館鮑氏鱸風亭春晚一首約同志汎舟匆匆春事竟如何問訊庭前手種花又送行人又風雨半為芳草半泥沙橘香通國今無恙梅實於人晚更佳莫放此春齊去盡夜深愁聽一池蛙用前韻招蕃叟弟仍和蕃叟癸卯二絶細看物理愁如海遥想朋從眼欲花逆水魚兒衝斷岸貪泥燕子堕危沙百年喬木參天上一昔平蕪著處佳行樂不妨随邂逅我無官守似蚳蛙蛙通作鼃落花風雨柰愁何愁亦不應縁落花尚可流觴追曲水底湏占鵩似長沙孟夏事無人晤語鳥烏落為我食貧櫻筍佳休説闗河無限恨腹非空怒道旁蛙大饗湏三飰中黄起四維欲追千古意眼底合深思功名還壯士道術付諸儒但欲謀田闕扁舟下五湖送翁誠之尉慈溪徐劉文采後鄒魯典刑間為母求三釡令人見一斑時平無事立地僻得官閑好索梅花笑題詩海上山詩律吾將問心期孰與親明朝當異縣永夜更懐人尚友逢三益明農識大臣可無相問訊勿道鬢毛新和陳仲石韻乆矣懐相與翩然喜見臨清風生案闕短日過墻隂王事何時暇神州半陸沉諸公宣力去伴我水雲深送謝懐英道士歸廬山懐英棄儒服從皇甫道人㳺晚入東宫賜號觀復大師塲屋收餘䇿匡廬寄一瓢欵門如有欲委幣輙難招菜甲留終夕蒲團共小橋崆峒他日問應記説神霄懐英自言林靈素遭遇誤國事甚悉一别忘年月重来失故初美髯今幾尺衘䄂竟何書謝嘗持所著老子實錄并皇甫記求題䟦余未暇及也勛業諸公在衰遲半世餘許身無補報吾亦欲樵漁送陳持中赴四明節推二首更無人未識東州晚得吾宗第一流編磬在縣金奏合清冰出􅐿玉壺秋喜纔一見還分袂懐欲多言但倚樓亦有鄮山三四友可令觀政話然不前修恨不為同姓更有跫然喜似人嵗晏得君顔靣好天涯從此尺書頻政湏有力同扶世業已將名自絆身它日雲臺勛績上南陽應記舊比鄰乙巳嵗首寄彭子復徐子宜又過一年空草草尋思萬事太勞勞嵗煩士友愁薪米日見兒童嘆鬢毛亂卉各随分寸長新禽已變兩三號及時君亦圗良集莫待春深水一篙次韻奉酬丁少詹見過同逰仙巖遇雨而别佳人何似似江梅邂逅梅隂共舉盃欲與溪山成勝話却因風雨得空囬新詩報我春乗興小徑從今日掃埃自是衰遲愁獨立敢論名字望朋来瑞安宰劉伯協載酒逰趙園叔静道甫子宜行之同集小雨喜霽上已所餘春有幾不堪風雨付春愁君能載酒知誰佀我欲看花不自由倚岸小舟謀未定隔林斜日故相投莓苔踏遍篝燈去收拾殘紅挿滿頭和丁少詹韻盡日支頥聼雨聲閑中惟得自知明朋来何敢煩公等老去方慚負此名待欲短檠看少作敢將尺牘論交情區區却望從容意要莫令人一座傾明月隋珠忽堕前坐令衰颯意飄然無端太史頭搶地安得揚雄賦上天前輩門墻餘幾在他時竹帛竟誰傳落花流水君愁不南渡于今六十年病餘乆不趨郡且遷仙巖書院於屋西有懐同志欲往如天際相期忽嵗華山空明獨樹江晚暗連葭作屋皆三益藏書可萬家豈無人褁飰躬自灌園芽酬陳頥剛見和前韻離合皆天意盈虚幾月華家纔辦藜莧吾亦逐蘆葭憂世還當路論兵有故家深深看踵息隂火養黄芽寄謝景英叅議夢作寄詩覺来追記兩句䰟夢半年皆草草鬢毛一别益蒼蒼足成之故人不見吾何適欲見其人已異鄉䰟夢半年皆草草鬢毛一别益蒼蒼籌邉淮海何遲暮乗障湖湘亦阻長及此居閑宜問訊題書湏待滿林霜寄題翁誠之慈溪縣尉㕔無我亭星月明當户烏鳶下傍人小亭長獨立通國自相親置尉縁求盗居官已䘮真湏知三尺外敲榜亦深仁和郡守沈持要賞柑之什三首滄海無波日萬艘山農囷廪自相豪爭看紫槖行阡陌可對黄柑負酒醪曲水一觴随意集成都千騎最頭遨風流儒雅誰公似増得東嘉地望髙東都門外問征艘去國身輕亦太豪誰可對床聽夜雨自於同社燕春醪不知温詔從天下又罷幽尋與世遨從此宜休堂下夢顧瞻松栢為誰髙仰止苕溪近一艘幾年猶未識人豪黄堂為客知何夕白髪從公飲此醪四海衣冠多後進兩朝几杖舊同遨令人仰視冥冥翮不道㣲風燕雀髙和沈守持要觀潮閣留題平生欲賦觀潮閣立盡斜陽倦復還一日江山䝉筆力百年名字滿人寰郡從晉宋風流後詩到蘇黄伯仲間向去摩挲看石刻誰知功在十年閑公閑居十年奉陪王徳修登觀潮閣兼呈邑宰劉伯協觀潮閣在東溟上有客来登自華陽不道雪山通老栢却看朝日上扶桑勝㳺氣合南三郡荆揚益也劉江西人妙畫家傳晉二王後㑹不知誰與繼爾江吾海永相望落成王朝奉廟以薄恙不獲預謝劉宰并諸鄉丈五首盗起清溪兩淛空童王親自帥元戎誰知小邑無亭障但握空弮有隠功横塘一字比南金滿紙書勞屬意深太史不知收拾未邦人父老淚漸襟許忠簡公嘗手䟽王公濟守禦事欲列諸朝操一豚蹄亦可憐欲將廟食自旌賢壊墻頽壁神臺笠不見干戈六十年却向平時念後艱榱題百尺忽如山誰將西上逢人問令尹何如此一班抱病荒村望欲迷駿奔無數獨鷄棲瞻言鼕鼔何時歇好聽農郊雨一犂和沈守持要題謝公樓額危樓何在水雲中穿市牙旗退自公閑作此来横笛夜愛看人醉落㠶風歡呼夾道江聲合硬語蟠空客技窮姓字從今聨沈謝不知千古更誰同沈守生日燕寝凝香不記春宜休堂下栢輪囷三呉南渡今多士四皓東宫此一人雅不欲書名上上謾令在處嵗陳陳玉巵宴罷思黄髪應合從頭第從臣觀南塘四首呈沈守曽不容舠咫尺間誰知救溺合纓冠今從枕席人行過用趙充國語最好翻盆雨後看夾道歡呼百里間不論扶杖與勝冠公年幾許顔何似遲放牙檣待我看樂在宜休水竹間十年黄帕褁朝冠却乗五箇花文馬來與江村婦子看别乗潘郎伯仲間朅来公適去彈冠更將未盡公碑意收入新詩為並看止齋集卷五欽定四庫全書卷止齋集卷六宋陳傅良撰
