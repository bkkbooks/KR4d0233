front:
  text: 十六
  hash: sha256:adff0166a2f6a97a411c858da24f45fe65c1e742e6322e224eca7737de8534e7
body:
  text: 宋陳傅良撰外制特進觀文殿大學士提舉臨安府洞霄宫廣陵郡開國公食邑五千三百户食實封一千五百户葛邲明堂加恩加食邑五百户食實封三百户敕朕新嗣服日有事於合宫兢兢焉懼無以接三才之奥也駿奔在廟豈無辟公金玉爾音尚想故老具官某歴事兩朝蔚為元輔盖嘗温恭朝夕執事有恪侍我烈祖爰暨上皇執珪幣見上帝者屢矣肆予肇禋均佚就國相維穆穆於以永懐方周盛時㣲子以二王之後聿來助祭有客頌之孝武始建漢家之封有臣如太史談而以留滯周南不與從事為恨朕雖不能比徳於周邦視漢有光焉其因舊章増大食采非苟為恩盖示不遺之意可在外宰執明堂加恩敕朕新嗣服日有事於合宫兢兢焉懼無以接三才之奥也駿奔在廟豈無辟公金玉爾音尚想􅂄俊具官某歴事烈祖蔚為宗工盖嘗齊明盛服習於侍祠之禮矣肆予肇禋均佚分閫相維穆穆於以永懐方周盛時有客助祭詩人頌之孝武始建漢家之封而太史談留滯周南以為恨朕雖不能比徳於周抑視漢有光焉其因舊章増大食采非苟為恵盖示不遺可在外侍從明堂加恩敕朕新嗣服日有事於合宫兢兢焉懼無以接三才之奥也駿奔在廟豈無辟公金玉爾音尚想故老具官某簡在烈祖蔚為名臣盖嘗齊明盛服於侍祠之禮矣肆予肇禋均佚殊館或云越在輔郡或云越在外服或云亦既謝事相維穆穆於以永懐夫留太史於周南自昔浩嘆對賈生於宣室至今羙談朕覽漢事豈能恝然於卿等乎爰因舊章増大食采非苟為惠盖示不遺可張淑妃明堂恩贈三代曽祖敕朕有事於合宫既蒙嘉貺均休於戚里益廣茂恩眷言妃徳之賢夙備皇宫之列爰稽邦典追賁曽門具位某氏故曽祖某謙和本於性資醇厚推於鄉黨善修於身而不享其報慶流於後而端有其原迨其三世之孫遂應四星之象兹朌祭澤爰陟師垣精爽如存寵光是服可曽祖母敕備慈庭之妃掖象應四星敷祭澤於私門寵及二世具位某氏故曽祖母某氏柔嘉協則淑謹流徽好善稱婣族之間種徳及子孫之逺是生賢女闕選皇宫慶霈漏泉䘏章告第懿魂未泯新渥其承可祖敕朕肇盛禮於明堂敷大賚于天下惟慈宫之妃列夙膺皇眷之隆加異典於私庭實率邦彛之舊具位某氏故祖某官某善積於已行信於人報不在於一時慶乃流於再世澤被女孫之淑象應四星闕四字之恩寵齊三事兹開大國載錫愍書泉隧有光靈魂式慰可祖母敕熈事備成湛恩汪濊乃眷四妃之貴列于皇宫爰加再世之封賁其祖配具位某氏故祖母某氏相夫以勤儉為本燾後多福慶之儲孫枝生賢門楣遂大朝敷祭澤邦有舊章爰改胙於營邱尚歆承於褒命可父敕方被神釐慶成三嵗永言妃徳象應四星爰加愍章用慰禰廟具位某氏故父具官某劬躬有慶操行靡它豹畧之才髙於輩行雞鳴之配出於閨門兹誕布於湛恩宜追朌於䘏典爰因舊爵改畀新封精爽如存寵光是服可母敕朕方謹親祠恩如湛露亦懐妃掖念在蓼莪爰按邦彛載朌贈典具位某氏故母某氏蔚有婦徳克相夫家凡此嬪則之賢莫匪母儀之訓生蒙象服既極寵光没啟茅封又多福履兹敷惠澤更建名邦尚克歆承以慰㝠漠可右丞相趙汝愚明堂恩贈三代曽祖闕二字贈太師敕朕觀成王踐阼肇稱盛禮而歸羙辟公相維穆穆文武宣哲燕及皇天朕甚慕焉屬兹受釐無徳不報盖周道也具官某曽祖具官某積有善祥覃及来裔是生􅂄哲為吾相臣維周公孤並建五廟賜鬯歸胙洊有寵嘉資爾曽孫共輯熈事而周制亡失何以崇報爰頒異數晉陟師垣庻㡬醻勞無愧在昔可曽祖母闕氏贈陳國夫人敕周之祭澤至於既醉盛矣其詩曰孝子不匱永錫爾類其類維何室家之壼則施及臣子不但其身而亦被于室家具官某曽祖母具位某氏克相夫子行脩閨門聿生曽孫問我兩社朕惟周人推廣孝思慰滿梱内於兹初禋佐佑乃辟實維爾孫則綏以寵光胙以太姬之國朕敢忘周道乎可祖闕二字贈申國公敕朕閱宗人之譜盖因侍祠追錫其祖父尊寵多矣未有子孫致位三事而後及此者具官某祖具官某雖在天族猶寒畯也克世其家濟以清約是生良弼簡在兩朝如周諸姬如唐諸李於是度越凡例及於茂恩矧惟肇禋澤及四海爰錫公爵作都于申其視宗牒不有光歟可祖母晁氏贈呉國夫人敕維昔宗婦不少概見而衛有碩人魯有令母於周諸姬獨著名於六藝豈不盛哉具官某祖母具位某氏以濟陽之晁来奉漢祀廼生孝子名在薦紳廼生聞孫功在清廟肆朌祭澤洽比幽明申命于吴増大爾邑盖與衛姜魯母相望千載亦足為宗婦之勸矣可父闕贈闕國公敕朕讀史至漢興以来宗室子弟無得公卿位者而坐酎金奪國動以百數未嘗不慨嘆也於是既祠純用周政䇿宗輔告其文人申錫名邦宏賁禰廟具官某父具官某以同姓而行誼篤於韋布以右選而聲聞賢於儒林即所躬行施及其子遂魁多士遂冠從班擢自樞筦徑司宰事疇昔之夕相予合宫三靈具依百福来下洪惟我家生此賢哲本支百世與周匹休下視漢事則九原可以自慰矣可母李氏贈兾國夫人敕朕既舍爵書勞為公卿大夫崇報禰廟則母氏與享可無褒典使之匹休具官某母具位某氏甞相其夫以孝聞於四海嘗教其子以賢著於三朝日者爾子相予世室克輯盛儀而可忘所自乎因其舊號錫以新封我圗兾方用以命汝其世世享以綏後人可妻闕氏贈益國夫人敕魯人之頌僖公至於閟宫享祀不忒及其令妻以是為内助之賢也具官某妻具位某氏嘗與吾相臣共隠約躬定省想夫蘋藻之共爼豆之飾以薦時事無或不䖍也日者合宫而爾夫有駿奔之恭無跛倚之色推本内助賢於魯人我錫賛書晉封於益奚斯作頌侯邦之私孰如爾名藏在王府可知樞宻院事兼参知政事陳騤明堂恩贈三代曽祖贈少保斆贈太保敕朕觀成王踐阼肇稱盛禮而歸羙辟公相維穆穆文武宣哲以克燕安甚心慕之屬兹受釐無徳不報盖周道也具官某曽祖具官某躬行對于古人汎愛聞於鄉譽而懐道不試士論惜之集為善祥覃及来裔是生􅂄哲為吾樞臣維周三孤並建五廟賜鬯歸胙洊有寵嘉資爾曽孫共輯熈事而周制亡矣何以崇報申錫命書晉陞帝保以義起禮亦庻㡬焉可曽祖母滕國夫人成氏贈福國夫人敕周之祭澤至於既醉盛矣其詩曰孝子不匱永錫爾類其類維何室家之壼則周家忠厚施及臣子不但其身而亦被于室家具官某曽祖母具位某氏克相夫子行修閨門是生曽孫功在宗社且夫既醉非旅酬之事歟推廣孝思慰滿梱内况朕初禋懼闕於禮佐佑乃辟實維爾孫則綏以寵光為之報本侈其舊封胙以上國朕何愧於周乎可祖贈少傅䇿贈太傅敕朕既本之六藝不愛髙爵以宏賁陳氏之祧則嗣有令徳休于後昆可無褒典以應經誼具官某祖具官某當天下之清得幽人之履太史之觀風不講而文采無以自見孝㢘之科廢而實行不上於計書也天命弗僣為之生孫既長樞庭又陪國論推本所自當及茂恩肆予初禋醻勞相祀宜及爾考並為三公荷天之休其世世享可祖母崇國夫人朱氏贈福國夫人敕既醉之卒章曰釐爾女士從以孫子言周之羣臣皆有士行之女以為之妃使生賢智子孫足以傳世具官某祖母具位某氏夙以懿行嬪于名門儀于前人以詔婦子載篤厥慶萃於聞孫夷攷其行不足以當既醉之卒章乎有崇故封未足言稱大邦羙號聿從其姑質之二雅誰曰不可可父贈少師讜贈太師敕自亞保以来及是三葉盖王室百年之間而劬躬燾後如一日也於吾宗工尊為禰廟朕豈敢嗇於禮乎具官父具官某義方之教不以籝金隂徳之傳不以駟馬成我碩輔蔚為宗工緯武經文何鄉不可是不謂之賢考歟日者合宫有嚴羙報生民尊祖視古不慙而大臣之禰位不稱徳以卑臨尊殆非周道申錫賛書冠班九棘非以為生盖禮之稱可母杞國夫人成氏贈福國夫人信國夫人王氏贈福國夫人敕為吾股肱之臣上自三世皆褒大之而况於其母乎御不及百兩養不及萬鍾也而無以慰之予心惻焉具官某母具位某氏承休襲美發育自躬恩斯勤斯鞠我良弼采蘋所共雜佩所贈恭儉精白無非教也揆諸周制則被以象服乗之魚軒為君夫人孰爾宜者亦視王母並建大邦雖曰均釐誠有以致此矣可妻闕氏封闕敇朕誦二南之詩流荇采蘩相與共祭自天子達皆内助也仲尼序詩定為篇首寓意深矣具官某妻具位某氏来自名門克相夫子㑹朝有鷄鳴相警戒之道而退食有鵲巢致節儉之徳日者合宫而騤也相予肆祀吉蠲齋明迨及竣事禮無違者則豈唯闗雎之助哉而爾亦與有勞矣錫之羙號爰示寵光雖曰舊章實應經誼可給事中兼直學士院樓鑰明堂恩父贈通奉大夫璩加贈正議大夫敕朕既舍爵書勞自卿大夫以次第賞矣則推其世家為之報本雖禮未有獨不可以義起乎具官某故父具官某生為才大夫而用不盡殁為賢考而何其流之長也屬予初禋百執事在廟爾鑰不但駿奔匪懈而發揮潤色凡祀之大號皆稱朕意非爾素教而克然歟追錫有彛爰進厥秩非以為生亦徳之稱可權吏部侍郎孫逢吉等明堂恩贈父敕朕既舍爵書勞自卿大夫以次第賞矣則推其世家為之報本雖禮未有獨不可以義起乎具官某故父具官某生有種徳之羙而位不稱殁享義方之報袁説友章頴父云生為才大夫而用不盡殁為賢考而何其流之長也屬予初禋百執事在廟爾某不但駿奔匪懈而敬之顯思之戒日徹於聴聞也劬躬燾後非爾素教之所自来歟追錫有彛爰進厥秩非以為生亦徳之稱可煥章閣待制侍講朱熹明堂恩贈父敕朕方舍爵書勞自吾從臣以次第報則推本世繫及其禰廟皆寵綏之亦祭澤也具官某故父具官某少而英發晚益深造渡江諸老多其師友嘗歴郎闈秉史筆力詆和議緒正謗史盖官雖薄而志在於天下後世也位不稱徳識者恨之屬予肇禋有嚴羙報則爾有賢子􅂆講路門可無褒典以慰罔極之懐乎追錫崇階用賁泉壤非以為生亦徳之稱可母敇朕既為卿大夫宏賁禰廟以侈教忠之報則母氏與享可無申錫使之匹休具官某母具位某氏来自名家克相夫子本之純厚申以敬恭其仰而事姑備極順適俯視媵御又何其不察察也是宜篤慶聿生賢子蔚為儒宗名滿天下則加以羙號用慰孝思我有茂恩宜不汝吝可右諌議大夫張叔椿明堂恩贈母敕朕方舍爵書勞自卿大夫以次第賞則為之報本及於母氏使匹休於禰廟不亦可乎具官某故母具位某氏克相大雅如商甘盤復生賢嗣如唐陽子然而生不得與於從爵之榮晚不得享夫五鼎之養儻無愍章以賁幽壤何以慰爾之廢蓼莪也因其舊號益以新封雖曰邦彛亦足用勸可妻敕朕誦二南之詩􅂆以義勉以正皆室家也我有從班豈無内助具官某故妻具位某氏儀于前人克濟其羙遂相夫子為吾諍臣夫與之處約於鷄鳴櫛􅏕之初而不與之處樂於象服委蛇之後儻無追錫得無若汝水之墳南山之側遭世不淑詠歌辛苦者乎爰錫賛書以賁幽宅可孫逢吉明堂恩妻恭人李氏封令人敕朕誦二南之詩至於流荇采蘩相與共祭自天子達皆内助也故詩人誦之仲尼定為篇首其意深矣具官某具位某氏以爾夫子為吾從臣肆予初禋執事有恪以朕之獲助於長秋則爾亦可以受不失職之賞矣晉封羙號庸示寵光雖曰舊章實應經誼可在外侍從明堂恩贈父敕朕既舍爵書勞自卿大夫以次第賞矣則推其世家為之報本詩不云乎孝子不匱永錫爾類盖周道也具官某故父具官某生有種徳之勤而位不稱沒饗義方之報而何其流之長也屬予初禋有嚴羙報生民尊祖視古不慚而可以忘爾某之禰廟乎本之經誼追錫崇階非以為生亦禮之稱可在外侍從明堂恩封妻敕朕誦二南之詩至於流荇采蘩相與共祭自天子達皆内助也故詩人誦之仲尼定為篇首其意深矣具官某妻具位某氏以爾夫子為吾從臣肆予初禋克輯盛典則豈惟長秋之故亦爾臣工嬪婦闕二字其流及上則不失職之賞庸可後乎晉封羙號爰示寵光雖曰舊章實應經誼可汪大定知九江郡敕具官某嘗為嶺南郡卓然以㢘惠聞而無以旌異之何以勸逺吏乎九江名邦牧以選授是用命汝式賞賢勞益圗民庸以俟廸簡可倉部貟外郎汪梓陞郎中八月十四日除敕以日月為功固非所以待賢能也而功令亦不可廢况晉陟為郎與員外置者絶有間抑足以昭宿業勸寡過庸可廢乎可朝散郎江西提舉汪逵除員外郎敕具官某難進易退賢士之操也爾某議禮容臺浸有休問汲汲焉以外服為請雖留行不顧也將指奏公亟頒召節則舒遲累月翔集可觀是不謂之士操歟郎闈之選南宫最清往其欽承踐修家學可中奉大夫提舉冲佑觀豐誼除吏部郎官奉議郎王聞詩除考功郎官並九月八日敕具官某等仕至於刺史二千石亦通顯矣而浩然有歸志是不謂㢘退之操歟爾誼持節湖湘吏畏其敏而固稱老爾聞詩秉麾淮甸民安其寛而固諗疾朕以是嘉之俾還郎省分治銓事往祗成命母有遐心可止齋集卷十六欽定四庫全書止齋集巻
