front:
  text: 維周公太公功在盟府而伯禽見於費誓吕伋見於康王之初克世其美垂名六藝顯允魏公弼亮二祖咨爾後人宜自著見具官某踐修厥猷謀畧輻輳牧民馭士何鄉不可内史擿發文昌論思績用甚茂稱者不容口也備邉襄州隠若敵國太上疇勞欲徙秣陵而未果肆朕嗣服爰咨分閫托重留鑰莫如爾宜且夫金陵魏公之所經畧也元勲大節賫志未就歴年於此胡能嗣之文事武備兼修者何術内寧外憂長慮者何事其究爾心以圖忠報豈惟先正将二祖亦寵嘉之可
  hash: sha256:f8e6a2db6e5f77a7174a2cb13b20cd68d5336e9a4ec3adf00ef0441e7c8a66b8
