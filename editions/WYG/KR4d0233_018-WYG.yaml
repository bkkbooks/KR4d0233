body:
  text: 朝散大夫知南外宗正事趙不遡換右監門衛大将軍濠州團練使擢知大宗正事勅具官某自藝祖置大宗正以睦親族盖歴年於此本支蟾聨世次櫛比而無忒違職此之由可不謹擇之乎爾屬尊而身修宦達而志無競爰自左選改畀南班秩以門衛之崇加以戎團之峻甚尊寵矣益輯宗盟以綿帝系往其勉哉可直秘閣劉穎除直顯謨閣江東轉運判官勅具官某課賢勞耶則誰如汝多采民譽耶則誰如汝著况久淹恤朕豈忘汝也江表将漕司存與留都相時盖視畿甸等耳煩爾調度以寛州縣之急歸報有期勿替前績可浙西提刑黄遹知贛州勅具官某粤從臺掾遂畀畿節不可謂不遭時矣章貢名邦選牧為重而其民亦號難理夫地重則須宿望事難則藉容徳疇咨爾宜就畀州組益究民庸毋曰逺外可太學上舎生李斗南葉元英賜釋褐出身敕某等科目之制至嚴宻也而繇學校進者則課其功緒盖有不待試於春官而䇿之廷者焉亦既得雋矣肆予嗣服又㧞其尤若爾某某者而即官之則所以加恵諸生豈不盛哉可侍衛歩軍司後軍統領戚拱宿衛部轄官兵特贈一官邵建孫光祖鮑信陳孝慶孫顯忠夏震並同敕具官某環列之尹著於春秋書勞進秩則有常典爾其毋憚煩使式克欽承則予汝賞不一而足可湖南提刑趙不逿除江西提刑寺丞趙某除江西提舉敕具官某等自江以西綿地數千里其吏善讀律其商善趨鹺茗之利而其田疇多旱潦部使者得其人則刑罰中而訟缿之俗易禁弛散斂行而民不失業以是不逿詳刑湖湘不偏聴於單辭爾闕率職省寺謹厚而無失其以不逿序遷臬司闕為庾氏皆王人也觀省風謡布宣徳意可不勉乎可張縯除直秘閣宫觀敕具官某以熈寧論事之臣之後其文足以自見其學足以自飭此吾烈祖所以寘諸冊府上皇以為郎若卿也晚分郡符數上奏計雖不見察於部使者而見直於言路而秉心無競固請解組成爾素履歸休外祠還爾舊著寓直延閣尚對新渥以為後圖毋若考槃永矢弗告可江東轉運判官劉頴知平江府敕具官某将輸江東方錫賛書擇牧吳門又分符竹爾亦喻朕指乎以爾才足以撥煩且宜引以自近也夫足以撥煩則弭節而為劇郡所以發游刄之有餘引以自近則置諸扶風馮翊之間盖鴻漸之序也深喻此指無非簡記盍疾其驅以對新渥可李嘉謀知襄陽府敕具官某維烈祖旁求西州之士幾無遺材用以為公卿大夫多矣而一時同進宿留州縣位卑官薄聲聞藹然者猶一二數朕所以式遄其歸也㑹乏襄陽之帥僉謀惟久而又中道輟汝以寛顧憂是豈朕初意乎夫旅進周行毎恨非功名之㑹久勞外服又懐無拾補之益有能於此何鄉不可則通儒也爾其欽承以圖忠報可新除福建提刑盧彦徳改江東提刑敕具官某觀蜀道之歌湘纍之賦則知士大夫不樂久宦於此也爾某﨑嶇荆益至於累年晚歸郎闈意不自得懇章亟上持節七閩夫安於平進而樂逺外曽無纎芥見於詞色是不謂之吉士歟以嫌自引易地江左姑徇爾懐嗣有它寵可權戸部侍郎梁總除刑部侍郎敕朕誦周書至立政用人之戒詳矣而三致意於庶獄至於卒章獨告司寇蘇公夫皆凖人也他無所概見而司寇獨明言其人何歟盖謹而書之也具官某以寛厚長者名當世而以法士名其家夫法士則深於文而長者則傷於恵二者皆偏才也而卿獨兼二美焉頃為理官空圄案月及掌邦計郡國晏然銜命來歸備見忠瘁晉貳秋官此蘇公之職也式敬爾獄以長我王國爾尚無愧於周書哉可司農寺主簿張孝伯除國子監十月十一日敕具官某朕方加恵諸生凡聨事於成均者皆遴選也胄監有丞與聞學政以爾孝伯雅致不渝肆用命爾其益好修以須明陟可諸王宫大小學教授姚愈除司農寺丞國子監主簿羅克開除軍器監丞十月十一日敕具官爾愈爾克開皆以文雅嘗與聞學政矣而以愈丞農扈克開丞戎監盖試煩事益究爾能左右具宜則有明陟可直秘閣兩浙轉運判官黄黼除直龍圖閣陞副使再辭龍圖改除直顯謨閣十月十一日敕具官某以元祐名宦之後而其學足以自立才足以自見也将漕郊畿燕及三輔朕圖爾功正名使華晉職犧閣是豈謂之過歟而何遜章来上至于再三也益嘉亷操少却文謨雖不償勞亦足厲世可倉部郎中汪梓以趙汝愚親嫌除淮東提舉十月十四日敕具官某朕不以防禁遇臣下而或自言嫌則亦從欲以便其私爾大臣之子克世其家比解州紱遄歸郎舎嘗試未乆譽處有聞顧以當路之嫌願就外服政畀淮節以華其行雖徇爾懐亦足風厲可大理正閭邱泳除利州路提刑十月十七日敕具官某夫持節行郡國是為周王人漢部刺史也然周以下士漢纔秩六百石何歟深知此意宜何以圖報乎爾為理官亦既累嵗博文敏事似不能言㑹擇蜀使咸曰汝可若爾者足以循周漢之制越次而持節矣詳刑於蜀庸究爾能往其欽承以須明陟可秘書監兼實録院檢討官薛叔似除權户部侍郎十月二十八日敕朕欲省賦甚而用不足盖嘗歎息安得執古以御今之士與之共圖邦計乎而澤下究也具官某習於六經之道而明當世之務自薦紳先生下逮新進稱爾不容口也屬兹銜命萬里来歸革帶蔬食行乎蠻貊朕甚嘉之曽未復命擢貳民曹夫從班豈所以償勞乎可使治賦孔門之學何以利國孟子不對於斯二者並行不悖此朕之所圖於汝也尚其懋哉以永士譽可起居舎人兼侍講劉光祖除起居郎司農少卿鄧馹除起居舎人十月二十八日敕具官某左右史朕所嘉頼以謹言動爰自嗣服儀圖其人皆舊學也爾光祖馹頃在儲寮蔚為國士而光祖繇霜臺馹繇騎省各以論事不避權近俄而去國朕甚懐之盖嘗嘆息安得三益以自近也今之歸止實慰我心其以光祖序進左坳馹擢居右陛豈徒以是為私乎其繼自今直筆在前則出入不欽號令不臧将懼思焉爾其懋哉勿替初意可國子祭酒彭椿年除直龍圖閣江東路轉運副使閏十月二日敕具官某昔荀卿嘗為祭酒矣而卒老蘭陵後世恨之爾某於今百辟最先進也方在諸生及見故老比為博士獨抱遺經而自詭治民遲遲翔集盖累年於此矣晚長成均雅不自喜亟上懇牘欲便其私将輸江堧陞華犧閣雖寵爾行而朕尚冀爾無遐心也以解荀卿之恨亦有意乎可大理寺丞林思齊除大理正閏十一月二日敕具官某本朝重科目而有以奕世父子一門伯仲赫然聨翩擅聲名於塲屋若爾某者豈不足貴乎而何州縣淹恤亟稱賢勞岳牧論薦始有朝蹟也淑問獻囚士論惟允俾為理官自丞而正鴻漸之序嗣有懋官可户部郎中王溉除直秘閣知平江府閏十月三日敕具官某治辦之吏患在鍥薄豈弟之長或不事事此二千石所以難其人也爾自分郡寄比遣使華長於心計往往所在足用而長財也而捐以予民動累鉅萬蜀道之人至今懐恵若爾者可以托千里之國矣吳門擇牧盖久而後得之輟于望郎華以寓直爾其懋哉勿替民譽可太府寺簿范蓀除大理寺丞閏十月三日敕具官某奕世載徳孰如范氏爾克踐修益自問學色辭粹温君子人也俾丞棘寺未究爾能謹視刑書嗣有寵數可朝請郎權發遣滁州石宗昭除度支郎官新改除浙西提舉吳鎰除司封郎官九月八日鎰閏十月十四日敕具官某等以吾冊府校讐之臣而越在外服不知其反期何時非所以為經生學士勸也爾宗昭鎰嘗同日給筆札試于玉堂之廬觀如堵墻其美無度而何宗昭在淮鎰在湘之久也夫合江之水環滁之山将指承流爾固樂此公論不置盍歸郎闈其亟來朝以對新渥可軍器少監兼權司封官李大性除浙東提舉知常州黄灝除浙西提舉大性十月三日灦閏十月四日敕具官某今二浙猶三輔也比嵗不登仍以旱潦荒政十二其誰與朕推行之乎爰諏其人得於周行則汝大性得於列郡則汝灝也東西二節於以分畀平興頒積悉咨聴之吳越之間民無菜色我有褒璽必不爾後可太學博士陳峴武學将士陳邕並除秘書省正字閏十月十四日敕具官某等朕命以雲漢側身之誼䇿爾於玉堂之廬爾峴不徒具文而有惻隠之實爾邕科别其條而昌言之不枉於執事文詞拳拳皆可觀也冊府儲才得爾惟允勉司校讎益務涵育以就逺志以副殊休可監登聞檢院楊大全除宗正寺主簿主管官告院傅伯成除司農寺主簿十月十四日監都進奏院孟浩除國子監主簿浩閏十月十四日敕具官某等夫以百畝之宰三年之淹僉言賢勞始有朝蹟而後階升簿正列寺士欲以才自著也斯已艱矣矧爾大全西州之彦而伯成浩又南國之良乎姑懋厥官以須褒進可太學正孫元卿除武學博士閏十月二十五日敕具官某古者干籥皆學於東序而貍首騶虞又皆樂師所以教國子也爾以文行簡在東膠譽處甚矣推所講明施及右學将見諸生不但習孫吳而已則朕之所以用汝也可李知已陳景俊並除大理寺丞十月八日敕具官某等魯人以淑問獻囚而漢以文無害為獄掾皆所以重士官也爾知已於今多士為前進而有亷退之稱不幾於魯詩所謂淑問者乎爾景俊於今法家為通才而無少恩之蔽不幾於漢制所謂文無害者乎俾丞棘寺同審刑書庶幾吾民幽枉必達可國子司業葉適除太府卿淮東總領十一月十二日敕具官某昔者仲尼攷定六藝至大學之卒章歸於義利易道深矣亦曰天地大徳次及於理財也今宿師數十萬以天下之財贍之不領於大農之經費而居此官者不知此誼是不重為吾民病乎宜廷臣論建者欲得賢士大夫使之久任以加恵吾元元也朕覽奏矍然改圖其人而大臣首以爾適應選擇輟從司成晉長外府以儒術總戎餉昉於此矣行爾所學奚必多訓可楊源轉一官敕具官某爾請昏于戚里将以圖膴仕也方優愍章及其黨族宜進一官以廣恩意可楊緯引嫌改知閬州敕具官某朕不以防禁遇臣下而或自言嫌則亦從欲以便其私爾紆州組浸有民譽顧以伯氏庀司㩁牧抗章引却易地閬中雖徇爾懐亦足風厲可主管冲佑觀黄度知婺州敕具官某言者不狂擇者不明此漢文帝之詔也深厚寛博庶幾六藝朕甚慕焉日以練官補郡守而爾度方抗疏論事無所撓且竟舎州組便親養退省爾私豈有為為之乎若但從欲不强起汝亦異於漢文矣婺越境錯可以将父便道之官是用命汝其往拊吾民益以民事之暇强學待問朕豈汝忘哉可髙宗周押馬賞轉官勅具官某詩不云乎秉心塞淵騋牝三千馬之増減於此觀人心焉此吾所以設賞典也其進爾秩勸後來可武節郎提轄製造御前軍器所曹組職事修舉轉一官勅具官某以除戎器課勞而増秩非苟以為恩也天下無事武備易弛有精其能不可不勸可沈槐胡仲衡吕友直並除大理評事勅具官某等日者屢肆大眚囹圄空虚理官具員而已然而擇人以詳刑則不可不謹若爾某者皆由此選也宜及閒暇益務明習以稱朕哀矜庶獄之意可前知撫州趙彦繩知贛州勅具官某江右民牧章貢為重爾彦繩以屬籍之秀奮於儒科而臨川治行奏計為最解組来朝適㑹闕守畀爾符竹咸曰是宜往其究心以永終譽可宗正少卿李祥除國子祭酒十一月二十一日勅具官某士行莫髙於知止廟謨莫急於留賢一舉而二美附此朕所以用爾祥也以爾議論接於前聞行藏備於素履見推文行多士攸同粤從樞屬擢貳胄監而秉心無競陳誼甚髙盖旬嵗之間亡慮數請以年為解懐不自安也朕為此風不作深用嘉尚爰醻已試晉長司成本之諸生以重兩學夫人臣守誼人主尚徳是足以明教化矣可虞儔知湖州勅具官某以爾嘗入霜臺持玉節風績甚茂淹恤云久尚徒勞州組乎夫仁不異逺義不辭難廼苕霅之間自昔樂土維年不逢民有菜色荒政十二朕靡所愛苟非其人是将焉寄此朕所以用汝也寓直延閣姑寵爾行亟圖民庸以計来上可張宗况張宗愈轉一官與幹官差遣勅具官某等勸分之令下未有帥先為吾元元輸粟於縣官者而爾以勲閥世臣能奉明詔朕甚嘉之爰進厥秩俾屬外臺非苟為恩将以風厲可倪思知泉州勅具官某朕觀周詩至於廷臣徂齊入謝為之作誦勤勤勞苦然後知官人之道焉爾早以英聲穎脫時輩浸即膴仕蔚為國華日者方憇征驂俄而去國顧乃願休祠館不就郡章以若所為豈必待仕而後慊於心歟而朕自不能忘也維閩山樂土温陵佳郡成爾素履姑惟遲次事簡賦寛可踐所學往其欽承益自明試可鄉貢進士方權輸米補廸功郎勅某勸分之令下未有帥先為吾元元輸粟於縣官者而爾嘗預計偕能奉明詔授之初官以厲来者不亦可乎可程需輸米特補承信郎勅某勸分之令下未有帥先為吾元元輸粟於縣官者而爾能奉明詔是足嘉與官以右選以勸後来可馬大同特復元官致仕勅霜臺有請固不可屈於恩泉壤可懐亦不容廢以法爰棄前咎遂還故官以昭念舊之仁以示勸能之典具官某信已之學兼人之才粤自少年意已輕於先達浸更膴仕恥徒事於清談盖時出其抱負之長而概見於設施之際修明臬事有發伏擿姦之功論建版曹皆足用長財之畫肆予初政洊有煩言屬爾沉疴姑從薄責諒兼忘於寵辱何遽隔於幽明東首拖紳曷慰九原之恨西清持槖尚歆再命之榮可著作佐郎王奭除著作郎十二月二十三日勅具官某雍也仁而不佞仲尼所以第徳行之科也爾羣居則寡言旅進則却立不幾乎所謂仁而不佞者歟久游冊府殊無兢心比上著庭見謂直筆於焉序遷未足以究爾能也朕方識之行有簡擢可秘書丞陳棟除著作佐郎十一月二十二日勅具官某載筆東觀極天下之選矣官資崇卑嵗月久近不足論也爾嘗奉大對亞乎襃然之選才長文富不自衒鬻從其所好翺翔著庭以昌令名以就逺器詩不云乎潛雖伏矣亦孔之炤爾亦喻此指乎可太常博士邵康除秘書丞十一月二十三日勅具官某筮仕學省遂入容臺遂上冊府士而能致身如此盖亡幾人也以爾奏名南宫嘗為天下第一種學績文益務持養次第及此朝無異言往其懋哉以就逺器可太常寺主簿劉誠之除太常博士劉孟容除秘書省正事十一月二十三日孟容二十七日勅具官某朕毎講至於春秋一書則聞劉氏之說本朝經學未能或之先也訪求其家則爾誠之孟容皆世科第誠之方簿正曲臺雅有譽處而孟容淹恤在外稱者尤不容口也其以誠之為禮博士而特召孟容寘諸冊府詩不云乎凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國朕盖庶幾於此焉可中書門下省檢正諸房公事兼權刑部侍郎徐誼除權工部侍郎兼知臨安府十二月三日勅商邑翼翼四方之極夫為内史而無尊重難危之勢非所以覽示海内壮京室也具官某外寛而中剛末詳而本約能通當今之務而不失古意能得君子之心而不忿疾于頑也比嘗試對賦奏闓切朕識之久㑹謀畿帥而簡之庶僚貳于起部盖聞兾裏言之助者開羣枉之門懐危得之情者持自營之計内史不競職此之由儀圖其人無以易汝是用蔽自朕志度越故常以論思之班行彈壓之事往其懋哉以振首善可袁燮除太學正十二月勅具官某今周行之士可以為人師者不乏而朕取諸逺至于一再爾燮亦喻此指乎夫行修于家而未施用於世名聞於州里而未有著於朝列此人主之所務白也宜益懋官以副朕不遐遺之意可添差台州通判吕祖儉除太府寺丞浙東常平司幹官孟猷除藉田令猷閏十月三日祖儉十二日勅用人之弊其惟泄邇而忘逺乎肆朕嗣服覽示無外間有遺材取之下國爾祖儉爾猷皆以故家子孫雅有譽處孝友行於窮約而趣尚不専於科第也徒勞州縣未究爾能以爾祖儉丞外府猷令籍田其益好修以稱朕意可止齋集巻十八欽定四庫全書止齋集巻十九宋陳傅良撰
