body:
  text: 挽詩擬進御製孝宗皇帝挽詞五首九廟威靈逺逺一作重三宗徳業尊謳歌思藝祖歴數在神孫欲返皇圖正先推帝繫恩諸儒議東嚮此意定初元謂以隆興紀元但謹雞鳴問何知鶴髪侵石經方典學盟載更關心四海堯䘮畢三年舜慕深匆匆付神器長樂尚沾襟神機規禹迹廟算奪燕支大號初歸我成功少待時鞬櫜懐不滿簞食問何遲河洛空遺恨年年上玉巵好學元無斁忘疲晚有加明謨宗六藝妙用合三家照映天經緯流傳士齒牙奎文尊閣處更合榜重華羣才何輻輳聖度似天寛清蹕留儒館黄金散將壇風雲一語合日月萬人看攀附今無路哀摧壯士肝孝宗皇帝挽詞五首藝祖開皇極何心畀後昆天將翊堯運世復見湯孫武接規模在仁追典則存煌煌宋宗社永永配乾坤深衷何自見寛詔不勝書當宁延方岳逢人問里閭嵗為周委積家被漢蠲除巷哭彌天逺長江淚不如豈以崇髙極能忘凜凜憂衣更三澣舊費為十金休熊館無秋獵期門絶夜逰恭惟懐顯徳真可締孫謀正觀真英主三王合庶幾此時生後聖端欲踵前徽濟世功何異除􅇯志偶違辛勤三十載十漸更無譏不作脩齡夢天乎詎可諶白雲新厭世黄屋舊非心徳業成千古閭閻寢八音烏號在何許霜重越山岑挽呉明可給事諸老俱淪落流風日轉移獨懐憂國意長説渡江時姓字誰如此功名早不疑却收湖海氣燕坐雪垂頥憶上諸生謁公方薄恙侵欣然䝉絮帽恨不醉花隂自説看人熟相期晚嵗深半天蒼嶺雪回首為沾襟謁公之夕宿蒼嶺下天大雪明日嶺上深數尺挽木奉議藴之詹事尊人寵數頻年及俞音萬口傳豐碑來少海大軸落台躔教子宜如此聞風亦凜然送車今塞道拱木看參天東宮為冩榮慶二字史丞相以詩賀之盛事無虛得𤣥襟可自知徧觀同輩行誰似暮年時衮冕趨椒殿簫韶送玉巵又宜天一笑獨此有遺悲悼蔣昇仲承事扁舟來往適吾真却笑旁觀道隠淪三釜豈無兒可就百年要與酒相親賸栽梅竹皆緣客晚得冠裳不語人試向南塘問漁牧定於此老亦沾巾挽族叔父松竹深圍屋闕蓮賸種魚所愁賔客少不問稻粱餘盡日闕相語盈門手自書吾兒有名字萬事聴何如我懐終古恨不及奉觴時滿眼看諸弟何心賦此詩牛羊來蟄蟄邱墓去纍纍亦有千鍾養曽無一字碑蕃叟自為尊人埋銘題丁少詹姑墓誌後白髪從夫志青芻為客謀送車今幾兩樂土有斯邱歸葬于父黨猶子聲名盛他時雨露秋摩挲看石刻嗟惜到松楸挽樓朝奉裘馬朋簮盛緋魚筦庫卑行蔵公論在然否寸心知嵗晏曽三接民功僅一麾空餘華衮字有恨葢棺時史少傅銘其墓九寺方連茹專城又夾河晚看諸子好孰與一門多薄海皆驚嘆亨衢忽薦瘥大連同厚夜其奈少連何挽包顒叟樵牧常争席篇觴早䇿功有懐隨事見不恥與人同我故竒諸子年來識此翁待看稽古力喬木己悲風翁子看時輩平生不妄賢獨于公有誄惟恐世無傳他日須深刻吾詩可附聨草黄松柏秃名與石巋然翁誠之作行狀挽張子由母又是君王上玉巵未央雨露湛垂垂版輿此去還無恙芝檢重來更不疑四世團欒能有幾百年澌盡亦堪悲里中諸母今誰在聴説承平祐聖時挽潘才叔母剝啄唯深夜門前杙小船有兒能自致此母已堪傳竹院前聞熟桓楹大字懸病懐嗟不及健筆附諸賢才叔所居有竹院挽周宣義魯山司法尊人無酒澆陳草將詩刻隧碑遺名從此在真意竟誰知教子還餘事周人亦有時憶嘗從夜話欲去更遲遲挽婺女何茂宏勸駕嘗連萼應門忽二毛竟於時不偶吾更晚相遭宿草堪揮淚豐碑忍泚毫送車今幾兩誰最戀綈袍挽薛季益尚書徧試江淮聲籍籍久勞荆蜀鬢蒼蒼同時半已登槐棘卒嵗纔能足稻粱遺藁不為他日計佳城尚及此邱蔵豈無後作多文勝令我懐人淚欲滂州里誰如此達尊戸庭深静最情敦不將尺牘通當路却枉扁舟訪杜門每見色温如有屬欲書心愧不能言從今若祭枌榆社好配横塘兩獻樽公與許忠簡公居同鄉挽彭通直子復監丞尊人前輩如同郡流風僅幾人不令兒巧宦所尚世清貧及老猶書巻通班但幅巾吾銘雖未就鄉譽勝堅珉挽沈次卿學正洛學傳當代家聲屬此翁一生無世味萬事與人同恨不師前鄭欣嘗客阿戎宜銘千古意豈在語言工挽林承信道夫教授尊人重交寜問田安在急義固於官不知膴仕幸多花萼好幽棲宜與竹林期牀頭周易吾將老案上楞嚴晚得師此意自應天予後嶧陽未琢長孫枝悼林仲逸縣尉家故書千卷生纔試一班賞音殊不少筮仕獨何艱松菊將身隠蘋蘩忽涕潸幸哉賢玉潤有誄不容刪挽張材卿知郡大猷端明之子春卿尚書之弟貂蟬不逮老端明世濟誰如好弟兄能著青衫偕計吏却將白髪去邊城夜魂俄斷凝香寢秋淚仍兼曳履聲萬石君家同一傳嗣書應更有公卿挽新昌呂脩職頃作庵廬客看公手種蒔溪毛無亂理宰木有連枝久欲鑱他石今還賦此詩黯然懐宿昔絮酒定何時不道千山阻將遺百世名有兒能自致此老已堪銘禄豈無三釡賢誰似一經吾詞雖未就應有䕶幽扄挽尤延之尚書自為師説竟誰宗每事持平屬此翁有志政須名節是斯文非獨語言工要令舉世人材出合在前朝行輩中安得長年留把柂後來各與一帆風宿留江湖長子孫行蔵節節耐人看及為侍從身垂老欲試平生事轉難書就僅題前太史功成方記舊甘盤令人長恨經綸意歴事三朝見一斑向來諸老獨巋然羸不勝衣萬事便燈下細書批勅字雪邊先著趂朝鞭豈應無故令身健却止功名與世傳遺奏定留封禪藁慿誰吹送九重天壯嵗從㳺兩鬢霜重來函丈各堪傷那知卒業今無及極悔論心昨未嘗相約歸期須次第獨存病骨更凄涼他年賴有門生記託在碑隂永不忘挽沈虞卿侍郎官重元非好思閒樂有餘生兒早傳業課女夜抄書時事方闗念歸懐不遂初經綸縁未了天意盍留渠嗜古真成癖摩挲笑眼開斷編遺汲冢名篆出秦臺闕二字緣應盡雲山喚不回凄涼子雲宅問字有誰來挽東陽郭徳誼簮紱何能貴聲名幸自脩凡今為我友幾半與君逰翰墨千年托松梧一夜秋令人懐昔日炯炯夢丹邱悼楊休甫袖手旁觀一世餘元非親物亦非疎酒邊每事如人意燈下通宵讀我書學到莊騷纔止此生逢周漢定何如西州相識無遺恨獨恨無從摻子袪挽宋巖老參議居然是是亦非非錯處稠中定不疑萬事過人旁袖手一生從衆自觀頥肯為壯縣雖嘗試畧見周行已逆知盡日杜門佳客至小槽親校酒醇醨少小脩蔵近市朝亦非著意混漁樵不為禦冦猶争席好説淵明更折腰一飯重違凡子約千金終却故人招送車幾兩交相唁我獨難忘最久要悼劉謙之知錄海内多吾友飄零今幾人相忘尤堕淚欲誄輒傷神余欲作景元同父祭文皆不勝悲輒止謙之亦然才力矜餘地心期恥後塵溘然無一語愁殺白頭親挽王興之提刑四海王詹事傳家有象賢宦情塵滓外風誼典刑邊遺愛依前鄭羣居得少連生平纔樂此一夢涕潸然悼濟陽夫人久接江山境曽論子姓文於焉觀内則可以繼前聞榛栗嚴賔豆蘋蘩潔祀芬有人言不朽片石合摩雲挽張春卿尚書懐抱今遺直身名古象賢路車陳左塾笙磬在東懸再世星辰上三年雨露邊﨑嶇空老去有識共潸然論建囘天力生平與衆同居常焚諫草人自避乘驄朝譽多張仲家聲近魯公挽辭吾不愧收入汗青中悼翁仲立達州憶昔看封事令人激懦衷邊籌皆破的硬語更盤空晚亦通家好居然與衆同行蔵嘗論定誰假一帆風淮幙何多譽巴城僅一麾最書膚使上好語近臣知篳路江山一作烟雲久維舟日月遲空懐歸報牘不逮勞還時挽劉端木司户十年共語昨來非長憶初年握手時身世自憐心炯烔功名猶恐論卑卑民彞亘古非蕪没學者如公好器資緩轡徐行逢九軌可堪倐忽九原悲挽林致賢提舉一經韋氏學五桂竇儀家每恥鄉評過深懲履道華人方貴全璧事已墮空花襃衮來黄閣千年置齒牙挽劉茂實和州欲課民庸元道州欲評人品馬少㳺居無一事可切齒薦有三公方掉頭送公歴陽令我愁目斷賔鴈書沈浮識與不識涕淚流人世安用須封侯鄭自明哀詞并序鄉士大夫書説自明果然嗚呼悲夫自明為太學諸生數與余游乾道壬辰同試進士自明不第於是始别别三四年間自明以釋褐仕于朝而余之再至在所也則自明寖貴絶出其輩行間相過語至其歡狎悲壯與在學校時無異也余郡丞長樂㑹自明家居待台州闕更數往來嘗造其所舎僧寺室中蕭然箯輿一乗老床凳數隻凡若干口日須婦翁米以為食而自明意象與在館閣時亦無異余每語人自明來日甚長也而今死矣自明言行焯焯在人耳目不但余能言之也余獨悲自明以喜事嫉邪取名于世而死最不幸好議論者曰是宜不良死也余觀自明立朝於進對苟得之閭里厮役當諱而不以言上者具以情奏滿朝為危而自明雖即死不悔真若不愛其死者然其事母孝左右不敢違晚得師友務為靖恭閒雅不苟坐立雖一飲茹亦必揣度無害乃下口余嘗羮菌以進自明驚謂曰是可食耶往聞有食此死者至今不近也自明可謂重其死矣士患無志有志矣患不見知于上知而少不合輒不持重以究其用亦士之罪也方自明以母老請外去非上意天下皆以旦夕且復用自明又甚自愛而及于此何哉是不謂之天耶故余為斯文也他不暇論于其死亟致意焉以見余悲且以解議者之惑亦自明之志歟自明長樂人姓鄭氏名鑑詞曰母曰余兒兮吾莫知其何尤婦曰良人兮吾曷為罹此憂兄弟不以是咎兮良友稱其好脩恭不得其故兮庸强名之曰命相彼下堂而貽戚兮或結纓以順聴萬不同咸自取兮曽二者孰失其正聲鬼神之所仇兮人直躬焉是病胥屬鏤忽墮其前兮屈魚腹以為穽竒禍作於牖下兮顧奚悲而宜慶嗟子何傷兮獨余懐不能以自勝尚或相爾藐孤兮天終焉其有定止齋集卷九欽定四庫全書止齋集巻十宋陳傅良撰
