front:
  text: 至尊夀皇聖帝聖政序記臣上言臣聞前聖之徳業莫盛於堯舜後聖之述作莫盛於孔子然二者相湏而不能以同時恭惟至尊夀皇聖帝道本於稽古功成於恊帝臨御二十有八年仁恩塞穹壤威聞憺蠻貊潤色中興之烈而増光揖遜之美薄海内外萬口同辭以為自舜以來一人而已陛下奉若慈訓克昌丕緒見之行事緝熈光明而且欲以欽承允蹈之餘布在方册昭示無極爰命史臣裒輯聖政鋪張表出作宋一經於是書成來上親灑宸翰攄發睿藻冠之篇端日星有爛著於天文而太極之妙自然陳露縉紳鈆槧之流又以為是孔氏之作也臣竊惟有虞之書初與五典並行而無辨更千五百年而得孔氏斷為書首序之百篇之上然後暴白於萬世由此觀之虞舜雖極治嘗久晦而後彰孔子能祖述矣葢追誦而不相及未有父子兩朝聖以繼聖立徳立言自相發揮皇乎懿者如今日之盛者也抑臣次舜之事以厎豫於孝遭人倫之變也以予賢於公因天命之改也惟我夀皇之事髙廟偹及五福彌厯三紀雍雍穆穆脗無間言曽未倦勤脱屣萬乗授之主鬯神人燕寧累聖一家世世同徳父子之間視舜有光焉則陛下之序此書尤足以垂百王之範補六藝之缺矣臣以非才待罪宰事適董攸司與托不朽而藏之禁嚴未冩琬琰無以對揚宏休臣實甚懼用是百拜稽首昧死請以賜本大書深刻以幸来世而又百拜稽首髣髴大㫖敬書於序之下方太常丞兼國史日厯所編類聖政檢討官臣章頴著作佐郎臣王容臣李唐卿著作郎臣沈有開臣黄由秘書少監臣陳傅良左丞相兼提舉監修國史日厯提舉編類聖政
