body:
  text: 跋皇子嘉王賜贐金劄子竊審抗章得請暫爾間佚啓行有期輙以白金百星聊充贐儀輕凂為愧指留幸甚乍遠倍加保愛至祝右紹熈甲寅五月四日潜邸所賜也臣是嵗嘗數對上皇論事不合乞休致再不允於是又請對庶幾感悟是日午皷趨待漏院㑹從官趙彦逾以下亦同班奏事閤門來約臣令隨衆班俄有㫖獨令臣上殿下敷奏反復久天意弗順遂再乞休致忽發玉音甚好甚好留下文字臣就榻前謝且辭下殿再拜退出國門具以聖語申尚書省諫院御史臺及奏知潜邸且請不獲稟達之罪上賜贐金恩出意外臣以不才被遇最寵奎畫之號視翊善黄裳有加是冬急召入講上數從容語臣所藏朕字畫盍進來用寶如生辰詩何故久不見䟦語臣每逡巡不敢當尋復趣取䟦稿僅成而臣罷去樓鑰髙文虎就觀臣家稿留案間家人倉皇不及收自入謫籍日夜危懼但謹櫝藏不敢夸示一昭回之光以震耀天下臣罪萬死言之感涕䟦御書所進嘉邸生辰詩右傅良所上皇子大王生日詩王意嘉賞手書一本以贈或者難曰此頌體耳而及於阽危飢寒之辭何也曰是獨不見太史遷論頌乎太史遷曰余每讀虞書至於君臣相敕惟幾是安而股肱不良萬事隳堕成王作頌推已懲艾悲彼家難可不謂戰戰恐懼善始善終者哉由此觀之虞周詩頌非耶知虞周之頌然後可與言詩矣因著其語又見大王有取於詩在此而不在彼也且以著見王錄小善嘉規益之意傅良不勝感懼無以得此因刻之石以侈大貺右此序䟦真蹟久尋不獲故前䟦賜金劄子深致歎惜之意而參政樓公復追記所見以紀之先生子師轍嵗辛未二月始於故書中得之今附此臣仰惟皇帝陛下龍潛嘉邸毓徳進學一時官寮皆出遴選嘗逢誕節咸獻詩頌既而置酒髙宴初酌黄裳次酌陳傅良各出文書一通致謝再三及視之其一曰上呈翊善其一曰上呈贊讀御名謹封因敬請所以謙賜之由上曰二公之詩雖因為夀而作皆寓警誨之意輙依所惠親書一本復以為贈以示不忘裳與傅良跪謝而退龍飛之初擢裳禮部尚書傅良中書舍人未幾裳以疾没傅良奏請以御書刋之堅珉玉音賜許是時臣鑰待罪𤨏闥與傅良同直北門嘗過其家傅良以䟦語示臣大畧曰季札觀樂歌頌而曰哀而不愁太史公讀虞書至於君臣相敕惟是幾安未嘗不流涕也成王作頌推已懲艾可不謂戰戰恐懼善始善終者哉蓋頌不專於美盛徳之形容皆有敕戒之義秦斯以來此義殆絶臣為之聳然作而曰偉哉論也自詩大序言以成功告於神明無有以頌為警戒者舜臯賡歌世但以為盛事非司馬遷不足以發聖賢相敕之㫖自李斯頌秦專務溢美人亦不以為過韓愈有曰不以頌而以規也而傅良能發之臣於傅良平日所畏至是益以歎服促使刋之傅良曰今既刋宸翰於上方不敢使人代書適有目眚當竢小愈曾未信宿而已報罷未幾臣亦去國相忘於江湖者十餘年傅良下世訪遺稿於其家則不知所在矣二子師轍師朴求䟦其下將碑之以傳遠臣既傷傅良不及見更化之日敢直書始末上以彰陛下好賢樂善之素下以侈傅良等際遇之寵抑使後學知古人頌詩賡歌本非專於形容稱美而諷諫之切未嘗不寓於斯云嘉定三年嵗在庚午秋八月丙辰朔正闕兼太子賔客奉化郡開國公食邑三千六百户臣樓鑰䟦歐王帖後魯直帖往往有之如歐王二公帖蓋不多見靖康之變士大夫故家文物淪喪可勝道哉間見一二令人隕涕歐公以嘉祐四年罷府事明年書成是歳王仲儀以侍讀學士出知益州逢原遺腹女是生呉說傅朋傅朋嘗通判永興以其母念逢原之墓乞改襄陽於是作養志堂焉余悲逢原無後併著於此䟦徐薦伯詩集世多謂書生不知兵謂書生不知兵猶言孫武不善屬文耳今觀武書十三篇蓋與考工記榖梁子相上下吾友徐薦伯登武舉第一日示余横槊醉稿余讀已喜薦伯慷慨有烈丈夫氣其詩詞視唐諸子矻矻弄篇章者多哉當今諸公如見薦伯詩亦可解文武二途之惑題杜大春畫梅偶與文叔時亨論十五國風次第取季札舊序參孔氏序特退秦於魏唐之後繫豳於末畧經改定而意以獨至晚於燈下觀蜀客卿作梅筆墨無幾如在籬落因悟萬事無支離法題石時亨所藏吕真人畫像他畫欲作塵外想類多輕揚今觀太清樓本儼若孔老予微笑曰得之矣真人固應如此彼不知其人而求其夀與他畫師何異題張之望文卷後劉知幾史通上下數千載間掊擊畧盡蓋剨然似庖丁解牛手觸足履動中節㑹矣至不見全牛一節未識知幾尚費若干年耶此事殆非强愽能到賈生太息一書首論諸侯王强大事可謂知務當是時文帝方從代來齊楚諸王皆有相疑之勢朱虛侯功最隆及賞最晚帝意亦畧可見議者因謂賈生首編蓋干時云嗟夫生豈干時者耶要知論事誠有次第一舛其序必有不相察者孔子作春秋一字無間然者非獨用功深也易其心而後語權衡自平耳後之秉筆者宜書輙不書不宜書輙書是其咎安在如班孟堅史視司馬子長加精察而竟不能過往往有愧色亦豈力不足歟溫公嘗言洛中士大夫淵藪談空說性多矣惟史事無所啓口蓋有譏云耳然公言性獨與揚子雲合自今觀揚孰與孟子子雲博極羣書顧不見已何哉程先生易傳未出門人亟以請先生曰吾獨不望進乎蓋晚始授人其間有一字數改定者前哲重著書如此顔子不貳過論殆是慚筆今讀韓子書者於斯文特熟甚科舉之累自韓子不免宜夫人盡然於此可以興古道不行之嘆黄巖張君之望持所為書二編越江山來問當然與否僕固辭張君固請僕末學耳豈足斷此書厚意不可虛辱輙題數語附名篇末非敢云何姑以見惓惓意耳䟦趙主簿所藏詩後丞相清源梁公治閩之數月徙福清主簿趙君餘慶丞長溪主簿固辭丞相固遣之未幾福清宰李君宗思來請主簿長溪宰李君遂夫又來請留主簿丞相益賢君也速致郡中屬掌秋賦之入而趙君懇訴某老矣又位卑下不宜度越他士叅郡政其為辭殊苦確不樂丞相不能奪也明年君秩滿將罷去忽過余出其先君子所嘗得於諸公詩䟦見示亟讀之乃知趙君蓋家學如此其仕進無先人之心有由來矣䟦東坡所記程公逸事學者多不道鬼神如蘆菔之寃豈不異哉自唐末諸藩以鎮將求盗武夫往往略平民充數幾及賞格藝祖定天下哀矜無辜縣復置尉始以儒生為之而鎮將廢賞格如故民鮮死焉二百年於此矣邇者有司以薦舉吏多奸少不應功令輙見格惟尉以捕盗改秩善傅㑹其事得不用薦或者因是頗襲鎮將之舊上方閔焉議改制以防之此建安陳侯焞所為刻是石也䟦孫氏誌述方國家肇造之初將相大臣多西北舊族而東西未有聞者既而天下平七八十載之間而范公起呉杜公起越歐陽公起廬陵孫公起冨春蓋漢一大郡之地而二三公者皆極一時之望於是東南人物遂擅天下嗚呼當錢李二氏之時諸公皆安在耶余覽杜公所言孫卿墓誌并歐范之述為之太息感今而懐古東南之士奈何妄自菲薄䟦爾雅疏古者重小學爾雅所為作也漢興除秦之禁嘗置博士列於學官至今漢儒書行於世如毛氏詩訓許氏說文揚氏方言之類蓋皆有所本云隋唐以來以科目取士此書不課於舉子由是浸廢韓退之以古文名世尚以注蟲魚為不切則知誦習者寡矣國初諸儒獨追古依郭氏注為之疏爾雅稍稍出比於熈豊三經行學者非字說不學自先儒注疏皆罷絀而爾雅益廢余憶為兒時入鄉校有以爾雅問題者余用能辨鼠豹不識蟛蜞為對其事至淺諸老先生往往驚嘆以為博也郡有刋疏并音釋若干卷以乆不就字畫多殘闕金華趙君子良來為推官繕補之始頗可讀趙徵余言因叙此書之所以廢且見子良之志子良學於東萊吕伯恭氏於余為同年進士名善珎䟦史丞相祭諸葛夢叟文夢叟言貌退然不自表出聲蹟不著丞相乃獨得之何哉丞相門生故吏滿天下不聞有得此於丞相者夢叟顧一見得之又何哉丞相之取人也異於今夢叟之取於人也尤異於今矣不竟其逢令人隕涕書種徳堂因記陳仲孚問詩語近讀古樂府始知後作者皆有所本至李謫仙絶出衆作真詩豪也然古詞務恊律而尤未工仲孚嘗問詩工所從始余謂謝元暉杜子美云謝朓每篇堪諷詠蓋嘗得法於此耳解道澄江静如練令人却憶謝元暉與子美同意因書種徳堂遂記此語䟦靈潤廟賜敕額桂陽之民雖貧而有常産父子孫兄弟多挨居或至百口重喪祭有喪哭泣過時必葬埋未有火化者逾久展奉猶哭泣如新喪祭事謹潔至不敢糞𤓰菜尤耻為人𨽻飢年不得已鬻子舍曰奴婢而以養子為約蓋其俗朴近古然也然拙而惰農耕器絶苦窳犂刅入土纔三四寸終嵗置田勿問及春耨去陳草曾不待破塊輙下種水在田上節級溉注之是為良田水在田下雖咫尺不能轆轤使之逆上往往夾江之田與並山同為瘠薄易苦旱率十年八九耕不獲每旱即立視苖槁而乞哀於神無問在不在祀典日擊羊豕聚羣巫皷舞象龍或燃指以膏火薄肉供佛類不効則禱於龍渡山之神山在縣境内最著名其神邦人尊事之非已甚不敢輙禱無不應今夏旱凡民之祠事且遍不雨於是屬軍教授縣令謁祠下以靈潤源之水歸又兼旬不雨某遂宿戒親謁祠下三皷方作星河彌天行數里漸摵摵有聲鷄初鳴至青蓮寺為位望拜遲明登山俄時雨大至達城下已乃三日雨歳及下熟吏與民徳侯之賜推本所始得紹興十四年賜廟額敕黄一道於掌故仰惟國家為民秩祀篤於報功宜詔萬世敬摹之石某為長吏不能履阡陌為方略教民治田而徒干神之澤又以窮自歸於當道連帥部使者咸以錢粟來周急可以免嵗月矣要不可久方將趣丞史以龍骨車若桔槔法下之鄉聚使民稍自力不但以瀆神益永尊事無怠故因對神之休與國家所以褒大之者并道其土俗善否為勸勵著之下方䟦宋景文公帖景文公以皇祐四年二月自亳徙成徳明年正月徙定武實代魏公所謂丐任河朔一年有餘蓋是嵗也元憲公亦以是嵗八月自河南徙許而晏公來河南公有九月朔日請入覲書欲㑹元憲於河陽二十五日書所謂相國也至和元年劉冲之相劉自叅預即領唐書故催書於公嘉祐改元仁宗不豫其曰河朔大臣則韓公在相臺爾八月徙益州是時龎莊敏自永興改河東其年五月元憲歸綴中書門下班公有此月二十三日書云云則猶在定武也三年王侍讀來成都於是還闕公言莊敏引歸不决元憲乃圖任之漸明年莊敏以築堡事寵節鉞元憲復筦樞務真見事之談云䟦晏元憲公表槀景祐二年定新樂是時同在詞掖如胥公偃丁公度張李晁石皆前進元憲公以元年四月掌制乃獨屬筆豈非其文擅一時諸公所推遜歟欽誦遺稿令人起敬䟦趙延康公責偽楚書余嘗手抄建炎四年八月二日刑部狀會恩牽復士大夫名數延康公在焉一時狀中如胡公寅劉公珏皆復用劉至位執政而延康竟謫死余聞京城之禍子昉以募義兵見囚范瓊世多言靖康無伏節之士有以宗室所暴白如此豈無人哉而皆誣陷於群小嗚呼悲夫䟦趙延康詩余既於責偽楚書後著公行藏復見所為詩嗟乎劉歆李白之文盛矣其節操何如詩不足為公道也䟦溫公與邢和叔帖熈寧間温公居洛公從崇徳縣再入崇文元豐四年兼史事以所藏温公帖知是時相與甚厚也後一百十有二年某得見之於其曾孫遵仲修䟦張無盡與邢和叔帖紹聖四年公為吏部侍郎十月自權尚書遷御史中丞無盡此帖皆是歳無盡罷左司郎官去至是適兩年餘矣䟦邢惇夫詩及諸公題以諸公之愛惇夫與惇夫之得此於諸公追想在昔令人起敬䟦邢氏慶國夫人手書余與天台謝傑景英為忘年交謝趙出也為余言外氏丞相家法甚悉今見邢氏趙夫人手書戒婦子一紙往往與景英語合邢尚書趙丞相事具國史至其故家典刑要自令人起敬䟦劉元城帖余讀元城諫疏徧刺元祐大臣而獨不及司馬文正公徧刺元祐大臣而不以為訕獨不及司馬文正公而不以為黨豈惟諫議之賢哉亦足以想見元祐以前深厚之俗矣余懐此久因與子厚得公遺墨遂書其後䟦胡文定公帖浙間人家家有春秋傳而罕見公字畫余記為兒時從鄉先生學同學數十兒兒各授程易胡春秋范唐鑑一本是時三書所在未鋟板往往多手抄誦也晚官湖湘間每過士大夫家輙見公遺帖皆甚貴惜然為春秋學者顧少如浙間何哉因見向氏所藏帖書以勉之止齋集卷四十一欽定四庫全書止齋集卷四十二宋陳傅良撰題䟦題
