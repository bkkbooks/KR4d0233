body:
  text: 手書與周丞相伏自相公參預以来奏記非一間亦及於管見而徒依善頌以為言不敢妄陳當世之事今相公獨運大柄無所避屈頃讀謝表嘗略窺鈞意所嚮矣故敢僭言之往者渡江諸老知討賊而不知立國紹興李正知保境而不知尊君夫惟不知立國故保境之說勝不知尊君故討賊之義髙二者相持至今未解王公將相往往以此代為進退者五六十年於此矣雖比嵗以来此義磨滅殆盡而朝野之情終未但已伏惟相公兼而收之次而舉之勿使忘闕之臣以國家為志天下之大義静重之士以朝廷為徇匹夫之狂言此固當今風厲自營消伏黨論之所務白也夫兼而收之則助之者衆次而舉之則沮之者難惟相公留意幸甚若夫薄物細故各有司存付之責成而已非以煩精神分志慮至冒犯威尊皇恐死罪與吕子約二某自離上饒以後申問啟處不任悁企罙入湖湘凡八十六日始達官所盖一大縣而置官養兵如他郡又以敝政蕩無綱紀交割之日見緍不能百千而漕檄如織官兵持劵索舊逋如所闕二字主之說於是俱廢未必能免於戾矣奈何奈何老兄年衰讀書得趣而門庭反狭陳義愈髙而意氣略肆夫門庭狭則風流不接意氣肆則士友不附所兾追紹前緒旁求後来所謂坐進此道者非君尚誰堪耶六經之義兢業為本詩可以言禮可以立玩味服行自覺麤厲此某近所窺見且以勉同志者劉衡州言笑自由動多觸忤亦嘗造膝共語深切此公矍然若有失也堂堂晦翁亦復少此乃知前修端不可議某老矣望兄冣厚勿罪喋喋為祝趙推官易説自成一家可以相資亦未可為準杜伯髙兄弟文字正使往時諸公亦見領略何遽絶之再及此事欲以實前所云千萬致思儻有疑勿惜往復也某空餐負愧義當弛去然未能自由也毎䝉見囑與臨潭同論若某何足以堪之衰晚無志務為自全聞此悚畏名為國士自古患之蕭曺舊知房杜同舍所成就獨如許要是金蘭耳團沙作飯遺恨極多此所以貴力學唯力學則闕然相值必有以處此也東撞西突誰能料之但平時而友共持兢業之律務令後輩趨於静重是則可為耳容易放開養成虚驕即一不獲而萬有餘䘮老兄以為然否象先别後不及聞其論議如何一見便許以為有異昔日切磋何神耶所欲言無限非書所及臨紙惘惘桂陽與岳漕論移伏蒙矜惻小邦移運郴米三千斛雖已一一具申般跋次第去後其間有不敢不以情告者輙不避罪私布之本軍舊有夫逓之則某到官来不置夫簿今彌年矣及此運米若復調民雖與僦金恐復多事不免誘諭諸卒添貼糧屨之費以漸致自禁旅外卒苦不多部押等人堪託尤少度盡此嵗郴米方可齊集若某誠愚陋亦豈不知速辦之利願見小壘事力如此重以拙滯實難如意以此深慮淹費日月有違簡書王判官在館備見區區艱勤之状非敢飾說上欺威尊儻䝉台慈録其不忍為擾之情而赦其不善集事之罪特賜寛假所無闕誤豈唯某將此邦同戴徳無窮已也謝諸司列薦某僣越申禀聞之道路門下嘗以愚不肖姓名上徹天聴事出非常未知信否某竊伏自念乗障彌年絶無一長可充職者何以得此恭惟門下一話一言為天下輕重凡所舉措必有以起人心闗風化而亦何為出此也意者今日為吏軟熟以相取下否則事文具謬巧以應令又否則持兩可伺候風旨為進退大抵自營而莫肯用情於上之人若某者踈率山野無周身之防動有禀白悉不自他一則當路再則當路不敢萌毫髪之欺於有司門下以為若人而進之則吏􅇷朴耳盖與孔子取狂狷孟子惡闢草莱漢不用嗇夫同意自今以後天下之言取人者曰必若門下之取陳某者而後可天下之言取於人者曰必若某之之見取於門下者而後可不日坐廟朝進退百官則真賢實能小失其為起人心闗風化莫大於此然則某豈惟榮進之慚闕悰感激将千載之下同於隗始雖䰟魄不能忘也萬以傳聞未敢輒効雙牘之謝尺楮陳誠不勝皇懼之至與劉清之寺簿三来教具道毎事已有付託足見了了然不干已一項似不必累病懐此猶可也禁兵教閲鄉闕職分今何預長者迺追恨之天下如此等事何限若曽經闕即終不置恐不足與言了了耳荘周有言吾生也有涯而死也無涯以有涯隨無涯殆已此語未易以諸子不加察也近得弱翁書正說尊抱不肯放下故病勢益増弱翁自是不放下人猶能相念足以見長者多事矣胡季隨嘗一来數日即弃去觀其中頗有先入然極闕扣之廼云片時不挟册即意思甚不佳是靠册子過日去持敬之義逺矣何當盍簪併求規益未間惟一切省事强親藥食以介夀祉獻嵗逺辱書饋專人拜貺承已解組有楊知録者赴官亦嘗附記迺復發還則兩遣皆不關視不勝惘惘去就行藏洞見此理共想歸卧林泉喜如釋負超然燕居益有足樂某沐漆方自此始漕檄如織官兵持劵以責償者如堵墻料理不行固以譴去正使事事企及衡陽亦未知免如何如何晦庵人即須遣去既有入覲之命計當為吾一起潘丈嵗裏鼻衂兼脾疼作楚尚未全安謙仲待制竟来江西矣前書曽舉似大雅仲山甫一章必已領畧某麄率日夜念此以懼尚冀髙眀坐進此道勿謂家食自由却放開去幸甚至願温公元祐變法匆匆不但以愛日之故意亦是十七八年心力盡在通鑑不肻更将熈豐諸事細心㸃檢到得天人推出雖以許大規模終少彌宻未為恰如前輩多恨焉耳某守壘亦已朞月殊無毫髪及物之効夏旱彌月竟得歉嵗憂沮滋甚所幸晚田收及七八而連帥部使者各致周急之助往往来年遂可支捂要是補過不暇儻可免其身耳愧見吾民則自若也髙卧以来伏想玩繹益精綽有餘樂廬陵多士從學為誰亦有切磋之交乎近與富眀叔較量易義因見乾坤交則為泰不交則為否坎離交則為既濟不交則為未濟盖追訟平生爽然自失矣如及善還便當一意以此佚老不敢持未信之學但匆匆讀過漆彫開一叚話頭台意以為如何毋惜痛下針砭甚望與史丞相某頓成衰眊不能細書區區歸徳請罪之誠輙慿楷牘布之𨽻人至於管見敢復以闕楮申言之惟鈞慈勿以為咎幸甚昔者衛武公逮事東周之初晚而就國年且百嵗而抑之作賔之初筵之作拳拳愛君與年少氣鋭敢言之士無異盖嘗讀周公無逸七月召公公劉泂酌與抑初筵迺知卜年八百皆一時元老世為弼亮以身任天下之力非爵賞刑禁所能為也方今聖明相繼對于典謨而太師實與終始其事天夀平格豈獨私公之身哉則衞武之托於是焉在願勿以造朝不造朝當介鈞念若某者無能為矣賦淇澳之詩樂道切磋琢磨之美尚圖附名國風之末與衞之旅賁􅉏御同不朽也某僭越死罪皇恐與髙炳如監丞某得出桂陽瘴境過厚又叨廩人之命衰晚豈堪駈使顧久憂愧尋承州組少屈英豈而叔章黄丈亦持江西之節盡出西府兩公故意盖交道鮮此久矣却用自慰然某眼昏花鬚鬢無黒者日飲酒不能過三爵飯米半升晡後但持空筯伴客闕纔見燈火昏暝思睡未嘗聞二更鼔比五更展轉達旦强絀雜念又性不善鼓引養生度無多寒暑當同草木念之悵然欲緝一二書籍手見古人亦復懶下筆忽猛省前代狄公早世至今當以事文王見譏王允若無晚節漏逗即為全人一修一短何闕得計亦莫若隨公了昏嫁早為休影計差得耳尊意以為如何要補史記之缺甚善但史記一書自班氏莫窺其珍後學祖班轉為詎剝令人扼腕若能為發大意不必若諸家餖飣訓釋亦千載美事如索隱之類收拾無害要只是向下工夫閑居且一面羅取為編何當良覿互相扣擊痛快後已及此於邑之至與王謙仲㕘政薦郴守丁端叔某輒有冒昧之懇竊伏自念於門下宜不自他而敢言之某與郴守丁直閣雖有雅故然未熟其為人同官湘中適相隣比通財僇力兩年如闕家然後見其心與才誠有過人者他未暇徧舉以桂陽之民得免轉徙者則皆郴守之力也桂山邑率嵗仰米於郴毎郴閉糴則桂人坐困去嵗旱歉兩郡特甚丁守既自措置條闕沛然多備則下令許桂人殷販臣室之積令行而民信之故桂市米不絶此一也郴飢則民流入桂桂飢則民流入郴不能相容繼以剽畧而為盜自昔如此某與丁守約各自拊其境内訖今春夏皆按堵此二也桂嘗乞米於漕司今就郴撥三千斛應副桂去郴陸行六十里舟行彌旬而後至般津之費幾半所得丁守遂移苖米輸之桂陽由此省費而又及期此三也毎惟今嵗捄荒艱辛萬状儻郴稍有􅊤鄰之意則某何以塞責必且罪去因人免罪又䝉朝廷不次擢用列之諸司而郴守獨未見旌異同勞偏賞心甚愧之秋間帥漕相約同薦奏牘已就適聞列薦之禁詞司皆相顧失色至今民言陳乞不已某與丁守别久不知其别後為安豐及得簡得盱眙復徙郴本末何如就今觀之則一路郡守留意民瘼理財以寛而用足聽訟以恕而刑省待僚屬以禮而人趨事郴當為第一矣朝廷録功當以實事有人如此若與碌碌者同視将何以勸勞者况某實賴其力禮尚施報但恨踈賤不足動人不敢率先為朝廷誦言之然丁守母甚老一子多病在數千里外誠使某得效栁子厚事以官遜之誼所不辭又恐以矯激取譏故但私布之門下恭惟門下愛惜人才凡可為斯世驅使者何所不當素蓄又辱知幸必不以鄙言為不實或阿所好或於不得已冝切惜啟齒為丞相白發其闕豈惟某将闕二字九州之更於門下歸心矣某干犯鈞嚴臨紙不勝惓惓答胡季随見諭梅菴闕語闕右也盖不勇猛則無憤悱啟發之幾不詳宻則無湏㬰不可離之實無憤悱啟發之幾所見皆軀殻之私無須臾不可離之實所得皆闕二字之外晦菴所以憂嘆而不敢無其實闕来省伏讀之餘境界何異欲望盡去前輩見成之談自轉一闕繼以見示廼知衰惰安能印可或有異同當奉聞耳詩禮奉指不殊前云云若非詩無以言當思吾所言何者為詩非禮無以立當思吾所立何者為禮尋章摘句擎踢闕泰或安詩禮之末矣近得晦菴書索詩説某初無詩説亦告者之過也何時肯来互相扣發日月易得後㑹良不易臨書欽闕之至與沈叔晦某自落南化為一翁百念俱喪獨未辦二頃不敢决去更須旬嵗即遂此圖可以不墮學問相須才力相軋若海中矣六經之教與天地並區區特從管窺見得兢業一節足了一生受用儻不失墜及啟手足如後山所謂生稱善人死表陳君之墓亦是小小結褁其他樹立扶持悉俟豪傑之士所冀尊兄輩行勉之而已切承近得瘍疾以内補散効欣釋之至更乞謹護務至完實久欲遣問適得報新幕廼仁里交好遂留待迓者因成不敏諒之幸甚本司有問四方故事具之别箋佳闕何時或在某乞歸之後尚圖并合扣發新功臨書悁企之切止齋集巻三十七欽定四庫全書止齋集巻三十八宋陳傅良撰手書答劉公度二某乘障無狀誼當自弛不謂誤恩就移廪人每惟衰嬾日與不勝己者處當此委寄何以寡過及讀來教又惘然自失也經生徇偏何者為全文士逐末其本安在拘攣並緣必有受病之處充塞中節豈無進徳之序所以見告尚愧不敏况言證不及藥未覺為益闕須嗣音切闕完之儻有鄙見亦當反覆某老矣何以慰四方士友之望然年來篤信六藝之學兢業為本彼此紛紛自為黨與闕若人之已甚亦恐吾人躬未自厚而責人不薄有以致此闕二字以來事者君子遺恨如左右應洞然察之耳某汨汨無新功有愧闕益前見在諸病以不得藥為請今方悟虛已寡欲乃是指南感甚天闕二字不敬也闕有疑不宜不盡所謂虛已寡欲常並進耶闕者次第闕二字以虛已之外更有寡欲即未可驟言虛已若以寡欲之要更在虛已則似不必兼陳寡欲六經語孟及此二語全欠而來闕對言之今来既教以為對意者二事也喚作二事若非並進即有次第以為並進或乖守約之㫖以為次第或有後倦之吝吾人講學直須的當尚冀切道言之以得未曉老矣三所望於十友也徐尉所屬愚見亦無用辭費為記闕遂来示書為錢若干為舟若干官員年月刻石橋次屬來者勿壊之耳解組有期分宜去此不進决意者来端出望外餘幾千萬善愛答寜逺王縣尉伏辱惠書及於行已之大節致君澤民之要道誠欲講明其一二甚矣足下之志乎學也若僕衰暮何足以言此雖然不
