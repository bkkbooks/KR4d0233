body:
  text: 奏状劄子湖南提舉刺列郡太守状臣照對湖南治郡莫難於永莫易於全臣取十年以来事闗本司至於目即反覆參攷見得永州實是匱乏積而至於淳熈十五年終大軍月樁常拖下七箇月不解共為錢三萬五千貫文餘逋稱此而又民俗强悍動多囂訟此所以為難全州素號僅足自淳熈十三年後大軍月樁每孟月錢季月起發並無缺誤他亦齊整而又壤地褊小公事甚稀此所以為易今來知永州趙謐自到任之後毎月綱運已起至紹熈元年五月分若從今八月理起較之累政䟎前三箇月却又補帶舊欠凡為錢二萬貫文使知永州者皆如趙謐則永雖凋郡可以漸寛知全州施廣文自到任之後毎月綱運初頗如期洎至今年四月以後於本司新故交承之際頓不起解若從今八月理起較之累政更拖下三箇月凡為錢一萬二千貫文又官吏久無俸給軍人冬衣纔支一半使知全州者皆如施廣文則全雖樂土又必凋敝近者朝廷集議蠲減臣實奉行寛大之詔數内永州減月樁錢嵗五千貫亦是謐率先他郡将所蠲減之數分為等第均與諸邑必欲上澤下及於民今之州郡大抵上欺監司而下不䘏民自非謐有志愛民安能如此臣以為若謐者可謂不負陛下使令矣施廣文雖本書生顧為鄙猥之計及此垂滿略無顧憚自上供軍須至官吏之俸一切勿問臣尚以為行且受代或是儲積以遺後人比及體訪累月以来郡帑並無見管錢物且財賦若不在官即須在民而廣文已将今年民户秋苗剏行預借一半方禾未登場之時民正艱食奈何有此暴斂全之民力自是困矣臣以為若廣文者可謂負陛下使令矣至如知武岡軍王公弼亦有治状武岡軍雖小壘自公弼為之闔郡之事井井有條士人恱之軍人安之旁及猺峒悉聴約束觀其才有過人者但視永州不為甚難勞効差小耳以臣愚陋衰疾實不足任刺舉如此三郡治否之状盖久而後得之已忝耳目之寄今三人者各及滿替若更隠黙遂使施廣文僥倖善罷再竊官職何以為負使令者之戒趙謐王公弼不蒙旌别稍異倫輩何以為不負使令者勸已具状奏聞欲望聖慈加恵此方首正諸郡将施廣文特賜黜責趙謐王公弼特賜擢用伏候勅㫖紹熈元年十月二十七日有㫖趙謐王公弼各減二年應勘施廣文與宫觀湖南提舉薦士状臣恭觀明詔搜羅湖廣遺材竊見通直郎知潭州長沙縣宋文仲有通務之材而發於謙和有及物之志而安於静退盖文仲雖生長南土其家學則中原文獻也頃丞萍鄉藹有民譽方臣假守桂陽得其為人就訪之而文仲嘗為桂陽録事參軍授臣本軍㑹計録一卷臣遵行之所以能蠲除宿負罷弛斜科不得罪於其民者文仲之助也尋領使事訪以九郡利病無不周知前者倉司糴補諸郡米僅十萬斛今者漕司蠲錢亦數萬緡皆文仲發之臣以為文仲雖衡陽人實國士也奉議郎知常州無錫縣呉獵學問本於純實器識期於逺大所居闔郡宗為師友凡與之遊類多自愛而獵於其交有善稱之不容口有過戒之不遺力有急難雖不利於其身赴之不恤也頃從事桂林幕府與平李接之亂未嘗言功已而帥臣劉惇不理於口而獵誼不避罪屢訟其寃人臣如此其不負國必矣臣守桂陽獵適為贍軍酒官助講荒政甚於饑渇桂陽故事遇皇帝登極奉表進銀三千兩屬方救荒之際力不辦此臣懼無以塞責獵實教臣申請減額迄蒙睿㫖損三之一為恵一方獵與有力臣以為獵雖長沙人亦國士也文林郎知潭州攸縣蒋礪素稟端亮恥為苟簡往嵗江陵今兹攸縣亷恵之譽兩邑同辭觀其為吏苟不便於民雖上官令之不聴苟便於民雖匹夫不獲伸則身任其責也臣嘗見其詣闕所上書論廣右利害有四捄弊之說及與提㸃刑獄司論經總制錢其言惻怛可以施用則邇臣所謂逺方因革可備咨訪者在静江則礪其人也奉議郎知全州清湘縣楊炤賦受沉審濟以通練亦佐桂幕與平李接之亂隨宜知變見謂善謀而其操履自不可奪及今為縣益著吏績郡實賴之臣得其嶺外鹽筴本末一書自開寶訖于淳熈上下二百餘年燦然明白其論以蔡京變法實為咎根馴致二廣連年多盗官般客販迭為民擾盖利東路則西人被其害利西路則東人被其害宜為損益兼恵兩路斯可以便公私息紛更以臣所見廣鹽之說十數家未有如炤之平者則邇臣所謂逺方因革可備咨訪者在臨賀則炤其人也如臣不肖非有知人之明能得此數子於衆人未識之先正以久居於此或聞之公論之熟或見之同事之詳如宋文仲吳獵之在湖南蒋礪楊炤之在廣右朋儕鄉黨咸所推先牧守賔僚無不器重臣如隠嘿不惟負蔽賢之罪是不奉明詔也已於今年某月某日具状奏聞臣愚欲望聖慈特賜甄録以昭示公朝不遐遺之美謹録奏聞伏候勅㫖有㫖吳獵蒋礪楊炤宋文仲並赴都堂審察辭免浙西提刑乞祠申省状某一介庸陋本不適用偶際休明荐叨器使自守軍壘就除本路監司之任一嵗而遷将漕又一嵗而遷按刑可謂寵光狎至私計兼足矣方寵光狎至而無圖報之心私計兼足遽為求便之請苟非至愚豈敢犯此不韙而某祠禄之請不避煩瀆至于再三實非獲已伏念某秋初心痛至不省事當倉皇回司之時盧檢院范少卿俱來相問苶然一榻不能交談舁入廨舍盡室驚惻僅逃鬼録頼有天幸以此心氣衰憊目力短昏雖極勉强嘗慮妨闕重念某纔有一兒尤不敏事書問滿前莫能報謝米鹽瑣碎時復闗决夫多病早衰傍無佽助在官則以奉公不辦為憂在家則以應俗不周為媿若不乞假嵗月務近醫藥貪戀禄食必致自斃區區欲望檢照前請特賜敷奏别與祠禄差使一次則未盡之命皆生成之賜小帖子稱照得某蒙恩改除上件差遣係是朁應孟明資闕初以待次嵗月足便休養故不敢輙有陳請今来應孟明已除郎官即成見次所以須至煩瀆若未欲便與祠禄即乞與一般待闕差遣某見迤邐前去衢婺州聴候指揮十月二十九日三省同奉聖㫖不允依已降指揮疾速赴行在奏事訖之任吏部員外郎初對劄子第一臣恭惟藝祖受命平定海内凡所以創業垂統莫非可傳之法而深仁厚澤垂裕後人則専以愛惜民力為本臣案故牘自建隆至景徳四十五年南征北伐未嘗無事而金銀錢帛糧草雜物七千一百四十八萬計在州郡不㑹古所謂富蔵天下何以尚此當是時諸道上供隨所輸送初無定額留州錢物雖盡曰係省而非取之也盖至大中祥符元年三司始奏立諸道上供嵗額以此承平百年家給人足傳序九帝天下嘗多故也而民心不離迄用中興則以祖宗之澤在人深厚故也臣嘗惟念藝祖以得民心受天命比隆三代矣然而以天下遜不私諸子纔一再傳而萬世不祧之宗僅同支庶則是在天之靈未享其報髙宗遭變深探其本由是推正統之自納至公之說而大命復集于夀皇聖帝爰暨陛下豈非天哉且天之報藝祖者如此而陛下以睿聖之資寛仁之徳誕膺天眷方當繼體之始伏惟夤念髙宗推本之意欽承夀皇付託之訓以推行藝祖在人未冺之澤為萬世無疆之休今其時也臣不勝至願取進止第二臣聞熈寧以来用事者始取藝祖之約束一切紛更之馴至於今而民力之困極矣盖自祥符奏立諸路上供嵗額熈寧新法増額一倍崇寧重修上供格頒之天下率一路之増至十數倍迄今為額是特上供耳而其他雜斂皆起熈寧則以常平寛剰禁軍闕額之類令闕封樁迄今為額至于元豐則以坊場鹽酒香礬銅錫㪷秤披剃之類凡十數色合而為無額上供迄今為額至于宣和則以贍軍糴本與凡應奉司無名之斂合而為經制迄今為額至于紹興則又以稅契七分得産勘合添酒五文茶鹽袋息之類凡二十餘色合而為總制迄今為額最後又以係省不係省有額無額上供贍軍等錢均撥為月樁大軍迄今為額而折帛和買之類不與焉夫取之之悉如此而茶闕盡歸於都茶場不在州縣鹽鈔盡歸於𣙜貨務不在州縣秋苗斛㪷十八九歸於綱運不在州縣州縣無以供則豪奪於民於是取之斛面取之折變取之科敷取之抑配取之贓罰無所不至而民困極矣夫藝祖以得民心受天命而使困窮至此此天所以復命夀皇爰暨陛下将以捄民窮也書曰天明畏自我民明畏方今之患何但外域盖天命之永不永在民力之寛不寛耳豈不甚可畏哉豈不甚可畏哉陛下知畏則宜以捄民窮為己任陛下以捄民窮為己任則大臣不敢苟目前之安大臣不敢苟目前之安則羣臣陳力何鄉不濟此藝祖意也亦天意也惟陛下留神幸甚第三臣恭惟陛下嗣位之初詔㫖丁寧皆為寛民力而下臺諫侍從置局講究而臣猶以為民窮未捄何也誠以裁抑細微或蠲空張之數而已議結局未有以稱明詔大慰民望也臣来自逺方不知朝廷之費宫掖之奉嵗當幾何以所親見則天下之力竭於養兵而莫甚於江上之軍故毎欲省賦朝廷以為可則版曹以為不可版曹以為可則總領所以為不可總領所欲以為可矣奈何都統司不可也陛下亦熟念之歟則以都統司謂之御前軍馬雖朝廷不得知總領所謂之大軍錢糧雖版曹不得與故也於是乎中外之勢分而職掌不同事權不一施行不専矣職掌不同則彼此不能以相謀事權不一則有無不能以相濟施行不専則前後不能以相守故雖欲寛民力其道無繇且夫承平闗陜已行之久中興韓岳未罷之前養兵亦甚盛矣而不見其不足誠在今日稍仍舊貫使都統司之兵與向者在制置司時無異總領所之財與向者在轉運司無異則中外為一體中外一體則寛民力可得而議矣凡事斷之而有異論勿斷可也行之而有後患勿行可也往者元祐至於宣和嘗罷新法矣則有紹述之說起而為梗靖康至於紹興嘗用兵矣則有講和之說起而為梗故上之號令相反而不能定下之朋黨相傾而不能合若夫寛民力誰獨無是心哉斷之而無異論行之而無後患莫過此者而何疑不决陛下誠斷之則今之大臣皆足以立綱陳紀二三大臣誠推行之則今之人才皆足以受令承教方當年穀屢豐邉鄙不聳失此閒暇後将何及詩云譬彼舟流不知所届臣不勝拳拳是日上殿方奏臣不肖蒙恩為郎幸得賜對上云卿去國幾年朕欲見卿久矣讀劄子至寛民力上曰莫急於此只為處置難奏云臣第三劄子是處置大略容欵曲敷奏天顔甚喜讀劄子畢褒奨再三奏容下殿謝恩上云且說話聞卿在永嘉從學常數百人奏臣無所長只與士子課習舉業過蒙清問不勝悚懼上云知卿學問深醇著書甚多朕欲一見可盡進來奏臣豈敢著書不過講說舉子所習經義何足仰塵乙夜之覽上云經說更好但隨所有進來奏臣來自逺外乍對清光已踰平生之望又蒙睿慈曲垂褒諭令進所習經說顧臣何人遭逢如此然臣委是目下未有成藁以應明詔容臣守官之暇收拾編録候成次第奏乞投進欲望聖慈特賜寛假上云㸔撰得幾巻即逐旋進来不妨又奏在廷儒臣多是前進臣一旦入朝便敢僣越投進文字以此終是踧踖未安上連聲云不妨不妨辭免除秘書少監准尚書省劄子三省同奉聖對冒陳臣除秘書少監兼職依舊竊惟闕三字自古所重自非時望不在此選假如循次而進亦以待闕四字之人伏念某學術空疎重以衰惰視今同進為日又淺上之不應遴選之科下之不與久勞之數乃因賜對有此越擢若遂冒昧安受不辭則是哆然弗揆敢當嘉奨此所以須至懇陳不容以官小例無辭免為辭重念某頃縁衰惰嘗申祠請尋趣奏事遂留為郎乃以重違成命黽勉效職則今日之辭情實可察伏望特賜敷奏早回誤恩以安愚分轉對劄子臣頃蒙恩賜對嘗奏三劄上陳一藝祖以得民心受天命竊以為推行藝祖在人未泯之澤實在今日誠不自意一介僣論偶契聖聰奨予備至以臣區區之愚猶以前説未畢復為陛下誦之盖藝祖之後天命復集於夀皇聖帝爰暨陛下恭惟陛下以藝祖之子孫而修藝祖之故事此天意也不識陛下自信足以濟此歟抑自視過謙而尚疑其難歟以臣考見肇造之業其道甚易知甚易行何者藝祖治大而不治細任逸而不任勞大抵懲五代叢脞之失再立朝廷以還君道君道得則朝廷正朝廷正則天下理願陛下勿疑其難也臣請條一二切於當今之務者以備采擇以上書人文字令知制誥㸔詳升降以聞此建隆二年十月詔書也以次對章奏下尚書省參詳可施行者以聞此建隆三年九月詔書也且夫中外論建非近臣面對則逺臣封事皆所以通下情禆治道也而其患不在於壅蔽則在於讒嫉今也以逺臣封事之言付之制誥則有舍人院任其責矣以近臣面對之言付尚書省則有尚書省任其責矣以為可聴者斯聴之不可聴者勿聴則聴者無特異於衆之嫌不見聴者無見遺於上之恨是謂不以主斷廢羣議而無壅蔽讒嫉之患人主所自擇毋過臺省長官耳此道豈不甚易知甚易行哉伏覩陛下踐阼以來不信近習而信外廷不聴游言而聴公論亦既深得藝祖之意矣然間者上自侍從臺諫下至百執事或臨遣郡國之臣對揚敷奏多見嘉納人人自以為得上意且行其言而章往往不下他所指揮動亦留滯廷臣惑焉且陛下不信近習不聴游言必無壅蔽必無讒嫉或以為方崇清静之化厭於多事而不加省或以為陛下自去冬違豫以来聖意常有不釋然者於是務自寛大而不暇省二者皆妄窺測也臣獨自思念未有以藝祖故事上徹冕旒之聴者陛下其始自今凡中外論建一以建隆詔書從事不唯君道得而朝廷正亦足以解廷臣之惑不亦美乎由此言之若法藝祖但見其易未見其難則臣所陳推行藝祖在人未泯之澤皆非偶然嘗試之說可以次第舉矣臣不勝至願止齋集巻二十欽定四庫全書止齋集巻二十一宋陳傅良撰
