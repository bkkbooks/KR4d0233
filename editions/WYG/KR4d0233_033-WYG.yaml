body:
  text: 賀周左相伏審對揚大號晉陟上公宗社寵嘉邦家震疊恭惟某官才足以緝熈於天縡學足以潤色於皇猷自秉國鈞獨行儒術許身衮職則近古社稷之臣借譽布衣如久要平生之友至於一意孤立三辭彌髙於人情之已安以世道而自任遭時其盛親承二典之都俞臨事加詳人眀九變之憂患以其難進之節定此非常之原是以簡在帝心託之聖子甘盤之為舊學未嘗入總於百官鄼侯之為宗臣盖亦借煩於四皓孰與早翊儲闈之善晚陪神器之傳於以嗣萬世無疆之休於以起先王未有之禮弼諧昌運度越前聞永惟載籍以来鮮出勲勞之右如某者不足比數最蒙保持每闕綸告之四馳喜福等夷而百倍况毎蒙慰藉有周南留闕之詞而迄值亨嘉在沔水朝宗之數輒因賀牘併叙感悰闕傾之私敷宣罔既賀留右相恭審渙揚大號晉陟中台以薄海之具瞻知本朝之永賴恭惟某官蔚於雅望度越前脩眀允而寛慈精㣲而廣大徳兼衆美在伊尹惠夷之間學貫羣儒無程氏蘇臣之辨若論行蔵之晚節則眀義利於秋毫自其厭直於甘泉亦既見思於宣室而乃越在外服殊無裏言獨上簡於帝心迄共圖於邦采永惟論相粤若淳熈弄印十年曽缺員之弗補致身二府必詳試而為真率以序遷誰其特起召從帥閫謂見大夫之無人擢貳樞庭出諸君子之不意訏謨屬耳績用藹然遂繇同列以先登竟與舊勞而並命昔有因夢卜而見用世曰宜哉公不以日月而為勞事適類此矧屬夀皇之髙蹈欲傳神器於初潜斷自淵衷托之聖子可謂千載眀良之㑹兩朝社稷之臣廊廟為之光輝中外為之震疊某嘗瞻英衮及聽眀綸累洽重熈何幸值九官之盛至愚極陋庶将安一介之私賀王叅政召従外閫入告嘉猷擢寘上宗晉叅大政恭惟某官受天間氣為世宗工粤来脩門以踐禁嚴率本直道而聞海内每陪國論持平於左右大夫之間及沃上聰致戒於君子小人之際仁必有勇知無不言是宜簡在於帝心相與儀圖於宰事盖冊書所紀亟稱節誼之閑然世道相違鮮值眀良之㑹永惟前代孰與熈朝嘗於疇昔以觀人不待急難而求士慶歴全盛則范韓四傑之為元祐清眀亦劉吕諸公之故徒以行蔵之節初無夢卜之符有如下風無愧先進矧屬夀皇之獨斷欲傳神器於初潜亦既多賢能堪大計先定朕志雖僉共於詢謀素髙此人乃卒煩於調䕶可謂非常之寄托又将之心泰道方亨宜上體朋亡之義故但申於賀幅不敢布於私𠂻賀葛同知大號之敷元樞攸寄宗社於焉増重華夷之所具瞻某官天下達尊生民先覺才濟其美可謂故國之世臣行歸于周不忘平生之久要至於善蔵諸用自牧以謙本其視韓魏欿然之資養其過孟賁逺矣之氣利惑而不動位尊而彌恭與人同功則急所當先之義下士折節有施於不報之仁盖昔或以一長而過人而公乃兼衆善以名世足以任重穆乎師言是宜簡在於帝心相與儀圖於兵本况甘盤之為舊學初無說命之三篇鄼侯之為宗臣亦藉商山之四皓未有早翊儲闈之正晚陪神器之傳寵光獨隆載籍鮮儷必有非常之報稱又将不次以登庸某久辱下交最䝉異顧附青雲而後顯慚非士君子之倫蔵尺牘以為榮徒有兒女曹之感與湖南監司賀冬觀䑓以望日増一線之功衡岳而南天與九州之幸皇華所庇福履攸同屬乗障之有拘欲稱觴而靡及某官當今先進薄海令名以宣慈恵和之資膺咨度詢謀之寄将明主徳既孳育於羣萌對越天休斯朋来於丕社凡在具依之列咸輸善頌之誠寜復久居鴻鴈劬勞之野定應亟入騏驎供奉之班賀正六轡驅馳閔勞使指三朝圖籍趣㑹王正連十國以䝉休并一談而稱慶某官達尊之徳爾雅之文議論盖本之歐蘇風流尚想於王謝道闗交泰既上當君子之亨義取觀頥宜眀享聖人之養聿新嵗律茂介春祺某最被深知尤䖍善頌越在外服雖頌花客次之無繇幸為諸生将摯菜師門之有日除提舉謝宰執旌之邊𤨏畀以使華已弗理於専城将何施於列郡雖極矜憐之感曷勝慚愧之私竊以蕞爾桂陽介於湖嶺中興至此凡六十載之間善治為誰纔一二人而已率皆久次然後序遷未有輒為當路之聨越在他邦之上重念某踈愚如故衰惰有加徒縁知己之多亦忝牧民之寄惟其迂濶初無文具之可觀或有便宜正恐官謗之不免及此殊渥曽未前聞雖幸拙誠見録於清眀之始但虞小量自顛於盈滿之餘以寵為驚未知所稱某官弼亮二聖整齊百工秉國之鈞目具瞻而下逮使人以器嘗易事而兼容故所甄収及於微陋某敢不更堅晚節上體深知平易近民以将眀於隆指劬勞安宅庶補報於秋毫與交代張提舉不能勝任愧見旁觀何至乏人濫為嗣掌矧嘗受察以公叔而同升竟復䝉成荷子文之必告積此私感難於具陳某官大雅典刑故家文物造㣲之學至於殊塗而同歸正始之音可以一唱而三嘆所宜路門委講詞掖敷言可使書生不立五經之異庶㡬帝制尚追三代之風方當歸報而停驂姑自總銓而寄政某最為晚出辱在後陳周雅肄三偶值勞還之日蕭規畫一遂為代匱之人敢論伯仲之間但有子孫之託謝沈安撫為十國之連治無善狀假一封之傳寵有誤恩雖庇賴之如初而僥逾之已甚未知報所誰實使然某官多士宗工吾君舊學如周保傅如漢老更輟從清禁之班畀予中權之寄自其分閫曽未淹時五嶺衡山藜藿不採三江彭蠡舳艫相䘖凡昔謂之盜區廼今歸於徳㝢粤若藩宣之衆矣誰如威望之巋然雖二老盍歸而此豈久居之地然一䕫已足則他皆不置之官矧如某者竊為稻粱濫分符竹方恐嘖言之未免豈期最課之已聞竟因借勢之私輒備聨事之數自知甚審公論謂何與文子以同升詎敢衡陳於先進喜樂正而不寐諒惟辱在於諸生聊布謝悰他圖幸㑹交割謝沈安撫除目何因必有䝉成之故司存匪逺可無告至之儀况嘗試之尤難實講明之是賴蓄疑欲問請間可期某官年髙徳邵實大聲宏老成典刑非喬木之謂故國師表言行乃砥柱之在中流正虛當宁之懐聊借上㳺之重昔者髙宗之思舊學光武之訪故人恨不同朝與之分國如公聞望視古等夷方兩地之闕員必九重之深意某從㳺最久聨事奚堪以乗障之未能而察州之豈易亡専對四方之具自視歉然惟元戎十乗之依願安承教交割謝張運判除目何因必有䝉成之故司存匪逺可無告至之儀况嘗試之尤難實講眀之是賴蓄疑欲問請間可期某官特達之資後彫之操績用莫詳於己試風流盖接於前聞老成典刑非喬木之謂故國師表言行如砥柱之在中流方虚當宁之懐暫借外䑓之重自其弭節曽不厭時五嶺衡山野無曠土三江彭蠡步有新船以當路之誰如宜他官之不置如某者依仁則可聨事奚堪雖驂乗以甚榮而面牆之加懼不能専對况詢謀爰度五善之難何以克終惟直諒多聞三益之助答郴州丁守治狀不如寵光先被雖同功一體且不可以偏施况從事獨賢抑奈何而倒植有来謙問徒厚慚顔某官一代之英萬夫之望盖大雅典刑之攸屬将中興勲業以為期定交學省之初聲華甚早出守邊城之上羈阻畧同屬茲兩郡之彫然重以比年之歉甚動有契闊相為隠憂滿紙細書凡欲言之必盡汎舟相繼靡為恵之不周粤從魯衛以至今曽謂湖湘之得此遂令不敏亦茍無虞每也伎窮念安得廣漢以兼治胡然課最顧乃令雍齒之先封相公論之云何懐自知而甚審謂我宣勞而弗遜因人成事而無言雖則善鄰可想見貢公之喜至如将母亦嘗聞子厚之風積愧之多臨書罔既荅道州趙守治状不如寵光先被揆之愚分豈無愧於積薪意者徳鄰嘗有心於推轂粤来謙問益感衰悰某官大雅不羣成功可紀本其素履有嗟兮麟趾之風試以専城殆莞爾牛刀之戱期年於此績用誰如以頌聲載路之傳宜召節自天而下如某者學非適用才不逮中曷堪一障之乗徒藉餘波之及遂令不敏亦幸茍安鄶以下而無譏自知甚審鄭有功而見後公論云何尚期未替於邦交庶㡬可眀於使指㑹言伊邇屬望惟深與湖南范提刑仲藝宰旅不居過家蜀道師言未穆弭節湖隂夫人以引去為髙吾黨以留行為幸矧如聨事昔在從㳺某官經眀而行修宇定而光發以中庸大學之㫖究觀九流以國風雅頌之文奄有衆作周行斯久譽䖏誰如徧抽石室之蔵分治天官之目上方鄉用胡自喜於懐章公固倦游然重違於追璽永惟先正名滿天下亦越太史動合古人時則有若熈寜元祐之間位皆不過學士諌官之選惜者舉世至於渡江巋然門戸之存籍甚弟兄之望猶未大用顧且遐征四方典獄之官於今不乏故國世臣之謂舍此安歸某空踈如初衰惰已甚自别脩門之後浸亡當世之交曽謂盍簪於焉乘傳惟無補一毫之故人其謂何乃有来三益之期天實為此止齋集巻三十三欽定四庫全書止齋集巻三十四宋陳傅良撰啟答
