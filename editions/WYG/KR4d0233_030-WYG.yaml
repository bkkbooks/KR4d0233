body:
  text: 表乾道壬辰進士賜第謝太上皇帝疎愚之對爰契九重聲教所陶聿來三紀推本功徳度越古今中謝竊跡本朝家法之詳究觀列聖心傳之要規模一以經術事業付之書生皇帝陛下所以載纘大猷曲垂清問臣等顧遭逢之幸甚而循省之缺然其何稱塞招延之休徒以生長涵養之澤兹蓋伏遇太上皇帝陛下道久忘世仁深入人光昭斯文燕及今日退藏於宻資萬物于乾元長發其祥生多士于王國臣等敢不益堅精白茂對龍光言念何繇庶㡬無斁闕三字士将無負虞舜聦明之朝遐不作人其敢忘周王壽考之賜桂陽軍謝到任湛恩所被樂嵗相仍邉境晏然書生幸甚中謝伏念臣起於寒逺持是空虚憖嘗試之罔功欲自新而無路粤惟郴桂介在湖湘周職方之所未聞漢刺史之所不察惟本朝之建國合四海以為家蓋壤地僅同於附庸則簡書皆聴其専逹如臣疵賤際此休明雖貪假守之榮但求便道亦有來王之問爰至公車誠世所謂謹守三尺之常而臣實為上通九重之始譬諸稺子得言笑於親前意者孤根有發生之天幸兹蓋伏遇皇帝陛下不居其聖無斁於人凡試其外服之勞皆待以晩成之節遂令庸冗亦與寵光臣敢不言念昨非務收後効毋以己見紛更己便之教條尚於公餘増益未能之問學髙宗小祥慰皇帝鋪筵仍几方篤時思鑽燧新烟忽更嵗序九重號慟率土悲摧中慰恭惟皇帝陛下道對百王識髙千載諒闇如古不拘易月之文練祥於今尚損踰年之禮追惟愈逺痛甚何堪伏乞少抑聖懐紹世徳作周之孝特垂天聴徇同心戴舜之誠賀登極揖遜相承乾坤嘉賴謳歌所暨中外宗依中賀恭惟皇帝陛下篤生元良遵養濬哲雞鳴而起方趨問寝之時龍躍以飛俄繼中天之統彛倫秩叙歴服延洪永惟二典以還亦既千載于此髙皇於漢無神器之傳太宗於唐非儲闈之正孰與以明述聖自祖及孫當垂拱以襲堯盡君之道爰詢謀而命禹若帝之初獨冠百王同符隆古臣適際離亨之㑹叨分邉瑣之麾跂望清光欣霑殊渥但與林篁之衆咸有葵藿之心謝登極赦維帝出震與物為春在舜紹堯眚災肆赦爰孚大號實本舊章中謝恭惟皇帝陛下誠足以格幽明徳足以侔髙厚養以天下嗣萬世無疆之休洽于民心思匹夫不被其澤聿觀載籍具在典儀周有大賚蓋惟初基漢與更始但為故事未有重規疊矩一視同仁率循繼照之初備舉好生之典臣遭時華旦假守遐方葵藿傾陽式謹朝宗之義蓼蕭零露敢忘滲漉之恩賀壽皇聖帝尊號舜薦之天以禹傳九疇之正乾稱乎父則震成六子之功中外榮懐宗社嘉賴中賀恭惟至尊壽皇聖帝陛下徳及動植孝通神明素隆藝祖之丕圗昭受髙宗之大烈方邉鄙不聳蓋聞中國之至仁而羮牆靡忘欲行天下之逹禮遂辭尊於南面爰致養於東朝况夫歴數有歸彛倫攸叙惟聖知聖繼今實為萬世之休可名非名舎此曷表一人之意雖六言而甚約與二典以相輝臣假守遐方遭時盛事上未央之壽正隔於清光説稽古之書尚修於薄伎皇太后移御慈福宫賀皇帝厯數有托而伸堯母之尊謳歌攸歸則本禹疇之叙粤惟自昔莫若方今中賀恭惟皇帝陛下恭敬温文聦明睿智乃眷壽皇之顧聿懐神器之傳為天下得其人遂忘南面為人子止於孝式奉東朝惟太極之生兩儀與三聖之守一道未之嘗見可以擬倫臣叨備符分阻陪旅進雖恭想瑶池之宴與世相忘然永同沔水之宗自今以始皇太后移御慈福宫賀壽皇聖帝堯天逾逺方切於追懐文母彌尊益隆於寅奉中賀恭惟至尊壽皇聖帝陛下躬上聖之質嗣中興之功歴年于兹薄海無事粤従恭黙極為人子孝之思竟托倦勤决以天下遜之計欲備東朝之甘㫖不知南面之崇髙二典所無百王何取臣叨分符守阻簉周行富貴無足觧憂幸粗知於大義謳歌咸曰與子願永暨於同心立后賀皇帝父作子述増光典謨身修家齊匹休南雅屬彌文之具舉罄羣聴以交欣中賀恭惟皇帝陛下得聖之傳繼天之統深惟内則莫隆媯汭之風粤自初潛元重塗山之選爰稽謀於慈極以秩正於中宫于以成未央奉觴為壽之歡于以對長樂含飴弄孫之福遐觀徃古孰盛當今臣假守偏城欣聆鉅典但縻廩稍曽無僕馬之勞當課農桑以廣耕蠶之化賀皇后維帝出震維坤承天宗社榮懐中外康共恭惟皇后殿下徳足以配任姒功足以佐唐虞肇開青宫及建皇極問安六寝嘗同共子職之勤正始二南又得化天下之道以雞鳴之盥櫛成象服之委蛇可謂日並月明風自火出臣欣聞郵置阻預歡呼雖幸雲龍共覩聖人之作自憐僕馬曽無臣下之勞皇帝登寶位進奉銀重明繼照當班瑞羣后之初一徳尊天率貢金九牧之舊上件銀地不愛寶而後出人不易物以為珍敢修任土之儀庸見來庭之義箱篚不腆斧鉞奚辭謝賜厯日通天地人大一王之作統恊時月日罄四海以朝宗拜賜甚榮奉職惟謹中謝竊以厯之疏宻代有革因原於日積之餘分揆以嵗差之衆説及大衍而始定至統元而加詳自有此書莫如今日恭惟皇帝陛下不愛其道以覺斯民比元㑹之肇修當三陽之緫至凡兹敬授皆所裁成徇以孟春昭示人臣之憲觀之挾日誕敷都鄙之和臣敢不奉以周旋勤於勸課及豳風之寒暑秩叙農功同魯史之春秋寳為邦典紹熈改元賀皇帝一元之建雖曰舊章二美之并兹惟盛事中賀竊以䇿書所記年號則多有以守成而愧揖遜之君至於更化則非沿襲之意未若二聖親傳於大寶兩朝兼著於隆名播告多方超踰前古恭惟皇帝陛下審時所上親政於初逺惟紹大業之難近思熈庶績之廣聿稽堯舜之典合為禹謨奄有夏商之年布在周厯臣謬持使節欽誦詔書恊時月正日敢有不恭道徳意志慮愧非其任賀壽皇聖帝從吉三年一祫率古舊章四海八音與民同樂宗祊嘉賴臣庶榮懐中賀恭惟至尊壽皇聖帝陛下孝足以通神明徳足以施孫子宜享厚報而備聖人壽之福宜居常尊而極天下養之歡與國無窮自今以始臣粗知善頌久去周行喜共遐方復見舜琴之御瞻言廣内莫陪漢蹕之朝賀壽聖皇太后從吉舜畢三年共為子職漢朝五日燕及孫謀中賀恭惟壽聖皇太后殿下維徳是行以慈為寶親見重華之盛永膺至養之榮長樂東朝肇稱於吉禮瑶池西母茂介於修齡臣屬于隰之載馳喜舊儀之復見龍旗鳳扇想浮慈福之春寶殿玉巵莫扈未央之駕賀壽成皇后從吉式恊靈辰肇稱吉禮天人底豫宗社延休中賀恭惟壽成皇后殿下周母嗣音虞嬪著徳長樂宫之養尚小前規内司服之衣率循彛典親見累朝之盛永陪慈極之尊臣屬職馳驅阻前賀舞衮龍相映想觀廣内之儀韶鳳來翔仰祝後天之算至尊壽皇聖帝冊寶賀皇帝親傳大寶懼功徳之不宣恭上鴻名質詩書而何媿重闈燕喜率土榮懐中賀恭惟皇帝陛下道配唐虞行殊曽閔謂孝非直養莫如得四海九州之心謂禮有常尊孰與兼五典三墳之號寫之琬琰炳若丹青以彌隆報之文以永昭垂之聞昔漢之尊太上與唐之事明皇羣臣萬嵗之稱早嘗擁篲二聖重歡之頌竟亦磨崖以方熈朝皆有慙徳臣欣逢慶事越在遐方雖揚厲鋪張莫預觀光之列而詠歌嗟歎曷勝報上之誠賀壽皇聖帝元年正月恭上徽稱五日一朝永膺備養乾坤豫順中外歡呼中賀恭惟至尊壽皇聖帝陛下體道之真遺物之累成功不宰妙合先天之天聖徳無稱亶為衆父之父尚従人欲爰舉邦彛惟富有四海之内之謂尊惟尊居一人之上之謂至以言乎壽則斂箕子之福以言乎聖則集孔子之成肆裒朝野之談兼採典墳之號於焉歸美是亦强名臣幸際昌朝親逢盛事吉禮嘉禮雖莫預於觀光大書屢書豈敢忘於善頌賀壽聖皇太后慈闈備養聖子垂休懽騰桂宫美播玉牒中賀恭惟壽聖皇太后殿下福為晉母徳配坤元率先釐降之風克諧舜孝光輔思齊之化丕顯文謨惟重規疊矩之相承致偉蹟宏休之間見臣謬持使節阻簉朝班聆盛事之鋪張不勝鼇抃與生民而鼓舞殆若鳳儀賀壽成皇后響珮而朝夙嚴内助鏤玉之牒式播徽稱實為邦國之榮豈止宫闈之慶中賀恭惟壽成皇后殿下母儀克正隂教聿修以周南肅雍成天保治内之化以坤道柔順贊乾元資始之功丕揚宏休允屬嘉㑹臣謬持漢節阻簉周行聆顯冊之輝煌預編氓之踴躍賀皇后寅奉慈顔職勤櫛縰載揚丕典懽動宫闈彌文畢張薄海胥慶中賀恭惟皇后殿下母儀範俗女則冠倫關雎自北而南蓋由正始天保以上治内悉本躬行值冊寶之告成肅褘褕而稱慶臣阻持漢節莫簉周行聞縟禮之修明與編氓而抃蹈壽聖皇太后冊寶賀皇帝奉長樂之觴制獨尊於文母議曲臺之典禮尤謹於湯孫儀文畢張天壤交慶中賀恭惟皇帝陛下夙推孝治得自家傳謂侍膳問安猶想含飴之樂而宅中圗大敢虧報本之誠宜彤管之巍煌與寶章之焜耀仰瞻慈極夤奉徽稱臣将指南州馳悰北闕鳳儀獸舞忻縟典之修明螽躍蟲鳴預編氓之抃蹈賀壽聖皇太后太初之有太素莫與同尊文子以及文孫曷勝歸美爰升顯號用答羣瞻中賀竊以老氏三寶惟聖為能箕疇五福以壽為貴克并盛美誕受彌文永惟女史之傳未有母儀之懿恭惟壽聖皇太后殿下行合内則道濟中興與武造周名在九人之列自堯傳禹功為三聖之參宜極揄揚以昭報稱臣欣逢盛事越在遐方呼萬嵗者三雖莫陪於善頌襲六經為七尚願繼於前聞賀壽皇聖帝慈闈就養遽辭南面之尊縟典告成恪謹東朝之奉禮文交舉海縣均懽中賀恭惟至尊壽皇聖帝陛下道軼漢唐行髙曽閔謂聖徳無以加孝敢怠躬行雖天下不足觧憂益勤色養載衍鴻儀之慶常懐雞寝之安臣叨擁使軺阻窺仙仗上萬年之壽莫與鳬趨聞三楚之謡第深鼇抃賀壽成皇后尊歸慈極夙嚴婦事之誠美播徽稱交舉禮成之慶聲傳桂海歡動椒闈中賀恭惟壽成皇后殿下子育羣生母儀六合采古事而著女則史誦宏休為京婦而媚周姜詩歌懿範飾褘衣而備養燦玉檢以揚休臣幸際昌期適符明命宫庭雝肅雖莫窺長樂之班原隰馳驅猶欲賦思齊之詠賀皇后寶冊揚庭尊歸北闕御輿至閤制謹西廂懽動慈闈孝形薄海中賀恭惟皇后殿下躬履節儉性鍾惠和司服陳儀載想褘褕之敬尚官贊禮夤修棗栗之恭式奉徽稱尤嚴内職臣逖聞縟典阻造清朝但揄揚巻耳之詩而頌述思齊之美止齋集巻三十欽定四庫全書止齋集巻三十一宋陳傅良撰表壽
