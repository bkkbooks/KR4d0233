front:
  text: 成皇后冊寶賀皇帝長樂問安重闈燕喜太常議禮大册崇成鋪陳典章炳燿古昔中賀恭惟皇帝陛下盡倫之至為治之原重以離明方繼大人之照受兹晉福聿申王母之休揭盛典於熈朝燦縟儀於顯冊三宫衍慶千載同時臣阻詣漢廷尚于周隰麟趾騶虞之化幸際風移雞鳴鶴駕之朝莫陪旅進
  hash: sha256:24e695a05b6c3d8678e21bf239cfe1ffb72c80c1b2c90fbe38cbf96d697cb14a
  markers:
  - {type: page-break, offset: 92, content: '', id: KR4d0233_WYG_031-1b, image: WYG1150/WYG1150-0747b.png}
body:
  text: 賀壽皇聖帝五日一朝俱享玉巵之奉六宫九御載揚寶冊之文邦國有光臣民胥慶中賀恭惟至尊壽皇聖帝陛下重華稽古正始齊家事親以萬國之歡虞嬪是相夢帝有九齡之予文母攸同方㳺神於穆清之宫而垂世皆希濶之典臣謬叨乗傳適阻稱觴雖莫陪鶴駕之朝觀光禁籞尚能述麟趾之化流詠河洲賀壽聖皇太后鶴駕問安夙備西廂之敬螭章成禮尤嚴北面之朝盛事罕聞鴻休疊出中賀恭惟壽聖皇太后殿下助成隂教贊佑皇圗式符坤徳之元尊為聖母爰作離明之兩親授神孫適昭揭於徽稱宜恪恭於婦職臣謬将使指逺去朝行雖莫趨長樂之班但遥賦關雎之詠賀壽成皇后三壽作朋備極慈闈之養重明麗正前陳寶冊之文振古所無大邦之慶中賀恭惟壽成皇后殿下虞嬪匹美文母齊芳袗衣鼓琴克相重華之化寝門侍膳聿成正始之風惟二十七載之明昌宜億萬斯年之稱頌臣逖聞盛舉欣過明時雞鳴鶴駕之朝雖莫陪於盛事麟趾騶虞之化尚能播於聲詩賀皇后徽冊有光尊歸北闕尚宫前導制舉西廂彌文煥然内則嚴甚中賀恭惟皇后殿下贊裨孝治修潔母儀褕翟褘衣寅奉執笄之禮根車羽蓋載嚴問寝之朝式當寶冊之成恭想玉巵之奉臣冒持漢節阻簉周行逖聞縟典之肇修自慶愚生之幸㑹皇后冊寶賀皇帝書周正月粤若始年建漢長秋兹惟内治三宫燕喜四海瞻依中賀恭惟皇帝陛下離明而巽齊乾健而坤順共為子職必有告榛栗之慶彼以婦功必有獻穜穋之種眷言中饋聿自初潛式陳玉冊之文用正椒房之號於以端本豈徒示恩臣乗傳於兹趨庭罔及關雎正始當明承教化之由巻耳審官敢在知勤勞之數賀壽聖皇太后慈闈問安夙謹東朝之事正宫備冊載修北面之儀鋪揚典章慰懌中外中賀恭惟壽聖太皇太后殿下徳尊聖母謀畀神孫謂九重端冕之儀早垂内則而再拜執笲之禮首建中闈既陳禕衣庸備玉牒臣逖聞縟典阻簉外庭望紫闕以傾馳與蒼生而瞻頌賀壽皇聖帝迪從子保喜承長樂之顔先欲家齊親畀塗山之助再揚顯冊盡出宏規彌文畢張率土稱慶中賀恭惟至尊壽皇聖帝陛下以身為度於禮不愆凡后妃嬪御之常悉循古制而父子夫婦之正曲盡人倫兾其嗣太姒之音足以正二南之始式陳玉檢用建椒闈臣逺去朝行謬将使指雖欲殫於頌述曽莫究於形容賀壽成皇后坤象承天甫就㫖甘之奉家人正位仍嚴笄緫之朝宏休載揚盛事創見中賀恭惟壽成皇后殿下化由治内道本家齊謂嗣聖御圗適萬乗龍飛之旦而尚宫奉冊修九重燕寝之儀式昭六服之常庸備三宫之養臣驅馳周隰瞻望堯階聆寶瑑之鋪張與編氓而抃蹈賀皇后貢金九牧夏統惟新正位六宫周儀攸重於穆椒房之號有光彤管之書中賀恭惟皇后殿下作配乾潛同功坤載舜鼓琴被袗克傳媯汭之規禹菲食卑宫實變塗山之美長秋初建諸夏宗依而闕二字父父之尊榮将以垂孫孫之矩範臣瞻言京室頌詠河洲獻穜稑於王遥想躬行之事采藻蘋於澗益觀丕變之風湖南提舉謝到任重明麗正方此第功五闕在邉闕然冒寵業未免宜黜得遷之幸臣不勝以榮為懼之情中謝竊以蕞爾桂陽鄰於嶺表自升軍額将五十載之間可紀守臣纔一二人而已然必宣勞而滿嵗廼能循次以為州未有即賜除書遂将使指輙衡陳於當路皆度越於他邦周㑹王人㣲亦序諸侯之上漢置刺史始皆屬丞相之官豈容如臣亦預兹選重念臣腐儒無用假守罔功勤不足以蓋荒政之愆亷不足以塞曠官之責顧專城而不理况闔部以安施雖幸遭時以政拙心勞而見録未知善後将力小任重之為憂兹蓋伏遇皇帝陛下自天出寧如日委照敬識百辟之舉無有幽深允釐庶績之熈不遺㣲細遂令庸冗輙沐恩榮臣敢不懋明詔條采聴謡俗平頒興積庶将自古以有年懋遷化居不失與民而共利提舉司謝賜厯日夏時三之日振古如兹周厯萬斯年自今以始凡䝉敬授悉賴裁成中謝恭惟皇帝陛下得聖之傳為天所命受三朝之圗籍罔不朝宗在七政之璣衡皆如軌度廼頒初政爰布新書臣濫職将明當思考恊不違咫尺既同拜賜之榮敢離須㬰而怠觀風之事湖南轉運判官謝到任乘傳彌年缺然補報将輸所部滋甚光華中謝惟本朝行仁政之原自諸道置計司而始孰為之説浸失其傳不知國家之意本以勝暴殘但曰藩鎮之財聚而歸公上由是多故至于中興雖懐惻怛之心莫奉丁寧之詔惟聖有作視民如傷疇咨廷紳申固邦本方當講求民瘼之際宜得布宣主徳之才深明盈虚稍務損益顧以兹事付之臣愚伏念臣學不過於虚談仕未離乎嘗試曷期衰暮偶際休明且治郡徒勞初無毫髪之効况察州不敏近在目睫之間以自知之甚明将大幸之難再云胡隆委得以次遷恭惟皇帝陛下豈弟作人髙明覆物謂曠日持久或有盡知情偽之長謂便道之官庶無數易将迎之患遂令庸冗有此僥踰臣敢不對越龍光勉旃駑力茍不至乏絶以深貽屯所之憂則有條便宜當漸為來者之計湖南提舉賀慶節太極之生兩儀尊無與並嵩髙之呼萬嵗喜不自勝中賀恭惟至尊壽皇聖帝陛下徳配百王心㳺太古行堯之道莫測於聖神薦禹於天復闕於順受適紀誕彌之旦永膺滋至之休臣将指荆湖馳心魏闕闕二字為壽雖莫綴於清班石崖可鑴豈敢忘於善頌湖南運判賀重明節地闢天開聖作明述於赫重離之運有來載震之祥中賀伏以禹相舜歴年之多武繼文受命之固昔嘗聞於六藝今親見於一時恭惟皇帝陛下允執其中聿修厥徳斂時五福豈惟叙有夏之疇與我九齡抑又過成周之厯臣濫将使指嘗簡睿知若帝之初雖阻闕廷之觀禮如山之壽但瞻衡嶽以為詩重明節進奉銀後天祝算既同嵩嶽之呼任土貢珍爰致荆州之品前件銀氣鍾清淑産類朱提侑萬年之觴深慚微幣得諸山之甕願賦休祥丙辰賀瑞慶節長發其祥自一陽之生子誕彌厥月當六位之乗乾宗社寵嘉邦家欣頌中賀恭惟皇帝陛下聦明時乂剛健日新省事清心獨冠百王之上深仁厚澤丕承列聖之傳於萬斯年自今以始臣頃叨虞侍最荷簡知屬當去極之遥阻在奉觴之後昭回下燭常對越於奎文舞蹈永歌但熈然於堯壤丁巳賀瑞慶節地闢天開爰紀大來之慶川増山壽咸輸美報之誠中賀恭惟皇帝陛下典學光明性原溥博澹然無欲裒六藝以自怡聖矣不居守舊章而唯謹是宜誕為民極永荷天休臣介在遐陬阻陪盛事毎慚隆眷曽無圮上之一編竊幸餘生猶有華封之三祝戊午賀瑞慶節聦明作后聿開出震之祥厯數在躬有永後天之算中賀恭惟皇帝陛下宅心慈儉玩意穆清承列聖之儲休輯兩宫之燕祉誕為民極長握乾符臣夙荷簡知久違抃蹈嵩呼萬嵗欣盛事之難逢天保六章愧隆恩之未報己未賀瑞慶節萬年景福誕膺天授之休四海歡心姑盡臣恭之義中賀恭惟皇帝陛下道無偏陂學有緝熈燕及兩宫増聖圗之廣大陶成多士粲王度之清夷肇開震夙之期永享熾昌之壽臣䝉恩至厚抱釁罙深積五稔之凌兢無一毫之覬幸衣冠甚偉雖阻預於耆英畎畆不忘但欣逢於華旦謝中書舎人代言之任與政相通顧惟何人亦在此選中謝臣聞惟虞夏商周之世有謨訓誥命之書至於兩都亦稱七制要是人主猷為之盛見於儒臣文字之工惟其相遭是以不朽然則鄒枚而下詞藻豈謂之乏人魏晉以來號令不聞於傳世雖僅存於職掌曽何補於治功洪惟本朝追並隆古慶歴元祐之際豈非千載之一時歐陽蘇軾之徒故有六經之遺意式至今日作興斯文由此觀之則臣幸甚兹蓋伏遇皇帝陛下虚心無我立政惟人方且視民而如傷未嘗以位而為樂凡所播告無非休明臣敢不益勵初心以期後効必也緝熈光明之學至於令終庶乎草創潤色之文可以行逺止齋集巻三十一欽定四庫全書止齋集巻三十二宋陳傅良撰啓
