body:
  text: 講義故事廟議附右史進故事紹熈四年二月二十二日唐陸贄奏議奉聖㫖頻覽卿表狀勸朕數對羣臣兼許令論事辭理懇切深表盡忠朕本性甚好推誠亦能納諫徃日將謂君臣一體都不隄防縁推誠信不疑多被姦人賣弄所致患害失在推誠朕從即位以來見奏對論事者甚多大抵皆是雷同道聴塗説試加質問即便辭窮若有竒才異能在朕豈惜抜擢朕見從前以來事祇如此所以近來不多取次對人亦不是倦於聴納卿宜深悉此意於是陸贄上疏極陳其不可有曰人之常情罕能無惑大抵蔽於所信阻於所疑信既偏則聽言而不考其實由是有過當之言疑既甚則雖實而不聴其言由是有失實之聽又曰衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納又曰違道以師心棄人而任已謂欲可逞謂衆可誣謂専斷無傷謂詢謀無益謂多疑為御下之術謂深察為照物之情理道全乖顛危可待臣嘗論之若徳宗可謂好疑之主若陸贄可謂善諌之臣矣臣比因賜對亦嘗有所建白而玉音下諭頗渉疑情故敢輙陳前鑒以備采擇資善堂進故事太子苦忽忽善忘不樂詔使王褒等皆之太子宫虞侍太子朝夕誦讀竒文及所自造作疾平復廼歸元帝八歲立為太子嘗侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之柰何純任徳教用周政乎廼歎曰亂我家者太子也洪恭石顯奏蕭望之周堪劉更生朋黨請謁者召致廷尉上初即位不省謁者召致廷尉為下獄可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問耶元帝紀贊曰上牽制文義優㳺不斷孝宣之業衰焉劉元城先生安世云蕭望之為太子太傅八九年固深知元帝之為人及元帝即位乃欲逐去許史恭顯元帝昏庸豈能去許史恭顯哉故恭顯奏堪更生等下獄上初即位不省謁者召致廷尉為下獄可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問耶且望之久為太傅知太子仁柔宜輔導之使洞曉天下之事然後可以為人主今乃懵然無知如此不知望之八九年間所以輔之者何等事也亦不容無罪矣太子侍燕之語可謂甚美既即位益嚮儒術然不知召致廷尉為下獄何也習聞書生之談而不通於當世之務故也觀其苦忽忽善忘不樂則其天資固中人以下耳望之堪輔導各有年無能改於其徳一旦即位乃欲勸之去宦官外戚用事之人豈不謬哉而望之竟以譖見殺善乎劉安世論之曰望之知太子仁柔宜輔導之使洞曉天下之事然後可以為人主今乃懵然無知如此不知望之八九年間所以輔之者何等事也亦不容無罪矣經筵孟子講義聖王不作諸侯放恣處士横議楊朱墨翟之言盈天下天下之言不歸楊則歸墨楊氏為我是無君也墨氏兼愛是無父也無父無君是禽獸也公明儀曰庖有肥肉廐有肥馬民有飢色野有餓莩此率獸而食人也楊墨之道不息孔子之道不著足邪説誣民充塞仁義也仁義充塞則率獸食人人将相食吾為此懼閑先聖之道距楊墨放淫辭邪説者不得作作於其心害於其事作於其事害於其政聖人復起不易吾言矣聖王不作者言周之衰上無明天子也諸侯放恣者言上無明天子則下無賢方伯凡有國之君皆得自便縱欲而専利也處士横議者言自天子至於諸侯皆失其道不復以明教化為務則天下蕩然學術無統紀而世之處士各横為議論人自為一説家自為一書也楊朱墨翟之言盈天下者言處士横議者雖多於其中獨有楊朱墨翟之教盛行而莫之抗也天下之言不歸楊則歸墨言従其説者之衆也舉天下之能言者不以楊朱為師則以墨翟為師而堯舜禹湯文武周公孔子之教闕二字道也楊氏為我是無君也者此孟子之所以闢楊朱也何也朱之為説曰抜一毛而利天下弗為也且夫惟天生民有欲無主乃亂故人主者天之所置非天下徒尊之也葵藿之於太陽江漢之於海鳥獸之於麟鳳皆此物也而誰敢易之是故天下之士忘身以為主忘家以徇國非直茍利禄也假使世之學者皆操楊朱之心雖損一毛而不以利物是無與事君者也故曰是無君也墨氏兼愛是無父也者此孟子所以闢墨翟也何也翟之為説曰摩頂放踵利天下為之且天之生物也使之一本父母是也今夫人有父母有兄弟有夫婦均此愛也而先王立教每為之差而獨隆於父記曰為人子者不可不私其父不私其父不可以為人子矣是故有東宫有西宫有南宫有北宫此言茍私其父雖其父之伯仲不可以不異宫也又曰資於事父以事母而愛同天無二日土無二王國無二主家無二尊以一治之也故父在為母齊衰期者無二尊也此言茍尊其父雖父之妃不可以不殺服也是之謂一本假使世之學者皆操墨翟之心愛無差等是人人而父也故曰是無父也無父無君是禽獸也者孟子極其弊而言之也人所以相羣而不亂者以其有君父也有君在則上下尊卑貴賤之分定有父在則長幼嫡庶親疎之分定定則不亂矣茍無君父則凡有血氣者皆有爭心茍有爭心不奪不饜是人心與禽獸無擇也公明儀曰庖有肥肉廐有肥馬民有飢色野有餓莩此率獸而食人也者此孟子舉公明儀之語推廣言之也公明儀以為國君之肥馬在廐而民飢莩在野是為君者率獸而食人也楊墨之道不息孔子之道不著是邪説誣民充塞仁義仁義充塞則率獸而食人人将相食者蓋孟子終言楊墨之害與禽獸無異也且夫孔子之道所以尊信於萬世者非儒者能強之也誠以三綱五常不可一日殄滅故也三綱五常不明而殄滅則天地不位萬物不育矣自古及今天地無不位之理萬物無不育之理則三綱五常無絶滅之理三綱五常無絶滅之理則孔子之道無不足尊信之理今楊墨者自信其私説而不信孔子故楊墨之道不息則孔子之道不著如此則邪説行而仁義廢今夫人之所以老者相共養幼者相撫字敵己者相徃來以其本諸仁義之心也無君則不義無父則不仁矣此心茍亡則私慾横流弱者之肉强者之食爾故曰人将相食吾為此懼閑先聖之道距楊墨放淫辭邪説者不得作此孟子以衛道自任之言也且孟子非好辨也懼斯道之不明而人心淪胥至於闕十八字謂君不君臣不臣父不父子不子雖有粟吾得而食諸雖有天下不能一朝居也此聖賢之所大懼也作於其心害於其事作於其事害於其政者言淫辭邪説之初亦甚㣲也不過其門人弟子轉相傳授以為可行而深信之焉耳夫茍有是説也在於人心則不見之於行事斯已矣茍見之行事則必害及於其事不施之於有政斯已矣茍施之於有政則必害及於其政孟子逆知二氏之學一日得志於天下其害有不可勝言者聖人復起不易吾言矣者孟子篤於自信之辭也臣聞之曰天下未嘗一日無邪説也聖王在上教明而禁立雖有邪説而不得行耳反道敗徳侮慢自賢有苗氏之邪説也而虞舜遷之威侮五行怠棄三正有扈氏之邪説也而夏啓征之謂祭無益謂暴無傷謂已有天命謂敬不足行商紂之邪説也而周武滅之然則道術分裂間為異端自唐虞三代有焉而卒不足以干大中至正之統者聖王在上故也今夫楊墨非有王公貴人之勢也非有醲賞以誘率人嚴刑以驅迫人也又未得嘗試其術於戰國之際也而天下翕然従之不歸楊則歸墨是豈一人之力一朝一夕之故哉蓋聖王不作則教不明禁不立教不明則曲學之論興禁不立則朋邪之類勝及其末流而莫之救也由此觀之凡不本於孔子而敢為異説者豈不甚可畏哉有聖王者作豈可不深察哉昔者禹抑洪水而天下平周公兼夷狄驅猛獸而百姓寧孔子成春秋而亂臣賊子懼詩云戎狄是膺荆舒是懲則莫我敢承無父無君是周公所膺也我亦欲正人心息邪説距詖行放淫辭以承三聖者豈好辯哉予不得已也能言距楊墨者聖人之徒也抑遏也兼并也言并治之也膺當也言北當戎與狄也懲艾也言南艾荆楚及羣舒也承止也言天下莫敢禦之也聞之曰聖賢之生斯世必以天下為己任當堯之時洪水為天下害商之末夷狄禽獸為天下害周之衰亂臣賊子為天下害戰國之際邪説詖行為天下害洪水夷狄之害則生人不得安其居不得安其居則不得適其性矣亂臣賊子之害則生人不得定其分不得定其分則不得適其性矣邪説詖行之害則生人不得脩其學不得脩其學則亦不得適其性矣是皆人心之所由紛亂而昏蔽也聖賢者天民之先覺将使之啓廸人心而歸於正者也則以生人為己任者聖賢之責此正人心以承三聖孟子所以不得辭也是故禹不抑洪水周公不兼夷狄驅猛獸使斯人脱於不安其生之患而君臣父子兄弟夫婦相保也則禹周公之責不塞孔子不明亂臣賊子之罪使斯人脱於不定其分之患而君臣父子兄弟夫婦相保也則孔子之責不塞孟子不辯邪説詖行之非使斯人知所學而君臣父子兄弟夫婦相保也則孟子之責不塞禹周公得君以行其道則見之立功孔孟不得君以行其道則見之立言凡以盡聖賢之責而已且夫禹周公人臣也孔孟布衣也夫為人臣為布衣不敢不以天下為己任况尊為天子富有四海之内乎今敵國之為患大矣播遷我祖宗邱墟我陵廟蹂躪我中原塗炭我生靈自開闢以來干戈之擾未有甚於此者也髙宗﨑嶇百戰撫定江左将以討賊而沮於議和孝宗憂勤十閏經營富彊将以雪耻而屈於孝養二聖人之責至今猶未塞也陛下以仁聖之資嗣有神器豈得一日而忘此耶陛下誠一日不敢忘此則當以天下為己任而不敢以位為樂所謂一日不敢忘此則不敢以位為樂者每行一事每用一人必自警曰得無為敵國所侮乎吾民困窮如此吾士卒驕惰如此吾内外之臣背公營私如此吾父子之間歡意未洽如此吾将何以待敵國也常持此心常定此計周公豈欺我哉則大義可明大功可立矣雖然臣特因兼夷狄發明一事爾若夫人心不正豈止於此皆陛下之所當講也臣不勝拳拳僖祖太祖廟議詩清廟祀文王也執競祀武王也天作祀先王先公也先王謂太王以下先公謂諸盩至不窋思文后稷配天也我将祀文王於明堂也雝禘太祖也禘大祭也大於四時而小於祫太祖謂文王生民尊祖也天保禴祠烝嘗于公先王也禮記中庸武王末受命周公成文武之徳追王太王王季文王上祀先公以天子之禮大傳禮不王不禘王者禘其祖之所自出以其祖配之盧植以禘嚳為五年殷祭以后稷配之繫之以姓而弗别綴之以食而弗殊百世而昏姻不通者周道然也周禮大宗伯以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以烝冬享先王典瑞祼圭有瓚以肆先王司几筵祀先王昨席亦如之司服享先王則衮冕享先公則鷩冕大司樂乃奏夷則歌小吕舞大濩以享先妣先妣姜嫄也周立廟自后稷為始祖姜嫄無所配是以特立廟祭之謂之閟宫乃奏無射歌夾鍾舞大武以享先祖先祖謂先王先公天府掌祖廟之守藏祖廟始祖后稷之廟守祧掌守先王先公之廟祧廟謂太祖之廟及三昭三穆遷主所藏曰祧先公之遷主藏於后稷之廟先王之遷主藏於文武之廟儀禮喪服傳諸侯及其太祖天子及其始祖之所自出馬融云諸言祖者近言太祖逺言始祖若公子之子孫有為國君者世世祖是人也不祖公子春秋外傳魯語臧文仲曰有虞氏禘黄帝而祖顓頊郊堯而宗舜夏后氏禘黄帝而祖顓頊郊鯀而宗禹商人禘舜而祖契郊𡨕而宗湯周人禘嚳而郊稷祖文王而宗武王幕能帥顓頊者也有虞氏報焉杼能帥禹者也夏后氏報焉上甲㣲能帥契者也商人報焉髙圉太王能帥稷者也周人報焉凡禘郊祖宗報此五者國之祀典也以經傳考之自商而上以受命之君為宗而祖其所始生之帝故虞夏以舜禹為宗而祖顓帝商人則異是矣亦以受命之君為宗而祖其所始封之君故商以湯為宗而祖契周監二代郁郁彌文於是以受命之君為祖繼祖為宗而郊其所始封之君故周人郊稷祖文王而宗武王文王未稱王何以得為受命之君周公為之也其在詩文王文王受命作周也大明文王有明徳故天復命武王也此周公推受命於文王祖文而宗武之事也其在詩思文后稷配天則稷之郊樂也清廟祀文王則文王廟樂也執競祀武王則武王廟樂也我将祀文王於明堂則又文王配帝之樂也文武每廟各有樂章而后稷廟無專樂則見周祖文王而后稷不在七廟之列於是有先王先公之廟祧先王謂太王而下先公謂后稷而下其在詩天作祀先王先公則后稷以至太王王季之廟樂也文武每廟各有樂章文王配帝又别有樂假如后稷為太祖則不應但有郊樂而無廟樂今天作一詩通用之先王先公則由王季而上其遷主皆藏於后稷之廟而合享之明矣在書洛誥秬鬯二卣禋于文王武王烝祭嵗文王騂牛一武王騂牛一不及后稷不應毎事皆遺太祖又明驗也由此言之后稷固先公之廟也守祧八人盖以此以天保之詩曰禴祠烝嘗于公先王先公時祀固同而周禮享先王禮甚備享先公但用鷩冕或亦有隆殺之等記曰武王末受命周公成文武之徳追王太王王季文王上祀先公以天子之禮當武王之末追尊三世周公金縢之卜但告三王則太王為祖而文王猶為穆考酒誥所謂穆考文王是也成王制禮作樂更定廟制於是推稷為始祖文王為太祖閔予小子之詩曰於戲皇考永世克孝念兹皇祖陟降庭止則武王祔廟成王時也雝禘太祖謂文王也其詩曰既右烈考亦右文母則是以文王為祖而武王為昭考矣武王為昭考故文王之子皆第稱昭富辰所謂文之昭武之穆是也周禮天府掌祖廟之守藏注云祖廟謂后稷始祖之廟詩禘太祖注云太祖謂文王王肅家亦曰文王自是祖廟孝經云宗祀文王宗自訓尊則以后稷為始祖文王為太祖王鄭同此説也喪服傳曰諸侯及其太祖天子及其始祖之所自出此始祖太祖明文也馬融云諸言祖逺言始祖近言太祖是也韋昭曰商家祖契周初亦祖后稷而宗文王至武王雖成文王之業而有伐紂定天下之功其廟不可毁而後更祖文王宗武王此説近之矣孔子稱之曰孝莫大於嚴父嚴父莫大於配天周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝以為周公其人言非周公不足以及此明非夏商之舊也周變夏商非特此也追王至於三代前此未有也繫姓至於百世前此未有也推其所自出至於禘嚳又前此未有也商人禘舜至周禘嚳世數益逺是謂仁之至義之盡也漢魏以來諸儒考經不詳或得或失王鄭二家互相詆毀要不足深信此某所以專以經為斷以贊廟議之决恭惟本朝世次弗彰今當以太祖之所推尊為定以僖祖為始祖之廟與太祖之廟皆世世享推廣孝思崇長恩厚則羣臣之議不相牴牾而大典可就矣止齋集巻二十八欽定四庫全書止齋集巻二十九宋陳傅良撰廷對策臣恭惟陛下發
