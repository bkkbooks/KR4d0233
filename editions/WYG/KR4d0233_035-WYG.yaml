  text: 手書
  hash: sha256:5d209e8a1be38bc2d87d146890c951d0415b65b26ba6af16aa0ec9bd9bb2a32e
body:
  text: 與王徳脩伏承歸舟解纜不勝瞻依之至人生不足把翫一别輒數年能復幾别令人愴懐惟學問同源在彼猶在此也前輩所謂野色更無山斷隔天光直與水相通足以自慰釋耳某還家才此數月觀書雖不得如台山靜僻然亦有緒左氏課日趣就候書成萬里相寄兄亦當終我易傳也大抵周禮古文尚書三代之法存焉讀者未易造次且如禹貢州末繫河先儒固曰運逆三於青州達濟揚州達泗荆止於南河雍止於西河則以為受上之爾不知此正裴耀卿節級轉輸之法不以江人入河不以河人入洛洛人入渭賈誼云漢都長安而以淮南闕二字為奉闕致輸非是豪傑之見略與古準牧誓千夫長百夫長之下言庸蜀羗髳㣲盧彭濮諸國何也左氏謂蠻軍不陳盖無預於三軍之以待令者也杜氏於春秋晉人姜戎一義亦得此意今多言常平出漢耿中丞顔祕書且以為權道不知常平乃法周官司稼所謂以年之上下出斂法出則減價糶斂則增價糴也是非常平乎自鄭氏以出其斂法為解後人遂以周禮耳孟子亦曰狗彘食人食而不知檢野有餓莩而不知發今又作益食貨志作斂是也載師所征税或二十而一或十而五自漢来諸儒因此疑周不純用徹法亦輕重非二等是又失之不考凡征於載師皆非謂在野受田之民率士官賢牧所食公卿大夫王子弟采地耳凡此其收之民則什一也而自以其租歸公上則别以厚薄勞佚為差輕或二十而一重或二十而五此冡宰所謂邦中四郊稍甸都鄙之稅與萬民九職諸侯九貢各調度耳漢律諸侯王自有少錢亦其租之所在也答潘叔昌周禮妄意熟讀豈敢言他委訪綱領闕然自失往年薛常州先生問天官一編參之漢氏自宫衛分領光禄衛尉府蔵分𨽻司農少府一官分為數卿天子之奉又皆為私錢之屬王后世子各養於㝠宫謁者奄官亦散他局此紐一解未易操制隋唐之際殿中監内之吏作矣古人制度豈易輕改竊意天官而下往往盡然左右抄拾漢晉以來下及五門官制幸以薛常州之意一一尋繹得其離合切告條示亦欲共講之爾與呉居父直某賤不肖其所與游皆田野布衣儔類之士未嘗從王公大人之後盖謂之貴倨不可就見况敢望其即我哉京都足下特造窮巷夜叩門而賜見焉其行不以車馬其謁不以爵叙其簡牘不以記闕凡所以加乎賤不肖者顧王公大人不能得之扵其門人弟子乃今愧昔甚矣小人之懐厚誣當世君子也盖聞闕二字之化於貴公子見之外戚立傳自秦漢始王道之行壹闕三字之為比也将有繇然者矣君與相急士於其公貴家闕盖為闕於其私而一介之士無遺焉則國欲無治不可得也矣一闕而闗風俗係治道則豈僕私幸亦豈足下之私為闕二字徳不肖誠謂非僕私幸且非足下之私為恵也寵光之未闕戒今之不趍宜弗之罪是以敢遲遲而往也雖然施有所不報扣有所不答将以成其人之賢多而陰觀其嚮背戰國諸子為之孔門無是也僕雖不肖敢不謹於禮其將擇日闕戒拜賜於下風與林安之中間作懿仲書極欲如吾安之二三臭味脫去鄉邦来客山國庶得淡中之腴尋承已過巖下良用缺然安之飯之粗足亦屑就何耶僕乆厭此如沐漆解去無由爾比来新昌亦欲漸與人踈稍囬鞭策自警督視家居良為未便然毎念吕后劉歆輩視張子房揚子雲真自苦者要之兩翁意未易與兒女道故雖未便樂也安之乎子真知味者南坡茹菜動踰月無憐色與友生語率不十四五相唯諾惟吾安之有聞如響天姿如許加之小自警督當入張揚㑹中謹勿為劉吕輩以兒女語相甘誘落身杯酌間某無過人但知非輙深悔恨亦漸去舊習矧如安之相愛之篤不知其言之苦亮之否與鄭景望少卿二拜違誨席六七載百無一進獨幸扵毗陵從百九兄㳺半年平生氣息為之遲緩推挽之賜何敢廢忘中間託子之命仰見盛徳簡在宸衷可為天下賀簿書之勞非所以溷儒者比来轂下傳聞傳謾詳宻不見端闕私用慰釋雖然百九兄書盖期望不但此愚見偶合故未敢深喜也百九兄屢不應書自敵已猶倦况違尊者乎又從縣請祠為禮率直如聞朝政頗不相然臺符徑至殆非初心而得書願欲一来捨昨就今或者胥失近知扁舟赴約計已全併得此消息馳報千萬詳審勿使易来難去甚善甚望芮祭酒僅及家易簀劉大著王詹事皆竟不療海内賢者相繼凋䘮令人喪氣張侍講方結主知忽刺逺郡呂博士亦悼亡暫告未果復入年来所得師友亦次第渙散如此劇用無憀識罷還家了親事益逺得御儻憐其不自棄而終教之時賜尺紙略去少褒之辭直下砭針則千里猶膝下也拜違誨色忽復旬嵗中間兩辱墜教一一具報後許簿報書亦嘗略布淺漏以求是正領令嗣書缺然不至左右為之歉然建寧附問又嘗以大賢推轂不茍之意為請殆言輕無效許簿亦不欲復以上聞焉爾垂諭得䘮順正自是天資頑頓不甚領㑹世間羞辱一事非敢以為學力也見性之誨敢不從事盖讀孟子得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下不為則學力亦至矣猶以為與孔子異然則士之任可謂甚重得其一二以為盡在是端不敢也或䝉索見前二書他有以警策毋惜頻示何時扣繫臨紙惘惘答天台張之望始僕讀足下所著書心許之亦心疑之繫辭篇末輙略去世俗相贊稱語託古致規以觀候足下之志嚮深淺堅脆其虚受我耶逝将與君咨其所已至者而講求其所未至者其不悦辭我耶余豈舍之望者離未必合合未必相志越期年足下果復擕書已来且以先君子故弟之竒之遺藁與其季氏所為文十餘篇以相寵僕不自知釋然以喜非特喜足下亦喜吾交道之不阿素心之幸見察也且足下之書其於歴代傳統正偏南北宜宗宜絶自漢晉以来諸儒去取異同是否可以立斷其於春秋三傳諸家章句孰得聖人意孰不得聖人意參互往復辨論務眀白乃已要其歸大抵貴平而惡鑿不以私意傳公道若足下之學可謂博且篤矣入適於用矣僕雖愚頗好古道及其文辭凡今以是稱者未有聞而不慕慕而不求交者也况得如足下恵然肻顧先施而過賜之者乎宜一見顔色趍向已决然猶因請而後眀逾年而始信甚矣吾未知足下之所歸也况足下容貌不能逾中人言語呐呐無以自表見卒然遇之庸常稠衆中猶若人也先儒之論正統者歐蘇張陳數公皆已名世春秋之學至程氏胡氏義精矣今人固習聞其人而好尚其書然猶曰吾方有舉子事未暇盡讀其視足下書何如嗜古者不必利於今足下其知之歟以僕觀先君子書究其淵源盖以樂貧賤尚志節為家世然則足下宜知之矣誠知之吾冀足下之無悔也無悔於今必有傳於後吾所望於足下也雖然僕所望於足下者又進於此矣足下偏親在堂急朝夕之養卒卒引去有懐填然曾未究竟相期秋風不逺千里僕所謂咨其所已至而講求其所未至者有日矣僕雖愚敢不修飭以竢與鄉守曾仲躬瑞安脚剰錢知䝉台慈除􅇠甚厚又分給有次第仰見眀逺千里無盖傳聞尚悉輸往年夏秋租将繇省符抑漕檄也如漕檄度惟深仁必有以已之果由上来将何以示恵盖積留而頓取之則昔日之奉今日之困曾不如勿倚閤也眀道先生嘗於新法中曲折便民盖大君子不願法如何於其中為致意則雖㣲恵猶無虐是道也非吏部將安望歟受知之深敢爾喋喋不以為僣易將博訪所以為便者嗣告與閩帥梁丞相論耆長壮丁事切見熈寧保甲法行始以保正副大小保長代耆戸長壮丁承引催科之役至元祐間復差耆戸長壮丁法其舊以保正長代者並罷紹聖復雇役法再以保正長催科闕其保正長不願就雇者依舊召募耆戸長壮丁以此福建路耆戸長壮丁往往與保正長並行不廢然其所以不為民病者以其猶有雇錢也自紹興十年以耆戸長雇錢撥入經總制司窠名十二年又併壮丁雇錢撥入總制窠名由是江浙諸州耆戸長壮丁並廢惟福建諸州至今有之某照得福州官司檢騐緝捉催率勘會煩重之事必責之保正副大小保長而耆壮時時以縣司帖引追係搔擾夫役不給禄誠未易論然州縣曹吏日在官府猶可以䋲檢譴訶之又不比耆壮散居鄉村為寄編戸莫知禁止也以某短見宜如江浙間事例一切廢罷毋重為民害亦仁政實恵之一端矣答長溪王佐之某無以愈人獨博交當代賢俊之心出於天然雖以之得謗訕或相背棄不悔以此凡先生長者往往見察幸肻與之㳺而士之好學者亦或過聴以為可師友也而欲與之㳺向者臺評云云誠非過當然初不知其中實無所有偶然得此而遂疑其挟此以傲物也訟咎以来不敢復從羣衆妄出己見論事是非與人短長但杜門讀書不則熟睡足下廼欲舍几筵之奉從我于寂寞豈非益其疾乎息陰休影已出下策足下顧秉燭而照之此某所以辭不敢也因事懲艾當䝉亮悉然厚意不可虚辱繼此恵音不以淺陋将必有以奉報答林宗簡下問甚善古人之不可見所以壊人心者非一端也受田百畆皆足以自給嫁女無過純帛五兩無圭田則不敢祭薦魚菽而已舉一隅則他費稱是而自喪祭射鄉器服以上率數百家合力為之毎舉一事閭里共其勞以比皆農夫也而其秀民得從事於學盖二千五百家而後有序三年而興之是謂草澤之士於公無廩於朝市無制其升於國則異是其從公卿大夫之子匹學校者固有廩矣其市朝固有制矣士之子恒為士不敢舍而之他也漢承絶學之後猶謹鄉教授之法而取士以户口率不敢開㳺士之禁唐之四門學所謂俊士者則四方之所升進餘皆品子自國初以行舉誘致偏方之士而聚之中都向之為閩蜀唐漢偽官者往往慕化從順願仕於本朝由是家不尚譜牒身不重鄉貫以此得人而其流弊則在今日又自熈豐變役法而鄉邑之豪無以自見鬻度牒而隠逸之路塞罷學究而椎魯之徒無所入若此類不可徧舉於是舉世悉由於進士合四瀆之流為一川而歸之海其不放而被原野乎今其勢極矣度其變不逺上之抑揚闔闢恐非人事也答朱文昭書問濶踈未有似此别者然得之往來人知讀書著文不休亦足慰釋彼所貺字帖具審所論譔不少其意若欲續史家之緒又極忻快未得即觀遥想増氣耳某窮日益甚意思却不銷沮年来反覆古者與論當世之務頗覺嚮者鹵莽思得故人共論此往往隔阻毎一上心於邑移日近到東陽哭吕著作墓又迫蕃叟弟𦵏先叔匆匆遄歸疲頓不少且復休養幾時或能乗此暇日訪我仙巖之下何啻百紙相煖耶西漢士大夫深厚其季姦臣擅國羣盜竊號而名卿大夫擇君而事之於是中興光武規模窄狭而士氣薄矣晚来名節之盛要是衰俗一舉不勝散為呉魏之役率多喜功自見其不肻叛去者南陽一輩耳往時嘗說西漢無節義東漢有節義殆未深考孝章一變明光之政漢祚遂㣲孝章誠可恨其不可裕後傳逺者大抵眀光之為也攝闕古䘮禮也蘇氏引之未當若周公誕保七年豈是事例魯隠當國攝云者傳從其初言之也答蘧舜丞下諭律學極見詳博所欲著書無惜早下筆因以見寄前書云云正以方今功業當付儒者自建隆創業嘉祐守文熈寧變法宣政召禍其間盛衰何可勝道建炎諸賢竪立亡幾紹興季年粉飾已過上獨慨然右克廣文聲之意而書生承紹類皆齪齪以至今日吾黨宜究觀大方深求闕六字則講求廢墜以興文物如来示亦將次第舉之耳不以為不足學也答賈端老五去載䝉肻来相與於寂寞之濵荷意不淺淺髮齒衰改無復他覬儻假之年獲與士友共圖不腐於經術之餘志願足已閒居須課一書要當自古文書始踰年便可到春秋之末而及通鑑可也益􅉯未知㑹期願言加愛别去殊恨匆匆以循陔之念不欲奉留然終不滿也左傳且熟讀見得隠桓以前僖文之際哀定終篇無慮三變綱目則成書舉矣其他依經為傳文無虚發優㳺不迫而意已獨至盖非二家所能及非一二面剖難以筆舌盡也懿仲諸友已决謀遷書院於先人壟下以為来嵗過從之地入春便下手春暮當奉約矣䝉恩守壘交㳺借譽之力多矣幸甚以感讀左氏書頗有條貫䟽示於所當報已一一据見釋其左方有一二條似不足疑也若今年了此書開嵗便可從太史公史記下手陳了翁云譬如緝麻忙復暫舍暇而續之自成長條不忘室銘纔就即附上應不但已也近稍為眼昏花不能苦讀書毎客去則玩想向来所誦習自娱不足為念也示諭㸔過左氏傳甚善䟽問數條只是小小事目未是穿貫五霸之變五霸功罪未分則東遷之不競與歴年多處未見着落春秋同是聖人經世之用要其託史見義以五霸為據案而左氏合諸國之史發眀經所不書以表見其所書因五霸之興衰究觀王道之缺則戰國之事起周亡而秦漢出矣此其大略若夫精詳非面莫究太史公書又以接尚書春秋之統緒而下逮秦漢其用功畧與左氏同而不敢比假春秋是以變為紀傳世家書表耳何當合併共講其指讀史記甚善然有猥駮竒恠之疑何也獲麟以後孟荀推尊孔氏明禮義之統紀二子死百氏益亂真老儒如浮邱伯伏生之徒區區於秦楚之際抱經自闕而其力不足以發揮前緒至漢六七十年間董大夫始究大業田何孔安國戴聖戴徳闕毛萇並出各有所著而又未能合羣書為一削其不合以存其合者太史談有意矣然六家之論猶崇老抑儒遷卒家學乃盡百家之精而斷以六藝易本田何春秋本董仲舒尚書本孔安國禮本河間獨恨不見毛氏詩耳盖其融液九流萃為一篇罷黜雜論自五帝紀以下盛有依據荀卿之後僅見此書爾其論五帝云百家言黄帝其文不雅馴搢紳先生難言之書缺有間其軼乃時時見於他說非好學深思心知其意固難為淺見寡聞者道則所得多而自負亦不薄矣惜自班固看渠不過妄有瑕摘後生沿習遂成牢談千五百年之間此書湮晦正頼吾黨自開隻眼不惑於紛紛之論謹勿容易便生疑薄也老矣不能自白於後世常欲落筆少發所自識破者為前哲出氣因循未果近諸友為遷僊巖書塾於屋西偏今未就工後月足以奉盍簮之歡得三兩人相助檢討便可了此一項冬間肯来同社幸甚止齋集巻三十五欽定四庫全書止齋集巻三十六宋陳傅良撰手書答
