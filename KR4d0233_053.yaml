body:
  text: 民論天下之事有可畏之勢者易圖而無可畏之形者難見也易圖者亦易應難見者必難支故明智之君不畏夫方張之敵國而深畏夫未見其隙之民心蓋民心之搖撡於敵國之變其變之遲者其禍大而患在於內者必不可以復為也古者有畏民之君是以無可畏之民後之人君狃於民之不足畏而民之大可畏者始見於天下嗟夫民而至於見其可畏其亦無及也夫秦之先蓋七國也自孝公至於莊襄亟耕力戰荐食諸侯之境歷七世而并於始皇之手吁亦艱矣始皇唯知天下之難合而其患在六國也故危其社稷裂其土地而守置之以絶內爭之釁中國不足慮而所以為吾憂者猶有四夷也於是郡桂林城磧石頸繫百粵而郤胸奴於千里之外始皇之心自以天下舉無可虞足以安意肆志拱視於崤函之上而海內晏然者萬葉矣而不知夫天下之大可畏者伏於大澤之卒隱於巨鹿之盜而其睥睨覘覷者巳滿於山之西江之東也一呼而起氓隸雲合雖邯鄲百萬之師建瓴而下而全關之地巳稅駕於灞上之劉季矣嗚呼秦以七世而亡六國而六國之民以幾月而亡秦以秦之強不能當民之弱天下真可畏者果安在乎人君不得巳而用其民以從事於敵國可不懼哉舟說吾子知舟之所以致逺乎凡治大舟其檣以負䑺欲其屹乎其不撓也其䑺以彍風欲其騖乎而不靡也其柁以轄乎軸欲其壯以殿奔也其磴以柅乎艫欲其堅以鎮浮也其維以縻欲其固而莫之脫也其櫂若篙以櫂欲其徑而莫之折也其篷以却雨欲其績密而厚也其䒁以捍濤欲其端方以宰也而又樓焉以逹逺戈焉以禦害則以航于川以實萬斛肆千里行遭匯洑枟亂石晝晦冥大揚掀而無虞不然而斬杙以檣之裂席以䑺之續綆以維之折竹以篙之編蒲以篷之冒而航焉以幸一濟之不覆則溺嗚呼君子者濟乎世之舟也而溺乎其器以空中之質冒焉而求速能不覆且溺邪今吾子之舟其才良而文其器厚而深吾所望乎致逺者也雖然其所待者闕如也吾子而能豐其所中而不倚為檣大其所受可則舒否則翕也為䑺截乎其所守徑乎其所趍為柁正於動引而不彂為磴某人宜師某人宜友擇而附麗焉為維勇而不懈乎進為櫂若篙謹重以屏其患焉為蓬峻整以逺其海焉為䒁則吾始無虞於子不然其以致逺也殆也哉吾聞子試于學驟先諸先登吾固憂其挾少年之弱器以其空中而幸然於一濟冒焉而遂求速也詩不云乎譬彼舟流不知所屇心之憂矣不遑假寐以吾子學夫詩也於是乎贈舟說責盜蘭說豫寓梓溪一夕友人以園隅蘭芳告豫往視之愛其美而憫其不知於人也遂出置于庭數日香無聞欲去而猶遲之既卒以不香遂目之曰盜蘭而語之曰吾聞鼠有似豹大小異形吾得以辨其為鼠鳥有似鳳赤𬗋相間吾得以辨其為鶩石雖似玉疵而不醇吾固知其為瑉草雖似苗秀而不實吾固知其為莠彼固有近似吾惑之今汝蘭其形蘭其色花簮焉而癯葉修焉而特吾乃剃茹藘剪荆棘出汝於散地置汝於坐側汝乃假蘭之名乏蘭之德蕕如其臭苕如其賊吾方汝竊其近似以自欺深其僞而難測者也向使漢宫舍汝何以對乃辟楚人舍汝何以祛乃祥鄭君失汝何取乎七穆之端屈原去汝何誇乎九畹之芳然則汝之盜蘭而不香亦何異人之盜儒而實亡吾試言汝以證夫人陽短石顯盜吾公也隂附王鳳盜吾直也釣名布𬒳盜吾儉也伏死諌墀盜吾忠也託經以媚婦盜吾學也口聖賢而行市人盜吾誠也是皆君子近之而不知讒人主俯之而不覺其姦此社禝所以危覆忠良所以凋殘吾今可置汝於中庭是君可置斯人於百官也吾故效魯司寇誅少正卯之義戒鄭窹生去叔假之難亟命除汝汝其何安蘭曰伏辜願屏園樊戒河豚賦余叔氏食河豚以死余甚悲其能殺人吾邦人嗜之尤切他魚余嘗怪問焉曰以其柔滑且甘也嗚呼天下之以柔且甘殺人者不有大於河豚者哉遂賦之物固有害人兮人之勝者智也牛能觸吾為之絡馬䏻蹄吾為之㗸且轡也烏喙之毒用之藥以治也虎豹搏且噬也機與穽足以備也蛟蜄可驅兮蛇虺蚖蜥可避也雖其質禍賊兮名彰莫余僞也是故防之疑兮待之懼也吁河豚柔滑其肌兮旨厥味也孰魚匪羞兮而柔以甘人同嗜也曽謂其斃人亟兮孽肝膽慘腸胃也人雖疑致死兮饋者弗忌也吁嗟乎物之害人兮不在乎真可畏也凡蓄美以誘人兮蓋中人之所利也余誠恱而啖兮彼則隂以其恚也减殘忍以為仁兮文嫵媚忌也甘我以言兮鼠伺而狐覷也笑怡怡吾蠆兮弱婉婉滅人之氣也富貴懷安吾鴆兮幣帛饔牢吾餌也吁嗟乎愛者禍府兮所玩以易也兵莫慘於貪兮干戈伏於不意也晋滅虞以璧馬兮啇君以好囚魏也莽詐忠以盜漢兮武賊飬以媚也眇河豚其弗戒兮欺天下者曰得志也吁嗟乎若子豢安兮擲天下於一試也文章䇿三代無文人六經無文法非無文人也不以文論人也非無文法也不以文為法也是故文非古人所急也古者道德同而風俗一天下未嘗惟文之尚也學校進士無文教也鄉黨選士無文科也朝廷爵士無文品也士之有文皆􅉼飬之素而談笑之發蹈履之熟而議論之及非有意也是故雖其所出而非其所為雖其所有而非其所知文之在天下郁郁矣昔者嘗疑夫子於詩之三百篇斷之一辭則曰思無邪夫易也書也春秋禮樂也皆其無邪思也而聖人獨及夫詩蓋思而得之聖人謂是以為天下之文也出於數人之手非一人也出於數十國之風非一國也出於數百載之間非一世也或出小夫賤隸非止於學士大夫也或出於暴政虐世非止於寬時暇日也而其辭其義粹焉一軌上之化深下之化厚固如此也嗚呼道盛則文俱盛文盛則道始衰矣射䇿之朝錯不如木強之申屠談經之公孫不如戇愚之汲黯自漢以來甚矣文之日勝而士之俗日漓人才之日乏而國家之日不理也華藻之厚而忠信之薄也詞辨之工而事業之陋也學問之該而器識之淺也吾不意夫文之為天下患如此也漢之文楊雄其尤美新之作庸人耻之唐之文韓愈其尤諛墓之誚在當時固不免嗚呼他何望哉愚方惟是自獻而先生辱問焉故愚不敢道其末而願聞其本惟先生賜之守令䇿古之天下無冗官亦無窮人無幸法亦無怨吏夫官不濫則人無滯歎法不屈則吏無滿心勢亦然也而官若是其甚簡也敷奏賔興又若彼其衆也法若是其嚴也黜陟用廢又若彼其果也以甚簡之官待人才之衆以甚嚴之法行賞罰之果而人無滯歎吏無不滿之心何也上之人無愧則下之人無憾也用者必公則未獲者不敢議也顯者必賢則繼者不敢覬也內之者非所昵則所外者不敢浮也逺之者非所怨則所邇者不敢偷也是舉天下之官皆可以用人抱關擊拆府史胥吏士不耻為也嘗觀周公立政之書論文武得人之盛而至於夷微盧之蒸三毫阪之尹皆有常之士而其選無異於三宅彼皆逺方也皆卑職也逺方非要地卑職非膴仕而天下之美材居之宜亦有所不安焉而莫之問者何也有君如文武非棄才之主有臣如周公非蔽賢之相則逺之非踈之卑之非薄之也且夫周公大聖也天下所共知也而諸侯無伯則出為東伯六卿無宰俯為冢宰畢公大賢也亦天下所共知也而周公不沒則未得以為伯則未得以為監啇聖如周公而下闕人也則降而為之不以為辱賢如畢公而上有人焉則淹而留之不以為恨天下之不聖於周公不賢於畢公者又何擇也愚故謂今日難於久任非誠難於久任也難於外任非誠難於外任也以古之官視今之官則今冗也以古之法視今之法則今幸也以其甚冗猶苦其不足以其甚幸猶苦其不平無他下有所要者上有所畏也用者未必公人固不恬于退也顯者未必賢人固不屑於小也內之者或所昵人斯競於求也逺之者或所怨人斯難於去也夫如是則盡今之官應今之人廢今之法娛今之吏天下日愈嗷嗷矣嗚呼天下非怨吏之可畏也今日遷某守明日易某令其擾則妨民其費則傷民其無意於留而茍簡於治則弊民其自以為亟遷而求足其欲則又困民故夫吏之便民之病也有便民之法而又有不便吏之憂愚所不敢知也故凡執事之三䇿愚不暇憂而所深憂者上有所畏則下有所要也收民心䇿漢文之仁不在復租而見於復租周官之仁不在荒政而見於荒政武王之仁不在散財發粟而見於散財發粟聖人之仁其積之有源其發之有機其所以厚天下無窮而見於恤天下者特其有限者也天下之人不以其有限之施而致不足之望而常以是信其無所不愛之心而懷不盡之感者蓋於其所發占所積聖人之心始形見乎此夫媒人而盛譽之人不以為喜役人而強飯之人不以為德何也媒之而譽之吾固有所私也役之而飯之吾固有所利也故夫一譽之及必謝者必其無所私之之𥘉一飯之施必謝者必其無所利之之素聖人之仁形見之日而天下吾戴者非其形見之日也其心無所事於形見之末而所召之速則形見其機也昔嘗怪宣王咎已之急辭罪歲之觖望夫咎巳之急辭生於自治之不足罪歲之觖望則又窮焉而尤天也而中興之雅實先是詩序詩者顧以為中興之根本何也彼其心未有係天下之心也宣王之機所藏者甚微而澤之及人者尚自淺也藏乎中者甚微非力久則未易以著而澤之所及猶淺則亦難乎遽孚雲漢之旱宣王之惻怛忠愛一旦而大彰彰焉天下以是為文武成康之心也車攻未作復古之業就矣不然遇災而懼漢唐人主如此者總總也彼其令下而民玩而此則速中興之功未可以言語及也人皆曰雲漢之旱中興之福也無雲漢宣王之仁不加損有雲漢宣王之仁亦不加益而中興之機也是詩也故嘗為之說曰啇非興於解網而實興於解網周非興於扇暍而實興於扇暍宣王非興於遇災而實興於遇災聖人之仁不外假以收天下而天下之歸心則嘗有俟也天地之德非止於雨露而物則德天地之雨露父母之恩非止於乳哺而子則恩父母之乳哺也愚固為今日賀而為吾君勉也方今版圖未盡復也主上踐祚以來江浙之間飢饉荐臻水旱相仍固斯民病也而聖心惻然勤恤民隱下减租之詔遣振飢之使却免錢之請又斯民幸也愚則以為是宣王中興之機也嘗讀孟子至於鄒魯之閧有司死焉而莫之救孟子以為是凶年不發之報而不可以尤民至梁惠王移粟於民勤矣而孟氏又以為非先王之政夫飢而勿恤穆公固有愧也飢而惠之惠王稱無政何也天下之事安於莫之為者非也迫而為之而不反其本者亦非也是故以梁之政視鄒之政梁若可喜以鄒之治責梁之治梁之及民末矣愚故因鄒之失賀今日之所以得以梁之所未至勉吾君大之章子林子名說古人之名惟所遇焉斯取之矣非擇也啇而上迭以甲乙命蓋雜紊而無章至於周諱行而名始尊然曰顛曰夭非美辭也而取之以名春秋之世猶不厚乎名衛有石惡晋有戾齊有陳逆楚有屈蕩周有史佚夫數辭者皆人之愧焉而至不美者也而取之以名展禽解孤若是者則有取乎物之賤者以自名下漢晋士方以名相髙唐以來士無陋名名美而人才日卑嗟夫專於其內而不張於其外急乎其外而不勵乎其內古今人之異也宜哉吾友章子林子皆恥夫擇名之不詳而請更於豫豫何吝於名哉而二子之請甚矣其非古人之意也名不若人汲汲乎求治之心不若人姑徐徐而巳耳盍亦反其本乎雖然二子以自治之請豫又何可辭之于是名章子曰用中林子曰毅章子願而固林子弱而浮以其名之得微中乎心夫二子而由是焉反之斯名也其猶二子之益友乎里名勝毋曽參不入彼里名豈是以凂吾孝哉而君子亟去焉亦合內外之道也然則二子之請于豫豫不吝于二子雖非古人之意是亦古人之意而已矣朱甥子臧名說吾兄有朱甥者每遇豫持尺𥿄拱而問名焉豫曰爾何若名之問也人能美名名不能以美人淑爾身雖陋爾名人不汝議也爾身之不淑假而以丘軻自號焉天下莫之豫矣是故古之為名姑用是焉别稱道而巳矣賢否不問也爾何名之問也雖然童子而知問名可嘉也凡人之善自一念而為也故患莫大于無識學莫强于自興爾知重而名則必知重而身矣噫是念足以為善矣吾故名汝曰子臧而猶未汝字越十年吾將汝考焉而不負吾名字汝未晚也附録卷終
