  text: 止齋先生文集卷第十八
  hash: sha256:ef01ce33ba2106efdf3403d97f6ea77944fd488e2891f36c30bbadc54487367b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_018-1a}
body:
  text: 外集知襄陽府張枃知建康府勑維周公太公功在盟府而伯禽見于費誓吕伋見于康王之初克世其美垂名六藝顯允魏公弼亮二祖咨爾後人冝自著見具官某踐修厥猷謀略輻輳牧民馭士何鄉不可內史擲彂文昌論思績用甚茂稱者不容口也備邊襄州隱若敵國太上疇勞𣣔徙秣陵而未果肆朕嗣服爰咨分閫托重留鑰莫如爾冝且夫金陵魏公之所經略也元勳大節賫志未就歷年于此胡能嗣之文事武備兼修者何術內寧外憂長慮者何事其究爾心以圖忠報豈惟先正將二祖亦寵嘉之可朝散大夫知南外宗正事趙不遡換右監門衛大將軍濠州團練使擢知太宗正事勑具官某自藝祖置大宗正以睦親族蓋歷年于此夲支蟬聮世次櫛比而無忒違職此之由可不謹擇之乎爾屬尊而身修宦逹而志無競爰自左選改卑南班秋以門衛之崇加以戎團之峻甚尊寵矣益輯宗盟以綿帝系往其勉哉可直祕閣劉頴除直顯謨閣江東轉運判官勑具官某課賢勞耶則誰如汝多采民譽耶則誰如汝著况久淹恤朕豈忘汝也江表將漕司存與留都相時蓋視畿甸等耳煩爾調度以寬州縣之急歸報有期勿替前績可浙西提刑黃遹知贛州勑具官某粵從臺掾遂畀畿節不可謂不遭時矣章貢名邦選牧為重而其民亦號難理夫地重則須宿望事難則藉容德疇咨爾冝就卑州組益究民庸母曰逺外可太學上舍生李斗南葉元英賜釋褐出身敕某等科目之制至嚴密也而繇學枚進者則課其功緒蓋有不待試于春官而䇿之廷者焉亦既得雋矣肆豫嗣服又拔其尤若爾某某者而即官之則所以加惠諸生豈不盛哉可侍衛步軍司後軍統領戚拱宿衛部轄官兵特轉一官邵建孫光祖鮑信陳孝慶孫顯忠夏震並同敕具官某環列之尹著于春秋書勞進秩則有常典爾其母憚煩使式克欽承則豫汝賞不一而足可湖南提刑趙不蕩除江西提刑寺丞趙除江西提舉敕具官某等自江以西綿地數千里其吏善讀律其啇善趨鹺茗之利而其田疇多旱潦部使者得其人則刑罰中而訟缿之俗易禁弛散斂行而民不失業以是不蕩詳刑湖湘不偏聽于單辭爾率職省寺謹厚而無失其以不蕩序遷臬司為庾氏皆王人也觀省風謡布宣德意可不勉乎可張縯除直祕閣官觀敕具官某以熙寧論事之臣之後其文足以自見其學足以自飾此吾烈祖所以置諸册府上皇以為郎若卿也晚分郡符數上奏計雖不見察于部使者而見直于言路而秉心無競固請解組成爾素履歸休外祠還爾舊著寓直延閣尚對新渥以為後圖母若考槃永矢弗告可江東轉運判官劉頴知平江府敕具官某將輸江東方錫贊書擇牧吳門又分符竹爾亦喻朕指乎以爾才足以撥煩且宜引以自近也夫足以撥煩則彌節而為劇郡所以彂遊刃之有餘引以自近則置諸扶風馮翊之間蓋鴻漸之序也深喻此指無非簡記盍疾其驅以對新渥可李嘉謀知襄陽府敕具官某維烈祖旁求西州之士幾無遺材用以為公卿大夫多矣而一時同進宿留州縣位卑官薄聲聞藹然者猶一二數朕所以式遄其歸也會乏襄陽之帥僉謀惟久而又中道輟汝以寬顧憂是豈朕初意乎夫旅進周行每恨非功名之會久勞外服又懷無拾輔之益有能于此何鄉不可則通儒也爾其欽承以圖忠報可新除福建提刑盧彥德改江東提刑敕具官某觀蜀道之歌湘繫之賦則知士大夫不樂久宦於此也爾某﨑嶇荆益至於纍年晚歸郎闈意不自得􅈤章亟上持節七閩夫安于平進而樂逺外曾無纎芥見於詞色是不謂之吉士歟以嫌自引易地江左姑徇爾懷嗣有它寵可權戶部侍郎梁揔除刑部侍郎敕朕誦周書至立政用人之戒詳矣而三致意於庶獄至於卒章獨告司寇蘇公夫皆凖人也他無所概見而司寇獨明言其人何歟蓋謹而書之也具官某以寬厚長者名當世而以法士名其家夫法士則深于文而長者則傷于惠二者皆偏才也而卿獨兼二美焉頃為理官空圄案月及掌邦計郡國晏然銜命來歸備見忠瘁晉二秋官此蘇公之職也式敬爾獄以長我王國爾尚無愧於周書哉可司農寺主簿張孝伯除國子監十月十一日敕具官某朕方加惠諸生凡聮事于成均者皆遴選也胄監有丞與聞學政以爾孝伯雅致不渝肆用命爾其益好修以須明陟可諸王宫大小學教授姚愈除司農寺丞國子監主簿羅克開除軍器監丞十月十一日敕具官爾愈爾克開皆以文雅嘗與聞學政矣而以愈丞農扈克開丞戎監蓋試煩事益究爾能左右具冝則有明陟可直祕閣兩浙轉運判官黃黼除直龍啚閣升副使再辭龍啚改除直顯謨閣十月十一日敕具官某以元祐名宦之後而其學足以自立才足以自見也將漕郊畿燕及三輔朕圖爾功正名使華晉職犧閣是豈謂之過歟而何遜章來上至于再三也益嘉廉操少却文謨雖不償勞亦足厲世可倉部郎中汪梓以趙汝愚親嫌除淮東提舉十月十四日敕具官某朕不以防禁遇臣下而或自言嫌則亦從𣣔以便其私爾大臣之子克世其家比解州紱遄歸郎舍嘗試未久譽處有聞顧以當路之嫌碩就外服政卑淮節以華其行雖徇爾懷亦足風厲可大理正閭丘泳除利州路提刑十月十七日敕具官某夫持節行郡國是為周王人漢部刺史也然周以下士漢才秩六百石何歟深知此意冝何以圖報乎爾為理官亦既纍歲博文敏事似不能言會擇蜀使咸曰汝可若爾者足以循周漢之制越次而持節矣詳刑于蜀庸究爾能往其欽承以須明陟可祕書監兼實録院檢討官薛叔似除權户部侍郎十月二十八日敕朕𣣔省賦甚而用不足蓋嘗歎息安得執古以御今之士與之共圖邦計乎而澤下究也具官某習于六經之道而明當世之務自薦紳先生下逮新進稱爾不容口也屬茲銜命萬里來歸革帶𬞞食行乎蠻貊朕甚嘉之曽未復命擢二民曹夫從班豈所以償勞乎可使治賦孔門之學何以利國孟子不對于斯二者並行不悖此朕之所圖于汝也尚其懋哉以永士譽可起居舍人兼侍講劉光祖除起居郎司農少卿鄧馹除起居舍人十月二十八日敕具官某左右史朕所嘉賴以謹言動爰自嗣服儀圖其人皆舊學也爾光祖馹頃在儲寮蔚為國士而光祖繇霜臺馹繇騎省各以論事不避權近俄而去國朕甚懷之蓋嘗嘆息安得三益以自近也今兹歸止實慰我心其以光祖序進左拗馹擢居右陛豈徒以是為私乎其繼自今直筆在前則出入不欽號令不臧將懼思焉爾其懋哉勿替初意可國子祭酒彭椿年除直龍啚閣江東路轉運副使閏十月二日敕具官某昔荀卿嘗為祭酒矣而卒老蘭陵後世恨之爾某于今百辟最先進也方在諸生及見故老比為博士獨抱遺經而自詭治民遲遲翔集蓋纍年于此矣晚長成均雅不自喜亟上懇牘𣣔便其私將輸江瑌升華犧閣雖寵爾行而朕尚兾爾無遐心也以解荀卿之恨亦有意乎可大理寺丞林思齋除大理正閠十一月二日敕具官某本朝重科目而有以奕世父子一門伯仲赫然聮翩擅聲名於場屋若爾某者豈不足貴乎而何州縣淹恤亟稱賢勞嶽牧論薦始有朝迹也淑問獻囚士論惟允俾為理官自丞而正鴻漸之序嗣有懋官可户部郎中正溉除直祕閣知平江府閏十月三日敕具官某治辦之吏患在鍥薄豈弟之長或不事事此二千石所以難具人也爾自分郡寄比遣使華長于心計往往所在足用而長財也而捐以豫民動纍巨萬蜀道之人至今懷惠若爾者可以托千里之國矣吳門擇牧蓋久而後得之輟于望郎華以寓直爾其懋哉勿替民譽可太府寺簿范蓀除太理寺丞閏十月三日敕具官某奕世載德孰如范氏爾克踐修益自問學色辭粹溫君于人也俾丞棘寺未究爾能謹視刑書嗣有寵數可朝請郎權發遣滁州石宗昭除度支郎官新改除浙西提舉吳鎰除司封郎官九月八日鎰閏十月十四日敕具官某等以吾册府校讐之臣而越在外服不知其反期何時非所以為經生學士勸也爾宗昭鎰嘗同日給筆札試于玉堂之廬觀如堵墻其美無度而何宗昭在淮鎰在湘之久也夫合江之水環滁之山將指承流爾固樂此公論不置盍歸郎闈其亟來朝以對新渥可軍器少監兼權司封官李大性除浙東提舉知常州黃灝除浙西提舉大性十月三日灝閏十月四日敕具官某今二浙猶三輔也比歲不登仍以旱潦荒政十二其誰與朕推行之乎爰諏其人得于周行則汝大性得于列郡則汝灝也東西二節于以分卑平興頒積悉咨聽之吳越之間民無菜色我有褒璽必不爾後可太學博士陳峴武學將上陳雍並除祕書省正字閏十月十四日敕具官某等朕命以雲漢側身之誼䇿爾于玉堂之廬爾峴不徒具文而有惻隱之實爾雍科别其條而昌言之不枉于執事文詞拳拳皆可觀也册府儲才得爾惟允勉司校讎益務􅉼育以就逺志以副殊休可監登聞檢院楊太全除宗正寺主簿主管官告院傳伯成除司農寺主簿十月十四日監都進奏院孟浩除國子監主簿浩閏十月十四日敕具官某等夫以百畝之宰三年之淹僉言賢勞始有朝迹而後階升簿正列寺士𣣔以才自著也斯已艱矣矧爾大全西州之彥而伯成浩又南國之良乎姑懋厥官以須褒進可大學正孫元卿除武學博士閏十月二十五日敕具官某古者干籥皆學于東序而貍首騶虞又皆樂師所以教國子也爾以文行簡在東膠譽處盛矣推所講明施及右學將見諸生不但習孫吳而巳則朕之所以用汝也可李知已陳景俊並除大理寺丞十月八日敕具官某等魯人以淑問獻囚而漢以文無害為獄椽皆所以重士官也爾知已于今多士為前進而有廉退之稱不幾于魯詩所謂淑問者乎爾景俊于今法家為通才而無少恩之蔽不幾于漢制所謂文無害者乎俾丞棘寺同審刑書庶幾吾民幽枉必逹可國子司業適除太府卿淮東總領十一月十二日敕具官某昔者仲尼考定六藝至大學之卒章歸於義利易道深矣亦曰天地大德次及于理財也今宿師數十萬以天下之財贍之不領于大農之經費而居此官者不知此誼是不重為吾民病乎冝廷臣論建者𣣔得賢士大夫使之久任以加惠吾元元也朕覽奏矍然改圖其人而大臣首以爾適應選擇輟從司成晉長外府以儒術總戎餉昉于此矣行爾所學奚必多訓可楊源轉一官敕具官某爾請昏于戚里將以圖膴仕也方優愍章及其黨族冝進一官以廣恩意可楊緯引嫌改知閬州敕具官某朕不以防禁遇臣下而或自言嫌則亦從𣣔以便其私爾紆州組浸有民譽顧以伯氏庀司榷牧抗章引却易地閬中雖徇爾懷亦足風厲可主管沖佑觀黃度知婺州敕具官某言者不狂擇者不明此漢文帝之詔也深厚寬博庶幾六藝朕甚慕焉日以練官輔郡守而爾度方抗疏論事無所撓且竟舍州組便親飬退省爾私豈有為為之乎若但從𣣔不強起汝亦異於漢文矣婺越境錯可以將父便道之官是用􅒛汝其往拊吾民益以民事之暇強學待問朕豈汝忘哉可髙宗周押馬賞轉官敕具官某詩不云乎秉心塞淵騋牝三千馬之增減於此觀人心焉此吾所以設賞典也其進爾秩勸後來可武節郎提轄製造御前軍器所曺組職事修舉轉一官勑具官某以除戎器課勞而增秩非苟以為恩也天下無事武備易弛有精其能不可不勸可沈槐胡仲衡吕友直並除大理評事勑具官某等日者屢肆大眚囹圄空虛理官具貟而已然而擇人以詳刑則不可不謹若爾某者皆由此選也冝及間暇益務明習以稱朕哀矜庶獄之意可前知撫州趙彥繩知贛州勑具官某江右民牧章貢為重爾彥繩以屬籍之秀奮於儒科而臨川治行奏計為最解組來朝適會闕守卑爾符竹咸曰是宜往其究心以永終譽可宗正少卿李祥除國子祭酒十一月二十一日勑具官某士行莫髙於知止廟謨莫急於留賢一舉而二美附此朕所以用爾祥也以爾議論接於前聞行藏備於素履見推文行多士攸同粵從樞屬擢二胄監而秉心無競陳誼甚髙蓋旬歲之間亡慮數請以年為解懷不自安也朕為此風不作深用嘉尚爰酬巳試晉長司成本之諸生以重兩學夫人臣守誼人主尚德是足以明教化矣可虞儔知湖州勑具官某以爾嘗入霜臺持玉節風績甚茂淹恤云久尚徒勞州組乎夫仁不異逺義不辭難乃苕霅之間自昔樂土維年不逢民有菜色荒政十二朕靡所愛苟非其人是將焉寄此朕所以用汝也寓直延閣姑寵爾行亟圖民庸以計來上可張宗况張宗愈轉一官與幹官差遣勑具官某等勸分之令下未有帥先為吾元元輸粟於縣官者而爾以勳閥丗臣能奉明詔朕甚嘉之爰進厥秩俾屬外臺非苟為恩將以風厲可倪思知泉州勑具官某朕觀周詩至於廷臣徂齊入謝為之作誦勤勤勞苦然後知官人之道焉爾蚤以英聲頴脫時輩浸即膴仕蔚為國華日者方憩征驂俄而去國顧乃願休祠館不就郡章以若所為豈必待仕而後慊於心歟而朕自不能忘也維閩山樂土溫陵佳郡成爾素履姑惟遲次事簡賦寬可踐所學往其欽承益自明試可鄉貢進士方權輸米輔迪功郎勑某勸分之令下未有帥先為吾元元輸粟於縣官者而爾嘗預計偕能奉明詔授之𥘉官以厲來者不亦可乎可程需輸米特輔承信郎勑某勸分之令下未有帥先為吾元元輸粟於縣官者而爾能奉明詔是足嘉與官以右選以勸後來可馬大同特復元官致仕勑霜臺有請固不可屈於恩泉壤可懷亦不容廢以法爰棄前咎遂還故官以昭念舊之仁以示勸能之典具官某信已之學兼人之才粵自少年意巳輕於先逹浸更膴仕耻徒事於清談蓋時出其抱負之長而概見於設施之際修明臬事有發伏擲姦之功論建版曺皆足用長財之畫肆豫𥘉政洊有煩言屬爾沉痾姑從薄責諒兼忘於寵辱何遽隔於幽明東首拖紳曷慰九原之恨西清持槖尚歆再命之榮可著作佐郎王奭除著作郎十二月二十三日勑具官某雍也仁而不佞仲尼所以第德行之科也爾羣居則寡言旅進則却立不幾乎所謂仁而不佞者歟久遊册府殊無兢心比上著庭見謂直筆於焉序遷未足以究爾能也朕方識之行有簡擢可祕書丞陳柄除著作佐郎十一月二十二日勑具官某載筆東觀極天下之選矣官資崇卑歲月久近不足論也爾嘗奉大對亞乎褒然之選才長文冨不自衒鬻從其所好翶翔著庭以昌令名以就逺器詩不云乎潛雖伏矣亦孔之照爾亦喻此指乎可太常博士邵康除祕書丞十一月二十三日勑具官某筮仕學省遂入容臺遂上册府士而能致身如此蓋亡幾人也以爾奏名南宫嘗為天下第一種學績文益務持養次第及此朝無異言往其懋哉以就逺器可太常寺主簿劉誠之除太常博士劉孟容除祕書省正事十一月二十三日孟容二十七日勑具官某朕每講至於春秋一書則聞劉氏之説本朝經學未能或之先也訪求其家則爾誠之孟容皆世科第誠之方簿正曲臺雅有譽處而孟容淹恤在外稱者尤不容口也其以誠之為禮博士而特招孟容置諸册府詩不云子凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國朕蓋庶幾於此焉可中書門下省檢正諸房公事兼權刑部侍郎徐誼除權工部侍郎兼知臨安府十二月三日勑啇邑翼翼四方之極夫為內史而無尊重難危之勢非所以覽示海內壯京室也具官某外寬而中剛末詳而本約能通當今之務而不失古意能得君子之心而不忿疾于頑也比嘗試對賦奏闓切朕識之久會謀畿帥而簡之庶僚二于起部蓋聞兾裏言之助者開群枉之門懷危得之情者持自營之計內史不競職此之由儀圖其人無以易汝是用蔽自朕志度越故常以論思之班行彈壓之事往其𢡟哉以振首善可袁燮除大學正十二月勑具官某今周行之士可以為人師者不乏而朕取諸逺至于一再爾燮亦喻此指乎夫行修于家而未施用於世名聞於州里而未有著於朝列此人主之所務白也宜益𢡟官以副朕不遐遺之意可添差台州通判吕祖儉除太府寺丞浙東常平司幹官孟猷除藉田令猷閏十月三日祖儉于二月勑用人之弊其惟泄邇而忘逺乎肆朕嗣服覽示無外間有遺材取之下國爾祖儉爾猷皆以故家子孫雅有譽處孝友行於窮約而趣尚不專於科第也徒勞州縣未究爾能以爾祖儉丞外府猷令籍田其益好修以稱朕意可止齋先生文集卷之十八
