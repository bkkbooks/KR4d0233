front:
  text: 止齋先生文集後序先生春秋後傳諸書今參知政事樓公既屬永嘉守施公栻刋置郡齋矣惟文集舊未成編蓋俗所傳如城南集之類皆幼作先生每悔焉故叔逺所詮次斷自梅潭丁亥以後抑先生意云爾而裒搜衆録參别唯久至嘉定戊辰始就緒又不揆輒陳述先生問學獨出之旨人所未及知者僭為序文冠諸篇端樓公復以屬郡守楊公簡續刋之楊謝不能郡博士徐公鳳慨然曰是吾志也吾起慕敬于茲久乃與前吏部侍郎蔡公幼學更加訂定即廩士羡緍萬亟成之于是後學咸得觀先生全文而樓公美意始無憾焉徐公之賜厚矣徐公建安人弱冠登進士第以親老不調者十餘年初官永嘉搢紳逢掖稱賢無異詞而又汲汲然懼儒先遺文之汨其傳而無以私淑諸人也是真可為人師矣嘉定癸酉三月門人承直郎新荆湖北路轉運司幹辦公事曺叔逺謹再識于集左
