front:
  text: 上齋先生文集卷之五十
  hash: sha256:6dececbdc55e6f7a76b7324972ee76f789bf4b8b347ac8c00ff186ba978fb83c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_050-1a}
body:
  text: 志銘沈叔阜壙志叔阜諱昌姓沈氏溫瑞安人泉州德化令希尹之子母林氏後母張氏德化公始識余亟以叔阜相從問學為請常常語人吾兒異日當知名于世學者且數百人叔阜與今提舉福建常平茶事蔡行之年皆少皆有俊聲而叔阜乃早夭故沿海制置參議徐公履少𥘉天下士也與德化交老彌好德化卒徐公自通守信州歸於謀於家人以其女妻叔阜生三子建衍因一女因為從兄厚之後徐氏守視其孤自淳熙十三年正月十九日至慶元二年十一月二十一日克葬於永嘉建牙鄉丁公村淨名院山之側實德化墓下云族叔祖元繼壙志維陳氏自福之長溪縣勸儒鄉擢秀里徙溫州瑞安縣帆逰鄉固義里譜凡七世傳良生晚猶及諸祖父行皆厚重不察察大人也府君諱紹字元繼於祖行最少傅良及詳其為人里中有故或衆不能合族中有故或獨不能支必須府君至而後集夫人善助之日以酒肉飲食人時出嬉逰冬歲必為具燕少長至僮僕不遺其用度如不節而家資倍於疇昔府君生崇寧二年卒於乾道二年十月丙戌夫人生元符元年卒於淳熙十三年二月丁卯府君以淳熙五年十二月丙申葬於所居里西尖之麓至慶元二年十二月庚申而夫人祔二子宏中定中女適劉宋弼朱克明謝邦基孫男四人宗詵宗淡宗洙宗汾詵早卒宗洙為兄之子方中後淡洙皆國子進士女一人傳良諸孫也族叔祖元成墓志銘府君諱繹字元成溫瑞安人以乾道七年六月癸丑卒年六十有八淳熙六年十有二月丙申葬于所居里安仁山之東趾傳良嘗聞之祖妣吳舊廬蓋周顯德間所作云族居二百年或舍而改築府君遂得有其西偏與先君共一礎傳良幼也孤能讀書夜逹旦府君故見愛一日挈傳良手至所謂西廳者問焉曰而欲存此否乎傳良不能仰視但泣下府君嘆曰吾固期汝之有志也當卒以歸汝舊廬之全府君賜也府君行事類如此終其身不詈不朴不訟而家事治死之日哭之者皆盡哀娶孫氏生一子諱孚中字安國再娶潘氏生一子諱和中字敬之一女適黃廷謙孫夫人先三十年卒不及見其家盛時潘夫人善視二子二子又善為兄弟安國以為然敬之曰好或敬之少不能然安國亦曰好也府君舊屋才三間後二子合為數十間於其旁奉潘氏夫人居中意象甚美有姨之女及從姪之孫女貧夫人長育至嫁二子無後言然安國雅好佛特謹畏非習吉一簣土不敢動敬之灑落自適於觴詠靜作惟所欲其性殊不同而能各護其偏是尤美也夫人年七十有三以淳熙十四年十月癸巳卒安固年五十有五以紹熙二年八月庚寅卒敬之年四十有九以慶元元年九月壬辰卒哭三人者如哭府君安國娶王氏生一子宗瀚二女適諸葛詵林昕敬之娶謝氏生一子宗沂一女許嫁林子卓𥘉府君葬孫夫人于茶尖之陽府君卒二子改卜安仁與茶尖對峙為六竁他日將以婦子左右象生時夫人未合而安國卒紹熙四年十有二月壬寅從夫人祔慶元二年十有二月壬申而敬之祔傳良欲銘府君久以宦遊至是而後銘故并書之銘曰豈不以為利利至淺也豈不以為能能至鮮也我啚後人種之逺也燕及草木不可剪也族兄際可壙志府君諱踰字際可姓陳氏溫瑞安人父諱孚母史氏有三子府君為季父卒府君最善事母在母傍三十有五年供飬如一日府君性多病率數歲才一時再出外門獨自以隨母為娛年四五十遊戲抱扶如小兒狀母一飰不下咽輒廢匕筯母為之強飯之年八十有八以紹熙二年八月癸亥卒府君亦年六十有五矣以其年十有二月乙卯卒娶樓氏生三子師魯師濟師復一女嫁許仲淳三孫樓夫人後三年以慶元元年八月丁巳卒師魯𥘉未得卜藁葬府君於隆平尼院至慶元三年正月丁酉遂合葬於西尖之麓髙光中墓志銘閩有隱君子曰髙光中長溪桐山人也光中嘗入太學登乾道五年進士第試吏州縣非故隱者也以其德足以堪此名余故從而名之也光中𥘉調餘杭尉不肯為勢家所撓尋以護細民不便於屯所官見中傷罷丁父憂服闋調同安尉復丁母憂遂不出巳而所識為中缺都官為授衡州司户參軍光中志巳決矣古之人有不仕者非避地以為髙則玩物以為適不然則故自汚辱混迹於屠釣猝有所動於其中憤惋嘆嗟詞氣茀然矣以孔門所論次荷蕢耦耕之倫皆豪傑之士也而其言蓋有所刺譏是有不自得者也凡不自得者皆咎根也曽點之言志孔子獨有取焉夫難平者人心也易感者物變也故不仕必若曽子而後樂也光中之不仕蓋有見於此也而非欣厭彼世所謂夷險名謗光中𥘉不知也蕭然退藏不滯于物當義之急常與衆同自衣飯至室廬之節無或過於人自家庭至鄉黨之好無或不及於人也嘗擇泉石之勝作無餘堂小亭三四所以娛朋來間從兩僮篝衣贏糧訪幽人於數百里外意象可觀輒忘歲月或違雅致亦不黽勉年益髙務學益篤晚而讀佛氏書曰是吾易之無思為中庸卒章之旨也光中由是所造深矣故光中非隱者也余謂之隱君子以其德足以堪此名也桐山距永嘉數舍光中樂其風土之美時時往還諸僧坊中莫之識者慶元之乙卯元日忽語過客曰行且與諸君别尚須一至永嘉爾明年果遊永嘉取舉子時所為文藁若干卷焚之而後行至則托淨光山踰月乃歸道過􅊚黨不肯晉私戒其僕曰亟歸亟歸無為吾兒纍也歸十日得疾但不食家人竊相與謀強飲食之語聲未出光中巳知矣又十日坐逝于正寢是歲四月六日也享年六十有八諱某娶溫州平陽縣陳氏承事郎竑之女一子松迪功郎台州臨海主簿紹熙元年進士也女適儒林郎新監行在文思院都門丁執禮進士陳龜齡孫峻屺崍女一人松從豫遊久將以四年某月某甲子奉其柩葬于縣遙香里之姚奧來乞銘豫習髙氏家積善事父某自號止堂居士沒之日設榻于正寢坐逝焉後數年妣王氏亦逝於居士之榻光中之逝復就此榻也聲𦦨赫赫然世不知幾人父子母不相期危坐于一榻以正終則自余省事未見如髙氏者也是冝銘銘曰陟此山之岡也相此柏與松也其誰不曰是吾疇昔所謂髙佛之藏也陳百朋壙志陳子端已將以慶元五年十月十有四日癸酉合葬其父于平陽萬全鄉管奧之華原來乞銘余嘗銘其母夫人林氏則又奚辭屬衰惰銘未即就為書其名字歲月納之壙公諱天錫字百朋曽大父伯諸大父宗慶父希淵享年八十有六以是年四月戊辰卒三子明畏端巳彪彪為浮屠氏女嫁瑞安朱次宣男孫四人文武遇邍女二人餘語在銘中王道甫壙志嗚呼此吾友王君道甫之墓也道甫諱自中皇曽祖髙皇祖成子父廷佐贈朝奉郎母施氏封太安人道甫登淳熙五年進士第調舒州懷寧主簿嚴州分水令未上以樞密使王公藺薦除籍田令未幾罷通判郢州未上知光化軍信州召赴行在丁太安人憂服闋再𬒳召以論罷主管建寧府武夷山沖佑觀起知邵州興化軍連以論罷興化之命下道甫已病慶元五年七月也八月二十三日卒官至朝請郎年六十娶林氏封安人二子長曰更生次幼四女長適國學內舍生髙熙績餘許嫁進士曽充宗周伯麟林浩道甫居溫之平陽歸仁鄉晚徙縣之橘莊雅愛仙壇僧屋之後山因以為墳十有一月二日林夫人奉其柩葬於此人皆知道甫少有志當世嘗以布衣上封事及對語合上指除官才數日趣舉其類奏上道甫由是絀光化入覲今上皇復有朕得卿名於夀皇之語道甫竟由是死云云為恨不知道甫歲晏抑才為學去智為恬假之持久何造不深余欲銘道甫也以此而未克就故識其壙云族叔國任墓志銘傅良逮事諸伯叔父於叔父行以長者稱公為最聚族為學也於輩行齒宿而才壯公為最晚各務莊重擇交雖一笑嚬不苟亦公為最公德人也而竟不仕娶朱氏良配也無子作室奉母門巷深靚升其堂如無人窺其户吟誦琅然者公燕私之所也間肻一出獨過吾廬時時以從子某冝後我為寄今宗洙是已於淳熙之十二年二月十日午夜來見速至則息浸微請故公曰子從吾叔母取管鑰付吾兒夫人哭方悲亟出管鑰復命則公瞑矣公侍母之暇退即書案夫人執家政不以米鹽煩其夫自一匕撮公鮮知其出入有無也婦德多嗇一夕從顧言無趑趄意課佛書或施舍焉終其身嗚呼公誠知家事與母孰重故聽於夫人夫人亦誠知家事與夫孰重故聽於子是皆冝書而公德人也淳熙十有四年十二月壬申葬于嶼山之陽屬傳良之官未及刻其隧夫人以慶元四年十二月十九日卒享年七十有六宗洙以六年十有二月丙申合葬于公兆於是併書之公諱方中字國任世次語在公壙志中宗洙今為太學免解進士女一人適朱克勤早卒男孫二人怡老瑞老銘曰惟親其親必利其嗣人洪君墓志銘台越間從余遊者幾百餘人雖從余遊而過其廬識其父兄者才數人過其廬識其父兄至於數會如始至歲久益敬不懈者則居士洪君也居士天台人故清貧僅僅無乏于教子特不自計度余𥘉入太學芮公祭酒挾二子下交於齋序余懼弗堪走天台之國清寺西菴者數月居士之子霖纍強余不出出即居士倒屣外門婦子羅拜於庭矣每顧霖先生飲食欲如何於吾館便否乎苟足以恱先生余雖飯脫粟避寢喜也霖亦特刻苦遂為台越間善士先逹素官以子姓為寄甚師尊之郡守丞有志於訪民利病者必就霖也而老於韋布或曰居士教子之志未償以余所暏百餘人中有第進士者矣或名字淟汩無所著見於世以死者不少而第進士名字不淟汩嘗有所著見於世者往往在𢾗人中然而志不伸嗟窮而悼屈者尚不少今霖也為台越間善士為學者嚮往之如此為吏者器重之如此而居士之家聲益髙諸孫益有文人之入其門巷者則曰是義方之家也由此觀之教子之志償耶未耶居士諱某字某娶葉氏夫人賢不愧居二能與處清貧僅僅無乏於教子不自計度者也一子霖也女若干適某氏孫男女若干人以某年月日卒以某年月日葬于某所霖怯多病癯癯然如不自持千里褁糧來乞銘其人余為之悲甚而許之余亦病矣霖請更苦余亦苦辭竟不獲而略道其交情以塞在之意而不暇詳焉要之居士以孝慈溫恭庶幾於古人為家學云銘曰位斯可喜也亦可愧也親斯可久也亦可朽也視此詩耶宅此丘者誰耶令人張氏壙志是為陳子傳良之妻令人之墓令人姓張氏諱幼昭字景惠永嘉人草堂先生國子小學録輝之孫主管禮兵部架閣文字孝愷之子揚州泰興縣主簿東野之姊蓋登進士第三世矣以乾道七年歸于我慶元元年八月丙子卒享年五十以其年十有二月壬申葬于兹嶼去家二百步生四女長適進士潘子順次適福州閩清縣尉薛師雍次許嫁太學上舍生林子熙將仕郎徐沖余同年進士知信州上饒縣事潘君雷煥户部侍郎薛君叔似工部侍郎徐君誼之子而子燕父故直龍圖閣林君季仲之族廉夫又從余遊也令人𥘉得女遂以余兄子師轍為已子以進賀太上皇帝登位表輔迪功郎福州羅源縣主簿次子師朴以紹熙五年大饗恩輔承務郎二幼女令人窮約時來歸我相從二十有五年再以臺評罷食貧歲月視食祿為長深入湖湘起居飲食非其性多病所侵未嘗有毫髮不滿意見言色余敬如賔友今亡矣嗚呼哀哉余既走介乞銘於太府卿葉君適而自識其略納之坎中止齋先生文集卷之五十
