front:
  text: 止齊先生文集卷之七
  hash: sha256:9c12c4aa01d1c4cc987b9b6ae6b96dd0871f12947b3bf5525b57d3505f7510c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_007-1a}
body:
  text: 律詩上皇子嘉王生辰詩三章兩宫頻燕喜交舉萬年觴㑹慶川方至重眀日未央聖賢何繼世孫子更宜王聞說斯干夢祥占近一陽造次依儒術朝回只一經更無他嗜好端是衆儀刑符應當良月聲華自妙齡帝垣從此日光熖粲前星要識皇圖永當觀藝祖𥘉維持今盡是回復更何如庸陋誰推轂衰遲此曵𥚑慙無為夀具獨䄂一編書方講藝祖實録故及之袁起巖㑹飲湖上出示古刻酒罷各携桂花以㱕因成一絶湖光不動見魚蝦敗𥿄殘編數十家巖桂叢中三四客醉㱕人得一瓶花又和湖上簾須半捲蝦調冰雪藕各名家有人不解長安飲話極茶鐺吸井花寄陳同甫古來材大難為用納納乾坤著幾人但把雞豚燕同社莫將鵝鴨惱比鄰世非文字將安托身與兒孫竟孰親一語解紛吾豈敢祗應行道亦酸辛送辛卿幼安帥閩長才自昔恨平時三入修門兩鬢絲瓮下可䏻長夜飲花間却學晚唐詞澘然北顧關河水簡在西清日月遲乘鴈雙鳬滄海上與君從此恐差池送盧郎中國華赴閩憲相望千里馬牛風聯事湖湘各巳翁造次便呼兒女見綢繆略與弟兄同百年又是梅花發萬事何如荔子紅欲附使軺嗟不及却憐身在俊躔中送范大著文叔知彭州中書世祿今無幾唐鑑家聲世不多安得有人賢若此忽聞去國意如何同朝最是頭先白知已還愁語太苛盡欲讀書三萬卷蓬萊未必似岷峨和劉進之韻兼簡吳阜之憧憧滿眼事何稠落落論心思獨幽去國未䏻身一葉懷人但覺日三秋池塘春草方同夢江漢㱕舟更别愁安得簫韶儀兩鳳不妨燕雀自嘲啁𥘉夏有感因用前韵久旱適得雨欣然卒章湖山嫵媚緑隂稠誰向藝藝得趣幽半破榴花方恨晚新來燕子未知秋去為吏隱雖吾碩㱕得家山政自愁賴有雨聲寬百感忽如孤鳳見羣啁送潘德久之官建康平生不解通毛刺萬事無䏻改鬢華豈是襟懷堪逆旅直須詩句可名家老為賔客從戎幕强使妻孥理帽紗不有將軍寬禮數新愁却恐墮江花同遊張園酒中各嘆明年未知誰與此㑹余最哀病冝去因作詩識之春過新烟䏻有幾愁生飛絮轉難禁可憐衰白隨年少愛看殘紅到夜深一輩衣冠方事事故園松竹已隂隂明年此㑹知誰共鴈蕩山前寄好音次韻奉酬方輝先也知朝士愧山林猿鶴相懷怨亦深屈指落花年荏苒斷魂凋鬢日侵尋向來相與期何事老去誰能㑹此心多謝故人重話舊獨憐志古定遺今送倪正甫侍郎賀正雪枿氷芽又復春中原覩屬車塵歡呼漢節從天下愕立胡兒夾道陳老去獨慚偃蹇君行决意問經綸顧瞻河洛關心處應記幽燕用事人喜雨天顧於人略有情片時收盡越山青老農望外扶犂立倦客愁邊擁被聽塵翳欲清閶闔道井花巳上轆轤亭冥冥直待黃梅熟未要風池看約萍送曽繼先赴山隂路鈐鬍髯白盡猶強飰髀肉添多未跨鞍不向胡沙親矢石却來橋冢護衣冠歸舟自此長相背薦墨于今尚未乾只恐燕然他日事獨無名字可同刋送何起巖之江東苦吟海內知音少獨往江東問政頻我亦他山於此别世無吾黨更誰親六朝故實皆新句一代風流尚幾人話次儻懷無恙否為將衰惰再三陳上元日同京仲逺趙德老羅春伯謝子肅訪郭殿帥遊鳳凰山次韻層雲飛鳥共危欄江漢朝宗萬折盤王氣信知千古盛聖圖兀自九朝寬公餘曵履探殊勝酒罷磨崖記衆歡衰惰不知能健否相從河岱㺯柔翰癸丑冬車駕過宮留相還朝一聲警蹕接天齊馳道無塵馬不嘶月御順行隨日轂乾端和氣匝坤倪三槐相繼㱕公衮細栁還須聽將􅤯老矣尚䏻歌二聖不應專美在浯溪和樓大防尚書送行韻齊年兄弟又齊名啇略行藏共此生自昔從君曕馬首如今輸我與鷗盟讀書松竹交千載曵履星辰聽五更借問塞翁誰得失請無一語到留行折子明提刑自湘中以詩問訊用韻酬之久立天涯詠式微胡然華髮尚望㱕簮履便冀君恩到蓋惟當世豈無君子論人詩湘中一似桐鄊好安得扁舟著釣絲泊釣臺灘下今歲僅餘今夜月此舟三泊此江沂遭逢明主還遺恨慚愧先生獨見幾泗水列侯多不免湘山四皓竟安㱕漢家故舊嘗枚數孰與東南一釣磯臘月望泊舟釣臺灘下賦詩既而登婺女明逺樓誦之鄊丈陳德承同集黃竒卿張伯廣因書以遺德承之子性甫直甫後春六日奉和德承韻兼簡竒卿伯廣為别行藏獨倚少陵樓怨鶴愁猿孰與儔嘗與萬人爭魏闕何如一􅊤老莬裘追隨士友從吾好領略江山自此逰急趂梅花理歸棹雙溪為我亦西流贈杜伯髙臘後玄冥意氣驕餘寒造物亦亡聊風收夜雨春何淺雲障朝暾雪不消真悟此生才半歲恣聽何處是三朝粲然一笑將迎我賴有江梅慰寂寥除夜宿處州天寧寺人言老去不如𥘉我愛𥘉心老轉無懶向門前題欎壘喜從人後飲屠蘇杯盤甚簡眠須早禮數多寬拜要扶况復齁齁僧紙帳雞人不聽禁庭呼寄僧嗣清衡陽傑閣宵人記淮右豐碑刺史書永已橋山藏劒佩空餘雲漢照林廬河圖萬古陳東序汗簡諸儒校石渠誰道幽深窮衲子乞錢買石更﨑嶇余與嗣清作雲章閣記欲刻之衡山不果今清來致舒州吳使君所書閣記石刻一本蓋投子山碑也於是夀皇晏駕一年矣讀之涕泗交下頃為學官逮事夀皇滿歲當罷去而對班尚在數月之後遂乞𥙷外晚為祕書少監㑹聖政書成𬒳㫖詣重華殿進讀首篇夀皇色甚康顧視良久益恨平生之不遭也因作詩詒清以附碑隂蔣處州仲可惠酒括州太守亭侯及與前時一輩遊剩欲池塘看芳草謾隨烟雨上危樓無錢可解催科拙有酒能寬放逐愁可笑杜陵嚴武客時時傍舍過墻頭再寄用前韻幸無骨相可封矦㱕理先人舊釣遊山下剩栽諸本竹水邊須著數間樓羣書可讀自隨喜一客不來誰與愁時把釣絲銷永日魚兒亦得兩三頭丙辰寄國舉兄是間南極老人星喬木修篁亦有情直向朱明為後殿不隨黃落入秋聲兒孫衮衮看新出兄弟團團得晚成笑閲世人心事短却從黃老問長生送長溪髙國楹從學朱元晦洛學今無恙東南屬此翁從遊雖已晚趣向竟誰同一第收良易遺經語未終㱕期定何日我欲叩新功以兩鶴夀薛象先日與山農共一㕓不應家有四乘軒殷勤分送平齊下為看蟠桃熟幾年重陽日寄瑞安劉宰留宰以是日宴新第人併見招不及赴落帽沾衣總失真追隨茰菊亦勞神酒無肴核依然好家有溪山豈是貧沆瀣從空來夜氣青冥隨處際秋旻不知此是登髙否為問慈恩塔上人和林宗易菊花韻一歲所餘秋有幾重陽偏與老相催每憐白髮䏻長健雖愛黃花亦懶栽好景遊從須好友新詩風味似新醅人生適意無過此恣聽東籬早晏開和沈仲一北湖十詠北湖只隔嶺頭雲誰在湖邊問訊人若得小舟通我過雨晴須破半時辰右北湖人去岷峨水自流豫章三字竟沈浮懷人好上層樓看木落山寒不肯秋右豫章閣可愛南山與北山北山上有斗芒寒碧雲㱕盡人何在更捲朱簾到夜䦨右仰止亭平平下語及雲管學到詩人豈不難莫似人大芳潔湘波千古訴椒蘭右藥房一年曽得幾畨圓恨不驂鸞上廣寒占得波光須細玩恰聞滄海巳狂瀾右穆波亭欲來花底竟差池我有佳名誰與㱕翌日看花天一色狐裘猶自織寒機右粹白堂借無舟楫亦褰裳目斷蒹葭水一方今夜不來同剪韭隔山明日事茫茫右遲客臺萱草須鋤莫放深竹須剪伐待成林一花一葉皆相附要使兒孫識此心右萱竹堂紛紛萬木盡西風獨立霜林我御冬澤畔無人誰著語止齊但護紫泥封右楚頌亭余雅愛頌橘之語仲一欲以名其亭一日出所藏潜邸頌橘二字遂改今名看花只為雨愁人一片才飛减却春獨此得春無盡藏每於愁外見精神右冝雨亭周宣義三子仲敏明幼謹同年登第因以前韻奉寄營營浮俗贋還真孰與傳經妙入神一榜及看三子貴數椽能忍十年貧自將弧矢書閭史便使氷淵誦小旻家學如君今有幾殷勤羅拜我何人再次韻簡新第諸人行酒何如溫太真風流元不鄙錢神扁舟容我㱕米老一子令人買得貧雖有羣仙來月窟𣣔扶衰力上霜旻吾今巳定漁樵約勛業煩公一輩人送瑞安尉林叔全尊人還鄊論交海內略飄零最晚相看却有情不以一經誇魯諺自於二子識徐卿橘香賸與蜂衙晚麥信急傕鳩喚晴天氣正佳歸恰好莫將愁思為空名送林叔全秩滿㱕四明三年絶境興誰同雞呌桑巔犬巷中但欲户庭多暇日不將鞭朴奏膚公相期霄漢搏風翮每見燈花綴玉蟲此去逢人臺閣上丁寧莫道止齊翁送雪庵瑾禆師還山五馬逄迎甚闊踈滿朝問訊近何如諸公極有遲留意一日連收竟别書佛法盛衰千劫後人生老壯百年餘向來遊舊今亡恙願得斯人尚起豫周和叔通判雪寒索酒戲用來䪨以將朋尊持杯雖念故人寒欲豫還不似印刓此債豈應行處有麯春何日寄雲安和叔入蜀故云奉和周蕃伯用王道夫䪨二章見寄森森萬木一精廬黃卷青燈自卷舒却肯追隨三舍逺不論聞問十年踈遺賢公已長懷玉老圃吾方欲荷鋤安得謝巖題壁處一尊相伴看芙蕖論定千年後心寬萬事平吾方慚鼠伎安敢道鴻冥門户雖人滰溪山亦世情半天喬木立盡日好禽鳴夀叔祖母與先人同生三陽昨夜轉洪鈞鳳曆今年又紀寅再拜與君觴夀母更生猶我面先人兒孫夾侍渾忘數梅栁前陳不記春從此常為湯餅主賸看諸婦抱麒麟東陽杜季髙逺訪詩以送之當世關衰壯斯文看合離強餐吾豈敢後㑹子何期村落秋彌好溪山晚最宜逢人相問訊所缺更䏻詩春日和林宗易韻白與紅兼盡落梅小園獨步日千回浮空曉色臨無際排闥春光撥不開學語新禽更後囀鋪茸細草雨邊來却憐追逐今無力放下簾鈎就麝煤移花櫻柳初無素與蠻可將何物伴身閒欲栽花木千餘本但候春風還未還送花還宗易酷愛看花懶種花知心惟有故人家花開分送花殘取娛老抶衰度歲華逰鳴山寺徐一之兄弟載酒即席和其韻惰歸春力不勝驅風雨尚愁人撡𥚑掠盡殘紅前日樹催還新緑去年畬相將興盡隨花􅓏賴有朋來載酒車但得從今身尚健吾鄉風物勝匡廬和徐叔子用林宗易韻見示相過風雨獨何歟校酒論文已不如方信深交相戀嫪却因衰退更躊躇吟生池草書成束飲落簷花醉墮車明日待隨公等去我頭應始自今梳和徐叔子勸農韻呈留宰親從蓑笠問飢寒赴訴人人得犯顔更向棠隂聊憩茇要令粒食共鮮艱身歸雨露司存後詩在山川刻畫間飽飰之餘能細和止齊應有幾年間逰金奧趙園賦海棠梨花呈留宰海棠故作十分紅梨更超然與雪同文物英華周盛事風流玄逺晉餘風赴留宰寶壇之集因和蕃叟弟趙園韻一枝才放前村雪一線初開愛日天潘縣風流凡五客趙園名字亦千年可無䏻賦如難弟恨不曾來有尉仙待得中興用循吏更於此地設離筵示留宰縣樓即日氣橫空施及觀潮亦奏功曾上石岡看蟻穴當圗一飽到三農或以詩送來禽次韻奉酬連年栽樹未成隂赬實堆盤慰我心手把新詩堪永日休誇法帖送來禽隔水佳人久不逢祗應我懶或君慵感時相饋情何厚却說雲泥笑殺儂遊雲頂院和徐叔子韻老大生憎兒女態更無春怨與秋悲略將杯酌隨宜具剩有溪山取次嬉愛客不妨兼泛泛論文何苦太竒竒况曽窺得尊生術通昔蒲團日一炊夀薛象先蕭然山澤一臞仙故𬒳聲名絆俊躔祗為春秋同社燕遂歸風雨對林眠中年曽未鬚眉白盡日全無車馬喧我有夀觴誰與共㑹昌湖上釣魚船酬蕃叟弟韻朋遊同一輩伯季自相師薄䆠俄衰暮清歡僅暇時我懷青冡曲子念紫荆詩但得無憂患幽棲豈不宜夀潘省之泛水淺紅荷十里蔽雲濃緑木千章旁無俗子同居巷中有臞仙一瓣香今夕還知是何夕吾鄉終勝似他鄉雙鳬便合青冥上笑看兒孫樂未央丁巳夀國舉兄歲自為詩歲自𢋫愁無新思思還生更從今閠書𥘉伏待看何年值後庚漢網疏如天地濶奎文下與水雲平弟兄長健貧何病判解金龜當一酲止齊先生文集卷之七
