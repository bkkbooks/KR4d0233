body:
  text: 止齋先生文集卷之三十九記選德殿記代周子充內翰撰進元藳今藏沈仲一家皇帝踐柞以來宫室苑囿一無所增修獨闢便殿于禁垣之東名之曰選德規摹朴壯為陛一級中設􅃮屏書郡國守相名氏其上羣臣有圖方略來上可采者輒棲之璧以備觀覽數延見文武講論治道訪求民隱至于四方奏報參軍國之機務皆於此省決暇則紬繹經傳或親御弧矢雖大寒暑不廢臣某俟罪禁林間嘗奉詔獲至焉一日命臣汝為之記臣愚學不足以推廣聖意詞不足以鋪陳盛美謹但采禮詩古文以射觀德事及歷代冶亂興衰大端次第其説禮君世子生三日射人以弧矢六射天地四方其早計若此至于擇士以祭必于射也進退天下之才與祭者繇是得為諸侯卿大夫若屬有賔客之事燕勞之寵莫不用射詩人又于其獻酬歌咢之餘中度不中度罰爵與否有所戚休刺美以為是王公大人風化黎庶者之本也由此觀之古者君臣周旋禮樂以服習勤苦可不謂先事知懼安而能危者哉是故三代而上士大夫皆可獨將而兵民為一戎不生心世用底定比其季也徒以為威儀觀美而實不稱馳騁戈獵而政不舉則國人為之隱憂而變風作其後王道浸缺而文武兵農遂分而不可合一夫荷戈海內騷動社稷之主以兵廢興蓋自秦漢下迄五季數千百載間大抵亡具而漢之車騎材官唐之府衛一一近古則享國最久其效可賭矣以臣所按三代舊聞放乎漢唐文武離合之際要之國家間暇以戒懼為本天錫陛下厲精百王之後追蹤太古之上乃為是殿以訪群䇿以裁萬務以閲圖史殿不主手射也而託名焉射不專于覿武也而尚德焉聖謨明逺于以覽示中外感諷臣子敵國外患之慮甚深甚至昔宣王中興其詩曰射夫既同助我舉柴序之者曰是小雅盡廢而復古之詩也治有先後功在不舍沉潛剛克時乃天道陛下堯舜揖遜而可以為湯武臣實以是重修石岡斗門記元豐四年宋興百有餘載矣郡承趙㞦景仁行縣與令朱素履常隱士林石介夫賦詩記事則有觀石岡斗門之作是時國家方修農田水利之政通守與其屬邑若布衣巡行吀陌詠歌民事而郡守李公鈞報之以詩亦相勞苦往還如交遊豈不盛哉而事何患不集者然詩不著其所始則有門舊矣不知其起何時也紹興之季年屋閘俱壞獨兩股岸與溝底以巨木為之長或三丈而厚徑尺有屹然存者往往朱令之遺迹也余為兒時逮見父老多喜道斗門事蓋門始附穗豐山之南址以距海逺寫水不效而議遷置三鄉之人聚訟不決也須時潦至乃為木鵝數十即並山諸水所發源縱之而觀其所會則旦日會于石岡又患其平壤不能音耐歲月涸而審之皆磽埆沙磧與地名不謬穴以鉏鍤率人日得土盈斗于是定遷則其謀始甚長雖更元豐之盛人精其能慮不可易浦堙而門廢民久病而官不省乾道間莆田劉朔為司户喜事及物隱士之孫以告劉輒率余夜詣門所遲明天大寒垂垂欲雪招漁舟泥行數十里役夫皆凍栗幸且巳而劉不巳竟遵海堧引絙以度其浦修廣之數而歸白郡郡不果聽又三年故國子司業王公速為守嘗用錢五十萬民夫二萬四千通其故浦然是役也浚浦之功居多而以餘力及門唯攴傾填漏苟完而巳蓋以俟後之人而復不省浸趍于廢知州事李公稢與通判謝公傑慨然念之謂主薄石冝翁能以錢七十萬俾治其役發視遺址則股岸之木蛆食之過半底板亦浸淫潄嚙穿􅗜百孔矣知縣事劉龜從又勸得民錢六十萬而縣自助致五萬冝翁因擇其鄉之秀黃廷瑞者三人以蒞匠以石代木撤舊而新之為岸若干丈為底若干丈為閘之裏蔽若干丈益其柱若干為若干上為覆屋旁為輔梁凡百可久無不臻極不惟還吾民之利如𥘉而又過望訖事公以劉石之請屬其為之記嗟夫自元豐至于今又百有餘載矣人多言時不同吏道相繩切益薄顧事無可為者惟公惇大樂易不以獨見之明治郡謝公以風流文雅時出而緣飾之上下相安闔境自以無事因以整暇之際出帑錢四百萬治三邑之道阻而且為此門既付之人則一聽其自為淹速良未嘗過門饋勞時至無以簡書故其人不以見察為憂而以欺為耻務趍其難用情于文具之外以求追元豐之迹尚可以想見承平盛時為長吏者之意向使紹興之末官與民同患如此則必不壞使劉司户之説行雖壞亦必不極近十五六年間有輔門事之缺猶不至如今日大費甚勞而難復然以積壞之極費大而勞甚視元豐特為難而卒復之事之廢興要亦顧其人如何爾但曰時不同事無可為者吾不信也淳熙十二年三月溫州重修南塘記自中興永嘉為次輔郡其選守蓋多名卿大夫矣然境內有冝治者三間歲貢士群試且萬人于浮屠宫中草舍託處一冝治兵與民雜居頡頑市人間要束不行而鬪訟多二宜治州城外南逹瑞安有石塘百里所不知起何時而歲積壞傾者為嵌陷者為匯遇時潦咫尺不得進往往溺死自閩山至于吳會去來者病之三冝治而歷年久更太守幾人皆畏其役不敢議議輒弗就雖僅就亦苟簡復廢者何哉吳興沈公治郡之明年謂賔佐曰上方朝德夀宫為夀加惠宇內詔減算錢之半吾屬備數奉詔何以仰稱而適無一事可以宣勞效能廣上意者唯是郡之百廢終將纍民吾幸逢年帑有幣餘而嗇其藏失今弗圖以煩後來將安取此也于是作貢院于是作五營蓋晚而有以塘事告者公與通判率兩邑大夫即里居謀曰役復有大于此者乎奈何使吾民錙聚銖斂竊自支輔甲前而乙郤也苟無愆時工勿問庸幾何苟無乏事石勿問價幾何輿匠肯來市無強賈自冬十月至今三月而塘成凡是役邦人亟請于州于部使者前太守李公以錢三百萬提舉勾公嶽公繼以米四百斛倡民興之民亦輸錢案至四百三十二萬起淳熙十有一年而事不集今糜錢一千一百萬而弛民錢六百五十餘萬不取邦人以是役為冝書而屬豫焉以豫所聞于公者如此况州縣官數易事彌廢熙寧考課又削橋道弗擬世相蒙習以偷為得間有興作則議者顧曰是希進務以出名迹則又曰是一切厲民為美觀爾則又曰彼將以為利長吏雖欲自信而不得騁公以法從舊人起家為郡且復用矣向使過計收聲飬尊安用事事而獨意鄉不撓愈勇以今較昔難易淹速是皆冝書然公他所為便民者雖多而其大者在石塘水行御艫陸行躡踵更相和歌不爭以賀夾河老翁有年七八十者攜持小兒嬉戲于其上不謂繼今民免于死或為詩謡或香火以祝公且乞田二頃嗣歲積之蓋欲公德與是塘為無窮云公名樞字持要前為太子詹事兼吏部侍郎淳熙十四年三月記重修瑞安縣學記縣學故有記政和間右丞許公景衡記蔡侯景初徙置學事紹興十二年敷文閣待制宋公之才再記王侯誾修學其推本國家長育與名教之尊山川風俗備矣二公言語至今為人貴愛則二侯固與不朽劉侯龜從今更治學講堂廊廡廚湢皆一新之講堂絶巍壯餘為屋四十楹凡糜錢二百萬而人不知也邦人德侯屬傅良記之顧晚出何敢次二賢之後况侯之政豈必待余文而傳也蓋聞崇寧之際天下之學盛矣提學有官贍學有賦上之加惠諸生甚隆也而有司方以三經造士自春秋不得設科非王氏之説皆為大禁當是時吾邑已有學置弟子員如他所然三舍之興無一士能取聲名者始林石介夫先生不為新經以春秋教授于鄉既而許公與沈公躬行謝公佃偕同郡諸儒又嘗越數千里外竊從程呂二氏問學於舉八行也四方之士有為繆巧應書者趙公霑乃逡巡愧謝不欲充賦郡太守強弗能起後生小子更益視效蒸蒸務自修飭矣中興新美學校之化嘉與復古罷三舍還之鄉舉列春秋學官使士得各自致其説而無禁諱於是聖天子思所以風厲學士柬求其人首得吾許公以參大政於是婁公寅亮以上虞丞言事即日拜御史它往往繇布衣召見溫為東南支郡瑞安又屬邑而一日以多士名天下天下引領慕向之豈不盛哉則吾邑之學視他所為如何也而歲月久寖趨於廢以余所逮聞五經各有師弟子非其經師不輒授人弟子亦不輒詣它經師受業歲時會於學少者拜長者長者平立過市必冠帶飲酒不踰三行一人有過衆人切磋言之蓋遺俗然也而今亦少異矣劉侯公非先生曾孫也以家學為縣識所先後又常常樂道吾土風之美去有日待士如始至也以所藏春秋權衡意林説例傳鋟之學歸負祖訪間田將以追舊學之迹侯之望人厚人亦宜不自薄余故誦舊聞表見吾邑學者本末如此以勸後人餘巳見前記者則不著淳熙十三年十月記袁州分宜縣浮橋記分冝浮橋為舟十有六袤四百尺廣十袤之一前轉運判官劉公經始副使直龍圖閣趙公成之凡捐錢不啻一百萬佐州縣之費仍率三歲以五千錢當河渡之人入而幹辦公事楊君潛能贊一公意主簿劉君孟容眂其役訖以不擾最後知州事黃君劭知縣事鄧君友龍至恨不在役中州率歲儲錢二十萬以待修繕縣伐石記之相與圖是橋勿壞乃巳橋于邑便甚橋北地勢下為治所南髙為上供倉邑東西兩山善束水每時雨大至水輒冒邑北民騎屋危望岸南爽塏咫尺不得往避南民欲朝夕販于市者亦不得往就也倉與縣離立輒租者常病爭舟父老計之熟數以為請於是始集世多言儒生論治但曰得人得人此何等軟熟語毋亂吾聽由今觀之分宜于江西邑為小浮橋于分宜事益為小大吏必得如數君子者小吏必得如數君子者于是始集向使二部使者相先後不同出一意必且中輟幸不中輒而幕中贊不力邑中治其役無具即必不速就雖速就後之人惡莫已出壞勿壞聽自如何則亦難久余不足以知天下事嘗言以其小且易者度其大且難者當世君子誠同出一意如此贊其畫者昭其事者如此後之人以勿壞為已責又如此往往天下或可為矣余樂是橋之成且以劉鄧之請為記因著儒生之言固有不可廢者劉公名頴趙公名善俊潭州重修嶽麓書院記白唐季至于五代用兵而教事闕聖人作四方次第平以爼豆勝干戈而天下靡然日趍於文蓋宋受命四年遂平荆湖又十有一年尚書朱洞來守長沙作書院嶽麓山下朱在國史其行事不甚較著足以考見上意所鄉為吏者皆承休德知所先後如此豈不盛哉而其風動抑何速也五六十載之間教化大洽學者皆振振雅馴行藝修好庶幾於古當是時州縣猶未盡立學所謂十九教授未有顯者而四書院之名獨聞天下上方崇長褒異之者甚至則其成就之效博矣熙寧初行三舍之法頗欲進士盡繇學校而鄉舉益重教官之選舉子家狀必自言嘗受業某州教授使不得人自為説崇寧以後舍法加密雖里閭句讀童子之師不關白州學者皆有禁詔令誠甚美然由是文具勝而利祿之意多老師宿儒盡向之書院不知起何時以余所聞漢初郡國往往有夫子廟而無教官且不置博士弟子員其學士嘗課試供養與否關不見傳記然諸儒以明經教於其鄉率從之者數十百人輒以名其家齊魯燕趙之間詩書禮易春秋論論家各甚盛則今書院近之矣縣官時時遣守相勞問致饋為禮其門生皆世守師説更相傳受不易業蓋至孝武帝時郡國始稍稍有學校官由今觀漢晚出視其初儒者術業工楛優劣可知也巳方大中祥符間天子使使召見山長周氏式拜國子王簿詔留講諸王宫式固謝不應詔卒還山肄習如初至賜對衣鞍馬內府書而宋有戚氏吳有胡氏魯有孫石二氏各以道德為人師不苟合於世著名余以是益嘆國初士風之孕本之師道尊而書院為不可廢乾道元年故師樞密劉公珙克復門寶之舊巳浸費治今直徽猷閣潘公畤亟踐修之某得官桂陽於長沙為屬邑姑詣大府請事時公至鎮適數月矣與九郡守要束咸以寬簡闔部晏然民吏意得曽無凡目可以再三於有司者因得陪别駕後至書院謁諸先生祠下會修事且輯諸生穆然而志專徘徊樂之不忍去也既去州教授兼山長顧杞堂長吳獵以訖役屬為之記某嘗獲誦侍講張先生所為記及于治心修身之要湖湘之俊亦既知所指歸近歲以其論述由大學禮部奏名及對大廷連為天下第一他未試可略睹矣雖欲有言無以出講聞之外者而公于今卿大夫為先進年益髙聞望益尊重人人能道之又何待余言者故但次書院所從廢興之故繫以歲月而強附名焉是歲淳熙十有五年雲章閣記臣恭惟夀皇聖帝在御二十八年宇內之士可謂遭時矣臣為布衣識僧嗣清于行在所之西湖淨慈寺清尚年少土形木質窮晝夜或纍日不飯𬞞飲水一破衲凡數十寒暑其徒類訕笑之士大夫猶未甚有識者然時時聞𬒳旨入禁中莫知上訪何事清所對者何語臣每惑焉隆興乾道之間方講修內外之政惟日不足有以作士氣寬民力足兵長財之説進則朝上而夕召見或不淹時至逹官貴人而空談不適用但習𥿄上語云云者往往不録蓋舉選人必考課勞迹果如何進士必習弓矢于殿庭試中與否而群臣方病不知當世之務趍于實學于是時上安取于嗣清而嘉與之如此後二十年為紹熙之元夀皇禪大寶今上適再歲燕居殊宫淡然遺事物之纍恭儉滋甚玉食日不費萬錢而嗣清則亦去江浙南遊湖湘之間矣臣乃釋然窺見聖意鄉者凡以傳求宇內之士隂訪幽隱庶幾有豪傑者不但為佛法也雖然佛法幾墜清于是時能以苦學動萬乘世傾回之豈不盛哉其南來也無一物自隨當暑行數千里未嘗宿人家獨所受上賜四句贊詩銜袖不懈始至寄藏臣所為之震疊巳而師臣趙善俊請住南嶽之福巖寺明年臣行郡過山間既拜稽首瞻想宸翰且嘆曰雲漢之章足以鎮兹山矣顧未有尊閣之所其徒遂相與作雲章閣藏焉而求記於臣維嶽之尊維宸翰之光相與為無極也抑臣何幸附名碑隂死且不杇又拜稽首書之溫州淹輔學田記郡校官有賜田自慶曆四年始於是宋興且百年上所以加惠學校之道備矣崇寧學制行郡各置博士弟子員費廣不繼用事者文飾過當至苛斂以瞻之中間多故輒一切弛去往往所在凡校官之入不足以待學土之版直煥章閣司諌謝侯來守永嘉下車才數月修墜緒早滯訟人用乂和乃以其暇訪求里中士賔致之學又得公田民私以為利而不應令者歸于學有司闔郡驚嘆方為吏者急他務不暇有學政侯顧獨加之意耶相與請於博士李君求余文記之余固樂道乎此者也蓋宋興士大夫之學亡慮三變起建隆至天聖明道間一洗五季之陋知鄉方矣而守故蹈常之習未化范子始與其徒抗之以名節天下靡然從之人人耻無以自見也歐陽子出而議論文章粹然爾雅軼乎魏晉之上久而周子出又落其華一本於六藝學者經術遂庶幾於三代何其盛哉則本朝人物之所由衆多也余嘗求其故三君子者皆萃於東南若相次第然殆有天意而浸灌培埴斯已勤矣雖後生晚進失其師傳自為異同不務相扶持然要其消長皆關於興衰之數非細故也而議者但患官冗而舉子多厭薄而銷沮之之説滋甚吾州生長旁郡最有聞則亦每在數中侯於今加意焉政何足以言之是尤余所樂道者也而况李君之請乎侯名某郡武人李君某廬陵人田若干畝著之碑隂止齋先生文集卷之三十九
