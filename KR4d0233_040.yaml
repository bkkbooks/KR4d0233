front:
  text: 止齋先生文集卷之四十
  hash: sha256:81d56a2e81b399234ec216af2f8cdff92f82fec2c76f4b001eb61b03f1ce05e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_040-1a}
body:
  text: 序奉詔擬進御製至尊夀皇聖帝聖政序臣聞乾坤之文不著無以見太極而太極非有待於文也虞夏之書不作無以見堯舜而堯舜非有蘄於書也恭惟至尊夀皇聖帝以妙道治身參之三才而無間以篤行事親質之六藝而無缺以深仁厚澤幸斯世極之根荄鱗羽而無不被宜配雅頌宜襲春秋而臨御二十八年之間凢施凢設歸羙髙廟金石之刻無傳名山大川之蔵未暏也夙以神器授于微身盡遺有迹之累而退托無名之境方将淵乎其蔵用冲乎其忘言尚友太極法堯而蹈舜矣則聖政之書何容心哉然而寳章玉册希濶之典儲於三宫廟謨宸㫁温厚之辭施於百辟而詠歌休威摹冩功徳之人又徧天下至於中原之故老蠻貊之君長懐好音歸大號者家有其說國有盟載也豈惟史臣将夫人能記之豈惟今日将後世亦能記之則鋪陳彚次以作一經盖有孺子弗能抑聖父弗得辤者焉矧惟菲薄膺受重寄蚤夜震懼何以嗣服對天之休亦越成書是訓是式率舊因餘庻㡬底乂是用申命大臣緫領衆作起初濳至于内禅掇其最凢得六百四十一條為五十卷一言一動皆足以經天緯地垂𥙿無極猗歟盛㢤昔者文王演易周公繋辭父作子述臣慕焉於是親序此書之意以附篇首上之慈庭副在禁中紹熈三年十二月二日嗣皇帝臣謹序進周禮說序王道至於周備矣周之作誥曰上下勤恤惟曰我受天命丕若有夏歴年式勿替有商歴年䖏心積慮盖庻㡬兼夏啇之祚訖于暴秦略如其言是道也惟孔孟知之孔子曰周監於二代郁郁乎文哉吾從周孟子亦曰周公思兼三王以施四事是故合族以五世自夏商用之至周則繋之以姓而弗别雖百世而婚姻弗通諸侯以五服自夏商用之至周九州之外猶以爲夷服鎮服蕃服世一見嗚呼備矣後之傷今思古之士徃徃謂周文弊學者尚論三代要當折衷於孔孟且夫天命之難諶非兢畏不能有也人心之同然非惻怛不䏻懐也文武成康積行累功之勤誠有見於此者讀書至刑人殺人劓刵人君臣相敕甚敬甚懼服念誥教至于旬時至于再三讀詩南雅羣臣嘉賔兄弟朋友故舊戍役之際徒一觴豆皆深致其好備禮盛樂以后妃之尊猶知以酒醴勞慰行役僕馬辛苦夫苟燕樂之即詠歌嗟嘆之不足夫苟刑戮之即戰戰焉有憂色此非有利爲之也畏天命焉耳即人心焉耳嘗縁詩書之義以求文武周公成康之心考其行事尚多見於周禮一書而傳者失之見謂非古彼二鄭諸儒﨑嶇章句窺測皆薄物細故而建官分職関於盛衰二三大指悉晦弗著後學承誤轉失其真漢魏而下號爲興王頗采周禮亦無過輿服官名縁飾淺事而王道缺焉盡廢恭惟本朝純用周政千載一時爰自藝祖不忍役一夫之力而養禁旅不欲使天下一吏得以專政而罷方鎮制度文爲雖非周舊而深仁厚澤意巳獨至肆我列聖浸以寛大任子及於異姓取士及於特奏養兵及於剰貟甚者汙吏有叙復重辟有奏裁論議之臣毎不快此而國家世守重於更定盖周衰且千載而詩書之意於是焉在豈不盛㢤熈寜用事之臣經術舛駁顧以周禮一書理財居半之說售富強之術凢聞基立國之道斵䘮殆盡而天下日益多故迄於夷狄亂華中原化為左祍老生宿儒發憤推咎以是為用周禮之禍抵排不遺力幸以進士舉猶列於學宫至論王道不行古不可復輙以熈寜嘗試之効藉口則論著誠不得已也故有格君心正朝綱均國勢說各四篇而為之序如此嘉邸進讀藝祖通鑑節略序本朝國書有日暦有實録有正史有會要有勑今有御集又有百司專行指揮典故之類三朝以上又有寳訓而百家小說松史與士大夫行狀誌銘之類不可勝紀自李燾作續通鑑起建隆元年盡靖康元年而一代之書萃見於此可謂備矣然篇帙浩繁文字重併未為成書難以觀覧今略依漢司馬遷年表大事記温公司馬光稽古錄與燾舉要撮取其要繋以年月其上譜将相大臣除罷而記其政事因革於下方夫學之為王者事非若書生務多而求博雖章句言語皆不忍捨也誠能考大臣之除罷而識君子小人進退消長之際考政事之因革而識取士養民治軍理財之方其後治亂成敗効出於此斯足以成孝敬廣聦明矣故今所節略通鑑如羣臣奏䟽與其他言行與一時誥令出於代言之臣苟非関於當年治道之大端即不抄錄或見於它書實係治軆不可不聞而通鑑偶遺即㩀某書添入至於通鑑登載萬一有小小違誤亦略附著其說於下若夫列聖深仁厚澤垂𥙿後人傳之萬世尤當循守者必為之論但存本指不加文采深有兾於省察也分韻送王徳脩詩序右松風軒分韻送行詩十有四家趙容字叔靜翁珽字䖏度魏謙光字益之王自中字道父徐誼字子宜項允中字子謙陳直中字頥剛潘雷煥字省之徐宏字藴之蔡㓜學字行之潘霆字材叔潘倩字尚之張東野字孟阜鄭志仁字能之子冝省之行之皆與徳脩為同年進士諸人或與乆故或相識或不相識也能之與叔父伯英字去華則以故龍圖先生嘗客徳脩於宣城去華方衰麻故不與分韻事林淵叔懿仲沈季豊儉夫後至别自為詩予出韻亦不在分中吾鄉風俗敬客而敦師友每一重客至某人主之鄰里鄉黨知客者必至不知客知某人者亦至徃徃具觴豆登覧山水為樂間相和唱為詩致慇􅮆或切磋言之於其别又以詩各道所由離合懽惻之意兾無相忘盖其俗然乆矣而未有盛於此㑹者豈不以其人哉嗟夫吾見為此詩者多矣去十數年復閱而問故焉則名字淟沒有不知今安在者幸不淟沒則流落困窮希得復合不淟沒不窮困時得復合而以勢利變故交不終者有之幸皆不至此然而道不行功業不著家人婦子抱其遺牘私相以爲好而天下無考焉是皆可嘆也已余既賦詩又序諸君詩苟吾徳脩與凢在此者深知其可嘆如此則余尚可因以不朽云夏休井田譜序謂周禮爲非聖人之書者則以說之者之過嘗試之者不得其傳也周禮說甚衆獨鄭氏學至今行於世鄭經生志以爲之傳焉耳於其說不合即出已見附㑹穿鑿其舉而措之斯世可不可復古鄭慮不及此也故曰說之者過自劉歆以其術售之新室民不聊生東都之輿服西魏之官制亦頗采周禮然徃徃抵捂至本朝熈寜間荆公王安石又本之爲青苗助役保甲之法士大夫爭以爲言安石謂俗儒不知古誼竟下其法爭不勝自是百年天下始多故矣故曰嘗試之者不得其傳也以是二者至非周禮此與因噎廢食者何異讀夏君休所著井田譜亦有志矣鄭氏井邑若畫碁然盖祖王制王制晚雜出漢文帝時以海内盡為九州州必方千里千里必為國二百一十其後班固食貨志亦謂井方一里八家各私田百畝公田十畝是為八百八十畝為廬舍盖人二畝半云凢若此夏君皆不取漢以来諸儒鮮或知之者其說畿内廣成萬歩謂之都不能成都謂之鄙雖不能鄙即成縣者與之為縣成甸者與之為甸至一丘一邑盡然以其不能成都成鄙故謂之間田以其不可為軍為師而無所專係故謂之間民鄉遂市官皆小者兼大者它亦上下相攝備其數不必具其貟歲登下民數於䇿損益之是謂相除之法皆通論也餘至纎至悉雖泥於數度未必皆叶然其意要與時務合不為空言去聖人逺周禮一經尚多三代經理遺跡世無覃思之學顧以說者繆嘗試者復大繆乃欲一切駮盡為慊苟得如井田譜與近時所傳林勛本政書者數十家各致其說取其通如此者去其泥不通如彼者則周制可得而考矣周制可得而攷則天下亦㡬於理矣夏氏書成紹興間嘗上之朝已而流落乆不顯吾友樓大防訪求得之於治永嘉之明年刋之郡齋大防博雅好古而知今吾所謂取其通者去其泥不通者蓋其人歟則不但此一書而巳也丁端叔南征集序端叔為中都官余以太學諸生識之别二十年余承乏桂陽而端叔適守郴端叔誠少余三四歲然其宦逹乆矣之官適同時由浙東西入湖嶺各行數千里至之日皆以歲除是歲苦寒多雨雪每所次舍顧見妻子懔慄無人色輙為之嚬㗤無聊而端叔又将母起居飲食一不得如在浙中時及讀南征集余浩然嘆曰異哉端叔之過人也先是治安豐以最聞直祕閣尋徙知盱𣅿旴𣅿今要地非有氣力者不能得端叔以選得之何其盛哉而竟徙郴亦左次矣余盖晚得官自丞三山起家為桂陽視同年進士最幸先逹以余幸甚而之官時會天苦寒嘗戚然扵妻子意所不釋徃徃欲為詩輙語不佳止而端叔官逹早左次如此且将母適数千里外乃所過山川仙隱之居皆為賦詩詩和平無咎言讀其詩知其奉母夫人甚樂也至扵忠憤悲壮亦皆有為而不自其巳出余不能知端叔藴抱與當世公卿大人短長髙下如何以其逺過余以是為過人也端叔豈但是過余哉桂陽蓋郴一舊縣每事稽郴而後行大抵郴令逹四境余方治文書模擬其後而又終不自滿余數數為賔客僚友言端叔才可任大官世未有知之者余知之顧言語不能動人雖然著之篇端以私相為好是則不得辭也徐得之左氏國紀序自荀恱袁宏以兩漢事編年為書謂之左氏體盖不知左氏扵是始矣昔夫子作春秋博極天下之史矣諸不在撥亂世反之正之科則不録也左氏獨有見扵經故采史記次第之某國事若干某事書某事不書以發明聖人筆削之㫖云爾非直編年為一書也古者事言各有史凡朝廷號令與其君臣相告語為一書今書是巳𬒳之弦歌謂之樂章為一書今詩是巳有可蔵焉而官府都鄙邦國習行之為一書今儀禮若周官之六典是巳自天子至大夫士氏族傳序為一書若所謂帝繋書是巳而他星卜醫祝皆各為書至編年則必叙事如春秋三代而上僅可見者周譜他徃徃見野史竹書穆天子傳之歟自夫子始以編年作經其筆削嚴矣左氏亦始合事言與諸書之軆依經以作傳附著年月下苟不可以彂明筆削之指則亦不録也蓋其辭足以傳逺而無與於經誼則别為國語至夫子所見書左氏有不盡見又闕不敢為傳唯謹如此後作者顧以為一家史軆而讀左氏者浸失其意見謂不釋經是書之存亡㡬無損益於春秋故曰袁荀二子為之也由是言之徐子所為左氏國紀曷可少哉余讀國紀周平桓之際王室嘗有事於四方其大若置曲沃伯為候詩人羙焉而經不著師行非一役亦與王風刺詩合而特書伐鄭一事王子頺之禍視帶為甚㐮書而恵不書也學者誠得國紀伏而讀之因其類居而稽之經某國事若干某事書某事不書較然明矣於是致疑疑而思思則有得矣徐子殆有功於左氏者也余苦不多見書然嘗見唐閱左氏史與國紀略同而無所論㫁今國紀有所論㫁矣余故不復賛而道其有功於左氏者為之序張園送客分韻詩序右張園送客分韻詩為常信二史君作也士立朝則相推先去國即相懐不忍别此豈直私為好哉而関於當世之故矣盖聞吉甫有大功於南征其来歸飲御之詩自謂及此者張仲孝友在焉爾逮其季至采蕭葛一日去君側凛然有三歲之懼周之盛衰余以是觀之石侯叔訪黄侯啇伯同時丞太府皆以欲便私請於朝二三大臣輙留其章不上繇侍從下暨舘學之士苟見諸公亦輙止之曰柰何使兩賢去也而侯請益力蓋乆之諸公信以為靡他於是始言上上重其去為擇輔郡纔需旬歲之次而叔訪得信州啇伯得常州然合朝方憮然不滿飲餞彌日相與咨嗟歎息也最後同院若同僚若同年家又十人餞之張園兩侯之賢天下識之今其去徒以欲便私無毫髪意不自得且旬歲間爲善輔郡行矣還闕可朝發夕至也視前時去者甚寵而同朝猶不忍别如此嗟乎立今之朝不謂之遭時耶十人者㑹稽黄文叔清江彭子夀章茂獻永嘉薛象先蔡行之蜀范文叔臨川曽無逸章貢李和卿東莱吕子約與余也會張功父致地主之意亦分一韻余不獲在分中故爲之序義役規約序古者鄉田同井出入相友守望相助非其俗然也周官之法四閭爲族八閭爲聮以役國事蓋自五家為比家一人至百人為率是四閭也其必以八閭為聮者役者半休者半也役者給公事休者相與治其家事而又有羡卒有閒民以借助焉故其民相親睦而不病扵役今天下上無横歛下無繁征而民極困扵保正長則以保甲催科之故也民不能堪雖叔伯兄弟相訟以避役乆矣叔伯兄弟相訟以避役非其願相讎也勢使然也雖勢使然而非其願相讐之心不泯扵是義役興焉義役非古也而有古人之意何也古者官以義帥民使之相親睦今也民以義奉官而私相親睦其政則殊其俗不可謂不羙也假如自一縣一州轉而推行之至扵天下盡然則其俗益羙假如上之人有變通飬兵之道而顧役錢可還以予民則其政尤羙故夫義役者未必非復古之漸也凢古之羙事其初類自人心起耳吾都不過四五望族凢慶弔問報之事大抵相好而又家務為學人務省事其俗甚厚獨時以役訟失􅌚一旦㑹集割租以行仁義各以力厚薄無勉強不得巳之色余故序其規式備道其善以勸其有終焉謝季澤正事韻類序始余見李澤扵外舅張氏與諸夾人行論事不下氣扵州縣吏長短時事當否輙誦言之無歉則謂季澤但悻直耳乆之見其姻族急難不得季澤議不决議决矣而用不足則或取具於季澤又乆之州閭至委巷每事不可無季澤藉其力者爲多也季澤雖不愛其力至意小不合即以語侵人或強随和人意亦戯笑皆含譏誚𥘉不以吾有力自喜見毫髮徳色而人亦諒其靡他不以爲怨余然後益知季澤孔子耻巧言令色足恭思魯狂士而悪鄉原盖自周季士大夫貌勝而質衰氣卑而辨盛孔子亦既有感扵此矣居今之世得見如斯人者吾固有取也嗚呼今亡矣此書季澤所著其家學長扵詩禮頗欲有所論次未就僅及就此篇其扵字學偏旁訓故學者易入焉季澤㳺學校登進士第調台州司户髙郵軍教授以勞績薦改秩知福州寕徳縣未滿歲卒官不足行其志位不稱其才也韓昌黎嘗言注爾雅蟲魚非磊落人歐陽公序韻捴亦曰儒者莫暇精之其有精者徃徃不能乎其他余方悲季澤官不足行其志位不稱其才且懼後之人見此書如二公云云也扵是道其平昔大槩序之篇端焉謝懷英老子實録序懷英嘗為舉子知推尊孔氏矣已而脫儒冠去為道士以其推尊孔氏者尊老子扵是為書若干卷自開闢以来凢老子名迹變化及其遺事言散見扵百家摭拾詮次無遺謂之實録嗚呼何其專且博也則誠有功扵道家者儒者筮仕即不得專志扵書雖專志扵書徃徃不暇﨑嶇及世次年月也或有暇及此又不敢不務差擇則拘扵六經而不得騁故吾夫子之道與天地相為無窮夫人推尊之願未有如懷英此書者向使懷英幸卒舊業不去為道士則此書将為孔氏作其有功何如㢤雖然昔太史公嘗作孔子世家盖有志扵此矣說者反曰夫子之道與天地相為無窮且必與戰國若漢封君較乆長者則世家似不宜作孔氏之子孫輯所逮聞作家語孔叢子二三書儒者亦弗甚稍道至羵羊楛矢稍欲以夸大聖人又或以語神怪不取也然則使懷英幸卒舊學不去為道士将為書尊孔氏則庻以六經㫁百氏必不得騁其博如此余是以嘆息扵懐英其不幸而不得自託扵孔子也夫其亦幸而得自託扵老子也夫故因以為序云懷英姓謝氏名守灝永嘉人余同舎生也送蕃叟弟趍江西撫幹分韻詩引蕃叟入江西幕同餞者十人林宗易自牧沈仲一徐一之朱榖叔及之黄敬之余兄莘叟分韻賦詩某亦在分中又為之引宗湛弟侍國風十五篇為别作者居太半道其所歴山川辛苦之状僕馬之病而止扵禮義古刪詩取焉騷人多怨誹自騷以降無譏焉爾若夫大雅之贈别則異扵是吉甫作頌穆如清風仲山甫永懐以慰其心此所謂治世之音也十人者之詩雖工拙不必論要皆歸扵和平而無恨余是以占吾弟之将有所遭而并樂吾黨之䏻易其心而後語也是為序孫子發㣲序代陳頥剛作自六經之道散而諸子作盖各有所長而知兵未有過孫子者春秋之季天下将趍扵戰國矣故武之書多權謀儒者輙擯弗道間有好其書者又徃徃為之章句訓觧夫兵事尚變而欲以訓詁求之不亦陋乎余自乾道乙酉不于有司之試端居深念今復歲矣盖所觀六經孔孟二氏之遺書由漢以来諸儒發明之者略備余未能有所増益間讀十三篇尚多餘意因以所聞扵先君子與渡江諸将議論兵間事與已見推武之說附次其下嗟乎方天子明聖養晦于外而虜酋盗
