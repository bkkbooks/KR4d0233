front:
  text: 止齋先生文集卷之一
  hash: sha256:48a4304160a5e4e730e97c0280966e339780ed22746012a74e497c14d7e792f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_001-1a}
body:
  text: 歌辭暮之春六章章五句先生有堂曰春御翰扁榜暮之春兮物維其嘉乾際兮坤涯母將雛兮彼實者華魚在藻兮燕子還于故家今者不樂兮云何暮之春兮風日與柔桑女兮南疇相爾夏畦兮悲秋斫冰兮長夜無裘今者不樂兮何求暮之春兮雍雍熙熙堯裳兮舜衣五絃之琴兮一夔曾不知結繩與秉鉞兮何時瞻言千載兮忽焉其逺而山有龜蒙兮水有沂天未喪斯文兮在兹二三子兮皇皇欲何之鼓瑟兮為誰捨此兮吾將安歸止齋兮年年室環堵兮兩山有川鷗鷺巢簷兮圓荷田田豈無芳草兮杜鵑世微孔子兮獨抱乎韋編雲漢之章兮光燭天朝宗兮列仙胡歸晚兮病骨拳然與客歌商兮忘食與眠點爾何如兮吾未知其孰賢西廟招辭并序淳熙十有三年二月知瑞安縣事公非先生之曾孫劉龜從再作西廟以祠宣和縣令王公經國于其落也邑人陳某為作迎神一章使工歌之經國字公濟其守禦事許忠簡公嘗識之故不敘君昔兮胡不去斯君今兮胡不來斯文棟兮雕楣峴山之麓兮江圻旨酒牲兮潔肥皓遺老兮鬚眉坎擊鼓兮吹篪君勿來兮遲遲山蜿蜿兮榕隂萎㽔冮水清夷兮無蛟與螭君之來兮可以娛嬉君不共安兮誰與共危鳴玉兮衮衣彼亦君兮一時莾中州兮為夷匪冡則廟兮牛羊纍纍尚我民兮有知子子孫兮永依揆之兮以是非君舍此兮安之田有畔兮澤有陂桑稻兮誕彌懷不報兮忸怩日早暮兮夜何其猶容與兮誰須古詩落葉一首别諸友客新昌落葉一二數遙夜忽已午百年能幾何望道猶未睹清揚得邂逅簡易從險阻明朝買扁舟萬議付風雨新詩話别恨為我謝酸楚蒼蒼歲後竹白首見肺腑要有不别時尸居一環堵讀范文正公神道碑有感佚事武侯不可致元德造其廬公在衰絰中乃上時政書維時君臣定事與草昧殊出處千載同豈必名迹如行伍拔大將寒飢得名儒推轂天下士百年用其餘生平慕河汾未許王魏俱殷勤八司馬意獨何區區自古朋黨論消復莾無期誰令羣疑亡韓富及有為惜哉公不見功名止西陲送國子監丞顔幾聖提舉江東分韻得動字長安夜未艾客枕厭羣動平明視天闕劒珮鳴珌琫學省雖冷官上意嚮周孔六飛自天下多士溘雲滃饔飱燕蘋鹿道義發醯蠓方將屬耆英髙舉出埃塕離觴春駘蕩歸路月朣朧勳業當及時千年付南董懷寧國守鄭少卿景望一日一度過短墻三日風雨撓我腸天球河圗在東序保障繭絲分晉陽我欲從之苕水逺搔首不見月滿廊笑看兒女羅列拜老人星下燒夜香送宋國博參議冮東分韻得夜字前年上幸學一時同舍今去略盡為之悵然南門供帳江上亭北門觴酒湖邉榭兩年出餞略可數往往行人半同舍憶昔翠華臨璧海儒先一日爭聲價蘇君舌掉巫峽水楊君氣奪幽并夜黃君石矻不可轉夫子居然古彛斚艾軒風流天下少獨奏咸韻無濩夏黃粱未熟事如許白髮不生心亦怕古來賢俊多坎軻道與世違胡足詫武皇好少臣巳老孟子尊王君尚霸嗟乎夫子幸遭時諸公衮衮皆流亞德尊不過五品薄歲晚曾無一飰暇君恩豈必間湖海家事姑惟問桑稼此行端可振頽俗令我短轅今欲駕逰鼓山鼓山聞天下一見名不空自從周職方閩在王會中登山亦幾人興寄隨所逄騎君常愒日遷客多悲風劒川發甌西萬阻與海通忽焉得平壤北山矗其東我行未及巔己見國勢雄三韓到吳會不可道里窮俯瞰南來帆沄沄自朝宗曩時諸降王各撫千里封相招神䘖圗旅獻東都宫東都今何如胡馬鳴蒿蓬一春長雨霧明日歸樊籠恣探泉石幽篝燈道歸笻和孫偉卿雜言十章萬事如浮雲可玩不可有三年刻一葉未就骨已朽可憐負薪子誤有廊廟志出門欲何之馬拙車未試一飰腹果然身外百不須深知飢方朔不似飽侏儒墮落生死間大患為有身老子識未破天地豈不仁幽居悟前疲寡欲得身健筮之此何祥厥繇無水困有書但插架有門亦常關是非天下爭而我土石頑好酒來誰家明月得我心把酒㺯明月醉卧盜不侵厄窮果何尤利逹竟誰在眷言荷鉏人妻子敬相待或勸著子書我恐落人世呼兒具紙筆一歲復一歲人事盡鄉曲田租了王官獨於大海枯不改古井寒送林正仲丞玉山去年我為客持酒送君歸君今理征驂我適卧舊廬人生足離合仕宦相乘除科名餘十年丞縣亦既遲顔色日愈好絶口無歔欷自言有時命歲宴知何如深藏濟人具不作借勢書虛名多自誤徐步乃疾驅從兹拭老眼看君上亨衢和林懿仲喜雪韻常暘厥咎何君相疚朝夕愧莫慰羣黎凄其望三白是心與天通昨夜平地尺簑笠在東阡耰鋤在西陌忍待明年飽欣及吾事隙海宇正無塵草木亦煥赫遙知𬗋宸朝千官手加額溫綸粲龍光賀牘交馬迹銜枚懸瓠城仗節居延澤獨擁藍關馬共飰滹沱麥更願吾君相對此念忠赤當今挾纊溫恩意到疆場有士如有年要豈旦日積袁安自甘寢掃軌無過客再和前韻冬夜苦難曉短景復易夕安得户牅光不待東方白恍如遊化城瓊臺若干尺英華發林藪餘彩散阡陌平鋪浩無垠巽入微有隙忍寒貪縱觀未願朝曦赫柳綿著歌茵梅片墮粧額皭然羣汙中有意欲比迹自識玉皇家癯仙陋山澤新來學為農遭歲屢無麥稚子色恆飢老婢腳盡赤一飰今有待喜更問瓜埸歸來看牀頭瓶粟幸餘積且以炊春醪號召巳散客除夜用前韻又添犬馬齒常恐牛羊夕牙無數株牢鬢已太半白六朝貴人家珊瑚髙數尺復有陵邑豪沃壤動連陌居然燕巢幕忽矣駒過隙伊傅亦中夀至今名赫赫蒼苔卧風雨曾乏斷碑額中原五十載胡騎亂禹迹誰當懶折腰去學陶彭澤憂端壓不下中夜歌秀麥昭代豈無人腰黃眼前赤鴻儒籌禁省壯士守邉埸罷歌且杯酒澆此懷抱積柴門剝剝響巳有賀年客和林宗簡除夜韻余與宗簡皆病餘而除夜皆賦詩因反前意窮懷卿相憂老作兒女悲百爾皆妄想一粲看新詩短長總歸盡君閲古盛衰煌煌五矦家寬作數世期經史或不讀名字亦奚為茂對乾三陽靜養月一規再用喜雪除夕二韻寄宗簡百年彈指頃羣動不遑夕孌彼惰遊者長夜浮太白豪俠旁無人卧我樓百尺衲子縛禪靜不敢踐桑陌武夫髀肉滿睥睨候邉隙道家求不死真火養隂赫躁人干速化自點雷門額書生苦穿鑿竒字窮鳥迹何如吾老農一雨犂春澤相忘與雞豚所辨才菽麥不聞有孔子安識由與赤紛紛舉世士肝膽自疆場老翁捧腹笑空洞無一積有米問時事請以臆對客子歌我有感我和子益悲文武有天下二南無變詩陵夷及其季小雅亦既衰殷人早墜命秦氏不及期治身如治國夭夀人所為舊恙何時巳與子看前規賦芙蕖簡諸友我欲待明月相從弄芙蕖月郭一再滿我行竟徐徐誅茅困黃埃開卷疲蠧魚纒縛二事間紅披緑蕭踈秋風白髮生撫事增欷歔美人隔雲山芙蓉並吾廬近者不得見逾遠還何如花無三月長人夀千歲餘相期不朽事勿與草木俱君上鍾鼎銘我作山澤癯送楊似之提舉湖南昨日有客去分符今朝有客來攬轡蕨芽掇盡筍可􅕻送客焉知老將至儒雅風流能有幾南宫先生無乃是十年不復夢蓬山萬里何為隔湘水葉公巋然地官二顔公領袖天下士星聮郎署尤與何次第諸公亦連茹一時臺省舊名德十見班行已三四可令僕馬病雀嵬獨抱蘭蓀吊憔悴漁樵混迹山窮處故故肯臨人不記酒半停杯問鬚髮夜闌秉燭徵文字多時渴見痛折節萬事要看方得意先生行矣扈甘泉請自此心扶大議薛士昭寺丞赴衡陽守之翌日而似之吏部至𥘉似之與葉侍郎叔羽顔祭酒幾聖尚書郎尤延之何一之同在館學今皆還朝故併及之哭吕伯恭郎中舟行寄諸友去年上溪船落日建安旐今年上溪船濡露金華草當代能幾人胡不白髮早念昔會合時心事得傾倒倚廬魚鼓夜聯轡雞人曉遐搜接混茫細剖入幽眇挹注隘溟渤扶携薄穹昊斯文何契闊之子復凋稿百年在無窮寥廓一過鳥家人徴舊聞學者拾餘藁區區存萬一散逸誰可保君看魯論上彭夀顔回夭于今懸日月豈必言語好儻無後來者泯沒秋毫小南浮吳蜀會北顧關河杳懷哉各努力人物古來少張冠卿以前詩懷哉各努力人物古來少之句為十詩見寄次韻奉酬明月不可涴有時障氛霾芙蕖生淤泥豈必所處佳老子苦錬藏釋氏多遣排如欲盡物纍自古誰好懷連楹著胡椒環堵誅蒿萊節士亦良苦乃築懷清臺世故何浩蕩人心亦崔嵬之子訪田舍厥繇安在哉冥心觀宇宙孰是同與各夜旦無反惡日出星河落此有齊人瑟彼有荆人璞嗟余耳目短豈故重然諾朝雞警冠劒巷犬吠村塢胡然子列子越在鄭東甫永懷王黍離莫與戌申許雞犬各有役人亦冝自努説合何必然金化黃河塞真然説不合千鈞等蟬翼纍纍近丘墓浩浩古載籍﨑嶇蓋天意解后匪人力我友天下士逝者八九人非無新造交亦有久故親可與共安利未可同隱淪欣然得一箇回首終酸辛秦人弊申韓亡梁以崇佛六經獨何罪莽亦竊大物堪嗟二百年吾道功第一熙豐餘論在河洛諸賢沒澶淵竟要盟老菜氣安吐韓范猶自憐不遂臣西虜人材繫其逄事業隨所附千載有南董何啻今視古江梅嵗巳過燕子春又來不愁吾鬢霜所恨此志灰扶桑焞焞明閶闔蕩蕩開欲往豈不可致逺非駑駘子歌我三嘆我和子一笑方期俗耳合勿與知音道頗聞古韶卷不落人間調悲歌泣鬼神妙語無餘少黃巖張之望之立來訪與遊梅潭詩以送之張子好兄弟别我今九年東風刮眯眼雙鵠忽墮前坐定看兩鬢喜極意慘然來日豈不多此意合少延念子伏巖穴有作皆巨編稻粱未暇謀從我志獨堅虛名適相纍浩嘆當誰憐積雨得新霽緑漲彌百川載酒問何有漾舟隨所便與子梅潭遊以兹寓惓惓傾崖俯仰立中有飛瀑懸平地儼閶闔晴空自雲煙既見各有得欲語不可傳衆妙在領會天成謝雕鐫子歸有新詩時寄三兩篇和張孟阜尋梅韻平生拙狀物出語輒自咍久欲頌梅花恆恐纍紙寫不該羡子年少氣豪敏詩筒往往歲一來語不驚人意不止筆力待盡千松煤我以病驥追霜隼著鞭不上嗔人催置詩太息梅困我恨不縱斧尋條枚嗟乎孤山無人老坡死水邉竹外誰低徊我嘗欲擬禁字體不道雪月冰瓊瑰退藏物後獨笑傲奄有歲晚多驚猜紛紛自謂好顔色萬彚秃立皆堪哀模將此意入詩句十年未就梅空開君詩却怪梅不早令我內熱紅生腮強隨嶮韻終不滿今年又恐坐看落片飛莓苔送劉茂實宰奉新遠别欲無寐細論誰有酒今當作劇縣君意亦樂不江湖吏道僻歲月民勞久救之敝精神自愛終袖手要中名甚美用意物所咎君觀蘭桂林餘茂及樵槱移根託客土顔色非故有贈言幾滿車一字堪皓首於焉但裁擇對越二三友諸賢在當路公論在衆口送趙叔靜教授閩中四首家無宿舂糧適意恣所向征鞍催上官帆海看疊嶂有言及當代浩飲益悲壯以兹置周行盍在幾人上讀書須讀經學文須學古青衫故不換白髮早可數我亦窶人子風雨蔽蓬户胡為數相過夜話恆過午炯炯出萬壑冰壼縣清秋孰與玉瓉中穆然飬黃流孤松髙半天蘭芷復過幽看君最雍容奈何短自謀百吏不可試卷懷州校官翩然落南閩不為荔子丹雕蟲妙經術倚市多儒冠吾道未必貴政此良巳難逰白石巖地向東南傾石際滄海立蛟鼉限波濤雞犬得城邑居然通國望跋莫他山及道人獨有之置屋三四級幾看星月爛却聽風雨急于今二百年我共冥鴻集晤語夕陽低對酒秋旻濕明朝江上舟避雨漁翁笠邂逅一俯仰此道可於邑和孟阜老梅韻朝逰山南莫北隅修竹之下手所𬒳五步一顧立不趍柔枝弱幹千萬餘粲然笑倩多新竒歲寒安用衆稚為驚嗟怪怪丈人行縞衣籃縷氷斫肌莓苔雪片凍不飛玉飾其末璣衡欹藐姑之仙下縹眇蒼虬為駕羽葆希三閭大夫從女須枯稿嬋姢却並馳張子愛之亦既癡人不得覷以我歸我生自視梅孰如滄江獨立兒女嗤年來稍稍學折枝奈何復與此老期再和望美人兮天一隅薜蘿為衣顛倒披水竹隔我不可趍令我搔首三歲餘漢庭年少六七竒鬚眉皓白來何為我欲避寢問之道安得玉貌生枯肌長翁傲睨欲奮飛滄江釣雪蓑笠欹少翁頓挫拚牙角笑齒一粲知音希樵家斧斤磨以須過者萬人人背馳梅乎梅乎我非癡持汝二老將安歸古來弱植剛不如孰有嫌媚為人嗤君不見孤竹之管求孫枝汝盍早定歸山期止齋先生文集卷之一
