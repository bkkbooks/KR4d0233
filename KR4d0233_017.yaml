  text: 止齋先生文集卷第十七
  hash: sha256:b73acfd695f0ce8bf471b357888d539a19fe0764d679b616ad9f5e2c8a49bf07
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_017-1a}
body:
  text: 外制同知樞宻院事亰鏜𥘉除贈三代曽祖贈太子太保勑昔宣王中興登用将相必推其世系本之始祖自南仲召虎韓侯之雅皆為此言謂是文武成康之世積累致然而非一日之故也具官某故曽祖某躬行對于古人郷譽髙扵月旦而懐道不試有識惜之爰及曾孫遂生賢佐夷考其世則朕之得人所自来逺原始根本可獨愧扵周乎追錫宮保視儀孤卿雖曰舊章實應經誼可曽祖母氏贈郡夫人敕周之公孤並建五廟以君夫人祔焉而世世享亦惟群臣䏻有功扵國者必有助扵其家者也具官某故曽祖母某氏来自名門作配君子躬備勤勞以詔婦子而生無從爵之榮殁不得與扵共牢之享天命弗僣是生曽孫為吾輔臣以翊樞筦眹循周制寵綏爾夫申錫郡封視古命婦用賁幽宅亦足以報可祖贈太子少傅敕成王之雅曰凢周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國盖言周之得人繇文王以来世家之所由生也具官某故祖某克承其緒以紹前聞因之以共儉加之以恵和至于生孫偉然人望佐我宥府海内晏然揆諸周人寅念祖烈及其世家則爾劬躬燾後可無褒典以慰居徃命之儲傳扵禮固宜可祖母敕朕既純用周政廣㤙錫類以褒大吾輔臣之世則燕及閨門冝有追命使之匹休具官某故祖母某氏儀于前人益謹内則載篤其慶萃于聞孫方周盛時公侯皆君子也而風人本之袵席以爲徳在鵲巢功在采繁也我儀爾祖克大其後用見家政庻㡬召南爲君夫人斯禮之稱可父敕爲吾股肱之臣褒及三世而况禰廟乎周公拜前魯公拜後亦周道也顧今九原巳不可作此憫章之所由起歟具官某故父某官某徳積扵身而位不過八品行修扵家而功業不見扵世過庭之訓施扵嗣人而資父之忠簡在烈祖肆朕纉緒擢爲樞臣天下頼之繄爾之訓詩不云乎維其有之是以似之不有申錫非所以爲積行種徳者勸也爰考古誼爵爲公師其始自今不一而足可母敕朕既夲之經誼為卿大夫崇報禰廟以侈教忠之報則母氏與享以次寵綏使之匹休亦古道也具官某故母具位某氏来自名門作配君子是生賢嗣蔚為樞臣譽在薦紳功在清廟夫鷄鳴警戒之道不篤則一經之教不嚴蘋藻不共則甘㫖不謹爾鏜何以能移孝為忠也因其舊號益以新封雖曰彛章亦足用勸可工部尚書趙彦逾除端明殿學士知建康府㤙数依執政月十八日敕維我烈祖作新同姓使與天下寒士共趨功名之㑹盖一時興起藹然多名卿大夫矣朕方相其魁傑而次第用之以昭我烈祖作人之盛具官某奮自儒科積有民譽盖㧞膏梁之習而獨清修苦節甚扵布衣豈惟不以髙帝子孫自居而謙謙唯謹不敢遺扵僮僕也肆朕嗣服而忠勞見扵大節之際夷考周漢同姓有㡬則朕将何以對掦烈祖之意昔人叔康王之事而孜孜扵仲山南宫毛漢錄代来之功而額獨後朱虚之賞二代治効醇庛與其俗薄厚扵是乎見是用極之以祕殿之隆名申之以轄之異数分釐晋都増大食采凢所以尊寵卿至矣尚其懋哉毋忘忠報可右正言黄度除直顯模閣知平江府乞祠祿差主𬋩冲佑觀敕具官某昔者汲黯薄淮陽而願備左右拾遺𥙷過盖天下不以黯為懐寵而咎漢武之不容直士也姑蘇近輔朕重其牧以爾度懐材厲操濟以恵和是用輟從諌省以重北門而不屑就若爾度有汲直之風矣無乃使朕佀漢武乎從欲奉祠固非朕意母為考槃永矢弗告則予汝懐可新除考功郎官王聞詩覃㤙轉官敕具官某朕方罷祠而爾遄歸留之郎闈以濟世羙縁㤙進秩又率舊章視漢賈生召對宣室而不見用爾不謂之遭時乎可知寍國府木待問除煥草閣待制敕朕方隆孝治瞻言慈戾昔者所進今誰在乎将第其功而何舊學越在外服也具官某蚤以摛筆簡在烈祖晚而勸講眷于上皇胡然江湖荏苒歲月一時軰作迭為三事而猶紆宣成之組乎自魁多士及班從官於今守宣事乆論定而又遭歲不叔克究爾心詔瘠起痿闔郡見徳朕覧奏計益嘉賢勞次對而清我有異数一朝醻之誰曰不可可尚書吏部員外郎林季友除右司員外郎九月二十一日敕具官某詩不云平彼都人士狐裘黄黄其容不改出言有章爾某似之輟從郎闈来掾宰事盖将試可以究爾能尚其懋㢤母曰序進可韓彦直致仕敕三朝法從方欽企扵告猷奕世賢勞何遽聞扵謝事姑惟從欲盍亦䟽恩具官某顯允材猷懋昭聲聞以雲臺功臣之後奮自儒科以壁水寒畯之交明扵世務踐更中外甞試險夷投之扵撥煩而咸冝强之以易武而不愠至扵㱕休殊舘殆遺簮紱之榮論次本朝雅有簡編之樂肆予𥘉政懐此舊人屬抱沉痾竟安居里亟頒新渥猶阻侍朝覧奏牘之所陳想拖紳之何及晚節末路固莫奪扵忱辞故國世臣尚益綏扵夀嘏扵焉増秩抑又念功可四川制置使奏辟知州慶符縣謝辛討捕叛夷有勞身死特贈敕某官以攝官而冐萬死以保縣而奏膚公有臣如此而無位無年可為嘆惜也追錫一秩寄扵異恩以慰沉冥且勸来者可煥章閣待制知鄂州信知池州敕故事以待制而上官典于大州大抵以望郡多宿兵耳朕方以此意擇牧敢輕授乎具官某奮扵書生而為才大夫肆我烈祖簡在法從代言掖垣敕瑣闥議論風指聳聞一時盖薦紳翕然以為落筆妙天下也晚領名藩屡聞最課夫鄂渚池陽今江湖重兵䖏也萬竈與民居相錯而介士往徃不樂扵文吏朕即已試自鄂徙池爾其深知托重之意而不厭薄以是為煩調護也而非苟易置則予汝嘉可端明殿學士中大夫新知建康府趙彦逾改除四川安撫制置使兼知成都敕分閫扵外蜀為專宿師扵邊蜀為重欲省賦以𥙿民又蜀為急而比年謀帥多輟從臣朕擇其人班在丞轄尤所以加恵蜀也具官某廉足以律百吏之貪静足以應多故之變簡在兩朝績用甚茂至扵試之撥煩而無難辞居之絶逺而無愠色又何其過人也羽儀禁涂物望愈偉肆朕嗣服益見忠操引以自近冝在本朝朕亦惟自昔功業之臣一視中外鄭武相周義和就國鄼侯當軸平陽徂齊以卿一意首公無有遐邇其為朕﨑嶇萬里以寛西顧豈顧介然于懐歟昔在神考亦强趙抃而今朕所以煩卿又自有意噫周以宗强苟不居中必為二伯此王道也非朕所以煩卿之意乎式遄其㱕日月可兾可新除江東提刑陳公亮除福建轉運副使敕具官某凡持寰内之節徃徃雅意本朝也爾詳刑于郊風績甚茂簡在慈扆行且遄㱕而秉心無競固自引郤将輸江表亦非其好我圖爾居莫如閩部㑹使者易地爰改卑爾其爲朕通八郡之鹽筴以紓吾民則朕以懌可趙渙𥙷官敕具官某暦學不精占天者病之爾以家傳盖究其術自吾賢士大夫亟稱焉取諸右階使爲保章氏其與疇人訂正䟽略以成吾敬授人時之志可潜邸有勞轉官敕具官某朕第醻潜邸之勞雖小臣不忍遺而亦不敢私也以爾歴年彌乆庸進二階其尚靖共母曰倖得可薛登降兩官敕具官某古之人重請而况違三尺以請乎違三尺以請且不可又以不得志焉而咎所從請之人冝䥴兩階以警貪冐可骨舜輔随金國賀正使充引接儀範囬程循修職郎敕具官某凡出疆者有賞所以勞苦之也爾嘗隷使事與于驅馳爰進一階且書扵籍為賞亦不薄矣可趙公介知舒州敕具官某龍舒扵淮為名郡擇守徃徃皆名流也爾所試吏雅有治稱盖薦紳翕然以為通才爰付此土以究爾䏻尚其懋㢤以圖報効可趙謩知嘉定府敕具官某爾以蜀之人望之予而典州有治行是用明陟卑爾潜藩矧嘗為别駕民譽藹然扵焉分符可謂衆允詩不云乎維其有之是以佀之益茂乃績無忝所生可淮西提舉張同之磨勘合轉一官乞囬授封母敕具官某以年勞増秩其在功令㑹計至纎悉也而爾同之固請貤恩扵毋是足以發明人子之心矣詩不云乎是用作歌将毋来諗此周所以勞使臣也爾方馳驅淮甸勞来安集吾民則朕豈有愛扵此㢤可朝奉大夫江東提舉陳士楚除吏部郎官九月二十一日敕具官某爾以舊學之臣持節行郡且滿歲矣趣㱕郎省以慰永懐經說一編尤在藏史朕方資之潤色𥘉政無言不酬将有殊渥可朝奉郎湖北提刑陳謙收捕徭冦有勞特除直煥章閣敕具官某有以書生而可以即戎是不謂之長才歟爾某甞有位扵朝矣介在下僚無以著見試之劇郡談笑而理越持湖節遂克徭冦誠得如數十軰萬物吐氣非爾之謂乎寓直延閣姑以勸功寘諸周行誰曰不可可汪楚材王圭收捕徭冦持轉三官敕具官某徭人犯邊爾以户掾攝機幕王圭云爾以疆吏䏻帥其旅不日克之有司差其獲級冝進三階悉以卑汝以勸果毅可知冝州沙世堅收捕徭冦有勞特轉團練使敕具官某爾威名著扵嶺南薦紳能言之比擢自逺服改卑郡符而桂林之奏牘始至日者討平徭人爾功居多朕益壮之粤自刺州寵以戎團之峻賞不踰時吾豈愛此義不辞難汝将安報乎可知饒州樂平縣楊簡除國子博士九月二十七日敕朕方崇長學校所以加惠諸生甚渥也則聮教事扵其間冝得名士爾簡蚤有賢譽不求聞逹徒勞縣章益務持飬是以不俟滿歲俾長胄子豈惟諸生又以爲善類勸也可廣西提刑胡長卿除廣西路轉運判官主𬋩冲佑觀張玠除廣西提刑敕具宫某嶺南去朝廷逺而民困扵塩筴之数易枉扵訟銗之偏聴朕惻然念之為擇膚使以爾長卿甞司臬事晋之輸漕以爾玠甞持湖節俾之詳刑其各為朕布宣徳意以恵逺氓則朕以懌可國子正陳希點太學録湯璹並除太學博士九月二十七日敕其官某朕新嗣服崇長學校所以加恵諸生甚渥也則聮教事扵其間亦盍序進矣爾希點爾璹俱以名勝来掌學士之版譽䖏藹然也晋之講席發明經意僉曰汝冝則朕以懌可祕書省正字李璧除校書郎九月二十九日敕具官某詩不云乎君子有之維其有之是以佀之以爾先人文墨議論之選而垂名千載但見扵史筆冝爾之能嗣其業也校讐冊府益慱爾文鴻漸之序扵是焉始可主𬋩架閣文字陳􅐥除國子正戴溪除太學録並十月一日敕具官某朕方崇長學校所以加恵諸生甚渥也則聮教事扵其間冝得名士爾溪爾􅐥皆以經行教授于郷從㳺之屨滿户外也凡學之胄子與國俊造爾其爲我紏治校𢾗之益自著見以湏明陟可端明殿學士四川安撫制置使趙彦逾贈三代曽祖少師崇國公謚清簡加贈太傳敕朕閱宗人之牒盖追錫其祖父尊寵多矣未有子孫以功名著見致位丞轄而後及此者具官某故曽祖具官某雖在天族猶寒畯也克世其家濟以清約易名之謚同姓盖鮮是豈苟得之㢤迺生曽孫簡在法從肆朕嗣服厥功甚茂扵是度越凢例及扵異恩而爾亦自三孤晋陞帝傳其視宗牒不有光乎可曽祖母崇國夫人氏加贈國夫人敕婦徳為難而宗婦尤難其人也朕觀詩人之誦賢婦扵諸姬獨稱魯衞豈不謂之難歟具官某曾祖母具位某氏出扵名門作配崇國㓗純自持動有軌度假使生周之時則衞姜魯母之倫矣侑食于崇扵禮為稱晋封大國又以聞孫凢爾宗婦視此用勸可祖加贈太子太傳敕朕觀漢宗室以恩澤侯且王者何限曽不長久徃徃國除世祿之家鮮克由禮古人所以歎息也具官某故祖具官某以崇國之子益自好修克勤克順以詔厥後至扵孫子遂為幹臣而朕亦追録其種徳之功為之羙報粤自右階亟躋宫傳其視漢王侯自著浸㣲何相絶也尚克有知足以自慰可祖母淑人氏贈郡夫人敕詩不云乎藝之榛栗椅桐梓􅃮爰伐琴瑟况得才而用之而不録其所自生非詩教也具官某故祖母具位某氏作配君子行修於家覃及其孫迺生才羙周人作頌祖妣攸同盖未有不獲助扵其内而收効於其後者粤自命婦䟽以郡封為君夫人實應經誼可父加贈太子少師敕自帝傳以来於是三葉而義方之教何其獨隆也具官某故父具官某以王公之胄而有士大夫之習非無富貴之階而宦不逹也集善為祥聿生賢子清名特操庻㡬儀休其視漢儒不以籝金而以一經不以駟馬而以隂徳殆無愧焉寵之宫師雖曰褒典非以為生蓋徳之稱可妻淑人氏贈郡夫人敕朕誦二南之詩勸以義勉以正皆室家也我有近臣致位丞弼顧其内助晚不同休可無愍章以賁泉壌具官某故妻具位某氏儀于前人克濟其羙遂相夫子曳履從班夫與之䖏約扵鷄鳴盥櫛之𥘉而不與之䖏樂扵象服委蛇之後儻㣲追錫得無若汝水之墳南山之側遭世不淑詠歌辛苦者乎粤自命婦䟽以郡封爾其享哉永祔姑室可龍圖閣待制知潼州府閻蒼舒除煥章閣直學士提舉江州太平興國宫敕朕新嗣服有懐耆俊庶㡬聞而作興曰盍㱕乎来而何遽以賢勞欲觧州組不顧乎具官某材猷出於軰學議論近於前聞蚤陪禁路邁徃不群而晚為岳牧又何其豈弟也竟上􅈤章将就居里六閣通班莫髙於學士殊庭均逸莫便於外祠申錫命書勉從所欲毋為考槃永矢弗告此朕之所以圖於卿也可知成州字文子震知潼川府敕具官某以吾䑓閣之臣而淹恤之乆僅起爲州又絶逺外此士論所甚􅓹鬱也潼於所部爲東西蜀地望甚重卑爾州組庶究爾能益輯外庸嗣有褒異可新知真州權安節除利州路轉運判官朝奉大夫徐柟除廣東路轉運判官敕具官某等夫持節行郡國是爲周王人漢部刺史也然周以下士漢纔秩六百石何歟深知此意冝何以圖報乎爾安節尚懐郡章爾柟甞有朝蹟㑹擇逺使僉曰汝堪此周漢意也安節誠以其恵清江之民者将漕於蜀部柟誠以其恵零陵之民者将漕於嶺表調度不煩抑揚無阿是足以㱕報矣可司農寺丞李大異除䕫州路轉運判官十月二十日敕具官某夫持節行郡國是爲周王人漢部刺史也然周以下士漢纔秩六百石何歟豈非擇英俊之在下僚者試可之乎爾大異甞以文藝得雋春官蓋輩學徃徃膴仕而方抱槧修書徒勞州縣之間也晚綴班行又㝡平進若爾者是足以循周漢之制越次而出節矣将漕䕫門布宣徳意自今以始庸究爾能可籍田令費士寅除太學愽士十月日敕具官某以西州之彦甞先闔郡䇿名春官日来造朝風度醖藉東州士樂與群居也猶爲藉人未足著見分以横經之席徃哉汝諧可武學諭黄褎然除武學博士主𬋩架閣文字蔣来叟除武學諭並十月二日敕具官某等右學猶左學也朕既妙選凡掌東學之士則右學可以次舉矣以爾褒然晉都講席爾来叟聮教事於其間經武緯文扵穆士論不亦可乎可知州不畫問除司封郎官淮西提舉張同之轉一官再任敕具官某等荒政十二著扵周官茍非其人是徒法也爾畫問以郡太守同之以州刺史當歲不淑克究爾心使境内無菜色計書来上朕甚嘉之誠得監牧如二人者布之海内吾民其蘇矣乎書勞進秩冝見褒異至如晝問訖事遄㱕郎省同之善後因任使華朕意攸属無有内外可軍噐監主簿王恬除司農寺丞将作監主簿劉三傑除太府寺丞並十月三日敕具宫某等列寺丞非所以見才也以今仕版徒勞州縣蓋未甞有一日朝蹟者而校數之則是亦足以致身矣爾恬爾三傑非甞淹恤於州縣者歟頃因揚簿正二監今以恬丞大農三傑丞外府豈足見汝才哉尚務靖共以湏器使可主管官吿院李孟傳除将作監主簿幹辦諸司粮料院張震除軍噐監主簿並十月四日敕具官某等二監於百官事為簡簿正之職於監事益簡有以好修不務競趨者居之斯不謂稱乎爾孟傳震無以為序進而不加勉也可浙西提舉鄭公顯改除湖南提舉敕具官某漢三互之禁吾本朝莫之行也至士大夫以嫌自言則亦從欲以便其私爾公顯持寰内之節風指􅏮然而以司憲姻黨雅不欲聮事也􅈤章来上易汝湖湘姑徇爾懐毋曰胥逺可止齋先生文集卷之十七
