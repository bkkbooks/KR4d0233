front:
  text: 止齊先生文集卷之三十一
  hash: sha256:d1d2b5bbe690baf590cfd79564541f9af71185719c967906586239d342f0f718
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_031-1a}
body:
  text: 表夀成皇后冊寶賀皇帝長樂問安重闈燕喜太常議禮大冊崇成鋪陳典章炳耀古昔中賀恭惟皇帝陛下盡倫之至為治之原重以離明方繼大人之照受兹晋福聿申王母之休揭盛典於熙朝燦縟儀於顯冊三宫衍慶千載同時臣阻詣漢庭尚于周隰麟趾騶虞之化幸際風移雞鳴鶴駕之朝莫陪旅進賀夀皇聖帝五日一朝俱享玉巵之奉六宫九御載揚寶冊之文邦國有光臣民胥慶中賀恭惟至尊夀皇聖帝陛下重華稽古正始齊家事親以萬國之歡虞嬪是相夢帝有九齡之豫文母攸同方遊神於穆清之宫而垂世皆希濶之典臣繆叨乘傳適阻稱觴雖莫陪鶴駕之朝觀光禁籞尚能述麟趾之化流詠河洲賀夀聖皇太后鶴駕問安夙備西廂之敬螭章成禮尤嚴北面之朝盛事罕聞鴻休疊出中賀恭惟夀聖皇太后殿下助成隂教贊佑皇圖式符坤德之元尊為聖母爰作離明之兩親授神孫適昭揭於徽稱宜恪恭於婦職臣繆將使指逺去朝行雖莫趨長樂之班但遙賦關雎之詠賀夀成皇后三夀作朋備極慈闈之養重明麗正前陳寶冊之文振古所無大邦之慶中賀恭惟夀成皇后殿下虞嬪匹美文母齊芳袗衣鼓琴克相重華之化寢門侍膳聿成正始之風惟二十七載之明昌宜億萬斯年之稱頌臣逖聞盛舉欣遇明時雞鳴鶴駕之朝雖莫陪於盛事麟趾騶虞之化尚䏻播於聲詩賀皇后徽冊有光尊歸北闕尚宫前導制舉西廂彌文煥然內則嚴甚中賀恭惟皇后殿下贊禆孝治修潔母儀䄖翟禕衣寅奉執笄之禮根車羽蓋載嚴問寢之朝式當寶冊之成恭想玉巵之奉臣冒持漢莭阻簉周行逖聞縟典之肇修自慶愚生之幸㑹皇后冊寶賀皇帝書周正月粵若始年建漢長秋兹惟內治三宫燕喜四海瞻依中賀恭惟皇帝陛下離明而巽齊乾健而坤順共為子職必有告榛栗之慶彼以功必有獻穜穋之種眷言中饋聿自初潜式陳王冊之文用正椒房之號於以端本豈徒示恩臣乘傳於兹趨庭罔及關雎正始當明承教化之由卷耳審官敢在知勤勞之數賀夀聖皇太后慈闈問安夙謹東朝之事正宫備冊載修北面之儀鋪揚典章慰懌中外中賀恭惟夀聖太皇太后殿下德尊聖母謀卑神孫謂九重端冕之儀早垂內則而再拜執笄之禮首建中闈既陳衣庸備玉牃臣逖聞縟典阻造外庭望紫闕以傾馳與蒼生而瞻頌賀夀皇聖帝迪從子保喜承長樂之顔先欲家齊親卑塗山之助再掦顯冊盡出宏規彌文畢張率土稱慶中賀恭惟至尊夀皇聖帝陛下以身為度於禮不愆凡后妃嬪御之常悉循古制而父子夫婦之王曲盡人倫兾其嗣太姒之音足以正二南之始式陳玉檢用建椒闈臣逺去朝行謬將使指雖欲殫於頌述曽莫究於形容賀夀成皇后坤象承天甫就㫖甘之奉家人正位仍嚴笄總之朝宏休載揚盛事創見中賀恭惟夀成皇后殿下化由治內道本家齊謂嗣聖御圗適萬乘龍飛之旦而尚宮奉冊修九重燕寢之儀式昭六服之常庸備三宫之養臣驅馳周隰瞻望堯階聆寶瑑之鋪張與編氓而抃蹈賀皇后貢金九牧夏統惟新正位六宮周儀攸重於穆椒房之號有光彤管之書中賀恭惟皇后殿下作配乾濳同功坤載舜鼓琴𬒳袗克傳媯汭之規禹菲食卑宮實變塗山之美長秋初建諸夏宗依而父父之尊榮將以垂孫孫之矩範臣瞻言京室頌詠河洲獻穜稑於王遙想躬行之事采藻蘋於澗益觀丕變之風湖南提舉謝到任重明麗正方此第功五在邉然冒寵業未免宜黜得遷之儀臣不勝以榮為懼之情中謝竊以蕞爾桂陽鄰於嶺表自升軍額將五十載之間可紀守臣才一二人而巳然必宣勞而滿歲乃能循次以為州未有即賜除書遂將使指輒衡陳於當路皆度於它邦周㑹王人微亦序諸侯之上漢置刺史始皆屬丞相之官豈容如臣亦預兹選重念臣腐儒無用假守罔功勤不足以蓋荒政之愆廉不足以塞曠官之責顧專城而不理况闔部以安施雖幸遭時以政拙心勞而見録未知善後將力小任重之為憂兹蓋伏遇皇帝陛下自天出寧如日委照敬識百辟之舉無有幽深允釐庶績之熙不遺微細遂令庸冗輒沐恩榮臣敢不懋明詔條采聽謡俗平頒興積庶將自古以有年懋遷化居不失與民而共利提舉司謝賜曆日夏時三之日振古如兹周曆萬斯年自今以始凡蒙敬授悉賴裁成中謝恭惟皇帝陛下得聖之傳為天所命受三朝之圖籍罔不朝宗在七政之璣衡皆如軌度乃頒初政爰布新書臣濫職將明當思考協不違咫尺既同拜賜之榮敢離須臾而怠觀風之事湖南轉運判官謝到任乘傳彌年缺然𥙷報將輸所部滋甚光華中謝惟本朝行仁政之原自諸道置計司而始孰為之說浸失其傳不知國家之意本以勝暴殘但曰藩鎮之財聚而歸公上由是多故至于中興雖懷惻怛之心莫奉丁寧之詔惟聖有作視民如傷疇咨廷紳申固邦本方當講求民瘼之際冝得布宣主德之才深明盈虛稍務損益顧以兹事付之臣愚伏念臣學不過於虛談仕未離乎嘗試曷期衰暮偶際休明且治郡徒勞𥘉無毫髮之效况察州不敏近在目睫之間以自知之甚明將大幸之難再云胡隆委得以次遷恭惟皇帝陛下豈弟作人髙明覆物謂曠日持久或有盡知情僞之長謂便道之官庶無數易將迎之患遂令庸冗有此僥踰臣敢不對越龍光勉旃駑力苟不至乏絶以貽屯所之憂則有條便宜當漸為來者之計湖南提舉賀慶節太極之生兩儀尊無與並嵩髙之呼萬歲喜不自勝中賀恭惟至尊夀皇聖帝陛下德配百王心遊太古行堯之道莫測於聖神薦禹於天復於順受適紀誕彌之旦永膺滋至之休臣將指荆湖馳心魏闕為夀雖莫綴於清班石崖可鐫豈敢忘於善頌湖南運判賀重明節地闢天開聖作明述於赫重離之運有來載震之祥中賀伏臣禹相舜歷年之多武繼文受命之固昔嘗聞於六藝今親見於一時恭惟皇帝陛下允執其中聿修厥德斂時五福豈惟叙有夏之疇與我九齡抑又過成周之歷臣濫將使指嘗簡睿知若帝之𥘉雖阻闕庭之觀禮如山之夀但瞻衡嶽以為詩重明節進奉銀後天祝算既同嵩嶽之呼任土貢珍爰致荆州之品前件銀氣鍾清淑産類朱提侑萬年之觴深慚微幣得諸山之甕願賦休祥丙辰賀瑞慶節長彂其祥自一陽之生子誕彌厥月當六位之成乾宗社寵嘉華夷欣頌中賀恭惟皇帝陛下聰明時乂剛健日新省事清心獨冠百王之上深仁厚澤丕承列聖之傳於萬斯年自今以始臣頃叨虞侍最荷簡知屬當去極之遙阻在奉觴之後昭回下燭常對越於奎文舞蹈永歌但熙然於堯壤丁巳賀瑞慶節地闢天開爰紀大來之慶川增山夀咸輸美報之誠中賀恭惟皇帝陛下典學光明性原溥博淡然無欲裒六藝以自怡聖矣不居守舊章而唯謹是宜誕為民極永荷天休臣介在遐陬阻陪盛事每慚隆眷曾無圯上之一編竊幸餘生猶有華封之三祝戊午賀瑞慶節聰明作后聿開出震之祥歷數在躬有永後天之算中賀恭惟皇帝陛下宅心慈儉玩意穆清承列聖之儲休輯兩宫之燕祉誕為民極長握乾符臣夙荷簡知久違抃蹈嵩呼萬歲欣盛事之難逢天保六章愧隆恩之未報己未賀瑞慶節萬年景福誕膺天授之休四海歡心姑盡臣恭之義中賀恭惟皇帝陛下道無偏陂學有緝熙燕及兩宫增聖圖之廣大陶成多士粲王度之清夷肇開震夙之期永享熾昌之夀臣蒙恩至厚抱釁罙深積五稔之凌兢無一毫之覬幸衣冠甚偉雖阻預於耆英畎畝不忘但欣逢於華旦謝中書舍人代言之任與政相通顧惟何人亦在此選中謝臣聞惟虞夏商周之世有謨訓誥命之書至於兩都亦稱七制要是人主猷為之盛見於儒臣文字之工惟其相遭是以不朽然則鄒枚而下詞藻豈謂之乏人魏晋以來號令不聞於傳世雖僅存於職掌曾何𥙷於治功洪惟本朝追並隆古慶曆元祐之際豈非千載之一時歐陽蘇軾之徒故有六經之遺意式至今日作興斯文由此觀之則臣幸甚兹蓋伏遇皇帝陛下虛心無我立政惟人方旦視民而如傷未嘗以位而為樂凡所􅣤告無非休明臣敢不益勵初心以期後效必也緝熙光明之學至於令終庶乎草創潤色之文可以行逺止齊先生文集卷之三十一
