front:
  text: 止齊先生文集卷之三十四
  hash: sha256:51f652f98905c9e3861f5547c78a2ecaa31883ed3458c8d34b74052dcb307f11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_034-1a}
body:
  text: 啓答王簽判貴名方起誰不納交暮景巳侵胡然辱贈豈左右之過聽以往來之游談否則好謹將以成大顧此道之不作當古人而與求某官學足以逢原言足以行逺博極百家之說斷以中庸奄觀三變之文歸於爾雅如迫逐功名之㑹則從容議論之流嘗試緒餘蔚為舉首况乃占五緯蓋荆州分野之祥而其應三魁皆嶽麓同門之舊天無虛象事未前聞永惟興宋以及今僅見聚奎而有此信如公等端為時生曾謂陳人可堪華問某方恨盍簪之無所不圖乘傳之有期先之報章行矣拜况須乃留更僕盡聞他日之行藏恐不俟駕車巳繫吾人之消長答長沙宋知縣謝解譽處甚休計諧何晚聞之有識僉曰攸宜共惟國家之多賢本於科目之取士蓋以逺大之業在於章程之不違招猍之公甚於聲譽之兼採所思亦多新進少年斐然之作不必能得故家舊族試可之才誰為羽儀增重場屋某官中庸之學爾雅之文奕世源流一家機杼士無知巳固宜連枉於有司人亦勝天豈能厚誣於君子矧如門户屬此弟兄蓋嘗聞乾道千佛之經尚未繼天三人之選惜者有日意其在兹某偶因乘傳之來遂託之舊喜於善類上賢能再拜之書憂在􅘃官無直諒多聞之友賀范提刑摻别吳門未知後會來宣楚甸乃與旁觀爰方拂篆之初罙甚盍簪之喜某官清朝聞望昭代典刑冨貴功名雖今多士風流藴藉如公幾人蚤結聖明之知浸躋華要之路過家上冡陳義固髙攬轡登車須賢為急言念江湖之阻嘗煩廊廟之憂兹惟祥刑可以弭盜苟吾使無訟用能鞠草於圜扉則人自不冤安得弄兵之赤子少屈以此遄歸有期某嘗託下風又聯小事平生久要誠知不遐棄之心世事多違恐有母疾驅之詔答諸郡賀冬十國為連仁聲相逮七日來復福履攸同乃如蒙成敢不胥慶某官以縉紳先生之望為五等公侯之尊政與時新既於昭於永譽天惟民視宜茂介於鴻休過觀上考之聞即對遄歸之寵某相依幸甚善頌云何敢以景於南至去極漸近之占以為剛自外來為主於內之應與趙安撫賀正元年正月肇開與物之春同姓一家均被自天之祿乃如胥慶矧在焉依某官以當代之英作大宗之翰如晋二丈而受彤弓之賜如武五宗而分赤社之封方茂對於寵光用亶乘於榖旦某幸聯小事竊借餘光喧馬盍簪遙想朋來之頌燕毛序齒宜遄天揖之班與張運判賀正元年春正月式會乾初名卿材大夫宜居泰內乃如胥慶矧在同寅某官纍朝故家多士先進以道山蓬萊之舊出董計書以國風雅頌之流下行吏事方亶乘於榖旦將茂對於龍光某偶托下風每資餘潤豈徒使騁致憶别之雙魚所兾工歌聽勞還之四牡答郴州丁守見面未見心昔尚牽於毀譽同功而同過今乃得於戚休永惟世道之相違大抵交情之不篤苟如失意即杯酒以相讐借曰故人曾綈𫀆之足戀孰有惟鄰之厚見於方事之殷况復蒙成遽先濫賞公固察此有分財自豫不以我為貪之風人將謂何蓋受爵不讓至于巳斯亡之類幸而論定竟以功遷是持九五知人之明與夫二三執政之力曹丘未見人皆多季布之賢狗監不言上必重相如之賦何卑謙之已過謂竊誦之云勞無故得之不勝懼甚恨其人來謝初非求安世之名好以事為功正恐獲髙止之罪願言深戒庶以相安賀劉殿院光祖光奉恩綸進司風憲上念深矣師言穆然某官髙明有融中立不倚學得其要宜在四科之間論歸於平不致九流之辨而又養以靜重彂於謙和自肅朝端益隆物望往者一臺之長取諸三院之聮蓋啓沃帝聰必獻納司存之久而維持國是宜名實上下之孚豈曰序遷政惟衆允矧屬清明之始方須是正之賢疇咨百工誰克堪弄印之選孤立一意公素有埋輪之名爰舉宏綱以聳群聽行述百年之憲遂躋三事之班某辱在下風頗蒙異顧雖上體朋亡之義不欲自言至荐叨器使之恩敢忘歸德賀林察院湜光奉恩綸進司風憲方棘闈之試士豈無周行以烏府之須賢曾不竣事上念深矣師言穆然某官薄海令名當今大雅以運量不窮之才而養以靜重以正直無偏之操而發於謙和雖未結於主知固巳孚於物望永惟國勢莫重臺綱何近事之不然而缺員之弗𥙷孤立一意公素有埋輪之風疇咨百工誰克堪弄印之選除書所播群聽無譁某早辱下交最蒙異顧平生自附固深知久要之心泰道方亨宜上體朋亡之義除運判與交代傳提舉伯壽簉蹟周行辱為後進觀風漢部愧在前陳雖欣道舊之有期亦懼告新之無狀靜言久要欽遲肯來某官學優古人文妙天下以大學中庸之㫖䆒觀九流以國風雅頌之音奄有衆作科名甚偉譽處誰如遍紬石室之藏分治天官之目爰方鄉用胡乃倦游永惟先正徇國之風不數宣和在庭之士忠孝奕世莫盛於一門出入三朝未離於五品士方太息公巳遄歸某􅘃曠之餘覆護何幸况尚聨於小事而近託於下風然陽子之去舂陵遂著壞麻之節而賈生之對宣室訖蒙前席之知恐公此行孤我所望謝宰執擢居刺舉方黍攸司就卑安所部固已見大造保全之意或者資晚學嘗試之能伏念某語道茫然涉世踈甚意惟竊祿以為暮年饘粥之謀勢可投間庶遂平生筆硯之樂豈期遲晚乃際休明起十年家食之人拜三命踵來之寵分符共理信撫字之徒勞乘傳察州於建明而何有矧今漕事絶重他司督九郡之民庸餉三流之禁旅承平既久不出數端所當取之名中興以來未免一切不得巳之政况地控湖嶺俗雜民徭正須通變之才以權損益之術有如無似深恐不勝某官盛德愈恭虛心並受以其便於遷徙庶免新故迎送之勞以其習於見聞或得利害廢興之實遂令庸散倍費生成敢不博詢所長仰副兹選邉鄙不聳雖無軍旅乏興之憂銜轡甚寬庶免煩難見短之責謝侍從備數監臨缺然𥙷報升華餽運益不自安靖惟厚幸之由端有裏言之助伏念某庸踈巳甚迂濶奚堪少所為燈大之謀大不過稻粱之利偶緣場屋之困嘗録於宗工遂免州縣之勞浸升於膴仕今已過望他無覬心凡其竊祿以妨賢特以便私而畢志不圖殘枿晚多雨露之恩所恨罷駑終乏風沙之力矧此湖湘之寄久為江漢之宜得通才以膺隆委職在辨護則有遲鈍不及事之憂誼當激揚則有姑息以愛人之患持是書生之短責其吏事之能處非其宜懷以為懼某官言為國是志與人同苟聞有時輩之名則取作朝家之用乃如愛蓄尤切吹噓某敢不知所感興勉其偷惰雖無𥙷秋毫之具安能及人然未先朝露之年敢纍知已賀丁郴州除湖北提刑筮言榖旦涖止崇臺便道之官不待上漢庭之計入境問俗已來宣周隰之勞先聲所孚群聽咸若某官器愈大而能受才無施而不宜欲請長纓宜雲霄之可上尚分半竹胡州縣之徒勞蓋其老成而上益詳於試可果煩以四方之典獄俾洽乎纍政之深仁問平反幾何人豈特庭闈之喜得參錯十數輩當知江漢之寧某阻自車欲馳聘介以浙東西之雅故晚更知心於湖南北之司存今當取法賀留左相孚號昕朝正名台極兩宫嘉與四海榮懷共惟某官德盛而禮恭功大而心小誠身有道非聲音笑貌之聞事君以忠在期㑹簿書之外自持國柄益卟師言至於散植壞群而無智名哀窮悼屈而無德色燕及幽隱薰為豐穰于以成正始之風于以答重華之意爰𬒳殊常之眷竟膺虛左之求夷考前朝蓋有不備官而專美乃如近制率嘗與次輔以同升舉世翕然惟公宜此某辱知最厚頌美尤勤况未免於驅馳尚有煩於顧恤雖多病早衰之故欲陳力以無堪然大書深刻之傳或托名於不朽賀王樞使疇庸左轄正位中權渙號之孚群聽惟允某官直方以大中正而通德雖盛而愈恭義可為而必勇功名自許無愧社稷之臣富貴不渝尚餘湖海之氣自參大政益展壯猷苟利公家寧顧便文之計務先天下不知折節之難于以成正始之風于以答重華之意爰𬒳便蕃之寵進專宥密之司聞之師言久矣上意蓋小宰若今中丞未曰柄臣而太尉為右丞相厥有故事將以託國豈惟本兵佇聽文德之麻以祚中興之運某辱知最厚頌美尤勤况未免於驅馳尚有煩於顧恤雖多病早衰之故欲陳力以無堪然大書深刻之傳或托名於不朽賀胡參政擢陪大政就翊洪樞二柄同歸四方歸重某官才全而德懋實大而聲閎尚友其人皆前修之輩行事君以道必平昔之之規模永惟絶俗之資亶有格天之業宜簡知於睿主遂夾輔於昌期而况瞻言坤維代有人傑范蘇二氏緝熙元祐之休雍衛兩公弼亮重華之盛以是邦之問學知今日之訏謨若乃大明生於東伏群隂於將旦九河注之海屹砥柱於中流則在公身尤關世道某側聞渙號倍激懦裏雖深知久要之心而敢犯朋亡之義愛之莫助有懷未免於感興老矣無能所恨不堪於驅使賀丘侍郎顯承天寵晋二地官渙汗之揚師言惟允某官清朝偉望昭代英才風人二雅之文皆有典則方伯三監之效蓋出緒餘頃從畿甸之聮來定曲臺之禮凡所建白色動冕旒立皆施行功在宗廟矧是逺交之好誰如專逹之才豈煩使之徒云將寵光之狎至求諸掌故在此勞還屬省禁之缺貟宜周行之循次上方弄印謂見大夫之無人公未入疆出諸君子之不意徑從絶域遂扈甘泉以睿簡之彌勤非民曹之可久某受知最厚贊喜實多公論不誣猶曰用賢之晚交情所屬政惟行道之難上嘉王賀冬鳴鑾順動舜禹交歡鏤玉崇成姜任胥慶亶惟元子對越昌期宜膺萬福之同允屬一陽之始共惟皇太子大王仁由天授學本聖傳語及三宮亟見津津之色講聞六藝曲垂亹亹之聰惟育德以彌新將以剛而俱長裒時丕祉為國元良某辱在隆知可無善頌今夕何夕當觀乾健之濳藏雖休勿休更玩震亨之修省
