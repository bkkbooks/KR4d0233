  - {type: variant, offset: 2, length: 11917, content: 先生文集序先生禀抱天頴研盡學力據六經奥會執九經百家之轡俾環嚮以趍于一披剔文義躪藉衆糾究明帝王經世宏模而放于秦漢以下治亂興衰之故獨掲源要不牽多𡵨由是彰往考来默察當世丕平之機深抱大業至扵化裁推行不動聲色使人囬心而嚮道者其綱領條目靡不該具盖嘗忘寝廢食審玩孰復庶幾對越天地百世以俟後聖而不感也雖言論未孚㡬進輙沮而志念囬皇與物委蛇左推右挽旁接廣诱其任重道遠终老未當一日敢忘扵斯焉嗚呼盛矣鄒魯之統緒河洛之承續千載以来不知其能㡬見也執經户外方屨闐集片言落筆傳誦震響塲屋相師而紹興之文丕變則肇扵隆興之癸未屏居梅潭危坐覃思超詣绝軼學成道尊則邃於乾道之丁亥博交遍騐洞礙融窒對䇿初苐懇藎獨到則盛扵乾道之壬辰官太學倅閩府詆劾却掃勤十寒暑紬繹文獻宏綱具舉則備扵淳熈之丁未起守挂盟持節湖南䟽滌拊摩民信有古百年之思欝乎湘山則騐扵紹興之庚戌召對光宗驟遇奨用侍立代言賛翊儲邸次苐藴畫庶将發揮則著扵紹熈之癸丑宛轉極諌徬徨乞身龍飛急召十旬乃罷爰抒舊志著于训傳疾疢漸臻梁木竟殞則終扵嘉泰之癸亥叔逺夙蒙挈䇿俾窺津涯蒿幹鷃羽惕負大賜適當新義川漲群文蝟興疇昔愬析而致孤條之靡欝砥途之失榛乎是用敬輯遺稿寄諸琬琰儻開後哲庶弗淪墜矧韋布眩墓影響編傳或混㓜作或雜真贗詭題叢帙誕弥遐陬輪耀掩汚理合釐别故今裒次㫁自梅潭丁亥之後凡為歌辭古律詩内外制奏狀劄子表啓書簡序記雜著祭文墓志行状總五十一卷即先生燕坐之齋以爲集名若成書則有讀書譜二卷春秋後傳十二卷左氏章指三十卷周禮進說三卷進讀藝祖皇帝實錄一卷未脫稿則有詩训義周漢以来兵制皇朝大事記皇朝百官公卿拜罷譜皇朝財賦兵防秩官志藁别自為編附識其目庸熄淆亂先生名傅良字君舉世系㦄官具見于神道碑墓志銘行状云嘉定戊辰門人承直郎太學博士曹叔遠謹序止齋先生文集目録第一卷歌辭暮之春西廟招辭并序古詩落葉一首别諸友讀范文正公神道碑有感佚事送國子監丞顔㡬聖提舉江東分韻得動字懐寧國守鄭少卿景望送國愽叅議江東分韻得夜字逰皷山和縣偉卿雜言送林正仲丞玉山和林懿仲喜雪韻再和除夜用前韻和林宗簡除夜韻再用喜雪除夕二韻寄宗簡賦芙蕖送楊似之提舉湖南哭吕伯恭郎中舟行寄諸友張冠卿以詩十首見寄次韻奉酬黄巖張之望之立来訪與逰梅潭詩以送之和張孟阜㝷梅韻送劉茂實宰奉新送趙叔靜教授閩中四首送白石巖和孟阜老梅韻再和第二卷古詩送同年林多益丞海寜送謝希孟陶㸔笋和潘飬大韻贈尹紹伊送郡守汪充之移迨嚴陵寄題陳同甫抱膝亭送葉正則赴浙西憲幕送葉陳益之架閣送翁誠之慰慈溪送包清卿教授莆中作南塘記郡守沈持要以詩来謝次韻奉酬送謝倅景英赴闕懐同舎石天民編脩次韻蕃叟弟月下有感夢人誦詩覺省數句足成一首送曹噐逺試臨安二首約同舎蜀人王徳脩三首次徳脩僊巖韻再用韻呈徳脩夷門歌送徳脩還闕借書一首别薛子長寄陳同甫生日述懐簡鄭景元簡王道父贈東陽吕望孫周登二武士書黄巖丁明仲墓誌碑隂第三卷古詩赴桂陽道中喜晴書事簡友人二首和王教授謙叔述郡圃韻次臨桂尉楊渭夫韻送宋伯潜宰髙安送楊渭夫歸省南嶽聖葉寺禹相牡丹和潘養大韻次張漕過湘㟁韵送王南强赴紹興簽幕四首題明皇醉歸圖送范憲東叔帥潼川四首行湘喜雨簡劉公度周明叔劉連州和韻因過湘中之樂以謝葉正則閱蔵經次其送客韻問之和張倅唐英咏梅十四首招隱二首記夢第四卷古詩始生七章上皇子嘉王生辰送丘宗卿帥蜀短歌送吕子約丞郡天台送黄子文得縣瑞安送陳仲孚還里李夢符教授恵宣聖畫像用韻奉酬還徐叔子犀帶憶笻杖蘭花供夀國舉兄東陽郭希吕山園十咏送郭希吕水仙花止齋曲廊𥘉成次沈儉夫求花木韻春晚書懐二首奉簡陳益之題沈仲一所蔵周氏群公書帖贈章虞卿并序題僧法傳為沈仲一畫聴松圖送畫僧法傳題瑞安宰朱元成乃祖雲壑莊圖咏梅分韻得蘂字送蕃叟弟赴江西帥幕分韻得獨字皷琴行送許父同知赴闕并序送徐一之客贛上兼簡薛象先弟五卷律詩新昌詠歸贈石時亨并序題觀潮閣上閩帥梁丞相生日二十二韻送鄭少卿知建寧五首庚子除夜有懐送沈元誠赴臨漳主簿送徳逺弟赴省和張孟阜歲旦韻寄沈元誠晚春二首送縣謇卿赴壽昌主簿哭吕大著至明招寺簡潘叔度招徐居厚天台王子木觧官長樂見訪月夜書懐二首送周魯山辰州法曺㳺丁次翁篔簹園期次翁永至送朱同之福州户椽覔樹栽題仙巖梅雨潭次陳益之韻戲呈汪守充之汪守三以詩来次韻奉酬酬謝倅景英用前韻見寄用幽宇韻戲簡謝倅用前韻呈汪守謝倅用前韻荅賈端老月仙巖還舎留别諸友送任虞卿教授江隂和謝倅見贈生日二首再和謝倅生日景元益之考試旁郡夢與歩月聮詩得銀字韻追成一絶謝倅監試未畢事而出以詩三章来用韻奉酬沈仲一三益堂逰金奥趙園海棠絶句湖樓送客即事一首奉懷益之兼簡同餞諸友春晚一首約同志汎舟用前韻招蕃叟弟仍和蕃叟癸卯二絶送翁誠之尉慈溪和陳仲石韻送陳仲石韻送謝懐英道士歸廬山二首送陳持中赴四明節推二首寄彭子復徐子宜次韻酬丁少詹瑞安宰劉伯恊載酒逰園小雨喜霽和丁少詹韵病餘遷仙巖書院扵屋西有懐同志酬陳頥剛見和寄謝景英參議寄題翁誠之慈