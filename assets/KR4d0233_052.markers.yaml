  - {type: variant, offset: 5, length: 9970, content: 集附録卷之五十二宋故寳謨閣待制贈通議大夫陳公神道碑龍圖閣直學士通議大夫致仕奉化郡開國侯食邑一千樓鑰撰嘉定三年集英殿修撰陳公告老于朝天子歎曰此吾舊學且書命之臣也除寳謨閣待制遺奏聞贈四官錄其後所以飾其終者如故典門弟子哭之失聲里人聚而相吊四方士夫聞之無不䀌傷者蓋非它人云亡之比也公諱傳良字君舉其先自閩徙温州瑞安縣㠶逰鄉湗村里至公八世矣曾祖靖祖邦父彬皆不仕父以公貴累贈朝請大夫妣徐氏贈令人朝請邃於易教授鄉里以篤行稱公天分髙勝其於學問心悟神解而苦志自勉精力亦絶人隆師親友有不可觧於心者興化劉復之朔以南省第一人来為司户參軍攝教官得公程文以為絶出公之年甚少也而名巳髙開門授徒於仙巖僧舍士子莫不歸敬薛寺正士龍季宣見公問所安公曰毋不敬士龍曰比參倚如何公釋然増進歸心薛氏後又相從於滆上讀書一日千里其為薛氏祭文云我昔自喜壁立倚天見兄梅潭忽若隊淵梅潭即仙巖也伊洛之學東南之士自亀山楊公時建安㳺公酢之外惟永嘉許公景衡周公行巳數公親見伊川先生得其傳以歸中興以来言理性之學者宗永嘉惟薛氏後出加以考訂千載自井田王制司馬法八陣圗之屬該通委曲真可施之實用凢今名士得其說者小之則擅塲屋之名大可以臨民治軍之際惟公㳺從最乆造詣最深以之研精經史貫穿百氏以斯文為巳任綜理當世之務攷覈舊聞於治道可以興滯𥙷敝復古至道條畫本末粲如也本朝名公鉅卿不可縷數然自韋布而名動宇内者不過數人公自為舉子業其所論著如六經論等文所在流播㡬於家有其書蜀中文學最盛讀之者無不動色文軆為公一變至傳入夷貊視前賢為尤盛乾道六年始入太學士無賢不肖歛祍下風八年公之髙弟蔡公㓜學為省元公次之徐公誼又次之薛公叔似鮑君繡劉君春胡君時等皆鄉郡人非公之友則其徒也尤為一時盛事既登甲科朝野想望風采授㤗州教授以歸叅政龔公茂良帥江西以書幣招之碩與定交公曰此古人羔鴈之禮不行於世有年矣善辤之未赴㑹太學録闕求之者衆龔公實行宰相事奏孝宗曰待次不改闕初官不堂除陛下良法也太學録一闕而睥睨者衆臣欲擇取名儒為士林所推者越拘攣而用用則人自服矣上問為誰以公對上曰是朕所素知者除命一下果無異辤就職㡬月車駕幸學改承奉郎龔公既罷政亦浸有相嫉者添差通判福州帥相梁公克家得公喜甚以政委之公亦悉心禆賛不事形迹卒以專擅論罷時淳熈七年也尋主管台州崇道觀起知桂陽軍閒居八年始赴郡提舉荆湖南路常平茶塩事就迁轉運判官改兩浙西路提點刑獄公在桂楊蠲除宿負罷弛斜科倉司則補糴諸郡米至十萬斛漕司亦蠲錢數萬緍力講荒政所及者廣進登極銀三千兩屬力救荒力不能辦申請减額損三之二實恵遂及一方以服勤使事嘗感寒疾至是以奏事再入脩門鬚鬢如雪丞相留公正一見嘆曰㡬年陳君舉尚可使外𥙷邪奏留爲吏部員外郎𥘉對上曰卿去國㡬何朕時欲見卿乆矣知卿學問深醇有所著書進来時上臨朝淵黙罕有聖語公敬謝而退以周禮說進擢祕書少監訓詞曰朕日御便朝延見郎吏有郎白首色夷而氣温儐者賛其名則汝傅良也朝列傳誦實黄公裳之詞也兼實錄院檢討官皇子嘉王府妙選官寮以公兼賛讀未㡬除起居舍人兼權中書舍人期年始迁起居郎紹熈末年龍樓問寢不以時自大臣而下更進讜言從班多連名騰奏或同班叩請公自以受不世之遇必欲身任其責請對直前㡬無虚月剴切痛憤指陳利害無所不用其至蓋嘗賛嘉邸為中宫言之又嘗奏䟽謂臣等在王邸於古今父子君臣之際人之大倫天地之正義以開導賢王而㑹慶闕上觴之禮長至虧称賀之儀區區口耳之感必不能勝躬行之化紙上之習必不如家傳之法今既上失三宫之歡則臣等講讀皆為空言矣其餘骨鯁之言有敵巳以下所不能堪者上終不加譴而言亦不用一日奏云陛下屢許臣以出又令傳㫖於廟堂而復不然臣貪戀厚㤙未忍决去容臣退思補過更圖入奏若不垂聴則有致為臣而去耳又從而草奏曲盡事節犯顔極論度上意不囬遂上掛冠之奏上雖不受玉音賜可公即申省乞致仕宰輔留之不可既行授祕閣修撰嘉王府賛讀皇上御極以中書舍人召還兼侍講兼直學士院同國史院修撰謂可以行素藴矣而言者指其學術不正罷為提舉江州太平興國宫慶元二年復劾其在太上朝奏對狂率降三官罷祠嘉㤗二年叙復元官再卑祠祿遂除泉州以病力辤至再除集英殿修撰病革謝事遂有次對之命十一月十有二日終于里第享年六十有七積官至朝議大夫爵永嘉縣開國男食邑三百戸娶張氏名㓜昭字景惠主管禮兵部架閣文字孝愷之女以婦徳著聞先公九年卒子男二人師轍迪功郎安豐軍夀春縣主簿師朴承務郎女七人長適迪功郎監鎮江府淩口茶庫潘子順次適從政郎新福州連江縣丞薛師雍次適迪功郎處州州學教授林子熈次適廸功郎新福州連江縣尉徐冲次適進士張紹次適進士張疇一尚㓜令人葬於前山開禧元年三月庚申二子奉公之䘮合焉嗚呼以公之抱負偉傑學博而精觀書别有髙識作文自出機杼類非今人所可企及求之古人亦未易多得也受知三朝掌内外制經帷史館不為不遇而名髙多忌卒不得䆒其經世之學為可痛也公行誼著于鄉曲述作擅于當世不待屡書敢摭其論奏之大者列之然後知其非䛕墓之詞也公之赴郡免奏事而去歸覲光宗以舊欲奏之孝宗者陳之蓋公憂國之心澤民之具其說不易謂藝祖創業垂統無非可傳之法而深仁厚澤𥙿我後人則專以愛惜民力為本攷之故牘自建隆至景徳四十五年間南征北伐未嘗無事而金銀錢帛粮草雜物七千一百四十八萬計在州縣不㑹古所謂冨藏天下者也諸道上供随所輸送初無定額留州錢物雖盡曰係省而不盡取大中祥符元年三司始奏立上供稅額熈寜用事者始取藝祖之約束一切紛更之新法既行増上供之額一倍至崇寜遂増數倍此特上供耳其它雜徭熈寜則有令項封樁元豐則有無額上供宣和之經制紹興之緫制月樁皆至今為額而折帛和買之類不與焉茶引盡歸都茶塲塩鈔盡歸榷貨務秋苗以十之八九為綱運是皆不在州縣於是取之斛面取之折變取之科敷抑配贓罪而民之困極矣方今之患何但夷狄蓋天命永不氷在民力之寛不寛豈不甚可畏哉上曰莫急於此但以䖏置為難公奏第三劄子乃是䖏置之說既奏褒羙再三其大畧曰嗣位之初詔為寛民置局講䆒而民窮如故蓋以裁抑細微或蠲空張之數未有以稱明詔慰民望也國家財力竭於養兵又莫甚於江上之軍故每欲省賦朝廷以為可則版曺不可版曺可則緫領不可緫領可則都統司不可以謂之御前軍馬雖朝廷不得知謂之大軍錢糧雖版曺不得預中外勢分職掌不同事權不一施行不專雖欲寛民得乎都統司之兵與向者在制置司時無異緫領所之財與向者在轉運司時無異事出一軆而後可議寛民力矣轉對又論藝祖治大而不治細以上書人文字令知制誥看詳升降以次對章奏下尚書省叅詳人主所自擇不過䑓省長官豈不甚易行哉又嘗論役法謂免役錢者本以恤民使出錢雇役而逸其力也自罷募戸長壮丁而取其錢今隷緫制之類於是役者白著而法不得不壊保正長催科是以保甲法亂役法而行之也熈寜自有役法五等簿是也自有保甲法魚鱗簿是也五等則通縣計之魚鱗以比屋計之保甲但以機察盗賊與免役初不相関熈寜七年始以保丁充甲頭催稅而耆戸長壯丁之属以次罷募利其雇錢而封樁之法起矣元豐遂著為令以甲頭同大保長催科元祐匆匆復舊随即紛更至紹聖二年催科悉用大保長役法轉而為保甲嘉祐以前固無此法至此又非王安石之舊特章厚為之今士大夫耻言安石之為人指章厚為罪魁而方世守其變亂之餘以為成憲萬古設法一安石能改之章厚能力行之此斯民最大之害乃若出於三代之舊而莫敢議有議之者則付之有司不過檢坐見行條法申嚴行下此臣尤所未喻也誠能不以保甲法亂役法雖未足以盡寛民力亦可謂至㤙矣進故事以真宗詔兩浙福建荆湖身丁錢並特除放其論尤詳以為减折帛不如身丁切於窮民此皆公平時考古驗今可舉而行非若泛然羙觀之言卒不得見於用若其封還詞頭遇事輒彂未易悉數如請還黄裳給事中則引唐吕元膺紹興程瑀以為比論張子仁之建節則請先䖏分留正之去留吴挺之除代而其甚難者莫如陳源與率逢原二者源之貫盈幸不及誅忽除内侍省押班瑣闥攝事者繳章五上人皆傳誦大臣力請觸雷霆之怒㡬不自全一為書行公議沸騰黨與凶熖不可嚮邇而公獨當之逢原麄暴恃有奥援所至兇横其在池陽㡬至軍變為緫領鄭湜所彂按其偏禆上命樞臣鐫戒方待罪間自副統制升都統公又論之源供職自如而詞命不行終不得俸逢原先𬒳宣劄巳自書䘖而公於二者執奏再三終不奉詔以至乞身而去公去未㡬而内禪子仁訖不得節鉞源亦罷去逢原以病廢惟此三事無敢嬰其鋒者公神色不動来則繳奏旁觀者為之寒心而外間罕知之者鑰與公同生於丁巳少我九日自分教東嘉為布衣交義兼師友後雖一同朝蹟而情義日篤一旦同在西掖同攝北門相與如弟昆然至於同寅恊恭尤非他人之比藝祖東嚮宗廟大典集議至再始正百年之禮而䑓諌有異論鑰極論之丞相趙公宣㫖鑰又執不可公從旁力賛其决而事遂定謝知閤淵以太母之弟有㫖請給等依祿格全支公已書行而鑰駮之再命特與書行公上奏先具鑰之駮章且曰樓鑰駮章委是允當始知臣失於點檢不及論奏若更書行臣有三罪一則迎合聖意不敢執奏二則衝改揮使有司無所馮守三則耻過遂非無見善則迁之義欲望追寢御筆仍正臣鹵莽之罪其事遂巳嗚呼孰有負重名於時致身至此而服義引慝同濟公議如公者乎汲引人才如恐不及在湖南應詔薦宋文仲吴獵蔣礪楊炤在朝則薦朱熹葉適吴仁傑王明清修史苟知其賢不復以私嫌為忌其他成就延譽使就聲名者不知其㡬也博極羣書而於春秋左氏尤䆒極聖人制作之本意左氏翼經之深㫖著春秋後傳左氏章指二書蓋經止獲麟孔子卒傳止韓魏反而䘮之之後殆未有此書也願見不可得則曰此吾身後之書近既得之誦讀不巳不揣而為之序其門人遂以銘為請鑰欲述公行事或恐有觸忌之嫌自以投閒十有三年已挂衣冠視䕃㡬何知公為最詳若畏避而沒其實豈不負吾亡友㑹稿未集而病深恐溘先朝露不䆒此志小愈遂扶憊而畢之公風度髙逺動輙過人詩律之精深字畫之遒媚登覽髙致吟諷低昻親之則使人意消王謝韻度尚可想也方主上在宫邸時寮寀以詩為夀惟翊善黄公與公之詩皆有諷諌上為置酒各親書所上詩謝之公後嘗奏知以御札登諸石而䟦其下以其藁示鑰未及刻而公歸訪求此藁不可復得猶記其略云季札觀樂歌頌而曰哀而不愁太史公讀虞書至於君臣相敕維是㡬安未嘗不流涕也成王作頌推已懲艾可不謂戰戰恐惧善守善終哉蓋頌者不專於羙盛徳之形容皆敕戒之義秦斯以来此義殆絶鑰讀之為之感咽嗚呼此又先儒之所未彂也銘曰温居瀛壖儒學之淵間氣所鍾挺生斯賢向舒金玉游夏淵源羣書博極本末貫穿退然布衣名震八埏晚登周行帝席為前典刑其存訓詞是專王邸螭陛史館經筵獨當雷霆力欲囬天經世澤民齎志終焉天之生才夫豈偶然儲神毓秀其必有年䆠匪不逹受才則全道之不行頼有遺編後有百載復見儒先哀哉止齋見此銘鐫宋故寳謨閣待制致仕贈通議大夫陳公行狀公諱傳良字君舉姓陳氏其先自閩徙温州瑞安縣之㠶逰鄉至公八世矣曽祖靖祖邦皆有隱徳考彬深於易學潔行自晦鄉里稱為長者以公貴累贈朝請大夫妣徐氏贈令人公英邁不羣疆學篤志其為文出人意表自成一家人相與傳誦歲從㳺者常數百人宗正少卿鄭公伯熊大理正薛公季宣皆以經學行義聞于天下公每見二公必孜孜求益脩弟子之禮一日與薛公語恍然若有所失乃獨潜心易論語二書求古聖賢所以窮理盡性之要近思深探弗造其極致弗措也既而薛公客晋陵公徃從之薛公與公語合喜甚益相與考論三代秦漢以還興亡否泰之故與禮樂刑政損益同異之際蓋於書無所不觀亦無所不講經年而後别去還過都城始識侍講張公栻著作郎吕公祖謙數請間扣以為學大指互相彂明二公亦喜得友恨見公之晚是歲乾道六年也其秋入太學國子祭酒芮公曄雅聞公名親訪公于所隷齋見其二子且即以公為學諭俾為諸生講說經義公以非故事固辭芮公不可公遂謁吿去從容天台鴈蕩間益䆒其學越二年禮部以名聞孝宗方銳志治功慨然慕唐太宗之為人於是臨軒以太宗事䇿新進士公對言陛下有無我之量而累於自喜有知人之明而累於自恃是以十有一年于兹而治績未進於古下情猶鬰公論猶沮士大夫猶有懐不敢盡且以太宗求諌崇儒等事反復規諷其言深婉切至有司竒之将請寘第一或議不合猶在甲科當是時公名震天下其文流入夷貊授迪功郎泰州州學教授未赴參知政事龔公茂良為孝宗稱公之材特除太學録車駕幸學改承奉郎居歲餘力求外𥙷吕公方在三館謂公曰盍少留公曰出䖏之義不敢不謹其始也添差通判福建丞相梁公克家領帥事委成于公公為之畫凢一路若郡所當興廢及訟獄之曲直一裁以義無所囬屈疆禦者不得售其私始忌且怨州人有方在諌省者論公罷之居二年主管台州崇道觀又二年差知桂楊軍又三年乃之官居閒既乆日覃思於六經将有所述以開後學一室蕭然與士友終日澹如也治桂楊首為教條戒其吏以徙善逺罪諭其民以孝弟婣睦人感公徳意不嚴而化蠲民宿負及縣月輸之未入者凢廩藏受輸以例取嬴者悉裁之明條目簡文移縣得逹情於郡而吏無所容姦郡計自𥙿歲小旱預出錢糴于旁郡置數塲以糶糶巳復糴循環不乏又聴民以薪易官粟或就役于官食其力民無飢者連帥潘公畤以緡錢五千助糴公益以郡錢立式貸之約歲登償及期不復索光宗受禪除提舉湖南常平茶塩去郡老稚遮送不絶明年就除轉運判官湖湘民無子孫者率以異姓為後吏利其貲輙沒入之公曰使人絶祀非政也况養遺棄固有法存其後者㡬二千家潭州常平粟且四十萬而全永道等州數絶少無以備歉歲公曰移多益寡使者職也既掌漕猶攝庾事乃令諸州各留歲運粟以益常平以潭之常平代其輸郡告乏者减其送漕司之錢民輸折苗錢重為損其直潭州櫧州市酒課歲嘗至緡錢二十萬遂以配于民為額公攝州事按舊籍頓减之民得少紓改提點浙西刑獄過闕留為吏部員外郎論對奏言藝祖皇帝垂𥙿後人專以愛惜民力為本熈寜以来用事者始取藝祖約束一切紛更之諸路上供歲額増於祥符一培崇寜重修上供格頒之天下率増至十數倍其他雜歛則熈寜以常平寛剰禁軍闕額之類今項封樁而無額上供起於元豐經制起於宣和緫制月樁起於紹興皆迄今為額折帛和買之類又不與焉茶引盡歸於都茶塲塩鈔盡歸於榷貨務秋苗斛斗十八九歸於綱運州縣無以供則豪奪於民民困極矣方今之患何但夷狄蓋天命之永不永在民力之寛不寛耳豈不甚可畏哉陛下宜以救民窮為巳任推行藝祖未泯之澤以為萬世無疆之休且言今天下之力竭於養兵而莫甚於江上之軍都統司謂之御前軍馬雖朝廷不得知緫領所謂之大軍錢糧雖版曹不得與於是中外之勢分而事權不一施行不專雖欲寛民其道無繇誠使都統司之兵與向者在制置司無異緫領所之財與向者在轉運司無異則中外為一軆中外一軆則寛民力可得而議矣上從容嘉納謂公曰朕思見卿乆矣卿學問深醇著書必多可悉以進也遂遷秘書少監公進周禮說以格君心正朝綱均國勢爲目目各四篇兼實錄院檢討官選兼皇子嘉王府賛讀公以爲王者之學經世爲重祖宗成憲尤當先知乃纂次建隆以来行事之要爲王講誦大指每至立國規摹必歴叙累朝因革利害附見其下本末粲然如示諸掌紹熈三年十二月擢起居舍人四年正月兼權中書舍人先是上少不豫群臣奏請或弗時决公言一國之勢譬如一身少有壅底便生疾恙若今日遷延某事明日阻節某人人心益玩主勢益䡖設有姦憸乗時爲利則中外之情不接威福之柄可移雖是擅傳㫖揮将亦無從覺察陛下何不務自寛大以怡精神出則從順動之宜居則享燕聞之福而乃徒速無故之謗且貽萬一之憂哉又言人主不自疆則䜛間迎合之訃得以乗之因其厭省覽也則有以好名之說中傷忠讜因其憚改作也則有以生事之說沮壊事功凢若此皆䜛間也因其近聲色也則有以勿問外人之說固結宫禁因其樂燕飲也則有以勿親小事之說竊弄威福凢若此皆迎合也䜛間之計中則君子日踈迎合之計中則小人日親而其極至於天變不告邉警不聞如是而天下不多事者未之有也給事中兼嘉王府翊善黄公裳以封還除目改兵部侍郎公言給舍封駮是謂官守若以為是則當聴從若以為非則當罷黜今隂廢其言而陽遷其官是非不明賞罰倒置不謂清時有此過舉乞令裳依舊供職以釋在廷之疑池州副都統制率逢原就除都統制公言逢原專横掊尅士伍咸怨淮西緫領鄭湜姑按其偏将以警之逢原懼而自劾方詔放罪不應信宿之間遽有遷擢詔依巳降旨揮公復􅌳論之陳源除入内内侍省押班給事中駮之不可以書讀矣公言源僣侈專横得罪髙宗投竄逺方籍入家産及許逐便以来間有㤙命則臣僚相繼論奏悉蒙開納今瑣闥迫於天威黽俛書讀臣必不敢奉詔草詞内批張子仁除節度使公言留正輔相𥘉政于今五年待罪郊外而去留未决趙雄以前宰相起帥江西抱病告終而恤典不及西陲擁兵十萬吴珽物故擇代不可不謹恤終不可不至而屏去申奏以為失實當此時也乃遽獨加㤙於勲舊之家輕重不倫先後失序臣深為聖明惜之詔子仁係勲臣子可與書行公又言報荅舊勞孰與輔𥘉政者之為親矜憐後裔孰與專帥閫者之為重陛下儻下察末議少霽威嚴天意豁然群疑冰釋事関廊廟則立賜施行憂在疆埸則亟湏䖏置庻㡬國家尊榮朝野欣豫奏雖不報然陳源竟不命詞張子仁亦不果授越是歲十二月遷起居郎公言陛下覆護臣子容忍不棄而不務明其去就之誼比有以䑓官察宰屬者矣陛下皆出之俄而並召並用為卿将孰是孰非耶有以後省駮從班者矣陛下為罷給事中巳而並除職名一去為郡一為王府官然則是俱有罪耳有以諌官䟽大臣者矣陛下欲並用之大臣乞去不得請諌官乞去又不得請然則是俱賢耳至如臣不度踈賤論奏内侍不當為知省官陛下雖納臣之章不行詞不賦祿而其人至今出入禁闥與見任無異則是中書後省與黄門相持不决尤所未喻碩陛下明人臣去就之誼自不肖臣始時上疾猶未平重華之朝稍闕大臣而下交進更諌公自以受知最深每入對必以父子天性及古今禍福安危之際委曲開陳期以感悟上心上亦為之動及孝宗有疾公踰旬三請對以為兩年以来以不過宫諌者多矣陛下間或聴之亦無過勉疆一出臣獨私念陛下特誤有所疑積憂成疾以至于此每於陛下心事之間反覆開明至於深入切中陛下爲臣傾倒一無隱情然而今日確許明日中變以誤爲實而開無端之釁以疑爲信而成不療之疾是陛下自貽禍也公敷奏剴切上未能聴因面乞納祿不許最後復言今天下本無事而陛下以憂疑失人心若聖意釋然則群情自觧轉禍爲福不過反掌之間臣言不足聴當永辭闕庭是以復論人心可畏之說碩陛下亟圖之是日公論諌益切度上意弗囬乃上致仕之奏上曰甚好甚好公退則申尚書省自免而歸改祕閣修撰復兼嘉王府賛讀公辭不拜今上受内禪三日詔公歸班又四日除中書舍人公三辭而後受未至命兼侍講時方博延名徳之士進諸朝廷知潬州朱公熹召為煥章閣待制侍經筵與公同日造朝班行相慶公入見首言陛下嗣守丕圖宜上稽孝宗明㫁緫攬之政兼軆上皇隆寛不自用之羙參酌兩朝治軆擇其為天下後世便者兼行之詔知閣門事謝淵係皇太后親弟特給全俸今同知樞宻院事樓公鑰時為給事中封還錄黄公言樓鑰所駮允當望追寢前命臣失於論奏乞正鹵莽之罪因言陛下臨御未乆每事當遵守法度近因臣下妄有陳乞徃徃直降内批或與差遣或添請給人從深恐自此浸開倖門願陛下念付託之重加兢惧之誠凢宫禁謮求㫁勿垂聴兼直學士院㑹有詔朱熹與在外宮觀公請對将陳其不可詔俟别日宣引公連䟽言朱熹三朝故老難進易退欣慕聖明幡然一出天下相賀以為得人則進退之間豈宜容易内批之下舉朝失色臣不敢書行後四日詔朱熹進寳文閣待制與郡未㡬以公兼實錄院同修撰公以史事宜有專官再辭不許阜陵復土上始自重華宫入居大内公首請増置諌貟收用恬退之士詔問民間疾苦上雅敬公每對必虛巳以聴始上在潜邸寮寀因誕日以詩為夀公與翊善黄公詩皆以開導徳性冀有所規益上感二公意各親書其詩謝之於是上屢趣公為䟦語刋石同進者以上眷公厚始多忌之知閣門事韓侂胄浸竊威福倚言路以排斥忠正有上章詆公者詔提舉江州太平興國宫慶元二年夏言者復交章詆公詔降三官罷宫觀公屏居杜門一意韜晦榜所居室曰止齋日徜徉其間賔至則相與講論經史亹亹不厭故舊之在朝者或因人問公起居公皇恐遜謝而巳嘉泰二年正月詔復元官提舉江州太平興國宮三年起知泉州公以疾力辭許之授集英殿修撰疾益侵請謝事授寳謨閣待制以其年十有一月丙子卒于家屬纊酌酒與兄訣凝然而逝年止六十有七積階至朝議大夫爵永嘉縣男訃聞贈通議大夫娶張氏主管禮兵部架閣文字孝愷之女封令人以婦徳称先公八年卒子男一人師轍承務郎新監臨安府塩官縣買納塩塲師朴承務郎女七人長適迪功郎新光化軍司理參軍潘子順先卒次適從政郎福州連江縣丞薛師雍次適迪功郎新䖏州儒學教授林子熈次適迪功郎新福州連江縣尉徐冲次適進士張紹次適進士張疇次未行孫女一人𨳩禧元年三月庚寅師轍等奉公之䘮合葬于所居前山令人之兆公剛毅洞逹寛博樂易其為學先於致知充以涵養黙識自得不可企及而篤於躬行周於人情事物兼博約貫精粗不倚于一偏與同志論學必以兢業為先蓋其所自用功䖏也事兄恭謹終老不懈自奉清約閨門肅然其接人委曲周盡人人得其歡心汲引後進如恐不及小善曲藝奨予無倦士多不逺數千里樂從公逰公随其所長誘掖磨琢以成其材在湘中奉詔薦湖廣之士以今四川安撫制置使吴公獵為稱首其他如宋文仲楊炤蔣礪皆一時之選及在後省丞相留公正知樞宻院事胡公晉臣數訪人物公為言某人有徳某人有材冝兼收而器使之毋有所偏廢二公以公言多所引用公未嘗以語人也公早有重名􅎱疾者衆徃徃為謗語以中傷公故當孝宗有為之時主上碩治之始而不得少安於朝退而家食者前後且二十年比上念公起鎮名藩天下期以復用而公巳病篤矣卒之日室無餘貲田不過二頃其葬也資友朋之􅉠以集事然後誘沮公者始皆愧服公在三山閱故府所藏累朝詔條凢財賦源流國史所不盡載者考之悉得其要領常以為祖宗徳澤深厚而後来有司乗時易令取民之數乃過於前代宜有以變而通之故一見光宗首陳其要及轉對則乞議免役錢進故事則乞除身丁錢至上𥘉親政則又乞出内帑助版曹經費少寛催理以紓民力然皆言之而未及用天下不少𬒳其澤也公既沒之四年上誅韓侂胄盡黜其黨一時故老為侂胄所排斥者收用略盡使公尚在得復見上以素所考論次第條奏見於施行其所補豈有淺淺哉公有毛氏詩觧詁二十卷周禮說三卷春秋後傳十五卷左氏章指三十卷讀書譜一卷建隆編一卷制誥集五卷文集三十卷公深於春秋其於王覇尊卑華夷消長之際及亂臣賊子之所由来發明獨至又以為左氏最有功於經能存其所不書以實其所書故作章指以明筆削之義樓鑰為之序曰自有春秋以来蓋未有此書也平生篤於學易嘗爲之說而未及就㓜學未冠從公逰朝夕侍側者且十年公愛而教之勉以前輩學業㓜學雖不敏然佩公之訓不敢自棄每視公以爲出䖏知公獨詳敢狀其言行之大略以上於太史氏謹狀嘉定元年十一月日學生朝議大夫試尚書吏部侍郎兼侍講兼直學士院蔡㓜學狀宋故通議大夫寳謨閣待制陳公墓誌銘龍泉葉適撰公姓陳氏諱傳良字君舉温州瑞安人𥘉講城南茶院時諸老先生傳科舉舊學摩蕩鼓舞受教者無異辭公未三十心思挺出陳編宿說披剥潰敗竒意芽甲新語懋長士蘇醒起立駭未曾有皆相號召雷動從之雖縻他師亦籍名陳氏由是其文擅於當世公不自喜悉謝去獨崇敬鄭景望薛士龍師友事之入太學則張欽夫吕伯恭相視遇兄弟也四方受業愈衆乾道八年䇿進士殿臚定公對第一奏入不果用教授泰州朝廷難以銓法持之遂除太學錄将召試館職復不果使告公将以為編修官公辭焉通判福州右正言黄洽引王安石事劾公罷主管崇道觀知桂陽軍或言知名士廢不用凢三十三人公為其首執政病之稍遷提舉湖南常平茶塩轉運判官浙西提刑吏部員外郎去朝十四年至是而歸鬚髪無黒者都人聚觀嗟歎號老陳郎中光宗逆勞曰卿昔安在朕思見乆矣其以所著書示朕遷祕書少監兼實録院編修官皇子賛讀歴起居郎舍人兼中書舍人㑹上疾不能覲重華公隂諷顯諌危論婉說因乞致仕岀殿不返舍改祕閣修撰復兼賛讀不至今上即位除中書舍人侍講同實錄院修撰直學士院御史中丞謝深甫論公言不顧行提舉興國宫居二年察官交䟽削秩罷時慶元二年也嘉㤗三年始復官再為興國宫知泉州辤授集英殿修撰待制寳謨閣三年十一月丙子卒開禧元年三月庚寅葬于㠶逰鄉湗村前山距家巷語可逹也夫人張氏封令人子師轍師朴師朴承務郎師轍新監塩官買納塲潘子順薛師雍林子熈徐冲皆婿也既仕未仕者張紹張疇未嫁者一女孫女二人公之從鄭薛也以克巳兢畏為主敬徳集義於張公盡心焉至古人經制三代治法又與薛公反復論之而吕公為言本朝文獻相承所以垂世立國者然後學之本末内外備矣公猶不巳年經月緯晝驗夜索詢世舊繙吏牘蒐㫁簡采異聞一事一物必稽於極而後止千載之上珠貫而絲組之若目見而身折旋其間吕公以為其長不獨在文字也公既實究治軆故常本原祖宗徳意欲减重征捐末利還之於民省兵薄刑期於富厚而稍修取士法養其義理㢘耻爲人才地以待上用其於君徳内治則欲内朝外廷爲人主一軆群臣庻民並詢迭諌而無壅塞不通之情凢成周之所以爲盛皆可以行於今世視昔人之致其君非止以氣力負荷之華藻潤色之而巳也嗚呼其操術精而致用逺弥綸之義弘矣蓋魯有臧文仲鄭有子産齊有晏嬰晉有叔向四人者當周之末造能新羙舊學而和齊用之尊奉前聞而斟酌行之不嗇於古不狃於今是能輔當時而傳後世此春秋名世之士孔子之所賢者也今公亦考元祐慶暦上極建隆以逹于紹興之後将􅌨理弦續起廢疾解倒懸而燠休之使公而得盡其用則未知於四人者孰先後也始公以盛名天下歸重意其将有爲矣其錄太學也議科舉敝法頗􅕍括之而已然而拘於常而習於故者以爲異矣其倅福州也平一府曲直使不得隱而巳然而畏其明而苦其决者以爲專矣流言轉易應和喧然而公之道不得行矣孝宗嘗於禁中從容讀公所論著光宗嘗因直前獨對許公且大用及今上御極有講堂之舊招来𥘉載有咨謀之羙然而䜛之慘者奪其眷忌之巧者蔽其知而公之身竟以斥矣如彼四人者使其君臣之際上下之交不遂靡然為時所向而謗譽雜於朝市疑信異其始終則夫功烈之成就曽不能萬一而况其有大於四人者乎此余所以歎其開物之易而周身之難成名之厚而收功之薄也悲夫公葬四年吏部侍郎蔡行之始狀其行於太史行之從公蚤載之詳余亦陪公逰四十年教余勤矣故掲其平生大指刻於墓上以記余之哀思而行之巳載者不復述也銘曰嗚呼陳公未壮而興群士驚奔来師来承三代統紀漢唐制度百世雖逺一二以數事研於終徳復於𥘉彂為辭華乃學之餘内聖外王本末鴻纖春秋四人孔子所嚴建隆之元實為下武斟酌損益可繼堯禹天欲平治必待其才生之甚難莫我肯培名胡忌髙實奚惡富裂棄文錦縫彼敗素寄印如纍其䜛云云擁書如林其樂欣欣有橘之菔有􅔽之芬有挐其舟音逺不聞我瞻湗村泚矣南塘二物則存公乎在亡止齋先生文集附録卷之五十二, WYG: ''}
