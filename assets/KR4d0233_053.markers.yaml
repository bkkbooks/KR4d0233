  - {type: variant, offset: 3676, length: 525, content: 紊而無章至於周諱行而名始尊然曰顛曰夭非羙辭也而取之以名春秋之世猶不厚乎名衞有石惡晋有戾齊有陳逆楚有屈蕩周有史佚夫數辭者皆人之愧焉而至不羙者也而取之以名展禽解孤若是者則有取乎物之賤者以自名下漢晋士方以名相髙唐以来士無陋名名美而人才日卑嗟夫專於其内而不張於其外急乎其外而不勵乎其内古今人之異也宜哉吾友章子林子皆恥夫擇名之不詳而請更於予予何吝於名哉而二子之請甚矣其非古人之意也名不若人汲汲乎求治之心不若人姑徐徐而巳耳盍亦反其本乎雖然二子以自治之請予又何可辭之扵是名章子曰用中林子曰毅章子愿而固林子弱而浮以其名之得㣲中乎心夫二子而由是焉反之斯名也其猶二子之益友乎里名勝毋曽參不入彼里名豈是以凂吾孝哉而君子亟去焉亦合内外之道也然則二子之請扵予予不吝扵二子雖非古人之意是亦古人之意而已矣朱甥子臧名說吾兄有朱甥者每遇予持尺𥿄拱而問名焉予曰爾何若名之問也人能羙名名不能以羙人淑爾身雖陋爾名人不汝議也爾身之不淑假而以丘軻自號焉天下莫之予矣是故古之為名姑用是焉别稱道而巳矣賢否不問也爾何名之問也雖然童子而知問名可嘉也凡人之善自一念而為也故患莫大扵無識學莫强扵自興爾知重而名則必知重而身矣噫是念足以為善矣吾故名汝曰子臧而猶未汝字越十年吾将汝考焉而不負吾名字汝未晚也附錄卷終, WYG: ''}
