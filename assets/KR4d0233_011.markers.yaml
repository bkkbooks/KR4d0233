  - {type: line-break, offset: 57, content: '', id: KR4d0233_SBCK_011-1a06}
  - {type: variant, offset: 62, length: 417, content: 朕惟古后妃有求賢審官之志而不私謁而人主則特隆扵肺腑之親夫惟后妃彌遜人主彌恩斯可觀巳日者吾后省家廟爾某皆以猶子祗服厥事朕何愛一横行郎而不以寵汝惟無忝爾祖以長守冨貴則予汝嘉可皇后親姉故任武節郎閣門宣賛舎人致仕霍漢臣妻平凉郡夫人李氏封成國夫人故任武經郎致仕馬煥妻安化郡夫人李氏封信國夫人忠訓郎士廉妻彭原郡夫人李氏封崇國夫人敕朕惟古后妃有求賢審官之志而不私謁而人主特隆於肺腑之親夫唯后妃彌遜人主彌恩斯可觀巳具位某氏夙以㳤恵友于坤儀日者翟車還省家廟越来相事禮無違者其益湯沐視君夫人尚服寵榮以綏夀祉可皇后親姪孫承節郎李瑜李粲各轉兩官敕具官某等日者吾后還省家廟朕循故事推恩后族自尊及卑罔或遺者尔以幸㑹爰進二階豈不榮哉尚務靖共以綏爾祉可皇后親姪婦故忠訓郎贈文州刺史李斌妻安人潘氏右武郎帶御噐械幹辦皇城司李孝友妻安人趙氏親姪女通直郎充點檢贍軍激賞酒庫所幹辦公事韓松妻安人李氏並特封恭人親姪孫孫女右武郎帶御噐械幹辦皇城司李孝友女孺人李氏特封安人敕具位某氏, WYG: ''}
