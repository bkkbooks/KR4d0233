  - {type: variant, offset: 0, length: 226, content: 止齋先生文集卷之三十八手書荅劉公度二某乗障無狀誼當自弛不謂誤㤙就移廪人每惟衰嬾日與不勝巳者䖏當此委寄何以寡過及讀来教又惘然自失也經生徇偏何者為全文士逐末其本安在拘攣並縁必有受病之䖏充塞中節豈無進徳之序所以見告尚愧不敏况言證不及藥未覺為益湏嗣音切完之倘有鄙見亦當反覆某老矣何以慰四方士友之望然年来篤信六藝之學兢業為本彼此紛紛自為黨與若人之巳甚亦恐吾人躬未自厚而責人不薄有以致此以来事者君子遺恨如左右應洞然察之耳某汨汨無新功有愧益前見在諸病以不得藥為請今方, WYG: ''}
