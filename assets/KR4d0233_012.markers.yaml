  - {type: variant, offset: 5193, length: 0, content: '', WYG: 欽定四庫全書止齋集卷十三宋陳傅良撰外制和州防禦使殿前副指揮使郭杲除宜州觀察使敇古者六軍皆以卿將元戎十乗有瑲葱珩二雅誦之庸示光寵矧我中權可無異數具官某鷹揚之勇輻湊之謀山西將家今纔一二醻勞屯所晉長周廬訓我羣騶壯我中壘累嵗於此士聽無譁日者貝胄三十来閱庭内舍矢如破可以即戎朕圖爾功宜及懋賞枚數勇爵峻極亷車禮均從班視古卿士是用命汝盖周舊章光對明恩益思忠報無使行狩専美車攻無使止居遺恨祈父則予以懌僉曰汝諧可武畧大夫侍衛歩軍都虞候兼權侍衛馬軍司職事閻仲持轉右武大夫忠州刺史敇日者朕重冬狩之役又不欲乏武事也而為簡之師試諸廷内於環列得師焉於歩旅又得師焉皆可以即戎朕甚嘉之具官某久於行陣積有戰多枚數壯士莫與儔伍觧朐山之圍殿符離之返至今言之令人矜奮頃自遴選涖我師徒百夫千夫各習其教往往營壘廬次之間無囂塵也於是閱也介胄堅好旌麾光明坐作進退動中尺度朕惟勇爵以横行為右階之最以刺郡為遥領之始悉不汝吝用賞懋功其對隆恩益殫忠力可閤門看班趙弼奏祖故寧逺軍節度使侍衛馬軍都指揮使贈太尉趙樽累遇郊祀登極未曾陳乞加贈特贈開府儀同三司敇朕永懐將閱克勤王家宣勞實多贈典有闕具官某忠於許國勇不顧身能以衛社稷之心効於死封疆之力戰自束髪觀者汗顔日者欲澄冗員甞第元從閱實數千人之衆定為十三處之功爾獨最聞朕尤嘉奬然論報自昔雖峻極於武階而訟言有孫尚少虧於褒律是用申命幽壤視儀上台以昭我不吝賞之功以成爾無遺恨之美抑使介士奮於戎行可朝散大夫權刑部尚書京鏜兼侍講四年八月二十三日敇朕與賢士大夫切磋經誼之日久矣而今加意於春秋春秋固為夷夏作也盖聞在漢或申復讎之義或庶㡬止戈之武而皆有大功號稱七制斷之經意孰得孰失朕將安所取此而誰與茂明之也具官某簡在法從蔚為名臣修聘北庭非禮勿聽往釐西事無言不酬斯可謂据古而通今者矣進之路朝重席以待其為朕深探遺經之指與漢二君行事以佐取舍爾信不為章句學者而朕顧不能尊所聞歟往其懋哉以副延竚可太中大夫權尚書吏部侍郎沈揆兼侍講八月二十三日敇朕與賢士大夫切磋經誼之日久矣而今加意於春秋春秋固為夷夏作也盖聞在漢或申復讎之義或庶㡬止戈之武而皆有大功號稱七制斷之經意孰得孰失朕將安所取此而誰與茂明之也具官某紹興諸生逮事髙廟乾道博士見知慈庭於今士林鮮矣輩行而況甞與朕游舊乎進之路朝重席以待其為朕深探遺經之指與漢二君行事以佐取舍爾信不為章句學者而朕顧不能尊所聞歟往其懋哉以副延竚可朝請郎右正言黄艾兼侍講八月二十三日敇具官某諫臣朕所甚嘉與也廼者封囊朝奏而夕不下則言者輒不自得豈朕意哉勸講闕貟有司来諗庸命汝艾切磋經術晉陪從班無所降殺豈惟以爾聞見博洽宜在選中}
