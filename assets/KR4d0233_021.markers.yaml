  - {type: variant, offset: 5531, length: 343, content: 之虞以萬乗之尊無使令不足之恨志所欲爲胡郷不可則陛下果何所不快於心歟况夫怨不在明患生所忽方其因循但曰細故寖以悠乆遂成後憂則尤不可不慮何者一國之勢譬如一身血氣標本貴在貫通少有壅底便生疾恙若乃咫尺君門杳如萬里今日迁延某事明日阻節某人日復一日莫以爲恠人心益訖主勢益輕脫有奸檢時爲利則中外之情不接威福之柄可移雖是擅傳指揮将亦無從覺察或放散儀衞或革退臣僚或闘諜宫闈或激怒軍旅萬一有此臣恐陛下孤立而外廷無以效區區矣然則陛下何不務自節宣以飬氣軆務自寛大以怡精神出則從順動之冝居則享燕閑之福而直為此悒怏徒速無故之謗且貽萬一之憂哉臣甞謂愛君之至莫如詩人見於南雅樂只君子之辞不一而足至於不能自樂則風之山有樞雅之魚藻皆以為刺作詩之旨豈是容恱誠以一人有慶兆民頼之非其已之私也臣不勝拳拳碩附於詩人之義惟陛下留神幸甚, WYG: ''}
