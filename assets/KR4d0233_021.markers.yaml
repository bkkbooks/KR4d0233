  - {type: variant, offset: 5140, length: 390, content: 甞有不能釋然者矣為之震怒至於愆和甞發威㫁痛有行遣由此宫掖之内人人自危宦官嬪御皆有㱕過君父之心徃徃故作縁由欲開間隙毎至期㑹上曉冲襟所以或於臨軒而爽興居之節或於命駕而虧號令之信陛下天資仁厚不察其為誤已臣所以深惜陛下無故而得怠荒之謗也臣聞人主之心當與天同今夫太虗清明天之體也将以潤物則為雨露将以動物則為風雷将以成物則為霜雪俄而開霽天體湛然纎翳不留三光如故若夫人主喜則為賞怒則為刑刑賞既行更何疑滯心宇㤗定即天徳也豈容欝欝有所不快自古帝王盖有䖏世故之難遭人倫之變者矣要以宗廟社稷付託為至隆天下蒼生関繫為至重莫不先定其心期於克濟是故父母未順舜有南風之歌兄弟不咸周有棠棣之燕是皆轉禍為福身致㤗和不聞以此自累方寸今陛下上有重慶之親以慈儉聞四海下有盛年之子以孝敬聞兩宫三朝累世曠古所無歴觀載籍之傳最得聖人之幸而又邊鄙不聳年榖屢豊一時賢才略在朝列只守成業已謂小康苦懐逺圖可以大治而又以九州之冨無供飬有, WYG: 嘗}
