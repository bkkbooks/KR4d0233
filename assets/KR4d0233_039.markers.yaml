  - {type: variant, offset: 2289, length: 635, content: 紹興十二年敷文閣待制宋公之才再記王侯誾修學其推本國家長育與名教之尊山川風俗備矣二公言語至今為人貴愛則二侯固與不朽劉侯龜從今更治學講堂廊廡廚湢皆一新之講堂絶巍壯餘為屋四十楹凡糜錢二百萬而人不知也邦人徳侯属傅良記之顧晚出何敢次二賢之後况侯之政豈必待余文而傳也盖聞崇寜之際天下之學盛矣提學有官贍學有賦上之加惠諸生甚隆也而有司方以三經造士自春秋不得設科非王氏之說皆為大禁當是時吾邑已有學置弟子員如他所然三舍之興無一士能取聲名者始林石介夫先生不為新經以春秋教授于鄉既而許公與沈公躬行謝公佃偕同郡諸儒又嘗越數千里外竊從程呂二氏問學於舉八行也四方之士有為繆巧應書者趙公霑乃逡巡愧謝不欲充賦郡太守强弗能起後生小子更益視效蒸蒸務自修飭矣中興新美學校之化嘉與復古罷三舍還之鄉舉列春秋學官使士得各自致其說而無禁諱於是聖天子思所以風厲學士柬求其人首得吾許公以参大政於是婁公寅亮以上虞丞言事即日拜御史它徃徃繇布衣召見温為東南支郡瑞安又屬邑而一日以多士名天下天下引領慕向之豈不盛哉則吾邑之學視他所為如何也而歲月久寖趨於廢以余所逮聞五經各有師弟子非其經師不輒授人弟子亦不輒詣它經師受業歳時㑹於學少者拜長者長者平立過市必冠帶飲酒不踰三行一人有過衆人切磋言之盖遺俗然也而今亦少異矣劉侯公非先生曾孫也以家學為縣識所先後又常常樂道吾土風之美去有日待士如始至也以所藏春秋權衡意林說例傳鋟之學歸負祖訪閒田將以追舊學之蹟侯之望人厚人亦宜不自薄余故誦舊聞表見吾邑學者本末如此以勸後人餘巳見前記者則不著淳熈十三年十月記, WYG: 闕}
