  - {type: line-break, offset: 0, content: '', id: KR4d0233_SBCK_013-1a01}
  - {type: variant, offset: 0, length: 768, content: 止齋先生文集卷之十三外制和州防禦使殿前副指揮使郭杲除耳州觀察使敕古者六軍皆以卿将元戎十乗有瑲䓤珩二雅誦之庸示光寵矧我中權可無異數具官某鷹揚之勇輻湊之謀山西将家今纔一二醻劳屯所晉長周廬訓我群騶壮我中壘累歲於此士聴無譁日者貝胄三十来閱庭内舍矢如破可以即戎朕圖爾功冝及懋賞枚数男爵峻極廉車禮均從班視古卿士是用命汝盖周舊章光對明恩益思忠報無使行狩專羙車攻無使止居遺恨祈父則予以懌僉曰汝諧可武略大夫侍衞歩軍都虞候兼權侍衞馬軍司職事閻仲特轉右武大夫忠州刺史勅日者朕重冬狩之役又不欲乏武事也而為簡之師試諸廷内於環列得師焉於歩旅又得帥焉皆可以即戎朕甚嘉之具官某久於行陣積有戦多枚數壮士莫與儔伍觧朐山之圍殿符離之返至今言之令人矜奮頃自遴選涖我師徒百夫千夫各習其教徃徃營壘廬次之間無囂塵也扵是閱也介胄堅好旌麾光明坐作進退動中尺度朕惟勇爵以横行為右階之最以刺郡為遥領之始悉不汝吝用賞懋㓛其對隆恩益殫忠力可閤門㸔班趙弼奏祖故寕逺軍節度使侍衞馬軍都指揮使贈大尉趙樽累遇郊祀登極未曽陳乞加贈特贈開府儀司三司敕朕永懐将閱克勤王家宣勞實多贈典有闕具官某忠於許國勇不顧身能以衞社稷之心効於死封疆之力戰自束髪觀者汗顔日者欲澄冗員甞第元從閱實数千人之衆定為十三䖏之功爾獨最聞朕尤嘉奨然論報自昔雖峻極於武階而訟言有孫尚少虧扵褒律是用申命幽壤視儀上台以昭我不吝賞之功以成爾無遺恨之羙抑使介士奮於戎行可朝散大夫權刑部尚書京鏜兼侍講四年八月二十三日勑朕與賢士大夫切磋經誼之日久矣而今加意於春秋春秋固為夷夏作也盖聞在漢或申復讎之義或庶㡬止戈之武而皆有大功號稱七制㫁之經意孰得孰失朕将安所取此而誰與茂明之也具官某簡在法從蔚為名臣修聘北庭非禮勿聴徃釐西事無言不酬斯可謂据古而通今者矣進之路朝重席以待其為朕深探遺經之指與漢二君行事以佐取舎爾信不為章句學者而朕頋不能尊所聞歟徃其懋㢤以副延竚可, WYG: ''}
