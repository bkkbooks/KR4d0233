  - {type: variant, offset: 3629, length: 0, content: '', WYG: 欽定四庫全書止齋集巻三十八宋陳傅良撰手書答劉公度二某乘障無狀誼當自弛不謂誤恩就移廪人每惟衰嬾日與不勝己者處當此委寄何以寡過及讀來教又惘然自失也經生徇偏何者為全文士逐末其本安在拘攣並緣必有受病之處充塞中節豈無進徳之序所以見告尚愧不敏况言證不及藥未覺為益闕須嗣音切闕完之儻有鄙見亦當反覆某老矣何以慰四方士友之望然年來篤信六藝之學兢業為本彼此紛紛自為黨與闕若人之已甚亦恐吾人躬未自厚而責人不薄有以致此闕二字以來事者君子遺恨如左右應洞然察之耳某汨汨無新功有愧闕益前見在諸病以不得藥為請今方悟虛已寡欲乃是指南感甚天闕二字不敬也闕有疑不宜不盡所謂虛已寡欲常並進耶闕者次第闕二字以虛已之外更有寡欲即未可驟言虛已若以寡欲之要更在虛已則似不必兼陳寡欲六經語孟及此二語全欠而來闕對言之今来既教以為對意者二事也喚作二事若非並進即有次第以為並進或乖守約之㫖以為次第或有後倦之吝吾人講學直須的當尚冀切道言之以得未曉老矣三所望於十友也徐尉所屬愚見亦無用辭費為記闕遂来示書為錢若干為舟若干官員年月刻石橋次屬來者勿壊之耳解組有期分宜去此不進决意者来端出望外餘幾千萬善愛答寜逺王縣尉伏辱惠書及於行已之大節致君澤民之要道誠欲講明其一二甚矣足下之志乎學也若僕衰暮何足以言此雖然不}
