front:
  text: 止齊先生文集卷之二十五
  hash: sha256:43c00b9823279786af79eed8382601c4c87bdb5010806179d26c5263f3aa8998
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_025-1a}
body:
  text: 奏狀劄子直前劄子四月十八日臣近者不識忌諱幸因賜對輒論及兩宫情意未通事仰荷聖慈濶略愚直曲垂清問備盡􅈤悃仍令臣入文字指罪離間之人將有施行以釋疑阻則古所謂狂夫之言聖人擇焉何以過此臣雖糜捐無以報稱比至奏入竟留不下臣切自咎責非陛下之不聽臣言實臣負陛下耳以此不避煩瀆再有奏陳臣聞天倫骨肉自然恩愛偶有嫌隙至相猜疑考之載籍間或如此然而秉彛之性不可解剝同氣相求終易感動是以方其懷疑若將終身而不合及至感悟則又俄頃而如𥘉往往喜極至于流涕豈同他人各有異志雖以盟誓相要竟亦關防不巳者乎又况陛下父子聖明同德舜禹適至今日尤非本心苟反求於一念之初則何待于多言之切且陛下獨不記夀皇之踈魏邸乎自古廢立出於愛憎夀皇此時果何心耶而陛下忍忘之也若曰離間之人則亦冝有緣故䆒觀前代多是姦臣因懷反側之心遂行鬪喋之計為此向背皆以自危今之羣臣豈有是事蓋未嘗得罪于陛下則心不赴訴於夀皇人情曉然可以洞察假使近習妄自分朋間或有少可語言亦不過時暫欺蔽𥘉非要害可造事端雖是合正典刑何足尚煩聖慮此臣所以日夜痛心以為陛下誤有所疑而積憂成疾至此也抑臣不識聖意今將聽二三大臣與百執事之言而為父子如初歟將一切勿聽使父子終不得相見歟昔者虞舜欲見其父於生前日號泣于旻天訖於克諧萬世誦聖漢武欲見其子于死後作歸來望思之臺天下聞而悲之而事巳無及徒成永恨二君之心大抵略同遲速之間得失相反臣恐陛下今日之不為虞舜而他日之將為漢武也臣言及此亦既泣下今請以此月扈從車駕過官為期若猶未也則臣實負陛下將退而就誅戮矣臣不勝迫切之情取進止乞致仕狀四月二十三日右臣伏以車駕久不過重華宫起居實皆羣臣之罪而罪莫甚於臣身為近侍而陷君父於失德有臣如此將安用之今欲守本官致仕伏望聖慈特降指揮施行謹録奏聞伏候勑㫖再乞對劄子臣十八日進對劄子乞以此月扈從車駕過重華宫起居為期若猶未也則臣實負陛下將退就誅戮矣二十二日遂具奏乞守本官致仕二十五日准尚書省劄子三省同奉聖㫖不允臣迫於威命當日乞直前奏事更竭狂愚以畢區區之義而後去欲望聖慈赦其萬死速賜指揮臣不勝祈天俟命之至直前劄子四月二十六日臣竊覩兩年以來以不過官諌者衆矣誦說義理條陳利害非不詳盡非不激切而陛下曾不加聽間或聽之亦不過勉強一出近者且以面從為聽嘻笑不加怪矣獨臣私念以為陛下誤有所疑積憂成疾以至於此故自去冬凡四請對每於陛下心事之間反覆開明至於深入切中往往陛下為臣傾倒一無隱情臣亦益得肆其狂愚無所諱避枚解而件析之誠冀聖懷曠然大悟起居飲食務自安和號令言語務自平允其在外朝不必事事過為留難其在內廷不必人人過為猜慮如此則淵衷寧謐天性自見何待臣下固要力請乎而陛下以臣言之故釋然無他凡三感悟於此矣去冬令臣宣諭兩府翊日取㫖前月令臣更入文字付外施行最後十八日復諭臣以早來曾許丞相以十九日命駕退朝之後便降指揮臣數四懇奏而玉音亦數四響答此陛下三感悟之幾也然今日確許明日中變不唯中變而又號召大衆赫然示天下以不肯出假如陛下有一人可信有一䇿可取有一日清明在躬豈至此乎臣所以皇恐踧踖前此對後輒乞𥙷外於今極矣冝即誅戮納祿謝事猶是自營而非臣之敢要君也天度寬容降㫖不允臣敢不更自殫竭以畢區區之義臣聞抱虛恐者蹈實禍懷妄憂者得真疾何也此心最靈功侔造化一有所蔽皆成定力自非聖賢未易開悟甚者無故及於亂亡昔漢武帝征和間居建章宫見一男子收之弗獲而巫蠱始起又常晝寢夢木人數千持杖欲擊帝帝驚寤因是體不平忽忽善忘疑左右皆為蠱祝詛莫敢訟其冤者巳而有戾園之禍隋煬帝大業初內殿火帝以為盜起驚走入西苑匿草間火定乃還自後每夜眠中常驚悸云有賊至以罌貯毒藥謂所幸姬曰賊至當飲之巳而有江都之禍由今觀之征和巫蠱本無是事只緣武帝疑心不解姦臣寅緣卒禍其子大業盜賊亦無是事只緣煬帝疑心不解左右壅蔽卒禍其身臣故曰此心之蔽甚者無故及於亂亡二君是也陛下不過宫豈非誤有所疑乎臣不識陛下何所疑重華耶道路之言不以為責善則以為猶吝權以臣計之二者皆誤也且夀皇責善為天下計為社稷宗廟計耳假使陛下政事修明人心愛戴則夀皇之願得矣尚復何辭陛下不是之察豈非誤乎若曰吝權則進退百官必與聞其人罷行庶政必與聞其事而五六年來天下不見其有此也但見陛下懷不自安動輒阻惑以其人為欺雖大臣死亡而不信以其事為怪雖細民疚災而不恤又豈非誤乎夫以誤為實而開無端之釁以疑為信而成不療之疾臣切以為夀皇不能禍陛下是陛下自貽禍也臣言不足聽分當永棄念此違離不冝自他復為陛下􅈤惻言之伏惟鑒隋漢之所巳往而救其將來國家之褔也兩宫之所期待也非獨臣之願也臨𥿄涕泣庶幾萬一取進止奏事後申三省樞密院劄子某輒有管見僣越申禀二十六日直前奏事嘗乞差近上臣寮調護兩宫上云此却是好啇量朕裏面人不中使不㑹說話不䏻委曲道朕意思待差文臣恐他輩不肯檐荷如此等事如何則好某奏陛下髙爵重祿養許多士大夫雖使犯難赴死亦當向前况是詣重華宫傳㫖聖意有何不測不肯檐負但乞宣諭大臣如此處置上極以為然且云待諭與宰執某因檢照得中興㑹要在孝宗時以參知政事錢端禮充德夀官使一時應合奏禀事件多藉端禮之力有此故事可以舉行今來若於親王執政宗室戚里中差近上臣寮一人充重華宫使自後應合奏禀事件令得往來傳㫖庶幾不至阻隔某以管見如此適以上逹天聽欲乞朝廷特賜敷奏施行小帖子靖康初顯謨閣待制談世績李熙靖主管龍德宫資政殿太學士王易簡提舉龍德宫併乞鈞照再乞致仕申省狀照對某昨具奏申乞守本官致仕今月二十三日准尚書省劄子三省同奉聖㫖不允又於二十六日直前奏事面納劄子以申請欲望朝廷特賜敷奏連降指揮再乞致仕狀右某再具奏申乞守本官致仕今月二十七日再准省劄備奉聖㫖依巳降指揮不允某非不知隆天厚地之恩何敢更有煩瀆伏念某自今春四次請對頗竭愚忠誠冀幸上意開悟父子如𥘉而天聽甚卑反覆咨度蓋已確許矣而竟中輒某是以痛自咎責上孤任使而有此請不謂聖度寬容再降不允指揮感極涕零未知所報重念某危􅈤若此儻若誠意學術尚有毫髮可以自效豈忍納祿謝事求便其身區區迫切姑附不能者止之義欲望朝廷再賜敷奏早降指揮施行謹具申三省樞密院伏候指揮奏事劄子五月四日臣聞人主之所以得天下者以得人心也所以失天下者以失人心也非獨以父子之私也苟得人心雖其父不得以天下私諸人苟失人心雖其父不䏻以天下私其子昔者禹薦益於天將以天下遜也而謳歌朝覲獄訟者皆不之益而之啓故禹卒不與賢而與子故曰苟得人心雖其父不能以天下私諸人啓是也秦人自以為萬世有天下死而號曰始皇帝其次曰二世欲以一至萬也然身死才數月耳天下四面而攻之宗廟滅絶矣故曰苟失人心雖其父不能以天下私其子胡亥是也恭惟陛下今所憂疑豈非以不得愛於夀皇乎夫惟以不得愛于夀皇而鬱鬱終日以失天下為懼於是舉朝諌之而不聽舉國非之而不恤舉世為之惶惑而不加怪臣恐陛下之憂不在聖父而在人心也何者假如萬一夀皇誠責善誠猶吝權而天下歸心則陛下固有辭於夀皇矣夀皇雖不責善雖不吝權而天下離心則雖夀皇亦無以為陛下計者是故疑夀皇者虛憂也失人心者實禍也此理曉然不待智者而諭今也舉朝諫之而不聽百官解體矣四參常朝宰執而下無一人立班者是失舉朝之心也舉國非之而不恤軍民皆怨讟矣或詐為詔書敢於指斥是失舉國之心也且舉朝諌之而不聽舉國非之而不恤猶曰為憂疑夀皇故也若乃吳挺之死半年而不置將張孝芳之見殺纍月而不討賊他如班直待試於殿庭侍從待命於郊外往往邈然都不省記是於夀皇何預焉而陛下獨固守力行之又所謂舉世為之皇惑而不加怪者是豈不足以失舉世之心乎不但此也人情好逸而惡勞今仗下之士皆苦晏朝巳報班矣有唾不顧者臣未知禁衛之心果如何人情利親而患踈今自閣長御藥卒不得一至左右間嘗一日逐數十人臣未知近習之心果如何甚者嘉邸有子而不奏告掖庭有喪而不起彂臣又末知宫閫后妃之心果如何陛下試一念此不謂之孤立歟不謂之人人自危歟陛下博覽載籍閲義理熟矣亦嘗見自古人主孤立如此人人自危如此而可晏然無事乎今天下本無事而陛下以憂疑失人心至此方且曰吾計當如此吾不可放下矣而專欲盛怒益不容解則古所謂肘腋之變蕭墻之禍殆不可謂今直無也豈不甚可畏哉雖然破疑為笑在蹙頞之頃則轉禍為福亦在反掌之間何者今日之事非若敵國對壘難平也非若強臣跋扈難制也又非若四分五裂難收拾也徒以聖意憂疑夀皇過當而人心不服耳聖意釋然則人心帖然矣故今日過宫則人心以今日解明日過宫則人心以明日解然則陛下何苦執滯而為此岌岌也在易暌之上九曰暌孤見豕負塗載鬼一車前張之弧後脫之弧匪冦婚姤往遇雨則吉說者曰暌孤之極見豕負塗甚可穢也載鬼盈車吁可怪也方張弧以攻矣而其極必變變必通俄而脫弧則無為冦之患有遇雨之吉者隂陽和也孔子之象曰遇雨之吉羣疑亡也人有此事則易有此象陛下今日非偶然也極則變變則通此其時矣獨奈何弗悟乎臣前後論奏以干冕流大抵務為開釋冀自感悟而不忍以危言傷聖懷念當謝事納祿永辭闕庭是以復誦人心可畏之說以望裁擇惟陛下速圖之幸甚幸甚奏事乞休致劄子臣輒有迫切之􅈤仰干天聽臣凡再乞休致再准省劄奉聖㫖不允伏念臣心力衰憊難以復備使令欲望聖慈速賜處分取進止五月四日讀前奏事劄子畢即面納休致劄子得㫖云甚好甚好當日解官繳納告劄五件申尚書省樞密院辭免祕閣修撰嘉王府贊讀申省狀准溫州進奏官遞到省劄一道五月二十八日三省同奉聖㫖陳傳良除祕閣修撰嘉王府贊讀伏念某立朝無𥙷分當斥誅聖恩寬大許還田里退惟僥幸感極涕零不謂納祿未久成命巳下寵以祕府論撰之名專以親王勸誦之職自昔寬朝無此恩意人非土木豈不知奮重念某學術衰落不堪復備使令加以匆匆去國適當夏潦暑濕相摶遂成脾泄之疾雖欲勉強支持不前所有上件恩除無緣可以祗受除已將省劄送溫州乞備所申繳納外欲望朝廷特依所乞令守本官致仕追寢上件繳奏施行辭免祕閣修撰贊讀與廟堂劄子某輒有迫切之􅈤仰千鈞聽伏念某一介踈庸及此衰晚誤玷朝列迄無𥙷報內負初心外慚公議惟有去官庶安愚分况自陳乞休致以來疊奉隆㫖未遂其私及再請直前奏事庶盡拳拳之義必以學術空踈天聽髙邈幸蒙從欲分當永棄今者休致未久除書已下寵以論撰之章專以勸誦之選在君父可謂隆天厚地之恩在臣子益有深淵薄冰之懼瀝誠蘄免所以九頓首於洪造也恭惟少保大丞相先生諒人心之不同期時事之攸濟夫人心不同則匹夫之操不可奪時事難濟則書生之才不足用有如某冝置間散又况玉音在耳不敢誣也干冒鈞嚴無任皇懼隕越之至止齊先生文集卷之二十五
