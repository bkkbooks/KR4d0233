front:
  text: 止齋先生文集卷之三十五
  hash: sha256:8e6916c113e7aaab31dee1aa8cda618014310f5457169e3772120e6635dcbf75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_035-1a}
body:
  text: 手書與王德修伏承歸舟解纜不勝瞻依之至人生不足把玩一别輒數年能復幾别令人愴懷惟學問同源在彼猶在此也前輩所謂野色更無山斷隔天光直與水相通足以自慰釋耳某還家才此數月觀書雖不得如台山靜僻然亦有緒左氏課日趣就候書成萬里相寄兄亦當終我易傳也大抵周禮古文尚書三代之法存焉讀者未易造次且如禹貢州末繫河先儒固曰運逆三於青州逹濟楊州逹泗荆止於南河雍止於西河則以為受上之爾不知此正裴耀卿節級轉輸之法不以江人入河不以河人入洛洛人入渭賈誼云漢都長安而以淮南為奉致輸非是豪傑之見略與古凖牧誓千夫長百夫長之下言庸蜀羌髳微盧彭濮諸國何也左氏謂蠻軍不陳蓋無預於三軍之以待令者也杜氏於春秋晉人薑戎一義亦得此意今多言常平出漢耿中丞顔祕書且以為權道不知常平乃法周官司稼所謂以年之上下出斂法出則減價糶斂則增價糴也是非常平乎自鄭氏以出其斂法為解後人遂以周禮耳孟子亦曰狗彘食人食而不知檢野有餓莩而不知彂今又作益食貨志作斂是也載師所征稅或二十而一或十而五自漢來諸儒因此疑周不純用徹法亦輕重非二等是又失之不考凡征於載師皆非謂在野受田之民率士官賢牧所食公卿大夫王子弟采地耳凡此其收之民則什一也而自以其租歸公上則别以厚薄勞佚為差輕或二十而一重或二十而五此冡宰所謂邦中四郊稍甸都鄙之稅與萬民九職諸侯九貢各調度耳漢律諸侯王自有少錢亦其租之所在也答潘叔昌周禮妄意熟讀豈敢言它委訪綱領闕然自失往年薛常州先生問天官一編參之漢氏自宮衛分領光祿衛尉府藏分隸司農少府一官分為數卿天子之奉又皆為私錢之屬王后世子各養於冥宫謁者奄官亦散它局此紐一解未易操制隋唐之際殿中監內之吏作矣古人制度豈容輕改竊意天官而下往往盡然左右抄拾漢晉以來下及五閏官制幸以薛常州之意一一尋繹得其離合切告條示亦欲共講之爾與吳父直某賤不肖其所與遊皆田野布衣儔類之士未嘗從王公大人之後蓋謂之貢倨不可就見况敢望其即我哉來京都足下獨造窮巷夜門而賜見焉其行不以車馬其謁不以爵敘其簡牘不以記几所以加乎賤不肖者願王公大人不能得之於其門弟子乃今愧昔甚矣小人之懷厚誣當世君子也蓋聞之化於貴公子見之外戚立傳自秦漢始王道之行一之為此也將有繇然者矣君與相急士於其公貴家蓋為於其私而一介之士無遺焉則國欲無治不可得也矣一而關風俗係治道則豈僕私幸亦豈足下之私為德不肖誠謂非僕私幸且非足下之私為惠也寵光之未戒今之不趍宜弗之罪是以敢遲遲而往也雖然施有所不報扣有所不答將以成其人之賢多而隂觀其嚮背戰國諸子為之孔門無是也僕雖不肖敢不謹於禮其將擇日戒拜賜於下風與林安之中間作懿仲書極欲如吾安之二三臭味脫去鄉邦來客山國庶得淡中之腴尋承巳過巖下良用缺然安之飯之粗足亦屑就何耶僕久厭此如沐􅃮解去無由爾比來新昌亦欲漸與人踈稍回鞭䇿自警督視家居良為未便然每念吕后劉歆輩視張子房楊子雲真自苦者要之兩翁意未易與兒女道故雖未便樂也安之手子真知味者南坡茹萊動踰月無憐色與友生語率不十四五相唯諾惟吾安之有聞如響天姿如許加之小自警督當入張楊會中謹勿為劉吕輩以兒女語相甘誘落身杯酌間某無過人但知非輒深悔恨亦漸去舊習矧如安之相愛之篤不知其言之苦亮之否與鄭景望少卿二拜違誨席六七載百無一進獨幸於毗陵從百九兄遊半年平生氣息為之遲緩推挽之賜何敢廢忘中間託子之命仰見盛德簡在宸衷可為天下賀簿書之勞非所以溷儒者比來轂下傳聞傳謾詳密不見端私用慰釋雖然百九元書蓋期望不但此愚見偶合故未敢深喜也百九兄屢不應書自敵已猶倦况違尊者乎又從縣請祠為禮率直如聞朝論頗不相然臺符徑至殆非𥘉心而得書願欲一來捨昨就今或者胥失近知扁舟赴約計已全併得此消息馳報千萬詳審勿使易來難去甚善甚望芮祭酒僅及家易簀劉大著王詹事皆竟不療海內賢者相繼雕喪令人喪氣張侍講方結主知忽刺逺郡吕博士亦悼亡暫告未果復入年來所得師友亦次第渙散如此劇用無憀識罷還家了親事益逺得御儻憐其不自棄而終教之時賜尺𥿄略去少褒之辭直下砭針則千里猶膝下也拜違誨色忽復旬歲中間兩辱墜教一一具報後許簿報書亦嘗略布淺漏以求是正領令嗣書缺然不至左右為之歉然建寧附問又嘗以大賢推轂不苟之意為請殆言輕無效許簿亦不欲復以上聞焉爾垂諭得喪順正自是天資頑頓不甚領會世間羞辱一事非敢以為學力也見性之誨敢不從事蓋讀孟子得百里之地而君之皆能以朝諸侯有天下行一不義殺一不辜而得天下不為則學力亦至矣猶以為與孔子異然則士之任可謂甚重得其一二以為盡在是端不敢也或蒙索見前二書他有以警䇿母惜頻示何時扣繫臨𥿄惘惘答天台張之望始僕讀足下所著書心許之亦心疑之繫辭篇末輒略去世俗相贊稱語託古致規以觀候足下之志嚮深淺堅脆其虛受我耶逝將與君咨其所巳至者而講求其所未至者其不恱辝我耶余豈舍之望者離未必合合未必相志越期年足下果復携書已來且以先君子故弟之竒之遺藁與其季氏所為文十餘篇以相寵僕不自知釋然以喜非特喜足下亦喜吾交道之不阿素心之幸見察也且足下之書其於歷代傳統正偏南北宜宗宜絶自漢晉以來諸儒去取異同是否可以立斷其於春秋三傳諸家章句孰得聖人意孰不得聖人意參互往復辨論務明白乃已要其歸大抵貴平而惡鑿不以私意傳公道若足下之學可謂博且篤矣入適於用矣僕雖愚頗好古道及其文辝凡今以是稱者未有聞而不慕慕而不求交者也况得如足下惠然肯顧先施而過賜之者乎宜一見顔色趍向巳決然猶因請而後明逾年而始信甚矣吾未知足下之所歸也况足下容貌不能逾中人言語呐呐無以自表見卒然遇之庸常稠衆中猶若人也先儒之論正統者歐蘇張陳數公皆巳名世春秋之學至程氏胡氏義精矣今人固習聞其人而好尚其書然猶曰吾方有舉子事未暇盡讀其視足下書何如嗜古者不必利於今足下其知之歟以僕觀先君子書究其淵源蓋以樂貧賤尚志節為家世然則足下宜知之矣誠知之吾兾足下之無悔也無悔於今必有傳於後吾所望於足下也雖然僕所望於足下者又進乎此矣足下偏親在堂急朝夕之養卒卒引去有懷填然曽未究竟相期秋風不逺千里僕所謂咨其所已至而講求其所未至者有日矣僕雖愚敢不修飾以俟與鄉守曽仲躬瑞安腳剩錢知蒙台慈除免甚厚又分給有次第仰見明逺千里無蓋傳聞尚悉輸往年夏秋租將繇省符抑漕檄也如漕檄度惟深仁必有以巳之果由上來將何以示惠蓋積留而頓取之則昔日之奉今日之困曽不如勿倚閣也明道先生嘗於新法中曲折便民蓋大君子不願法如何於其中為致意則雖微惠猶無虐是道也非吏部將安望歟受知之深敢爾喋喋不以為僣易將博訪所以為便者嗣告與閩帥梁丞相論耆長壯丁事切見熙寧保甲法行始以保正副大小保長代耆户長壯丁承引催科之役至元祐間復差耆戶長壯丁法其舊以保正長代者並罷紹聖復雇役法再以保正長催科其保正長不願就顧者依舊召募耆戶長壯丁以此福建路耆户長壯丁往往與保正長並行不廢然其所以不為民病者以其猶有顧錢也自紹興十年以耆户長顧錢撥入經總制司窠名十二年又併壯丁顧錢撥入總制窠名由是江浙諸州耆户長壯丁並廢惟福建諸州至今有之某照得福州官司檢驗緝捉催率勘會煩重之事必責之保正副大小保長而耆壯時時以縣司帖引追係搔擾夫役不給祿誠未易論然州縣曹吏日在官府猶可以繩檢譴訶之又不比耆壯散居鄉村為寄編戶莫知禁止也以某短見宜如江浙間事例一切廢罷毋重為民害亦仁政實惠之一端矣答長溪王佐之某無以愈人獨博交當代賢俊之心出於天然雖以之得謗訕或相背棄不悔以此凡先生長者往往見察幸肯與之遊而士之好學者亦或過聽以為可師友也而欲與之遊向者臺評云云誠非過當然初不知其中實無所有偶然得此而遂疑其挾此以傲物也訟咎以來不敢復從群衆妄出巳見論事是非與人短長但杜門讀書不則熟睡足下乃欲舍几筵之奉從我于寂寞豈非益其疾乎息隂休影已出下䇿足下願秉燭而照之此某所以辝不敢也因事懲艾當蒙亮悉然厚意不可虛辱繼此惠音不以淺漏將必有以奉報答林宗簡下問甚善古人之不可見所以壞人心者非一端也受田百畝皆足以自給嫁女無過純帛五兩無圭田則不敢祭薦魚菽而巳舉一隅則他費稱是而自喪祭射鄉器服巳上率數百家合力為之每與一事閭里共其勞以此皆農夫也而其秀民得從事於學蓋二千五百家而後有序三年而興之是謂草澤之士於公無廪於朝市無制其升於國則異是其從公卿大夫之子匹學校者固有廪矣其市朝固有制矣士之子恆為士不敢捨而之他也漢承絶學之後猶謹鄉教授之法而取士以户口率不敢開遊士之禁唐之四門學所謂俊士者則四方之所升進餘皆品子自國𥘉以行舉誘致偏方之士而聚之中都向之為閩蜀唐漢偽官者往往慕化從順願仕於本朝由是家不尚譜牒身不重鄉貫以此得人而其流弊則在今日又自熙豐變役法而鄉邑之豪無以自見鬻度牒而隱逸之路塞罷學究而椎魯之徒無所入若此類不可遍舉於是舉世悉由於進士合四瀆之流為一川而歸之海其不放而𬒳原野乎今其勢極矣度其變不逺上之抑揚闔闢恐非人事也答朱文昭書問濶踈未有似此别者然得之往來人知讀書著文不休亦足慰釋彼所貺字帖具審所論撰不少其意若欲續史家之緒又極欣怏未得即觀遙想增氣耳某窮日益甚意思却不銷沮年來反覆古者與論當世之務頗覺嚮者鹵莽思得故人共論此往往隔阻每一上心於邑移日近到東陽哭吕著作墓又迫蕃叟弟􅌾先叔匆匆遄歸疲頓不少且復休養幾時或能乘此暇日訪我仙巖之下何啻百𥿄相暖耶西漢士大夫深厚其季姦臣擅國群盜竊號而名卿大夫擇君而事之於是中興光武規摹窄狹而士氣薄矣晚來名節之盛要是衰俗一舉不勝散為吳魏之役率多喜功自見其不肯叛去者南陽一輩耳往時嘗説西漢無節義東漢有節義殆未深考孝章一變明光之政漢祚遂微孝章誠可恨其不可𥙿後傳逺者大抵明光之為也攝古喪禮也蘇氏引之未當若周公誕保七年豈是事例魯隱當國攝云者傳從其初言之也答遽舜丞下諭律學極見詳博所欲著書無惜蚤下筆因以見寄前書云云正以方今功業當付儒者自建隆創業嘉祐守文熙寧變法宣政召禍其間盛衰何可勝道建炎諸賢竪立亡幾紹興季年粉飾上巳過獨慨然右克廣文聲之意而書生承紹類皆齪齪以至今日吾黨宜究觀大方深求則講求廢墜以興文物如來示亦將次第舉之耳不以為不足學也答賈端老五去載蒙肯來相與於寂寞之濵荷意不淺淺髮齒衰改無復它覬儻假之年獲與士友共圖不腐於經術之餘志願足巳間居須課一書要當自古文書始踰年便可到春秋之末而及通鑑可也益熱未知會期願言加愛别去殊恨匆匆以循陔之念不欲奉留然終不滿也左傳且熟讀見得隱桓以前僖文之際哀定終篇無慮三變綱目則成書舉矣其它依經為傳文無虛彂優遊不迫而意巳獨至蓋非二家所能及非一二面剖難以筆舌盡也懿仲諸友巳決謀遷書院於先人壠下以為來歲過從之地入春便下手春暮當奉約矣蒙恩守壘交遊借譽之力多矣幸甚以感讀左氏書頗有條貫疏示於所當報已一一據見釋其左方有一二條似不足疑也若今年了此書開歲便可從太史公史記下手陳了翁云譬如緝麻忙復暫舍暇而續之自成長條不忘室銘才就即附上應不但巳也近稍為眼昏花不能苦讀書每客去則玩想向來所誦習自娛不足為念也示諭看過左氏傳甚善疏問數條只是小小事目未是穿貫五霸之變五霸功罪未分則東遷之不競與歷年多處未見著落春秋同是聖人經世之用要其託史見義以五霸為據案而左氏合諸國之史發明經所不書以表見其所書因五霸之興衰究觀王道之缺則戰國之事起周亡而秦漢出矣此其大略若夫精詳非面莫究太史公書又以接尚書春秋之統緒而下逮秦漢其用功略與左氏同而不敢比假春秋是以變為紀傳世家書表耳何當合併共講其指讀史記甚善然有猥駮竒怪之疑何也獲麟以後孟荀推尊孔氏明禮義之統紀二子死百氏益亂真老儒如浮丘伯伏生之徒區區於秦楚之際抱經自而其力不足以彂揮前緒至漢六七十年間董大夫始究大業田何孔安國戴聖戴德毛莫並出各有所著而又未能合群書為一削其不合以存其合者太史談有意矣然六家之論猶崇老抑儒遷卒家學乃盡百家之精而斷以六藝易本田何春秋本董仲舒書本孔安國禮本河間獨恨不見毛氏詩耳蓋其融液九流萃為一篇罷黜雜論自五帝紀以下盛有依據荀卿之後僅見此書爾其論五帝云再蒙言黃帝其文不雅馴搢紳先生難言之書缺有間其軼乃時時見於他説非好學深思心知其意固難為淺見寡聞者道則所得多而自負亦不薄矣惜自班固看渠不過妄有瑕摘後生沿習遂成牢談千五百年之間此書湮晦正賴吾黨自開隻眼不惑於紛紛之論謹勿容易便生疑薄也老矣不能自白於後世常欲落筆少彂所自識破者為前哲出氣因循未果近諸友為遷仙巖書孰於屋西偏今未就工後月足以奉合簮之歡得三兩人相助檢討便可了此一項冬間肯來同社幸甚止齋先生文集卷之三十五
