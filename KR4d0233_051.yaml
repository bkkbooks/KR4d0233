  text: 止齋先生文集卷之五十一
  hash: sha256:9243561e071fe97cfdf65be11c8e011a09c14428d3d4d96561f77f4c310bb5d2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_051-1a}
body:
  text: 行狀右奉議郎新權發遣常州借𬗋薛公行狀曾祖庠皇不仕祖強立皇任江寧府觀察推官纍贈左光祿大夫父徽言皇任起居舍人公諱季宣字士龍姓薛氏其先世家河東後徙福之長溪廉村至唐輔闕令之後又自廉村徙永嘉而光祿公始顯四子司封郎中嘉言敷文閣待制弼及舍人皆第進士昌言為㜈州通判舍人從胡文定先生學以丞相趙公鼎薦仕于朝秦公檜相定和議舍人廷爭移晷中寒疾以卒母胡氏安人後十三日亦卒公六歲而孤撫于待制伯父長任以官公從待制宦遊四方尚及見故老聞建炎紹興𥘉將相大臣趙張韓嶽諸公事有當世志而樂道其人年十七荆南安撫孫汝翼辟書寫機冝文字孫氏藏書多公一意講説紬繹絶不治科舉業有隱君子袁溉道潔少學於河南程先生聞蜀薛叟名求得之道潔翻六經諸史以觀叟叟笑曰子學博而寡要其相授受嚴約蓋如此湖湘間皆髙仰道潔公師事焉繇是益務自斂制充養蜀制置蕭振辟公為屬部將有狠訴統制者公當以犯階級法幕中或論縱之公以軍政爭不克謝去盡其祿直買蜀書以歸為鄂州武昌令故太尉劉公錡鎮鄂渚公論武昌形勢直淮蔡今見戶三千五百弓級財五十人土軍十有九人冝早為備因陳屯田分戍保伍以寬民力之策會有旨營田一卒二十畝縣官盡征之公告鄂守宋似孫曰是非漢屯田之謂漢兵民也使之就田豈曰不可今非惰遊不從軍彼不素知田家事驅之緣畝必不樂曩時王彥營田湖外遣二十將潰者十有八而况盡征之乎且齊民在野環營以軍殆必爭利成閔益戌夏口公曰冝戌武昌備申蔣故樞密使汪公徹宣諭江淮公上書言自權臣執國柄士氣索然趙張之放莫敢尚德嶽飛之死莫敢趨功今卒有意外之虞誰其禦之因論邉事甚悉及營田宜亟罷歲餘虜犯襄陽而還兵圍蔣甚急汪公問策安出公白以蔡要害得蔡則蔣圍自解成閔克蔡蔣兵果遁于是虜東道軍傳合肥王權退次柘臯李顯悲亦不利却成閔東為援公又白蔡不可失若乘勝拔頴昌道陳汝直趨大梁則廬兵不戰可屈捨蔡援廬是棄投機之會為連雞之栖淮沔虛矣又曰虜空國來冦符秦故計也今我不可復戰惟當晝江固守而以竒兵遮擊春尾阻前顧後勢且自沮輿尸一決其禍必大𥘉公試邑年甚少方天下無事豫陳邉備諸公唯唯未遑也居無何邉吏倉卒興發騷然柴棄遷孔子宫避戍將嘉魚壞學官繕壁壘江湖間稍􅕽於武事矣公顧以和糴賤傷農三白郡解印綬去為奏罷糴乃巳比冦至蘄黃以南列邑無寧居守令竊議內徙宦江湖者歸孥相望於道公乃誼死守不去與民期曰吾家即汝家一旦有急吾與若偕死敵民亦自矜奮三分其衆更壁縣下二總首帥輕舟守安樂口白鹿磯且乞師於汪公得甲三百樓船十艘氣聲張甚渡江來歸者數千家江西時以無恐諸公繇是翕然稱慕交章繼薦汪公虛幕府官以待比其入也欲以公朝行在所轉運判官王逖劾罷信陽守檄攝軍事既解縣爭欲辟留滿考改官公並辭不受其後營田二十卒田二頃歲得榖六伯石廩錢乃七十三萬米一伯八十石闊逺或數百里一壯馬負二石榖從以騎士詣大軍其費視民間買榖價相若士苦之往往道棄榖去又壅民之水利而掩其善田州縣莫敢如何營田終廢虜亮既斃明年蔡果不守尋復議和朝廷於此亦棄唐鄧封略止於沔南矣蓋一如公言公治縣事為之經必曲折盡人心不苟作差役宿戒里胥披籍次第條二十餘家未差已差别為行且疏其強弱某堪一役某堪再役於其末自任某人某歲月序當役以付案案任之付録事録事任之乃差差巳有訟不均舉其籍俾訟者自覆視伍民五家為保二保為甲六甲為隊若干隊為總不以其鄉分畫惟地之形便諸總旗各為色搶仗皆中度舍姦有禁詰盜有賞其以巡徼遇非常死事者為棺賵之復其家田若干租三歲總首得與令相問報專逹不關縣胥巡尉非縣檄毋得擅征甲士在邑五日一閲官賦之糧而賞其最鄉惟所欲偶習於總首之射圃母贅聚其為士若大姓附編存之勿藉俾輸財與力佐治戎器其將輸信陽也凡十千八百人致米九百石行必為陳日暮各以部曲相地頓舍以搶為壁鳴刁斗設伏公食飲卧興自同役夫醫護病者不偕至不宿府檄治寨屋百數區泝流二千三百餘里程日立辦公借材於縣人度長圍大而加償之賦鄉挽舟而五分之以居者之四共行者之一匠人亦各俾一鄉償其僦費舊財賦名色異為籍雜不可省察為都籍以提出入之要鈎托侵姦以除無名之斂諸案事以其劇易分日久近為旁行譜每以日加申稽知其決否故不決宿吏于次抄積不銷為走曆日揭其名數以便主簿者之鈎考而因察其惰民賴其便凡公意趣鄉輒鼓舞從之豪民衛仲堅王安道更數令不能役及是以次受代安道語人曰失今不為焉能俯首它令創鄂營八百架總隊請分事公約剪伐某所茅某所木竹應日而集縣有鍾吳二盜魁大府屢設方略求不能得公以諉總首王宗元竟諭吳降之為買田屋改業為民鍾滋甚俄斬之而至信陽之役選徒鄉屬而邑二隊首固請從曰吾知縣出矣吾何敢處是役也露次不驚訖歸不惰道邉梨棗下無迹邉民謂閲過軍多矣未有若此肅者它所區處民吏皆化服類此調㜈州司理參軍居五年用樞密使王公炎薦召公􅈤求之官不報於是上在位七年矣入對進三説一審政本躬細務觀鞍馬以權為經本末倒植况動煩宸衷國論靡定權移近密衮職日輕降胡侍從之虞毬獵固寵之術意有所偏患生不察願陛下以靜養恬略小圖大遴三公之選責以進人才張紀綱延端直之士與之講問學求治道歸有司之常務屏馳騁之細娛沉潛待時安往不濟其二冗官冗兵周官惟六漢别九卿自東都有尚書六部唐置內諸司使增員浸多有職蓋寡諸路帥臣在古州牧國朝以來置轉運使副判官提點刑獄提舉常平茶鹽總領市舶坑冶茶馬諸司屯駐之軍又别置都統制牧伯之任分為五六而州之知通縣之令佐不相統臨各行其意臣之所謂冗官此也唐方鎮之兵今廂軍是周世宗及太祖皇帝增置禁旅今禁衛與諸州禁軍是神宗皇帝立將兵之法今帥藩係將禁軍是太上皇帝收諸將麾下作三衙御前諸軍今大軍是四者之外復有弓手土軍役兵今為大軍勝戰將兵而下廢為隸役臣之所謂冗兵此也苟得其道更張不驚顧陛下處之何如母憚難也其三虛稅武昌絶戶屋租屋亡而租在德安嶽飛牛租牛亡而租在永嘉海溢濵鹵之田田亡而租在凡此宜悉蠲除以惠貧下當是時上志在中原王公炎方數進見語合驟登用薦公甚力公未至則謝曰聖上天資英特群臣亡將順緝熙之具幸得遭時不能格心正始以建中興之業徒僥幸功利夸言以眩聽今俗皆曰中庸大學陳編厭聞然物不兩大心無兼慮天地之道忽略根木而奔走軍旅之間舛先後之序而却施之雖復中夏猶無益也比至王公再見縱談邉閫事公曰既曰論兵竊嘗評以孫子始計之書未見其可方今人人異意不可謂道災異𢾗起不可謂天以江左爭中原不可謂地以貪御驕不可謂將將不恤士士不安將不可謂法集一圖九古人寒心求之時賢誰能辨之况今三衙御前舊卒略盡江南白丁何以持久常平錢米在所虛數以此饋師其能繼乎兵驕民困或未免蕭牆之悔即幸勝之方上勞廟算伏惟以仁義紀綱為本至於用兵請俟十年之後如曰上獨斷耳去位可也又曰天長可以入維陽清流可以向六合淝水可以下合肥北峽之隘廬江之徑武昌之近新息秭歸之北啇於子午南逹梁洋岷洮東近威茂用兵所徑忽不之備然而獻計者但曰無患非偷則狂有旨改宣義郎差知平江府常熟縣明年大臣數言上復召審察公固辭其友人祕書省正字劉朔以君命相風厲公雅意廉耻道鮮自一介不冝菲薄遂白丞相陳公俊卿曰周公寧以戲封諸侯開成王不敢玩人之心鄼侯身追亡將移漢祖嫚士之習古人格君之業於是乎在有如假令以匹夫之節一感上意亦足以報陳丞相免虞公允文相益趣發不懈自召命下公請之任六七不報又請奉祠不報積十有八月而後就道至數日則𣣔引去侍從有留行者除大理寺簿方虞公鋭意於事一時言利言兵自衒鬻者甚衆守經不阿或𬒳罷斥公見之晚猶兾幸一改聽始從容引番吾君説趙相國公仲連事諷以功業缺然咎在進賢未廣置助不善丞相亦矍然為敬頃之乃反覆切論徼功大速興事太輕速無逺撫輕則中廢經濟天下當與天下士圖之鄙夫嗜利自市試迹前事今皆反繆願公易慮勉終毋為後悔會江湖荐飢民流淮甸邉州又有言歸正人相屬者上命帥臣漕臣共安集之逾月奏不至丞相召公問所當施行俾條列將議遣使公惶恐謝不敏且淮事難踰度固以問因疏數端一責成帥漕毋以遣使使者所過州宿留循行未周巳及春夏二新民未見便輒勞苦州縣百役為是懷故鄉無長居之心冝略如孫吳屯田都尉故事自立營壁他繇使勿與三冝先定要束誠以闢地而巳縣官一無利焉悉以故陜西弓箭手法復其租四歲榖既登漕司致布帛茶鹽凡民所須率令榖價視物價稍昻以傳糴就藏屯所為後備因言若辟屬吏若移用錢米若括隱田兹事體大必遣使非選擇重臣持節漕帥州縣何以協使翊日有旨以公將命淮西公即言流民或前散寓山谷依人姓聞今使者出必相攜待聚城邑仰食于縣官卒有纍萬之衆將安取給且請以淮西諸州縣係省不係省錢一得以便冝調度朝廷尚難之公重謝不敏尋得旨以見錢米一萬緍二萬石行不足用聽次第以聞是歲乾道七年也十有二月八日公至合肥明年正月抵齊安布宣天子勞來德意分遣才謹吏循問大抵安豐以東來者略巳隸主户矣即撫勿徙沙窩以南稍稍未有適鄉公親履阡陌間審度山澤曠地以為合肥廢墟可因以設險斷柵江保巢湖而舊黃州古邾城也路直垂瓠置莊旁近異時冦不能潛師徑度乃與安撫趙善俊修復三十六墟且於舊黃東北置二十有二莊居之凡合肥戶三百四十有四口一千九百九十有六勝耕夫八百一千有五為田三百七頃八十有四畝齊安戶三百四十有一口二千一百一十有一勝耕夫六百一十有四為田四百四十有四頃五十二畝率户屋二間二夫牛一頭犂耙鉏鍬鑊鎌刀如牛數三牛犂刀一每年二轆軸一車其受田人種子錢五千其家以口老壯少為差賦米及秋止凡費錢緍二萬米石六千而夀春歸正及自古若為隸農於大姓者亡慮振業三千八百餘家要約明具器用使利廬舍有伍疆場端正埸圃牢牧陂溝路橋悉皆治修病醫死葬所謁輒得遷如歸居乃請還始入臣白遣數人各試其備邉計畫往往設飾為辭以上功八子雖不盡然之姑惟闊略庶幾或報效公之行也至固始求所謂北歸人者凡一百十有二家皆土著數年而新附者才五家光守宋端友更以舊戶比新戶詭為奏甚者賊殺歸人掠其善馬公即劾奏端友謾蔽時端友進置環列根抵連附不可撼動人皆危公奏上天子獨怒下其事于理將窮竟問治端友暴以憂死繇是頗疑邉臣亡狀而所白遣大臣類無欲得事情之意於公齊安之請還也命核麥田留纍月核巳又命視鐡錢事公歸對卒展罄所見聞復上首論州縣田簿甚具而淮地實不加闢臣諏其故大抵主户占田一畝數頃輸租僅斗斛耳而履其産彌日不遍既不能自耕又害他人耕何以聚人保境宜合剗請以猍逺民來者務得居者患失主客力競將無曠土再論今邉郡田野荒蕪勸墾文具總首空設搜除苟簡循淮而南則有和糴則有鐡炭則有建康草料之征勞逺虛邉以資江左守將數易以竒繼苛一郡三邑二令聾憒險厄非一不過合肥歷陽居巢三戍夫以陛下規略而稽誤至此或者外治不可成歟臣愚妄意推本自夫不計而謾為而後外以鹵莽報不思而出令而後外以難行寢號為責實未免徇名則趣辨皆徇名之人志在大功却規小利則迎合皆規利之輩誕謾者敗而不誅諛恱者察而不去言既上壅人多自營宵旰十年觀今何輔臣謂內治不修無以整外惟望責宰輔以坐論其原收賢材以博圖其緒兼聽虛受以通壅闕朝廷正則疆場理矣唯陛下留神三論左右之人為欺囊槖邇為援則逺堅大為間則小肆彼其伺候辭色占揣意鄉開闔將迎莫狀其巧託正以行邪偽直以售佞薦退人物曽非誦言遊揚中傷乃自不意一旦孚號揚廷雖出􅐶斷喜怒氣𦦨巳歸私門齊威之強不在阿即墨大夫之誅賞而在毀譽者之刑毀譽無證刑不行焉胡能禁欺陛下誠幸聽臣無自立我收骨鯁棄軟熟察此非難乃悉數骨鯁軟熟情狀上極開納讀奏至齊威事進曰臣觀近政非無阿即墨之斷奈何毀譽之人自若上曰正待理會公益口疏治邉非是曰買馬亡幾習至盜馬虜將寄聲問故卒索歸之國家何至乏此而自傷體若是詔即罷買又曰日城淮郡以臣觀之未知守所合肥板幹方立中使督視卒卒成之乃者臣行過郡一夕風雨墮樓五堵歷陽尚壁缺而居巢庳陋如故乃聞有靡緍錢巨萬而成城四十餘丈者陛下安取此乎上問千秋澗何若對曰始臣行時方冬水落澗不勝舟比歸夏潦時至江澗合流渺然矣是將焉用上曰間亦險要對曰若以兵法言之漸車之水足以制敵藉此為險無乃不可又曰外事無足道咎根不除抑臣深憂左右近侍隂擠正士而陽浮稱道陛下誠聖明儻因貌言萬一垂聽臣恐石顯王鳯鄭注之智中也又曰近或以好名棄士臣伏思念好名特為臣子學問之纍人主為社稷計唯恐士不好名誠人人好名畏義何鄉不立上恱連言極是於所汲引士皆旌賞先是上即道遷公兩官又除寺正有自邉來覲者則曰薛某凡可為國知無不為而又注意傾洽以聽罷行如響故諱缺失者相目矣數日除知湖州朝辭劄子論科折不明示數輸送不即除籍及祖家分鎮強邉之法曰陜西為五而統於永興河北為三而統於大名有塘濼方田稻田榆塞為之險城堡寨鋪為之防弓箭社弓箭手畨族熟戶為之羅落它路迭戍悉受節度幕府州縣難所辟差自种折二氏外别帥則以三衙若三司使都轉運使為之能績效驗入備政府夫地分則守固勢連則情不隔權一則足以有為賞明則知勸光堯中興沿邉置鎮茶鹽之外舉推與之將以固圉計亡易此臣願按行成憲衆逮鎮守統帥輿帥不限文武忠智是使且無拘文無要小利無以日月為斷卒章尤剴切曰方今諛媚成俗舉世尚同泛觀設施歡曰盡善偏辭先入異議不繼百辟盈庭幾成孤立是日奏罷上留語良久公將退特溫辭寵藉之大旨謂書生姑息而辦事者以竒為能煩卿輔郡兾以中道理之公對曰臣學於師以事陛下唯中道尓上曰如此朕復何憂公至郡踰月户部奏言諸州經總制錢皆出埸務酒稅雜錢分隸以納今多隱餘分隸不盡得自便恣用請更為今監司給曆州縣以凡日收錢托實係曆分隸否則效聞令下吏相顧莫敢建明者公獨首奮為當路言之其略曰舊額凡雜納錢以十分為率分隸四為糴本六為係省錢其後乃始增以二分分隸總制錢是時州縣未病之也然亦䆮尋于竒羡矣久之乃裒羡錢校數歲之最為額以十分分隸之七為總制增稅三為在州錢愈非舊比也復積有上供月樁大兵打船修船六分贍軍移用降本竹木等錢科色不勝繁矣而隸額如故既不足以應計且歲費彌廣郡用彌匱由此埸務鑿空以取嬴雖有奉法吏思以寬弛豫民而不得騁若復隸額外之征掇其強半官吏自救不給民病甚矣且以胡之都務糴本係省𥘉為錢二十三萬五千六百有竒自捴制之起為錢五萬八千九百有竒與故合猶日課二十九萬四千餘錢而巳重以七分增稅為錢三十五萬三千七百有竒又重以上供若大兵之須凡四千萬八千錢有竒使今且旦得八十萬錢以充入經捴制之額其餘為上供諸雜須錢且患若不足况不盈此卿所謂係省在州之數悉闕亡有約此推見他管庫盡然郡將安仰如不得已冝以日收錢先樁上供諸雜須之餘乃係曆分隸庶或可行不然不敢奉詔版曹恚建郡胥俾持條法詣曺自解公辨益力臺諌官感發相繼疏爭之上乃寢前奏湖無苗米餉軍歲糴七萬一千五百餘石為緡錢二十一餘萬目添差武臣路下至進勇效士一百七十有一員軍貟五百三十有一人其廩稍為緡錢距二十萬以他經費合往歲凡用緡錢五十二餘萬舊制烏程歸安二縣折丁錢歲十三萬緡七年有旨減折丁錢太半其巳全輸者聽以明年除之是歲所失亡十有餘萬而大農和糴六萬石以銀交子髙估徒欲用錢二千省得米一石郡不忍裁市直則當輔錢萬六千緡僦載之費不與焉益以就祿八十有三人啻為緡錢二萬明年郊視進獻賚豫之幣齎亦以二萬數凡增費十萬三千餘緡以亡加增大都缺緍錢十有五萬公曰是雖劉晏將奈何亟請于朝乞以市直償民糴乞以折帛紬絹錢撥除折丁錢乞汰軍改徙寬郡乞莭冗長差授在郡裁三四月自抗論分隸後執拒大事纍數端日與權貴征利者為敵雖或依或違郡民少蘇而不能平者滋衆獨隸天子簡記所以見覆護甚至始公嘗薦某人有材識它日某官缺貟宰執擬數姓名以進竟擢某人為之郡丞趨時好干政引章避之為是他丞嘗遣中使有所廉察浙西諸郡獨不入境用是故不敢輒動危之然公歸志決矣即稱病請奉祠三不許會除代一月章五上巳又旬四上改除知常州公方鄊用人人期待行所學不數月久勞于外還七日乃出守守七月罷罷歸之百日以疾卒年止四十邦君朋友暨後學哭之過乎哀四方賢大夫士千里交相弔也公之學蒞事雖謹宅心唯平其燕私坐必危然立必嶷然視聽不側欹雖所狎授言不以戲自著抄書及造次訊報字畫不以行草几篋筆研衾枕屏帳皆有銘毫釐靡密若苦節然要其中坦坦如也故其寡欲信于家行推于鄊正直聞世而居無以逾衆人公自六經之外歷代史天官地理兵刑農末至于隱書小説靡不搜研來獲不以百氏故廢尤邃於古封建井田鄉遂司馬之制務通于今或者疑公之博蓋其所自得精一矣名流問質或往復纍數百言旨要無二大􅔰以古人小學神而明之大學之道傳逺説離故漢儒守器數章句名家小知穿鑿異端之徒乃一切屏事志言後已髙論虗無而卑者滯物卒不合合歸于一是為得之讀其書知其為博之約也公已不求聞逹于人有一長薦稱必備居官不出位遇大事義所當為斷為之嘗掇拾管樂事為傳語不及功利平生所推尊濂溪伊洛數先生而已告學者則曰毋為徒誦語録有浪語集若干卷書古文訓若干卷詩情性説若干卷春秋經解若干卷旨要一卷中庸大學説各一卷論語小學若干卷資治通鑑約説止若干卷九州圖志止若干卷餘未就公患五代史缺略修之亦未就若隂符握竒山海經古文道德經焦延夀易林及劉恕十國紀年莊綽楪蓍譜林勛本政書姚寬漢書正異之屬皆校讎為之敘其文精確趣實可以濟世其經説不並依先儒其校異書必解剝其不正者娶孫氏父汝翼也𥘉汝翼與舍人友相得舍人死汝翼遣書待制自言吾有女才且淑異日冝善事夫子吾將以室起居之孤比歸公婦行皆應書公卒其友人張淳欲悉遺衣服以斂書銘如古法能俯聽蓋不失公意云一子曰沄輔國學生公以卒後之百四十有四日十有二月壬申葬于吹臺鄊慈湖之原傳良丙戌丁亥歲受徒城南公間來過教督之明年謝徒束書山間屏居公又過之問治何業竭已所已得對公曰吾懼吾子之纍于得也即詔曰冝若是歲已丑冬遂往依公具區滆上卒學苑茨一間聚書千餘卷日考古咨今其中明年秋試太學公適赴召於是鄊諸生及它邦之友咸在又日相與從公居遊凡七八年間違公久者惟公使淮守霅川時為然然亦率不一二月書命輒至至則具道所言與行事故世多知公詳莫如傅良今取其出處事言之大關治道學術者為狀餘不著謹狀福州長樂縣主簿諸葛公行狀曽祖考璿妣朱氏祖考原武翼郎祖妣張氏趙氏並封孺人考純迪功郎妣趙氏公姓諸葛氏諱説字夢叟琅琊諸葛自會稽內史恢别為浙東之族後稍徙嚴陵永嘉族蓋嚴徙也或曰新安譜亡弗可論次公大父娶城南張氏以諸子從其舅學所謂草堂先生以八行應書者也繇是闔郡賢士大夫往往多諸葛氏師友姻婭公幼陶染諸公間已岐然度越行輩益自勵讀書著文窮夜旦不輒休既冠入太學再薦登紹興庚辰進士第方待嚴州司户參軍闕丁迪功公憂服除授台之黃巖尉復丁母氏憂公故負當世志學不為章句訓詁淺事務見于施設此罹兩喪謂祿養之無逮命之不偶也於是名其園曰艮園室曰傃室以其學力行於家輯柔其族而厲其鄊人久之上下交孚子弟無少長咸視公習謹而麗於善莫之或肆里並大海其啇海自給者率剽悍乃時以所不平就公決質之惟一唯否是定郡之東南隅廣斥易恐截然倚公為巨防而公亦任其戚休非衆同欲謁不至郡邑凶年艱歲縣官有恤政為守者率需公至為方略公白事當若何費當幾何立聽行之然他鄊部未有條而東南隅若干戶少長秩秩然蒙惠矣紹興之季年也防海隆興之甲申視疫丙戌埋胔乾道之庚寅􅉝卯食飢壬辰築埭皆其小試微見者也往年余與薛叔似象先陳謙益之俱會行在所私相語為授福之長樂簿公重違吾黨意強起之官是時前丞相史公帥閩部丞相閲人熟不輕以獄訟卑屬吏雅聞公賢數諉以事公以理平決不視大府意所疑信為非是丞相滋相知延之幕中幕中故盛賔遊惟公自一話一言無禆輔不出諸口丞相自喜晚得士禮以已敵且率當路者薦之朝而公死矣實淳熙元年正月庚戌也公平生燕寢無惰待物不矝莊施交際語唯恐傷人聞或為不義必反覆鐫切不但巳雖行百里從一㒒持𬒳飲食廑廑無乏所以周鄰里朋友則不問費室事一切勿理趨公事未嘗不勇決也年且五十德日加修講問日加切余嘗見公暨張淳忠甫夜論學自敘讀書二十年得一健字余輒從旁欵公健天德也盍求其本公云云旦日忽挈余手出曰吾固深省于疇昔之言余竊自恨規意之淺也比將殁猶校讎儀禮家人不知其甚病也厥明盥櫛巳遽索𥿄書遺友人以訓其子為寄更以一紙書吾他日將族葬必擇寬地問法於伯忠甫又以一𥿄書吾弟兒女多以某所田若干畝盡歸之適劉氏娣薛氏妹具有缺以田若干畝歸之巳呼其子耕來曰汝行之毋敢違戒又曰語汝母屏母來前也一家始大驚頃之長樂尉之書至還答如平時又頃丞相遣客與其子至亦將迎如平時客出大門公目已瞑矣娶徐氏一子耕也享年五十有易論語説若干卷碑志詩文若干卷耕卜以三年十二月丙申奉公葬于黃嶼山以狀來請始余聞公誼甚髙未之敢請見也寓城南有題曰里弟諸葛某之謁入余愧歎袖謁走出見遂辱與為忘年交將何敢辭以余所見聞公居鄊試吏建民利甚衆夫人有一事則以傳世要之于公不足道故道其出處進退死生者為狀國子司業何公行狀何氏郡大家别為二族諱溥字通逺官至翰林學士為百里坊族公諱伯謹字誠夫官至國子司業為城南族翰林公試禮部奏名為天下第一百里坊之何于是始大而城南何氏自諱某生四子金華主簿子發為宣和間進士子逹子謨同時為太學諸生子逹晚授官纍封至朝請郎公以金華仲子來為朝請後復與其弟青田令伯益同為紹興二十一年進士公卒青田之子叔忱與其三從兄次常又為同年進士蓋以儒生賦祿三世矣論之雖繇文詞以孝睦為本往時金華蚤世朝請撫其孤教之有成是為青田令青田復早世公撫教其孤如朝請今竟成是為叔忱也父子以善託孤起敬鄊黨則何氏之世其家有以也公信厚靖共務不暴白宦稍違皆循次平進不自意得而世之奔競沽激速化之術不但不欲亦誠不能也由國子博士攝尚書郎出知饒州罷起知廣德軍以朝請年九十餘丐祠不行丁朝憂服闋除太府丞是時上方更用一二執政闔朝士詣府稱賀致辭巳而顔行前論今進退人冝誰先則皆曰若何君不當久居此官己而改大理正不越月真除兵部郎官駕幸學於師儒選甚遴闔朝士相與語則又曰上既用某人某人矣必將用何君明年除司業以余所見士入朝不為衆􅎱忌顧兾幸其遷官鮮有如公者觀公羣居平日寡言笑𥘉無以恱人也每進對論事具以質言不好立新竒自以學官至為郎凡三四對所上十餘奏大要以當世之患文勝而實不足比年臣子為陛下豐財繕兵嘗試不效者類多誕謾無補事情方今慕漢宣帝而賞罰未盡當其功罪俗何由變末論久任曰以競進之人為自營之計望其實課績猶郤行求前也在饒州江西諸郡皆旱甚往往諱不悉言上公以戶口若吏卒之稍食計見廪實所欠為米十有四万石乞諸朝有旨豫三萬公連奏不已更奏月樁為緡錢十六萬折帛十二萬綿絹六萬二千匹不蠲民必重困禾且熟猶自疏力不足救荒當罷去永嘉不冝蠶民歲輸絹以貿絲旁郡為苦轉運使將以桑土例概數敷和買絹公適在度支持不使下有建造二百艘者宰相以為問公􅈤言溫瀕海郡木鐡皆非其有為塤其半平生不多見設施於其一二足以發明公之所存矣豈所謂徒文具無惻隱之實者耶以某年某月日卒于官年若于娶某氏某氏俱先卒又娶某氏子男三人叔願迪功郎叔謀叔振女三人長適某次適某次許嫁某叔願以某年月日葬公于某鄉某里之山來謀于某曰先君辱知於今參政周公厚嘗惠許之銘不肖孤自惟念設不獲執事之文以藉手則參政公將誰從而信豫之某不敢辭遂為之狀止齋先生文集卷第五十一
