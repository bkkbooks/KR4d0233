body:
  text: 止齊先生文集卷之二十奏狀劄子湖南提舉刺列郡太守狀臣照對湖南治郡莫難於永莫易於全臣取十年以來事關本司至於目即反覆參考見得永州實是匱乏積而至於淳熙十五年終大軍月椿常拖下七箇月不解共為錢三萬五千貫文餘逋稱此而又民俗強悍動多囂訟此所以為難全州素號僅足自淳熙十三年後大軍月樁每孟月錢季月起發並無缺誤他亦齊整而又壤地𥚹小公事甚稀此所以為易今來知永州趙謐自到任之後每月綱運已起至紹熙元年五月分若從今八月理起較之纍政䟎前三箇月却又𥙷帶舊缺凡為錢二萬貫文使知永州者皆如趙謐則永雖凋郡可以漸寬知全州施廣文自到任之後每月綱運𥘉頗如期洎至今年四月以後於本司新故交承之際頓不起解若從今八月理起較之纍政更拖下三箇月凡為錢一萬二千貫文又官吏久無俸給軍人冬衣才支一半使知全州者皆如施廣文則全雖樂土又必雕敝近者朝廷集議蠲减臣實奉行寬大之詔數內永州减月樁錢歲五千貫亦是謐率先他郡將所蠲减之數分為等第均與諸邑必欲上澤下及於民今之州郡大抵上欺監司而下不恤民自非謐有志愛民安能如此臣以為若謐者可謂不負陛下使令矣施廣文雖本書生顧為鄙猥之計及此垂滿略無顧憚自上供軍須至官吏之俸一切勿問臣尚以為行且受代或是儲積以遺後人比及體訪纍月以來郡帑並無見管錢物且財賦若不在官即須在民而廣文已將今年民戶秋苗創行預借一半方禾未登埸之時民正艱食奈何有此暴斂全之民力自是困矣臣以為若廣文者可謂負陛下使令矣至如知武岡軍王公弼亦有治狀武岡軍雖小壘自公弼為之闔郡之事井井有條士人恱之軍人安之旁及猺峒悉聽約束觀其才有過人者但視永州不為甚難勞效差小耳以臣愚陋衰疾實不足任刺舉如此三郡治否之狀蓋久而後得之已忝耳目之寄今三人者各及滿替若更隱默遂使施廣文僥幸善罷再竊官職何以為負使令者之戒趙謐王公弼不蒙旌别稍異倫輩何以為不負使令者勸已具狀奏聞欲望聖慈加惠此方首正諸郡將施廣文特賜黜責趙謐王公弼特賜擢用伏候敕旨紹熙元年十月二十七日有㫖趙謐王公弼各减二年應勘施廣文與宫觀湖南提舉薦士狀臣恭觀明詔搜羅湖廣遺材竊見通直郎知潭州長沙縣宋文仲有通務之材而發於謙和有及物之志而安於靜退蓋文仲雖生長南土其家學則中原文獻也頃丞萍鄊藹有民譽方臣假守桂陽得其為人就訪之而文仲嘗為桂陽録事參軍授臣本軍㑹計録一卷臣遵行之所以䏻蠲除宿負罷弛斜科不得罪於其民者文仲之助也尋領使事訪以九郡利病無不周知前者倉司糴𥙷諸郡米僅十萬斛今者漕司蠲殘亦數萬緡皆文仲發之臣以為文仲雖衡陽人實國士也奉議郎知常州無錫縣吳獵學問本於純實器識期於逺大所居闔郡宗為師友凡與之逰類多自愛而獵於其交有善稱之不容口有過戒之不遺力有急難雖不利於其身赴之不恤也頃從事桂林幕府與平李接之亂未嘗言功巳而帥臣劉惇不理於口而獵誼不避罪屢訟其冤人臣如此其不負國必矣臣守桂陽獵適為贍軍酒官助講荒政甚於饑渴桂陽故事遇皇帝登極奉表進銀三千兩屬方救荒之際力不辦此臣懼無以塞責獵實教臣申請减額迄蒙睿旨損三之一為惠一方獵與有力臣以為獵雖長沙人亦國士也文林郎知潭州攸縣蔣礪素禀端亮耻為苟簡往歲江陵今兹攸縣廉惠之譽兩邑同辭觀其為吏苟不便於民雖上官令之不聽苟便於民雖匹夫不獲仲則身任其責也臣嘗見其詣闕所上書論廣右利害有四救弊之說及與提點刑獄司論經總制錢其言惻怛可以施用則邇臣所謂逺方因革可備咨訪者在靜江則礪其人也奉議郎知全州清湘縣楊照賦受沉審濟以通練亦佐桂幕與平李接之亂隨冝知變見謂善謀而其操履自不可奪及今為縣益著吏績郡實賴之臣得其嶺外鹽策本末一書自開寶訖于淳熙上下二百餘年燦然明白其論以蔡京變法實為咎根馴致二廣連年多盜官般客販迭為民擾蓋利東路則西人𬒳其害利西路則東人𬒳其害冝為損益兼惠兩路斯可以便公私息紛更以臣所見廣鹽之說十數家未有如照之平者則邇臣所謂逺方因革可備咨訪者在臨賀則照其人也如臣不肖非有知人之明能得此數子於衆人未識之先正以久居於此或聞之公論之熟或見之同事之詳如宋文仲吳獵之在湖南蔣礪楊照之在廣右朋儕鄉黨咸所推先牧守賔僚無不器重臣如隱默不惟負蔽賢之罪是不奉明詔也巳於今年某月某日具狀奏聞臣愚欲望聖慈特賜甄録以昭示公朝不遐遺之美謹録奏聞伏候勑旨有旨吳獵蔣礪楊照宋文仲並赴都堂審察辭免浙西提刑乞祠申省狀某一介庸陋本不適用偶際休明荐叨器使自守軍壘就除本路監司之任一歲而遷將漕又一歲而遷按刑可謂寵光狎至私計兼足矣方寵光狎至而無圖報之心私計兼足遽為求便之請苟非至愚豈敢犯此不韙而某祠祿之請不避煩瀆至于再三實非獲已伏念某秋𥘉心痛至不省事當倉皇回司之時盧檢院范少卿俱來相問苶然一榻不能交談舁入𪠘舍盡室驚惻僅逃鬼録賴有天幸以此心氣衰憊目力短昏雖極勉強嘗慮妨闕重念某才有一兒尤不敏事書問滿前莫能報謝米鹽瑣碎時復關决夫多病早衰傍無佽助在官則以奉公不辦為憂在家則以應俗不周為愧若不乞假歲月務近醫藥貪戀祿食必致自斃區區欲望檢照前請特賜敷奏别與祠祿差使一次則未盡之命皆生成之賜小帖子稱照得某蒙恩改除上件差遣係是朁應孟明資闕𥘉以待次歲月足便休養故不敢輒有陳請今來應孟明巳除郎官即成見次所以須至煩瀆若未欲便與祠祿即乞與一般待闕差遣某見迤邐前去衢婺州聽候指揮十月二十九日三省同奉聖旨不允依巳降指揮疾速赴行在奏事訖之任吏部員外郎𥘉對劄子第一臣恭惟藝祖受命平定海內凡所以創業垂統莫非可傳之法而深仁厚澤垂𥙿後人則專以愛惜民力為本臣案故牘自建隆至景德四十五年南征北伐未嘗無事而金銀錢帛糧草雜物七千一百四十八萬計在州郡不㑹古所謂富藏天下何以尚此當是時諸道上供隨所輸送𥘉無定額留州錢物雖盡曰係省而非取之也蓋至大中祥符元年三司始奏立諸道上供歲額以此承平百年家給人足傳序九帝天下嘗多故也而民心不離迄用中興則以祖宗之澤在人深厚故也臣嘗惟念藝祖以得民心受天命比隆三代矣然而以天下遜不私諸子才一再傳而萬世不祧之宗僅同支庶則是在天之靈未享其報髙宗遭變深探其本由是推正統之自納至公之說而大命復集于夀皇聖帝爰暨陛下豈非天哉且天之報藝祖者如此而陛下以睿聖之資寬仁之德誕膺天眷方當繼體之始伏惟夤念髙宗推本之意欽承夀皇付託之訓以推行藝祖在人未泯之澤為萬世無疆之休今其時也臣不勝至願取進止第二臣聞熙寧以來用事者始取藝祖之約束一切紛更之馴至於今而民力之困極矣蓋自祥符奏立諸路上供歲額熙寧新法增額一倍崇寧重修上供格頒之天下率一路之增至十數倍迄今為額是特上供耳而其他雜斂皆起熙寧則以常平寬剩禁軍闕額之類令封樁迄今為額至于元豐則以坊埸鹽酒香礬銅錫㪷稱披剃之類凡十數色合而為無額上供迄今為額至于宣和則以贍軍糴本與凡應奉司無名之斂合而為經制迄今為額至于紹興則又以稅契七分得産勘合添酒五文茶鹽袋息之類凡二十餘色合而為總制迄今為額最後又以係省不係省有額無額上供贍軍等錢均撥為月樁大軍迄今為額而折帛和買之類不與焉夫取之之悉如此而茶盡歸於都茶場不在州縣鹽鈔盡歸於榷貨務不在州縣秋苗斛㪷十八九歸於綱運不在州縣州縣無以供則豪奪於民於是取之斛面取之折變取之科敷取之抑配取之贓罰無所不至而民困極矣夫藝祖以得民心受天命而使困窮至此此天所以復命夀皇爰暨陛下將以救民窮也書曰天明畏自我民明畏方今之患何但夷狄蓋天命之永不永在民力之寬不寬耳豈不甚可畏哉豈不甚可畏哉陛下知畏則冝以救民窮為巳任陛下以救民窮為巳任則大臣不敢苟目前之安大臣不敢苟目前之安則羣臣陳力何鄉不濟此藝祖意也亦天意也惟陛下留神幸甚第三臣恭惟陛下嗣位之𥘉詔㫖丁寧皆為寬民力而下臺諌侍從置局講究而臣猶以為民窮未救何也誠以裁抑細微或蠲空張之數而巳議結局未有以稱明詔大慰民望也臣來自逺方不知朝廷之費宫掖之奉歲當幾何以所親見則天下之力竭於養兵而莫甚於江上之軍故每欲省賦朝廷以為可則版曹以為不可版曹以為可則總領所以為不可總領所欲以為可矣奈何都統司不可也陛下亦熟念之歟則以都統司謂之御前軍馬雖朝廷不得知總領所謂之大軍錢糧雖版曹不得與故也於是乎中外之勢分而職掌不同事權不一施行不專矣職掌不同則彼此不能以相謀事權不一則有無不能以相濟施行不專則前後不能以相守故雖欲寬民力其道無繇且夫承平關陜已行之久中興韓嶽未罷之前養兵亦甚盛矣而不見其不足誠在今日稍仍舊貫使都統司之兵與向者在制置司時無異總領所之財與向者在轉運司無異則中外為一體中外一躰則寬民力可得而議矣凡事斷之而有異論勿斷可也行之而有後患勿行可也往者元祐至於宣和嘗罷新法矣則有紹述之說起而為梗靖康至于紹興嘗用兵矣則有講和之說起而為梗故上之號令相反而不能定下之朋黨相傾而不能合若夫寬民力誰獨無是心哉斷之而無異論行之而無後患莫過此者而何疑不决陛下誠斷之則今之大臣皆足以立綱陳紀二三大臣誠推行之則今之人才皆足以受令承教方當年榖屢豐邊鄙不聳失此間睱後將何及詩云譬彼舟流不知所屇臣不勝拳拳是日上殿方奏臣不肖蒙恩為郎幸得賜對上云卿去國幾年朕欲見卿久矣讀劄子至寬民力上曰莫急於此只為處置難奏云臣第三劄子是處置大略容欵曲敷奏天顔甚喜讀劄子畢褒奬再三奏容下殿謝恩上云且說話聞卿在永嘉從學常數百人奏臣無所長只與士子課習舉業過蒙清問不勝悚懼上云知卿學問深醇著書甚多朕欲一見可盡進來奏臣豈敢著書不過講說舉子所習經義何足仰塵乙夜之覽上云經說更好但隨所有進來奏臣來自逺外乍對清光巳踰平生之望又蒙睿慈曲垂褒諭令進所習經說顧臣何人遭逢如此然臣委是目下未有成藁以應明詔容臣守官之暇收拾編録候成次第奏乞投進欲望聖慈特賜寬假上云看撰得幾卷即逐旋進來不妨又奏在廷儒臣多是前進臣一旦入朝便敢僣越投進文字以此終是踧踖未安上連聲云不妨不妨辭免除祕書省少監准尚書省劄子三省同奉聖對冒陳臣除祕書少監兼職依舊竊惟自古所重自非時望不在此選假如循次而進亦以待之人伏念某學術空踈重以衰惰視今同進為日又淺上之不應遴選之科下之不與久勞之數乃因賜對有此越擢若遂昧冒安受不辭則是哆然弗揆敢當嘉奬此所以須至􅈤陳不容以官小例無辭免為辭重念某頃緣衰惰嘗申祠請尋趣奏事遂留為郎乃以重違成命黽勉效職則今日之辭情實可察伏望特賜敷奏早回誤恩以安愚分轉對劄子臣頃蒙恩賜對嘗奏三劄上陳一藝祖以得民心受天命竊以為推行藝祖在人未泯之澤實在今日誠不自意一介僣論偶契聖聰奬豫備至以臣區區之愚猶以前說未畢復為陛下誦之蓋藝祖之後天命復集於壽皇聖帝爰暨陛下恭惟陛下以藝祖之子孫而修藝祖之故事此天意也不識陛下自信足以濟此歟抑自視過謙而尚疑其難歟以臣考見肇造之業其道甚易知甚易行何者藝祖治大而不治細任逸而不任勞大抵懲五代叢脞之失再立朝廷以還君道君道得則朝廷正朝廷正則天下理願陛下勿疑其難也臣請條一二切於當今之務者以備采擇以上書人文字令知制誥看詳升降以聞此建隆二年十月詔書也以次對章奏下尚書省參詳可施行者以聞此建隆三年九月詔書也且夫中外論建非近臣面對則逺臣封事皆所以通下情禆治道也而其患不在於壅蔽則在於讒嫉今也以逺臣封事之言付之制誥則有舍人院任其責矣以近臣面對之言付尚書省則有尚書省任其責矣以為可聽者斯聼之不可聽者勿聼則聽者無特異於衆之嫌不見聽者無見遺於上之恨是謂不以主斷廢羣議而無壅蔽讒嫉之患人主所自擇毋過臺省長官耳此道豈不甚易知甚易行哉伏覩陛下踐祚以來不信近習而信外廷不聼遊言而聼公論亦既深得藝祖之意矣然間者上自侍從臺諌下至百執事或臨遣郡國之臣對揚敷奏多見嘉納人人自以為得上意且行其言而章往往不下他所指揮動亦留滯廷臣惑焉且陛下不信近習不聼遊言必無壅蔽必無讒嫉或以為方崇清靜之化厭於多事而不加省或以為陛下自去冬違豫以來聖意常有不釋然者於是務自寬大而不暇省二者皆妄窺測也臣獨自思念未有以藝祖故事上徹冕旒之聼者陛下其始自今凡中外論建一以建隆詔書從事不唯君道得而朝廷正亦足以解廷臣之惑不亦美乎由此言之若法藝祖但見其易未見其難則臣所陳推行藝祖在人未泯之澤皆非偶然嘗試之說可以次第舉矣臣不勝至願止齊先生文集卷第二十
