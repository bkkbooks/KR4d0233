body:
  text: 奏狀劄子學官乞在外差遣申省狀某庸陋晚學近塵末第驟蒙朝廷擢置學省遭遇車駕幸學蒙㤙改秩疊有倖冐豈不欲勉䇿駑鈍少圖報塞實以多病曠官前後以病不與私試凢五箇月職事廢弛不遑安䖏欲乞陶鑄一在外差遣或祠廟一次十月十二日三省同奉聖㫖添差通判福州仍釐務赴桂陽軍擬奏事劄子第一自古帝王之興未嘗不因天下之變或草昧之初或叔季之後皆可以成大功而熈鴻號於無窮載籍所稱創業中興之君是也徃者外有方張之虜内有交叛之将関河海岱群盗雲擾光堯太上皇帝﨑嶇馬上撫定東南以康世屯以繫國祚遭變之難自古所無而天命復集于宋盖時無不可為者矣恭惟陛下叡知神武之略寛仁恭儉之徳憂勤惻怛之意自纉丕緒以恢復為已任可謂對天地而不慚質鬼神而無慊者然而遷延稽故至今二紀比者賢士大夫類曰時不可為而以恢復為諱雖臣至愚竊所未喻且隆興用事之臣雖以朴忠竟無成功天下不與其才而與其心乾道用事之臣雖以大言亦無成功天下不與其心而與其名孔子曰必也正名乎今顧以恢復為諱果何名歟論說定則習俗成習俗成則人心不起人心不起則賞刑不足以懲勸是王業徃徃遂巳也孟子以禹抑洪水周公兼夷狄孔子誅亂臣賊子凢以正人心也聖賢事業以人心為本靖康之禍諸夏陸沉而人不耻君父播遷而人不怨天地易位三光五嶽之氣分裂而人不懼是尚為有人心乎馴至於今晏如平時不念國辱私相㤙讐但為身謀患在得䘮自非陛下有以再造彛倫一新士氣臣恐此義寖微寖滅或有後憂也方今虜主春秋甚髙志不在動庻子嫡孫未知誰立一傳之後必非今日所覩矣以血氣方剛之君一時新進大抵生事儻無逺略且有内争兵端其可禁乎就使虜無動夫以中原萬古衣冠淪為左祍五六十載北不足懐南不䏻令厭亂思治豈無其人聞之道路河决非常擾及関陜神怒民怨其兆見矣卒有特起何以待之就使虜無動中原無特起以臣過計千乗萬騎介在東南禮樂庻事比儗全盛地氣不䏻勝民力不䏻支亦豈子孫萬世帝王之業乎恭惟陛下叡知神武之略寛仁恭儉之徳憂勤惻怛之意冝為中興盛帝顯王而以人心不起至於憂在子孫臣實未喻孟子曰得百里之地而君之皆䏻以朝諸侯有天下未聞以千里畏人者也是在陛下而巳臣不勝拳拳第二臣竊謂士大夫以恢復爲諱但曰時不可爲者必有以藉口矣其說以官與兵俱冗而方困於財有此三患何郷而可彼好論邊事以希戎功者皆誕謾迎合耳誕謾迎合自中人知耻此名進言之人要當觀事情如何不宜以此妄自沮却臣誠愚陋揆之徃古國家之患何世無之上有悉心委意之君下有至公血誠之臣雖多患必且盛強君臣玩安虚延歲月雖無患亦且衰弱臣故曰以人心爲本誠使中外人心併意一向以佐下風治是三者有一弗治且害大計則九重不怡九重不怡則朝野震疊如是則恢復之形見矣臣之所謂恢復非論邊事以希戎功之謂而結民心以祈天命之謂也徃者渡江諸臣僇力討賊大義明矣竟無所成陛下亦嘗䆒其所以失歟不鍳前轍而以重歛濟師以王蔡之遺法圖冦鄧之髙勲一戰之餘民力巳屈縦微秦檜其勢不得不出於和後之議臣不務反此乍和乍戰莫知攸濟臣請略陳祖宗立國深仁厚澤之意與熈豐崇觀以来用事者之紛更動危邦本以致夷狄之禍訖于渡江理財本末陛下詳覽而審擇焉則興衰之分决矣是恢復果在此而不在彼也國家肇造之初雖創方鎮專賦之弊以天下留州錢物盡名係省然非盡取之也當是時輸送母過上供而上供未嘗立額郡置通判以其支收之數上之計司謂之應在而朝廷初無封樁起發之制自建隆至景徳四十五年矣應在金銀錢帛糧草雜物以七千一百四十八萬計在州郡不㑹可謂冨藏天下矣大中祥符元年三司奏立諸路歲額熈寜新政増額一倍崇寜重修上供格頒之天下率一路之増至十數倍至今為額其它雜歛皆起熈寜於是有免役錢常平寛剰錢至于元豐則以坊塲稅錢塩酒増價錢香礬銅錫㪷秤披剃之類凢十數色合而為無額上供至今為額至於宣和則以贍學錢糴本錢應奉司諸無名之歛凢十數色合而為經制至今為額至于紹興則又始以稅契七分得産勘合添酒五文茶引塩袋耆户長壯丁弓手雇錢之類凢二十餘色今為緫制至今為額最後則以係省不係省經制有額無額上供贍軍酒息等錢鈞撥為月樁又至今為額至所謂湊額籴本降本折帛坊塲浄利供給吏禄之類令項起發者不可勝數且夫自係省而有上供自上供未立額而有年額又有無額自有無額上供而後有經制而三搉之入盡歸京師至經制悉矣故夷狄之禍起且夷狄安䏻一旦入中國哉民心離則天心不享則其禍必及於此而渡江諸臣不惟盡循宣和横歛之舊又益以緫制月樁令項起發王朴有言以此失之以此興之可乎今天下之民皆不便其長吏徒以陛下時出徳音有所罷省蠲閣振業之而民心不解夫㤙澤有限不䏻勝無藝之歛可為寒心臣故曰觀諸此則興衰之分决矣則恢復非論邊事以希戎功之謂而結人心以祈天命之謂也若曰方困於財何郷而可是坐觀成敗者之說不事事者之利非國家之福也第三臣聞熈豐崇觀以来用事者紛更祖宗之舊以致夷狄之禍今天下皆追咎之矣至於重歛不唯奉行不以為過又從而附益之者何也昔者以妄費今以養官與兵故也方今經費兵居十八官居十二官未暇言也敢言養兵國初州郡無禁兵也著在令甲自騎射至牢城凢名額二百二十三緫為本城而巳所謂禁兵者皆三司之卒分屯而更戍今之屯駐駐泊之名而鈐轄都監監押之官所部領也三邊之兵間因事宜升為禁軍者則所謂四十四䖏禁軍是巳是為就糧自元昊叛而西北有保毅王倫叛而東南有宣毅於是列郡稍置禁軍至威果既云多矣然亦無過大郡要害之䖏熈寜按天下廂軍之籍五十萬人而不知戰於是教閱之法起其後以廂軍團併為額則今之兩浙崇節福建保節之類是以教閱之兵因别為額而隷之将下則今之兩浙椎節福建廣節之類是已方戍法之行也三司禁旅轉徙於四方而州郡廂軍大抵以供百役盖勞之則易使散之則易養此藝祖神謀也自州郡各有禁軍而三司之卒不出不出則常坐食於京師常坐食於京師則必盡天下之利歸之公上利盡歸於公上而州郡之益兵巳多則其勢必巧取隂奪而後足於是養兵始為大患若今屯所諸軍亦何異本城哉特以三緫領饋之而不節制於長吏為差異耳要之所謂韓家軍者今為京口人矣劉家軍者今為建康池陽人失岳家軍者今為鄂渚江陵人矣向之數經行陣以功得官徃徃㨂汰冗食於廟祠添差之類比所招刺例多下等乆不離營兒女滋息稍食鮮薄類苦飢露當此勞辱最易撫摩臣愚以為此可以漸復祖宗舊制之機殆天授陛下也誠有為國家任是責者稍使不仰食於縣官以省月樁則經緫制之名亦可以次第改正恭惟陛下不愛爵禄以待天下之士大官重權可謂尊寵至於養兵則國家𬒳重歛之名而不得辭臣享其佚上任其怨臣竊不取也第四臣所謂養兵國家任其事者臣嘗思其故矣非必皆郡臣之罪也勢也方今天下之勢以陛下明聖豈不灼見其偏歟其在朝廷有官守者莫如文墨議論之寵其在四方有民社者莫如監臨察之專蓋非一日之積也徃者給諌館閣與省寺之官位望相等而不歴省府徃徃不至執政夫是以績效白而有司無失職儒雅進而䏻吏有以自見而朝廷之勢適自主判廢而職掌分更迭之法改而流品别由今䑓省視六品長吏為清濁况它有司乎臣故曰有官守者不如文墨議論之寵也徃者帥漕望郡事力不分而将相大臣多領藩服夫是以利歸公上而邊郡未嘗不實耳目而守将繩墨之外而中外之勢適平自以歸之提舉大軍之餉歸之緫領至今帥臣徒擁空名位望風采不逮監司逺甚况支郡乎臣故曰有民社者不如監臨察之專也推是二者可以察見天下之勢日趨於偏矣是故煩言勝而事不待其成紏禁苛而官不盡其力今上自䑓省下至州邑胥史執其政長官不䏻誰何大者卒伍失色則主将屏氣甚者匹夫單人動揺之下持其長是今日之勢也是以不事事者常無之俗成臣故曰非羣臣之罪也勢也且以綿數州之廣外有夷狄之難内有盗賊之患而執事者徒取具足曽無一人根柢深厚可以託重雖有許國之人欲展布而無繇陛下念此可長恃乎自古事變不於暇豫圗之則俄而至於倉卒不與忠愛臣子共之則或不得已付之一切之人倉卒不如暇豫一切之人孰與忠愛利害甚相遼絶也而毎患不果易曰黄帝堯舜通其變使民不倦神而化之使民宜之伏惟念光堯遭變之難鍳藝祖造邦之意推黄帝堯舜宜民之術以正人心以捄天下之勢則宗社幸甚蒼生幸甚十四年六月王丞相淮取㫖免奏事桂陽軍乞畫一狀一臣照對本軍以銀為稅自天禧間行之民以為便但銀價不等折納亦随時髙下官吏未免以意増損紹興奉行經界本路漕臣見得銀價大重遂立條約毎兩折錢二貫貫八百文足自此始有定數乾道六年正月一十九日因前知平陽縣羅公旦劄子准都省批狀指揮行下本路於毎兩價錢上减錢一貫文足至淳熈二年六月三十日因轉運副使李椿奏尚書省劄子三省同奉聖㫖指揮行下本路於毎兩價銀上减錢三百三十六文七分足今毎兩折錢二貫三百六十三文二分足至與市估低平相等逺方之民鼓舞聖㤙老穉相傳無有窮已然臣區區尚有不敢隠黙竊縁節次裁减銀價内一項轉運副使李椿所乞共减去歲收錢一萬二千貫而當時先乞於月樁大軍錢囚减放上件錢數紐計銀價除落故所行乃爲實恵知縣羅公旦所乞共减去歲收錢二千七百四十一貫四百九十文足而當時即不曽乞於月樁大軍錢内减放上件錢數雖曰减價而其錢至今猶是随鈔敷納故其所行但爲虚文臣䆒見本末李椿以具奏出於宸断故雖以一萬二千貫之多捐之爲易羅公旦以不曽具奏出於省部故雖以二千七百餘貫之少損之爲難臣竊思念本軍財計支數漸増收數漸减勢不獲已必取之民臣已将乾道六年正月二十九日淳熈二年六月三十日所降指揮申尚書省欲望聖慈特與行下本路轉運司将乾道六年正月二十九日已降都省批狀指揮所减銀價一百文足止共無收錢二千七百四十一貫四百九十文足照淳熈二年六月三十日聖㫖指揮一般事理毎歲於月樁錢數减放二千七百四十一貫四百九十文足却将見今稅戸随抄收錢均掯蠲免庻使徳澤下流不為文具一臣檢㑹到淳熈五年正月空日守臣徐大觀奏昨准聖㫖指揮减收銀價錢一萬二千貫毎貫元收經緫制頭子錢四十八文五厘省共計錢五百七十六貫六百文省毎貫元收勘合錢二十文足計錢三百一十二貫文足兩項共錢八百八十八貫六百文省今既减放銀稅正錢其上項經緫制錢亦無名色可收巳是一例除放之數欲望特降一睿㫖與随數除豁當年五月二十二曰都省批狀户部勘當行下湖南提刑司更切取見桂陽軍所收經緫制錢勘合錢委是於人戸折銀錢上所收即将今来本軍前項合放錢數並行除豁本軍自此並不起發去訖今来所乞减放二千七百四十八貫亦有毎貫上收經緫制頭子錢四十八文五厘省共計無收一百七十一貫二百五十文省如蒙施行併乞照淳熈五年五月二十二日巳降都省批狀指揮併行除豁施行一臣照對桂陽雖小壘實邊徭峒頃年郴冦盖嘗上煩南顧之憂矣稽其兵籍最為單弱見𬋩禁軍一百九十八人廂軍一百二人牢城七十四人牢城一營既不在准俻緩急之數則通廂禁軍止三百人而其接送守臣各九十六人提刑提舉司各四十人幹辦公事官二十一人諸司占破二十人率毎歲用一百七十八人又有押部綱運齎擎文書之類差撥不足不免通那禁軍應副臣之到官亦欲略行整齪教閱然常不滿百人臣因根檢詢䆒自紹興十一年史愿措置量屯軍馬於管下平陽縣臨武峒諸䖏弹壓至十四年抽回臨武峒戍兵差撥鄂州軍五百人前来軍城屯駐至二十一年復抽囬鄂州軍㝷有李金之冦乾道元年賊平之後再差鄂州軍五百人以二分屯本軍一分屯臨武淳熈十一年十一月二日樞宻院降聖㫖指揮抽囬鄂州兵差撥潭州飛虎軍三百人於郴州黄沙寨親兵一百人於冝章縣忠義軍一百人於本軍臨武縣駐劄自此軍城遂無戍兵契勘平陽縣自舊有臨武縣楊梅寨廵檢土軍一百人紹興十六年析平陽之臨武置縣遂以平陽臨武兩縣廵檢帶衘今来臨武縣見有戍兵一百人弓手七十人稍成次第所是舊管平陽廵檢土軍一百人合還本縣管内置司臣今相度平陽臨武兩縣廵檢就移在城内外置司仍舊以平陽臨武兩縣廵檢帶䘖以所管土軍一百人相兼教閱稍壮軍壘猝有抽喚止六十里徃来應接管無缺誤如臣所乞即不敢引用紹興乾道事例増添軍馬亦不曽違戾淳熈十一年二十日巳降聖㫖指揮只是軍縣一軆務令均平伏乞聖慈詳酌施行一臣伏見前後臣僚屡言郴桂之間宜興學校以柔人心㝷准淳熈八年八月二十一日勑節文三省同奉聖㫖依軆户部勘㑹事理施行行下本路扵郴之宜章本軍臨武兩縣剏建縣學所以勸奨風厲條目甚俻仰見睿明旁燭幽照欲使邊氓同𬒳文化幸甚幸甚今来兩縣雖各有學然而無訓導之官無供億之具名存實亡不足以仰称明詔以臣愚見所在縣學多是文具莫若只就州軍學展套齋舍増養生員責之教授誘進義社豪民或邊峒子弟孫姪入學听讀仍以縣令佐兼𬋩幹贍學錢粮事措置應副專委本路提舉學事司常切點檢别為一籍如教養到生員一百人或一百五十人以来許将見任教授并贍學錢粮官理為勞績量立賞典如此則事軆歸一庻可就緒惟陛下財幸臣檢到本軍准本路安撫牒備准淳熈八年八月二十一日敕指揮申尚書省去訖乞賜檢㑹施行一臣照對本軍祖来年額係招趂住賣茶引二十二道毎道毎道一百斤價錢二十三貫四百一十九文省一年計二千二百斤共價錢五百一十五貫二百一十八文省分係三縣并在軍合同塲招趂縁本軍非産茶地分又非啇旅孔道自舊将買引價錢均敷於民歴年彌乆不以為病至淳熈元年守臣妄希増羡之賞於任内添起年額茶引二十三道作四十五道増及一倍之數計價錢通五百一十八貫六百三十七文省其錢無所從出却於輸納倉庫收趂内折銀塲毎鈔三文足和籴塲毎石九文足常平倉毎石二十文足苗倉毎石三文足猶未及額敷及合干等人至今十五年凢科歛民錢八千七十九貫五百五十五文省臣雖巳具申本路提舉司乞覈實申奏除豁去訖臣愚竊謂國家歲計冝不藉此瑣瑣欲望朝廷詳酌指揮行下本路提舉司将淳熈元年以来増起一倍年額茶引二十三道特與免行招趂令臣将見今倉塲受納鈔面所收茶引一項錢盡數除落雖其事微細亦足以彰陛下加恵元元之意一臣将本軍牢城指揮兵士見管七十四人逐一契勘元来㫁由見得内係竊盗二十五人強盗十二人刼盗八人渡淮作過一人竊縁本軍𬒳邊其民習見剽奪之利乃以四方強惡之人配隷於此間者徃徃佚去散入村聚率人以為盗臣因捕盗嘗獲郴之迯軍數人皆故江浙間強盗也臣愚以為本軍無城壁開閉之節無營房出入之限居民荒凉官府不威重兼廂禁軍人數稀少部轄不前凢此等配隷之人實難関防欲望聖慈特賜指揮自今應盗賊并渡淮作過等人住配本軍庻乆安静臣檢准淳熈十四年四月十一日樞宻院批狀指揮知郴州王薫申乞諸州盗賊不湏配隷郴桂大理寺看詳淳熈十三年六月十一日指揮諸州牢城人數如溢及五分仰先申本路提刑司照應詣實保明備申省部以慿行下住配自合遵依施行難從所乞伏念本軍事軆又與他郡不同伏望聖慈特賜矜允止齋先生文集卷之十九
