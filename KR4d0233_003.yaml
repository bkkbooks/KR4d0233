front:
  text: 止齋先生文集卷之三
  hash: sha256:612aac5a8f5d07960692fe3c352f67db06dd8ec9bece62d9f82ff54bce2dd1fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_003-1a}
body:
  text: 古詩赴桂陽道中喜晴書事十日九雨垂垂雪馬僵僕病泥乘橇披衣闖户得星月喜有耻向妻兒説耳根久與朝雞别熟睡八年謀未拙乞米作糜蒙𬒳啜客來午漏家僮出如今兒噭妻愁絶我縱喜晴心已折可以藝麻多筍蕨苟有一丘吾計決奈何諸公厮役皆豪傑尚愛舂陵老元結簡友人二首南去有五嶺北來有重湖水清石益竒往往中州無在昔宦遊者越若韓張徒胡然自衡陽隻鴈亦不徂安眠夜至卯休吏日加申廪稍亦巳厚養痾非隱淪恨無封君法老矣藏其身遄歸豈不欲更有宜歸人和王教授謙叔述郡圃韻守邉豈無事治圃亦有説朝看士飲羽暮與客投轄且以示多暇且以勞同列我生腸九回世故肱三折環堵僅尋丈短亭聊歲月忽蒙當寧記濫輔專城缺區區自米鹽在在欲黼黻矧惟有兹山未省從何月張羅上空庭尋斧及徑節舊觀誰緝熙新思蓋綿蕝幸方一小治謂拂雲尚可六太息謂芳州漱玉風月釣磯錦湖撫松胡然召南人而驟歌所苃臨桂尉楊渭夫以詩來因次其韻兼簡同僚萬物各美惡一室有面背去來故無恆欣厭惟所會有能悟兹理何必著幽邃後圃並山麓修竹積空翠斧尋自何年樊飬特過計陳根獨遭時沃壤亦借勢居然成獨清可以掩衆媚亭院起中否湖潦粲前際於時吾豈敢謂此天作對新詩忽盛談俗狀良內愧子方及歸期客復攪離思謂謙叔教授尚當封殖之去日如始至送宋伯濳宰髙安秋風日來諗役車何時休有鳴丘中琴玉瓉懷黃流此腰不可折此笏未忍抽亦入鴈鷺行而為稻粱謀四海楊誠齋吾道得自由悠哉思萬端哿矣試一籌風詩訖於豳易象重以周偶語詩易因詩及之當知橫空翮不若逆水舟送楊渭夫歸省應侯氣蓋百粵小朱侯誼與灕江長兩侯愛士早成癖怪甚渭夫懷故鄉士窮萬事一不就就得一事窮何傷渭夫壯者忍窮久老驥欲秣胡沙霜吾家何在雲橫嶺趙媪不冤劉兒瞑孰與親旁煮湯餅渭夫𥘉至臨桂劉氏兒𬒳殺賊不獲不數日渭夫竟得之既而權義寧令復有殺趙氏嫗者或執平人將處死人以為非渭夫莫能辨府召渭夫與議旬日又得之南嶽聖業寺禹柏久與林壑居所見皆衆稚豈無夀千年未有此柏異壯而嘗參天晚乃但仆地定非風雨摧殆是斤斧棄其本則離披其末則倒植其枯如殘枿而蔚有新意其靡如弱植而凛有髙致將前復却行宜右忽左次驤龍或俯顧遁虎或回眙隕石或猛起飛翬或顛墜山立或磬折尸寢或拳跽斷支或強附橫陳或巽避綢繆情不狎頺墮力未瘁朴略自光怪挺持匪標置終焉人偽盡獨以天巧遂吾聞古有道純朴去故智與世每如此全身亦幾是疑將問歲月缺弗見載記誰言導江時手植特嬉戲世人那得識會有神禹至牡丹和潘飬大韻看花喜極翻愁人京洛久矣為胡塵還知姚魏輩何在但有歐蔡名不泯夕陽為我作𥘉霽佳節過此無多春更燒銀燭飲花下五陵佳氣今方新張漕行部過湘岸有作因次其韻春晚得新霽草木日夜緑陽光𥘉蔽虧野暝或單復美人浮湘波領此入蓬屋故放歸帆遲更呼漁火續窮探物精華盡付詩凡目憶昨欣晤對令我忘休沐劇談酒行希危坐兵衛肅相思正倚樓所寄忽纍幅瑰辭堪買貧軼韻和難屬自從楚騷興悲些逮差玉後來數唐人欵乃巖隈宿世無梁昭明斯文又誰録送王南強赴紹興簽幕四首詞章行天下嘉賴二百年甲科至公卿誰敢謂不然有人妄媒孽一世所棄捐我亦欲護短諱不言幽燕汗簡在吾後覆車在吾前人人尊孔孟家家誦詩書未省有宇宙孰與今多儒儒者道如砥豈其自﨑嶇申以黃老廢賈以絳灌踈漢家嘗紛紛政爾門户殊歷官如歷階越等多所傷奈何拗堂水持綆萬丈長誰無斯世方乃此袖手旁永夜淚不禁仲尼故皇皇又聞雖小魯乘田問牛羊聞之浙河東見之湘水南未歸却相送既喜復不堪行矣乞自便帥幕或可參君方乘日長勉為停朝驂我池有螃蟹我園有黃柑題明皇醉歸圖騎者兩人扶不正夾道誰知為萬乘一人前馳一顧後懷欲並驅無號令狩人亦忘記鷹犬仰視只愁天欲暝有司刺候上起居杳莫得詳宮鑰靜鳴呼開元自英主前鑒竟遺盈幅𥿄君不見漢宮圗妲己未必當年甚如是送范憲東叔帥潼川四首離逾十年合合復十月離往日苦無及來日忽未知江源與海通吳會與蜀違通固天道常違亦物理宜勿作兒女感是中有精微相從意氣豪相知鬢毛斑細説竟昨非淺斟始今歡每懷吾黨多未救此世難一則琢冰雪再則紉芝蘭騷人絶芳潔孰與風人寬有書但遮眼有位亦養痾養痾猶近名遮眼巳患多聊復歲晏爾奈此人逺何聲光正橫空議論如懸河宜君見别輕欵曲理則那逢人九頓首遇事三折肱雖知少為狂正復老可憎吾今有儲粟吾昔有短檠魯論訓何如周易讀未曽言歸又言歸兒女喚不譍行湘喜雨簡劉公度周明叔將行客有戒正熱人不禁出門一昔雨解纜十日隂湘山益以碧湘水益以深天光接雲夢野暝蒙衡郴蠅無盤中迹蟬有木末音顧乃廢枕簟爰方索衣衾我起問夾岸往歲孰輿今衡茅或數間叢竹皆十尋蒲蓮間華實鷗鷺時浮沉老稚各有得漁樵不相侵早插禾欲孕新炊粟如金為之失倦遊于以成孤斟永懷泛湘人屈賈多愁吟往者亦此境今者亦此心空名但千載佳思誰一襟時哉不可失浯溪更駸駸劉連州和前韻因道湘中之樂以謝湘中足可樂誰苦愁不禁孌彼蘭蕙姿固怯霰雪隂賈子天下士子何念慮深貞元兩御史南還會於郴亦復相唱酬間有亡國音愚溪更憔悴中夜起擁衾而得欵乃句膾炙循至今我後五百年公來適相尋田疇歲膴膴獄市春沉沉寬書日夕下民蠹祛牟侵况也省賦甚小郡至萬金交歡有陸賈私恨無羊斟我飽竟甘寢公暇多長吟乃知湘中樂關時匪關心湘民忘勞力樂極翻沾襟却愁吾二人四牡歌駸駸聞葉正則閲藏經次其送客韻以問之順水去吳會逆水來夔門萬古逆順舟以斗占旦昏曩余好百家信不及魯論𥘉亦半喜愕久之乍亡存白髮一無成頗識委與源風停波自平却視消長痕六經夫如何夫子手所翻恆言但桑稼怪志無鵬鵾規圎而矩方往往萬巧攢諸儒各有得長短賢若干玉帛相會盟兵車相并吞一語苟暗合羣生皆晏溫經成今幾年嘗試以是觀此道未軻死此書未秦燔猶之斗經天於以生蓋渾西方亦人豪國自為乾坤書來入中州坐使學者奔君豈捨從之或但遊其藩吾聞欲乘槎鑿空訪河根孰與瞻斗車把柁行江湍和張倅唐英詠梅十四首種梅欲百畝誰老意未渝有山在堂背有溪在庭除我危坐中央花以置坐隅人固不可親花亦不可踈花芳以飬性花隂以休影更欲從旁謀種秫可半頃衝寒時一觴我醉花獨醒醉醒兩相忘久矣繫歸艇因山為髙下因水為縱橫恣花欲何之勿撓所性清却愁雪太深瞻言不勝情有時亦肯來當我户牗明我豈愛花者而獨愛此花愛之匪無人詩且數百家前有水邉橫後有竹外斜但作如是觀桃李亦可誇人言物不齊相較三十里以梅等羣芳何啻隔弱水杜陵狀百物無語可著此巡簷索之笑但不禁冷蘃駸駸入衰暮故作不潔清美人美無度可使一國傾胡然立林林夾此東西榮對之意自消令我欲近名以之為雪耶雪或墮汙淺以之為玉耶玉或附旒冕春前每嘗試歲晏不退轉悠哉似有道可與共舒卷政應違衆好可忍負幽探以兹落南雅蜂蝶獨遺憾豈無好顔色一雨竟陳暗誰知歲寒姿可久非可暫若以色見我色衰令人忘香為衆妙宗妙亦不在香鄉來藝藝者自意傲雪霜當斯玉立時曽莫一在旁遲遲可殿後寂寂可鎮浮風人第一章窈窕河之洲穆如三代英惟此宜與儔不然則臞仙玉簫下秦樓紛華有心説艷美得目送越在篁葦間顧使詩興動詩人𬒳花惱盡日手自弄愁吟日不足又作栩栩夢亭亭湘岸竹炯炯湘波月其中雪垂垂一樹為誰設不應皂蓋人于此能忘折折之寄相思可以慰分裂商山皓鬚眉久不見綺黃邂逅一笑粲可與斯人當如何為林逋托根向錢塘居遺蘭與芷牢愁楚沅湘先人手所種家在何處村自别此堂堂不知幾寒溫盍歸封植之歲歲為此言老如霧中看正恐目力昏招隱二首將子無登山山上岡復岡朝為朱陽煒暮作隂飈涼磴滑幽鳥啼林深山鬼翔子兮何所求樂此螭魅鄉國人佇齊軾吾黨多魯狂望子子不來翠袖天風揚緇塵擺落盡幽願次第償焦鵬入冥雲蟣虱寬貝陽子兮竟誰從獨樂無巳康豈其羊之飢而可穀與臧將子無涉水水深下無極鯈魚舞浮陽螭首闖隂碧弱去一羽沉惡來萬波激子兮何所求快此蛟涎滴議諌起陽城拾遺招李渤望子子不來羊裘號逋客踞坐山石粗晞髮朔風疾亂流兩白足何日踔踈逸扶踈清逸倉司二亭子兮寧不悲飢氓俟唐稷豈其洛之涯而可溫與石記夢窪然石壁罅涓涓如絲繩其人指此泉下去為滄溟旁有玉蟾蜍空中底方平視之鼻通尻徹竅刻畫精泉從鼻聰入可止不可盈欲問巳無人我亦悟我生惜哉煙火食滓我朝清明止齋先生文集卷之三
