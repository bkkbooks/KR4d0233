front:
  text: 止齋先生文集卷之三十
  hash: sha256:3e31f720196996970bd70ccbc068d3c32bff76c3355853f98732f7976fde1409
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_030-1a}
body:
  text: 表乾道壬辰進士賜第謝太上皇帝踈愚之對爰契九重聲教所陶聿来三紀推本功徳度越古今中謝竊跡本朝家法之詳䆒觀列聖心傳之要規模一以經術事業付之書生皇帝陛下所以載纉大猷曲垂清問臣等顧遭逢之幸甚而循省之缺然其何稱塞招延之休徒以生長涵養之澤兹盖伏遇太上皇帝陛下道久忘世仁深入人光昭斯文燕及今日退藏于宻資萬物於乾元長彂其祥生多士於王國臣等敢不益堅精白茂對龍光言念何繇庻㡬無斁士捋無負虞舜聦明之朝遐不作人其敢忘周王夀考之賜桂陽軍謝到任湛㤙所𬒳樂歳相仍邊境晏然書生幸甚中謝伏念臣起於寒逺持是空虚慗嘗試之罔功欲自新而無路粤惟郴桂介在湖湘周職方之所未聞漢刺史之所不察惟本朝之建國合四海以為家盖壌地僅同於附庸則簡書皆聴其專逹如臣疪賤際此休明雖貪假守之榮但求便道亦有来王之問爰至公車誠世所謂謹守三尺之常而臣實為上通九重之始譬諸稺子得言笑於親前意者孤根有發生之天幸兹盖伏遇皇帝陛下不居其聖無斁於人凢試其外服之勞皆待以晚成之節遂令庸冗亦與寵光臣敢不言念昨非務收後効母以已見紛更已便之教條尚於公餘増益未䏻之問學髙宗小祥慰皇帝鋪筵仍几方篤時思鑚燧新烟忽更歲序九重號慟率土悲摧中慰恭惟皇帝陛下道對百王識髙千載諒闇如古不拘易月之文練祥於今尚損踰年之禮追惟愈逺痛甚何堪伏乞少抑聖懐紹世徳作周之孝特垂天聴徇同心戴舜之誠賀登極揖遜相承乾坤嘉頼謳歌所暨夷夏宗依中賀恭惟皇帝陛下篤生元良遵養濬哲鷄鳴而起方趨問寢之時龍躍以飛俄繼中天之統彛倫秩叙暦服延洪永惟二典以還亦既千載于此髙皇於漢無神噐之傳太宗於唐非儲闈之正孰與以明述聖自祖及孫當垂拱以襲堯盡君之道爰詢謀而命禹若帝之初獨冠百王同符隆古臣適際離亨之㑹叨分邉瑣之麾跂望清光欣霑殊渥但與林篁之衆咸有葵藿之心謝登極赦維帝出震與物為春在舜紹堯眚災肆赦爰孚大號實本舊章中謝共惟皇帝陛下誠足以格幽明徳足以侔髙厚養以天下嗣萬世無疆之休洽于民心思匹夫不𬒳其澤聿觀載籍具在儀周有大賚盖惟初基漢與更始但為故事未有重規疊矩一視同仁率循繼照之初備舉好生之典臣遭時華旦假守遐方葵藿傾陽式謹朝宗之義蓼蕭零露敢忘滲漉之㤙賀夀皇聖帝尊號舜薦之天以禹傳九疇之正乾稱乎父則震成六子之功夷夏榮懐宗社嘉頼中賀恭惟至尊夀皇聖帝陛下徳及動植孝通神明素隆藝祖之丕圖昭受髙宗之大烈方邉鄙不聳盖聞中國之至仁而羮牆靡忘欲行天下之逹禮遂辭尊於南面爰致養於東朝况夫暦數有歸彛倫攸叙惟聖知聖繼今實為萬世之休可名非名舍此曷表一人之意雖六言而甚約與二典以相輝臣假守遐方遭時盛事上未央之夀正隔於清光說稽古之書尚修於薄伎皇太后移御慈福官賀皇帝暦數有托而伸堯母之尊謳歌攸歸則本禹疇之叙粤惟自昔莫若方今中賀共惟皇帝陛下恭敬温文聦明睿智乃眷夀皇之顧聿懐神噐之傳為天下得其人遂忘南面為人子止於孝式奉東朝惟太極之生兩儀與三聖之守一道未之嘗見可以擬倫臣叨備符分阻陪旅進雖恭想瑶池之宴與世相忘然永同沔水之宗自今以始皇太后移御慈福宫賀夀皇聖帝尭天逾逺方切於追懐文母彌尊益隆於夤奉中賀恭惟至尊夀皇聖帝陛下躬上聖之質嗣中興之功歴年于兹薄海無事粤從恭黙極為人子孝之思竟托倦勤决以天下遜之計欲備東朝之甘旨不知南面之崇髙二典所無百王何取臣叨分符守阻簉周行富貴無足解憂幸粗知於大義謳歌咸曰與子願永暨於同心立后賀皇帝父作子述増光典謨身修家齊匹休南雅属彌文之具舉罄群聴以交欣中賀恭惟皇帝陛下得聖之傳繼天之統深惟内則莫隆媯汭之風粤自初潜元重塗山之選爰稽謀於慈極以䄮正於中宫于以成未央奉觴爲夀之歡于以對長樂含飴弄孫之福遐觀徃古孰盛當今臣假守偏城欣聆鉅典但縻廪稍曾無僕馬之勞當課農桑以廣耕蠶之化賀皇后維帝出震維坤承天宗社榮懐華夷康共恭悄皇后殿下徳足以配任姒功足以佐唐虞肇開青宫及建皇極問安六寢嘗同共子職之勤正始二南又得化天下之道以鷄鳴之盥櫛成象服之委蛇可謂日並月明風自火出臣欣聞郵置阻預歡呼雖幸雲龍共覩聖人之作自憐僕馬曾無臣下之勞皇帝登寳位進奉銀重明繼照當班瑞群后之初一徳尊天率貢金九牧之舊上件銀地不愛寳而後出人不易物以為珎敢傪任土之儀庸見来庭之義箱篚不腆斧鉞奚辭謝賜暦日通天地人大一王之作統恊時月日罄四海以朝宗拜賜甚榮尤職惟謹中謝竊以暦之䟽宻代有革因原於日積之餘分揆以歲差之衆說及大衍而始定至統元而加詳自有此書莫如今日恭惟丨皇帝陛下不愛其道以覺斯民比元㑹之肇修當三陽之緫至凢兹敬授皆所裁成徇以孟春昭示人臣之憲觀之挾日誕敷都鄙之和臣敢不奉以周旋勤於勸課及幽風之寒暑秩叙農功同魯史之春秋寳為邦與紹熈改元賀皇帝一元之建雖曰舊章二羙之并兹惟盛事中賀竊以䇿書所記年號則多有以守成而愧揖遜之君至於更化則非㳂襲之意未若二聖親傳於大寳兩朝兼著於隆名播告多方超踰前古恭惟皇帝陛下審時所上親政於初逺惟紹大業之難近思熈庻績之廣聿稽堯舜之典合為禹謨奄有夏啇之年布在周歴臣繆持使節欽誦韶書恊時月正日敢有不恭道徳意志慮愧非其任賀丨夀皇聖帝從吉三年一祫率古舊章四海八音與民同樂宗祊嘉頼臣庻榮懷中賀恭惟至尊夀皇聖帝陛下孝足以通神明徳足以施孫子宜享厚報而備聖人夀之福宜居常尊而極天下養之歡與國無窮自今以始臣粗知善頌久去周行喜共遐方復見舜琴之御瞻言廣内莫陪漢蹕之朝賀夀聖皇太后從吉舜畢三年共爲子職漢朝五日燕及孫謀中賀恭惟夀聖皇太后殿下維徳是行以慈爲寳親見重華之盛永膺至養之榮長樂東朝肇稱於吉禮瑶池西母茂介於修齡臣属于隰之載馳喜舊儀之復見龍旗鳳扇想浮慈福之春寳殿玉巵莫扈未央之駕賀夀成皇后從吉式恊靈辰肇稱吉禮天人底豫宗社延休中賀恭惟夀成皇后殿下周母嗣音虞嬪著徳長樂宮之養尚小前規内司服之衣率循彛典親見累朝之盛永陪慈極之尊臣属職馳驅阻前賀舞衮龍相映想觀廣内之儀韶鳳来翔仰祝後天之筭至尊夀皇聖帝冊寳賀皇帝親傳大寳懼功徳之不宣恭上鴻名質詩書而何媿重闈燕喜率土榮懐中賀恭惟皇帝陛下道配唐虞行殊曾閔謂孝非直養莫如得四海九州之心謂禮有常尊孰與兼五典三墳之號冩之琬琰炳若丹青以彌隆報之文以永昭垂之聞昔漢之尊大上與唐之事明皇群臣萬歲之称早嘗擁篲二聖重歡之頌竟亦磨崖以方熈朝皆有慙徳臣欣逢慶事越在遐方雖揚邁鋪張莫預觀光之列而詠歌嗟嘆曷勝報上之誠賀夀皇聖帝元年正月恭上徽稱五日一朝永膺備養乾坤豫順夷夏歡呼中賀恭惟至尊夀皇聖帝陛下軆道之真遺物之累成功不宰妙合先天之天聖徳無稱亶為衆父之父尚從人欲爰舉邦彛惟富有四海之内之謂尊惟尊居一人之上之謂至以言乎夀則歛箕子之福以言乎聖則集孔子之成肆裒朝野之談兼採典墳之號於焉㱕羙是亦強名臣幸際昌朝親逢盛事吉禮嘉禮雖莫預於觀光大書屢書豈敢忘於善頌賀夀聖皇太后慈闈備養聖子垂休􅌚騰桂宫羙播玉牒中賀恭惟夀聖皇太后殿下福為晋母徳配坤元率先釐降之風克諧舜孝光輔思齊之化丕顯文謨惟重規疊矩之相承致偉蹟宏休之間見臣繆持使節阻造朝班聆盛事之鋪張不勝鼇抃與生民而鼓舞殆若鳳儀賀夀成皇后響珮而朝夙嚴内助鏤玉之牒式播徽稱實為邦國之榮豈止宫闈之慶中賀恭惟夀成皇后殿下母儀克正隂教聿修以周南肅雍成天保治内之化以坤道柔順賛乾元資始之功丕揚宏休允属嘉㑹臣繆持漢節阻簉周行聆顯冊之輝煌預編氓之踴躍賀皇后夤奉慈顔職勤櫛縱載揚丕典􅌚動宫闈彌文畢張薄海胥慶中賀恭惟皇后殿下母儀範俗女則冠倫關雎自北而南盖由正始天保以上治内悉本躬行值冊寳之告成肅禕䄖而稱慶臣阻持漢節莫簉周行聞縟禮之修明與編氓而抃蹈夀聖皇太后冊寳賀皇帝奉長樂之觴制獨尊於文母議曲䑓之典禮尤謹於湯孫儀文畢張天壌交慶恭惟皇帝陛下夙推孝治得自家傳謂侍膳問安猶想含飴之樂而宅中圖大敢虧報本之誠宜彤管之巍煌與寳章之焜耀仰瞻慈極夤奉徽稱臣将指南州馳悰北闕鳳儀獸舞忻縟典之修明螽躍蟲鳴預編氓之抃蹈賀夀聖皇太后太𥘉之有太素莫與同尊文子以及文孫曷勝歸羙爰升顯號用答群瞻中賀竊以老氏三寳唯聖為能箕疇五福以壽為貴克并盛羙誕受彌文永惟女史之傳未有母儀之懿恭惟夀聖皇太后殿下行合内則道濟中興與武造周名在九人之列自尭傳禹功為三聖之叅宜極揄揚以昭報稱臣欣逢盛事越在遐方呼萬歲者三雖莫陪於善頌襲六經為七尚碩繼於前聞賀夀皇聖帝慈闈就養遽辭南面之尊縟典告成恪謹東朝之奉禮文交舉海縣均懽中賀恭惟至尊夀皇聖帝陛下道軼漢唐行髙曾閔謂聖徳無以加孝敢怠躬行雖天下不足觧憂益勤色養載衍鴻儀之慶常懐鷄寢之安臣叨擁使軺阻窺仙仗上萬年之夀莫與鳬趨聞三楚之謡第深鼇抃賀夀成皇后尊歸慈極夙嚴婦事之誠羙播徽稱交舉禮成之慶聲傳桂海歡動椒闈中賀恭惟夀成皇后殿下子育群生母儀六合采古事而著女則史誦宏休為京婦而媚周姜詩歌懿範飾褘衣而備養燦玉檢以揚休臣幸際昌期適符明命官庭雝肅雖莫窺長樂之班原隰馳驅猶欲賦思齊之詠賀皇后寳冊楊庭尊歸北闕御輿至閤制謹西廂懽動慈闈孝形薄海中賀恭惟皇后殿下躬履節儉性鍾恵和司服陳儀載想禕䄖之敬尚官賛禮夤修棗栗之恭式奉徽稱尤嚴内職臣逖聞縟典阻造清朝但揄掦卷耳之詩而頌述思齊之羙止齋先生文集卷之三十
