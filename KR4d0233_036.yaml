front:
  text: 止齊先生文集卷之三十六
  hash: sha256:2416c8f034b4d8c57feea6c805437e6ed54d65d5d5dbd74918a3ea3d8baabd11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_036-1a}
body:
  text: 手書答黃文叔三監班固說非是啇都六七遷皆夾河是後東徙朝歌周自岐雍興初務撫定凡東諸侯嘗為商畿甸近服者皆命之三母弟自荆以南蔡叔監之𬋩叔河南霍叔河北蔡故蔡國管則管城霍所謂霍太山也其綿地廣不得為邶鄘衛明甚三監誅廢晋衛始皆為諸侯蓋有管霍之地而蔡嘗空置矣後以命其子仲其他則齊魯燕二三大國州牧之境揔之周南召南也當文武成康之盛天下有二南國風而巳江沱漢汝諸詩不言其封君甘棠雖美召伯而不繫之召是時安得所謂十三國風者哉國風作而二南之正變矣邶鄘曹鄶特微國也而國風以之終始焉蓋邶鄘自别於衛而諸侯如無統紀及其厭亂思治追懷先王先公之世匪風下泉有若曹鄶然君子以為是二南之可復世無周公誰能正之是故以豳終風以邶鄘嘗統治於衛既得之矣以其封滅不見於傳疑為虛置之國且諸侯封滅不見於經傳何獨邶鄘春秋亦無鄘是不足惑也雖然以為周公封建之說則又不敢不告且周官封建自鄭氏汨亂之而其書迄不見信於世古者建國率小大相維其邉國皆大國也故寰內則以家邑小都大都為中外之差寰外則以諸男諸子諸伯諸侯諸公為中外之差禹貢亦云五百里侯服百里采二百里男邦三百里諸侯以一服為率正此說也鄭氏考之不詳輒以大司徒測地制域以建邦國諸公之地封疆方五百里是為分地推之他書不能合則有夏商三等周更置五等之說則有周公斥大九州之說則有其十皆附庸之說則又有爵尊而國小爵卑而國大之說至於改定經文以七伯為十一伯之類臆决彌甚數說不暇盡論凡試以典命司服大行人司儀諸文考之則封國三等至周公不變其小異者公一位諸侯伯一位子男同一位耳蓋周未有爵為公者必若宋𣏌而後為公周虞皆為天子三公而稱公非有其國而子男獨多職方氏云凡邦國千里千里云者以每服相距言之以其方五百里封公則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男且周未有封公者則通一服之地小大國之多寡以是凖凡為侯伯母過十二三子倍之男又纍倍之其在經傳晋為甸侯曹為甸伯班班可考他如顓臾在邦域鄫無賦於司馬者何可勝數而附庸不與先儒以八州為千八百餘國固繆以春秋僅有一百六十餘國亦繆僕固曰惟賈生最得其意自司馬遷以下往往為經生所亂不敢不告也至如乘車之限祿食之等無足深言者且書不能悉計髙明必有以推見之區區所陳勿為他人道幸甚答陳同父三某尋常人耳蒙老兄拈掇最早而晚又為正則推作前輩行此二三年間雖不鄉進而交遊殊未散落皆二兄之賜獨恨未及與晦菴遊講求餘論如人一身血氣偏枯以是脉絡未相貫穿而愚見復謂千書不如一見終當相就不欲以𥿄筆呶呶其間以辭害意失之逺矣老兄懸度而欲附之下風此意厚甚而不敢當也往還諸書熟復數過不知幾年間更有一畨如此議論甚盛甚盛然朱丈占得地假平正有以逸待勞之氣老兄跳踉號呼擁戈直上而無修辭之功較是輸他一著也以不肖者妄論功到成處便是有德事到濟處便是有理此老兄之說也如此則三代聖賢枉作工夫功有適成何必有德事有偶濟何必有理此朱丈之說也如此則漢祖唐宗賢於盜賊不逺以三代聖賢枉作工夫則是人力可以獨運以漢祖唐宗賢於盜賊不逺則是天命可以苟得謂人力可以獨運其弊上無兢畏之君謂天命可以苟得其弊下有覬覦之臣二君子立論不免於為驕君亂臣之地竊所未安也以兄之竒偉適不如樂毅論之迂濶朱丈之正大適不如王命論之淺近是尚為有益於訓乎且朱丈便謂兄貶抑三代而兄以朱丈使五百年間成大空闊至於其間頗近忿爭養心之平何必及此不得不盡情以告然勿為晦菴言之徒若犯分也自七月間病暑幾殆凡事盡廢蔡直之到闕欲附數字猶未能自強也瞻仰嘆故何可勝道專人惠書就審訊後尊候萬福慰懌之至各年半百餘歲不過一再相問勞無由聚頭又堪懊意也某昔者何所有今者何所進自是老兄諸人過相拈掇每自謂人品極是尋常而亦礙人眼孔端是友朋捧擁之過近來衰惰益見天道尚思而好安無復更有他念來書方以為課進豈以為尚妄意當世乎然老兄之論要是攧撲不破若得人之伏不免背去求一喜之遇隨手敗闕只是侵砌鬪合工夫能有多少光景往時曾與東萊語及非來復安得浸長老子極以為然所不識亦與求意略同否然悲劣弟所當言請置是事元晦往復諸書何嘗敢道老兄點當得錯只是書中詞氣全似衲子面捧之語不應寫在𥿄上一便傳十百便傳千豈可不忍耐特擇言語却乃信手添起後生胡亂模畫而元晦亦趕趂出了無限不恰好話故亦為修辭之難而輒進區區之見老兄既嘆作附勢令人不敢再三且漢唐事業若說並無分毫扶助正道教誰肯伏孔孟勞忉與管仲百里奚分疏亦太淺矣暗合兩字如何斷人識得三兩分便有三兩分功用識得六七兮便有六七分功用却有全然識了為作不行放低一著之理决無全然不識橫作竪作偶然撞著之理此亦分曉不須多論但老兄任直不能廉纎自占便宜其間時有漏氣言語元晦執以見攻蓋是忠愛然亦緣要攻老兄漏氣去處遂把話頭脫體蹉過此劣弟愚陋之見若兩家元不是如此則是智不足以知兩家耳𥘉非有䡖重抑揚之論也自兩壻入館繼以遷徒少定欲遣人間應之報有意外之撓方謝絶人事無從問訊且道逺不詳本末無著力處但與老妻日夜懸念長吁竊嘆而巳子約來言事已明白不墮小人穽中盡室驚喜嗟乎怪哉老兄直至此也天之生才不遇則亦巳矣閭巷蟣蝨之徒時欲置之罪罟若非朝家以不殺士為國是法令明具有司放手生事耶兄當未易免禍吾輩平時每欲望人度外寬繩墨以便功名之士由今觀之士以此免不知幾人則議論誠難事耳又况朋友滿世一旦有緩急束手無䇿若衰杇尤荷親愛亦不過呌冤呌苦與坐視者無異即知老兄負謗負纍奔走鄉曲之急直是枉却舉此兩端方服前輩遵守三尺不敢放閒一線穩便話頭又居鄉如處女雖親戚在縲紲之中或不營救乃是知時識勢非苟然也老兄數年以來再脫於禍目今亦只得還他本朝學者轍樣將秦漢間士大夫公案一切封起未當其位屈著頭合著眼杜門燕坐以養和平之福而已淅西別業稍有倫序漸為擇鄉之計尤所願望某腐生之說雖可厭薄然不到老兄之前他誰敢言者急時坐視慢時以空言相切某則自知罪矣幸察至望與王亞夫運使某竊惟宋興之𥘉藩鎮專命擁財以自封靡爰建將輸之節以阜通天下之有無雖自錢以上名白係省而州郡之闕一仰於部使者四方之計至於三司或纍十年不省而藏富於外臺不可勝計中更變亂於是盡歸公上而漕失其職往往僅同催綱督租祖宗所以懋遷南北均調內外之道缺矣台座以耆明之望簡自聖裁卑以總輸之寄豈與循次而進不得巳而授者同日語哉講䆒顛末還之國𥘉不勝士友之望前書所布自倉司發之尚為涉越今台座事也留意幸甚辱在愛子不當因賀但奉腐熟之談輒申前禀伏𥿄僣越是懼答丁子齊三示及新篇意趣間淡然詩律更當進步子齊德性器度絶過倫輩而區區猶有增益未能之望則磨礲乎事業奮發乎文章也古之大人未有不兼通此而後可以應天下之故者以曾子守約之學而曾子問一篇自禮之窮世故之變悉講而後已以此可以推測孔門之傳也過節儻能惠然一來各進所見幸甚舊學典刑日就寥落非壁立自信安得脫世間波蕩某老矣所覬朋友共發明之無任引領下問讀書譜近方脫藁自畫易至獲麟聖賢調度盡在此卷若從頭啇榷得到分數則異時出處定不草草以此益要團欒如來諭也書譜又辱為之叙文意俱盛前彂藝祖以來諸賢又及邵氏經世書前輩未曽提掇中間一二處未穩更刪定方可遊誠之恨未一見向薛常州每每稱其為英才緩急可倚伏聞與張欽夫相聚甚久欽夫幕中得其助為多鄭四三丈為福建倉失此良友深以為歉子齊既與之處若下人不真不得其精要當切思到底日月不可悠悠聞子約見子靜陸丈不受其砭又是意氣未除子約之凝滯非陸丈不能剖斷得下其他空踈之人又不可入其陶冶楊敬仲尊禮子靜如洙泗此必有以得其心者曾往扣其本末否某甚恨不得與諸公相講切追憶伯恭景望二賢於丁酉聚首之時不覺悽然除夜有懷一章豈能無意詩三百篇大抵喜怒所作要不失其正讀楚詞漢賦建安五言吾輩可謂首鼠畏禍夫畏禍豈所以待寬時耶近日士友相厲多說無圭角此是大患知者一向沉默不知者固有所激昻以要君為利為利者負國沉默者謂之何哉六朝人物區區中原之念見之寢食今日舉子握筆作場屋文字者未嘗肯道其名字獨不謂不能撥亂反正其人固不足道耶吾輩為漢民將十餘世而使吾君忍耻事讐垂六十年而學校鄉黨晏然無進志其大者則率其徒為清談次摘章句小則學為詩文自娛當此時吾黨與士友不變其說謂之波蕩此某所為懼子齊勿以為踈也幽人貞吉勿事奔競之謂若曰時事不得講人才不得評則非古人之意平生讀書亦以為理義如此足矣杜門以來大覺不然子齊試以堯典至平王文侯之命商略古人所以處興亡盛衰之變有人則濟無人則否此事占田地闊不應碌碌休也相愛之切忉怛彌甚惟吾子齊志在本朝故盡布之不必於不相知者道也文季口手自足受用未必聽朋友之砭器逺於足下信厚異時出處共相規約若子齊話頭止如向來所云非所望也蘇黃門晚節甚慚於東坡以溫公待小申公如許至變法時每苦晦叔太懦力量真難事耳與林懿仲二某凡八十餘日始逹官下一冬雨雪難阻萬狀回想間居士友團頭之樂不可得巳桂陽本一縣置吏養兵與賦輸視他大郡民力重困至於甚不能平則或騷動非其俗喜亂也至此逾月犴無見囚而訟牘但田土典賣不明等事蓋朴魯耳唯是帑藏盡虛蕩無綱目而漕檄如織官兵持逋劵責償者纍月正使收拾得到亦無以供之是則可憂也湖南諸郡劉子澄最善政竟不能免蔡直之邵陽次之亦有不樂者今春臧狀未必調一言勞者何以勸乎勿為他人道幸幸淮甸不知此去當如何錢幣一事想巳動搖了人情朝家方救過不暇應置此未經念要是便錢務最佳俟稍定試拈出此活頭也某荷上眷不薄然竭盡區區無毫髮之𥙷至乞休致其情可想朋友宦遊四方雖時時上心亦未有餘力相照燭非忘之也答薛子長三日欲報所况教以乏便未果方此歉怍承命重為不敏某衰惰何足與語今古而左右獨見推遜以所著南北之際義例為惠且下問其然否老矣交遊雕落願方得三益豈非天閔其窮以此厚幸之耶感激過望所論晋非南遷元魏無凌逼中原之暴而其亡以六鎮齊梁陳之暴興北齊之後斃向者亦嘗見此意往往不能發今得筆力先明之胸中了然甚盛甚盛至於君臣譜系尤足考其細故不謂晚年見此竒特宜前輩所嘆也方令兒輩傳寫一本旦夕即納上左右議論誠淵源於正則要其所到又有過人者近宗簡遞示吳門書藁讀之益爽然自失徐復自念鄉間學問將趍於弊非時流之過必得溫厚爾雅之言以殿其末則吾輩皆賴以免足下其人也願言勉之扶此墜緒數日流連酒盞間欲課詩奉送竟不就晨興抽毫而來使巳及門矣謾塞盛意為借書一章以往所謂雷門鼓也一笑一笑兩學官書附煩送似昨報潘叔昌簡云平居尚友有相先之美臨事立我為自全之計此自昔儒者通患而國朝風流持論嚴正消息盈虛尤不屑意老兄以為然否衰惰無復貪書之念昨偶將熙豐後來長編過眼數卷便昏澀異常每對插架慨嘆而巳此事當盡付左右諸人來諭方閲南北史二史儘佳然一代㳂革附見表志者往往不收未免遺恨則諸史要不可廢自荀袁二紀以來下逮司馬通鑑大率欲祖左氏蓋左氏本依經為傳縱橫上下旁行溢出無非解剝經誼而非自為書今乃合太史公紀世書傳繫之編年則其間事辝轇轕勢必至得此遺彼由此觀之類不如正史之悉也然區區所兾深探書外之意來書所謂實事本末往往在此且如西都之末士大夫知有所擇遂成東都之業及其季年雖豪傑之士散為吳魏之役拳拳於漢獨南陽數人當時必有實以致之而豈可以書盡哉何當并合共講一二新詩見寄疾讀降嘆建安以來乃今見此作也止齊先生文集卷之三十六
