front:
  text: 止齊先生文集卷之三十二
  hash: sha256:e47be6f2e403cebc08061bd3185f6eb1e57ba7b8429ad1b89f609b6f3ea142bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0233_SBCK_032-1a}
body:
  text: 啔除太學録謝宰執拜命衡門備官璧水書生已重公論謂何矧如庸虛有此踰越竊以祖宗家傳之法學校風化之原於其訓迪之臣工可以考論其世故儻具員而亡擇欲首善以何繇永惟韓范歐富諸公當國之間則有孫胡石李一時作人之盛如某者學不足以適用才不足以及人固知迂濶於事情豈敢覬覦於䆠逹營求末第政未免於為貧往教遐邦祗自虞於見短徒便於此遑知有他引而置之薦紳先生之林從而付之規矩學者之事還觀所缺豈惟獨慙推本自來或者上纍但揆之進退小巳以無稱報為憂然較之重輕公朝有收踈賤之美徒抱私誼重逞逺模某官直道事君清議在上察見頽俗杜絶幸門每於斯道寂寥希濶之中鬱有前輩扶持興起之念與其妙選以得孰若兼收而示公意有所存人不暇計爰俾凡質亦叨誤恩敢不體悉深知循其素履門墻愛博願悉略其奔走伺候之文農馬庶少盡於灑掃應對之際答釋褐黃上舍伏審課最于學爵命自天推髙旁觀嗟異旦取士必多其節日而後進而授官亦歲月以為勞雖裒然舉首之艱猶越在外服之久未有從於覆禮又為之特加即賜恩綸遽分師席某官以之彥收中雋之㓛因難見竒凡舍矢以如破制勝有道金而不昏某䆒觀當今科第隄防之詳寵光度越之盛尚勉終於逺業用增重於諸生上福建安撫梁丞相道德文章以此名世公侯將相於今幾人偃四海之經綸需一方之膏澤善類太息下僚敢私某官剛大而沉潜髙明而慈惠貴極三台之上猶如書生謙無一日之長隱若敵國事有關於消長身不顧於是非猝遇人情之未嘗徐圖天意之自定勳業藏於不覩議論付之將來昔王文正之終相天禧爰弭冦丁之爭韓忠獻之獨留康定式遄范富之歸蓋嘗夷考舊聞仰止先哲悵此意之莫嗣微我公而安歸是宜再調化元一定國是肅羣之雨風朝宗百川作中流之砥柱某適與走趨之在之詳與其從元戎十乘之遊輝光自近孰令在之數穹壤攸同暄冷未齊霖潦將作伏乞俯從民太和與福建柴運副風憲一臺歸于正豈復與驅馳載惟幸㑹之深莫喻欣愈之至委官刑於太老成莫刑挺松柏而後凋抱圭璋而不琢承宣淮右之言入覬明嘗建久長之䇿所以不推愛爰命嘗中於機㑹薄物細故不登於簡書眷言其之可莫若國家之重然居紏繆繩愆之任則無服讒搜惡之諷方平之遣發大臣景仁深陳其非是邢惡之追窮往事尤論其不公於大雅之寂寥俾善類之安輯意巳俗難異言某既疇昔之依仁矧繼今而受令碩言終教吾之全歸與福建陸提舉功名富貴不知幾人儒雅風流自有定論當致後生之敬豈云屬吏之儀某官志古而通今方中而圓外詞章近於大雅議論接乎前聞及從南渡之老成不數東州之輩行餘輝映物有晋七賢之遺風數語名家非唐諸子之末伎是宜次元鳥生民之作薦圜丘清廟之休而乃袖手旁觀用心更苦退老鑑湖之曲與世相忘行歌蜀道之難令人太息萬里來歸之晚羣公迎勞之勤胡然湖山忽已歲月雖所臨之幸甚將有識之云何某志在從逰乃今受察十年始見嘗有感於斯文一𥿄自通輒遂忘於不肖與福建錢運判為貧擇祿幸察於寬朝同正置員獲依於德㝢忘其恐懼繼以歡愈某官老成典刑儒術潤色自昔連蕚世有令名於今薦紳孰為先進荐揚華貫甫直禁林方濶步寵光之時乃逺懷流俗之外自攬湖湘之轡復還閩越之轅清風彌髙善類大息然而弭伏澆訛之習布宣寬大之條若有隱憂不事表襮雖周王人特序諸侯之上居之甚謙有漢刺史不察黃綬之風欺者豈忍眷此意之常在當古人之與求某昔嘗侍瞻今在按撫碩言終惠式俾依歸與西外知宗誦玉牒之名講聞甚久間會幸之欽慕惟深晚得所圖逝捋既見某言出於帝系及見老成人物典刑可想承平之舊才猷藴籍固宜䆠逹之難嘗得之士友之間而與聞於議論之末薄物細故皆有定數日閒居他無惰色宜為宗盟之率以顯邦家之光永惟維城之所以強周下逮磐石之所以安漢上實念此今以屬公某知書意粗好問學每於前輩碩在下風矧惟謀食之家眷依仁之便以纍年瞻望之弗及受教可期平日見聞之未嘗悉心以聽合桂楊趙守交贄閩山幸徹名之惟舊問津湘水將觀政之有期辱箋翰之先施􅒺風猷而增感某官宗盟領䄂朝路羽儀典刑蓋得之前聞事業未量其逺到溫恭爾雅在二南公子之間樂易宜民真兩漢循吏之選永惟昭代克壯維城大連十州小乘一障以固磐石之勢以綿瓜􅚩之祥眷言賢勞越在邉瑣有書生而繼此將輿論之謂何如某者筮仕匪多才賦甚拙徒以諸公久憐其家食遂令一介嘗試於邦條欲其蒙成可不終惠方剖竹合符之始罙切凌兢惟甘棠所茇之餘尚堪慿藉與湖南潘安撫畤燕及庶邦實恃元侯之重瞻言當代誰如舊德之尊乃以諸生來為屬邑心獨自喜口不能宣某官以大雅之英得中庸之學跂彼羣老凄其百年自昔聲名非故國喬木之謂於今輩行在中流砥柱之間永惟衡嶽以南荆州之鎮荒地弗治欲稍如閩浙之區足兵何先正急此湖廣之賦孰為二者之善計以副九重之至仁於以煩公蓋將託國有如朴􅈪亦預驅馳上之不能宣中和樂易之風下之不能及期㑹簿書之事爰從𥘉良有後憂未知安仰緣幸㑹忽過所圖逝將聽罄咳以自寬抑分守而不敢憐拙學乏由求從政之長庶俾愚蹤譏之致答楊知録地方千里豈無問政之人天各一涯未有納交之日遽蒙朋翰良慰面墻某官以湖海之豪擅之譽繇淵源之實學出文字之緒餘閲過千帆不作積薪之嘆功收百戰益知遊刃之才蓋有志於淑人亦何心於試吏水惟舊郡粵自熙朝與計偕者間歲有之能䆠逹者於今罕甚文物不競國風所關不資先進之賢曷振清流之望其弗友迪以多聞固假守之急先亦居之嘉賔可式庶幾多千木之風獄市所容奚上問至公之道答鄭教授不圖行李遽辱華箋以髙誼之相先知衰悰之不敏喜於既見誠無異於菁莪之詩愧在後來恐未免有積薪之嘆某官汲古之學濟時之才藹然桑梓之評籍甚縉紳之譽循次而進宜在衮衮臺省之間有懷不伸尚為青青襟佩之伍雖名教之可樂而師言之不然顧此面墻曷堪乘障聞風而恱乃於此以定交寡過未能宜如何而加教徒藻飾之巳過曽切磋之不聞儻未􅘃官尚可及橫經之日庶其問政幸母如傾蓋之𥘉答桂楊王教授益祥內交邇止曷勝借助之私辱贈勤斯乃見相先之誼未知所報已足自寬某官學造淵源文有根柢以其邁往不群之氣見于嘗試巳效之間露學校之一班輒先課最對闕庭者千數獨以昌言即𥘉筮之已然何究觀之不可顧如假守于此依賢乘障實難面墻是懼事多隃度孰如既見之詳學亦空談未必可行之實政須衆智以迪微明載窺正始之音殊識起豫之意不有師儒之託良繫民心尚資經術之餘以飾吏事答桂陽吳贍軍畿思先生而不見雅有典刑以平昔之所聞今為僚友方將分半席之共事貽朋緘之過嫌雖以自寬未知所報某官汲古之業濟世之才淵源所漸接嶽麓再傳之緒指顧而定成桂林三捷之功雖文章不露而世巳驚然禮義無愆而人何恤徒以同門之故肯為管庫之官悵此風之缺然得吾黨而幸甚矧惟乘障憂在面墻撥煩攸難寡過則未事皆隃度孰如既見之詳理亦空談未必可行之實政惟求助奚止納交以先辱之勤斯知遄㱕之邇止可與共學儻惟嘗事洙泗之間不卑小官則豈但為趙魏之老行以為請言不能宣桂陽謝執起家為守曽何勞能便道之官徒以貧病雖君恩之丕冒皆廟議之獨憐竊以自昔大臣加惠多士凡待以晚成之器則飬於煩使之時功如曺參才若賈誼開清净之道必去齊而後能陳治安之書非渡湘則弗克矧惟此意施及中人自匪偷安寧不感慨某官以毋我之學成代天之功一紀于兹曽莫窺其愠喜百工所職𥘉不失於重輕乃如踈愚尤所幸蓄雖嘗試之不效而作成之有加某敢不佩服深仁圖惟薄效儻報三年之政遂及終更苟有一日之長敢忘大造與湖南張運判縯三館題名誰非後進六條問事日有先聲凡同衡嶽之盟悉仰皇華之疪乃如獨喜則倍群瞻某官當代典刑本朝經行卓爾逹尊之德藹然爾雅之文方獨步於英躔已遍儀於清貫富貴利逹不知兩蜀之幾何議論風流當自三蘇而至此是宜次元鳥生民之頌薦圜丘清廟之休胡然江湖久矣歲月還驅九折流俗以衣錦而為榮閲過千帆善類於積薪而加嘆萬里來㱕之近諸公迎勞之勤豈外計之無人况裏言之有味推之在昔多收歲晏之功意者由今竟為海內之福某以空踈之學當凋敝之餘每事面墻所憂末路孰謂夤緣之幸迄應慕用之私自其𥘉筮以微名亦既終更之知免然而願言受業曽未及門與學省之青襟摩挲石刻及天涯之白髮奔走學永惟修敬之併誦屬心之久儻辱以書生之故不宜若責其則有餘罪與衡州劉守進謁賔墀圖納交而弗果分符郡寄欣問政之有鄰爰修使聘之儀以篤邦聯之敬某官絶人德業康世才猷有聞無聲擅圭璋顒卭之望何鄉不可見淵泉溥博之功謂宜上廟朝論思獻納之班何獨宣湖海豈弟和平之化方當綜核尤重外庸蓋國家所以進賢而皇上於焉注意况江亭遺詠邦君實王佐之才且郴岸瞻言刺史有巖廊之具永惟自昔是用煩公將朞年報政之時奉尺一賜環之詔若某者空踈末學齷齪散材乘障何堪面墻是懼譬諸弱植固欣依松柏之髙正使澡身猶慙厠珠玉之側佇誨言之惟服儻官謗之可逃同寅協恭匪一人之私義比小事大尚往昔之通規與郴州丁守逢一星于兹久不造下風之請百里而近今乃同與國之盟即其講德之詳重以納交之早心獨自喜書不能宣某官學本六經才兼數器每懷往事欲收南渡之功名若論後來不數東州之輩行越在外服竟無裏言宣勞蓋自於青衫養望殆幾於白髮升華延閣盍歸西省之班服美長淮乃掌北門之管胡然自詭復此遐征避名湖嶺之間用意市朝之外令人髙仰舉世誰如若某者疪吝之餘空踈如故冒來乘障憂在面墻不圖雅故之交而托撫封之近屈公於此將物論之云何知我者誰亦已分之幸甚何繇隙地之遇薄叙小邦之懷滕間於齊楚之間盛衰則異江别為滄浪之水源委攸同撤名之初歸德彌切謝潘安撫列薦舉最有三罔功第一雖未嘗於推擇終自切於依歸伏以蕞爾桂陽巳非古郡析郴置縣與廣為鄰周職方之所未聞漢刺史之所不察蓋厥壤處諸華之裔而其君視大國之孤嘗因壁記以泛觀自升軍額而救數中興至此凡六十載之間善狀為誰才一二人而巳間或收效於毫髮曷嘗掛名於齒牙未有當路為之同辭剡章至於専逹越在它邦之上突如今日之榮豈無賢勞堪此寵異昔方嶽考績於僉言以見公春秋豫人至特書以為貴儻凡流而與此將公論之云何如某者才不逮中學非適用早嘗困於鉛槧晚但謀於稻梁豈謂誤恩遽叨假意所勇敢動違小吏之規理當便宜輒束拘儒之見徒勤無𥙷將罪是求矧惟郡計之空重以歲功之薄欲罔民而何敢懷言上以無繇惟有再三以乞憐庶幾萬一於免戾居常自謂殆非巧宦之宜為已乃不然竟以拙誠而見録某官當今先進薄海逹尊覆護諸生不遺餘力扶持斯道如有隱憂每於衆好惡之言獨有公是非之意始以致曲將如萬折之必東逮其既孚則併一談而弗破遂令庸陋亦𬒳甄明某敢不更體深知益堅晚操處非其據幸而轉敗以為功歸潔其身當務以退而為進與湖南沈安撫樞大邦維屏眷言衡嶽之雄元老壯猶簡在甘泉之舊先聲所暨群聽已孚連十國以相歡獨二天而尤幸某官居今大雅當代逹尊風流蓋接於前聞績用莫詳於已試世方倚重儼然綺里之衣冠人忽為危閲盡翟公之賔客雖三已而何愠無一辭以自明上獨知心晚將共事况民庸之愈偉曽物望之誰如嘯咏東嘉粲門里閭而可數指麾鄂渚寂井竈以無譁爰進陟於西清尚來宣於南服求之輿誦謂歸衮之奚遲撥以比年宜召還之相繼蓋有定論豈曰遐征某甚矣面墻於焉乘障意所勇敢動違小吏之規理當便宜或束拘儒之見徒勤無𥙷將敗是求豈期末路之難乃有萬間之庇顧惟列
